title: Image Licensing
subtitle: Usage Rights and Permissions for Z-Beam Images
description: Information about image licensing, usage rights, and how to obtain permission for Z-Beam photographs and graphics
heroImage: /images/hero/default-hero.jpg

contentCards:
  - heading: Image Usage Rights
    text: All images on Z-Beam.com are protected by copyright. Most of our original photography and graphics are available under Creative Commons licenses with specific conditions for use.
    category: Overview
    
  - heading: Creative Commons License
    text: Unless otherwise noted, original Z-Beam images are licensed under Creative Commons Attribution-NonCommercial-NoDerivatives 4.0 International (CC BY-NC-ND 4.0). This means you can share and use images with proper attribution for non-commercial purposes without modifications.
    category: Standard License
    details:
      - "✓ Attribution required: Credit 'Z-Beam Industrial Solutions'"
      - "✓ Non-commercial use permitted"
      - "✗ No derivatives or modifications allowed"
      - "✗ Commercial use requires separate license"
    
  - heading: Commercial Licensing
    text: For commercial use, modifications, or derivative works, please contact us to obtain a commercial license. We offer flexible licensing options for businesses, publications, and educational institutions.
    category: Commercial Use
    details:
      - "Contact: info@z-beam.com"
      - "Custom licensing terms available"
      - "Bulk licensing for multiple images"
      - "White-label options for partners"
    
  - heading: Stock & Third-Party Images
    text: Some images on our site are licensed from third-party sources or stock photography services. These images are subject to their original licenses and cannot be sublicensed by Z-Beam.
    category: Third-Party Content
    details:
      - "Stock images marked with attribution"
      - "Contact original source for licensing"
      - "Z-Beam cannot grant rights to third-party content"
    
  - heading: How to Request Permission
    text: To request permission to use Z-Beam images or inquire about licensing, please provide details about your intended use, including the image(s) needed, purpose, distribution, and timeline.
    category: Request Process
    details:
      - "Step 1: Identify the image(s) you want to use"
      - "Step 2: Email info@z-beam.com with your request"
      - "Step 3: Describe intended use (commercial/non-commercial)"
      - "Step 4: Receive licensing quote within 2 business days"
      - "Step 5: Sign agreement and receive high-resolution files"
    
  - heading: Attribution Requirements
    text: When using Z-Beam images under Creative Commons license, proper attribution must be provided. Include the creator name, license type, and link to the license.
    category: Attribution
    details:
      - 'Example: "Photo by Z-Beam Industrial Solutions, CC BY-NC-ND 4.0"'
      - "Link to license: https://creativecommons.org/licenses/by-nc-nd/4.0/"
      - "Link back to Z-Beam.com when possible"
      - "Maintain copyright notice if present"

