sections:
  - type: content-section
    id: pricing-overview
    items:
      - order: 1
        heading: What the hourly rate includes
        text: >-
          Every rental package is structured around a delivered system, operator onboarding, and the support needed to keep a job moving. That means the pricing page is meant to answer scope and package-fit questions quickly rather than pushing you through a quote form before you can evaluate budget.
        image:
          url: /images/operations-training.jpg
          alt: Operator training included with equipment rental pricing
        imagePosition: right
        details:
          - Training and startup support are included so crews can begin work without building a separate onboarding budget.
          - Safety gear and setup guidance stay bundled with the rental workflow to reduce surprise line items.
          - Two-hour minimums keep smaller jobs straightforward while still accommodating larger industrial scopes.
          - Custom quoting remains available when travel, duration, or job complexity pushes beyond the standard packages.
