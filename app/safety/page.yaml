contentCards:
  - order: 1
    heading: Laser Safety Fundamentals
    text: Class 4 lasers require comprehensive safety protocols and personal
      protective equipment. All operators must  complete certified training
      before operating equipment. Safety eyewear must meet EN 207/208 standards
      with  appropriate optical density for the laser wavelength. Respiratory
      protection via PAPR systems protects against  fumes and particulates. Work
      areas must be clearly marked with appropriate signage and access controls.
    image:
      url: /images/pages/operator.jpg
      alt: Laser safety fundamentals and protocols
    imagePosition: right
    details:
      - "Classification: Class 4 laser systems"
      - "Training: Certified operator training required"
      - "Eye Protection: EN 207/208 certified goggles"
      - "Respiratory: PAPR system recommended"
  - order: 2
    heading: Regulatory Compliance
    text: Laser cleaning operations must comply with OSHA regulations, ANSI Z136.1
      standards, and local safety codes.  Regular safety audits and equipment
      inspections ensure continued compliance. Documented safety procedures
      and  emergency protocols must be maintained. All safety equipment must be
      inspected and certified before each use.
    image:
      url: /images/netalux/worker.jpg
      alt: Regulatory compliance and safety standards
    imagePosition: left
    details:
      - "Standards: OSHA, ANSI Z136.1 compliance"
      - "Audits: Regular safety inspections"
      - "Documentation: Written procedures required"
      - "Equipment: Pre-use inspection mandatory"
  - order: 3
    heading: Safe Operating Procedures
    text: Establish controlled work zones with appropriate barriers and signage.
      Verify all safety interlocks are  functional before operation. Use fume
      extraction or adequate ventilation in all work areas. Maintain
      clear  communication between operators and nearby personnel. Follow
      manufacturer specifications for all equipment  settings and maintenance
      schedules.
    image:
      url: /images/pages/rental.png
      alt: Safe laser cleaning operating procedures
    imagePosition: right
    details:
      - "Work Zone: Controlled access with barriers"
      - "Ventilation: Fume extraction required"
      - "Communication: Clear team protocols"
      - "Maintenance: Regular equipment servicing"
