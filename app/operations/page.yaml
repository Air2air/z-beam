sections:
  - id: operations-content
    type: content-section
    _section:
      title: Operations & Compliance
      description: Professional operations with comprehensive safety and regulatory
        compliance
    items:
      - order: 1
        heading: Safety & Compliance
        text: Every operation meets or exceeds all applicable safety and environmental
          regulations. We maintain full compliance  with OSHA, ANSI Z136.1,
          BAAQMD, FDA, and CARB requirements, ensuring safe operations and
          environmental protection.
        image:
          url: /images/operations/safety.jpg
          alt: Laser cleaning safety protocols and compliance
        imagePosition: right
    details:
      - <strong>OSHA Compliance</strong> - Full adherence to occupational safety
        standards
      - <strong>ANSI Z136.1</strong> - Laser safety standard implementation
      - <strong>BAAQMD Permits</strong> - Bay Area air quality compliance
      - <strong>FDA Registration</strong> - Medical device safety standards
      - <strong>CARB Compliance</strong> - California air resource board
        requirements
      - <strong>Environmental Protection</strong> - Zero hazardous waste
        generation
  - order: 2
    heading: Training & Certification
    text: Comprehensive operator training includes laser safety, material-specific
      protocols, emergency procedures, and  regulatory compliance. All operators
      receive hands-on training and safety certification before equipment
      operation.
    image:
      url: /images/operations/training.jpg
      alt: Comprehensive laser cleaning training and certification
    imagePosition: left
    details:
      - <strong>Laser Safety Officer</strong> - LSO certification and oversight
      - <strong>Operator Training</strong> - Hands-on equipment operation
        training
      - <strong>Material Protocols</strong> - Substrate-specific cleaning
        procedures
      - <strong>Emergency Response</strong> - Safety procedures and emergency
        protocols
      - <strong>Regulatory Updates</strong> - Ongoing compliance training and
        updates
      - <strong>Documentation</strong> - Complete training records and
        certifications
  - order: 3
    heading: Environmental Protection
    text: Laser cleaning eliminates hazardous waste streams, chemical disposal, and
      environmental contamination.  Our HEPA filtration systems capture all
      particulates, ensuring clean air and zero environmental impact.
    image:
      url: /images/operations/environmental.jpg
      alt: Environmental protection through laser cleaning technology
    imagePosition: right
    details:
      - <strong>Zero Chemical Waste</strong> - No hazardous chemicals or
        disposal requirements
      - <strong>HEPA Filtration</strong> - 99.97% particle capture efficiency
      - <strong>Air Quality Protection</strong> - Real-time monitoring and
        filtration
      - <strong>Waste Reduction</strong> - Dramatic reduction in hazardous waste
        generation
      - <strong>Carbon Footprint</strong> - Minimal environmental impact
        compared to traditional methods
      - <strong>Regulatory Reporting</strong> - Complete environmental
        compliance documentation
