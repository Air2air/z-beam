pageTitle: Z-Beam Standards Compliance
pageDescription: Agency-by-agency compliance requirements for Z-Beam field work,
  covering OSHA controls, ANSI Z136.1 practices, emissions control, laser
  product safeguards, and California rules.
description: Z-Beam organizes compliance around the agencies and laser-safety
  standard that directly govern field work. Each callout names one oversight
  body or standard and the controls needed to stay compliant.
category: services
subcategory: compliance
