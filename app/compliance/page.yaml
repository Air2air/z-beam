sections:
  - id: compliance-callouts
    type: content-section
    _section:
      title: Compliance Oversight By Agency
      description: Each callout ties one regulator or laser-safety standard to
        the controls Z-Beam must meet before and during laser cleaning work.
    items:
      - order: 1
        heading: OSHA
        text: OSHA governs the baseline worker-safety program for Z-Beam laser
          jobs. That means trained operators, wavelength-specific eye protection,
          warning placards, beam control, and work practices that limit direct,
          reflected, and non-beam hazards.
        image:
          url: /images/logo/logo-org-osha.png
          alt: OSHA logo
        imagePosition: right
        details:
          - <strong>Qualified Operators</strong> - Only trained personnel should
            install, align, adjust, and operate the laser equipment.
          - <strong>Laser Eyewear</strong> - Protective goggles must match the
            wavelength and optical density required by the energy involved.
          - <strong>Posting And Beam Control</strong> - Post laser warning placards,
            keep the beam off workers, and use shutters, caps, or shutdown when not needed.
          - <strong>Non-Beam Hazard Control</strong> - Maintain controls for fumes,
            particulates, electrical hazards, and contaminated residues generated by laser cleaning.
      - order: 2
        heading: ANSI Z136.1
        text: ANSI Z136.1 is the core end-user laser safety standard behind
          Z-Beam's field laser safety program. It turns hazard-zone analysis,
          controlled-area rules, beam-path controls, SOPs, and eyewear selection
          into a practical Class 4 work system.
        image:
          url: /images/logo/logo-org-ansi.png
          alt: ANSI logo
        imagePosition: left
        details:
          - <strong>NHZ Evaluation</strong> - Define the nominal hazard zone so the
            team knows where direct, reflected, or scattered laser radiation exceeds permissible exposure.
          - <strong>Controlled Area Design</strong> - Use area posting, barriers,
            beam stops, and entry controls appropriate to Class 3B and Class 4 work.
          - <strong>Written SOPs</strong> - Maintain documented operating and
            alignment procedures for recurring laser tasks and non-routine setups.
          - <strong>Eyewear Selection Logic</strong> - Choose protective filters by
            wavelength, exposure condition, and optical density needs.
      - order: 3
        heading: Cal/OSHA
        text: Cal/OSHA adds California-specific enforcement for how Z-Beam runs
          field crews, especially on outdoor jobs, construction-like sites, or
          work involving hazardous coatings. The focus is day-of-work
          supervision, training, and documented corrective action.
        image:
          url: /images/logo/logo-org-calosha.png
          alt: Cal/OSHA logo
        imagePosition: right
        details:
          - <strong>IIPP</strong> - Keep an Injury and Illness Prevention Program
            with hazard assessments, inspections, and corrective-action tracking.
          - <strong>Heat And Outdoor Work</strong> - Apply California heat-illness
            rules when crews are working outdoors or in high-heat conditions.
          - <strong>Lead Or Toxic Coatings</strong> - Escalate monitoring,
            containment, and hygiene controls when the substrate history suggests regulated toxic residues.
          - <strong>Supervisor Accountability</strong> - Assign field responsibility
            for pre-job briefings, stop-work authority, and incident documentation.
      - order: 4
        heading: Bay Area Air Quality Management District
        text: BAAQMD oversight matters whenever Bay Area laser cleaning could
          create visible emissions, nuisance dust, or uncontrolled exhaust.
          Z-Beam has to show that particulate capture and jobsite practices keep
          emissions contained.
        image:
          url: /images/logo/logo-org-baaqmd.png
          alt: BAAQMD logo
        imagePosition: left
        details:
          - <strong>Source Capture</strong> - Run extraction and HEPA filtration at
            the point of cleaning so particulates are controlled before release.
          - <strong>Visible Emissions Control</strong> - Stop and adjust the job if
            smoke, dust, or plume conditions exceed what the control plan allows.
          - <strong>Site Evaluation</strong> - Review enclosure, airflow, nearby
            occupants, and sensitive receptors before work begins.
          - <strong>Records</strong> - Keep job documentation showing the filtration
            setup, operating conditions, and corrective steps taken onsite.
      - order: 5
        heading: California Air Resources Board
        text: CARB oversight affects the California equipment, vehicles, and
          field practices that support Z-Beam jobs. The compliance question is
          not just the laser itself, but how support equipment, transport, and
          emissions-related operations are managed.
        image:
          url: /images/logo/logo-org-carb.png
          alt: CARB logo
        imagePosition: left
        details:
          - <strong>Vehicle And Equipment Rules</strong> - Use compliant transport
            and support equipment that meets California emissions requirements.
          - <strong>Idling Control</strong> - Enforce anti-idling practices for
            trucks, generators, and support assets during staging and setup.
          - <strong>Emission-Minimizing Workflow</strong> - Favor electric or
            lower-emission support methods when configuring field operations.
          - <strong>Documentation</strong> - Preserve equipment and maintenance
            records needed to show California compliance if a site or regulator asks.
      - order: 6
        heading: FDA Center for Devices and Radiological Health
        text: FDA CDRH oversight matters because Z-Beam field work depends on
          Class 4 laser products that must retain certified safety controls,
          labeling, and user information. Compliance means deploying equipment
          as certified rather than bypassing built-in safeguards.
        image:
          url: /images/logo/logo-org-fda.png
          alt: FDA logo
        imagePosition: right
        details:
          - <strong>Certified Hardware</strong> - Use laser systems with required
            manufacturer labels, emission indicators, key control, and interlocks.
          - <strong>No Defeat Of Safeguards</strong> - Do not bypass covers,
            interlocks, or beam-control features that are part of the certified design.
          - <strong>Manuals And Instructions</strong> - Keep manufacturer operating
            instructions available to operators and incorporate them into job briefings.
          - <strong>Field Configuration Control</strong> - Any accessories or setup
            changes must preserve the product's approved safety architecture.
