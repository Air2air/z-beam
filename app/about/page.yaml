contentCards:
  - order: 1
    heading: Our Mission
    text: Z-Beam exists to make industrial laser cleaning technology accessible to
      businesses of all sizes through equipment  rental and comprehensive
      training. Since 2020, we've helped over 500 aerospace, marine, and
      heritage restoration  projects achieve superior cleaning results without
      chemicals or substrate damage.
    image:
      url: /images/company/mission.jpg
      alt: Z-Beam mission to provide accessible laser cleaning technology
    imagePosition: right
    details:
      - <strong>Cost-effective project execution</strong> - Pay only for what
        you need, when you need it
      - <strong>Risk-free technology adoption</strong> - Try before investing in
        permanent equipment
      - <strong>Access to latest technology</strong> - Always work with
        current-generation systems
      - <strong>Expert support included</strong> - Training and technical
        guidance come standard
  - order: 2
    heading: Our Approach
    text: "Self-Service with Support: We provide the equipment and training; you
      retain complete control over your projects.  This model offers the
      flexibility of ownership with the support of partnership."
    image:
      url: /images/company/training.jpg
      alt: Comprehensive laser cleaning training and support
    imagePosition: left
    details:
      - "<strong>Comprehensive Training</strong>: Every rental includes hands-on
        operator training, material-specific protocols, and safety
        certification"
      - "<strong>Technical Expertise</strong>: Our team includes laser
        physicists, materials engineers, and industrial safety specialists"
      - <strong>Equipment rental</strong> - Fiber laser systems
      - <strong>On-site training</strong> - Facility-specific protocols
      - <strong>Technical support</strong> - Real-time guidance during operations
      - <strong>Mobile service</strong> - We come to your location
  - order: 3
    heading: Our Values
    text: "Safety First: Every aspect of our service prioritizes operator safety and
      regulatory compliance. We meet or exceed  OSHA and ANSI standards, and we
      refuse shortcuts."
    image:
      url: /images/company/values.jpg
      alt: Z-Beam core values - safety, environmental responsibility, honest expertise
    imagePosition: right
    details:
      - "<strong>Safety First</strong>: Every aspect prioritizes operator safety
        and regulatory compliance"
      - "<strong>Environmental Responsibility</strong>: Eliminates chemical
        waste, hazardous disposal, and environmental contamination"
      - "<strong>Honest Expertise</strong>: We tell you what laser cleaning can
        and cannot do"
      - "<strong>Accessible Innovation</strong>: Advanced technology shouldnt
        require advanced capital"
