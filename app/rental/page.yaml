sections:
  - id: rental-content
    type: content-section
    _section:
      title: Rental Services
      description: Professional laser cleaning equipment rental with comprehensive support
    items:
      - order: 1
        heading: Equipment Rental Service
        text: Professional laser cleaning equipment delivered to your location with
          comprehensive training and support.  Starting at $390/hr with 2-hour
          minimum. All rentals include operator training, safety equipment,
          and  technical support throughout the rental period.
        image:
          url: /images/equipment/rental.jpg
          alt: Professional laser cleaning equipment for rent
        imagePosition: right
        details:
          - <strong>Starting at $390/hr</strong> - 2-hour minimum with flexible
            scheduling
          - <strong>Delivery included</strong> - We bring equipment to your
            location across California
          - <strong>Training included</strong> - Comprehensive operator training
            with every rental
          - <strong>Technical support</strong> - Real-time assistance during
            rental periods
          - <strong>Safety equipment</strong> - All required PPE and safety
            systems provided
      - order: 2
        heading: What's Included
        text: Every rental includes everything needed for safe, effective laser cleaning
          operations. We provide the equipment,  training, safety systems, and
          ongoing support so you can focus on your project results.
        image:
          url: /images/equipment/complete-system.jpg
          alt: Complete laser cleaning system with safety equipment
        imagePosition: left
        details:
          - <strong>Fiber laser system</strong> - Latest generation cleaning
            technology
          - <strong>HEPA filtration</strong> - Comprehensive fume extraction and
            filtration
          - <strong>Safety equipment</strong> - Laser safety glasses, barriers,
            and protective gear
          - <strong>Operator training</strong> - Hands-on training with
            material-specific protocols
          - <strong>Technical documentation</strong> - Operating procedures and
            safety guidelines
          - <strong>Emergency support</strong> - 24/7 technical assistance
            during operations
      - order: 3
        heading: Applications & Projects
        text: Our rental equipment handles a wide range of applications from delicate
          heritage restoration to heavy industrial  cleaning. Whether you need
          paint removal, rust treatment, or contamination cleaning, we provide
          the right  equipment and expertise.
        image:
          url: /images/applications/various.jpg
          alt: Various laser cleaning applications and projects
        imagePosition: right
        details:
          - <strong>Heritage restoration</strong> - Gentle cleaning for
            historical artifacts and buildings
          - <strong>Industrial applications</strong> - Paint removal, rust
            treatment, and surface preparation
          - <strong>Aerospace projects</strong> - Precision cleaning for
            critical components
          - <strong>Marine applications</strong> - Hull cleaning, corrosion
            removal, and maintenance
          - <strong>Automotive restoration</strong> - Paint stripping and
            surface preparation
          - <strong>Fire damage cleanup</strong> - Soot and char removal from
            various materials
