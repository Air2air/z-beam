contentCards:
  - order: 1
    heading: Quick Service Request
    text: Ready to get started? Complete our service request form and we'll respond
      within 4 hours with a detailed quote  and availability. All consultations
      include material assessment and safety planning at no additional charge.
    image:
      url: /images/pages/contact.jpg
      alt: Contact Z-Beam for laser cleaning services
    imagePosition: right
    details:
      - <strong>Same-day response</strong> - We respond to all inquiries within
        4 hours during business days
      - <strong>Free consultation included</strong> - Material assessment and
        safety planning at no charge
      - <strong>Transparent pricing</strong> - Detailed quotes with no hidden
        fees or surprise charges
      - <strong>Flexible scheduling</strong> - Weekend and evening availability
        for urgent projects
  - order: 2
    heading: Get Technical Support
    text: Already working with our equipment? Our technical support team is
      available during all rental periods.  Call, email, or use our support
      portal for real-time assistance with operations, safety, or
      troubleshooting.
    image:
      url: /images/support/technical.jpg
      alt: Z-Beam technical support for laser cleaning equipment
    imagePosition: left
    details:
      - <strong>Real-time support</strong> - Phone and email support during all
        operating hours
      - <strong>Expert guidance</strong> - Direct access to laser physicists and
        safety specialists
      - <strong>Remote diagnostics</strong> - Equipment status monitoring and
        troubleshooting
      - <strong>Training resources</strong> - Access to video guides and
        technical documentation
