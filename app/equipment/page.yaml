sections:
  - id: equipment-content
    type: content-section
    _section:
      title: Professional Equipment Rental
      description: Complete laser cleaning system with safety equipment and training
    items:
      - order: 1
        heading: Netalux Kamino 300 laser cleaning system
        text: >-
          <strong>High-precision cleaning in a compact air-cooled platform you
          can deploy quickly on mixed job sites.</strong> The Kamino 300 uses a
          nanosecond pulsed ytterbium fiber source at 1064 nm with adjustable
          frequency and pulse windows by substrate and coating type. Its
          portable design and operator-focused controls work well on weld zones,
          small parts, and geometry-heavy surfaces where consistency matters.
          Users can move from thin oxidation or oil-film cleanup to tougher
          coatings without changing tools while keeping heat input controlled.
        image:
          url: /images/netalux/needle.jpg
          alt: Netalux Kamino 300 laser cleaning system
        imagePosition: right
        details:
          - >-
            Pulsed 1064 nm ytterbium fiber platform with broad control for
            coating removal.
          - >-
            Approximately 43 kg, air-cooled, and practical for mobile site
            work.
          - >-
            Repeatable beam control supports cleaner edges and less rework on
            sensitive substrates.
          - >-
            Faster changeovers between contamination types with fewer test
            passes.
      - order: 2
        heading: Premium laser safety goggles
        text: >-
          <strong>Certified laser eye protection with better long-shift wearability,
          so teams keep protection on instead of taking it off between
          passes.</strong> Univet’s laser safety line emphasizes
          application-specific filters and documented conformity resources,
          helping align PPE selection to wavelength risk, exposure mode, and
          task. Better fit, lens ergonomics, and clearer filter-selection logic
          reduce under-protection risk without over-darkening visibility on long
          jobs.
        image:
          url: /images/pages/univet.jpg
          alt: Univet laser safety goggles
        imagePosition: left
        details:
          - >-
            Supports EN 207/208 and CE-marked selection for direct and
            reflected exposure risk.
          - >-
            Filter selection can match wavelength and process conditions.
          - >-
            Ergonomic frames and stable fit improve long-shift compliance.
          - >-
            Filter data sheets and conformity documents support safety reviews.
      - order: 3
        heading: 3M Versaflo PAPR respiratory protection
        text: >-
          <strong>Powered airflow lowers breathing burden and heat buildup,
          helping operators sustain safe technique through longer cleaning
          cycles.</strong> The 3M Versaflo TR-600-class PAPR combines particulate
          filtration and configurable headtop integration for environments where
          fume and fine-particle control is mandatory. In laser cleaning work,
          that means steadier breathing, fewer fatigue-driven pauses, and more
          consistent standoff and scan control across longer shifts.
        image:
          url: /images/pages/versaflow.jpg
          alt: 3M Versaflo PAPR respiratory protection system
        imagePosition: right
        details:
          - >-
            Positive-pressure airflow with high-efficiency filtration helps cut
            laser-dust inhalation.
          - >-
            Battery-powered airflow reduces fatigue during longer work windows.
          - >-
            Supports NIOSH-approved component programs and OSHA respiratory
            practice alignment.
          - >-
            Fits documented filter selection, pre-use checks, and maintenance
            routines.
      - order: 4
        heading: HEPA-filtered dust extractor
        text: >-
          <strong>High capture efficiency at the source protects visibility, air
          quality, and downstream equipment during laser cleaning.</strong>
          The DE 120 class is built for fine particulate extraction with
          HEPA-grade separation and industrial airflow, making it suitable for
          controlled ablation work where residue management affects both safety
          and finish quality. Stable extraction around the work head helps limit
          redeposition on freshly cleaned surfaces and reduces cleanup labor by
          containing dust where it is generated.
        image:
          url: /images/pages/vacuum.jpg
          alt: HEPA-filtered dust extractor for laser cleaning
        imagePosition: left
        details:
          - >-
            Strong airflow supports continuous capture near the work zone.
          - >-
            HEPA or H-class staged separation improves control and extends
            service intervals.
          - >-
            Cleaner breathing zones and less secondary contamination reduce
            cleanup time.
          - >-
            Better particulate control helps deliver more repeatable finishes.
      - order: 5
        heading: Husqvarna C-3000 pre-extractor
        text: >-
          <strong>Pre-separation removes heavy particulate before it reaches the
          main extractor, protecting HEPA performance and reducing downtime.</strong>
          The C-3000 stage pairs with primary vacuums in high-load cleaning work
          where preserving suction stability and filter life is essential for
          productivity and predictable cost. It improves resilience on long runs
          by reducing rapid filter-loading events that cause performance
          drop-offs, especially when removing heavy rust or thick coating
          residues.
        image:
          url: /images/pages/separator.jpg
          alt: Husqvarna C-3000 pre-extractor dust collection system
        imagePosition: right
        details:
          - >-
            Captures larger particulate upstream so the main extractor can stay
            focused on fine dust.
          - >-
            Extends primary filter life and reduces stoppages from saturation.
          - >-
            Improves uptime, maintenance flow, and consumable spend on repeat
            work.
          - >-
            Separating coarse and fine fractions helps systems stay in spec on
            longer projects.
