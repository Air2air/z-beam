  - id: equipment-content
    type: content-section
    _section:
      title: Professional Equipment Rental
      description: Complete laser cleaning system with safety equipment and training
    items:
      - order: 1
        heading: Netalux Kamino 300 laser cleaning system
        text: >-
          <strong>High-precision cleaning in a compact air-cooled platform you
          can deploy quickly on mixed job sites.</strong> The Kamino 300 class uses
          a nanosecond pulsed ytterbium fiber source at 1064 nm with broad
          process control, including high-frequency operation and short-to-long
          pulse windows for tuning aggressiveness by substrate and coating type.
          Its portable architecture and operator-focused controls make it practical
          for weld zones, small parts, and geometry-heavy surfaces where process
          consistency matters more than raw wattage. In this device class, users
          can adapt frequency and pulse behavior to move from thin oxidation or
          oil-film cleanup to tougher coatings without changing tools. That
          flexibility helps keep heat input controlled on aluminum, steel,
          titanium, and copper surfaces where finish quality and dimensional
          integrity are critical.
        image:
          url: /images/netalux/needle.jpg?v=2
          alt: Netalux Kamino 300 laser cleaning system
        imagePosition: right
        details:
          - >-
            Research-aligned source profile: pulsed ytterbium fiber laser at 1064
            nm, Class 4 architecture, and wide parameter control for coating
            removal without forcing one fixed recipe.
          - >-
            Portable industrial form factor: approximately 43 kg system class,
            air-cooled operation, and field-ready setup that supports maintenance
            windows and distributed site work.
          - >-
            Process quality focus: built for precision use-cases in tight spaces
            with repeatable beam control, supporting cleaner edge definition and
            lower rework on sensitive substrates.
          - >-
            Practical throughput control: parameter tuning supports faster setup
            when switching between contamination types, reducing trial-and-error
            passes before production cleaning begins.
      - order: 2
        heading: Premium laser safety goggles
        text: >-
          <strong>Certified laser eye protection with better long-shift wearability,
          so teams keep protection on instead of taking it off between
          passes.</strong> Univet’s laser safety line emphasizes application-specific
          filters, optical development, and documented conformity resources,
          which helps align PPE selection to wavelength risk, exposure mode,
          and operational task. Instead of treating laser eyewear as generic PPE,
          this approach ties filter choice and optical density to the actual
          process window, reducing under-protection risk and over-darkening that
          hurts visibility. Better fit and lens ergonomics also improve operator
          adoption during extended jobs where intermittent removal is a common
          compliance failure point.
        image:
          url: /images/pages/univet.jpg
          alt: Univet laser safety goggles
        imagePosition: left
        details:
          - >-
            Certification-first protection model: supports EN 207/208 framework
            and CE-marked selection workflows for direct, scattered, and
            reflected radiation risk scenarios.
          - >-
            Application-matched filtering: Univet laser documentation and filter
            data support choosing eyewear by laser type and process conditions
            instead of generic "one lens fits all" assumptions.
          - >-
            Operational advantage: ergonomic frames and fit stability improve
            real-world compliance during longer industrial cleaning shifts,
            reducing protection gaps on active floors.
          - >-
            Documentation depth: technical catalogs, filter data sheets, and
            declarations of conformity provide auditable support for safety plans
            and internal EHS reviews.
      - order: 3
        heading: 3M Versaflo PAPR respiratory protection
        text: >-
          <strong>Powered airflow lowers breathing burden and heat buildup,
          helping operators sustain safe technique through longer cleaning
          cycles.</strong> The 3M Versaflo TR-600-class PAPR approach combines particulate filtration
          and configurable headtop integration, supporting environments where
          fume and fine-particle control is mandatory and comfort directly affects
          compliance. For laser cleaning workflows, that translates into steadier
          breathing, fewer fatigue-driven pauses, and more consistent standoff and
          scan control across full shifts. When paired with an extraction setup,
          PAPRs add a second layer of exposure control that supports cleaner air
          in dynamic job conditions.
        image:
          url: /images/pages/versaflow.jpg?v=2
          alt: 3M Versaflo PAPR respiratory protection system
        imagePosition: right
        details:
          - >-
            Respiratory control strategy: positive-pressure airflow with
            high-efficiency particulate filtration helps reduce inhalation of
            laser-generated dust and process byproducts.
          - >-
            Shift-ready usability: battery-powered operation and managed airflow
            support extended work windows while reducing fatigue compared with
            passive respirator-only setups.
          - >-
            Compliance alignment: selected for occupational programs built around
            NIOSH-approved components and OSHA respiratory protection practices,
            including fit, training, and maintenance procedures.
          - >-
            Program integration: supports structured respiratory workflows for
            cartridge/filter selection, pre-use checks, and scheduled maintenance
            under documented site safety procedures.
      - order: 4
        heading: HEPA-filtered dust extractor
        text: >-
          <strong>High capture efficiency at the source protects visibility, air
          quality, and downstream equipment during laser cleaning.</strong>
          The DE 120 class is designed for fine particulate extraction with
          HEPA-grade separation and industrial airflow performance, making it
          suitable for controlled ablation work where airborne residue management
          determines both safety and finish quality. Stable extraction around the
          work head helps limit redeposition on freshly cleaned surfaces, which
          is especially important when preparing parts for coating, bonding,
          or inspection. It also reduces cleanup labor after each job by
          containing dust where it is generated.
        image:
          url: /images/pages/vacuum.jpg?v=2
          alt: HEPA-filtered dust extractor for laser cleaning
        imagePosition: left
        details:
          - >-
            Industrial extraction profile: strong airflow class for continuous
            capture near the work zone, helping reduce suspended particulate
            spread during coating and oxidation removal.
          - >-
            Filtration and maintenance logic: HEPA/H-class strategy with staged
            separation improves particle control while extending service
            intervals versus uncontrolled single-stage collection.
          - >-
            Safety and housekeeping impact: cleaner operator breathing zone,
            lower secondary contamination, and faster post-job recovery of
            enclosed work areas.
          - >-
            Process consistency gain: better particulate control supports
            repeatable visual results from pass to pass, reducing corrective
            touchups before handoff.
      - order: 5
        heading: Husqvarna C-3000 pre-extractor
        text: >-
          <strong>Pre-separation removes heavy particulate before it reaches the
          main extractor, protecting HEPA performance and reducing downtime.</strong>
          The C-3000 stage is built to pair with primary vacuums in high-load
          cleaning work, where preserving suction stability and filter life is
          essential for productivity and predictable operating cost. In practice,
          it improves system resilience on long runs by reducing rapid filter
          loading events that can cause performance drop-offs. This is especially
          valuable when removing heavy rust, thick coating residues, or mixed
          contamination where particulate volume spikes.
        image:
          url: /images/pages/separator.jpg
          alt: Husqvarna C-3000 pre-extractor dust collection system
        imagePosition: right
        details:
          - >-
            Load-management function: captures larger fractions upstream so the
            main extractor handles finer dust, improving sustained airflow
            consistency during long runs.
          - >-
            System-level efficiency: extends primary filter service life and
            lowers unplanned stoppages tied to filter saturation and pressure
            drop.
          - >-
            Operational value: better uptime, cleaner maintenance workflow, and
            reduced consumable spend in repetitive industrial laser cleaning
            programs.
          - >-
            Fleet efficiency benefit: separating coarse and fine fractions across
            stages helps keep extraction systems in spec longer, improving
            planning reliability for multi-day projects.
