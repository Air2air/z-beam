sections:
  - id: equipment-content
    type: content-section
    _section:
      title: Professional Equipment Rental
      description: Complete laser cleaning system with safety equipment and training
    items:
      - order: 1
        heading: Netalux Kamino 300 laser cleaning system
        text: >-
          Compact 43kg air-cooled system with 300W Class IV Ytterbium fiber laser
          (1064nm); hybrid beam shape; 5m fiber length; 15mm strip width; cleans up to 8.6 ft²/hr.
        image:
          url: /images/netalux/needle.jpg?v=2
          alt: Netalux Kamino 300 laser cleaning system
        imagePosition: right
        details:
          - 'High-performance 300W output; adjustable frequency (2-4000 kHz); pulse duration (20-500 ns);
hand-held with touchscreen interface and preset modes.'
          - 'CE certified Class 4 with IP54 rating; safety interlocks; cleans aluminum, steel, titanium, copper
without thermal damage.'
      - order: 2
        heading: Premium laser safety goggles
        text: >-
          Class 4 laser protection required. Premium Univet goggles included for operator
          and onlookers.
        image:
          url: /images/pages/univet.jpg
          alt: Univet laser safety goggles
        imagePosition: left
        details:
          - 'Full shielding from direct, scattered, or reflected beams; ideal for aerospace and automotive
applications with multi-wavelength protection.'
          - 'Certified EN 207/208 standards; CE-marked; OSHA and ANSI Z136.1 compliant for safe
visibility and OD levels.'
      - order: 3
        heading: 3M Versaflo PAPR respiratory protection
        text: >-
          3M TR-600-HIK powered air purification with climate-controlled airflow keeps
          operators comfortable during extended operations, eliminating breathing resistance
          and heat stress.
        image:
          url: /images/pages/versaflow.jpg?v=2
          alt: 3M Versaflo PAPR respiratory protection system
        imagePosition: right
        details:
          - 'Advanced protection 99.97% particle filtration; 8-hour battery; adjustable airflow (170-200 LPM);
climate control reduces fogging; under 2 lbs.'
          - 'NIOSH/OSHA compliant for hazardous particulates; meets ANSI Z87.1; approved for welding, grinding,
laser operations (29 CFR 1910.134).'
      - order: 4
        heading: HEPA-filtered dust extractor
        text: >-
          Husqvarna DE 120 captures fine dust, fumes, and particles from laser ablation,
          minimizing airborne hazards for safe industrial operation.
        image:
          url: /images/pages/vacuum.jpg?v=2
          alt: HEPA-filtered dust extractor for laser cleaning
        imagePosition: left
        details:
          - 'Portable design 84.9 lbs; 3HP motor with 265 CFM airflow; e-flow auto-adjustment extends filter
life; HMI with filter alarm; dual-stage filtration.'
          - 'H-class certified HEPA filter (EN1822); OSHA silica dust compliant (29 CFR 1926.1153); EPA
hazardous dust guidelines.'
      - order: 5
        heading: Husqvarna C-3000 pre-extractor
        text: >-
          Advanced pre-separation system reduces filter loading by up to 80%, extending
          primary HEPA filter life and maximizing dust extraction efficiency for heavy-duty
          laser cleaning operations.
        image:
          url: /images/pages/separator.jpg
          alt: Husqvarna C-3000 pre-extractor dust collection system
        imagePosition: right
        details:
          - 'High-capacity design Cyclonic pre-separation technology; 80% filter load reduction; 350 CFM airflow
compatibility; quick-release collection bin for easy disposal.'
          - 'Industrial certified Compatible with DE 120 and similar extractors; meets OSHA ventilation
standards; reduces maintenance costs and downtime.'
