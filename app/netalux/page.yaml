sections:
  - type: content-section
    id: netalux-systems
    items:
      - order: 1
        heading: Netalux Needle® System
        text: Precision laser cleaning with 100-300W power range. Ideal for delicate
          applications  requiring fine control and minimal material impact.
          Features advanced Top-Hat beam  distribution for consistent results.
        image:
          url: /images/equipment/needle-system.jpg
          alt: Netalux Needle precision laser system
        imagePosition: right
        details:
          - <strong>Power Range:</strong> 100W - 300W
          - <strong>Beam Type:</strong> Top-Hat distribution
          - <strong>Applications:</strong> Precision cleaning, restoration,
            delicate surfaces
          - <strong>Features:</strong> Fine control, minimal material impact
      - order: 2
        heading: Netalux Jango® System
        text: Industrial-grade laser cleaning with 7500W power for heavy-duty
          applications.  Designed for high-volume production environments and
          demanding industrial cleaning tasks.  Robust Belgian engineering for
          reliability.
        image:
          url: /images/equipment/jango-system.jpg
          alt: Netalux Jango industrial laser system
        imagePosition: left
        details:
          - <strong>Power:</strong> 7500W industrial grade
          - <strong>Beam Type:</strong> Gaussian distribution
          - <strong>Applications:</strong> Heavy industrial cleaning, production
            environments
          - <strong>Features:</strong> High-volume processing, robust
            construction
      - order: 3
        heading: Belgian Engineering Excellence
        text: Netalux systems represent the pinnacle of European laser technology.
          Award-winning  designs combine precision engineering with practical
          industrial applications.  Backed by comprehensive support and
          training.
        image:
          url: /images/partners/netalux-awards.jpg
          alt: Netalux award-winning laser technology
        imagePosition: right
        details:
          - <strong>Origin:</strong> Belgium - European engineering standards
          - <strong>Awards:</strong> Multiple industry recognition for innovation
          - <strong>Support:</strong> Comprehensive training and technical
            support
          - <strong>Dealer:</strong> Z-Beam authorized Bay Area distributor
