<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Calendar Icon (centered, matching contact icon style) -->
  <g transform="translate(100, 100)">
    <!-- Calendar body -->
    <rect x="-35" y="-30" width="70" height="55" rx="4" fill="none" stroke="#ffffff" stroke-width="4"/>
    <!-- Calendar rings/hangers -->
    <line x1="-20" y1="-30" x2="-20" y2="-40" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
    <line x1="20" y1="-30" x2="20" y2="-40" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
    <!-- Calendar header divider -->
    <line x1="-35" y1="-15" x2="35" y2="-15" stroke="#ffffff" stroke-width="4"/>
  </g>
</svg>
