<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Message/Chat Bubble Icon (centered, larger) -->
  <g transform="translate(100, 100)">
    <!-- Chat bubble body -->
    <rect x="-35" y="-30" width="70" height="50" rx="8" fill="none" stroke="#ffffff" stroke-width="4"/>
    <!-- Chat bubble tail -->
    <path d="M-5,20 L-5,32 L-15,20 Z" fill="#ffffff" stroke="#ffffff" stroke-width="2" stroke-linejoin="round"/>
    <!-- Message lines inside bubble -->
    <line x1="-25" y1="-15" x2="25" y2="-15" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <line x1="-25" y1="-5" x2="15" y2="-5" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <line x1="-25" y1="5" x2="20" y2="5" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
