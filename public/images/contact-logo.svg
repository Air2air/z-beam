<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Email and Phone Icons (outline only, no background boxes) -->
  <g transform="translate(100, 100)">
    <!-- Email Icon (left side) -->
    <g transform="translate(-40, 0)">
      <!-- Email envelope outline -->
      <rect x="-25" y="-17.5" width="50" height="35" rx="4" fill="none" stroke="#ff8500" stroke-width="3"/>
      <!-- Envelope flap -->
      <path d="M-25,-17.5 L0,0 L25,-17.5" stroke="#ff8500" stroke-width="2.5" fill="none"/>
    </g>
    
    <!-- Phone Icon (right side) -->
    <g transform="translate(40, 0)">
      <!-- Phone body outline -->
      <rect x="-12.5" y="-20" width="25" height="40" rx="3" fill="none" stroke="#ff8500" stroke-width="3"/>
      <!-- Screen -->
      <rect x="-10" y="-16" width="20" height="28" rx="1" fill="none" stroke="#ff8500" stroke-width="2"/>
      <!-- Home button -->
      <circle cx="0" cy="15" r="2.5" fill="none" stroke="#ff8500" stroke-width="2"/>
    </g>
  </g>
</svg>
