<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Radial Gradient Background (Dark Theme) -->
  <defs>
    <radialGradient id="contactGradient" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#2e3440;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#242b36;stop-opacity:1" />
    </radialGradient>

    <!-- Pattern -->
    <pattern id="contactPattern" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <g fill="#ffffff" fill-opacity="0.05">
        <path d="M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z"/>
      </g>
    </pattern>

    <!-- Shadow -->
    <filter id="contactShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12"/>
      <feOffset dx="0" dy="6" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#contactGradient)"/>
  <rect width="800" height="600" fill="url(#contactPattern)"/>

  <!-- Email and Phone Icons (centered) -->
  <g transform="translate(400, 300)" filter="url(#contactShadow)">
    <!-- Email Icon (left side) -->
    <g transform="translate(-80, 0)">
      <!-- Email envelope -->
      <rect
        x="-50"
        y="-35"
        width="100"
        height="70"
        rx="8"
        fill="#ff8500"
        opacity="0.98"
      />
      
      <!-- Envelope flap -->
      <path
        d="M -50 -35 L 0 5 L 50 -35"
        stroke="#ff8500"
        stroke-width="2"
        fill="none"
        opacity="0.98"
      />
      
      <!-- Envelope top triangle -->
      <path
        d="M -50 -35 L 0 5 L 50 -35 Z"
        fill="#242b36"
        opacity="0.3"
      />
      
      <!-- @ symbol -->
      <circle
        cx="0"
        cy="5"
        r="18"
        stroke="#ffffff"
        stroke-width="3"
        fill="none"
      />
      <circle
        cx="0"
        cy="5"
        r="8"
        fill="#ffffff"
      />
      <rect
        x="0"
        y="-3"
        width="3"
        height="20"
        fill="#ffffff"
      />
    </g>

    <!-- Phone Icon (right side) -->
    <g transform="translate(80, 0)">
      <!-- Phone body -->
      <rect
        x="-35"
        y="-50"
        width="70"
        height="100"
        rx="12"
        fill="#ff8500"
        opacity="0.98"
      />
      
      <!-- Screen -->
      <rect
        x="-28"
        y="-40"
        width="56"
        height="70"
        rx="6"
        fill="#242b36"
        opacity="0.3"
      />
      
      <!-- Top speaker -->
      <rect
        x="-15"
        y="-45"
        width="30"
        height="3"
        rx="1.5"
        fill="#ffffff"
        opacity="0.6"
      />
      
      <!-- Home button -->
      <circle
        cx="0"
        cy="40"
        r="8"
        stroke="#ffffff"
        stroke-width="2"
        fill="none"
        opacity="0.6"
      />
      
      <!-- Phone icon on screen -->
      <path
        d="M -10 -15 Q -13 -12 -13 -5 L -10 0 Q -7 3 0 10 Q 7 3 10 0 L 13 -5 Q 13 -12 10 -15"
        fill="#ffffff"
        opacity="0.9"
      />
      
      <!-- Signal waves -->
      <path
        d="M -18 -25 Q -20 -18 -18 -12"
        stroke="#ffffff"
        stroke-width="2"
        fill="none"
        stroke-linecap="round"
        opacity="0.7"
      />
      <path
        d="M 18 -25 Q 20 -18 18 -12"
        stroke="#ffffff"
        stroke-width="2"
        fill="none"
        stroke-linecap="round"
        opacity="0.7"
      />
    </g>
  </g>
</svg>
