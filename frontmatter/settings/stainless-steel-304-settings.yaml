machineSettings:
  wavelength:
    value: 1064
    unit: nm
    description: Near-IR wavelength for optimal metal absorption
    min: 355
    max: 10640
  spotSize:
    min: 0.1
    max: 500
    value: 150
    unit: μm
    description: 'Beam diameter range for cleaning; smaller for fine details (50-100 μm), larger for broad areas (200-300
      μm). 150 μm recommended for SS304 industrial prep to ensure even fluence distribution. Source: Equipment specs from
      Adapt Laser Systems and Optics and Lasers in Engineering (2019).'
  energyDensity:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Fluence range for safe contaminant removal (e.g., rust, grease) without damaging SS304; damage threshold
      ~4 J/cm² for ns pulses at 1064 nm. Recommended 1.5 J/cm² avoids ablation while effective, considering high reflectivity.
      Source: Ablation threshold studies in Surface and Coatings Technology (2018).'
  pulseWidth:
    min: 0.1
    max: 1000
    value: 30
    unit: ns
    description: 'Nanosecond regime preferred for cost-effective industrial cleaning of SS304; picosecond (ps) or femtosecond
      (fs) reduce HAZ but are less common. 30 ns minimizes thermal effects while ablating contaminants. Source: Laser physics
      research in Optics Express (2017) on ablation thresholds for metals.'
  scanSpeed:
    min: 10
    max: 5000
    value: 1500
    unit: mm/s
    description: 'Effective range for contaminant removal without substrate ablation; slower for heavy contamination (e.g.,
      500-1000 mm/s), faster for light (2000-3000 mm/s). Recommended 1500 mm/s for optimal balance on SS304 to minimize heat
      accumulation due to its moderate thermal conductivity (16 W/mK). Source: Industry standards from Laserax equipment manuals
      and Applied Surface Science (2020).'
  passCount:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass (up to 5) for heavy layers; 2 passes recommended for complete
      removal on SS304 without excessive heat input. Source: Industry case studies in Journal of Cleaner Production (2022)
      on metal surface preparation.'
  overlapRatio:
    min: 10
    max: 90
    value: 60
    unit: '%'
    description: 'Ensures uniform coverage and avoids gaps/striping; 60% recommended for SS304 cleaning to optimize energy
      overlap without overexposure. Typical 30-80% based on scan patterns. Source: Process optimization in Applied Physics
      A (2020).'
  laserPower:
    value: 100
    unit: W
    description: Optimal average power for metal oxide removal
    min: 1.0
    max: 120
  laserPowerAlternative:
    min: 50
    max: 1000
    value: 200
    unit: W
    description: 'Typical range for industrial 1064 nm pulsed fiber lasers cleaning SS304 contaminants like oils or rust;
      starting at 200 W balances efficiency and safety to avoid melting (melting point ~1425°C). Max limited to prevent thermal
      damage given SS304''s reflectivity (~60% at 1064 nm). Source: IPG Photonics CL series specs and study in Journal of
      Laser Applications (2019).'
  frequency:
    min: 1
    max: 200
    value: 30
    unit: kHz
    description: 'Typical for 1064 nm cleaning to achieve uniform energy delivery; higher rates (>50 kHz) speed up process
      but risk heat buildup on reflective SS304. 30 kHz recommended for balance. Trade-off: faster cleaning vs. potential
      oxidation. Source: Academic literature in Lasers in Engineering (2021).'
componentSummary: These settings are optimal for Stainless Steel 304, leveraging 1064 nm wavelength for strong absorption,
  10 ns pulses to minimize heat-affected zones, and 200 W power for precise contaminant removal without compromising corrosion
  resistance.

