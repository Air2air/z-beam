  power:
    min: 10
    max: 100
    value: 30
    unit: W
    description: 'Typical range for pulsed Nd:YAG lasers in polymer cleaning to avoid
      thermal damage; starting at 30W for PMMA surface preparation. Max safe ~100W
      before melting (PMMA melting point ~160°C). Source: Manufacturer specs from
      IPG Photonics and Adapt Laser Systems for delicate substrates.'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 2000
    description: 'Effective range for contaminant removal; slower (500-1500 mm/s)
      for heavy contamination, faster (2000-5000 mm/s) for light. Recommended 2000
      mm/s balances speed and control for PMMA''s low thermal conductivity. Source:
      Industry standards from Laserax equipment manuals.'
  pulse_width:
    min: 0.1
    max: 1000
    value: 20
    unit: ns
    description: 'Nanosecond regime typical for industrial 1064 nm cleaning; picosecond
      (ps) or femtosecond preferred for minimal HAZ but less common. 20 ns recommended
      to reduce heat accumulation in PMMA. Source: Laser physics research in Optics
      & Laser Technology (e.g., studies on polymer ablation thresholds).'
  repetition_rate:
    min: 1
    max: 200
    value: 20
    unit: kHz
    description: 'Standard for cleaning applications; 20 kHz recommended for PMMA
      to enable fast processing while minimizing heat buildup (higher rates increase
      accumulation risk). Trade-off: higher freq speeds cleaning but risks substrate
      damage. Source: Academic literature from Journal of Applied Physics on pulsed
      laser interactions with polymers.'
  energy_density:
    min: 0.1
    max: 20.0
    value: 0.5
    unit: J/cm²
    description: 'Fluence below PMMA damage threshold (~1.5-2 J/cm² at 1064 nm for
      ns pulses) for safe contaminant removal; 0.5 J/cm² optimal to ablate surface
      layers without substrate melting. Source: Ablation threshold studies in Applied
      Surface Science (e.g., PMMA IR laser interactions).'
  spot_size:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Smaller spots (50-200 μm) for fine detail cleaning, larger (200-500
      μm) for broad areas; 200 μm recommended for uniform PMMA surface prep considering
      beam reflectivity. Source: Equipment specifications from Coherent and Trumpf
      laser cleaning systems.'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass (2-5) for heavy;
      2 passes recommended for complete PMMA cleaning without excessive exposure.
      Source: Industry case studies from laser cleaning applications in plastics processing
      (e.g., SPIE proceedings).'
  overlap_ratio:
    min: 10
    max: 90
    value: 70
    unit: '%'
    description: 'Ensures uniform coverage; 70% recommended for even energy distribution
      on PMMA to prevent uneven heating or missed spots. Source: Process optimization
      studies in Laser Cleaning Handbook and academic papers on scan strategies.'
