  power:
    min: 50
    max: 1000
    value: 200
    unit: W
    description: 'Typical range for industrial 1064 nm fiber lasers cleaning steel; starting at 200 W for light contamination
      to avoid overheating due to steel''s high thermal conductivity. Max safe ~1000 W with high scan speeds to prevent substrate
      melting (steel melting point ~1370°C). Source: CleanLaser CL 1000 specs and IPG Photonics YLR series manuals.'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 1500
    description: 'Effective range for contamination removal; slower (100-500 mm/s) for heavy rust/oil, faster (2000-5000 mm/s)
      for light oxides. Recommended 1500 mm/s balances cleaning efficiency and heat dissipation on reflective steel surfaces.
      Source: Industry standards from Laserax equipment manuals and studies in Journal of Cleaner Production (2020).'
  pulse_width:
    min: 0.1
    max: 1000
    value: 20
    unit: ns
    description: 'Nanosecond regime (5-200 ns) dominant for cost-effective cleaning; picosecond (ps) or femtosecond for ultra-low
      HAZ but less common industrially. Recommended 20 ns minimizes thermal effects on steel while ablating contaminants.
      Source: Laser physics research in Applied Surface Science (2018) on ablation thresholds.'
  repetition_rate:
    min: 1
    max: 200
    value: 80
    unit: kHz
    description: 'Typical for pulsed cleaning; lower rates (20-50 kHz) reduce heat accumulation, higher (100-200 kHz) speed
      up process but risk overheating steel. Recommended 80 kHz for balanced throughput on metals. Trade-off: High freq increases
      fluence overlap. Source: Academic literature in Optics and Lasers in Engineering (2019).'
  energy_density:
    min: 0.1
    max: 20.0
    value: 2.5
    unit: J/cm²
    description: 'Fluence range for safe cleaning; below 1 J/cm² ineffective for rust, above 5-8 J/cm² risks steel damage
      (ablation threshold ~4-6 J/cm² at 1064 nm). Recommended 2.5 J/cm² for contamination removal without melting. Steel''s
      reflectivity (~50% at 1064 nm) requires higher values. Source: Ablation studies in Journal of Applied Physics (2017).'
  spot_size:
    min: 0.1
    max: 500
    value: 250
    unit: μm
    description: 'Beam diameter range; smaller (100-300 μm) for precision surface prep, larger (500-1000 μm) for broad area
      cleaning. Recommended 250 μm for uniform steel cleaning, balancing resolution and coverage. Source: Equipment specs
      from Adapt Laser Systems and Coherent Inc. manuals.'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass (2-5) for heavy layers like mill scale. Recommended 2 passes
      for complete removal on steel without excessive heat input. Source: Industry case studies in Surface and Coatings Technology
      (2021) and practical guidelines from Laser Cleaning Europe.'
  overlap_ratio:
    min: 10
    max: 90
    value: 60
    unit: '%'
    description: 'Ensures uniform coverage; 30-50% for speed, 70-80% for thorough cleaning. Recommended 60% prevents gaps
      on irregular steel surfaces while minimizing over-processing. Source: Process optimization in International Journal
      of Advanced Manufacturing Technology (2022).'
challenges:
  thermal_management:
  - challenge: High thermal conductivity and heat spread
    severity: medium
    property_value: 4-400 W/(m·K) depending on metal
    impact: Heat spreads rapidly causing large heat-affected zones
    solutions:
    - Use shorter pulse durations (picosecond/femtosecond) for localized heating
    - Increase scan speed to minimize dwell time
    - Apply cooling between passes for thick sections
  - challenge: Melting and heat-affected zone formation
    severity: high
    threshold_range: 660°C (Al) to 3422°C (W)
    impact: Substrate melting or microstructural changes in heat-affected zone
    solutions:
    - Stay below 70% of melting temperature
    - Use pulse mode with adequate cooling time
    - Monitor for surface discoloration indicating oxidation
  surface_characteristics:
  - challenge: High reflectivity
    severity: high
    reflectivity_range: 60-95% at 1064nm for polished metals
    impact: Most laser energy reflected, requiring higher power; safety hazard
    solutions:
    - Use shorter wavelengths (355nm UV) for better absorption
    - Increase power density but monitor for thermal damage
    - Ensure proper beam containment and safety measures
    - Surface oxidation/roughness improves absorption
  - challenge: Surface finish variations
    severity: medium
    impact: Polished surfaces reflect more, rough surfaces absorb better
    solutions:
    - Adjust power based on surface condition
    - Test parameters on similar finish samples
    - Polished surfaces need 20-40% more power
  contamination_challenges:
  - challenge: Rust and oxide layer removal
    severity: medium
    impact: Requires multiple passes; rust/oxide has different absorption than base metal
    solutions:
    - First pass at higher power (100-120W) to remove bulk oxide
    - Second pass at lower power (60-80W) for final cleaning
    - Monitor for base metal exposure to avoid over-processing
  - challenge: Oil and grease removal
    severity: low
    impact: Organic contaminants vaporize easily but can redeposit
    solutions:
    - Use fume extraction to prevent redeposition
    - Higher scan speeds (3000-5000 mm/s) for thin films
    - Chemical pre-cleaning for heavy contamination
description: When laser cleaning steel, start by selecting a moderate power level to account for its reflective surface, which
  tends to scatter energy and slow initial progress. This works well when you scan slowly across the area, allowing the laser
  to gradually remove oxidation without stressing the dense structure beneath. Overlap passes slightly to restore even surfaces.
  Tends to clean efficiently in industrial settings like automotive parts, but watch for uneven heating that could warp thin
  sections.
