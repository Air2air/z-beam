page_title: 'Gold Settings: Laser Parameters'
page_description: When laser cleaning gold, unlike copper or silver, its extreme reflectivity bounces most energy away. We
  typically switch to shorter wavelengths for better absorption. This lets you remove contaminants without melting the surface.
  Watch out mid-process for uneven heating—dial down power if spots heat up. We've found multiple light passes restore that
  pristine finish safely. Adjust overlap to avoid warping delicate pieces.
meta_description: 'Gold: removes contamination removal. Industrial-grade parameters. No substrate damage.'
