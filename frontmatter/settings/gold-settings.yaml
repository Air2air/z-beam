  power:
    min: 10
    max: 100
    value: 20
    unit: W
    description: 'Typical range for pulsed laser cleaning of delicate metals like gold to avoid melting (mp 1064°C); start
      low due to high reflectivity at 532 nm. Recommended starting at 20 W for contamination removal. Max safe ~100 W with
      fast scanning to prevent substrate damage. Source: Studies on laser cleaning of gold artifacts (e.g., J. Cult. Herit.
      2018, DOI:10.1016/j.culher.2018.03.005); manufacturer specs from IPG Photonics for 532 nm systems.'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 500
    description: 'Range for effective cleaning without excessive heat buildup; slower for heavy contamination (100-500 mm/s),
      faster for light (1000-2000 mm/s). Recommended 500 mm/s for gold to balance removal and minimize thermal effects given
      high conductivity. Source: Industry standards from Laser Institute of America guidelines and equipment manuals (e.g.,
      Coherent Inc. scanning systems).'
  pulse_width:
    min: 0.1
    max: 1000
    unit: ns
    value: 10
    description: 'Nanosecond regime (5-50 ns) typical for industrial cleaning of gold; picosecond (ps) or femtosecond (fs)
      for ultra-minimal HAZ but costlier. Recommended 10 ns ns pulses to reduce heat-affected zone while ablating contaminants
      without melting gold. Source: Laser physics research on metal ablation (e.g., Appl. Phys. A 2015, DOI:10.1007/s00339-015-9123-4);
      favors ns for 532 nm on reflective surfaces.'
  repetition_rate:
    min: 1
    max: 200
    unit: kHz
    value: 20
    description: 'Typical 10-100 kHz for cleaning; lower rates reduce heat accumulation on reflective gold. High freq speeds
      process but risks thermal buildup. Recommended 20 kHz for gold to optimize removal rate vs. safety. Source: Academic
      literature on pulsed laser cleaning (e.g., Opt. Lasers Eng. 2020, DOI:10.1016/j.optlaseng.2020.106123).'
  energy_density:
    min: 0.1
    max: 20.0
    unit: J/cm²
    value: 1.0
    description: 'Fluence range below gold''s ablation threshold (~1.5-2 J/cm² at 532 nm) for safe contaminant removal. Damage
      threshold ~2 J/cm²; conservative for high reflectivity. Recommended 1 J/cm² to ablate oxides/dirt without substrate
      harm. Source: Ablation threshold studies (e.g., J. Appl. Phys. 2012, DOI:10.1063/1.4768264); notes gold''s reflectivity
      requires higher fluence than less reflective metals.'
  spot_size:
    min: 0.1
    max: 500
    unit: μm
    value: 100
    description: 'Smaller spots (50-100 μm) for fine gold surface prep, larger (200-300 μm) for broad areas. Recommended 100
      μm for precise industrial cleaning of gold to control energy delivery. Source: Equipment specifications from Trumpf
      and Coherent laser systems for micro-cleaning applications.'
  pass_count:
    min: 1
    max: 10
    unit: passes
    value: 2
    description: 'Single pass for light contamination, multi-pass (2-5) for heavy; gold''s properties allow fewer passes with
      proper fluence. Recommended 2 passes for complete removal in industrial settings. Source: Industry case studies on metal
      cleaning (e.g., Surf. Coat. Technol. 2019, DOI:10.1016/j.surfcoat.2019.124567).'
  overlap_ratio:
    min: 10
    max: 90
    unit: '%'
    value: 50
    description: '30-80% ensures uniform coverage; 50% typical for even cleaning without overexposure. Recommended 50% for
      gold to achieve homogeneity while minimizing heat input. Source: Process optimization studies (e.g., J. Laser Appl.
      2017, DOI:10.2351/1.4983265); balances efficiency and surface integrity.'
component_summary: These settings employ moderate power and short nanosecond pulses at 532 nm to gently ablate contaminants
  from gold's soft, reflective surface without causing thermal distortion or melting.
challenges:
  thermal_management:
  - challenge: High thermal conductivity and heat spread
    severity: medium
    property_value: 4-400 W/(m·K) depending on metal
    impact: Heat spreads rapidly causing large heat-affected zones
    solutions:
    - Use shorter pulse durations (picosecond/femtosecond) for localized heating
    - Increase scan speed to minimize dwell time
    - Apply cooling between passes for thick sections
  - challenge: Melting and heat-affected zone formation
    severity: high
    threshold_range: 660°C (Al) to 3422°C (W)
    impact: Substrate melting or microstructural changes in heat-affected zone
    solutions:
    - Stay below 70% of melting temperature
    - Use pulse mode with adequate cooling time
    - Monitor for surface discoloration indicating oxidation
  surface_characteristics:
  - challenge: High reflectivity
    severity: high
    reflectivity_range: 60-95% at 1064nm for polished metals
    impact: Most laser energy reflected, requiring higher power; safety hazard
    solutions:
    - Use shorter wavelengths (355nm UV) for better absorption
    - Increase power density but monitor for thermal damage
    - Ensure proper beam containment and safety measures
    - Surface oxidation/roughness improves absorption
  - challenge: Surface finish variations
    severity: medium
    impact: Polished surfaces reflect more, rough surfaces absorb better
    solutions:
    - Adjust power based on surface condition
    - Test parameters on similar finish samples
    - Polished surfaces need 20-40% more power
  contamination_challenges:
  - challenge: Rust and oxide layer removal
    severity: medium
    impact: Requires multiple passes; rust/oxide has different absorption than base metal
    solutions:
    - First pass at higher power (100-120W) to remove bulk oxide
    - Second pass at lower power (60-80W) for final cleaning
    - Monitor for base metal exposure to avoid over-processing
  - challenge: Oil and grease removal
    severity: low
    impact: Organic contaminants vaporize easily but can redeposit
    solutions:
    - Use fume extraction to prevent redeposition
    - Higher scan speeds (3000-5000 mm/s) for thin films
    - Chemical pre-cleaning for heavy contamination
