  power:
    min: 20
    max: 500
    value: 100
    unit: W
    description: 'Typical range for semiconductor cleaning to avoid thermal damage; starting at 100W for light contamination
      on SiGe, max below damage threshold (~500W with short pulses). Source: IPG Photonics specs for Yb-fiber lasers at 1064
      nm; studies on Si ablation (similar to SiGe) in Opt. Lasers Eng. (2018).'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 500
    description: 'Effective for contamination removal; slower (100-500 mm/s) for heavy contaminants, faster (1000-2000 mm/s)
      for light; 500 mm/s optimal for SiGe to balance efficiency and heat control. Source: Industry standards from Laser Cleaning
      Handbook (SPIE, 2020); equipment manuals for scanning galvo systems.'
  pulse_width:
    min: 0.1
    max: 1000
    value: 20
    unit: ns
    description: 'Nanosecond regime preferred for cost-effective cleaning with minimal HAZ on SiGe; picosecond (ps) for ultra-precision
      but less common industrially. 20 ns recommended to limit thermal diffusion given SiGe''s moderate thermal conductivity
      (~50 W/mK). Source: Laser physics research in Appl. Phys. A (2019) on pulsed laser ablation of Ge alloys.'
  repetition_rate:
    min: 1
    max: 200
    value: 20
    unit: kHz
    description: 'Typical for industrial cleaning; 20 kHz balances speed and heat accumulation on reflective SiGe surfaces
      (absorptivity ~0.4 at 1064 nm); higher rates risk buildup, lower for heavy cleaning. Source: Academic literature in
      J. Phys. D: Appl. Phys. (2021) on pulse train effects in semiconductor processing.'
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Fluence below SiGe damage threshold (~2-4 J/cm² at 1064 nm, similar to Si); 1.5 J/cm² safe for contaminant
      removal without melting (SiGe mp ~1200-1400°C). Source: Ablation threshold studies in Surf. Coat. Technol. (2017) for
      Si1-xGex alloys.'
  spot_size:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Smaller for fine surface prep on SiGe wafers (50-200 μm), larger for broad areas; 200 μm recommended for
      uniform cleaning without excessive overlap heating. Source: Equipment specifications from Coherent and Trumpf laser
      systems for micro-cleaning applications.'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass (2-5) for heavy; 2 passes typical for SiGe to ensure complete
      removal while minimizing cumulative damage. Source: Industry case studies in Proc. SPIE (2022) on laser cleaning of
      semiconductor substrates.'
  overlap_ratio:
    min: 10
    max: 90
    value: 50
    unit: '%'
    description: 'Ensures uniform coverage; 50% optimal for SiGe to avoid gaps or hot spots given beam divergence at 1064
      nm. Source: Process optimization studies in Opt. Express (2020) for scanned laser cleaning of alloys.'
component_summary: These settings leverage the 1064 nm wavelength for strong SiGe absorption, with 100 W power and 15 ns pulses
  to ablate contaminants precisely without inducing thermal stress or damage to the delicate semiconductor.
