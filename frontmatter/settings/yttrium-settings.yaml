machineSettings:
  wavelength:
    description: Near-IR wavelength optimized for Yttrium absorption and minimal reflectivity
    unit: nm
    value: 1064
    min: 355
    max: 10640
  spotSize:
    min: 0.1
    max: 500
    unit: μm
    value: 200
    description: 'Beam diameter for uniform coverage; 200 μm recommended for Yttrium surface prep, balancing fine detail and large-area efficiency. Smaller for precision, larger for broad cleaning. Source: Equipment specs from Coherent Matrix series; J. Clean. Prod. 34, 57 (2012) for industrial metal applications.'
  fluenceThreshold:
    description: Fluence threshold for effective Yttrium cleaning
    unit: J/cm²
    value: 5.1
    min: 0.3
    max: 6.12
  energyDensity:
    min: 0.1
    max: 20
    unit: J/cm²
    description: 'Fluence range for safe ablation of contaminants (e.g., oxides) on metals; Yttrium damage threshold ~1.5-2.5 J/cm² at 1064 nm due to reflectivity. Recommended 1.0 J/cm² for conservative cleaning. Uncertainty in exact Yttrium threshold; based on similar metals. Source: Ablation studies in Appl. Surf. Sci. 257, 5281 (2011).'
    value: 10.05
  pulseWidth:
    min: 0.1
    max: 1000
    unit: ns
    value: 20
    description: 'Nanosecond regime preferred for cost-effective cleaning of metals; 20 ns minimizes heat-affected zone (HAZ) on Yttrium due to its reactivity. Picosecond (ps) or femtosecond (fs) for ultra-precise but higher cost. Source: Laser physics in Appl. Phys. A 101, 147 (2010); avoids plasma shielding issues at 1064 nm.'
  scanSpeed:
    min: 10
    max: 5000
    unit: mm/s
    value: 2000
    description: 'Effective for contaminant removal without excessive heat buildup; slower for heavy contamination (e.g., oxides), faster for light. Recommended 2000 mm/s balances efficiency and safety for Yttrium''s thermal conductivity (17 W/m·K). Source: Industry standards from Laserax manuals; Opt. Lasers Eng. 47, 1069 (2009) for metal surfaces.'
  passCount:
    min: 1
    max: 10
    unit: passes
    value: 2
    description: 'Single pass for light contamination, multi-pass for heavy; 2 passes recommended for complete Yttrium cleaning to ensure removal without overexposure. Based on industry practice for reactive metals. Source: Case studies in Surf. Coat. Technol. 205, 479 (2010); minimizes risk of oxidation.'
  overlapRatio:
    min: 10
    max: 90
    unit: '%'
    value: 50
    description: 'Ensures uniform coverage without gaps or excessive overlap; 50% optimal for Yttrium to prevent uneven heating given its thermal properties. Typical range from process optimization. Source: Studies in Opt. Laser Technol. 42, 129 (2010); industry standards for scanned laser cleaning.'
  laserPower:
    description: Optimal average power for Yttrium surface cleaning without thermal damage
    unit: W
    value: 100
    min: 1
    max: 120
  laserPowerAlternative:
    min: 50
    max: 500
    value: 100
    unit: W
    description: 'Typical range for industrial pulsed Nd:YAG lasers cleaning reflective metals like Yttrium; start at 100W to avoid thermal damage given Yttrium''s high reflectivity (~70% at 1064 nm) and melting point (1522°C). Max limited to prevent substrate ablation. Source: IPG Photonics YLR series specs; similar to aluminum cleaning in J. Laser Appl. 25, 042005 (2013).'
  frequency:
    min: 1
    max: 200
    unit: kHz
    value: 30
    description: 'Typical for pulsed cleaning; 30 kHz recommended for Yttrium to enable fast processing while limiting heat accumulation in low-conductivity scenarios. Higher rates speed up but risk thermal damage. Source: Academic lit. in J. Phys. D: Appl. Phys. 44, 435301 (2011); trade-offs noted for rare earth metals.'
componentSummary: These settings deliver moderate power with a 1064 nm wavelength and short 10 ns pulses, enabling precise ablation of contaminants from reactive Yttrium while minimizing thermal damage and oxidation risk.
