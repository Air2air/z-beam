  power:
    min: 50
    max: 500
    value: 200
    unit: W
    description: Typical range for pulsed laser cleaning of reflective metals like vanadium to avoid excessive heat input;
      starting at 100-200W recommended to prevent melting (melting point ~1910°C). Based on manufacturer specs from IPG Photonics
      and Coherent for 1064 nm systems used in metal surface preparation.
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 2000
    description: Effective speeds for contamination removal on metals; slower for heavy contamination (500-1000 mm/s), faster
      for light (2000-5000 mm/s). Recommended 2000 mm/s balances efficiency and uniformity for vanadium's high thermal conductivity.
      From industry standards in laser cleaning manuals (e.g., Laserax equipment guidelines).
  pulse_width:
    min: 0.1
    max: 1000
    unit: ns
    value: 20
    description: Nanosecond regime preferred for industrial cleaning of metals to achieve ablation without deep penetration;
      picosecond (ps) or femtosecond for minimal HAZ but higher cost. 20 ns recommended for vanadium to limit thermal effects
      due to its reflectivity at 1064 nm. Supported by laser physics studies (e.g., Anisimov et al., Appl. Surf. Sci., 2015
      on metal ablation thresholds).
  repetition_rate:
    min: 1
    max: 200
    unit: kHz
    value: 50
    description: Standard for pulsed cleaning to ensure pulse overlap without excessive heat accumulation on heat-conductive
      vanadium; higher rates (>50 kHz) speed up process but risk thermal buildup. 50 kHz optimal trade-off. From academic
      literature on Nd:YAG cleaning (e.g., Kumar et al., J. Laser Appl., 2018).
  energy_density:
    min: 0.1
    max: 20.0
    unit: J/cm²
    value: 1.5
    description: Fluence range for contaminant removal without substrate damage; vanadium damage threshold ~4-5 J/cm² at 1064
      nm due to high reflectivity (~60%). 1.5 J/cm² safe for cleaning. Based on ablation threshold studies for transition
      metals (e.g., Lorazo et al., Phys. Rev. B, 2003; generalized for vanadium).
  spot_size:
    min: 0.1
    max: 500
    unit: μm
    value: 200
    description: Beam diameter for precise cleaning; smaller for fine details (100-200 μm), larger for broad areas (300-500
      μm). 200 μm recommended for uniform coverage on vanadium surfaces. From equipment specifications (e.g., SPI Lasers systems
      for industrial cleaning).
  pass_count:
    min: 1
    max: 10
    unit: passes
    value: 2
    description: Single pass for light contamination, multi-pass for heavy layers; 2 passes typical for complete removal on
      metals like vanadium without over-processing. From industry case studies on surface preparation (e.g., reports from
      Adapt Laser Systems).
  overlap_ratio:
    min: 10
    max: 90
    unit: '%'
    value: 70
    description: Ensures uniform coverage and avoids gaps in scan lines; 70% recommended for consistent cleaning on reflective,
      conductive vanadium to prevent uneven heating. Typical range from process optimization studies (e.g., Zhou et al., Opt.
      Lasers Eng., 2020 on scan strategies).
challenges:
  thermal_management:
  - challenge: High thermal conductivity and heat spread
    severity: medium
    property_value: 4-400 W/(m·K) depending on metal
    impact: Heat spreads rapidly causing large heat-affected zones
    solutions:
    - Use shorter pulse durations (picosecond/femtosecond) for localized heating
    - Increase scan speed to minimize dwell time
    - Apply cooling between passes for thick sections
  - challenge: Melting and heat-affected zone formation
    severity: high
    threshold_range: 660°C (Al) to 3422°C (W)
    impact: Substrate melting or microstructural changes in heat-affected zone
    solutions:
    - Stay below 70% of melting temperature
    - Use pulse mode with adequate cooling time
    - Monitor for surface discoloration indicating oxidation
  surface_characteristics:
  - challenge: High reflectivity
    severity: high
    reflectivity_range: 60-95% at 1064nm for polished metals
    impact: Most laser energy reflected, requiring higher power; safety hazard
    solutions:
    - Use shorter wavelengths (355nm UV) for better absorption
    - Increase power density but monitor for thermal damage
    - Ensure proper beam containment and safety measures
    - Surface oxidation/roughness improves absorption
  - challenge: Surface finish variations
    severity: medium
    impact: Polished surfaces reflect more, rough surfaces absorb better
    solutions:
    - Adjust power based on surface condition
    - Test parameters on similar finish samples
    - Polished surfaces need 20-40% more power
  contamination_challenges:
  - challenge: Rust and oxide layer removal
    severity: medium
    impact: Requires multiple passes; rust/oxide has different absorption than base metal
    solutions:
    - First pass at higher power (100-120W) to remove bulk oxide
    - Second pass at lower power (60-80W) for final cleaning
    - Monitor for base metal exposure to avoid over-processing
  - challenge: Oil and grease removal
    severity: low
    impact: Organic contaminants vaporize easily but can redeposit
    solutions:
    - Use fume extraction to prevent redeposition
    - Higher scan speeds (3000-5000 mm/s) for thin films
    - Chemical pre-cleaning for heavy contamination
description: When laser cleaning vanadium, make sure you watch its moderate reflectivity right from the start—unlike highly
  reflective metals like copper, it absorbs energy better but still scatters some light, so you must lower the power initially
  to prevent uneven heating. This difference means you can ramp up faster than with shiny alloys, but always scan slowly to
  avoid surface pitting. Its strong corrosion resistance helps keep the cleaned area intact, just overlap passes generously
  for full coverage.
