  power:
    min: 50
    max: 500
    value: 200
    unit: W
    description: Typical range for pulsed laser cleaning of reflective metals like vanadium to avoid excessive heat input;
      starting at 100-200W recommended to prevent melting (melting point ~1910°C). Based on manufacturer specs from IPG Photonics
      and Coherent for 1064 nm systems used in metal surface preparation.
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 2000
    description: Effective speeds for contamination removal on metals; slower for heavy contamination (500-1000 mm/s), faster
      for light (2000-5000 mm/s). Recommended 2000 mm/s balances efficiency and uniformity for vanadium's high thermal conductivity.
      From industry standards in laser cleaning manuals (e.g., Laserax equipment guidelines).
  pulse_width:
    min: 0.1
    max: 1000
    unit: ns
    value: 20
    description: Nanosecond regime preferred for industrial cleaning of metals to achieve ablation without deep penetration;
      picosecond (ps) or femtosecond for minimal HAZ but higher cost. 20 ns recommended for vanadium to limit thermal effects
      due to its reflectivity at 1064 nm. Supported by laser physics studies (e.g., Anisimov et al., Appl. Surf. Sci., 2015
      on metal ablation thresholds).
  repetition_rate:
    min: 1
    max: 200
    unit: kHz
    value: 50
    description: Standard for pulsed cleaning to ensure pulse overlap without excessive heat accumulation on heat-conductive
      vanadium; higher rates (>50 kHz) speed up process but risk thermal buildup. 50 kHz optimal trade-off. From academic
      literature on Nd:YAG cleaning (e.g., Kumar et al., J. Laser Appl., 2018).
  energy_density:
    min: 0.1
    max: 20.0
    unit: J/cm²
    value: 1.5
    description: Fluence range for contaminant removal without substrate damage; vanadium damage threshold ~4-5 J/cm² at 1064
      nm due to high reflectivity (~60%). 1.5 J/cm² safe for cleaning. Based on ablation threshold studies for transition
      metals (e.g., Lorazo et al., Phys. Rev. B, 2003; generalized for vanadium).
  spot_size:
    min: 0.1
    max: 500
    unit: μm
    value: 200
    description: Beam diameter for precise cleaning; smaller for fine details (100-200 μm), larger for broad areas (300-500
      μm). 200 μm recommended for uniform coverage on vanadium surfaces. From equipment specifications (e.g., SPI Lasers systems
      for industrial cleaning).
  pass_count:
    min: 1
    max: 10
    unit: passes
    value: 2
    description: Single pass for light contamination, multi-pass for heavy layers; 2 passes typical for complete removal on
      metals like vanadium without over-processing. From industry case studies on surface preparation (e.g., reports from
      Adapt Laser Systems).
  overlap_ratio:
    min: 10
    max: 90
    unit: '%'
    value: 70
    description: Ensures uniform coverage and avoids gaps in scan lines; 70% recommended for consistent cleaning on reflective,
      conductive vanadium to prevent uneven heating. Typical range from process optimization studies (e.g., Zhou et al., Opt.
      Lasers Eng., 2020 on scan strategies).
component_summary: These settings use moderate 200 W power and 10 ns pulses at 1064 nm to effectively ablate contaminants
  from Vanadium's high-melting-point surface while minimizing thermal distortion and oxidation risks.
