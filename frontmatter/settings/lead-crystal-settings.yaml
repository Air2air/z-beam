description: >-
  When laser cleaning Lead Crystal, you'll want to start with its soft, lead-infused structure. This makes it more prone
  to surface damage than regular glass, so it absorbs heat unevenly and risks cracking under direct exposure. Use
  gentle, low-energy pulses to lift contaminants without etching the crystal's shine. Keep your scan slow and overlap
  lightly for even coverage. Always watch for clouding at the end, and pause to cool if it appears.
