  power:
    min: 10
    max: 100
    value: 20
    unit: W
    description: 'Typical range for delicate glass-like materials to avoid thermal damage; starting low prevents cracking
      in lead crystal (thermal conductivity ~1 W/mK, melting point ~500-600°C). Max safe based on avoiding substrate ablation.
      Source: IPG Photonics laser cleaning guidelines for optics.'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 1000
    description: 'Effective for contaminant removal without overheating; slower for heavy contamination (e.g., oxides), faster
      for light dust. Recommended balances speed and safety for lead crystal''s low thermal conductivity. Source: Industry
      standards from Laserax equipment manuals.'
  pulse_width:
    min: 0.1
    max: 1000
    value: 20
    unit: ns
    description: 'Nanosecond regime preferred for industrial cleaning to minimize heat-affected zone (HAZ) in transparent
      lead crystal at 1064 nm; picosecond (ps) or femtosecond reduces thermal effects but increases cost. Avoids cracking
      due to reflectivity (~4% at 1064 nm). Source: Laser physics studies in Optics Express (e.g., ns pulses for glass ablation
      thresholds).'
  repetition_rate:
    min: 1
    max: 200
    value: 20
    unit: kHz
    description: 'Typical for efficient cleaning; lower rates reduce heat accumulation in low-conductivity lead crystal, higher
      speeds up process but risks damage. Trade-off: high freq increases throughput but potential thermal buildup. Source:
      Academic literature in Journal of Applied Physics on pulsed laser cleaning.'
  energy_density:
    min: 0.1
    max: 20.0
    value: 1
    unit: J/cm²
    description: 'Fluence range for removing contaminants (e.g., 0.5-1 for light, 1-3 for heavy) while below lead crystal
      damage threshold (~4-5 J/cm² at 1064 nm due to transparency). Conservative for safety. Source: Ablation threshold studies
      in Applied Surface Science for glass materials.'
  spot_size:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Smaller for fine details on intricate lead crystal surfaces, larger for broad areas; 200 μm balances precision
      and coverage without excessive energy concentration. Source: Equipment specs from Coherent and Trumpf laser systems
      for precision cleaning.'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass for heavy; 2 passes recommended for complete removal without
      risking damage to fragile lead crystal. Source: Industry case studies in laser cleaning of cultural heritage glass (e.g.,
      adaptable to industrial from SPIE proceedings).'
  overlap_ratio:
    min: 10
    max: 90
    value: 70
    unit: '%'
    description: 'Ensures uniform coverage and avoids gaps in cleaning; 70% optimal for even fluence distribution on reflective,
      delicate surfaces like lead crystal. Source: Process optimization in Journal of Laser Applications.'
challenges:
  thermal_management:
  - challenge: Thermal shock and catastrophic failure
    severity: critical
    threshold_temperature: ΔT > 40-100°C rapid cooling (glass-dependent)
    impact: Glass shatters from thermal gradients due to low thermal expansion and brittleness
    solutions:
    - Use pulse mode with 5-8 second cooling between passes
    - Preheat substrate to room temperature before cleaning
    - Avoid cold spots (air vents, cold backing) during processing
    - Tempered glass more resistant but still susceptible to thermal shock
    - Monitor for stress fractures; stop immediately if cracks appear
  - challenge: Low thermal diffusivity
    severity: high
    property_value: 0.01-15 mm²/s (most glasses 0.5-1.0 mm²/s)
    impact: Heat accumulates in localized zones creating thermal gradients
    solutions:
    - Reduce power by 30-40% compared to metals
    - Increase scan speed to distribute heat (1000-2000 mm/s)
    - Use defocused beam to spread energy over larger area
    - Optical-grade glass (fused silica) tolerates higher power
  surface_characteristics:
  - challenge: Surface defects and stress concentrators
    severity: high
    impact: Scratches, chips, and inclusions dramatically lower damage threshold
    solutions:
    - Inspect surface with magnification before cleaning
    - Reduce power 40-50% for scratched or damaged glass
    - Clean around defects with extreme caution
    - Polished optical glass requires different parameters than rough architectural glass
  - challenge: Coating and film removal
    severity: medium
    impact: Thin films, anti-reflective coatings, and tints have different damage thresholds than substrate
    solutions:
    - Test on edge first to determine coating removal threshold
    - Coated glass may require 40-60W initial pass
    - Bare glass requires 20-30% lower power after coating removal
    - AR coatings very sensitive - use 30-40W maximum
  contamination_challenges:
  - challenge: Adhesive and paint removal
    severity: medium
    impact: Thick coatings require multiple passes and generate debris that can scratch glass
    solutions:
    - First pass 60W fast (1800 mm/s) for bulk removal
    - Second pass 40W slow (1000 mm/s) for residue
    - Use air assist to blow debris away from surface
    - Chemical pre-treatment reduces laser exposure time
    - Avoid dragging ablated material across clean areas
description: When laser cleaning Lead Crystal, you'll want to start with its soft, lead-infused structure. This makes it more
  prone to surface damage than regular glass, so it absorbs heat unevenly and risks cracking under direct exposure. Use gentle,
  low-energy pulses to lift contaminants without etching the crystal's shine. Keep your scan slow and overlap lightly for
  even coverage. Always watch for clouding at the end, and pause to cool if it appears.
