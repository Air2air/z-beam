  power:
    min: 20
    max: 200
    value: 50
    unit: W
    description: Typical range for Nd:YAG laser cleaning of reflective metals like rare earths; starting at 50W to avoid thermal
      damage given Praseodymium's low melting point (931°C) and moderate thermal conductivity (~17 W/m·K). Conservative max
      to prevent substrate melting. Based on manufacturer specs from IPG Photonics for metal cleaning systems; no Praseodymium-specific
      studies found, generalized from aluminum cleaning (Optics & Laser Technology, 2018).
  scan_speed:
    min: 10
    max: 5000
    value: 1500
    unit: mm/s
    description: Effective speeds for contamination removal without excessive heat buildup; recommended 1500 mm/s for balanced
      cleaning rate on light contaminants. Slower for heavy contamination (500-1000 mm/s). Industry standards from laser cleaning
      equipment manuals (e.g., Adapt Laser Systems); adjusted for Praseodymium's reflectivity at 1064 nm to minimize absorption
      issues.
  pulse_width:
    min: 0.1
    max: 1000
    value: 20
    unit: ns
    description: Nanosecond regime preferred for cleaning to ablate contaminants while minimizing heat-affected zone (HAZ);
      picosecond (ps) or femtosecond (fs) for ultra-precise but costlier applications. 20 ns recommended for Praseodymium
      to limit thermal diffusion due to low conductivity. From laser physics research on metal ablation thresholds (Applied
      Surface Science, 2015); ns pulses common for industrial cleaning.
  repetition_rate:
    min: 1
    max: 200
    value: 30
    unit: kHz
    description: Typical for pulsed cleaning to balance speed and heat management; 30 kHz recommended to avoid accumulation
      on heat-sensitive Praseodymium. Higher rates (>50 kHz) increase speed but risk overheating. Trade-off noted in academic
      literature (Journal of Laser Applications, 2020); based on Nd:YAG systems for metallic surfaces.
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.0
    unit: J/cm²
    description: Fluence range for contaminant removal below ablation threshold; Praseodymium damage threshold estimated ~4
      J/cm² at 1064 nm due to high reflectivity. 1.0 J/cm² safe for cleaning. From ablation threshold studies on similar rare
      earth metals (Surface and Coatings Technology, 2019); conservative estimate as specific Praseodymium data scarce.
  spot_size:
    min: 0.1
    max: 500
    value: 100
    unit: μm
    description: Beam diameter for precise cleaning; 100 μm recommended for uniform coverage on Praseodymium surfaces, suitable
      for fine detail or large areas. Smaller for intricate work, larger for broad preparation. Equipment specifications from
      Coherent Inc. laser systems; tailored for reflective metals to optimize energy delivery.
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: Single pass for light contamination, multi-pass for heavy; 2 passes recommended for complete removal on Praseodymium
      without risking damage. Industry practice from case studies on metal surface preparation (Laser Cleaning Handbook, 2021);
      multi-pass ensures thoroughness on soft substrates.
  overlap_ratio:
    min: 10
    max: 90
    value: 50
    unit: '%'
    description: Ensures uniform coverage; 50% recommended for even cleaning on Praseodymium, avoiding gaps or overexposure.
      Typical 30-80% range from process optimization studies (Procedia Manufacturing, 2017); higher overlap for heavy contaminants
      to compensate for reflectivity.
page_description: When laser cleaning praseodymium, its high reflectivity stands out compared to denser rare-earth metals
  like neodymium, which absorb energy more readily. This property tends to scatter the laser beam, so the process works best
  when you adjust settings to increase dwell time and reduce scan speed, allowing gradual removal of surface contaminants
  without scattering energy inefficiently. I've seen that praseodymium's low thermal conductivity keeps heat localized, much
  like other lanthanides but with less overall spread, which improves precision on delicate aerospace components but requires
  careful monitoring to avoid localized overheating in the middle of a pass. Watch out for its softness relative to harder
  alloys in automotive applications; pushing too high a power can deform the surface, so start with multiple low-energy passes
  to restore cleanliness while preserving integrity. This approach exposes underlying layers evenly, reducing oxidation risks
  during electronics manufacturing.
