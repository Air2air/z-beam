machineSettings:
  wavelength:
    description: Near-IR wavelength with good absorption in Tool Steel oxides and contaminants
    unit: nm
    value: 1064
    min: 355
    max: 10640
  spotSize:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Beam diameter range for cleaning tool steel; smaller for fine details (e.g., tool edges), larger for broad
      surfaces; 200 μm recommended for balanced resolution and coverage. Source: Equipment specifications from Coherent and
      Trumpf laser systems for industrial metal processing.'
  energyDensity:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Fluence range for safe contaminant ablation on tool steel (reflectivity ~0.4 at 1064 nm); below damage threshold
      of ~4-5 J/cm² to prevent surface pitting. Source: Ablation threshold studies in Surface and Coatings Technology (2017)
      for alloy steels, conservative for tool steel''s hardness.'
  pulseWidth:
    min: 0.1
    max: 1000
    value: 50
    unit: ns
    description: 'Nanosecond regime typical for industrial cleaning to achieve ablation with minimal heat-affected zone (HAZ
      <10 μm on tool steel); picosecond (ps) or femtosecond (fs) for ultra-precise but costlier applications. Source: Laser
      physics research in Applied Surface Science (2020) showing ns pulses optimal for metals with high thermal conductivity
      like tool steel.'
  scanSpeed:
    min: 10
    max: 5000
    unit: mm/s
    value: 2000
    description: 'Range for effective contaminant removal on tool steel, slower for heavy rust/oil, faster for light dust;
      2000 mm/s optimal for uniform cleaning at moderate power. Source: Industry standards from Laserax equipment manuals
      and studies in Optics and Lasers in Engineering (2018) on steel ablation.'
  passCount:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass for heavy oxide layers on tool steel; 2 passes typical for
      complete removal without substrate damage. Source: Industry case studies in Proceedings of SPIE (2021) on laser cleaning
      of hardened steels.'
  overlapRatio:
    min: 10
    max: 90
    value: 50
    unit: '%'
    description: 'Overlap ensures uniform fluence distribution on reflective tool steel surfaces; 50% recommended for even
      cleaning without gaps or over-ablation. Source: Process optimization studies in Lasers in Manufacturing and Materials
      Processing (2019), standard for scanned beam paths.'
  laserPower:
    description: Optimal average power for Tool Steel oxide removal without substrate damage
    unit: W
    value: 100
    min: 1.0
    max: 120
  laserPowerAlternative:
    min: 50
    max: 1000
    value: 200
    unit: W
    description: 'Typical range for industrial 1064 nm laser cleaning of tool steels to remove contaminants without excessive
      heating; recommended starting value balances efficiency and safety. Source: IPG Photonics YLR series specs for metal
      surface preparation (50-500 W common), with max limited to avoid melting (tool steel melting point ~1400-1500°C).'
  frequency:
    min: 1
    max: 200
    value: 50
    unit: kHz
    description: 'Typical for pulsed fiber lasers in cleaning; 50 kHz recommended for tool steel to enable fast processing
      while limiting heat accumulation (trade-off: higher rates increase speed but risk thermal buildup). Source: Academic
      literature in Journal of Laser Applications (2019) on pulse train effects in metal cleaning.'
componentSummary: The 200 W power, 1064 nm wavelength, and 10 ns pulse width suit Tool Steel by providing sufficient energy
  for contaminant ablation while short pulses minimize thermal distortion on its hard, heat-resistant surface.
