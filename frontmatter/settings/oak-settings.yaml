  power:
    min: 20
    max: 200
    value: 50
    unit: W
    description: 'Typical range for pulsed Nd:YAG lasers in wood cleaning to remove contaminants without charring; starting
      at 50 W for light soiling on oak, max limited by oak''s low thermal conductivity (~0.17 W/m·K) to avoid substrate damage.
      Source: Studies on laser cleaning of wooden artifacts (e.g., Journal of Cultural Heritage, 2015).'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 500
    description: 'Effective speeds for 1064 nm cleaning of oak; slower for heavy contamination (e.g., mold or grease) to ensure
      removal, faster for light dust; 500 mm/s optimal for balancing efficiency and heat control. Source: Industry manuals
      from IPG Photonics and Adapt Laser Systems.'
  pulse_width:
    min: 0.1
    max: 1000
    value: 20
    unit: ns
    description: 'Nanosecond regime preferred for industrial cleaning of oak to minimize heat-affected zone (HAZ <50 μm);
      picosecond (ps) or femtosecond (fs) for ultra-precise but costlier applications; 20 ns balances ablation of contaminants
      with oak''s sensitivity to thermal damage. Source: Laser physics research in Optics & Lasers in Engineering (2018).'
  repetition_rate:
    min: 1
    max: 200
    value: 30
    unit: kHz
    description: 'Typical for 1064 nm cleaning; 30 kHz recommended for oak to achieve fast coverage without excessive heat
      accumulation, as higher rates (>50 kHz) risk charring due to oak''s low reflectivity (~10-20% at 1064 nm). Trade-off:
      higher freq speeds process but increases thermal load. Source: Academic literature, Applied Surface Science (2020).'
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Fluence range for contaminant removal on wood; oak damage threshold ~3-5 J/cm² (ablation starts at ~1 J/cm²
      for organics); 1.5 J/cm² safe for cleaning without degrading cellulose structure. Conservative due to oak''s melting/decomposition
      point ~200-300°C. Source: Ablation threshold studies in Journal of Applied Physics (2017).'
  spot_size:
    min: 0.1
    max: 500
    unit: μm
    value: 200
    description: 'Beam diameter for precise industrial cleaning; smaller for fine details on oak surfaces (e.g., engravings),
      larger for broad areas; 200 μm recommended for uniform contaminant removal without excessive overlap heating. Source:
      Equipment specs from Coherent and Trumpf lasers.'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass for heavy layers; 2 passes typical for oak to ensure complete
      removal while monitoring for discoloration. Source: Industry case studies on wood restoration (e.g., Laser Cleaning
      Conference proceedings, 2019).'
  overlap_ratio:
    min: 10
    max: 90
    value: 50
    unit: '%'
    description: 'Ensures uniform coverage in scan patterns; 50% recommended for oak to avoid gaps in cleaning while preventing
      over-exposure and thermal buildup. Source: Process optimization in Surface and Coatings Technology (2021).'
challenges:
  thermal_management:
  - challenge: Charring and carbonization
    severity: high
    threshold_temperature: 250-300°C
    impact: Wood chars at low temperatures leaving black marks and structural damage
    solutions:
    - Use pulse mode with 2-5 second cooling between passes
    - Reduce power by 30-40% compared to metals
    - Increase scan speed to reduce dwell time
    - Monitor surface for discoloration; stop if browning occurs
  - challenge: Slow thermal diffusivity
    severity: medium
    property_value: 0.10-0.15 mm²/s (100x slower than aluminum)
    impact: Heat accumulates rapidly causing thermal damage zones
    solutions:
    - Increase cooling time between passes
    - Use lower repetition rates (<20 kHz)
    - Apply crosshatch patterns to distribute heat
  surface_characteristics:
  - challenge: Grain direction sensitivity
    severity: medium
    variation: 20-40% absorption variation by grain orientation
    impact: Laser absorption varies significantly with grain direction
    solutions:
    - Scan parallel to grain for consistent results
    - Use crosshatch pattern (0° and 90°) for uniform cleaning
    - Test on scrap to determine optimal scan direction
  - challenge: Porous structure with deep contamination
    severity: medium
    porosity_range: 12-65% (softwoods highest)
    impact: Contaminants penetrate deep into wood structure
    solutions:
    - Multiple passes with progressive power increase
    - Reduce scan speed for deeper penetration (600 mm/s)
    - Chemical pre-treatment for deep-seated contamination
  contamination_challenges:
  - challenge: Varnish and coating removal
    severity: medium
    impact: Thick coatings require multiple passes and generate smoke/fumes
    solutions:
    - First pass 80W fast (1500 mm/s) for bulk removal
    - Second pass 60W slow (800 mm/s) for residue
    - Use fume extraction to prevent redeposition
    - Limit to 2-3 passes maximum to avoid substrate damage
description: We've found Oak's open porosity sets it apart from denser hardwoods like maple. This lets contaminants seep deep
  into the grain, so we typically start with low-power passes to gently draw them out without charring. Watch for uneven heat
  buildup in those pores—bump up overlap midway to even things out and preserve the wood's natural strength.
