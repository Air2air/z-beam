machine_settings:
  wavelength:
    description: Near-infrared wavelength for optimal Fiberglass absorption and minimal transmission
    unit: nm
    value: 1064
    min: 355
    max: 10640
  spotSize:
    min: 0.1
    max: 500
    unit: μm
    value: 300
    description: Smaller spots for precision on fiberglass textures, larger for broad areas; 300 μm balances resolution and
      efficiency (equipment specs from Coherent and Trumpf laser cleaners for industrial surface prep).
  energyDensity:
    min: 0.1
    max: 20.0
    unit: J/cm²
    value: 1.5
    description: Fluence below fiberglass damage threshold (~2-4 J/cm² for polymers, higher for glass fibers); safe for contaminant
      ablation without substrate melting (ablation studies in Journal of Applied Physics, 2019, on epoxy composites).
  pulseWidth:
    min: 0.1
    max: 1000
    unit: ns
    value: 30
    description: Nanosecond regime preferred over ps/fs for cost-effective cleaning of organics on fiberglass; 30 ns minimizes
      HAZ in low-conductivity composites (laser physics studies in Optics & Lasers in Engineering, 2018, on polymer ablation).
  scanSpeed:
    min: 10
    max: 5000
    unit: mm/s
    value: 1500
    description: Effective speeds balance removal efficiency and heat input; slower for heavy contamination (e.g., 500-1000
      mm/s), faster for light (2000-3000 mm/s); recommended for uniform fiberglass surface prep (industry standards from Laserax
      and Adapt Laser manuals).
  passCount:
    min: 1
    max: 10
    unit: passes
    value: 2
    description: Multi-pass for layered contamination removal without excessive heat; 1-2 passes typical for light industrial
      cleaning on fiberglass (case studies in Composites Part B, 2021, on laser surface preparation).
  overlapRatio:
    min: 10
    max: 90
    unit: '%'
    value: 50
    description: Ensures uniform coverage and avoids gaps/striping on uneven fiberglass surfaces; 50% optimal for energy overlap
      without redundancy (process optimization in International Journal of Advanced Manufacturing Technology, 2017).
  dwellTime:
    description: Effective dwell time per spot for contaminant ablation
    unit: μs
    value: 100
    min: 0.2
    max: 200
  laserPower:
    description: Optimal average power for Fiberglass surface cleaning without thermal damage
    unit: W
    value: 100
    min: 1.0
    max: 120
  laserPowerAlternative:
    min: 50
    max: 500
    value: 100
    unit: W
    description: Typical range for pulsed Nd:YAG lasers in composite cleaning to avoid thermal damage to polymer matrix; starting
      at 100W for light contamination (IPG Photonics specs for CL series cleaners; conservative for fiberglass melting point
      ~200-300°C).
  frequency:
    min: 1
    max: 200
    unit: kHz
    value: 50
    description: Moderate rates prevent heat accumulation in thermally sensitive fiberglass; higher rates speed cleaning but
      risk delamination (trade-off noted in Applied Surface Science, 2020, for composite applications).
componentSummary: These settings use moderate power and short nanosecond pulses at 1064 nm to gently ablate contaminants from
  heat-sensitive fiberglass without causing thermal degradation or fiber damage.
