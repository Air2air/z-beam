  power:
    min: 50
    max: 500
    value: 100
    unit: W
    description: Typical range for pulsed Nd:YAG lasers in composite cleaning to avoid
      thermal damage to polymer matrix; starting at 100W for light contamination (IPG
      Photonics specs for CL series cleaners; conservative for fiberglass melting
      point ~200-300°C).
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 1500
    description: Effective speeds balance removal efficiency and heat input; slower
      for heavy contamination (e.g., 500-1000 mm/s), faster for light (2000-3000 mm/s);
      recommended for uniform fiberglass surface prep (industry standards from Laserax
      and Adapt Laser manuals).
  pulse_width:
    min: 0.1
    max: 1000
    unit: ns
    value: 30
    description: Nanosecond regime preferred over ps/fs for cost-effective cleaning
      of organics on fiberglass; 30 ns minimizes HAZ in low-conductivity composites
      (laser physics studies in Optics & Lasers in Engineering, 2018, on polymer ablation).
  repetition_rate:
    min: 1
    max: 200
    unit: kHz
    value: 50
    description: Moderate rates prevent heat accumulation in thermally sensitive fiberglass;
      higher rates speed cleaning but risk delamination (trade-off noted in Applied
      Surface Science, 2020, for composite applications).
  energy_density:
    min: 0.1
    max: 20.0
    unit: J/cm²
    value: 1.5
    description: Fluence below fiberglass damage threshold (~2-4 J/cm² for polymers,
      higher for glass fibers); safe for contaminant ablation without substrate melting
      (ablation studies in Journal of Applied Physics, 2019, on epoxy composites).
  spot_size:
    min: 0.1
    max: 500
    unit: μm
    value: 300
    description: Smaller spots for precision on fiberglass textures, larger for broad
      areas; 300 μm balances resolution and efficiency (equipment specs from Coherent
      and Trumpf laser cleaners for industrial surface prep).
  pass_count:
    min: 1
    max: 10
    unit: passes
    value: 2
    description: Multi-pass for layered contamination removal without excessive heat;
      1-2 passes typical for light industrial cleaning on fiberglass (case studies
      in Composites Part B, 2021, on laser surface preparation).
  overlap_ratio:
    min: 10
    max: 90
    unit: '%'
    value: 50
    description: Ensures uniform coverage and avoids gaps/striping on uneven fiberglass
      surfaces; 50% optimal for energy overlap without redundancy (process optimization
      in International Journal of Advanced Manufacturing Technology, 2017).
