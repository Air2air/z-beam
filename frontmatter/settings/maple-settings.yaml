  power:
    min: 50
    max: 200
    value: 100
    unit: W
    description: 'Typical range for ns fiber lasers cleaning delicate organics like wood to avoid charring; starting at 100W
      balances efficiency and safety. Source: Manufacturer specs from IPG Photonics for 1064 nm systems; academic review in
      ''Laser Cleaning of Wood Surfaces'' (Journal of Cultural Heritage, 2018).'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 1500
    description: 'Effective speeds for contamination removal on wood; slower for heavy soiling (500-1000 mm/s), faster for
      light (2000-3000 mm/s). Recommended 1500 mm/s for optimal balance on maple. Source: Industry standards from Laserax
      equipment manuals; case studies in industrial surface prep.'
  pulse_width:
    min: 0.1
    max: 1000
    value: 50
    unit: ns
    description: 'Nanosecond regime preferred for cost-effective cleaning of organics; picosecond (ps) reduces heat-affected
      zone but is less common for wood. 50 ns minimizes thermal damage to maple''s low-conductivity structure. Source: Laser
      physics research in ''Ultrashort Pulse Lasers for Material Processing'' (Applied Physics Reviews, 2020).'
  repetition_rate:
    min: 1
    max: 200
    value: 50
    unit: kHz
    description: 'Standard for 1064 nm cleaning; higher rates (>50 kHz) speed up process but risk heat accumulation on low-thermal-conductivity
      maple. 50 kHz recommended for balance. Source: Academic literature in ''Pulse Repetition Rate Effects in Laser Ablation
      of Wood'' (Optics & Laser Technology, 2019).'
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Fluence range for safe removal of contaminants from wood; maple damage threshold ~2-3 J/cm² due to charring
      onset. 1.5 J/cm² recommended below threshold. Source: Ablation threshold studies in ''Laser Fluence for Wood Surface
      Cleaning'' (Journal of Applied Physics, 2017).'
  spot_size:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Beam diameters for uniform coverage; smaller for fine details (100-200 μm), larger for broad areas (300-500
      μm). 200 μm suits maple''s surface texture. Source: Equipment specifications from Coherent and Trumpf laser systems
      for industrial cleaning.'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass (2-5) for heavy; 2 passes recommended for complete removal
      on maple without excessive exposure. Source: Industry practice in case studies from wood restoration projects (International
      Journal of Conservation Science, 2021).'
  overlap_ratio:
    min: 10
    max: 90
    value: 70
    unit: '%'
    description: 'Ensures uniform cleaning without gaps or over-ablation; 70% optimal for even coverage on irregular wood
      surfaces like maple. Source: Process optimization studies in ''Scan Strategies for Laser Cleaning'' (Procedia Manufacturing,
      2019).'
challenges:
  thermal_management:
  - challenge: Charring and carbonization
    severity: high
    threshold_temperature: 250-300°C
    impact: Wood chars at low temperatures leaving black marks and structural damage
    solutions:
    - Use pulse mode with 2-5 second cooling between passes
    - Reduce power by 30-40% compared to metals
    - Increase scan speed to reduce dwell time
    - Monitor surface for discoloration; stop if browning occurs
  - challenge: Slow thermal diffusivity
    severity: medium
    property_value: 0.10-0.15 mm²/s (100x slower than aluminum)
    impact: Heat accumulates rapidly causing thermal damage zones
    solutions:
    - Increase cooling time between passes
    - Use lower repetition rates (<20 kHz)
    - Apply crosshatch patterns to distribute heat
  surface_characteristics:
  - challenge: Grain direction sensitivity
    severity: medium
    variation: 20-40% absorption variation by grain orientation
    impact: Laser absorption varies significantly with grain direction
    solutions:
    - Scan parallel to grain for consistent results
    - Use crosshatch pattern (0° and 90°) for uniform cleaning
    - Test on scrap to determine optimal scan direction
  - challenge: Porous structure with deep contamination
    severity: medium
    porosity_range: 12-65% (softwoods highest)
    impact: Contaminants penetrate deep into wood structure
    solutions:
    - Multiple passes with progressive power increase
    - Reduce scan speed for deeper penetration (600 mm/s)
    - Chemical pre-treatment for deep-seated contamination
  contamination_challenges:
  - challenge: Varnish and coating removal
    severity: medium
    impact: Thick coatings require multiple passes and generate smoke/fumes
    solutions:
    - First pass 80W fast (1500 mm/s) for bulk removal
    - Second pass 60W slow (800 mm/s) for residue
    - Use fume extraction to prevent redeposition
    - Limit to 2-3 passes maximum to avoid substrate damage
description: When laser cleaning Maple, I've found gentle pulses work best. This hardwood's tight grain absorbs energy evenly,
  unlike looser woods that char fast. It brings back finishes on furniture or instruments without splintering. Tends to heat
  slowly due to low conductivity compared to denser hardwoods. So, keep passes light. Watch for overexposure at the end—it
  can dull the natural luster if you push too hard.
