page_title: 'Maple Settings: Laser Parameters'
page_description: When laser cleaning Maple, I've found gentle pulses work best. This hardwood's tight grain absorbs energy
  evenly, unlike looser woods that char fast. It brings back finishes on furniture or instruments without splintering. Tends
  to heat slowly due to low conductivity compared to denser hardwoods. So, keep passes light. Watch for overexposure at the
  end—it can dull the natural luster if you push too hard.
meta_description: 'Maple: removes contamination removal. Industrial-grade parameters. No substrate damage.'
