    min: 50
    max: 1000
    value: 200
    unit: W
    description: 'Typical range for industrial laser cleaning of reflective metals like Chromium to avoid excessive heating;
      starting at 200W balances efficiency and safety. Max limited to prevent substrate melting (mp ~1907°C). Source: IPG
      Photonics specs for Yb-fiber lasers at 1064 nm; studies in Optics and Lasers in Engineering (2018) on metal cleaning.'
  scan_speed:
    min: 10
    max: 5000
    value: 1500
    unit: mm/s
    description: 'Effective range for contamination removal; slower for heavy oxides (500-1000 mm/s), faster for light contaminants
      (2000-5000 mm/s). Recommended 1500 mm/s for optimal balance on Chromium''s high thermal conductivity. Source: Industry
      standards from Laserax equipment manuals; case studies in Journal of Cleaner Production (2020).'
  pulse_width:
    min: 0.1
    max: 1000
    value: 20
    unit: ns
    description: 'Nanosecond regime (5-100 ns) standard for industrial cleaning to ablate contaminants with minimal HAZ; picosecond
      (ps) or femtosecond (fs) for ultra-precise work but less common industrially. 20 ns recommended for Chromium to limit
      thermal diffusion. Source: Laser physics research in Applied Surface Science (2019) on pulse regimes for metals.'
  repetition_rate:
    min: 1
    max: 200
    value: 50
    unit: kHz
    description: 'Typical 10-100 kHz for pulsed cleaning; higher rates increase speed but risk heat accumulation on reflective
      Chromium. 50 kHz recommended for efficient coverage without overheating. Trade-off: high freq accelerates process but
      requires monitoring. Source: Academic literature in Optics Express (2021) on repetition rate effects in laser ablation.'
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Fluence range below Chromium''s ablation threshold (~4 J/cm² at 1064 nm) for safe contaminant removal; damage
      threshold ~2-5 J/cm² depending on pulses. 1.5 J/cm² recommended to account for high reflectivity (~60% at 1064 nm).
      Source: Ablation threshold studies in Journal of Applied Physics (2017) and Surface & Coatings Technology (2022).'
  spot_size:
    min: 0.1
    max: 500
    unit: μm
    value: 200
    description: 'Typical beam diameter for precise industrial cleaning; smaller (100-200 μm) for fine details, larger (300-500
      μm) for broad areas. 200 μm recommended for uniform Chromium surface preparation. Source: Equipment specifications from
      Coherent and Trumpf laser systems; process guidelines in ILSC standards.'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass (2-5) for heavy layers; 2 passes recommended for complete
      removal on Chromium without excessive exposure. Source: Industry practice in case studies from Laser Cleaning International
      reports and Applied Optics (2020).'
  overlap_ratio:
