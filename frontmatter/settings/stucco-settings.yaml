machineSettings:
  wavelength:
    description: Near-infrared wavelength optimized for Stucco absorption and minimal substrate interaction
    unit: nm
    value: 1064
    min: 355
    max: 10640
  spotSize:
    min: 0.1
    max: 500
    unit: μm
    value: 300
    description: Beam diameter range for uniform coverage on rough stucco surfaces; smaller for detail work, larger for broad
      areas. 300 μm recommended for industrial contamination removal. From equipment specifications of systems like Laserax
      or CleanLASER for architectural applications.
  energyDensity:
    min: 0.1
    max: 20.0
    unit: J/cm²
    value: 1.2
    description: Fluence range for safe removal of contaminants from stucco without substrate damage (threshold ~2-3 J/cm²
      for plaster); lower for light dirt, higher for heavy. 1.2 J/cm² recommended conservatively. Based on ablation threshold
      studies in Applied Surface Science (e.g., laser cleaning of concrete and stucco analogs).
  pulseWidth:
    min: 0.1
    max: 1000
    unit: ns
    value: 30
    description: Nanosecond regime preferred for stucco to achieve ablation with minimal heat-affected zone (HAZ); picosecond
      (ps) or femtosecond (fs) for ultra-sensitive cases but less common industrially due to cost. 30 ns recommended for 1064
      nm on plaster-like materials. Supported by laser physics research in Optics & Laser Technology (e.g., studies on pulsed
      laser ablation of cementitious materials).
  scanSpeed:
    min: 10
    max: 5000
    unit: mm/s
    value: 1500
    description: Effective range for contamination removal on stucco; slower for heavy soiling (500-1000 mm/s), faster for
      light (2000-3000 mm/s). Recommended 1500 mm/s balances efficiency and safety. From industry standards in laser cleaning
      of building materials (e.g., EU project reports on historical stone cleaning).
  passCount:
    min: 1
    max: 10
    unit: passes
    value: 2
    description: Single pass for light cleaning, multi-pass for heavy contamination on porous stucco; 2 passes recommended
      to ensure complete removal without overexposure. Drawn from industry case studies on building restoration (e.g., reports
      from the International Centre for the Study of the Preservation and Restoration of Cultural Property).
  overlapRatio:
    min: 10
    max: 90
    unit: '%'
    value: 60
    description: Ensures uniform coverage on irregular stucco textures; 60% recommended for even cleaning without gaps or
      excessive overlap heat. Typical range from process optimization studies in laser surface treatment (e.g., Industrial
      Laser Solutions magazine articles on scan strategies for non-metals).
  laserPower:
    description: Optimal average power for Stucco surface cleaning without substrate damage
    unit: W
    value: 100
    min: 1.0
    max: 120
  laserPowerAlternative:
    min: 50
    max: 500
    value: 200
    unit: W
    description: Typical range for industrial cleaning of porous, low-conductivity materials like stucco to avoid thermal
      damage; starting at 200W for controlled ablation. Max limited to prevent cracking. Based on manufacturer specs from
      IPG Photonics and Adapt Laser Systems for 1064 nm systems on stone-like surfaces (similar to stucco).
  frequency:
    min: 1
    max: 200
    unit: kHz
    value: 50
    description: Typical for pulsed cleaning to ensure overlap without excessive heat buildup on low-conductivity stucco;
      higher rates speed up process but risk accumulation. 50 kHz recommended for optimal balance. From academic literature
      on 1064 nm cleaning of stone (e.g., Journal of Cultural Heritage papers on facade restoration).
componentSummary: The moderate 200 W power and 10 ns pulses at 1064 nm wavelength enable gentle ablation of contaminants from
  stucco's porous surface, minimizing heat-induced cracking or discoloration.
