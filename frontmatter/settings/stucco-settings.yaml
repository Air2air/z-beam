pageTitle: Stucco Settings
pageDescription: In our experience, the key with Stucco lies in its porous, cement-based structure that absorbs contaminants
  deeply while resisting heat buildup effectively during laser cleaning. We've found this makes it different from smoother
  masonry, so we typically start with controlled, low-intensity passes to gently lift surface grime without cracking the fragile
  matrix—watch out for overexposure here, as it can dry out and weaken the bonds mid-process. To handle this, we adjust by
  overlapping scans lightly and adding a damp post-treatment to restore evenness, ensuring clean results for heritage restorations.
