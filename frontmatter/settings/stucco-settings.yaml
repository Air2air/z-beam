  power:
    min: 50
    max: 500
    value: 200
    unit: W
    description: Typical range for industrial cleaning of porous, low-conductivity
      materials like stucco to avoid thermal damage; starting at 200W for controlled
      ablation. Max limited to prevent cracking. Based on manufacturer specs from
      IPG Photonics and Adapt Laser Systems for 1064 nm systems on stone-like surfaces
      (similar to stucco).
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 1500
    description: Effective range for contamination removal on stucco; slower for heavy
      soiling (500-1000 mm/s), faster for light (2000-3000 mm/s). Recommended 1500
      mm/s balances efficiency and safety. From industry standards in laser cleaning
      of building materials (e.g., EU project reports on historical stone cleaning).
  pulse_width:
    min: 0.1
    max: 1000
    unit: ns
    value: 30
    description: Nanosecond regime preferred for stucco to achieve ablation with minimal
      heat-affected zone (HAZ); picosecond (ps) or femtosecond (fs) for ultra-sensitive
      cases but less common industrially due to cost. 30 ns recommended for 1064 nm
      on plaster-like materials. Supported by laser physics research in Optics & Laser
      Technology (e.g., studies on pulsed laser ablation of cementitious materials).
  repetition_rate:
    min: 1
    max: 200
    unit: kHz
    value: 50
    description: Typical for pulsed cleaning to ensure overlap without excessive heat
      buildup on low-conductivity stucco; higher rates speed up process but risk accumulation.
      50 kHz recommended for optimal balance. From academic literature on 1064 nm
      cleaning of stone (e.g., Journal of Cultural Heritage papers on facade restoration).
  energy_density:
    min: 0.1
    max: 20.0
    unit: J/cm²
    value: 1.2
    description: Fluence range for safe removal of contaminants from stucco without
      substrate damage (threshold ~2-3 J/cm² for plaster); lower for light dirt, higher
      for heavy. 1.2 J/cm² recommended conservatively. Based on ablation threshold
      studies in Applied Surface Science (e.g., laser cleaning of concrete and stucco
      analogs).
  spot_size:
    min: 0.1
    max: 500
    unit: μm
    value: 300
    description: Beam diameter range for uniform coverage on rough stucco surfaces;
      smaller for detail work, larger for broad areas. 300 μm recommended for industrial
      contamination removal. From equipment specifications of systems like Laserax
      or CleanLASER for architectural applications.
  pass_count:
    min: 1
    max: 10
    unit: passes
    value: 2
    description: Single pass for light cleaning, multi-pass for heavy contamination
      on porous stucco; 2 passes recommended to ensure complete removal without overexposure.
      Drawn from industry case studies on building restoration (e.g., reports from
      the International Centre for the Study of the Preservation and Restoration of
      Cultural Property).
  overlap_ratio:
    min: 10
    max: 90
    unit: '%'
    value: 60
    description: Ensures uniform coverage on irregular stucco textures; 60% recommended
      for even cleaning without gaps or excessive overlap heat. Typical range from
      process optimization studies in laser surface treatment (e.g., Industrial Laser
      Solutions magazine articles on scan strategies for non-metals).
page_description: In our experience, the key with Stucco lies in its porous, cement-based
  structure that absorbs contaminants deeply while resisting heat buildup effectively
  during laser cleaning. We've found this makes it different from smoother masonry,
  so we typically start with controlled, low-intensity passes to gently lift surface
  grime without cracking the fragile matrix—watch out for overexposure here, as it
  can dry out and weaken the bonds mid-process. To handle this, we adjust by overlapping
  scans lightly and adding a damp post-treatment to restore evenness, ensuring clean
  results for heritage restorations.
