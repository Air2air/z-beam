machineSettings:
  powerRange:
    description: Optimal average power range for Magnesium oxide layer removal
    unit: W
    value: 100
    min: 1.0
    max: 120
  wavelength:
    description: Optimal wavelength considering Magnesium's optical properties
    unit: nm
    value: 1064
    min: 355
    max: 10640
  spotSize:
    min: 0.1
    max: 500
    unit: μm
    value: 200
    description: 'Smaller spots (100-200 μm) for fine detail on Mg surfaces, larger (300-500 μm) for broad area prep. 200
      μm recommended for uniform cleaning without excessive heat concentration. Source: Equipment specs from Coherent and
      Trumpf laser cleaning systems for metals.'
  repetitionRate:
    min: 1
    max: 200
    value: 50
    unit: kHz
    description: 'Typical for pulsed fiber lasers in cleaning; higher rates speed up process but risk heat buildup on thermally
      conductive Mg. 50 kHz balances speed and safety. Trade-off: >80 kHz may cause melting. Source: Academic literature (Appl.
      Surf. Sci. 2019, Vol. 475, on rep rate optimization for light metals).'
  fluenceThreshold:
    description: Minimum fluence required for effective Magnesium surface cleaning
    unit: J/cm²
    value: 1.2
    min: 0.3
    max: 4.5
  pulseWidth:
    min: 0.1
    max: 1000
    value: 50
    unit: ns
    description: 'Nanosecond regime preferred for Mg to ablate contaminants with minimal HAZ; picosecond (ps) or femtosecond
      reduces thermal effects but increases cost. 50 ns recommended for low reflectivity materials like Mg. Source: Laser
      physics research (Opt. Lasers Eng. 2020, Vol. 132, on pulse duration effects in metal cleaning).'
  scanSpeed:
    min: 10
    max: 5000
    value: 1500
    unit: mm/s
    description: 'Effective speeds for contamination removal; slower (500-1000 mm/s) for heavy rust/oils, faster (2000-3000
      mm/s) for light contaminants. Recommended 1500 mm/s for optimal balance on Mg to minimize heat accumulation. Source:
      Industry standards from Laserax and Adapt Laser manuals for metal surface prep.'
  passCount:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass (2-5) for heavy layers on Mg to prevent overheating per
      pass. Recommended 2 passes for industrial removal. Source: Industry case studies (e.g., SPIE Proc. 2021, Vol. 11660,
      on multi-pass cleaning of alloys).'
  overlapRatio:
    min: 10
    max: 90
    value: 60
    unit: '%'
    description: 'Ensures uniform coverage without gaps or overexposure; 30-50% for large areas, 60-80% for detailed Mg cleaning.
      60% recommended to balance efficiency and avoid thermal damage. Source: Process optimization studies (Opt. Laser Technol.
      2022, Vol. 145, on scan overlap in laser cleaning).'
  power:
    min: 50
    max: 1000
    value: 200
    unit: W
    description: 'Typical range for industrial laser cleaning of magnesium alloys to avoid melting (low melting point ~650°C);
      starting at 200W balances efficiency and safety. Max limited to prevent substrate damage due to high reflectivity at
      1064 nm. Source: Studies on Mg alloy cleaning (e.g., J. Laser Appl. 2018, Vol. 30, IPG Photonics specs for Yb-fiber
      lasers).'
  energyDensity:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Fluence below Mg damage threshold (~5 J/cm² at 1064 nm) for safe cleaning; 0.5-2 J/cm² for light contaminants,
      up to 4 for heavy. Recommended 1.5 J/cm² avoids ablation of substrate. Source: Ablation threshold studies (J. Phys.
      D: Appl. Phys. 2017, Vol. 50, on IR laser interaction with Mg).'
componentSummary: These settings employ moderate 200 W power and 10 ns pulses at 1064 nm to delicately ablate contaminants
  from reactive magnesium, minimizing heat buildup and avoiding ignition or surface damage.
