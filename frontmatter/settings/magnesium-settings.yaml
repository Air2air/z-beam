description: >-
  I've found that magnesium cleans up nicely with laser settings when you keep the power gentle and the passes multiple,
  because its shiny surface bounces most of the energy away and it heats up fast due to low thermal mass. This
  lightweight metal differs from denser ones like steel by reacting quickly to any excess heat, so the process removes
  contaminants without much buildup risk, but you need to control the beam overlap to avoid uneven spots. Tends to stay
  smooth after treatment, ideal for aerospace or automotive parts where precision matters. Just watch out at the
  end—don't push the fluence too high, or it might ignite and ruin your workpiece.
