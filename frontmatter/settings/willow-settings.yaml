  machine_settings:
    powerRange:
      description: Optimal average power for Willow surface cleaning without thermal
        damage
      unit: W
      value: 100
    wavelength:
      description: Near-infrared wavelength optimized for Willow absorption and minimal
        penetration
      unit: nm
      value: 1064
    spotSize:
      description: Beam spot diameter for precise cleaning with adequate energy density
      unit: μm
      value: 100
    repetitionRate:
      description: Optimal repetition rate for efficient cleaning coverage and thermal
        management
      unit: kHz
      value: 50
    energyDensity:
      description: Fluence threshold for effective contaminant removal without substrate
        damage
      unit: J/cm²
      value: 1.2
    pulseWidth:
      description: Nanosecond pulse duration for effective contaminant removal with
        controlled thermal effects
      unit: ns
      value: 10
    scanSpeed:
      description: Optimal scanning speed for efficient area coverage and effective
        cleaning
      unit: mm/s
      value: 500
    passCount:
      description: Optimal number of passes for complete cleaning without excessive
        processing
      unit: passes
      value: 3
    overlapRatio:
      description: Beam overlap percentage for uniform cleaning coverage
      unit: '%'
      value: 50
    dwellTime:
      description: Optimal dwell time per spot for effective cleaning action
      unit: μs
      value: 100
  challenges:
    thermal_management:
    - challenge: Charring and carbonization
      severity: high
      threshold_temperature: 250-300°C
      impact: Wood chars at low temperatures leaving black marks and structural damage
      solutions:
      - Use pulse mode with 2-5 second cooling between passes
      - Reduce power by 30-40% compared to metals
      - Increase scan speed to reduce dwell time
      - Monitor surface for discoloration; stop if browning occurs
    - challenge: Slow thermal diffusivity
      severity: medium
      property_value: 0.10-0.15 mm²/s (100x slower than aluminum)
      impact: Heat accumulates rapidly causing thermal damage zones
      solutions:
      - Increase cooling time between passes
      - Use lower repetition rates (<20 kHz)
      - Apply crosshatch patterns to distribute heat
    surface_characteristics:
    - challenge: Grain direction sensitivity
      severity: medium
      variation: 20-40% absorption variation by grain orientation
      impact: Laser absorption varies significantly with grain direction
      solutions:
      - Scan parallel to grain for consistent results
      - Use crosshatch pattern (0° and 90°) for uniform cleaning
      - Test on scrap to determine optimal scan direction
    - challenge: Porous structure with deep contamination
      severity: medium
      porosity_range: 12-65% (softwoods highest)
      impact: Contaminants penetrate deep into wood structure
      solutions:
      - Multiple passes with progressive power increase
      - Reduce scan speed for deeper penetration (600 mm/s)
      - Chemical pre-treatment for deep-seated contamination
    contamination_challenges:
    - challenge: Varnish and coating removal
      severity: medium
      impact: Thick coatings require multiple passes and generate smoke/fumes
      solutions:
      - First pass 80W fast (1500 mm/s) for bulk removal
      - Second pass 60W slow (800 mm/s) for residue
      - Use fume extraction to prevent redeposition
      - Limit to 2-3 passes maximum to avoid substrate damage
  settings_description: When laser cleaning Willow, start with low power and slow
    scan speeds to gently lift surface grime without scorching its delicate fibers.
    This wood's high porosity soaks up contaminants deeply, which helps the laser
    absorb well and clear buildup effectively, but it also traps heat locally due
    to poor conductivity, so you must overlap passes carefully midway through to prevent
    uneven charring or cracking. Avoid rushing the process—multiple light treatments
    bring back that natural grain safely.
