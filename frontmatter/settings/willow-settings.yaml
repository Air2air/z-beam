pageTitle: Willow
pageDescription: When laser cleaning Willow, start with low power and slow scan speeds to gently lift surface grime without
  scorching its delicate fibers. This wood's high porosity soaks up contaminants deeply, which helps the laser absorb well
  and clear buildup effectively, but it also traps heat locally due to poor conductivity, so you must overlap passes carefully
  midway through to prevent uneven charring or cracking. Avoid rushing the process—multiple light treatments bring back that
  natural grain safely.
