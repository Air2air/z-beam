  power:
    min: 50
    max: 500
    value: 150
    unit: W
    description: 'Typical range for 1064 nm fiber lasers in wood cleaning to balance efficiency and avoid charring; starting
      at 150 W for willow''s low thermal conductivity (~0.15 W/mK) prevents substrate damage. Source: IPG Photonics YLR series
      specs and studies on laser wood surface treatment (e.g., Journal of Cultural Heritage, 2018).'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 1500
    description: 'Effective speeds for contaminant removal on porous woods like willow; slower for heavy contamination (500-1000
      mm/s), faster for light (2000-3000 mm/s). Recommended 1500 mm/s for optimal balance. Source: Industry standards from
      Laserax equipment manuals and wood cleaning case studies (Optics and Lasers in Engineering, 2020).'
  pulse_width:
    min: 0.1
    max: 1000
    unit: ns
    value: 50
    description: 'Nanosecond regime preferred for 1064 nm cleaning of organics like willow to minimize heat-affected zone
      (HAZ <50 μm); picosecond (ps) or femtosecond (fs) for ultra-precision but costlier. 50 ns recommended for willow''s
      reflectivity (~5-10% at 1064 nm). Source: Laser physics research in Applied Surface Science (2019).'
  repetition_rate:
    min: 1
    max: 200
    unit: kHz
    value: 50
    description: 'Typical for pulsed cleaning to ensure coverage without excessive heat buildup in low-melting-point woods
      (willow ~250-300°C char point); higher rates speed up process but risk accumulation. 50 kHz balances speed and safety.
      Source: Academic literature on wood ablation (Journal of Applied Physics, 2017).'
  energy_density:
    min: 0.1
    max: 20.0
    unit: J/cm²
    value: 2
    description: 'Fluence range for contaminant removal without ablating willow substrate; damage threshold ~5-10 J/cm² at
      1064 nm due to high absorption. Recommended 2 J/cm² for safe cleaning. Conservative estimate for uncertainty in willow-specific
      data. Source: Ablation threshold studies in Optics Express (2021).'
  spot_size:
    min: 0.1
    max: 500
    unit: μm
    value: 200
    description: 'Beam diameter for precise cleaning on wood grains; smaller for fine details (100-200 μm), larger for broad
      areas (300-500 μm). 200 μm recommended for uniform willow surface prep. Source: Equipment specs from Coherent and Trumpf
      laser systems.'
  pass_count:
    min: 1
    max: 10
    unit: passes
    value: 2
    description: 'Single pass for light contamination, multi-pass for heavy; 2 passes typical for complete removal on willow
      without overexposure. Source: Industry practice in heritage wood restoration case studies (Studies in Conservation,
      2016).'
  overlap_ratio:
    min: 10
    max: 90
    unit: '%'
    value: 60
    description: 'Ensures uniform coverage on irregular wood surfaces like willow; 30-50% for speed, 60-80% for thoroughness.
      60% recommended to avoid gaps. Source: Process optimization in laser scanning studies (Procedia Manufacturing, 2019).'
component_summary: The 150 W power, 1064 nm wavelength, and 10 ns pulse width settings enable precise, non-thermal cleaning
  of Willow's delicate organic structure, effectively removing contaminants without causing fiber damage or discoloration.
challenges:
  thermal_management:
  - challenge: Charring and carbonization
    severity: high
    threshold_temperature: 250-300°C
    impact: Wood chars at low temperatures leaving black marks and structural damage
    solutions:
    - Use pulse mode with 2-5 second cooling between passes
    - Reduce power by 30-40% compared to metals
    - Increase scan speed to reduce dwell time
    - Monitor surface for discoloration; stop if browning occurs
  - challenge: Slow thermal diffusivity
    severity: medium
    property_value: 0.10-0.15 mm²/s (100x slower than aluminum)
    impact: Heat accumulates rapidly causing thermal damage zones
    solutions:
    - Increase cooling time between passes
    - Use lower repetition rates (<20 kHz)
    - Apply crosshatch patterns to distribute heat
  surface_characteristics:
  - challenge: Grain direction sensitivity
    severity: medium
    variation: 20-40% absorption variation by grain orientation
    impact: Laser absorption varies significantly with grain direction
    solutions:
    - Scan parallel to grain for consistent results
    - Use crosshatch pattern (0° and 90°) for uniform cleaning
    - Test on scrap to determine optimal scan direction
  - challenge: Porous structure with deep contamination
    severity: medium
    porosity_range: 12-65% (softwoods highest)
    impact: Contaminants penetrate deep into wood structure
    solutions:
    - Multiple passes with progressive power increase
    - Reduce scan speed for deeper penetration (600 mm/s)
    - Chemical pre-treatment for deep-seated contamination
  contamination_challenges:
  - challenge: Varnish and coating removal
    severity: medium
    impact: Thick coatings require multiple passes and generate smoke/fumes
    solutions:
    - First pass 80W fast (1500 mm/s) for bulk removal
    - Second pass 60W slow (800 mm/s) for residue
    - Use fume extraction to prevent redeposition
    - Limit to 2-3 passes maximum to avoid substrate damage
