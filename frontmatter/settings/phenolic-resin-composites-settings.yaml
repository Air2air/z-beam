  power:
    min: 50
    max: 500
    value: 100
    unit: W
    description: 'Typical range for pulsed Nd:YAG lasers in composite cleaning to avoid thermal damage; starting at 100W for
      light contamination on phenolics, which have low thermal conductivity (~0.2 W/m·K). Max safe ~300W to prevent charring
      (melting point ~200-300°C). Source: IPG Photonics specs and studies in Optics and Lasers in Engineering (2018) on polymer
      composites.'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 1500
    description: 'Effective range for 1064 nm cleaning of contaminants; slower (500-1000 mm/s) for heavy soiling, faster (2000-3000
      mm/s) for light; 1500 mm/s optimal for uniform removal without substrate heating on low-reflectivity phenolics (~10-20%
      at 1064 nm). Source: Industry standards from Laserax manuals and J. Cleaner Production (2020) case studies.'
  pulse_width:
    min: 0.1
    max: 1000
    unit: ns
    value: 20
    description: 'Nanosecond regime preferred over ps/fs for cost-effective cleaning with minimal heat-affected zone (HAZ
      <50 μm); 20 ns balances ablation efficiency and reduced thermal diffusion in phenolics. Ps (10-100 ps) for ultra-precise
      work but higher cost. Source: Laser physics in Applied Surface Science (2019) on polymer ablation thresholds.'
  repetition_rate:
    min: 1
    max: 200
    unit: kHz
    value: 30
    description: 'Typical for industrial cleaning; 30 kHz recommended for phenolics to achieve fast processing while limiting
      heat accumulation (high freq >50 kHz risks cumulative heating due to low conductivity). Trade-off: higher rates speed
      up cleaning but increase HAZ. Source: Academic literature in Journal of Laser Applications (2021).'
  energy_density:
    min: 0.1
    max: 20.0
    unit: J/cm²
    value: 1.0
    description: 'Fluence range for contaminant removal; damage threshold for phenolics ~1.5-2.5 J/cm² at 1064 nm due to moderate
      absorption; 1.0 J/cm² safe for cleaning without ablation of substrate. Conservative for thermal sensitivity. Source:
      Ablation studies in Composites Part B (2017) and Optics Express (2022).'
  spot_size:
    min: 0.1
    max: 500
    unit: μm
    value: 300
    description: 'Beam diameter range for precision vs. area coverage; 300 μm recommended for phenolic composites in surface
      prep to focus energy and minimize overshoot on irregular surfaces. Smaller for fine details, larger for broad areas.
      Source: Equipment specs from Coherent Inc. and process optimization in Industrial Laser Solutions (2020).'
  pass_count:
    min: 1
    max: 10
    unit: passes
    value: 2
    description: 'Single pass for light contamination, multi-pass (2-3) for heavy; 2 passes typical for complete removal on
      phenolics without excessive heat buildup. Source: Industry practice in aerospace case studies (e.g., AIAA Journal, 2019)
      and manufacturer guidelines.'
  overlap_ratio:
    min: 10
    max: 90
    unit: '%'
    value: 50
    description: 'Ensures uniform coverage; 50% recommended for phenolic composites to avoid gaps or overexposure, balancing
      efficiency and even fluence distribution. Higher (60-80%) for heavy contamination. Source: Process optimization in Surface
      and Coatings Technology (2021).'
challenges:
  thermal_management:
  - challenge: Matrix degradation and delamination
    severity: critical
    threshold_temperature: Polymer matrix 150-350°C, ceramic matrix >1000°C
    impact: Heat causes matrix decomposition, fiber-matrix debonding, and layer separation
    solutions:
    - Use pulse mode with 5-10 second cooling for polymer-matrix composites
    - Reduce power by 40-50% compared to monolithic materials
    - Monitor for discoloration, bubbling, or layer lifting
    - Ceramic and metal-matrix composites tolerate higher power
  - challenge: Anisotropic thermal properties
    severity: high
    property_value: 10-100x variation parallel vs perpendicular to fibers
    impact: Heat conducts rapidly along fibers but poorly across layers
    solutions:
    - Scan parallel to fiber direction for best heat dissipation
    - Use crosshatch pattern (0° and 90°) to identify fiber orientation
    - Increase cooling time 2-3x when scanning perpendicular to fibers
    - Carbon fiber composites require special attention due to electrical conductivity
  surface_characteristics:
  - challenge: Fiber exposure and damage
    severity: high
    impact: Aggressive cleaning exposes or damages reinforcing fibers
    solutions:
    - Use low energy density (0.5-2 J/cm²) to protect matrix
    - Multiple gentle passes preferred over single aggressive pass
    - Stop immediately if fibers become visible
    - Fiber-rich surfaces (woven cloth) more sensitive than particle-filled
  - challenge: Surface finish variability
    severity: medium
    impact: Gel coat, paint, or protective layers alter absorption and damage threshold
    solutions:
    - Test on edge or hidden area first
    - Coated surfaces may require 50-100W initial pass for coating removal
    - Bare composite requires 30-50% lower power
    - Adjust parameters when transitioning between coated and uncoated areas
  contamination_challenges:
  - challenge: Resin-based contaminant removal
    severity: medium
    impact: Adhesives, sealants, and coatings chemically bond to matrix
    solutions:
    - First pass 80W fast (1500 mm/s) for bulk removal
    - Second pass 50W slow (800 mm/s) for residue
    - Chemical pre-treatment improves results for stubborn adhesives
    - Monitor for matrix damage; stop if surface texture changes
description: When laser cleaning phenolic resin composites, we typically begin by addressing their tendency to retain heat
  due to poor thermal conductivity. This buildup risks damaging the resin matrix if power levels rise too quickly, so we recommend
  starting with conservative settings to allow gradual contaminant removal. Unlike metals that dissipate heat evenly, these
  fiber-reinforced materials absorb laser energy efficiently but unevenly, which can expose underlying fibers to thermal stress.
  We've found that multiple low-intensity passes restore surface integrity without delamination. To avoid charring pitfalls,
  monitor for localized discoloration and adjust scan speeds accordingly, ensuring the composite's compressive strength remains
  intact for applications in aerospace and automotive sectors.
