description: >-
  When laser cleaning marble, the main challenge we face is its tendency to crack under uneven heating, unlike tougher
  granites that handle heat more evenly across their structure. This stems from marble's metamorphic layers, which
  expand differently than surrounding stones, so we adjust by using slower scan speeds and multiple gentle passes to
  distribute energy without stressing those seams. We've found this restores delicate heritage surfaces beautifully.
  Just watch for subsurface discoloration at the end—dial back power if you spot it.
