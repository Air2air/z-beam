    unit: W
    description: Typical range for industrial cleaning of precious metals like platinum to avoid thermal damage; starting
      at 100W for light contamination. Based on CleanLaser and IPG Photonics specs for 1064 nm systems (e.g., CL 100 series).
  scan_speed:
    min: 10
    max: 5000
    value: 1500
    unit: mm/s
    description: Effective speeds for contaminant removal on reflective metals; higher for light contamination (e.g., oils),
      lower for heavy (e.g., oxides). Recommended 1500 mm/s balances efficiency and safety. From industry standards in laser
      cleaning manuals (e.g., Adapt Laser Systems guidelines).
  pulse_width:
    min: 0.1
    max: 1000
    unit: ns
    value: 30
    description: Nanosecond regime preferred for cost-effective cleaning of platinum with minimal HAZ due to its high thermal
      conductivity; picosecond (ps) or femtosecond (fs) for ultra-precise work but less common industrially. 30 ns recommended.
      Supported by laser physics studies (e.g., J. Appl. Phys. on metal ablation thresholds).
  repetition_rate:
    min: 1
    max: 200
    value: 40
    unit: kHz
    description: Typical for pulsed cleaning to control heat accumulation on high-reflectivity platinum; higher rates speed
      up process but risk buildup—40 kHz optimal trade-off. From academic literature (e.g., Opt. Lasers Eng. reviews on pulse
      repetition in metal cleaning).
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: Fluence below platinum's ablation threshold (~2-4 J/cm² at 1064 nm) for safe contaminant removal; 1.5 J/cm²
      recommended to vaporize organics without substrate damage. Based on ablation threshold studies (e.g., Appl. Surf. Sci.
      on noble metals, noting Pt's high reflectivity reduces absorption).
  spot_size:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: Smaller spots for detailed surface prep on platinum jewelry or components; 200 μm balances precision and
      coverage for industrial use. From equipment specs (e.g., SPI Lasers cleaning heads for fine metal work).
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: Single pass for light contamination, multi-pass for thorough removal; 2 passes recommended for uniform platinum
      cleaning without overexposure. Drawn from industry case studies (e.g., laser cleaning of precious metals in J. Laser
      Appl.).
  overlap_ratio:
    min: 10
    max: 90
    value: 60
    unit: '%'
    description: Ensures uniform coverage on irregular platinum surfaces; 60% optimal for even energy distribution without
      excessive heat. From process optimization studies (e.g., Opt. Eng. on scan strategies for laser cleaning).
challenges:
  thermal_management:
  - challenge: High thermal conductivity and heat spread
    severity: medium
    property_value: 4-400 W/(m·K) depending on metal
    impact: Heat spreads rapidly causing large heat-affected zones
    solutions:
    - Use shorter pulse durations (picosecond/femtosecond) for localized heating
    - Increase scan speed to minimize dwell time
    - Apply cooling between passes for thick sections
  - challenge: Melting and heat-affected zone formation
    severity: high
    threshold_range: 660°C (Al) to 3422°C (W)
    impact: Substrate melting or microstructural changes in heat-affected zone
    solutions:
    - Stay below 70% of melting temperature
    - Use pulse mode with adequate cooling time
    - Monitor for surface discoloration indicating oxidation
  surface_characteristics:
  - challenge: High reflectivity
    severity: high
    reflectivity_range: 60-95% at 1064nm for polished metals
    impact: Most laser energy reflected, requiring higher power; safety hazard
    solutions:
    - Use shorter wavelengths (355nm UV) for better absorption
    - Increase power density but monitor for thermal damage
    - Ensure proper beam containment and safety measures
    - Surface oxidation/roughness improves absorption
  - challenge: Surface finish variations
    severity: medium
    impact: Polished surfaces reflect more, rough surfaces absorb better
    solutions:
    - Adjust power based on surface condition
    - Test parameters on similar finish samples
    - Polished surfaces need 20-40% more power
  contamination_challenges:
  - challenge: Rust and oxide layer removal
    severity: medium
    impact: Requires multiple passes; rust/oxide has different absorption than base metal
    solutions:
    - First pass at higher power (100-120W) to remove bulk oxide
    - Second pass at lower power (60-80W) for final cleaning
    - Monitor for base metal exposure to avoid over-processing
  - challenge: Oil and grease removal
    severity: low
    impact: Organic contaminants vaporize easily but can redeposit
    solutions:
    - Use fume extraction to prevent redeposition
    - Higher scan speeds (3000-5000 mm/s) for thin films
    - Chemical pre-cleaning for heavy contamination
description: When laser cleaning platinum, watch its high reflectivity first. It bounces back most laser energy. This scatters
  the beam and slows contaminant removal. I've seen jobs drag on without adjustments. Start low on power to build heat gradually.
  Tends to work best with multiple passes. Overlap scans tightly for even coverage. Avoid high fluence early—it risks uneven
  heating. Platinum's heat resistance helps here. It stays stable under steady pulses. This restores surfaces cleanly without
  warping. Just keep scans slow to control buildup.
