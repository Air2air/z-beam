  power:
    min: 50
    max: 500
    value: 100
    unit: W
    description: Typical range for industrial cleaning of precious metals like platinum to avoid thermal damage; starting
      at 100W for light contamination. Based on CleanLaser and IPG Photonics specs for 1064 nm systems (e.g., CL 100 series).
  scan_speed:
    min: 10
    max: 5000
    value: 1500
    unit: mm/s
    description: Effective speeds for contaminant removal on reflective metals; higher for light contamination (e.g., oils),
      lower for heavy (e.g., oxides). Recommended 1500 mm/s balances efficiency and safety. From industry standards in laser
      cleaning manuals (e.g., Adapt Laser Systems guidelines).
  pulse_width:
    min: 0.1
    max: 1000
    unit: ns
    value: 30
    description: Nanosecond regime preferred for cost-effective cleaning of platinum with minimal HAZ due to its high thermal
      conductivity; picosecond (ps) or femtosecond (fs) for ultra-precise work but less common industrially. 30 ns recommended.
      Supported by laser physics studies (e.g., J. Appl. Phys. on metal ablation thresholds).
  repetition_rate:
    min: 1
    max: 200
    value: 40
    unit: kHz
    description: Typical for pulsed cleaning to control heat accumulation on high-reflectivity platinum; higher rates speed
      up process but risk buildup—40 kHz optimal trade-off. From academic literature (e.g., Opt. Lasers Eng. reviews on pulse
      repetition in metal cleaning).
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: Fluence below platinum's ablation threshold (~2-4 J/cm² at 1064 nm) for safe contaminant removal; 1.5 J/cm²
      recommended to vaporize organics without substrate damage. Based on ablation threshold studies (e.g., Appl. Surf. Sci.
      on noble metals, noting Pt's high reflectivity reduces absorption).
  spot_size:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: Smaller spots for detailed surface prep on platinum jewelry or components; 200 μm balances precision and
      coverage for industrial use. From equipment specs (e.g., SPI Lasers cleaning heads for fine metal work).
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: Single pass for light contamination, multi-pass for thorough removal; 2 passes recommended for uniform platinum
      cleaning without overexposure. Drawn from industry case studies (e.g., laser cleaning of precious metals in J. Laser
      Appl.).
  overlap_ratio:
    min: 10
    max: 90
    value: 60
    unit: '%'
    description: Ensures uniform coverage on irregular platinum surfaces; 60% optimal for even energy distribution without
      excessive heat. From process optimization studies (e.g., Opt. Eng. on scan strategies for laser cleaning).
component_summary: These settings leverage the 1064 nm wavelength for strong absorption in Platinum's reflective surface,
  with 100 W power and 10 ns pulses ensuring precise contaminant removal without risking thermal distortion of the high-melting-point
  metal.
