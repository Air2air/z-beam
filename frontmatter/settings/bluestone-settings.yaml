  power:
    min: 50
    max: 300
    value: 100
    unit: W
    description: 'Typical range for industrial cleaning of natural stones like Bluestone using 1064 nm fiber lasers; starting
      at 100W balances efficiency and safety to avoid thermal damage to porous substrate. Max limited by Bluestone''s low
      thermal conductivity (~1-2 W/m·K) to prevent cracking. Source: Manufacturer specs from IPG Photonics YLR series and
      academic review in ''Laser Cleaning of Stone Surfaces'' (J. Cult. Herit., 2018).'
  scan_speed:
    min: 10
    max: 5000
    value: 1500
    unit: mm/s
    description: 'Effective speeds for contamination removal on stone; slower (500-1000 mm/s) for heavy rust/graffiti, faster
      (2000-3000 mm/s) for light dust. Recommended 1500 mm/s for optimal balance on Bluestone to ensure uniform cleaning without
      overheating. Source: Industry standards from Adapt Laser Systems manuals and case studies in Opt. Lasers Eng. (2020).'
  pulse_width:
    min: 0.1
    max: 1000
    value: 50
    unit: ns
    description: 'Nanosecond regime (10-200 ns) preferred for cost-effective cleaning of stones; picosecond (ps) or femtosecond
      reduces heat-affected zone (HAZ) but increases cost. 50 ns recommended for Bluestone to minimize thermal diffusion given
      its melting point ~1200-1400°C. Source: Laser physics research in Appl. Phys. A (2019) on stone ablation thresholds.'
  repetition_rate:
    min: 1
    max: 200
    value: 50
    unit: kHz
    description: 'Typical for pulsed cleaning to control energy delivery; higher rates (>50 kHz) speed up process but risk
      heat accumulation on low-conductivity Bluestone. 50 kHz balances speed and safety. Trade-off: high freq increases throughput
      but requires monitoring for substrate heating. Source: Academic literature in J. Appl. Phys. (2021) on pulse repetition
      in heritage cleaning.'
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Fluence range for safe removal of contaminants like soot or oxides; Bluestone damage threshold ~4-5 J/cm²
      due to moderate reflectivity (~20-30% at 1064 nm). Recommended 1.5 J/cm² avoids ablation of substrate while effective
      for industrial prep. Source: Ablation threshold studies in Surf. Coat. Technol. (2017) for sandstones.'
  spot_size:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Beam diameter range for cleaning; smaller (100-200 μm) for fine details on textured Bluestone, larger (300-500
      μm) for broad areas. 200 μm recommended for uniform coverage in surface preparation. Source: Equipment specifications
      from CleanLaser CL series and process optimization in Lasers Manuf. Mater. Process. (2022).'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass (2-5) for heavy layers to build fluence gradually and prevent
      damage. 2 passes recommended for Bluestone to ensure complete removal without excessive heat exposure. Source: Industry
      practice in case studies from Laser Cleaning Europe consortium and Opt. Express (2019).'
  overlap_ratio:
    min: 10
    max: 90
    value: 60
    unit: '%'
    description: 'Overlap ensures uniform fluence distribution; 30-50% for fast large-area cleaning, 60-80% for detailed work
      on irregular Bluestone surfaces. 60% recommended for even coverage in contamination removal. Source: Process optimization
      studies in J. Laser Appl. (2020) for stone substrates.'
component_summary: The 100 W power, 1064 nm wavelength, and 10 ns pulse width settings enable precise contaminant ablation
  on Bluestone, minimizing thermal damage to its porous sandstone structure while preserving surface integrity.
