pageTitle: Bluestone Settings
pageDescription: When laser cleaning Bluestone, make sure you dial back power compared to tougher igneous rocks, since its
  softer sedimentary structure heats unevenly and risks cracking under steady beams. Focus first on its sluggish heat spread—this
  keeps energy focused but demands slower passes to prevent surface damage. Boost overlap for thorough coverage on the somewhat
  porous texture, ensuring clean results without etching.
