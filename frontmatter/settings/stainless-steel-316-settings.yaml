  power:
    min: 20
    max: 1000
    value: 100
    unit: W
    description: 'Typical range for industrial fiber lasers cleaning metals like SS316;
      starting at 100 W avoids overheating due to SS316''s reflectivity (~65% at 1064
      nm); max limited to prevent melting (threshold ~500-1000 W depending on pulse);
      source: IPG Photonics YLR series specs and Anisimov et al. (2018) in Optics
      Express.'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 2000
    description: 'Effective range for contamination removal; slower (100-1000 mm/s)
      for heavy rust/oil, faster (2000-5000 mm/s) for light contaminants; 2000 mm/s
      optimal for SS316 surface prep balancing efficiency and minimal HAZ; source:
      Laserax equipment manuals and industry standards from SPIE proceedings (2020).'
  pulse_width:
    min: 0.1
    max: 1000
    value: 50
    unit: ns
    description: 'Nanosecond regime standard for industrial cleaning to ablate contaminants
      without deep substrate penetration; 50 ns recommended for SS316 to minimize
      heat-affected zone (HAZ <10 μm) given its thermal conductivity (16 W/m·K); picosecond
      (ps) or femtosecond (fs) for ultra-precision but costlier; source: Laser physics
      studies by Kunze et al. (2019) in Applied Surface Science.'
  repetition_rate:
    min: 1
    max: 200
    value: 50
    unit: kHz
    description: 'Typical for pulsed cleaning; 20-50 kHz for SS316 to control heat
      accumulation (high freq increases temp rise); 50 kHz balances speed and safety;
      trade-off: higher rates speed up process but risk thermal damage; source: Academic
      literature, e.g., Pou et al. (2011) in Journal of Cleaner Production.'
  energy_density:
    min: 0.1
    max: 20.0
    value: 0.5
    unit: J/cm²
    description: 'Fluence range for safe ablation of contaminants on metals; SS316
      damage threshold ~1.5-2.5 J/cm² for ns pulses at 1064 nm; 0.5 J/cm² recommended
      for cleaning without substrate melting (mp ~1400°C); source: Ablation threshold
      studies by Lorenz et al. (2017) in Applied Physics A.'
  spot_size:
    min: 0.1
    max: 500
    value: 100
    unit: μm
    description: 'Beam diameter range for focused cleaning; smaller (20-50 μm) for
      fine details, larger (100-200 μm) for broad areas; 100 μm recommended for uniform
      SS316 surface prep; source: Equipment specs from Coherent and Trumpf lasers,
      per industry case studies.'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass (2-5) for heavy
      layers; 2 passes typical for complete SS316 cleaning without excessive wear;
      source: Industry practice from case studies in Metal Finishing Journal (2021)
      and manufacturer guidelines.'
  overlap_ratio:
    min: 10
    max: 90
    value: 60
    unit: '%'
    description: 'Ensures uniform coverage; 30-50% for speed, 60-80% for thoroughness
      on reflective SS316; 60% recommended to avoid gaps while minimizing passes;
      source: Process optimization studies by Zhou et al. (2020) in Optics and Lasers
      in Engineering.'
