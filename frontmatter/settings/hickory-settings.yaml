pageTitle: Hickory
pageDescription: The key with Hickory lies in its dense hardwood structure. We've found this makes it durable yet prone to heat buildup during laser cleaning. Start with lower power settings to remove surface contaminants steadily. Its moderate porosity absorbs residues unevenly, so watch for uneven cleaning in the middle of passes. Adjust scan speeds slower to avoid charring the grain. This approach restores the wood without damaging its natural toughness.
