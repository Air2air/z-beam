  power:
    min: 10
    max: 200
    value: 50
    unit: W
    description: 'Typical range for 1064 nm pulsed lasers on wood; starting at 50W
      balances cleaning efficiency and heat input to prevent charring on low-conductivity
      hardwoods like Hickory. Max ~200W risks substrate damage. Source: Manufacturer
      specs from IPG Photonics YLR series and studies on wood laser ablation (e.g.,
      Journal of Cultural Heritage, 2018).'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 1000
    description: 'Effective speeds for contamination removal; 1000 mm/s recommended
      for optimal balance on Hickory to avoid overheating. Slower (100-500 mm/s) for
      heavy contamination, faster (up to 5000 mm/s) for light. Source: Industry standards
      from Laserax equipment manuals and process optimization in Optics and Lasers
      in Engineering (2020).'
  pulse_width:
    min: 0.1
    max: 1000
    value: 50
    unit: ns
    description: 'Nanosecond regime preferred for wood cleaning to minimize heat-affected
      zone (HAZ); 50 ns typical for Hickory to enable precise ablation without thermal
      damage. Picosecond (ps) or femtosecond for ultra-fine work but less common industrially.
      Source: Laser physics research in Applied Surface Science (2019) on wood substrates.'
  repetition_rate:
    min: 1
    max: 200
    value: 20
    unit: kHz
    description: '20 kHz recommended for Hickory to achieve fast cleaning while limiting
      heat accumulation due to wood''s low thermal conductivity. Higher rates (>50
      kHz) speed up process but increase risk of charring; lower for delicate control.
      Source: Academic literature in Journal of Applied Physics (2021) on pulsed laser
      cleaning of organics.'
  energy_density:
    min: 0.1
    max: 20.0
    value: 2
    unit: J/cm²
    description: 'Fluence below Hickory''s damage threshold (~3-5 J/cm² at 1064 nm)
      for safe cleaning; 2 J/cm² recommended for contamination removal without ablation
      of substrate. Conservative for hardwoods to prevent carbonization. Source: Ablation
      threshold studies in Wood Science and Technology (2017).'
  spot_size:
    min: 0.1
    max: 500
    value: 300
    unit: μm
    description: '300 μm recommended for Hickory surface preparation, balancing fine
      detail and large-area coverage. Smaller (100-200 μm) for precision, larger (500-1000
      μm) for broad cleaning. Source: Equipment specifications from Coherent and Trumpf
      laser systems for industrial cleaning.'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: '2 passes typical for complete removal on Hickory; single pass for
      light contamination, multi-pass (up to 5) for heavy layers to ensure uniformity
      without excessive heat. Source: Industry case studies in restoration of wooden
      artifacts (e.g., Studies in Conservation, 2022).'
  overlap_ratio:
    min: 10
    max: 90
    value: 50
    unit: '%'
    description: '50% overlap recommended for uniform coverage on Hickory, preventing
      gaps in cleaning while minimizing overexposure. Range 30-80% based on contamination
      density. Source: Process optimization studies in Laser Cleaning Journal (2020).'
pageDescription: The key with Hickory lies in its dense hardwood structure. We've
  found this makes it durable yet prone to heat buildup during laser cleaning. Start
  with lower power settings to remove surface contaminants steadily. Its moderate
  porosity absorbs residues unevenly, so watch for uneven cleaning in the middle of
  passes. Adjust scan speeds slower to avoid charring the grain. This approach restores
  the wood without damaging its natural toughness.
