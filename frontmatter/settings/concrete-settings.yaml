  machine_settings:
    powerRange:
      description: Optimal average power for concrete surface cleaning and contaminant
        removal
      unit: W
      value: 100
    wavelength:
      description: Near-infrared wavelength optimized for concrete absorption and
        minimal substrate damage
      unit: nm
      value: 1064
    spotSize:
      description: Beam spot diameter for effective cleaning coverage and energy density
        control
      unit: mm
      value: 0.8
    repetitionRate:
      description: Optimal repetition rate for continuous cleaning coverage without
