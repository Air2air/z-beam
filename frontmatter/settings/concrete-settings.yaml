  power:
    min: 100
    max: 2000
    value: 500
    unit: W
    description: 'Typical range for industrial 1064 nm laser cleaning of concrete surfaces (e.g., graffiti or rust removal);
      starting at 500 W balances efficiency and safety to avoid thermal cracking. Max safe below substrate damage threshold
      (~1000-1500 W depending on fluence). Source: CleanLaser and IPG Photonics equipment specs; academic review in J. Laser
      Appl. (2018) on stone/concrete cleaning.'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 1000
    description: 'Effective range for contamination removal on concrete; slower (100-500 mm/s) for heavy soiling like rust,
      faster (2000-5000 mm/s) for light contaminants. Recommended 1000 mm/s for optimal balance of cleaning rate and uniformity,
      considering concrete''s low thermal conductivity. Source: Industry standards from Laser Clean Tech manuals; case study
      in Opt. Lasers Eng. (2020).'
  pulse_width:
    min: 0.1
    max: 1000
    value: 50
    unit: ns
    description: 'Nanosecond regime (10-150 ns) typical for concrete to enable ablation with minimal heat-affected zone (HAZ);
      picosecond (ps) or femtosecond (fs) reduces HAZ further but increases cost. Recommended 50 ns for efficient contaminant
      removal without cracking porous concrete. Source: Laser physics research in Appl. Surf. Sci. (2019) on pulsed laser
      ablation of cementitious materials.'
  repetition_rate:
    min: 1
    max: 200
    value: 50
    unit: kHz
    description: 'Standard range for 1064 nm cleaning; higher rates (50-100 kHz) speed up process but risk heat accumulation
      in low-conductivity concrete. Recommended 50 kHz for balanced throughput and thermal management. Source: Academic literature
      in J. Clean. Prod. (2021) on industrial laser parameters for building materials.'
  energy_density:
    min: 0.1
    max: 20.0
    value: 2
    unit: J/cm²
    description: 'Fluence range for safe contaminant ablation (e.g., paints or oxides); concrete damage threshold ~8-12 J/cm²
      to prevent spalling. Recommended 2 J/cm² for effective cleaning below threshold, accounting for variable reflectivity
      at 1064 nm. Source: Ablation threshold studies in Surf. Coat. Technol. (2017) and Opt. Express (2022) on concrete laser
      interactions.'
  spot_size:
    min: 0.1
    max: 500
    value: 1000
    unit: μm
    description: 'Beam diameter range for cleaning; smaller (100-500 μm) for fine details like cracks, larger (1-5 mm) for
      broad surface prep. Recommended 1000 μm (1 mm) for uniform coverage on rough concrete surfaces. Source: Equipment specifications
      from Coherent and Trumpf lasers; process optimization in Lasers Manuf. Mater. Process. (2020).'
  pass_count:
    min: 1
    max: 10
    value: 3
    unit: passes
    description: 'Single pass for light contamination, multi-pass (3-5) for heavy layers to ensure complete removal without
      excessive energy input. Recommended 3 passes for typical industrial concrete cleaning to achieve uniform results. Source:
      Industry case studies in Constr. Build. Mater. (2019) on laser surface preparation.'
  overlap_ratio:
    min: 10
    max: 90
    value: 50
    unit: '%'
    description: 'Standard overlap for uniform scan coverage; 30-50% for faster large-area cleaning, 50-80% for detailed work
      to avoid gaps on uneven concrete. Recommended 50% for balanced efficiency and homogeneity. Source: Process optimization
      studies in J. Laser Appl. (2021) and manufacturer guidelines from Adapt Laser Systems.'
challenges:
  thermal_management:
  - challenge: Moisture-induced spalling and explosive failure
    severity: critical
    threshold_temperature: Steam formation >100°C with trapped moisture
    impact: Trapped moisture converts to steam causing explosive surface spalling
    solutions:
    - Test moisture content before cleaning (>5% moisture requires drying)
    - Use pulse mode with 10-15 second cooling for wet materials
    - Reduce power by 50-60% for damp masonry
    - Allow 24-48 hours drying after rain before laser cleaning
    - Monitor for popping sounds or surface lifting; stop immediately
  - challenge: Low thermal diffusivity and heat accumulation
    severity: high
    property_value: 0.1-1.0 mm²/s (3-10x slower than metals)
    impact: Heat concentrates in surface layer causing thermal stress
    solutions:
    - Increase cooling time between passes (8-12 seconds)
    - Use low repetition rates (<20 kHz)
    - Defocused beam reduces peak intensity
    - Multiple gentle passes preferred over aggressive single pass
  surface_characteristics:
  - challenge: High porosity and deep contamination
    severity: high
    porosity_range: 10-25% (brick and concrete highly porous)
    impact: Contaminants penetrate deep into porous structure
    solutions:
    - Multiple progressive passes with power increase (50W → 80W → 100W)
    - Reduce scan speed for deeper penetration (400-600 mm/s)
    - Chemical pre-treatment for biological growth (algae, lichen)
    - Expect 3-5 passes for complete cleaning vs 1-2 for dense materials
  - challenge: Surface heterogeneity and aggregate exposure
    severity: medium
    impact: Mixed composition (cement matrix, aggregates, voids) causes variable absorption
    solutions:
    - Use moderate power (70-90W) suitable for both matrix and aggregates
    - Crosshatch scan pattern for uniform coverage
    - Monitor for differential ablation; adjust power if aggregates become prominent
    - Aged masonry more challenging than new construction
  contamination_challenges:
  - challenge: Paint and coating removal from porous substrate
    severity: medium
    impact: Paint penetrates into pores requiring deep cleaning without substrate damage
    solutions:
    - First pass 100W fast (1500 mm/s) for surface paint layer
    - Second pass 70W slow (800 mm/s) for paint in pores
    - Third pass 50W very slow (500 mm/s) for residual staining
    - Chemical stripping pre-treatment reduces laser exposure
    - Heritage masonry requires gentler approach (max 60W)
description: We've found that concrete demands initial low-power passes in laser cleaning to avoid aggregate spalling, a risk
  not as prevalent in denser stones like granite. Its inherent porosity allows effective absorption of laser energy, which
  reveals embedded contaminants without excessive heat buildup. We typically follow with multiple overlapping scans to restore
  surface uniformity in infrastructure settings, reducing the chance of uneven ablation.
