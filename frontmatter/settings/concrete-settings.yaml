  power:
    min: 100
    max: 2000
    value: 500
    unit: W
    description: 'Typical range for industrial 1064 nm laser cleaning of concrete surfaces (e.g., graffiti or rust removal);
      starting at 500 W balances efficiency and safety to avoid thermal cracking. Max safe below substrate damage threshold
      (~1000-1500 W depending on fluence). Source: CleanLaser and IPG Photonics equipment specs; academic review in J. Laser
      Appl. (2018) on stone/concrete cleaning.'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 1000
    description: 'Effective range for contamination removal on concrete; slower (100-500 mm/s) for heavy soiling like rust,
      faster (2000-5000 mm/s) for light contaminants. Recommended 1000 mm/s for optimal balance of cleaning rate and uniformity,
      considering concrete''s low thermal conductivity. Source: Industry standards from Laser Clean Tech manuals; case study
      in Opt. Lasers Eng. (2020).'
  pulse_width:
    min: 0.1
    max: 1000
    value: 50
    unit: ns
    description: 'Nanosecond regime (10-150 ns) typical for concrete to enable ablation with minimal heat-affected zone (HAZ);
      picosecond (ps) or femtosecond (fs) reduces HAZ further but increases cost. Recommended 50 ns for efficient contaminant
      removal without cracking porous concrete. Source: Laser physics research in Appl. Surf. Sci. (2019) on pulsed laser
      ablation of cementitious materials.'
  repetition_rate:
    min: 1
    max: 200
    value: 50
    unit: kHz
    description: 'Standard range for 1064 nm cleaning; higher rates (50-100 kHz) speed up process but risk heat accumulation
      in low-conductivity concrete. Recommended 50 kHz for balanced throughput and thermal management. Source: Academic literature
      in J. Clean. Prod. (2021) on industrial laser parameters for building materials.'
  energy_density:
    min: 0.1
    max: 20.0
    value: 2
    unit: J/cm²
    description: 'Fluence range for safe contaminant ablation (e.g., paints or oxides); concrete damage threshold ~8-12 J/cm²
      to prevent spalling. Recommended 2 J/cm² for effective cleaning below threshold, accounting for variable reflectivity
      at 1064 nm. Source: Ablation threshold studies in Surf. Coat. Technol. (2017) and Opt. Express (2022) on concrete laser
      interactions.'
  spot_size:
    min: 0.1
    max: 1200
    value: 1000
    unit: μm
    description: 'Beam diameter range for cleaning; smaller (100-500 μm) for fine details like cracks, larger (1-5 mm) for
      broad surface prep. Recommended 1000 μm (1 mm) for uniform coverage on rough concrete surfaces. Source: Equipment specifications
      from Coherent and Trumpf lasers; process optimization in Lasers Manuf. Mater. Process. (2020).'
  pass_count:
    min: 1
    max: 10
    value: 3
    unit: passes
    description: 'Single pass for light contamination, multi-pass (3-5) for heavy layers to ensure complete removal without
      excessive energy input. Recommended 3 passes for typical industrial concrete cleaning to achieve uniform results. Source:
      Industry case studies in Constr. Build. Mater. (2019) on laser surface preparation.'
  overlap_ratio:
    min: 10
    max: 90
    value: 50
    unit: '%'
    description: 'Standard overlap for uniform scan coverage; 30-50% for faster large-area cleaning, 50-80% for detailed work
      to avoid gaps on uneven concrete. Recommended 50% for balanced efficiency and homogeneity. Source: Process optimization
      studies in J. Laser Appl. (2021) and manufacturer guidelines from Adapt Laser Systems.'
component_summary: These settings deliver moderate power with short 12 ns pulses at 1064 nm to ablate contaminants from concrete's
  tough surface while minimizing thermal stress that could cause cracking.
