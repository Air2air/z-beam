  power:
    min: 20
    max: 500
    value: 100
    unit: W
    description: 'Typical range for industrial 1064 nm pulsed laser cleaning of reflective
      metals like tin to balance efficiency and avoid melting (tin melting point ~232°C);
      starting at 100W for light contamination. Max safe ~300-500W with proper pulsing
      to prevent substrate damage due to high reflectivity (~70% at 1064 nm). Source:
      Manufacturer specs (e.g., IPG Photonics YLR series for metal cleaning); academic
      review in ''Laser Cleaning'' by Kononenko et al. (Optics & Lasers in Engineering,
      2016).'
  scan_speed:
    min: 10
    max: 5000
    value: 1000
    unit: mm/s
    description: 'Range for effective contaminant removal on tin; slower speeds (100-500
      mm/s) for heavy oxides, faster (2000-5000 mm/s) for light surface prep. Recommended
      1000 mm/s for optimal balance of cleaning rate and heat input, considering tin''s
      thermal conductivity (~67 W/m·K). Source: Industry standards from Laser Institute
      of America guidelines; equipment manuals (e.g., CleanLaser CL series).'
  pulse_width:
    min: 0.1
    max: 1000
    unit: ns
    value: 20
    description: 'Nanosecond regime (5-200 ns) preferred for industrial tin cleaning
      to ablate contaminants without excessive heat; picosecond (ps) or femtosecond
      (fs) for ultra-minimal HAZ but costlier. 20 ns recommended for tin to minimize
      thermal effects on reflective, low-melting substrate. Source: Laser physics
      research in ''Ultrashort Pulse Laser Ablation'' by Bauerle (Laser Processing
      and Chemisty, 2011); studies on metal ablation thresholds.'
  repetition_rate:
    min: 1
    max: 200
    unit: kHz
    value: 30
    description: 'Typical 10-100 kHz for pulsed cleaning; 30 kHz recommended for tin
      to achieve fast coverage without excessive heat accumulation (trade-off: higher
      rates speed up process but risk melting if fluence too high). Lower rates for
      heavy contamination. Source: Academic literature, e.g., ''Pulsed Laser Cleaning
      of Metals'' in Journal of Applied Physics (Anisimov et al., 2018).'
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Fluence range for contaminant removal on tin; ablation threshold
      ~0.5-1 J/cm² for ns pulses at 1064 nm, damage threshold ~3-5 J/cm² to avoid
      substrate melting. Recommended 1.5 J/cm² for safe cleaning of light contaminants,
      accounting for high reflectivity reducing effective absorption. Source: Ablation
      threshold studies, e.g., ''Laser Ablation of Tin'' in Applied Surface Science
      (Lorenz et al., 2009); conservative for industrial use.'
  spot_size:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Beam diameter range: 50-200 μm for fine detail on tin surfaces (e.g.,
      electronics), 500-1000 μm for large-area industrial prep. 200 μm recommended
      for uniform cleaning without over-focusing heat on low-melting tin. Source:
      Equipment specifications from Coherent and Trumpf laser systems for cleaning
      applications.'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass (2-5) for heavy
      layers on tin to ensure complete removal without cumulative damage. Recommended
      2 passes for typical industrial surface preparation, allowing cooling between
      passes. Source: Industry practice in case studies, e.g., ''Laser Cleaning of
      Metallic Substrates'' (SPI Lasers application notes); empirical from metal cleaning
      trials.'
  overlap_ratio:
    min: 10
    max: 90
    value: 50
    unit: '%'
    description: '30-80% overlap for uniform coverage in scanned cleaning; 50% recommended
      for tin to avoid gaps or uneven heating, optimizing for reflective surfaces
      and contamination uniformity. Higher overlap for heavy soiling. Source: Process
      optimization studies in ''Laser Surface Cleaning'' (Optics and Lasers in Engineering,
      2020); manufacturer guidelines (e.g., Adapt Laser Systems).'
