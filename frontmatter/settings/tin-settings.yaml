machine_settings:
  powerRange:
    description: Optimal average power for Tin oxide removal without substrate damage
    unit: W
    value: 45
  wavelength:
    description: Near-IR wavelength for efficient Tin oxide absorption with minimal substrate heating
    unit: nm
    value: 1064
  spotSize:
    description: Beam spot diameter for precise Tin surface cleaning
    unit: μm
    value: 80
  repetitionRate:
    description: Optimal repetition rate for efficient Tin cleaning with thermal management
    unit: kHz
    value: 50
  fluenceThreshold:
    description: Minimum fluence required for Tin oxide ablation threshold
    unit: J/cm²
    value: 2.5
  pulseWidth:
    description: Nanosecond pulse duration for controlled Tin oxide ablation
    unit: ns
    value: 12
  scanSpeed:
    description: Optimal scanning speed for uniform Tin oxide removal
    unit: mm/s
    value: 500
  passCount:
    description: Recommended number of passes for complete Tin oxide removal
    unit: passes
    value: 2
  overlapRatio:
    description: Optimal beam overlap for uniform Tin surface cleaning
    unit: '%'
    value: 50
challenges:
  thermal_management:
  - challenge: High thermal conductivity and heat spread
    severity: medium
    property_value: 4-400 W/(m·K) depending on metal
    impact: Heat spreads rapidly causing large heat-affected zones
    solutions:
    - Use shorter pulse durations (picosecond/femtosecond) for localized heating
    - Increase scan speed to minimize dwell time
    - Apply cooling between passes for thick sections
  - challenge: Melting and heat-affected zone formation
    severity: high
    threshold_range: 660°C (Al) to 3422°C (W)
    impact: Substrate melting or microstructural changes in heat-affected zone
    solutions:
    - Stay below 70% of melting temperature
    - Use pulse mode with adequate cooling time
    - Monitor for surface discoloration indicating oxidation
  surface_characteristics:
  - challenge: High reflectivity
    severity: high
    reflectivity_range: 60-95% at 1064nm for polished metals
    impact: Most laser energy reflected, requiring higher power; safety hazard
    solutions:
    - Use shorter wavelengths (355nm UV) for better absorption
    - Increase power density but monitor for thermal damage
    - Ensure proper beam containment and safety measures
    - Surface oxidation/roughness improves absorption
  - challenge: Surface finish variations
    severity: medium
    impact: Polished surfaces reflect more, rough surfaces absorb better
    solutions:
    - Adjust power based on surface condition
    - Test parameters on similar finish samples
    - Polished surfaces need 20-40% more power
  contamination_challenges:
  - challenge: Rust and oxide layer removal
    severity: medium
    impact: Requires multiple passes; rust/oxide has different absorption than base metal
    solutions:
    - First pass at higher power (100-120W) to remove bulk oxide
    - Second pass at lower power (60-80W) for final cleaning
    - Monitor for base metal exposure to avoid over-processing
  - challenge: Oil and grease removal
    severity: low
    impact: Organic contaminants vaporize easily but can redeposit
    solutions:
    - Use fume extraction to prevent redeposition
    - Higher scan speeds (3000-5000 mm/s) for thin films
    - Chemical pre-cleaning for heavy contamination
settings_description: When laser cleaning Tin, make sure you start with the lowest possible power settings right away, because
  its low melting point means the surface can soften or deform quickly if heat builds up. You'll need to adjust by using short
  pulses and slower scan speeds to control the energy input, so the contaminants lift off without damaging the soft base material.
  This approach works well for Tin's high reflectivity too, which scatters the beam and slows absorption—keep passes minimal
  and overlap low to avoid uneven spots. Watch out for overexposure on thin layers, as it might lead to pitting; instead,
  test on a small area first and build up gradually for clean results in electronics or heritage work.
