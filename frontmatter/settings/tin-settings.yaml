description: >-
  When laser cleaning Tin, make sure you start with the lowest possible power settings right away, because its low
  melting point means the surface can soften or deform quickly if heat builds up. You'll need to adjust by using short
  pulses and slower scan speeds to control the energy input, so the contaminants lift off without damaging the soft base
  material. This approach works well for Tin's high reflectivity too, which scatters the beam and slows absorption—keep
  passes minimal and overlap low to avoid uneven spots. Watch out for overexposure on thin layers, as it might lead to
  pitting; instead, test on a small area first and build up gradually for clean results in electronics or heritage work.
