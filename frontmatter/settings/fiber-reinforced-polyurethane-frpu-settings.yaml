  power:
    min: 50
    max: 200
    value: 100
    unit: W
    description: 'Typical range for polymer composites like FRPU to balance cleaning efficiency and avoid thermal degradation;
      starting at 100W for light contamination. Max safe ~150-200W before substrate melting (polyurethane degrades ~200°C).
      Source: IPG Photonics fiber laser specs for cleaning; studies on polymer ablation (e.g., J. Appl. Phys. 2018).'
  scan_speed:
    min: 10
    max: 5000
    value: 1500
    unit: mm/s
    description: 'Effective for contamination removal on low-conductivity FRPU; slower for heavy contamination (500-1000 mm/s),
      faster for light (2000-3000 mm/s). Recommended 1500 mm/s for optimal balance. Source: Industry standards from Laserax
      and Adapt-Laser manuals for composite cleaning.'
  pulse_width:
    min: 0.1
    max: 1000
    value: 50
    unit: ns
    description: 'Nanosecond regime preferred for cost-effective cleaning of polymers; picosecond (ps) or femtosecond (fs)
      for ultra-minimal HAZ but overkill for FRPU. 50 ns minimizes heat-affected zone while ablating contaminants. Source:
      Laser physics research on polymer ablation (Opt. Lasers Eng. 2020).'
  repetition_rate:
    min: 1
    max: 200
    value: 40
    unit: kHz
    description: 'Typical for pulsed fiber lasers in cleaning; 40 kHz recommended for FRPU to enable fast processing without
      excessive heat accumulation in low-thermal-conductivity material. Higher rates (>60 kHz) risk buildup. Source: Academic
      literature on composite laser processing (Composites Part B, 2019).'
  energy_density:
    min: 0.1
    max: 20.0
    value: 0.8
    unit: J/cm²
    description: 'Fluence range for safe contaminant removal on FRPU; damage threshold ~1.5-2.5 J/cm² due to polyurethane''s
      low melting point (~180-250°C) and moderate 1064 nm absorption. Recommended 0.8 J/cm² for cleaning without substrate
      harm. Source: Ablation threshold studies (Appl. Surf. Sci. 2017).'
  spot_size:
    min: 0.1
    max: 500
    value: 150
    unit: μm
    description: 'Beam diameter for precise cleaning on FRPU surfaces; smaller (50-100 μm) for fine details, larger (200-300
      μm) for broad areas. 150 μm recommended for uniform coverage in industrial prep. Source: Equipment specs from Coherent
      and Trumpf laser systems.'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass (2-4) for heavy; 2 passes recommended for complete FRPU
      cleaning to ensure removal without overexposure. Source: Industry case studies on polymer composite cleaning (J. Clean.
      Prod. 2021).'
  overlap_ratio:
    min: 10
    max: 90
    value: 60
    unit: '%'
    description: 'Ensures uniform coverage on irregular FRPU surfaces; 60% recommended for even cleaning without gaps or excessive
      overlap-induced heat. Typical 30-80% range. Source: Process optimization studies (Opt. Laser Technol. 2019).'
challenges:
  thermal_management:
  - challenge: Matrix degradation and delamination
    severity: critical
    threshold_temperature: Polymer matrix 150-350°C, ceramic matrix >1000°C
    impact: Heat causes matrix decomposition, fiber-matrix debonding, and layer separation
    solutions:
    - Use pulse mode with 5-10 second cooling for polymer-matrix composites
    - Reduce power by 40-50% compared to monolithic materials
    - Monitor for discoloration, bubbling, or layer lifting
    - Ceramic and metal-matrix composites tolerate higher power
  - challenge: Anisotropic thermal properties
    severity: high
    property_value: 10-100x variation parallel vs perpendicular to fibers
    impact: Heat conducts rapidly along fibers but poorly across layers
    solutions:
    - Scan parallel to fiber direction for best heat dissipation
    - Use crosshatch pattern (0° and 90°) to identify fiber orientation
    - Increase cooling time 2-3x when scanning perpendicular to fibers
    - Carbon fiber composites require special attention due to electrical conductivity
  surface_characteristics:
  - challenge: Fiber exposure and damage
    severity: high
    impact: Aggressive cleaning exposes or damages reinforcing fibers
    solutions:
    - Use low energy density (0.5-2 J/cm²) to protect matrix
    - Multiple gentle passes preferred over single aggressive pass
    - Stop immediately if fibers become visible
    - Fiber-rich surfaces (woven cloth) more sensitive than particle-filled
  - challenge: Surface finish variability
    severity: medium
    impact: Gel coat, paint, or protective layers alter absorption and damage threshold
    solutions:
    - Test on edge or hidden area first
    - Coated surfaces may require 50-100W initial pass for coating removal
    - Bare composite requires 30-50% lower power
    - Adjust parameters when transitioning between coated and uncoated areas
  contamination_challenges:
  - challenge: Resin-based contaminant removal
    severity: medium
    impact: Adhesives, sealants, and coatings chemically bond to matrix
    solutions:
    - First pass 80W fast (1500 mm/s) for bulk removal
    - Second pass 50W slow (800 mm/s) for residue
    - Chemical pre-treatment improves results for stubborn adhesives
    - Monitor for matrix damage; stop if surface texture changes
description: When laser cleaning Fiber Reinforced Polyurethane, we typically begin with a gentle power setup to match its
  flexible yet tough composite structure. This material absorbs laser energy well, so it clears contaminants quickly without
  deep penetration. But watch out mid-process—its low heat spread can cause localized overheating, leading to fiber-matrix
  separation. We've found multiple light passes at steady speeds fix that, restoring the surface evenly for aerospace or automotive
  parts.
