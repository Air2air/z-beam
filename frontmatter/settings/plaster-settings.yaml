  power:
    min: 50
    max: 500
    value: 100
    unit: W
    description: 'Typical range for industrial laser cleaning of delicate materials like plaster to avoid thermal damage;
      starting at 100 W for light contamination removal. Max safe below 500 W to prevent substrate cracking due to plaster''s
      low thermal conductivity (~0.5 W/m·K). Source: Manufacturer specs from IPG Photonics YLR series and studies on laser
      cleaning of gypsum-based plasters (e.g., J. Cult. Herit. 2018).'
  scan_speed:
    min: 10
    max: 5000
    value: 1500
    unit: mm/s
    description: 'Effective range for 1064 nm cleaning on plaster; slower speeds (500-1000 mm/s) for heavy contamination,
      faster (2000-3000 mm/s) for light. Recommended 1500 mm/s balances efficiency and safety. Source: Industry standards
      from Laser Cleaning Europe guidelines and equipment manuals (e.g., Adapt Laser Systems).'
  pulse_width:
    min: 0.1
    max: 1000
    value: 20
    unit: ns
    description: 'Nanosecond regime preferred for cost-effective cleaning of plaster; picosecond (ps) or femtosecond reduces
      HAZ but less common at 1064 nm for industrial use. 20 ns minimizes heat accumulation on low-melting-point plaster (~150°C
      dehydration). Source: Laser physics research in Opt. Lasers Eng. (2015) on ablation of calcium sulfate materials.'
  repetition_rate:
    min: 1
    max: 200
    value: 30
    unit: kHz
    description: 'Typical for pulsed 1064 nm lasers in cleaning; 30 kHz recommended for plaster to achieve fast coverage without
      excessive heat buildup, trading off speed vs. thermal load. Higher rates (>50 kHz) risk accumulation on low-conductivity
      substrates. Source: Academic literature, e.g., Appl. Surf. Sci. (2019) on stone/plaster cleaning parameters.'
  energy_density:
    min: 0.1
    max: 20.0
    value: 0.8
    unit: J/cm²
    description: 'Fluence range for contaminant removal without ablating plaster; damage threshold ~1.5-2.0 J/cm² for gypsum
      due to reflectivity (~0.3 at 1064 nm) and low melting point. Recommended 0.8 J/cm² for safe surface preparation. Source:
      Ablation threshold studies in J. Appl. Phys. (2017) and historical artifact cleaning papers.'
  spot_size:
    min: 0.1
    max: 500
    unit: μm
    value: 300
    description: 'Beam diameter range for precision vs. area coverage; 300 μm recommended for plaster to focus energy on contaminants
      while sparing porous substrate. Smaller for fine details, larger for broad industrial prep. Source: Equipment specifications
      from Coherent and Trumpf laser cleaners.'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass (2-5) for heavy layers on plaster to gradually remove without
      damage. Recommended 2 passes for uniform results in industrial settings. Source: Industry case studies, e.g., restoration
      projects in Constr. Build. Mater. (2020).'
  overlap_ratio:
    min: 10
    max: 90
    value: 50
    unit: '%'
    description: 'Ensures uniform coverage without gaps or overexposure; 50% recommended for plaster cleaning to optimize
      energy distribution and minimize uneven heating. Typical 30-80% based on scan patterns. Source: Process optimization
      studies in Lasers Manuf. Mater. Process. (2016).'
challenges:
  thermal_management:
  - challenge: Moisture-induced spalling and explosive failure
    severity: critical
    threshold_temperature: Steam formation >100°C with trapped moisture
    impact: Trapped moisture converts to steam causing explosive surface spalling
    solutions:
    - Test moisture content before cleaning (>5% moisture requires drying)
    - Use pulse mode with 10-15 second cooling for wet materials
    - Reduce power by 50-60% for damp masonry
    - Allow 24-48 hours drying after rain before laser cleaning
    - Monitor for popping sounds or surface lifting; stop immediately
  - challenge: Low thermal diffusivity and heat accumulation
    severity: high
    property_value: 0.1-1.0 mm²/s (3-10x slower than metals)
    impact: Heat concentrates in surface layer causing thermal stress
    solutions:
    - Increase cooling time between passes (8-12 seconds)
    - Use low repetition rates (<20 kHz)
    - Defocused beam reduces peak intensity
    - Multiple gentle passes preferred over aggressive single pass
  surface_characteristics:
  - challenge: High porosity and deep contamination
    severity: high
    porosity_range: 10-25% (brick and concrete highly porous)
    impact: Contaminants penetrate deep into porous structure
    solutions:
    - Multiple progressive passes with power increase (50W → 80W → 100W)
    - Reduce scan speed for deeper penetration (400-600 mm/s)
    - Chemical pre-treatment for biological growth (algae, lichen)
    - Expect 3-5 passes for complete cleaning vs 1-2 for dense materials
  - challenge: Surface heterogeneity and aggregate exposure
    severity: medium
    impact: Mixed composition (cement matrix, aggregates, voids) causes variable absorption
    solutions:
    - Use moderate power (70-90W) suitable for both matrix and aggregates
    - Crosshatch scan pattern for uniform coverage
    - Monitor for differential ablation; adjust power if aggregates become prominent
    - Aged masonry more challenging than new construction
  contamination_challenges:
  - challenge: Paint and coating removal from porous substrate
    severity: medium
    impact: Paint penetrates into pores requiring deep cleaning without substrate damage
    solutions:
    - First pass 100W fast (1500 mm/s) for surface paint layer
    - Second pass 70W slow (800 mm/s) for paint in pores
    - Third pass 50W very slow (500 mm/s) for residual staining
    - Chemical stripping pre-treatment reduces laser exposure
    - Heritage masonry requires gentler approach (max 60W)
description: When we laser clean plaster, the biggest challenge is its fragile nature. It crumbles easily under too much heat.
  So we start low on power. This keeps the surface intact while removing dirt. We've found plaster's porous structure absorbs
  contaminants deeply. That means multiple gentle passes work best. Watch out for cracking in the middle of the process. It
  happens if you speed up too fast. Adjust the scan slowly. Plaster differs from stone because it's softer overall. So use
  wider spots to spread energy evenly. This avoids hot spots. In our experience, it cleans up nicely for heritage sites. Just
  stay patient and monitor closely.
