machineSettings:
  wavelength:
    description: Near-infrared wavelength optimized for plaster absorption and minimal substrate damage
    unit: nm
    value: 1064
    min: 355
    max: 10640
  spotSize:
    min: 0.1
    max: 500
    unit: μm
    value: 300
    description: 'Beam diameter range for precision vs. area coverage; 300 μm recommended for plaster to focus energy on contaminants
      while sparing porous substrate. Smaller for fine details, larger for broad industrial prep. Source: Equipment specifications
      from Coherent and Trumpf laser cleaners.'
  energyDensity:
    min: 0.1
    max: 20.0
    value: 0.8
    unit: J/cm²
    description: 'Fluence range for contaminant removal without ablating plaster; damage threshold ~1.5-2.0 J/cm² for gypsum
      due to reflectivity (~0.3 at 1064 nm) and low melting point. Recommended 0.8 J/cm² for safe surface preparation. Source:
      Ablation threshold studies in J. Appl. Phys. (2017) and historical artifact cleaning papers.'
  pulseWidth:
    min: 0.1
    max: 1000
    value: 20
    unit: ns
    description: 'Nanosecond regime preferred for cost-effective cleaning of plaster; picosecond (ps) or femtosecond reduces
      HAZ but less common at 1064 nm for industrial use. 20 ns minimizes heat accumulation on low-melting-point plaster (~150°C
      dehydration). Source: Laser physics research in Opt. Lasers Eng. (2015) on ablation of calcium sulfate materials.'
  scanSpeed:
    min: 10
    max: 5000
    value: 1500
    unit: mm/s
    description: 'Effective range for 1064 nm cleaning on plaster; slower speeds (500-1000 mm/s) for heavy contamination,
      faster (2000-3000 mm/s) for light. Recommended 1500 mm/s balances efficiency and safety. Source: Industry standards
      from Laser Cleaning Europe guidelines and equipment manuals (e.g., Adapt Laser Systems).'
  passCount:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass (2-5) for heavy layers on plaster to gradually remove without
      damage. Recommended 2 passes for uniform results in industrial settings. Source: Industry case studies, e.g., restoration
      projects in Constr. Build. Mater. (2020).'
  overlapRatio:
    min: 10
    max: 90
    value: 50
    unit: '%'
    description: 'Ensures uniform coverage without gaps or overexposure; 50% recommended for plaster cleaning to optimize
      energy distribution and minimize uneven heating. Typical 30-80% based on scan patterns. Source: Process optimization
      studies in Lasers Manuf. Mater. Process. (2016).'
  laserPower:
    description: Optimal average power for plaster surface cleaning without thermal damage
    unit: W
    value: 100
    min: 1.0
    max: 120
  laserPowerAlternative:
    min: 50
    max: 500
    value: 100
    unit: W
    description: 'Typical range for industrial laser cleaning of delicate materials like plaster to avoid thermal damage;
      starting at 100 W for light contamination removal. Max safe below 500 W to prevent substrate cracking due to plaster''s
      low thermal conductivity (~0.5 W/m·K). Source: Manufacturer specs from IPG Photonics YLR series and studies on laser
      cleaning of gypsum-based plasters (e.g., J. Cult. Herit. 2018).'
  frequency:
    min: 1
    max: 200
    value: 30
    unit: kHz
    description: 'Typical for pulsed 1064 nm lasers in cleaning; 30 kHz recommended for plaster to achieve fast coverage without
      excessive heat buildup, trading off speed vs. thermal load. Higher rates (>50 kHz) risk accumulation on low-conductivity
      substrates. Source: Academic literature, e.g., Appl. Surf. Sci. (2019) on stone/plaster cleaning parameters.'
componentSummary: These settings deliver moderate power with short nanosecond pulses at 1064 nm to gently ablate surface dirt
  from plaster's fragile, porous structure without causing thermal cracking or material loss.

