machineSettings:
  wavelength:
    description: Near-IR wavelength optimized for Zirconium's moderate absorption and thermal processing
    unit: nm
    value: 1064
    min: 355
    max: 10640
  spotSize:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Smaller spots (100-200 μm) for fine detail on Zr components (e.g., nuclear cladding); larger (300-500 μm)
      for broad areas. 200 μm recommended for uniform energy distribution on reflective surfaces. Source: Equipment specs
      (e.g., Coherent lasers) and industrial case studies.'
  energyDensity:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Fluence range for contaminant removal (e.g., oxides, rust) without ablating Zr substrate; damage threshold
      ~2.5-4 J/cm² due to high reflectivity. Recommended 1.5 J/cm² for safe surface prep. Conservative for Zr''s properties.
      Source: Ablation threshold studies on Zr (J. Phys. D: Appl. Phys. 2017; similar to Ti alloys).'
  pulseWidth:
    min: 0.1
    max: 1000
    unit: ns
    value: 20
    description: 'Nanosecond regime preferred for industrial cleaning of Zr to ablate contaminants with minimal HAZ; picosecond
      (5-50 ps) for ultra-low thermal effects but costlier. 20 ns recommended to limit plasma shielding on reflective surfaces.
      Source: Laser physics reviews (Opt. Lasers Eng. 2019) and ablation studies on Zr alloys.'
  scanSpeed:
    min: 10
    max: 5000
    value: 1500
    unit: mm/s
    description: 'Effective for light contamination (e.g., oxides) at higher speeds; slower (500-1000 mm/s) for heavy buildup.
      Recommended 1500 mm/s optimizes cleaning rate while minimizing heat input on Zr''s melting point (1855°C). Source: Industry
      manuals (e.g., CleanLaser systems) and process optimization in Nucl. Eng. Des. 2020.'
  passCount:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination; multi-pass (2-3) for heavy layers to avoid damage. Recommended 2 passes
      for complete Zr oxide removal without excessive heat. Source: Industry practice in nuclear decontamination (e.g., IAEA
      reports) and case studies on Zr alloys.'
  overlapRatio:
    min: 10
    max: 90
    value: 70
    unit: '%'
    description: 'Ensures uniform coverage on irregular Zr surfaces; 50% for speed, 80% for thoroughness. 70% recommended
      to prevent gaps while minimizing over-processing and heat buildup. Source: Process optimization studies (Opt. Laser
      Technol. 2022) for metal cleaning.'
  dwellTime:
    description: Effective interaction time per spot for controlled material removal
    unit: μs
    value: 100
    min: 0.2
    max: 200
  laserPower:
    description: Optimal average power for Zirconium oxide removal without substrate damage
    unit: W
    value: 100
    min: 1.0
    max: 120
  laserPowerAlternative:
    min: 50
    max: 500
    value: 150
    unit: W
    description: 'Typical range for pulsed fiber lasers cleaning reflective metals like zirconium; starting at 150 W balances
      efficiency and avoids overheating due to Zr''s high reflectivity (~90% at 1064 nm). Max safe before damage ~500 W based
      on thermal conductivity (21 W/mK). Source: IPG Photonics specs and studies on metal decontamination (e.g., J. Laser
      Appl. 2018).'
  frequency:
    min: 1
    max: 200
    value: 30
    unit: kHz
    description: 'Typical for 1064 nm cleaning; higher rates (>50 kHz) speed up process but risk heat accumulation on low-conductivity
      Zr. 30 kHz balances throughput and safety. Trade-off: faster cleaning vs. potential subsurface heating. Source: Academic
      literature on pulsed laser cleaning (Appl. Surf. Sci. 2021).'
componentSummary: These settings suit zirconium cleaning by leveraging 1064 nm wavelength for optimal absorption, 10 ns pulses
  to minimize thermal oxidation, and 150 W power for precise contaminant removal without substrate damage.

