  power:
    min: 10
    max: 200
    value: 50
    unit: W
    description: 'Typical range for industrial laser cleaning of semiconductors like Silicon to balance efficiency and avoid
      thermal damage; starting at 50 W for light contamination. Max safe below ~200 W to prevent melting (Silicon melting
      point 1414°C). Source: IPG Photonics YLR series specs for cleaning applications; academic review in Optics and Lasers
      in Engineering (2018).'
  scan_speed:
    min: 10
    max: 5000
    value: 1000
    unit: mm/s
    description: 'Effective range for 1064 nm cleaning; 1000 mm/s optimal for uniform contaminant removal on Silicon without
      excessive heat buildup due to its high thermal conductivity (~150 W/m·K). Light contamination: 2000-5000 mm/s; heavy:
      100-500 mm/s. Source: Industry standards from Laserline GmbH manuals; case studies in Journal of Applied Physics (2020).'
  pulse_width:
    min: 0.1
    max: 1000
    value: 20
    unit: ns
    description: 'Nanosecond regime (5-200 ns) common for industrial 1064 nm cleaning of Silicon; 20 ns recommended for minimal
      heat-affected zone (HAZ <10 μm) by confining energy to surface ablation. Picosecond (ps) or femtosecond (fs) better
      for ultra-precision but costlier; ns sufficient for contamination removal. Source: Laser physics research in Applied
      Surface Science (2019); avoids reflectivity issues at 1064 nm (~35% for Silicon).'
  repetition_rate:
    min: 1
    max: 200
    value: 50
    unit: kHz
    description: 'Typical 10-100 kHz for pulsed cleaning; 50 kHz recommended for Silicon to achieve fast coverage while limiting
      heat accumulation (trade-off: higher rates speed up process but risk thermal stress). Lower rates for heavy contamination.
      Source: Academic literature in Optics Express (2021); based on Silicon''s moderate IR absorption.'
  energy_density:
    min: 0.1
    max: 20.0
    value: 0.5
    unit: J/cm²
    description: 'Fluence range for safe cleaning below Silicon''s ablation threshold (~1-3 J/cm² at 1064 nm); 0.5 J/cm² recommended
      to remove contaminants without substrate damage. Damage threshold ~2 J/cm² for ns pulses. Conservative for Silicon''s
      reflectivity. Source: Ablation threshold studies in Physical Review B (2017); Journal of Laser Applications (2022).'
  spot_size:
    min: 0.1
    max: 500
    unit: μm
    value: 200
    description: 'Typical beam diameter for cleaning; 200 μm recommended for Silicon surface preparation, balancing resolution
      for fine features and coverage for larger areas. Smaller (50-100 μm) for detailed work; larger (300-500 μm) for broad
      contamination. Source: Equipment specs from Coherent ArmoClean systems; industry optimization in Surface and Coatings
      Technology (2020).'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: '1-5 passes typical for complete removal; 2 passes recommended for Silicon to ensure thorough cleaning of
      industrial contaminants without overexposure. Single pass for light layers; multi-pass for heavy or uneven. Source:
      Industry practice in semiconductor processing case studies, e.g., SPIE Proceedings (2019).'
  overlap_ratio:
    min: 10
    max: 90
    value: 60
    unit: '%'
    description: '30-80% overlap for uniform coverage; 60% recommended for Silicon cleaning to avoid gaps or streaks while
      minimizing total energy input and heat. Higher (70-80%) for fine uniformity; lower (30-50%) for speed on large areas.
      Source: Process optimization studies in Lasers in Manufacturing and Materials Processing (2021).'
component_summary: The 1064 nm wavelength ensures efficient absorption in silicon, while 50 W power and 100 ns pulses enable
  precise contaminant removal without causing thermal damage to the sensitive semiconductor surface.
