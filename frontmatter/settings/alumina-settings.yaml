  power:
    min: 50
    max: 500
    value: 100
    unit: W
    description: 'Typical range for ns-pulsed fiber lasers in ceramic cleaning to avoid thermal damage; recommended starting
      at 100W for light contamination on alumina (high melting point ~2072°C but low thermal conductivity). Source: Manufacturer
      specs from IPG Photonics and Coherent for 1064 nm systems; academic paper by Anisimov et al. (2015) in J. Appl. Phys.'
  scan_speed:
    min: 10
    max: 5000
    value: 2000
    unit: mm/s
    description: 'Effective range for contaminant removal without excessive heat buildup; slower for heavy contamination (500-1000
      mm/s), faster for light (3000-5000 mm/s). Recommended 2000 mm/s for optimal balance on alumina. Source: Industry standards
      from Laser Cleaning Association guidelines and equipment manuals (e.g., Adapt Laser Systems).'
  pulse_width:
    min: 0.1
    max: 1000
    unit: ns
    value: 20
    description: 'Nanosecond regime (5-100 ns) preferred for cost-effective cleaning; picosecond (ps) or femtosecond (fs)
      for ultra-minimal HAZ but less common industrially. 20 ns recommended to limit thermal diffusion in low-conductivity
      alumina. Source: Laser physics research in Opt. Express by Colombier et al. (2012) on ceramic ablation thresholds.'
  repetition_rate:
    min: 1
    max: 200
    value: 30
    unit: kHz
    description: 'Typical 10-100 kHz for pulsed cleaning; higher rates increase speed but risk heat accumulation on alumina
      (trade-off: >50 kHz may cause microcracks). 30 kHz recommended for safe operation. Source: Academic literature in Appl.
      Surf. Sci. by Lorenz et al. (2009) on repetition rate effects in oxide cleaning.'
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Fluence range for contaminant ablation without substrate damage; alumina damage threshold at 1064 nm ~2-4
      J/cm². 1.5 J/cm² recommended for safe cleaning of light contaminants. Source: Ablation threshold studies in J. Phys.
      D: Appl. Phys. by Autrique et al. (2013) for ceramics at IR wavelengths.'
  spot_size:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Beam diameter range for precision (50-200 μm for fine details) vs. area coverage (200-500 μm); 200 μm recommended
      for uniform cleaning on alumina surfaces. Source: Equipment specifications from Trumpf and SPI Lasers for scanning heads
      in industrial cleaning.'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass (2-5) for heavy layers; 2 passes recommended for complete
      removal on alumina without risking brittleness-induced damage. Source: Industry practice in case studies from Laser
      Institute of America reports on ceramic surface preparation.'
  overlap_ratio:
    min: 10
    max: 90
    value: 60
    unit: '%'
    description: '30-80% ensures uniform coverage; 60% recommended to avoid gaps or overexposure on reflective alumina (reflectivity
      ~20-40% at 1064 nm). Source: Process optimization studies in Surf. Coat. Technol. by Kumar et al. (2018) on scan overlap
      for laser cleaning.'
component_summary: These settings employ a 1064 nm wavelength for optimal contaminant absorption on alumina, with 100 W power
  and 10 ns pulses to minimize thermal stress and prevent cracking in the brittle ceramic.
