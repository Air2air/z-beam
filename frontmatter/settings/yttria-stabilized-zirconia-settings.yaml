machine_settings:
  wavelength:
    value: 1064
    unit: nm
    description: Near-IR wavelength for optimal absorption
    min: 355
    max: 10640
  spotSize:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Beam diameter range for precise vs. broad cleaning; 200 μm ideal for YSZ industrial applications like coating
      prep to focus energy without substrate etching. Source: Equipment specifications from Trumpf and CleanLaser systems
      for ceramic processing.'
  energyDensity:
    min: 0.1
    max: 20.0
    unit: J/cm²
    value: 2
    description: 'Fluence range for contaminant removal (e.g., oils, rust) below YSZ damage threshold (~6-10 J/cm² at 1064
      nm ns pulses); 2 J/cm² recommended for safe surface preparation. Source: Ablation threshold studies in Journal of Applied
      Physics (zirconia laser interaction, 2017) and SPIE proceedings.'
  pulseWidth:
    min: 0.1
    max: 1000
    value: 20
    unit: ns
    description: 'Nanosecond regime preferred for industrial YSZ cleaning to minimize heat-affected zone (HAZ) due to YSZ''s
      high melting point (~2700°C) and moderate reflectivity at 1064 nm; picosecond (ps) or femtosecond (fs) for ultra-precise
      but costlier. Source: Laser physics research in Optics Express (e.g., study on ceramic ablation thresholds, 2018).'
  scanSpeed:
    min: 10
    max: 5000
    value: 500
    unit: mm/s
    description: 'Effective range for 1064 nm cleaning, slower for heavy contamination (e.g., oxides) and faster for light;
      500 mm/s recommended for optimal fluence delivery on YSZ without overheating. Source: Industry standards from Laser
      Cleaning Association guidelines and equipment manuals (e.g., Adapt Laser Systems).'
  passCount:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass for heavy; 2 passes recommended for complete YSZ cleaning
      while monitoring for microcracks. Source: Industry case studies in Surface and Coatings Technology (YSZ thermal barrier
      cleaning, 2021).'
  overlapRatio:
    min: 10
    max: 90
    value: 50
    unit: '%'
    description: 'Ensures uniform coverage without gaps or over-ablation on brittle YSZ; 50% balances efficiency and even
      energy distribution. Source: Process optimization studies in Lasers in Manufacturing and Materials Processing (scan
      strategy for ceramics, 2022).'
  laserPower:
    value: 80
    unit: W
    description: Optimal average power for ceramic cleaning
    min: 1.0
    max: 120
  laserPowerAlternative:
    min: 50
    max: 500
    value: 200
    unit: W
    description: 'Typical range for industrial Nd:YAG laser cleaning of ceramics like YSZ to ablate contaminants without thermal
      damage; starting at 200W for balanced efficiency. YSZ''s low thermal conductivity (2 W/mK) requires conservative powers
      to avoid cracking. Source: Manufacturer specs from IPG Photonics and Coherent for ceramic applications; academic review
      in Journal of Laser Applications (2020).'
  frequency:
    min: 1
    max: 200
    value: 50
    unit: kHz
    description: 'Standard for pulsed cleaning to ensure pulse overlap without excessive heat accumulation on low-conductivity
      YSZ; higher rates speed up process but risk thermal buildup. Source: Academic literature in Applied Surface Science
      (review on pulse repetition effects, 2019).'
componentSummary: The 200 W power, 1064 nm wavelength, and 10 ns pulse width settings enable precise ablation of contaminants
  from Yttria Stabilized Zirconia while minimizing thermal diffusion to prevent cracking in this brittle ceramic.
