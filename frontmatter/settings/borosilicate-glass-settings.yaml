pageTitle: Borosilicate Glass Settings
pageDescription: We've found that when laser cleaning borosilicate glass, you need to start with gentle power levels right
  away, since its brittle nature compared to tougher metals can lead to cracks if heat builds up too fast. Begin by scanning
  slowly to let its superior heat resistance—unlike everyday soda-lime glass—absorb energy without shocking the surface. Then,
  increase passes gradually, overlapping beams to clear contaminants evenly while preserving the glass's clarity and strength
  for lab or medical uses.
