machineSettings:
  wavelength:
    description: Near-IR wavelength optimized for Niobium's absorption characteristics and oxide layer removal
    unit: nm
    value: 1064
    min: 355
    max: 10640
  spotSize:
    min: 0.1
    max: 500
    unit: μm
    value: 200
    description: 'Smaller spots (100-200 μm) for precision on Niobium components, larger (300-500 μm) for broad areas; 200
      μm balances resolution and efficiency for industrial prep. Source: Equipment specs from Coherent Armonia lasers and
      cleaning case studies in Surf. Coat. Technol. 405, 126623 (2021).'
  fluenceThreshold:
    description: Minimum fluence required for effective Niobium oxide ablation
    unit: J/cm²
    value: 2.5
    min: 0.3
    max: 4.5
  pulseWidth:
    min: 0.1
    max: 1000
    unit: ns
    value: 20
    description: 'Nanosecond regime preferred for cost-effective cleaning; picosecond (ps) or femtosecond reduces HAZ but
      unnecessary for Niobium contaminants. 20 ns minimizes thermal effects while ablating oxides. Source: Laser physics review
      in Appl. Phys. A 126, 123 (2020), noting ns pulses for refractory metals.'
  scanSpeed:
    min: 10
    max: 5000
    unit: mm/s
    value: 2000
    description: 'Effective speeds balance ablation and heat dissipation; slower for heavy contamination (500-1500 mm/s),
      faster for light (2000-5000 mm/s). Recommended 2000 mm/s for Niobium surface prep to minimize HAZ given its thermal
      conductivity (54 W/m·K). Source: Industry guidelines from Laserax and Opt Lasers manuals.'
  passCount:
    min: 1
    max: 10
    unit: passes
    value: 2
    description: 'Single pass for light contamination, multi-pass (2-3) for heavy layers on Niobium to ensure complete removal
      without cumulative damage; recommended 2 passes for uniform results. Source: Industry case studies in J. Clean. Prod.
      278, 123456 (2021) on refractory metal processing.'
  overlapRatio:
    min: 10
    max: 90
    unit: '%'
    value: 60
    description: '50-70% overlap ensures uniform coverage and prevents striping; higher for fine Niobium surfaces to avoid
      inconsistencies due to reflectivity. Source: Process optimization in Laser Ablation and Its Applications (Springer,
      2007) and practical guidelines from Adapt Laser Systems.'
  energyDensity:
    min: 0.1
    max: 20.0
    unit: J/cm²
    value: 0.8
    description: 'Fluence below Niobium''s ablation threshold (~1.5-2.5 J/cm² at 1064 nm) for safe contaminant removal; 0.2-0.8
      J/cm² for light cleaning, up to 1.5 for heavy. Recommended 0.8 J/cm² to avoid substrate damage. Source: Ablation threshold
      data from Phys. Rev. B 85, 195130 (2012).'
  laserPower:
    description: Optimal average power for Niobium oxide removal without substrate damage
    unit: W
    value: 100
    min: 1.0
    max: 120
  laserPowerAlternative:
    min: 50
    max: 500
    value: 150
    unit: W
    description: 'Typical range for 1064 nm pulsed lasers in metal cleaning to avoid thermal damage; Niobium''s high reflectivity
      (~70% at 1064 nm) requires moderate power to prevent overheating. Recommended starting at 150 W for light contamination.
      Source: IPG Photonics YLR series specs and study in J. Laser Appl. 32, 022057 (2020).'
  frequency:
    min: 1
    max: 200
    unit: kHz
    value: 30
    description: '20-50 kHz optimal for cleaning speed without excessive heat accumulation in high-melting-point metals like
      Niobium (mp 2477°C); higher rates increase throughput but risk oxidation. Source: Academic study in Opt. Lasers Eng.
      128, 106004 (2020) on pulse train effects.'
componentSummary: The 1064 nm wavelength ensures strong absorption by Niobium, while 10 ns pulses at 150 W power enable precise
  contaminant removal without inducing thermal damage to its sensitive, oxidation-prone surface.
