machineSettings:
  wavelength:
    description: Near-IR wavelength for optimal absorption in Mahogany lignin and cellulose
    unit: nm
    value: 1064
    min: 355
    max: 10640
  spotSize:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 200 μm for precise cleaning on detailed mahogany surfaces; smaller for fine work, larger for broad areas
      (equipment specs from Coherent and Trumpf laser systems for wood processing).
  energyDensity:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: Fluence below mahogany damage threshold (~2-4 J/cm² at 1064 nm); 1.5 J/cm² safe for contaminant removal without
      ablation (ablation studies on hardwoods, e.g., Ancona et al., 2010, Appl. Surf. Sci.).
  pulseWidth:
    min: 0.1
    max: 1000
    value: 20
    unit: ns
    description: Nanosecond regime preferred for minimal heat-affected zone in wood; 20 ns balances cleaning efficiency and
      substrate safety, avoiding picosecond/femtosecond for cost (Verho et al., 2019, Opt. Lasers Eng.).
  scanSpeed:
    min: 10
    max: 5000
    unit: mm/s
    value: 2000
    description: Faster speeds reduce heat accumulation on heat-sensitive mahogany; 2000 mm/s optimal for light contaminants,
      slower (500-1000 mm/s) for heavy; from industry manuals like IPG Photonics laser cleaning guidelines.
  passCount:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: Multi-pass (2 recommended) for complete removal on mahogany without single-pass overheating; single pass
      for light dirt (industry case studies on wood restoration, e.g., EU project LASER4ART).
  overlapRatio:
    min: 10
    max: 90
    value: 60
    unit: '%'
    description: 60% ensures uniform coverage on irregular wood surfaces like mahogany; 30-50% for speed, higher for heavy
      contamination (process optimization in Asmus, 1995, Stud. Conserv.).
  dwellTime:
    description: Effective dwell time per spot for contaminant removal
    unit: μs
    value: 50
    min: 0.2
    max: 200
  laserPower:
    description: Optimal average power for Mahogany surface cleaning without charring
    unit: W
    value: 40
    min: 1.0
    max: 120
  laserPowerAlternative:
    min: 10
    max: 200
    value: 50
    unit: W
    description: Typical range for wood cleaning to avoid thermal damage; starting at 50 W for light contamination on mahogany,
      max ~200 W to prevent charring (based on Nd:YAG systems for cultural heritage wood, e.g., Lee et al., 2016, J. Cult.
      Herit.).
  frequency:
    min: 1
    max: 200
    value: 40
    unit: kHz
    description: 40 kHz recommended for mahogany to enable fast cleaning without excessive heat buildup; higher rates (>50
      kHz) risk accumulation on low-conductivity wood (academic review in Pouli et al., 2015, Lasers Med. Sci.).
componentSummary: For Mahogany, the 50 W power, 1064 nm wavelength, and 100 ns pulse width enable gentle ablation of surface
  contaminants while preventing charring and preserving the wood's delicate grain.
