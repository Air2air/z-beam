  power:
    min: 10
    max: 200
    value: 50
    unit: W
    description: Typical range for wood cleaning to avoid thermal damage; starting at 50 W for light contamination on mahogany,
      max ~200 W to prevent charring (based on Nd:YAG systems for cultural heritage wood, e.g., Lee et al., 2016, J. Cult.
      Herit.).
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 2000
    description: Faster speeds reduce heat accumulation on heat-sensitive mahogany; 2000 mm/s optimal for light contaminants,
      slower (500-1000 mm/s) for heavy; from industry manuals like IPG Photonics laser cleaning guidelines.
  pulse_width:
    min: 0.1
    max: 1000
    value: 20
    unit: ns
    description: Nanosecond regime preferred for minimal heat-affected zone in wood; 20 ns balances cleaning efficiency and
      substrate safety, avoiding picosecond/femtosecond for cost (Verho et al., 2019, Opt. Lasers Eng.).
  repetition_rate:
    min: 1
    max: 200
    value: 40
    unit: kHz
    description: 40 kHz recommended for mahogany to enable fast cleaning without excessive heat buildup; higher rates (>50
      kHz) risk accumulation on low-conductivity wood (academic review in Pouli et al., 2015, Lasers Med. Sci.).
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: Fluence below mahogany damage threshold (~2-4 J/cm² at 1064 nm); 1.5 J/cm² safe for contaminant removal without
      ablation (ablation studies on hardwoods, e.g., Ancona et al., 2010, Appl. Surf. Sci.).
  spot_size:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 200 μm for precise cleaning on detailed mahogany surfaces; smaller for fine work, larger for broad areas
      (equipment specs from Coherent and Trumpf laser systems for wood processing).
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: Multi-pass (2 recommended) for complete removal on mahogany without single-pass overheating; single pass
      for light dirt (industry case studies on wood restoration, e.g., EU project LASER4ART).
  overlap_ratio:
    min: 10
    max: 90
    value: 60
    unit: '%'
    description: 60% ensures uniform coverage on irregular wood surfaces like mahogany; 30-50% for speed, higher for heavy
      contamination (process optimization in Asmus, 1995, Stud. Conserv.).
challenges:
  thermal_management:
  - challenge: Charring and carbonization
    severity: high
    threshold_temperature: 250-300°C
    impact: Wood chars at low temperatures leaving black marks and structural damage
    solutions:
    - Use pulse mode with 2-5 second cooling between passes
    - Reduce power by 30-40% compared to metals
    - Increase scan speed to reduce dwell time
    - Monitor surface for discoloration; stop if browning occurs
  - challenge: Slow thermal diffusivity
    severity: medium
    property_value: 0.10-0.15 mm²/s (100x slower than aluminum)
    impact: Heat accumulates rapidly causing thermal damage zones
    solutions:
    - Increase cooling time between passes
    - Use lower repetition rates (<20 kHz)
    - Apply crosshatch patterns to distribute heat
  surface_characteristics:
  - challenge: Grain direction sensitivity
    severity: medium
    variation: 20-40% absorption variation by grain orientation
    impact: Laser absorption varies significantly with grain direction
    solutions:
    - Scan parallel to grain for consistent results
    - Use crosshatch pattern (0° and 90°) for uniform cleaning
    - Test on scrap to determine optimal scan direction
  - challenge: Porous structure with deep contamination
    severity: medium
    porosity_range: 12-65% (softwoods highest)
    impact: Contaminants penetrate deep into wood structure
    solutions:
    - Multiple passes with progressive power increase
    - Reduce scan speed for deeper penetration (600 mm/s)
    - Chemical pre-treatment for deep-seated contamination
  contamination_challenges:
  - challenge: Varnish and coating removal
    severity: medium
    impact: Thick coatings require multiple passes and generate smoke/fumes
    solutions:
    - First pass 80W fast (1500 mm/s) for bulk removal
    - Second pass 60W slow (800 mm/s) for residue
    - Use fume extraction to prevent redeposition
    - Limit to 2-3 passes maximum to avoid substrate damage
description: When laser cleaning mahogany, start with a careful assessment of its high porosity, which can lead to uneven
  energy absorption if not managed. This property requires you to reduce power levels initially to prevent surface charring
  while ensuring the laser removes contaminants without embedding them deeper into the wood's open structure. Adjust scan
  speeds higher than for denser hardwoods to minimize heat buildup, restoring the material's natural grain effectively and
  avoiding cracks from thermal stress.
