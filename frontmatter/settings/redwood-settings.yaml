machineSettings:
  wavelength:
    description: Near-infrared wavelength optimized for Redwood lignin absorption
    unit: nm
    value: 1064
    min: 355
    max: 10640
  spotSize:
    min: 0.1
    max: 500
    unit: μm
    value: 200
    description: 'Beam diameter range for cleaning; smaller for fine details (100-200 μm), larger for broad areas (300-500
      μm). Recommended 200 μm for uniform redwood surface preparation without excessive overlap heating. Source: Equipment
      specifications from Coherent and Trumpf laser cleaners for industrial wood applications.'
  energyDensity:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Fluence range for contaminant removal; redwood damage threshold ~3-5 J/cm² at 1064 nm due to moderate absorption.
      Recommended 1.5 J/cm² for safe cleaning below threshold. Conservative estimate for variability in wood moisture. Source:
      Ablation threshold studies in Wood Sci. Technol. (2021) and J. Appl. Phys. (2015).'
  pulseWidth:
    min: 0.1
    max: 1000
    value: 20
    unit: ns
    description: 'Nanosecond regime preferred for 1064 nm cleaning of wood to minimize heat-affected zone (HAZ <50 μm); picosecond
      (ps) reduces HAZ further but increases cost. Avoid fs for industrial scale. Recommended 20 ns for redwood''s reflectivity
      (~20-30% at 1064 nm). Source: Laser physics research in Appl. Phys. A (2019) on pulsed laser ablation of lignocellulosic
      materials.'
  scanSpeed:
    min: 10
    max: 5000
    unit: mm/s
    value: 500
    description: 'Effective speeds for contaminant removal; slower for heavy soiling (100-500 mm/s), faster for light (1000-2000
      mm/s). Recommended 500 mm/s balances efficiency and heat control on redwood. Source: Industry standards from Laserax
      equipment manuals and Opt. Lasers Eng. (2020) case studies on wood preparation.'
  passCount:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass (2-5) for heavy; recommended 2 passes for complete removal
      on redwood while minimizing exposure time and damage. Source: Industry practice in restoration case studies, e.g., J.
      Cult. Herit. (2019) on laser cleaning of wooden artifacts.'
  overlapRatio:
    min: 10
    max: 90
    unit: '%'
    value: 50
    description: 'Typical for uniform coverage; 30-50% for speed, 50-80% for thoroughness. Recommended 50% to ensure even
      cleaning on redwood''s textured surface without gaps or over-ablation. Source: Process optimization studies in Proc.
      SPIE (2022) on scan strategies for laser surface treatment.'
  dwellTime:
    description: Optimal dwell time per cleaning spot
    unit: μs
    value: 100
    min: 0.2
    max: 200
  laserPower:
    description: Optimal power range for Redwood surface cleaning without charring
    unit: W
    value: 100
    min: 1.0
    max: 120
  laserPowerAlternative:
    min: 50
    max: 300
    value: 100
    unit: W
    description: 'Typical range for wood cleaning at 1064 nm to remove contaminants without charring; starting at 100 W allows
      controlled ablation. Max safe ~300 W to avoid thermal damage to redwood''s low thermal conductivity (~0.1 W/m·K). Source:
      Adapted from IPG Photonics YLR series specs for organic materials and study in J. Laser Appl. (2018) on wood surface
      cleaning.'
  frequency:
    min: 1
    max: 200
    value: 30
    unit: kHz
    description: 'Typical for cleaning applications; higher rates (>50 kHz) speed up process but risk heat accumulation on
      low-conductivity redwood, leading to carbonization. Recommended 30 kHz for balance. Source: Academic literature in Lasers
      Med. Sci. (2017) on pulse repetition effects in wood laser processing.'
componentSummary: These settings use moderate 100 W power and short 10 ns pulses at 1064 nm to gently ablate surface contaminants
  from Redwood, minimizing heat buildup and charring on its organic fibers.

