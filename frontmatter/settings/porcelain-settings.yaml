  power:
    min: 10
    max: 100
    value: 30
    unit: W
    description: 'Low power range for delicate ceramics like porcelain to avoid thermal cracking; typical for 1064 nm Nd:YAG
      systems in heritage and industrial cleaning. Recommended starting at 30 W for light contamination. Max safe ~100 W before
      risk of substrate damage due to low thermal conductivity (~1.5 W/mK). Source: Manufacturer specs (e.g., CleanLaser CL
      50 model) and studies on ceramic restoration (e.g., J. Cult. Herit. 2018).'
  scan_speed:
    min: 10
    max: 5000
    value: 500
    unit: mm/s
    description: 'Typical speeds balance cleaning efficiency and heat input; slower (100-500 mm/s) for heavy contamination,
      faster (500-2000 mm/s) for light. Recommended 500 mm/s for porcelain to minimize exposure time and prevent cracking.
      Source: Industry standards from laser cleaning equipment manuals (e.g., IPG Photonics) and process optimization in Opt.
      Lasers Eng. 2020.'
  pulse_width:
    min: 0.1
    max: 1000
    value: 20
    unit: ns
    description: 'Nanosecond regime preferred for 1064 nm cleaning of porcelain; picosecond (ps) or femtosecond (fs) for ultra-minimal
      HAZ but less common industrially due to cost. 20 ns balances ablation of contaminants with low heat diffusion in low-conductivity
      porcelain. Source: Laser physics research on ceramic ablation (e.g., Appl. Phys. A 2019).'
  repetition_rate:
    min: 1
    max: 200
    value: 20
    unit: kHz
    description: 'Typical 10-50 kHz for pulsed cleaning; higher rates speed up process but risk heat accumulation in porcelain''s
      poor thermal dissipation. Recommended 20 kHz for safe, efficient removal without overheating. Trade-off: >30 kHz may
      require slower scans. Source: Academic literature on Q-switched lasers for ceramics (e.g., J. Appl. Phys. 2017).'
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Fluence below porcelain''s damage threshold (~4 J/cm² for 1064 nm) to ablate contaminants without melting
      (mp ~1300°C) or cracking. Typical 0.5-3 J/cm² for safe cleaning; 1.5 J/cm² recommended starting point. Source: Ablation
      threshold studies on ceramics (e.g., Surf. Coat. Technol. 2021; conservative estimate for porcelain reflectivity ~0.3-0.5
      at 1064 nm).'
  spot_size:
    min: 0.1
    max: 500
    unit: μm
    value: 200
    description: 'Smaller spots (100-300 μm) for fine detail on porcelain surfaces, larger (300-500 μm) for broad areas. Recommended
      200 μm for uniform cleaning without excessive energy concentration. Source: Equipment specifications from manufacturers
      like Coherent and Trumpf for industrial scanners.'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass (2-5) for heavy layers to build fluence gradually and avoid
      damage. Recommended 2 passes for porcelain in industrial prep. Source: Industry case studies on ceramic surface cleaning
      (e.g., Mater. Sci. Eng. B 2022).'
  overlap_ratio:
    min: 10
    max: 90
    value: 70
    unit: '%'
    description: '50-80% overlap ensures uniform coverage without gaps or over-ablation on brittle porcelain. Recommended
      70% for optimal homogeneity in scan patterns. Source: Process optimization studies in laser scanning (e.g., Precis.
      Eng. 2019).'
challenges:
  thermal_management:
  - challenge: Thermal shock and cracking
    severity: critical
    threshold_temperature: ΔT > 200-300°C rapid cooling
    impact: Ceramics crack catastrophically from rapid temperature changes due to low thermal expansion
    solutions:
    - Use pulse mode with 3-5 second cooling between passes
    - Gradual power ramping (start 50W, increase 10W per pass)
    - Preheat substrate to reduce thermal gradients
    - Monitor for surface crazing; stop immediately if cracks appear
  - challenge: Variable thermal conductivity
    severity: medium
    property_value: 0.8-120 W/m·K (150x variation between materials)
    impact: SiC/WC conduct heat well, but alumina/zirconia accumulate heat rapidly
    solutions:
    - Low conductivity ceramics (alumina, zirconia) require 50% longer cooling
    - High conductivity ceramics (SiC, WC) tolerate higher power
    - Test on scrap to determine cooling requirements
  surface_characteristics:
  - challenge: Surface defects and damage threshold
    severity: high
    impact: Micro-cracks, pores, and surface defects dramatically lower damage threshold
    solutions:
    - Inspect surface with magnification before cleaning
    - Reduce power 30-40% for porous or aged ceramics
    - Use multiple low-energy passes rather than single high-energy pass
    - Polished ceramics tolerate 2-3x higher fluence than rough surfaces
  - challenge: Porosity variation
    severity: medium
    porosity_range: 0-30% (dense vs porous ceramics)
    impact: Porous ceramics trap contaminants deep in structure and scatter laser energy
    solutions:
    - Dense ceramics (0-5% porosity) clean easily at 100-150W
    - Porous ceramics require multiple progressive passes
    - Use crosshatch scan pattern for uniform penetration
    - Chemical pre-treatment for deep contamination in porous ceramics
  contamination_challenges:
  - challenge: Coating and residue removal
    severity: medium
    impact: Hard coatings (PVD, thermal barrier) require high energy but risk substrate damage
    solutions:
    - First pass 120W fast (2000 mm/s) for bulk coating removal
    - Second pass 80W slow (1000 mm/s) for residue
    - Monitor for substrate exposure; adjust power accordingly
    - PVD coatings may require chemical assist for complete removal
description: When laser cleaning porcelain, I've found that starting with a gentle assessment of the surface works best. This
  material, unlike denser metals, tends to stay cool on the outside because heat doesn't spread quickly—perfect for delicate
  pieces like antique vases. So, set your laser to a low power level first, using short pulses to chip away at grime without
  stressing its brittle nature. Scan slowly in multiple passes, overlapping just enough to catch every spot. This clears contaminants
  evenly, restoring that smooth finish you see in cultural heritage work. But watch out at the end—push too hard, and cracks
  can form, so always test on a hidden area first.
