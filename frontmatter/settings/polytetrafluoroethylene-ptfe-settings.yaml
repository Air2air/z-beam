machineSettings:
  wavelength:
    description: Near-infrared wavelength optimized for Polytetrafluoroethylene absorption characteristics and minimal subsurface
      damage
    unit: nm
    value: 1064
    min: 355
    max: 10640
  spotSize:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Beam diameter for precise control; 100 μm for fine details (e.g., mold prep), 500 μm for large areas; 200
      μm recommended for uniform PTFE cleaning to maintain fluence. Source: Equipment specifications from Coherent Armonia
      series and industry reports in Surface and Coatings Technology (2019).'
  energyDensity:
    min: 0.1
    max: 20.0
    value: 1.0
    unit: J/cm²
    description: 'Fluence range for contaminant removal without exceeding PTFE ablation threshold (~1.5-2 J/cm² at 1064 nm);
      recommended 1.0 J/cm² for safe cleaning of surfaces like rust or oils, considering PTFE''s high reflectivity (~90% at
      1064 nm). Source: Ablation threshold studies in Journal of Applied Physics (2017) and Optics Express (2022) on fluoropolymers.'
  pulseWidth:
    min: 0.1
    max: 1000
    unit: ns
    value: 20
    description: 'Nanosecond regime preferred for cost-effective cleaning of PTFE; picosecond (ps) or femtosecond reduces
      heat-affected zone (HAZ <10 μm) but increases cost; 20 ns minimizes thermal damage due to PTFE''s poor conductivity.
      Avoid fs for industrial scale. Source: Laser physics research in Applied Surface Science (2019) on polymer ablation
      thresholds.'
  scanSpeed:
    min: 10
    max: 5000
    value: 1500
    unit: mm/s
    description: 'Effective speeds balance energy delivery and heat dissipation; 500 mm/s for heavy contamination (e.g., oils),
      up to 3000 mm/s for light dust; recommended 1500 mm/s for optimal PTFE cleaning without residue. Source: Industry standards
      from Laserax equipment manuals and Journal of Cleaner Production (2020) case studies on industrial polymer prep.'
  passCount:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass for layered residues; 2 passes recommended for complete
      PTFE surface prep without damage, allowing cooling between passes. Source: Industry practice in case studies from Laser
      Cleaning International and Materials Science and Engineering: A (2020).'
  overlapRatio:
    min: 10
    max: 90
    value: 50
    unit: '%'
    description: 'Ensures uniform coverage without gaps or overexposure; 50% recommended for PTFE to achieve even cleaning
      while minimizing heat input, adjustable to 30% for speed or 80% for heavy soiling. Source: Process optimization studies
      in International Journal of Advanced Manufacturing Technology (2018).'
  laserPower:
    description: Optimal average power range for Polytetrafluoroethylene surface cleaning without thermal degradation
    unit: W
    value: 100
    min: 1.0
    max: 120
  laserPowerAlternative:
    min: 20
    max: 200
    value: 50
    unit: W
    description: 'Typical range for 1064 nm pulsed lasers in polymer cleaning to avoid thermal degradation of PTFE (low thermal
      conductivity ~0.25 W/m·K, melting point 327°C); starting at 50W for light contamination, max 200W to prevent substrate
      ablation. Source: Manufacturer specs from IPG Photonics YLR series and studies in Optics and Lasers in Engineering (2018)
      on polymer surface cleaning.'
  frequency:
    min: 1
    max: 200
    value: 30
    unit: kHz
    description: 'Typical for 1064 nm cleaning to achieve fluence without excessive heat buildup; 30 kHz recommended for PTFE
      to balance speed and avoid accumulation (high freq risks melting); lower for heavy soiling. Trade-off: higher freq speeds
      process but increases HAZ. Source: Academic literature in Lasers in Manufacturing and Materials Processing (2021).'
componentSummary: These settings use moderate 50 W power and 10 ns pulses at 1064 nm to gently ablate contaminants from heat-sensitive
  PTFE without inducing melting or surface degradation.
