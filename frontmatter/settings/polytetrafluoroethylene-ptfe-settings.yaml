  machine_settings:
    powerRange:
      description: Optimal average power range for Polytetrafluoroethylene surface
        cleaning without thermal degradation
      unit: W
      value: 100
    wavelength:
      description: Near-infrared wavelength optimized for Polytetrafluoroethylene
        absorption characteristics and minimal subsurface damage
      unit: nm
      value: 1064
    spotSize:
      description: Beam spot diameter for precise Polytetrafluoroethylene surface
        cleaning resolution
      unit: μm
      value: 50
    repetitionRate:
      description: Optimal repetition rate for efficient Polytetrafluoroethylene cleaning
        with thermal management
      unit: kHz
      value: 50
    energyDensity:
      description: Fluence threshold for effective Polytetrafluoroethylene contaminant
        removal without substrate damage
      unit: J/cm²
      value: 5.1
    pulseWidth:
      description: Nanosecond pulse duration for controlled ablation of Polytetrafluoroethylene
        surface contaminants
      unit: ns
      value: 10
    scanSpeed:
      description: Optimal scanning speed for uniform Polytetrafluoroethylene surface
        treatment
      unit: mm/s
      value: 500
    passCount:
      description: Recommended number of passes for complete Polytetrafluoroethylene
        surface cleaning
      unit: passes
      value: 3
    overlapRatio:
      description: Optimal beam overlap for uniform Polytetrafluoroethylene surface
        coverage
      unit: '%'
      value: 50
  challenges:
    thermal_management:
    - challenge: Low melting/degradation temperatures
      severity: high
      threshold_range: 80-300°C depending on polymer type
      impact: Melting, warping, or chemical degradation at low temperatures
      solutions:
      - Use lowest power settings (20-40W)
      - Fast scan speeds (2000-4000 mm/s)
      - Pulse mode with extended cooling (5-10 seconds between passes)
    - challenge: Outgassing and fume generation
      severity: high
      impact: Toxic fumes, smoke, and potential fire hazard
      solutions:
      - Mandatory fume extraction system
      - Work in well-ventilated areas
      - Monitor for smoke/discoloration
    surface_characteristics:
    - challenge: Variable absorption by color and additives
      severity: medium
      impact: Black plastics absorb 80-90%, white plastics absorb 10-30%
      solutions:
      - Adjust power based on plastic color (dark = lower, light = higher)
      - Test on sample pieces first
    contamination_challenges:
    - challenge: Coating and label removal
      severity: medium
      impact: Adhesives melt and smear rather than ablate cleanly
      solutions:
      - Use UV wavelength (355nm) for better photochemical ablation
      - Multiple gentle passes instead of single high-power pass
  settings_description: When laser cleaning Polytetrafluoroethylene, watch its high
    reflectivity right away. It reflects light much more than typical plastics, slowing
    the process down. Start low on power to build absorption gradually. I've seen
    multiple passes work best here. Unlike conductive metals, its poor heat spread
    risks local burns, so keep scans quick. This restores surfaces cleanly without
    warping.
