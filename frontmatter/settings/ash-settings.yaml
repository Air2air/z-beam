machine_settings:
  wavelength:
    description: Near-infrared wavelength optimized for Ash absorption and minimal substrate interaction
    unit: nm
    value: 1064
    min: 355
    max: 10640
  spotSize:
    min: 0.1
    max: 500
    unit: μm
    value: 200
    description: 100-500 μm for precise control in industrial applications; 200 μm recommended for ash removal on detailed
      surfaces to balance fluence and coverage; smaller for fine details, larger for broad areas; from equipment specifications
      by manufacturers like Coherent Inc.
  energyDensity:
    min: 0.1
    max: 20.0
    unit: J/cm²
    value: 1.5
    description: 0.5-3 J/cm² range for effective vaporization/ablation of ash without exceeding substrate damage thresholds
      (e.g., ~4 J/cm² for metals); 1.5 J/cm² safe and recommended for powdery ash with high reflectivity at 1064 nm; based
      on ablation threshold studies in Journal of Laser Applications; conservative for uncertain ash composition.
  pulseWidth:
    min: 0.1
    max: 1000
    unit: ns
    value: 20
    description: Nanosecond regime (10-100 ns) preferred over picosecond/femtosecond for cost-effective ash cleaning due to
      sufficient ablation of low-thermal-conductivity particulates; 20 ns minimizes heat-affected zone (HAZ) on reflective
      or heat-sensitive substrates; supported by laser physics research in Optics & Laser Technology journal.
  scanSpeed:
    min: 10
    max: 5000
    unit: mm/s
    value: 500
    description: Slower speeds (100-500 mm/s) for heavy ash layers to ensure complete removal, faster (1000-2000 mm/s) for
      light surface ash; 500 mm/s recommended for optimal energy delivery without overheating; from industry standards and
      equipment manuals like those from Adapt Laser Systems.
  passCount:
    min: 1
    max: 10
    unit: passes
    value: 2
    description: 1 pass for light ash contamination, up to 5 for heavy buildup; 2 passes recommended for complete, uniform
      removal of ash while minimizing risk to underlying substrate; drawn from industry case studies on particulate cleaning
      in heritage and industrial contexts (e.g., ICOMOS guidelines adapted for laser use).
  overlapRatio:
    min: 10
    max: 90
    unit: '%'
    value: 50
    description: 30-80% ensures uniform fluence distribution; 50% recommended for ash cleaning to achieve even coverage without
      excessive heat buildup on low-melting-point residues; typical in process optimization studies from Lasers in Engineering
      journal.
  laserPower:
    description: Optimal average power for efficient Ash removal without substrate damage
    unit: W
    value: 100
    min: 1.0
    max: 120
  laserPowerAlternative:
    min: 50
    max: 1000
    unit: W
    value: 200
    description: Typical range for 1064 nm industrial cleaning of light powdery contaminants like ash on metals or stone;
      start at 200 W to balance efficiency and avoid thermal damage to low-conductivity substrates; max limited by substrate
      melting point (e.g., ~1000 W for steel); based on IPG Photonics and Laserax manufacturer specs for contamination removal.
  frequency:
    min: 1
    max: 200
    unit: kHz
    value: 50
    description: 10-100 kHz typical for pulsed cleaning to control pulse overlap; 50 kHz recommended for ash to achieve fast
      processing while limiting heat accumulation in low-conductivity materials; higher rates speed up cleaning but risk substrate
      damage; from academic literature like studies in Applied Surface Science.
componentSummary: These settings employ a 1064 nm wavelength for strong absorption in carbon-based ash, with 200 W power and
  10 ns pulses enabling precise ablation of loose particles while preventing thermal spread to underlying surfaces.
