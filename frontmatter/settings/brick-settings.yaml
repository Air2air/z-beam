  power:
    min: 50
    max: 1000
    value: 200
    unit: W
    description: 'Typical range for 1064 nm Nd:YAG lasers in stone/brick cleaning to remove contaminants without thermal damage;
      starting at 200W balances efficiency and safety. Max avoids cracking due to brick''s low thermal conductivity (~0.8
      W/mK). Source: Manufacturer specs from IPG Photonics (e.g., YLR series for restoration); academic review in ''Laser
      Cleaning of Stone Surfaces'' (Optics & Lasers in Engineering, 2015).'
  scan_speed:
    min: 10
    max: 5000
    value: 500
    unit: mm/s
    description: 'Effective speeds for contaminant removal on porous brick; slower (100-500 mm/s) for heavy soiling like soot,
      faster (500-2000 mm/s) for light dust. Recommended 500 mm/s optimizes cleaning rate while minimizing heat buildup. Source:
      Industry standards from Laser Cleaning Europe guidelines; case studies in Journal of Cultural Heritage (2018) on brick
      restoration.'
  pulse_width:
    min: 0.1
    max: 1000
    unit: ns
    value: 20
    description: 'Nanosecond regime (5-100 ns) preferred for brick to ablate contaminants via photothermal effects with minimal
      heat-affected zone (HAZ); picosecond (ps) or femtosecond (fs) reduces HAZ further but increases cost. Recommended 20
      ns for balance. Source: Laser physics research in Applied Surface Science (2017) on stone ablation thresholds; avoids
      fs due to brick''s high damage risk from shockwaves.'
  repetition_rate:
    min: 1
    max: 200
    value: 30
    unit: kHz
    description: 'Typical for pulsed cleaning to control energy delivery; 10-50 kHz for brick prevents heat accumulation in
      low-conductivity material, while higher rates speed up process but risk thermal stress. Recommended 30 kHz for optimal
      throughput. Source: Academic literature in Optics Express (2014) on pulse repetition effects in cultural heritage cleaning;
      trade-off noted in manufacturer manuals (e.g., Adapt Laser Systems).'
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Fluence range for safe ablation of organic/inorganic contaminants on brick; damage threshold ~3-5 J/cm²
      to avoid surface cracking or vitrification. Recommended 1.5 J/cm² for effective cleaning below threshold. Source: Ablation
      threshold studies in Journal of Applied Physics (2016) on fired clay materials; conservative for brick''s porosity and
      reflectivity (~20-30% at 1064 nm).'
  spot_size:
    min: 0.1
    max: 2400
    value: 2000
    unit: μm
    description: 'Beam diameter range for industrial cleaning; smaller (0.5-1 mm) for detailed work, larger (2-5 mm) for broad
      brick surfaces. Recommended 2 mm for uniform coverage on rough brick texture. Source: Equipment specifications from
      Coherent and Trumpf laser systems for surface preparation; optimized in process studies (Lasers in Engineering, 2019).'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass (2-5) for heavy layers to ensure complete removal without
      excessive energy. Recommended 2 passes for brick to achieve uniform results while staying below damage threshold. Source:
      Industry practice in restoration case studies (e.g., European Commission reports on laser cleaning of masonry, 2020);
      avoids overexposure on porous surfaces.'
  overlap_ratio:
    min: 10
    max: 90
    value: 60
    unit: '%'
    description: 'Overlap ensures uniform coverage on uneven brick; 30-50% for speed, 60-80% for thorough cleaning of pores.
      Recommended 60% for optimal uniformity without redundancy. Source: Process optimization studies in Applied Optics (2015)
      on scan strategies for stone; standard in manufacturer guidelines (e.g., Laserax equipment manuals).'
challenges:
  thermal_management:
  - challenge: Moisture-induced spalling and explosive failure
    severity: critical
    threshold_temperature: Steam formation >100°C with trapped moisture
    impact: Trapped moisture converts to steam causing explosive surface spalling
    solutions:
    - Test moisture content before cleaning (>5% moisture requires drying)
    - Use pulse mode with 10-15 second cooling for wet materials
    - Reduce power by 50-60% for damp masonry
    - Allow 24-48 hours drying after rain before laser cleaning
    - Monitor for popping sounds or surface lifting; stop immediately
  - challenge: Low thermal diffusivity and heat accumulation
    severity: high
    property_value: 0.1-1.0 mm²/s (3-10x slower than metals)
    impact: Heat concentrates in surface layer causing thermal stress
    solutions:
    - Increase cooling time between passes (8-12 seconds)
    - Use low repetition rates (<20 kHz)
    - Defocused beam reduces peak intensity
    - Multiple gentle passes preferred over aggressive single pass
  surface_characteristics:
  - challenge: High porosity and deep contamination
    severity: high
    porosity_range: 10-25% (brick and concrete highly porous)
    impact: Contaminants penetrate deep into porous structure
    solutions:
    - Multiple progressive passes with power increase (50W → 80W → 100W)
    - Reduce scan speed for deeper penetration (400-600 mm/s)
    - Chemical pre-treatment for biological growth (algae, lichen)
    - Expect 3-5 passes for complete cleaning vs 1-2 for dense materials
  - challenge: Surface heterogeneity and aggregate exposure
    severity: medium
    impact: Mixed composition (cement matrix, aggregates, voids) causes variable absorption
    solutions:
    - Use moderate power (70-90W) suitable for both matrix and aggregates
    - Crosshatch scan pattern for uniform coverage
    - Monitor for differential ablation; adjust power if aggregates become prominent
    - Aged masonry more challenging than new construction
  contamination_challenges:
  - challenge: Paint and coating removal from porous substrate
    severity: medium
    impact: Paint penetrates into pores requiring deep cleaning without substrate damage
    solutions:
    - First pass 100W fast (1500 mm/s) for surface paint layer
    - Second pass 70W slow (800 mm/s) for paint in pores
    - Third pass 50W very slow (500 mm/s) for residual staining
    - Chemical stripping pre-treatment reduces laser exposure
    - Heritage masonry requires gentler approach (max 60W)
description: When laser cleaning brick, start by preparing the surface to account for its porous structure, which can trap
  contaminants deeply and require multiple passes for thorough removal. You must begin with lower power settings to match
  its moderate thermal conductivity, ensuring heat stays localized without spreading to cause uneven expansion or micro-cracks
  in the brittle matrix. As you adjust the scan speed, keep it steady to leverage the material's high heat resistance, which
  allows effective restoration of historical facades or industrial surfaces without compromising structural integrity. Make
  sure you overlap passes generously, since brick's density helps absorb laser energy well, revealing clean layers progressively.
  In applications like cultural heritage restoration, this approach exposes original textures safely. Finally, watch for potential
  spalling on aged bricks—reduce energy density if surface flaking appears to avoid deeper damage.
