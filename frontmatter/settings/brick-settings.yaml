machineSettings:
  wavelength:
    description: Near-infrared wavelength for optimal brick absorption and minimal substrate damage
    unit: nm
    value: 1064
    min: 355
    max: 10640
  spotSize:
    min: 0.1
    max: 2400
    value: 2000
    unit: μm
    description: 'Beam diameter range for industrial cleaning; smaller (0.5-1 mm) for detailed work, larger (2-5 mm) for broad
      brick surfaces. Recommended 2 mm for uniform coverage on rough brick texture. Source: Equipment specifications from
      Coherent and Trumpf laser systems for surface preparation; optimized in process studies (Lasers in Engineering, 2019).'
  energyDensity:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Fluence range for safe ablation of organic/inorganic contaminants on brick; damage threshold ~3-5 J/cm²
      to avoid surface cracking or vitrification. Recommended 1.5 J/cm² for effective cleaning below threshold. Source: Ablation
      threshold studies in Journal of Applied Physics (2016) on fired clay materials; conservative for brick''s porosity and
      reflectivity (~20-30% at 1064 nm).'
  pulseWidth:
    min: 0.1
    max: 1000
    unit: ns
    value: 20
    description: 'Nanosecond regime (5-100 ns) preferred for brick to ablate contaminants via photothermal effects with minimal
      heat-affected zone (HAZ); picosecond (ps) or femtosecond (fs) reduces HAZ further but increases cost. Recommended 20
      ns for balance. Source: Laser physics research in Applied Surface Science (2017) on stone ablation thresholds; avoids
      fs due to brick''s high damage risk from shockwaves.'
  scanSpeed:
    min: 10
    max: 5000
    value: 500
    unit: mm/s
    description: 'Effective speeds for contaminant removal on porous brick; slower (100-500 mm/s) for heavy soiling like soot,
      faster (500-2000 mm/s) for light dust. Recommended 500 mm/s optimizes cleaning rate while minimizing heat buildup. Source:
      Industry standards from Laser Cleaning Europe guidelines; case studies in Journal of Cultural Heritage (2018) on brick
      restoration.'
  passCount:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass (2-5) for heavy layers to ensure complete removal without
      excessive energy. Recommended 2 passes for brick to achieve uniform results while staying below damage threshold. Source:
      Industry practice in restoration case studies (e.g., European Commission reports on laser cleaning of masonry, 2020);
      avoids overexposure on porous surfaces.'
  overlapRatio:
    min: 10
    max: 90
    value: 60
    unit: '%'
    description: 'Overlap ensures uniform coverage on uneven brick; 30-50% for speed, 60-80% for thorough cleaning of pores.
      Recommended 60% for optimal uniformity without redundancy. Source: Process optimization studies in Applied Optics (2015)
      on scan strategies for stone; standard in manufacturer guidelines (e.g., Laserax equipment manuals).'
  laserPower:
    description: Optimal average power for brick surface cleaning without thermal damage
    unit: W
    value: 100
    min: 1.0
    max: 120
  laserPowerAlternative:
    min: 50
    max: 1000
    value: 200
    unit: W
    description: 'Typical range for 1064 nm Nd:YAG lasers in stone/brick cleaning to remove contaminants without thermal damage;
      starting at 200W balances efficiency and safety. Max avoids cracking due to brick''s low thermal conductivity (~0.8
      W/mK). Source: Manufacturer specs from IPG Photonics (e.g., YLR series for restoration); academic review in ''Laser
      Cleaning of Stone Surfaces'' (Optics & Lasers in Engineering, 2015).'
  frequency:
    min: 1
    max: 200
    value: 30
    unit: kHz
    description: 'Typical for pulsed cleaning to control energy delivery; 10-50 kHz for brick prevents heat accumulation in
      low-conductivity material, while higher rates speed up process but risk thermal stress. Recommended 30 kHz for optimal
      throughput. Source: Academic literature in Optics Express (2014) on pulse repetition effects in cultural heritage cleaning;
      trade-off noted in manufacturer manuals (e.g., Adapt Laser Systems).'
componentSummary: The 200 W power at 1064 nm with 10 ns pulses effectively ablates contaminants from brick's porous surface
  while minimizing thermal damage and cracking through precise, short-duration energy delivery.
