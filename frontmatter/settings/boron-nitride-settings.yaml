machineSettings:
  wavelength:
    value: 1064
    unit: nm
    description: Near-IR wavelength for optimal absorption
    min: 355
    max: 10640
  spotSize:
    min: 0.1
    max: 500
    unit: μm
    value: 200
    description: 'Typical beam diameter for cleaning; 200 μm recommended for BN to provide fine control on detailed surfaces without excessive energy concentration. Fine detail: 100-200 μm; large area: 300-500 μm. Source: Equipment specs from Coherent and Trumpf laser systems for industrial cleaning.'
  energyDensity:
    min: 0.1
    max: 20
    value: 0.5
    unit: J/cm²
    description: 'Fluence range for safe contaminant ablation; damage threshold for BN estimated ~2-5 J/cm² based on ceramic studies, so 0.5 J/cm² recommended to stay below while effective for surface prep. Conservative due to BN''s reflectivity at 1064 nm. Source: Ablation threshold studies in Applied Surface Science (e.g., on nitrides and ceramics).'
  pulseWidth:
    min: 0.1
    max: 1000
    value: 20
    unit: ns
    description: 'Nanosecond regime preferred for industrial cleaning to ablate contaminants with minimal HAZ; 20 ns recommended for BN to leverage its thermal conductivity and reduce heat accumulation. Picosecond (ps) or femtosecond for ultra-precision but less common industrially. Source: Laser physics reviews in Optics & Lasers in Engineering (e.g., studies on ceramic ablation).'
  scanSpeed:
    min: 10
    max: 5000
    unit: mm/s
    value: 1000
    description: 'Effective range for contamination removal; recommended 1000 mm/s for optimal balance of cleaning efficiency and heat control on BN. Light contamination: 1500-3000 mm/s; heavy: 100-500 mm/s. Source: Industry standards from Laserax and Adapt Laser manuals.'
  passCount:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Typical for complete removal in multi-pass to ensure uniform cleaning without single-pass overload; 2 passes recommended for BN contamination to minimize risk to substrate integrity. Single pass for light layers. Source: Industry case studies in laser cleaning of ceramics (e.g., SPIE proceedings).'
  overlapRatio:
    min: 10
    max: 90
    value: 50
    unit: '%'
    description: 'Standard for uniform coverage; 50% recommended for BN to achieve even cleaning while avoiding overexposure and heat zones. Range adjusts for contamination density. Source: Process optimization in Journal of Laser Applications and manufacturer guidelines (e.g., CleanLaser).'
  laserPower:
    value: 80
    unit: W
    description: Optimal average power for ceramic cleaning
    min: 1
    max: 120
  laserPowerAlternative:
    min: 20
    max: 300
    value: 50
    unit: W
    description: 'Typical range for pulsed Nd:YAG lasers in ceramic cleaning; starting at 50 W to avoid thermal damage to BN''s high melting point substrate (~3000°C). Max safe below damage threshold. Source: IPG Photonics specs for cleaning systems; conservative for BN due to limited specific studies.'
  frequency:
    min: 1
    max: 200
    value: 30
    unit: kHz
    description: 'Typical for pulsed cleaning; 30 kHz recommended for BN to balance speed and prevent heat buildup, as higher rates increase average power and risk substrate damage. Trade-off: High freq accelerates cleaning but accumulates heat in low-absorptivity materials like BN at 1064 nm. Source: Academic literature in Journal of Applied Physics on pulse train effects.'
componentSummary: These settings employ moderate power and short nanosecond pulses at 1064 nm to gently ablate contaminants from Boron Nitride's thermally sensitive surface without causing substrate damage or cracking.
