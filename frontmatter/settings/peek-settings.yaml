machine_settings:
  powerRange:
    value: 30
    unit: W
    description: Low power for thermal-sensitive polymer cleaning
  wavelength:
    value: 1064
    unit: nm
    description: Near-IR wavelength for controlled absorption
  spotSize:
    value: 100
    unit: μm
    description: Larger spot for gentle surface treatment
  repetitionRate:
    value: 20
    unit: kHz
    description: Lower frequency to prevent thermal damage
  energyDensity:
    value: 0.5
    unit: J/cm²
    description: Low energy density to avoid melting
  pulseWidth:
    value: 10
    unit: ns
    description: Short pulses for minimal thermal impact
  scanSpeed:
    value: 800
    unit: mm/s
    description: Fast scanning to reduce heat accumulation
  passCount:
    value: 2
    unit: passes
    description: Multiple gentle passes for gradual cleaning
  overlapRatio:
    value: 30
    unit: '%'
    description: Lower overlap to prevent overheating
challenges:
- Requires careful power calibration to prevent material damage
- Monitor surface temperature during processing
- Verify cleaning effectiveness through inspection
settings_description: Before laser cleaning, PEEK surfaces require careful parameter selection After cleaning, PEEK surfaces
