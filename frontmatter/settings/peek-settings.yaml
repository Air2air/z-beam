machineSettings:
  powerRange:
    value: 30
    unit: W
    description: Low power for thermal-sensitive polymer cleaning
    min: 1.0
    max: 120
  wavelength:
    value: 1064
    unit: nm
    description: Near-IR wavelength for controlled absorption
    min: 355
    max: 10640
  spotSize:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Beam diameter for precision vs. area coverage; smaller (100-200 μm) for fine surface prep on PEEK, larger
      for broad cleaning. Recommended 200 μm to control energy delivery. Source: Manufacturer specs (e.g., Coherent lasers)
      and equipment for polymer applications.'
  repetitionRate:
    min: 1
    max: 200
    value: 30
    unit: kHz
    description: 'Common for cleaning; higher rates (>50 kHz) speed up process but risk heat accumulation in PEEK due to poor
      thermal dissipation. Recommended 30 kHz for balance. Source: Academic literature on pulsed laser cleaning (Appl. Surf.
      Sci. 2020); trade-off noted for polymers.'
  energyDensity:
    min: 0.1
    max: 20.0
    value: 0.5
    unit: J/cm²
    description: 'Fluence for contaminant removal without substrate damage; PEEK damage threshold ~1-2 J/cm² at 1064 nm due
      to reflectivity (~0.9) and absorption. Recommended 0.5 J/cm² for safe cleaning. Source: Ablation threshold studies (J.
      Phys. D: Appl. Phys. 2017); conservative for PEEK''s sensitivity.'
  pulseWidth:
    min: 0.1
    max: 1000
    value: 20
    unit: ns
    description: 'Nanosecond regime preferred for PEEK to minimize heat-affected zone (HAZ); picosecond (ps) or femtosecond
      (fs) for ultra-precision but costlier. Typical 10-50 ns avoids excessive melting. Source: Laser physics research on
      polymer ablation (Opt. Express 2015); ns pulses reduce thermal diffusion in low-conductivity PEEK.'
  scanSpeed:
    min: 10
    max: 5000
    unit: mm/s
    value: 1500
    description: 'Effective speeds for contamination removal; slower (500-1000 mm/s) for heavy contamination, faster (2000-5000
      mm/s) for light. Recommended 1500 mm/s for PEEK to balance cleaning efficiency and heat minimization. Source: CleanLaser
      equipment manuals and industry standards (ISO 11553).'
  passCount:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass (2-5) for heavy; recommended 2 passes for complete PEEK
      cleaning without overexposure. Source: Industry case studies on polymer surface preparation (Laser Tech. J. 2019); minimizes
      cumulative heat.'
  overlapRatio:
    min: 10
    max: 90
    value: 50
    unit: '%'
    description: 'Ensures uniform coverage; 30-50% for speed, 50-80% for thoroughness on irregular PEEK surfaces. Recommended
      50% to avoid gaps while preventing overheating. Source: Process optimization studies (Opt. Lasers Eng. 2021); standard
      for scanned laser cleaning.'
  power:
    min: 10
    max: 200
    value: 50
    unit: W
    description: 'Typical range for polymer cleaning at 1064 nm to avoid thermal damage to PEEK (melting point ~343°C); starting
      at 50 W for light contamination. Max safe ~200 W based on low thermal conductivity. Source: IPG Photonics laser cleaning
      guidelines and studies on polymer ablation (e.g., J. Laser Appl. 2018).'
componentSummary: These settings use moderate power and short nanosecond pulses at 1064 nm to enable precise ablation of contaminants
  from PEEK while minimizing heat input and preventing thermal degradation of the sensitive polymer.
