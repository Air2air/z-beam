machine_settings:
  wavelength:
    value: 1064
    unit: nm
    description: Near-IR wavelength for controlled absorption
    min: 355
    max: 10640
  spotSize:
    min: 0.1
    max: 500
    unit: μm
    value: 300
    description: 'Smaller spots (100-300 μm) for fine detail on PET, larger (500-1000 μm) for broad areas; 300 μm recommended
      for balanced resolution and energy distribution in industrial cleaning. Source: Manufacturer specs from Coherent and
      Trumpf laser systems.'
  energyDensity:
    min: 0.1
    max: 20.0
    unit: J/cm²
    value: 1.0
    description: 'Fluence below PET damage threshold (~2-4 J/cm² at 1064 nm) for safe contaminant removal; 0.5-1.5 J/cm² for
      light cleaning, up to 2.5 for heavy; conservative to account for PET''s moderate IR absorption (~20-30%). Source: Ablation
      threshold studies (J. Phys. D: Appl. Phys. 2017).'
  pulseWidth:
    min: 0.1
    max: 1000
    unit: ns
    value: 20
    description: 'Nanosecond regime preferred for 1064 nm cleaning of PET to minimize HAZ; picosecond (ps) or femtosecond
      (fs) for ultra-precise but costlier; 20 ns balances ablation and low thermal diffusion (PET low conductivity ~0.15 W/mK).
      Source: Laser physics reviews (Opt. Lasers Eng. 2020).'
  scanSpeed:
    min: 10
    max: 5000
    unit: mm/s
    value: 1500
    description: 'Effective speeds balance cleaning efficiency and heat input; slower (500-1000 mm/s) for heavy contamination,
      faster (2000+ mm/s) for light; 1500 mm/s optimal for uniform PET surface prep. Source: Industry manuals from IPG Photonics
      and Laserax equipment specs.'
  passCount:
    min: 1
    max: 10
    unit: passes
    value: 2
    description: 'Single pass for light contamination, multi-pass (2-3) for complete removal without damage; 2 passes typical
      for PET to ensure uniformity while minimizing heat exposure. Source: Case studies in industrial laser cleaning (Proc.
      SPIE 2021).'
  overlapRatio:
    min: 10
    max: 90
    unit: '%'
    value: 50
    description: 'Ensures uniform coverage; 40-60% for PET to avoid gaps or overexposure; higher (70-80%) for heavy contamination,
      lower for speed. Source: Process optimization in laser scanning (Opt. Eng. 2016).'
  laserPower:
    value: 30
    unit: W
    description: Low power for thermal-sensitive polymer cleaning
    min: 1.0
    max: 120
  laserPowerAlternative:
    min: 50
    max: 500
    value: 100
    unit: W
    description: 'Typical range for polymer cleaning to avoid thermal damage; starting at 100W for light contamination on
      PET, max below ~300W to prevent melting (PET melting point ~260°C). Source: Studies on Nd:YAG laser cleaning of plastics
      (e.g., J. Laser Appl. 2018).'
  frequency:
    min: 1
    max: 200
    unit: kHz
    value: 30
    description: 'Typical for pulsed cleaning; 20-50 kHz recommended for PET to enable fast processing without excessive heat
      accumulation; higher rates increase speed but risk substrate heating. Source: Academic literature on polymer laser ablation
      (Appl. Surf. Sci. 2019).'
componentSummary: The 100 W power, 1064 nm wavelength, and 10 ns pulse width settings are suitable for PET cleaning, delivering
  precise ablation of contaminants while minimizing thermal input to avoid melting the sensitive polymer substrate.
