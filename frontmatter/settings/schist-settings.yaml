description: >-
  When cleaning schist, watch its layered foliation that sets it apart from denser, more uniform stones like granite.
  I've seen this structure lead to delamination under uneven heat, so start with gentler passes to avoid cracking along
  those planes. Unlike smoother limestones, schist's moderate absorption pulls in laser energy well but traps heat due
  to low conductivity, which tends to build up quickly. This works best when you reduce power early on, allowing
  multiple light exposures to reveal surface grime without stressing the layers. Adjust overlap to keep things even,
  restoring the stone's natural sheen steadily.
