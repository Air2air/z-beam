machineSettings:
  wavelength:
    description: Near-IR wavelength for efficient Calcite absorption with minimal transmission
    unit: nm
    value: 1064
    min: 355
    max: 10640
  spotSize:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: '200 μm for fine surface preparation on calcite; smaller for detail work, larger for broad areas. Matches
      typical galvo scanner setups. Source: Equipment specifications from Coherent and Trumpf laser systems.'
  fluenceThreshold:
    description: Minimum fluence required for effective contaminant removal from Calcite
    unit: J/cm²
    value: 2.5
    min: 0.3
    max: 4.5
  pulseWidth:
    min: 0.1
    max: 1000
    unit: ns
    value: 10
    description: 'Nanosecond regime preferred for cost-effective cleaning with low reflectivity at 1064 nm; 10 ns minimizes
      heat-affected zone (HAZ) in low-thermal-conductivity calcite (~2 W/m·K). Picosecond (ps) or femtosecond (fs) for ultra-precision
      but higher cost. Source: Laser physics reviews (Opt. Lasers Eng. 2015).'
  scanSpeed:
    min: 10
    max: 5000
    value: 500
    unit: mm/s
    description: 'Slower speeds for heavy contamination on delicate calcite; 500 mm/s optimal for balance of efficiency and
      minimal heat input. Range adjusts for light (faster) vs. heavy (slower) contaminants. Source: Industry standards from
      LaserClus project and equipment manuals (e.g., Adapt-Laser).'
  passCount:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Multi-pass (2 recommended) for complete removal without exceeding fluence limits; single pass for light
      contamination. Based on calcite''s reflectivity (~5-10% at 1064 nm). Source: Industry case studies on stone restoration
      (Lasers in the Conservation of Artworks, 2017).'
  overlapRatio:
    min: 10
    max: 90
    value: 70
    unit: '%'
    description: '70% ensures uniform coverage and contaminant removal on irregular calcite surfaces; higher for heavy soiling.
      Source: Process optimization in laser scanning (Opt. Express 2014).'
  energyDensity:
    min: 0.1
    max: 20.0
    value: 1.0
    unit: J/cm²
    description: 'Fluence below calcite damage threshold (~2.5 J/cm² at 1064 nm ns pulses) for safe contaminant removal; 1
      J/cm² recommended for industrial cleaning without ablation. Source: Ablation threshold studies (J. Phys. D: Appl. Phys.
      2009).'
  laserPower:
    description: Optimal average power for Calcite cleaning without thermal damage
    unit: W
    value: 45
    min: 1.0
    max: 120
  laserPowerAlternative:
    min: 20
    max: 200
    value: 50
    unit: W
    description: 'Typical range for ns-pulsed Nd:YAG lasers in stone cleaning applications; starting at 50W to avoid thermal
      damage to calcite (decomposition ~825°C). Max limited to prevent substrate ablation. Source: IPG Photonics YLR series
      specs and studies on carbonate cleaning (e.g., J. Cult. Herit. 2018).'
  frequency:
    min: 1
    max: 200
    value: 20
    unit: kHz
    description: '20 kHz balances cleaning speed and heat accumulation; higher rates increase efficiency but risk thermal
      buildup in calcite due to poor conductivity. Source: Academic literature on pulsed laser cleaning of minerals (Appl.
      Surf. Sci. 2012).'
componentSummary: These settings use moderate 50 W power and 12 ns pulses at 1064 nm to gently ablate contaminants from calcite's
  soft, heat-sensitive surface without causing thermal cracking or decomposition.
