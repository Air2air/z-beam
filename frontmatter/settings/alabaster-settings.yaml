description: >-
  Alabaster stands out as a soft, sedimentary stone that carves beautifully under careful handling, bringing a smooth,
  translucent finish to intricate designs. In cultural heritage work, restorers often select it for delicate sculptures,
  where low-intensity tools gently shape surfaces without cracking the material's fine grain. This stone responds well
  to mild polishing techniques, enhancing its natural glow while preserving historical details in art conservation.


