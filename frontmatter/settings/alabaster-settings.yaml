  power:
    min: 20
    max: 150
    value: 50
    unit: W
    description: 'Typical range for delicate stone cleaning like alabaster to avoid thermal damage; starting at 50 W for controlled
      ablation. Max safe ~150 W based on gypsum''s low melting point (~150°C). Source: Manufacturer specs from IPG Photonics
      and academic studies on stone conservation (e.g., J. Cult. Herit. 2018).'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 1500
    description: 'Slower speeds for heavy contamination on alabaster to ensure removal without substrate heating; faster for
      light dirt. Recommended 1500 mm/s for balance. Source: Industry standards from Laser Cleaning Europe guidelines and
      equipment manuals (e.g., CleanLaser systems).'
  pulse_width:
    min: 0.1
    max: 1000
    value: 20
    unit: ns
    description: 'Nanosecond regime preferred for alabaster to minimize heat-affected zone (HAZ); picosecond (ps) or femtosecond
      for ultra-precision but less common industrially. 20 ns optimal for 1064 nm on low-conductivity materials like gypsum.
      Source: Laser physics research in Opt. Lasers Eng. (2015) on stone ablation.'
  repetition_rate:
    min: 1
    max: 200
    value: 30
    unit: kHz
    description: 'Lower rates reduce heat accumulation in thermally sensitive alabaster; higher rates speed up cleaning but
      risk damage. 30 kHz recommended for effective contamination removal. Trade-off: high freq increases efficiency but elevates
      surface temp. Source: Academic literature, Appl. Surf. Sci. (2020) on pulsed laser cleaning of minerals.'
  energy_density:
    min: 0.1
    max: 20.0
    value: 0.8
    unit: J/cm²
    description: 'Fluence below alabaster''s damage threshold (~2 J/cm² for gypsum) for safe cleaning; lower for light contamination.
      0.8 J/cm² recommended to ablate contaminants without melting. Conservative due to alabaster''s poor thermal conductivity.
      Source: Ablation threshold studies in J. Appl. Phys. (2017) on calcium sulfate materials.'
  spot_size:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Smaller spots for fine detail on alabaster sculptures; larger for broad industrial surfaces. 200 μm recommended
      for uniform cleaning without excessive energy concentration. Source: Equipment specifications from Coherent and Trumpf
      laser systems for heritage cleaning.'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Multi-pass for complete removal of heavy contamination on porous alabaster; single pass for light surface
      prep. 2 passes recommended to minimize total exposure time and heat buildup. Source: Industry practice in conservation
      case studies (e.g., ICLEA project reports on stone artifacts).'
  overlap_ratio:
    min: 10
    max: 90
    value: 60
    unit: '%'
    description: 'Higher overlap ensures uniform coverage on uneven alabaster surfaces; 60% balances efficiency and avoids
      striping. Typical range for pulsed scanning to prevent gaps in contamination removal. Source: Process optimization studies
      in Lasers Manuf. Mater. Process. (2019).'
challenges:
  thermal_management:
  - challenge: Thermal shock and microcracking
    severity: critical
    threshold_temperature: ΔT > 50-150°C rapid cooling (stone-dependent)
    impact: Natural stone contains microfissures that propagate under thermal stress
    solutions:
    - Use pulse mode with 8-12 second cooling between passes
    - Reduce power by 40-50% for weathered or damaged stone
    - Preheat substrate if possible to reduce thermal gradients
    - Granite more resistant than marble; sandstone most vulnerable
    - Monitor for surface crazing; stop immediately if cracks appear
  - challenge: Moisture-induced spalling
    severity: high
    threshold_temperature: Steam formation >100°C with trapped moisture
    impact: Porous stone traps moisture that explosively converts to steam
    solutions:
    - Test moisture content before cleaning (>3% requires drying)
    - Allow 48-72 hours drying after rain before laser cleaning
    - Reduce power by 50% for damp stone
    - Use pulse mode with extended cooling (15-20 seconds)
    - Heritage stone requires especially gentle approach
  surface_characteristics:
  - challenge: Weathering and surface degradation
    severity: high
    impact: Aged stone has weaker surface layer more susceptible to damage
    solutions:
    - Reduce power 40-60% for weathered stone vs fresh stone
    - Test on inconspicuous area first
    - Multiple gentle passes (4-6 at 40-60W) preferred
    - Monitor for powdering or flaking; adjust power immediately
    - Heritage conservation requires documentation and testing
  - challenge: Mineral composition heterogeneity
    severity: medium
    impact: Mixed minerals have different absorption and damage thresholds
    solutions:
    - Use moderate power (60-80W) suitable for both light and dark minerals
    - Crosshatch scan pattern for uniform coverage
    - Avoid dwelling on dark minerals (feldspar, mica) which absorb more energy
    - Quartzite and marble more homogeneous than granite
  contamination_challenges:
  - challenge: Biological growth and deep staining
    severity: medium
    porosity_range: 0.5-25% (sandstone highly porous)
    impact: Algae, lichen, and pollution penetrate deep into porous structure
    solutions:
    - First pass 80W fast (1200 mm/s) for surface growth
    - Second pass 60W slow (700 mm/s) for roots and stains
    - Third pass 40W very slow (400 mm/s) for deep staining
    - Chemical biocide pre-treatment kills roots and reduces laser exposure
    - Dense stones (granite, marble) clean in 1-2 passes vs 3-4 for porous stones
description: 'Alabaster stands out as a soft, sedimentary stone that carves beautifully under careful handling, bringing a
  smooth, translucent finish to intricate designs. In cultural heritage work, restorers often select it for delicate sculptures,
  where low-intensity tools gently shape surfaces without cracking the material''s fine grain. This stone responds well to
  mild polishing techniques, enhancing its natural glow while preserving historical details in art conservation.


  For aerospace and medical applications, alabaster''s lightweight density and subtle durability make it suitable for custom
  prototypes or non-structural components that demand precision. Engineers adjust spindle speeds to a gentle rhythm, allowing
  the stone to yield evenly and avoid stress fractures during machining. In'
