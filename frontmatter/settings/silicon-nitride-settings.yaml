machineSettings:
  wavelength:
    description: Near-IR wavelength optimized for Silicon Nitride absorption characteristics
    unit: nm
    value: 1064
    min: 355
    max: 10640
  spotSize:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Beam diameter range: smaller (50-200 μm) for fine detail on Si3N4 components, larger (500-1000 μm) for broad
      area prep. 200 μm recommended for uniform cleaning balancing resolution and speed. Source: Equipment specs from Coherent
      and Trumpf laser systems for industrial cleaning.'
  energyDensity:
    min: 0.1
    max: 20.0
    value: 0.5
    unit: J/cm²
    description: 'Fluence range for safe contaminant removal; damage threshold for Si3N4 ~3-5 J/cm² at 1064 nm due to moderate
      reflectivity (~35%). Recommended 0.5 J/cm² for cleaning without ablation of substrate. Conservative for light contamination.
      Source: Ablation threshold studies in Journal of Applied Physics (2016); uncertainty noted for specific contaminants.'
  pulseWidth:
    min: 0.1
    max: 1000
    value: 20
    unit: ns
    description: 'Nanosecond regime preferred for Si3N4 cleaning to minimize heat-affected zone (HAZ <10 μm); picosecond (ps)
      or femtosecond (fs) for ultra-precision but costlier. 20 ns typical for contaminant removal without substrate melting
      (Si3N4 mp ~1900°C). Avoid fs for industrial scale. Source: Laser physics in ''Pulsed Laser Cleaning of Ceramics'' (Applied
      Surface Science, 2019).'
  scanSpeed:
    min: 10
    max: 5000
    unit: mm/s
    value: 2000
    description: 'Effective range for 1064 nm cleaning; slower (100-500 mm/s) for heavy contamination (e.g., oxides), faster
      (2000-5000 mm/s) for light surface prep. Recommended 2000 mm/s balances efficiency and safety on Si3N4''s brittle surface.
      Source: Industry standards from Laserax equipment manuals; case studies in Journal of Laser Applications (2020).'
  passCount:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass (2-3) for heavy layers on Si3N4 to ensure complete removal
      without excessive energy input. Recommended 2 passes for industrial surface prep. Source: Industry case studies in ''Laser
      Surface Treatment of Ceramics'' (Materials Science and Engineering A, 2021).'
  overlapRatio:
    min: 10
    max: 90
    value: 50
    unit: '%'
    description: 'Typical 30-80% for uniform coverage; 50% recommended for Si3N4 to avoid uneven heating or missed spots while
      preventing overexposure on heat-sensitive ceramic. Higher overlap for heavy contamination. Source: Process optimization
      in Laser & Photonics Reviews (2019).'
  dwellTime:
    description: Effective dwell time per cleaning spot
    unit: μs
    value: 100
    min: 0.2
    max: 200
  laserPower:
    description: Optimal average power for Silicon Nitride surface cleaning without thermal damage
    unit: W
    value: 100
    min: 1.0
    max: 120
  laserPowerAlternative:
    min: 20
    max: 500
    value: 100
    unit: W
    description: 'Typical range for pulsed fiber lasers in industrial cleaning of ceramics like Si3N4 to remove contaminants
      without thermal damage; starting at 100W for controlled ablation. Max safe ~300-500W to avoid cracking due to low thermal
      conductivity (~25 W/mK). Source: IPG Photonics fiber laser specs for cleaning applications; academic review in ''Laser
      Cleaning of Ceramics'' (Optics and Lasers in Engineering, 2018).'
  frequency:
    min: 1
    max: 200
    value: 50
    unit: kHz
    description: 'Typical 20-100 kHz for cleaning; 50 kHz recommended for Si3N4 to achieve fast coverage while limiting heat
      accumulation (trade-off: higher rates speed up process but risk thermal buildup on low-conductivity material). Source:
      Academic literature in Optics Express (2017) on pulse train effects in ceramic ablation.'
componentSummary: These settings utilize a 1064 nm wavelength for strong absorption in Silicon Nitride, with 100 W power and
  10 ns pulses to ablate contaminants efficiently while minimizing thermal stress on the brittle ceramic.

