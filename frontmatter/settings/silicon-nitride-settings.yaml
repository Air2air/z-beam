description: >-
  When laser cleaning Silicon Nitride, watch its brittleness first—it cracks easily under sudden heat. I've seen that
  happen when folks push too hard right away. This works best if you start with gentle pulses to warm the surface
  slowly, building up over a few passes. That way, you remove contaminants without risking fractures, keeping the
  material's tough, heat-resistant nature intact. Just avoid high speeds early on.
