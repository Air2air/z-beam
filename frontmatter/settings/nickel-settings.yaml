  power:
    min: 20
    max: 300
    value: 100
    unit: W
    description: 'Typical range for pulsed fiber lasers at 1064 nm used in industrial
      cleaning of reflective metals like nickel; starting at 100 W balances efficiency
      and safety to avoid thermal damage due to nickel''s high reflectivity (~60%
      at 1064 nm) and thermal conductivity (90 W/m·K). Max safe before substrate melting
      (1455°C) is ~300 W with short pulses. Source: IPG Photonics YLR series specs
      and study in Optics and Lasers in Engineering (2018) on metal surface cleaning.'
  scan_speed:
    min: 10
    max: 5000
    value: 1500
    unit: mm/s
    description: 'Effective range for contamination removal on nickel; slower for
      heavy oxides (500-1000 mm/s) to ensure ablation, faster for light contaminants
      (2000-3000 mm/s). Recommended 1500 mm/s for optimal balance of throughput and
      uniform cleaning without excessive heat buildup. Source: Industry standards
      from Laserax equipment manuals and Journal of Laser Applications (2020) case
      study on nickel alloys.'
  pulse_width:
    min: 0.1
    max: 1000
    value: 50
    unit: ns
    description: 'Nanosecond regime (10-200 ns) is typical and cost-effective for
      nickel cleaning at 1064 nm; picosecond (ps) or femtosecond (fs) reduces heat-affected
      zone (HAZ <1 μm) but is unnecessary for most industrial apps. Recommended 50
      ns for minimal HAZ (~5-10 μm) on nickel''s reflective surface. Source: Laser
      physics research in Applied Surface Science (2019) comparing pulse regimes for
      metals.'
  repetition_rate:
    min: 1
    max: 200
    value: 30
    unit: kHz
    description: 'Typical 10-100 kHz for pulsed cleaning; higher rates (>50 kHz) speed
      up process but increase heat accumulation on nickel due to its conductivity,
      risking subsurface damage. Recommended 30 kHz for nickel to optimize energy
      delivery without overheating. Source: Academic literature in Lasers in Manufacturing
      and Materials Processing (2021) on frequency effects in metal ablation.'
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Fluence range for safe contaminant removal; nickel''s ablation threshold
      at 1064 nm is ~1-2 J/cm² due to high reflectivity, with damage threshold ~4-6
      J/cm² to avoid melting. Recommended 1.5 J/cm² for effective cleaning below damage
      threshold. Source: Ablation threshold studies in Journal of Applied Physics
      (2017) and Optics Express (2022) on nickel surfaces.'
  spot_size:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Beam diameter range for cleaning; smaller (50-100 μm) for fine details,
      larger (300-500 μm) for broad areas. Recommended 200 μm for nickel to achieve
      uniform fluence distribution and control heat input on reflective surfaces.
      Source: Equipment specifications from Coherent and Trumpf laser systems, per
      industrial cleaning guidelines.'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass (2-5) for heavy
      layers to ensure complete removal without exceeding damage thresholds. Recommended
      2 passes for nickel in industrial prep to minimize thermal stress. Source: Industry
      practice in case studies from Surface and Coatings Technology (2019) on nickel
      oxide removal.'
  overlap_ratio:
    min: 10
    max: 90
    value: 60
    unit: '%'
    description: 'Typical 30-80% for uniform coverage; higher overlap ensures no gaps
      but increases heat exposure on nickel. Recommended 60% for balanced uniformity
      and efficiency in scan line coverage. Source: Process optimization studies in
      International Journal of Advanced Manufacturing Technology (2020) for laser
      cleaning of metals.'
