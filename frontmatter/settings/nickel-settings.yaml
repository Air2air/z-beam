description: >-
  When laser cleaning nickel, we often run into its strong reflectivity first. This bounces back a good portion of the
  beam. So, the energy doesn't sink in as deeply as we'd like. We've found that starting with focused pulses helps
  overcome this. Nickel conducts heat quickly too. That spreads warmth evenly and avoids hot spots. But it also means
  you need steady control to prevent warping. Its tough surface resists corrosion well. So, cleaning uncovers a durable
  base without extra damage risks. We typically use multiple light passes for even removal. Watch out at the end—overdo
  the power, and you risk surface cracks from thermal stress.
