description: >-
  When laser cleaning Ruthenium, you'll want to contrast it with softer non-ferrous metals like aluminum. Ruthenium
  stands out for its extreme hardness and density, which make it resist deformation better than those. This means you
  must start with controlled pulses to avoid uneven ablation.


  Watch out here—its high reflectivity bounces most laser energy away, so mid-process, you need to increase overlap
  without overheating. Make sure you adjust scan speed slower than for copper, since Ruthenium conducts heat quickly and
  evenly.


  That spreads energy well, but it cuts risk of cracks if you keep passes minimal. You should test on scrap first, as
  its corrosion resistance holds up post-clean but demands gentle settings to preserve shine.
