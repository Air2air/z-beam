machineSettings:
  wavelength:
    description: Near-IR wavelength for efficient Ruthenium oxide absorption with minimal substrate interaction
    unit: nm
    value: 1064
    min: 355
    max: 10640
  spotSize:
    min: 0.1
    max: 500
    unit: μm
    value: 200
    description: 'Smaller spots (50-200 μm) for fine surface prep on Ruthenium components; larger (200-500 μm) for broad areas.
      200 μm recommended for uniform energy distribution on small industrial parts. Source: Equipment specs from Coherent
      and Trumpf lasers for precision cleaning.'
  energyDensity:
    min: 0.1
    max: 20.0
    value: 1
    unit: J/cm²
    description: 'Fluence range for contaminant ablation without substrate damage; Ruthenium damage threshold ~4-5 J/cm² at
      1064 nm due to high melting point. Recommended 1 J/cm² for safe cleaning of light contaminants. Source: Ablation threshold
      studies (e.g., Journal of Applied Physics on noble metal thresholds; conservative estimate for Ru similar to Pt/Rh).'
  pulseWidth:
    min: 0.1
    max: 1000
    unit: ns
    value: 20
    description: 'Nanosecond regime preferred for Ruthenium cleaning to ablate contaminants while minimizing heat-affected
      zone (HAZ); picosecond (ps) or femtosecond (fs) for ultra-precise but costlier applications. 20 ns recommended for low
      thermal damage on high-reflectivity surfaces. Source: Laser physics studies (e.g., Applied Surface Science journal on
      ns vs. ps ablation thresholds for noble metals).'
  scanSpeed:
    min: 10
    max: 5000
    value: 500
    unit: mm/s
    description: 'Effective for contamination removal; slower for heavy contamination (100-500 mm/s), faster for light (500-2000
      mm/s). Recommended 500 mm/s for Ruthenium to ensure uniform cleaning without excessive heat accumulation due to its
      thermal conductivity (~120 W/m·K). Source: Industry standards from Laserax and CleanLaser equipment manuals.'
  passCount:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination; multi-pass (2-5) for heavy layers to avoid damage. Recommended 2 passes
      for Ruthenium to ensure complete removal while respecting thermal properties. Source: Industry case studies (e.g., laser
      cleaning of catalytic surfaces in chemical engineering reports).'
  overlapRatio:
    min: 10
    max: 90
    unit: '%'
    value: 50
    description: 'Ensures uniform coverage without gaps or over-ablation; 50% optimal for Ruthenium to prevent uneven heating
      on reflective surfaces. Typical range 30-80% based on scan patterns. Source: Process optimization studies (e.g., Journal
      of Laser Applications on scan overlap for metal surface treatment).'
  laserPower:
    description: Optimal average power for Ruthenium oxide removal without substrate damage
    unit: W
    value: 45
    min: 1.0
    max: 120
  laserPowerAlternative:
    min: 50
    max: 500
    value: 200
    unit: W
    description: 'Typical range for industrial Nd:YAG laser cleaning of reflective metals like Ruthenium; starting at 200
      W balances efficiency and heat input to avoid melting (melting point ~2334°C). Source: IPG Photonics YLR series specs
      and general metal cleaning guidelines (e.g., SPIE proceedings on laser ablation).'
  frequency:
    min: 1
    max: 200
    value: 50
    unit: kHz
    description: 'Standard for pulsed cleaning; higher rates (50-100 kHz) speed up process but risk heat buildup on Ruthenium''s
      reflective surface (reflectivity ~60% at 1064 nm). 50 kHz balances speed and safety. Trade-off: high freq increases
      overlap heating. Source: Academic literature (e.g., Optics & Lasers in Engineering on repetition rate effects in metal
      cleaning).'
componentSummary: These settings leverage 1064 nm wavelength for strong Ruthenium absorption, with 200 W power and 8 ns pulses
  to precisely ablate surface contaminants without inducing thermal oxidation or substrate damage.
