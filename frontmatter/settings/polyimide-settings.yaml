  power:
    min: 20
    max: 200
    value: 50
    unit: W
    description: Typical range for industrial laser cleaning of polymers like polyimide to avoid thermal damage; starting
      at 50W for controlled contaminant removal. Max safe below 200W to prevent substrate ablation (based on IPG Photonics
      YLR series specs and studies in Optics and Lasers in Engineering, 2018, on polymer cleaning).
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 1500
    description: Effective speeds for 1064nm cleaning of polyimide; slower for heavy contamination (500-1000 mm/s), faster
      for light (2000-3000 mm/s). Recommended 1500 mm/s for balance of efficiency and minimal HAZ (industry standards from
      Laserax equipment manuals and J. Cleaner Production, 2020, case studies on surface prep).
  pulse_width:
    min: 0.1
    max: 1000
    value: 20
    unit: ns
    description: Nanosecond regime preferred for polyimide to balance cleaning efficacy and cost; picosecond (ps) or femtosecond
      (fs) for ultra-minimal HAZ but less common industrially. 20 ns recommended to reduce heat accumulation given polyimide's
      low thermal conductivity (Laser & Particle Beams journal, 2019, on pulse regimes for polymers).
  repetition_rate:
    min: 1
    max: 200
    value: 50
    unit: kHz
    description: Typical for 1064nm cleaning; higher rates increase speed but risk heat buildup in low-conductivity polyimide.
      50 kHz recommended for optimal energy delivery without overheating (trade-off discussed in Applied Surface Science,
      2017, ablation studies on polyimides).
  energy_density:
    min: 0.1
    max: 20.0
    value: 0.8
    unit: J/cm²
    description: Fluence below polyimide damage threshold (~2.5 J/cm² at 1064nm ns pulses) for safe contaminant removal; 0.2-1.0
      for light, up to 2.0 for heavy. Recommended 0.8 J/cm² to ablate contaminants without substrate melting (point ~400°C)
      (from ablation threshold research in Journal of Applied Physics, 2015, on Kapton polyimide).
  spot_size:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: Beam diameter for precise cleaning; smaller for fine details (100-200 μm), larger for areas (300-500 μm).
      200 μm recommended for polyimide surface prep to ensure uniform fluence (equipment specs from Coherent Inc. cleaning
      systems and Optics Express, 2021, on beam profiling for polymers).
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: Single pass for light contamination, multi-pass for heavy; 2 passes recommended for complete polyimide cleaning
      without excessive exposure (industry practice from Adapt Laser Systems case studies and Surface and Coatings Technology,
      2019, on multi-pass optimization).
  overlap_ratio:
    min: 10
    max: 90
    value: 60
    unit: '%'
    description: Ensures uniform coverage; 30-50% for speed, 60-80% for thoroughness on irregular polyimide surfaces. 60%
      recommended to avoid gaps while minimizing overexposure (process studies in Lasers in Manufacturing and Materials Processing,
      2022).
component_summary: These settings, with 50 W power, 1064 nm wavelength, and 10 ns pulses, are appropriate for polyimide by
  delivering precise ablation that minimizes thermal damage to this heat-sensitive polymer while removing contaminants.
