machineSettings:
  wavelength:
    description: Near-infrared wavelength for optimal Poplar absorption and minimal subsurface damage
    unit: nm
    value: 1064
    min: 355
    max: 10640
  spotSize:
    min: 0.1
    max: 500
    unit: μm
    value: 200
    description: Beam diameter for uniform coverage; 200 μm recommended for Poplar surface prep (fine detail). Smaller for precision, larger for broad areas. From manufacturer specs (e.g., Coherent lasers) and process optimization in Ind. Laser Sol. (2017).
  energyDensity:
    min: 0.1
    max: 20
    unit: J/cm²
    value: 2
    description: Fluence range for safe contaminant removal; Poplar damage threshold ~3-5 J/cm² due to charring onset. Recommended 2 J/cm² for cleaning without substrate harm. Based on ablation studies in Wood Sci. Technol. (2021).
  pulseWidth:
    min: 0.1
    max: 1000
    unit: ns
    value: 20
    description: Nanosecond regime preferred for Poplar to minimize heat-affected zone (HAZ <50 μm); picosecond (ps) reduces thermal damage further but increases cost. Avoid fs for industrial scale. Supported by laser physics in Opt. Express (2015) on wood ablation thresholds.
  scanSpeed:
    min: 10
    max: 5000
    unit: mm/s
    value: 1500
    description: Effective for contaminant removal without excessive heat buildup; recommended 1500 mm/s for optimal balance on Poplar. Slower (500-1000 mm/s) for heavy contamination, faster (2000-3000 mm/s) for light. From industry standards in Laser Cleaning Handbook (SPI Lasers, 2020).
  passCount:
    min: 1
    max: 10
    unit: passes
    value: 2
    description: Single pass for light contamination, multi-pass for heavy; 2 passes recommended for complete removal on Poplar without damage. Industry practice from case studies in J. Clean. Prod. (2020).
  overlapRatio:
    min: 10
    max: 90
    unit: '%'
    value: 60
    description: Ensures uniform cleaning; 60% recommended for Poplar to avoid gaps or overexposure. Typical 30-50% for large areas, 70-80% for detail. From process studies in Laser & Optoelectron. Prog. (2016).
  dwellTime:
    description: Optimal dwell time per spot for effective cleaning without thermal accumulation
    unit: μs
    value: 100
    min: 0.2
    max: 200
  laserPower:
    description: Optimal average power for Poplar surface cleaning without charring
    unit: W
    value: 100
    min: 1
    max: 120
  laserPowerAlternative:
    min: 10
    max: 200
    value: 50
    unit: W
    description: Typical range for wood cleaning at 1064 nm to avoid charring; starting at 50 W for light contamination on Poplar (low thermal conductivity ~0.1 W/m·K). Max ~200 W risks substrate damage. Based on CleanLaser equipment specs and studies in J. Laser Appl. (2018).
  frequency:
    min: 1
    max: 200
    unit: kHz
    value: 40
    description: Typical for pulsed cleaning; 40 kHz recommended for Poplar to balance speed and heat accumulation (Poplar's low reflectivity ~20% at 1064 nm aids absorption). Higher rates (>50 kHz) speed up but risk overheating. From academic lit. in Appl. Surf. Sci. (2019).
componentSummary: These settings employ moderate power and short nanosecond pulses at 1064 nm to gently ablate surface contaminants from Poplar wood while minimizing charring and thermal damage to its delicate fibers.
