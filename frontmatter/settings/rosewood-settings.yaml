pageTitle: Rosewood
pageDescription: When laser cleaning Rosewood, watch its notable porosity right away—it can trap contaminants deep inside,
  leading to uneven results if you blast too aggressively. I've seen this hardwood absorb laser energy better than many denser
  woods like oak, so it heats up quickly without much reflection. This works best when you start with gentler passes to avoid
  scorching the surface grains. Tends to clean smoothly for cultural artifacts or instruments because of its natural oils
  that resist charring, unlike softer pines. Just keep scans slow and overlap spots well to pull out embedded dirt without
  cracking the fibers.
metaDescription: Rosewood laser cleaning guide. Technical specifications and applications.
