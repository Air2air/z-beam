machineSettings:
  wavelength:
    description: Near-infrared wavelength for optimal absorption in Rosewood lignin and cellulose
    unit: nm
    value: 1064
    min: 355
    max: 10640
  spotSize:
    min: 0.1
    max: 500
    value: 300
    unit: μm
    description: 'Smaller spots for fine surface preparation on detailed rosewood; larger for broad areas. 300 μm recommended for uniform cleaning without excessive heat concentration. Source: Manufacturer specs (e.g., Laserax equipment for organics).'
  energyDensity:
    min: 0.1
    max: 20
    value: 1
    unit: J/cm²
    description: 'Fluence below rosewood damage threshold (~3 J/cm² at 1064 nm) for safe contaminant removal; conservative for reflectivity (~10-20% at NIR). Source: Ablation threshold studies on hardwoods (Journal of Applied Physics, 2017).'
  pulseWidth:
    min: 0.1
    max: 1000
    value: 15
    unit: ns
    description: 'Nanosecond regime preferred for industrial cleaning to minimize heat-affected zone (HAZ) on organic materials like rosewood; picosecond/femtosecond for ultra-precision but costlier. 15 ns balances ablation and thermal control. Source: Laser physics reviews (Optics & Lasers in Engineering, 2018).'
  scanSpeed:
    min: 10
    max: 5000
    unit: mm/s
    value: 500
    description: 'Slower speeds for light contamination (e.g., dust) to prevent overheating; faster for heavy buildup but riskier on rosewood. Recommended 500 mm/s for optimal contaminant removal without substrate ablation. Source: Industry manuals for IPG Photonics cleaners.'
  passCount:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Multi-pass for layered contamination on rosewood to ensure complete removal without single-pass overload; 2 passes typical for industrial prep. Source: Case studies in laser cleaning of cultural artifacts (Studies in Conservation, 2019).'
  overlapRatio:
    min: 10
    max: 90
    value: 70
    unit: '%'
    description: 'Higher overlap ensures uniform coverage and prevents streaking on irregular wood surfaces; 70% optimal for rosewood to minimize passes while avoiding overlap-induced damage. Source: Process optimization in laser scanning (Procedia Manufacturing, 2021).'
  dwellTime:
    description: Optimal dwell time per spot for effective material interaction
    unit: ms
    value: 0.2
    min: 0.2
    max: 200
  laserPower:
    description: Optimal average power for Rosewood surface cleaning without charring
    unit: W
    value: 45
    min: 1
    max: 120
  laserPowerAlternative:
    min: 10
    max: 100
    value: 30
    unit: W
    description: 'Typical range for delicate wood cleaning to avoid thermal damage; starting at 30W balances efficiency and safety for rosewood''s low thermal conductivity (~0.15 W/mK). Source: Adapted from wood restoration studies using Nd:YAG lasers (e.g., Journal of Cultural Heritage, 2015).'
  frequency:
    min: 1
    max: 200
    value: 20
    unit: kHz
    description: 'Lower rates reduce heat accumulation in low-conductivity rosewood; higher rates speed up cleaning but increase burn risk. 20 kHz recommended for effective pulsed cleaning. Source: Academic literature on wood laser ablation (Applied Surface Science, 2020).'
componentSummary: These settings employ moderate power and short nanosecond pulses at 1064 nm to gently ablate surface contaminants from Rosewood while minimizing charring and preserving its delicate grain structure.
