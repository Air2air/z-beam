    unit: W
    description: 'Typical range for delicate wood cleaning to avoid thermal damage; starting at 30W balances efficiency and
      safety for rosewood''s low thermal conductivity (~0.15 W/mK). Source: Adapted from wood restoration studies using Nd:YAG
      lasers (e.g., Journal of Cultural Heritage, 2015).'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 500
    description: 'Slower speeds for light contamination (e.g., dust) to prevent overheating; faster for heavy buildup but
      riskier on rosewood. Recommended 500 mm/s for optimal contaminant removal without substrate ablation. Source: Industry
      manuals for IPG Photonics cleaners.'
  pulse_width:
    min: 0.1
    max: 1000
    value: 15
    unit: ns
    description: 'Nanosecond regime preferred for industrial cleaning to minimize heat-affected zone (HAZ) on organic materials
      like rosewood; picosecond/femtosecond for ultra-precision but costlier. 15 ns balances ablation and thermal control.
      Source: Laser physics reviews (Optics & Lasers in Engineering, 2018).'
  repetition_rate:
    min: 1
    max: 200
    value: 20
    unit: kHz
    description: 'Lower rates reduce heat accumulation in low-conductivity rosewood; higher rates speed up cleaning but increase
      burn risk. 20 kHz recommended for effective pulsed cleaning. Source: Academic literature on wood laser ablation (Applied
      Surface Science, 2020).'
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.0
    unit: J/cm²
    description: 'Fluence below rosewood damage threshold (~3 J/cm² at 1064 nm) for safe contaminant removal; conservative
      for reflectivity (~10-20% at NIR). Source: Ablation threshold studies on hardwoods (Journal of Applied Physics, 2017).'
  spot_size:
    min: 0.1
    max: 500
    value: 300
    unit: μm
    description: 'Smaller spots for fine surface preparation on detailed rosewood; larger for broad areas. 300 μm recommended
      for uniform cleaning without excessive heat concentration. Source: Manufacturer specs (e.g., Laserax equipment for organics).'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Multi-pass for layered contamination on rosewood to ensure complete removal without single-pass overload;
      2 passes typical for industrial prep. Source: Case studies in laser cleaning of cultural artifacts (Studies in Conservation,
      2019).'
  overlap_ratio:
    min: 10
    max: 90
    value: 70
    unit: '%'
    description: 'Higher overlap ensures uniform coverage and prevents streaking on irregular wood surfaces; 70% optimal for
      rosewood to minimize passes while avoiding overlap-induced damage. Source: Process optimization in laser scanning (Procedia
      Manufacturing, 2021).'
challenges:
  thermal_management:
  - challenge: Charring and carbonization
    severity: high
    threshold_temperature: 250-300°C
    impact: Wood chars at low temperatures leaving black marks and structural damage
    solutions:
    - Use pulse mode with 2-5 second cooling between passes
    - Reduce power by 30-40% compared to metals
    - Increase scan speed to reduce dwell time
    - Monitor surface for discoloration; stop if browning occurs
  - challenge: Slow thermal diffusivity
    severity: medium
    property_value: 0.10-0.15 mm²/s (100x slower than aluminum)
    impact: Heat accumulates rapidly causing thermal damage zones
    solutions:
    - Increase cooling time between passes
    - Use lower repetition rates (<20 kHz)
    - Apply crosshatch patterns to distribute heat
  surface_characteristics:
  - challenge: Grain direction sensitivity
    severity: medium
    variation: 20-40% absorption variation by grain orientation
    impact: Laser absorption varies significantly with grain direction
    solutions:
    - Scan parallel to grain for consistent results
    - Use crosshatch pattern (0° and 90°) for uniform cleaning
    - Test on scrap to determine optimal scan direction
  - challenge: Porous structure with deep contamination
    severity: medium
    porosity_range: 12-65% (softwoods highest)
    impact: Contaminants penetrate deep into wood structure
    solutions:
    - Multiple passes with progressive power increase
    - Reduce scan speed for deeper penetration (600 mm/s)
    - Chemical pre-treatment for deep-seated contamination
  contamination_challenges:
  - challenge: Varnish and coating removal
    severity: medium
    impact: Thick coatings require multiple passes and generate smoke/fumes
    solutions:
    - First pass 80W fast (1500 mm/s) for bulk removal
    - Second pass 60W slow (800 mm/s) for residue
    - Use fume extraction to prevent redeposition
    - Limit to 2-3 passes maximum to avoid substrate damage
description: When laser cleaning Rosewood, watch its notable porosity right away—it can trap contaminants deep inside, leading
  to uneven results if you blast too aggressively. I've seen this hardwood absorb laser energy better than many denser woods
  like oak, so it heats up quickly without much reflection. This works best when you start with gentler passes to avoid scorching
  the surface grains. Tends to clean smoothly for cultural artifacts or instruments because of its natural oils that resist
  charring, unlike softer pines. Just keep scans slow and overlap spots well to pull out embedded dirt without cracking the
  fibers.
