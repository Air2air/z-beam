  power:
    min: 50
    max: 500
    value: 100
    unit: W
    description: Typical range for delicate organic materials like wood to avoid thermal damage; starting at 100W for controlled
      cleaning of light contaminants on Ebony. Max safe ~500W to prevent charring (based on general Nd:YAG laser cleaning
      studies for woods, e.g., Journal of Cultural Heritage, 2018).
  scan_speed:
    min: 10
    max: 5000
    value: 1500
    unit: mm/s
    description: Effective speeds balance cleaning efficiency and heat input; slower for heavy contamination (500-1000 mm/s),
      faster for light (2000-3000 mm/s). Recommended 1500 mm/s for uniform Ebony surface prep (industry standards from IPG
      Photonics manuals and laser cleaning process optimization).
  pulse_width:
    min: 0.1
    max: 1000
    value: 20
    unit: ns
    description: Nanosecond regime preferred for minimal heat-affected zone on low-conductivity woods like Ebony; picosecond
      (ps) or femtosecond reduces thermal damage but increases cost. 20 ns typical for 1064 nm cleaning without substrate
      ablation (laser physics research, e.g., Optics & Lasers in Engineering, 2020).
  repetition_rate:
    min: 1
    max: 200
    value: 30
    unit: kHz
    description: 20-50 kHz balances speed and heat accumulation for organic materials; higher rates (>50 kHz) risk overheating
      Ebony due to poor thermal conductivity. Recommended 30 kHz for efficient contaminant removal (academic literature, e.g.,
      Applied Surface Science, 2019).
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: Fluence below Ebony's ablation threshold (~5 J/cm² at 1064 nm for dark woods); 0.5-2 J/cm² for light cleaning,
      up to 4 for heavy. Recommended 1.5 J/cm² safe for contamination removal without fiber damage (ablation threshold studies,
      e.g., Journal of Applied Physics, 2017; conservative for Ebony's low reflectivity).
  spot_size:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: Smaller spots (100-200 μm) for fine detail on Ebony grain, larger (300-500 μm) for broad areas. Recommended
      200 μm for precise industrial cleaning (equipment specs from Coherent and Trumpf laser systems).
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: Single pass for light contaminants, multi-pass (2-3) for heavy or layered removal on woods. Recommended 2
      passes for complete Ebony cleaning without overexposure (industry case studies, e.g., laser restoration of wooden artifacts
      in Heritage Science, 2021).
  overlap_ratio:
    min: 10
    max: 90
    value: 60
    unit: '%'
    description: 50-70% ensures uniform coverage and avoids gaps/striping on irregular surfaces like Ebony; lower for speed,
      higher for thoroughness. Recommended 60% for optimal process (process optimization studies, e.g., Lasers in Manufacturing
      and Materials Processing, 2022).
challenges:
- Requires careful power calibration to prevent material damage
- Monitor surface temperature during processing
- Verify cleaning effectiveness through inspection
