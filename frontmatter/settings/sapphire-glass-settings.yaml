  power:
    min: 20
    max: 200
    value: 50
    unit: W
    description: Typical range for industrial Nd:YAG lasers at 1064 nm used in delicate substrate cleaning; starting at 50
      W balances efficiency and safety for sapphire's high melting point (~2040°C) and low absorption at this wavelength,
      avoiding thermal damage (IPG Photonics laser cleaning systems specs; J. Laser Appl. 2018 study on oxide ceramics).
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 2000
    description: Effective speeds for contamination removal; slower for heavy contaminants (e.g., oils), faster for light
      dust; 2000 mm/s recommended for uniform cleaning on sapphire without excessive heat buildup, considering its good thermal
      conductivity (industry standards from Laserax equipment manuals; Opt. Lasers case studies).
  pulse_width:
    min: 0.1
    max: 1000
    value: 20
    unit: ns
    description: Nanosecond regime preferred over picosecond/femtosecond for cost-effective industrial cleaning; 20 ns minimizes
      heat-affected zone (HAZ) on sapphire due to reduced thermal diffusion; shorter pulses (<10 ns) for ultra-fine control
      but higher cost (laser physics research in Appl. Phys. A 2015 on Al2O3 ablation; Coherent laser parameters).
  repetition_rate:
    min: 1
    max: 200
    value: 50
    unit: kHz
    description: 'Common for pulsed cleaning to achieve high throughput; 50 kHz balances speed and heat management for sapphire,
      where high rates risk accumulation but leverage its thermal conductivity; lower rates for heavy contamination (academic
      literature: J. Phys. D 2020 on pulse overlap in ceramics; manufacturer data from Trumpf).'
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Fluence below sapphire''s damage threshold (~4-6 J/cm² at 1064 nm, 20 ns pulses) for safe contaminant ablation;
      1.5 J/cm² effective for industrial removal without substrate etching, given sapphire''s high reflectivity (~92% transmission,
      low absorption); conservative for optics-grade sapphire (ablation threshold studies: Opt. Express 2017; SPIE Proc. 2019).'
  spot_size:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: Beam diameter range for precision vs. area coverage; 200 μm recommended for sapphire surface preparation,
      allowing fine control on flat/polished surfaces while covering larger areas efficiently; smaller for detailed work (equipment
      specs from Adapt Laser Systems; industry standards for optic cleaning).
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: Single pass for light contamination, multi-pass for stubborn residues; 2 passes typical for complete removal
      on sapphire without risking cumulative damage, based on its hardness and low absorption (industry practice in watchmaking/optics
      case studies; Laser Cleaning Journal 2021).
  overlap_ratio:
    min: 10
    max: 90
    value: 60
    unit: '%'
    description: 'Ensures uniform coverage without gaps or overexposure; 60% recommended for sapphire to achieve even cleaning
      while minimizing total energy input and HAZ, adjustable for contamination density (process optimization studies: Surf.
      Coat. Technol. 2019; manufacturer guidelines from CleanLaser).'
challenges:
  thermal_management:
  - challenge: Thermal shock and catastrophic failure
    severity: critical
    threshold_temperature: ΔT > 40-100°C rapid cooling (glass-dependent)
    impact: Glass shatters from thermal gradients due to low thermal expansion and brittleness
    solutions:
    - Use pulse mode with 5-8 second cooling between passes
    - Preheat substrate to room temperature before cleaning
    - Avoid cold spots (air vents, cold backing) during processing
    - Tempered glass more resistant but still susceptible to thermal shock
    - Monitor for stress fractures; stop immediately if cracks appear
  - challenge: Low thermal diffusivity
    severity: high
    property_value: 0.01-15 mm²/s (most glasses 0.5-1.0 mm²/s)
    impact: Heat accumulates in localized zones creating thermal gradients
    solutions:
    - Reduce power by 30-40% compared to metals
    - Increase scan speed to distribute heat (1000-2000 mm/s)
    - Use defocused beam to spread energy over larger area
    - Optical-grade glass (fused silica) tolerates higher power
  surface_characteristics:
  - challenge: Surface defects and stress concentrators
    severity: high
    impact: Scratches, chips, and inclusions dramatically lower damage threshold
    solutions:
    - Inspect surface with magnification before cleaning
    - Reduce power 40-50% for scratched or damaged glass
    - Clean around defects with extreme caution
    - Polished optical glass requires different parameters than rough architectural glass
  - challenge: Coating and film removal
    severity: medium
    impact: Thin films, anti-reflective coatings, and tints have different damage thresholds than substrate
    solutions:
    - Test on edge first to determine coating removal threshold
    - Coated glass may require 40-60W initial pass
    - Bare glass requires 20-30% lower power after coating removal
    - AR coatings very sensitive - use 30-40W maximum
  contamination_challenges:
  - challenge: Adhesive and paint removal
    severity: medium
    impact: Thick coatings require multiple passes and generate debris that can scratch glass
    solutions:
    - First pass 60W fast (1800 mm/s) for bulk removal
    - Second pass 40W slow (1000 mm/s) for residue
    - Use air assist to blow debris away from surface
    - Chemical pre-treatment reduces laser exposure time
    - Avoid dragging ablated material across clean areas
description: "When laser cleaning sapphire glass, watch its extreme hardness first. It resists contaminants well but can crack\
  \ under sudden heat. We've found that starting with gentle pulses avoids this. \n\nThis material stands out for its heat\
  \ resistance in tough spots like watches or medical gear. Low expansion keeps it stable, unlike softer glasses. We typically\
  \ use steady scans to clear grime without scratching. \n\nJust adjust overlap for even coverage. Skip high speeds—they scatter\
  \ debris. In our experience, this restores shine safely every time."
