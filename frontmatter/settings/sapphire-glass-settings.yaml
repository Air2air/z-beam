machineSettings:
  wavelength:
    description: Optimal wavelength for Sapphire Glass processing with good absorption
    unit: nm
    value: 1064
    min: 355
    max: 10640
  spotSize:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: Beam diameter range for precision vs. area coverage; 200 μm recommended for sapphire surface preparation,
      allowing fine control on flat/polished surfaces while covering larger areas efficiently; smaller for detailed work (equipment
      specs from Adapt Laser Systems; industry standards for optic cleaning).
  energyDensity:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Fluence below sapphire''s damage threshold (~4-6 J/cm² at 1064 nm, 20 ns pulses) for safe contaminant ablation;
      1.5 J/cm² effective for industrial removal without substrate etching, given sapphire''s high reflectivity (~92% transmission,
      low absorption); conservative for optics-grade sapphire (ablation threshold studies: Opt. Express 2017; SPIE Proc. 2019).'
  pulseWidth:
    min: 0.1
    max: 1000
    value: 20
    unit: ns
    description: Nanosecond regime preferred over picosecond/femtosecond for cost-effective industrial cleaning; 20 ns minimizes
      heat-affected zone (HAZ) on sapphire due to reduced thermal diffusion; shorter pulses (<10 ns) for ultra-fine control
      but higher cost (laser physics research in Appl. Phys. A 2015 on Al2O3 ablation; Coherent laser parameters).
  scanSpeed:
    min: 10
    max: 5000
    unit: mm/s
    value: 2000
    description: Effective speeds for contamination removal; slower for heavy contaminants (e.g., oils), faster for light
      dust; 2000 mm/s recommended for uniform cleaning on sapphire without excessive heat buildup, considering its good thermal
      conductivity (industry standards from Laserax equipment manuals; Opt. Lasers case studies).
  passCount:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: Single pass for light contamination, multi-pass for stubborn residues; 2 passes typical for complete removal
      on sapphire without risking cumulative damage, based on its hardness and low absorption (industry practice in watchmaking/optics
      case studies; Laser Cleaning Journal 2021).
  overlapRatio:
    min: 10
    max: 90
    value: 60
    unit: '%'
    description: 'Ensures uniform coverage without gaps or overexposure; 60% recommended for sapphire to achieve even cleaning
      while minimizing total energy input and HAZ, adjustable for contamination density (process optimization studies: Surf.
      Coat. Technol. 2019; manufacturer guidelines from CleanLaser).'
  dwellTime:
    description: Optimal dwell time per cleaning spot location
    unit: μs
    value: 100
    min: 0.2
    max: 200
  laserPower:
    description: Optimal power range for Sapphire Glass cleaning without thermal damage
    unit: W
    value: 100
    min: 1.0
    max: 120
  laserPowerAlternative:
    min: 20
    max: 200
    value: 50
    unit: W
    description: Typical range for industrial Nd:YAG lasers at 1064 nm used in delicate substrate cleaning; starting at 50
      W balances efficiency and safety for sapphire's high melting point (~2040°C) and low absorption at this wavelength,
      avoiding thermal damage (IPG Photonics laser cleaning systems specs; J. Laser Appl. 2018 study on oxide ceramics).
  frequency:
    min: 1
    max: 200
    value: 50
    unit: kHz
    description: 'Common for pulsed cleaning to achieve high throughput; 50 kHz balances speed and heat management for sapphire,
      where high rates risk accumulation but leverage its thermal conductivity; lower rates for heavy contamination (academic
      literature: J. Phys. D 2020 on pulse overlap in ceramics; manufacturer data from Trumpf).'
componentSummary: These settings employ moderate 50 W power and 10 ns pulses at 1064 nm to precisely ablate contaminants from
  Sapphire Glass, preserving its high thermal stability and optical clarity without subsurface damage.
