  power:
    min: 50
    max: 1000
    value: 200
    unit: W
    description: 'Typical range for 1064 nm Nd:YAG lasers in industrial stone cleaning; starting at 200W balances efficiency
      and safety to avoid thermal damage to sandstone''s low thermal conductivity (~2 W/mK). Max safe ~500-1000W before risking
      fractures (source: Lee et al., 2016, J. Cult. Herit.; IPG Photonics specs).'
  scan_speed:
    min: 10
    max: 5000
    value: 1000
    unit: mm/s
    description: 'Effective range for contamination removal; slower (100-500 mm/s) for heavy soiling, faster (2000-5000 mm/s)
      for light; 1000 mm/s recommended for optimal balance on porous sandstone to prevent overheating (source: Industry guidelines
      from LaserClen systems; Asmus, 1995, Stud. Conserv.).'
  pulse_width:
    min: 0.1
    max: 1000
    unit: ns
    value: 15
    description: 'Nanosecond regime (5-50 ns) typical for 1064 nm cleaning of stone; 15 ns recommended for minimal heat-affected
      zone (HAZ) on sandstone, reducing thermal diffusion; picosecond (ps) options (e.g., 10-100 ps) for ultra-precision but
      higher cost (source: Ancona et al., 2010, Opt. Express; laser physics reviews on ablation).'
  repetition_rate:
    min: 1
    max: 200
    value: 30
    unit: kHz
    description: 'Common range for pulsed cleaning; 20-50 kHz recommended for sandstone to achieve fast coverage without excessive
      heat accumulation, trading off speed vs. thermal buildup in low-conductivity material (source: Pouli et al., 2015, Appl.
      Phys. A; academic studies on pulse overlap).'
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Fluence range for safe ablation of contaminants; sandstone damage threshold ~3-5 J/cm² (quartz component);
      1.5 J/cm² recommended for cleaning without substrate harm, based on reflectivity (~0.2-0.4 at 1064 nm) (source: Ristoscu
      et al., 2018, Appl. Surf. Sci.; ablation threshold studies).'
  spot_size:
    min: 0.1
    max: 500
    unit: μm
    value: 200
    description: 'Beam diameter range for industrial cleaning; 100-200 μm for fine detail on textured sandstone, 300-500 μm
      for large areas; 200 μm recommended for uniform energy distribution and control (source: Coherent/Trumpf equipment manuals;
      case studies in stone restoration).'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass (2-5) for heavy layers; 2 passes recommended for complete
      removal on sandstone without overexposure, allowing cooling between passes (source: Industry practice in heritage cleaning;
      Verges-Belmin, 2008, J. Cult. Herit.).'
  overlap_ratio:
    min: 10
    max: 90
    value: 50
    unit: '%'
    description: 'Standard range for uniform coverage; 50% recommended for sandstone to ensure no gaps in porous surfaces
      while minimizing total energy input and heat buildup (source: Process optimization in laser scanning; Klein et al.,
      1999, J. Appl. Phys.).'
challenges:
  thermal_management:
  - challenge: Thermal shock and microcracking
    severity: critical
    threshold_temperature: ΔT > 50-150°C rapid cooling (stone-dependent)
    impact: Natural stone contains microfissures that propagate under thermal stress
    solutions:
    - Use pulse mode with 8-12 second cooling between passes
    - Reduce power by 40-50% for weathered or damaged stone
    - Preheat substrate if possible to reduce thermal gradients
    - Granite more resistant than marble; sandstone most vulnerable
    - Monitor for surface crazing; stop immediately if cracks appear
  - challenge: Moisture-induced spalling
    severity: high
    threshold_temperature: Steam formation >100°C with trapped moisture
    impact: Porous stone traps moisture that explosively converts to steam
    solutions:
    - Test moisture content before cleaning (>3% requires drying)
    - Allow 48-72 hours drying after rain before laser cleaning
    - Reduce power by 50% for damp stone
    - Use pulse mode with extended cooling (15-20 seconds)
    - Heritage stone requires especially gentle approach
  surface_characteristics:
  - challenge: Weathering and surface degradation
    severity: high
    impact: Aged stone has weaker surface layer more susceptible to damage
    solutions:
    - Reduce power 40-60% for weathered stone vs fresh stone
    - Test on inconspicuous area first
    - Multiple gentle passes (4-6 at 40-60W) preferred
    - Monitor for powdering or flaking; adjust power immediately
    - Heritage conservation requires documentation and testing
  - challenge: Mineral composition heterogeneity
    severity: medium
    impact: Mixed minerals have different absorption and damage thresholds
    solutions:
    - Use moderate power (60-80W) suitable for both light and dark minerals
    - Crosshatch scan pattern for uniform coverage
    - Avoid dwelling on dark minerals (feldspar, mica) which absorb more energy
    - Quartzite and marble more homogeneous than granite
  contamination_challenges:
  - challenge: Biological growth and deep staining
    severity: medium
    porosity_range: 0.5-25% (sandstone highly porous)
    impact: Algae, lichen, and pollution penetrate deep into porous structure
    solutions:
    - First pass 80W fast (1200 mm/s) for surface growth
    - Second pass 60W slow (700 mm/s) for roots and stains
    - Third pass 40W very slow (400 mm/s) for deep staining
    - Chemical biocide pre-treatment kills roots and reduces laser exposure
    - Dense stones (granite, marble) clean in 1-2 passes vs 3-4 for porous stones
description: When laser cleaning sandstone, the biggest hurdle I've seen is its porous, layered structure that traps grime
  deep inside while heating unevenly during treatment. This tends to cause micro-cracks if you push too hard, since the stone's
  sedimentary makeup varies from spot to spot. To handle it, go slow with gentle pulses that let the laser seep into those
  pores without overwhelming the surface, focusing on dry runs first to map weak areas. Watch out at the end—overlapping passes
  can still fracture edges, so always cool between them.
