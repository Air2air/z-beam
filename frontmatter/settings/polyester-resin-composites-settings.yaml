    description: 'Typical range for industrial 1064 nm laser cleaning of polymer composites to balance efficiency and heat
      input; starting at 100 W avoids thermal damage to polyester''s low melting point (~260°C). Max safe ~300 W at high speeds
      to prevent substrate ablation. Source: Laserax manufacturer specs and studies in Optics and Lasers in Engineering (2018)
      on composite surface prep.'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 2000
    description: 'Effective range for contamination removal; slower (500-1000 mm/s) for heavy contaminants like oils, faster
      (2000-5000 mm/s) for light dust. Recommended 2000 mm/s for optimal cleaning without overheating polyester''s low thermal
      conductivity (~0.2 W/m·K). Source: IPG Photonics equipment manuals and Journal of Cleaner Production (2020) case studies
      on polymer composites.'
  pulse_width:
    min: 0.1
    max: 1000
    unit: ns
    value: 20
    description: 'Nanosecond regime (5-100 ns) preferred over ps/fs for cost-effective 1064 nm cleaning of composites; 20
      ns minimizes heat-affected zone (HAZ <50 μm) by reducing thermal diffusion in polyester. Ps/fs (e.g., <1 ps) for ultra-precise
      but less common industrially. Source: Laser physics research in Applied Surface Science (2019) on polymer ablation thresholds.'
  repetition_rate:
    min: 1
    max: 200
    unit: kHz
    value: 30
    description: 'Typical 10-100 kHz for pulsed cleaning; 30 kHz recommended for polyester composites to achieve fast coverage
      while limiting heat accumulation (trade-off: higher rates speed up process but risk melting if >50 kHz without high
      speed). Source: Academic literature in Lasers in Manufacturing and Materials Processing (2021) on fiber-reinforced polymers.'
  energy_density:
    min: 0.1
    max: 20.0
    unit: J/cm²
    value: 1.5
    description: 'Fluence range for safe ablation of contaminants; damage threshold for polyester composites ~3-5 J/cm² due
      to reflectivity (~5-10% at 1064 nm) and low thermal conductivity. Recommended 1.5 J/cm² for effective cleaning without
      substrate damage. Source: Ablation threshold studies in Composites Part B: Engineering (2017) and SPIE proceedings on
      laser cleaning.'
  spot_size:
    min: 0.1
    max: 500
    unit: μm
    value: 200
    description: 'Typical beam diameter for industrial cleaning; 100-200 μm for fine surface prep on composites, 300-500 μm
      for large areas. 200 μm recommended for polyester to ensure uniform energy distribution and avoid localized overheating.
      Source: Coherent Inc. equipment specifications and industry standards from Laser Institute of America.'
  pass_count:
    min: 1
    max: 10
    unit: passes
    value: 2
    description: 'Single pass for light contamination, multi-pass (2-5) for heavy layers; 2 passes recommended for complete
      removal on polyester composites without excessive heat buildup. Source: Industry practice in case studies from Journal
