machineSettings:
  wavelength:
    description: Near-infrared wavelength for optimal Tungsten Carbide absorption
    unit: nm
    value: 1064
    min: 355
    max: 10640
  spotSize:
    min: 0.1
    max: 500
    unit: μm
    value: 200
    description: 'Beam diameter range for cleaning; smaller (50-200 μm) for fine detail on WC tools, larger (200-500 μm) for
      broad surface prep. 200 μm recommended for uniform coverage on hard, reflective surfaces. Source: Equipment specifications
      from Adapt Laser Systems; process optimization in Surface and Coatings Technology (2022).'
  energyDensity:
    min: 0.1
    max: 20.0
    unit: J/cm²
    value: 2
    description: 'Fluence range below WC damage threshold (~5-10 J/cm² at 1064 nm) for contaminant removal; 0.5-2 J/cm² for
      light cleaning, up to 5 for heavy. Recommended 2 J/cm² ensures safe ablation of oxides without melting. Source: Ablation
      threshold studies in Journal of Applied Physics (2017) for Tungsten Carbide; conservative for reflectivity reducing
      absorption.'
  pulseWidth:
    min: 0.1
    max: 1000
    value: 50
    unit: ns
    description: 'Nanosecond regime (5-200 ns) preferred for industrial cleaning of WC to ablate contaminants while minimizing
      heat-affected zone (HAZ); picosecond (ps) or femtosecond (fs) for ultra-precise but costlier. 50 ns balances energy
      deposition on reflective WC. Source: Laser physics research in Applied Surface Science (2019) on pulse duration effects
      for ceramics; avoids fs due to WC''s thermal properties.'
  scanSpeed:
    min: 10
    max: 5000
    unit: mm/s
    value: 2000
    description: 'Effective range for 1064 nm cleaning; slower speeds (500-1500 mm/s) for heavy contamination like oxides,
      faster (2000-5000 mm/s) for light surface prep. Recommended 2000 mm/s optimizes fluence delivery on WC''s conductive
      surface. Source: Industry standards from Laserax equipment manuals; case studies in Journal of Cleaner Production (2020)
      for carbide tool cleaning.'
  passCount:
    min: 1
    max: 10
    unit: passes
    value: 3
    description: 'Single pass for light contamination, multi-pass (2-5) for complete removal of heavy layers on WC; up to
      10 for thick coatings. 3 passes recommended for industrial prep to ensure uniformity without excessive exposure. Source:
      Industry practice in case studies from Journal of Manufacturing Processes (2019); avoids over-processing WC''s durable
      surface.'
  overlapRatio:
    min: 10
    max: 90
    unit: '%'
    value: 60
    description: 'Typical 30-80% for uniform scan coverage; 50-70% optimal for WC to prevent gaps in contaminant removal while
      minimizing heat buildup. 60% balances efficiency and even fluence distribution. Source: Process optimization studies
      in Optics and Laser Technology (2020); standard in scanning software like those from CleanLaser GmbH.'
  laserPower:
    description: Optimal average power for Tungsten Carbide oxide layer removal
    unit: W
    value: 100
    min: 1.0
    max: 120
  laserPowerAlternative:
    min: 50
    max: 500
    value: 150
    unit: W
    description: 'Typical range for industrial cleaning of hard materials like Tungsten Carbide to remove contaminants without
      ablation; starting at 100-200W to balance efficiency and safety. Max limited to avoid thermal damage given WC''s high
      melting point (~2870°C) and reflectivity at 1064 nm. Source: IPG Photonics YLR series specs for cleaning applications;
      academic review in Optics and Lasers in Engineering (2018) on metal cleaning thresholds.'
  frequency:
    min: 1
    max: 200
    unit: kHz
    value: 30
    description: 'Typical 10-100 kHz for pulsed cleaning; higher rates increase speed but risk heat accumulation on WC''s
      moderate thermal conductivity (~80 W/m·K). 30 kHz recommended for controlled overlap without overheating. Trade-off:
      high freq faster but monitor for substrate damage. Source: Academic literature in Lasers in Manufacturing and Materials
      Processing (2021); Coherent Armonia series specs.'
componentSummary: These settings utilize moderate power and short nanosecond pulses at 1064 nm to ablate contaminants from
  hard Tungsten Carbide without causing thermal cracking or substrate damage.
