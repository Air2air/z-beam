  power:
    min: 10
    max: 100
    value: 30
    unit: W
    description: Typical range for polymer cleaning to avoid thermal damage; starting at 30W for light contamination on TPE,
      max below melting threshold (~150-200°C); based on IPG Photonics specs for YLR series lasers and studies in Optics and
      Lasers in Engineering (2018).
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 2000
    description: Higher speeds minimize heat accumulation on heat-sensitive TPE; 2000 mm/s optimal for effective contaminant
      removal without substrate melting; ranges adjust for light (faster) vs heavy contamination; from industry manuals like
      those from Laserax and Applied Optics journal (2020).
  pulse_width:
    min: 0.1
    max: 1000
    value: 20
    unit: ns
    description: Nanosecond regime preferred over ps/fs for cost-effective cleaning of polymers; 20 ns minimizes HAZ by rapid
      energy delivery before conduction; TPE's low thermal conductivity (~0.2 W/mK) benefits short pulses; cited in Laser
      & Photonics Reviews (2019) on polymer ablation.
  repetition_rate:
    min: 1
    max: 200
    value: 50
    unit: kHz
    description: Balanced rate for TPE to enable fast cleaning while limiting heat buildup; higher rates increase speed but
      risk accumulation on low-melting TPE; trade-off noted in academic literature like Journal of Applied Physics (2021).
  energy_density:
    min: 0.1
    max: 20.0
    value: 0.5
    unit: J/cm²
    description: Fluence below TPE damage threshold (~1-2 J/cm² at 1064 nm due to moderate absorption); 0.5 J/cm² safe for
      contaminant removal; conservative for reflectivity (~0.9) and low melting point; from ablation threshold studies in
      Applied Surface Science (2017).
  spot_size:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 200 μm recommended for uniform cleaning on TPE surfaces; smaller for fine details, larger for broad areas;
      suits industrial prep without focusing heat; per equipment specs from Coherent Inc. and process guidelines in Industrial
      Laser Solutions (2022).
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: Multi-pass for heavy contamination on TPE to stay under thermal limits; 2 passes typical for complete removal
      without damage; single pass for light soils; based on case studies in Journal of Cleaner Production (2020) for polymer
      surface prep.
  overlap_ratio:
    min: 10
    max: 90
    value: 60
    unit: '%'
    description: 60% ensures uniform coverage on irregular TPE surfaces; higher for heavy contamination to avoid gaps; standard
      range optimizes energy distribution; from process optimization in Lasers in Manufacturing and Materials Processing (2019).
component_summary: These settings use moderate 30 W power and 10 ns pulses at 1064 nm to gently ablate contaminants from heat-sensitive
  Thermoplastic Elastomer, minimizing thermal damage and preserving material integrity.
