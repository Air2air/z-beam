machineSettings:
  wavelength:
    description: Near-IR wavelength providing good absorption in metallic matrix while minimizing damage to ceramic reinforcements
    unit: nm
    value: 1064
    min: 355
    max: 10640
  spotSize:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Beam diameter range for cleaning; smaller for fine surface prep on MMCs (100-200 μm), larger for broad areas
      (300-500 μm); 200 μm recommended to focus energy on contaminants while minimizing exposure to heterogeneous MMC structure
      (source: equipment specs from Coherent and Trumpf laser systems for composites).'
  energyDensity:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Fluence range for safe contaminant ablation on MMCs; damage threshold ~2-4 J/cm² for matrices like Ti or
      Al with ceramic particles, lower to prevent cracking; 1.5 J/cm² recommended for effective cleaning without exceeding
      ablation thresholds (source: ablation threshold studies in Journal of Materials Processing Technology).'
  pulseWidth:
    min: 0.1
    max: 1000
    value: 30
    unit: ns
    description: 'Nanosecond regime preferred for MMCs at 1064 nm to achieve effective cleaning with minimal heat-affected
      zone (HAZ); picosecond (ps) or femtosecond for ultra-precision but costlier; 30 ns recommended to limit thermal diffusion
      in high-conductivity matrices like Al-based MMCs (source: laser physics research in Optics Express on pulsed ablation
      of composites).'
  scanSpeed:
    min: 10
    max: 5000
    unit: mm/s
    value: 1500
    description: 'Effective speeds for contamination removal on MMCs; higher for light oils/dusts (2000-3000 mm/s), lower
      for heavy oxides (500-1000 mm/s) to ensure ablation without excessive heat buildup; recommended 1500 mm/s for balanced
      efficiency (source: IPG Photonics laser cleaning manuals and industry standards for metallic composites).'
  passCount:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass (2-4) for heavy layers to avoid thermal damage in MMCs;
      2 passes recommended for uniform removal and surface preparation without risking delamination (source: industry case
      studies in Laser Cleaning Handbook and practical applications on aerospace MMCs).'
  overlapRatio:
    min: 10
    max: 90
    value: 60
    unit: '%'
    description: 'Ensures uniform coverage in scan patterns; 60% typical for MMCs to prevent gaps in cleaning while avoiding
      overexposure that could heat sensitive interfaces; range adjusted for contamination density (source: process optimization
      studies in International Journal of Advanced Manufacturing Technology).'
  dwellTime:
    description: Effective interaction time per spot location
    unit: μs
    value: 100
    min: 0.2
    max: 200
  laserPower:
    description: Optimal average power for MMCs cleaning considering thermal conductivity and matrix integrity
    unit: W
    value: 100
    min: 1.0
    max: 120
  laserPowerAlternative:
    min: 50
    max: 300
    value: 100
    unit: W
    description: 'Typical range for industrial cleaning of MMCs at 1064 nm to remove contaminants without delaminating reinforcements;
      starting at 100 W for light contamination, max below 300 W to avoid substrate damage due to thermal sensitivity of composite
      interfaces (source: studies in Journal of Laser Applications, e.g., on Al/SiC MMCs).'
  frequency:
    min: 1
    max: 200
    value: 50
    unit: kHz
    description: 'Typical for pulsed cleaning applications; 50 kHz balances speed and heat management for MMCs, as higher
      rates (>80 kHz) risk accumulation in lower-conductivity reinforcements like SiC, while lower aids heavy contamination
      (source: academic literature in Applied Surface Science on fiber laser cleaning of MMCs).'
componentSummary: These settings, featuring 100 W power, 1064 nm wavelength, and 10 ns pulses, enable precise contaminant
  removal from MMCs while minimizing thermal stress to prevent delamination at matrix-reinforcement interfaces.
