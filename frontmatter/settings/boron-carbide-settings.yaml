machineSettings:
  wavelength:
    value: 1064
    unit: nm
    description: Near-IR wavelength for optimal absorption
    min: 355
    max: 10640
  spotSize:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Beam diameter range for precision vs. area coverage; 200 μm recommended for B4C surface preparation to focus
      energy on contaminants while minimizing edge effects; smaller for fine details, larger for broad areas. Source: Equipment
      specs from Coherent Armonia series and industrial cleaning guidelines.'
  energyDensity:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Fluence range for safe contaminant ablation; B4C damage threshold ~2-3 J/cm² at 1064 nm ns pulses; 1.5 J/cm²
      recommended for cleaning without substrate damage, considering high absorption. Source: Ablation threshold studies on
      B4C (Opt. Express 2017); conservative to account for variability in surface reflectivity.'
  pulseWidth:
    min: 0.1
    max: 1000
    value: 20
    unit: ns
    description: 'Nanosecond regime preferred for B4C to enable shockwave-based cleaning with minimal heat-affected zone (HAZ
      <10 μm); picosecond (ps) or femtosecond (fs) reduce thermal effects but increase cost; 20 ns recommended for reflectivity
      (~0.3 at 1064 nm) and hardness. Source: Laser physics research on ceramic ablation (Appl. Surf. Sci. 2019); ns avoids
      excessive melting.'
  scanSpeed:
    min: 10
    max: 5000
    unit: mm/s
    value: 1000
    description: 'Effective range for contaminant removal without substrate ablation; recommended 1000 mm/s for optimal balance
      on B4C surfaces; slower (200-800 mm/s) for heavy contamination, faster (2000-5000 mm/s) for light oxides/dust. Source:
      Industry standards from Adapt Laser Systems manuals and process optimization in Opt. Lasers Eng. (2020).'
  passCount:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Typically 1-3 passes for complete removal of industrial contaminants; multi-pass (2 recommended) for B4C
      to ensure uniformity without overexposure, especially for layered oxides. Source: Industry case studies on ceramic cleaning
      (Laser Tech. J. 2022); single pass viable for light contamination.'
  overlapRatio:
    min: 10
    max: 90
    value: 70
    unit: '%'
    description: 'Ensures uniform coverage without gaps or excessive overlap heating; 70% recommended for B4C to achieve even
      cleaning on irregular surfaces, balancing speed and efficacy. Source: Process optimization studies (Procedia Manuf.
      2019); higher for heavy contamination to prevent streaks.'
  laserPower:
    value: 80
    unit: W
    description: Optimal average power for ceramic cleaning
    min: 1.0
    max: 120
  laserPowerAlternative:
    min: 50
    max: 300
    value: 100
    unit: W
    description: 'Typical range for industrial 1064 nm fiber lasers cleaning hard ceramics like B4C; starting at 100 W balances
      efficiency and safety to avoid thermal damage given B4C''s low thermal conductivity (~30 W/m·K); max limited to prevent
      melting (mp ~2450°C). Source: IPG Photonics YLR series specs and laser cleaning studies on ceramics (e.g., J. Laser
      Appl. 2018).'
  frequency:
    min: 1
    max: 200
    value: 50
    unit: kHz
    description: 'Standard for pulsed cleaning to control energy delivery; 50 kHz recommended for B4C to achieve fast processing
      while limiting heat accumulation due to poor thermal diffusivity; higher rates (>80 kHz) speed up but risk subsurface
      heating. Source: Academic literature on pulse train effects (J. Appl. Phys. 2021).'
componentSummary: The 100 W power, 1064 nm wavelength, and 10 ns pulse width enable precise ablation of contaminants from
  Boron Carbide's hard, brittle surface, minimizing thermal stress and cracking risks.
