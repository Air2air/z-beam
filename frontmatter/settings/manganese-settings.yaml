  power:
    min: 50
    max: 1000
    value: 200
    unit: W
    description: 'Typical range for industrial 1064 nm laser cleaning of reflective
      metals like manganese; starting at 200 W for contamination removal without excessive
      heat input. Max safe before substrate melting (Mn melting point ~1246°C) is
      ~1000 W with proper scanning. Source: Manufacturer specs from IPG Photonics
      and Coherent for metal cleaning systems; academic review in Optics and Lasers
      in Engineering (2018).'
  scan_speed:
    min: 10
    max: 5000
    value: 500
    unit: mm/s
    description: 'Effective range for removing light to heavy contamination on manganese;
      slower speeds (100-500 mm/s) for heavy oxides, faster (500-2000 mm/s) for light
      surface prep. Recommended 500 mm/s for optimal balance of efficiency and minimal
      thermal accumulation given Mn''s moderate thermal conductivity (~7.8 W/m·K).
      Source: Industry standards from Laser Cleaning Association guidelines and equipment
      manuals from Adapt Laser Systems.'
  pulse_width:
    min: 0.1
    max: 1000
    unit: ns
    value: 20
    description: 'Nanosecond regime (5-100 ns) preferred for cost-effective cleaning
      of manganese; picosecond (ps) or femtosecond (fs) for ultra-minimal HAZ but
      higher cost. 20 ns recommended to reduce heat-affected zone on reflective Mn
      surfaces while ablating contaminants. Source: Laser physics research in Applied
      Surface Science (2020) on metal ablation thresholds at 1064 nm.'
  repetition_rate:
    min: 1
    max: 200
    value: 50
    unit: kHz
    description: 'Typical 10-100 kHz for pulsed cleaning applications; 50 kHz recommended
      for manganese to achieve fast processing without excessive heat buildup (high
      freq increases accumulation on low-conductivity metals like Mn). Trade-off:
      higher rates speed up cleaning but risk thermal damage. Source: Academic literature
      in Journal of Applied Physics (2019) on pulse repetition effects in laser ablation
      of alloys.'
  energy_density:
    min: 0.1
    max: 20.0
    value: 2
    unit: J/cm²
    description: 'Fluence range for contaminant removal on manganese; damage threshold
      ~4-5 J/cm² due to high reflectivity (~60% at 1064 nm) and melting point. 2 J/cm²
      recommended for safe cleaning of oxides without substrate ablation. Source:
      Ablation threshold studies in Surface and Coatings Technology (2017) for transition
      metals like Mn.'
  spot_size:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Beam diameter range for industrial cleaning; smaller (50-200 μm)
      for fine surface prep on manganese, larger (200-500 μm) for broad area decontamination.
      200 μm recommended for uniform energy distribution on Mn''s surface. Source:
      Equipment specifications from Trumpf and SPI Lasers for 1064 nm cleaning heads.'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: '1-5 passes typical for complete removal of contaminants; single
      pass for light rust/oxides on manganese, multi-pass for heavy buildup. 2 passes
      recommended to ensure thorough cleaning without risking Mn substrate damage.
      Source: Industry practice in case studies from Laser Institute of America reports
      on metal surface preparation.'
  overlap_ratio:
    min: 10
    max: 90
    value: 50
    unit: '%'
    description: '30-80% overlap for uniform coverage in scanning; 50% recommended
      for manganese to avoid gaps in cleaning while minimizing over-processing and
      heat input. Higher overlap for heavy contamination. Source: Process optimization
      studies in Lasers in Manufacturing and Materials Processing (2021) on scan strategies
      for metallic substrates.'
