  power:
    min: 20
    max: 200
    value: 50
    unit: W
    description: 'Typical range for pulsed fiber lasers in polymer cleaning to avoid thermal damage; starting at 50W for light
      contamination on PC, max limited by melting point (~147°C) and low thermal conductivity. Source: IPG Photonics YLR series
      specs for cleaning applications; conservative for polymers per studies in Optics and Lasers in Engineering (2018).'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 500
    description: 'Slower speeds for polymers to control heat buildup; 500 mm/s optimal for uniform contaminant removal without
      substrate ablation. Range adjusts for light (faster) vs heavy contamination. Source: Industry standards from Laserax
      equipment manuals; case studies in Journal of Cleaner Production (2020).'
  pulse_width:
    min: 0.1
    max: 1000
    value: 10
    unit: ns
    description: 'Nanosecond regime preferred for PC to balance ablation efficiency and minimal heat-affected zone (HAZ <10μm);
      picosecond (ps) reduces HAZ further but increases cost. Femtosecond risks over-ablation. Source: Laser physics research
      in Applied Surface Science (2019) on polymer ablation thresholds.'
  repetition_rate:
    min: 1
    max: 200
    value: 30
    unit: kHz
    description: '30 kHz balances cleaning speed and heat accumulation for PC''s low thermal conductivity; higher rates (>50
      kHz) accelerate process but risk melting. Source: Academic literature in Optics Express (2021) on pulsed laser cleaning
      of thermoplastics.'
  energy_density:
    min: 0.1
    max: 20.0
    value: 0.5
    unit: J/cm²
    description: 'Fluence below PC damage threshold (~1-2 J/cm² at 1064 nm due to moderate absorption); 0.5 J/cm² for safe
      contaminant removal. Conservative to prevent charring. Source: Ablation threshold studies in Journal of Applied Physics
      (2017) for polycarbonate at near-IR wavelengths.'
  spot_size:
    min: 0.1
    max: 500
    value: 100
    unit: μm
    description: '100 μm diameter for precise surface preparation on PC; smaller for fine details, larger for broad areas.
      Matches typical Gaussian beam profiles. Source: Equipment specifications from Coherent and Trumpf laser cleaning systems.'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Multi-pass (2 recommended) for complete removal of contaminants without single-pass overheating; single
      pass for very light soiling. Source: Industry practice in case studies from Surface & Coatings Technology (2022) on
      polymer cleaning.'
  overlap_ratio:
    min: 10
    max: 90
    value: 60
    unit: '%'
    description: '60% overlap ensures uniform coverage and avoids gaps in cleaning; higher for heavy contamination to build
      fluence gradually. Source: Process optimization studies in Lasers in Manufacturing and Materials Processing (2020).'
component_summary: These settings use moderate power and short nanosecond pulses at 1064 nm to gently ablate contaminants
  from heat-sensitive polycarbonate without causing melting or deformation.
