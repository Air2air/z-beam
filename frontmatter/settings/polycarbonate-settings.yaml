description: >-
  The key with polycarbonate is its toughness, which makes it great for laser cleaning without fracturing easily. We've
  found this thermoplastic holds up well in applications like automotive parts and medical devices, so we typically
  start with gentle pulses to remove contaminants. But watch out mid-process—its poor heat spreading can cause localized
  melting if you push too hard, so adjust to quicker passes and lower energy to keep surfaces clear and intact.
