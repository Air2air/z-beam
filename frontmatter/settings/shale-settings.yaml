      sectionMetadata:
        section_title: Challenges & Prevention
        section_description: Common issues and how to prevent them
        icon: shield-halved
        order: 5
      items:
      - id: biological-growth
        category: Contamination
        challenge: Biological growth and deep staining
        description: Organic matter penetrates porous structure, difficult removal
        severity: high
        solutions:
        - Use multiple passes with low-to-medium fluence (1-3 J/cm²)
        - May require biocide pre-treatment for deep penetration
        - Monitor for surface erosion
      - category: Thermal Management
        challenge: Thermal shock and microcracking
        description: Natural stone contains microfissures that propagate under thermal stress
        severity: critical
        solutions:
        - Use pulse mode with 8-12 second cooling between passes
        - Reduce power by 40-50% for weathered or damaged stone
        - Preheat substrate if possible to reduce thermal gradients
        - Granite more resistant than marble; sandstone most vulnerable
        - Monitor for surface crazing; stop immediately if cracks appear
        threshold: ΔT > 50-150°C rapid cooling (stone-dependent)
      - category: Thermal Management
        challenge: Moisture-induced spalling
        description: Porous stone traps moisture that explosively converts to steam
        severity: high
        solutions:
        - Test moisture content before cleaning (>3% requires drying)
        - Allow 48-72 hours drying after rain before laser cleaning
        - Reduce power by 50% for damp stone
        - Use pulse mode with extended cooling (15-20 seconds)
        - Heritage stone requires especially gentle approach
        threshold: Steam formation >100°C with trapped moisture
