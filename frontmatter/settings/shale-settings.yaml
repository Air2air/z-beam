  power:
    min: 50
    max: 500
    value: 200
    unit: W
    description: 'Typical range for industrial ns-pulsed fiber lasers at 1064 nm cleaning soft rocks like shale; starting
      at 200 W balances efficiency and avoids thermal cracking due to shale''s low thermal conductivity (~1-2 W/m·K). Max
      safe before damage ~500 W to prevent substrate ablation. Source: Manufacturer specs (e.g., IPG Photonics YLR series)
      and studies on laser cleaning of stone (Optics and Lasers in Engineering, 2018).'
  scan_speed:
    min: 10
    max: 5000
    value: 1500
    unit: mm/s
    description: 'Effective speeds for contamination removal on shale; slower for heavy contamination (500-1000 mm/s), faster
      for light (2000-3000 mm/s). Recommended 1500 mm/s for optimal fluence delivery without overheating. Source: Industry
      standards from laser cleaning equipment manuals (e.g., Laserax systems) and case studies on rock surface preparation.'
  pulse_width:
    min: 0.1
    max: 1000
    unit: ns
    value: 30
    description: 'Nanosecond regime preferred for 1064 nm cleaning of shale to achieve ablation with minimal heat-affected
      zone (HAZ <10 μm); picosecond (ps) or femtosecond (fs) for ultra-precision but less common industrially due to cost.
      Avoid fs for shale to prevent micro-cracking from shock waves. Recommended 30 ns for low reflectivity materials. Source:
      Laser physics research (Applied Surface Science, 2020) on pulsed laser ablation thresholds.'
  repetition_rate:
    min: 1
    max: 200
    value: 50
    unit: kHz
    description: 'Typical for efficient cleaning; higher rates (50-100 kHz) speed up process but risk heat accumulation in
      low-conductivity shale, leading to thermal stress. Recommended 50 kHz balances speed and safety. Trade-off: low freq
      for heavy contamination to allow cooling. Source: Academic literature on pulsed laser cleaning (Journal of Laser Applications,
      2019).'
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Fluence range for contaminant removal without damaging shale (ablation threshold ~2-4 J/cm² for siliceous
      rocks); below 0.5 J/cm² ineffective for heavy soiling. Recommended 1.5 J/cm² for safe cleaning, considering shale''s
      moderate reflectivity (~20-30% at 1064 nm) and melting point (~1200°C). Source: Ablation threshold studies (International
      Journal of Rock Mechanics, 2017) on laser-rock interactions.'
  spot_size:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Beam diameter range for industrial cleaning; smaller (100-200 μm) for fine detail on shale surfaces, larger
      (300-500 μm) for broad area prep. Recommended 200 μm for uniform energy distribution on irregular shale textures. Source:
      Equipment specifications (e.g., Coherent Armoni series) and process optimization for stone cleaning.'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass (2-5) for heavy layers on shale to ensure complete removal
      without excessive energy input. Recommended 2 passes for industrial surface preparation, allowing incremental cleaning
      to minimize damage risk. Source: Industry practice and case studies (e.g., laser cleaning of geological samples in Applied
      Optics, 2021).'
  overlap_ratio:
    min: 10
    max: 90
    value: 60
    unit: '%'
    description: 'Ensures uniform coverage; 30-50% for large areas, 60-80% for detailed shale cleaning to avoid gaps in irregular
      surfaces. Recommended 60% for optimal uniformity without overexposure. Source: Process optimization studies (Lasers
      in Engineering, 2016) on scan strategies for rock substrates.'
challenges:
  thermal_management:
  - challenge: Thermal shock and microcracking
    severity: critical
    threshold_temperature: ΔT > 50-150°C rapid cooling (stone-dependent)
    impact: Natural stone contains microfissures that propagate under thermal stress
    solutions:
    - Use pulse mode with 8-12 second cooling between passes
    - Reduce power by 40-50% for weathered or damaged stone
    - Preheat substrate if possible to reduce thermal gradients
    - Granite more resistant than marble; sandstone most vulnerable
    - Monitor for surface crazing; stop immediately if cracks appear
  - challenge: Moisture-induced spalling
    severity: high
    threshold_temperature: Steam formation >100°C with trapped moisture
    impact: Porous stone traps moisture that explosively converts to steam
    solutions:
    - Test moisture content before cleaning (>3% requires drying)
    - Allow 48-72 hours drying after rain before laser cleaning
    - Reduce power by 50% for damp stone
    - Use pulse mode with extended cooling (15-20 seconds)
    - Heritage stone requires especially gentle approach
  surface_characteristics:
  - challenge: Weathering and surface degradation
    severity: high
    impact: Aged stone has weaker surface layer more susceptible to damage
    solutions:
    - Reduce power 40-60% for weathered stone vs fresh stone
    - Test on inconspicuous area first
    - Multiple gentle passes (4-6 at 40-60W) preferred
    - Monitor for powdering or flaking; adjust power immediately
    - Heritage conservation requires documentation and testing
  - challenge: Mineral composition heterogeneity
    severity: medium
    impact: Mixed minerals have different absorption and damage thresholds
    solutions:
    - Use moderate power (60-80W) suitable for both light and dark minerals
    - Crosshatch scan pattern for uniform coverage
    - Avoid dwelling on dark minerals (feldspar, mica) which absorb more energy
    - Quartzite and marble more homogeneous than granite
  contamination_challenges:
  - challenge: Biological growth and deep staining
    severity: medium
    porosity_range: 0.5-25% (sandstone highly porous)
    impact: Algae, lichen, and pollution penetrate deep into porous structure
    solutions:
    - First pass 80W fast (1200 mm/s) for surface growth
    - Second pass 60W slow (700 mm/s) for roots and stains
    - Third pass 40W very slow (400 mm/s) for deep staining
    - Chemical biocide pre-treatment kills roots and reduces laser exposure
    - Dense stones (granite, marble) clean in 1-2 passes vs 3-4 for porous stones
description: When laser cleaning shale, the key is its layered sedimentary structure, which makes it more prone to delamination
  than denser stones like granite. We've found that this layering absorbs laser energy unevenly, so you need to start with
  gentle passes to lift contaminants without prying apart those natural fissures. In our experience, keeping the beam focused
  and moving steadily helps the heat dissipate across the surface, preserving the material's integrity during restoration
  work on monuments or artifacts. But watch out midway through—its moderate porosity can trap moisture, leading to steam bursts
  if you ramp up intensity too soon, so adjust by slowing the scan speed and overlapping less to avoid micro-cracks. Overall,
  this approach works well for cultural heritage pieces, where we emphasize multiple light treatments over aggressive ones
  to maintain shale's subtle textures.
