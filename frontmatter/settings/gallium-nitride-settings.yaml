  power:
    min: 10
    max: 200
    value: 50
    unit: W
    description: 'Typical range for pulsed fiber lasers in semiconductor cleaning; starting at 50 W balances efficiency and
      safety for GaN''s sensitivity to heat (thermal conductivity ~130 W/mK); max avoids melting point (~2500°C). Source:
      IPG Photonics specs for YLR series; extrapolated from GaN ablation studies (e.g., J. Appl. Phys. 2015).'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 1000
    description: 'Effective for light contaminants at higher speeds, slower for heavy; 1000 mm/s optimal for uniform GaN surface
      prep without overheating. Range from industry standards for 1064 nm cleaning. Source: Laserax equipment manuals; case
      studies on III-V semiconductors.'
  pulse_width:
    min: 0.1
    max: 1000
    value: 10
    unit: ps
    description: 'Picosecond preferred over ns for minimal HAZ on reflective GaN (reflectivity ~40% at 1064 nm); avoids thermal
      accumulation. Femtosecond possible but less common industrially. Source: Laser physics research (Opt. Express 2018 on
      ultrashort pulse cleaning of nitrides).'
  repetition_rate:
    min: 1
    max: 200
    value: 50
    unit: kHz
    description: '50 kHz balances speed and heat management for GaN; higher rates risk accumulation on low-absorptivity material,
      slower for precision. Trade-off: faster cleaning but potential thermal damage. Source: Academic literature (Appl. Surf.
      Sci. 2020 on pulsed laser cleaning of GaN).'
  energy_density:
    min: 0.1
    max: 20.0
    value: 0.5
    unit: J/cm²
    description: 'Below GaN damage threshold (~1-2 J/cm² at 1064 nm ns pulses) for safe contaminant removal; 0.5 J/cm² recommended
      for light industrial cleaning. Conservative for GaN''s high melting point but low IR absorption. Source: Ablation threshold
      studies (J. Phys. D: Appl. Phys. 2017).'
  spot_size:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: '200 μm for fine GaN surface prep (e.g., LED substrates); smaller for detail, larger for area coverage. Matches
      typical Gaussian beam in cleaning heads. Source: Coherent and Trumpf equipment specifications for micro-cleaning.'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Multi-pass (2 recommended) for complete removal of heavy contaminants without single-pass overload on delicate
      GaN; single pass for light. Based on industrial practice for semiconductors. Source: Case studies in Surf. Coat. Technol.
      2019.'
  overlap_ratio:
    min: 10
    max: 90
    value: 60
    unit: '%'
    description: '60% ensures uniform coverage on GaN without excessive energy overlap causing damage; typical range for pulsed
      scanning. Optimizes for even ablation of contaminants. Source: Process optimization studies (Opt. Lasers Eng. 2021).'
component_summary: These settings employ moderate 50 W power and 10 ns pulses at 1064 nm to selectively ablate contaminants
  from GaN's sensitive surface while minimizing thermal damage to its wide-bandgap structure.
