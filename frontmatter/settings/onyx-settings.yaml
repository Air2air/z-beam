  power:
    min: 50
    max: 500
    value: 100
    unit: W
    description: Typical range for Nd:YAG lasers in stone cleaning to avoid thermal damage; starting at 100W for light contamination
      on Onyx (chalcedony-based, low thermal conductivity); max safe below 500W to prevent cracking (based on IPG Photonics
      specs and studies in J. Cult. Herit. 2018).
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 500
    description: Effective speeds for contamination removal; 500 mm/s recommended for optimal balance on Onyx; slower (100-500
      mm/s) for heavy contamination, faster (500-2000 mm/s) for light; from industry manuals like those from Adapt Laser Systems.
  pulse_width:
    min: 0.1
    max: 1000
    value: 20
    unit: ns
    description: Nanosecond regime typical for industrial cleaning to minimize heat-affected zone (HAZ) on heat-sensitive
      Onyx; 20 ns recommended over ps/fs for cost-effectiveness while reducing thermal accumulation (laser physics in Opt.
      Lasers Eng. 2020).
  repetition_rate:
    min: 1
    max: 200
    value: 30
    unit: kHz
    description: Common for 1064 nm cleaning; 30 kHz recommended for Onyx to balance speed and heat buildup (high freq risks
      accumulation on low-conductivity substrates); trade-off noted in Appl. Surf. Sci. 2019.
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: Fluence range for safe contaminant ablation; Onyx damage threshold ~6-8 J/cm² (SiO2-based); 1.5 J/cm² recommended
      for cleaning without substrate etching (ablation studies in J. Appl. Phys. 2017).
  spot_size:
    min: 0.1
    max: 500
    value: 300
    unit: μm
    description: Beam diameter for uniform coverage; 300 μm recommended for Onyx surface preparation (fine detail vs. large
      area); from equipment specs like Coherent lasers, suitable for stone texturing.
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: Typically 1-3 passes for complete removal on stones; 2 passes recommended for Onyx to ensure uniformity without
      overexposure; based on case studies in industrial cleaning (Laser Cleaning Handbook, 2021).
  overlap_ratio:
    min: 10
    max: 90
    value: 50
    unit: '%'
    description: Ensures uniform coverage; 50% recommended for Onyx to avoid gaps or excessive overlap-induced damage; typical
      range from process optimization in Opt. Express 2016.
component_summary: These settings employ a 1064 nm wavelength and 10 ns pulses at 100 W to gently ablate contaminants from
  Onyx's sensitive surface without causing thermal cracking or discoloration.
