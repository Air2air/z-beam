  power:
    min: 50
    max: 500
    value: 100
    unit: W
    description: 'Typical range for industrial 1064 nm Nd:YAG lasers cleaning soft metals like lead to avoid melting (melting
      point 327°C); starting at 100W for light contamination; max safe below 500W to prevent substrate damage. Source: Manufacturer
      specs from IPG Photonics and Laserax systems for metal cleaning.'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 1500
    description: 'Effective speeds balance cleaning efficiency and heat input; recommended 1500 mm/s for optimal removal without
      excessive heating on reflective lead; lower for heavy contamination (500-1000 mm/s), higher for light (2000-3000 mm/s).
      Source: Industry standards from SPIE proceedings on laser cleaning processes.'
  pulse_width:
    min: 0.1
    max: 1000
    value: 20
    unit: ns
    description: 'Nanosecond regime preferred for cost-effective cleaning of lead; 20 ns recommended for minimal heat-affected
      zone (HAZ) due to lead''s high thermal conductivity; picosecond (ps) or femtosecond for ultra-precise but less common
      industrially. Source: Laser physics research in Optics & Laser Technology journal on metal ablation.'
  repetition_rate:
    min: 1
    max: 200
    value: 30
    unit: kHz
    description: 'Typical for pulsed cleaning to control energy delivery; 30 kHz recommended for lead to achieve fast cleaning
      while minimizing heat accumulation (high freq risks melting); trade-off: higher rates speed up process but increase
      thermal load. Source: Academic literature from Applied Surface Science on pulse repetition effects.'
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.0
    unit: J/cm²
    description: 'Fluence range for contaminant ablation without damaging lead substrate; damage threshold ~2-3 J/cm² for
      lead at 1064 nm due to reflectivity; 1.0 J/cm² safe for cleaning. Conservative estimate based on ablation studies; source:
      Threshold studies in Journal of Applied Physics on IR laser-metal interactions.'
  spot_size:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Beam diameter for uniform coverage; 200 μm recommended for lead cleaning to balance resolution and area
      efficiency; smaller for fine details (100-200 μm), larger for broad surfaces (300-500 μm). Source: Equipment specifications
      from Coherent and Trumpf laser cleaning systems.'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass for heavy; 2 passes recommended for complete lead surface
      preparation to ensure removal without over-processing soft substrate. Source: Industry case studies from Laser Cleaning
      International reports on metal decontamination.'
  overlap_ratio:
    min: 10
    max: 90
    value: 50
    unit: '%'
    description: 'Ensures uniform coverage without gaps or excessive overlap heating; 50% recommended for lead to optimize
      cleaning uniformity while managing heat on low-melting material. Source: Process optimization studies in Surface and
      Coatings Technology journal.'
component_summary: The 100 W power and 10 ns pulses at 1064 nm wavelength enable precise ablation of contaminants from lead's
  soft, low-melting surface without excessive heat buildup or material damage.
