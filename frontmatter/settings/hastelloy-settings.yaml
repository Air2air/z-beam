description: >-
  When laser cleaning Hastelloy, start with reduced power to manage its low thermal conductivity, which causes heat to
  build up quickly in treated areas. This approach removes surface contaminants cleanly while preserving the alloy's
  exceptional corrosion resistance. But watch for uneven heating midway through—adjust scan speeds downward to avoid
  cracking the protective oxide layer. Multiple passes restore the finish without weakening its high-temperature
  strength.
