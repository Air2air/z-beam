  power:
    min: 50
    max: 1000
    value: 200
    unit: W
    description: 'Typical range for industrial cleaning of nickel-based superalloys like Hastelloy to remove contaminants
      without ablation; starting at 200W balances efficiency and safety to avoid thermal damage given Hastelloy''s high melting
      point (~1350°C). Max limited to prevent substrate melting at high fluences. Source: Manufacturer specs from IPG Photonics
      pulsed fiber lasers for metal cleaning; academic review in ''Laser Cleaning of Metals'' (Optics & Lasers in Engineering,
      2018).'
  scan_speed:
    min: 10
    max: 5000
    value: 1000
    unit: mm/s
    description: 'Range for effective contaminant removal on reflective metals; slower speeds (200-800 mm/s) for heavy oxidation,
      faster (1000-3000 mm/s) for light surface prep. Recommended 1000 mm/s optimizes cleaning rate while minimizing heat
      input due to Hastelloy''s thermal conductivity (~12 W/mK). Source: Industry standards from Laser CleanTech manuals;
      case studies in Journal of Laser Applications (2020) on superalloy surface preparation.'
  pulse_width:
    min: 0.1
    max: 1000
    value: 20
    unit: ns
    description: 'Nanosecond regime (5-200 ns) preferred for cost-effective cleaning; picosecond (ps) or femtosecond (fs)
      for ultra-low HAZ but less common industrially. 20 ns recommended for Hastelloy to limit thermal diffusion while ablating
      contaminants, reducing risk of microcracks in high-strength alloy. Source: Laser physics research in Applied Surface
      Science (2019) on pulse duration effects for Ni-superalloys; avoids fs due to high reflectivity at 1064 nm.'
  repetition_rate:
    min: 1
    max: 200
    value: 50
    unit: kHz
    description: 'Typical 10-200 kHz for pulsed cleaning; higher rates speed up process but increase heat accumulation on
      reflective Hastelloy (reflectivity ~65% at 1064 nm). 50 kHz balances speed and thermal management for contamination
      removal. Trade-off: >100 kHz risks overheating. Source: Academic literature in Optics Express (2017) on repetition rate
      optimization for metal cleaning; fiber laser specs from Coherent Inc.'
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Fluence range for safe cleaning of superalloys; below damage threshold (~4-5 J/cm² for Hastelloy due to
      high thermal stability). 1.5 J/cm² recommended for effective contaminant vaporization without substrate ablation. Conservative
      to account for reflectivity reducing absorption. Source: Ablation threshold studies in Journal of Applied Physics (2021)
      on Ni-based alloys; experimental data from laser cleaning of Inconel/Hastelloy analogs.'
  spot_size:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Typical beam diameters for industrial cleaning; smaller (50-150 μm) for fine details, larger (200-500 μm)
      for broad surface prep on Hastelloy parts. 200 μm recommended for uniform energy distribution and efficiency on curved
      or large areas. Source: Equipment specifications from Adapt Laser Systems scanners; process guidelines in Industrial
      Laser Solutions (2019) for alloy cleaning.'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass (2-5) for heavy oxide or paint removal on Hastelloy. 2 passes
      recommended for complete cleaning while preserving surface integrity, allowing incremental fluence buildup. Source:
      Industry practice from case studies in Surface and Coatings Technology (2022) on superalloy prep; CleanLaser application
      notes for aerospace alloys.'
  overlap_ratio:
    min: 10
    max: 90
    value: 60
    unit: '%'
    description: 'Typical 30-80% for uniform coverage without gaps or overexposure; 60% recommended for Hastelloy to ensure
      even cleaning on irregular surfaces while minimizing total energy input and heat buildup. Higher overlap for heavy contamination.
      Source: Process optimization studies in Lasers in Manufacturing and Materials Processing (2020); scanning system manuals
      from Scanlab for metal applications.'
page_description: When laser cleaning Hastelloy, start with reduced power to manage its low thermal conductivity, which causes
  heat to build up quickly in treated areas. This approach removes surface contaminants cleanly while preserving the alloy's
  exceptional corrosion resistance. But watch for uneven heating midway through—adjust scan speeds downward to avoid cracking
  the protective oxide layer. Multiple passes restore the finish without weakening its high-temperature strength.
