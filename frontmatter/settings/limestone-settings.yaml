    description: Typical range for industrial 1064 nm Nd:YAG lasers cleaning limestone; starting at 50-100 W to avoid thermal
      damage; max safe below 1000 W to prevent substrate cracking, based on manufacturer specs from Adapt Laser Systems and
      studies on stone ablation (e.g., Pou et al., Applied Surface Science, 2003).
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 1000
    description: Effective range for contamination removal; slower (100-500 mm/s) for heavy soiling like graffiti, faster
      (up to 5000 mm/s) for light dust; recommended 1000 mm/s for balanced efficiency on limestone, per industry standards
      from LaserCladding Technologies manuals and case studies on cultural heritage cleaning.
  pulse_width:
    min: 0.1
    max: 1000
    value: 20
    unit: ns
    description: Nanosecond regime preferred for cost-effective cleaning of limestone; picosecond (ps) or femtosecond reduces
      heat-affected zone (HAZ) but increases cost; 20 ns recommended for minimal thermal damage to CaCO3 substrate, from laser
      physics research (e.g., S. J. Henley et al., Applied Physics A, 2004).
  repetition_rate:
    min: 1
    max: 200
    value: 30
    unit: kHz
    description: Typical for pulsed 1064 nm systems; 30 kHz balances cleaning speed and heat accumulation on low-conductivity
      limestone; higher rates (>50 kHz) risk overheating, lower for precision; sourced from academic literature on pulse train
      effects (e.g., J. C. S. Lai et al., Optics and Lasers in Engineering, 2010).
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: Fluence range for safe removal of contaminants without ablating limestone; damage threshold ~3-5 J/cm² due
      to CaCO3 decomposition; 1.5 J/cm² recommended for industrial cleaning, based on ablation threshold studies (e.g., R.
      P. Forbes et al., Journal of Cultural Heritage, 2003).
  spot_size:
    min: 0.1
    max: 500
    value: 300
    unit: μm
    description: Beam diameter range for 1064 nm cleaning; smaller (100-300 μm) for fine details like engravings, larger (up
      to 1 mm) for broad surfaces; 300 μm recommended for uniform limestone cleaning, from equipment specifications by IPG
      Photonics and process optimization in stone conservation.
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: Single pass for light contamination, multi-pass (2-5) for heavy layers; 2 passes recommended for complete
      removal on limestone without excessive exposure, per industry practice and case studies (e.g., European project on laser
      cleaning of monuments, 2015).
  overlap_ratio:
