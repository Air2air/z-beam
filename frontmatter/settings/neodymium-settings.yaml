  power:
    min: 50
    max: 500
    value: 100
    unit: W
    description: 'Typical range for Nd:YAG laser cleaning of soft metals like Neodymium to avoid thermal damage due to its
      low melting point (1021°C) and moderate thermal conductivity (16.5 W/m·K); starting at 100W balances efficiency and
      safety. Source: IPG Photonics YLR series specs for industrial cleaning; academic review in Optics and Lasers in Engineering
      (2018) on metal surface preparation.'
  scan_speed:
    min: 10
    max: 5000
    value: 1500
    unit: mm/s
    description: 'Effective speeds for contaminant removal on reflective metals; slower for heavy contamination (e.g., oxides),
      faster for light rust/oils. Recommended 1500 mm/s optimizes cleaning without excessive heat buildup on Neodymium. Source:
      Industry standards from Laserax equipment manuals; case studies in Journal of Cleaner Production (2020) for rare earth
      metals.'
  pulse_width:
    min: 0.1
    max: 1000
    value: 20
    unit: ns
    description: 'Nanosecond regime preferred for cost-effective cleaning with minimal heat-affected zone (HAZ) on heat-sensitive
      Neodymium; picosecond (ps) or femtosecond (fs) reduce HAZ further but increase cost. 20 ns recommended for balancing
      ablation and substrate integrity. Source: Laser physics research in Applied Surface Science (2019) on pulse duration
      effects for metal cleaning; avoids fs due to overkill for industrial apps.'
  repetition_rate:
    min: 1
    max: 200
    value: 30
    unit: kHz
    description: 'Typical for pulsed Nd:YAG cleaning; higher rates speed up process but risk heat accumulation on low-conductivity
      Neodymium, potentially causing melting. 30 kHz recommended for efficient, controlled energy delivery. Source: Academic
      literature in Optics Express (2021) on repetition rate trade-offs for metallic substrates; manufacturer data from Coherent
      Inc.'
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Fluence range for safe ablation of contaminants (e.g., oils, oxides) without exceeding Neodymium''s damage
      threshold (~4 J/cm² at 1064 nm due to reflectivity ~60%). 1.5 J/cm² recommended for effective cleaning below threshold.
      Source: Ablation threshold studies in Journal of Applied Physics (2017) for rare earth metals; conservative for Neodymium''s
      properties.'
  spot_size:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Beam diameter range for precision vs. area coverage; smaller for fine surface prep on Neodymium components
      (e.g., magnets), larger for broad cleaning. 200 μm recommended for uniform energy distribution without hotspots. Source:
      Equipment specifications from Trumpf laser systems; process optimization in Surface and Coatings Technology (2022).'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass for heavy layers to ensure complete removal without cumulative
      damage to soft Neodymium. 2 passes recommended for industrial surface preparation. Source: Industry practice in laser
      cleaning case studies, e.g., SPIE Proceedings (2020) on metallic alloys; adapts to Neodymium''s reactivity.'
  overlap_ratio:
    min: 10
    max: 90
    value: 50
    unit: '%'
    description: 'Ensures uniform coverage and prevents gaps in cleaning; 50% optimal for Neodymium to minimize overexposure
      while achieving even fluence distribution. Higher for detailed work. Source: Process optimization studies in Lasers
      in Manufacturing and Materials Processing (2019); standard in equipment like Adapt Laser guidelines.'
page_description: When laser cleaning Neodymium, we've found it behaves differently from tougher metals like steel because
  of its soft, reactive nature as a rare-earth lanthanide, which makes it prone to quick surface oxidation if heat builds
  up too fast. So, we approach it by starting with gentler pulses to localize energy and prevent unwanted reactions, unlike
  the higher intensities we use on more conductive materials. This keeps the dense structure intact while removing contaminants
  effectively. Just watch out for overexposure at the end, as it can lead to pitting.
