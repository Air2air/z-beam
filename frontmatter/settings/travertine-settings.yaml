page_title: 'Travertine Settings: Laser Parameters'
page_description: When laser cleaning Travertine, watch out for its high porosity right from the start—I've seen it soak up
  heat unevenly, which can lead to micro-cracks if you're not careful. This natural stone, like a spongy limestone, differs
  from denser rocks because it traps contaminants deep inside, so you need to go gentle to avoid pulling the surface apart.
  Tends to heat up slowly due to poor conductivity, meaning prolonged exposure risks surface spalling. Start with lower power
  settings and slower scan speeds to let the laser gently loosen dirt without stressing the pores. This works best when you
  overlap passes lightly, pulling grime out layer by layer. I've found multiple light treatments clear buildup effectively
  while preserving the stone's texture for heritage sites. Just avoid high energy bursts—they'll scorch the calcite base and
  ruin that classic banded look. Adjust based on soiling thickness, and always test a small area first to keep things safe.
meta_description: 'Travertine: removes contamination removal. Industrial-grade parameters. No substrate damage.'
