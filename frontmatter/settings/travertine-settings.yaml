  power:
    min: 20
    max: 200
    value: 50
    unit: W
    description: 'Typical range for pulsed Nd:YAG lasers (1064 nm) on porous stones like travertine to remove contaminants
      without thermal damage; starting at 50 W for light soiling, max 200 W risks microcracking (source: IPG Photonics laser
      cleaning guidelines and studies on limestone ablation, e.g., J. Cult. Herit. 2018).'
  scan_speed:
    min: 10
    max: 5000
    value: 1000
    unit: mm/s
    description: 'Effective speeds balance fluence and coverage; 1000 mm/s optimal for uniform cleaning on travertine, slower
      (500 mm/s) for heavy contamination, faster (up to 3000 mm/s) for light dust (source: Industry standards from Laser Cleaning
      Europe and equipment manuals like those from CleanLaser).'
  pulse_width:
    min: 0.1
    max: 1000
    unit: ns
    value: 20
    description: 'Nanosecond regime preferred for cost-effective cleaning with minimal heat-affected zone on heat-sensitive
      travertine; 20 ns balances ablation efficiency and reduced thermal diffusion (picosecond/fs for ultra-precision but
      overkill; source: Laser physics research in Opt. Lasers Eng. 2020 on stone heritage cleaning).'
  repetition_rate:
    min: 1
    max: 200
    value: 30
    unit: kHz
    description: 'Typical for industrial cleaning to achieve pulse overlap without excessive heat buildup in low-conductivity
      travertine; 30 kHz recommended for faster processing vs. heat risks at higher rates (source: Academic literature, e.g.,
      Appl. Surf. Sci. 2019 on pulsed laser parameters for carbonates).'
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.0
    unit: J/cm²
    description: 'Fluence range for contaminant removal (e.g., soot, oxides) on travertine; damage threshold ~2-3 J/cm² for
      CaCO3-based stone, so 1.0 J/cm² safe starting point to avoid spalling (source: Ablation threshold studies in J. Appl.
      Phys. 2017 and heritage conservation papers).'
  spot_size:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Beam diameter for effective energy distribution; 200 μm recommended for travertine to cover pores without
      pinpoint damage, smaller for fine details, larger for broad areas (source: Equipment specs from manufacturers like Raycus
      and Coherent laser systems).'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Multi-pass approach ensures complete removal without exceeding fluence limits on delicate travertine; 2
      passes typical for industrial surface prep (single pass for very light contamination; source: Industry case studies
      in stone restoration, e.g., Restaurators 2021).'
  overlap_ratio:
    min: 10
    max: 90
    value: 70
    unit: '%'
    description: 'Ensures uniform coverage and prevents stripe patterns on uneven travertine surfaces; 70% optimal for balance
      between efficiency and overlap-induced heating (source: Process optimization in laser scanning studies, e.g., Opt. Express
      2016).'
component_summary: The 50 W power, 1064 nm wavelength, and 10 ns pulse width settings enable gentle, non-ablative cleaning
  of Travertine's porous limestone structure, minimizing heat-induced cracking while effectively removing surface contaminants.
