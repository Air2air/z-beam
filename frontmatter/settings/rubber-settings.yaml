machine_settings:
  wavelength:
    description: Near-infrared wavelength for optimal rubber absorption and minimal substrate damage
    unit: nm
    value: 1064
    min: 355
    max: 10640
  spotSize:
    min: 0.1
    max: 500
    unit: μm
    value: 200
    description: 'Smaller spots for precise cleaning on rubber surfaces; 100-200 μm for fine detail (e.g., molds), larger
      for broad areas. 200 μm recommended for uniform coverage without overlap issues. Source: Equipment specifications from
      Trumpf and Adapt Laser Systems; process optimization in Surface and Coatings Technology (2022).'
  energyDensity:
    min: 0.1
    max: 20.0
    value: 0.5
    unit: J/cm²
    description: 'Low fluence to stay below rubber damage threshold (~0.5-1 J/cm² for ablation onset); 0.1-0.5 J/cm² for light
      contaminants, up to 1 J/cm² for heavy. Conservative for safe cleaning. Source: Ablation threshold studies in Journal
      of Applied Physics (2017) on elastomers; uncertainty noted for specific rubber types due to variability in composition.'
  pulseWidth:
    min: 0.1
    max: 1000
    unit: ns
    value: 20
    description: 'Nanosecond regime preferred for cost-effective industrial cleaning; picosecond (ps) or femtosecond (fs)
      for ultra-minimal HAZ but less common for rubber. 20 ns balances ablation of contaminants with low heat input. Source:
      Laser physics in Applied Surface Science (2019) on polymer cleaning thresholds; ns pulses avoid melting unlike longer
      durations.'
  scanSpeed:
    min: 10
    max: 5000
    value: 5000
    unit: mm/s
    description: 'High speeds minimize heat accumulation on low-thermal-conductivity rubber; slower for heavy contamination
      (1000-3000 mm/s), faster for light (5000-10000 mm/s). Recommended 5000 mm/s for balance. Source: Industry standards
      from Laserax equipment manuals; case studies in Journal of Cleaner Production (2020) for surface prep.'
  passCount:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Multi-pass for thorough removal of stubborn contaminants on rubber; single pass for light soiling, 2-3 for
      typical industrial prep. Recommended 2 passes to ensure completeness without damage. Source: Industry practice in case
      studies from Rubber & Plastics News (2020); multi-pass approaches in laser cleaning guidelines from SPIE proceedings.'
  overlapRatio:
    min: 10
    max: 90
    value: 50
    unit: '%'
    description: '50% overlap ensures uniform coverage and contaminant removal on irregular rubber surfaces; lower (30%) for
      speed, higher (70-80%) for heavy contamination. Balances efficiency and evenness. Source: Process optimization studies
      in Optics and Laser Technology (2019); typical range from manufacturer guidelines like those from CleanLaser.'
  laserPower:
    description: Optimal average power for rubber cleaning without thermal damage
    unit: W
    value: 100
    min: 1.0
    max: 120
  laserPowerAlternative:
    min: 20
    max: 150
    value: 50
    unit: W
    description: 'Low power to prevent thermal degradation of rubber (low melting point ~100-200°C); typical range from industrial
      fiber lasers for polymers. Recommended start at 50W for light contamination. Source: IPG Photonics specs for cleaning
      delicate substrates; academic review in Optics and Lasers in Engineering (2018) on polymer ablation.'
  frequency:
    min: 1
    max: 200
    value: 50
    unit: kHz
    description: 'Moderate rates for effective contaminant removal without excessive heat buildup in rubber; higher rates
      (>50 kHz) speed up process but risk accumulation. Trade-off noted in literature. Source: Academic literature in Lasers
      in Manufacturing and Materials Processing (2021); typical for 1064 nm fiber lasers from Coherent specs.'
componentSummary: These settings use moderate power and short nanosecond pulses at 1064 nm to delicately ablate contaminants
  from heat-sensitive rubber, avoiding melting or degradation while ensuring effective cleaning.
