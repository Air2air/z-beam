page_title: 'Bronze Settings: Laser Parameters'
page_description: When laser cleaning bronze, unlike ferrous metals like steel, you must account for its higher reflectivity
  that sends more energy back at the source. This means starting with gentler power levels to avoid surface melting, since
  bronze heats up faster from that bounce. Watch out mid-process for uneven patina removal—it can fade historical value—so
  adjust scans slower and use multiple light passes to lift dirt without erasing the alloy's natural shield.
