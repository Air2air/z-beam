  power:
    min: 50
    max: 1000
    value: 200
    unit: W
    description: 'Typical range for industrial 1064 nm fiber lasers cleaning metals like bronze; starting at 200W balances
      efficiency and safety to avoid overheating due to bronze''s high reflectivity and thermal conductivity (~100-300 W/m·K).
      Max limited to prevent substrate melting (~950°C). Source: IPG Photonics YLR series specs and studies on copper alloys
      (e.g., J. Laser Appl. 2018).'
  scan_speed:
    min: 10
    max: 5000
    value: 2000
    unit: mm/s
    description: 'Effective range for contaminant removal without excessive heat buildup; slower (500-1500 mm/s) for heavy
      oxidation, faster (2000-5000 mm/s) for light dirt. Recommended 2000 mm/s for optimal bronze cleaning to ensure uniform
      ablation of contaminants. Source: Industry standards from Laserax and Adapt Laser Systems manuals.'
  pulse_width:
    min: 0.1
    max: 1000
    unit: ns
    value: 20
    description: 'Nanosecond regime preferred for cost-effective cleaning of reflective metals; 5-20 ns minimizes heat-affected
      zone (HAZ <10 μm) compared to longer pulses, while picosecond (ps) or femtosecond (fs) reduce thermal damage further
      but increase cost. 20 ns typical for 1064 nm Nd:YAG on bronze. Source: Laser physics research (Opt. Lasers Eng. 2015;
      ablation studies on Cu-Sn alloys).'
  repetition_rate:
    min: 1
    max: 200
    value: 30
    unit: kHz
    description: 'Standard for pulsed cleaning to achieve high throughput; 10-50 kHz for bronze to balance speed and heat
      accumulation (higher rates risk melting due to poor IR absorption). Trade-off: higher freq accelerates cleaning but
      requires faster scans. Recommended 30 kHz. Source: Academic literature (Appl. Surf. Sci. 2019; metal cleaning optimization).'
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Fluence range for removing contaminants (e.g., oxides, oils) below bronze damage threshold (~2-4 J/cm² for
      ablation onset); conservative 0.5-1.5 J/cm² for light cleaning, up to 3 J/cm² for heavy. Recommended 1.5 J/cm² safe
      for surface prep. Accounts for bronze''s reflectivity (~60-70% at 1064 nm). Source: Ablation threshold studies (J. Phys.
      D: Appl. Phys. 2017; Cu alloys).'
  spot_size:
    min: 0.1
    max: 500
    unit: μm
    value: 200
    description: 'Beam diameter range for precise control; smaller (100-200 μm) for detailed bronze artifacts, larger (200-500
      μm) for industrial surfaces. Recommended 200 μm for uniform energy distribution on bronze without pinpoint damage. Source:
      Equipment specs from Coherent and Trumpf laser cleaners.'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass (2-5) for stubborn layers like patina on bronze; recommended
      2 passes ensures complete removal with minimal risk to substrate integrity. Source: Industry case studies (e.g., heritage
      cleaning in Stud. Conserv. 2020; industrial reports from Laser Cleaning Inc.).'
  overlap_ratio:
    min: 10
    max: 90
    value: 50
    unit: '%'
    description: 'Ensures uniform coverage without gaps or over-ablation; 30-50% for large areas, 50-80% for fine uniformity
      on bronze to prevent uneven heating. Recommended 50% for balanced process efficiency. Source: Process optimization studies
      (Opt. Laser Technol. 2016; scanning parameter effects on metals).'
component_summary: These settings, with 200 W power, 1064 nm wavelength for strong metal absorption, and 10 ns pulses, enable
  precise oxide removal from bronze while minimizing heat damage to its soft copper-tin alloy.
