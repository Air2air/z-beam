  power:
    min: 20
    max: 500
    value: 100
    unit: W
    description: 'Typical range for industrial cleaning of delicate glasses like Pyrex
      to avoid thermal cracking; starting at 100W for light contamination, max below
      damage threshold (~500W for short pulses). Source: Manufacturer specs from IPG
      Photonics and Coherent for 1064 nm systems; academic paper on glass cleaning
      (Opt. Lasers Eng., 2018).'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 500
    description: 'Effective speeds for 1064 nm cleaning of Pyrex; slower (100-500
      mm/s) for heavy contamination, faster (up to 3000 mm/s) for light; 500 mm/s
      optimal for balance of efficiency and safety. Source: Industry standards from
      Laser Cleaning Europe guidelines and equipment manuals (e.g., Adapt Laser).'
  pulse_width:
    min: 0.1
    max: 1000
    value: 20
    unit: ns
    description: 'Nanosecond regime preferred for Pyrex to ablate contaminants without
      deep penetration; 20 ns minimizes heat-affected zone (HAZ) due to Pyrex''s low
      thermal conductivity (~1 W/mK); picosecond (ps) possible but less common industrially.
      Source: Laser physics research (Appl. Phys. A, 2015) on glass ablation thresholds.'
  repetition_rate:
    min: 1
    max: 200
    value: 50
    unit: kHz
    description: 'Typical for 1064 nm cleaning to ensure pulse overlap without excessive
      heat accumulation on Pyrex (melting point ~820°C); 50 kHz balances speed and
      thermal management; higher rates increase efficiency but risk stress. Source:
      Academic literature (J. Appl. Phys., 2020) on pulsed laser cleaning of borosilicates.'
  energy_density:
    min: 0.1
    max: 20.0
    value: 1
    unit: J/cm²
    description: 'Fluence range for contaminant removal on Pyrex; below damage threshold
      (~5-10 J/cm² at 1064 nm due to moderate absorption); 1 J/cm² recommended for
      safe cleaning without substrate ablation. Source: Ablation threshold studies
      (Opt. Express, 2017) for borosilicate glass.'
  spot_size:
    min: 0.1
    max: 500
    value: 300
    unit: μm
    description: 'Beam diameter for precise cleaning of Pyrex surfaces; smaller (100-300
      μm) for fine details, larger for area coverage; 300 μm typical to control energy
      density on reflective/low-conductivity Pyrex. Source: Equipment specifications
      from Trumpf and SPI Lasers.'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass (2-3) for heavy;
      2 passes recommended for complete removal on Pyrex without cumulative thermal
      damage. Source: Industry case studies (Proc. SPIE, 2019) on glass surface preparation.'
  overlap_ratio:
    min: 10
    max: 90
    value: 50
    unit: '%'
    description: 'Ensures uniform coverage in scan patterns; 50% optimal for Pyrex
      to avoid gaps or overexposure, considering beam Gaussian profile. Source: Process
      optimization studies (Surf. Coat. Technol., 2021) for laser cleaning applications.'
