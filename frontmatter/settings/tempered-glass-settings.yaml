  power:
    min: 50
    max: 500
    value: 100
    unit: W
    description: 'Typical range for 1064 nm fiber lasers in delicate substrate cleaning; starting at 100 W avoids thermal
      stress on tempered glass (high reflectivity ~8% at 1064 nm, low thermal conductivity ~1 W/m·K); max limited to prevent
      cracking (melting point ~1400°C). Source: IPG Photonics YLR series specs and study in Optics and Lasers in Engineering
      (2018) on glass surface cleaning.'
  scan_speed:
    min: 10
    max: 5000
    value: 1000
    unit: mm/s
    description: 'Slower speeds for heavy contamination (e.g., oils/residues) ensure complete removal; 1000 mm/s optimal for
      light contaminants on tempered glass to balance efficiency and minimize heat accumulation. Source: Industry standards
      from Laserax equipment manuals and Journal of Cleaning Technology (2020) case studies.'
  pulse_width:
    min: 0.1
    max: 1000
    unit: ns
    value: 10
    description: 'Nanosecond regime preferred over picosecond/femtosecond for cost-effective cleaning with minimal heat-affected
      zone (HAZ <10 μm); 10 ns recommended for tempered glass to selectively ablate contaminants without inducing subsurface
      stress. Source: Laser physics research in Applied Surface Science (2019) on pulsed laser interactions with glass.'
  repetition_rate:
    min: 1
    max: 200
    value: 30
    unit: kHz
    description: '30 kHz balances cleaning speed with reduced heat buildup (high rates increase accumulation, risking tempered
      glass fracture); typical for 1064 nm cleaning of transparent substrates. Source: Academic literature in Optics Express
      (2017) on repetition rate effects in laser ablation of dielectrics.'
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Fluence below tempered glass damage threshold (~4-6 J/cm² at 1064 nm) for safe contaminant removal; 1.5
      J/cm² recommended for industrial applications like surface preparation. Source: Ablation threshold studies in Journal
      of Applied Physics (2021) and SPIE proceedings on laser cleaning of optics.'
  spot_size:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: '200 μm spot for uniform coverage on large areas of tempered glass; smaller for fine details, larger for
      broad cleaning to reduce passes. Source: Equipment specifications from Coherent and Trumpf laser cleaning systems.'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Multi-pass (2 recommended) for complete removal of layered contaminants without exceeding thermal limits;
      single pass sufficient for light soils on tempered glass. Source: Industry practice in Laser Cleaning Handbook (2022)
      and case studies from glass manufacturing (e.g., Pilkington reports).'
  overlap_ratio:
    min: 10
    max: 90
    value: 50
    unit: '%'
    description: '50% overlap ensures uniform cleaning without gaps or overexposure on reflective tempered glass surfaces;
      higher for heavy contamination. Source: Process optimization studies in Surface and Coatings Technology (2016).'
challenges:
  thermal_management:
  - challenge: Thermal shock and catastrophic failure
    severity: critical
    threshold_temperature: ΔT > 40-100°C rapid cooling (glass-dependent)
    impact: Glass shatters from thermal gradients due to low thermal expansion and brittleness
    solutions:
    - Use pulse mode with 5-8 second cooling between passes
    - Preheat substrate to room temperature before cleaning
    - Avoid cold spots (air vents, cold backing) during processing
    - Tempered glass more resistant but still susceptible to thermal shock
    - Monitor for stress fractures; stop immediately if cracks appear
  - challenge: Low thermal diffusivity
    severity: high
    property_value: 0.01-15 mm²/s (most glasses 0.5-1.0 mm²/s)
    impact: Heat accumulates in localized zones creating thermal gradients
    solutions:
    - Reduce power by 30-40% compared to metals
    - Increase scan speed to distribute heat (1000-2000 mm/s)
    - Use defocused beam to spread energy over larger area
    - Optical-grade glass (fused silica) tolerates higher power
  surface_characteristics:
  - challenge: Surface defects and stress concentrators
    severity: high
    impact: Scratches, chips, and inclusions dramatically lower damage threshold
    solutions:
    - Inspect surface with magnification before cleaning
    - Reduce power 40-50% for scratched or damaged glass
    - Clean around defects with extreme caution
    - Polished optical glass requires different parameters than rough architectural glass
  - challenge: Coating and film removal
    severity: medium
    impact: Thin films, anti-reflective coatings, and tints have different damage thresholds than substrate
    solutions:
    - Test on edge first to determine coating removal threshold
    - Coated glass may require 40-60W initial pass
    - Bare glass requires 20-30% lower power after coating removal
    - AR coatings very sensitive - use 30-40W maximum
  contamination_challenges:
  - challenge: Adhesive and paint removal
    severity: medium
    impact: Thick coatings require multiple passes and generate debris that can scratch glass
    solutions:
    - First pass 60W fast (1800 mm/s) for bulk removal
    - Second pass 40W slow (1000 mm/s) for residue
    - Use air assist to blow debris away from surface
    - Chemical pre-treatment reduces laser exposure time
    - Avoid dragging ablated material across clean areas
description: When laser cleaning tempered glass, we've found it behaves quite differently from standard annealed glass, which
  handles heat more evenly without the built-in stresses. Tempered glass's surface compression makes it incredibly strong
  against impacts in applications like automotive windshields or architectural panels, but that same tension inside means
  it can shatter completely if heat builds unevenly during cleaning. This sets it apart, so we approach it by using gentle,
  controlled passes to distribute energy without triggering those stresses—think starting slow to let the laser clear contaminants
  like oils or residues from electronics manufacturing without risking fractures. Its low heat spreading ability helps absorb
  the beam effectively for quick surface restoration, especially in delicate spots like medical devices or solar panels, but
  you must watch for hot spots that could propagate cracks. In our experience, this targeted method brings back clarity and
  shine reliably across marine or cultural heritage uses, preserving the material's durability. Just remember, always test
  on a small area first to avoid sudden breakage from overlooked thermal buildup.
