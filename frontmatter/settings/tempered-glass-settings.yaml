machineSettings:
  wavelength:
    description: Optimal wavelength for Tempered Glass processing with good absorption
    unit: nm
    value: 1064
    min: 355
    max: 10640
  spotSize:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: '200 μm spot for uniform coverage on large areas of tempered glass; smaller for fine details, larger for
      broad cleaning to reduce passes. Source: Equipment specifications from Coherent and Trumpf laser cleaning systems.'
  fluenceThreshold:
    description: Optimal fluence threshold for contaminant removal without glass damage
    unit: J/cm²
    value: 2.5
    min: 0.3
    max: 4.5
  pulseWidth:
    min: 0.1
    max: 1000
    unit: ns
    value: 10
    description: 'Nanosecond regime preferred over picosecond/femtosecond for cost-effective cleaning with minimal heat-affected
      zone (HAZ <10 μm); 10 ns recommended for tempered glass to selectively ablate contaminants without inducing subsurface
      stress. Source: Laser physics research in Applied Surface Science (2019) on pulsed laser interactions with glass.'
  scanSpeed:
    min: 10
    max: 5000
    value: 1000
    unit: mm/s
    description: 'Slower speeds for heavy contamination (e.g., oils/residues) ensure complete removal; 1000 mm/s optimal for
      light contaminants on tempered glass to balance efficiency and minimize heat accumulation. Source: Industry standards
      from Laserax equipment manuals and Journal of Cleaning Technology (2020) case studies.'
  passCount:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Multi-pass (2 recommended) for complete removal of layered contaminants without exceeding thermal limits;
      single pass sufficient for light soils on tempered glass. Source: Industry practice in Laser Cleaning Handbook (2022)
      and case studies from glass manufacturing (e.g., Pilkington reports).'
  overlapRatio:
    min: 10
    max: 90
    value: 50
    unit: '%'
    description: '50% overlap ensures uniform cleaning without gaps or overexposure on reflective tempered glass surfaces;
      higher for heavy contamination. Source: Process optimization studies in Surface and Coatings Technology (2016).'
  dwellTime:
    description: Optimal dwell time per cleaning spot
    unit: μs
    value: 100
    min: 0.2
    max: 200
  energyDensity:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Fluence below tempered glass damage threshold (~4-6 J/cm² at 1064 nm) for safe contaminant removal; 1.5
      J/cm² recommended for industrial applications like surface preparation. Source: Ablation threshold studies in Journal
      of Applied Physics (2021) and SPIE proceedings on laser cleaning of optics.'
  laserPower:
    description: Optimal average power for Tempered Glass cleaning without thermal damage
    unit: W
    value: 100
    min: 1.0
    max: 120
  laserPowerAlternative:
    min: 50
    max: 500
    value: 100
    unit: W
    description: 'Typical range for 1064 nm fiber lasers in delicate substrate cleaning; starting at 100 W avoids thermal
      stress on tempered glass (high reflectivity ~8% at 1064 nm, low thermal conductivity ~1 W/m·K); max limited to prevent
      cracking (melting point ~1400°C). Source: IPG Photonics YLR series specs and study in Optics and Lasers in Engineering
      (2018) on glass surface cleaning.'
  frequency:
    min: 1
    max: 200
    value: 30
    unit: kHz
    description: '30 kHz balances cleaning speed with reduced heat buildup (high rates increase accumulation, risking tempered
      glass fracture); typical for 1064 nm cleaning of transparent substrates. Source: Academic literature in Optics Express
      (2017) on repetition rate effects in laser ablation of dielectrics.'
componentSummary: These settings employ moderate 100 W power and short 10 ns pulses at 1064 nm to gently ablate contaminants
  from tempered glass, minimizing thermal stress and preventing surface cracking.
