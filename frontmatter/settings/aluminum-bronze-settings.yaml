machineSettings:
  wavelength:
    value: 1064
    unit: nm
    description: Near-IR wavelength for optimal metal absorption
    min: 355
    max: 10640
  spotSize:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Beam diameter for precise industrial cleaning; smaller for fine details on Aluminum Bronze parts, larger
      for broad surfaces. 200 μm recommended for uniform energy distribution and efficiency. Source: Equipment specs from
      Coherent and Trumpf laser systems, optimized for alloy surface prep.'
  energyDensity:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Fluence range for safe contaminant ablation; Aluminum Bronze damage threshold ~8-12 J/cm² at 1064 nm due
      to reflectivity (~40-60%). 1.5 J/cm² recommended for cleaning without substrate etching. Source: Ablation threshold
      studies in Journal of Applied Physics (2017) and SPIE proceedings on metal cleaning.'
  pulseWidth:
    min: 0.1
    max: 1000
    unit: ns
    value: 50
    description: 'Nanosecond regime dominant for cost-effective industrial cleaning; picosecond (ps) or femtosecond (fs) reduce
      HAZ but are less common for Aluminum Bronze due to high reflectivity. 50 ns recommended for minimal thermal effects
      on conductive alloys. Source: Laser physics research in Applied Surface Science (2019) comparing pulse regimes for Cu-Al
      alloys.'
  scanSpeed:
    min: 10
    max: 5000
    value: 1500
    unit: mm/s
    description: 'Effective speeds for 1064 nm cleaning; lower for heavy contamination (e.g., oxide layers on Aluminum Bronze),
      higher for light rust/oil. 1500 mm/s recommended for optimal contaminant removal without excessive heat buildup. Source:
      Industry standards from Laserax manuals and Journal of Laser Applications (2020) case studies on bronze alloys.'
  passCount:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass for heavy layers like marine corrosion on Aluminum Bronze.
      2 passes recommended for complete removal with minimal risk. Source: Industry practice in case studies from Surface
      and Coatings Technology (2022) on bronze cleaning applications.'
  overlapRatio:
    min: 10
    max: 90
    value: 60
    unit: '%'
    description: 'Ensures uniform coverage without gaps or over-ablation; 60% typical for Aluminum Bronze to account for reflectivity
      variations. Range adjusted for contamination thickness. Source: Process optimization studies in Optics & Laser Technology
      (2020) on scan strategies for metals.'
  laserPower:
    value: 100
    unit: W
    description: Optimal average power for metal oxide removal
    min: 1.0
    max: 120
  laserPowerAlternative:
    min: 50
    max: 1000
    value: 200
    unit: W
    description: 'Typical range for industrial cleaning of copper alloys like Aluminum Bronze to ablate contaminants without
      melting; starting at 200W balances efficiency and safety. Max limited to avoid thermal damage given alloy''s ~1040°C
      melting point. Source: IPG Photonics YLR series specs and studies in Optics and Lasers in Engineering (2018) on metal
      surface cleaning.'
  frequency:
    min: 1
    max: 200
    value: 50
    unit: kHz
    description: 'Typical for pulsed fiber lasers in cleaning; higher rates speed up process but risk heat accumulation in
      reflective Aluminum Bronze. 50 kHz balances speed and thermal management. Trade-off: >80 kHz may require cooling. Source:
      Academic literature in Lasers in Manufacturing and Materials Processing (2021) on repetition rate effects.'
componentSummary: The 200 W power at 1064 nm wavelength with 10 ns pulses enables precise contaminant removal from Aluminum
  Bronze, minimizing thermal effects to preserve its corrosion-resistant alloy structure.
