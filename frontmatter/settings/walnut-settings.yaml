  power:
    min: 20
    max: 150
    value: 50
    unit: W
    description: Typical range for delicate wood cleaning to avoid thermal damage; starting at 50 W for light contamination
      on walnut, max 150 W before charring risk. Based on manufacturer specs from CleanLaser systems for organic materials
      and studies on wood ablation (e.g., Ancona et al., 2010, Optics Express).
  scan_speed:
    min: 10
    max: 5000
    value: 1500
    unit: mm/s
    description: Effective speeds for contamination removal; 1500 mm/s recommended for optimal balance on walnut to prevent
      overheating. Lower for heavy contamination (500-1000 mm/s), higher for light (2000-3000 mm/s). From industry standards
      in laser cleaning manuals (e.g., IPG Photonics guidelines) and case studies on wood surface prep.
  pulse_width:
    min: 0.1
    max: 1000
    value: 30
    unit: ns
    description: Nanosecond regime preferred for cost-effective cleaning of walnut; 30 ns recommended to minimize heat-affected
      zone (HAZ) due to walnut's low thermal conductivity (~0.17 W/mK). Picosecond (ps) or femtosecond (fs) for ultra-precise
      but less common industrially. Supported by laser physics research (e.g., Jaeschke et al., 2016, Journal of Laser Applications).
  repetition_rate:
    min: 1
    max: 200
    value: 40
    unit: kHz
    description: 'Typical for pulsed cleaning; 40 kHz recommended for walnut to balance speed and heat accumulation—higher
      rates (>50 kHz) risk buildup on low-conductivity wood. Trade-off: faster cleaning but potential charring. From academic
      literature on wood laser processing (e.g., Pouli et al., 2015, Applied Physics A).'
  energy_density:
    min: 0.1
    max: 20.0
    value: 0.5
    unit: J/cm²
    description: Fluence range for safe ablation of contaminants; 0.5 J/cm² recommended for walnut to remove surface layers
      without damage (threshold ~1.5-2 J/cm² for charring at 1064 nm). Conservative due to walnut's moderate reflectivity
      (~40% at IR). From ablation threshold studies (e.g., Batani et al., 2006, Applied Surface Science).
  spot_size:
    min: 0.1
    max: 500
    unit: μm
    value: 200
    description: Beam diameter for controlled cleaning; 200 μm recommended for walnut to allow fine surface preparation without
      excessive heat spread. Smaller (100-200 μm) for detail, larger (300-500 μm) for broad areas. Per equipment specs from
      Adapt Laser Systems and industry standards for wood applications.
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: Typically 1-3 passes for complete removal on wood; 2 passes recommended for walnut to ensure uniform cleaning
      of contaminants without substrate damage. Multi-pass for heavy soiling. Based on industry practice and case studies
      (e.g., laser cleaning of wooden artifacts, Vergés-Belmin, 2005, Studies in Conservation).
  overlap_ratio:
    min: 10
    max: 90
    value: 60
    unit: '%'
    description: Ensures uniform coverage; 60% recommended for walnut to avoid gaps or overexposure, considering its density
      and low thermal diffusion. Typical 30-80% range from process optimization. From studies on scan strategies (e.g., Kumar
      et al., 2018, Optics and Lasers in Engineering).
component_summary: These settings provide moderate power and short nanosecond pulses at 1064 nm to gently ablate surface contaminants
  from walnut wood, minimizing thermal damage and preserving its natural grain without charring.
