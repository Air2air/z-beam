description: >-
  I've found walnut cleans nicely with gentle laser passes. Its open grain absorbs energy quickly, so it lifts dirt
  without much effort. This works well because the wood stays cool overall, avoiding deep burns. Just keep the beam
  moving steadily. Watch out for overdoing it—too much heat can char the surface, so test on a scrap first.
