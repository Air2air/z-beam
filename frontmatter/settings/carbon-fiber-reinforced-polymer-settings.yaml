  power:
    min: 10
    max: 100
    value: 30
    unit: W
    description: 'Typical range for pulsed Nd:YAG lasers in CFRP cleaning to ablate contaminants without matrix degradation;
      starting at 30W for light contamination. Max safe ~100W to avoid thermal damage (thermal conductivity ~1-5 W/mK, low
      melting point of epoxy ~150-200°C). Source: Journal of Laser Applications (2018) on composite cleaning.'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 1500
    description: 'Effective range balances cleaning efficiency and heat input; recommended 1500 mm/s for optimal CFRP surface
      prep. Slower (500 mm/s) for heavy contamination, faster (3000 mm/s) for light. Source: Industry manuals from IPG Photonics
      and Laserax equipment specs for polymer composites.'
  pulse_width:
    min: 0.1
    max: 1000
    value: 20
    unit: ns
    description: 'Nanosecond regime preferred for CFRP to minimize heat-affected zone (HAZ <50 μm); picosecond (ps) or femtosecond
      for ultra-precise but costlier. 20 ns typical for 1064 nm ablation of surface contaminants without fiber delamination.
      Source: Laser physics studies in Optics and Lasers in Engineering (2020).'
  repetition_rate:
    min: 1
    max: 200
    value: 30
    unit: kHz
    description: 'Standard for industrial cleaning; 30 kHz recommended for CFRP to achieve fast processing while limiting
      heat accumulation in low-conductivity matrix. Higher rates increase speed but risk overheating. Source: Academic literature
      in Applied Surface Science (2019) on pulsed laser cleaning of composites.'
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Fluence range for contaminant removal (e.g., oils, paints); CFRP damage threshold ~2-5 J/cm² depending on
      matrix. Recommended 1.5 J/cm² for safe cleaning, below ablation threshold for carbon fibers (~10 J/cm²). Conservative
      to account for reflectivity (~30-50% at 1064 nm). Source: Ablation threshold studies in Composites Part B (2017).'
  spot_size:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Beam diameter range for precision vs. area coverage; 200 μm recommended for CFRP to focus energy on contaminants
      without wide HAZ. Smaller for fine details, larger for broad surfaces. Source: Equipment specifications from Coherent
      and Trumpf laser cleaning systems for composites.'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass for heavy; 2 passes recommended for complete CFRP cleaning
      with minimal damage risk. Multi-pass allows lower fluence per pass. Source: Industry case studies in Journal of Cleaner
      Production (2021) on laser surface preparation of polymers.'
  overlap_ratio:
    min: 10
    max: 90
    value: 60
    unit: '%'
    description: 'Ensures uniform coverage without excessive overlap heating; 60% recommended for CFRP to achieve even cleaning
      while controlling thermal load. Typical 30-80% in optimization. Source: Process studies in International Journal of
      Advanced Manufacturing Technology (2022).'
page_description: We've found that when laser cleaning carbon fiber reinforced polymer, the biggest early concern is avoiding
  heat buildup in its low-conductivity matrix, which can delaminate the fibers if you're not careful. So we typically start
  with gentle power settings and slow scan speeds to let the laser absorb well into the surface. This clears contaminants
  effectively without weakening the strong composite bonds, and we follow with multiple light passes for even results. Just
  overlap your paths by half to prevent edge damage.
