  power:
    min: 20
    max: 500
    value: 100
    unit: W
    description: 'Typical range for industrial laser cleaning systems (e.g., CleanLaser CL 50-500 models) on delicate substrates
      like quartz glass to avoid thermal damage; starting at 100W for controlled ablation of contaminants. Max safe ~300-500W
      depending on fluence to prevent cracking (source: IPG Photonics specs and J. Laser Appl. 2018 study on glass cleaning).'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 500
    description: 'Effective range for 1064 nm cleaning; slower (100-500 mm/s) for heavy contamination, faster (1000-2000 mm/s)
      for light; 500 mm/s recommended for optimal balance on quartz to minimize heat input (source: Industry standards from
      Laserax manuals and Opt. Lasers Eng. 2020 on scan optimization).'
  pulse_width:
    min: 0.1
    max: 1000
    value: 20
    unit: ns
    description: 'Nanosecond regime typical for cost-effective cleaning of quartz glass; 5-50 ns for ns lasers, ps (10-100
      ps) for minimal HAZ but higher cost; 20 ns recommended to reduce thermal effects given quartz''s low absorption at 1064
      nm (source: Laser physics in Appl. Phys. A 2019 on pulse regimes for dielectrics).'
  repetition_rate:
    min: 1
    max: 200
    value: 50
    unit: kHz
    description: 'Standard for pulsed cleaning; 20-50 kHz for controlled energy delivery, up to 100 kHz for faster processing
      but risk of heat accumulation on low-conductivity quartz; 50 kHz balances speed and safety (source: Academic lit. in
      J. Appl. Phys. 2021 on rep rate trade-offs for transparent substrates).'
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Fluence for contaminant ablation without substrate damage; damage threshold for quartz ~10-15 J/cm² at 1064
      nm ns pulses; 1.5 J/cm² recommended for safe cleaning of organics/metals on glass (source: Ablation studies in Opt.
      Express 2017 on fused silica thresholds).'
  spot_size:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Beam diameter range for precision vs. area coverage; 50-200 μm for fine detail on quartz surfaces, 200-500
      μm for larger areas; 200 μm recommended for uniform cleaning without hotspots (source: Equipment specs from Coherent
      and Trumpf laser systems).'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass (2-5) for heavy; 2 passes recommended for complete removal
      on quartz while staying below damage threshold (source: Industry case studies in Surf. Coat. Technol. 2022 on multi-pass
      laser cleaning of glass).'
  overlap_ratio:
    min: 10
    max: 90
    value: 50
    unit: '%'
    description: 'Ensures uniform coverage; 30-50% for speed, 50-80% for thorough cleaning; 50% recommended for quartz to
      avoid uneven heating given its thermal properties (source: Process optimization in Lasers Manuf. Mater. Process. 2019).'
component_summary: These settings employ moderate 100 W power and 10 ns pulses at 1064 nm to selectively ablate contaminants
  from Quartz Glass without causing thermal cracking in its brittle, heat-sensitive structure.
