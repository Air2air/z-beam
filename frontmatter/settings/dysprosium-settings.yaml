  power:
    min: 50
    max: 500
    value: 200
    unit: W
    description: 'Typical range for industrial laser cleaning of reflective metals
      like Dysprosium at 1064 nm to ablate contaminants without substrate melting
      (melting point ~1412°C). Starting at 200 W balances efficiency and safety; higher
      risks thermal damage due to moderate thermal conductivity (~10.7 W/m·K). Source:
      General Nd:YAG laser specs from IPG Photonics and studies on rare earth metal
      processing (e.g., J. Appl. Phys. on lanthanide ablation).'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 1500
    description: 'Effective speeds for contaminant removal on Dysprosium; slower for
      heavy contamination (e.g., oxides), faster for light. Recommended 1500 mm/s
      optimizes fluence delivery without excessive heat buildup. Conservative for
      uniform coverage on soft, reflective surfaces. Source: Industry standards from
      laser cleaning manuals (e.g., Adapt Laser Systems) and process optimization
      in Opt. Lasers Eng.'
  pulse_width:
    min: 0.1
    max: 1000
    unit: ns
    value: 20
    description: 'Nanosecond regime preferred for cost-effective cleaning of Dysprosium;
      picosecond (ps) or femtosecond reduces HAZ but increases cost. 20 ns minimizes
      thermal diffusion in low-conductivity metal while ablating surface layers. Source:
      Laser physics research on metal ablation thresholds (e.g., Appl. Surf. Sci.
      reviews on ns vs. ps for rare earths).'
  repetition_rate:
    min: 1
    max: 200
    unit: kHz
    value: 50
    description: 'Standard for pulsed cleaning to achieve high throughput; 50 kHz
      recommended for Dysprosium to balance speed and avoid heat accumulation on reflective
      surfaces (high reflectivity ~70% at 1064 nm). Higher rates increase efficiency
      but risk subsurface heating. Source: Academic literature on pulse train effects
      (e.g., J. Phys. D: Appl. Phys. on metal cleaning).'
  energy_density:
    min: 0.1
    max: 20.0
    unit: J/cm²
    value: 1.5
    description: 'Fluence range for safe contaminant removal; Dysprosium damage threshold
      estimated ~2-4 J/cm² based on similar lanthanides. Recommended 1.5 J/cm² for
      cleaning without ablation of base metal, considering reflectivity and thermal
      properties. Conservative due to limited specific data. Source: Ablation threshold
      studies (e.g., Phys. Rev. B on rare earth metals; general metal cleaning in
      Laser Ablation and Its Applications).'
  spot_size:
    min: 0.1
    max: 500
    unit: μm
    value: 200
    description: 'Beam diameter for precise industrial cleaning; smaller for fine
      details on Dysprosium components, larger for broad areas. 200 μm recommended
      for balanced energy distribution and minimal distortion on soft metal. Source:
      Equipment specifications from Coherent and Trumpf lasers for metal surface prep.'
  pass_count:
    min: 1
    max: 10
    unit: passes
    value: 2
    description: 'Single pass for light contamination, multi-pass for heavy; 2 passes
      recommended for complete Dysprosium cleaning to ensure uniformity without over-processing
      reflective surfaces. Source: Industry case studies on iterative laser cleaning
      (e.g., Proc. SPIE on multi-pass optimization for metals).'
  overlap_ratio:
    min: 10
    max: 90
    unit: '%'
    value: 60
    description: 'Ensures uniform coverage; 60% recommended for Dysprosium to avoid
      gaps or streaks on large areas while preventing excessive overlap heating. Typical
      range from process studies. Source: Optimization studies in J. Laser Appl. and
      laser scanning guidelines from scanning head manufacturers like Scanlab.'
