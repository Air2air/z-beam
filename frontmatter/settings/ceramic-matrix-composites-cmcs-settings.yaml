machineSettings:
  wavelength:
    description: Near-IR wavelength providing optimal absorption balance for CMC ceramic phases and contaminants
    unit: nm
    value: 1064
    min: 355
    max: 10640
  spotSize:
    min: 0.1
    max: 500
    unit: μm
    value: 200
    description: 'Beam diameter for uniform coverage; smaller for fine details (100-200 μm), larger for broad areas (300-500
      μm). 200 μm recommended for CMCs to control energy delivery and avoid point overheating. Source: Equipment specs from
      Coherent Inc. laser systems for surface preparation.'
  energyDensity:
    min: 0.1
    max: 20.0
    unit: J/cm²
    value: 1.5
    description: 'Fluence range for contaminant removal; CMCs damage threshold ~2-4 J/cm² at 1064 nm due to high reflectivity
      and brittleness. Recommended 1.5 J/cm² for safe cleaning. Source: Ablation studies in Journal of Applied Physics (2017)
      for SiC-based CMCs.'
  pulseWidth:
    min: 0.1
    max: 1000
    unit: ns
    value: 20
    description: 'Nanosecond regime preferred for CMCs to achieve ablation with minimal thermal diffusion; picosecond (ps)
      or femtosecond reduces HAZ further but increases cost. 20 ns recommended for contamination removal without substrate
      damage. Source: Laser physics in Applied Surface Science (2019) on ceramic ablation thresholds.'
  scanSpeed:
    min: 10
    max: 5000
    unit: mm/s
    value: 1500
    description: 'Effective speeds balance cleaning efficiency and heat input; slower for heavy contamination (500-1000 mm/s),
      faster for light (2000-3000 mm/s). Recommended 1500 mm/s for CMCs to minimize HAZ. Source: Industry standards from Laser
      Institute of America; case studies in Journal of Laser Applications (2020).'
  passCount:
    min: 1
    max: 10
    unit: passes
    value: 2
    description: 'Single pass for light contamination, multi-pass for heavy; 2 passes recommended for CMCs to ensure complete
      removal without excessive exposure. Source: Industry case studies in Composites Part B (2022) on laser surface treatment
      of CMCs.'
  overlapRatio:
    min: 10
    max: 90
    unit: '%'
    value: 70
    description: 'Ensures uniform cleaning without gaps or overexposure; 70% optimal for CMCs to maintain even fluence distribution
      and prevent uneven heating. Source: Process optimization in Surface and Coatings Technology (2020).'
  laserPower:
    description: Optimal average power for CMC surface contaminant removal without substrate damage
    unit: W
    value: 100
    min: 1.0
    max: 120
  laserPowerAlternative:
    min: 50
    max: 500
    value: 100
    unit: W
    description: 'Typical range for industrial laser cleaning of composites to avoid thermal damage; starting at 100W for
      CMCs due to low thermal conductivity (e.g., SiC/SiC CMCs). Max safe below 500W to prevent cracking. Source: IPG Photonics
      specs for YLR series lasers adapted for ceramics; academic review in Optics and Lasers in Engineering (2018).'
  frequency:
    min: 1
    max: 200
    unit: kHz
    value: 30
    description: 'Typical for pulsed cleaning; higher rates speed up process but risk heat accumulation in low-conductivity
      CMCs. 30 kHz balances speed and safety. Trade-off: >50 kHz may cause delamination. Source: Academic literature in Optics
      Express (2021) on pulse train effects for composites.'
componentSummary: The 100 W power, 1064 nm wavelength, and 10 ns pulse width settings enable precise, low-heat ablation of
  contaminants from CMCs, preventing thermal cracking in their brittle ceramic matrix.
