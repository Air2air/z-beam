  power:
    min: 20
    max: 500
    value: 100
    unit: W
    description: 'Typical range for industrial Nd:YAG laser cleaning systems; starting at 100W balances efficiency and safety
      for Ti''s high reflectivity and melting point (~1668°C). Max avoids substrate damage via thermal accumulation. Source:
      IPG Photonics specs and studies on Ti alloy cleaning (e.g., J. Laser Appl. 2018).'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 1500
    description: 'Effective for contamination removal; slower for heavy contaminants (e.g., oxides), faster for light. Recommended
      1500 mm/s optimizes fluence without overheating Ti''s conductive surface. Source: Industry manuals (CleanLaser) and
      process optimization in Opt. Lasers Eng. (2020).'
  pulse_width:
    min: 0.1
    max: 1000
    unit: ns
    value: 20
    description: 'Nanosecond regime preferred for Ti cleaning to ablate contaminants while minimizing heat-affected zone (HAZ
      <10 μm); picosecond/femtosecond for ultra-precision but costlier. 20 ns recommended for low thermal damage. Source:
      Laser physics reviews in Appl. Surf. Sci. (2019) on metal ablation thresholds.'
  repetition_rate:
    min: 1
    max: 200
    unit: kHz
    value: 50
    description: 'Typical for pulsed cleaning; higher rates speed up process but risk heat buildup on reflective Ti. 50 kHz
      balances speed and minimal accumulation. Trade-off: >80 kHz may require cooling. Source: Academic lit. e.g., J. Phys.
      D: Appl. Phys. (2017) on pulse overlap effects.'
  energy_density:
    min: 0.1
    max: 20.0
    unit: J/cm²
    value: 1.0
    description: 'Fluence below Ti''s ablation threshold (~3 J/cm² at 1064 nm) for safe contaminant removal without substrate
      etching. Recommended 1.0 J/cm² for industrial prep. Ti''s reflectivity (~40% at 1064 nm) requires higher input. Source:
      Ablation studies in Surf. Coat. Technol. (2021).'
  spot_size:
    min: 0.1
    max: 500
    unit: μm
    value: 300
    description: 'Smaller for fine detail (e.g., aerospace Ti parts), larger for broad areas. 300 μm recommended for uniform
      cleaning on Ti without excessive overlap heating. Source: Equipment specs from Laserax and Coherent, aligned with ISO
      11553 standards.'
  pass_count:
    min: 1
    max: 10
    unit: passes
    value: 2
    description: 'Single pass for light contamination; multi-pass for heavy (e.g., rust/scale on Ti). Recommended 2 passes
      ensures complete removal with low risk to Ti''s integrity. Source: Case studies in industrial laser cleaning (e.g.,
      Proc. SPIE 2022) for metal surfaces.'
  overlap_ratio:
    min: 10
    max: 90
    unit: '%'
    value: 60
    description: 'Ensures uniform coverage; 60% recommended for Ti to avoid gaps or over-etching while managing heat from
      conductivity. Higher for heavy contamination. Source: Process optimization in J. Clean. Prod. (2019) and manufacturer
      guidelines (e.g., Adapt Laser).'
component_summary: For Titanium, these settings leverage 1064 nm wavelength for strong absorption, 100 W power for efficient
  oxide and contaminant ablation, and 10 ns pulses to limit thermal damage and maintain surface integrity.
challenges:
  thermal_management:
  - challenge: High thermal conductivity and heat spread
    severity: medium
    property_value: 4-400 W/(m·K) depending on metal
    impact: Heat spreads rapidly causing large heat-affected zones
    solutions:
    - Use shorter pulse durations (picosecond/femtosecond) for localized heating
    - Increase scan speed to minimize dwell time
    - Apply cooling between passes for thick sections
  - challenge: Melting and heat-affected zone formation
    severity: high
    threshold_range: 660°C (Al) to 3422°C (W)
    impact: Substrate melting or microstructural changes in heat-affected zone
    solutions:
    - Stay below 70% of melting temperature
    - Use pulse mode with adequate cooling time
    - Monitor for surface discoloration indicating oxidation
  surface_characteristics:
  - challenge: High reflectivity
    severity: high
    reflectivity_range: 60-95% at 1064nm for polished metals
    impact: Most laser energy reflected, requiring higher power; safety hazard
    solutions:
    - Use shorter wavelengths (355nm UV) for better absorption
    - Increase power density but monitor for thermal damage
    - Ensure proper beam containment and safety measures
    - Surface oxidation/roughness improves absorption
  - challenge: Surface finish variations
    severity: medium
    impact: Polished surfaces reflect more, rough surfaces absorb better
    solutions:
    - Adjust power based on surface condition
    - Test parameters on similar finish samples
    - Polished surfaces need 20-40% more power
  contamination_challenges:
  - challenge: Rust and oxide layer removal
    severity: medium
    impact: Requires multiple passes; rust/oxide has different absorption than base metal
    solutions:
    - First pass at higher power (100-120W) to remove bulk oxide
    - Second pass at lower power (60-80W) for final cleaning
    - Monitor for base metal exposure to avoid over-processing
  - challenge: Oil and grease removal
    severity: low
    impact: Organic contaminants vaporize easily but can redeposit
    solutions:
    - Use fume extraction to prevent redeposition
    - Higher scan speeds (3000-5000 mm/s) for thin films
    - Chemical pre-cleaning for heavy contamination
