description: >-
  When laser cleaning Fir, watch its softness compared to hardwoods—it chars faster under heat. You must start with low
  power to prevent surface damage. Unlike denser woods, Fir's high porosity absorbs contaminants deeply, so use multiple
  gentle passes. This clears grime without warping the grain. Keep scans slow for even coverage. Adjust overlap to avoid
  hot spots. Fir restores well in heritage work.
