  power:
    min: 20
    max: 200
    value: 50
    unit: W
    description: 'Typical range for pulsed Nd:YAG lasers in wood cleaning to avoid thermal damage; starting at 50 W for light
      contamination on softwoods like Fir. Max limited to prevent charring (Fir''s low thermal conductivity ~0.12 W/mK increases
      heat buildup). Source: Manufacturer specs from IPG Photonics and Coherent for industrial cleaning heads; academic paper
      by Pou et al. (2004) in Optics and Lasers in Engineering.'
  scan_speed:
    min: 10
    max: 5000
    value: 1500
    unit: mm/s
    description: 'Range for effective contaminant removal without substrate ablation; slower for heavy contamination (500-1000
      mm/s) vs light (2000-5000 mm/s). Recommended 1500 mm/s balances speed and control for Fir surface preparation. Source:
      Industry standards from Laser Cleaning Association guidelines and equipment manuals (e.g., Adapt Laser Systems); case
      studies on wood restoration.'
  pulse_width:
    min: 0.1
    max: 1000
    value: 20
    unit: ns
    description: 'Nanosecond regime preferred for Fir to minimize heat-affected zone (HAZ <50 μm); picosecond (ps) or femtosecond
      (fs) for ultra-precision but costlier. 20 ns optimal for 1064 nm ablation of organics without excessive plasma formation.
      Source: Laser physics research in Applied Surface Science (e.g., Anisimov et al., 2010) on wood ablation thresholds.'
  repetition_rate:
    min: 1
    max: 200
    value: 30
    unit: kHz
    description: 'Typical for cleaning applications; 30 kHz recommended for Fir to achieve fast coverage while limiting heat
      accumulation (trade-off: higher rates speed up process but risk thermal damage on low-conductivity wood). Source: Academic
      literature in Journal of Applied Physics (e.g., studies on pulse overlap in laser cleaning, Semaltianos, 2013).'
  energy_density:
    min: 0.1
    max: 20.0
    unit: J/cm²
    value: 2
    description: 'Fluence range for safe cleaning of contaminants; Fir damage threshold ~6-10 J/cm² at 1064 nm due to moderate
      reflectivity (~40% for wood). Recommended 2 J/cm² for removal without charring. Source: Ablation threshold studies in
      Optics Express (e.g., research on softwood laser interaction, Kononenko et al., 2006); conservative for industrial use.'
  spot_size:
    min: 0.1
    max: 500
    unit: μm
    value: 200
    description: 'Beam diameter range for cleaning; smaller (100-200 μm) for fine detail on Fir grain, larger (300-500 μm)
      for broad areas. 200 μm recommended for uniform surface preparation. Source: Equipment specifications from Trumpf and
      CleanLASER systems; process optimization in industrial applications.'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass (2-5) for heavy layers; 2 passes recommended for complete
      Fir cleaning without overexposure. Source: Industry practice from case studies in wood heritage restoration (e.g., European
      Laser Cleaning projects) and manufacturer guidelines.'
  overlap_ratio:
    min: 10
    max: 90
    value: 50
    unit: '%'
    description: 'Ensures uniform coverage; 50% recommended for Fir to avoid gaps or streaks while minimizing total energy
      input. Higher (60-80%) for heavy contamination. Source: Process optimization studies in Surface and Coatings Technology
      (e.g., research on scan strategies, Palmieri et al., 2018).'
component_summary: These settings deliver precise, low-heat ablation at 1064 nm for Fir wood, with 50 W power and 10 ns pulses
  minimizing charring while effectively removing surface contaminants without damaging delicate fibers.
