machineSettings:
  wavelength:
    description: Optimal wavelength for Gorilla Glass processing with good absorption
    unit: nm
    value: 1064
    min: 355
    max: 10640
  spotSize:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Smaller spots (50-200 μm) for fine detail cleaning on Gorilla Glass surfaces; larger (200-500 μm) for broad
      areas. 200 μm recommended for uniform coverage without pinpoint damage. Source: Equipment specifications from Trumpf
      and Coherent laser systems for precision optics cleaning.'
  fluenceThreshold:
    description: Optimal fluence threshold for contaminant removal without glass damage
    unit: J/cm²
    value: 2.5
    min: 0.3
    max: 4.5
  pulseWidth:
    min: 0.1
    max: 1000
    value: 10
    unit: ns
    description: 'Nanosecond regime preferred for cost-effective cleaning; picosecond (ps) or femtosecond (fs) for ultra-minimal
      HAZ but less common industrially. 10 ns recommended to limit heat diffusion in Gorilla Glass (high reflectivity ~4%
      at 1064 nm). Source: Laser physics research in Applied Physics A (2020) on glass ablation thresholds.'
  scanSpeed:
    min: 10
    max: 5000
    unit: mm/s
    value: 500
    description: 'Range for effective contaminant ablation without substrate heating; slower speeds (100-500 mm/s) for heavy
      contamination, faster (1000-2000 mm/s) for light. Recommended 500 mm/s for Gorilla Glass to balance efficiency and safety.
      Source: Industry standards from Laser Institute of America; equipment manuals from Coherent Inc.'
  passCount:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination; multi-pass (2-5) for heavy layers to avoid exceeding damage fluence
      per pass. Recommended 2 passes for Gorilla Glass to ensure complete removal while minimizing thermal stress. Source:
      Industry case studies in Surface and Coatings Technology (2021); Corning application notes.'
  overlapRatio:
    min: 10
    max: 90
    value: 50
    unit: '%'
    description: '30-80% overlap ensures uniform fluence distribution; higher for delicate materials like Gorilla Glass to
      prevent uneven heating or missed spots. 50% recommended for optimal coverage in industrial cleaning. Source: Process
      optimization studies in Lasers in Manufacturing and Materials Processing (2022).'
  energyDensity:
    min: 0.1
    max: 20.0
    value: 0.5
    unit: J/cm²
    description: 'Fluence range for contaminant removal (e.g., oils, fingerprints); Gorilla Glass damage threshold ~2-5 J/cm²
      at 1064 nm ns pulses due to softening point ~500°C. Recommended 0.5 J/cm² for safe cleaning below threshold. Source:
      Ablation threshold studies in Journal of Applied Physics (2017) on strengthened glass.'
  laserPower:
    description: Optimal power range for Gorilla Glass cleaning without thermal damage
    unit: W
    value: 100
    min: 1.0
    max: 120
  laserPowerAlternative:
    min: 20
    max: 200
    value: 50
    unit: W
    description: 'Typical range for delicate glass substrates like Gorilla Glass to avoid thermal damage; starting at 50W
      for light contamination removal. Max safe below 200W to prevent cracking due to low thermal conductivity (~1 W/mK).
      Source: IPG Photonics laser cleaning guidelines for optics; academic review in Journal of Laser Applications (2018).'
  frequency:
    min: 1
    max: 200
    value: 20
    unit: kHz
    description: 'Typical 10-100 kHz for pulsed cleaning; lower rates reduce heat accumulation in low-conductivity Gorilla
      Glass, higher enable faster processing but risk overheating. 20 kHz recommended for balanced throughput. Trade-off:
      high freq increases cumulative fluence. Source: Academic literature in Optics and Lasers in Engineering (2019).'
componentSummary: The 50 W power, 1064 nm wavelength, and 10 ns pulse width settings are optimal for cleaning Gorilla Glass,
  enabling precise contaminant removal with minimal heat input to avoid thermal damage or cracking in its brittle structure.
