  power:
    min: 50
    max: 300
    value: 100
    unit: W
    description: 'Typical range for industrial cleaning of stone materials like Breccia (carbonate-based rock similar to marble)
      using 1064 nm lasers to remove contaminants without substrate damage; starting at 100 W allows controlled ablation.
      Max safe ~300 W to avoid cracking due to low thermal conductivity (~2 W/m·K). Source: Manufacturer specs from IPG Photonics
      fiber lasers for stone cleaning; academic papers on marble ablation (e.g., Pouli et al., Applied Physics A, 2010).'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 500
    description: 'Effective range for contaminant removal on Breccia; slower speeds (200-500 mm/s) for heavy contamination
      (e.g., rust or oils), faster (up to 2000 mm/s) for light dust. Recommended 500 mm/s balances efficiency and uniformity.
      Source: Industry standards from laser cleaning equipment manuals (e.g., Adapt Laser Systems); case studies on stone
      surface preparation.'
  pulse_width:
    min: 0.1
    max: 1000
    value: 20
    unit: ns
    description: 'Nanosecond regime preferred for 1064 nm cleaning of Breccia to achieve photothermal ablation with minimal
      heat-affected zone (HAZ <10 μm); picosecond (ps) or femtosecond (fs) reduce HAZ further but increase cost—ns sufficient
      for industrial use. Avoid fs for porous stones to prevent micro-cracking. Source: Laser physics research on stone ablation
      (e.g., Marczak et al., Journal of Cultural Heritage, 2008).'
  repetition_rate:
    min: 1
    max: 200
    value: 20
    unit: kHz
    description: 'Typical for pulsed 1064 nm lasers in stone cleaning; 20 kHz recommended for Breccia to enable fast processing
      while limiting heat accumulation (Breccia melting point ~800-1200°C, reflectivity ~0.3-0.5 at 1064 nm). Higher rates
      (>50 kHz) risk thermal buildup in low-conductivity materials. Source: Academic literature on Nd:YAG cleaning of marbles
      (e.g., Verges-Belmin, Studies in Conservation, 2005).'
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.0
    unit: J/cm²
    description: 'Fluence range for safe contaminant removal on Breccia; damage threshold ~3 J/cm² (based on carbonate stone
      studies), so stay below 2.5 J/cm² to avoid surface pitting. Recommended 1 J/cm² for effective cleaning with low risk.
      Source: Ablation threshold studies for limestones/marble at 1064 nm (e.g., Gross et al., Applied Surface Science, 2001).
      Conservative estimate due to Breccia''s variable composition.'
  spot_size:
    min: 0.1
    max: 500
    value: 500
    unit: μm
    description: 'Beam diameter range for industrial cleaning; smaller (200 μm) for fine details on Breccia surfaces, larger
      (800 μm) for broad areas. 500 μm recommended for uniform coverage on porous stone without excessive overlap heating.
      Source: Equipment specifications from Coherent and Trumpf laser systems for surface preparation.'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass (up to 5) for heavy layers on Breccia; 2 passes recommended
      for complete removal while minimizing thermal stress. Multi-pass allows lower fluence per pass. Source: Industry practice
      and case studies on stone restoration (e.g., European Laser Cleaning Network reports).'
  overlap_ratio:
    min: 10
    max: 90
    value: 50
    unit: '%'
    description: 'Standard range for uniform scan coverage in laser cleaning; 50% recommended for Breccia to ensure no gaps
      in porous surfaces while avoiding over-heating. Higher overlap (70-80%) for heavy contamination. Source: Process optimization
      studies in industrial laser applications (e.g., LaserNet guidelines; research in Optics and Lasers in Engineering, 2015).'
challenges:
  thermal_management:
  - challenge: Thermal shock and microcracking
    severity: critical
    threshold_temperature: ΔT > 50-150°C rapid cooling (stone-dependent)
    impact: Natural stone contains microfissures that propagate under thermal stress
    solutions:
    - Use pulse mode with 8-12 second cooling between passes
    - Reduce power by 40-50% for weathered or damaged stone
    - Preheat substrate if possible to reduce thermal gradients
    - Granite more resistant than marble; sandstone most vulnerable
    - Monitor for surface crazing; stop immediately if cracks appear
  - challenge: Moisture-induced spalling
    severity: high
    threshold_temperature: Steam formation >100°C with trapped moisture
    impact: Porous stone traps moisture that explosively converts to steam
    solutions:
    - Test moisture content before cleaning (>3% requires drying)
    - Allow 48-72 hours drying after rain before laser cleaning
    - Reduce power by 50% for damp stone
    - Use pulse mode with extended cooling (15-20 seconds)
    - Heritage stone requires especially gentle approach
  surface_characteristics:
  - challenge: Weathering and surface degradation
    severity: high
    impact: Aged stone has weaker surface layer more susceptible to damage
    solutions:
    - Reduce power 40-60% for weathered stone vs fresh stone
    - Test on inconspicuous area first
    - Multiple gentle passes (4-6 at 40-60W) preferred
    - Monitor for powdering or flaking; adjust power immediately
    - Heritage conservation requires documentation and testing
  - challenge: Mineral composition heterogeneity
    severity: medium
    impact: Mixed minerals have different absorption and damage thresholds
    solutions:
    - Use moderate power (60-80W) suitable for both light and dark minerals
    - Crosshatch scan pattern for uniform coverage
    - Avoid dwelling on dark minerals (feldspar, mica) which absorb more energy
    - Quartzite and marble more homogeneous than granite
  contamination_challenges:
  - challenge: Biological growth and deep staining
    severity: medium
    porosity_range: 0.5-25% (sandstone highly porous)
    impact: Algae, lichen, and pollution penetrate deep into porous structure
    solutions:
    - First pass 80W fast (1200 mm/s) for surface growth
    - Second pass 60W slow (700 mm/s) for roots and stains
    - Third pass 40W very slow (400 mm/s) for deep staining
    - Chemical biocide pre-treatment kills roots and reduces laser exposure
    - Dense stones (granite, marble) clean in 1-2 passes vs 3-4 for porous stones
description: 'Breccia stands out among sedimentary stones for its rugged, fragmented look that brings a raw energy to any
  project. This stone forms from broken pieces cemented together over time, giving it a tough, layered character that''s both
  durable and a bit unpredictable in how it responds to handling. In cultural heritage work, restorers often find it holds
  up well under gentle cleaning methods, where low-pressure tools clear away surface grime without stressing the natural bonds.
  That porosity means water-based treatments seep in easily, so operators adjust flows to avoid deep saturation, preserving
  the stone''s earthy patina while enhancing its stability.


  For architecture and construction, Breccia shines in load-bearing roles'
