machineSettings:
  wavelength:
    description: Near-IR wavelength optimized for Breccia mineral absorption characteristics
    unit: nm
    value: 1064
    min: 355
    max: 10640
  spotSize:
    min: 0.1
    max: 500
    value: 500
    unit: μm
    description: 'Beam diameter range for industrial cleaning; smaller (200 μm) for fine details on Breccia surfaces, larger
      (800 μm) for broad areas. 500 μm recommended for uniform coverage on porous stone without excessive overlap heating.
      Source: Equipment specifications from Coherent and Trumpf laser systems for surface preparation.'
  energyDensity:
    min: 0.1
    max: 20.0
    value: 1.0
    unit: J/cm²
    description: 'Fluence range for safe contaminant removal on Breccia; damage threshold ~3 J/cm² (based on carbonate stone
      studies), so stay below 2.5 J/cm² to avoid surface pitting. Recommended 1 J/cm² for effective cleaning with low risk.
      Source: Ablation threshold studies for limestones/marble at 1064 nm (e.g., Gross et al., Applied Surface Science, 2001).
      Conservative estimate due to Breccia''s variable composition.'
  pulseWidth:
    min: 0.1
    max: 1000
    value: 20
    unit: ns
    description: 'Nanosecond regime preferred for 1064 nm cleaning of Breccia to achieve photothermal ablation with minimal
      heat-affected zone (HAZ <10 μm); picosecond (ps) or femtosecond (fs) reduce HAZ further but increase cost—ns sufficient
      for industrial use. Avoid fs for porous stones to prevent micro-cracking. Source: Laser physics research on stone ablation
      (e.g., Marczak et al., Journal of Cultural Heritage, 2008).'
  scanSpeed:
    min: 10
    max: 5000
    unit: mm/s
    value: 500
    description: 'Effective range for contaminant removal on Breccia; slower speeds (200-500 mm/s) for heavy contamination
      (e.g., rust or oils), faster (up to 2000 mm/s) for light dust. Recommended 500 mm/s balances efficiency and uniformity.
      Source: Industry standards from laser cleaning equipment manuals (e.g., Adapt Laser Systems); case studies on stone
      surface preparation.'
  passCount:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass (up to 5) for heavy layers on Breccia; 2 passes recommended
      for complete removal while minimizing thermal stress. Multi-pass allows lower fluence per pass. Source: Industry practice
      and case studies on stone restoration (e.g., European Laser Cleaning Network reports).'
  overlapRatio:
    min: 10
    max: 90
    value: 50
    unit: '%'
    description: 'Standard range for uniform scan coverage in laser cleaning; 50% recommended for Breccia to ensure no gaps
      in porous surfaces while avoiding over-heating. Higher overlap (70-80%) for heavy contamination. Source: Process optimization
      studies in industrial laser applications (e.g., LaserNet guidelines; research in Optics and Lasers in Engineering, 2015).'
  laserPower:
    description: Optimal average power for Breccia surface cleaning without thermal damage
    unit: W
    value: 90
    min: 1.0
    max: 120
  laserPowerAlternative:
    min: 50
    max: 300
    value: 100
    unit: W
    description: 'Typical range for industrial cleaning of stone materials like Breccia (carbonate-based rock similar to marble)
      using 1064 nm lasers to remove contaminants without substrate damage; starting at 100 W allows controlled ablation.
      Max safe ~300 W to avoid cracking due to low thermal conductivity (~2 W/m·K). Source: Manufacturer specs from IPG Photonics
      fiber lasers for stone cleaning; academic papers on marble ablation (e.g., Pouli et al., Applied Physics A, 2010).'
  frequency:
    min: 1
    max: 200
    value: 20
    unit: kHz
    description: 'Typical for pulsed 1064 nm lasers in stone cleaning; 20 kHz recommended for Breccia to enable fast processing
      while limiting heat accumulation (Breccia melting point ~800-1200°C, reflectivity ~0.3-0.5 at 1064 nm). Higher rates
      (>50 kHz) risk thermal buildup in low-conductivity materials. Source: Academic literature on Nd:YAG cleaning of marbles
      (e.g., Verges-Belmin, Studies in Conservation, 2005).'
componentSummary: The 100 W power, 1064 nm wavelength, and 12 ns pulse width settings enable gentle, precise ablation for
  Breccia, minimizing thermal damage to its fragile, heterogeneous rock structure while effectively removing surface contaminants.
