  power:
    min: 50
    max: 500
    value: 150
    unit: W
    description: 'Typical range for industrial Nd:YAG laser cleaning of ceramics like
      Zirconia to remove contaminants without thermal damage; starting at 150 W for
      controlled ablation. Max safe ~500 W to avoid cracking due to low thermal conductivity.
      Source: IPG Photonics YLR series specs and study in Journal of Laser Applications
      (2018).'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 1000
    description: 'Effective speeds for 1064 nm cleaning of Zirconia; slower for heavy
      contamination (200-800 mm/s), faster for light (1500-3000 mm/s) to minimize
      heat input. Recommended 1000 mm/s for balanced removal and surface integrity.
      Source: Industry standards from Laserax equipment manuals and Optics Express
      (2021).'
  pulse_width:
    min: 0.1
    max: 1000
    value: 50
    unit: ns
    description: 'Nanosecond regime preferred for industrial cleaning of Zirconia
      to balance efficiency and minimal HAZ; picosecond (ps) or femtosecond (fs) for
      ultra-precise but costlier applications. 50 ns recommended to limit thermal
      diffusion in low-conductivity Zirconia. Source: Laser physics review in Applied
      Surface Science (2019).'
  repetition_rate:
    min: 1
    max: 200
    value: 40
    unit: kHz
    description: 'Typical for pulsed cleaning; 40 kHz recommended for Zirconia to
      achieve fast processing without excessive heat accumulation, given its high
      melting point but low thermal conductivity. Higher rates (>80 kHz) risk overheating.
      Source: Academic literature in Journal of Applied Physics (2020).'
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Fluence range for contaminant removal on Zirconia; damage threshold
      ~4 J/cm² at 1064 nm due to reflectivity and absorption properties. 1.5 J/cm²
      recommended for safe cleaning without substrate ablation. Source: Ablation threshold
      studies in Optics and Lasers in Engineering (2017).'
  spot_size:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Beam diameter for precise industrial cleaning; smaller (100-200
      μm) for fine surface prep, larger (300-500 μm) for broad areas. 200 μm recommended
      for Zirconia to ensure uniform energy distribution and avoid localized overheating.
      Source: Manufacturer specs from Coherent and Trumpf laser systems.'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass (2-5) for heavy;
      2 passes recommended for complete Zirconia cleaning while preserving integrity,
      based on iterative removal without cumulative damage. Source: Industry case
      studies in Surface and Coatings Technology (2022).'
  overlap_ratio:
    min: 10
    max: 90
    value: 70
    unit: '%'
    description: 'Ensures uniform coverage in scan patterns; 70% recommended for Zirconia
      to achieve even cleaning without gaps or overexposure, optimizing for its brittle
      nature. Typical range 50-80% in pulsed laser processes. Source: Process optimization
      in International Journal of Advanced Manufacturing Technology (2019).'
