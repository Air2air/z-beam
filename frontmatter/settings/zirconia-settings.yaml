pageTitle: Zirconia Settings
pageDescription: The key with Zirconia is its strong laser absorption. We've found this makes cleaning efficient without much
  reflection loss. It removes contaminants quickly while preserving the surface. Unlike metals, its low thermal conductivity
  traps heat locally. We typically start with moderate power to prevent buildup. This approach reduces cracking risks in such
  a hard ceramic. Zirconia stands out for high toughness under stress. Adjust scan speeds higher for even exposure. In our
  experience, multiple light passes restore it fully. Watch for thermal gradients at the end, though, and cool between runs
  to avoid micro-fractures.
