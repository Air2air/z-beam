  power:
    min: 50
    max: 500
    value: 100
    unit: W
    description: 'Typical range for pulsed Nd:YAG lasers in metal cleaning; lower end for delicate soft metals like Indium
      to avoid melting (mp 156.6°C). Recommended start conservatively low. Source: IPG Photonics specs for cleaning heads;
      conservative for Indium''s low thermal resistance (similar to Al studies in Opt. Lasers Eng. 2018).'
  scan_speed:
    min: 10
    max: 5000
    value: 1500
    unit: mm/s
    description: 'Effective for contamination removal on reflective metals; slower for heavy contamination (e.g., oxides),
      faster for light. Recommended balances speed and fluence control. Source: Industry standards from Laserax manuals; adapted
      for Indium''s high reflectivity reducing absorption.'
  pulse_width:
    min: 0.1
    max: 1000
    value: 20
    unit: ns
    description: 'Nanosecond regime preferred for cost-effective cleaning with minimal HAZ on soft metals; picosecond (ps)
      for ultra-precision but overkill for Indium. Avoids excessive heat buildup due to Indium''s conductivity (82 W/m·K).
      Source: Laser physics in J. Appl. Phys. 2015 on ns ablation thresholds for low-mp metals.'
  repetition_rate:
    min: 1
    max: 200
    value: 30
    unit: kHz
    description: 'Typical for industrial cleaning; moderate rate prevents heat accumulation on heat-sensitive Indium while
      enabling efficient coverage. Higher rates increase speed but risk thermal damage. Source: Academic lit. in Appl. Surf.
      Sci. 2020 on pulse train effects for metals.'
  energy_density:
    min: 0.1
    max: 20.0
    unit: J/cm²
    value: 1.5
    description: 'Fluence below Indium''s ablation threshold (~2-4 J/cm² at 1064 nm due to reflectivity >90%); safe for contaminant
      removal without substrate melting. Conservative to account for variability in contamination. Source: Ablation studies
      in Phys. Procedia 2013 for soft metals; estimated for Indium.'
  spot_size:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Smaller for precise surface prep on Indium components (e.g., electronics); larger for broad areas. Balances
      fluence and coverage. Source: Equipment specs from Coherent Inc. cleaning systems; suitable for fine Indium features.'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Multi-pass for thorough removal of layered contamination without single-pass overload; single pass for light
      cleaning. Recommended for uniform Indium surface prep. Source: Industry case studies in J. Laser Appl. 2019 on metal
      oxide removal.'
  overlap_ratio:
    min: 10
    max: 90
    value: 50
    unit: '%'
    description: 'Ensures uniform coverage on irregular Indium surfaces; 50% optimal for efficiency without excessive exposure.
      Higher for heavy contamination. Source: Process optimization in Opt. Laser Technol. 2017 for scanned laser cleaning.'
challenges:
  thermal_management:
  - challenge: High thermal conductivity and heat spread
    severity: medium
    property_value: 4-400 W/(m·K) depending on metal
    impact: Heat spreads rapidly causing large heat-affected zones
    solutions:
    - Use shorter pulse durations (picosecond/femtosecond) for localized heating
    - Increase scan speed to minimize dwell time
    - Apply cooling between passes for thick sections
  - challenge: Melting and heat-affected zone formation
    severity: high
    threshold_range: 660°C (Al) to 3422°C (W)
    impact: Substrate melting or microstructural changes in heat-affected zone
    solutions:
    - Stay below 70% of melting temperature
    - Use pulse mode with adequate cooling time
    - Monitor for surface discoloration indicating oxidation
  surface_characteristics:
  - challenge: High reflectivity
    severity: high
    reflectivity_range: 60-95% at 1064nm for polished metals
    impact: Most laser energy reflected, requiring higher power; safety hazard
    solutions:
    - Use shorter wavelengths (355nm UV) for better absorption
    - Increase power density but monitor for thermal damage
    - Ensure proper beam containment and safety measures
    - Surface oxidation/roughness improves absorption
  - challenge: Surface finish variations
    severity: medium
    impact: Polished surfaces reflect more, rough surfaces absorb better
    solutions:
    - Adjust power based on surface condition
    - Test parameters on similar finish samples
    - Polished surfaces need 20-40% more power
  contamination_challenges:
  - challenge: Rust and oxide layer removal
    severity: medium
    impact: Requires multiple passes; rust/oxide has different absorption than base metal
    solutions:
    - First pass at higher power (100-120W) to remove bulk oxide
    - Second pass at lower power (60-80W) for final cleaning
    - Monitor for base metal exposure to avoid over-processing
  - challenge: Oil and grease removal
    severity: low
    impact: Organic contaminants vaporize easily but can redeposit
    solutions:
    - Use fume extraction to prevent redeposition
    - Higher scan speeds (3000-5000 mm/s) for thin films
    - Chemical pre-cleaning for heavy contamination
description: When laser cleaning Indium, you must start with a cautious low-power setup to avoid melting its soft surface,
  unlike tougher metals that handle more heat. Begin by pulsing gently to penetrate its high reflectivity, which reflects
  energy better than copper does. Slowly increase scan speed across the area, ensuring even passes that restore its conductive
  finish without warping. This approach clears contaminants while preserving Indium's malleability for electronics use.
