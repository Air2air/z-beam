description: >-
  When laser cleaning Indium, you must start with a cautious low-power setup to avoid melting its soft surface, unlike
  tougher metals that handle more heat. Begin by pulsing gently to penetrate its high reflectivity, which reflects
  energy better than copper does. Slowly increase scan speed across the area, ensuring even passes that restore its
  conductive finish without warping. This approach clears contaminants while preserving Indium's malleability for
  electronics use.
