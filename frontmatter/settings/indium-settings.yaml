machineSettings:
  powerRange:
    description: Optimal average power for Indium oxide removal without substrate damage
    unit: W
    value: 45
    min: 1.0
    max: 120
  wavelength:
    description: Near-IR wavelength providing good absorption in Indium oxide layer
    unit: nm
    value: 1064
    min: 355
    max: 10640
  spotSize:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Smaller for precise surface prep on Indium components (e.g., electronics); larger for broad areas. Balances
      fluence and coverage. Source: Equipment specs from Coherent Inc. cleaning systems; suitable for fine Indium features.'
  repetitionRate:
    min: 1
    max: 200
    value: 30
    unit: kHz
    description: 'Typical for industrial cleaning; moderate rate prevents heat accumulation on heat-sensitive Indium while
      enabling efficient coverage. Higher rates increase speed but risk thermal damage. Source: Academic lit. in Appl. Surf.
      Sci. 2020 on pulse train effects for metals.'
  fluenceThreshold:
    description: Fluence threshold for Indium oxide ablation
    unit: J/cm²
    value: 2.8
    min: 0.3
    max: 4.5
  pulseWidth:
    min: 0.1
    max: 1000
    value: 20
    unit: ns
    description: 'Nanosecond regime preferred for cost-effective cleaning with minimal HAZ on soft metals; picosecond (ps)
      for ultra-precision but overkill for Indium. Avoids excessive heat buildup due to Indium''s conductivity (82 W/m·K).
      Source: Laser physics in J. Appl. Phys. 2015 on ns ablation thresholds for low-mp metals.'
  scanSpeed:
    min: 10
    max: 5000
    value: 1500
    unit: mm/s
    description: 'Effective for contamination removal on reflective metals; slower for heavy contamination (e.g., oxides),
      faster for light. Recommended balances speed and fluence control. Source: Industry standards from Laserax manuals; adapted
      for Indium''s high reflectivity reducing absorption.'
  passCount:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Multi-pass for thorough removal of layered contamination without single-pass overload; single pass for light
      cleaning. Recommended for uniform Indium surface prep. Source: Industry case studies in J. Laser Appl. 2019 on metal
      oxide removal.'
  overlapRatio:
    min: 10
    max: 90
    value: 50
    unit: '%'
    description: 'Ensures uniform coverage on irregular Indium surfaces; 50% optimal for efficiency without excessive exposure.
      Higher for heavy contamination. Source: Process optimization in Opt. Laser Technol. 2017 for scanned laser cleaning.'
  power:
    min: 50
    max: 500
    value: 100
    unit: W
    description: 'Typical range for pulsed Nd:YAG lasers in metal cleaning; lower end for delicate soft metals like Indium
      to avoid melting (mp 156.6°C). Recommended start conservatively low. Source: IPG Photonics specs for cleaning heads;
      conservative for Indium''s low thermal resistance (similar to Al studies in Opt. Lasers Eng. 2018).'
  energyDensity:
    min: 0.1
    max: 20.0
    unit: J/cm²
    value: 1.5
    description: 'Fluence below Indium''s ablation threshold (~2-4 J/cm² at 1064 nm due to reflectivity >90%); safe for contaminant
      removal without substrate melting. Conservative to account for variability in contamination. Source: Ablation studies
      in Phys. Procedia 2013 for soft metals; estimated for Indium.'
componentSummary: These settings use moderate 100 W power and 12 ns pulses at 1064 nm to gently ablate contaminants from soft,
  low-melting Indium, minimizing thermal damage and preserving surface integrity.
