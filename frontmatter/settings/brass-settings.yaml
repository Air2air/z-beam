  power:
    min: 50
    max: 300
    value: 100
    unit: W
    description: 'Typical range for industrial 1064 nm laser cleaning of reflective metals like brass to avoid thermal damage;
      starting at 100W for light contamination. Max limited by brass''s high reflectivity and melting point (~900°C). Source:
      CleanLaser and IPG Photonics specs for metal cleaning systems.'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 1500
    description: 'Effective speeds balance cleaning efficiency and heat input; slower for heavy contamination (e.g., oxides),
      faster for light rust/oil. Recommended 1500 mm/s for uniform brass surface prep. Source: Industry standards from Laserax
      and academic studies on scan optimization (e.g., J. Laser Appl. 2018).'
  pulse_width:
    min: 0.1
    max: 1000
    value: 10
    unit: ns
    description: 'Nanosecond regime preferred for cost-effective cleaning of brass; 10 ns minimizes heat-affected zone (HAZ)
      due to brass''s thermal conductivity (~120 W/mK). Picosecond (<1 ns) for ultra-fine work but less common industrially.
      Source: Laser physics research in Opt. Lasers Eng. (2015) on metal ablation thresholds.'
  repetition_rate:
    min: 1
    max: 200
    value: 30
    unit: kHz
    description: '20-50 kHz balances speed and heat accumulation on reflective brass; higher rates (>50 kHz) risk overheating
      despite good conductivity. Source: Academic literature on pulsed laser cleaning (e.g., Appl. Surf. Sci. 2019), noting
      trade-offs for Cu-based alloys.'
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Fluence below brass damage threshold (~2-4 J/cm² at 1064 nm) for contaminant removal without substrate ablation;
      1.5 J/cm² safe for oils/rust. Source: Ablation threshold studies in J. Phys. D: Appl. Phys. (2017) for brass and similar
      alloys.'
  spot_size:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: '200-300 μm ideal for brass to achieve uniform cleaning on detailed surfaces; smaller for precision, larger
      for broad areas. Accounts for beam divergence on reflective surfaces. Source: Equipment specs from Coherent and Trumpf
      laser cleaning heads.'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: '1-3 passes typical for complete removal of contaminants on brass; multi-pass for layered dirt to stay below
      damage threshold. Single pass sufficient for light prep. Source: Industry case studies (e.g., Laser Cleaning Technol.
      reports) and practical optimization.'
  overlap_ratio:
    min: 10
    max: 90
    value: 70
    unit: '%'
    description: '70% overlap ensures uniform coverage without excessive heat buildup on brass; higher for fine contaminants,
      lower for speed. Source: Process optimization studies in Surf. Coat. Technol. (2020) for scanned laser cleaning of metals.'
challenges:
  thermal_management:
  - challenge: High thermal conductivity and heat spread
    severity: medium
    property_value: 4-400 W/(m·K) depending on metal
    impact: Heat spreads rapidly causing large heat-affected zones
    solutions:
    - Use shorter pulse durations (picosecond/femtosecond) for localized heating
    - Increase scan speed to minimize dwell time
    - Apply cooling between passes for thick sections
  - challenge: Melting and heat-affected zone formation
    severity: high
    threshold_range: 660°C (Al) to 3422°C (W)
    impact: Substrate melting or microstructural changes in heat-affected zone
    solutions:
    - Stay below 70% of melting temperature
    - Use pulse mode with adequate cooling time
    - Monitor for surface discoloration indicating oxidation
  surface_characteristics:
  - challenge: High reflectivity
    severity: high
    reflectivity_range: 60-95% at 1064nm for polished metals
    impact: Most laser energy reflected, requiring higher power; safety hazard
    solutions:
    - Use shorter wavelengths (355nm UV) for better absorption
    - Increase power density but monitor for thermal damage
    - Ensure proper beam containment and safety measures
    - Surface oxidation/roughness improves absorption
  - challenge: Surface finish variations
    severity: medium
    impact: Polished surfaces reflect more, rough surfaces absorb better
    solutions:
    - Adjust power based on surface condition
    - Test parameters on similar finish samples
    - Polished surfaces need 20-40% more power
  contamination_challenges:
  - challenge: Rust and oxide layer removal
    severity: medium
    impact: Requires multiple passes; rust/oxide has different absorption than base metal
    solutions:
    - First pass at higher power (100-120W) to remove bulk oxide
    - Second pass at lower power (60-80W) for final cleaning
    - Monitor for base metal exposure to avoid over-processing
  - challenge: Oil and grease removal
    severity: low
    impact: Organic contaminants vaporize easily but can redeposit
    solutions:
    - Use fume extraction to prevent redeposition
    - Higher scan speeds (3000-5000 mm/s) for thin films
    - Chemical pre-cleaning for heavy contamination
description: When laser cleaning brass, you'll want to start with a lower pulse frequency because it reflects light so well,
  which means you avoid overheating the surface right away. We've found that gentle passes work best on fittings or instruments,
  as brass stays durable and corrosion-resistant without pitting. If buildup is stubborn, adjust the scan speed slower to
  clear contaminants fully, so the finish looks polished and even afterward. Watch for any color shifts, though—they usually
  fade with a quick follow-up.
