description: >-
  When laser cleaning brass, you'll want to start with a lower pulse frequency because it reflects light so well, which
  means you avoid overheating the surface right away. We've found that gentle passes work best on fittings or
  instruments, as brass stays durable and corrosion-resistant without pitting. If buildup is stubborn, adjust the scan
  speed slower to clear contaminants fully, so the finish looks polished and even afterward. Watch for any color shifts,
  though—they usually fade with a quick follow-up.
