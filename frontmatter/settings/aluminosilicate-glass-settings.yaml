machineSettings:
  wavelength:
    value: 1064
    unit: nm
    description: Near-IR for transparent material cleaning
    min: 355
    max: 10640
  spotSize:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: Smaller spots (50-200 μm) for fine detail cleaning, larger (200-500 μm) for area coverage. 200 μm recommended
      for uniform treatment on flat glass surfaces without hotspots (equipment specs from Coherent Inc. laser systems).
  energyDensity:
    min: 0.1
    max: 20.0
    value: 2
    unit: J/cm²
    description: Fluence below glass damage threshold (~10 J/cm² at 1064 nm for ns pulses); 0.5-2 J/cm² for light contaminants,
      up to 5 for heavy. Recommended 2 J/cm² for safe ablation of surface layers (ablation studies in Journal of Applied Physics,
      2017).
  pulseWidth:
    min: 0.1
    max: 1000
    unit: ns
    value: 20
    description: Nanosecond regime preferred for cost-effective cleaning with minimal HAZ; picosecond (ps) or femtosecond
      for ultra-precision but higher cost. 20 ns recommended to limit thermal diffusion in low-conductivity glass (Laser &
      Particle Beams journal, 2015).
  scanSpeed:
    min: 10
    max: 5000
    value: 1500
    unit: mm/s
    description: Effective for contaminant removal without excessive heat buildup; slower (500-1000 mm/s) for heavy contamination,
      faster (2000-3000 mm/s) for light. Recommended 1500 mm/s for balance on aluminosilicate glass (industry standards from
      Laserax equipment manuals).
  passCount:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: Single pass for light contamination; multi-pass (2-5) for stubborn residues. 2 passes typical for complete
      removal on aluminosilicate glass to minimize risk (industry case studies in Laser Cleaning Handbook, SPIE, 2019).
  overlapRatio:
    min: 10
    max: 90
    value: 60
    unit: '%'
    description: Ensures uniform coverage without gaps or overexposure; 30-50% for speed, 60-80% for thoroughness. 60% recommended
      for even cleaning on smooth glass (process optimization in Optics Express, 2016).
  laserPower:
    value: 70
    unit: W
    description: Controlled power for glass cleaning
    min: 1.0
    max: 120
  laserPowerAlternative:
    min: 20
    max: 500
    value: 100
    unit: W
    description: Typical range for delicate glass substrates to avoid thermal damage; starting at 100W for initial tests on
      light contaminants. Max safe below 500W to prevent cracking (based on IPG Photonics specs for fiber lasers and studies
      in Optics and Lasers in Engineering, 2018).
  frequency:
    min: 1
    max: 200
    value: 50
    unit: kHz
    description: Balances cleaning speed and heat accumulation; higher rates (>50 kHz) risk substrate heating in reflective
      glass. 50 kHz optimal for aluminosilicate to avoid cumulative damage (academic literature in Applied Surface Science,
      2020).
componentSummary: These settings employ moderate power and short nanosecond pulses at 1064 nm to selectively ablate contaminants
  from aluminosilicate glass while minimizing thermal stress and preventing surface cracking.
