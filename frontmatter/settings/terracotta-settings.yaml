  power:
    min: 20
    max: 200
    value: 50
    unit: W
    description: 'Typical range for delicate ceramics like terracotta to avoid thermal damage; starting at 50W for light contamination
      removal. Max safe ~200W to prevent cracking. Source: Studies on Nd:YAG laser cleaning of archaeological ceramics (e.g.,
      Verges-Belmin et al., 2008, J. Cult. Herit.).'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 1500
    description: 'Effective speeds balance cleaning efficiency and heat input; slower for heavy contamination (500-1000 mm/s),
      faster for light (2000-3000 mm/s). Recommended 1500 mm/s for uniform terracotta surface preparation. Source: Industry
      manuals from IPG Photonics and Laserax equipment guidelines.'
  pulse_width:
    min: 0.1
    max: 1000
    value: 15
    unit: ns
    description: 'Nanosecond regime preferred for terracotta to minimize heat-affected zone (HAZ) while ablating contaminants;
      picosecond (ps) or femtosecond (fs) for ultra-precision but less common industrially. 15 ns optimal for low thermal
      conductivity materials. Source: Laser ablation research (e.g., Anisimov et al., 2015, Appl. Phys. A).'
  repetition_rate:
    min: 1
    max: 200
    value: 20
    unit: kHz
    description: 'Typical for 1064 nm cleaning to achieve good overlap without excessive heat buildup; higher rates speed
      up process but risk accumulation on porous terracotta. 20 kHz balances speed and safety. Source: Academic literature
      on pulsed laser cleaning (e.g., Pouli et al., 2010, Spectrochim. Acta B).'
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.0
    unit: J/cm²
    description: 'Fluence range for contaminant ablation without substrate damage; terracotta damage threshold ~2-4 J/cm²
      due to low melting point (~1000-1200°C). Recommended 1 J/cm² for safe industrial cleaning. Source: Ablation threshold
      studies on ceramics (e.g., Marla et al., 2012, J. Appl. Phys.).'
  spot_size:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Smaller spots for fine detail on terracotta artifacts, larger for broad industrial areas; 200 μm recommended
      for balanced resolution and coverage on uneven surfaces. Source: Equipment specs from Coherent and Trumpf laser systems.'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light soiling, multi-pass for heavy contamination; 2 passes typical for complete terracotta
      cleaning without overexposure. Source: Case studies in cultural heritage laser cleaning (e.g., Radvan et al., 2007,
      Lasers in the Conservation of Artworks).'
  overlap_ratio:
