description: >-
  When laser cleaning Tungsten, you'll want to start with a low-power setup to handle its high reflectivity, which
  scatters much of the beam and slows contaminant removal. Make sure you use short pulses and slow scan speeds, because
  this dense, heat-resistant material absorbs energy unevenly—watch out for surface pitting if you ramp up too fast.
  Adjust overlap to cover spots fully, and finish with multiple passes to clear buildup without weakening the tough
  structure.
