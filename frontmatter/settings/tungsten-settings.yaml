machineSettings:
  powerRange:
    description: Optimal average power for Tungsten oxide and contaminant removal
    unit: W
    value: 100
    min: 1.0
    max: 120
  wavelength:
    description: Near-IR wavelength optimized for Tungsten absorption and thermal processing
    unit: nm
    value: 1064
    min: 355
    max: 10640
  spotSize:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Typical beam diameter for precise industrial cleaning; 200 μm recommended for Tungsten to focus energy on
      contaminants while covering large areas efficiently. Smaller for fine details, larger for broad prep. Source: Equipment
      specs from Coherent and Trumpf laser cleaning systems.'
  repetitionRate:
    min: 1
    max: 200
    value: 30
    unit: kHz
    description: 'Standard for pulsed 1064 nm lasers in cleaning; 30 kHz recommended for Tungsten to achieve fast processing
      while limiting heat accumulation from its reflectivity. Higher rates increase speed but risk thermal buildup. Source:
      Academic literature, e.g., Appl. Surf. Sci. (2020) on repetition rate optimization for refractory metals.'
  fluenceThreshold:
    description: Minimum fluence required for effective Tungsten oxide removal
    unit: J/cm²
    value: 2.5
    min: 0.3
    max: 4.5
  pulseWidth:
    min: 0.1
    max: 1000
    unit: ns
    value: 50
    description: 'Nanosecond regime typical for industrial cleaning to ablate contaminants without deep penetration; 50 ns
      recommended for minimal heat-affected zone (HAZ) on Tungsten due to its high thermal conductivity. Picosecond (ps) or
      femtosecond (fs) for ultra-precision but less common industrially. Source: Laser physics research in Opt. Express (2015)
      on pulse duration effects in metal ablation.'
  scanSpeed:
    min: 10
    max: 5000
    value: 2000
    unit: mm/s
    description: 'Effective range for contamination removal on high-conductivity metals like Tungsten; 2000 mm/s recommended
      for optimal balance of cleaning rate and fluence control. Slower for heavy contamination (e.g., oxides), faster for
      light surface prep. Source: Industry standards from Laserax and Adapt Laser Systems manuals.'
  passCount:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Usually 1-3 passes for complete removal on metals; 2 passes recommended for Tungsten to ensure uniform cleaning
      of stubborn contaminants like tungsten oxides without overexposure. Multi-pass preferred over single high-fluence pass
      to minimize damage. Source: Industry case studies in laser cleaning of fusion components (e.g., J. Nucl. Mater. 2021).'
  overlapRatio:
    min: 10
    max: 90
    value: 50
    unit: '%'
    description: 'Standard for uniform coverage in scanned laser cleaning; 50% recommended for Tungsten to avoid gaps in high-reflectivity
      surfaces while preventing excessive heat overlap. Higher (60-80%) for heavy contamination. Source: Process optimization
      studies in Surf. Coat. Technol. (2019).'
  power:
    min: 50
    max: 2000
    value: 200
    unit: W
    description: 'Typical range for industrial 1064 nm fiber lasers used in metal cleaning; starting at 200 W balances efficiency
      and safety for reflective Tungsten to avoid excessive reflection losses. Max safe below substrate melting threshold
      (~3422°C). Source: IPG Photonics YLR series specs and studies on laser cleaning of refractory metals (e.g., J. Laser
      Appl. 2018).'
  energyDensity:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Fluence range for contaminant ablation on Tungsten; damage threshold ~2-4 J/cm² at 1064 nm due to high reflectivity
      (~60%). 1.5 J/cm² recommended for safe oxide/carbon removal without substrate damage. Source: Ablation threshold studies
      in J. Phys. D: Appl. Phys. (2017) and fusion reactor cleaning papers (e.g., Nucl. Fusion 2019).'
componentSummary: These settings leverage 1064 nm wavelength for strong Tungsten absorption, with 200 W power and 10 ns pulses
  to ablate contaminants efficiently without excessive heat buildup in the high-melting-point material.
