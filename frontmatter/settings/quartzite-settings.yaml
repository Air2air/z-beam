description: >-
  When laser cleaning Quartzite, the biggest challenge is its extreme hardness. This tough stone resists contaminants
  well, but it demands careful energy control to avoid surface cracks. I've seen setups where rushed power ramps cause
  micro-fractures, so start slow with gentle pulses. Its low porosity helps—dirt doesn't sink deep, making removal
  straightforward once you dial in. Unlike softer stones, Quartzite holds heat unevenly, so keep passes light and
  spaced. This works best when you focus on steady scanning without overlap buildup. Tends to shine up nicely after a
  few rounds. Just watch the edges at the end; overdoing dwell time there can lead to unwanted chipping, so ease off
  power gradually.
