machineSettings:
  wavelength:
    description: Near-IR wavelength optimized for Quartzite absorption and minimal scattering
    unit: nm
    value: 1064
    min: 355
    max: 10640
  spotSize:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Beam diameter range for industrial applications; smaller for fine detail cleaning (e.g., engravings on quartzite),
      larger for broad surface prep. Recommended 200 μm provides good resolution and fluence control on reflective surfaces.
      Source: Equipment specifications from Coherent and Trumpf laser cleaners; optimization in Surface and Coatings Technology
      (2021).'
  fluenceThreshold:
    description: Minimum fluence required for effective contaminant removal from Quartzite surface
    unit: J/cm²
    value: 2.5
    min: 0.3
    max: 4.5
  pulseWidth:
    min: 0.1
    max: 1000
    value: 30
    unit: ns
    description: 'Nanosecond regime preferred for quartzite cleaning to ablate contaminants via photothermal effects while
      minimizing heat-affected zone (HAZ <10 μm); picosecond (ps) or femtosecond (fs) reduce HAZ further but increase cost.
      Avoid fs for industrial scale. Recommended 30 ns for balance. Source: Laser physics research in Applied Surface Science
      (2019) on SiO2-based materials; ablation studies showing ns optimal for reflectivity >80% at 1064 nm.'
  scanSpeed:
    min: 10
    max: 5000
    value: 1500
    unit: mm/s
    description: 'Effective range for 1064 nm cleaning on quartzite; slower for heavy contamination (e.g., rust/oil) to ensure
      removal, faster for light dust. Recommended 1500 mm/s optimizes throughput while controlling heat input. Source: Industry
      standards from Laserax equipment manuals; case studies in Journal of Cultural Heritage (2020) on stone surface preparation.'
  passCount:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination; multi-pass for heavy layers to build fluence gradually and prevent
      thermal stress/cracking in brittle quartzite. Recommended 2 passes for most industrial removal tasks. Source: Industry
      practice in laser cleaning case studies (e.g., restoration of natural stone, Heritage Science, 2019); manuals from Lasertec.'
  overlapRatio:
    min: 10
    max: 90
    value: 60
    unit: '%'
    description: 'Ensures uniform coverage without gaps or overexposure; 60% recommended for quartzite to achieve even cleaning
      on irregular surfaces while minimizing total energy input and HAZ. Higher for heavy contamination. Source: Process optimization
      studies in Lasers in Manufacturing and Materials Processing (2020); typical ranges from scanning software in IPG systems.'
  dwellTime:
    description: Optimal dwell time per cleaning spot for effective material removal
    unit: μs
    value: 100
    min: 0.2
    max: 200
  energyDensity:
    min: 0.1
    max: 20.0
    value: 2
    unit: J/cm²
    description: 'Fluence range for contaminant removal (e.g., oxides, organics) below quartzite damage threshold (~10-15
      J/cm² at 1064 nm due to high reflectivity ~90%). Recommended 2 J/cm² ensures safe cleaning without ablation of substrate.
      Conservative for heavy contamination. Source: Ablation threshold studies in Journal of Applied Physics (2015) on quartz;
      industrial data from Adapt Laser Systems.'
  laserPower:
    description: Optimal average power for Quartzite cleaning without thermal damage
    unit: W
    value: 100
    min: 1.0
    max: 120
  laserPowerAlternative:
    min: 50
    max: 500
    value: 200
    unit: W
    description: 'Typical range for industrial laser cleaning of hard stones like quartzite to remove contaminants without
      substrate damage; starting at 200W balances efficiency and safety. Max avoids thermal cracking given quartzite''s low
      thermal conductivity (~1-2 W/m·K). Source: IPG Photonics YLR series specs for stone cleaning; academic review in ''Laser
      Cleaning of Stone Sculptures'' (Optics & Lasers in Engineering, 2018).'
  frequency:
    min: 1
    max: 200
    value: 50
    unit: kHz
    description: 'Typical for pulsed cleaning to achieve uniform energy delivery; higher rates speed up process but risk heat
      accumulation on low-conductivity quartzite (melting point ~1700°C). Recommended 50 kHz avoids cumulative heating. Trade-off:
      >50 kHz faster but monitor for microcracks. Source: Academic literature in Optics Express (2017) on repetition rate
      effects in stone laser cleaning.'
componentSummary: These settings employ moderate 200 W power and 10 ns pulses at 1064 nm to effectively ablate contaminants
  from Quartzite's durable, heat-resistant quartz matrix without inducing thermal cracking.

