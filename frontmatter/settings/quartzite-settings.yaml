  power:
    min: 50
    max: 500
    value: 200
    unit: W
    description: 'Typical range for industrial laser cleaning of hard stones like quartzite to remove contaminants without
      substrate damage; starting at 200W balances efficiency and safety. Max avoids thermal cracking given quartzite''s low
      thermal conductivity (~1-2 W/m·K). Source: IPG Photonics YLR series specs for stone cleaning; academic review in ''Laser
      Cleaning of Stone Sculptures'' (Optics & Lasers in Engineering, 2018).'
  scan_speed:
    min: 10
    max: 5000
    value: 1500
    unit: mm/s
    description: 'Effective range for 1064 nm cleaning on quartzite; slower for heavy contamination (e.g., rust/oil) to ensure
      removal, faster for light dust. Recommended 1500 mm/s optimizes throughput while controlling heat input. Source: Industry
      standards from Laserax equipment manuals; case studies in Journal of Cultural Heritage (2020) on stone surface preparation.'
  pulse_width:
    min: 0.1
    max: 1000
    value: 30
    unit: ns
    description: 'Nanosecond regime preferred for quartzite cleaning to ablate contaminants via photothermal effects while
      minimizing heat-affected zone (HAZ <10 μm); picosecond (ps) or femtosecond (fs) reduce HAZ further but increase cost.
      Avoid fs for industrial scale. Recommended 30 ns for balance. Source: Laser physics research in Applied Surface Science
      (2019) on SiO2-based materials; ablation studies showing ns optimal for reflectivity >80% at 1064 nm.'
  repetition_rate:
    min: 1
    max: 200
    value: 50
    unit: kHz
    description: 'Typical for pulsed cleaning to achieve uniform energy delivery; higher rates speed up process but risk heat
      accumulation on low-conductivity quartzite (melting point ~1700°C). Recommended 50 kHz avoids cumulative heating. Trade-off:
      >50 kHz faster but monitor for microcracks. Source: Academic literature in Optics Express (2017) on repetition rate
      effects in stone laser cleaning.'
  energy_density:
    min: 0.1
    max: 20.0
    value: 2
    unit: J/cm²
    description: 'Fluence range for contaminant removal (e.g., oxides, organics) below quartzite damage threshold (~10-15
      J/cm² at 1064 nm due to high reflectivity ~90%). Recommended 2 J/cm² ensures safe cleaning without ablation of substrate.
      Conservative for heavy contamination. Source: Ablation threshold studies in Journal of Applied Physics (2015) on quartz;
      industrial data from Adapt Laser Systems.'
  spot_size:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Beam diameter range for industrial applications; smaller for fine detail cleaning (e.g., engravings on quartzite),
      larger for broad surface prep. Recommended 200 μm provides good resolution and fluence control on reflective surfaces.
      Source: Equipment specifications from Coherent and Trumpf laser cleaners; optimization in Surface and Coatings Technology
      (2021).'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination; multi-pass for heavy layers to build fluence gradually and prevent
      thermal stress/cracking in brittle quartzite. Recommended 2 passes for most industrial removal tasks. Source: Industry
      practice in laser cleaning case studies (e.g., restoration of natural stone, Heritage Science, 2019); manuals from Lasertec.'
  overlap_ratio:
    min: 10
    max: 90
    value: 60
    unit: '%'
    description: 'Ensures uniform coverage without gaps or overexposure; 60% recommended for quartzite to achieve even cleaning
      on irregular surfaces while minimizing total energy input and HAZ. Higher for heavy contamination. Source: Process optimization
      studies in Lasers in Manufacturing and Materials Processing (2020); typical ranges from scanning software in IPG systems.'
challenges:
  thermal_management:
  - challenge: Thermal shock and microcracking
    severity: critical
    threshold_temperature: ΔT > 50-150°C rapid cooling (stone-dependent)
    impact: Natural stone contains microfissures that propagate under thermal stress
    solutions:
    - Use pulse mode with 8-12 second cooling between passes
    - Reduce power by 40-50% for weathered or damaged stone
    - Preheat substrate if possible to reduce thermal gradients
    - Granite more resistant than marble; sandstone most vulnerable
    - Monitor for surface crazing; stop immediately if cracks appear
  - challenge: Moisture-induced spalling
    severity: high
    threshold_temperature: Steam formation >100°C with trapped moisture
    impact: Porous stone traps moisture that explosively converts to steam
    solutions:
    - Test moisture content before cleaning (>3% requires drying)
    - Allow 48-72 hours drying after rain before laser cleaning
    - Reduce power by 50% for damp stone
    - Use pulse mode with extended cooling (15-20 seconds)
    - Heritage stone requires especially gentle approach
  surface_characteristics:
  - challenge: Weathering and surface degradation
    severity: high
    impact: Aged stone has weaker surface layer more susceptible to damage
    solutions:
    - Reduce power 40-60% for weathered stone vs fresh stone
    - Test on inconspicuous area first
    - Multiple gentle passes (4-6 at 40-60W) preferred
    - Monitor for powdering or flaking; adjust power immediately
    - Heritage conservation requires documentation and testing
  - challenge: Mineral composition heterogeneity
    severity: medium
    impact: Mixed minerals have different absorption and damage thresholds
    solutions:
    - Use moderate power (60-80W) suitable for both light and dark minerals
    - Crosshatch scan pattern for uniform coverage
    - Avoid dwelling on dark minerals (feldspar, mica) which absorb more energy
    - Quartzite and marble more homogeneous than granite
  contamination_challenges:
  - challenge: Biological growth and deep staining
    severity: medium
    porosity_range: 0.5-25% (sandstone highly porous)
    impact: Algae, lichen, and pollution penetrate deep into porous structure
    solutions:
    - First pass 80W fast (1200 mm/s) for surface growth
    - Second pass 60W slow (700 mm/s) for roots and stains
    - Third pass 40W very slow (400 mm/s) for deep staining
    - Chemical biocide pre-treatment kills roots and reduces laser exposure
    - Dense stones (granite, marble) clean in 1-2 passes vs 3-4 for porous stones
description: When laser cleaning Quartzite, the biggest challenge is its extreme hardness. This tough stone resists contaminants
  well, but it demands careful energy control to avoid surface cracks. I've seen setups where rushed power ramps cause micro-fractures,
  so start slow with gentle pulses. Its low porosity helps—dirt doesn't sink deep, making removal straightforward once you
  dial in. Unlike softer stones, Quartzite holds heat unevenly, so keep passes light and spaced. This works best when you
  focus on steady scanning without overlap buildup. Tends to shine up nicely after a few rounds. Just watch the edges at the
  end; overdoing dwell time there can lead to unwanted chipping, so ease off power gradually.
