  power:
    min: 20
    max: 500
    unit: W
    value: 100
    description: 'Typical range for industrial Nd:YAG lasers cleaning delicate optics like fused silica to avoid thermal damage;
      starting at 100 W for light contamination removal. Max safe below substrate ablation threshold (~10 J/cm² fluence limit).
      Source: Manufacturer specs from IPG Photonics YLR series and academic review in Optics Express (2018) on laser cleaning
      of silica optics.'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 1500
    description: 'Effective speeds balance cleaning efficiency and heat input; slower for heavy contamination (500-1000 mm/s),
      faster for light (2000-3000 mm/s). Recommended 1500 mm/s for uniform removal on fused silica. Source: Industry standards
      from Laser Cleaning Association guidelines and case studies in Journal of Applied Physics (2020).'
  pulse_width:
    min: 0.1
    max: 1000
    unit: ns
    description: 'Nanosecond regime preferred for cost-effective cleaning; picosecond (ps) or femtosecond (fs) for ultra-minimal
      HAZ but higher cost. Typical 10-30 ns for fused silica to limit thermal diffusion given low thermal conductivity (~1.4
      W/m·K). Recommended 20 ns. Source: Laser physics research in Applied Surface Science (2019) on pulse duration effects
      for dielectric materials.'
  repetition_rate:
    min: 1
    max: 200
    unit: kHz
    value: 50
    description: 'Typical 20-80 kHz for cleaning; higher rates speed up process but risk heat accumulation on low-conductivity
      fused silica (melting point ~1700°C). Recommended 50 kHz balances speed and safety. Source: Academic literature in Optics
      and Lasers in Engineering (2021) discussing trade-offs in pulsed laser cleaning.'
  energy_density:
    min: 0.1
    max: 20.0
    unit: J/cm²
    value: 2
    description: 'Fluence range for contaminant ablation without exceeding fused silica damage threshold (~12-15 J/cm² at
      1064 nm, ns pulses). Recommended 2 J/cm² for safe cleaning of organics/metals. Source: Ablation threshold studies in
      Journal of Laser Applications (2017) and SPIE proceedings on optical material cleaning.'
  spot_size:
    min: 0.1
    max: 500
    unit: μm
    description: 'Smaller spots (50-200 μm) for fine detail/precision on fused silica surfaces; larger (200-500 μm) for broad
      area prep. Recommended 200 μm for balanced resolution and efficiency at 1064 nm (high reflectivity ~4% for silica).
      Source: Equipment specifications from Coherent and Trumpf laser systems manuals.'
  pass_count:
    min: 1
    max: 10
    unit: passes
    value: 2
    description: 'Single pass for light contamination; multi-pass (2-3) for heavy layers to build fluence gradually without
      damage. Recommended 2 passes for fused silica industrial cleaning. Source: Industry practice in case studies from Surface
      and Coatings Technology (2022) on iterative laser processing.'
  overlap_ratio:
    min: 10
    max: 90
    unit: '%'
    value: 60
    description: 'Ensures uniform coverage; 50-70% typical for even energy distribution on transparent/low-absorbing fused
      silica. Recommended 60% to minimize gaps while avoiding overexposure. Source: Process optimization studies in Lasers
      in Manufacturing and Materials Processing (2020).'
challenges:
  thermal_management:
  - challenge: Thermal shock and catastrophic failure
    severity: critical
    threshold_temperature: ΔT > 40-100°C rapid cooling (glass-dependent)
    impact: Glass shatters from thermal gradients due to low thermal expansion and brittleness
    solutions:
    - Use pulse mode with 5-8 second cooling between passes
    - Preheat substrate to room temperature before cleaning
    - Avoid cold spots (air vents, cold backing) during processing
    - Tempered glass more resistant but still susceptible to thermal shock
    - Monitor for stress fractures; stop immediately if cracks appear
  - challenge: Low thermal diffusivity
    severity: high
    property_value: 0.01-15 mm²/s (most glasses 0.5-1.0 mm²/s)
    impact: Heat accumulates in localized zones creating thermal gradients
    solutions:
    - Reduce power by 30-40% compared to metals
    - Increase scan speed to distribute heat (1000-2000 mm/s)
    - Use defocused beam to spread energy over larger area
    - Optical-grade glass (fused silica) tolerates higher power
  surface_characteristics:
  - challenge: Surface defects and stress concentrators
    severity: high
    impact: Scratches, chips, and inclusions dramatically lower damage threshold
    solutions:
    - Inspect surface with magnification before cleaning
    - Reduce power 40-50% for scratched or damaged glass
    - Clean around defects with extreme caution
    - Polished optical glass requires different parameters than rough architectural glass
  - challenge: Coating and film removal
    severity: medium
    impact: Thin films, anti-reflective coatings, and tints have different damage thresholds than substrate
    solutions:
    - Test on edge first to determine coating removal threshold
    - Coated glass may require 40-60W initial pass
    - Bare glass requires 20-30% lower power after coating removal
    - AR coatings very sensitive - use 30-40W maximum
  contamination_challenges:
  - challenge: Adhesive and paint removal
    severity: medium
    impact: Thick coatings require multiple passes and generate debris that can scratch glass
    solutions:
    - First pass 60W fast (1800 mm/s) for bulk removal
    - Second pass 40W slow (1000 mm/s) for residue
    - Use air assist to blow debris away from surface
    - Chemical pre-treatment reduces laser exposure time
    - Avoid dragging ablated material across clean areas
description: When laser cleaning fused silica, the biggest challenge is its low absorption of laser energy. This makes the
  process slower since the beam tends to pass through the material with minimal interaction. I've seen that pulsing at moderate
  rates removes surface contaminants effectively without overheating. Multiple gentle passes reveal the underlying clarity.
  Adjust scan speeds to avoid thermal buildup, which can lead to cracking.
