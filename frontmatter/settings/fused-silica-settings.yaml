description: >-
  When laser cleaning fused silica, the biggest challenge is its low absorption of laser energy. This makes the process
  slower since the beam tends to pass through the material with minimal interaction. I've seen that pulsing at moderate
  rates removes surface contaminants effectively without overheating. Multiple gentle passes reveal the underlying
  clarity. Adjust scan speeds to avoid thermal buildup, which can lead to cracking.
