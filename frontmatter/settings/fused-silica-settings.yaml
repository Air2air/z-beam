machineSettings:
  wavelength:
    description: Near-IR wavelength providing optimal absorption balance for Fused Silica contamination removal
    unit: nm
    value: 1064
    min: 355
    max: 10640
  spotSize:
    min: 0.1
    max: 500
    unit: μm
    description: 'Smaller spots (50-200 μm) for fine detail/precision on fused silica surfaces; larger (200-500 μm) for broad
      area prep. Recommended 200 μm for balanced resolution and efficiency at 1064 nm (high reflectivity ~4% for silica).
      Source: Equipment specifications from Coherent and Trumpf laser systems manuals.'
    value: 250
  fluenceThreshold:
    description: Critical fluence threshold for effective contaminant removal without Fused Silica damage
    unit: J/cm²
    value: 2.5
    min: 0.3
    max: 4.5
  pulseWidth:
    min: 0.1
    max: 1000
    unit: ns
    description: 'Nanosecond regime preferred for cost-effective cleaning; picosecond (ps) or femtosecond (fs) for ultra-minimal
      HAZ but higher cost. Typical 10-30 ns for fused silica to limit thermal diffusion given low thermal conductivity (~1.4
      W/m·K). Recommended 20 ns. Source: Laser physics research in Applied Surface Science (2019) on pulse duration effects
      for dielectric materials.'
    value: 500
  scanSpeed:
    min: 10
    max: 5000
    unit: mm/s
    value: 1500
    description: 'Effective speeds balance cleaning efficiency and heat input; slower for heavy contamination (500-1000 mm/s),
      faster for light (2000-3000 mm/s). Recommended 1500 mm/s for uniform removal on fused silica. Source: Industry standards
      from Laser Cleaning Association guidelines and case studies in Journal of Applied Physics (2020).'
  passCount:
    min: 1
    max: 10
    unit: passes
    value: 2
    description: 'Single pass for light contamination; multi-pass (2-3) for heavy layers to build fluence gradually without
      damage. Recommended 2 passes for fused silica industrial cleaning. Source: Industry practice in case studies from Surface
      and Coatings Technology (2022) on iterative laser processing.'
  overlapRatio:
    min: 10
    max: 90
    unit: '%'
    value: 60
    description: 'Ensures uniform coverage; 50-70% typical for even energy distribution on transparent/low-absorbing fused
      silica. Recommended 60% to minimize gaps while avoiding overexposure. Source: Process optimization studies in Lasers
      in Manufacturing and Materials Processing (2020).'
  energyDensity:
    min: 0.1
    max: 20.0
    unit: J/cm²
    value: 2
    description: 'Fluence range for contaminant ablation without exceeding fused silica damage threshold (~12-15 J/cm² at
      1064 nm, ns pulses). Recommended 2 J/cm² for safe cleaning of organics/metals. Source: Ablation threshold studies in
      Journal of Laser Applications (2017) and SPIE proceedings on optical material cleaning.'
  laserPower:
    description: Optimal average power range for Fused Silica surface cleaning without thermal damage
    unit: W
    value: 100
    min: 1.0
    max: 120
  laserPowerAlternative:
    min: 20
    max: 500
    unit: W
    value: 100
    description: 'Typical range for industrial Nd:YAG lasers cleaning delicate optics like fused silica to avoid thermal damage;
      starting at 100 W for light contamination removal. Max safe below substrate ablation threshold (~10 J/cm² fluence limit).
      Source: Manufacturer specs from IPG Photonics YLR series and academic review in Optics Express (2018) on laser cleaning
      of silica optics.'
  frequency:
    min: 1
    max: 200
    unit: kHz
    value: 50
    description: 'Typical 20-80 kHz for cleaning; higher rates speed up process but risk heat accumulation on low-conductivity
      fused silica (melting point ~1700°C). Recommended 50 kHz balances speed and safety. Source: Academic literature in Optics
      and Lasers in Engineering (2021) discussing trade-offs in pulsed laser cleaning.'
componentSummary: These settings—100 W power, 1064 nm wavelength, and 10 ns pulse width—suit Fused Silica by enabling contaminant
  ablation with minimal thermal damage to its fragile, low-conductivity structure.
