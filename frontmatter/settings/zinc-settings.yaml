  power:
    min: 50
    max: 500
    value: 150
    unit: W
    description: 'Typical range for industrial 1064 nm fiber lasers cleaning reflective metals like zinc to avoid excessive
      heat buildup; starting at 150 W balances efficiency and safety. Max limited to prevent melting (zinc MP ~419°C). Source:
      CleanLaser and IPG Photonics equipment specs for metal surface preparation.'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 1500
    description: 'Range ensures effective contaminant removal without substrate ablation; slower for heavy contamination (e.g.,
      oils), faster for light rust. Recommended 1500 mm/s for optimal zinc cleaning to minimize thermal effects due to high
      reflectivity. Source: Industry standards from Laserax and academic reviews in J. Laser Appl. (2018).'
  pulse_width:
    min: 0.1
    max: 1000
    unit: ns
    value: 50
    description: 'Nanosecond regime preferred for cost-effective industrial cleaning of zinc; shorter pulses (ps/fs) reduce
      HAZ but are less common at 1064 nm. 50 ns recommended for minimal heat diffusion in zinc''s high thermal conductivity
      (~116 W/mK). Source: Laser physics studies in Opt. Express (2015) on metal ablation thresholds.'
  repetition_rate:
    min: 1
    max: 200
    unit: kHz
    value: 50
    description: 'Typical for pulsed fiber lasers; higher rates speed up cleaning but increase heat accumulation on reflective
      zinc, risking damage. 50 kHz balances speed and safety. Source: Academic literature in Appl. Surf. Sci. (2020) on pulse
      train effects for metal cleaning.'
  energy_density:
    min: 0.1
    max: 20.0
    unit: J/cm²
    description: 'Fluence range for contaminant ablation without zinc damage; threshold ~2.5 J/cm² due to high reflectivity
      at 1064 nm. Recommended 1.5 J/cm² for safe removal of oxides/contaminants. Conservative to account for zinc''s low melting
      point. Source: Ablation threshold studies in J. Phys. D: Appl. Phys. (2017).'
    value: 10.05
  spot_size:
    min: 0.1
    max: 500
    unit: μm
    value: 200
    description: 'Smaller spots for precision on zinc details, larger for broad areas; 200 μm recommended for uniform energy
      distribution and reduced peak fluence on reflective surfaces. Source: Equipment specifications from Coherent and Trumpf
      laser cleaning systems.'
  pass_count:
    min: 1
    max: 10
    unit: passes
    value: 2
    description: 'Single pass for light contamination, multi-pass for heavy layers; 2 passes recommended for zinc to ensure
      complete removal without cumulative heating. Source: Industry case studies in Surf. Coat. Technol. (2019) on multi-pass
      laser cleaning of metals.'
  overlap_ratio:
    min: 10
    max: 90
    unit: '%'
    value: 60
    description: 'Ensures uniform coverage without gaps or overexposure; 60% optimal for zinc to prevent uneven heating on
      large areas. Source: Process optimization in Laser Technol. J. (2021), typical for industrial scanning parameters.'
challenges:
  thermal_management:
  - challenge: High thermal conductivity and heat spread
    severity: medium
    property_value: 4-400 W/(m·K) depending on metal
    impact: Heat spreads rapidly causing large heat-affected zones
    solutions:
    - Use shorter pulse durations (picosecond/femtosecond) for localized heating
    - Increase scan speed to minimize dwell time
    - Apply cooling between passes for thick sections
  - challenge: Melting and heat-affected zone formation
    severity: high
    threshold_range: 660°C (Al) to 3422°C (W)
    impact: Substrate melting or microstructural changes in heat-affected zone
    solutions:
    - Stay below 70% of melting temperature
    - Use pulse mode with adequate cooling time
    - Monitor for surface discoloration indicating oxidation
  surface_characteristics:
  - challenge: High reflectivity
    severity: high
    reflectivity_range: 60-95% at 1064nm for polished metals
    impact: Most laser energy reflected, requiring higher power; safety hazard
    solutions:
    - Use shorter wavelengths (355nm UV) for better absorption
    - Increase power density but monitor for thermal damage
    - Ensure proper beam containment and safety measures
    - Surface oxidation/roughness improves absorption
  - challenge: Surface finish variations
    severity: medium
    impact: Polished surfaces reflect more, rough surfaces absorb better
    solutions:
    - Adjust power based on surface condition
    - Test parameters on similar finish samples
    - Polished surfaces need 20-40% more power
  contamination_challenges:
  - challenge: Rust and oxide layer removal
    severity: medium
    impact: Requires multiple passes; rust/oxide has different absorption than base metal
    solutions:
    - First pass at higher power (100-120W) to remove bulk oxide
    - Second pass at lower power (60-80W) for final cleaning
    - Monitor for base metal exposure to avoid over-processing
  - challenge: Oil and grease removal
    severity: low
    impact: Organic contaminants vaporize easily but can redeposit
    solutions:
    - Use fume extraction to prevent redeposition
    - Higher scan speeds (3000-5000 mm/s) for thin films
    - Chemical pre-cleaning for heavy contamination
description: We've found zinc cleans up nicely with laser settings. It reflects a lot of light, so we start low on power to
  avoid scattering energy. This keeps the surface cool and removes grime without melting. But watch the heat buildup mid-process—it
  spreads fast because zinc conducts well. Adjust overlap to stay safe, and you'll get a smooth finish every time.
