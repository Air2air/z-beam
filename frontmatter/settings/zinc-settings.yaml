  power:
    min: 50
    max: 500
    value: 150
    unit: W
    description: 'Typical range for industrial 1064 nm fiber lasers cleaning reflective
      metals like zinc to avoid excessive heat buildup; starting at 150 W balances
      efficiency and safety. Max limited to prevent melting (zinc MP ~419°C). Source:
      CleanLaser and IPG Photonics equipment specs for metal surface preparation.'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 1500
    description: 'Range ensures effective contaminant removal without substrate ablation;
      slower for heavy contamination (e.g., oils), faster for light rust. Recommended
      1500 mm/s for optimal zinc cleaning to minimize thermal effects due to high
      reflectivity. Source: Industry standards from Laserax and academic reviews in
      J. Laser Appl. (2018).'
  pulse_width:
    min: 0.1
    max: 1000
    unit: ns
    value: 50
    description: 'Nanosecond regime preferred for cost-effective industrial cleaning
      of zinc; shorter pulses (ps/fs) reduce HAZ but are less common at 1064 nm. 50
      ns recommended for minimal heat diffusion in zinc''s high thermal conductivity
      (~116 W/mK). Source: Laser physics studies in Opt. Express (2015) on metal ablation
      thresholds.'
  repetition_rate:
    min: 1
    max: 200
    unit: kHz
    value: 50
    description: 'Typical for pulsed fiber lasers; higher rates speed up cleaning
      but increase heat accumulation on reflective zinc, risking damage. 50 kHz balances
      speed and safety. Source: Academic literature in Appl. Surf. Sci. (2020) on
      pulse train effects for metal cleaning.'
  energy_density:
    min: 0.1
    max: 20.0
    unit: J/cm²
    description: 'Fluence range for contaminant ablation without zinc damage; threshold
      ~2.5 J/cm² due to high reflectivity at 1064 nm. Recommended 1.5 J/cm² for safe
      removal of oxides/contaminants. Conservative to account for zinc''s low melting
      point. Source: Ablation threshold studies in J. Phys. D: Appl. Phys. (2017).'
    value: 10.05
  spot_size:
    min: 0.1
    max: 500
    unit: μm
    value: 200
    description: 'Smaller spots for precision on zinc details, larger for broad areas;
      200 μm recommended for uniform energy distribution and reduced peak fluence
      on reflective surfaces. Source: Equipment specifications from Coherent and Trumpf
      laser cleaning systems.'
  pass_count:
    min: 1
    max: 10
    unit: passes
    value: 2
    description: 'Single pass for light contamination, multi-pass for heavy layers;
      2 passes recommended for zinc to ensure complete removal without cumulative
      heating. Source: Industry case studies in Surf. Coat. Technol. (2019) on multi-pass
      laser cleaning of metals.'
  overlap_ratio:
    min: 10
    max: 90
    unit: '%'
    value: 60
    description: 'Ensures uniform coverage without gaps or overexposure; 60% optimal
      for zinc to prevent uneven heating on large areas. Source: Process optimization
      in Laser Technol. J. (2021), typical for industrial scanning parameters.'
pageDescription: We've found zinc cleans up nicely with laser settings. It reflects
  a lot of light, so we start low on power to avoid scattering energy. This keeps
  the surface cool and removes grime without melting. But watch the heat buildup mid-process—it
  spreads fast because zinc conducts well. Adjust overlap to stay safe, and you'll
  get a smooth finish every time.
