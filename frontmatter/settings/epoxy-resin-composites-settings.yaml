  power:
    min: 50
    max: 500
    value: 100
    unit: W
    description: 'Typical range for 1064 nm Nd:YAG lasers in polymer composite cleaning to balance ablation efficiency and
      heat input; starting at 100 W minimizes thermal damage to epoxy matrix. Max safe ~300 W to avoid delamination (based
      on thermal conductivity ~0.2-0.5 W/mK). Source: Studies in Optics and Lasers in Engineering (2018) on laser ablation
      of CFRP; IPG Photonics YLR series specs.'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 2000
    description: 'Effective speeds ensure fluence delivery without excessive dwell time; 2000 mm/s optimal for light contamination
      on epoxy composites to prevent charring. Slower (500-1000 mm/s) for heavy contaminants. Source: Industry guidelines
      from Laserax equipment manuals; case studies in Journal of Cleaner Production (2020) for surface prep on composites.'
  pulse_width:
    min: 0.1
    max: 1000
    unit: ns
    value: 20
    description: 'Nanosecond regime preferred over ps/fs for cost-effective cleaning of polymers; 20 ns minimizes heat-affected
      zone (HAZ) in low-reflectivity epoxy (~5-10% at 1064 nm). Ps/fs (<1 ns) for ultra-precise but higher cost. Source: Laser
      physics research in Applied Surface Science (2019) on pulse duration effects in composite ablation.'
  repetition_rate:
    min: 1
    max: 200
    unit: kHz
    value: 30
    description: '20-50 kHz balances cleaning speed and heat accumulation in epoxy (melting point ~150-200°C); higher rates
      (>50 kHz) risk thermal buildup leading to matrix degradation. Source: Academic literature in Proceedings of SPIE (2021)
      on pulsed laser cleaning of polymer composites; trade-offs noted in manufacturer data from Coherent Inc.'
  energy_density:
    min: 0.1
    max: 20.0
    unit: J/cm²
    description: 'Fluence range for contaminant removal without substrate ablation; damage threshold for epoxy composites
      ~1.5-2.5 J/cm² at 1064 nm. Recommended <1.0 J/cm² for safe cleaning. Conservative due to variable fiber content. Source:
      Ablation threshold studies in Composites Part B (2017); Optics Express (2022).'
  spot_size:
    min: 0.1
    max: 500
    unit: μm
    description: 'Beam diameters for uniform coverage; 200-300 μm recommended for epoxy composites to achieve fine control
      over ablation on heterogeneous surfaces (e.g., carbon fiber reinforced). Smaller for detail work, larger for broad areas.
      Source: Equipment specs from Adapt Laser Systems; process optimization in Industrial Laser Solutions (2020).'
  pass_count:
    min: 1
    max: 10
    unit: passes
    description: 'Multi-pass (2-5) typical for layered contaminants on epoxy without single-pass overheating; 3 passes recommended
      for complete removal while preserving composite integrity. Single pass viable for light prep. Source: Industry case
      studies in Journal of Materials Processing Technology (2019); practical guidelines from laser cleaning service providers.'
  overlap_ratio:
    min: 10
    max: 90
    unit: '%'
    description: '50-70% ensures uniform fluence distribution and avoids gaps/striping on irregular composite surfaces; 60%
      recommended for epoxy to optimize coverage without excessive energy overlap causing damage. Source: Process optimization
      studies in Lasers in Manufacturing and Materials Processing (2021); standards from ISO 11553 on laser safety.'
challenges:
  thermal_management:
  - challenge: Matrix degradation and delamination
    severity: critical
    threshold_temperature: Polymer matrix 150-350°C, ceramic matrix >1000°C
    impact: Heat causes matrix decomposition, fiber-matrix debonding, and layer separation
    solutions:
    - Use pulse mode with 5-10 second cooling for polymer-matrix composites
    - Reduce power by 40-50% compared to monolithic materials
    - Monitor for discoloration, bubbling, or layer lifting
    - Ceramic and metal-matrix composites tolerate higher power
  - challenge: Anisotropic thermal properties
    severity: high
    property_value: 10-100x variation parallel vs perpendicular to fibers
    impact: Heat conducts rapidly along fibers but poorly across layers
    solutions:
    - Scan parallel to fiber direction for best heat dissipation
    - Use crosshatch pattern (0° and 90°) to identify fiber orientation
    - Increase cooling time 2-3x when scanning perpendicular to fibers
    - Carbon fiber composites require special attention due to electrical conductivity
  surface_characteristics:
  - challenge: Fiber exposure and damage
    severity: high
    impact: Aggressive cleaning exposes or damages reinforcing fibers
    solutions:
    - Use low energy density (0.5-2 J/cm²) to protect matrix
    - Multiple gentle passes preferred over single aggressive pass
    - Stop immediately if fibers become visible
    - Fiber-rich surfaces (woven cloth) more sensitive than particle-filled
  - challenge: Surface finish variability
    severity: medium
    impact: Gel coat, paint, or protective layers alter absorption and damage threshold
    solutions:
    - Test on edge or hidden area first
    - Coated surfaces may require 50-100W initial pass for coating removal
    - Bare composite requires 30-50% lower power
    - Adjust parameters when transitioning between coated and uncoated areas
  contamination_challenges:
  - challenge: Resin-based contaminant removal
    severity: medium
    impact: Adhesives, sealants, and coatings chemically bond to matrix
    solutions:
    - First pass 80W fast (1500 mm/s) for bulk removal
    - Second pass 50W slow (800 mm/s) for residue
    - Chemical pre-treatment improves results for stubborn adhesives
    - Monitor for matrix damage; stop if surface texture changes
description: I've seen epoxy resin composites behave differently from plain metals during laser cleaning, mainly because their
  fiber-reinforced structure absorbs energy more readily without reflecting it away. This helps remove contaminants efficiently,
  as the matrix holds up well under controlled heat, preventing quick degradation that you'd get with softer plastics. So,
  approach it by starting with gentler passes to leverage that absorption for clean results. Just watch out for localized
  overheating at the end, which can cause delamination if you push too hard.
