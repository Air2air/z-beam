description: >-
  I've seen epoxy resin composites behave differently from plain metals during laser cleaning, mainly because their
  fiber-reinforced structure absorbs energy more readily without reflecting it away. This helps remove contaminants
  efficiently, as the matrix holds up well under controlled heat, preventing quick degradation that you'd get with
  softer plastics. So, approach it by starting with gentler passes to leverage that absorption for clean results. Just
  watch out for localized overheating at the end, which can cause delamination if you push too hard.
