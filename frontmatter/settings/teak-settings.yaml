  power:
    min: 50
    max: 300
    unit: W
    value: 100
    description: Typical range for industrial Nd:YAG lasers cleaning organic contaminants from wood; starting at 100 W balances
      efficiency and safety to avoid charring Teak's low thermal conductivity surface (e.g., manufacturer specs from IPG Photonics
      and studies in Optics and Lasers in Engineering, 2018). Maximum limited to prevent substrate damage.
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 2000
    description: Effective speeds for 1064 nm cleaning of wood; recommended 2000 mm/s for optimal contaminant removal without
      excessive heat buildup on Teak; lower for heavy contamination (500-1000 mm/s), higher for light (3000-5000 mm/s) per
      industry standards (e.g., Laserax equipment manuals and Journal of Applied Physics, 2020).
  pulse_width:
    min: 0.1
    max: 1000
    unit: ns
    value: 20
    description: Nanosecond regime preferred for Teak to minimize heat-affected zone (HAZ) while ablating contaminants; picosecond
      (ps) or femtosecond (fs) reduce thermal damage further but are costlier; 20 ns typical for wood cleaning (e.g., laser
      physics research in Applied Surface Science, 2019). Avoid fs for industrial scale due to complexity.
  repetition_rate:
    min: 1
    max: 200
    unit: kHz
    value: 50
    description: Common for pulsed laser cleaning of organics; 50 kHz recommended for Teak to achieve fast cleaning with controlled
      heat accumulation; higher rates (>80 kHz) speed up process but risk thermal buildup on low-conductivity wood (e.g.,
      academic literature in Lasers in Engineering, 2021).
  energy_density:
    min: 0.1
    max: 20.0
    unit: J/cm²
    value: 2
    description: Fluence range for safe ablation of contaminants from wood; Teak damage threshold ~3-5 J/cm² at 1064 nm due
      to reflectivity and charring risk; 2 J/cm² recommended for effective cleaning without substrate harm (e.g., ablation
      threshold studies in Journal of Laser Applications, 2017). Conservative for Teak's properties.
  spot_size:
    min: 0.1
    max: 500
    unit: μm
    value: 500
    description: Beam diameter for uniform cleaning; 500 μm recommended for Teak surface preparation, balancing fine detail
      (smaller spots for precision) and large-area efficiency (larger for broad coverage); per equipment specs (e.g., Coherent
      Inc. lasers and industry standards).
  pass_count:
    min: 1
    max: 10
    unit: passes
    value: 2
    description: Typically 1-3 passes for light contaminants, up to 5 for heavy; 2 passes recommended for complete Teak cleaning
      to ensure removal without overexposure; multi-pass preferred over single for uniform results (e.g., industry case studies
      in Wood Science and Technology, 2022).
  overlap_ratio:
    min: 10
    max: 90
    unit: '%'
    value: 50
    description: Ensures uniform coverage in scan patterns; 50% recommended for Teak to avoid gaps or over-etching while minimizing
      processing time; 30-50% for large areas, 60-80% for detailed work (e.g., process optimization in Optics Express, 2016).
challenges:
  thermal_management:
  - challenge: Charring and carbonization
    severity: high
    threshold_temperature: 250-300°C
    impact: Wood chars at low temperatures leaving black marks and structural damage
    solutions:
    - Use pulse mode with 2-5 second cooling between passes
    - Reduce power by 30-40% compared to metals
    - Increase scan speed to reduce dwell time
    - Monitor surface for discoloration; stop if browning occurs
  - challenge: Slow thermal diffusivity
    severity: medium
    property_value: 0.10-0.15 mm²/s (100x slower than aluminum)
    impact: Heat accumulates rapidly causing thermal damage zones
    solutions:
    - Increase cooling time between passes
    - Use lower repetition rates (<20 kHz)
    - Apply crosshatch patterns to distribute heat
  surface_characteristics:
  - challenge: Grain direction sensitivity
    severity: medium
    variation: 20-40% absorption variation by grain orientation
    impact: Laser absorption varies significantly with grain direction
    solutions:
    - Scan parallel to grain for consistent results
    - Use crosshatch pattern (0° and 90°) for uniform cleaning
    - Test on scrap to determine optimal scan direction
  - challenge: Porous structure with deep contamination
    severity: medium
    porosity_range: 12-65% (softwoods highest)
    impact: Contaminants penetrate deep into wood structure
    solutions:
    - Multiple passes with progressive power increase
    - Reduce scan speed for deeper penetration (600 mm/s)
    - Chemical pre-treatment for deep-seated contamination
  contamination_challenges:
  - challenge: Varnish and coating removal
    severity: medium
    impact: Thick coatings require multiple passes and generate smoke/fumes
    solutions:
    - First pass 80W fast (1500 mm/s) for bulk removal
    - Second pass 60W slow (800 mm/s) for residue
    - Use fume extraction to prevent redeposition
    - Limit to 2-3 passes maximum to avoid substrate damage
description: When laser cleaning teak, you'll want to start by focusing on its distinctive oil-rich structure, which sets
  it apart from drier hardwoods like oak by enhancing laser absorption without rapid heat buildup. This property allows the
  process to remove surface contaminants effectively while preserving the wood's natural grain and color. Make sure you maintain
  a steady, controlled scan to avoid uneven charring, as teak's moderate density can lead to localized overheating if speeds
  vary. Compared to softer woods, teak restores well under gentle passes that expose underlying layers cleanly, reducing the
  risk of splintering. Adjust dwell times longer than for less absorbent materials to ensure thorough cleaning without compromising
  its inherent durability.
