  machine_settings:
    powerRange:
      description: Optimal average power for Teak surface cleaning without charring
      unit: W
      value: 45
    wavelength:
      description: Near-IR wavelength for optimal absorption in Teak lignin and contaminants
      unit: nm
      value: 1064
    spotSize:
      description: Beam spot diameter for precise cleaning resolution
      unit: μm
      value: 80
    repetitionRate:
      description: Optimal repetition rate for efficient cleaning with thermal management
      unit: kHz
      value: 50
    energyDensity:
      description: Fluence threshold for effective contaminant removal without wood
        damage
      unit: J/cm²
      value: 2.8
    pulseWidth:
      description: Nanosecond pulse duration for controlled ablation of surface contaminants
      unit: ns
      value: 12
    scanSpeed:
      description: Optimal scanning speed for uniform cleaning coverage
      unit: mm/s
      value: 500
    passCount:
      description: Recommended number of passes for complete surface cleaning
      unit: passes
      value: 2
    overlapRatio:
      description: Optimal beam overlap for uniform cleaning pattern
      unit: '%'
      value: 40
    dwellTime:
      description: Effective dwell time per cleaning spot
      unit: μs
      value: 120
  challenges:
    thermal_management:
    - challenge: Charring and carbonization
      severity: high
      threshold_temperature: 250-300°C
      impact: Wood chars at low temperatures leaving black marks and structural damage
      solutions:
      - Use pulse mode with 2-5 second cooling between passes
      - Reduce power by 30-40% compared to metals
      - Increase scan speed to reduce dwell time
      - Monitor surface for discoloration; stop if browning occurs
    - challenge: Slow thermal diffusivity
      severity: medium
      property_value: 0.10-0.15 mm²/s (100x slower than aluminum)
      impact: Heat accumulates rapidly causing thermal damage zones
      solutions:
      - Increase cooling time between passes
      - Use lower repetition rates (<20 kHz)
      - Apply crosshatch patterns to distribute heat
    surface_characteristics:
    - challenge: Grain direction sensitivity
      severity: medium
      variation: 20-40% absorption variation by grain orientation
      impact: Laser absorption varies significantly with grain direction
      solutions:
      - Scan parallel to grain for consistent results
      - Use crosshatch pattern (0° and 90°) for uniform cleaning
      - Test on scrap to determine optimal scan direction
    - challenge: Porous structure with deep contamination
      severity: medium
      porosity_range: 12-65% (softwoods highest)
      impact: Contaminants penetrate deep into wood structure
      solutions:
      - Multiple passes with progressive power increase
      - Reduce scan speed for deeper penetration (600 mm/s)
      - Chemical pre-treatment for deep-seated contamination
    contamination_challenges:
    - challenge: Varnish and coating removal
      severity: medium
      impact: Thick coatings require multiple passes and generate smoke/fumes
      solutions:
      - First pass 80W fast (1500 mm/s) for bulk removal
      - Second pass 60W slow (800 mm/s) for residue
      - Use fume extraction to prevent redeposition
      - Limit to 2-3 passes maximum to avoid substrate damage
  settings_description: When laser cleaning teak, you'll want to start by focusing
    on its distinctive oil-rich structure, which sets it apart from drier hardwoods
    like oak by enhancing laser absorption without rapid heat buildup. This property
    allows the process to remove surface contaminants effectively while preserving
    the wood's natural grain and color. Make sure you maintain a steady, controlled
    scan to avoid uneven charring, as teak's moderate density can lead to localized
    overheating if speeds vary. Compared to softer woods, teak restores well under
    gentle passes that expose underlying layers cleanly, reducing the risk of splintering.
    Adjust dwell times longer than for less absorbent materials to ensure thorough
    cleaning without compromising its inherent durability.
