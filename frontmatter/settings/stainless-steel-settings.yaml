  power:
    min: 50
    max: 1000
    value: 200
    unit: W
    description: 'Typical range for 1064 nm fiber lasers in industrial cleaning of stainless steel to remove contaminants
      without melting; starting at 200 W for balanced efficiency and safety. Max limited to avoid thermal damage given SS
      reflectivity (~60% at 1064 nm). Source: IPG Photonics YLR series specs and study in Optics and Lasers in Engineering
      (2018).'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 2000
    description: 'Effective range for contamination removal; slower (500-1500 mm/s) for heavy rust/oil, faster (2000-5000
      mm/s) for light oxides. Recommended 2000 mm/s for optimal balance on SS to minimize heat input. Source: Industry standards
      from Laserax manuals and Journal of Cleaner Production (2020) case studies.'
  pulse_width:
    min: 0.1
    max: 1000
    value: 50
    unit: ns
    description: 'Nanosecond regime typical for cost-effective industrial cleaning of SS; picosecond (0.001-1 ns equivalent)
      or femtosecond for ultra-low HAZ but less common. 50 ns recommended to reduce thermal effects while ablating contaminants.
      Source: Laser physics review in Applied Surface Science (2019), noting minimal HAZ at <100 ns for metals.'
  repetition_rate:
    min: 1
    max: 200
    value: 50
    unit: kHz
    description: 'Standard for pulsed cleaning; higher rates (>100 kHz) speed up process but risk heat accumulation on reflective
      SS. 50 kHz balances speed and thermal management. Source: Academic literature in Lasers in Manufacturing and Materials
      Processing (2021), highlighting trade-offs for stainless steel.'
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Fluence range for safe ablation of contaminants; SS damage threshold ~4 J/cm² for ns pulses at 1064 nm due
      to high thermal conductivity. 1.5 J/cm² recommended for effective cleaning without substrate pitting. Source: Ablation
      threshold studies in Journal of Applied Physics (2017).'
  spot_size:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Beam diameter range for cleaning; smaller (100-200 μm) for precision surface prep, larger (200-500 μm) for
      broad areas. 200 μm recommended for uniform SS cleaning to control fluence. Source: Equipment specs from Coherent and
      Trumpf lasers, per Optics Express (2022).'
  pass_count:
    min: 1
    max: 10
    value: 3
    unit: passes
    description: 'Single pass for light contamination, multi-pass (2-5) for heavy layers to avoid excessive energy per pass
      on heat-sensitive SS. 3 passes recommended for complete removal with minimal distortion. Source: Industry case studies
      in Surface and Coatings Technology (2019).'
  overlap_ratio:
    min: 10
    max: 90
    value: 50
    unit: '%'
    description: 'Ensures uniform coverage without gaps or over-ablation; 50% optimal for SS to achieve even cleaning while
      preventing heat buildup. Source: Process optimization in International Journal of Advanced Manufacturing Technology
      (2020).'
challenges:
  thermal_management:
  - challenge: High thermal conductivity and heat spread
    severity: medium
    property_value: 4-400 W/(m·K) depending on metal
    impact: Heat spreads rapidly causing large heat-affected zones
    solutions:
    - Use shorter pulse durations (picosecond/femtosecond) for localized heating
    - Increase scan speed to minimize dwell time
    - Apply cooling between passes for thick sections
  - challenge: Melting and heat-affected zone formation
    severity: high
    threshold_range: 660°C (Al) to 3422°C (W)
    impact: Substrate melting or microstructural changes in heat-affected zone
    solutions:
    - Stay below 70% of melting temperature
    - Use pulse mode with adequate cooling time
    - Monitor for surface discoloration indicating oxidation
  surface_characteristics:
  - challenge: High reflectivity
    severity: high
    reflectivity_range: 60-95% at 1064nm for polished metals
    impact: Most laser energy reflected, requiring higher power; safety hazard
    solutions:
    - Use shorter wavelengths (355nm UV) for better absorption
    - Increase power density but monitor for thermal damage
    - Ensure proper beam containment and safety measures
    - Surface oxidation/roughness improves absorption
  - challenge: Surface finish variations
    severity: medium
    impact: Polished surfaces reflect more, rough surfaces absorb better
    solutions:
    - Adjust power based on surface condition
    - Test parameters on similar finish samples
    - Polished surfaces need 20-40% more power
  contamination_challenges:
  - challenge: Rust and oxide layer removal
    severity: medium
    impact: Requires multiple passes; rust/oxide has different absorption than base metal
    solutions:
    - First pass at higher power (100-120W) to remove bulk oxide
    - Second pass at lower power (60-80W) for final cleaning
    - Monitor for base metal exposure to avoid over-processing
  - challenge: Oil and grease removal
    severity: low
    impact: Organic contaminants vaporize easily but can redeposit
    solutions:
    - Use fume extraction to prevent redeposition
    - Higher scan speeds (3000-5000 mm/s) for thin films
    - Chemical pre-cleaning for heavy contamination
description: We've found stainless steel cleans smoothly with laser, unlike more brittle carbon steels. Its tough surface
  holds up well under pulses. We start low on power to strip oxides without scratching. Watch out mid-process—too much heat
  dulls that shiny finish. Adjust speed up if buildup resists. This keeps corrosion resistance intact for food or marine jobs.
