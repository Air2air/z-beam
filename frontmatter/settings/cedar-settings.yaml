pageTitle: Cedar Settings
pageDescription: When laser cleaning cedar, we typically begin by selecting a low-power setting to match its soft, porous
  structure. This wood absorbs laser energy readily because of its low reflectivity, which allows contaminants to vaporize
  without much resistance. We've found that starting with a focused spot size helps expose surface layers evenly, reducing
  the risk of uneven cleaning on its lightweight frame. As you proceed, maintain a moderate scan speed to account for cedar's
  poor heat conduction—heat tends to localize and can char the material if you push too fast. In our experience, this calls
  for two passes with significant overlap to restore the wood's natural grain without embedding residues in its open pores.
  Watch out for overexposure in the middle of thicker sections, where porosity traps moisture and amplifies thermal buildup;
  dial back the energy density there to avoid splintering. Overall, these adjustments preserve cedar's flexibility for applications
  like furniture restoration or heritage work.
