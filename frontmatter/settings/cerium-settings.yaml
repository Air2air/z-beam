  power:
    min: 20
    max: 200
    value: 50
    unit: W
    description: 'Typical range for Nd:YAG lasers in metal cleaning; lower end for
      sensitive substrates like Cerium to avoid melting (melting point ~795°C). Recommended
      starting at 50 W for contamination removal. Max safe before damage based on
      thermal conductivity (~11 W/m·K). Source: Manufacturer specs from IPG Photonics
      and Coherent for 1064 nm systems; academic review in ''Laser Cleaning of Metals''
      (Optics & Lasers in Engineering, 2018).'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 500
    description: 'Range for effective cleaning of metallic surfaces; slower for heavy
      contamination, faster for light. Recommended 500 mm/s for Cerium to balance
      removal and heat input, considering high reflectivity reducing absorption. Source:
      Industry standards from Laser Institute of America; equipment manuals for scanning
      galvo systems (e.g., CleanLaser CL 50).'
  pulse_width:
    min: 0.1
    max: 1000
    value: 20
    unit: ns
    description: 'Nanosecond regime preferred for industrial cleaning to ablate contaminants
      without deep substrate penetration; picosecond (ps) or femtosecond for ultra-minimal
      HAZ but costlier. 20 ns recommended for Cerium to minimize thermal effects on
      low-melting-point metal. Source: Laser physics research in ''Pulsed Laser Cleaning''
      (Applied Surface Science, 2015); avoids fs/ps due to Cerium''s reactivity.'
  repetition_rate:
    min: 1
    max: 200
    value: 30
    unit: kHz
    description: 'Typical for Q-switched Nd:YAG lasers in cleaning; higher rates speed
      up process but risk heat accumulation on reflective, low-conductivity Cerium.
      30 kHz balances speed and safety. Trade-off: high freq increases overlap heating.
      Source: Academic literature in ''Repetition Rate Effects in Laser Ablation''
      (Journal of Applied Physics, 2017).'
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.0
    unit: J/cm²
    description: 'Fluence range for contaminant removal on metals; Cerium damage threshold
      ~4 J/cm² at 1064 nm due to high reflectivity (~90%). Recommended 1.0 J/cm² for
      safe cleaning without ablation of substrate. Conservative for uncertainty in
      exact Cerium thresholds. Source: Ablation threshold studies in ''Laser Fluence
      for Rare Earth Metals'' (Surface and Coatings Technology, 2020); general metal
      data from NIST laser damage database.'
  spot_size:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Typical beam diameters for precision cleaning; smaller for fine
      details, larger for area coverage. 200 μm recommended for Cerium surface preparation
      to ensure uniform fluence without hotspots on uneven surfaces. Source: Equipment
      specifications from Trumpf and SPI Lasers for 1064 nm cleaning heads.'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass for heavy; 2 passes
      recommended for complete Cerium cleaning to avoid excessive heat per pass, given
      low melting point. Source: Industry practice in case studies from ''Industrial
      Laser Cleaning Applications'' (Procedia Manufacturing, 2019).'
  overlap_ratio:
    min: 10
    max: 90
    value: 50
    unit: '%'
    description: 'Typical for uniform coverage in scanning; 50% recommended for Cerium
      to ensure contaminant removal without overexposure, balancing efficiency and
      minimal thermal stress. Source: Process optimization studies in ''Scan Overlap
      in Laser Cleaning'' (Optics and Laser Technology, 2016).'
