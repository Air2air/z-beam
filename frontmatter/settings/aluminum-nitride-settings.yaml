  power:
    min: 20
    max: 200
    value: 100
    unit: W
    description: 'Typical range for industrial cleaning of ceramics like AlN to avoid thermal damage; starting at 100 W balances
      efficiency and safety. Max ~200 W before risking substrate ablation. Source: IPG Photonics laser cleaning systems specs
      for delicate materials.'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 2000
    description: 'Effective speeds for contaminant removal on AlN; slower for heavy contamination (500-1000 mm/s), faster
      for light (2000-5000 mm/s). Recommended 2000 mm/s for optimal balance. Source: Industry standards from Laserax equipment
      manuals.'
  pulse_width:
    min: 0.1
    max: 1000
    unit: ns
    value: 20
    description: 'Nanosecond regime preferred for AlN cleaning to minimize heat-affected zone (HAZ) due to high thermal conductivity;
      picosecond (ps) or femtosecond for ultra-precision but less common industrially. 20 ns recommended for low HAZ. Source:
      Laser physics studies in Optics & Laser Technology (e.g., ns pulses for ceramics).'
  repetition_rate:
    min: 1
    max: 200
    unit: kHz
    value: 50
    description: 'Typical for 1064 nm cleaning; 50 kHz recommended for AlN to achieve fast cleaning without excessive heat
      accumulation, trading off speed vs. thermal load. Higher rates (>80 kHz) increase heat on reflective AlN. Source: Academic
      literature in Applied Surface Science on pulse repetition effects.'
  energy_density:
    min: 0.1
    max: 20.0
    unit: J/cm²
    value: 1.5
    description: 'Fluence range for safe contaminant ablation on AlN; damage threshold ~2-3 J/cm² at 1064 nm due to AlN''s
      high melting point and reflectivity. 1.5 J/cm² recommended for cleaning without substrate harm. Source: Ablation threshold
      studies in Journal of Applied Physics for nitrides.'
  spot_size:
    min: 0.1
    max: 500
    unit: μm
    value: 200
    description: 'Beam diameter for uniform cleaning; smaller (50-100 μm) for fine details, larger (200-500 μm) for area prep
      on AlN. 200 μm recommended for industrial surface preparation. Source: Manufacturer specs from Coherent and Trumpf laser
      systems.'
  pass_count:
    min: 1
    max: 10
    unit: passes
    value: 2
    description: 'Single pass for light contamination, multi-pass (2-5) for heavy; 2 passes recommended for complete AlN cleaning
      to ensure uniformity without overexposure. Source: Industry case studies in laser cleaning of ceramics (e.g., SPIE proceedings).'
  overlap_ratio:
    min: 10
    max: 90
    unit: '%'
    value: 60
    description: 'Ensures uniform coverage; 60% recommended for AlN to avoid gaps or overheating, typical range 30-80% based
      on contamination. Source: Process optimization in Journal of Laser Applications.'
component_summary: These settings employ moderate 100 W power and 10 ns pulses at 1064 nm to delicately ablate contaminants
  from Aluminum Nitride, preventing thermal cracking in its brittle ceramic structure.
