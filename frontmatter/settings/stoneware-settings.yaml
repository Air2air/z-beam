      items:
      - id: coating-residue-removal
        category: Contamination
        challenge: Coating and residue removal
        description: Varied absorption characteristics require adaptive approach
        severity: medium
        solutions:
        - Start with medium power and adjust based on response
        - Monitor real-time to prevent substrate damage
        - Use multiple passes with progressively lower power
      - category: Thermal Management
        challenge: Thermal shock and cracking
        description: Ceramics crack catastrophically from rapid temperature changes due to low thermal expansion
        severity: critical
        solutions:
        - Use pulse mode with 3-5 second cooling between passes
        - Gradual power ramping (start 50W, increase 10W per pass)
        - Preheat substrate to reduce thermal gradients
        - Monitor for surface crazing; stop immediately if cracks appear
        threshold: ΔT > 200-300°C rapid cooling
      - category: Thermal Management
        challenge: Variable thermal conductivity
        description: SiC/WC conduct heat well, but alumina/zirconia accumulate heat rapidly
        severity: medium
        solutions:
        - Low conductivity ceramics (alumina, zirconia) require 50% longer cooling
        - High conductivity ceramics (SiC, WC) tolerate higher power
        - Test on scrap to determine cooling requirements
