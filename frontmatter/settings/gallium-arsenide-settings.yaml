description: >-
  When laser cleaning gallium arsenide, watch out for its heat sensitivity right from the start—it tends to decompose
  easily under intense beams, unlike tougher silicon wafers. I've seen this cause surface cracks if you push too hard,
  so begin with gentle pulses to lift contaminants without harming the fragile lattice. This material stands out among
  semiconductors for absorbing energy well, which helps clear residues fast but demands slower scans to spread the heat.
  Adjust to multiple light passes with good overlap, and you'll restore that clean finish for electronics work without
  risking brittleness.
