  power:
    min: 5
    max: 50
    value: 20
    unit: W
    description: 'Typical range for 532 nm pulsed lasers in semiconductor cleaning to avoid thermal damage to GaAs (melting
      point ~1238°C, high reflectivity at green wavelengths). Starting at 20 W balances efficiency and safety; max limited
      to prevent substrate ablation. Source: Studies on laser cleaning of III-V semiconductors (e.g., J. Appl. Phys. 2018
      on GaAs thresholds).'
  scan_speed:
    min: 10
    max: 5000
    value: 500
    unit: mm/s
    description: 'Effective speeds for contamination removal without excessive heat buildup on GaAs; slower for heavy contamination
      (e.g., oxides), faster for light particles. Recommended 500 mm/s for optimal balance in industrial setups. Source: Industry
      manuals from IPG Photonics and Adapt Laser Systems for precision cleaning.'
  pulse_width:
    min: 0.1
    max: 1000
    unit: ps
    value: 10
    description: 'Picosecond regime preferred over nanoseconds (5-100 ns) for GaAs to minimize heat-affected zone due to its
      moderate thermal conductivity (~50 W/m·K); femtoseconds (<1 ps) possible but less common for industrial cleaning. Recommended
      10 ps for precise contaminant ablation. Source: Laser physics research in Opt. Express (2020) on ultrafast cleaning
      of semiconductors.'
  repetition_rate:
    min: 1
    max: 200
    value: 10
    unit: kHz
    description: 'Low to moderate rates for GaAs to limit heat accumulation while enabling fast cleaning; higher rates (>20
      kHz) increase speed but risk thermal damage. Recommended 10 kHz for balanced throughput. Source: Academic literature
      on pulsed laser cleaning (e.g., Appl. Surf. Sci. 2019, trade-offs in semiconductor applications).'
  energy_density:
    min: 0.1
    max: 20.0
    value: 0.5
    unit: J/cm²
    description: 'Fluence below GaAs damage threshold (~1.5 J/cm² at 532 nm) for safe cleaning; typical for removing contaminants
      like particles or oxides. Recommended 0.5 J/cm² to ablate surface layers without substrate harm. Source: Ablation threshold
      studies in Phys. Rev. B (2017) for GaAs at visible wavelengths.'
  spot_size:
    min: 0.1
    max: 500
    value: 100
    unit: μm
    description: 'Small spots for fine detail on GaAs wafers (e.g., surface prep), larger for broad areas; 100 μm balances
      resolution and coverage in industrial cleaning. Source: Equipment specs from Coherent and Trumpf lasers for micro-cleaning
      applications.'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass for heavy layers on GaAs to ensure complete removal without
      overexposure. Recommended 2 passes for uniform results in semiconductor processing. Source: Industry case studies (e.g.,
      SPIE Proc. 2021 on laser cleaning protocols for GaAs devices).'
  overlap_ratio:
    min: 10
    max: 90
    value: 50
    unit: '%'
    description: 'Ensures uniform coverage on GaAs surfaces; 50% optimal for even cleaning without gaps or excessive overlap-induced
      damage. Higher for intricate patterns. Source: Process optimization in J. Laser Appl. (2016), standard for scanned laser
      cleaning.'
component_summary: These settings use moderate 20 W power and 15 ns pulses at 532 nm to gently ablate contaminants from GaAs,
  minimizing thermal damage to its heat-sensitive semiconductor surface.
