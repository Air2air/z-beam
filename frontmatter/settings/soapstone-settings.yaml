  power:
    min: 50
    max: 300
    value: 100
    unit: W
    description: 'Typical range for industrial cleaning of soft stones like soapstone to avoid thermal damage; starting at
      100 W for controlled ablation. Max limited by soapstone''s low thermal conductivity (~0.2 W/mK) to prevent cracking.
      Source: General Nd:YAG laser specs from manufacturers like IPG Photonics and academic reviews on stone conservation
      (e.g., J. Cult. Herit. 2018).'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 1000
    description: 'Slower speeds for effective contaminant removal on delicate soapstone surfaces; range adjusts for light
      (faster) vs. heavy contamination. Recommended 1000 mm/s balances efficiency and safety. Source: Industry standards from
      laser cleaning equipment manuals (e.g., Adapt Laser Systems) and process optimization studies.'
  pulse_width:
    min: 0.1
    max: 1000
    value: 20
    unit: ns
    description: 'Nanosecond regime preferred for 1064 nm cleaning of minerals to minimize heat-affected zone (HAZ); picosecond/femtosecond
      for ultra-precision but less common industrially. 20 ns recommended for soapstone''s low melting point (~1300°C) to
      reduce thermal diffusion. Source: Laser physics research in Opt. Lasers Eng. (2015) on ablation thresholds.'
  repetition_rate:
    min: 1
    max: 200
    value: 50
    unit: kHz
    description: 'Mid-range frequencies for efficient cleaning without excessive heat buildup on low-conductivity soapstone;
      higher rates speed up process but risk accumulation. 50 kHz balances speed and safety. Source: Academic literature on
      pulsed laser cleaning (e.g., Appl. Surf. Sci. 2019).'
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Fluence below soapstone''s ablation threshold (~4-5 J/cm² estimated for talc-based minerals) for safe contaminant
      removal; conservative range due to variable reflectivity at 1064 nm. Recommended 1.5 J/cm² for effective cleaning without
      substrate damage. Source: Ablation threshold studies in J. Appl. Phys. (2017) on silicate rocks; uncertainty noted for
      exact soapstone composition.'
  spot_size:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Smaller spots for precise cleaning on soapstone''s textured surface; range for fine detail (smaller) vs.
      large areas. 200 μm recommended for uniform coverage without overheating. Source: Equipment specifications from laser
      cleaning systems (e.g., CleanLaser CL series).'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Multi-pass for thorough removal of contaminants on porous soapstone; single pass for light dirt, up to 5
      for heavy. Recommended 2 passes to ensure complete cleaning while minimizing exposure. Source: Industry case studies
      on stone restoration (e.g., Restaurators 2020).'
  overlap_ratio:
    min: 10
    max: 90
    value: 70
    unit: '%'
    description: 'Higher overlap ensures uniform coverage on irregular soapstone surfaces; 50-80% typical for even energy
      distribution. 70% recommended to avoid gaps without excessive passes. Source: Process optimization studies in laser
      scanning (e.g., Precis. Eng. 2016).'
challenges:
  thermal_management:
  - challenge: Thermal shock and microcracking
    severity: critical
    threshold_temperature: ΔT > 50-150°C rapid cooling (stone-dependent)
    impact: Natural stone contains microfissures that propagate under thermal stress
    solutions:
    - Use pulse mode with 8-12 second cooling between passes
    - Reduce power by 40-50% for weathered or damaged stone
    - Preheat substrate if possible to reduce thermal gradients
    - Granite more resistant than marble; sandstone most vulnerable
    - Monitor for surface crazing; stop immediately if cracks appear
  - challenge: Moisture-induced spalling
    severity: high
    threshold_temperature: Steam formation >100°C with trapped moisture
    impact: Porous stone traps moisture that explosively converts to steam
    solutions:
    - Test moisture content before cleaning (>3% requires drying)
    - Allow 48-72 hours drying after rain before laser cleaning
    - Reduce power by 50% for damp stone
    - Use pulse mode with extended cooling (15-20 seconds)
    - Heritage stone requires especially gentle approach
  surface_characteristics:
  - challenge: Weathering and surface degradation
    severity: high
    impact: Aged stone has weaker surface layer more susceptible to damage
    solutions:
    - Reduce power 40-60% for weathered stone vs fresh stone
    - Test on inconspicuous area first
    - Multiple gentle passes (4-6 at 40-60W) preferred
    - Monitor for powdering or flaking; adjust power immediately
    - Heritage conservation requires documentation and testing
  - challenge: Mineral composition heterogeneity
    severity: medium
    impact: Mixed minerals have different absorption and damage thresholds
    solutions:
    - Use moderate power (60-80W) suitable for both light and dark minerals
    - Crosshatch scan pattern for uniform coverage
    - Avoid dwelling on dark minerals (feldspar, mica) which absorb more energy
    - Quartzite and marble more homogeneous than granite
  contamination_challenges:
  - challenge: Biological growth and deep staining
    severity: medium
    porosity_range: 0.5-25% (sandstone highly porous)
    impact: Algae, lichen, and pollution penetrate deep into porous structure
    solutions:
    - First pass 80W fast (1200 mm/s) for surface growth
    - Second pass 60W slow (700 mm/s) for roots and stains
    - Third pass 40W very slow (400 mm/s) for deep staining
    - Chemical biocide pre-treatment kills roots and reduces laser exposure
    - Dense stones (granite, marble) clean in 1-2 passes vs 3-4 for porous stones
description: When cleaning Soapstone, unlike tougher stones like granite, we find its softness sets it apart right away. That
  talc-rich makeup makes it prone to surface scratching if you're not careful, so start with gentler laser passes to lift
  dirt without gouging the finish. We've seen this low resistance to wear lead to quick contaminant removal, but watch out
  mid-process for any uneven heating that could cause micro-cracks—dial back intensity there. Its steady heat handling keeps
  things stable overall, letting us restore heritage pieces smoothly in just a couple sweeps. In our experience, this approach
  preserves the subtle texture that makes Soapstone ideal for sculptures.
