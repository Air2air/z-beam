page_title: 'Soapstone Settings: Laser Parameters'
page_description: When cleaning Soapstone, unlike tougher stones like granite, we find its softness sets it apart right away.
  That talc-rich makeup makes it prone to surface scratching if you're not careful, so start with gentler laser passes to
  lift dirt without gouging the finish. We've seen this low resistance to wear lead to quick contaminant removal, but watch
  out mid-process for any uneven heating that could cause micro-cracks—dial back intensity there. Its steady heat handling
  keeps things stable overall, letting us restore heritage pieces smoothly in just a couple sweeps. In our experience, this
  approach preserves the subtle texture that makes Soapstone ideal for sculptures.
meta_description: 'Soapstone: removes contamination removal. Industrial-grade parameters. No substrate damage.'
