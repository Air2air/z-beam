  power:
    min: 50
    max: 300
    value: 100
    unit: W
    description: 'Typical range for industrial cleaning of soft stones like soapstone to avoid thermal damage; starting at
      100 W for controlled ablation. Max limited by soapstone''s low thermal conductivity (~0.2 W/mK) to prevent cracking.
      Source: General Nd:YAG laser specs from manufacturers like IPG Photonics and academic reviews on stone conservation
      (e.g., J. Cult. Herit. 2018).'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 1000
    description: 'Slower speeds for effective contaminant removal on delicate soapstone surfaces; range adjusts for light
      (faster) vs. heavy contamination. Recommended 1000 mm/s balances efficiency and safety. Source: Industry standards from
      laser cleaning equipment manuals (e.g., Adapt Laser Systems) and process optimization studies.'
  pulse_width:
    min: 0.1
    max: 1000
    value: 20
    unit: ns
    description: 'Nanosecond regime preferred for 1064 nm cleaning of minerals to minimize heat-affected zone (HAZ); picosecond/femtosecond
      for ultra-precision but less common industrially. 20 ns recommended for soapstone''s low melting point (~1300°C) to
      reduce thermal diffusion. Source: Laser physics research in Opt. Lasers Eng. (2015) on ablation thresholds.'
  repetition_rate:
    min: 1
    max: 200
    value: 50
    unit: kHz
    description: 'Mid-range frequencies for efficient cleaning without excessive heat buildup on low-conductivity soapstone;
      higher rates speed up process but risk accumulation. 50 kHz balances speed and safety. Source: Academic literature on
      pulsed laser cleaning (e.g., Appl. Surf. Sci. 2019).'
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Fluence below soapstone''s ablation threshold (~4-5 J/cm² estimated for talc-based minerals) for safe contaminant
      removal; conservative range due to variable reflectivity at 1064 nm. Recommended 1.5 J/cm² for effective cleaning without
      substrate damage. Source: Ablation threshold studies in J. Appl. Phys. (2017) on silicate rocks; uncertainty noted for
      exact soapstone composition.'
  spot_size:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Smaller spots for precise cleaning on soapstone''s textured surface; range for fine detail (smaller) vs.
      large areas. 200 μm recommended for uniform coverage without overheating. Source: Equipment specifications from laser
      cleaning systems (e.g., CleanLaser CL series).'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Multi-pass for thorough removal of contaminants on porous soapstone; single pass for light dirt, up to 5
      for heavy. Recommended 2 passes to ensure complete cleaning while minimizing exposure. Source: Industry case studies
      on stone restoration (e.g., Restaurators 2020).'
  overlap_ratio:
    min: 10
    max: 90
    value: 70
    unit: '%'
    description: 'Higher overlap ensures uniform coverage on irregular soapstone surfaces; 50-80% typical for even energy
      distribution. 70% recommended to avoid gaps without excessive passes. Source: Process optimization studies in laser
      scanning (e.g., Precis. Eng. 2016).'
component_summary: The 100 W power, 1064 nm wavelength, and 10 ns pulse width settings provide gentle, precise ablation for
  Soapstone, minimizing thermal damage to its soft, talc-rich composition while effectively removing contaminants.
