  power:
    min: 50
    max: 500
    unit: W
    value: 150
    description: 'Typical range for industrial Nd:YAG laser cleaners on reflective metals like Rhodium to balance efficiency
      and avoid thermal damage; recommended starting at 150W for contamination removal. Rhodium''s high reflectivity (~65%
      at 1064 nm) requires higher power than less reflective substrates. Source: IPG Photonics YLR series specs and studies
      on PGM cleaning (e.g., Opt. Lasers Eng. 2018).'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 2000
    description: 'Effective speeds for 1064 nm cleaning of metals; slower for heavy contamination (500-1000 mm/s), faster
      for light (3000-5000 mm/s). Recommended 2000 mm/s for Rhodium to ensure contaminant removal without substrate heating,
      considering its thermal conductivity (150 W/m·K). Source: Industry standards from Laserax equipment manuals and process
      optimization in Surf. Coat. Technol. 2020.'
  pulse_width:
    min: 0.1
    max: 1000
    unit: ns
    value: 20
    description: 'Nanosecond regime preferred for cost-effective cleaning of Rhodium; picosecond (ps) or femtosecond for ultra-minimal
      HAZ but less common industrially. 20 ns recommended to minimize heat-affected zone on high-melting-point Rhodium (1964°C).
      Avoid fs for industrial scale due to complexity. Source: Laser physics research in Appl. Phys. A 2019 on metal ablation
      thresholds.'
  repetition_rate:
    min: 1
    max: 200
    unit: kHz
    value: 50
    description: 'Typical for pulsed cleaning to achieve high throughput; higher rates (50-100 kHz) speed up process but risk
      heat accumulation on reflective Rhodium. 50 kHz balances speed and safety. Trade-off: low freq reduces overlap heating.
      Source: Academic literature on Nd:YAG cleaning (e.g., J. Laser Appl. 2021).'
  energy_density:
    min: 0.1
    max: 20.0
    unit: J/cm²
    value: 1.5
    description: 'Fluence below Rhodium''s ablation threshold (~4-6 J/cm² at 1064 nm due to high reflectivity) for safe contaminant
      removal. Recommended 1.5 J/cm² for light industrial cleaning; higher for heavy contamination risks damage. Conservative
      estimate based on similar PGMs. Source: Ablation threshold studies in Opt. Express 2017 and Appl. Surf. Sci. 2022.'
  spot_size:
    min: 0.1
    max: 500
    unit: μm
    value: 200
    description: 'Smaller spots (50-200 μm) for fine surface preparation on Rhodium; larger (200-500 μm) for broad areas.
      200 μm recommended for uniform cleaning without excessive overlap heating. Suited to Rhodium''s use in plating/electronics.
      Source: Equipment specs from Coherent and Trumpf industrial lasers.'
  pass_count:
    min: 1
    max: 10
    unit: passes
    value: 2
    description: 'Single pass for light contamination; multi-pass (2-5) for heavy or uneven layers on Rhodium. Recommended
      2 passes for complete removal while preserving substrate integrity. Based on industrial practice for precious metals.
      Source: Case studies in Ind. Laser Sol. 2019 and process reports from Adapt Laser Systems.'
  overlap_ratio:
    min: 10
    max: 90
    unit: '%'
    value: 60
    description: 'Ensures uniform coverage without gaps or excessive energy input; 60% recommended for Rhodium to account
      for beam divergence and reflectivity, preventing uneven cleaning. Typical range from process optimization. Source: Studies
      in Laser Ablation and Surf. Eng. (Proc. SPIE 2020).'
challenges:
  thermal_management:
  - challenge: High thermal conductivity and heat spread
    severity: medium
    property_value: 4-400 W/(m·K) depending on metal
    impact: Heat spreads rapidly causing large heat-affected zones
    solutions:
    - Use shorter pulse durations (picosecond/femtosecond) for localized heating
    - Increase scan speed to minimize dwell time
    - Apply cooling between passes for thick sections
  - challenge: Melting and heat-affected zone formation
    severity: high
    threshold_range: 660°C (Al) to 3422°C (W)
    impact: Substrate melting or microstructural changes in heat-affected zone
    solutions:
    - Stay below 70% of melting temperature
    - Use pulse mode with adequate cooling time
    - Monitor for surface discoloration indicating oxidation
  surface_characteristics:
  - challenge: High reflectivity
    severity: high
    reflectivity_range: 60-95% at 1064nm for polished metals
    impact: Most laser energy reflected, requiring higher power; safety hazard
    solutions:
    - Use shorter wavelengths (355nm UV) for better absorption
    - Increase power density but monitor for thermal damage
    - Ensure proper beam containment and safety measures
    - Surface oxidation/roughness improves absorption
  - challenge: Surface finish variations
    severity: medium
    impact: Polished surfaces reflect more, rough surfaces absorb better
    solutions:
    - Adjust power based on surface condition
    - Test parameters on similar finish samples
    - Polished surfaces need 20-40% more power
  contamination_challenges:
  - challenge: Rust and oxide layer removal
    severity: medium
    impact: Requires multiple passes; rust/oxide has different absorption than base metal
    solutions:
    - First pass at higher power (100-120W) to remove bulk oxide
    - Second pass at lower power (60-80W) for final cleaning
    - Monitor for base metal exposure to avoid over-processing
  - challenge: Oil and grease removal
    severity: low
    impact: Organic contaminants vaporize easily but can redeposit
    solutions:
    - Use fume extraction to prevent redeposition
    - Higher scan speeds (3000-5000 mm/s) for thin films
    - Chemical pre-cleaning for heavy contamination
description: When cleaning rhodium, watch its high reflectivity first—it tends to bounce laser energy away, so start with
  lower power to avoid scattering heat unevenly. I've seen this works best by scanning slowly across the surface, which exposes
  contaminants without stressing the dense, heat-resistant layer underneath. Multiple passes restore the shine effectively,
  reducing any risk of uneven ablation.
