pageTitle: Rhodium
pageDescription: When cleaning rhodium, watch its high reflectivity first—it tends to bounce laser energy away, so start with
  lower power to avoid scattering heat unevenly. I've seen this works best by scanning slowly across the surface, which exposes
  contaminants without stressing the dense, heat-resistant layer underneath. Multiple passes restore the shine effectively,
  reducing any risk of uneven ablation.
