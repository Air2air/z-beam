  power:
    min: 10
    max: 200
    value: 50
    unit: W
    description: 'Typical range for polymer cleaning to avoid thermal damage; starting at 50 W for PVC''s low melting point
      (~160°C); max safe ~150 W to prevent substrate melting. Source: IPG Photonics specs for fiber lasers in polymer applications;
      studies in Optics and Lasers in Engineering (2018) on PVC ablation.'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 1000
    description: 'Effective for contamination removal without overheating; slower (500-1000 mm/s) for heavy contamination,
      faster (2000-3000 mm/s) for light; recommended 1000 mm/s balances efficiency and safety for PVC''s poor thermal conductivity.
      Source: Industry standards from Laser Cleaning Europe guidelines; case studies in Journal of Cleaner Production (2020).'
  pulse_width:
    min: 0.1
    max: 1000
    value: 30
    unit: ns
    description: 'Nanosecond regime preferred for industrial cleaning of polymers to minimize heat-affected zone (HAZ); picosecond
      (ps) or femtosecond for ultra-precision but costlier; 30 ns optimal for PVC to enable photothermal ablation without
      excessive melting. Source: Laser physics research in Applied Surface Science (2019) on polymer thresholds; avoids fs/ps
      due to equipment availability.'
  repetition_rate:
    min: 1
    max: 200
    value: 30
    unit: kHz
    description: 'Typical for pulsed cleaning; 20-50 kHz recommended for PVC to achieve fast processing while limiting heat
      accumulation from low reflectivity (~5-10% at 1064 nm); higher rates increase speed but risk thermal buildup. Source:
      Academic literature in Optics Express (2021) on repetition rate effects in polymer laser cleaning.'
  energy_density:
    min: 0.1
    max: 20.0
    value: 0.3
    unit: J/cm²
    description: 'Fluence range for safe ablation of contaminants on polymers; PVC damage threshold ~0.5 J/cm²; recommended
      0.3 J/cm² for cleaning without substrate degradation, considering low thermal conductivity (0.19 W/mK). Source: Ablation
      threshold studies in Journal of Applied Physics (2017) for PVC at 1064 nm.'
  spot_size:
    min: 0.1
    max: 500
    unit: μm
    value: 150
    description: 'Beam diameter for effective coverage; smaller (50-100 μm) for fine details, larger (200-300 μm) for broad
