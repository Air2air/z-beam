  power:
    min: 10
    max: 200
    value: 50
    unit: W
    description: 'Typical range for polymer cleaning to avoid thermal damage; starting at 50 W for PVC''s low melting point
      (~160°C); max safe ~150 W to prevent substrate melting. Source: IPG Photonics specs for fiber lasers in polymer applications;
      studies in Optics and Lasers in Engineering (2018) on PVC ablation.'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 1000
    description: 'Effective for contamination removal without overheating; slower (500-1000 mm/s) for heavy contamination,
      faster (2000-3000 mm/s) for light; recommended 1000 mm/s balances efficiency and safety for PVC''s poor thermal conductivity.
      Source: Industry standards from Laser Cleaning Europe guidelines; case studies in Journal of Cleaner Production (2020).'
  pulse_width:
    min: 0.1
    max: 1000
    value: 30
    unit: ns
    description: 'Nanosecond regime preferred for industrial cleaning of polymers to minimize heat-affected zone (HAZ); picosecond
      (ps) or femtosecond for ultra-precision but costlier; 30 ns optimal for PVC to enable photothermal ablation without
      excessive melting. Source: Laser physics research in Applied Surface Science (2019) on polymer thresholds; avoids fs/ps
      due to equipment availability.'
  repetition_rate:
    min: 1
    max: 200
    value: 30
    unit: kHz
    description: 'Typical for pulsed cleaning; 20-50 kHz recommended for PVC to achieve fast processing while limiting heat
      accumulation from low reflectivity (~5-10% at 1064 nm); higher rates increase speed but risk thermal buildup. Source:
      Academic literature in Optics Express (2021) on repetition rate effects in polymer laser cleaning.'
  energy_density:
    min: 0.1
    max: 20.0
    value: 0.3
    unit: J/cm²
    description: 'Fluence range for safe ablation of contaminants on polymers; PVC damage threshold ~0.5 J/cm²; recommended
      0.3 J/cm² for cleaning without substrate degradation, considering low thermal conductivity (0.19 W/mK). Source: Ablation
      threshold studies in Journal of Applied Physics (2017) for PVC at 1064 nm.'
  spot_size:
    min: 0.1
    max: 500
    unit: μm
    value: 150
    description: 'Beam diameter for effective coverage; smaller (50-100 μm) for fine details, larger (200-300 μm) for broad
      areas; 150 μm recommended for uniform PVC surface preparation without pinpoint damage. Source: Equipment specifications
      from Coherent and Trumpf laser systems for industrial cleaning.'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass (2-4) for heavy; 2 passes recommended for complete PVC cleaning
      to ensure removal without cumulative heat damage. Source: Industry practice in case studies from Surface and Coatings
      Technology (2022); avoids excessive passes due to PVC''s heat sensitivity.'
  overlap_ratio:
    min: 10
    max: 90
    value: 50
    unit: '%'
    description: 'Ensures uniform coverage without gaps or over-ablation; 50% optimal for PVC to prevent uneven heating and
      maintain surface integrity during scanning. Source: Process optimization studies in Lasers in Manufacturing and Materials
      Processing (2020); typical 30-80% range for polymer applications.'
challenges:
  thermal_management:
  - challenge: Low melting/degradation temperatures
    severity: high
    threshold_range: 80-300°C depending on polymer type
    impact: Melting, warping, or chemical degradation at low temperatures
    solutions:
    - Use lowest power settings (20-40W)
    - Fast scan speeds (2000-4000 mm/s)
    - Pulse mode with extended cooling (5-10 seconds between passes)
  - challenge: Outgassing and fume generation
    severity: high
    impact: Toxic fumes, smoke, and potential fire hazard
    solutions:
    - Mandatory fume extraction system
    - Work in well-ventilated areas
    - Monitor for smoke/discoloration
  surface_characteristics:
  - challenge: Variable absorption by color and additives
    severity: medium
    impact: Black plastics absorb 80-90%, white plastics absorb 10-30%
    solutions:
    - Adjust power based on plastic color (dark = lower, light = higher)
    - Test on sample pieces first
  contamination_challenges:
  - challenge: Coating and label removal
    severity: medium
    impact: Adhesives melt and smear rather than ablate cleanly
    solutions:
    - Use UV wavelength (355nm) for better photochemical ablation
    - Multiple gentle passes instead of single high-power pass
description: When laser cleaning polyvinyl chloride, you must watch its low heat tolerance right from the start—it's a thermoplastic
  that softens quickly under intense energy, leading to warping or melting if you're not careful. This makes it different
  from metals, where heat spreads out fast; here, the energy stays localized because it doesn't conduct heat well, so you
  risk damaging the surface before buildup even clears. Start with reduced power to build up gradually, and keep scan speeds
  high to limit exposure time on any spot. You'll find it absorbs laser light readily, which helps remove contaminants efficiently
  without much reflection loss, but always test on a small area first to avoid pitting. For best results, use multiple light
  passes with good overlap, letting it cool between them—this restores the smooth finish on pipes or panels without compromising
  its corrosion resistance or flexibility.
