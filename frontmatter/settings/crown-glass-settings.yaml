pageTitle: Crown Glass Settings
pageDescription: 'We''ve found Crown Glass tricky to clean without cracking. It handles heat poorly compared to sturdier borosilicate
  types. Start low on power to dodge thermal shock.


  This soda-lime glass expands quickly when heated. Heat builds up unevenly since it conducts poorly. We adjust by slowing
  scan speeds and adding overlaps.


  Unlike denser ceramics, its fragility demands gentle pulses. Multiple light passes restore surfaces cleanly. Avoid high
  energy—it warps edges fast.


  In heritage work, this approach preserves details well. We''ve seen it shine in labs too. Just cool between runs to stay
  safe.'
