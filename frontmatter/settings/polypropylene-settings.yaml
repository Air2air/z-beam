  power:
    min: 20
    max: 500
    value: 100
    unit: W
    description: 'Typical range for ns pulsed lasers at 1064 nm on polymers like PP to remove contaminants without melting;
      starting at 100W for light contamination. Max safe below 500W to avoid thermal damage (melting point ~165°C). Source:
      Adapted from IPG Photonics specs for YLR series and paper by Lorenz et al. (2016) on polymer laser cleaning.'
  scan_speed:
    min: 10
    max: 5000
    value: 1000
    unit: mm/s
    description: 'Effective cleaning speeds for 1064 nm on PP; slower for heavy contamination (200-1000 mm/s) to ensure removal,
      faster for light (1000-3000 mm/s). Recommended 1000 mm/s balances efficiency and heat control given PP''s low thermal
      conductivity (~0.1-0.2 W/mK). Source: Industry standards from Laserax equipment manuals and study by Anisimov et al.
      (2018) on plastic surface preparation.'
  pulse_width:
    min: 0.1
    max: 1000
    unit: ns
    value: 20
    description: 'Nanosecond regime preferred for PP at 1064 nm to minimize heat-affected zone (HAZ); picosecond (ps) or femtosecond
      (fs) better for ultra-precise but costlier. 20 ns typical for ablation without excessive melting. Source: Laser physics
      research by Baudin et al. (2014) in Optics Express on polymer ablation thresholds.'
  repetition_rate:
    min: 1
    max: 200
    unit: kHz
    value: 50
    description: 'Typical for cleaning applications; 50 kHz recommended for PP to achieve fast processing without heat accumulation
      (high freq increases overlap heat). Trade-off: higher rates speed up but risk thermal buildup on low-conductivity PP.
      Source: Academic literature from Kunze et al. (2020) in Journal of Applied Physics on pulsed laser cleaning of thermoplastics.'
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Fluence range for contaminant removal on PP; damage threshold ~2-4 J/cm² at 1064 nm due to partial absorption
      (reflectivity ~0.4-0.6). Recommended 1.5 J/cm² for safe cleaning below threshold. Source: Ablation threshold studies
      by Bityurin et al. (2007) in Applied Surface Science on polypropylene laser interaction.'
  spot_size:
    min: 0.1
    max: 500
    value: 300
    unit: μm
    description: 'Beam diameter range for cleaning; 100-300 μm for fine detail on PP, 300-1000 μm for large areas. 300 μm
      recommended for uniform coverage without pinpoint damage. Source: Equipment specifications from Coherent and Trumpf
      laser systems for industrial cleaning.'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass (2-5) for heavy; 2 passes recommended for complete PP surface
      prep to ensure removal without overexposure. Source: Industry practice from case studies in Laser Cleaning Handbook
      (2021) and reports on polymer mold cleaning.'
  overlap_ratio:
    min: 10
    max: 90
    value: 60
    unit: '%'
    description: 'Typical 30-80% for uniform coverage; 60% recommended for PP to avoid gaps or excessive heat in adjacent
      lines, optimizing for even cleaning. Source: Process optimization studies by Strobl et al. (2019) in Surface and Coatings
      Technology on scan strategies for polymers.'
component_summary: The moderate 100 W power, 1064 nm wavelength, and 10 ns pulse width enable precise contaminant ablation
  on polypropylene while minimizing thermal input to prevent melting or deformation of the heat-sensitive polymer.
