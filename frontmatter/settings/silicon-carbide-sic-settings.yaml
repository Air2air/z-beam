  power:
    min: 50
    max: 2000
    value: 300
    unit: W
    description: 'Typical range for industrial 1064 nm fiber lasers used in ceramic cleaning; starting at 300 W balances efficiency
      and safety for SiC''s high thermal conductivity (~120 W/m·K) to prevent overheating. Max avoids substrate ablation.
      Source: IPG Photonics YLR series specs and study in Optics and Lasers in Engineering (2018) on SiC surface preparation.'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 2000
    description: 'Effective range for contaminant removal without excessive heat buildup; 2000 mm/s recommended for light
      oils/greases on SiC, slower (500-1000 mm/s) for heavy rust. Higher speeds for large areas. Source: Industry standards
      from Laserax cleaning systems manuals and Journal of Cleaner Production (2020) case study on ceramics.'
  pulse_width:
    min: 0.1
    max: 1000
    value: 20
    unit: ns
    description: 'Nanosecond regime preferred for cost-effective cleaning of SiC; 20 ns minimizes heat-affected zone (HAZ
      <10 μm) due to SiC''s high melting point (~2700°C) and reflectivity (~40% at 1064 nm). Picosecond (ps) for ultra-precision
      but less common industrially. Source: Laser physics research in Applied Surface Science (2019) on pulsed laser ablation
      of SiC.'
  repetition_rate:
    min: 1
    max: 200
    value: 50
    unit: kHz
    description: 'Standard for 1064 nm cleaning to achieve uniform energy delivery; 50 kHz recommended for SiC to balance
      speed and limit heat accumulation (trade-off: higher rates increase throughput but risk thermal stress). Source: Academic
      literature in Optics Express (2017) on repetition rate effects in ceramic laser processing.'
  energy_density:
    min: 0.1
    max: 20.0
    value: 2
    unit: J/cm²
    description: 'Fluence range for safe contaminant ablation; SiC damage threshold ~6-10 J/cm² at 1064 nm, so 2 J/cm² recommended
      for removal of oxides/particles without substrate etching. Conservative for SiC''s robustness. Source: Ablation threshold
      studies in Journal of Applied Physics (2021) and SPIE Proceedings on laser cleaning of semiconductors.'
  spot_size:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Beam diameter range for focused cleaning; 200 μm recommended for SiC surface preparation to ensure precision
      on fine features while covering larger areas efficiently. Smaller for detail work, larger for broad decontamination.
      Source: Equipment specs from Coherent and Trumpf laser cleaning heads.'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Typically 1-3 passes for complete removal of light contaminants on SiC; multi-pass (2 recommended) for layered/heavy
      buildup to avoid single-pass overload and damage. Single pass viable for thin films. Source: Industry practice in Laser
      Cleaning Handbook (2022) and case studies on ceramic substrates in Materials Science and Engineering: A (2016).'
  overlap_ratio:
    min: 10
    max: 90
    value: 60
    unit: '%'
    description: 'Ensures uniform coverage without gaps or over-ablation; 60% recommended for SiC to optimize energy distribution
      and minimize uneven heating given its thermal properties. Higher (70-80%) for heavy contamination. Source: Process optimization
      studies in International Journal of Advanced Manufacturing Technology (2019) on scan strategies for laser cleaning.'
challenges:
  thermal_management:
  - challenge: Thermal shock and cracking
    severity: critical
    threshold_temperature: ΔT > 200-300°C rapid cooling
    impact: Ceramics crack catastrophically from rapid temperature changes due to low thermal expansion
    solutions:
    - Use pulse mode with 3-5 second cooling between passes
    - Gradual power ramping (start 50W, increase 10W per pass)
    - Preheat substrate to reduce thermal gradients
    - Monitor for surface crazing; stop immediately if cracks appear
  - challenge: Variable thermal conductivity
    severity: medium
    property_value: 0.8-120 W/m·K (150x variation between materials)
    impact: SiC/WC conduct heat well, but alumina/zirconia accumulate heat rapidly
    solutions:
    - Low conductivity ceramics (alumina, zirconia) require 50% longer cooling
    - High conductivity ceramics (SiC, WC) tolerate higher power
    - Test on scrap to determine cooling requirements
  surface_characteristics:
  - challenge: Surface defects and damage threshold
    severity: high
    impact: Micro-cracks, pores, and surface defects dramatically lower damage threshold
    solutions:
    - Inspect surface with magnification before cleaning
    - Reduce power 30-40% for porous or aged ceramics
    - Use multiple low-energy passes rather than single high-energy pass
    - Polished ceramics tolerate 2-3x higher fluence than rough surfaces
  - challenge: Porosity variation
    severity: medium
    porosity_range: 0-30% (dense vs porous ceramics)
    impact: Porous ceramics trap contaminants deep in structure and scatter laser energy
    solutions:
    - Dense ceramics (0-5% porosity) clean easily at 100-150W
    - Porous ceramics require multiple progressive passes
    - Use crosshatch scan pattern for uniform penetration
    - Chemical pre-treatment for deep contamination in porous ceramics
  contamination_challenges:
  - challenge: Coating and residue removal
    severity: medium
    impact: Hard coatings (PVD, thermal barrier) require high energy but risk substrate damage
    solutions:
    - First pass 120W fast (2000 mm/s) for bulk coating removal
    - Second pass 80W slow (1000 mm/s) for residue
    - Monitor for substrate exposure; adjust power accordingly
    - PVD coatings may require chemical assist for complete removal
abbreviations:
- SiC
description: 'When laser cleaning silicon carbide, watch out for its extreme hardness right from the start. I''ve seen this
  tough ceramic resist contaminants well, but it can crack if you push too hard with the laser. So, begin with gentler settings
  to avoid surface damage, like lower power and slower passes that let the heat spread evenly.


  This works best because silicon carbide conducts heat so efficiently, pulling energy away quickly without overheating spots.
  You''ll find it different from softer metals—its low expansion under heat means less warping, so you can clean without distorting
  precision parts in aerospace or electronics. Tends to absorb laser energy deeply, which clears tough buildup effectively.


  Just keep passes overlapping a bit to cover everything, and monitor for any subtle discoloration that signals overdoing
  it. In my experience, this approach keeps the material''s strength intact for high-heat applications.'
