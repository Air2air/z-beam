machineSettings:
  wavelength:
    description: Near-IR wavelength for optimal SiC absorption and minimal substrate damage
    unit: nm
    value: 1064
    min: 355
    max: 10640
  spotSize:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Beam diameter range for focused cleaning; 200 μm recommended for SiC surface preparation to ensure precision
      on fine features while covering larger areas efficiently. Smaller for detail work, larger for broad decontamination.
      Source: Equipment specs from Coherent and Trumpf laser cleaning heads.'
  fluenceThreshold:
    description: Minimum fluence required for effective contaminant removal from SiC surface
    unit: J/cm²
    value: 2.5
    min: 0.3
    max: 4.5
  pulseWidth:
    min: 0.1
    max: 1000
    value: 20
    unit: ns
    description: 'Nanosecond regime preferred for cost-effective cleaning of SiC; 20 ns minimizes heat-affected zone (HAZ
      <10 μm) due to SiC''s high melting point (~2700°C) and reflectivity (~40% at 1064 nm). Picosecond (ps) for ultra-precision
      but less common industrially. Source: Laser physics research in Applied Surface Science (2019) on pulsed laser ablation
      of SiC.'
  scanSpeed:
    min: 10
    max: 5000
    unit: mm/s
    value: 2000
    description: 'Effective range for contaminant removal without excessive heat buildup; 2000 mm/s recommended for light
      oils/greases on SiC, slower (500-1000 mm/s) for heavy rust. Higher speeds for large areas. Source: Industry standards
      from Laserax cleaning systems manuals and Journal of Cleaner Production (2020) case study on ceramics.'
  passCount:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Typically 1-3 passes for complete removal of light contaminants on SiC; multi-pass (2 recommended) for layered/heavy
      buildup to avoid single-pass overload and damage. Single pass viable for thin films. Source: Industry practice in Laser
      Cleaning Handbook (2022) and case studies on ceramic substrates in Materials Science and Engineering: A (2016).'
  overlapRatio:
    min: 10
    max: 90
    value: 60
    unit: '%'
    description: 'Ensures uniform coverage without gaps or over-ablation; 60% recommended for SiC to optimize energy distribution
      and minimize uneven heating given its thermal properties. Higher (70-80%) for heavy contamination. Source: Process optimization
      studies in International Journal of Advanced Manufacturing Technology (2019) on scan strategies for laser cleaning.'
  energyDensity:
    min: 0.1
    max: 20.0
    value: 2
    unit: J/cm²
    description: 'Fluence range for safe contaminant ablation; SiC damage threshold ~6-10 J/cm² at 1064 nm, so 2 J/cm² recommended
      for removal of oxides/particles without substrate etching. Conservative for SiC''s robustness. Source: Ablation threshold
      studies in Journal of Applied Physics (2021) and SPIE Proceedings on laser cleaning of semiconductors.'
  laserPower:
    description: Optimal average power for SiC surface cleaning without thermal damage
    unit: W
    value: 100
    min: 1.0
    max: 120
  laserPowerAlternative:
    min: 50
    max: 2000
    value: 300
    unit: W
    description: 'Typical range for industrial 1064 nm fiber lasers used in ceramic cleaning; starting at 300 W balances efficiency
      and safety for SiC''s high thermal conductivity (~120 W/m·K) to prevent overheating. Max avoids substrate ablation.
      Source: IPG Photonics YLR series specs and study in Optics and Lasers in Engineering (2018) on SiC surface preparation.'
  frequency:
    min: 1
    max: 200
    value: 50
    unit: kHz
    description: 'Standard for 1064 nm cleaning to achieve uniform energy delivery; 50 kHz recommended for SiC to balance
      speed and limit heat accumulation (trade-off: higher rates increase throughput but risk thermal stress). Source: Academic
      literature in Optics Express (2017) on repetition rate effects in ceramic laser processing.'
componentSummary: The 300 W power, 1064 nm wavelength, and 10 ns pulse width settings effectively clean SiC by ablating contaminants
  with minimal thermal damage, leveraging the material's high thermal conductivity and hardness.
