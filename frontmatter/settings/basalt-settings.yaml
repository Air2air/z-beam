  power:
    min: 50
    max: 500
    value: 200
    unit: W
    description: 'Typical range for industrial cleaning of rocks like basalt to remove contaminants without excessive heating;
      starting at 100-200 W to avoid thermal damage. Max limited by basalt''s melting point (~1200-1400°C) and low thermal
      conductivity. Source: Manufacturer specs from IPG Photonics and Coherent for 1064 nm fiber lasers in stone cleaning
      applications; academic paper by S. J. H. Lee et al. (Opt. Lasers Eng., 2016) on rock surface preparation.'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 500
    description: 'Slower speeds (100-500 mm/s) for heavy contamination like rust or coatings on basalt, faster (1000-2000
      mm/s) for light dirt; optimal balances cleaning efficiency and heat accumulation. Source: Industry standards from Laser
      Cleaning Europe guidelines and equipment manuals (e.g., Adapt Laser Systems); case studies in J. Pou et al. (Appl. Surf.
      Sci., 2011) for stone ablation.'
  pulse_width:
    min: 0.1
    max: 1000
    value: 20
    unit: ns
    description: 'Nanosecond regime (5-100 ns) preferred for basalt to achieve ablation with minimal heat-affected zone (HAZ);
      picosecond (ps) or femtosecond reduces HAZ further but increases cost. Recommended ns for industrial scalability and
      basalt''s properties. Source: Laser physics research in A. Nevosad et al. (J. Appl. Phys., 2008) on pulsed laser cleaning
      of geological materials; avoids thermal cracking in low-conductivity basalt.'
  repetition_rate:
    min: 1
    max: 200
    value: 50
    unit: kHz
    description: 'Typical 20-80 kHz for effective contaminant removal; higher rates speed up cleaning but risk heat buildup
      on basalt''s poor thermal dissipation. Trade-off favors moderate rates for uniform results. Source: Academic literature
      including R. N. Raman et al. (Opt. Express, 2010) on repetition rate effects in stone cleaning; manufacturer data from
      Trumpf lasers.'
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Fluence range for safe ablation of contaminants (e.g., oxides) on basalt; damage threshold ~4-5 J/cm² to
      prevent substrate cracking or melting. Conservative for basalt''s high absorption at 1064 nm. Source: Ablation threshold
      studies in M. Autric et al. (Proc. SPIE, 1998) on rock materials; confirmed in industrial reports for 1064 nm cleaning.'
  spot_size:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Smaller spots (100-200 μm) for precise surface preparation on basalt, larger (300-500 μm) for broad area
      cleaning; recommended balances resolution and efficiency for industrial use. Source: Equipment specifications from Raycus
      and SPI Lasers; optimization in F. Léonard et al. (Opt. Lasers Eng., 2015) for heterogeneous surfaces like basalt.'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, 2-3 for heavy layers on basalt to ensure complete removal without over-ablation;
      multi-pass minimizes damage risk. Source: Industry practice from case studies in heritage stone cleaning (adaptable
      to industrial), e.g., EN 17121 standard and reports by the European Laser Cleaning Association; practical trials in
      basalt quarrying applications.'
  overlap_ratio:
    min: 10
    max: 90
    value: 60
    unit: '%'
    description: '30-50% for large areas to speed processing, 60-80% for uniform coverage and contaminant removal on textured
      basalt surfaces; prevents gaps in cleaning. Source: Process optimization studies in P. Pouli et al. (Appl. Phys. A,
      2010) on scan strategies for stones; laser system manuals emphasizing overlap for even fluence distribution.'
challenges:
  thermal_management:
  - challenge: Thermal shock and microcracking
    severity: critical
    threshold_temperature: ΔT > 50-150°C rapid cooling (stone-dependent)
    impact: Natural stone contains microfissures that propagate under thermal stress
    solutions:
    - Use pulse mode with 8-12 second cooling between passes
    - Reduce power by 40-50% for weathered or damaged stone
    - Preheat substrate if possible to reduce thermal gradients
    - Granite more resistant than marble; sandstone most vulnerable
    - Monitor for surface crazing; stop immediately if cracks appear
  - challenge: Moisture-induced spalling
    severity: high
    threshold_temperature: Steam formation >100°C with trapped moisture
    impact: Porous stone traps moisture that explosively converts to steam
    solutions:
    - Test moisture content before cleaning (>3% requires drying)
    - Allow 48-72 hours drying after rain before laser cleaning
    - Reduce power by 50% for damp stone
    - Use pulse mode with extended cooling (15-20 seconds)
    - Heritage stone requires especially gentle approach
  surface_characteristics:
  - challenge: Weathering and surface degradation
    severity: high
    impact: Aged stone has weaker surface layer more susceptible to damage
    solutions:
    - Reduce power 40-60% for weathered stone vs fresh stone
    - Test on inconspicuous area first
    - Multiple gentle passes (4-6 at 40-60W) preferred
    - Monitor for powdering or flaking; adjust power immediately
    - Heritage conservation requires documentation and testing
  - challenge: Mineral composition heterogeneity
    severity: medium
    impact: Mixed minerals have different absorption and damage thresholds
    solutions:
    - Use moderate power (60-80W) suitable for both light and dark minerals
    - Crosshatch scan pattern for uniform coverage
    - Avoid dwelling on dark minerals (feldspar, mica) which absorb more energy
    - Quartzite and marble more homogeneous than granite
  contamination_challenges:
  - challenge: Biological growth and deep staining
    severity: medium
    porosity_range: 0.5-25% (sandstone highly porous)
    impact: Algae, lichen, and pollution penetrate deep into porous structure
    solutions:
    - First pass 80W fast (1200 mm/s) for surface growth
    - Second pass 60W slow (700 mm/s) for roots and stains
    - Third pass 40W very slow (400 mm/s) for deep staining
    - Chemical biocide pre-treatment kills roots and reduces laser exposure
    - Dense stones (granite, marble) clean in 1-2 passes vs 3-4 for porous stones
description: When laser cleaning basalt, it stands out from softer stones like limestone because of its dense, hard nature.
  I've seen this density help absorb laser energy quickly, so contaminants lift off without much residue left behind. That
  makes the process efficient for tough buildup in construction or heritage sites. But watch out mid-way—basalt tends to fracture
  if heat builds unevenly, unlike those porous limestones that just fizz away. This works best when you keep passes steady
  and overlap spots well, solving the brittleness by spreading the energy. In my experience, it preserves the stone's strength
  for marine or aerospace uses, avoiding cracks that could weaken structures later. Just ease into higher intensities gradually
  to handle its heat resistance without surprises.
