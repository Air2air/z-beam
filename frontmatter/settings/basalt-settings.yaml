description: >-
  When laser cleaning basalt, it stands out from softer stones like limestone because of its dense, hard nature. I've
  seen this density help absorb laser energy quickly, so contaminants lift off without much residue left behind. That
  makes the process efficient for tough buildup in construction or heritage sites. But watch out mid-way—basalt tends to
  fracture if heat builds unevenly, unlike those porous limestones that just fizz away. This works best when you keep
  passes steady and overlap spots well, solving the brittleness by spreading the energy. In my experience, it preserves
  the stone's strength for marine or aerospace uses, avoiding cracks that could weaken structures later. Just ease into
  higher intensities gradually to handle its heat resistance without surprises.
