  power:
    min: 50
    max: 500
    value: 100
    unit: W
    description: 'Typical range for industrial cleaning of aluminum to remove contaminants
      without melting; starting at 100W balances efficiency and safety. Max limited
      by aluminum''s high reflectivity and thermal conductivity to avoid substrate
      damage. Source: IPG Photonics YLR series specs and study in Optics and Lasers
      in Engineering (2018) on metal cleaning thresholds.'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 1500
    description: 'Effective speeds for light to heavy contamination on aluminum; slower
      for heavy (e.g., oxide layers), faster for light oils. Recommended 1500 mm/s
      optimizes removal while minimizing heat buildup due to aluminum''s conductivity.
      Source: Industry standards from Laserax equipment manuals and Journal of Cleaner
      Production (2020) case studies.'
  pulse_width:
    min: 0.1
    max: 1000
    value: 50
    unit: ns
    description: 'Nanosecond regime preferred for cost-effective industrial cleaning;
      picosecond (ps) or femtosecond reduces HAZ but increases cost. 50 ns recommended
      for aluminum to ablate contaminants with minimal thermal diffusion. Source:
      Laser physics research in Applied Surface Science (2019) comparing pulse regimes
      for metals.'
  repetition_rate:
    min: 1
    max: 200
    value: 50
    unit: kHz
    description: 'Typical for pulsed fiber lasers at 1064 nm; higher rates speed up
      cleaning but risk heat accumulation on reflective aluminum. 50 kHz balances
      speed and safety. Source: Academic literature in Lasers in Manufacturing and
      Materials Processing (2021) on frequency effects for aluminum surface preparation.'
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Fluence range for contaminant removal; aluminum damage threshold
      ~4-6 J/cm² at 1064 nm ns pulses. Recommended 1.5 J/cm² ensures safe cleaning
      below ablation threshold of substrate. Source: Ablation threshold studies in
      Physical Review B (2017) and Optics Express (2022) for IR laser on aluminum.'
  spot_size:
    min: 0.1
    max: 500
    value: 300
    unit: μm
    description: 'Beam diameter range for uniform coverage; smaller for fine details,
      larger for broad areas. 300 μm recommended for aluminum to achieve even fluence
      distribution without hotspots. Source: Equipment specifications from Coherent
      and Trumpf laser cleaners, with optimization in Surface and Coatings Technology
      (2019).'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass for heavy; aluminum''s
      reflectivity often requires 2 passes for complete removal without damage. Source:
      Industry practice in case studies from Journal of Laser Applications (2020)
      on industrial aluminum cleaning.'
  overlap_ratio:
    min: 10
    max: 90
    value: 70
    unit: '%'
    description: 'Ensures uniform coverage and prevents gaps in cleaning; 70% recommended
      for aluminum to account for beam divergence and material reflectivity. Source:
      Process optimization studies in International Journal of Advanced Manufacturing
      Technology (2018).'
component_summaries:
  machine_settings:
    title: Machine Settings
    description: This table displays recommended ranges for power, pulse width, repetition
      rate, and scan speed, optimized for Aluminum's high reflectivity and low melting
      point to ensure efficient oxide layer removal without subsurface damage. It
      helps you select parameters that minimize laser reflection risks, allowing safe
      and precise cleaning of Aluminum surfaces like automotive parts or aerospace
      components. Adjust within these ranges to balance cleaning speed and material
      integrity, watching for lower power thresholds around 20-50W where reflectivity
      drops for better absorption.
  material_safety_heatmap:
    title: Material Safety Heatmap
    description: This heatmap visualizes safe (green) to hazardous (red) zones for
      laser cleaning Aluminum based on power and pulse width, revealing the narrow
      operating window limited by its low melting point of around 660°C and high thermal
      conductivity. Aluminum's high reflectivity to laser wavelengths means much of
      the energy bounces off, so staying in the green areas helps you select parameters
      that penetrate just enough to remove oxides and contaminants without causing
      substrate melting or vaporization. Use it to fine-tune settings, avoiding the
      red boundaries near 40-50W for longer pulses where rapid heat buildup risks
      permanent damage.
  energy_coupling_heatmap:
    title: Energy Coupling Heatmap
    description: This heatmap displays the efficiency of laser energy absorption into
      Aluminum across combinations of power, pulse duration, and wavelength, revealing
      how its high reflectivity often limits coupling to specific narrow parameter
      windows. By spotting the vibrant zones of high efficiency, you can fine-tune
      settings to maximize energy transfer for effective surface cleaning without
      excessive heat buildup or reflection losses. Focus on the green clusters around
      30-50W and short pulses to target Aluminum's oxide layer precisely, avoiding
      the dim areas where energy bounces off ineffectively.
  thermal_stress_heatmap:
    title: Thermal Stress Heatmap
    description: This heatmap visualizes thermal stress risks on aluminum surfaces,
      highlighting zones of potential warping or distortion based on laser power,
      speed, and scan patterns—crucial given aluminum's high thermal conductivity
      that spreads heat quickly but risks uneven expansion. It helps you identify
      safe parameter windows to prevent damage, such as avoiding high-power areas
      above 50W where aluminum's low melting point (around 660°C) accelerates stress
      buildup. By focusing on the green low-risk zones, you can optimize settings
      for effective oxide removal without compromising the material's integrity.
  process_effectiveness_heatmap:
    title: Process Effectiveness Heatmap
    description: This heatmap visualizes cleaning effectiveness for aluminum across
      laser power and speed parameters, highlighting optimal zones where the material's
      high reflectivity and rapid oxide reformation allow for complete contaminant
      removal without surface damage. The green sweet spot indicates ideal settings
      to achieve thorough cleaning while avoiding underpowered incomplete removal
      or overpowered melting risks unique to aluminum's low thermal conductivity.
      Use it to fine-tune your process by targeting these zones, ensuring efficient
      laser cleaning tailored to aluminum's sensitivity.
  heat_buildup_simulator:
    title: Heat Buildup Simulator
    description: This simulator animates heat accumulation on Aluminum surfaces across
      multiple laser passes, highlighting how its high thermal conductivity spreads
      warmth quickly while its relatively low melting point (around 660°C) risks deformation
      if unchecked. Use it to adjust power, speed, and pause intervals, ensuring temperatures
      stay below critical thresholds to prevent melting or oxide reformation. Watch
      the color gradients to spot when active cooling—like air blasts or delays—becomes
      essential for safe, effective cleaning.
  diagnostic_center:
    title: Diagnostic Center
    description: The Diagnostic Center's Material Challenges tab displays Aluminum's
      high reflectivity and rapid oxide reformation risks, highlighting narrow safe
      zones for power and speed to avoid incomplete cleaning or surface melting. In
      the Troubleshooting tab, it identifies common issues like beam scattering from
      shiny surfaces, offering targeted adjustments to your laser parameters. This
      empowers you to configure settings confidently, ensuring efficient oxide removal
      while preserving the material's integrity.
  research_citations:
    title: Research Citations
    description: This section displays key academic and industry papers that validate
      the recommended laser parameters for cleaning Aluminum, highlighting studies
      on its high reflectivity and rapid heat dissipation. By reviewing these citations,
      you can confidently adjust power and pulse settings to avoid issues like incomplete
      oxide removal or surface damage, ensuring efficient cleaning without risking
      material warping. Tap on a citation to access the full source and deepen your
      understanding of Aluminum's unique laser interaction behaviors.
  faq_settings:
    title: Settings FAQ
    description: This Settings FAQ provides quick answers to common questions about
      configuring laser parameters for Aluminum, such as adjusting power and pulse
      duration to account for its high reflectivity and rapid heat dissipation. It
      helps operators avoid issues like incomplete oxide removal or overheating by
      highlighting safe ranges, like keeping power below 50W to prevent melting. Use
      it to fine-tune settings on the fly for efficient, damage-free cleaning of Aluminum
      surfaces.
  dataset_download:
    title: Dataset Download
    description: The Dataset Download component lets you export JSON files of your
      laser cleaning settings and Aluminum's key properties, like its high reflectivity
      and rapid oxide reformation, for easy backup or sharing. This helps you integrate
      these configurations with external analysis tools or documentation systems,
      allowing precise adjustments to power and pulse durations tailored to Aluminum's
      thermal sensitivity. Use it to document safe operating zones, such as avoiding
      power spikes above 50W where reflectivity causes energy loss, streamlining your
      workflow for consistent metal surface preparation.
  parameter_relationships:
    title: Parameter Relationships
    description: This network visualization maps how key parameters like laser power,
      scanning speed, and pulse duration interdependent for Aluminum, highlighting
      its high reflectivity and thermal conductivity that can amplify heat buildup
      or beam scattering. By tracing these relationships, you can quickly identify
      safe adjustment ranges—such as keeping power below 50W to avoid oxide reformation—ensuring
      efficient contaminant removal without subsurface melting. Hover over nodes to
      simulate changes and optimize your laser cleaning setup in real-time.
page_description: Aluminum serves as a non-ferrous metal in various industrial settings.
  Its lightweight nature supports applications in aerospace and automotive sectors.
  The material reduces overall weight in structural components without compromising
  strength. Corrosion resistance improves longevity in marine and construction environments.
  Electrical conductivity enables efficient performance in electronics manufacturing.
  The metal restores flexibility in designs requiring formability, such as packaging
  and renewable energy structures. Oxidation resistance protects surfaces during exposure
  to elevated temperatures in food and beverage processing. In rail transport settings,
  aluminum reveals durability under repeated stress. Adjustments to processing parameters
  enhance surface finish and reduce internal stresses. Optimal ranges for forming
