description: >-
  When laser cleaning gallium, you'll want to approach it unlike harder metals such as steel or titanium, which handle
  intense heat without issue. Gallium's unusually low melting point sets it apart, risking surface liquefaction if
  energy builds up too quickly. Start with reduced power and faster scan speeds to strip away oxides or residues while
  keeping the material solid. Make sure you avoid prolonged exposure in one spot, as this can cause uneven melting and
  distort the underlying structure. This method exposes a clean, intact surface ready for semiconductor or medical
  applications.
