  power:
    min: 10
    max: 100
    value: 30
    unit: W
    description: 'Typical average power for pulsed laser cleaning of soft metals like Europium to avoid melting (mp 826°C);
      conservative range due to low thermal conductivity (~14 W/m·K); recommended starting low to test. Source: General manufacturer
      specs (e.g., Coherent cleaning systems for metals, 10-200 W range); limited specific Europium data, adapted from Al
      cleaning studies (Opt. Lasers Eng., 2018).'
  scan_speed:
    min: 10
    max: 5000
    value: 1000
    unit: mm/s
    description: 'Effective speeds for contamination removal; slower for heavy contamination (e.g., oxides on reactive Europium),
      faster for light; optimal balances ablation and heat dissipation. Source: Industry standards (e.g., Laser Cleaning Handbook
      by Trumpf, 100-10,000 mm/s); case studies on rare earth alloys (J. Laser Appl., 2020).'
  pulse_width:
    min: 0.1
    max: 1000
    value: 10
    unit: ns
    description: 'Nanosecond regime preferred for cost-effective cleaning with minimal HAZ on low-melting Europium; picosecond
      (ps) or femtosecond (fs) reduce thermal effects but increase cost; ns avoids excessive heat accumulation. Source: Laser
      physics research (e.g., Appl. Surf. Sci., 2019 on metal ablation thresholds); ns typical for 532 nm cleaning.'
  repetition_rate:
    min: 1
    max: 200
    value: 20
    unit: kHz
    description: 'Balances cleaning speed and heat buildup; higher rates accelerate process but risk thermal damage to Europium''s
      soft structure; moderate rate recommended for uniform ablation. Source: Academic literature (e.g., Opt. Express, 2017
      on pulsed laser cleaning of metals; trade-offs noted in high-rep-rate studies).'
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.0
    unit: J/cm²
    description: 'Fluence for contaminant ablation without exceeding Europium damage threshold (~1.5-3 J/cm² estimated from
      similar soft metals); low values due to high reflectivity at 532 nm and low mp; safe cleaning below threshold. Source:
      Ablation threshold studies (e.g., J. Phys. D: Appl. Phys., 2021 on rare earth metals; conservative estimate for Europium).'
  spot_size:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Beam diameter for precise surface preparation; smaller for fine details on Europium components, larger for
      broad areas; 200 μm balances resolution and efficiency. Source: Equipment specifications (e.g., IPG Photonics scanners,
      50-1000 μm); adapted for industrial cleaning of reactive metals.'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Multi-pass for thorough removal of contaminants (e.g., oxides) on Europium without single-pass overheating;
      single pass for light cleaning, 2-3 typical for industrial prep. Source: Industry practice (e.g., case studies in Surf.
      Coat. Technol., 2019 on metal surface cleaning); conservative for soft substrates.'
  overlap_ratio:
    min: 10
    max: 90
    value: 70
    unit: '%'
    description: 'Ensures uniform coverage and overlap for complete cleaning; higher for heavy contamination on irregular
      Europium surfaces, lower for speed; 70% optimal for even energy distribution. Source: Process optimization studies (e.g.,
      Lasers Manuf. Mater. Process., 2022; standard 50-80% in laser scanning protocols).'
component_summary: These settings employ moderate 30 W power and 8 ns pulses at 532 nm to gently ablate contaminants from
  Europium's soft, reactive surface without causing thermal distortion or oxidation.
