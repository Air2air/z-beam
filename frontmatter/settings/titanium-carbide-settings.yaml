  power:
    min: 50
    max: 300
    value: 100
    unit: W
    description: 'Typical range for industrial cleaning of hard ceramics like TiC to balance ablation and avoid thermal damage;
      starting at 100 W for light contamination. Max limited by substrate melting point (~3067°C). Source: IPG Photonics YLR
      series specs for 1064 nm cleaning heads; academic review in ''Laser Cleaning of Metals'' (Optics & Lasers in Engineering,
      2018).'
  scan_speed:
    min: 10
    max: 5000
    value: 2000
    unit: mm/s
    description: 'Effective speeds for contamination removal on reflective/high-conductivity materials like TiC; higher for
      light contamination (up to 5000 mm/s), lower for heavy (500-1000 mm/s). Optimal balances fluence and coverage. Source:
      Industry standards from Laserax equipment manuals; case studies in Journal of Laser Applications (2020).'
  pulse_width:
    min: 0.1
    max: 1000
    unit: ns
    value: 20
    description: 'Nanosecond regime preferred for cost-effective cleaning of TiC with minimal HAZ due to its high thermal
      conductivity (~20-30 W/m·K); picosecond (ps) or femtosecond for ultra-precise but less common industrially. Avoids excessive
      heat accumulation. Source: Laser physics in ''Pulsed Laser Ablation of Ceramics'' (Applied Surface Science, 2019).'
  repetition_rate:
    min: 1
    max: 200
    value: 50
    unit: kHz
    description: 'Typical for 1064 nm cleaning to achieve uniform energy delivery on TiC; 50 kHz balances speed and heat management—higher
      rates risk accumulation on low-reflectivity TiC (~0.3-0.5 at 1064 nm). Trade-off: faster processing vs. potential overheating.
      Source: Academic literature in Optics Express (2017) on carbide ablation.'
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Fluence range for contaminant removal without damaging TiC; damage threshold ~4-5 J/cm² for ns pulses due
      to high melting point. Recommended conservative for safe cleaning of oxides or oils. Source: Ablation threshold studies
      in Journal of Applied Physics (2021) for TiC at 1064 nm.'
  spot_size:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Beam diameter for precise surface prep on TiC; smaller (50-100 μm) for fine details, larger (200-500 μm)
      for broad areas. 200 μm optimal for uniform cleaning without excessive overlap heating. Source: Equipment specs from
      Coherent and Trumpf laser systems for industrial cleaning.'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass (2-3) for heavy layers on TiC to ensure complete removal
      without substrate erosion. Recommended 2 passes for industrial prep. Source: Industry case studies in Surface and Coatings
      Technology (2019) for carbide tools.'
  overlap_ratio:
    min: 10
    max: 90
    value: 60
    unit: '%'
    description: 'Ensures uniform coverage on TiC surfaces; 60% typical for even fluence distribution and minimal striping,
      adjustable 30% for speed vs. 80% for thoroughness. Source: Process optimization in Laser & Photonics Reviews (2020).'
page_description: When laser cleaning titanium carbide, make sure you watch its exceptional hardness compared to softer ceramics
  like alumina, which can crack under aggressive pulses while this one resists without fracturing. You must start with controlled
  power to avoid overheating its dense structure, unlike metals that dissipate heat faster. This difference demands slower
  scan speeds, so you bring back the surface cleanly without compromising its tough, corrosion-resistant finish.
