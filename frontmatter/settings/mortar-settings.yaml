  power:
    min: 200
    max: 2000
    value: 500
    unit: W
    description: 'Typical range for industrial 1064 nm laser cleaning of mortar-like cementitious materials to remove contaminants
      without excessive heat buildup; starting at 500 W for controlled ablation. Max avoids substrate cracking (thermal conductivity
      ~1 W/mK). Source: IPG Photonics YLR series specs and studies on stone cleaning (e.g., J. Laser Appl. 2018).'
  scan_speed:
    min: 10
    max: 5000
    value: 1500
    unit: mm/s
    description: 'Effective speeds balance removal efficiency and heat input; slower for heavy contamination (e.g., paint),
      faster for light dirt. Recommended 1500 mm/s for uniform mortar surface prep. Source: Industry standards from Laser
      Cleaning Europe guidelines and equipment manuals (e.g., Adapt Laser Systems).'
  pulse_width:
    min: 0.1
    max: 1000
    unit: ns
    value: 30
    description: 'Nanosecond regime preferred for cost-effective cleaning of mortar; 30 ns minimizes heat-affected zone (HAZ)
      due to mortar''s low thermal diffusivity (~0.5 mm²/s). Picosecond (ps) or femtosecond optional for precision but less
      common industrially. Source: Laser physics research in Opt. Lasers Eng. (2015) on ablation of cementitious substrates.'
  repetition_rate:
    min: 1
    max: 200
    value: 50
    unit: kHz
    description: 'Typical for pulsed 1064 nm systems on mortar to achieve pulse overlap without excessive heat accumulation;
      higher rates speed up cleaning but risk thermal damage on porous mortar. 50 kHz balances speed and safety. Source: Academic
      literature, e.g., Appl. Surf. Sci. (2019) on stone heritage cleaning trade-offs.'
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Fluence range for contaminant ablation on mortar; below damage threshold (~3-5 J/cm² for cement, avoiding
      melting point ~1200°C). Recommended 1.5 J/cm² for safe removal of oxides/paint with minimal porosity alteration. Source:
      Ablation threshold studies in J. Cult. Herit. (2017) on laser cleaning of masonry.'
  spot_size:
    min: 0.1
    max: 500
    value: 500
    unit: μm
    description: 'Beam diameter range for industrial cleaning; smaller for fine details, larger for broad mortar surfaces.
      500 μm recommended for efficient coverage on rough mortar textures. Source: Equipment specifications from Coherent and
      Trumpf laser cleaning heads.'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass for heavy layers on mortar to prevent over-ablation. Recommended
      2 passes for complete removal while preserving substrate integrity. Source: Industry case studies, e.g., restoration
      projects in Constr. Build. Mater. (2020).'
  overlap_ratio:
    min: 10
    max: 90
    value: 50
    unit: '%'
    description: 'Ensures uniform coverage on irregular mortar surfaces; 50% optimal for even energy distribution without
      gaps or hotspots. Higher for heavy contamination. Source: Process optimization in Laser Technol. (2016) for surface
      preparation applications.'
component_summary: These settings deliver moderate 500 W power with 10 ns pulses at 1064 nm to gently ablate contaminants
  from mortar's porous, brittle structure without causing thermal cracking or surface degradation.
