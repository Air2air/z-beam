  power:
    min: 200
    max: 2000
    value: 500
    unit: W
    description: 'Typical range for industrial 1064 nm laser cleaning of mortar-like cementitious materials to remove contaminants
      without excessive heat buildup; starting at 500 W for controlled ablation. Max avoids substrate cracking (thermal conductivity
      ~1 W/mK). Source: IPG Photonics YLR series specs and studies on stone cleaning (e.g., J. Laser Appl. 2018).'
  scan_speed:
    min: 10
    max: 5000
    value: 1500
    unit: mm/s
    description: 'Effective speeds balance removal efficiency and heat input; slower for heavy contamination (e.g., paint),
      faster for light dirt. Recommended 1500 mm/s for uniform mortar surface prep. Source: Industry standards from Laser
      Cleaning Europe guidelines and equipment manuals (e.g., Adapt Laser Systems).'
  pulse_width:
    min: 0.1
    max: 1000
    unit: ns
    value: 30
    description: 'Nanosecond regime preferred for cost-effective cleaning of mortar; 30 ns minimizes heat-affected zone (HAZ)
      due to mortar''s low thermal diffusivity (~0.5 mm²/s). Picosecond (ps) or femtosecond optional for precision but less
      common industrially. Source: Laser physics research in Opt. Lasers Eng. (2015) on ablation of cementitious substrates.'
  repetition_rate:
    min: 1
    max: 200
    value: 50
    unit: kHz
    description: 'Typical for pulsed 1064 nm systems on mortar to achieve pulse overlap without excessive heat accumulation;
      higher rates speed up cleaning but risk thermal damage on porous mortar. 50 kHz balances speed and safety. Source: Academic
      literature, e.g., Appl. Surf. Sci. (2019) on stone heritage cleaning trade-offs.'
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Fluence range for contaminant ablation on mortar; below damage threshold (~3-5 J/cm² for cement, avoiding
      melting point ~1200°C). Recommended 1.5 J/cm² for safe removal of oxides/paint with minimal porosity alteration. Source:
      Ablation threshold studies in J. Cult. Herit. (2017) on laser cleaning of masonry.'
  spot_size:
    min: 0.1
    max: 500
    value: 500
    unit: μm
    description: 'Beam diameter range for industrial cleaning; smaller for fine details, larger for broad mortar surfaces.
      500 μm recommended for efficient coverage on rough mortar textures. Source: Equipment specifications from Coherent and
      Trumpf laser cleaning heads.'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass for heavy layers on mortar to prevent over-ablation. Recommended
      2 passes for complete removal while preserving substrate integrity. Source: Industry case studies, e.g., restoration
      projects in Constr. Build. Mater. (2020).'
  overlap_ratio:
    min: 10
    max: 90
    value: 50
    unit: '%'
    description: 'Ensures uniform coverage on irregular mortar surfaces; 50% optimal for even energy distribution without
      gaps or hotspots. Higher for heavy contamination. Source: Process optimization in Laser Technol. (2016) for surface
      preparation applications.'
challenges:
  thermal_management:
  - challenge: Moisture-induced spalling and explosive failure
    severity: critical
    threshold_temperature: Steam formation >100°C with trapped moisture
    impact: Trapped moisture converts to steam causing explosive surface spalling
    solutions:
    - Test moisture content before cleaning (>5% moisture requires drying)
    - Use pulse mode with 10-15 second cooling for wet materials
    - Reduce power by 50-60% for damp masonry
    - Allow 24-48 hours drying after rain before laser cleaning
    - Monitor for popping sounds or surface lifting; stop immediately
  - challenge: Low thermal diffusivity and heat accumulation
    severity: high
    property_value: 0.1-1.0 mm²/s (3-10x slower than metals)
    impact: Heat concentrates in surface layer causing thermal stress
    solutions:
    - Increase cooling time between passes (8-12 seconds)
    - Use low repetition rates (<20 kHz)
    - Defocused beam reduces peak intensity
    - Multiple gentle passes preferred over aggressive single pass
  surface_characteristics:
  - challenge: High porosity and deep contamination
    severity: high
    porosity_range: 10-25% (brick and concrete highly porous)
    impact: Contaminants penetrate deep into porous structure
    solutions:
    - Multiple progressive passes with power increase (50W → 80W → 100W)
    - Reduce scan speed for deeper penetration (400-600 mm/s)
    - Chemical pre-treatment for biological growth (algae, lichen)
    - Expect 3-5 passes for complete cleaning vs 1-2 for dense materials
  - challenge: Surface heterogeneity and aggregate exposure
    severity: medium
    impact: Mixed composition (cement matrix, aggregates, voids) causes variable absorption
    solutions:
    - Use moderate power (70-90W) suitable for both matrix and aggregates
    - Crosshatch scan pattern for uniform coverage
    - Monitor for differential ablation; adjust power if aggregates become prominent
    - Aged masonry more challenging than new construction
  contamination_challenges:
  - challenge: Paint and coating removal from porous substrate
    severity: medium
    impact: Paint penetrates into pores requiring deep cleaning without substrate damage
    solutions:
    - First pass 100W fast (1500 mm/s) for surface paint layer
    - Second pass 70W slow (800 mm/s) for paint in pores
    - Third pass 50W very slow (500 mm/s) for residual staining
    - Chemical stripping pre-treatment reduces laser exposure
    - Heritage masonry requires gentler approach (max 60W)
description: 'When laser cleaning mortar, watch out for its brittle nature right from the start—I''ve seen it crack easily
  under sudden heat, unlike tougher stone in masonry walls. That low toughness means thermal shock hits hard, so you need
  to ease in gently to avoid spalling the surface. Tends to absorb laser energy well compared to slick metals, which helps
  clear grime without much residue, but its porosity traps moisture that can steam up and weaken bonds during the process.


  Start with lower power settings to build heat slowly, giving the material time to dissipate without fracturing. This works
  best when you overlap passes moderately, pulling away layers of dirt or salt buildup from historical facades or bridge joints.
  I''ve found scanning at a steady speed prevents hot spots that might etch the underlying cement-sand mix. Adjust for damp
  conditions by drying the area first—mortar holds water longer than dense brick, leading to uneven cleaning if ignored. In
  my experience on restoration sites, this approach brings back the original texture safely, especially for cultural heritage
  pieces where precision matters.'
