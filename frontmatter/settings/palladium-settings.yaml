description: >-
  When laser cleaning Palladium, you'll want to begin with a careful setup to handle its high reflectivity. Start by
  selecting a lower power level right from the outset. This metal reflects a lot of the laser energy, so you must dial
  it back to ensure the beam gets absorbed enough for effective cleaning without wasting shots.


  Move on to your scan speed next. Keep it moderate to allow the heat to spread evenly across the dense surface.
  Palladium's strong thermal conductivity helps here—it pulls heat away quickly, which prevents hot spots and protects
  the underlying structure during the process.


  Watch out midway through: don't push the fluence too high, or you risk uneven ablation on this corrosion-resistant
  material. Its noble nature means contaminants cling stubbornly, so make multiple passes with good overlap to lift them
  without scratching the finish.


  Finish by checking the dwell time—short bursts work best. This approach cleans jewelry or aerospace parts cleanly
  every time, leaving no residue behind.
