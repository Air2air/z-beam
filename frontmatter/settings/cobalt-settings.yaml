    description: 'Nanosecond regime typical for industrial cleaning to ablate contaminants while minimizing HAZ on high-conductivity
      cobalt; picosecond (ps) or femtosecond (fs) for ultra-low heat but less common industrially. 20 ns recommended for balance.
