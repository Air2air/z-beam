  power:
    min: 50
    max: 500
    value: 100
    unit: W
    description: 'Typical range for industrial cleaning of reflective metals like cobalt to avoid thermal damage; starting
      at 100 W balances efficiency and safety. Max limited to prevent melting (cobalt MP ~1495°C). Source: IPG Photonics YLR
      series specs for metal cleaning.'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 1500
    description: 'Effective range for contamination removal; slower for heavy contaminants (e.g., oxides), faster for light;
      1500 mm/s optimal for uniform cleaning without overheating. Source: CleanLaser equipment manuals and industry standards
      for 1064 nm cleaning.'
  pulse_width:
    min: 0.1
    max: 1000
    unit: ns
    value: 20
    description: 'Nanosecond regime typical for industrial cleaning to ablate contaminants while minimizing HAZ on high-conductivity
      cobalt; picosecond (ps) or femtosecond (fs) for ultra-low heat but less common industrially. 20 ns recommended for balance.
      Source: Laser physics studies in Optics & Laser Technology (e.g., ns vs ps ablation thresholds).'
  repetition_rate:
    min: 1
    max: 200
    unit: kHz
    value: 50
    description: 'Standard for pulsed cleaning; higher rates speed up process but risk heat accumulation on reflective cobalt;
      50 kHz optimal for controlled energy delivery. Trade-off: high freq increases throughput but requires monitoring temperature.
      Source: Academic literature in Applied Surface Science on metal cleaning parameters.'
  energy_density:
    min: 0.1
    max: 20.0
    unit: J/cm²
    value: 1.5
    description: 'Fluence range for safe contaminant ablation; cobalt damage threshold ~2-4 J/cm² at 1064 nm due to reflectivity
      (~60%); 1.5 J/cm² recommended for cleaning without substrate harm. Conservative for cobalt''s properties. Source: Ablation
      threshold studies in Journal of Applied Physics (similar to Ni/Co alloys).'
  spot_size:
    min: 0.1
    max: 500
    unit: μm
    value: 200
    description: 'Beam diameter range for precision vs area coverage; smaller for fine surface prep on cobalt, larger for
      broad cleaning; 200 μm recommended for effective fluence distribution. Source: Laser equipment specs from Coherent and
      Trumpf for industrial applications.'
  pass_count:
    min: 1
    max: 10
    unit: passes
    value: 2
    description: 'Single pass for light contamination, multi-pass for heavy; 2 passes typical for complete removal on cobalt
      without excessive heat buildup. Source: Industry case studies in laser cleaning of aerospace alloys (e.g., similar to
      Co-based superalloys).'
  overlap_ratio:
    min: 10
    max: 90
    unit: '%'
    value: 60
    description: 'Ensures uniform coverage; 60% recommended for even cleaning on metallic surfaces like cobalt, avoiding gaps
      or overexposure. Range balances efficiency and homogeneity. Source: Process optimization in Surface & Coatings Technology
      journals.'
component_summary: The 100 W power, 1064 nm wavelength, and 10 ns pulses are ideal for Cobalt, delivering targeted ablation
  of contaminants while leveraging its high reflectivity and thermal conductivity to prevent subsurface damage.
