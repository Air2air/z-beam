description: >-
  When laser cleaning granite, start with the main challenge of its low heat conduction. This dense igneous stone holds
  heat unevenly compared to softer sedimentary rocks, which can lead to surface cracking if energy builds up too fast.
  You must use lower power settings right away to spread the heat gradually. Keep scan speeds moderate so the laser
  removes contaminants without stressing the material's rigid structure. Watch out for overexposure in the middle of the
  process—granite's hardness resists cleaning but amplifies any localized heating. Adjust to multiple light passes
  instead of heavy single ones. This approach restores the stone's natural finish while preserving its compressive
  strength for applications like monument restoration. End by verifying even cleaning to avoid weak spots.
