  power:
    min: 50
    max: 500
    value: 200
    unit: W
    description: 'Typical range for industrial 1064 nm fiber lasers cleaning copper;
      start at 200 W to balance efficiency and avoid thermal damage due to copper''s
      high reflectivity and conductivity. Max safe before substrate melting ~500 W
      with proper scanning. Source: IPG Photonics specs and study in Journal of Laser
      Applications (2018).'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 2000
    description: 'Effective range for contamination removal; 2000 mm/s recommended
      for light contaminants on copper to minimize heat accumulation. Slower (500-1000
      mm/s) for heavy oxidation, faster for surface prep. Source: CleanLaser equipment
      manuals and Optics and Lasers in Engineering (2020).'
  pulse_width:
    min: 0.1
    max: 1000
    value: 50
    unit: ns
    description: 'Nanosecond regime typical for copper cleaning at 1064 nm; 50 ns
      recommended for minimal heat-affected zone (HAZ) while ablating contaminants
      without melting substrate. Picosecond (ps) options (1-10 ps) reduce HAZ further
      but increase cost. Femtosecond less common industrially. Source: Laser physics
      review in Applied Surface Science (2019).'
  repetition_rate:
    min: 1
    max: 200
    value: 50
    unit: kHz
    description: 'Standard for pulsed cleaning; 50 kHz balances speed and heat management
      on reflective copper—higher rates (>80 kHz) accelerate cleaning but risk accumulation.
      Lower for heavy contaminants. Source: Academic literature in Optics Express
      (2017) on metal ablation.'
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Fluence range for safe contaminant removal; copper damage threshold
      ~4-5 J/cm² at 1064 nm, so 1.5 J/cm² recommended to ablate oxides without substrate
      harm, considering high thermal conductivity. Source: Ablation threshold studies
      in Physical Review B (2015) and Journal of Applied Physics (2021).'
  spot_size:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Beam diameter range for industrial cleaning; 200 μm recommended
      for copper to achieve uniform fluence on detailed surfaces vs. larger (300-500
      μm) for broad areas. Smaller for precision. Source: Laser equipment specs from
      Coherent Inc. and process studies in Surface and Coatings Technology (2019).'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Typically 1-3 passes for complete removal on copper; 2 passes recommended
      for multi-layer contaminants to ensure uniformity without excessive heat. Single
      pass for light cleaning. Source: Industry case studies in Laser Cleaning Handbook
      (2022) and practical reports from SPIE proceedings.'
  overlap_ratio:
    min: 10
    max: 90
    value: 60
    unit: '%'
    description: 'Standard for uniform coverage; 60% recommended for copper to prevent
      gaps in cleaning while avoiding overexposure and thermal stress. Higher (70-80%)
      for heavy contamination, lower for speed. Source: Process optimization in Journal
      of Cleaner Production (2020).'
component_summaries:
  machine_settings:
    title: Machine Settings
    description: This table displays recommended ranges for power, pulse width, repetition
      rate, and scan speed, tailored to Copper's high reflectivity and thermal conductivity
      to ensure efficient laser absorption during cleaning. It helps you quickly select
      parameters that minimize energy loss from reflection while preventing overheating,
      allowing precise configuration for removing oxides or contaminants without subsurface
      damage. Adjust within these optimal zones to balance cleaning speed and material
      integrity, especially noting lower power thresholds around 30-50W where Copper's
      reflectivity peaks.
  material_safety_heatmap:
    title: Material Safety Heatmap
    description: This heatmap visualizes safe operating zones for laser cleaning Copper,
      mapping power against pulse width to highlight green areas where the metal's
      high thermal conductivity prevents overheating, while red zones indicate risks
      like surface melting due to its reflectivity absorbing energy unevenly. It helps
      you select parameters that avoid material damage, ensuring efficient oxide removal
      without compromising Copper's integrity. Focus on the narrow green band around
      30-50W and short pulses under 100μs to maximize cleaning effectiveness while
      staying clear of the red boundary where vaporization begins.
  energy_coupling_heatmap:
    title: Energy Coupling Heatmap
    description: This heatmap displays the laser energy coupling efficiency for Copper
      across parameter combinations like power and pulse duration, revealing how its
      high reflectivity limits absorption in most infrared wavelengths unless an oxide
      layer forms. It helps you pinpoint narrow optimal zones—often around 30-50W
      with short pulses—where energy transfer peaks, enabling precise configuration
      to clean contaminants without excessive heat buildup from Copper's superior
      thermal conductivity. Watch for the transition to lower efficiency above 60W,
      signaling potential surface melting risks during extended operation.
  thermal_stress_heatmap:
    title: Thermal Stress Heatmap
    description: This heatmap visualizes thermal stress risks on copper surfaces,
      highlighting zones of potential warping or distortion based on laser power,
      speed, and pulse duration, driven by copper's high thermal conductivity that
      rapidly spreads heat but can still cause uneven expansion. It helps you configure
      safe laser cleaning parameters by steering clear of red high-risk areas, ensuring
      effective oxide removal without damaging the material's ductility or surface
      integrity. For instance, note the narrow green safe band around 30-40W where
      copper's reflectivity allows absorption without excessive localized heating.
  process_effectiveness_heatmap:
    title: Process Effectiveness Heatmap
    description: This heatmap visualizes cleaning effectiveness for copper across
      laser power and scan speed parameters, highlighting under-cleaning (blue zones),
      optimal removal (green sweet spot), and over-processing risks (red areas) to
      ensure complete contaminant elimination without surface damage. Copper's high
      reflectivity and thermal conductivity narrow the optimal window, so use it to
      pinpoint settings like 30-40W at 500mm/s where absorption is balanced for efficient
      oxide layer stripping. Adjust interactively to avoid reflectivity-induced hotspots
      that could lead to uneven cleaning or material warping.
  heat_buildup_simulator:
    title: Heat Buildup Simulator
    description: The Heat Buildup Simulator animates temperature accumulation in Copper
      across multiple laser passes, leveraging its high thermal conductivity to show
      rapid heat dissipation while revealing potential hotspots from repeated exposure.
      This helps you configure laser power, speed, and cooling intervals to safely
      remove oxides without risking melting at Copper's 1085°C threshold. By observing
      when the animation signals cooling needs, you can optimize settings for efficient
      cleaning while preserving the material's integrity.
  diagnostic_center:
    title: Diagnostic Center
    description: The Diagnostic Center features Material Challenges and Troubleshooting
      tabs that highlight Copper's high reflectivity and thermal conductivity, common
      culprits in laser cleaning setups. Use the Challenges tab to spot narrow parameter
      windows where reflectivity causes energy loss, and the Troubleshooting tab to
      diagnose issues like uneven oxide removal or localized overheating. This guides
      you in fine-tuning power, pulse duration, and speed to achieve clean, damage-free
      results on Copper surfaces.
  research_citations:
    title: Research Citations
    description: This section displays curated academic and industry papers that validate
      the recommended laser parameters for cleaning Copper, highlighting its high
      reflectivity and thermal conductivity which demand precise power and pulse settings
      to avoid surface damage. By reviewing these citations, you can cross-reference
      studies on Copper's laser absorption challenges, ensuring your configurations
      align with proven methods to efficiently remove oxides without overheating.
      Use this to build confidence in your setup, especially when adjusting for Copper's
      narrow safe operating windows around 50-100W.
  faq_settings:
    title: Settings FAQ
    description: This Settings FAQ provides quick answers to common questions on configuring
      laser parameters for Copper, such as adjusting power and pulse duration to overcome
      its high reflectivity and prevent overheating. It helps you fine-tune settings
      to efficiently remove oxides without damaging the underlying metal, using insights
      like safe intensity thresholds around 50-100W to balance cleaning speed and
      surface integrity. Refer to it while testing to avoid frequent pitfalls like
      incomplete ablation or thermal distortion specific to Copper's excellent conductivity.
  dataset_download:
    title: Dataset Download
    description: The Dataset Download feature provides JSON exports of your customized
      laser cleaning settings and Copper-specific properties, such as its high thermal
      conductivity and reflectivity, which influence optimal power and pulse parameters.
      This helps you integrate these configurations seamlessly with external simulation
      software or documentation systems, ensuring precise replication of safe operating
      zones for Copper's sensitive oxide layer removal. By exporting this data, you
      can analyze and refine setups to avoid overheating risks unique to Copper's
      rapid heat dissipation.
  parameter_relationships:
    title: Parameter Relationships
    description: This network visualization maps out how key laser parameters—like
      power, scan speed, and pulse duration—interact for Copper, highlighting its
      high thermal conductivity that causes rapid heat spread and potential overheating
      if not balanced. By tracing these dependencies, you can see how increasing power
      amplifies temperature rise while scan speed helps dissipate heat, preventing
      substrate damage during oxide removal. Use it to optimize settings iteratively,
      ensuring efficient cleaning without risking Copper's reflective surface from
      causing uneven energy absorption.
pageDescription: When laser cleaning copper, we've found that starting with gentle
  pulses works best because its shiny surface bounces back most of the energy, so
  you get even coverage without wasting shots. This high reflectivity sets it apart
  from duller metals like iron, meaning we adjust our setup to focus on short, repeated
  passes that gradually lift dirt and oxides while the metal's strong heat-spreading
  ability prevents hot spots. But watch out midway—push too hard and the surface can
  soften unevenly, so we dial back intensity and overlap scans to keep things cool
  and restore that clean, conductive finish for electronics or plumbing jobs.
