description: >-
  When laser cleaning copper, we've found that starting with gentle pulses works best because its shiny surface bounces
  back most of the energy, so you get even coverage without wasting shots. This high reflectivity sets it apart from
  duller metals like iron, meaning we adjust our setup to focus on short, repeated passes that gradually lift dirt and
  oxides while the metal's strong heat-spreading ability prevents hot spots. But watch out midway—push too hard and the
  surface can soften unevenly, so we dial back intensity and overlap scans to keep things cool and restore that clean,
  conductive finish for electronics or plumbing jobs.
