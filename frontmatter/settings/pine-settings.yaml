  power:
    min: 10
    max: 200
    value: 50
    unit: W
    description: 'Typical range for industrial cleaning of softwoods like pine to remove contaminants without charring; starting
      low prevents thermal damage. Max based on avoiding substrate pyrolysis. Source: Studies on laser cleaning of wood in
      Journal of Cultural Heritage (e.g., 2015 paper on 1064 nm Nd:YAG for heritage wood, adapted for industrial use); manufacturer
      specs from IPG Photonics for similar applications.'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 1000
    description: 'Slower speeds for heavy contamination on pine (e.g., resins or dirt), faster for light; optimal balances
      efficiency and heat dissipation given pine''s low thermal conductivity (~0.12 W/mK). Source: Industry standards from
      Laser Cleaning Association guidelines and equipment manuals (e.g., CleanLaser systems, recommending 500-2000 mm/s for
      organics).'
  pulse_width:
    min: 0.1
    max: 1000
    value: 20
    unit: ns
    description: 'Nanosecond regime preferred over ps/fs for cost-effective cleaning of pine; shorter pulses minimize heat-affected
      zone (HAZ) to <50 μm, avoiding charring. Ps/fs for ultra-precision but overkill for industrial. Source: Laser physics
      research in Optics & Lasers in Engineering (e.g., 2018 review on pulsed laser ablation of wood at 1064 nm).'
  repetition_rate:
    min: 1
    max: 200
    value: 30
    unit: kHz
    description: 'Mid-range for effective contaminant vaporization on pine; higher rates increase speed but risk heat accumulation
      due to pine''s poor conductivity, leading to discoloration. Trade-off favors moderate for safety. Source: Academic literature
      in Applied Surface Science (e.g., 2020 study on rep rate effects in wood cleaning, recommending 20-50 kHz for 1064 nm).'
  energy_density:
    min: 0.1
    max: 20.0
    value: 2
    unit: J/cm²
    description: 'Fluence below pine''s ablation threshold (~8-12 J/cm² at 1064 nm) for safe removal of surface contaminants;
      higher risks carbonization. Conservative for pine''s reflectivity (~20-40% at IR) and low melting/pyrolysis point (~250°C).
      Source: Ablation threshold studies in Journal of Applied Physics (e.g., 2012 paper on wood fluence thresholds, industrial
      adaptation from SPIE proceedings).'
  spot_size:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Smaller for fine surface preparation on pine, larger for broad industrial areas; 200 μm optimal for uniform
      energy distribution without pinpoint damage. Source: Equipment specifications from manufacturers like Coherent and Trumpf
      lasers for cleaning heads (typical 150-300 μm for organic substrates).'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass for heavy (e.g., paint or rust on pine); 2 passes recommended
      to achieve complete removal while monitoring for thermal effects. Source: Industry practice in case studies from Laser
      Focus World (e.g., 2019 industrial wood prep examples) and operator manuals.'
  overlap_ratio:
    min: 10
    max: 90
    value: 70
    unit: '%'
    description: 'Higher overlap ensures uniform coverage on irregular pine surfaces, preventing streaks; 70% balances efficiency
      and overlap-induced heating. Source: Process optimization studies in Optics Express (e.g., 2017 paper on scan strategies
      for laser cleaning, recommending 60-80% for woods).'
challenges:
  thermal_management:
  - challenge: Charring and carbonization
    severity: high
    threshold_temperature: 250-300°C
    impact: Wood chars at low temperatures leaving black marks and structural damage
    solutions:
    - Use pulse mode with 2-5 second cooling between passes
    - Reduce power by 30-40% compared to metals
    - Increase scan speed to reduce dwell time
    - Monitor surface for discoloration; stop if browning occurs
  - challenge: Slow thermal diffusivity
    severity: medium
    property_value: 0.10-0.15 mm²/s (100x slower than aluminum)
    impact: Heat accumulates rapidly causing thermal damage zones
    solutions:
    - Increase cooling time between passes
    - Use lower repetition rates (<20 kHz)
    - Apply crosshatch patterns to distribute heat
  surface_characteristics:
  - challenge: Grain direction sensitivity
    severity: medium
    variation: 20-40% absorption variation by grain orientation
    impact: Laser absorption varies significantly with grain direction
    solutions:
    - Scan parallel to grain for consistent results
    - Use crosshatch pattern (0° and 90°) for uniform cleaning
    - Test on scrap to determine optimal scan direction
  - challenge: Porous structure with deep contamination
    severity: medium
    porosity_range: 12-65% (softwoods highest)
    impact: Contaminants penetrate deep into wood structure
    solutions:
    - Multiple passes with progressive power increase
    - Reduce scan speed for deeper penetration (600 mm/s)
    - Chemical pre-treatment for deep-seated contamination
  contamination_challenges:
  - challenge: Varnish and coating removal
    severity: medium
    impact: Thick coatings require multiple passes and generate smoke/fumes
    solutions:
    - First pass 80W fast (1500 mm/s) for bulk removal
    - Second pass 60W slow (800 mm/s) for residue
    - Use fume extraction to prevent redeposition
    - Limit to 2-3 passes maximum to avoid substrate damage
description: When laser cleaning pine, watch out right away for its softness compared to denser hardwoods like oak—I've seen
  it char easily if you push too hard, so start with gentle passes to avoid scorching the fibers. Unlike those tougher woods
  that handle higher intensities without flinching, pine's open grain soaks up heat quickly, which means you need shorter
  dwell times to prevent deep thermal damage. This works best when you adjust the scan speed upward, letting the laser skim
  the surface and lift grime without embedding into the porous structure. Tends to restore that natural finish nicely in furniture
  or heritage pieces, but skip multiple overlaps early on, or you'll warp the low-density boards. I've found contrasting it
  this way keeps the process efficient for marine or construction applications, bringing back clean timber without compromising
  its flexibility.
