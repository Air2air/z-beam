machineSettings:
  wavelength:
    description: Near-IR wavelength providing good absorption for Molybdenum surface contaminants
    unit: nm
    value: 1064
    min: 355
    max: 10640
  spotSize:
    min: 0.1
    max: 500
    unit: μm
    value: 200
    description: 'Beam diameter for precise industrial cleaning; 200 μm recommended for Mo surface prep, balancing resolution
      for fine details and coverage for larger areas. Source: Manufacturer specs (e.g., Coherent Armo series) and process
      optimization.'
  energyDensity:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Fluence for contaminant ablation without substrate damage; Mo''s ablation threshold ~3-5 J/cm² at 1064 nm
      due to reflectivity; 1.5 J/cm² safe for cleaning. Conservative estimate from similar metals. Source: Ablation threshold
      studies (J. Phys. D: Appl. Phys. 2017).'
  pulseWidth:
    min: 0.1
    max: 1000
    value: 30
    unit: ns
    description: 'Nanosecond regime preferred for cost-effective cleaning of reflective metals like Mo; 30 ns minimizes HAZ
      compared to longer pulses, while ps/fs (not typical at 1064 nm for industrial) reduce thermal effects further. Source:
      Laser physics reviews (Opt. Lasers Eng. 2020).'
  scanSpeed:
    min: 10
    max: 5000
    value: 1500
    unit: mm/s
    description: 'Effective for contamination removal; 1500 mm/s optimal for light contaminants on Mo, slower (500-1000 mm/s)
      for heavy; ensures uniform cleaning without excessive heat buildup. Source: Laserax equipment manuals and industry standards
      for IR laser cleaning.'
  passCount:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Typically 1-3 passes for complete removal on metals; 2 passes recommended for Mo to ensure thorough cleaning
      of oxides/contaminants without overexposure. Source: Industry case studies on refractory metal processing (Laser Cleaning
      Handbook, 2021).'
  overlapRatio:
    min: 10
    max: 90
    value: 50
    unit: '%'
    description: 'Ensures uniform coverage; 50% optimal for Mo to avoid gaps or uneven heating, adjustable higher for heavy
      contamination. Source: Process optimization studies (Opt. Laser Technol. 2022).'
  laserPower:
    description: Optimal average power for Molybdenum oxide removal without substrate damage
    unit: W
    value: 100
    min: 1.0
    max: 120
  laserPowerAlternative:
    min: 50
    max: 300
    value: 100
    unit: W
    description: 'Typical range for 1064 nm pulsed lasers in metal cleaning; starting at 100 W balances efficiency and safety
      for Mo''s high reflectivity and thermal conductivity, avoiding melting (threshold ~300 W). Source: IPG Photonics YLR
      series specs and studies on refractory metals (e.g., J. Laser Appl. 2018).'
  frequency:
    min: 1
    max: 200
    value: 30
    unit: kHz
    description: 'Standard for pulsed cleaning; 30 kHz recommended for Mo to achieve fast processing without significant heat
      accumulation due to its conductivity; higher rates (>50 kHz) increase speed but risk thermal damage. Source: Academic
      literature on pulse train effects (Appl. Surf. Sci. 2019).'
componentSummary: These settings utilize 1064 nm wavelength for strong absorption in Molybdenum, 10 ns pulses to minimize
  thermal damage on its high-melting-point surface, and 100 W power for efficient contaminant ablation.
