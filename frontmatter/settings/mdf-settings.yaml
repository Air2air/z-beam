  power:
    min: 50
    max: 500
    value: 100
    unit: W
    description: 'Typical range for industrial laser cleaning of wood-based materials like MDF to avoid charring; starting
      at 100W for light contamination. Max safe before substrate damage (thermal degradation) is ~500W at 1064 nm. Source:
      IPG Photonics YLR series specs and studies on laser ablation of composites (e.g., J. Laser Appl. 2018).'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 1500
    description: 'Effective speeds for contamination removal on MDF; slower for heavy contamination (500-1000 mm/s) to ensure
      ablation, faster (2000-3000 mm/s) for light. Recommended 1500 mm/s balances efficiency and heat control. Source: Industry
      manuals from CleanLaser and process optimization in Opt. Lasers Eng. (2020).'
  pulse_width:
    min: 0.1
    max: 1000
    unit: ns
    value: 20
    description: 'Nanosecond regime preferred for MDF cleaning due to cost-effectiveness; picosecond (ps) or femtosecond reduces
      HAZ but unnecessary for most industrial apps. 20 ns minimizes thermal effects on low-conductivity MDF. Source: Laser
      physics reviews in Appl. Phys. A (2019) on pulsed laser cleaning of organics.'
  repetition_rate:
    min: 1
    max: 200
    unit: kHz
    value: 50
    description: 'Typical for 1064 nm cleaning; 50 kHz recommended for MDF to achieve fast coverage without excessive heat
      accumulation, trading off speed vs. thermal buildup in resinous material. Higher rates (>80 kHz) risk damage. Source:
      Academic literature, e.g., J. Appl. Phys. (2021) on pulse repetition in ablation.'
  energy_density:
    min: 0.1
    max: 20.0
    unit: J/cm²
    value: 2
    description: 'Fluence range for safe removal of contaminants from MDF; damage threshold ~5-10 J/cm² due to charring/melting
      (MDF decomposition ~200-300°C). Recommended 2 J/cm² for effective cleaning below threshold. Source: Ablation studies
      in Wood Sci. Technol. (2017) and laser threshold measurements.'
  spot_size:
    min: 0.1
    max: 500
    unit: μm
    value: 200
    description: 'Beam diameter for precise industrial cleaning; 200 μm recommended for MDF to balance resolution on fibrous
      surface and large-area coverage, avoiding excessive heat concentration. Finer for details (<150 μm), larger for broad
      prep (300-500 μm). Source: Equipment specs from Coherent and Trumpf lasers.'
  pass_count:
    min: 1
    max: 10
    unit: passes
    value: 2
    description: 'Single pass for light contamination, multi-pass (2-5) for heavy; 2 passes recommended for complete MDF surface
      prep without overexposure. Source: Industry case studies in laser cleaning of wood composites (e.g., Proc. SPIE 2022).'
  overlap_ratio:
    min: 10
    max: 90
    unit: '%'
    value: 60
    description: 'Ensures uniform coverage on irregular MDF surfaces; 60% recommended for optimal cleaning without gaps or
      over-ablation, typical range 30-80% based on scan patterns. Source: Process optimization in J. Mater. Process. Technol.
      (2019).'
component_summary: These settings, with moderate 100 W power and short 10 ns pulses at 1064 nm, minimize thermal damage to
  heat-sensitive MDF, enabling precise contaminant removal without charring or structural compromise.
