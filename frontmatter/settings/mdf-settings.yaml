  power:
    min: 50
    max: 500
    value: 100
    unit: W
    description: 'Typical range for industrial laser cleaning of wood-based materials like MDF to avoid charring; starting
      at 100W for light contamination. Max safe before substrate damage (thermal degradation) is ~500W at 1064 nm. Source:
      IPG Photonics YLR series specs and studies on laser ablation of composites (e.g., J. Laser Appl. 2018).'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 1500
    description: 'Effective speeds for contamination removal on MDF; slower for heavy contamination (500-1000 mm/s) to ensure
      ablation, faster (2000-3000 mm/s) for light. Recommended 1500 mm/s balances efficiency and heat control. Source: Industry
      manuals from CleanLaser and process optimization in Opt. Lasers Eng. (2020).'
  pulse_width:
    min: 0.1
    max: 1000
    unit: ns
    value: 20
    description: 'Nanosecond regime preferred for MDF cleaning due to cost-effectiveness; picosecond (ps) or femtosecond reduces
      HAZ but unnecessary for most industrial apps. 20 ns minimizes thermal effects on low-conductivity MDF. Source: Laser
      physics reviews in Appl. Phys. A (2019) on pulsed laser cleaning of organics.'
  repetition_rate:
    min: 1
    max: 200
    unit: kHz
    value: 50
    description: 'Typical for 1064 nm cleaning; 50 kHz recommended for MDF to achieve fast coverage without excessive heat
      accumulation, trading off speed vs. thermal buildup in resinous material. Higher rates (>80 kHz) risk damage. Source:
      Academic literature, e.g., J. Appl. Phys. (2021) on pulse repetition in ablation.'
  energy_density:
    min: 0.1
    max: 20.0
    unit: J/cm²
    value: 2
    description: 'Fluence range for safe removal of contaminants from MDF; damage threshold ~5-10 J/cm² due to charring/melting
      (MDF decomposition ~200-300°C). Recommended 2 J/cm² for effective cleaning below threshold. Source: Ablation studies
      in Wood Sci. Technol. (2017) and laser threshold measurements.'
  spot_size:
    min: 0.1
    max: 500
    unit: μm
    value: 200
    description: 'Beam diameter for precise industrial cleaning; 200 μm recommended for MDF to balance resolution on fibrous
      surface and large-area coverage, avoiding excessive heat concentration. Finer for details (<150 μm), larger for broad
      prep (300-500 μm). Source: Equipment specs from Coherent and Trumpf lasers.'
  pass_count:
    min: 1
    max: 10
    unit: passes
    value: 2
    description: 'Single pass for light contamination, multi-pass (2-5) for heavy; 2 passes recommended for complete MDF surface
      prep without overexposure. Source: Industry case studies in laser cleaning of wood composites (e.g., Proc. SPIE 2022).'
  overlap_ratio:
    min: 10
    max: 90
    unit: '%'
    value: 60
    description: 'Ensures uniform coverage on irregular MDF surfaces; 60% recommended for optimal cleaning without gaps or
      over-ablation, typical range 30-80% based on scan patterns. Source: Process optimization in J. Mater. Process. Technol.
      (2019).'
challenges:
  thermal_management:
  - challenge: Charring and carbonization
    severity: high
    threshold_temperature: 250-300°C
    impact: Wood chars at low temperatures leaving black marks and structural damage
    solutions:
    - Use pulse mode with 2-5 second cooling between passes
    - Reduce power by 30-40% compared to metals
    - Increase scan speed to reduce dwell time
    - Monitor surface for discoloration; stop if browning occurs
  - challenge: Slow thermal diffusivity
    severity: medium
    property_value: 0.10-0.15 mm²/s (100x slower than aluminum)
    impact: Heat accumulates rapidly causing thermal damage zones
    solutions:
    - Increase cooling time between passes
    - Use lower repetition rates (<20 kHz)
    - Apply crosshatch patterns to distribute heat
  surface_characteristics:
  - challenge: Grain direction sensitivity
    severity: medium
    variation: 20-40% absorption variation by grain orientation
    impact: Laser absorption varies significantly with grain direction
    solutions:
    - Scan parallel to grain for consistent results
    - Use crosshatch pattern (0° and 90°) for uniform cleaning
    - Test on scrap to determine optimal scan direction
  - challenge: Porous structure with deep contamination
    severity: medium
    porosity_range: 12-65% (softwoods highest)
    impact: Contaminants penetrate deep into wood structure
    solutions:
    - Multiple passes with progressive power increase
    - Reduce scan speed for deeper penetration (600 mm/s)
    - Chemical pre-treatment for deep-seated contamination
  contamination_challenges:
  - challenge: Varnish and coating removal
    severity: medium
    impact: Thick coatings require multiple passes and generate smoke/fumes
    solutions:
    - First pass 80W fast (1500 mm/s) for bulk removal
    - Second pass 60W slow (800 mm/s) for residue
    - Use fume extraction to prevent redeposition
    - Limit to 2-3 passes maximum to avoid substrate damage
description: When laser cleaning MDF, the biggest hurdle is its porous structure. It soaks up heat unevenly. This leads to
  quick charring if you're not careful. I've seen surfaces bubble and delaminate from that buildup. Start low on power to
  let the laser gently lift dirt without penetrating deep. Its fibrous makeup differs from solid woods—more uniform but fragile
  under stress. That means you adjust scans slower for even coverage. Tends to absorb contaminants well, restoring finishes
  nicely in furniture or panels. But watch the edges; they fray easily. Keep passes light and overlapped just enough. In my
  experience, this brings back that smooth look without warping. Finally, avoid high energy bursts—they scorch the core and
  ruin the board.
