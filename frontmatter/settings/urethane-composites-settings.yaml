  power:
    min: 50
    max: 500
    value: 150
    unit: W
    description: 'Typical range for 1064 nm fiber lasers in polymer composite cleaning to balance ablation and heat management;
      starting at 150 W for light contamination on urethanes to avoid thermal degradation (melting point ~150-200°C). Max
      safe ~500 W to prevent substrate damage. Source: IPG Photonics equipment manuals for composite applications; academic
      review in Optics and Lasers in Engineering (2018) on polymer ablation thresholds.'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 1500
    description: 'Effective range for contamination removal; slower speeds (500-1000 mm/s) for heavy soiling, faster (2000-3000
      mm/s) for light prep. Recommended 1500 mm/s for optimal urethane cleaning to minimize heat accumulation given low thermal
      conductivity (~0.2 W/m·K). Source: Industry standards from Laser Clean Tech guidelines; case studies in Journal of Cleaner
      Production (2020) for industrial surface preparation.'
  pulse_width:
    min: 0.1
    max: 1000
    value: 50
    unit: ns
    description: 'Nanosecond regime preferred for urethanes to achieve clean ablation with minimal heat-affected zone (HAZ
      <10 μm); picosecond (ps) or femtosecond (fs) for ultra-sensitive cases but less common industrially due to cost. Avoid
      >200 ns to prevent melting. Source: Laser physics research in Applied Surface Science (2019) on polymer cleaning, showing
      ns pulses optimal for 1064 nm on low-reflectivity urethanes.'
  repetition_rate:
    min: 1
    max: 200
    value: 50
    unit: kHz
    description: 'Standard for pulsed 1064 nm cleaning; higher rates (>50 kHz) speed up process but risk heat buildup in low-conductivity
      urethanes, leading to charring. Recommended 50 kHz balances speed and safety. Source: Academic literature in Lasers
      in Engineering (2021); manufacturer specs from Coherent Inc. for composite delamination avoidance.'
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Fluence range for contaminant ablation without exceeding urethane damage threshold (~2-4 J/cm² at 1064 nm,
      due to moderate absorption). Recommended 1.5 J/cm² for safe removal of oils/paints. Conservative to account for composite
      variability. Source: Ablation threshold studies in Journal of Laser Applications (2017); SPIE proceedings on polymer
      laser interactions.'
  spot_size:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Beam diameter range for industrial cleaning; smaller (100-200 μm) for detailed prep, larger (300-500 μm)
      for broad areas. Recommended 200 μm for urethanes to ensure uniform energy distribution and reduce risk of localized
      overheating. Source: Equipment specifications from Adapt Laser Systems; optimization in Surface and Coatings Technology
      (2022).'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass (2-5) for heavy layers; recommended 2 passes for complete
      urethane surface prep to allow cooling between passes and prevent cumulative heat damage. Source: Industry practice
      in aerospace case studies (Composites Part B, 2019); CleanLaser application notes.'
  overlap_ratio:
    min: 10
    max: 90
    value: 60
    unit: '%'
    description: 'Ensures uniform coverage without excessive overlap-induced heating; 30-50% for large areas, 60-80% for precision.
      Recommended 60% for urethanes to achieve even cleaning while managing reflectivity variations (~20-50% at 1064 nm).
      Source: Process optimization studies in Optics Express (2020); manufacturer guidelines from Trumpf Laser.'
component_summary: These settings employ moderate 150 W power and 10 ns pulses at 1064 nm to ablate surface contaminants from
  urethane composites without causing thermal distortion or polymer degradation.
