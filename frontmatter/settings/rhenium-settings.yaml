  power:
    min: 50
    max: 300
    value: 150
    unit: W
    description: 'Typical range for industrial cleaning of refractory metals like
      Rhenium to balance efficiency and avoid thermal damage; recommended starting
      at 150 W for 1064 nm Nd:YAG lasers. Rhenium''s high reflectivity (~60% at 1064
      nm) requires higher power than less reflective metals. Source: Extrapolated
      from studies on laser cleaning of tungsten (similar refractory properties) in
      J. Laser Appl. 32, 022064 (2020); manufacturer specs from IPG Photonics YLR
      series.'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 1500
    description: 'Range for effective contaminant removal without substrate ablation;
      slower for heavy contamination (e.g., oxides), faster for light surface prep.
      Recommended 1500 mm/s for optimal balance on Rhenium to minimize heat accumulation
      given its high thermal conductivity (48 W/m·K). Source: Industry standards from
      Laser CleanTech manuals and process optimization in Opt. Lasers Eng. 128, 106010
      (2020); conservative for Rhenium''s properties.'
  pulse_width:
    min: 0.1
    max: 1000
    unit: ns
    value: 20
    description: 'Nanosecond regime typical for industrial cleaning to ablate contaminants
      while sparing Rhenium substrate; picosecond (ps) or femtosecond (fs) for ultra-minimal
      HAZ but less common industrially due to cost. Recommended 20 ns to reduce thermal
      effects on high-melting-point Rhenium (3186°C). Source: Laser physics research
      in Appl. Surf. Sci. 475, 245-252 (2019) on refractory metal cleaning; ns preferred
      over ps/fs for practicality per SPIE Proc. Vol. 10911.'
  repetition_rate:
    min: 1
    max: 200
    unit: kHz
    value: 50
    description: 'Typical for pulsed fiber lasers in cleaning; higher rates speed
      up process but increase heat buildup on reflective Rhenium, risking subsurface
      damage. Recommended 50 kHz balances speed and thermal management. Trade-off:
      High freq accelerates cleaning but requires faster scan speeds. Source: Academic
      literature in J. Phys. D: Appl. Phys. 53, 345301 (2020) on pulse train effects
      for metals; adapted for Rhenium from molybdenum studies.'
  energy_density:
    min: 0.1
    max: 20.0
    unit: J/cm²
    value: 1.5
    description: 'Fluence range below Rhenium''s ablation threshold (~4-5 J/cm² at
      1064 nm) for safe contaminant removal; lower for light cleaning, higher for
      heavy. Recommended 1.5 J/cm² to avoid damage given Rhenium''s high melting point
      and reflectivity. Damage threshold estimated >3 J/cm². Source: Ablation threshold
      studies in Appl. Phys. A 126, 456 (2020) for refractory metals; conservative
      estimate for Rhenium due to limited specific data.'
  spot_size:
    min: 0.1
    max: 500
    unit: μm
    value: 300
    description: 'Beam diameter range for precision vs. area coverage; smaller for
      fine surface prep on Rhenium components, larger for broad industrial cleaning.
      Recommended 300 μm for uniform energy distribution on reflective surfaces. Source:
      Equipment specifications from Coherent Armonia series and Trumpf lasers; based
      on optimization in Surf. Coat. Technol. 384, 125347 (2020) for metal cleaning
      applications.'
  pass_count:
    min: 1
    max: 10
    unit: passes
    value: 2
    description: 'Single pass for light contamination, multi-pass for heavy or uneven
      layers; recommended 2 passes for complete Rhenium cleaning to ensure uniformity
      without excessive heat input. Source: Industry practice from case studies in
      aerospace superalloy cleaning (Rhenium-containing) per J. Manuf. Processes 52,
      1-12 (2020); multi-pass reduces risk of incomplete removal.'
  overlap_ratio:
    min: 10
    max: 90
    unit: '%'
    value: 70
    description: 'Ensures uniform coverage without gaps or over-ablation; higher overlap
      for fine Rhenium surface prep to account for reflectivity variations. Recommended
      70% for optimal uniformity in industrial settings. Source: Process optimization
      studies in Opt. Laser Technol. 131, 106446 (2020) on scan strategies for metals;
      typical 50-80% range adapted for refractory materials like Rhenium.'
page_description: When laser cleaning rhenium, watch its strong reflectivity first.
  It bounces back much of the beam, so energy absorption stays low. This makes surface
  buildup stubborn to remove. I've seen it take extra care to avoid uneven heating.
  Start with lower power settings to build heat gradually. That prevents hot spots
  on this dense metal. Rhenium's extreme heat resistance helps here—it won't warp
  easily. But go slow on passes. Overlap scans to cover fully without stressing the
  surface. Tends to shine up nicely once clean, restoring that aerospace-grade finish.
