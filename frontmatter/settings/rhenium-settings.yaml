pageTitle: Rhenium Settings
pageDescription: When laser cleaning rhenium, watch its strong reflectivity first. It bounces back much of the beam, so energy
  absorption stays low. This makes surface buildup stubborn to remove. I've seen it take extra care to avoid uneven heating.
  Start with lower power settings to build heat gradually. That prevents hot spots on this dense metal. Rhenium's extreme
  heat resistance helps here—it won't warp easily. But go slow on passes. Overlap scans to cover fully without stressing the
  surface. Tends to shine up nicely once clean, restoring that aerospace-grade finish.
