  power:
    min: 50
    max: 500
    value: 100
    unit: W
    description: 'Typical range for 1064 nm pulsed lasers in industrial cleaning of delicate substrates like soda-lime glass
      to remove contaminants without thermal damage; starting at 100 W for controlled ablation. Max limited to avoid heat
      accumulation given glass''s low thermal conductivity (~1 W/m·K). Source: Manufacturer specs from IPG Photonics and Coherent
      for YAG lasers; academic review in ''Laser Cleaning'' by Kononenko et al. (Optics and Lasers in Engineering, 2016).'
  scan_speed:
    min: 10
    max: 5000
    value: 1500
    unit: mm/s
    description: 'Effective range for contaminant removal on glass surfaces; slower speeds (e.g., 500 mm/s) for heavy contamination
      like oils/paints, faster (up to 3000 mm/s) for light dust. Recommended 1500 mm/s balances efficiency and minimal heat
      input. Source: Industry standards from Laser Cleaning Europe guidelines and equipment manuals (e.g., Adapt Laser Systems);
      case studies in Journal of Cultural Heritage (2018) for glass artifacts.'
  pulse_width:
    min: 0.1
    max: 1000
    unit: ns
    value: 20
    description: 'Nanosecond regime (5-100 ns) preferred for cost-effective cleaning with sufficient peak power for contaminant
      ejection; picosecond (ps) or femtosecond (fs) reduce heat-affected zone (HAZ) but are overkill for most industrial glass
      cleaning due to transparency at 1064 nm. Recommended 20 ns minimizes thermal diffusion in glass (melting point ~500°C).
      Source: Laser physics research in Applied Surface Science (e.g., Palmieri et al., 2019) on ns vs. ps for dielectrics.'
  repetition_rate:
    min: 1
    max: 200
    unit: kHz
    value: 50
    description: 'Typical 10-100 kHz for pulsed cleaning; higher rates speed up process but risk heat accumulation on low-conductivity
      glass (reflectivity ~4% at 1064 nm). Recommended 50 kHz for optimal balance in contaminant removal without substrate
      heating. Source: Academic literature in Optics Express (e.g., Anisimov et al., 2015) on repetition rate effects in laser
      ablation of glasses.'
  energy_density:
    min: 0.1
    max: 20.0
    value: 0.5
    unit: J/cm²
    description: 'Fluence range for safe cleaning of contaminants; damage threshold for soda-lime glass at 1064 nm ns pulses
      is ~10-15 J/cm², so stay below 2 J/cm². Recommended 0.5 J/cm² for effective removal of industrial contaminants like
      rust/oils without cracking. Source: Ablation threshold studies in Journal of Applied Physics (e.g., Stuart et al., 1996)
      and Laser & Particle Beams (2017) for IR cleaning of dielectrics.'
  spot_size:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Beam diameter range for precision cleaning; smaller spots (100 μm) for fine details on glass, larger (500
      μm) for broad areas. Recommended 200 μm suits industrial surface preparation on soda-lime glass to ensure uniform fluence.
      Source: Equipment specifications from Trumpf and CleanLaser systems; process studies in Applied Optics (2020).'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, up to 5 for heavy layers; multi-pass preferred for glass to distribute
      energy and avoid damage. Recommended 2 passes for complete removal in industrial settings. Source: Industry practice
      from case studies in Surface and Coatings Technology (e.g., 2014 paper on glass cleaning) and manufacturer guidelines
      (e.g., Lasertec).'
  overlap_ratio:
    min: 10
    max: 90
    value: 50
    unit: '%'
    description: 'Typical 30-80% for uniform coverage without gaps or over-exposure; 50% recommended for soda-lime glass to
      ensure even cleaning while minimizing total energy input and potential thermal stress. Source: Process optimization
      studies in Lasers in Manufacturing and Materials Processing (2019) and industry standards from SPIE proceedings on scan
      strategies.'
challenges:
  thermal_management:
  - challenge: Thermal shock and catastrophic failure
    severity: critical
    threshold_temperature: ΔT > 40-100°C rapid cooling (glass-dependent)
    impact: Glass shatters from thermal gradients due to low thermal expansion and brittleness
    solutions:
    - Use pulse mode with 5-8 second cooling between passes
    - Preheat substrate to room temperature before cleaning
    - Avoid cold spots (air vents, cold backing) during processing
    - Tempered glass more resistant but still susceptible to thermal shock
    - Monitor for stress fractures; stop immediately if cracks appear
  - challenge: Low thermal diffusivity
    severity: high
    property_value: 0.01-15 mm²/s (most glasses 0.5-1.0 mm²/s)
    impact: Heat accumulates in localized zones creating thermal gradients
    solutions:
    - Reduce power by 30-40% compared to metals
    - Increase scan speed to distribute heat (1000-2000 mm/s)
    - Use defocused beam to spread energy over larger area
    - Optical-grade glass (fused silica) tolerates higher power
  surface_characteristics:
  - challenge: Surface defects and stress concentrators
    severity: high
    impact: Scratches, chips, and inclusions dramatically lower damage threshold
    solutions:
    - Inspect surface with magnification before cleaning
    - Reduce power 40-50% for scratched or damaged glass
    - Clean around defects with extreme caution
    - Polished optical glass requires different parameters than rough architectural glass
  - challenge: Coating and film removal
    severity: medium
    impact: Thin films, anti-reflective coatings, and tints have different damage thresholds than substrate
    solutions:
    - Test on edge first to determine coating removal threshold
    - Coated glass may require 40-60W initial pass
    - Bare glass requires 20-30% lower power after coating removal
    - AR coatings very sensitive - use 30-40W maximum
  contamination_challenges:
  - challenge: Adhesive and paint removal
    severity: medium
    impact: Thick coatings require multiple passes and generate debris that can scratch glass
    solutions:
    - First pass 60W fast (1800 mm/s) for bulk removal
    - Second pass 40W slow (1000 mm/s) for residue
    - Use air assist to blow debris away from surface
    - Chemical pre-treatment reduces laser exposure time
    - Avoid dragging ablated material across clean areas
description: When laser cleaning soda-lime glass, unlike more heat-resistant borosilicates, you must prioritize its quick
  thermal expansion to avoid cracks. Start with low energy pulses for safe contaminant removal. This everyday glass stays
  brittle under uneven heating, so keep passes short and overlap minimally midway through. You should always cool the surface
  between shots—it prevents shattering while clearing buildup effectively.
