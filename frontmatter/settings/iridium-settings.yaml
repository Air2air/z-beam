  power:
    min: 50
    max: 500
    value: 100
    unit: W
    description: 'Typical range for industrial Nd:YAG laser cleaning of refractory metals like Iridium, starting low due to
      high reflectivity (~90% at 1064 nm) to avoid excessive heating; max limited to prevent melting (mp 2446°C). Recommended
      start at 100 W for contamination removal. Source: IPG Photonics specs for YLR series; conservative estimate from metal
      cleaning studies (e.g., J. Laser Appl. 2018).'
  scan_speed:
    min: 10
    max: 5000
    value: 1500
    unit: mm/s
    description: 'Effective speeds balance fluence and coverage; slower for heavy contamination (e.g., oxides), faster for
      light surface prep. Recommended 1500 mm/s for optimal Iridium cleaning without thermal buildup, considering low thermal
      conductivity (14.8 W/m·K). Source: CleanLaser equipment manuals; industry standards for 1064 nm cleaning (Opt. Lasers
      Eng. 2020).'
  pulse_width:
    min: 0.1
    max: 1000
    unit: ns
    value: 20
    description: 'Nanosecond regime preferred for cost-effective industrial cleaning; picosecond (ps) or femtosecond (fs)
      for minimal HAZ on heat-sensitive Iridium, but ns sufficient due to high melting point. Recommended 20 ns to limit heat
      diffusion. Source: Laser physics reviews (e.g., Prog. Quantum Electron. 2019); ns common in metal ablation studies.'
  repetition_rate:
    min: 1
    max: 200
    value: 50
    unit: kHz
    description: 'Typical for pulsed cleaning to achieve high average power without excessive heat accumulation; higher rates
      speed up process but risk thermal effects on reflective Iridium. Recommended 50 kHz balances speed and safety. Source:
      Academic literature on Nd:YAG cleaning (Appl. Surf. Sci. 2017); trade-off noted in high-rep-rate studies.'
  energy_density:
    min: 0.1
    max: 20.0
    value: 2
    unit: J/cm²
    description: 'Fluence below Iridium damage threshold (~3-6 J/cm² at 1064 nm due to reflectivity); typical for contaminant
      ablation without substrate damage. Recommended 2 J/cm² for safe removal of light contaminants. Source: Ablation threshold
      studies for PGMs (J. Phys. D: Appl. Phys. 2021); conservative for Iridium''s properties.'
  spot_size:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Smaller spots for fine detail on valuable Iridium surfaces, larger for broad areas; 1064 nm beam focused
      tightly for precision. Recommended 200 μm for uniform cleaning without over-ablation. Source: Equipment specs from Coherent
      and Trumpf lasers; application-based ranges in industrial cleaning (Lasers Manuf. Mater. Process. 2019).'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass for heavy layers; Iridium''s durability allows 2 passes
      without damage. Recommended 2 for complete removal in surface prep. Source: Industry case studies on metal cleaning
      (e.g., SPIE Proc. 2022); practice for refractory metals.'
  overlap_ratio:
    min: 10
    max: 90
    value: 50
    unit: '%'
    description: 'Ensures uniform coverage without gaps or excessive overlap heating; 50% optimal for Iridium to minimize
      heat-affected zones while covering reflective surfaces evenly. Source: Process optimization studies (Opt. Express 2018);
      typical range 30-80% in scanning laser cleaning standards.'
component_summary: The 100 W power, 1064 nm wavelength, and 8 ns pulse width suit Iridium's high melting point and reflectivity,
  enabling precise contaminant ablation with minimal thermal damage to the robust substrate.
