machineSettings:
  powerRange:
    description: Optimal average power for Hafnium oxide removal without substrate damage
    unit: W
    value: 100
    min: 1.0
    max: 120
  wavelength:
    description: Near-IR wavelength optimized for Hafnium's absorption characteristics
    unit: nm
    value: 1064
    min: 355
    max: 10640
  spotSize:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Beam diameter range for uniform cleaning; smaller for fine details, larger for broad areas. 200 μm recommended
      for Hafnium surface prep to control fluence on reflective surfaces. Source: Equipment specs from Coherent and Trumpf
      laser cleaning systems.'
  repetitionRate:
    min: 1
    max: 200
    value: 50
    unit: kHz
    description: 'Typical for pulsed 1064 nm lasers in cleaning; higher rates speed up process but risk heat buildup on reflective
      Hafnium surfaces. 50 kHz balances speed and thermal management. Trade-off: High freq accelerates cleaning but may require
      lower fluence. Source: Academic literature on pulse train effects (e.g., Opt. Lasers Eng. reviews).'
  fluenceThreshold:
    description: Minimum fluence required for effective Hafnium oxide removal
    unit: J/cm²
    value: 2.5
    min: 0.3
    max: 4.5
  pulseWidth:
    min: 0.1
    max: 1000
    unit: ns
    value: 20
    description: 'Nanosecond regime preferred for 1064 nm cleaning of metals to achieve plasma-induced removal with minimal
      heat-affected zone (HAZ); picosecond (ps) or femtosecond (fs) reduce HAZ further but increase cost. 20 ns recommended
      for Hafnium to limit thermal diffusion. Source: Laser physics studies on refractory metals (e.g., J. Appl. Phys. on
      ns ablation thresholds).'
  scanSpeed:
    min: 10
    max: 5000
    value: 1500
    unit: mm/s
    description: 'Effective speeds for contamination removal on metals; slower for heavy contamination (e.g., oxides) to ensure
      fluence delivery, faster for light surface prep. Recommended 1500 mm/s for Hafnium to minimize heat accumulation due
      to its moderate thermal conductivity (~23 W/mK). Source: Industry standards from Laserax equipment manuals for 1064
      nm cleaning processes.'
  passCount:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass for heavy layers; 2 passes recommended for complete Hafnium
      cleaning to ensure removal without excessive energy input. Source: Industry case studies on metal surface preparation
      (e.g., SPIE proceedings on laser cleaning protocols).'
  overlapRatio:
    min: 10
    max: 90
    value: 70
    unit: '%'
    description: 'Ensures uniform coverage without gaps or over-ablation; 70% typical for metals like Hafnium to account for
      beam Gaussian profile and reflectivity variations. Source: Process optimization studies (e.g., J. Laser Appl. on scan
      strategies for industrial cleaning).'
  power:
    min: 50
    max: 500
    value: 200
    unit: W
    description: 'Typical range for industrial cleaning of reflective refractory metals like Hafnium using 1064 nm lasers;
      starting at 200 W balances efficiency and safety to avoid thermal damage given Hafnium''s high melting point (2233°C)
      and reflectivity. Max limited to prevent substrate ablation. Source: Adapted from IPG Photonics YLR series specs for
      metal surface preparation (e.g., 100-1000 W systems).'
  energyDensity:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Fluence range for contaminant ablation without damaging Hafnium substrate; damage threshold ~5-10 J/cm²
      at 1064 nm due to high reflectivity. Recommended 1.5 J/cm² for safe removal of light contaminants. Conservative estimate
      as Hafnium-specific data is limited; extrapolated from similar metals. Source: Ablation threshold studies (e.g., Appl.
      Surf. Sci. on refractory metal cleaning).'
componentSummary: These settings ensure precise contaminant removal from Hafnium's robust, high-melting-point surface, with
  200 W power and 10 ns pulses minimizing heat buildup while the 1064 nm wavelength optimizes metal absorption.
