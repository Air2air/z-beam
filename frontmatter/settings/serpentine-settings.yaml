page_description: When laser cleaning Serpentine, you'll want to address its relative softness first. This stone scratches
  easily compared to harder granites. Start with reduced power to prevent surface pitting. Its low heat spreading means energy
  stays local. Adjust scan speeds higher to avoid hot spots. Serpentine absorbs laser light well unlike reflective marbles.
  This speeds removal of dirt but risks quick heating. Use multiple light passes to control buildup. The material's slight
  porosity holds grime deep. Pre-test on edges reveals weak spots. Overlap beams carefully to restore even texture. Serpentine
  differs from dense limestones by flexing under stress. Lower fluence helps maintain its natural layers. Watch for cracking
  in thin sections. Always finish with a cooling interval to reduce thermal shock.
