    unit: W
    description: 'Typical range for Nd:YAG laser cleaning of silicates like serpentine to remove contaminants without substrate
      ablation; starting at 100W for light contamination. Max avoids thermal damage given serpentine''s low thermal conductivity
      (~2 W/m·K). Source: General manufacturer specs (e.g., IPG Photonics systems for stone cleaning) and studies on mineral
      ablation (e.g., Paljk et al., J. Cult. Herit., 2010).'
  scan_speed:
    min: 10
    max: 5000
    value: 800
    unit: mm/s
    description: 'Effective for contaminant removal on serpentine; slower for heavy contamination (200-500 mm/s), faster for
      light (1000-2000 mm/s). Recommended balances cleaning efficiency and heat input. Source: Industry standards from laser
      cleaning equipment manuals (e.g., Adapt-Laser systems) and process optimization for stone surfaces.'
  pulse_width:
    min: 0.1
    max: 1000
    unit: ns
    value: 15
    description: 'Nanosecond regime preferred for cost-effective cleaning of serpentine with minimal heat-affected zone (HAZ
      <10 μm); picosecond (ps) or femtosecond reduces HAZ further but less common industrially. Avoids excessive melting (serpentine
      melting ~1100°C). Source: Laser physics research on silicate ablation (e.g., Anisimov et al., Appl. Surf. Sci., 1999).'
  repetition_rate:
    min: 1
    max: 200
    value: 20
    unit: kHz
    description: 'Typical for pulsed cleaning to control heat accumulation on low-conductivity serpentine; higher rates speed
      up process but risk thermal buildup. Recommended for balanced throughput. Source: Academic literature on pulse train
      effects in stone cleaning (e.g., Pouli et al., Lasers Archaeol., 2007).'
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.0
    unit: J/cm²
    description: 'Fluence range for contaminant ablation without exceeding serpentine damage threshold (~3 J/cm² at 1064 nm
      due to moderate reflectivity ~0.3-0.5). Recommended for safe surface preparation. Conservative estimate for uncertain
      exact threshold. Source: Ablation threshold studies on minerals (e.g., Lazic et al., Spectrochim. Acta B, 2003).'
  spot_size:
