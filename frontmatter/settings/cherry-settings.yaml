description: >-
  When laser cleaning Cherry, start with its high porosity. This property absorbs laser energy quickly, so you must use
  low power settings to remove contaminants without scorching the surface. Its low density helps the process by allowing
  even heat distribution, but watch for splintering in the middle of the job. Adjust scan speed higher to reduce dwell
  time on porous areas. Make sure you overlap passes minimally to avoid uneven ablation. These steps restore the wood's
  natural grain effectively.
