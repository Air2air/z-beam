  power:
    min: 20
    max: 200
    value: 50
    unit: W
    description: 'Typical range for wood cleaning at 1064 nm to remove contaminants without charring; starting at 50 W for
      delicate hardwoods like cherry to minimize thermal damage. Max safe ~200 W to avoid substrate ablation. Source: Studies
      on laser cleaning of wood (e.g., Journal of Cultural Heritage, 2018); IPG Photonics YLR series specs for cleaning applications.'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 500
    description: 'Effective speeds for contaminant removal on wood; 500 mm/s recommended for optimal balance of cleaning efficiency
      and heat control on cherry wood. Slower (100-500 mm/s) for heavy contamination, faster (1000-2000 mm/s) for light. Source:
      Industry standards from Laser Cleaning Europe guidelines and equipment manuals (e.g., Adapt Laser Systems).'
  pulse_width:
    min: 0.1
    max: 1000
    value: 20
    unit: ns
    description: 'Nanosecond regime preferred for wood to ablate contaminants with minimal heat-affected zone; 20 ns recommended
      for cherry to reduce thermal diffusion given wood''s low conductivity (~0.16 W/m·K). Picosecond (ps) or femtosecond
      optional for ultra-precision but less common industrially. Source: Laser physics research in Optics and Lasers in Engineering
      (2020).'
  repetition_rate:
    min: 1
    max: 200
    value: 30
    unit: kHz
    description: 'Typical for pulsed cleaning of organics; 30 kHz balances speed and heat accumulation on cherry wood (reflectivity
      ~40% at 1064 nm, melting point N/A but charring >200°C). Higher rates increase speed but risk buildup. Source: Academic
      literature, e.g., Applied Surface Science (2019) on wood laser processing.'
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Fluence range for safe contaminant removal; cherry wood damage threshold ~8-12 J/cm² at 1064 nm due to low
      thermal conductivity. 1.5 J/cm² recommended for cleaning without substrate harm. Source: Ablation threshold studies
      in Journal of Applied Physics (2017) for hardwoods.'
  spot_size:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Beam diameter for precise cleaning; 200 μm recommended for cherry surface preparation to cover details without
      overexposure. Smaller for fine work, larger for broad areas. Source: Equipment specs from Coherent and Trumpf laser
      cleaning systems.'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Multi-pass for thorough removal on wood; 2 passes recommended for cherry to ensure complete contamination
      clearance while monitoring for discoloration. Single pass for light soils. Source: Industry case studies in restoration
      (e.g., ICALEO proceedings, 2021).'
  overlap_ratio:
    min: 10
    max: 90
    value: 60
    unit: '%'
    description: 'Ensures uniform coverage; 60% recommended for cherry to avoid gaps or excessive overlap heating, given wood''s
      sensitivity. Source: Process optimization in Laser & Photonics Reviews (2016).'
page_description: When laser cleaning Cherry, start with its high porosity. This property absorbs laser energy quickly, so
  you must use low power settings to remove contaminants without scorching the surface. Its low density helps the process
  by allowing even heat distribution, but watch for splintering in the middle of the job. Adjust scan speed higher to reduce
  dwell time on porous areas. Make sure you overlap passes minimally to avoid uneven ablation. These steps restore the wood's
  natural grain effectively.
