  scan_speed:
    min: 10
    max: 5000
    value: 500
    unit: mm/s
    description: 'Slower speeds ensure effective removal without overheating; 500 mm/s optimal for uniform cleaning on plywood,
      adjustable for light (faster) vs heavy (slower) contamination (source: industry manuals from Laserax and IPG Photonics).'
  pulse_width:
    min: 0.1
    max: 1000
    unit: ns
    value: 20
    description: 'Nanosecond pulses preferred over ps/fs for cost-effective ablation with minimal HAZ on low-conductivity
      plywood; 20 ns balances efficiency and heat control (source: laser physics reviews in Opt. Lasers Eng. 2020).'
