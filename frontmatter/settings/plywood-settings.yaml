  power:
    min: 20
    max: 200
    value: 50
    unit: W
    description: 'Low to moderate power prevents charring of plywood''s organic layers; starting at 50W for light contamination,
      max avoids substrate damage (source: studies on 1064 nm cleaning of wood composites, e.g., J. Laser Appl. 2018).'
  scan_speed:
    min: 10
    max: 5000
    value: 500
    unit: mm/s
    description: 'Slower speeds ensure effective removal without overheating; 500 mm/s optimal for uniform cleaning on plywood,
      adjustable for light (faster) vs heavy (slower) contamination (source: industry manuals from Laserax and IPG Photonics).'
  pulse_width:
    min: 0.1
    max: 1000
    unit: ns
    value: 20
    description: 'Nanosecond pulses preferred over ps/fs for cost-effective ablation with minimal HAZ on low-conductivity
      plywood; 20 ns balances efficiency and heat control (source: laser physics reviews in Opt. Lasers Eng. 2020).'
  repetition_rate:
    min: 1
    max: 200
    value: 20
    unit: kHz
    description: 'Moderate rates for controlled energy delivery; 20 kHz recommended to avoid heat accumulation in plywood
      while enabling faster cleaning than low rates (source: academic literature on pulsed laser cleaning of organics, Appl.
      Surf. Sci. 2019).'
  energy_density:
    min: 0.1
    max: 20.0
    value: 0.5
    unit: J/cm²
    description: 'Fluence below plywood''s ~1.2 J/cm² damage threshold for safe contaminant ablation; 0.5 J/cm² typical for
      surface preparation (source: ablation threshold studies for wood, e.g., Wood Sci. Technol. 2017).'
  spot_size:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Smaller spots for precision on plywood''s textured surface; 200 μm recommended for large-area cleaning without
      excessive overlap issues (source: equipment specs from Coherent and Adapt Laser Systems).'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Multi-pass for thorough removal of contaminants without single-pass overheating; 2 passes standard for plywood
      to minimize damage (source: industry case studies on wood surface preparation, Laser Cleaning Handbook 2021).'
  overlap_ratio:
    min: 10
    max: 90
    value: 70
    unit: '%'
    description: 'Ensures uniform coverage on irregular plywood surfaces; 70% balances efficiency and even cleaning (source:
      process optimization in J. Clean. Prod. 2022).'
component_summary: These settings use moderate power and short pulses at 1064 nm to gently ablate surface contaminants from
  plywood, minimizing charring and preserving the wood's delicate fibrous structure.
