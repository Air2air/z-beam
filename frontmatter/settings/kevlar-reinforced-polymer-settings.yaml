  power:
    min: 10
    max: 200
    value: 50
    unit: W
    description: 'Typical range for pulsed fiber lasers in polymer composite cleaning to avoid thermal damage; start at 50
      W for initial tests on Kevlar-reinforced polymer due to its low thermal conductivity (~0.3 W/m·K). Max safe ~150-200
      W to prevent matrix degradation. Source: IPG Photonics specs for YLR series; studies in J. Laser Appl. (2018) on composite
      surface prep.'
  scan_speed:
    min: 10
    max: 5000
    value: 1000
    unit: mm/s
    description: 'Effective speeds balance cleaning efficiency and heat input; slower for heavy contamination (500-1000 mm/s),
      faster for light (2000-3000 mm/s). Recommended 1000 mm/s for uniform removal on Kevlar without fiber disruption. Source:
      Industry standards from Laserax manuals; Opt. Lasers Eng. (2020) case studies on polymer ablation.'
  pulse_width:
    min: 0.1
    max: 1000
    unit: ns
    value: 20
    description: 'Nanosecond regime preferred for cost-effective cleaning with minimal HAZ; picosecond (ps) or femtosecond
      reduces thermal effects but increases cost. 20 ns optimal for Kevlar to limit heat diffusion in low-conductivity matrix.
      Avoid >100 ns to prevent melting (~450°C decomposition). Source: Laser physics in Appl. Phys. A (2019) on aramid composites.'
  repetition_rate:
    min: 1
    max: 200
    value: 30
    unit: kHz
    description: 'Lower rates reduce heat accumulation in heat-sensitive Kevlar; high rates (>50 kHz) speed cleaning but risk
      substrate damage. 30 kHz balances speed and safety for contamination removal. Trade-off: higher freq increases throughput
      but elevates surface temp. Source: Academic lit. in J. Clean. Prod. (2021) on pulsed laser parameters for polymers.'
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.0
    unit: J/cm²
    description: 'Fluence below damage threshold (~2-4 J/cm² for Kevlar epoxy composites at 1064 nm) for safe cleaning; 0.2-1
      J/cm² for light contaminants, up to 3 J/cm² for heavy. Recommended 1 J/cm² to ablate surface without fiber/matrix harm.
      Source: Ablation studies in Compos. Part B (2017); damage thresholds from SPIE Proc. (2022).'
  spot_size:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Smaller spots for precision on textured Kevlar surfaces, larger for broad areas; 100-300 μm for fine cleaning,
      300-500 μm for large-scale prep. 200 μm recommended to match Kevlar weave (~100-200 μm fibers) and ensure even fluence.
      Source: Equipment specs from Coherent Inc.; process opt. in Lasers Manuf. Mater. Process. (2020).'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass (2-5) for stubborn residues; 2 passes typical for Kevlar
      to achieve complete removal without cumulative heat damage. Multi-pass allows lower fluence per pass. Source: Industry
      practice in case studies from Adapt Laser Systems; J. Mater. Process. Technol. (2019).'
  overlap_ratio:
    min: 10
    max: 90
    value: 60
    unit: '%'
    description: 'Ensures uniform coverage without gaps or over-ablation; 30-50% for fast scans, 60-80% for thorough cleaning
      on irregular Kevlar surfaces. 60% recommended for even contaminant removal while minimizing total energy input. Source:
      Process optimization in Opt. Laser Technol. (2021); standards from scanning system manuals like Scanlab.'
component_summary: These settings, featuring moderate 50 W power and 15 ns pulses at 1064 nm, enable gentle ablation of contaminants
  from Kevlar Reinforced Polymer while minimizing thermal degradation of its fiber-matrix composite.
