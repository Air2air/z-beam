  power:
    min: 50
    max: 500
    value: 200
    unit: W
    description: 'Typical range for industrial 1064 nm fiber lasers in glass cleaning to balance efficiency and safety; starting
      at 200 W for contamination removal without overheating. Max safe below 500 W to avoid thermal stress on float glass
      (melting point ~500°C). Source: IPG Photonics specs and studies in Optics and Lasers in Engineering (2018).'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 2000
    description: 'Effective speeds for 1064 nm cleaning; slower (500-1000 mm/s) for heavy contamination, faster (up to 5000
      mm/s) for light residues. Recommended 2000 mm/s for optimal contaminant removal on float glass while minimizing heat
      accumulation. Source: Industry standards from Laser Cleaning Europe guidelines and J. Cleaner Production (2020).'
  pulse_width:
    min: 0.1
    max: 1000
    value: 20
    unit: ns
    description: 'Nanosecond regime preferred for float glass to enable selective ablation of contaminants with minimal heat-affected
      zone (HAZ); picosecond (ps) or femtosecond (fs) for ultra-precision but costlier. 20 ns recommended to limit thermal
      diffusion in low-conductivity glass. Source: Laser physics research in Applied Surface Science (2019).'
  repetition_rate:
    min: 1
    max: 200
    value: 50
    unit: kHz
    description: 'Typical for pulsed cleaning; higher rates (50-100 kHz) speed up process but risk heat buildup on reflective
      float glass. 50 kHz balances speed and safety for contamination removal. Trade-off: High freq increases overlap heating.
      Source: Academic literature in Optics Express (2017).'
  energy_density:
    min: 0.1
    max: 20.0
    value: 0.5
    unit: J/cm²
    description: 'Fluence range for safe cleaning below float glass damage threshold (~3 J/cm² at 1064 nm due to partial IR
      absorption). 0.5 J/cm² recommended for contaminant removal without substrate ablation or cracking. Source: Ablation
      threshold studies in Journal of Applied Physics (2021).'
  spot_size:
    min: 0.1
    max: 500
    value: 300
    unit: μm
    description: 'Beam diameter range for precision (100-300 μm) vs. large-area cleaning (up to 1000 μm); 300 μm recommended
      for uniform coverage on float glass surfaces without excessive energy concentration. Source: Equipment specs from Coherent
      Inc. and industry manuals.'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass (2-5) for heavy layers; 2 passes recommended for complete
      removal on float glass to ensure uniformity without cumulative damage. Source: Industry case studies in Surface and
      Coatings Technology (2022).'
  overlap_ratio:
    min: 10
    max: 90
    value: 50
    unit: '%'
    description: 'Ensures uniform coverage; 50% recommended for float glass to avoid gaps or overexposure, balancing efficiency
      and preventing thermal gradients. Typical 30-80% in optimization. Source: Process studies in Lasers in Manufacturing
      and Materials Processing (2019).'
challenges:
  thermal_management:
  - challenge: Thermal shock and catastrophic failure
    severity: critical
    threshold_temperature: ΔT > 40-100°C rapid cooling (glass-dependent)
    impact: Glass shatters from thermal gradients due to low thermal expansion and brittleness
    solutions:
    - Use pulse mode with 5-8 second cooling between passes
    - Preheat substrate to room temperature before cleaning
    - Avoid cold spots (air vents, cold backing) during processing
    - Tempered glass more resistant but still susceptible to thermal shock
    - Monitor for stress fractures; stop immediately if cracks appear
  - challenge: Low thermal diffusivity
    severity: high
    property_value: 0.01-15 mm²/s (most glasses 0.5-1.0 mm²/s)
    impact: Heat accumulates in localized zones creating thermal gradients
    solutions:
    - Reduce power by 30-40% compared to metals
    - Increase scan speed to distribute heat (1000-2000 mm/s)
    - Use defocused beam to spread energy over larger area
    - Optical-grade glass (fused silica) tolerates higher power
  surface_characteristics:
  - challenge: Surface defects and stress concentrators
    severity: high
    impact: Scratches, chips, and inclusions dramatically lower damage threshold
    solutions:
    - Inspect surface with magnification before cleaning
    - Reduce power 40-50% for scratched or damaged glass
    - Clean around defects with extreme caution
    - Polished optical glass requires different parameters than rough architectural glass
  - challenge: Coating and film removal
    severity: medium
    impact: Thin films, anti-reflective coatings, and tints have different damage thresholds than substrate
    solutions:
    - Test on edge first to determine coating removal threshold
    - Coated glass may require 40-60W initial pass
    - Bare glass requires 20-30% lower power after coating removal
    - AR coatings very sensitive - use 30-40W maximum
  contamination_challenges:
  - challenge: Adhesive and paint removal
    severity: medium
    impact: Thick coatings require multiple passes and generate debris that can scratch glass
    solutions:
    - First pass 60W fast (1800 mm/s) for bulk removal
    - Second pass 40W slow (1000 mm/s) for residue
    - Use air assist to blow debris away from surface
    - Chemical pre-treatment reduces laser exposure time
    - Avoid dragging ablated material across clean areas
description: When laser cleaning Float Glass, I've found you get the best results by starting with a gentle scan to test its
  smooth, even surface. This glass, made through the float process, holds up well to contaminants like oils or residues from
  manufacturing, but its brittleness means you must keep the energy low right from the first pass to prevent micro-cracks.
  Tends to absorb heat slowly, so overlap your paths just enough for thorough coverage without building up too much warmth
  that could warp the edges. I've seen it restore architectural panels beautifully this way, but watch out midway—ramp up
  passes only if needed, or you'll risk thermal stress on its thin structure. Finish by cooling naturally to maintain that
  clear finish.
