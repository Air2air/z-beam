description: >-
  When laser cleaning Float Glass, I've found you get the best results by starting with a gentle scan to test its
  smooth, even surface. This glass, made through the float process, holds up well to contaminants like oils or residues
  from manufacturing, but its brittleness means you must keep the energy low right from the first pass to prevent
  micro-cracks. Tends to absorb heat slowly, so overlap your paths just enough for thorough coverage without building up
  too much warmth that could warp the edges. I've seen it restore architectural panels beautifully this way, but watch
  out midway—ramp up passes only if needed, or you'll risk thermal stress on its thin structure. Finish by cooling
  naturally to maintain that clear finish.
