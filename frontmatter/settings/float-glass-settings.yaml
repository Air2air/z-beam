machineSettings:
  powerRange:
    description: Optimal average power for Float Glass surface cleaning without thermal damage
    unit: W
    value: 100
    min: 1.0
    max: 120
  wavelength:
    description: Near-IR wavelength optimized for Float Glass absorption and minimal subsurface damage
    unit: nm
    value: 1064
    min: 355
    max: 10640
  spotSize:
    min: 0.1
    max: 500
    value: 300
    unit: μm
    description: 'Beam diameter range for precision (100-300 μm) vs. large-area cleaning (up to 1000 μm); 300 μm recommended
      for uniform coverage on float glass surfaces without excessive energy concentration. Source: Equipment specs from Coherent
      Inc. and industry manuals.'
  repetitionRate:
    min: 1
    max: 200
    value: 50
    unit: kHz
    description: 'Typical for pulsed cleaning; higher rates (50-100 kHz) speed up process but risk heat buildup on reflective
      float glass. 50 kHz balances speed and safety for contamination removal. Trade-off: High freq increases overlap heating.
      Source: Academic literature in Optics Express (2017).'
  energyDensity:
    min: 0.1
    max: 20.0
    value: 0.5
    unit: J/cm²
    description: 'Fluence range for safe cleaning below float glass damage threshold (~3 J/cm² at 1064 nm due to partial IR
      absorption). 0.5 J/cm² recommended for contaminant removal without substrate ablation or cracking. Source: Ablation
      threshold studies in Journal of Applied Physics (2021).'
  pulseWidth:
    min: 0.1
    max: 1000
    value: 20
    unit: ns
    description: 'Nanosecond regime preferred for float glass to enable selective ablation of contaminants with minimal heat-affected
      zone (HAZ); picosecond (ps) or femtosecond (fs) for ultra-precision but costlier. 20 ns recommended to limit thermal
      diffusion in low-conductivity glass. Source: Laser physics research in Applied Surface Science (2019).'
  scanSpeed:
    min: 10
    max: 5000
    unit: mm/s
    value: 2000
    description: 'Effective speeds for 1064 nm cleaning; slower (500-1000 mm/s) for heavy contamination, faster (up to 5000
      mm/s) for light residues. Recommended 2000 mm/s for optimal contaminant removal on float glass while minimizing heat
      accumulation. Source: Industry standards from Laser Cleaning Europe guidelines and J. Cleaner Production (2020).'
  passCount:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass (2-5) for heavy layers; 2 passes recommended for complete
      removal on float glass to ensure uniformity without cumulative damage. Source: Industry case studies in Surface and
      Coatings Technology (2022).'
  overlapRatio:
    min: 10
    max: 90
    value: 50
    unit: '%'
    description: 'Ensures uniform coverage; 50% recommended for float glass to avoid gaps or overexposure, balancing efficiency
      and preventing thermal gradients. Typical 30-80% in optimization. Source: Process studies in Lasers in Manufacturing
      and Materials Processing (2019).'
  dwellTime:
    description: Effective dwell time per spot for contaminant ablation
    unit: μs
    value: 100
    min: 0.2
    max: 200
  power:
    min: 50
    max: 500
    value: 200
    unit: W
    description: 'Typical range for industrial 1064 nm fiber lasers in glass cleaning to balance efficiency and safety; starting
      at 200 W for contamination removal without overheating. Max safe below 500 W to avoid thermal stress on float glass
      (melting point ~500°C). Source: IPG Photonics specs and studies in Optics and Lasers in Engineering (2018).'
componentSummary: These settings employ moderate power and short nanosecond pulses at 1064 nm to gently ablate contaminants
  from float glass while minimizing thermal stress on its fragile, heat-sensitive surface.
