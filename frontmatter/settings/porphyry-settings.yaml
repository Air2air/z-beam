  power:
    min: 50
    max: 500
    unit: W
    value: 100
    description: Typical range for industrial 1064 nm Nd:YAG lasers cleaning stone surfaces like porphyry; starting at 100
      W for light contamination to avoid thermal damage given porphyry's low thermal conductivity (~2.5 W/mK); max safe below
      500 W to prevent substrate cracking (e.g., IPG Photonics YLR series specs; academic review in J. Cult. Herit. 2018).
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 500
    description: Effective for contamination removal on hard stones; 500 mm/s recommended for optimal balance of cleaning
      efficiency and heat dissipation; slower (100-500 mm/s) for heavy contamination, faster (1000-2000 mm/s) for light; based
      on industry standards from Adapt Laser Systems manuals.
  pulse_width:
    min: 0.1
    max: 1000
    unit: ns
    value: 20
    description: Nanosecond regime preferred for cost-effective cleaning of porphyry; 20 ns minimizes heat-affected zone (HAZ)
      due to porphyry's high melting point (~1300°C) and reflectivity; picosecond (ps) or femtosecond (fs) for ultra-precise
      but less common industrially (Laser Phys. 2015 study on stone ablation).
  repetition_rate:
    min: 1
    max: 200
    unit: kHz
    value: 30
    description: Standard for 1064 nm cleaning; 30 kHz recommended for porphyry to achieve fast processing without excessive
      heat accumulation; higher rates (>50 kHz) speed up but risk thermal buildup on low-conductivity stones (Opt. Lasers
      Eng. 2019).
  energy_density:
    min: 0.1
    max: 20.0
    unit: J/cm²
    value: 1.5
    description: Fluence range for safe contaminant ablation on porphyry; 1.5 J/cm² recommended below damage threshold (~4
      J/cm² for granite-like stones); conservative to account for porphyry's variable composition (Appl. Surf. Sci. 2017 ablation
      threshold study).
  spot_size:
    min: 0.1
    max: 500
    unit: μm
    value: 200
    description: Beam diameter for industrial cleaning; 200 μm recommended for porphyry surface preparation, balancing fine
      detail and large-area coverage; smaller for precision, larger for broad contamination (Laserax equipment specifications).
  pass_count:
    min: 1
    max: 10
    unit: passes
    value: 2
    description: Typically 1-2 passes for light industrial contamination on durable stones like porphyry; multi-pass for heavy
      buildup to ensure complete removal without exceeding safe fluence; from case studies in stone restoration (J. Laser
      Appl. 2020).
  overlap_ratio:
    min: 10
    max: 90
    unit: '%'
    value: 70
    description: Ensures uniform coverage on irregular porphyry surfaces; 70% recommended for even cleaning without gaps or
      over-ablation; typical 50-80% in process optimization (Opt. Express 2016 study on scan strategies).
challenges:
  thermal_management:
  - challenge: Thermal shock and microcracking
    severity: critical
    threshold_temperature: ΔT > 50-150°C rapid cooling (stone-dependent)
    impact: Natural stone contains microfissures that propagate under thermal stress
    solutions:
    - Use pulse mode with 8-12 second cooling between passes
    - Reduce power by 40-50% for weathered or damaged stone
    - Preheat substrate if possible to reduce thermal gradients
    - Granite more resistant than marble; sandstone most vulnerable
    - Monitor for surface crazing; stop immediately if cracks appear
  - challenge: Moisture-induced spalling
    severity: high
    threshold_temperature: Steam formation >100°C with trapped moisture
    impact: Porous stone traps moisture that explosively converts to steam
    solutions:
    - Test moisture content before cleaning (>3% requires drying)
    - Allow 48-72 hours drying after rain before laser cleaning
    - Reduce power by 50% for damp stone
    - Use pulse mode with extended cooling (15-20 seconds)
    - Heritage stone requires especially gentle approach
  surface_characteristics:
  - challenge: Weathering and surface degradation
    severity: high
    impact: Aged stone has weaker surface layer more susceptible to damage
    solutions:
    - Reduce power 40-60% for weathered stone vs fresh stone
    - Test on inconspicuous area first
    - Multiple gentle passes (4-6 at 40-60W) preferred
    - Monitor for powdering or flaking; adjust power immediately
    - Heritage conservation requires documentation and testing
  - challenge: Mineral composition heterogeneity
    severity: medium
    impact: Mixed minerals have different absorption and damage thresholds
    solutions:
    - Use moderate power (60-80W) suitable for both light and dark minerals
    - Crosshatch scan pattern for uniform coverage
    - Avoid dwelling on dark minerals (feldspar, mica) which absorb more energy
    - Quartzite and marble more homogeneous than granite
  contamination_challenges:
  - challenge: Biological growth and deep staining
    severity: medium
    porosity_range: 0.5-25% (sandstone highly porous)
    impact: Algae, lichen, and pollution penetrate deep into porous structure
    solutions:
    - First pass 80W fast (1200 mm/s) for surface growth
    - Second pass 60W slow (700 mm/s) for roots and stains
    - Third pass 40W very slow (400 mm/s) for deep staining
    - Chemical biocide pre-treatment kills roots and reduces laser exposure
    - Dense stones (granite, marble) clean in 1-2 passes vs 3-4 for porous stones
description: We've found that when laser cleaning Porphyry, you need to start conservatively with power levels to prevent
  any surface cracking from its uneven crystal structure, which can trap heat unevenly compared to smoother granites. In our
  experience, this durable stone responds well because of its low porosity and strong compressive hold—it absorbs laser energy
  steadily without letting contaminants seep back in, unlike more porous limestones that demand extra passes. We typically
  use a focused beam with moderate speed and overlap to gently lift away grime while preserving the natural polish, since
  Porphyry's heat resistance lets it handle short bursts without warping. But watch out for overdoing the intensity early
  on; its moderate conductivity means heat builds up if you rush, so adjust by slowing the scan and adding passes to avoid
  subtle fissures that show up later in heritage pieces. This approach restores the stone's finish cleanly for architectural
  or cultural work.
