  power:
    min: 20
    max: 500
    value: 100
    unit: W
    description: 'Typical range for industrial pulsed fiber lasers cleaning metals
      like Inconel; starting at 100 W balances efficiency and safety to avoid melting
      (Inconel melting point ~1300-1400°C); max safe ~300-500 W with proper scanning
      to prevent substrate damage. Source: IPG Photonics YLR series specs and study
      in Optics and Lasers in Engineering (2018) on Ni-based alloys.'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 2000
    description: 'Effective cleaning at 1000-3000 mm/s for light contamination (e.g.,
      oils), slower (500-1500 mm/s) for heavy oxides; 2000 mm/s recommended for optimal
      balance on Inconel to minimize heat input given its high thermal conductivity
      (~15 W/m·K). Source: Industry standards from Laserax equipment manuals and Journal
      of Cleaner Production (2020) case study on superalloys.'
  pulse_width:
    min: 0.1
    max: 1000
    value: 50
    unit: ns
    description: 'Nanosecond regime (10-200 ns) standard for 1064 nm cleaning of reflective
      metals like Inconel to enable ablation without excessive plasma shielding; 50
      ns recommended for minimal heat-affected zone (HAZ <10 μm), as picosecond/femtosecond
      better for ultra-precision but costlier. Source: Laser physics research in Applied
      Surface Science (2019) on pulse duration effects for Ni alloys.'
  repetition_rate:
    min: 1
    max: 200
    value: 100
    unit: kHz
    description: '20-100 kHz typical for controlled energy delivery in cleaning; 100
      kHz recommended for Inconel to achieve fast processing while limiting heat accumulation
      (trade-off: higher rates speed up cleaning but risk thermal buildup on low-reflectivity
      contaminants). Source: Academic literature in Journal of Laser Applications
      (2021) reviewing rep rates for metal surface preparation.'
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Fluence range for contaminant removal without damaging Inconel (ablation
      threshold ~2-4 J/cm² due to high reflectivity ~60% at 1064 nm); 1.5 J/cm² safe
      for cleaning, below damage threshold of ~5 J/cm². Source: Ablation threshold
      studies in Surface and Coatings Technology (2017) on Inconel 718.'
  spot_size:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: '50-300 μm for fine detail cleaning, up to 500 μm for large areas;
      200 μm recommended for Inconel to ensure uniform fluence distribution and avoid
      hotspots on irregular surfaces. Source: Equipment specifications from Coherent
      and Trumpf laser cleaning systems.'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, 2-3 for moderate/heavy; 2 passes
      recommended for complete removal on Inconel without excessive wear, allowing
      residue assessment between passes. Source: Industry practice in Aerospace Manufacturing
      and case studies from Laser Cleaning International (2022).'
  overlap_ratio:
    min: 10
    max: 90
    value: 60
    unit: '%'
    description: '30-50% for speed on large areas, 60-80% for uniform coverage; 60%
      recommended to ensure no gaps in cleaning Inconel surfaces while optimizing
      process time. Source: Process optimization studies in Optics and Laser Technology
      (2020) on scan strategies for alloys.'
