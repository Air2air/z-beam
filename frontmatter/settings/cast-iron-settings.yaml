  power:
    min: 50
    max: 1000
    value: 200
    unit: W
    description: 'Typical range for industrial cleaning of cast iron to remove rust or contaminants without substrate damage;
      starting at 200W balances efficiency and safety. Max limited to avoid melting (cast iron melting point ~1150-1300°C).
      Source: IPG Photonics laser cleaning systems specs for metal surfaces; academic review in Optics and Lasers in Engineering
      (2018).'
  scan_speed:
    min: 10
    max: 5000
    value: 2000
    unit: mm/s
    description: 'Effective range for 1064 nm cleaning on cast iron; slower for heavy contamination (e.g., thick rust) to
      ensure ablation, faster for light oils. Recommended 2000 mm/s for optimal throughput with minimal heat input, considering
      cast iron''s high thermal conductivity (~50 W/m·K). Source: Industry standards from Laserax equipment manuals; case
      studies in Journal of Cleaner Production (2020).'
  pulse_width:
    min: 0.1
    max: 1000
    unit: ns
    value: 50
    description: 'Nanosecond regime dominant for industrial cleaning of cast iron to achieve plasma-induced ablation with
      low heat-affected zone (HAZ); picosecond (ps) or femtosecond (fs) for ultra-precise but costlier applications. 50 ns
      recommended to minimize thermal diffusion in cast iron (reflectivity ~40% at 1064 nm). Source: Laser physics research
      in Applied Surface Science (2019); avoids fs due to overkill for contamination removal.'
  repetition_rate:
    min: 1
    max: 200
    value: 100
    unit: kHz
    description: 'Standard range for pulsed fiber lasers in metal cleaning; 100 kHz balances cleaning speed and heat accumulation
      on cast iron, where high rates (>150 kHz) risk subsurface heating despite good conductivity. Trade-off: higher freq
      accelerates process but increases cumulative fluence. Source: Academic literature in Lasers in Manufacturing and Materials
      Processing (2021).'
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Fluence range for safe removal of contaminants like rust or paint on cast iron; damage threshold ~2-4 J/cm²
      to avoid pitting or melting. 1.5 J/cm² recommended for effective cleaning below ablation threshold of cast iron (~3
      J/cm² at 1064 nm). Conservative due to cast iron''s variable surface roughness. Source: Ablation threshold studies in
      Journal of Applied Physics (2017); SPIE proceedings on laser cleaning.'
  spot_size:
    min: 0.1
    max: 500
    unit: μm
    value: 200
    description: 'Beam diameter range for industrial scanners; smaller for fine details (e.g., crevices in castings), larger
      for broad areas. 200 μm recommended for uniform coverage on rough cast iron surfaces without excessive overlap heating.
      Source: Equipment specifications from Coherent and Trumpf laser systems; process optimization in Surface and Coatings
      Technology (2022).'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Typically 1-3 passes for light to moderate contamination on cast iron; multi-pass for layered buildup (e.g.,
      old paint). 2 passes recommended for complete removal while minimizing total energy input and HAZ. Single pass viable
      for thin rust. Source: Industry practice from case studies in International Journal of Advanced Manufacturing Technology
      (2019); manufacturer guidelines.'
  overlap_ratio:
    min: 10
    max: 90
    value: 60
    unit: '%'
    description: 'Standard range for scan line overlap to ensure uniform fluence distribution; 60% recommended for cast iron
      to achieve even cleaning on irregular surfaces without gaps or over-ablation. Higher (70-80%) for heavy contamination.
      Source: Process optimization studies in Optics and Laser Technology (2020); based on Gaussian beam profiles in cleaning
      simulations.'
challenges:
  thermal_management:
  - challenge: High thermal conductivity and heat spread
    severity: medium
    property_value: 4-400 W/(m·K) depending on metal
    impact: Heat spreads rapidly causing large heat-affected zones
    solutions:
    - Use shorter pulse durations (picosecond/femtosecond) for localized heating
    - Increase scan speed to minimize dwell time
    - Apply cooling between passes for thick sections
  - challenge: Melting and heat-affected zone formation
    severity: high
    threshold_range: 660°C (Al) to 3422°C (W)
    impact: Substrate melting or microstructural changes in heat-affected zone
    solutions:
    - Stay below 70% of melting temperature
    - Use pulse mode with adequate cooling time
    - Monitor for surface discoloration indicating oxidation
  surface_characteristics:
  - challenge: High reflectivity
    severity: high
    reflectivity_range: 60-95% at 1064nm for polished metals
    impact: Most laser energy reflected, requiring higher power; safety hazard
    solutions:
    - Use shorter wavelengths (355nm UV) for better absorption
    - Increase power density but monitor for thermal damage
    - Ensure proper beam containment and safety measures
    - Surface oxidation/roughness improves absorption
  - challenge: Surface finish variations
    severity: medium
    impact: Polished surfaces reflect more, rough surfaces absorb better
    solutions:
    - Adjust power based on surface condition
    - Test parameters on similar finish samples
    - Polished surfaces need 20-40% more power
  contamination_challenges:
  - challenge: Rust and oxide layer removal
    severity: medium
    impact: Requires multiple passes; rust/oxide has different absorption than base metal
    solutions:
    - First pass at higher power (100-120W) to remove bulk oxide
    - Second pass at lower power (60-80W) for final cleaning
    - Monitor for base metal exposure to avoid over-processing
  - challenge: Oil and grease removal
    severity: low
    impact: Organic contaminants vaporize easily but can redeposit
    solutions:
    - Use fume extraction to prevent redeposition
    - Higher scan speeds (3000-5000 mm/s) for thin films
    - Chemical pre-cleaning for heavy contamination
description: When laser cleaning cast iron, I've seen how its embedded graphite flakes set it apart from smoother steels,
  drawing in laser energy unevenly and speeding up contaminant removal while risking uneven heating in those spots. This works
  best when you focus the beam to gently abrade surface rust or scale, restoring that durable base without digging into the
  matrix. Tends to handle heat well up to moderate levels, so you can push through multiple layers of buildup from industrial
  use like machinery parts. But watch out mid-process—its slight porosity might trap residues if you ramp up too fast, leading
  to incomplete cleans or weak spots, so dial back intensity and add passes for even coverage. Overall, this approach preserves
  its tough compressive nature, avoiding cracks in heavy-duty applications.
