description: >-
  When laser cleaning cast iron, I've seen how its embedded graphite flakes set it apart from smoother steels, drawing
  in laser energy unevenly and speeding up contaminant removal while risking uneven heating in those spots. This works
  best when you focus the beam to gently abrade surface rust or scale, restoring that durable base without digging into
  the matrix. Tends to handle heat well up to moderate levels, so you can push through multiple layers of buildup from
  industrial use like machinery parts. But watch out mid-process—its slight porosity might trap residues if you ramp up
  too fast, leading to incomplete cleans or weak spots, so dial back intensity and add passes for even coverage.
  Overall, this approach preserves its tough compressive nature, avoiding cracks in heavy-duty applications.
