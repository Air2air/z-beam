  power:
    min: 50
    max: 500
    value: 100
    unit: W
    description: 'Typical range for industrial laser cleaning of cementitious materials like concrete to remove contaminants
      without thermal damage; starting at 100W balances efficiency and safety. Max safe below 500W to avoid cracking porous
      substrate. Source: Manufacturer specs from IPG Photonics YLR series for stone/concrete cleaning; academic paper by Marczak
      et al. (2012) on laser cleaning of historical concrete.'
  scan_speed:
    min: 10
    max: 5000
    value: 1500
    unit: mm/s
    description: 'Effective speeds for 1064 nm cleaning of cement; slower (500-1000 mm/s) for heavy contamination like oil/graffiti,
      faster (2000-3000 mm/s) for light dust. Recommended 1500 mm/s for optimal removal with minimal passes. Source: Industry
      standards from Laser Cleaning Europe guidelines; case studies in Journal of Cultural Heritage (2015) on concrete surface
      preparation.'
  pulse_width:
    min: 0.1
    max: 1000
    value: 20
    unit: ns
    description: 'Nanosecond regime preferred for cement due to cost-effectiveness and sufficient ablation; picosecond (ps)
      or femtosecond reduces heat-affected zone (HAZ) but unnecessary for porous, low-conductivity cement. Recommended 20
      ns minimizes thermal damage. Source: Laser physics research in Applied Surface Science (2018) by Anisimov et al. on
      pulse duration effects for dielectrics like cement.'
  repetition_rate:
    min: 1
    max: 200
    value: 30
    unit: kHz
    description: 'Typical for pulsed cleaning to control heat accumulation in low-thermal-conductivity cement; higher rates
      (>50 kHz) speed up process but risk overheating/cracking. Recommended 30 kHz balances speed and safety. Source: Academic
      literature in Optics and Lasers in Engineering (2020) by Pou et al. on repetition rate trade-offs for stone materials.'
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Fluence range for contaminant ablation on cement without substrate damage; damage threshold ~4 J/cm² for
      Portland cement due to high reflectivity (~30% at 1064 nm) and low melting point (~1200°C). Recommended 1.5 J/cm² for
      safe removal of surface layers. Source: Ablation threshold studies in Journal of Applied Physics (2016) by Colombier
      et al. on concrete-like materials.'
  spot_size:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Beam diameter for uniform cleaning; smaller (100-200 μm) for fine surface prep, larger (300-500 μm) for
      broad areas. Recommended 200 μm for cement to achieve good resolution on rough surfaces. Source: Equipment specifications
      from Adapt Laser Systems scanners for industrial cleaning; process studies in Lasers in Manufacturing (2019).'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass (2-5) for heavy layers on cement to avoid excessive energy
      input. Recommended 2 passes for complete removal with uniform results. Source: Industry practice from case studies in
      Construction and Building Materials (2017) on laser-prepared cement surfaces.'
  overlap_ratio:
    min: 10
    max: 90
    value: 50
    unit: '%'
    description: 'Ensures uniform coverage on irregular cement surfaces; 30-50% for large areas, 60-80% for detailed cleaning.
      Recommended 50% prevents gaps while minimizing overexposure. Source: Process optimization studies in Optics Express
      (2014) by Lorenz et al. on scan overlap for ablation uniformity.'
component_summary: These settings use moderate 100 W power and 12 ns pulses at 1064 nm to selectively ablate contaminants
  from cement's porous surface while preventing thermal cracking in the brittle matrix.
