description: >-
  When laser cleaning cement, the key property to lead with is its brittleness compared to tougher masonry like stone.
  This makes it prone to cracking under heat, unlike denser bricks that hold up better. I've seen surfaces chip easily
  if you push too hard. So, start slow with gentle pulses to loosen grime without stressing the matrix. Tends to clean
  cleanly once you avoid over-heating the pores mid-pass. Adjust overlap minimally to prevent uneven wear.
