  power:
    min: 20
    max: 500
    value: 100
    unit: W
    description: 'Typical range for pulsed Nd:YAG lasers in metal cleaning to avoid thermal damage; recommended starting at
      100 W for Lanthanum''s low melting point (921°C) and moderate thermal conductivity (~13 W/mK). Conservative max to prevent
      substrate melting. Source: General manufacturer specs (e.g., IPG Photonics) and ablation studies on rare earth metals
      (e.g., J. Appl. Phys. 2018 on similar metals).'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 500
    description: 'Range for effective contaminant removal without excessive heat buildup; slower for heavy contamination (100-500
      mm/s), faster for light (1000-2000 mm/s). Recommended 500 mm/s for balanced cleaning on reflective Lanthanum surfaces.
      Source: Industry standards from laser cleaning equipment manuals (e.g., Laserax systems) and process optimization in
      Opt. Lasers Eng. (2020).'
  pulse_width:
    min: 0.1
    max: 1000
    value: 20
    unit: ns
    description: 'Nanosecond regime preferred for industrial cleaning to balance ablation and minimal heat-affected zone (HAZ);
      picosecond (ps) or femtosecond (fs) for ultra-precise but costlier. 20 ns recommended for Lanthanum to limit thermal
      diffusion given its properties. Source: Laser physics research in Appl. Surf. Sci. (2019) on metal ablation thresholds.'
  repetition_rate:
    min: 1
    max: 200
    value: 30
    unit: kHz
    description: 'Typical for pulsed cleaning; higher rates increase speed but risk heat accumulation on low-conductivity
      Lanthanum. 30 kHz balances efficiency and safety. Trade-off: >50 kHz may cause overheating. Source: Academic literature,
      e.g., J. Laser Appl. (2021) on repetition rate effects in metal surface prep.'
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Fluence range for contaminant removal without damaging Lanthanum (estimated damage threshold ~4 J/cm² at
      1064 nm due to high reflectivity). Recommended 1.5 J/cm² for safe cleaning of oxides or contaminants. Source: Ablation
      threshold studies on rare earths (e.g., Phys. Rev. B 2017) and general metal cleaning in Lasers Manuf. Mater. Process.
      (2022).'
  spot_size:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Smaller for fine detail (100-200 μm), larger for broad areas (300-500 μm). 200 μm recommended for uniform
      cleaning on Lanthanum without excessive energy concentration. Source: Equipment specifications from manufacturers like
      Coherent and Trumpf for 1064 nm systems.'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Single pass for light contamination, multi-pass for heavy; 2 passes recommended for complete removal on
      Lanthanum while minimizing risk to soft substrate. Source: Industry case studies in laser cleaning of metals (e.g.,
      Proc. SPIE 2019) and practical guidelines from Adapt Laser Systems.'
  overlap_ratio:
    min: 10
    max: 90
    value: 50
    unit: '%'
    description: 'Ensures uniform coverage; 50% recommended for Lanthanum to avoid gaps or over-ablation on irregular surfaces.
      Lower (30%) for speed, higher (80%) for thoroughness. Source: Process optimization studies in J. Clean. Prod. (2021)
      on scan strategies for metallic substrates.'
component_summary: These settings employ moderate 100 W power and 12 ns pulses at 1064 nm to selectively ablate contaminants
  from lanthanum's soft, reactive surface without inducing oxidation or thermal distortion.
