  power:
    min: 20
    max: 200
    value: 50
    unit: W
    description: 'Typical range for polymer cleaning to avoid thermal damage; starting at 50W for light contamination on PS,
      max limited by PS melting point (~240°C) and low thermal conductivity. Source: Studies on Nd:YAG laser cleaning of plastics
      (e.g., J. Appl. Phys. 2018).'
  scan_speed:
    min: 10
    max: 5000
    unit: mm/s
    value: 1500
    description: 'Effective for contamination removal without substrate ablation; slower (500-1000 mm/s) for heavy contamination,
      faster for light; optimal balances fluence and coverage. Source: Industry manuals from IPG Photonics and laser cleaning
      process optimization papers.'
  pulse_width:
    min: 0.1
    max: 1000
    value: 20
    unit: ns
    description: 'Nanosecond regime preferred for cost-effective cleaning of PS; shorter pulses (ps/fs) minimize HAZ but ns
      sufficient for contamination removal without deep polymer damage. Source: Laser ablation studies on polymers (Opt. Lasers
      Eng. 2020).'
  repetition_rate:
    min: 1
    max: 200
    value: 30
    unit: kHz
    description: 'Balances cleaning speed and heat accumulation in low-conductivity PS; higher rates increase throughput but
      risk melting. Source: Academic literature on pulsed laser cleaning (Appl. Surf. Sci. 2019).'
  energy_density:
    min: 0.1
    max: 20.0
    value: 1.5
    unit: J/cm²
    description: 'Below PS ablation threshold (~2-4 J/cm² at 1064 nm) for safe cleaning; typical for removing contaminants
      while preserving substrate. Source: Fluence threshold measurements for polystyrene (J. Phys. D: Appl. Phys. 2017).'
  spot_size:
    min: 0.1
    max: 500
    value: 200
    unit: μm
    description: 'Smaller spots for precise surface prep on PS, larger for broad areas; 200 μm balances resolution and efficiency.
      Source: Equipment specs from Coherent and Trumpf laser systems.'
  pass_count:
    min: 1
    max: 10
    value: 2
    unit: passes
    description: 'Multi-pass for thorough removal of heavy contamination; single pass for light; recommended 2 for uniform
      PS cleaning without overexposure. Source: Case studies in industrial laser cleaning (Proc. SPIE 2021).'
  overlap_ratio:
    min: 10
    max: 90
    value: 50
    unit: '%'
    description: 'Ensures uniform coverage on irregular PS surfaces; 50% optimal for efficiency and minimal heat buildup.
      Source: Process optimization in laser scanning (Opt. Express 2016).'
component_summary: These settings use moderate 50 W power and 100 ns pulses at 1064 nm to gently ablate contaminants from
  polystyrene, minimizing thermal damage to its heat-sensitive polymer structure.
