ppe_requirements:
  respiratory: NIOSH-approved air-purifying respirator with P100 particulate filters for ≤50 mg/m³. PAPR for higher concentrations.
  skin: Leather or cotton gloves adequate for dust. Welding gloves for metal work.
  eye: Safety glasses with side shields. Welding goggles/helmet for welding operations.
  minimum_level: Level D for dust <10 mg/m³, Level C for welding fume
  special_notes: Siderosis (iron dust pneumoconiosis) from chronic exposure. Welding fume contains mixed metal oxides - more
    hazardous than pure iron oxide.
storage_requirements:
  temperature_range: Store at room temperature
  ventilation: General ventilation adequate. Keep containers closed.
  incompatibilities:
  - Strong acids
  - Aluminum (thermite reaction)
  - Magnesium
  container_material: Plastic or metal containers with tight lids.
  segregation: None required. Separate from strong acids and reactive metals.
  quantity_limits: None specified. Follow facility storage protocols.
  special_requirements: Keep containers closed when not in use. Store in dry area. Prevent dust accumulation.
