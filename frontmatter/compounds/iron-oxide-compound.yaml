  ppe_requirements:
    presentation: descriptive
    items:
    - respiratory: NIOSH-approved air-purifying respirator with P100 particulate filters for ≤50 mg/m³. PAPR for higher concentrations.
      skin: Leather or cotton gloves adequate for dust. Welding gloves for metal work.
      eye: Safety glasses with side shields. Welding goggles/helmet for welding operations.
      minimum_level: Level D for dust <10 mg/m³, Level C for welding fume
      special_notes: Siderosis (iron dust pneumoconiosis) from chronic exposure. Welding fume contains mixed metal oxides
        - more hazardous than pure iron oxide.
    _section:
      title: PPE Requirements
      description: Personal protective equipment needed for safe handling
      icon: shield
      order: 5
      variant: warning
  emergency_response:
    presentation: descriptive
    items:
    - fire_hazard: Non-combustible. May release toxic metal oxide fumes when heated.
      fire_suppression: Use agent appropriate for surrounding fire. Wear SCBA - toxic fumes possible.
      spill_procedures: Avoid generating dust. Sweep or vacuum with HEPA filter. Place in sealed containers. Generally non-hazardous
        waste unless contaminated.
      exposure_immediate_actions: 'Remove from dusty area. If respiratory irritation: move to fresh air. Wash dust from skin
        and eyes. Generally low acute toxicity. Seek medical attention if symptoms persist.'
      environmental_hazards: Generally low environmental hazard. May discolor water. Large spills may affect aquatic pH.
      special_hazards: 'SIDEROSIS: Benign pneumoconiosis from chronic inhalation. X-ray opacities but no functional impairment.
        Reversible when exposure stops. Welding fume may contain other toxic metals (chromium, nickel, manganese).'
    _section:
      title: Emergency Response
      description: First aid and emergency procedures for exposure incidents
      icon: alert-triangle
      order: 7
