  symptoms: []
  firstAid: >-
    If someone inhales iron oxide fumes from welding or metalwork, get them out of the area right away. Fresh air helps
    clear the lungs fast. Watch for signs like coughing, headache, or feeling shaky—metal fume exposure hits quick after
    a shift.


    Sit the person down comfortably. Loosen tight clothing around the neck or chest to ease breathing. Offer cool water
    if they're alert and not nauseous; it soothes the throat without overwhelming.


    Don't ignore chills or muscle aches that follow. These pop up hours later, mimicking a bad flu from the body's
    reaction to those fine particles. Keep them warm with a blanket, but avoid heat sources that stir up more dust.


    Call for medical help if symptoms worsen or linger past a day. Doctors know how iron oxide irritates airways and can
    check for deeper issues like inflammation. In workshops, always vent fumes well to prevent this—rusty compounds turn
    airborne easily during cutting or grinding, sneaking into breaths unnoticed. Rest up fully; recovery comes with time
    and care.
