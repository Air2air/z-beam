chemical_formula: Fe2O3
cas_number: 1309-37-1
molecular_weight: 159.69
hazard_class: irritant
monitoring_required: true
typical_concentration_range: 2-15 mg/m³
description: null
health_effects: null
exposure_guidelines: null
detection_methods: null
first_aid: null
author:
  id: 3
ppe_requirements:
  respiratory: NIOSH-approved air-purifying respirator with P100 particulate filters for ≤50 mg/m³. PAPR for higher concentrations.
  skin: Leather or cotton gloves adequate for dust. Welding gloves for metal work.
  eye: Safety glasses with side shields. Welding goggles/helmet for welding operations.
  minimum_level: Level D for dust <10 mg/m³, Level C for welding fume
  special_notes: Siderosis (iron dust pneumoconiosis) from chronic exposure. Welding fume contains mixed metal oxides - more
    hazardous than pure iron oxide.
emergency_response:
  fire_hazard: Non-combustible. May release toxic metal oxide fumes when heated.
  fire_suppression: Use agent appropriate for surrounding fire. Wear SCBA - toxic fumes possible.
  spill_procedures: Avoid generating dust. Sweep or vacuum with HEPA filter. Place in sealed containers. Generally non-hazardous
    waste unless contaminated.
  exposure_immediate_actions: 'Remove from dusty area. If respiratory irritation: move to fresh air. Wash dust from skin and
    eyes. Generally low acute toxicity. Seek medical attention if symptoms persist.'
  environmental_hazards: Generally low environmental hazard. May discolor water. Large spills may affect aquatic pH.
  special_hazards: 'SIDEROSIS: Benign pneumoconiosis from chronic inhalation. X-ray opacities but no functional impairment.
    Reversible when exposure stops. Welding fume may contain other toxic metals (chromium, nickel, manganese).'
environmental_impact:
  aquatic_toxicity: 'Low toxicity to aquatic life. LC50 (fish, 96h): >100 mg/L. May color water but minimal toxic effects.'
  biodegradability: Not biodegradable (inorganic). Persists indefinitely.
  bioaccumulation: Low bioaccumulation. Essential element. Regulated by organisms.
  soil_mobility: Low mobility. Common soil constituent. No significant environmental concern.
  atmospheric_fate: Settles as particulate. Does not react in atmosphere. Component of natural dust.
  ozone_depletion: false
  global_warming_potential: null
  reportable_releases:
    water: Not reportable (not CERCLA listed)
    air: Not reportable
detection_monitoring:
  sensor_types:
