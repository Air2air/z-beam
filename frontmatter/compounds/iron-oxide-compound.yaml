  detection:
    methods:
      presentation: descriptive
      sectionMetadata:
        section_title: Detection Methods
        section_description: Techniques and equipment for detecting this compound
        icon: microscope
        order: 1
      items:
      - content: "Spot iron oxide compounds in metal fumes? Start simple. Grab a sample from the air stream. Swirl it gently\
          \ under light. Check for that rusty red hue—classic giveaway. \n\nNext, touch test. Feels gritty, like fine sand?\
          \ That's the compound talking. Rub it between fingers; sticks a bit, non-soluble in water. \n\nFor deeper dive,\
          \ heat a pinch. Watch color shift to deeper black—pure iron oxide signature. No fancy gear needed yet. \n\nIn workshops,\
          \ use basic filters. Pull fumes through cloth; residue builds up reddish. Industrial spots swear by visual scans\
          \ during welding. Catches buildup early. \n\nLaser cleaning ties in. Blast surfaces clean; fumes kick up oxide particles.\
          \ Spot them floating—dense, opaque clouds. Settles quick, leaves metallic shine behind. \n\nPortable kits help too.\
          \ Dip strips react with oxides, turn color fast. Reliable for quick checks in factories. Keeps things safe, spots\
          \ hazards before they spread."
  operational:
    expert_answers:
      presentation: collapsible
      sectionMetadata:
        section_title: Expert Q&A
        section_description: Common questions about this compound answered by experts
        icon: user-tie
        order: 1
      items:
      - id: what-are-the-recommended-exposure-limits-and-prote
        question: What are the recommended exposure limits and protection methods for iron oxide (Fe₂O₃) fumes during laser
          cleaning operations?
        answer: The OSHA permissible exposure limit (PEL) for iron oxide fume is 10 mg/m³ as iron (Fe) over an 8-hour time-weighted
          average (TWA), while NIOSH recommends a lower limit of 5 mg/m³ to minimize respiratory irritation and potential
          siderosis from chronic exposure. To stay below these limits, operators should use local exhaust ventilation systems
          to capture fumes at the source and wear NIOSH-approved respirators with at least an N95 rating (or higher, like
          P100, for prolonged work). Regularly monitor air quality with real-time particle counters or personal sampling pumps
          to ensure compliance and adjust controls as needed.
