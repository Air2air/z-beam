  items:
  - id: what-are-the-recommended-exposure-limits
    title: What are the recommended exposure limits and protection methods for iron oxide (Fe₂O₃) fumes during laser cleaning
      operations?
    content: The OSHA permissible exposure limit (PEL) for iron oxide fume is 10 mg/m³ as iron (Fe) over an 8-hour time-weighted
      average (TWA), while NIOSH recommends a lower limit of 5 mg/m³ to minimize respiratory irritation and potential siderosis
      from chronic exposure. To stay below these limits, operators should use local exhaust ventilation systems to capture
      fumes at the source and wear NIOSH-approved respirators with at least an N95 rating (or higher, like P100, for prolonged
      work). Regularly monitor air quality with real-time particle counters or personal sampling pumps to ensure compliance
      and adjust controls as needed.
