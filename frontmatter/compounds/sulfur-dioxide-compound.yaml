ppe_requirements:
  respiratory: SCBA or supplied-air respirator for >5 ppm or unknown concentrations. Air-purifying with acid gas cartridge
    acceptable for ≤5 ppm with escape provisions.
  skin: Nitrile gloves for liquid contact (cryogenic hazard). Thermal protection for liquefied SO2.
  eye: Chemical safety goggles, face shield for liquid contact
  minimum_level: Level C for known <5 ppm, Level B for >5 ppm or liquefied SO2
  special_notes: Extremely irritating to eyes and respiratory tract. Cryogenic liquid causes frostbite. Asthma trigger - asthmatics
    extremely sensitive.
storage_requirements:
  temperature_range: Store cylinders <52°C. Liquefied SO2 requires cryogenic storage.
  ventilation: 'Outdoor storage preferred. Indoor: mechanical ventilation with emergency backup. SO2 gas detection mandatory.'
  incompatibilities:
  - Potassium chlorate
  - Alkali metals
  - Sodium hydride
  - Metal oxides
  - Aluminum
  - Halogens
  container_material: Steel cylinders. Stainless steel for liquid.
  segregation: Separate from incompatibles. Corrosive gas storage area.
  quantity_limits: Per fire code. Many facilities limit indoor storage.
  special_requirements: 'Cylinder restraints mandatory. Leak detection system required. Post "CORROSIVE GAS" signs. Emergency
    procedures posted. For liquid: cryogenic handling equipment.'
