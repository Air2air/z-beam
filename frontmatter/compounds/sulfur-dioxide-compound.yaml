  items:
  - id: as-a-laser-cleaning-operator-how
    title: As a laser cleaning operator, how can I protect myself from SO₂ exposure if the process generates this gas from
      sulfur-containing materials?
    content: Always prioritize engineering controls like local exhaust ventilation to capture and remove SO₂ at the source,
      maintaining exposure below the OSHA permissible limit of 5 ppm (parts per million) over an 8-hour shift. Wear a full-face
      respirator with an appropriate cartridge rated for acid gases (e.g., NIOSH-approved P100 with acid gas cartridge) and
      ensure personal protective equipment like gloves and protective clothing to avoid skin contact. Regularly monitor air
      quality with SO₂ detectors or badges, and evacuate if levels exceed 5 ppm, seeking fresh air immediately if irritation
      occurs.
