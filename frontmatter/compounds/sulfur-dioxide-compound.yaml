    health_impacts:
      presentation: descriptive
      _section:
        title: Health Impacts
        description: Health effects from exposure including acute and chronic impacts
        icon: heart-pulse
        order: 1
        variant: warning
      items:
      - content: 'When dealing with sulfur dioxide in industrial setups, prioritize ventilation right away. This gas irritates lungs deeply if inhaled. It triggers coughing fits almost immediately.


          Breathe it in, and your airways tighten fast. That''s the core issue here—its sharp reactivity with moist tissues. Workers feel throat burning first, then chest tightness follows. Eyes water too, blurring vision during tasks.


          In applications like metal processing or cleaning operations, exposure builds subtly. But avoid confined spaces without masks. It worsens asthma quickly, leading to labored breathing. Long shifts amplify fatigue from this constant assault.


          Handle it cautiously in laser-based removal processes for contaminants. The gas lingers, so monitor air flow strictly. Skin contact stings less, but respiratory risks dominate always.'
    exposure_guidance:
      presentation: descriptive
      _section:
        title: Exposure Guidelines
        description: OSHA PEL, NIOSH REL, ACGIH TLV, and safe exposure limits
        icon: shield-alert
        order: 2
        variant: warning
      items:
      - content: 'Dealing with sulfur dioxide demands caution right from the start, especially in settings where it might leak or build up unexpectedly. This colorless gas carries a sharp, irritating smell that hits the nose quickly, signaling potential trouble for anyone nearby. Workers in factories or labs handling it should always gear up with proper masks and suits to shield their lungs and skin from its harsh effects.


          Breathing it in, even briefly, can irritate the eyes, throat, and chest, leading to coughing fits or worse breathing issues over time. Those with sensitive health conditions feel the impact hardest, so keeping exposure low through good ventilation turns crucial. In industrial spots like chemical plants or food processing, where sulfur dioxide helps make acids or preserves items, regular checks for leaks prevent silent buildups that could turn risky.


          When it comes to cleaning tools or surfaces with lasers, sulfur dioxide''s role stays limited, but any process involving it requires sealed areas to avoid spreading the gas. Training everyone on quick evacuation steps and having neutralizers ready cuts down dangers effectively. Storing it in sturdy, labeled containers away from heat sources keeps things stable and safe overall.'
    personal_protection:
      presentation: descriptive
      _section:
        title: Personal Protection Equipment
        description: Required PPE including respirators, gloves, eye protection, and protective clothing
        icon: shield-check
        order: 3
        variant: warning
      items:
      - content: Workers handling sulfur dioxide face risks from its irritating fumes and corrosive nature, unlike milder gases that pose less threat. Eyes sting fast without shields. Goggles or full-face respirators block exposure. Skin absorbs it easily, causing burns. Gloves made of resistant rubber protect hands. Full-body suits seal out vapors in heavy exposure zones. Breathing the gas harms lungs deeply. Self-contained breathing apparatus ensures clean air supply. Boots and coveralls add layers against spills. Always pair PPE with good ventilation to cut risks. Training on quick donning saves time in emergencies.
    emergency_procedures:
      presentation: descriptive
      _section:
        title: Emergency Procedures
        description: First aid measures, emergency response, and incident management
        icon: siren
        order: 4
        variant: danger
      items:
      - content: Exposure to sulfur dioxide demands immediate action to ease the gas's sharp irritant effects on the respiratory system. Move the affected person to fresh air without delay, keeping them calm while ensuring your own safety to avoid secondary inhalation. If breathing turns labored or stops, start rescue breathing or use an available device only if trained to do so, prioritizing professional help over hesitation. For eye contact, flush thoroughly with plenty of clean water, holding the eyelids open to wash away the corrosive residue that stings and inflames delicate tissues. Skin touched by the gas or its solutions calls for gentle rinsing with water, followed by loose clothing to prevent further aggravation from the compound's drying, blistering tendencies. Never induce vomiting if swallowed, as this toxic substance can worsen internal burns; instead, offer sips of water or milk to dilute its harsh acidity, but only if the person remains fully conscious and alert. Seek emergency
          medical care right away, since lingering symptoms like persistent coughing or chest tightness signal deeper damage that self-care alone cannot fully address. In industrial settings where this gas arises from processes like smelting or combustion, having quick-access eyewash stations and ventilation proves crucial for mitigating such exposures effectively.
