displayName: Sulfur Dioxide (SO₂)
subcategory: acid_gas
ppe_requirements: Workers handling sulfur dioxide face risks from its irritating fumes and corrosive nature, unlike milder
  gases that pose less threat. Eyes sting fast without shields. Goggles or full-face respirators block exposure. Skin absorbs
  it easily, causing burns. Gloves made of resistant rubber protect hands. Full-body suits seal out vapors in heavy exposure
  zones. Breathing the gas harms lungs deeply. Self-contained breathing apparatus ensures clean air supply. Boots and coveralls
  add layers against spills. Always pair PPE with good ventilation to cut risks. Training on quick donning saves time in emergencies.
formula: SO₂
faq:
- question: As a laser cleaning operator, how can I protect myself from SO₂ exposure if the process generates this gas from
    sulfur-containing materials?
  answer: Always prioritize engineering controls like local exhaust ventilation to capture and remove SO₂ at the source, maintaining
    exposure below the OSHA permissible limit of 5 ppm (parts per million) over an 8-hour shift. Wear a full-face respirator
    with an appropriate cartridge rated for acid gases (e.g., NIOSH-approved P100 with acid gas cartridge) and ensure personal
    protective equipment like gloves and protective clothing to avoid skin contact. Regularly monitor air quality with SO₂
    detectors or badges, and evacuate if levels exceed 5 ppm, seeking fresh air immediately if irritation occurs.
