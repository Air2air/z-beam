ppe_requirements:
  respiratory: SCBA or supplied-air respirator for >5 ppm or unknown concentrations. Air-purifying with acid gas cartridge
    acceptable for ≤5 ppm with escape provisions.
  skin: Nitrile gloves for liquid contact (cryogenic hazard). Thermal protection for liquefied SO2.
  eye: Chemical safety goggles, face shield for liquid contact
  minimum_level: Level C for known <5 ppm, Level B for >5 ppm or liquefied SO2
  special_notes: Extremely irritating to eyes and respiratory tract. Cryogenic liquid causes frostbite. Asthma trigger - asthmatics
    extremely sensitive.
physical_properties:
  boiling_point: -10.0°C (14°F)
  melting_point: -75.5°C (-103.9°F)
  vapor_pressure: 2538 mmHg @ 21°C
  vapor_density: 2.26 (Air=1)
  specific_gravity: 1.43 (liquid @ 0°C)
  flash_point: Not applicable (non-flammable)
  autoignition_temp: Not applicable
  explosive_limits: Not applicable
  appearance: Colorless gas, colorless liquid under pressure
  odor: Pungent, suffocating odor @ 0.3-1 ppm
emergency_response:
  fire_hazard: Non-flammable. Cylinders may explode when heated. Toxic decomposition products in fire.
  fire_suppression: If cylinder involved in fire, evacuate immediately - explosion hazard. Cool cylinders with water spray
    from maximum distance. Let fire burn out if possible.
  spill_procedures: 'EVACUATE. Ventilate area. SCBA for >100 ppm. Neutralize with soda ash or lime. Contain with dry sand
    or earth. For liquid: cryogenic hazard - specialized equipment needed.'
  exposure_immediate_actions: 'Remove to fresh air immediately. Eyes: flush with water for 15 minutes. If inhaled: administer
    oxygen. Seek medical attention - risk of bronchospasm and delayed pulmonary edema. For asthmatics: MEDICAL EMERGENCY.'
  environmental_hazards: Major contributor to acid rain. Toxic to vegetation. Acidifies water bodies. Report releases >1 lb.
  special_hazards: Severe respiratory and eye irritant. Triggers asthma attacks. Forms sulfurous acid with moisture. Corrosive
    to tissues. May cause bronchospasm and pulmonary edema. Cryogenic liquid causes frostbite.
storage_requirements:
  temperature_range: Store cylinders <52°C. Liquefied SO2 requires cryogenic storage.
  ventilation: 'Outdoor storage preferred. Indoor: mechanical ventilation with emergency backup. SO2 gas detection mandatory.'
  incompatibilities:
  - Potassium chlorate
  - Alkali metals
  - Sodium hydride
  - Metal oxides
  - Aluminum
  - Halogens
  container_material: Steel cylinders. Stainless steel for liquid.
  segregation: Separate from incompatibles. Corrosive gas storage area.
  quantity_limits: Per fire code. Many facilities limit indoor storage.
  special_requirements: 'Cylinder restraints mandatory. Leak detection system required. Post "CORROSIVE GAS" signs. Emergency
    procedures posted. For liquid: cryogenic handling equipment.'
