environmental_impact:
  aquatic_toxicity: 'Toxic to aquatic life. LC50 (fish, 96h): 100-180 mg/L. Forms acidic solutions.'
  biodegradability: Reacts in atmosphere. Oxidizes to sulfuric acid. Not biodegradable.
  bioaccumulation: Does not bioaccumulate.
  soil_mobility: High mobility as gas. Deposits as sulfates. Contributes to soil acidification.
  atmospheric_fate: 'Oxidizes to sulfur trioxide then sulfuric acid. Major acid rain precursor. Atmospheric residence: hours
    to days.'
  ozone_depletion: false
  global_warming_potential: null
  reportable_releases:
    water: 1 lb to navigable waters
    air: 1 lb/day (CERCLA RQ)
