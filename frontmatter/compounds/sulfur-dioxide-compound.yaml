  firstAid: >-
    Exposure to sulfur dioxide demands immediate action to ease the gas's sharp irritant effects on the respiratory
    system. Move the affected person to fresh air without delay, keeping them calm while ensuring your own safety to
    avoid secondary inhalation. If breathing turns labored or stops, start rescue breathing or use an available device
    only if trained to do so, prioritizing professional help over hesitation. For eye contact, flush thoroughly with
    plenty of clean water, holding the eyelids open to wash away the corrosive residue that stings and inflames delicate
    tissues. Skin touched by the gas or its solutions calls for gentle rinsing with water, followed by loose clothing to
    prevent further aggravation from the compound's drying, blistering tendencies. Never induce vomiting if swallowed,
    as this toxic substance can worsen internal burns; instead, offer sips of water or milk to dilute its harsh acidity,
    but only if the person remains fully conscious and alert. Seek emergency medical care right away, since lingering
    symptoms like persistent coughing or chest tightness signal deeper damage that self-care alone cannot fully address.
    In industrial settings where this gas arises from processes like smelting or combustion, having quick-access eyewash
    stations and ventilation proves crucial for mitigating such exposures effectively.
