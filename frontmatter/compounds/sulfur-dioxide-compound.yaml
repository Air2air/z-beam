      - Alkali metals
      - Sodium hydride
      - Metal oxides
      - Aluminum
      - Halogens
      container_material: Steel cylinders. Stainless steel for liquid.
      segregation: Separate from incompatibles. Corrosive gas storage area.
      quantity_limits: Per fire code. Many facilities limit indoor storage.
      special_requirements: 'Cylinder restraints mandatory. Leak detection system required. Post "CORROSIVE GAS" signs. Emergency
