faq:
  presentation: collapsible
  items:
  - id: what-protection-methods-should-laser-cleaning
    title: What protection methods should laser cleaning operators use to prevent carbon monoxide (CO) exposure?
    content: Always work in well-ventilated areas or use local exhaust ventilation systems to dilute and remove CO generated
      from material vaporization during laser cleaning. Wear a respirator with an appropriate cartridge (e.g., NIOSH-approved
      for organic vapors and acid gases) if ventilation is inadequate, and ensure personal CO monitors or alarms are worn
      to provide real-time detection. Regularly maintain equipment to minimize incomplete combustion sources, and follow OSHA's
      permissible exposure limit of 50 ppm over an 8-hour workday to avoid symptoms like headaches or dizziness.
    metadata:
      topic: protection methods should laser cleaning
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: true
      order: 1
  options:
    autoOpenFirst: true
    sortBy: severity
