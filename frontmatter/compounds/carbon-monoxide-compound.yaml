    health_impacts:
      presentation: descriptive
      _section:
        title: Health Impacts
        description: Health effects from exposure including acute and chronic impacts
        icon: heart-pulse
        order: 1
        variant: warning
      items:
      - content: "When dealing with carbon monoxide, watch its sneaky toxicity right away. Unlike oxygen, which sustains life,\
          \ this gas binds tightly to your blood. That starves cells of what they need. \n\nCompare it to nitrogen—mostly\
          \ harmless in air. Carbon monoxide slips in silently, mimicking oxygen's role. But it fools the body hard. Headaches\
          \ hit first. Dizziness follows quick. \n\nIn industrial spots, like welding or engines, it builds up fast. Workers\
          \ feel nausea without warning. Worse, confusion sets in deep. Blackouts can end it all. \n\nSafer gases like argon\
          \ just displace air. Carbon monoxide poisons from within. Always vent well. Use detectors everywhere. Train teams\
          \ to spot signs early."
    exposure_guidance:
      presentation: descriptive
      _section:
        title: Exposure Guidelines
        description: OSHA PEL, NIOSH REL, ACGIH TLV, and safe exposure limits
        icon: shield-alert
        order: 2
        variant: warning
      items:
      - content: Carbon monoxide slips in silently, unlike oxygen that sustains life. It binds tighter, starving the body
          fast. Headaches hit first, then dizziness creeps in. Nausea follows, vision blurs quick. In heavy doses, confusion
          reigns; blackout looms. Factories vent it during burns, welding sparks it free. Laser cleaning? It lingers in fumes,
          demanding fresh air pulls. Wear masks tight, detect early with alarms. Ventilate wide, never ignore the threat.
    personal_protection:
      presentation: descriptive
      _section:
        title: Personal Protection Equipment
        description: Required PPE including respirators, gloves, eye protection, and protective clothing
        icon: shield-check
        order: 3
        variant: warning
      items:
      - content: 'Unlike many everyday hazards that announce themselves with visible signs or strong smells, carbon monoxide
          sneaks in silently, demanding gear that actively shields the lungs from its invisible threat. Workers in industrial
          settings, where this toxic gas might leak from machinery or combustion processes, rely on full-face respirators
          fitted with cartridges designed to filter out such colorless fumes. These aren''t just masks; they form a sealed
          barrier, preventing even the slightest inhalation during tasks like welding or engine repairs.


          Gloves made from chemical-resistant materials come next, protecting hands from any condensed residues or related
          spills that could irritate skin. In hotter environments, like foundries, coveralls or suits that resist flames add
          another layer, keeping the body safe from sparks that might ignite nearby vapors.


          For laser cleaning operations involving metal surfaces—where the process generates heat and potential gas buildup—eye
          protection becomes crucial. Goggles with side shields block intense beams while also guarding against any airborne
          particles stirred up. Boots with steel toes ensure stability on slick floors, reducing slip risks amid the equipment.


          Overall, this setup emphasizes detection tools integrated into suits, alerting users to rising dangers before they
          strike, turning a stealthy poison into a manageable workplace foe.'
    emergency_procedures:
      presentation: descriptive
      _section:
        title: Emergency Procedures
        description: First aid measures, emergency response, and incident management
        icon: siren
        order: 4
        variant: danger
      items:
      - content: While fresh air revives someone gasping from everyday irritants like smoke, carbon monoxide demands swift,
          decisive action since its silent grip mimics fatigue or flu, potentially turning deadly without warning. Rush the
          affected person outdoors or to a well-ventilated space right away, loosening any tight clothing around the neck
          or chest to ease breathing. If they seem unconscious or unresponsive, check for signs of life by gently shaking
          and calling their name—never delay summoning professional help, as paramedics carry the tools to counter this insidious
          threat. Should breathing stop entirely, begin chest compressions paired with rescue breaths if you're trained, keeping
          the rhythm steady until aid arrives. For milder exposures where the person stays alert but woozy, encourage them
          to rest quietly in open air, avoiding any exertion that could worsen the bind on their oxygen-starved system. Remember,
          this gas fools the body by binding tightly to blood carriers, so even brief encounters in enclosed spots like garages
          or faulty heaters call for vigilance; prevention through detectors beats reaction every time, but knowing these
          steps can bridge the gap to safety.
