author:
  id: 4
ppe_requirements:
  respiratory: NIOSH-approved full-face pressure-demand SCBA or supplied-air respirator with escape bottle for IDLH conditions.
    Continuous flow supplied-air for <1200 ppm.
  skin: Protective gloves not normally required for gas (required for compressed gas cylinders). Thermal protection if handling
    cryogenic liquid.
  eye: Safety glasses. Face shield if handling compressed gas cylinders.
  minimum_level: Level B for confined spaces/unknown concentrations, Level C with supplied air for known concentrations <1200
    ppm
  special_notes: CO is an asphyxiant - displaces oxygen. SCBA required in oxygen-deficient atmospheres (<19.5% O2). Detector
    badges provide no respiratory protection.
emergency_response:
  fire_hazard: Extremely flammable gas. Wide flammability range. Vapors lighter than air but may accumulate in low areas.
    Cylinders may rupture in fire.
  fire_suppression: Do not extinguish burning gas unless flow can be stopped. Use water spray to cool cylinders. Use dry chemical
    or CO2 for surrounding fires.
  spill_procedures: Evacuate area immediately. Eliminate ignition sources. Ventilate area or move containers to safe area.
    Stop leak if safe to do so. Monitor with CO detectors.
  exposure_immediate_actions: Remove to fresh air IMMEDIATELY. Administer 100% oxygen by tight-fitting mask. If breathing
    stopped, give artificial respiration. Seek immediate medical attention. Consider hyperbaric oxygen therapy for severe
    exposures.
  environmental_hazards: Negligible environmental persistence - rapidly disperses and oxidizes to CO2. Primary hazard is asphyxiation,
    not environmental contamination.
  special_hazards: Odorless, colorless - cannot detect without monitors. Binds to hemoglobin 200-250x more strongly than oxygen,
    causing tissue hypoxia. Delayed neurological effects possible.
environmental_impact:
  aquatic_toxicity: 'Low direct toxicity to aquatic life. LC50 (fish): >100 mg/L. Rapidly escapes to atmosphere from water.'
  biodegradability: Not biodegradable in conventional sense. Oxidizes to CO2 in atmosphere.
  bioaccumulation: No bioaccumulation potential. Does not persist in environment.
  soil_mobility: Not applicable - gas escapes to atmosphere immediately.
  atmospheric_fate: 'Oxidizes to CO2 via hydroxyl radical reaction. Atmospheric lifetime: 1-2 months. Contributes to tropospheric
    ozone formation.'
  ozone_depletion: false
  global_warming_potential: Indirect effect via methane oxidation, but negligible GWP itself
  reportable_releases:
    water: Not reportable (low aquatic persistence)
    air: State-dependent. Many states require reporting large releases (e.g., >100 lbs/hr in some jurisdictions)
detection_monitoring:
  sensor_types:
  - Electrochemical (most common)
  - Infrared (NDIR)
  - Semiconductor
  - Biomimetic gel (color change)
  detection_range: 0-300 ppm typical, 0-1000 ppm extended, 0-2000 ppm for rescue
  alarm_setpoints:
    low: 35 ppm (NIOSH REL)
    high: 200 ppm (NIOSH Ceiling)
    evacuate: 1200 ppm (NIOSH IDLH)
  colorimetric_tubes:
  - Dräger CH25701
  - Gastec 1LC/1LB
  - Kitagawa 106SD
  analytical_methods:
  - method: NIOSH 6604
    technique: GC-FID or electrochemical sensor
    detection_limit: 0.03 ppm
  - method: OSHA ID-209
    technique: GC-TCD (thermal conductivity)
    detection_limit: 2 ppm
  odor_threshold: NO ODOR - Cannot be detected by smell. MUST use electronic monitors. Odorless nature makes CO extremely
    dangerous.
