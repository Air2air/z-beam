  firstAid: >-
    While fresh air revives someone gasping from everyday irritants like smoke, carbon monoxide demands swift, decisive
    action since its silent grip mimics fatigue or flu, potentially turning deadly without warning. Rush the affected
    person outdoors or to a well-ventilated space right away, loosening any tight clothing around the neck or chest to
    ease breathing. If they seem unconscious or unresponsive, check for signs of life by gently shaking and calling
    their name—never delay summoning professional help, as paramedics carry the tools to counter this insidious threat.
    Should breathing stop entirely, begin chest compressions paired with rescue breaths if you're trained, keeping the
    rhythm steady until aid arrives. For milder exposures where the person stays alert but woozy, encourage them to rest
    quietly in open air, avoiding any exertion that could worsen the bind on their oxygen-starved system. Remember, this
    gas fools the body by binding tightly to blood carriers, so even brief encounters in enclosed spots like garages or
    faulty heaters call for vigilance; prevention through detectors beats reaction every time, but knowing these steps
    can bridge the gap to safety.
