ppe_requirements:
  respiratory: NIOSH-approved full-face pressure-demand SCBA or supplied-air respirator with escape bottle for IDLH conditions.
    Continuous flow supplied-air for <1200 ppm.
  skin: Protective gloves not normally required for gas (required for compressed gas cylinders). Thermal protection if handling
    cryogenic liquid.
  eye: Safety glasses. Face shield if handling compressed gas cylinders.
  minimum_level: Level B for confined spaces/unknown concentrations, Level C with supplied air for known concentrations <1200
    ppm
  special_notes: CO is an asphyxiant - displaces oxygen. SCBA required in oxygen-deficient atmospheres (<19.5% O2). Detector
    badges provide no respiratory protection.
storage_requirements:
  temperature_range: Store compressed gas cylinders below 52°C (125°F)
  ventilation: 'Outdoor storage preferred. If indoors: continuous mechanical ventilation, gas detection system with alarms'
  incompatibilities:
  - Strong oxidizers
  - Oxygen
  - Air (explosive mixtures)
  - Chlorine
  - Fluorine
  - Nitrous oxide
  container_material: DOT-approved compressed gas cylinders (steel, aluminum). Do not transfer to unauthorized containers.
  segregation: Separate from oxygen cylinders by 20 feet or 5-foot non-combustible barrier. Store in dedicated gas cylinder
    storage.
  quantity_limits: 'Per 29 CFR 1910.253: Maximum 300 cubic feet indoors, unlimited outdoors with proper segregation'
  special_requirements: Secure cylinders to prevent falling. Store upright. Cap cylinders when not in use. Post "CARBON MONOXIDE
    - POISON GAS" signs. Implement gas detection systems.
