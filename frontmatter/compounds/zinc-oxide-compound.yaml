  symptoms: []
  firstAid: >-
    Get the person away from fumes fast. Fresh air helps right away. They might feel shaky or nauseous—metal fumes from
    zinc oxide hit like that. Keep them calm and resting. Offer cool water to sip slowly. Watch for worsening chills or
    cough. Call a doctor if breathing gets tough. Avoid forcing food until steady. This stuff irritates quick, unlike
    dust. Recovery comes with time in clean space.
