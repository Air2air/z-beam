  ppe_requirements:
    presentation: descriptive
    items:
    - respiratory: NIOSH-approved air-purifying respirator with P100 particulate filters for ≤50 mg/m³. PAPR for higher concentrations.
        SCBA for unknown or emergency response.
      skin: Leather or cotton gloves adequate for dust. Welding gloves for metal work.
      eye: Safety glasses with side shields. Welding goggles/helmet for welding operations.
      minimum_level: Level D for dust <10 mg/m³, Level C for >10 mg/m³ or welding fume
      special_notes: Metal fume fever primary concern. Prevent inhalation during welding/cutting galvanized metal. Symptoms
        develop 4-12 hours post-exposure. Well-ventilated work areas essential.
    _section:
      title: PPE Requirements
      description: Personal protective equipment needed for safe handling
      icon: shield
      order: 5
      variant: warning
  emergency_response:
    presentation: descriptive
    items:
    - fire_hazard: Non-combustible. May release toxic zinc oxide fume when heated above 1000°C.
      fire_suppression: Use agent appropriate for surrounding fire. Wear SCBA - toxic fumes possible.
      spill_procedures: Avoid generating dust. Sweep or vacuum with HEPA filter. Place in sealed containers. Dispose as non-hazardous
        or hazardous depending on concentration and source.
      exposure_immediate_actions: 'Remove from exposure. If metal fume fever suspected: rest, fluids, symptomatic treatment.
        Symptoms self-limiting 24-48 hours. If severe: seek medical attention. Monitor respiratory function.'
      environmental_hazards: Toxic to aquatic life. May contaminate soil/water. Generally low environmental risk.
      special_hazards: 'METAL FUME FEVER: flu-like symptoms 4-12 hours post-exposure (fever, chills, nausea, muscle aches).
        Self-limiting but recurrent with repeated exposure. Welding galvanized metal major exposure source.'
    _section:
      title: Emergency Response
      description: First aid and emergency procedures for exposure incidents
      icon: alert-triangle
      order: 7
      variant: danger
