faq:
  presentation: collapsible
  items:
  - id: as-a-laser-cleaning-operator-working
    title: As a laser cleaning operator working on galvanized steel, how do zinc oxide fumes differ from iron oxide dust in
      terms of health risks, and what protection should I use to stay safe?
    content: Zinc oxide fumes irritate the lungs much faster than iron oxide dust, which accumulates more gradually and causes
      slower onset of respiratory issues like pneumoconiosis; acute exposure to ZnO can lead to metal fume fever within hours,
      while iron oxide typically requires chronic exposure. To protect yourself, always use a NIOSH-approved respirator with
      a P100 filter rated for metal fumes, ensure engineering controls like local exhaust ventilation capture at least 90%
      of fumes at the source, and monitor personal exposure to keep below the OSHA PEL of 5 mg/m³ (as ZnO) over an 8-hour
      shift. Perform regular air sampling and medical check-ups if working in high-fume environments to detect early signs
      of irritation.
    metadata:
      topic: as a laser cleaning operator
      severity: medium
      acceptedAnswer: true
