  environmental_impact:
    presentation: descriptive
    items:
    - aquatic_toxicity: 'Very toxic to aquatic life. LC50 (fish, 96h): 0.5-5 mg/L depending on pH and hardness. More toxic
        in soft acidic water.'
      biodegradability: Not biodegradable (inorganic).
      bioaccumulation: 'Moderate bioaccumulation. BCF: 10-100. Essential element but toxic at high levels.'
      soil_mobility: 'Low mobility. Adsorbs to soil particles. Persistence: indefinite.'
      atmospheric_fate: Settles as particulate. Does not react in atmosphere.
      ozone_depletion: false
      global_warming_potential: null
      reportable_releases:
        water: 1000 lbs zinc compounds to navigable waters
        air: 1000 lbs/day zinc compounds (CERCLA RQ)
    _section:
