reactivity:
  stability: Stable under normal conditions.
  polymerization: Will not polymerize
  incompatible_materials:
  - Chlorinated rubber (fire risk)
  - Linseed oil (spontaneous ignition)
  - Magnesium (explosive)
  - Strong acids (generates hydrogen)
  hazardous_decomposition:
  - Zinc oxide fume
  - Zinc vapors at very high temperatures
  conditions_to_avoid:
  - High heat (>1000°C)
  - Incompatible materials
  - Chlorinated rubber mixtures
  reactivity_hazard: Generally stable. Reacts with strong acids producing hydrogen gas. May ignite spontaneously with linseed
    oil.
environmental_impact:
  aquatic_toxicity: 'Very toxic to aquatic life. LC50 (fish, 96h): 0.5-5 mg/L depending on pH and hardness. More toxic in
    soft acidic water.'
  biodegradability: Not biodegradable (inorganic).
  bioaccumulation: 'Moderate bioaccumulation. BCF: 10-100. Essential element but toxic at high levels.'
  soil_mobility: 'Low mobility. Adsorbs to soil particles. Persistence: indefinite.'
  atmospheric_fate: Settles as particulate. Does not react in atmosphere.
  ozone_depletion: false
  global_warming_potential: null
  reportable_releases:
    water: 1000 lbs zinc compounds to navigable waters
    air: 1000 lbs/day zinc compounds (CERCLA RQ)
