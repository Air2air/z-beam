    fire_hazard: Non-combustible. May release toxic zinc oxide fume when heated above 1000°C.
    fire_suppression: Use agent appropriate for surrounding fire. Wear SCBA - toxic fumes possible.
    spill_procedures: Avoid generating dust. Sweep or vacuum with HEPA filter. Place in sealed containers. Dispose as non-hazardous
      or hazardous depending on concentration and source.
    exposure_immediate_actions: 'Remove from exposure. If metal fume fever suspected: rest, fluids, symptomatic treatment.
      Symptoms self-limiting 24-48 hours. If severe: seek medical attention. Monitor respiratory function.'
    environmental_hazards: Toxic to aquatic life. May contaminate soil/water. Generally low environmental risk.
    special_hazards: 'METAL FUME FEVER: flu-like symptoms 4-12 hours post-exposure (fever, chills, nausea, muscle aches).
      Self-limiting but recurrent with repeated exposure. Welding galvanized metal major exposure source.'
