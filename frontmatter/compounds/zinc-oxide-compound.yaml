ppe_requirements:
  respiratory: NIOSH-approved air-purifying respirator with P100 particulate filters for ≤50 mg/m³. PAPR for higher concentrations.
    SCBA for unknown or emergency response.
  skin: Leather or cotton gloves adequate for dust. Welding gloves for metal work.
  eye: Safety glasses with side shields. Welding goggles/helmet for welding operations.
  minimum_level: Level D for dust <10 mg/m³, Level C for >10 mg/m³ or welding fume
  special_notes: Metal fume fever primary concern. Prevent inhalation during welding/cutting galvanized metal. Symptoms develop
    4-12 hours post-exposure. Well-ventilated work areas essential.
physical_properties:
  boiling_point: 1974°C (3585°F) - sublimes
  melting_point: 1975°C (3587°F)
  vapor_pressure: Negligible at room temperature
  vapor_density: Not applicable (solid)
  specific_gravity: '5.6'
  flash_point: Not applicable
  autoignition_temp: Not applicable
  explosive_limits: Not applicable
  appearance: White to yellowish-white powder
  odor: Odorless
emergency_response:
  fire_hazard: Non-combustible. May release toxic zinc oxide fume when heated above 1000°C.
  fire_suppression: Use agent appropriate for surrounding fire. Wear SCBA - toxic fumes possible.
  spill_procedures: Avoid generating dust. Sweep or vacuum with HEPA filter. Place in sealed containers. Dispose as non-hazardous
    or hazardous depending on concentration and source.
  exposure_immediate_actions: 'Remove from exposure. If metal fume fever suspected: rest, fluids, symptomatic treatment. Symptoms
    self-limiting 24-48 hours. If severe: seek medical attention. Monitor respiratory function.'
  environmental_hazards: Toxic to aquatic life. May contaminate soil/water. Generally low environmental risk.
  special_hazards: 'METAL FUME FEVER: flu-like symptoms 4-12 hours post-exposure (fever, chills, nausea, muscle aches). Self-limiting
    but recurrent with repeated exposure. Welding galvanized metal major exposure source.'
storage_requirements:
  temperature_range: Store at room temperature
  ventilation: General ventilation adequate. Keep containers closed.
  incompatibilities:
  - Chlorinated rubber
  - Linseed oil
  - Magnesium
  - Strong acids
  container_material: Plastic or metal containers with tight lids.
  segregation: None required for pure zinc oxide. Separate from incompatibles.
  quantity_limits: None specified. Follow facility storage protocols.
  special_requirements: Keep containers closed when not in use. Store in dry area. Prevent dust accumulation.
