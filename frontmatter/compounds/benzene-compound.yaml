  storage_requirements:
    temperature_range: Store below 25°C (77°F) in cool area
    ventilation: Local exhaust ventilation required, explosion-proof equipment, minimum 100 ft/min face velocity
    incompatibilities:
    - Strong oxidizers
    - Halogens (chlorine, bromine)
    - Nitric acid
    - Sulfuric acid
    - Perchlorates
    - Permanganates
    - Peroxides
    container_material: Steel, stainless steel, or aluminum containers. Avoid plastics that dissolve in benzene.
    segregation: Separate from oxidizers, acids, halogens. Store in approved flammable liquid storage cabinet. Keep away from
      heat, sparks, open flames.
    quantity_limits: 'Flammable liquid storage per 29 CFR 1910.106: Maximum 10 gallons outside approved cabinet, 60 gallons
      inside safety cabinet'
    special_requirements: Store in tightly sealed containers in cool, dry, well-ventilated area. Ground and bond containers
      during transfer. Use explosion-proof electrical equipment.
