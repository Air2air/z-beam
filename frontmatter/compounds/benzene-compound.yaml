  symptoms: []
  firstAid: >-
    Skin contact demands immediate action—flush the area thoroughly with plenty of water and mild soap to remove any
    residue before it soaks in deeper. Eyes exposed? Rinse them gently under running water for several minutes, holding
    the lids open wide to ensure full coverage, and keep going until help arrives. If someone inhales fumes in a
    confined space, get them to fresh air right away, loosen tight clothing around the neck and chest, and watch closely
    for breathing issues that might call for rescue breaths or other support if trained. Swallowing even a small amount
    spells trouble, so never try to make the person vomit; instead, offer sips of water if they're alert and conscious,
    then rush to medical professionals who handle such poisons. Benzene lingers as a serious health threat over time,
    acting as a carcinogen that builds up risks with repeated exposure, so always report incidents to experts for
    follow-up care and monitoring.
