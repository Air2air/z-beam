  detection_monitoring:
    presentation: descriptive
    items:
    - sensor_types:
      - Photoionization detector (PID)
      - Infrared
      - Flame ionization detector (FID)
      - Colorimetric tubes
      detection_range: 0-10 ppm typical, 0-100 ppm extended
      alarm_setpoints:
        low: 1 ppm (OSHA PEL)
        high: 5 ppm (OSHA STEL)
        evacuate: 500 ppm (NIOSH IDLH)
      colorimetric_tubes:
      - Dräger CH25801
      - Gastec 121
      - Kitagawa 118
      analytical_methods:
      - method: NIOSH 1501
        technique: GC-FID (Gas Chromatography - Flame Ionization)
        detection_limit: 0.01 ppm
      - method: OSHA 12
        technique: GC-FID with charcoal tube
        detection_limit: 0.01 ppm
      odor_threshold: NOT reliable indicator. Odor threshold (1.5-4.7 ppm) is above safe exposure levels and varies greatly.
        Do not rely on odor - use monitoring equipment.
    _section:
      title: Detection & Monitoring
      description: Methods and equipment for detecting and monitoring this compound
      icon: gauge
      order: 6
      variant: default
  ppe_requirements:
    presentation: descriptive
    items:
    - respiratory: NIOSH-approved organic vapor respirator with full facepiece for >10 ppm, SCBA or supplied-air for >50 ppm
        or unknown concentrations
      skin: Nitrile gloves (>0.5mm), butyl rubber gloves, chemical-resistant clothing, impervious suit for spill response
      eye: Chemical safety goggles and face shield for splash potential
      minimum_level: Level B for spill response, Level C for operations <50 ppm
      special_notes: Benzene is absorbed through skin - full body protection required. Change contaminated clothing immediately,
        do not reuse without decontamination.
    _section:
      title: PPE Requirements
      description: Personal protective equipment needed for safe handling
      icon: shield
      order: 5
      variant: warning
  emergency_response:
    presentation: descriptive
    items:
    - fire_hazard: Highly flammable liquid. Vapors heavier than air, may travel to ignition source. Forms explosive mixtures
        with air.
      fire_suppression: Dry chemical, CO2, alcohol-resistant foam. Water spray to cool containers and disperse vapors. Do
        not use direct water stream.
      spill_procedures: Evacuate area, eliminate ignition sources, ventilate confined spaces, contain with absorbent (sand,
        vermiculite), prevent entry to waterways, collect in sealed containers
      exposure_immediate_actions: Remove to fresh air immediately. Remove contaminated clothing. Wash skin with soap and water
        for 15+ minutes. Flush eyes for 15+ minutes. Seek immediate medical attention - benzene poisoning can be delayed.
      environmental_hazards: Toxic to aquatic life. Floats on water. Volatile - evaporates rapidly. Report spills >10 lbs
        to CERCLA.
      special_hazards: Carcinogen - causes leukemia. May cause bone marrow depression with chronic exposure. Decomposes producing
        toxic carbon monoxide and carbon dioxide.
    _section:
      title: Emergency Response
      description: First aid and emergency procedures for exposure incidents
      icon: alert-triangle
      order: 7
      variant: danger
