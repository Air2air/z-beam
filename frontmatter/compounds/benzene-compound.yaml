  emergency_response:
    presentation: descriptive
    items:
    - fire_hazard: Highly flammable liquid. Vapors heavier than air, may travel to ignition source. Forms explosive mixtures
        with air.
      fire_suppression: Dry chemical, CO2, alcohol-resistant foam. Water spray to cool containers and disperse vapors. Do
        not use direct water stream.
      spill_procedures: Evacuate area, eliminate ignition sources, ventilate confined spaces, contain with absorbent (sand,
        vermiculite), prevent entry to waterways, collect in sealed containers
      exposure_immediate_actions: Remove to fresh air immediately. Remove contaminated clothing. Wash skin with soap and water
        for 15+ minutes. Flush eyes for 15+ minutes. Seek immediate medical attention - benzene poisoning can be delayed.
      environmental_hazards: Toxic to aquatic life. Floats on water. Volatile - evaporates rapidly. Report spills >10 lbs
        to CERCLA.
      special_hazards: Carcinogen - causes leukemia. May cause bone marrow depression with chronic exposure. Decomposes producing
        toxic carbon monoxide and carbon dioxide.
