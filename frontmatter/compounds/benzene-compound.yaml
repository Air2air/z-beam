first_aid: null
author:
  id: 2
ppe_requirements:
  respiratory: NIOSH-approved organic vapor respirator with full facepiece for >10 ppm, SCBA or supplied-air for >50 ppm or
    unknown concentrations
  skin: Nitrile gloves (>0.5mm), butyl rubber gloves, chemical-resistant clothing, impervious suit for spill response
  eye: Chemical safety goggles and face shield for splash potential
  minimum_level: Level B for spill response, Level C for operations <50 ppm
  special_notes: Benzene is absorbed through skin - full body protection required. Change contaminated clothing immediately,
    do not reuse without decontamination.
emergency_response:
  fire_hazard: Highly flammable liquid. Vapors heavier than air, may travel to ignition source. Forms explosive mixtures with
    air.
  fire_suppression: Dry chemical, CO2, alcohol-resistant foam. Water spray to cool containers and disperse vapors. Do not
    use direct water stream.
  spill_procedures: Evacuate area, eliminate ignition sources, ventilate confined spaces, contain with absorbent (sand, vermiculite),
    prevent entry to waterways, collect in sealed containers
  exposure_immediate_actions: Remove to fresh air immediately. Remove contaminated clothing. Wash skin with soap and water
    for 15+ minutes. Flush eyes for 15+ minutes. Seek immediate medical attention - benzene poisoning can be delayed.
  environmental_hazards: Toxic to aquatic life. Floats on water. Volatile - evaporates rapidly. Report spills >10 lbs to CERCLA.
  special_hazards: Carcinogen - causes leukemia. May cause bone marrow depression with chronic exposure. Decomposes producing
    toxic carbon monoxide and carbon dioxide.
environmental_impact:
  aquatic_toxicity: 'Toxic to aquatic organisms. LC50 (fish, 96h): 5.3-5.9 mg/L (rainbow trout). Toxic to algae and invertebrates.'
  biodegradability: Readily biodegradable under aerobic conditions. >60% degradation in 28 days.
  bioaccumulation: 'Low potential. Log Kow: 2.13 (does not bioaccumulate significantly)'
  soil_mobility: High mobility. Low soil adsorption. May leach to groundwater.
  atmospheric_fate: 'Photooxidation half-life: 4-17 days. Reacts with hydroxyl radicals. Does not undergo direct photolysis.'
  ozone_depletion: false
  global_warming_potential: null
  reportable_releases:
    water: 10 lbs (4.54 kg) to navigable waters (CWA Section 311)
    air: 10 lbs/day (CERCLA RQ)
detection_monitoring:
  sensor_types:
  - Photoionization detector (PID)
  - Infrared
  - Flame ionization detector (FID)
  - Colorimetric tubes
  detection_range: 0-10 ppm typical, 0-100 ppm extended
  alarm_setpoints:
    low: 1 ppm (OSHA PEL)
    high: 5 ppm (OSHA STEL)
    evacuate: 500 ppm (NIOSH IDLH)
  colorimetric_tubes:
  - Dräger CH25801
  - Gastec 121
  - Kitagawa 118
  analytical_methods:
  - method: NIOSH 1501
    technique: GC-FID (Gas Chromatography - Flame Ionization)
    detection_limit: 0.01 ppm
  - method: OSHA 12
    technique: GC-FID with charcoal tube
    detection_limit: 0.01 ppm
  odor_threshold: NOT reliable indicator. Odor threshold (1.5-4.7 ppm) is above safe exposure levels and varies greatly. Do
    not rely on odor - use monitoring equipment.
