ppe_requirements:
  respiratory: 'MANDATORY: Full-face pressure-demand SCBA or positive-pressure supplied-air respirator with escape SCBA. No
    air-purifying respirators approved - extremely toxic.'
  skin: Butyl rubber gloves (>0.5mm), nitrile gloves, fully-encapsulating chemical protective suit. HCN absorbs rapidly through
    skin.
  eye: Chemical safety goggles and full face shield. Liquid contact causes severe burns.
  minimum_level: Level A for unknown concentrations or >10 ppm, Level B minimum for known concentrations <10 ppm
  special_notes: HCN penetrates ordinary clothing. Rapidly absorbed through skin causing systemic poisoning. Use butyl rubber
    - NOT neoprene or natural rubber. Emergency cyanide antidote kit must be immediately available.
storage_requirements:
  temperature_range: Store below 25°C (77°F), ideally <15°C. Avoid heating above boiling point.
  ventilation: 'Outdoor storage strongly preferred. If indoors: continuous mechanical ventilation with emergency backup, HCN
    gas detection with evacuation alarms'
  incompatibilities:
  - Acids
  - Strong bases
  - Oxidizers
  - Water (polymerization catalyst)
  - Ammonia
  - Sulfur
  - Halogens
  - Amines
  container_material: Stainless steel or glass with PTFE-lined caps. Stabilized with acid (H3PO4 or H2SO4) to prevent polymerization.
    Never use copper, copper alloys, or iron containers.
  segregation: Isolated storage area, separate from all other chemicals. Secure area with restricted access. Post "POISON
    GAS - AUTHORIZED PERSONNEL ONLY" signs.
  quantity_limits: Minimize quantities stored. Per OSHA, treat as extremely hazardous. Many facilities limit to <5 gallons
    on-site.
  special_requirements: 'CRITICAL: Store with stabilizer (acid). Check stabilizer level regularly. Refrigerated storage recommended.
    Gas detection system MANDATORY. Emergency shower/eyewash within 10 seconds travel. Cyanide antidote kits at storage location.
    Written emergency procedures posted.'
