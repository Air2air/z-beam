reactivity:
  stability: UNSTABLE. Polymerizes violently when contaminated with water, bases, or ammonia. Must be stabilized with acid.
  polymerization: May polymerize explosively if not stabilized. Polymerization exothermic - can rupture containers and cause
    explosions.
  incompatible_materials:
  - Water (polymerization)
  - Strong bases (sodium hydroxide)
  - Acids (releases HCN gas)
  - Oxidizers
  - Ammonia
  - Amines
  - Sulfur
  - Acetaldehyde
  - Halogens
  hazardous_decomposition:
  - Nitrogen oxides (NOx)
  - Hydrogen cyanide gas
  - Carbon monoxide
  - Ammonia
  conditions_to_avoid:
  - Heat
  - Moisture/water
  - Alkaline conditions
  - Light
  - Flames
  - Sparks
  - Oxidizers
  - Contamination of any kind
  reactivity_hazard: EXTREMELY REACTIVE. Violent polymerization with alkaline materials. Reacts with oxidizers causing fire
    and explosion. Attacks some metals (copper, zinc) forming explosive metal cyanides.
environmental_impact:
  aquatic_toxicity: 'Extremely toxic to aquatic life. LC50 (fish, 96h): 0.05-0.3 mg/L. Toxic at parts-per-billion levels.'
  biodegradability: 'Readily biodegradable by specialized bacteria. Oxidizes to carbon dioxide and ammonia. Half-life in water:
    hours to days.'
  bioaccumulation: 'Does not bioaccumulate. Log Kow: 0.66. Rapidly metabolized or volatilizes.'
  soil_mobility: High mobility in soil. Volatilizes rapidly. Does not adsorb to soil.
  atmospheric_fate: 'Rapidly oxidizes via hydroxyl radicals. Atmospheric half-life: 1-3 years. Photolyzes in sunlight.'
  ozone_depletion: false
  global_warming_potential: null
  reportable_releases:
    water: 10 lbs (4.54 kg) to navigable waters - IMMEDIATELY reportable
    air: 10 lbs/day (CERCLA RQ) - ANY release must be reported immediately due to extreme toxicity
