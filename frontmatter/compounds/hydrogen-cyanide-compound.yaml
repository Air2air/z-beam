  health_effects: *id001
  environmental_impact:
    presentation: descriptive
    items:
    - aquatic_toxicity: 'Extremely toxic to aquatic life. LC50 (fish, 96h): 0.05-0.3 mg/L. Toxic at parts-per-billion levels.'
      biodegradability: 'Readily biodegradable by specialized bacteria. Oxidizes to carbon dioxide and ammonia. Half-life
        in water: hours to days.'
      bioaccumulation: 'Does not bioaccumulate. Log Kow: 0.66. Rapidly metabolized or volatilizes.'
      soil_mobility: High mobility in soil. Volatilizes rapidly. Does not adsorb to soil.
      atmospheric_fate: 'Rapidly oxidizes via hydroxyl radicals. Atmospheric half-life: 1-3 years. Photolyzes in sunlight.'
      ozone_depletion: false
      global_warming_potential: null
      reportable_releases:
        water: 10 lbs (4.54 kg) to navigable waters - IMMEDIATELY reportable
        air: 10 lbs/day (CERCLA RQ) - ANY release must be reported immediately due to extreme toxicity
    _section:
      title: Environmental Impact
      description: Environmental effects and ecological considerations
      icon: wind
      order: 8
      variant: warning
  detection_monitoring:
    presentation: descriptive
    items:
    - sensor_types:
      - Electrochemical
      - Semiconductor
      - Photoionization detector (PID)
      - Infrared
      detection_range: 0-30 ppm typical (must detect sub-ppm levels)
      alarm_setpoints:
        low: 4.7 ppm (NIOSH ceiling)
        high: 10 ppm (OSHA ceiling)
        evacuate: 50 ppm (NIOSH IDLH) - IMMEDIATELY LIFE-THREATENING
      colorimetric_tubes:
      - Dräger CH29901
      - Gastec 12L/12
      - Kitagawa 710
      analytical_methods:
      - method: NIOSH 6010
        technique: Spectrophotometry (colorimetric)
        detection_limit: 0.2 ppb
      - method: OSHA PV2074
        technique: Ion chromatography
        detection_limit: 0.03 ppm
      odor_threshold: UNRELIABLE - 20-40% of population cannot smell HCN (genetic). Odor threshold (0.58-5 ppm) overlaps toxic
        range. NEVER rely on odor - MANDATORY continuous monitoring with alarms.
    _section:
      title: Detection & Monitoring
      description: Methods and equipment for detecting and monitoring this compound
      icon: gauge
      order: 6
      variant: default
  ppe_requirements:
    presentation: descriptive
    items:
    - respiratory: 'MANDATORY: Full-face pressure-demand SCBA or positive-pressure supplied-air respirator with escape SCBA.
        No air-purifying respirators approved - extremely toxic.'
      skin: Butyl rubber gloves (>0.5mm), nitrile gloves, fully-encapsulating chemical protective suit. HCN absorbs rapidly
        through skin.
      eye: Chemical safety goggles and full face shield. Liquid contact causes severe burns.
      minimum_level: Level A for unknown concentrations or >10 ppm, Level B minimum for known concentrations <10 ppm
      special_notes: HCN penetrates ordinary clothing. Rapidly absorbed through skin causing systemic poisoning. Use butyl
        rubber - NOT neoprene or natural rubber. Emergency cyanide antidote kit must be immediately available.
    _section:
      title: PPE Requirements
      description: Personal protective equipment needed for safe handling
      icon: shield
      order: 5
      variant: warning
  emergency_response:
    presentation: descriptive
    items:
    - fire_hazard: Extremely flammable liquid and vapor. Wide explosive range. May polymerize explosively if contaminated.
        Vapors may travel to ignition source.
      fire_suppression: Evacuate area immediately - extremely toxic combustion products. Use unmanned hose holders or monitor
        nozzles. Dry chemical, CO2, alcohol-resistant foam from safe distance. Water spray to cool cylinders.
      spill_procedures: EVACUATE IMMEDIATELY - call HAZMAT team. Self-Contained Breathing Apparatus MANDATORY. Eliminate ignition
        sources. Contain with sand/vermiculite. Neutralize with sodium hydroxide or calcium hypochlorite solution. Decontaminate
        area thoroughly.
      exposure_immediate_actions: MEDICAL EMERGENCY - minutes count. Remove to fresh air immediately. Administer 100% oxygen.
        Apply cyanide antidote kit (amyl nitrite, sodium nitrite, sodium thiosulfate) per protocol. CPR if needed. Rush to
        hospital - inform medical staff of cyanide exposure immediately.
      environmental_hazards: Extremely toxic to all life. Highly volatile - rapidly disperses but lethal during dispersion.
        Report any release immediately. Toxic to aquatic life at extremely low concentrations.
      special_hazards: ONE OF THE MOST TOXIC INDUSTRIAL CHEMICALS. Inhibits cellular respiration by binding to cytochrome
        oxidase. Death can occur within minutes. Polymerizes violently with alkaline contamination. Decomposes producing nitrogen
        oxides and hydrogen cyanide gas.
    _section:
      title: Emergency Response
      description: First aid and emergency procedures for exposure incidents
      icon: alert-triangle
      order: 7
      variant: danger
