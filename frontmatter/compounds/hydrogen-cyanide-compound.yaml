faq:
  presentation: collapsible
  items:
  - id: what-personal-protective-equipment-ppe-should
    title: What personal protective equipment (PPE) should I wear to minimize hydrogen cyanide (HCN) exposure risks during
      laser cleaning of metal surfaces?
    content: Use a full-facepiece respirator with cartridges specifically rated for HCN or acid gases, combined with chemical-resistant
      gloves, boots, and a full-body suit made from materials like butyl rubber to block rapid skin absorption. Ensure the
      workspace has adequate ventilation or local exhaust systems to reduce inhalation hazards, and always perform air monitoring
      with HCN-specific detectors to keep exposures below the OSHA ceiling limit of 10 ppm. If HCN levels approach the limit,
      immediately evacuate and decontaminate any exposed skin with a dilute sodium hypochlorite solution followed by thorough
      rinsing.
    metadata:
      topic: personal protective equipment (ppe) should
      severity: critical
      acceptedAnswer: true
