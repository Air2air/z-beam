  firstAid: >-
    If someone encounters hydrogen cyanide gas, act fast to limit harm—every second counts in pulling them away from the
    source. Rush the person to fresh air right away, keeping them calm while loosening tight clothing around the neck
    and chest for easier breathing. Provide oxygen if it's on hand, but never try mouth-to-mouth resuscitation yourself
    since the gas lingers and could endanger you too.


    For skin exposure, strip off any soaked garments immediately and rinse the area thoroughly under running water,
    avoiding harsh soaps that might spread the toxin further. Eyes demand urgent flushing with lukewarm water for as
    long as possible, holding the lids open gently to ensure full coverage. Should ingestion happen, do not force
    vomiting, as that risks worsening the internal damage—instead, offer water or milk if conscious, then head straight
    to professionals.


    Watch closely for signs like dizziness or confusion, and call emergency services without delay; antidotes exist in
    medical settings to counteract the poison's grip on the body. Stay safe by wearing protective gear during any
    handling, and remember, prevention through ventilation beats reacting every time.
