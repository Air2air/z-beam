    emergency_response:
      presentation: descriptive
      items:
      - fire_hazard: Extremely flammable liquid and vapor. Wide explosive range. May polymerize explosively if contaminated.
          Vapors may travel to ignition source.
        fire_suppression: Evacuate area immediately - extremely toxic combustion products. Use unmanned hose holders or monitor
          nozzles. Dry chemical, CO2, alcohol-resistant foam from safe distance. Water spray to cool cylinders.
        spill_procedures: EVACUATE IMMEDIATELY - call HAZMAT team. Self-Contained Breathing Apparatus MANDATORY. Eliminate
          ignition sources. Contain with sand/vermiculite. Neutralize with sodium hydroxide or calcium hypochlorite solution.
          Decontaminate area thoroughly.
        exposure_immediate_actions: MEDICAL EMERGENCY - minutes count. Remove to fresh air immediately. Administer 100% oxygen.
          Apply cyanide antidote kit (amyl nitrite, sodium nitrite, sodium thiosulfate) per protocol. CPR if needed. Rush
          to hospital - inform medical staff of cyanide exposure immediately.
        environmental_hazards: Extremely toxic to all life. Highly volatile - rapidly disperses but lethal during dispersion.
          Report any release immediately. Toxic to aquatic life at extremely low concentrations.
        special_hazards: ONE OF THE MOST TOXIC INDUSTRIAL CHEMICALS. Inhibits cellular respiration by binding to cytochrome
          oxidase. Death can occur within minutes. Polymerizes violently with alkaline contamination. Decomposes producing
          nitrogen oxides and hydrogen cyanide gas.
