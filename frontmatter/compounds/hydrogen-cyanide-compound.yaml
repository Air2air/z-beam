  reactivity:
    presentation: descriptive
    items:
    - stability: UNSTABLE. Polymerizes violently when contaminated with water, bases, or ammonia. Must be stabilized with
        acid.
      polymerization: May polymerize explosively if not stabilized. Polymerization exothermic - can rupture containers and
        cause explosions.
      incompatible_materials:
      - Water (polymerization)
      - Strong bases (sodium hydroxide)
      - Acids (releases HCN gas)
      - Oxidizers
      - Ammonia
      - Amines
      - Sulfur
      - Acetaldehyde
      - Halogens
      hazardous_decomposition:
      - Nitrogen oxides (NOx)
      - Hydrogen cyanide gas
      - Carbon monoxide
      - Ammonia
      conditions_to_avoid:
      - Heat
      - Moisture/water
      - Alkaline conditions
      - Light
      - Flames
      - Sparks
      - Oxidizers
      - Contamination of any kind
      reactivity_hazard: EXTREMELY REACTIVE. Violent polymerization with alkaline materials. Reacts with oxidizers causing
        fire and explosion. Attacks some metals (copper, zinc) forming explosive metal cyanides.
