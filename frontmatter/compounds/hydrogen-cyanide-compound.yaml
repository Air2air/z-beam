    storageRequirements:
      presentation: descriptive
      items:
      - temperatureRange: Store below 25°C (77°F), ideally <15°C. Avoid heating above boiling point.
        ventilation: 'Outdoor storage strongly preferred. If indoors: continuous mechanical ventilation with emergency backup,
          HCN gas detection with evacuation alarms'
        incompatibilities:
        - Acids
        - Strong bases
        - Oxidizers
        - Water (polymerization catalyst)
        - Ammonia
        - Sulfur
        - Halogens
        - Amines
        containerMaterial: Stainless steel or glass with PTFE-lined caps. Stabilized with acid (H3PO4 or H2SO4) to prevent
          polymerization. Never use copper, copper alloys, or iron containers.
        segregation: Isolated storage area, separate from all other chemicals. Secure area with restricted access. Post "POISON
          GAS - AUTHORIZED PERSONNEL ONLY" signs.
        quantityLimits: Minimize quantities stored. Per OSHA, treat as extremely hazardous. Many facilities limit to <5 gallons
          on-site.
        specialRequirements: 'CRITICAL: Store with stabilizer (acid). Check stabilizer level regularly. Refrigerated storage
          recommended. Gas detection system MANDATORY. Emergency shower/eyewash within 10 seconds travel. Cyanide antidote
          kits at storage location. Written emergency procedures posted.'
