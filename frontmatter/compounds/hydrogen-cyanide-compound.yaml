    health_impacts:
      presentation: descriptive
      _section:
        title: Health Impacts
        description: Health effects from exposure including acute and chronic impacts
        icon: heart-pulse
        order: 1
        variant: warning
      items:
      - content: When working with hydrogen cyanide in industrial processes, start by understanding its rapid absorption through
          inhalation or skin contact, which sets it apart from slower-acting toxins like carbon monoxide by blocking cellular
          oxygen use almost immediately. You'll notice early signs as headaches and dizziness creeping in during setup or
          mixing stages, so monitor air quality closely from the outset. As exposure builds in confined spaces, breathing
          quickens and nausea hits hard, contrasting with milder irritants that might just cause coughing without the deep
          systemic shutdown. Move to ventilation checks next, because its colorless, almond-like odor can sneak up unnoticed,
          unlike pungent gases that warn you off. In applications like metal plating or fumigation, keep responders trained
          on these escalating effects—restlessness turning to convulsions if not caught early. Always end shifts with full
          decon protocols to avoid lingering risks from this stealthy compound.
    exposure_guidance:
      presentation: descriptive
      _section:
        title: Exposure Guidelines
        description: OSHA PEL, NIOSH REL, ACGIH TLV, and safe exposure limits
        icon: shield-alert
        order: 2
        variant: warning
      items:
      - content: 'Handling hydrogen cyanide demands careful attention right from the start, especially in settings where it
          might leak as a gas during production or storage processes. Workers should always prioritize sealed environments
          and ventilation systems that keep the air clear, since even brief contact with this colorless, bitter-almond-scented
          compound can trigger severe health reactions like headaches, dizziness, or worse respiratory distress. In industrial
          spots like chemical manufacturing or metal extraction, where it''s used for hardening surfaces or as a reagent,
          teams must wear full protective gear—think impermeable suits, respirators with appropriate filters, and gloves that
          block permeation—to shield against skin absorption or inhalation that amplifies toxicity quickly.


          When it comes to cleanup, particularly with laser methods for removing residues from equipment, operators need to
          isolate the area completely and monitor for any vapor release, as the heat from lasers could volatilize traces into
          the air, heightening exposure risks. Post-exposure, anyone feeling symptoms should seek fresh air immediately and
          get medical help without delay, ideally with antidotes on hand in high-risk facilities to counteract the compound''s
          fast-acting interference with oxygen use in the body. Training everyone involved, from setup to shutdown, ensures
          that protocols stick, minimizing chances of accidental release in applications like fumigation or synthesis where
          the gas''s reactivity plays a key role.'
    personal_protection:
      presentation: descriptive
      _section:
        title: Personal Protection Equipment
        description: Required PPE including respirators, gloves, eye protection, and protective clothing
        icon: shield-check
        order: 3
        variant: warning
      items:
      - content: "Handling hydrogen cyanide demands serious protection. Start with full-body suits made from impermeable materials.\
          \ Seal every gap to block gas leaks. \n\nRespiratory gear tops the list. Use self-contained breathing apparatus\
          \ for total air isolation. No half-measures here—inhalation kills fast.\n\nGloves follow suit. Thick, chemical-resistant\
          \ ones shield skin contact. Pair them with boots that resist penetration.\n\nEye protection can't skip. Full-face\
          \ shields or goggles prevent vapor exposure. Irritation hits quick otherwise.\n\nIn industrial spots like chemical\
          \ plants, layer up with hoods. They cover head and neck completely. Ventilation systems help, but PPE stays primary.\n\
          \nFor laser cleaning tasks involving this compound, maintain distance. Enhanced suits handle heat and fumes. Always\
          \ monitor air quality indirectly through protocols.\n\nTrain teams rigorously. PPE fits snug, no exceptions. Decontaminate\
          \ after every shift to stay safe."
    emergency_procedures:
      presentation: descriptive
      _section:
        title: Emergency Procedures
        description: First aid measures, emergency response, and incident management
        icon: siren
        order: 4
        variant: danger
      items:
      - content: 'If someone encounters hydrogen cyanide gas, act fast to limit harm—every second counts in pulling them away
          from the source. Rush the person to fresh air right away, keeping them calm while loosening tight clothing around
          the neck and chest for easier breathing. Provide oxygen if it''s on hand, but never try mouth-to-mouth resuscitation
          yourself since the gas lingers and could endanger you too.


          For skin exposure, strip off any soaked garments immediately and rinse the area thoroughly under running water,
          avoiding harsh soaps that might spread the toxin further. Eyes demand urgent flushing with lukewarm water for as
          long as possible, holding the lids open gently to ensure full coverage. Should ingestion happen, do not force vomiting,
          as that risks worsening the internal damage—instead, offer water or milk if conscious, then head straight to professionals.


          Watch closely for signs like dizziness or confusion, and call emergency services without delay; antidotes exist
          in medical settings to counteract the poison''s grip on the body. Stay safe by wearing protective gear during any
          handling, and remember, prevention through ventilation beats reacting every time.'
