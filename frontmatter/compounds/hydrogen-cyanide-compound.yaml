    ppeRequirements:
      presentation: descriptive
      items:
      - respiratory: 'MANDATORY: Full-face pressure-demand SCBA or positive-pressure supplied-air respirator with escape SCBA.
          No air-purifying respirators approved - extremely toxic.'
        skin: Butyl rubber gloves (>0.5mm), nitrile gloves, fully-encapsulating chemical protective suit. HCN absorbs rapidly
          through skin.
        eye: Chemical safety goggles and full face shield. Liquid contact causes severe burns.
        minimumLevel: Level A for unknown concentrations or >10 ppm, Level B minimum for known concentrations <10 ppm
        specialNotes: HCN penetrates ordinary clothing. Rapidly absorbed through skin causing systemic poisoning. Use butyl
          rubber - NOT neoprene or natural rubber. Emergency cyanide antidote kit must be immediately available.
      _section:
        icon: shield-check
        sectionTitle: Personal Protective Equipment
        sectionDescription: Required safety equipment for handling this compound
        order: 20
        variant: default
    emergencyResponse:
      presentation: descriptive
      items:
      - fireHazard: Extremely flammable liquid and vapor. Wide explosive range. May polymerize explosively if contaminated.
          Vapors may travel to ignition source.
        fireSuppression: Evacuate area immediately - extremely toxic combustion products. Use unmanned hose holders or monitor
          nozzles. Dry chemical, CO2, alcohol-resistant foam from safe distance. Water spray to cool cylinders.
        spillProcedures: EVACUATE IMMEDIATELY - call HAZMAT team. Self-Contained Breathing Apparatus MANDATORY. Eliminate
          ignition sources. Contain with sand/vermiculite. Neutralize with sodium hydroxide or calcium hypochlorite solution.
          Decontaminate area thoroughly.
        exposureImmediateActions: MEDICAL EMERGENCY - minutes count. Remove to fresh air immediately. Administer 100% oxygen.
          Apply cyanide antidote kit (amyl nitrite, sodium nitrite, sodium thiosulfate) per protocol. CPR if needed. Rush
          to hospital - inform medical staff of cyanide exposure immediately.
        environmentalHazards: Extremely toxic to all life. Highly volatile - rapidly disperses but lethal during dispersion.
          Report any release immediately. Toxic to aquatic life at extremely low concentrations.
        specialHazards: ONE OF THE MOST TOXIC INDUSTRIAL CHEMICALS. Inhibits cellular respiration by binding to cytochrome
          oxidase. Death can occur within minutes. Polymerizes violently with alkaline contamination. Decomposes producing
          nitrogen oxides and hydrogen cyanide gas.
      _section:
        icon: exclamation-triangle
        sectionTitle: Emergency Response
        sectionDescription: Procedures for spills, exposure, and incidents
