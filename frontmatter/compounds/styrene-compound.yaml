reactivity:
  stability: UNSTABLE. Polymerizes when heated or contaminated. Inhibitor required.
  polymerization: Exothermic polymerization with peroxides, oxidizers, or heat. May be explosive. Check inhibitor level.
  incompatible_materials:
  - Oxidizers
  - Peroxides
  - Strong acids
  - Aluminum chloride
  - Copper
  - Brass
  - Iron compounds
  - Sulfuric acid
  hazardous_decomposition:
