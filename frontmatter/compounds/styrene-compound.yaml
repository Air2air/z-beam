  items:
  - id: as-a-laser-cleaning-operator-working
    title: As a laser cleaning operator working on surfaces potentially coated with styrene-based materials, what protective
      gear should I use to avoid skin irritation from exposure, especially since it's a stronger irritant than something like
      acetone?
    content: Wear chemical-resistant gloves made of nitrile or PVC (at least 0.7 mm thick) and full-body coveralls to prevent
      direct skin contact, as styrene penetrates skin more readily and causes greater irritation than milder solvents like
      acetone. Use safety goggles and a respirator with organic vapor cartridges if ventilation is inadequate, ensuring airborne
      exposure stays below the OSHA PEL of 100 ppm (8-hour TWA). Always perform a skin check after shifts and wash exposed
      areas immediately with soap and water if contact occurs.
