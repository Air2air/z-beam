  storage_requirements:
    presentation: descriptive
    items:
    - temperature_range: Store below 32°C. Keep cool. Avoid excessive heat.
      ventilation: Local exhaust ventilation. Mechanical ventilation with emergency backup.
      incompatibilities:
      - Oxidizers
      - Peroxides
      - Strong acids
      - Aluminum chloride
      - Copper
      - Brass
      - Iron
      container_material: Stainless steel or aluminum. Must contain inhibitor (tert-butylcatechol). Check inhibitor level
        regularly.
      segregation: Separate from oxidizers by 20 feet. Flammable liquid storage cabinet.
      quantity_limits: Minimize quantities. Follow NFPA 30 for flammable liquids.
      special_requirements: 'CRITICAL: Store with polymerization inhibitor (10-15 ppm tert-butylcatechol). Monitor inhibitor
        level monthly. Avoid light and heat. Post "FLAMMABLE" and "CANCER HAZARD" signs. Date containers.'
