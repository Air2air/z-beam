  - Carbon dioxide
  - Toxic styrene vapors
  - Benzene
  conditions_to_avoid:
  - Heat
  - Light
  - Oxidizers
  - Peroxides
  - Contamination
  - Sparks
  - Flames
  reactivity_hazard: May polymerize violently. Reacts with oxidizers. Attacks some plastics, rubber, and coatings. Forms peroxides
    on prolonged storage.
environmental_impact:
  aquatic_toxicity: 'Toxic to aquatic life. LC50 (fish, 96h): 4-10 mg/L.'
  biodegradability: Readily biodegradable (>60% in 28 days).
  bioaccumulation: 'Moderate bioaccumulation potential. BCF: 25-150. Log Kow: 2.95.'
  soil_mobility: Moderate mobility. Adsorbs to soil organic matter. Volatilizes from soil.
  atmospheric_fate: 'Photolyzes via hydroxyl radicals. Atmospheric half-life: 1-2 days. Forms ozone.'
  ozone_depletion: false
  global_warming_potential: null
  reportable_releases:
    water: 1000 lbs to navigable waters
    air: 1000 lbs/day (CERCLA RQ)
