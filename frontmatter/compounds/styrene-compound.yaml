ppe_requirements:
  respiratory: NIOSH-approved organic vapor respirator for <50 ppm. SCBA for >50 ppm or unknown concentrations.
  skin: Nitrile or butyl rubber gloves. Chemical-resistant clothing. Styrene absorbs through skin.
  eye: Chemical safety goggles, face shield for splash hazard.
  minimum_level: Level C for <50 ppm, Level B for >50 ppm
  special_notes: Neurotoxin and probable carcinogen (IARC 2B). Skin absorption significant. Extremely irritating. May cause
    CNS depression.
physical_properties:
  boiling_point: 145°C (293°F)
  melting_point: -30.6°C (-23°F)
  vapor_pressure: 5 mmHg @ 20°C
  vapor_density: 3.6 (Air=1)
  specific_gravity: '0.906'
  flash_point: 31°C (88°F) closed cup
  autoignition_temp: 490°C (914°F)
  explosive_limits: 'LEL: 1.1%, UEL: 6.1%'
  appearance: Colorless to yellowish oily liquid
  odor: Sweet, floral odor @ 0.05-0.5 ppm (odor fatigue occurs)
emergency_response:
  fire_hazard: Flammable liquid. May polymerize explosively in fire. Vapors heavier than air. May travel to ignition sources.
  fire_suppression: Stop flow if safe. Use dry chemical, CO2, alcohol-resistant foam. Water spray to cool containers. Do not
    use water jet on liquid. Prevent contamination - polymerization hazard.
  spill_procedures: Eliminate ignition sources. Ventilate area. Contain with sand or earth. Neutralize with sodium bisulfite.
    Dispose as hazardous waste. Check stabilizer level before handling.
  exposure_immediate_actions: 'Remove to fresh air immediately. Eyes: flush with water for 15 minutes. Remove contaminated
    clothing - styrene penetrates. Wash skin thoroughly. Seek medical attention - neurotoxin and carcinogen exposure. Monitor
    for CNS effects.'
  environmental_hazards: Toxic to aquatic life. Bioaccumulates. Report spills >1000 lbs.
  special_hazards: PROBABLE HUMAN CARCINOGEN (IARC 2B). NEUROTOXIN - causes CNS depression, peripheral neuropathy. Irritating
    to eyes, skin, respiratory tract. May polymerize explosively. Olfactory fatigue - cannot rely on odor. Metabolized to
    styrene oxide (more toxic).
storage_requirements:
  temperature_range: Store below 32°C. Keep cool. Avoid excessive heat.
  ventilation: Local exhaust ventilation. Mechanical ventilation with emergency backup.
  incompatibilities:
  - Oxidizers
  - Peroxides
  - Strong acids
  - Aluminum chloride
  - Copper
  - Brass
  - Iron
  container_material: Stainless steel or aluminum. Must contain inhibitor (tert-butylcatechol). Check inhibitor level regularly.
  segregation: Separate from oxidizers by 20 feet. Flammable liquid storage cabinet.
  quantity_limits: Minimize quantities. Follow NFPA 30 for flammable liquids.
  special_requirements: 'CRITICAL: Store with polymerization inhibitor (10-15 ppm tert-butylcatechol). Monitor inhibitor level
    monthly. Avoid light and heat. Post "FLAMMABLE" and "CANCER HAZARD" signs. Date containers.'
