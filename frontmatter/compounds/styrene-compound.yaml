  symptoms: []
  firstAid: >-
    If styrene compound splashes on skin, rinse right away under running water. Soap helps too—lather gently for a few
    minutes. Pat dry afterward, no rubbing. Watch for redness or itching; see a doctor if it lingers.


    Eyes sting from contact? Flush them open with lukewarm water immediately. Keep at it steadily. Blink often during
    the rinse. Get medical checkup fast, even if pain fades quick.


    Breathe in fumes and feel dizzy or cough? Step outside to fresh air. Loosen tight clothes. Rest in a cool spot. If
    breathing gets tough, call for help without delay.


    Swallowed some by accident? Spit out what's left. Rinse mouth with water. Don't force vomit—that could worsen
    things. Head to poison control or ER pronto. They handle it best. Stay calm, sip water if alert.
