      _section:
        sectionTitle: Personal Protective Equipment
        sectionDescription: Required safety equipment for handling this compound
        sectionMetadata: relationships.safety.ppeRequirements
        icon: shield-check
        order: 20
        variant: default
      presentation: descriptive
      items:
      - respiratory: NIOSH-approved organic vapor respirator for <50 ppm. SCBA for >50 ppm or unknown concentrations.
        skin: Nitrile or butyl rubber gloves. Chemical-resistant clothing. Styrene absorbs through skin.
        eye: Chemical safety goggles, face shield for splash hazard.
        minimumLevel: Level C for <50 ppm, Level B for >50 ppm
        specialNotes: Neurotoxin and probable carcinogen (IARC 2B). Skin absorption significant. Extremely irritating. May
          cause CNS depression.
    emergencyResponse:
      _section:
        sectionTitle: Emergency Response
        sectionDescription: Procedures for spills, exposure, and incidents
        sectionMetadata: relationships.safety.emergencyResponse
        icon: exclamation-triangle
        order: 25
        variant: default
      presentation: descriptive
      items:
      - fireHazard: Flammable liquid. May polymerize explosively in fire. Vapors heavier than air. May travel to ignition
          sources.
        fireSuppression: Stop flow if safe. Use dry chemical, CO2, alcohol-resistant foam. Water spray to cool containers.
          Do not use water jet on liquid. Prevent contamination - polymerization hazard.
        spillProcedures: Eliminate ignition sources. Ventilate area. Contain with sand or earth. Neutralize with sodium bisulfite.
          Dispose as hazardous waste. Check stabilizer level before handling.
        exposureImmediateActions: 'Remove to fresh air immediately. Eyes: flush with water for 15 minutes. Remove contaminated
          clothing - styrene penetrates. Wash skin thoroughly. Seek medical attention - neurotoxin and carcinogen exposure.
          Monitor for CNS effects.'
        environmentalHazards: Toxic to aquatic life. Bioaccumulates. Report spills >1000 lbs.
        specialHazards: PROBABLE HUMAN CARCINOGEN (IARC 2B). NEUROTOXIN - causes CNS depression, peripheral neuropathy. Irritating
          to eyes, skin, respiratory tract. May polymerize explosively. Olfactory fatigue - cannot rely on odor. Metabolized
          to styrene oxide (more toxic).
