  emergency_response:
    fire_hazard: Flammable liquid. May polymerize explosively in fire. Vapors heavier than air. May travel to ignition sources.
    fire_suppression: Stop flow if safe. Use dry chemical, CO2, alcohol-resistant foam. Water spray to cool containers. Do
      not use water jet on liquid. Prevent contamination - polymerization hazard.
    spill_procedures: Eliminate ignition sources. Ventilate area. Contain with sand or earth. Neutralize with sodium bisulfite.
      Dispose as hazardous waste. Check stabilizer level before handling.
    exposure_immediate_actions: 'Remove to fresh air immediately. Eyes: flush with water for 15 minutes. Remove contaminated
      clothing - styrene penetrates. Wash skin thoroughly. Seek medical attention - neurotoxin and carcinogen exposure. Monitor
      for CNS effects.'
    environmental_hazards: Toxic to aquatic life. Bioaccumulates. Report spills >1000 lbs.
    special_hazards: PROBABLE HUMAN CARCINOGEN (IARC 2B). NEUROTOXIN - causes CNS depression, peripheral neuropathy. Irritating
      to eyes, skin, respiratory tract. May polymerize explosively. Olfactory fatigue - cannot rely on odor. Metabolized to
      styrene oxide (more toxic).
