ppe_requirements:
  respiratory: NIOSH-approved organic vapor respirator for <50 ppm. SCBA for >50 ppm or unknown concentrations.
  skin: Nitrile or butyl rubber gloves. Chemical-resistant clothing. Styrene absorbs through skin.
  eye: Chemical safety goggles, face shield for splash hazard.
  minimum_level: Level C for <50 ppm, Level B for >50 ppm
  special_notes: Neurotoxin and probable carcinogen (IARC 2B). Skin absorption significant. Extremely irritating. May cause
    CNS depression.
storage_requirements:
  temperature_range: Store below 32°C. Keep cool. Avoid excessive heat.
  ventilation: Local exhaust ventilation. Mechanical ventilation with emergency backup.
  incompatibilities:
  - Oxidizers
  - Peroxides
  - Strong acids
  - Aluminum chloride
  - Copper
  - Brass
  - Iron
  container_material: Stainless steel or aluminum. Must contain inhibitor (tert-butylcatechol). Check inhibitor level regularly.
  segregation: Separate from oxidizers by 20 feet. Flammable liquid storage cabinet.
  quantity_limits: Minimize quantities. Follow NFPA 30 for flammable liquids.
  special_requirements: 'CRITICAL: Store with polymerization inhibitor (10-15 ppm tert-butylcatechol). Monitor inhibitor level
    monthly. Avoid light and heat. Post "FLAMMABLE" and "CANCER HAZARD" signs. Date containers.'
