    health_impacts:
      presentation: descriptive
      _section:
        title: Health Impacts
        description: Health effects from exposure including acute and chronic impacts
        icon: heart-pulse
        order: 1
        variant: warning
      items:
      - content: When handling styrene in industrial settings, compare it to milder solvents like acetone—styrene hits harder
          as an irritant, especially on the skin and eyes, because its volatile vapors linger and penetrate more aggressively
          without needing direct contact. You'll notice this difference right away if you've dealt with less reactive compounds;
          styrene demands extra precautions during mixing or molding processes, where exposure builds up faster. Deep down,
          the primary issue stems from its ability to inflame mucous membranes deeply, leading to that burning sensation in
          the nose and throat that doesn't fade quickly, unlike quicker-evaporating alternatives. So, always gear up with
          full ventilation and gloves early on. In laser cleaning applications for styrene-based coatings, this irritant nature
          means you must isolate the workspace to avoid inhaling fumes kicked up by the beam, which could otherwise cause
          prolonged respiratory discomfort. We've found that brief exposures still leave a lingering haze in the lungs, but
          proper airflow keeps things manageable without halting production.
    exposure_guidance:
      presentation: descriptive
      _section:
        title: Exposure Guidelines
        description: OSHA PEL, NIOSH REL, ACGIH TLV, and safe exposure limits
        icon: shield-alert
        order: 2
        variant: warning
      items:
      - content: 'Handling styrene compounds demands caution right from the start, especially in busy workshops where vapors
          linger unnoticed. These materials, often key in crafting durable plastics, can irritate skin on contact, leading
          to redness or discomfort if not managed. Workers should always opt for protective gloves and long sleeves to shield
          against splashes during mixing or pouring tasks.


          Breathing in fumes poses another risk, potentially causing throat irritation or headaches over time. Good ventilation
          keeps air fresh, while masks fitted snugly help in confined spaces like molding areas. Eye protection is non-negotiable—goggles
          prevent stinging from accidental exposure.


          For cleanup, especially with laser methods that heat surfaces, ensure the area cools fully before re-entry to avoid
          inhaling warmed irritants. Spill response stays simple: absorb with inert materials, then wash hands thoroughly.
          Regular breaks and monitoring for symptoms like dizziness promote safer routines overall.'
    personal_protection:
      presentation: descriptive
      _section:
        title: Personal Protection Equipment
        description: Required PPE including respirators, gloves, eye protection, and protective clothing
        icon: shield-check
        order: 3
        variant: warning
      items:
      - content: 'Handling styrene-based compounds demands careful protection against their irritating nature, unlike milder
          plastics that barely bother the skin—here, exposure can sting eyes, airways, and surfaces quickly, so gear up thoroughly
          to stay safe during mixing, molding, or cleanup tasks.


          Workers in factories shaping these materials into durable sheets or foams should always don sealed goggles, shielding
          eyes from any misty vapors or accidental splashes that arise in heated environments. Thick, chemical-resistant gloves
          form the next layer, gripping tools firmly while blocking the sticky residue from seeping through and causing rashes
          on hands or arms; pair them with full-cover aprons or suits to safeguard clothing and body from drips during pouring
          or assembly lines.


          Breathing becomes tricky around the sharp odors released in high-volume production or when grinding scraps, so a
          fitted respirator with cartridges tuned for organic irritants keeps lungs clear, especially in enclosed spaces lacking
          strong airflow. For specialized jobs like laser cleaning these compounds—zapping away contaminants without harsh
          chemicals—add face shields over goggles to deflect any scattered particles or reflected light, ensuring visibility
          stays sharp amid the process''s intense focus.


          Ventilation hoods or fans prove essential too, whisking away fumes before they build up, and after shifts, thorough
          washing stations help rinse off any lingering traces. This setup not only eases the irritant risks but supports
          smooth operations in industries relying on styrene''s versatile strength for packaging or insulation.'
    emergency_procedures:
      presentation: descriptive
      _section:
        title: Emergency Procedures
        description: First aid measures, emergency response, and incident management
        icon: siren
        order: 4
        variant: danger
      items:
      - content: 'If styrene compound splashes on skin, rinse right away under running water. Soap helps too—lather gently
          for a few minutes. Pat dry afterward, no rubbing. Watch for redness or itching; see a doctor if it lingers.


          Eyes sting from contact? Flush them open with lukewarm water immediately. Keep at it steadily. Blink often during
          the rinse. Get medical checkup fast, even if pain fades quick.


          Breathe in fumes and feel dizzy or cough? Step outside to fresh air. Loosen tight clothes. Rest in a cool spot.
          If breathing gets tough, call for help without delay.


          Swallowed some by accident? Spit out what''s left. Rinse mouth with water. Don''t force vomit—that could worsen
          things. Head to poison control or ER pronto. They handle it best. Stay calm, sip water if alert.'
