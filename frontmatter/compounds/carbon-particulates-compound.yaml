faq:
  presentation: collapsible
  items:
  - id: as-a-laser-cleaning-operator-how
    title: As a laser cleaning operator, how do I protect myself from inhaling fine carbon particulates generated during the
      process?
    content: Use a properly fitted NIOSH-approved respirator with a P100 filter to capture fine carbon particulates, which
      are smaller than typical dust and can remain airborne longer, increasing inhalation risks. Always work in a well-ventilated
      area or under local exhaust ventilation to minimize exposure, and perform regular air monitoring to ensure levels stay
      below the OSHA permissible exposure limit of 3.5 mg/m³ for respirable carbon black dust. Change filters frequently based
      on usage and conduct post-shift hygiene practices like showering to remove any settled particulates from skin and clothing.
