  firstAid: |-
    Eyes sting from dust? Flush with water right away.  
    Keep rinsing for several minutes. No rubbing.  
    Skin contact irritates? Wash off gently with soap.  
    Pat dry. Watch for redness.  
    Breathe it in? Move to fresh air fast.  
    Cough if needed. Stay calm.  
    Swallowed some? Drink water or milk slowly.  
    Don't induce vomiting. Seek help quick.  
    In eyes or skin, it clings due to fine particles.  
    Industrial spots use it for pigments. Tires blacken with it.  
    Laser cleans surfaces coated in this stuff.  
    Beams vaporize without scratching base.  
    Properties make it stubborn soot-like.  
    Dark, powdery. Sticks to everything.  
    Handle in vents. Wear masks always.
