title: Carbon Particulates
compound_description: Carbon particulates cling tighter than dust on factory gears,
  darkening surfaces without a trace. They scatter light oddly, staying hidden in
  shadows. Tough and gritty, these bits grind into paints and metals during heavy
  use. In tires, they boost grip without adding bulk. Factories mix them into inks
  for bold, lasting prints. Electronics lean on their conductivity to link circuits
  smoothly. Lasers zap them clean by heating just the top layer. Pulses vaporize the
  dark specks fast. No harsh chemicals needed. Surfaces emerge bright, ready for reuse.
