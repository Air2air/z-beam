    exposureLimits:
      _section:
        sectionTitle: Exposure Limits
        sectionDescription: OSHA, NIOSH, and ACGIH exposure thresholds
        sectionMetadata: relationships.safety.exposureLimits
        icon: gauge
        order: 31
        variant: warning
      presentation: descriptive
      items:
      - guidelines: When dealing with carbon particulates in compound forms, like those blended into rubbers or coatings,
          I've found that starting with proper ventilation setups makes all the difference in keeping airborne dust levels
          low, because these fine black particles can linger and irritate lungs if they build up unchecked; always steer clear
          of enclosed spaces without airflow to prevent that hazy buildup. In industrial settings, such as mixing them into
          tire manufacturing or pigment production, workers should don fitted masks that seal well against the face, since
          the lightweight nature of these particulates means they float easily during handling and could cause coughing or
          eye discomfort if inhaled repeatedly. For skin contact, which happens often when packing or applying these durable,
          heat-resistant materials, simple washing with soap and water right after exposure works fine to avoid any lingering
          residue that might dry out the skin, though gloves made from flexible synthetics provide the best barrier without
          restricting grip. Regarding laser cleaning of equipment coated in these compounds, direct the beam carefully to
          vaporize residues without scattering particles further, as the process heats them up quickly and risks releasing
          more dust into the air if not contained—pair it with enclosures or suction systems to capture the fallout, ensuring
          the workspace stays clear and safe for ongoing operations. Overall, consistent housekeeping, like wiping down surfaces
          promptly, cuts down on accidental exposures that sneak up during routine tasks.
    ppeRequirements:
      _section:
        sectionTitle: Personal Protective Equipment
        sectionDescription: Required safety equipment for handling this compound
        sectionMetadata: relationships.safety.ppeRequirements
        icon: hard-hat
        order: 32
        variant: default
      presentation: descriptive
      items:
      - requirements: Handling carbon particulate compounds in workshops or labs starts with assessing the dusty setup—think
          fine black particles that scatter easily during mixing or loading into machines. Respirators become essential right
          away, filtering out those tiny specks to protect lungs from irritation or buildup over time. Gloves, thick and durable
          ones, guard against skin dryness or allergic reactions from prolonged contact. Safety goggles shield eyes from airborne
          bits that could scratch or inflame surfaces exposed to the material's gritty nature. In industrial spots like tire
          manufacturing or pigment blending, full-body coveralls prevent clothes and skin from picking up residues that might
          stain or sensitize. For laser cleaning tasks, where beams zap away layers of this stubborn compound from metal parts,
          add flame-resistant aprons and face shields to block intense light flashes and potential heat sparks. Ventilation
          hoods pull particles away fast, keeping the air clearer during intense operations. Overall, layering these protections
          ensures workers stay safe without constant worry about the material's pervasive, sooty traits.
    emergencyResponse:
      _section:
        sectionTitle: Emergency Response
        sectionDescription: Procedures for spills, exposure, and incidents
        sectionMetadata: relationships.safety.emergencyResponse
        icon: ambulance
        order: 33
        variant: danger
      presentation: descriptive
      items:
      - firstAid: "Eyes sting from dust? Flush with water right away.  \nKeep rinsing for several minutes. No rubbing.  \n\
          Skin contact irritates? Wash off gently with soap.  \nPat dry. Watch for redness.  \nBreathe it in? Move to fresh\
          \ air fast.  \nCough if needed. Stay calm.  \nSwallowed some? Drink water or milk slowly.  \nDon't induce vomiting.\
          \ Seek help quick.  \nIn eyes or skin, it clings due to fine particles.  \nIndustrial spots use it for pigments.\
          \ Tires blacken with it.  \nLaser cleans surfaces coated in this stuff.  \nBeams vaporize without scratching base.\
          \  \nProperties make it stubborn soot-like.  \nDark, powdery. Sticks to everything.  \nHandle in vents. Wear masks\
          \ always."
