  symptoms: []
  firstAid: >-
    If someone encounters polycyclic aromatic hydrocarbons through skin contact, rinse the affected area thoroughly
    under running water using mild soap right away. Pat dry gently afterward to avoid irritation. 


    For eye exposure, flush both eyes continuously with lukewarm water for several minutes, holding the eyelids open to
    ensure full coverage. Seek immediate medical evaluation, as these compounds can linger and cause ongoing harm. 


    Breathing in fumes or dust from PAHs demands fresh air exposure without delay—move the person to a well-ventilated
    spot and loosen any tight clothing around the neck or chest. Monitor for breathing difficulties. 


    In case of swallowing, do not try to induce vomiting, which could worsen internal damage. Offer sips of water if
    conscious and alert, then contact poison control or rush to emergency services. These substances act as carcinogens,
    so professional treatment is crucial every time, even if symptoms seem mild at first. Always prioritize calling for
    expert help over home remedies alone.
