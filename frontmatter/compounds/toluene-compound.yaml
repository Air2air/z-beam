ppe_requirements:
  respiratory: Organic vapor respirator for <50 ppm. SCBA for >50 ppm or unknown concentrations.
  skin: Nitrile or butyl rubber gloves. Chemical-resistant clothing. Toluene absorbs through skin.
  eye: Chemical safety goggles, face shield for splash hazard.
  minimum_level: Level C for <50 ppm, Level B for >50 ppm
  special_notes: CNS depressant and neurotoxin. Abuse potential (inhalant). Skin absorption significant. Reproductive toxin.
    Embryo/fetal toxicity concern.
emergency_response:
  fire_hazard: Flammable liquid. Vapors heavier than air. May travel to ignition sources. Flash point very low.
  fire_suppression: Stop flow if safe. Use dry chemical, CO2, alcohol-resistant foam. Water spray to cool containers. Do not
    use water jet on liquid.
  spill_procedures: Eliminate ignition sources. Ventilate area. Contain with sand or vermiculite. Absorb with activated carbon.
    Dispose as hazardous waste.
  exposure_immediate_actions: 'Remove to fresh air. Eyes: flush with water for 15 minutes. Remove contaminated clothing immediately.
    Wash skin thoroughly. Seek medical attention - neurotoxin and reproductive toxin exposure. Monitor for CNS depression.'
  environmental_hazards: Toxic to aquatic life. Bioaccumulates moderately. Contaminates groundwater. Report spills >1000 lbs.
  special_hazards: NEUROTOXIN - causes CNS depression, peripheral neuropathy, cognitive impairment. REPRODUCTIVE TOXIN - embryo/fetal
    toxicity. Abuse potential (intentional inhalation). Chronic exposure causes hearing loss, vision problems. Metabolized
    to benzyl alcohol and benzoic acid.
environmental_impact:
  aquatic_toxicity: 'Toxic to aquatic life. LC50 (fish, 96h): 5.5-40 mg/L depending on species.'
  biodegradability: Readily biodegradable (>60% in 28 days).
  bioaccumulation: 'Moderate bioaccumulation potential. BCF: 13-90. Log Kow: 2.69.'
  soil_mobility: Moderate to high mobility. Volatilizes from soil surface. Adsorbs to organic matter.
  atmospheric_fate: 'Photolyzes via hydroxyl radicals. Atmospheric half-life: 13 hours to 3 days. Contributes to ozone formation.'
  ozone_depletion: false
  global_warming_potential: null
  reportable_releases:
    water: 1000 lbs to navigable waters
    air: 1000 lbs/day (CERCLA RQ)
