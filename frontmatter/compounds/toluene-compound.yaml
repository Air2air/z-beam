  symptoms: []
  firstAid: >-
    Fresh air hits the scene fast if someone's breathed in toluene vapors—get them outside or to a well-ventilated spot
    right away, and keep them comfortable while watching for dizziness or confusion. Skin contact demands quick action
    too; rinse the area under running water using mild soap, gently patting dry afterward to avoid irritation spreading.
    Eyes stung by splashes? Flush them continuously with lukewarm water for several minutes, holding lids open wide,
    then seek a doctor's check just to be safe. Swallowing this solvent calls for immediate medical help—don't force
    vomiting, as it could worsen things, and offer sips of water only if they're alert and professionals advise it.
    Always call poison control or emergency services without delay, especially since toluene's fumes linger and effects
    build subtly over time in workshops or cleaning setups.
