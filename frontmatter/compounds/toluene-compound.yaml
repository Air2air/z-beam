  storage_requirements:
    presentation: descriptive
    items:
    - temperature_range: Store below 25°C. Keep away from heat.
      ventilation: Local exhaust ventilation. Mechanical ventilation for large quantities.
      incompatibilities:
      - Strong oxidizers
      - Nitric acid
      - Sulfuric acid
      - Chromic acid
      - Halogens
      container_material: Stainless steel or aluminum. Attacks some plastics and rubber.
      segregation: Separate from oxidizers by 20 feet. Flammable liquid storage cabinet.
      quantity_limits: Follow NFPA 30. Minimize quantities in work areas.
      special_requirements: Post "FLAMMABLE LIQUID" signs. Secondary containment. Bonding and grounding for transfers. Emergency
        eyewash/shower within 25 feet.
