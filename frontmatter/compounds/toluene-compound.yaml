ppe_requirements:
  respiratory: Organic vapor respirator for <50 ppm. SCBA for >50 ppm or unknown concentrations.
  skin: Nitrile or butyl rubber gloves. Chemical-resistant clothing. Toluene absorbs through skin.
  eye: Chemical safety goggles, face shield for splash hazard.
  minimum_level: Level C for <50 ppm, Level B for >50 ppm
  special_notes: CNS depressant and neurotoxin. Abuse potential (inhalant). Skin absorption significant. Reproductive toxin.
    Embryo/fetal toxicity concern.
storage_requirements:
  temperature_range: Store below 25°C. Keep away from heat.
  ventilation: Local exhaust ventilation. Mechanical ventilation for large quantities.
  incompatibilities:
  - Strong oxidizers
  - Nitric acid
  - Sulfuric acid
  - Chromic acid
  - Halogens
  container_material: Stainless steel or aluminum. Attacks some plastics and rubber.
  segregation: Separate from oxidizers by 20 feet. Flammable liquid storage cabinet.
  quantity_limits: Follow NFPA 30. Minimize quantities in work areas.
  special_requirements: Post "FLAMMABLE LIQUID" signs. Secondary containment. Bonding and grounding for transfers. Emergency
    eyewash/shower within 25 feet.
