  ppe_requirements:
    presentation: descriptive
    items:
    - respiratory: Organic vapor respirator for <50 ppm. SCBA for >50 ppm or unknown concentrations.
      skin: Nitrile or butyl rubber gloves. Chemical-resistant clothing. Toluene absorbs through skin.
      eye: Chemical safety goggles, face shield for splash hazard.
      minimum_level: Level C for <50 ppm, Level B for >50 ppm
      special_notes: CNS depressant and neurotoxin. Abuse potential (inhalant). Skin absorption significant. Reproductive
        toxin. Embryo/fetal toxicity concern.
    _section:
      title: PPE Requirements
      description: Personal protective equipment needed for safe handling
      icon: shield
      order: 5
      variant: warning
  emergency_response:
    presentation: descriptive
    items:
    - fire_hazard: Flammable liquid. Vapors heavier than air. May travel to ignition sources. Flash point very low.
      fire_suppression: Stop flow if safe. Use dry chemical, CO2, alcohol-resistant foam. Water spray to cool containers.
        Do not use water jet on liquid.
      spill_procedures: Eliminate ignition sources. Ventilate area. Contain with sand or vermiculite. Absorb with activated
        carbon. Dispose as hazardous waste.
      exposure_immediate_actions: 'Remove to fresh air. Eyes: flush with water for 15 minutes. Remove contaminated clothing
        immediately. Wash skin thoroughly. Seek medical attention - neurotoxin and reproductive toxin exposure. Monitor for
        CNS depression.'
      environmental_hazards: Toxic to aquatic life. Bioaccumulates moderately. Contaminates groundwater. Report spills >1000
        lbs.
      special_hazards: NEUROTOXIN - causes CNS depression, peripheral neuropathy, cognitive impairment. REPRODUCTIVE TOXIN
        - embryo/fetal toxicity. Abuse potential (intentional inhalation). Chronic exposure causes hearing loss, vision problems.
        Metabolized to benzyl alcohol and benzoic acid.
    _section:
      title: Emergency Response
      description: First aid and emergency procedures for exposure incidents
      icon: alert-triangle
      order: 7
      variant: danger
