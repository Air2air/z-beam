faq:
  presentation: collapsible
  items:
  - id: as-a-laser-cleaning-operator-using
    title: As a laser cleaning operator using toluene to degrease surfaces before lasering, what are the key exposure limits
      I need to monitor to avoid health risks, and how does it compare to milder solvents like acetone?
    content: The OSHA permissible exposure limit (PEL) for toluene is 200 ppm as an 8-hour time-weighted average (TWA), with
      a 500 ppm peak limit not exceeding 10 minutes in any 8-hour shift; exceeding these can cause headaches, dizziness, or
      long-term neurological effects, unlike acetone's higher 1,000 ppm PEL which mainly irritates eyes and skin without such
      neurotoxicity. Use real-time air monitoring devices like photoionization detectors (PIDs) to measure vapor levels in
      your workspace, ensuring concentrations stay below 20 ppm (ACGIH TLV) for added safety. Always maintain local exhaust
      ventilation and wear NIOSH-approved organic vapor respirators if levels approach limits, rotating shifts to minimize
      cumulative exposure.
    metadata:
      topic: as a laser cleaning operator
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: true
      order: 1
  options:
