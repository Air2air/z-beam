  firstAid: >-
    Dealing with nitrogen oxide exposure hits hard because these compounds act fast as irritants, turning a simple
    mishap into a real ordeal if not addressed right away. Get the person out of the contaminated area immediately—fresh
    air is your first line of defense, and it works by diluting the gas quickly, preventing deeper lung damage that
    could linger for days. Why rush this step? These gases cling to the respiratory system, causing swelling and burns
    that worsen without oxygen flow, so never delay hauling them to a clear space, even if they seem okay at first.
    Avoid giving them anything by mouth, like water or food, since it might trigger vomiting and pull more toxins
    downward; instead, loosen tight clothing around the neck and chest to ease breathing without forcing anything. If
    coughing or choking kicks in, keep them calm and upright—propping against something stable helps circulation without
    straining the body further. Call for medical pros right off; they handle the rest with oxygen support or monitoring,
    because self-treatment falls short against the sneaky buildup of effects like fluid in the lungs. What to steer
    clear of? Don't play hero by sticking around the source yourself, and skip home remedies like milk, which do nothing
    but waste time in the face of such a potent irritant.
