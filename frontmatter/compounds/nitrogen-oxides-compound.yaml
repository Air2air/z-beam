  emergency_response:
    fire_hazard: Non-flammable but supports combustion. Strong oxidizer. Increases
      fire intensity. May explode when heated.
    fire_suppression: Do not fight fire if gas cylinder involved - extreme explosion
      risk. Evacuate. Cool cylinders with water spray from safe distance. Let fire
      burn out.
    spill_procedures: 'EVACUATE. Liquid NO2/N2O4: extreme hazard. Ventilate area.
      SCBA mandatory. Contain with soda ash or lime neutralization. Never use water
      directly on liquid NOx.'
    exposure_immediate_actions: Remove to fresh air immediately. Administer 100% oxygen.
      Severe respiratory irritation likely. Monitor for delayed pulmonary edema (6-72
      hours). Seek immediate medical attention - hospitalize for observation even
      if asymptomatic.
    environmental_hazards: Contributes to acid rain, smog, ozone formation. Toxic
      to vegetation. Report significant releases.
    special_hazards: DELAYED PULMONARY EDEMA - asymptomatic period 6-72 hours then
      sudden respiratory failure. NO converts to NO2 in air (more toxic). Strong oxidizer.
      Corrosive to respiratory tract. May explode under pressure.
