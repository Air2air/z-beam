ppe_requirements:
  respiratory: SCBA or positive-pressure supplied-air respirator for >1 ppm NO2 or
    unknown concentrations. Air-purifying with acid gas cartridge acceptable for ≤1
    ppm NO2 only.
  skin: Nitrile or butyl rubber gloves for liquid contact. Chemical-resistant clothing
    if high concentrations.
  eye: Chemical safety goggles, face shield for high concentrations
  minimum_level: Level C for known <1 ppm NO2, Level B for >1 ppm or NO/NO2 mixtures
  special_notes: NO2 is brown gas, NO is colorless. Both highly toxic. Delayed pulmonary
    edema possible 6-72 hours after exposure. STEL critical - short exposures very
    dangerous.
storage_requirements:
  temperature_range: Store cylinders <52°C. Keep away from heat.
  ventilation: 'Outdoor storage strongly preferred. Indoor: mechanical ventilation
    with emergency backup. NOx gas detection mandatory.'
  incompatibilities:
  - Flammable materials
  - Combustible materials
  - Reducing agents
  - Ammonia
  - Carbon disulfide
  - Hydrogen sulfide
  - Petroleum products
  container_material: Steel cylinders for compressed gas. Stainless steel or glass
    for liquid.
  segregation: Separate from flammables and combustibles by 20 feet or firewall. Oxidizer
    storage area.
  quantity_limits: 'Per fire code: limit cylinders in buildings. Many facilities store
    outdoors only.'
  special_requirements: Cylinder restraints mandatory. Leak detection system required.
    Post "OXIDIZER" and "POISON GAS" signs. Emergency procedures posted. Monitor cylinder
    integrity regularly.
