  storage_requirements:
    temperature_range: Store cylinders <52°C. Keep away from heat.
    ventilation: 'Outdoor storage strongly preferred. Indoor: mechanical ventilation with emergency backup. NOx gas detection
      mandatory.'
    incompatibilities:
    - Flammable materials
    - Combustible materials
    - Reducing agents
    - Ammonia
    - Carbon disulfide
    - Hydrogen sulfide
    - Petroleum products
    container_material: Steel cylinders for compressed gas. Stainless steel or glass for liquid.
    segregation: Separate from flammables and combustibles by 20 feet or firewall. Oxidizer storage area.
    quantity_limits: 'Per fire code: limit cylinders in buildings. Many facilities store outdoors only.'
    special_requirements: Cylinder restraints mandatory. Leak detection system required. Post "OXIDIZER" and "POISON GAS"
      signs. Emergency procedures posted. Monitor cylinder integrity regularly.
