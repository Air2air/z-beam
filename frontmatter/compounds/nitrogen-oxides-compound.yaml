author:
  id: 1
ppe_requirements:
  respiratory: SCBA or positive-pressure supplied-air respirator for >1 ppm NO2 or unknown concentrations. Air-purifying with
    acid gas cartridge acceptable for ≤1 ppm NO2 only.
  skin: Nitrile or butyl rubber gloves for liquid contact. Chemical-resistant clothing if high concentrations.
  eye: Chemical safety goggles, face shield for high concentrations
  minimum_level: Level C for known <1 ppm NO2, Level B for >1 ppm or NO/NO2 mixtures
  special_notes: NO2 is brown gas, NO is colorless. Both highly toxic. Delayed pulmonary edema possible 6-72 hours after exposure.
    STEL critical - short exposures very dangerous.
emergency_response:
  fire_hazard: Non-flammable but supports combustion. Strong oxidizer. Increases fire intensity. May explode when heated.
  fire_suppression: Do not fight fire if gas cylinder involved - extreme explosion risk. Evacuate. Cool cylinders with water
    spray from safe distance. Let fire burn out.
  spill_procedures: 'EVACUATE. Liquid NO2/N2O4: extreme hazard. Ventilate area. SCBA mandatory. Contain with soda ash or lime
    neutralization. Never use water directly on liquid NOx.'
  exposure_immediate_actions: Remove to fresh air immediately. Administer 100% oxygen. Severe respiratory irritation likely.
    Monitor for delayed pulmonary edema (6-72 hours). Seek immediate medical attention - hospitalize for observation even
    if asymptomatic.
  environmental_hazards: Contributes to acid rain, smog, ozone formation. Toxic to vegetation. Report significant releases.
  special_hazards: DELAYED PULMONARY EDEMA - asymptomatic period 6-72 hours then sudden respiratory failure. NO converts to
    NO2 in air (more toxic). Strong oxidizer. Corrosive to respiratory tract. May explode under pressure.
environmental_impact:
  aquatic_toxicity: 'Toxic to aquatic life. LC50 (fish, 96h): varies by species and form. Forms acidic solutions.'
  biodegradability: Reacts in atmosphere. Converts to nitric acid. Not biodegradable.
  bioaccumulation: Does not bioaccumulate.
  soil_mobility: High mobility as gas. Deposits as nitrates. Contributes to soil acidification.
  atmospheric_fate: 'Photochemical reactions produce ozone. Forms nitric acid with water vapor. Contributes to acid rain.
    Residence time: hours to days.'
  ozone_depletion: true
  global_warming_potential: 'N2O: 298 (CO2=1)'
  reportable_releases:
    water: 10 lbs NO2 to navigable waters
    air: 10 lbs/day NO2 (CERCLA RQ)
