faq:
  presentation: collapsible
  items:
  - id: as-a-laser-cleaning-operator-how
    title: As a laser cleaning operator, how do I protect myself from inhaling cadmium oxide particulates generated during
      the process?
    content: Use a NIOSH-approved full-facepiece respirator with P100 filters or higher to capture fine CdO particulates,
      and ensure the work area has local exhaust ventilation (LEV) systems capturing emissions at the source to keep airborne
      levels below OSHA's 5 µg/m³ 8-hour PEL. Wear impermeable gloves, coveralls, and eye protection to avoid dermal exposure,
      and implement a decontamination protocol like showering and laundering PPE after each shift. Conduct air monitoring
      with real-time particulate samplers to verify controls are effective and schedule annual medical exams for early detection
      of cadmium-related health effects.
