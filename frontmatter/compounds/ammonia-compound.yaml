environmental_impact:
  aquatic_toxicity: 'Toxic to fish at high concentrations. LC50 (fish, 96h): 0.5-2.0 mg/L un-ionized NH3. Unionized form highly
    toxic.'
  biodegradability: Readily biodegradable. Nitrifying bacteria convert to nitrate.
  bioaccumulation: 'Does not bioaccumulate. Log Kow: -1.69.'
  soil_mobility: High mobility as gas. Volatilizes from soil. Absorbed as ammonium ion.
  atmospheric_fate: 'Reacts with acids forming ammonium salts. Washed out by rain. Atmospheric residence: days.'
