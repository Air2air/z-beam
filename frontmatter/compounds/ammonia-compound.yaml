ppe_requirements:
  respiratory: SCBA or supplied-air respirator for >25 ppm or unknown concentrations. Air-purifying with ammonia cartridge
    acceptable for ≤25 ppm.
  skin: Neoprene, nitrile, or butyl rubber gloves. Chemical-resistant clothing. Liquid ammonia causes severe burns and frostbite.
  eye: Chemical safety goggles, full face shield. Extremely irritating and corrosive to eyes.
  minimum_level: Level C for known <25 ppm, Level B for >25 ppm or liquefied ammonia
  special_notes: Extremely irritating at low concentrations. Immediately dangerous above 300 ppm. Cryogenic liquid causes
    frostbite. Emergency eyewash/shower within 10 seconds.
storage_requirements:
  temperature_range: Store cylinders <52°C. Keep away from heat.
  ventilation: 'Outdoor storage preferred. Indoor: mechanical ventilation with emergency backup. Ammonia gas detection mandatory.'
  incompatibilities:
  - Acids (violent reaction)
  - Halogens (chlorine, bromine)
  - Heavy metals
  - Oxidizers
  - Mercury
  - Silver compounds
  - Calcium hypochlorite
  container_material: Steel cylinders for compressed gas. Stainless steel for solutions.
  segregation: Separate from acids by 20 feet or firewall. Separate from oxidizers and halogens. Flammable gas storage.
  quantity_limits: Per fire code. Refrigeration systems subject to special regulations.
  special_requirements: Cylinder restraints mandatory. Leak detection system required. Post "FLAMMABLE GAS" and "CORROSIVE"
    signs. Emergency eyewash/shower within 25 feet. Avoid contact with copper, brass, zinc in piping.
