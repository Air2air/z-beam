    health_impacts:
      presentation: descriptive
      _section:
        title: Health Impacts
        description: Health effects from exposure including acute and chronic impacts
        icon: heart-pulse
        order: 1
        variant: warning
      items:
      - content: 'When handling ammonia compounds in industrial settings, prioritize ventilation right away. This gas''s sharp
          corrosiveness can irritate eyes and skin on contact, leading to burns that feel like fire if not addressed quickly.
          We''ve seen workers overlook gloves only to regret it later, so suit up fully before any exposure.


          Its reactivity as a base turns moist surfaces into slippery hazards, but understanding this helps you rinse affected
          areas immediately with plenty of water to neutralize the sting. Inhaling even faint traces brings on coughing fits
          and throat tightness, which eases faster if you step into fresh air without delay. For materials processing, where
          vapors linger in confined spaces, this property demands constant monitoring to prevent deeper respiratory issues
          that build over time.


          Treating it demands quick action—dilute exposures with cool water flows lasting several minutes, then seek medical
          help for lingering effects like chest discomfort. In laser cleaning applications involving ammonia residues, the
          gas''s volatility means you must seal the area first, ensuring no plumes escape to affect nearby teams. This approach
          keeps operations smooth while safeguarding health, turning potential risks into manageable routines.'
    exposure_guidance:
      presentation: descriptive
      _section:
        title: Exposure Guidelines
        description: OSHA PEL, NIOSH REL, ACGIH TLV, and safe exposure limits
        icon: shield-alert
        order: 2
        variant: warning
      items:
      - content: 'Ammonia compounds sting the eyes fast. They irritate skin on contact. Inhaling them burns the throat quick.
          Workers feel nausea rising. Headaches hit hard too.


          Handle with care always. Use gloves thick and tough. Wear goggles that seal tight. Masks filter the sharp fumes.
          Ventilate spaces wide open.


          In factories, they mix chemicals boldly. But leaks demand quick shutdowns. Spills need neutralizers right away.
          Training keeps teams sharp.


          Laser cleaning cuts grime without harm. Still, vapors rise sharp. Enclose the beam path fully. Monitor air flow
          constantly. Suits protect from stray bursts.


          Stay upwind during releases. Wash exposed skin immediately. Seek fresh air fast. Medical help follows close. Prevention
          beats every cure.'
    personal_protection:
      presentation: descriptive
      _section:
        title: Personal Protection Equipment
        description: Required PPE including respirators, gloves, eye protection, and protective clothing
        icon: shield-check
        order: 3
        variant: warning
      items:
      - content: Handle ammonia compounds with care. Corrosive vapors demand full-face shields. Eyes sting fast without them.
          Respiratory masks seal tight against fumes. Gloves resist chemical soak-through. Cover skin in impermeable suits.
          Boots prevent splashes on feet. Ventilate areas heavily. Train workers on quick exits. Store in sealed containers
          away from heat.
    emergency_procedures:
      presentation: descriptive
      _section:
        title: Emergency Procedures
        description: First aid measures, emergency response, and incident management
        icon: siren
        order: 4
        variant: danger
      items:
      - content: 'Working with ammonia compounds taught me early on to respect their bite—handle them wrong, and you''re in
          for a rough day. If it hits your eyes, the sharp sting demands immediate action: flush them gently but thoroughly
          with plenty of cool water, keeping lids open to let the flow reach every spot, and do this for as long as it takes
          to feel relief starting. Skin contact feels like a bad burn right away, so rinse the area under running water without
          delay, removing any soaked clothes to avoid trapping the irritant.


          Breathing it in hits hard and fast, leaving you coughing or worse, so get to fresh air immediately, loosen tight
          clothing around your neck and chest, and rest in a comfortable position while someone watches for breathing trouble.
          Never try to induce vomiting if it''s swallowed—that could make things uglier inside; instead, rinse your mouth
          carefully with water and head straight to medical help, sipping only if a pro advises it later.


          In all cases, skip home remedies and call for professional care right away, especially if symptoms linger or worsen,
          because ammonia''s corrosive nature doesn''t mess around.'
