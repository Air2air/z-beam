  storage_requirements:
    presentation: descriptive
    items:
    - temperature_range: Store cylinders <52°C. Keep away from heat.
      ventilation: 'Outdoor storage preferred. Indoor: mechanical ventilation with emergency backup. Ammonia gas detection
        mandatory.'
      incompatibilities:
      - Acids (violent reaction)
      - Halogens (chlorine, bromine)
      - Heavy metals
      - Oxidizers
      - Mercury
      - Silver compounds
      - Calcium hypochlorite
      container_material: Steel cylinders for compressed gas. Stainless steel for solutions.
      segregation: Separate from acids by 20 feet or firewall. Separate from oxidizers and halogens. Flammable gas storage.
      quantity_limits: Per fire code. Refrigeration systems subject to special regulations.
      special_requirements: Cylinder restraints mandatory. Leak detection system required. Post "FLAMMABLE GAS" and "CORROSIVE"
        signs. Emergency eyewash/shower within 25 feet. Avoid contact with copper, brass, zinc in piping.
