displayName: Ammonia (NH₃)
subcategory: alkaline_gas
ppe_requirements: Handle ammonia compounds with care. Corrosive vapors demand full-face shields. Eyes sting fast without them.
  Respiratory masks seal tight against fumes. Gloves resist chemical soak-through. Cover skin in impermeable suits. Boots
  prevent splashes on feet. Ventilate areas heavily. Train workers on quick exits. Store in sealed containers away from heat.
formula: NH₃
faq:
- question: What protective equipment and methods should I use to prevent ammonia exposure while performing laser cleaning
    in an industrial setting?
  answer: Always ensure the work area is well-ventilated with local exhaust systems to dilute and remove ammonia gas, aiming
    to keep concentrations below the OSHA permissible exposure limit of 50 ppm (35 ppm time-weighted average over 8 hours).
    Wear appropriate personal protective equipment, including a full-face respirator with ammonia-specific cartridges (NIOSH-approved),
    chemical-resistant gloves, and protective clothing to shield skin and eyes from the gas's corrosive effects. If exposure
    is suspected, immediately evacuate the area, seek fresh air, and monitor for symptoms like eye irritation or respiratory
    distress before resuming work.
