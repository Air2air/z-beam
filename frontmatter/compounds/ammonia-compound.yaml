  detection:
    methods:
      presentation: descriptive
      _section:
        title: Detection Methods
        description: Analytical techniques and instruments for detecting this compound
        icon: microscope
        order: 1
        variant: default
      items:
      - content: 'Ammonia compounds differ sharply from inert gases like nitrogen. They react fiercely with air and moisture.
          This volatility demands sharp detection tools in factories and labs.


          Spot them fast with color-changing strips. These shift hues on contact. Workers grab them for quick checks during
          leaks.


          Electronic sniffers pull ahead here. They buzz or flash at traces. No waiting around in tight spaces.


          Infrared beams cut through fog. They sense the gas signature without touching it. Ideal for remote monitoring in
          pipes.


          For big plants, fixed alarms link to vents. They trigger shutdowns before buildup. Safety nets like these save lives.


          Portable kits shine in spills. Dip and read for instant alerts. Keep them handy near storage tanks.


          Laser probes zap clean surfaces too. They reveal hidden residues without scraping. Perfect for post-cleanup scans
          on metals.'
  operational:
    expert_answers:
      presentation: collapsible
      _section:
        title: Expert Q&A
        description: Frequently asked questions about this compound answered by laser cleaning experts
        icon: message-circle-question
        order: 1
        variant: default
      items:
      - id: what-protective-equipment-and-methods-should-i-use
        question: What protective equipment and methods should I use to prevent ammonia exposure while performing laser cleaning
          in an industrial setting?
        answer: Always ensure the work area is well-ventilated with local exhaust systems to dilute and remove ammonia gas,
          aiming to keep concentrations below the OSHA permissible exposure limit of 50 ppm (35 ppm time-weighted average
          over 8 hours). Wear appropriate personal protective equipment, including a full-face respirator with ammonia-specific
          cartridges (NIOSH-approved), chemical-resistant gloves, and protective clothing to shield skin and eyes from the
          gas's corrosive effects. If exposure is suspected, immediately evacuate the area, seek fresh air, and monitor for
          symptoms like eye irritation or respiratory distress before resuming work.
