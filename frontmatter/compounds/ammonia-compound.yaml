  ppe_requirements:
    presentation: descriptive
    items:
    - respiratory: SCBA or supplied-air respirator for >25 ppm or unknown concentrations. Air-purifying with ammonia cartridge
        acceptable for ≤25 ppm.
      skin: Neoprene, nitrile, or butyl rubber gloves. Chemical-resistant clothing. Liquid ammonia causes severe burns and
        frostbite.
      eye: Chemical safety goggles, full face shield. Extremely irritating and corrosive to eyes.
      minimum_level: Level C for known <25 ppm, Level B for >25 ppm or liquefied ammonia
      special_notes: Extremely irritating at low concentrations. Immediately dangerous above 300 ppm. Cryogenic liquid causes
        frostbite. Emergency eyewash/shower within 10 seconds.
    _section:
      title: PPE Requirements
      description: Personal protective equipment needed for safe handling
      icon: shield
      order: 5
      variant: warning
  emergency_response:
    presentation: descriptive
    items:
    - fire_hazard: Flammable gas. Narrow explosive range but ignites easily. Vapors lighter than air - rise and disperse.
        May reignite after flame is extinguished.
      fire_suppression: Stop flow if safe to do so. Do not extinguish flame unless leak can be stopped. Cool cylinders with
        water spray from safe distance. Use dry chemical, CO2 from maximum distance.
      spill_procedures: EVACUATE. Ventilate area. SCBA required for liquid releases or >300 ppm. Contain with water spray
        or fog. Dilute with water. Neutralize with acid (sulfuric, hydrochloric). Dike large liquid spills.
      exposure_immediate_actions: 'Remove to fresh air immediately. Eyes: flush with water for 15+ minutes - CRITICAL. Remove
        contaminated clothing. Wash skin with water. If inhaled: administer oxygen. Seek immediate medical attention - severe
        irritation likely.'
      environmental_hazards: Toxic to aquatic life at high concentrations. Rapid volatilization from water. Report releases
        >100 lbs.
      special_hazards: Extremely irritating and corrosive to eyes, skin, and respiratory tract. Causes severe chemical burns.
        Cryogenic liquid causes frostbite. Forms explosive mixtures with air. Reacts violently with acids and halogens.
    _section:
      title: Emergency Response
      description: First aid and emergency procedures for exposure incidents
      icon: alert-triangle
      order: 7
      variant: danger
