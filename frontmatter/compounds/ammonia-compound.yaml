compound_description: The key with ammonia is its sharp reactivity compared to milder
  gases like nitrogen. While nitrogen sits inert and harmless in most setups, ammonia
  dives right in, bonding aggressively with surfaces and accelerating breakdowns that
  you wouldn't see otherwise. This difference hits hard in industrial spots, where
  we use it for everything from boosting fertilizers to chilling refrigeration lines—reliable
  workhorses, but only if you handle the bite. Keep an eye on that corrosiveness midway
  through any process; it can etch equipment fast if vapors linger unchecked. For
  laser cleaning, though, this same trait shines through briefly on contaminated tools—its
  volatility means a quick pulse scatters residues without much residue buildup, unlike
  stubborn solids that demand repeated passes.
