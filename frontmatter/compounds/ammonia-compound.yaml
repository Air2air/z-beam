author:
  id: 4
ppe_requirements:
  respiratory: SCBA or supplied-air respirator for >25 ppm or unknown concentrations. Air-purifying with ammonia cartridge
    acceptable for ≤25 ppm.
  skin: Neoprene, nitrile, or butyl rubber gloves. Chemical-resistant clothing. Liquid ammonia causes severe burns and frostbite.
  eye: Chemical safety goggles, full face shield. Extremely irritating and corrosive to eyes.
  minimum_level: Level C for known <25 ppm, Level B for >25 ppm or liquefied ammonia
  special_notes: Extremely irritating at low concentrations. Immediately dangerous above 300 ppm. Cryogenic liquid causes
    frostbite. Emergency eyewash/shower within 10 seconds.
emergency_response:
  fire_hazard: Flammable gas. Narrow explosive range but ignites easily. Vapors lighter than air - rise and disperse. May
    reignite after flame is extinguished.
  fire_suppression: Stop flow if safe to do so. Do not extinguish flame unless leak can be stopped. Cool cylinders with water
    spray from safe distance. Use dry chemical, CO2 from maximum distance.
  spill_procedures: EVACUATE. Ventilate area. SCBA required for liquid releases or >300 ppm. Contain with water spray or fog.
    Dilute with water. Neutralize with acid (sulfuric, hydrochloric). Dike large liquid spills.
  exposure_immediate_actions: 'Remove to fresh air immediately. Eyes: flush with water for 15+ minutes - CRITICAL. Remove
    contaminated clothing. Wash skin with water. If inhaled: administer oxygen. Seek immediate medical attention - severe
    irritation likely.'
  environmental_hazards: Toxic to aquatic life at high concentrations. Rapid volatilization from water. Report releases >100
    lbs.
  special_hazards: Extremely irritating and corrosive to eyes, skin, and respiratory tract. Causes severe chemical burns.
    Cryogenic liquid causes frostbite. Forms explosive mixtures with air. Reacts violently with acids and halogens.
environmental_impact:
  aquatic_toxicity: 'Toxic to fish at high concentrations. LC50 (fish, 96h): 0.5-2.0 mg/L un-ionized NH3. Unionized form highly
    toxic.'
  biodegradability: Readily biodegradable. Nitrifying bacteria convert to nitrate.
  bioaccumulation: 'Does not bioaccumulate. Log Kow: -1.69.'
  soil_mobility: High mobility as gas. Volatilizes from soil. Absorbed as ammonium ion.
  atmospheric_fate: 'Reacts with acids forming ammonium salts. Washed out by rain. Atmospheric residence: days.'
  ozone_depletion: false
  global_warming_potential: null
  reportable_releases:
    water: 100 lbs to navigable waters
    air: 100 lbs/day (CERCLA RQ)
