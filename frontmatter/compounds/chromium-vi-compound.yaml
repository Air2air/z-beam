  items:
  - id: as-a-laser-cleaning-operator-working
    title: As a laser cleaning operator working on chromium-containing alloys like stainless steel, what personal protective
      equipment (PPE) should I use to minimize Cr(VI) exposure risks?
    content: Always wear a NIOSH-approved respirator with a P100 filter or supplied-air system to protect against inhaling
      Cr(VI) fumes or aerosols generated during laser ablation, as Cr(VI) is a potent carcinogen that can cause lung cancer
      via respiratory exposure. In addition, use chemical-resistant gloves, full-body coveralls, and safety goggles to prevent
      skin contact, which can lead to dermatitis or ulceration, and ensure the workspace has local exhaust ventilation to
      capture airborne particles. Regularly inspect and replace PPE, and follow OSHA's permissible exposure limit of 5 µg/m³
      for Cr(VI) over an 8-hour shift to stay within safe thresholds.
