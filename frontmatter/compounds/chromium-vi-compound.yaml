  detection:
    methods:
      presentation: descriptive
      sectionMetadata:
        section_title: Detection Methods
        section_description: Techniques and equipment for detecting this compound
        icon: microscope
        order: 1
      items:
      - content: Spotting chromium six compounds demands sharp eyes and tools. They lurk in paints, wastes, and factory runoff.
          Color changes flag them fast in tests. Strips dipped in samples turn vivid shades. Air filters catch airborne bits
          for lab checks. Workers scan surfaces with portable gadgets. Lasers pulse to vaporize traces, revealing hidden spots.
          Electrochemical probes buzz on contact. All this guards against their toxic punch. Factories rely on these routines
          to stay safe.
  operational:
    expert_answers:
      presentation: collapsible
      sectionMetadata:
        section_title: Expert Q&A
        section_description: Common questions about this compound answered by experts
        icon: user-tie
        order: 1
      items:
      - id: as-a-laser-cleaning-operator-working-on-chromium-c
        question: As a laser cleaning operator working on chromium-containing alloys like stainless steel, what personal protective
          equipment (PPE) should I use to minimize Cr(VI) exposure risks?
        answer: Always wear a NIOSH-approved respirator with a P100 filter or supplied-air system to protect against inhaling
          Cr(VI) fumes or aerosols generated during laser ablation, as Cr(VI) is a potent carcinogen that can cause lung cancer
          via respiratory exposure. In addition, use chemical-resistant gloves, full-body coveralls, and safety goggles to
          prevent skin contact, which can lead to dermatitis or ulceration, and ensure the workspace has local exhaust ventilation
          to capture airborne particles. Regularly inspect and replace PPE, and follow OSHA's permissible exposure limit of
          5 µg/m³ for Cr(VI) over an 8-hour shift to stay within safe thresholds.
