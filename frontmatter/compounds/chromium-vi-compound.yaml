  emergency_response:
    fire_hazard: Non-combustible. Strong oxidizer - increases fire intensity. Chromates
      may explode when heated with organic materials.
    fire_suppression: Use agent appropriate for surrounding fire. Do not use water
      on dichromate fires. Wear SCBA.
    spill_procedures: Evacuate area. Wear full PPE. Avoid dust generation. Reduce
      Cr(VI) to Cr(III) with sodium bisulfite or ferrous sulfate before cleanup. Sweep/vacuum
      with HEPA filter. Dispose as hazardous waste. Decontaminate area thoroughly.
    exposure_immediate_actions: Remove contaminated clothing immediately. Wash skin
      with soap and water for 15 minutes. If inhaled, move to fresh air. Seek medical
      attention immediately - inform physician of Cr(VI) exposure and potential for
      delayed effects.
    environmental_hazards: Toxic to aquatic life. Cr(VI) is highly mobile in groundwater.
      Can contaminate drinking water. Report releases >5000 lbs.
    special_hazards: KNOWN HUMAN CARCINOGEN (IARC Group 1). Causes lung cancer, nasal
      septum perforation. Strong oxidizer - reacts violently with combustibles. Corrosive
      to skin (ulcers/chrome holes). Potent allergen - can cause severe dermatitis.
