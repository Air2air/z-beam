environmental_impact:
  aquatic_toxicity: 'Very toxic to aquatic life. LC50 (fish, 96h): 10-100 mg/L depending
    on species. Cr(VI) more toxic than Cr(III).'
  biodegradability: Not biodegradable. Cr(VI) can be reduced to less toxic Cr(III)
    by organic matter and reducing conditions.
  bioaccumulation: Low bioaccumulation potential. Does not concentrate in food chain.
  soil_mobility: High mobility in soil and groundwater as Cr(VI). Adsorbs less than
