    ppeRequirements:
      _section:
        sectionTitle: Personal Protective Equipment
        sectionDescription: Required safety equipment for handling this compound
        sectionMetadata: relationships.safety.ppeRequirements
        icon: shield-check
        order: 20
        variant: default
      presentation: descriptive
      items:
      - respiratory: NIOSH-approved air-purifying respirator with P100 filters for ≤2.5 µg/m³. Powered air-purifying respirator
          (PAPR) for ≤12.5 µg/m³. SCBA for >12.5 µg/m³ or unknown concentrations.
