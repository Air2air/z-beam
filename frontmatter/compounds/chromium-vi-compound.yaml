ppe_requirements:
  respiratory: NIOSH-approved air-purifying respirator with P100 filters for ≤2.5
    µg/m³. Powered air-purifying respirator (PAPR) for ≤12.5 µg/m³. SCBA for >12.5
    µg/m³ or unknown concentrations.
  skin: Nitrile or neoprene gloves (>4mil thickness). Chemical-resistant clothing.
    Cr(VI) can cause allergic skin reactions and ulcerations.
  eye: Chemical safety goggles, face shield for dusty/spray operations
  minimum_level: Level C for known concentrations <2.5 µg/m³, Level B for higher concentrations
    or welding/cutting operations
  special_notes: CARCINOGEN and ALLERGEN. Prevent skin contact - causes sensitization.
    Welding/cutting stainless steel generates Cr(VI) fume. Use wet methods to control
    dust. Medical surveillance required.
storage_requirements:
  temperature_range: Store at room temperature, avoid excessive heat
  ventilation: Local exhaust ventilation. Store in well-ventilated area away from
    work areas.
  incompatibilities:
  - Combustible materials
  - Organic materials
  - Reducing agents
  - Acids
  - Bases
  - Ammonia
  - Hydrogen sulfide
  container_material: Tightly sealed glass or plastic containers. Polyethylene or
    glass for chromic acid.
  segregation: Separate from combustibles, organics, and reducing agents by 20 feet
    or firewall. Designated carcinogen storage.
  quantity_limits: Minimize quantities stored. OSHA requires carcinogen storage protocols.
  special_requirements: Post "CANCER HAZARD" and "STRONG OXIDIZER" signs. Restrict
    access to authorized personnel. Secondary containment for liquids. Inspect weekly
    for container integrity. Emergency eyewash/shower within 10 seconds.
