  firstAid: >-
    Unlike many everyday chemicals that cause only mild irritation, chromium-VI compounds pose a severe health threat
    due to their carcinogenic nature, demanding immediate and careful response to any exposure. Skin contact hits
    hard—flush the area thoroughly with plenty of water for at least fifteen minutes, but avoid rubbing to prevent
    spreading the substance deeper. Remove contaminated clothing right away, as residues can continue to harm.


    Eyes suffer greatly from these compounds. Rinse them continuously with fresh water, keeping lids open to ensure full
    coverage, and seek medical help without delay. Inhalation differs sharply; if someone breathes in dust or fumes,
    move them to fresh air quickly. Loosen tight clothing around the neck and chest to ease breathing, then monitor for
    signs of respiratory distress.


    Ingestion is rarer but far more dangerous, contrasting with surface exposures by attacking internally. Do not induce
    vomiting—that could worsen damage. Give the person water or milk if conscious, to dilute the compound, and rush to
    emergency services. Always prioritize professional care, since these materials linger and cause long-term risks like
    cancer.
