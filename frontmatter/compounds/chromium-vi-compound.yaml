  safety:
    health_effects:
      presentation: card
      items:
      - route: inhalation
        effect: Respiratory tract irritation and ulceration; increased risk of lung cancer
        severity: severe
        onset: immediate for irritation; long-term for cancer
      - route: skin_contact
        effect: Allergic dermatitis and chrome ulcers (perforations in nasal septum or skin)
        severity: high
        onset: short-term
      - route: eye_contact
        effect: Severe conjunctivitis, corneal damage, and potential vision impairment
        severity: severe
        onset: immediate
      - route: ingestion
        effect: Gastrointestinal hemorrhage, renal failure, and systemic toxicity
        severity: severe
        onset: short-term
    ppe_requirements:
      presentation: descriptive
      items:
      - respiratory: NIOSH-approved air-purifying respirator with P100 filters for ≤2.5 µg/m³. Powered air-purifying respirator
          (PAPR) for ≤12.5 µg/m³. SCBA for >12.5 µg/m³ or unknown concentrations.
        skin: Nitrile or neoprene gloves (>4mil thickness). Chemical-resistant clothing. Cr(VI) can cause allergic skin reactions
          and ulcerations.
        eye: Chemical safety goggles, face shield for dusty/spray operations
        minimum_level: Level C for known concentrations <2.5 µg/m³, Level B for higher concentrations or welding/cutting operations
        special_notes: CARCINOGEN and ALLERGEN. Prevent skin contact - causes sensitization. Welding/cutting stainless steel
          generates Cr(VI) fume. Use wet methods to control dust. Medical surveillance required.
      _section:
        section_title: Personal Protective Equipment
        description: Required safety equipment for handling this compound
        icon: shield-check
    emergency_response:
      presentation: descriptive
      items:
      - fire_hazard: Non-combustible. Strong oxidizer - increases fire intensity. Chromates may explode when heated with organic
          materials.
        fire_suppression: Use agent appropriate for surrounding fire. Do not use water on dichromate fires. Wear SCBA.
        spill_procedures: Evacuate area. Wear full PPE. Avoid dust generation. Reduce Cr(VI) to Cr(III) with sodium bisulfite
          or ferrous sulfate before cleanup. Sweep/vacuum with HEPA filter. Dispose as hazardous waste. Decontaminate area
          thoroughly.
        exposure_immediate_actions: Remove contaminated clothing immediately. Wash skin with soap and water for 15 minutes.
          If inhaled, move to fresh air. Seek medical attention immediately - inform physician of Cr(VI) exposure and potential
          for delayed effects.
        environmental_hazards: Toxic to aquatic life. Cr(VI) is highly mobile in groundwater. Can contaminate drinking water.
          Report releases >5000 lbs.
        special_hazards: KNOWN HUMAN CARCINOGEN (IARC Group 1). Causes lung cancer, nasal septum perforation. Strong oxidizer
          - reacts violently with combustibles. Corrosive to skin (ulcers/chrome holes). Potent allergen - can cause severe
          dermatitis.
      _section:
