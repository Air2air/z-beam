ppe_requirements:
  respiratory: NIOSH-approved air-purifying respirator with P100 filters for ≤2.5 µg/m³. Powered air-purifying respirator
    (PAPR) for ≤12.5 µg/m³. SCBA for >12.5 µg/m³ or unknown concentrations.
  skin: Nitrile or neoprene gloves (>4mil thickness). Chemical-resistant clothing. Cr(VI) can cause allergic skin reactions
    and ulcerations.
  eye: Chemical safety goggles, face shield for dusty/spray operations
  minimum_level: Level C for known concentrations <2.5 µg/m³, Level B for higher concentrations or welding/cutting operations
  special_notes: CARCINOGEN and ALLERGEN. Prevent skin contact - causes sensitization. Welding/cutting stainless steel generates
    Cr(VI) fume. Use wet methods to control dust. Medical surveillance required.
physical_properties:
  boiling_point: 'Varies by compound (chromic acid: decomposes >250°C)'
  melting_point: Varies by compound
  vapor_pressure: Negligible at room temperature
  vapor_density: Not applicable (metal/salt)
  specific_gravity: 'Varies (chromic acid: 1.2)'
  flash_point: Not applicable
  autoignition_temp: Not applicable
  explosive_limits: Not applicable
  appearance: Yellow to orange-red crystalline solid (chromates), green solution (chromic acid)
  odor: Odorless or faint acrid odor
emergency_response:
  fire_hazard: Non-combustible. Strong oxidizer - increases fire intensity. Chromates may explode when heated with organic
    materials.
  fire_suppression: Use agent appropriate for surrounding fire. Do not use water on dichromate fires. Wear SCBA.
  spill_procedures: Evacuate area. Wear full PPE. Avoid dust generation. Reduce Cr(VI) to Cr(III) with sodium bisulfite or
    ferrous sulfate before cleanup. Sweep/vacuum with HEPA filter. Dispose as hazardous waste. Decontaminate area thoroughly.
  exposure_immediate_actions: Remove contaminated clothing immediately. Wash skin with soap and water for 15 minutes. If inhaled,
    move to fresh air. Seek medical attention immediately - inform physician of Cr(VI) exposure and potential for delayed
    effects.
  environmental_hazards: Toxic to aquatic life. Cr(VI) is highly mobile in groundwater. Can contaminate drinking water. Report
    releases >5000 lbs.
  special_hazards: KNOWN HUMAN CARCINOGEN (IARC Group 1). Causes lung cancer, nasal septum perforation. Strong oxidizer -
    reacts violently with combustibles. Corrosive to skin (ulcers/chrome holes). Potent allergen - can cause severe dermatitis.
storage_requirements:
  temperature_range: Store at room temperature, avoid excessive heat
  ventilation: Local exhaust ventilation. Store in well-ventilated area away from work areas.
  incompatibilities:
  - Combustible materials
  - Organic materials
  - Reducing agents
  - Acids
  - Bases
  - Ammonia
  - Hydrogen sulfide
  container_material: Tightly sealed glass or plastic containers. Polyethylene or glass for chromic acid.
  segregation: Separate from combustibles, organics, and reducing agents by 20 feet or firewall. Designated carcinogen storage.
  quantity_limits: Minimize quantities stored. OSHA requires carcinogen storage protocols.
  special_requirements: Post "CANCER HAZARD" and "STRONG OXIDIZER" signs. Restrict access to authorized personnel. Secondary
    containment for liquids. Inspect weekly for container integrity. Emergency eyewash/shower within 10 seconds.
