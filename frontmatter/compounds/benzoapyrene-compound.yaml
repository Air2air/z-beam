  firstAid: >-
    If someone gets exposed to benzo[a]pyrene, that nasty carcinogen lurking in things like coal tar or grilled meats,
    act fast but stay calm to avoid spreading it around. Start by getting the person away from the source—whether it's
    dusty air in a workshop or a spill on the floor—so they can breathe clean stuff without inhaling more particles that
    stick to everything. For skin that touches it, gently wash the area with plenty of soap and lukewarm water, patting
    dry afterward to prevent irritation from rubbing too hard, and toss any contaminated clothes into a sealed bag right
    away.


    Eyes are tricky since this compound can cause burning or redness if it gets in there, so flush them continuously
    with clean water for a good while, holding the lids open to make sure it rinses thoroughly, then cover loosely if
    needed until help arrives. Inhalation hits the lungs hard over time, building up risks, so move to fresh air
    immediately and keep the person resting; if they're coughing or short of breath, don't hesitate to call for medical
    pros who know how to handle potential long-term effects like cell damage. Swallowing it accidentally demands no home
    remedies like forcing vomit—that could make things worse by letting it absorb deeper—so rinse the mouth gently and
    head straight to a doctor or poison center for advice on decontamination and monitoring.


    Overall, since benzo[a]pyrene builds up in the body and links to serious health issues down the line, always
    prioritize professional evaluation after initial steps, especially in industrial spots where laser cleaning or
    material handling amps up exposure chances.
