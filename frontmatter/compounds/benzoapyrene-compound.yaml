author:
  id: 3
ppe_requirements:
  respiratory: NIOSH-approved air-purifying respirator with P100 particulate filters for <0.2 mg/m³. SCBA for unknown concentrations
    or emergency response.
  skin: Nitrile or butyl rubber gloves, chemical-resistant clothing. PAHs absorb through skin - double gloving recommended
    for prolonged exposure.
  eye: Chemical safety goggles, face shield for dusty operations
  minimum_level: Level C for known concentrations <0.2 mg/m³, Level B for unknown or >0.2 mg/m³
  special_notes: PAH is carcinogenic - minimize skin contact. Decontaminate immediately after exposure. Disposable protective
    clothing recommended for heavy contamination.
emergency_response:
  fire_hazard: Combustible solid. May burn in sustained fire. Produces carcinogenic PAH compounds in smoke.
  fire_suppression: Dry chemical, CO2, water spray, foam. Wear SCBA - toxic combustion products. Contain runoff.
  spill_procedures: Avoid generating dust. Sweep/vacuum with HEPA filter. Place in sealed containers. DO NOT wash down drains
    - PAH contamination persists. Dispose as hazardous waste.
  exposure_immediate_actions: Remove contaminated clothing immediately. Wash skin thoroughly with soap and water. Do not use
    solvents on skin. If inhaled, move to fresh air. Seek medical attention - inform physician of carcinogen exposure.
  environmental_hazards: Very toxic to aquatic life. Persists in environment (soil/sediment for years). Bioaccumulates in
    food chain. Report spills >1 lb.
  special_hazards: KNOWN HUMAN CARCINOGEN (IARC Group 1). Causes lung cancer, skin cancer, leukemia. Mutagenic and teratogenic.
    PAH exposure linked to multiple cancers. Contaminated soil requires remediation.
environmental_impact:
  aquatic_toxicity: 'Very toxic to aquatic organisms. LC50 (fathead minnow, 96h): 3.7 µg/L. Bioaccumulates in fish - BCF 1,100-15,000.'
  biodegradability: 'Poorly biodegradable. Degradation half-life in soil: months to years. Resistant to microbial breakdown.'
  bioaccumulation: 'High bioaccumulation potential. Log Kow: 6.04-6.50. Accumulates in fatty tissues and sediments.'
  soil_mobility: Low mobility. Strongly adsorbs to soil/sediment organic matter. Persistent in contaminated sites.
  atmospheric_fate: 'Primarily bound to particulate matter. Photolyzes slowly under UV light. Atmospheric half-life: hours
    to days on particles.'
  ozone_depletion: false
  global_warming_potential: null
  reportable_releases:
    water: 1 lb to navigable waters - reportable to NRC
    air: 1 lb/day - reportable to EPA (CERCLA RQ)
