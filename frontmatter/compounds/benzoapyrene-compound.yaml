  emergency_response:
    presentation: descriptive
    items:
    - fire_hazard: Combustible solid. May burn in sustained fire. Produces carcinogenic
        PAH compounds in smoke.
      fire_suppression: Dry chemical, CO2, water spray, foam. Wear SCBA - toxic combustion
        products. Contain runoff.
      spill_procedures: Avoid generating dust. Sweep/vacuum with HEPA filter. Place
        in sealed containers. DO NOT wash down drains - PAH contamination persists.
        Dispose as hazardous waste.
      exposure_immediate_actions: Remove contaminated clothing immediately. Wash skin
        thoroughly with soap and water. Do not use solvents on skin. If inhaled, move
        to fresh air. Seek medical attention - inform physician of carcinogen exposure.
      environmental_hazards: Very toxic to aquatic life. Persists in environment (soil/sediment
        for years). Bioaccumulates in food chain. Report spills >1 lb.
      special_hazards: KNOWN HUMAN CARCINOGEN (IARC Group 1). Causes lung cancer,
        skin cancer, leukemia. Mutagenic and teratogenic. PAH exposure linked to multiple
