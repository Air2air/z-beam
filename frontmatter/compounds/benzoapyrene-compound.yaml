ppe_requirements:
  respiratory: NIOSH-approved air-purifying respirator with P100 particulate filters for <0.2 mg/m³. SCBA for unknown concentrations
    or emergency response.
  skin: Nitrile or butyl rubber gloves, chemical-resistant clothing. PAHs absorb through skin - double gloving recommended
    for prolonged exposure.
  eye: Chemical safety goggles, face shield for dusty operations
  minimum_level: Level C for known concentrations <0.2 mg/m³, Level B for unknown or >0.2 mg/m³
  special_notes: PAH is carcinogenic - minimize skin contact. Decontaminate immediately after exposure. Disposable protective
    clothing recommended for heavy contamination.
storage_requirements:
  temperature_range: Store at room temperature, avoid excessive heat >30°C
  ventilation: Local exhaust ventilation to control dust. Store in well-ventilated area.
  incompatibilities:
  - Strong oxidizers
  - Strong acids
  - Halogens
  container_material: Tightly sealed glass or plastic containers. Store away from light.
  segregation: Separate from oxidizers and incompatibles. Designated carcinogen storage area.
  quantity_limits: Minimize quantities. Follow institutional carcinogen storage protocols.
  special_requirements: Post "CANCER HAZARD" signs. Restrict access to authorized trained personnel only. Secondary containment
    required. Inspect containers regularly for integrity.
