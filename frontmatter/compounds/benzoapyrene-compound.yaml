  environmental_impact:
    presentation: descriptive
    items:
    - aquatic_toxicity: 'Very toxic to aquatic organisms. LC50 (fathead minnow, 96h): 3.7 µg/L. Bioaccumulates in fish - BCF
        1,100-15,000.'
      biodegradability: 'Poorly biodegradable. Degradation half-life in soil: months to years. Resistant to microbial breakdown.'
      bioaccumulation: 'High bioaccumulation potential. Log Kow: 6.04-6.50. Accumulates in fatty tissues and sediments.'
      soil_mobility: Low mobility. Strongly adsorbs to soil/sediment organic matter. Persistent in contaminated sites.
      atmospheric_fate: 'Primarily bound to particulate matter. Photolyzes slowly under UV light. Atmospheric half-life: hours
        to days on particles.'
      ozone_depletion: false
      global_warming_potential: null
      reportable_releases:
        water: 1 lb to navigable waters - reportable to NRC
        air: 1 lb/day - reportable to EPA (CERCLA RQ)
