  ppe_requirements:
    presentation: descriptive
    items:
    - respiratory: NIOSH-approved air-purifying respirator with P100 particulate filters for <0.2 mg/m³. SCBA for unknown
        concentrations or emergency response.
      skin: Nitrile or butyl rubber gloves, chemical-resistant clothing. PAHs absorb through skin - double gloving recommended
        for prolonged exposure.
      eye: Chemical safety goggles, face shield for dusty operations
      minimum_level: Level C for known concentrations <0.2 mg/m³, Level B for unknown or >0.2 mg/m³
      special_notes: PAH is carcinogenic - minimize skin contact. Decontaminate immediately after exposure. Disposable protective
        clothing recommended for heavy contamination.
    _section:
      title: PPE Requirements
      description: Personal protective equipment needed for safe handling
      icon: shield
      order: 5
      variant: warning
  emergency_response:
    presentation: descriptive
    items:
    - fire_hazard: Combustible solid. May burn in sustained fire. Produces carcinogenic PAH compounds in smoke.
      fire_suppression: Dry chemical, CO2, water spray, foam. Wear SCBA - toxic combustion products. Contain runoff.
      spill_procedures: Avoid generating dust. Sweep/vacuum with HEPA filter. Place in sealed containers. DO NOT wash down
        drains - PAH contamination persists. Dispose as hazardous waste.
      exposure_immediate_actions: Remove contaminated clothing immediately. Wash skin thoroughly with soap and water. Do not
        use solvents on skin. If inhaled, move to fresh air. Seek medical attention - inform physician of carcinogen exposure.
      environmental_hazards: Very toxic to aquatic life. Persists in environment (soil/sediment for years). Bioaccumulates
        in food chain. Report spills >1 lb.
      special_hazards: KNOWN HUMAN CARCINOGEN (IARC Group 1). Causes lung cancer, skin cancer, leukemia. Mutagenic and teratogenic.
        PAH exposure linked to multiple cancers. Contaminated soil requires remediation.
    _section:
      title: Emergency Response
      description: First aid and emergency procedures for exposure incidents
      icon: alert-triangle
      order: 7
