  emergency_response:
    presentation: descriptive
    items:
    - fire_hazard: EXTREMELY FLAMMABLE. Wide explosive range. Vapors heavier than air - travel to ignition sources. May polymerize
        explosively in fire.
      fire_suppression: EVACUATE - explosion hazard. Stop flow if safe. Use dry chemical, CO2, alcohol-resistant foam. Water
        spray to cool containers. Do not use water jet directly on liquid.
      spill_procedures: EVACUATE. Eliminate ignition sources. Ventilate area. SCBA for large spills. Contain with dry sand
        or earth. Neutralize with sodium bisulfite. Absorb with vermiculite.
      exposure_immediate_actions: 'Remove to fresh air immediately. Eyes: flush with water for 15 minutes. Remove contaminated
        clothing. Wash skin with soap and water. Seek medical attention - irritation and carcinogen exposure concern.'
      environmental_hazards: Toxic to aquatic life. Rapidly volatilizes from water. Biodegrades quickly. Report spills.
      special_hazards: PROBABLE HUMAN CARCINOGEN (IARC 2B). Respiratory tract carcinogen in animals. Extremely flammable.
