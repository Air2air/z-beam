  symptoms: []
  firstAid: >-
    If acetaldehyde splashes onto skin, rinse the area immediately under running water for at least fifteen minutes
    while removing contaminated clothing to prevent further irritation. Seek medical attention if redness or burning
    persists.


    Eyes exposed? Flush them gently with lukewarm water, keeping eyelids open, and continue for several minutes—stop
    only if it causes more discomfort, then get professional help right away.


    Breathing it in feels harsh? Move the person to fresh air quickly, loosen tight clothing, and monitor breathing; if
    symptoms like coughing worsen, call emergency services without delay.


    Swallowed by accident? Never force vomiting, as it could lead to worse harm—instead, rinse the mouth with water and
    contact poison control or a doctor immediately for guidance. 


    Always have safety data sheets handy in work areas handling this compound, and wear protective gear to avoid these
    issues altogether.
