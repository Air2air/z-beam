ppe_requirements:
  respiratory: NIOSH-approved organic vapor respirator for <25 ppm. SCBA for >25 ppm or unknown concentrations.
  skin: Nitrile or butyl rubber gloves. Chemical-resistant clothing for liquid contact.
  eye: Chemical safety goggles, face shield for splash hazard.
  minimum_level: Level C for <25 ppm, Level B for >25 ppm
  special_notes: Probable human carcinogen (IARC Group 2B). Extremely flammable. Irritating vapor. May polymerize explosively.
emergency_response:
  fire_hazard: EXTREMELY FLAMMABLE. Wide explosive range. Vapors heavier than air - travel to ignition sources. May polymerize
    explosively in fire.
  fire_suppression: EVACUATE - explosion hazard. Stop flow if safe. Use dry chemical, CO2, alcohol-resistant foam. Water spray
    to cool containers. Do not use water jet directly on liquid.
  spill_procedures: EVACUATE. Eliminate ignition sources. Ventilate area. SCBA for large spills. Contain with dry sand or
    earth. Neutralize with sodium bisulfite. Absorb with vermiculite.
  exposure_immediate_actions: 'Remove to fresh air immediately. Eyes: flush with water for 15 minutes. Remove contaminated
    clothing. Wash skin with soap and water. Seek medical attention - irritation and carcinogen exposure concern.'
  environmental_hazards: Toxic to aquatic life. Rapidly volatilizes from water. Biodegrades quickly. Report spills.
  special_hazards: PROBABLE HUMAN CARCINOGEN (IARC 2B). Respiratory tract carcinogen in animals. Extremely flammable. May
    polymerize violently when contaminated. Narcotic at high concentrations. Irritating to eyes and respiratory tract.
environmental_impact:
  aquatic_toxicity: 'Toxic to aquatic life. LC50 (fish, 96h): 50-150 mg/L.'
  biodegradability: Readily biodegradable (>70% in 28 days). Oxidizes to acetic acid.
  bioaccumulation: 'Does not bioaccumulate. Log Kow: -0.34.'
  soil_mobility: High mobility. Volatilizes rapidly from soil.
  atmospheric_fate: 'Photolyzes rapidly. Forms peroxyacetyl nitrate (PAN). Atmospheric half-life: 9 hours.'
  ozone_depletion: false
  global_warming_potential: null
  reportable_releases:
    water: 1000 lbs to navigable waters
    air: 1000 lbs/day (CERCLA RQ)
