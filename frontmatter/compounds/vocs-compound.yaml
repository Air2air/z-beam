  emergency_response:
    fire_hazard: Many VOCs flammable or combustible. Vapors heavier than air. May travel to ignition sources. Explosive mixtures
      possible.
    fire_suppression: Use dry chemical, CO2, foam appropriate for specific VOC. Water spray to cool containers. Prevent runoff
      contamination.
    spill_procedures: Eliminate ignition sources. Ventilate area. Identify VOCs if possible. Contain with absorbent. Dispose
      as hazardous waste. Monitor air quality.
    exposure_immediate_actions: 'Remove to fresh air. Eyes: flush with water. Remove contaminated clothing. Wash skin. Seek
      medical attention - inform physician of specific VOCs if known. Monitor for delayed effects.'
    environmental_hazards: Many VOCs toxic to aquatic life. Contribute to ozone formation and smog. Bioaccumulate. Contaminate
      groundwater.
    special_hazards: Complex mixtures with unpredictable effects. Some carcinogenic (benzene, formaldehyde, 1,3-butadiene).
      Others neurotoxic (toluene, xylene, styrene). Respiratory irritants. Contribute to indoor air quality problems. Chronic
      exposure health effects vary widely.
  physical_properties:
    boiling_point: Variable (<260°C by EPA definition)
    melting_point: Variable
    vapor_pressure: High (>0.01 kPa @ 25°C by definition)
    vapor_density: Variable, typically >1 (heavier than air)
    specific_gravity: Variable (0.7-1.6 typical)
    flash_point: Variable (many <38°C)
    autoignition_temp: Variable (200-600°C typical)
    explosive_limits: Variable depending on compound
    appearance: Colorless to colored liquids or gases
    odor: Variable - sweet, pungent, solvent-like, or odorless
