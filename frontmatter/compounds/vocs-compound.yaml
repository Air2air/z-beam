reactivity:
  stability: Variable. Many stable under normal conditions. Some polymerize or degrade.
  polymerization: Some VOCs polymerize (styrene, acrylates). Check individual compounds.
  incompatible_materials:
  - 'Variable - commonly: oxidizers, strong acids, strong bases, reactive metals'
  hazardous_decomposition:
  - Carbon monoxide
  - Carbon dioxide
  - Variable toxic gases depending on compound
  conditions_to_avoid:
  - Heat
  - Ignition sources
  - Incompatible materials
  - Oxidizers
  reactivity_hazard: Variable. Many form explosive mixtures with air. Some react violently with oxidizers. Peroxide formation
    possible in ethers.
environmental_impact:
  aquatic_toxicity: 'Variable. Many VOCs toxic to aquatic life (LC50: 1-1000 mg/L range).'
  biodegradability: Variable. Some readily biodegradable, others persistent.
  bioaccumulation: 'Variable. Log Kow range: -1 to 7. Lipophilic VOCs bioaccumulate.'
  soil_mobility: Variable. Many volatile from soil. Some adsorb strongly.
  atmospheric_fate: 'Photochemical reactions. Form ozone and smog. Atmospheric half-life: hours to months. Major air quality
    concern.'
  ozone_depletion: Some VOCs deplete ozone (CFCs, halons - now banned)
  global_warming_potential: Some VOCs are greenhouse gases
  reportable_releases:
    water: Variable by specific VOC (1-5000 lbs typical)
    air: Variable by specific VOC. VOC emissions regulated.
detection_monitoring:
  sensor_types:
  - Photoionization detector (PID)
  - Flame ionization detector (FID)
  - Metal oxide semiconductor
  - Infrared
  - Gas chromatography
  detection_range: 0.1-10,000 ppm depending on sensor and VOC
  alarm_setpoints:
    low: Variable - set to specific VOC TLV or mixture assessment
    high: Variable - typically 2x TLV or STEL
    evacuate: Variable - set to IDLH of most hazardous component
  colorimetric_tubes:
  - VOC-specific tubes available (benzene, toluene, xylene, etc.)
  - General organic vapor tubes
  analytical_methods:
  - method: EPA Method TO-15
    technique: GC-MS (canister sampling)
    detection_limit: ppb levels for most VOCs
  - method: NIOSH 1501
    technique: GC-FID (charcoal tube sampling)
    detection_limit: Variable, typically 0.01-0.1 ppm
  - method: EPA Method 8260
    technique: GC-MS (water samples)
    detection_limit: µg/L levels
  odor_threshold: Variable. Some VOCs odorless (benzene), others pungent at low ppm. Olfactory fatigue common. Do not rely
    on odor.
title: VOCs
ppe_requirements_detail:
  id: irritant-gas-low-concentration
  hazard_type: irritant_gas
  concentration_range: <25 ppm
  exposure_duration: short_term
  minimum_protection_level: Level C
  respiratory:
    primary:
      equipment: NIOSH-approved organic vapor respirator
      standard: NIOSH 42 CFR 84
      filter_type: Organic vapor cartridge
      condition: For concentrations <25 ppm
      fit_test_required: true
      change_schedule: Per manufacturer guidance or saturation
    upgrade_conditions:
    - trigger: Concentration >25 ppm
      equipment: Self-contained breathing apparatus (SCBA)
    - trigger: Unknown concentration
      equipment: SCBA or supplied-air respirator
    - trigger: Oxygen deficient atmosphere (<19.5%)
      equipment: SCBA (pressure-demand mode)
  skin:
    gloves:
      material: Nitrile or butyl rubber
      thickness: 15-18 mil minimum
      standard: ANSI/ISEA 105
      breakthrough_time: '>480 minutes'
      condition: All handling operations
    body:
      equipment: Chemical-resistant apron or coveralls
      material: Tyvek or equivalent polymer-laminate
      standard: ANSI/ISEA 101
      condition: Splash potential or prolonged exposure
    footwear:
      equipment: Chemical-resistant boots
      material: Nitrile or PVC
      condition: Floor contamination or large spills
  eye:
    primary:
      equipment: Chemical safety goggles
      type: Indirect vents, sealed to face
      standard: ANSI Z87.1
      marking: Z87+ for impact protection
      condition: All operations with exposure potential
    secondary:
      equipment: Face shield
      condition: Splash hazard or container transfer
      use: Over goggles, not replacement
  special_requirements:
  - Work in well-ventilated area or use local exhaust ventilation
  - Eliminate all ignition sources within 50 feet
  - Emergency shower and eyewash within 10 seconds travel time
  - Prohibit eating, drinking, smoking in contaminated areas
  - Wash hands thoroughly before eating or drinking
  decontamination:
  - Remove contaminated clothing immediately
  - Wash skin with soap and water
  - Launder contaminated clothing separately
  - Do not reuse until properly decontaminated
  training_required:
  - Respiratory protection program
  - Chemical hazard awareness
  - PPE donning and doffing procedures
  - Emergency response procedures
  medical_surveillance:
    required: false
    recommended: Annual respiratory fitness evaluation
  limitations:
  - Not for IDLH (Immediately Dangerous to Life or Health) atmospheres
  - Not for oxygen-deficient environments
  - Air-purifying respirators do not supply oxygen
  specific_compound: Volatile Organic Compounds
  pel_ppm: null
