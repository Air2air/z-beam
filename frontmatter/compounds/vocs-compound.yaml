  detection_monitoring:
    presentation: descriptive
    items:
    - sensor_types:
      - Photoionization detector (PID)
      - Flame ionization detector (FID)
      - Metal oxide semiconductor
      - Infrared
      - Gas chromatography
      detection_range: 0.1-10,000 ppm depending on sensor and VOC
      alarm_setpoints:
        low: Variable - set to specific VOC TLV or mixture assessment
        high: Variable - typically 2x TLV or STEL
        evacuate: Variable - set to IDLH of most hazardous component
      colorimetric_tubes:
      - VOC-specific tubes available (benzene, toluene, xylene, etc.)
      - General organic vapor tubes
      analytical_methods:
      - method: EPA Method TO-15
        technique: GC-MS (canister sampling)
        detection_limit: ppb levels for most VOCs
      - method: NIOSH 1501
        technique: GC-FID (charcoal tube sampling)
        detection_limit: Variable, typically 0.01-0.1 ppm
      - method: EPA Method 8260
        technique: GC-MS (water samples)
        detection_limit: µg/L levels
      odor_threshold: Variable. Some VOCs odorless (benzene), others pungent at low ppm. Olfactory fatigue common. Do not
        rely on odor.
    _section:
      title: Detection & Monitoring
      description: Methods and equipment for detecting and monitoring this compound
      icon: gauge
      order: 6
      variant: default
  ppe_requirements:
    presentation: descriptive
    items:
    - respiratory: Organic vapor respirator with appropriate cartridge for known VOC concentrations. SCBA for unknown mixtures
        or high concentrations.
      skin: Nitrile or butyl rubber gloves depending on specific VOC. Chemical-resistant clothing for liquid contact.
      eye: Chemical safety goggles, face shield for splash hazard.
      minimum_level: Level C for known low concentrations, Level B for unknown mixtures or high vapor concentrations
      special_notes: VOCs vary widely in toxicity. Mixture effects unpredictable. Some VOCs carcinogenic (benzene, formaldehyde).
        Others neurotoxic (toluene, xylene). Identify specific VOCs when possible.
    _section:
      title: PPE Requirements
      description: Personal protective equipment needed for safe handling
      icon: shield
      order: 5
      variant: warning
  emergency_response:
    presentation: descriptive
    items:
    - fire_hazard: Many VOCs flammable or combustible. Vapors heavier than air. May travel to ignition sources. Explosive
        mixtures possible.
      fire_suppression: Use dry chemical, CO2, foam appropriate for specific VOC. Water spray to cool containers. Prevent
        runoff contamination.
      spill_procedures: Eliminate ignition sources. Ventilate area. Identify VOCs if possible. Contain with absorbent. Dispose
        as hazardous waste. Monitor air quality.
      exposure_immediate_actions: 'Remove to fresh air. Eyes: flush with water. Remove contaminated clothing. Wash skin. Seek
        medical attention - inform physician of specific VOCs if known. Monitor for delayed effects.'
      environmental_hazards: Many VOCs toxic to aquatic life. Contribute to ozone formation and smog. Bioaccumulate. Contaminate
        groundwater.
      special_hazards: Complex mixtures with unpredictable effects. Some carcinogenic (benzene, formaldehyde, 1,3-butadiene).
        Others neurotoxic (toluene, xylene, styrene). Respiratory irritants. Contribute to indoor air quality problems. Chronic
        exposure health effects vary widely.
    _section:
      title: Emergency Response
      description: First aid and emergency procedures for exposure incidents
      icon: alert-triangle
      order: 7
      variant: danger
