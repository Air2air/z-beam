  safety:
    healthEffects:
      _section:
        sectionTitle: Health Effects
        sectionDescription: Adverse health impacts from exposure to this compound
        sectionMetadata: relationships.safety.healthEffects
        icon: heart-pulse
        order: 15
        variant: default
      presentation: card
      items:
      - route: inhalation
        effect: Asphyxiation due to oxygen displacement, leading to unconsciousness and potential death at concentrations
          >10%
        severity: severe
        onset: immediate
      - route: inhalation
        effect: Headache, dizziness, and increased heart rate at concentrations 3-5%
        severity: moderate
        onset: short-term
      - route: inhalation
        effect: Respiratory acidosis and hyperventilation at prolonged exposure to elevated levels
        severity: high
        onset: long-term
      - route: eye_contact
        effect: Mild irritation from direct high-pressure exposure
        severity: low
        onset: immediate
      - route: skin_contact
        effect: Frostbite or irritation if in liquefied form (dry ice)
        severity: moderate
        onset: immediate
    ppeRequirements:
      _section:
        sectionTitle: Personal Protective Equipment
        sectionDescription: Required safety equipment for handling this compound
        sectionMetadata: relationships.safety.ppeRequirements
        icon: shield-check
        order: 20
        variant: default
      presentation: descriptive
      items:
      - respiratory: SCBA for >5% (50,000 ppm) or oxygen-deficient atmospheres. Not required for normal ambient levels.
        skin: Insulated gloves for liquid/solid CO2 (dry ice) - cryogenic hazard. No protection needed for gas at normal levels.
        eye: Safety glasses for dry ice handling. No protection needed for gas.
        minimumLevel: Level D for normal operations, Level B for confined spaces or high concentrations
        specialNotes: Simple asphyxiant - displaces oxygen. Heavier than air - accumulates in low areas. Dry ice causes frostbite.
          Physiological effects >1% concentration.
    emergencyResponse:
      _section:
        sectionTitle: Emergency Response
        sectionDescription: Procedures for spills, exposure, and incidents
        sectionMetadata: relationships.safety.emergencyResponse
        icon: exclamation-triangle
        order: 25
        variant: default
      presentation: descriptive
      items:
      - fireHazard: Non-flammable. Used as fire suppressant. Cylinders may explode when heated.
        fireSuppression: Not applicable. CO2 extinguishes fires. If cylinder in fire, cool with water spray from maximum distance
          or evacuate - explosion hazard.
        spillProcedures: 'Liquid/dry ice release: Ventilate area immediately. Evacuate low-lying areas - CO2 heavier than
          air. Monitor oxygen levels. Do not touch dry ice - frostbite.'
        exposureImmediateActions: 'Remove to fresh air immediately. If not breathing, give artificial respiration. Administer
          100% oxygen. Seek medical attention if symptoms persist. For dry ice contact: treat as frostbite - warm affected
          area gradually.'
        environmentalHazards: Greenhouse gas. Contributes to ocean acidification. Generally non-toxic to wildlife at normal
          atmospheric levels.
        specialHazards: 'SIMPLE ASPHYXIANT - displaces oxygen. Heavier than air - accumulates in pits, tanks, confined spaces.
          Physiological effects: >1% increased respiration, >5% headache/dizziness, >10% unconsciousness, >20-30% death. ODORLESS
          - no warning. Dry ice causes severe frostbite.'
