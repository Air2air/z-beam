  firstAid: >-
    If you've ever dealt with a confined space mishap where the air turns heavy and folks start gasping, knowing quick
    steps for carbon dioxide exposure can make all the difference—it's that invisible thief that chokes out oxygen
    without warning. Get the person away from the source immediately, hauling them into open, fresh air where they can
    breathe easy again, and loosen any tight clothing around the neck or chest to help airflow. Watch closely for signs
    like confusion or shallow breaths; if they're unresponsive and not breathing normally, start rescue breaths or chest
    compressions right away to keep oxygen circulating until help arrives. While waiting for professionals, keep them
    comfortable and warm, avoiding any stimulants that might rev things up too fast. Once stabilized, medical follow-up
    is crucial because lingering effects from this sneaky gas can sneak back in, turning a close call into something
    worse if ignored.
