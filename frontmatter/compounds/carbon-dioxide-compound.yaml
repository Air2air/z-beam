  storage_requirements:
    temperature_range: Store cylinders <52°C. Dry ice requires insulated storage <-78°C.
    ventilation: Good ventilation essential. Outdoor storage preferred for large quantities. Monitor oxygen levels in storage
      areas.
    incompatibilities:
    - Reactive metals (cesium, sodium, potassium)
    - Metal acetylides
    - Bases (reacts forming carbonates)
    container_material: Steel cylinders for compressed gas. Insulated containers for dry ice.
    segregation: None required. Keep away from reactive metals.
    quantity_limits: Cylinders per fire code. Dry ice quantities limited by storage capacity.
    special_requirements: Cylinder restraints mandatory. Oxygen monitoring in storage areas. Post "SIMPLE ASPHYXIANT" signs.
      Adequate ventilation critical. Never store in confined spaces without ventilation and O2 monitoring.
