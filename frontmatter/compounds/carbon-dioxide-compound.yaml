    technique: NDIR (Non-dispersive infrared)
    detection_limit: 50 ppm
  - method: Detector tubes
    technique: Colorimetric
    detection_limit: 0.01%
  odor_threshold: Not applicable - odorless at all concentrations. No warning property. MUST use instruments.
