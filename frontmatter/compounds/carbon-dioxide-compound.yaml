    storageRequirements:
      _section:
        sectionTitle: Storage Requirements
        sectionDescription: Safe storage conditions and compatibility
        sectionMetadata: relationships.safety.storageRequirements
        icon: warehouse
        order: 35
        variant: default
      presentation: descriptive
      items:
      - temperatureRange: Store cylinders <52°C. Dry ice requires insulated storage <-78°C.
        ventilation: Good ventilation essential. Outdoor storage preferred for large quantities. Monitor oxygen levels in
          storage areas.
        incompatibilities:
        - Reactive metals (cesium, sodium, potassium)
        - Metal acetylides
        - Bases (reacts forming carbonates)
        containerMaterial: Steel cylinders for compressed gas. Insulated containers for dry ice.
        segregation: None required. Keep away from reactive metals.
        quantityLimits: Cylinders per fire code. Dry ice quantities limited by storage capacity.
        specialRequirements: Cylinder restraints mandatory. Oxygen monitoring in storage areas. Post "SIMPLE ASPHYXIANT" signs.
          Adequate ventilation critical. Never store in confined spaces without ventilation and O2 monitoring.
    regulatoryClassification:
      _section:
