molecular_weight: 44.01
description: Carbon dioxide acts as a silent thief in tight spaces, pushing out breathable air without warning. That makes
  it a potent asphyxiant, deadly in enclosed areas where it builds up fast. In industry, workers handle it with care during
  storage or transport. Dry ice form offers a cold bite, sublimating straight to gas for quick cooling tasks. Factories use
  the gas to shield metal welds from nasty oxidation. Breweries fizz it into drinks for that sharp carbonation kick. In laser
  cleaning, carbon dioxide powers beams that strip grime off surfaces without harsh chemicals. Those pulses vaporize dirt
  layers gently on delicate artifacts. The gas stays non-reactive, leaving metals shiny and untouched. Fire suppression leans
  on it too, smothering flames by starving oxygen. Overall, this compound juggles cooling, protection, and cleaning roles
  with eerie efficiency.
