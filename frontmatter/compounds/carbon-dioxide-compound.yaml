  - id: what-are-the-safe-exposure-limits
    title: What are the safe exposure limits for CO₂ during laser cleaning operations, and how can I monitor them?
    content: Occupational exposure limits for CO₂ as an asphyxiant are set by OSHA at 5,000 ppm (0.5%) as an 8-hour time-weighted
      average (TWA), with a short-term exposure limit of 30,000 ppm (3%) for no more than 10 minutes, and levels above 4%
      (40,000 ppm) can cause immediate oxygen displacement and loss of consciousness. To monitor, use portable CO₂ gas detectors
      or multi-gas monitors calibrated for real-time ppm readings in your workspace, especially in enclosed or poorly ventilated
      areas during laser cleaning. Always ensure oxygen levels remain above 19.5% and integrate alarms that trigger at or
      below these limits to prevent asphyxiation risks.
