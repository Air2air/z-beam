ppe_requirements:
  respiratory: SCBA for >5% (50,000 ppm) or oxygen-deficient atmospheres. Not required for normal ambient levels.
  skin: Insulated gloves for liquid/solid CO2 (dry ice) - cryogenic hazard. No protection needed for gas at normal levels.
  eye: Safety glasses for dry ice handling. No protection needed for gas.
  minimum_level: Level D for normal operations, Level B for confined spaces or high concentrations
  special_notes: Simple asphyxiant - displaces oxygen. Heavier than air - accumulates in low areas. Dry ice causes frostbite.
    Physiological effects >1% concentration.
emergency_response:
  fire_hazard: Non-flammable. Used as fire suppressant. Cylinders may explode when heated.
  fire_suppression: Not applicable. CO2 extinguishes fires. If cylinder in fire, cool with water spray from maximum distance
    or evacuate - explosion hazard.
  spill_procedures: 'Liquid/dry ice release: Ventilate area immediately. Evacuate low-lying areas - CO2 heavier than air.
    Monitor oxygen levels. Do not touch dry ice - frostbite.'
  exposure_immediate_actions: 'Remove to fresh air immediately. If not breathing, give artificial respiration. Administer
    100% oxygen. Seek medical attention if symptoms persist. For dry ice contact: treat as frostbite - warm affected area
    gradually.'
  environmental_hazards: Greenhouse gas. Contributes to ocean acidification. Generally non-toxic to wildlife at normal atmospheric
    levels.
  special_hazards: 'SIMPLE ASPHYXIANT - displaces oxygen. Heavier than air - accumulates in pits, tanks, confined spaces.
    Physiological effects: >1% increased respiration, >5% headache/dizziness, >10% unconsciousness, >20-30% death. ODORLESS
    - no warning. Dry ice causes severe frostbite.'
environmental_impact:
  aquatic_toxicity: 'Low direct toxicity. LC50 (fish): >100 mg/L. Acidifies water (forms carbonic acid). High levels suffocate
    aquatic life.'
  biodegradability: Not applicable (natural component of carbon cycle).
  bioaccumulation: Does not bioaccumulate.
  soil_mobility: High mobility as gas. Absorbed by alkaline soils forming carbonates.
  atmospheric_fate: 'Major greenhouse gas. Atmospheric residence: 30-95 years. Essential for photosynthesis. Removed by plants
    and ocean absorption.'
  ozone_depletion: false
  global_warming_potential: 1 (reference gas)
  reportable_releases:
    water: Not reportable
    air: Not reportable (natural atmospheric component)
detection_monitoring:
  sensor_types:
