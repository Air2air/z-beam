ppe_requirements:
  respiratory: SCBA for >5% (50,000 ppm) or oxygen-deficient atmospheres. Not required
    for normal ambient levels.
  skin: Insulated gloves for liquid/solid CO2 (dry ice) - cryogenic hazard. No protection
    needed for gas at normal levels.
  eye: Safety glasses for dry ice handling. No protection needed for gas.
  minimum_level: Level D for normal operations, Level B for confined spaces or high
    concentrations
  special_notes: Simple asphyxiant - displaces oxygen. Heavier than air - accumulates
    in low areas. Dry ice causes frostbite. Physiological effects >1% concentration.
storage_requirements:
  temperature_range: Store cylinders <52°C. Dry ice requires insulated storage <-78°C.
  ventilation: Good ventilation essential. Outdoor storage preferred for large quantities.
    Monitor oxygen levels in storage areas.
  incompatibilities:
  - Reactive metals (cesium, sodium, potassium)
  - Metal acetylides
  - Bases (reacts forming carbonates)
  container_material: Steel cylinders for compressed gas. Insulated containers for
    dry ice.
  segregation: None required. Keep away from reactive metals.
  quantity_limits: Cylinders per fire code. Dry ice quantities limited by storage
    capacity.
  special_requirements: Cylinder restraints mandatory. Oxygen monitoring in storage
    areas. Post "SIMPLE ASPHYXIANT" signs. Adequate ventilation critical. Never store
    in confined spaces without ventilation and O2 monitoring.
