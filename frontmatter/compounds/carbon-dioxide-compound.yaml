  emergency_response:
    fire_hazard: Non-flammable. Used as fire suppressant. Cylinders may explode when
      heated.
    fire_suppression: Not applicable. CO2 extinguishes fires. If cylinder in fire,
      cool with water spray from maximum distance or evacuate - explosion hazard.
    spill_procedures: 'Liquid/dry ice release: Ventilate area immediately. Evacuate
      low-lying areas - CO2 heavier than air. Monitor oxygen levels. Do not touch
      dry ice - frostbite.'
    exposure_immediate_actions: 'Remove to fresh air immediately. If not breathing,
      give artificial respiration. Administer 100% oxygen. Seek medical attention
      if symptoms persist. For dry ice contact: treat as frostbite - warm affected
      area gradually.'
    environmental_hazards: Greenhouse gas. Contributes to ocean acidification. Generally
      non-toxic to wildlife at normal atmospheric levels.
    special_hazards: 'SIMPLE ASPHYXIANT - displaces oxygen. Heavier than air - accumulates
      in pits, tanks, confined spaces. Physiological effects: >1% increased respiration,
      >5% headache/dizziness, >10% unconsciousness, >20-30% death. ODORLESS - no warning.
      Dry ice causes severe frostbite.'
