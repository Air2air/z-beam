        icon: leaf
        order: 45
        variant: default
      presentation: descriptive
      items:
      - aquaticToxicity: 'Low direct toxicity. LC50 (fish): >100 mg/L. Acidifies water (forms carbonic acid). High levels
          suffocate aquatic life.'
        biodegradability: Not applicable (natural component of carbon cycle).
        bioaccumulation: Does not bioaccumulate.
        soilMobility: High mobility as gas. Absorbed by alkaline soils forming carbonates.
        atmosphericFate: 'Major greenhouse gas. Atmospheric residence: 30-95 years. Essential for photosynthesis. Removed
