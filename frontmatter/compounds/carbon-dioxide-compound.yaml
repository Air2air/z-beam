    high: 10,000 ppm (1%) - physiological effects begin
    evacuate: 40,000 ppm (4%) - NIOSH IDLH
  colorimetric_tubes:
  - Dräger CO2 0.01%/a
  - Gastec 2L
  - Kitagawa 126
  analytical_methods:
