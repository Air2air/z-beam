compound_description: Carbon-ash clings stubbornly to surfaces. Fine particles scatter
  easily in the air. Black and powdery, it absorbs oils quickly. Heat makes it brittle
  yet durable. In factories, workers mix it into concrete for strength. Tires gain
  traction from its grip. Artists blend it for deep black paints. Filters trap pollutants
  using its porous hold. Lasers zap it clean off metals. Pulses vaporize the soot
  without harm. Rust stays safe; shine returns fast. Industry loves this quick wipe.
  Builds last longer post-clean. Sparks fly, ash vanishes.
