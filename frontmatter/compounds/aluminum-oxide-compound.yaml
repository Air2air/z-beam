  symptoms: []
  firstAid: >-
    Dust from aluminum oxide particles clings stubbornly to skin and clothes. Brush it off gently first. Rinse affected
    areas under running water right away. Soap helps loosen the grit without irritation.


    Eyes sting sharp when particles hit. Flush them immediately with lukewarm water. Keep going for several minutes
    straight. Don't rub— that spreads the trouble worse. See a doctor if redness lingers.


    Breathing in fine powder irritates lungs quick. Step outside to fresh air fast. Sit down and rest easy. Cough if
    needed to clear it out. Get medical check if breathing feels tight or cough won't quit.


    Swallowing bits by accident? Spit out what you can. Drink water or milk to dilute. Skip forcing vomit. Head to
    poison control or ER for advice. Aluminum oxide stays mostly harmless, but pros handle any doubt. 


    Store it sealed to avoid loose particles everywhere. Wear masks in dusty spots for safety.
