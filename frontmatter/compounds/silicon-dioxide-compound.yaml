  symptoms: []
  firstAid: >-
    Eyes sting from silica dust? Flush with cool water right away. Keep at it for several minutes. No rubbing—let tears
    help wash it out.


    Skin feels gritty after contact? Brush off loose particles gently. Rinse with mild soap and water. Pat dry, watch
    for irritation.


    Breathe in fine powder? Move to fresh air immediately. Sit down, loosen tight clothes. If breathing gets tough, seek
    medical help fast.


    Swallowed some by accident? Don't induce vomiting. Sip water slowly. Call poison control or doctor without delay.


    Always wear masks in dusty spots to dodge trouble upfront.
