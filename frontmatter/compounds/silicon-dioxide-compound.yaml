  items:
  - id: as-a-laser-cleaning-operator-what
    title: As a laser cleaning operator, what protection methods should I use to minimize exposure to silicon dioxide (SiO₂)
      particulates generated during the process?
    content: Start by assessing the workspace to minimize airborne exposure through engineering controls like local exhaust
      ventilation or enclosed cleaning systems to capture particulates at the source. Wear a properly fitted NIOSH-approved
      respirator with an N95 or higher rating for particulate protection, along with gloves, safety goggles, and a coverall
      to prevent skin and eye contact. Regularly monitor air quality with particulate samplers and follow decontamination
      procedures after shifts to avoid secondary exposure.
