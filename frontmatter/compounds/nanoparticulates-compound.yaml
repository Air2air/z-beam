  items:
  - id: how-can-i-effectively-protect-myself
    title: How can I effectively protect myself from nanoparticulate exposure while operating laser cleaning equipment in
      the lab?
    content: Always wear a properly fitted NIOSH-approved respirator with a P100 filter or higher to capture ultrafine particles,
      as nanoparticulates can penetrate deep into the lungs due to their small size. Use full-body protective suits made of
      impermeable materials, gloves, and eye protection to prevent skin and ocular contact, and ensure the workspace has local
      exhaust ventilation (LEV) systems capturing fumes at the source. Regularly monitor air quality with particle counters
      and follow decontamination protocols, such as HEPA-filtered vacuums for cleanup, to minimize residual exposure.
