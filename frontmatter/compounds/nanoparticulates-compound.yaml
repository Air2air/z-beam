  symptoms: []
  firstAid: >-
    Handling nanoparticulates in compounds demands quick action if exposure hits. Dust clouds from these fine particles
    can irritate skin or eyes fast. Why? They cling stubbornly, triggering inflammation deep in tissues. Solution lies
    in immediate rinsing.


    Flush eyes with plenty of clean water right away. Do this for several minutes straight. Blink often to clear out the
    grit. No rubbing— that spreads the mess worse.


    Skin touched by the stuff? Wash with mild soap and water thoroughly. Pat dry gently afterward. Watch for redness or
    itching that lingers.


    If inhaled, move to fresh air without delay. Loosen tight clothing around the neck. Rest in a cool spot until
    breathing eases.


    Swallowed some by accident? Rinse mouth out immediately. Sip water slowly, but skip inducing vomit. Seek medical
    help pronto.


    These particles resist easy cleanup, so gear up with masks and gloves next time. Stay safe around them.
