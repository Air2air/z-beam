  storage_requirements:
    presentation: descriptive
    items:
    - temperature_range: Store cylinders <52°C. Keep cool - above 8°C gas becomes liquid.
      ventilation: Outdoor storage STRONGLY PREFERRED. Indoor only with continuous mechanical ventilation, emergency backup,
        phosgene detection with REMOTE alarms.
      incompatibilities:
      - Moisture/water
      - Alcohols
      - Ammonia
      - Metal powders
      - Aluminum
      - Sodium
      - Potassium
      container_material: Steel cylinders only. Glass for laboratory quantities.
      segregation: ISOLATED storage. Separate from ALL other chemicals. Restricted area with multiple barriers.
      quantity_limits: MINIMIZE. Many jurisdictions prohibit or strictly limit quantities.
      special_requirements: 'CRITICAL: Phosgene detection system with remote monitoring and alarms MANDATORY. Post "CHEMICAL
        WARFARE AGENT - EXTREME DANGER" signs. Restricted access - authorized trained personnel only with buddy system. Emergency
        procedures and antidote protocol posted. Medical surveillance required. Notification to local emergency services REQUIRED.'
