hazardClass: toxic
chemicalFormula: COCl₂
casNumber: 75-44-5
molecularWeight: 98.92
healthEffects: 'When handling phosgene in industrial settings, start by understanding how it infiltrates the body through
  inhalation, since it''s a heavy, colorless gas that settles low and lingers in enclosed spaces. Compared to milder irritants
  like ammonia, phosgene sneaks up without immediate burning sensations, allowing deeper lung penetration before symptoms
  hit. You''ll notice delayed coughing and chest tightness after exposure, as it reacts with moisture to form acids that damage
  tissues over hours. We typically monitor air quality closely during production of plastics or dyes, where leaks pose the
  biggest risk. Keep ventilation robust and suits sealed tight. End with this: always have medical response ready, because
  even brief contact can lead to severe respiratory failure if not addressed fast.'
healthEffectsKeywords:
- severe_pulmonary_edema
- delayed_effects
- fatal
- chemical_warfare_agent
exposureGuidelines: 'Phosgene hits hard as a toxic gas. Unlike milder vapors, it sneaks in silently. Lungs suffer quick damage
  from brief contact. Eyes burn too, with irritation spreading fast.


  Workers in chemical plants face real risks. Handle it only in sealed setups. Ventilation keeps it from building up. Suits
  and masks shield the body fully.


  Spills demand immediate evacuation. Fresh air revives those exposed. Medical help rushes in for breathing issues. Long-term
  effects linger without quick action.


  Industries use phosgene for plastics and dyes. Strict controls prevent leaks. Training stresses awareness over everything.
  Safe practices save lives daily.'
detectionMethods: Spotting phosgene in the air demands sharp tools, unlike simpler gases that fade into the background without
  a fuss. Workers in chemical plants rely on handheld detectors that change color when the gas drifts by, offering a quick
  visual cue amid bustling operations. These devices draw on the compound's reactive nature, turning invisible threats into
  obvious warnings before harm sets in. For broader sweeps, fixed sensors line factory walls, humming quietly as they sample
  flows and trigger alarms if levels creep up. Infrared setups shine here too, picking up the gas's unique signature through
  barriers like pipes or enclosures, which keeps production lines safe without halting everything. Even in cleanup scenarios,
  laser-based checks probe surfaces where residues might linger, zapping away contaminants while scanning for traces—handy
  for maintaining gear in harsh industrial spots. Overall, these methods blend seamlessly with phosgene's role in manufacturing,
  ensuring its power stays harnessed, not hazardous.
firstAid: Get the person away from the source right away, into fresh air where the wind can disperse any lingering fumes.
  Stay calm while calling emergency services—phosgene exposure hits hard on the lungs, so quick action saves lives. If breathing
  seems labored or shallow, lay them down flat but keep the head tilted back to open airways, and loosen tight clothing around
  the neck and chest for easier breaths. Offer sips of cool water if they're alert and not choking, but never force fluids
  down. Watch closely for worsening signs like coughing up froth or blue lips, since symptoms might creep up hours later;
  rush to a doctor who knows how to handle toxic gas cases with supportive care like humidified oxygen or rest in a quiet
  spot.
ppeRequirements: Handling phosgene demands serious caution because this toxic gas can sneak up on you with delayed effects,
  turning a minor exposure into a medical emergency fast. Workers in chemical plants or labs dealing with it for making plastics
  or dyes need full-body protection to stay safe. Start with a tight-sealing respirator that filters out harmful vapors completely—nothing
  less will cut it in confined spaces. Layer on chemical-resistant suits made from tough materials that block penetration,
  paired with gloves and boots that resist breakdown from the gas's corrosive nature. Eye protection, like full-face shields
  integrated with the respirator, guards against splashes or mists that might form during reactions. And don't forget monitoring
  gear to detect leaks early, ensuring everyone evacuates if levels creep up. Regular training keeps the team sharp on suiting
  up properly every time.
