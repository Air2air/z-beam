  ppe_requirements:
    presentation: descriptive
    items:
    - respiratory: 'MANDATORY: Full-face pressure-demand SCBA or positive-pressure supplied-air respirator. No air-purifying
        respirators approved - extremely toxic.'
      skin: Butyl rubber or neoprene gloves, fully-encapsulating chemical protective suit for gas contact.
      eye: Chemical safety goggles and full face shield
      minimum_level: Level A for unknown concentrations or >0.1 ppm, Level B minimum for known concentrations <0.1 ppm
      special_notes: ONE OF THE MOST TOXIC INDUSTRIAL CHEMICALS. Chemical warfare agent. Delayed pulmonary edema 2-48 hours
        post-exposure. SELF-RESCUE RESPIRATORS INADEQUATE - immediate SCBA required.
    _section:
      title: PPE Requirements
      description: Personal protective equipment needed for safe handling
      icon: shield
      order: 5
      variant: warning
  emergency_response:
    presentation: descriptive
    items:
    - fire_hazard: Non-flammable. Cylinders may explode when heated. Decomposes in heat producing deadly gases.
      fire_suppression: EVACUATE IMMEDIATELY. Extremely deadly decomposition products. Use unmanned equipment only. Water
        spray from maximum distance to cool cylinders.
      spill_procedures: EVACUATE LARGE AREA IMMEDIATELY. Call HAZMAT. SCBA MANDATORY. Extremely lethal at ppm levels. Neutralize
        with ammonia or caustic soda solution. Specialized cleanup required.
      exposure_immediate_actions: 'MEDICAL EMERGENCY. Remove to fresh air immediately. Administer 100% oxygen. NO artificial
        respiration if breathing. Monitor for 48 hours - DELAYED PULMONARY EDEMA likely. Hospitalize immediately even if asymptomatic.
        Inform medical staff: phosgene exposure.'
      environmental_hazards: Toxic to all life. Hydrolyzes to HCl and CO2 in water. Report ANY release immediately.
      special_hazards: CHEMICAL WARFARE AGENT (WWI). EXTREMELY TOXIC. Delayed pulmonary edema 2-48 hours after asymptomatic
        period - sudden death possible. Odor warning INADEQUATE (threshold above safe levels). Hydrolyzes to hydrochloric
        acid in lungs. Death can occur hours after "feeling fine".
    _section:
      title: Emergency Response
      description: First aid and emergency procedures for exposure incidents
