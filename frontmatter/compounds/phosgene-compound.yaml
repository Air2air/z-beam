  detection:
    methods:
      presentation: descriptive
      _section:
        title: Detection Methods
        description: Analytical techniques and instruments for detecting this compound
        icon: microscope
        order: 1
        variant: default
      items:
      - content: Spotting phosgene in the air demands sharp tools, unlike simpler gases that fade into the background without
          a fuss. Workers in chemical plants rely on handheld detectors that change color when the gas drifts by, offering
          a quick visual cue amid bustling operations. These devices draw on the compound's reactive nature, turning invisible
          threats into obvious warnings before harm sets in. For broader sweeps, fixed sensors line factory walls, humming
          quietly as they sample flows and trigger alarms if levels creep up. Infrared setups shine here too, picking up the
          gas's unique signature through barriers like pipes or enclosures, which keeps production lines safe without halting
          everything. Even in cleanup scenarios, laser-based checks probe surfaces where residues might linger, zapping away
          contaminants while scanning for traces—handy for maintaining gear in harsh industrial spots. Overall, these methods
          blend seamlessly with phosgene's role in manufacturing, ensuring its power stays harnessed, not hazardous.
  operational:
    expert_answers:
      presentation: collapsible
      _section:
        title: Expert Q&A
        description: Frequently asked questions about this compound answered by laser cleaning experts
        icon: message-circle-question
        order: 1
        variant: default
      items:
      - id: as-a-laser-cleaning-operator-what-are-the-key-expo
        question: As a laser cleaning operator, what are the key exposure limits for phosgene (COCl₂) to stay safe during
          operations involving potentially chlorinated materials?
        answer: The OSHA permissible exposure limit (PEL) for phosgene is 0.1 ppm as an 8-hour time-weighted average (TWA),
          with short-term exposure limits not exceeding 0.2 ppm for 15 minutes, and the immediately dangerous to life or health
          (IDLH) concentration is 2 ppm—always monitor levels below these thresholds using calibrated gas detectors. In laser
          cleaning, where phosgene may form from ablating plastics like PVC, maintain ventilation to keep concentrations under
          0.1 ppm and evacuate if levels approach 2 ppm. If exposure is suspected, seek immediate medical attention, as symptoms
          like chest tightness may be delayed up to 48 hours.
