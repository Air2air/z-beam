faq:
  presentation: collapsible
  items:
  - id: as-a-laser-cleaning-operator-what
    title: As a laser cleaning operator, what are the key exposure limits for phosgene (COCl₂) to stay safe during operations
      involving potentially chlorinated materials?
    content: The OSHA permissible exposure limit (PEL) for phosgene is 0.1 ppm as an 8-hour time-weighted average (TWA), with
      short-term exposure limits not exceeding 0.2 ppm for 15 minutes, and the immediately dangerous to life or health (IDLH)
      concentration is 2 ppm—always monitor levels below these thresholds using calibrated gas detectors. In laser cleaning,
      where phosgene may form from ablating plastics like PVC, maintain ventilation to keep concentrations under 0.1 ppm and
      evacuate if levels approach 2 ppm. If exposure is suspected, seek immediate medical attention, as symptoms like chest
      tightness may be delayed up to 48 hours.
