  environmental_impact:
    presentation: descriptive
    items:
    - aquatic_toxicity: Extremely toxic but rapidly hydrolyzes to HCl and CO2 in water. Environmental impact primarily from
        hydrolysis products.
      biodegradability: Not biodegradable. Hydrolyzes rapidly to CO2 and HCl.
      bioaccumulation: Does not bioaccumulate.
      soil_mobility: High mobility as gas. Hydrolyzes on contact with soil moisture.
      atmospheric_fate: 'Photolyzes and hydrolyzes. Atmospheric half-life: hours. Forms HCl with water vapor.'
      ozone_depletion: false
      global_warming_potential: null
      reportable_releases:
        water: 10 lbs - IMMEDIATELY reportable
        air: 10 lbs/day - IMMEDIATELY reportable due to extreme toxicity
    _section:
      title: Environmental Impact
      description: Environmental effects and ecological considerations
      icon: wind
      order: 8
      variant: warning
  detection_monitoring:
    presentation: descriptive
    items:
    - sensor_types:
      - Electrochemical
      - Infrared
      - Photoionization
      - Colorimetric badges
      detection_range: 0-1 ppm (must detect sub-ppm)
      alarm_setpoints:
        low: 0.1 ppm (OSHA PEL/NIOSH REL)
        high: 0.2 ppm (NIOSH STEL)
        evacuate: 2 ppm (NIOSH IDLH) - IMMEDIATELY LIFE-THREATENING
      colorimetric_tubes:
      - Dräger Phosgene 0.02/a
      - Gastec 14L
      analytical_methods:
      - method: NIOSH 6371
        technique: GC with electron capture detector
        detection_limit: 0.002 ppm
      - method: OSHA Method 61
        technique: GC
        detection_limit: 0.005 ppm
      odor_threshold: 0.4-1.5 ppm - UNRELIABLE. Odor threshold ABOVE safe exposure limits. NEVER rely on odor. MANDATORY continuous
        monitoring.
    _section:
