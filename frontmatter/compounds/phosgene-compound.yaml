  symptoms: []
  firstAid: >-
    Get the person away from the source right away, into fresh air where the wind can disperse any lingering fumes. Stay
    calm while calling emergency services—phosgene exposure hits hard on the lungs, so quick action saves lives. If
    breathing seems labored or shallow, lay them down flat but keep the head tilted back to open airways, and loosen
    tight clothing around the neck and chest for easier breaths. Offer sips of cool water if they're alert and not
    choking, but never force fluids down. Watch closely for worsening signs like coughing up froth or blue lips, since
    symptoms might creep up hours later; rush to a doctor who knows how to handle toxic gas cases with supportive care
    like humidified oxygen or rest in a quiet spot.
