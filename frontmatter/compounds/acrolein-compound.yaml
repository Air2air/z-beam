ppe_requirements:
  respiratory: Full-face pressure-demand SCBA or supplied-air respirator for >0.1 ppm. Air-purifying respirator with organic
    vapor cartridge acceptable for ≤0.1 ppm with escape provisions.
  skin: Nitrile or butyl rubber gloves, chemical-resistant suit. Acrolein causes severe skin burns - minimize exposure.
  eye: Chemical safety goggles, full face shield. Extremely irritating to eyes.
  minimum_level: Level B minimum for any concentration >0.1 ppm or unknown concentrations
  special_notes: EXTREMELY IRRITATING at sub-ppm levels. Eye and respiratory irritation immediate. Lachrymator (tear gas properties).
    Self-rescue respirators may be inadequate - use supplied air.
emergency_response:
  fire_hazard: EXTREMELY FLAMMABLE. Wide explosive range. Vapors heavier than air - travel to ignition sources. May polymerize
    in fire, releasing toxic gases.
  fire_suppression: EVACUATE - extremely toxic fumes. Use unmanned equipment. Dry chemical, CO2, alcohol-resistant foam. Water
    spray to cool containers from safe distance. Do not use water directly on liquid.
  spill_procedures: EVACUATE IMMEDIATELY. Extremely hazardous. SCBA MANDATORY. Eliminate ignition sources. Ventilate area.
    Contain with sand/earth. Neutralize with sodium bisulfite solution. Absorb with inert material. Dispose as hazardous waste.
  exposure_immediate_actions: Remove to fresh air immediately. Severe eye/respiratory irritation likely. Flush eyes with water
    for 15+ minutes. Remove contaminated clothing. Wash skin thoroughly. Seek medical attention immediately - potential for
    delayed pulmonary edema.
  environmental_hazards: Toxic to aquatic life. Volatilizes rapidly from water. Report spills >1 lb. Keep out of waterways.
  special_hazards: EXTREMELY TOXIC AND IRRITATING. Lachrymator - causes immediate tearing. Severe respiratory irritant - can
    cause pulmonary edema (delayed 24-48 hours). Polymerizes violently when contaminated. Suspected carcinogen. Fire produces
    deadly acrolein and formaldehyde.
environmental_impact:
  aquatic_toxicity: 'Very toxic to aquatic life. LC50 (fish, 96h): 0.09-0.28 mg/L. Toxic at parts-per-million levels.'
  biodegradability: Readily biodegradable (>70% in 28 days). Oxidizes to acrylic acid and CO2.
  bioaccumulation: 'Low bioaccumulation. Log Kow: 0.01. Does not accumulate.'
  soil_mobility: High mobility. Volatilizes rapidly from soil. Does not adsorb.
  atmospheric_fate: 'Photolyzes rapidly via hydroxyl radicals. Atmospheric half-life: 7-20 hours. Contributes to ozone formation.'
  ozone_depletion: false
  global_warming_potential: null
  reportable_releases:
    water: 1 lb to navigable waters - IMMEDIATELY reportable
    air: 1 lb/day (CERCLA RQ)
