  emergency_response:
    fire_hazard: EXTREMELY FLAMMABLE. Wide explosive range. Vapors heavier than air - travel to ignition sources. May polymerize
      in fire, releasing toxic gases.
    fire_suppression: EVACUATE - extremely toxic fumes. Use unmanned equipment. Dry chemical, CO2, alcohol-resistant foam.
      Water spray to cool containers from safe distance. Do not use water directly on liquid.
    spill_procedures: EVACUATE IMMEDIATELY. Extremely hazardous. SCBA MANDATORY. Eliminate ignition sources. Ventilate area.
      Contain with sand/earth. Neutralize with sodium bisulfite solution. Absorb with inert material. Dispose as hazardous
      waste.
    exposure_immediate_actions: Remove to fresh air immediately. Severe eye/respiratory irritation likely. Flush eyes with
      water for 15+ minutes. Remove contaminated clothing. Wash skin thoroughly. Seek medical attention immediately - potential
      for delayed pulmonary edema.
    environmental_hazards: Toxic to aquatic life. Volatilizes rapidly from water. Report spills >1 lb. Keep out of waterways.
    special_hazards: EXTREMELY TOXIC AND IRRITATING. Lachrymator - causes immediate tearing. Severe respiratory irritant -
      can cause pulmonary edema (delayed 24-48 hours). Polymerizes violently when contaminated. Suspected carcinogen. Fire
      produces deadly acrolein and formaldehyde.
  physical_properties:
    boiling_point: 52.7°C (127°F)
    melting_point: -87.7°C (-126°F)
    vapor_pressure: 210 mmHg @ 20°C
