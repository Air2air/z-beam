      - method: OSHA Method 78
        technique: HPLC
        detection_limit: 0.01 ppm
      odor_threshold: 0.16-1.0 ppm - provides warning BUT overlaps toxic range. DO NOT rely on odor alone.
    _section:
      title: Detection & Monitoring
      description: Methods and equipment for detecting and monitoring this compound
      icon: gauge
      order: 6
      variant: default
  ppe_requirements:
    presentation: descriptive
    items:
    - respiratory: Full-face pressure-demand SCBA or supplied-air respirator for >0.1 ppm. Air-purifying respirator with organic
        vapor cartridge acceptable for ≤0.1 ppm with escape provisions.
      skin: Nitrile or butyl rubber gloves, chemical-resistant suit. Acrolein causes severe skin burns - minimize exposure.
      eye: Chemical safety goggles, full face shield. Extremely irritating to eyes.
      minimum_level: Level B minimum for any concentration >0.1 ppm or unknown concentrations
      special_notes: EXTREMELY IRRITATING at sub-ppm levels. Eye and respiratory irritation immediate. Lachrymator (tear gas
        properties). Self-rescue respirators may be inadequate - use supplied air.
    _section:
      title: PPE Requirements
      description: Personal protective equipment needed for safe handling
      icon: shield
      order: 5
      variant: warning
  emergency_response:
    presentation: descriptive
    items:
    - fire_hazard: EXTREMELY FLAMMABLE. Wide explosive range. Vapors heavier than air - travel to ignition sources. May polymerize
        in fire, releasing toxic gases.
      fire_suppression: EVACUATE - extremely toxic fumes. Use unmanned equipment. Dry chemical, CO2, alcohol-resistant foam.
        Water spray to cool containers from safe distance. Do not use water directly on liquid.
      spill_procedures: EVACUATE IMMEDIATELY. Extremely hazardous. SCBA MANDATORY. Eliminate ignition sources. Ventilate area.
        Contain with sand/earth. Neutralize with sodium bisulfite solution. Absorb with inert material. Dispose as hazardous
        waste.
      exposure_immediate_actions: Remove to fresh air immediately. Severe eye/respiratory irritation likely. Flush eyes with
        water for 15+ minutes. Remove contaminated clothing. Wash skin thoroughly. Seek medical attention immediately - potential
        for delayed pulmonary edema.
      environmental_hazards: Toxic to aquatic life. Volatilizes rapidly from water. Report spills >1 lb. Keep out of waterways.
      special_hazards: EXTREMELY TOXIC AND IRRITATING. Lachrymator - causes immediate tearing. Severe respiratory irritant
        - can cause pulmonary edema (delayed 24-48 hours). Polymerizes violently when contaminated. Suspected carcinogen.
        Fire produces deadly acrolein and formaldehyde.
    _section:
      title: Emergency Response
      description: First aid and emergency procedures for exposure incidents
      icon: alert-triangle
      order: 7
      variant: danger
