ppe_requirements:
  respiratory: Full-face pressure-demand SCBA or supplied-air respirator for >0.1 ppm. Air-purifying respirator with organic
    vapor cartridge acceptable for ≤0.1 ppm with escape provisions.
  skin: Nitrile or butyl rubber gloves, chemical-resistant suit. Acrolein causes severe skin burns - minimize exposure.
  eye: Chemical safety goggles, full face shield. Extremely irritating to eyes.
  minimum_level: Level B minimum for any concentration >0.1 ppm or unknown concentrations
  special_notes: EXTREMELY IRRITATING at sub-ppm levels. Eye and respiratory irritation immediate. Lachrymator (tear gas properties).
    Self-rescue respirators may be inadequate - use supplied air.
storage_requirements:
  temperature_range: Store below 25°C, refrigerate if possible. Keep away from heat.
  ventilation: 'Outdoor storage preferred. Indoor: explosion-proof ventilation with emergency backup. Gas detection mandatory.'
  incompatibilities:
  - Oxidizers
  - Acids
  - Bases
  - Ammonia
  - Amines
  - Sulfur dioxide
  - Metal salts
  - Light (polymerization catalyst)
  container_material: Stainless steel or glass with PTFE seals. Stabilized with hydroquinone. Never use copper or brass.
  segregation: Isolate from all other chemicals. Separate from oxidizers by 20 feet. Flammable storage cabinet.
  quantity_limits: Minimize on-site quantities. Many facilities limit to <10 gallons.
  special_requirements: 'CRITICAL: Store with stabilizer (hydroquinone 0.1-0.25%). Check stabilizer regularly. Gas detection
    system MANDATORY. Keep refrigerated. Store away from light. Emergency eyewash/shower within 10 seconds. Post "EXTREMELY
    FLAMMABLE" and "POISON" signs.'
