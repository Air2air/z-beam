  environmental_impact:
    presentation: descriptive
    items:
    - aquatic_toxicity: 'Very toxic to aquatic life. LC50 (fish, 96h): 0.09-0.28 mg/L. Toxic at parts-per-million levels.'
      biodegradability: Readily biodegradable (>70% in 28 days). Oxidizes to acrylic acid and CO2.
      bioaccumulation: 'Low bioaccumulation. Log Kow: 0.01. Does not accumulate.'
      soil_mobility: High mobility. Volatilizes rapidly from soil. Does not adsorb.
      atmospheric_fate: 'Photolyzes rapidly via hydroxyl radicals. Atmospheric half-life: 7-20 hours. Contributes to ozone
        formation.'
      ozone_depletion: false
      global_warming_potential: null
      reportable_releases:
        water: 1 lb to navigable waters - IMMEDIATELY reportable
        air: 1 lb/day (CERCLA RQ)
    _section:
      title: Environmental Impact
      description: Environmental effects and ecological considerations
      icon: wind
      order: 8
      variant: warning
  detection_monitoring:
    presentation: descriptive
    items:
    - sensor_types:
      - Electrochemical
      - Photoionization detector (PID)
      - Metal oxide semiconductor
      - Infrared
      detection_range: 0-10 ppm typical (must detect sub-ppm)
      alarm_setpoints:
        low: 0.1 ppm (OSHA PEL/NIOSH REL)
        high: 0.3 ppm (NIOSH STEL)
        evacuate: 2 ppm (NIOSH IDLH) - IMMEDIATELY DANGEROUS
