  ppe_requirements:
    presentation: descriptive
    items:
    - respiratory: SCBA or supplied-air respirator for >5 ppm or unknown concentrations. Air-purifying with acid gas cartridge
        acceptable for ≤5 ppm with escape provisions.
      skin: Neoprene or butyl rubber gloves, chemical-resistant suit. HCl is highly corrosive to skin.
      eye: Chemical safety goggles, full face shield mandatory. Extremely corrosive to eyes.
      minimum_level: Level C for known <5 ppm, Level B for >5 ppm or liquid HCl
      special_notes: Extremely corrosive. Causes severe burns on contact. Fumes in moist air. Emergency eyewash/shower within
        10 seconds mandatory. Liquid causes frostbite (cryogenic).
    _section:
      title: PPE Requirements
      description: Personal protective equipment needed for safe handling
      icon: shield
      order: 5
      variant: warning
  emergency_response:
    presentation: descriptive
    items:
    - fire_hazard: Non-flammable. Cylinders may explode when heated. Corrosive decomposition products.
      fire_suppression: Do not use water directly on HCl gas - forms corrosive hydrochloric acid mist. Cool cylinders with
        water spray from safe distance.
      spill_procedures: EVACUATE. Ventilate area. SCBA required for >5 ppm. Neutralize with soda ash, lime, or sodium bicarbonate.
        Contain with dry sand or earth. Decontaminate equipment.
      exposure_immediate_actions: 'Remove to fresh air immediately. Eyes: flush with water for 15+ minutes - GET MEDICAL HELP
        IMMEDIATELY. Skin: remove contaminated clothing, flush with water for 15 minutes. If inhaled: administer oxygen. Seek
        immediate medical attention - corrosive injury.'
      environmental_hazards: Toxic to aquatic life. Forms hydrochloric acid in water. Report releases >5000 lbs.
      special_hazards: Extremely corrosive to all tissues. Forms dense white corrosive mist in moist air. Reacts with metals
        producing flammable hydrogen gas. Causes severe burns, permanent eye damage, respiratory tract damage.
    _section:
      title: Emergency Response
      description: First aid and emergency procedures for exposure incidents
      icon: alert-triangle
      order: 7
      variant: danger
