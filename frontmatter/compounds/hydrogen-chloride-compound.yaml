ppe_requirements:
  respiratory: SCBA or supplied-air respirator for >5 ppm or unknown concentrations. Air-purifying with acid gas cartridge
    acceptable for ≤5 ppm with escape provisions.
  skin: Neoprene or butyl rubber gloves, chemical-resistant suit. HCl is highly corrosive to skin.
  eye: Chemical safety goggles, full face shield mandatory. Extremely corrosive to eyes.
  minimum_level: Level C for known <5 ppm, Level B for >5 ppm or liquid HCl
  special_notes: Extremely corrosive. Causes severe burns on contact. Fumes in moist air. Emergency eyewash/shower within
    10 seconds mandatory. Liquid causes frostbite (cryogenic).
storage_requirements:
  temperature_range: Store cylinders <52°C. Keep away from heat.
  ventilation: 'Outdoor storage preferred. Indoor: mechanical ventilation with acid-resistant ductwork. HCl gas detection
    required.'
  incompatibilities:
  - Metals (generates hydrogen)
  - Bases
  - Oxidizers
  - Alcohols
  - Amines
  - Aldehydes
  - Metal carbides
  container_material: Steel cylinders for compressed gas. Glass, PVC, PVDF, or PTFE for liquid.
  segregation: Separate from bases, oxidizers, and metals. Corrosive storage area.
  quantity_limits: Per fire code. Minimize indoor storage of cylinders.
  special_requirements: Cylinder restraints mandatory. Leak detection system required. Post "CORROSIVE GAS" signs. Emergency
    eyewash/shower within 25 feet. Store in cool, dry area. Protect from physical damage.
