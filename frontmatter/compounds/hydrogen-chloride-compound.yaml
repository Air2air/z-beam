reactivity:
  stability: Stable as dry gas. Forms corrosive hydrochloric acid with moisture.
  polymerization: Will not polymerize
  incompatible_materials:
  - Metals (Al, Zn, Fe - generates H2)
  - Strong bases
  - Strong oxidizers
  - Alcohols
  - Amines
  - Aldehydes
  - Metal carbides
  hazardous_decomposition:
  - Hydrogen chloride gas
  - Chlorine (if heated with oxidizers)
  conditions_to_avoid:
  - Moisture
  - Heat
  - Incompatible materials
  - Metals
  reactivity_hazard: Reacts violently with metals producing flammable hydrogen gas. Reacts exothermically with bases. Forms
    corrosive mist in humid air.
environmental_impact:
  aquatic_toxicity: 'Toxic to aquatic life. LC50 (fish, 96h): 100-300 mg/L HCl solution. Acidifies water.'
  biodegradability: Not biodegradable. Dissolves in water forming hydrochloric acid.
  bioaccumulation: Does not bioaccumulate.
  soil_mobility: High mobility as gas. Deposits as chloride salts. Acidifies soil.
  atmospheric_fate: Rapidly dissolves in atmospheric moisture. Forms hydrochloric acid droplets. Washed out by rain.
  ozone_depletion: false
  global_warming_potential: null
  reportable_releases:
    water: 5000 lbs to navigable waters
    air: 5000 lbs/day (CERCLA RQ)
