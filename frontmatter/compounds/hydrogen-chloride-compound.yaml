    health_impacts:
      presentation: descriptive
      _section:
        title: Health Impacts
        description: Health effects from exposure including acute and chronic impacts
        icon: heart-pulse
        order: 1
        variant: warning
      items:
      - content: When working with hydrogen chloride compared to milder acids like acetic, the real kicker hits your respiratory
          system fast. It irritates eyes and skin right away, unlike those weaker ones that might just sting a bit. Lungs
          take the worst—burning sensation builds quickly, leading to coughing fits that don't quit. In tight spaces, it spreads
          and lingers, turning routine checks into breathing nightmares. We've seen it cause throat swelling in seconds during
          spills, far worse than vinegar vapors ever could. Short exposures leave you watery-eyed and sore, but prolonged
          ones scar tissues deep. Handle it in open air or with full gear to dodge the burn. Always test monitors before entry—its
          sneaky diffusion means one whiff too many, and you're out for days with inflamed airways.
    exposure_guidance:
      presentation: descriptive
      _section:
        title: Exposure Guidelines
        description: OSHA PEL, NIOSH REL, ACGIH TLV, and safe exposure limits
        icon: shield-alert
        order: 2
        variant: warning
      items:
      - content: 'Handling hydrogen chloride demands caution unlike milder gases—its sharp reactivity sets it apart, turning
          routine exposure into serious health risks if mishandled. This corrosive substance irritates skin on contact, causing
          burns that linger. Eyes suffer too, with vapors leading to redness and temporary vision blur.


          In workplaces, limit direct contact by working in areas with strong airflow to dilute fumes. Wear protective gear:
          thick gloves resist penetration, face shields block splashes, and respirators filter out harmful vapors for safer
          breathing.


          Storage matters—keep containers sealed in cool, dry spots away from moisture or bases that could trigger reactions.
          Spills require quick action: neutralize with mild absorbents, then ventilate thoroughly to clear the air.


          Industrially, it shines in processes like pickling metals or synthesizing chemicals, but always pair it with monitoring
          tools for early warnings. For laser cleaning tasks, where it aids in surface etching, ensure enclosures contain
          any released gas, preventing buildup that could harm operators nearby.


          Long-term, repeated low-level exposure might weaken lungs over time, so rotate shifts and conduct health checks.
          Proper training turns potential hazards into manageable routines.'
    personal_protection:
      presentation: descriptive
      _section:
        title: Personal Protection Equipment
        description: Required PPE including respirators, gloves, eye protection, and protective clothing
        icon: shield-check
        order: 3
        variant: warning
      items:
      - content: Handling hydrogen chloride demands serious gear to counter its biting fumes and potential for skin burns.
          Start with a full-face respirator fitted with cartridges that trap acidic vapors, keeping lungs clear during exposure
          in tight spaces or open processes. Gloves made from thick, chemical-proof material like neoprene wrap hands securely,
          blocking direct contact that could lead to rapid irritation. Over that, don a splash-proof apron or full-body suit
          crafted from resistant fabrics, shielding clothes and skin from any mist or spills in busy industrial setups like
          metal etching or gas purification. Eye protection comes via sealed goggles that seal out vapors entirely, preventing
          the sharp sting from airborne particles. In high-risk zones, such as laser cleaning operations where the compound
          aids in stripping grime from surfaces, add a hood or helmet with integrated breathing apparatus for total enclosure
          against the corrosive haze. Always pair this with ventilation hoods nearby to dilute the air, though the focus stays
          on personal barriers that hold up under steady use.
    emergency_procedures:
      presentation: descriptive
      _section:
        title: Emergency Procedures
        description: First aid measures, emergency response, and incident management
        icon: siren
        order: 4
        variant: danger
      items:
      - content: 'Flush skin right away. Use plenty of water. Remove soaked clothes fast. Keep rinsing for a good while. Get
          medical help without delay.


          Eyes sting bad? Rinse them immediately. Hold eyelids open. Flow water over them steadily. Do this for ages. See
          a doctor soon.


          Breathe it in? Get to fresh air quick. Loosen tight clothes. Rest in a cool spot. If breathing''s tough, call for
          help now.


          Swallowed some? Don''t make them vomit. Give water or milk if awake. Rush to emergency care. No home fixes here.


          Always seek pro medical advice. Effects hit hard from this stuff. Act fast to ease damage.'
