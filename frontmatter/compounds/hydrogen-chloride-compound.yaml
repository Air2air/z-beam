  emergency_response:
    fire_hazard: Non-flammable. Cylinders may explode when heated. Corrosive decomposition products.
    fire_suppression: Do not use water directly on HCl gas - forms corrosive hydrochloric acid mist. Cool cylinders with water
      spray from safe distance.
    spill_procedures: EVACUATE. Ventilate area. SCBA required for >5 ppm. Neutralize with soda ash, lime, or sodium bicarbonate.
      Contain with dry sand or earth. Decontaminate equipment.
    exposure_immediate_actions: 'Remove to fresh air immediately. Eyes: flush with water for 15+ minutes - GET MEDICAL HELP
      IMMEDIATELY. Skin: remove contaminated clothing, flush with water for 15 minutes. If inhaled: administer oxygen. Seek
      immediate medical attention - corrosive injury.'
    environmental_hazards: Toxic to aquatic life. Forms hydrochloric acid in water. Report releases >5000 lbs.
    special_hazards: Extremely corrosive to all tissues. Forms dense white corrosive mist in moist air. Reacts with metals
      producing flammable hydrogen gas. Causes severe burns, permanent eye damage, respiratory tract damage.
