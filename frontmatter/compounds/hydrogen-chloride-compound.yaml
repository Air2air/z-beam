faq:
  presentation: collapsible
  items:
  - id: how-can-i-detect-and-monitor
    title: How can I detect and monitor HCl gas exposure during laser cleaning to stay within safe limits?
    content: Use portable gas detectors equipped with electrochemical sensors specific to HCl, placed in the breathing zone
      and work area, to monitor concentrations in real-time; the OSHA permissible exposure limit (PEL) is 5 ppm as a ceiling
      limit, meaning levels should never exceed this to avoid immediate respiratory irritation. Calibrate detectors daily
      and set alarms for 1-2 ppm to allow early evacuation or ventilation adjustments, especially since HCl from laser ablation
      can rapidly irritate eyes, skin, and lungs far more aggressively than milder acids like acetic. If levels approach the
      PEL, immediately don a full-face respirator with acid gas cartridges and enhance local exhaust ventilation to dilute
      the corrosive gas.
    metadata:
      topic: i detect and monitor hcl
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
