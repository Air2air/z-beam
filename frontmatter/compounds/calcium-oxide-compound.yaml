  symptoms: []
  firstAid: >-
    Quicklime dust hits skin—flush it right away with running water. Let the cool flow soak in deep, easing that
    stinging burn without delay. Clothes soaked? Peel them off gently first.


    Eyes catch the particles? Blink hard and rinse endlessly under a steady stream. No rubbing; just let water wash away
    the grit for minutes on end. Head straight to a doc after, no shortcuts.


    Breathe in the fine powder? Step outside to fresh air immediately. Cough it out if you can, stay calm and seated. If
    breathing tightens or chest hurts, call for help fast—don't tough it through alone.


    Swallow some by accident? Spit out what's left, rinse your mouth with water. Skip forcing vomit; grab milk or water
    to sip if conscious, then rush to medical care. That caustic bite demands pro attention quick.


    In all cases, watch for swelling or worsening pain. Quicklime's reactive nature turns moisture to a harsh slurry, so
    early action saves the day. Keep it handy in workshops—better safe than scarred.
