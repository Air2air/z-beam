faq:
- question: What skin protection methods should I use when handling calcium oxide (CaO) particulates during laser cleaning
    operations?
  answer: Always wear chemical-resistant gloves made of nitrile or neoprene, along with full-body protective clothing like
    coveralls or aprons to prevent direct contact with CaO, which can cause severe burns upon reacting with moisture on the
    skin. Additionally, use safety goggles or a face shield to protect your eyes from dust and splashes, and immediately rinse
    any exposed skin with copious amounts of water if contact occurs, followed by medical attention. Ensure your workspace
    has good ventilation to minimize airborne particulate exposure, and follow OSHA guidelines limiting CaO dust to 5 mg/m³
    as an 8-hour TWA.
