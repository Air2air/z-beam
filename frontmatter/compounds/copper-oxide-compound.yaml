  items:
  - id: what-personal-protective-equipment-ppe-should
    title: What personal protective equipment (PPE) should I wear to minimize inhalation risks from CuO particulates generated
      during laser cleaning of copper surfaces?
    content: Always use a NIOSH-approved respirator with an N95 or higher rating (e.g., P100 filters for particulates) fitted
      properly to prevent inhaling CuO dust, which can cause respiratory irritation or metal fume fever. Wear safety goggles
      and gloves to avoid skin or eye contact, and ensure the workspace has local exhaust ventilation to capture airborne
      particles. Conduct fit-testing for the respirator annually and replace filters when breathing becomes difficult or after
      each shift involving heavy dust generation.
