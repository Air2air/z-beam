  - id: sources-of-formaldehyde
    title: What contaminants produce formaldehyde in laser cleaning?
    content: Adhesive residues, paint coatings, and industrial oils decompose to formaldehyde at fluences of 0.037-1 J/cm², co-releasing VOCs like benzene [web:1, web:3].
    metadata:
      topic: sources of formaldehyde
      severity: critical
      acceptedAnswer: true
    _display:
      _open: true
      order: 1
  - id: health-hazards
    title: What are formaldehyde's health hazards in laser settings?
    content: Irritation at 0.1 ppm escalates to carcinogenic risks (IARC Group 1) with chronic exposure, necessitating OSHA PEL compliance [web:5, web:9].
  - id: control-measures
    title: How to monitor and control formaldehyde emissions?
    content: Employ electrochemical sensors and LEV systems, with analytical methods like NIOSH 2541 for detection down to 0.006 ppm .
