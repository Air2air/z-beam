    storageRequirements:
      _section:
        sectionTitle: Storage Requirements
        sectionDescription: Storage guidelines for formaldehyde emphasize temperature control and compatibility to prevent polymerization and hazards .
        sectionMetadata: relationships.safety.storageRequirements
        icon: warehouse
        order: 35
        variant: default
      presentation: descriptive
      items:
        - temperatureRange: Store below 25°C (77°F). Refrigeration recommended for solutions to prevent polymerization.
          ventilation: Local exhaust ventilation mandatory. Fume hood for small quantities. Outdoor storage for large quantities.
          incompatibilities:
            - Strong oxidizers
            - Strong acids
            - Strong bases
            - Phenols
            - Aniline
            - Perchloric acid
            - Nitromethane
          containerMaterial: Stainless steel, glass, or polyethylene. NOT copper or copper alloys (catalyzes oxidation).
          segregation: Separate from oxidizers, acids, and bases. Flammable storage if concentration >30%.
          quantityLimits: Minimize quantities. OSHA requires <100 gallons or 1,000 lbs inside buildings.
          specialRequirements: Stabilized with methanol (10-15%) to prevent polymerization. Label as carcinogen with appropriate warnings. Post carcinogen work area signs. Secondary containment required. Emergency eyewash and shower within 25 feet.
