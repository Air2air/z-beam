ppe_requirements:
  respiratory: Full-face NIOSH-approved respirator with organic vapor and formaldehyde cartridges for concentrations <0.75
    ppm. SCBA required for >0.75 ppm or unknown concentrations.
  skin: Nitrile or butyl rubber gloves (breakthrough time >8 hours). Chemical-resistant suit for high exposure or liquid contact.
  eye: Chemical safety goggles or full-face respirator. Face shield for splash hazard.
  minimum_level: Level C for <0.75 ppm with engineering controls, Level B for unknown concentrations or emergency response
  special_notes: IARC Group 1 known human carcinogen (nasopharyngeal cancer, leukemia). Strong sensitizer. Dermal exposure
    significant. Formaldehyde-specific cartridges required (standard organic vapor inadequate).
emergency_response:
  fire_hazard: Solutions >30% flammable. Pure gas flammable with wide explosive range (7-73%). Vapors heavier than air.
  fire_suppression: Use water spray, dry chemical, CO2, or foam. Water spray to cool containers and dilute vapors. Approach
    fire from upwind.
  spill_procedures: Evacuate area. Ventilate. Neutralize with dilute ammonia or sodium bisulfite solution. Contain with vermiculite
    or activated carbon. Dispose as hazardous waste.
  exposure_immediate_actions: 'Remove to fresh air immediately. Eyes: flush with water for 15 minutes. Remove contaminated
    clothing. Wash skin thoroughly. Seek immediate medical attention - potential carcinogen and respiratory toxin. Monitor
    for delayed pulmonary edema.'
  environmental_hazards: Toxic to aquatic life. Biodegrades rapidly. Report spills >100 lbs to CERCLA. Prevent entry to waterways.
  special_hazards: KNOWN HUMAN CARCINOGEN (IARC Group 1) - nasopharyngeal cancer and leukemia established. Severe respiratory
    irritant. Strong sensitizer causing occupational asthma. Lachrymator (causes tearing). Polymerizes on standing, especially
    with impurities.
environmental_impact:
  aquatic_toxicity: 'Toxic to aquatic life. LC50 (fish, 96h): 7-45 mg/L depending on species.'
  biodegradability: Readily biodegradable (>70% in 28 days). Oxidizes to formic acid then carbon dioxide.
  bioaccumulation: 'Very low bioaccumulation potential. BCF <10. Log Kow: 0.35.'
  soil_mobility: High mobility. Does not adsorb significantly. Volatilizes from soil and water surfaces.
  atmospheric_fate: 'Photolyzes rapidly via hydroxyl radicals. Atmospheric half-life: 1-2 days. Forms formic acid.'
  ozone_depletion: false
  global_warming_potential: null
  reportable_releases:
    water: 100 lbs to navigable waters (CERCLA RQ)
    air: 100 lbs/day
