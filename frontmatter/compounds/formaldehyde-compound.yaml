    reactivity:
      presentation: descriptive
      items:
      - stability: Pure formaldehyde unstable. Solutions polymerize on standing, especially without stabilizer (methanol).
        polymerization: Polymerizes to paraformaldehyde, especially with impurities, acids, bases, or on cooling. Exothermic
          reaction.
        incompatible_materials:
        - Strong oxidizers
        - Strong acids
        - Strong bases
        - Phenols
        - Aniline
        - Nitrogen dioxide
        - Performic acid
        - Perchloric acid
        hazardous_decomposition:
        - Carbon monoxide
        - Carbon dioxide
        - Formic acid
        conditions_to_avoid:
        - Heat
        - Light
        - Contamination
        - Acids
        - Bases
        - Cold temperatures (polymerization)
        reactivity_hazard: Reacts violently with strong oxidizers. Reacts with phenols forming heat-sensitive explosive compounds.
          Reacts with nitrogen dioxide forming explosive nitro compounds.
