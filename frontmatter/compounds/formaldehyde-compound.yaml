  emergency_response:
    fire_hazard: Solutions >30% flammable. Pure gas flammable with wide explosive range (7-73%). Vapors heavier than air.
    fire_suppression: Use water spray, dry chemical, CO2, or foam. Water spray to cool containers and dilute vapors. Approach
      fire from upwind.
    spill_procedures: Evacuate area. Ventilate. Neutralize with dilute ammonia or sodium bisulfite solution. Contain with
      vermiculite or activated carbon. Dispose as hazardous waste.
    exposure_immediate_actions: 'Remove to fresh air immediately. Eyes: flush with water for 15 minutes. Remove contaminated
      clothing. Wash skin thoroughly. Seek immediate medical attention - potential carcinogen and respiratory toxin. Monitor
      for delayed pulmonary edema.'
    environmental_hazards: Toxic to aquatic life. Biodegrades rapidly. Report spills >100 lbs to CERCLA. Prevent entry to
      waterways.
    special_hazards: KNOWN HUMAN CARCINOGEN (IARC Group 1) - nasopharyngeal cancer and leukemia established. Severe respiratory
      irritant. Strong sensitizer causing occupational asthma. Lachrymator (causes tearing). Polymerizes on standing, especially
      with impurities.
  physical_properties:
    boiling_point: -19°C (-2°F) for pure gas
    melting_point: -92°C (-134°F)
    vapor_pressure: 1 atm @ -19°C
    vapor_density: 1.03 (Air=1)
    specific_gravity: 0.815 @ -20°C (liquid)
    flash_point: 85°C (185°F) for 37% solution (formalin)
