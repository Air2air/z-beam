  safety:
    healthEffects:
      _section:
        sectionTitle: Health Effects
        sectionDescription: Exposure to formaldehyde leads to a range of adverse effects, from acute irritation to chronic carcinogenic risks, as established in epidemiological studies [web:5, web:9].
        sectionMetadata: relationships.safety.healthEffects
        icon: heart-pulse
        order: 15
        variant: default
      presentation: card
      items:
        - route: inhalation
          effect: Respiratory tract irritation, including coughing, wheezing, and throat burning; high concentrations can cause pulmonary edema
          severity: high
          onset: immediate
        - route: skin_contact
          effect: Skin irritation, redness, and allergic contact dermatitis
          severity: moderate
          onset: short-term
        - route: eye_contact
          effect: Severe eye irritation, tearing, burning, and potential corneal damage
          severity: severe
          onset: immediate
        - route: inhalation
          effect: Increased risk of nasopharyngeal cancer and sinus cancer with chronic exposure
          severity: severe
          onset: long-term
    ppeRequirements:
      _section:
        sectionTitle: Personal Protective Equipment
        sectionDescription: Proper PPE is essential for handling formaldehyde, with selections based on concentration and exposure duration to mitigate its sensitizing properties [web:2, web:5].
        sectionMetadata: relationships.safety.ppeRequirements
        icon: shield-check
        order: 20
        variant: default
      presentation: descriptive
      items:
        - respiratory: Full-face NIOSH-approved respirator with organic vapor and formaldehyde cartridges for concentrations <0.75 ppm. SCBA required for >0.75 ppm or unknown concentrations.
          skin: Nitrile or butyl rubber gloves (breakthrough time >8 hours). Chemical-resistant suit for high exposure or liquid contact.
          eye: Chemical safety goggles or full-face respirator. Face shield for splash hazard.
          minimumLevel: Level C for <0.75 ppm with engineering controls, Level B for unknown concentrations or emergency response
          specialNotes: IARC Group 1 known human carcinogen (nasopharyngeal cancer, leukemia). Strong sensitizer. Dermal exposure significant. Formaldehyde-specific cartridges required (standard organic vapor inadequate).
    emergencyResponse:
      _section:
        sectionTitle: Emergency Response
        sectionDescription: Emergency protocols for formaldehyde incidents emphasize rapid decontamination and medical intervention due to its acute toxicity .
        sectionMetadata: relationships.safety.emergencyResponse
        icon: exclamation-triangle
        order: 25
        variant: default
      presentation: descriptive
      items:
        - fireHazard: Solutions >30% flammable. Pure gas flammable with wide explosive range (7-73%). Vapors heavier than air.
          fireSuppression: Use water spray, dry chemical, CO2, or foam. Water spray to cool containers and dilute vapors. Approach fire from upwind.
          spillProcedures: Evacuate area. Ventilate. Neutralize with dilute ammonia or sodium bisulfite solution. Contain with vermiculite or activated carbon. Dispose as hazardous waste.
          exposureImmediateActions: 'Remove to fresh air immediately. Eyes: flush with water for 15 minutes. Remove contaminated clothing. Wash skin thoroughly. Seek immediate medical attention - potential carcinogen and respiratory toxin. Monitor for delayed pulmonary edema.'
          environmentalHazards: Toxic to aquatic life. Biodegrades rapidly. Report spills >100 lbs to CERCLA. Prevent entry to waterways.
          specialHazards: KNOWN HUMAN CARCINOGEN (IARC Group 1) - nasopharyngeal cancer and leukemia established. Severe respiratory irritant. Strong sensitizer causing occupational asthma. Lachrymator (causes tearing). Polymerizes on standing, especially with impurities.
