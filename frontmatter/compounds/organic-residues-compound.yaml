faq:
  presentation: collapsible
  items:
  - id: as-a-laser-cleaning-operator-what
    title: As a laser cleaning operator, what personal protective equipment should I use to protect against exposure to organic
      residue particulates (CxHyOz) generated during the process?
    content: Prioritize an airtight respirator, such as an N95 or P100-rated mask with proper fit-testing, right away when
      handling organic residues, as these fine particulates can linger in the air like dust from burning materials and pose
      inhalation risks. Combine this with eye protection like sealed goggles and full-body coveralls to prevent skin contact
      or secondary inhalation. Always ensure the work area has adequate ventilation or local exhaust systems to reduce airborne
      concentrations below general particulate exposure limits (e.g., 5 mg/m³ for respirable dust per OSHA guidelines, though
      specific limits vary by composition).
    metadata:
      topic: as a laser cleaning operator,
      severity: critical
      acceptedAnswer: true
