        - 10
      overlap_ratio:
        unit: '%'
        value: 60
        recommended: 60
        range:
        - 10
        - 90
    removal_characteristics:
      primary_mechanism: thermal_ablation
      secondary_mechanisms:
      - photochemical
      - plasma_formation
      removal_efficiency:
        single_pass: 0.75
        optimal_passes: 2
        diminishing_returns_after: 4
        typical_time_per_cm2: 2.7
      surface_quality_after_removal:
        roughness_change: minimal
        discoloration_risk: low
        substrate_damage_risk: low
        residual_contamination: trace
    compatibility:
      recommended: true
      success_rate: 0.85
      difficulty: moderate
      substrate_warnings:
      - Standard precautions apply
      process_limitations:
      - None identified
    safety_considerations:
      material_specific_hazards:
      - Standard laser cleaning hazards apply
      recommended_ppe:
        respiratory: P100
        eye_protection: OD7+ at operating wavelength
        skin_protection: Heat-resistant gloves
      ventilation_requirements:
        minimum_air_changes_per_hour: 10
        extraction_velocity_m_s: 0.5
        filtration_notes: HEPA filtration recommended for particulate capture
      fume_warnings:
      - Standard fume precautions
    optimization_tips:
    - Start at lower power (50W) and increase gradually to avoid substrate damage
    - Use 2 passes rather than single high-energy pass for better control
    - Allow 2-3 seconds between passes for substrate cooling
    success_indicators:
      visual:
      - Clean, uniform surface
      - No visible residue
      - Original substrate texture visible
      measurement:
      - Surface roughness increase <2.0 μm Ra
      failure_signs:
      - Discoloration (indicates overheating)
      - Surface pitting or roughness (excessive energy)
      - Incomplete removal after optimal pass count (insufficient energy)
