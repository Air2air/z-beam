id: scale-buildup-contamination
contentType: contaminant
schemaVersion: 6.0.0
name: Mineral Scale / Hard Water Deposits
category: thermal-damage
subcategory: scale
datePublished: '2026-01-06'
dateModified: '2026-02-02T02:25:22.984049+00:00'
description: >-
  Scale buildup contamination forms differently on metals compared to ceramics, so removal challenges vary. On steel
  surfaces, layer adheres tightly from heat exposure, creating uneven patterns that resist laser pulses. Aluminum shows
  looser buildup, yet cracks during cleaning because thermal damage spreads fast. Treatment applies short bursts, and
  surface uniformity improves after this. Contamination exhibits thermal origins, so laser adjusts for material
  behavior. Buildup is detected in oxide forms, and process removes it effectively without substrate harm. Results
  indicate cleaner finishes on treated areas. 


  Ikmanda Roswati, Ph.D. from Indonesia
