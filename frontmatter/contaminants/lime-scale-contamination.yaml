description: >-
  Lime scale contamination builds up as hard, chalky deposits from mineral-rich water, forming irregular layers on metal
  and stone surfaces in humid environments. These patterns often show flaky, uneven crusts that cling tightly,
  especially around joints or heat-exposed areas, creating a significant challenge for laser cleaning. Lasers
  effectively vaporize the scale, but the process demands precise control to avoid thermal damage underneath. On
  stainless steel, it removes cleanly with minimal residue, while on porous stone, it risks cracking if energy ramps up
  too quickly. In practice, operators dial in lower intensities first, which clears the buildup without harming the base
  material. Overall, this contamination responds well to pulsed lasers, achieving a clean finish while preserving
  surface integrity.
