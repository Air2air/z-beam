  visual_characteristics:
    appearance_on_categories:
      ceramic:
        appearance: Limescale on ceramic surfaces shows as white, chalky residues
          that can create a dull, rough finish on otherwise smooth tiles.
        coverage: Coverage is usually localized and uneven, with heavier deposits
          in high-splash zones and lighter elsewhere.
        pattern: It typically appears in spots, rings, or patches, often around drains,
          faucets, or where water pools.
      composite:
        appearance: Limescale on composites appears as white, crusty or powdery spots
          that can blend with or stand out from the varied surface textures.
        coverage: Coverage is typically sparse and uneven, with buildup in crevices
          or areas prone to water retention.
        pattern: It distributes in irregular spots or patches, influenced by the material's
          porosity and water contact points.
      concrete:
        appearance: On concrete, limescale deposits are white, powdery or crystalline
          efflorescence that can cover large areas and feel rough.
        coverage: Coverage can range from light dusting to heavy encrustation, varying
          with porosity and environmental conditions.
        pattern: They often form in patches, streaks, or a uniform layer, especially
          on surfaces exposed to groundwater or moisture.
      fabric:
        appearance: Limescale on fabric appears as stiff, white or grayish stains
          that can feel crusty and alter the texture of the fibers.
        coverage: Coverage is generally limited to affected areas, with patchy distribution
          depending on fabric absorbency and water contact.
        pattern: It typically shows as spots or streaks, following water spill or
          drip patterns, and may spread if not treated.
      glass:
        appearance: On glass, limescale appears as a cloudy, white film or spots that
          reduce transparency and can feel gritty.
        coverage: Coverage ranges from light spotting to a dense film, with more buildup
          in areas of frequent water contact.
        pattern: It often forms in spots, streaks, or a uniform haze, particularly
          around edges or where water droplets dry.
      metal:
        appearance: Limescale appears as a white, chalky, or crusty deposit that can
          feel rough and dull the metallic shine.
        coverage: Coverage is typically patchy and localized, varying from light dusting
          to thick buildup in high-mineral water areas.
        pattern: It often forms in spots or streaks, particularly around joints, edges,
          or areas with water exposure.
      mineral:
        appearance: Limescale on mineral surfaces appears as white, crystalline or
          chalky coatings that may mimic or obscure the natural mineral features.
        coverage: Coverage is highly variable, from sparse spots to extensive coatings,
          influenced by mineral composition and water flow.
        pattern: It forms in patches, veins, or uniform layers, often in fissures
          or on surfaces with water interaction.
      plastic:
        appearance: On plastic, limescale manifests as white, powdery or flaky deposits
          that may adhere loosely to the smooth surface.
        coverage: Coverage is generally light to moderate and patchy, with variations
          based on water exposure and plastic type.
        pattern: It forms in spots, streaks, or thin layers, commonly in areas exposed
          to hard water splashes or condensation.
      rubber:
        appearance: On rubber, limescale looks like white, chalky residues that may
          flake off or embed in the flexible, textured surface.
        coverage: Coverage is usually light and localized, varying with water exposure
          and the rubber's resistance to mineral adhesion.
        pattern: It often forms in spots or thin layers, particularly in seams or
          where water collects and evaporates.
      semiconductor:
        appearance: On semiconductors, limescale shows as microscopic white residues
          that can interfere with electronic properties and appear under magnification.
        coverage: Coverage is usually minimal and targeted, with critical implications
          for device performance even at low levels.
        pattern: It typically forms in localized spots or thin films, often in areas
          exposed to process water or contaminants.
      specialty:
        appearance: Limescale on specialty materials varies but generally appears
          as white, adherent deposits that can degrade unique surface finishes.
        coverage: Coverage is material-specific, ranging from isolated spots to widespread
          films, tailored to the surface's exposure and composition.
        pattern: Distribution depends on the material's properties, often forming
          in spots or layers where water is present.
      stone:
        appearance: Limescale deposits on stone are white or off-white, crusty formations
          that can obscure the natural texture and color.
        coverage: Coverage varies from light veining to extensive crusting, depending
          on water mineral content and surface porosity.
        pattern: They form in patches, streaks, or efflorescence patterns, especially
          in joints or on surfaces with water flow.
      wood:
        appearance: On wood, limescale looks like white or grayish powdery or crystalline
          spots that can penetrate porous surfaces.
        coverage: Coverage is generally sparse and uneven, concentrated where water
          has evaporated, with minimal spread.
        pattern: It usually appears as scattered spots or patches, often following
          water drip lines or pooling areas.
