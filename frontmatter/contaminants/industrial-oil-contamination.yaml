        recommended_j_cm2: 0.7
      overlap_percentage: 50
      polarization: circular
      pulse_duration_range:
        max_ns: 200
        min_ns: 10
        recommended_ns: 50
      repetition_rate_khz:
        max: 200
        min: 20
        recommended: 50
      safety_margin_factor: 0.7
      scan_speed_mm_s:
        max: 2000
        min: 500
        recommended: 1000
      spot_size_mm:
        max: 0.1
        min: 0.02
        recommended: 0.05
      wavelength_preference:
      - 1064
