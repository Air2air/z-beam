  visual:
    appearance_on_categories:
      presentation: descriptive
      items:
      - appearance_on_categories:
          ceramic:
            appearance: Displays as reddish-brown stains or crusty deposits that can be rough to the touch, contrasting with
              the smooth ceramic glaze.
            coverage: Generally confined to small areas near metal components, with little spread across the ceramic surface.
            pattern: Often appears as spots or patches around metal fixtures, such as screws or mounts, with possible streaking
              from water flow.
          composite:
            appearance: Appears as reddish-brown stains or flakes on the surface, potentially causing roughness where metal
              elements are embedded.
            coverage: Variable, from isolated spots to broader areas, depending on the extent of metal inclusion and exposure.
            pattern: Distributed as patches or streaks, especially around metal reinforcements or fasteners within the composite
              structure.
          concrete:
            appearance: Shows as orange or brown discoloration with a crusty or powdery texture, often embedded in the porous
              surface.
            coverage: Can range from small spots to extensive areas, depending on the presence and condition of embedded metals.
            pattern: Forms in patches or streaks, especially around rebar, metal forms, or joints where water and metal interact.
          fabric:
            appearance: Displays as reddish-brown stains that can be dry and powdery or slightly damp, altering the fabric's
              texture and color.
            coverage: Generally small and patchy, limited to areas in direct contact with corroded metal items.
            pattern: Often appears as blotches or streaks, particularly where metal zippers, buttons, or hardware are attached.
          glass:
            appearance: Appears as translucent or opaque reddish-brown streaks or spots, often with a rough residue that can
              obscure clarity.
            coverage: Sparse and localized, primarily near metal contact points, with minimal uniform coverage.
            pattern: Usually forms as drips or streaks running downward from corroded metal frames or fittings.
          metal:
            appearance: Appears as reddish-brown or orange rust spots with a rough, flaky texture, often dulling the original
              metallic finish.
            coverage: Varies from small, localized spots to extensive coverage, depending on exposure and material type.
            pattern: Typically forms in isolated spots or patches that can spread into larger areas, often starting at edges
              or scratches.
          mineral:
            appearance: Appears as reddish-brown stains or coatings that may be flaky or crystalline, contrasting with the
              mineral's natural luster.
            coverage: Variable, from localized spots to widespread coverage, influenced by mineral composition and metal content.
            pattern: Typically distributed as patches or veins, often following cracks or areas where metal inclusions are
              present.
          plastic:
            appearance: Shows as faint orange or brown discoloration, often with a slight texture from embedded rust particles,
              but may not adhere well.
            coverage: Very limited and superficial, usually restricted to points of direct metal contact.
            pattern: Typically forms as small spots or smears where metal parts are in contact, with minimal integration into
              the plastic.
          rubber:
            appearance: Manifests as orange or brown stains that may feel gritty, often not penetrating deeply due to rubber's
              non-porous nature.
            coverage: Minimal and localized, primarily where metal touches the rubber, with no significant spread.
            pattern: Usually forms as spots or smears at points of contact with corroding metal parts, such as fittings or
              inserts.
          semiconductor:
            appearance: Manifests as subtle discoloration or microscopic rust particles that can cause surface roughness,
              potentially affecting electronic properties.
            coverage: Generally minimal and controlled, but can be uniform in contaminated batches, leading to device failures.
            pattern: Usually forms as fine spots or uniform thin layers, particularly on metal contacts or exposed areas during
              processing.
          specialty:
            appearance: Varies widely; for example, on alloys, it may show unique colors like green patina, with textures
              ranging from smooth to rough depending on the material.
            coverage: Highly variable, from isolated defects to full-surface coverage, tailored to the material's specific
              use and exposure conditions.
            pattern: Distribution depends on the specialty material; it could be uniform for coatings or patchy for composites,
              often following structural weaknesses.
          stone:
            appearance: Shows as orange or brownish stains that can be powdery or crusty, often contrasting with the stone's
              natural color and texture.
            coverage: Typically limited to specific areas, such as around metal anchors or joints, with patchy distribution.
            pattern: Forms in irregular patches or streaks, particularly where water runs over metal fixtures embedded in
              the stone.
          wood:
            appearance: Manifests as reddish-brown stains or discoloration on the surface, sometimes with a gritty texture
              from transferred rust particles.
            coverage: Generally localized to areas near metal fasteners, with minimal spread across the wood surface.
            pattern: Usually appears as streaks or patches where metal components (like nails or screws) are in contact, often
              following grain lines.
