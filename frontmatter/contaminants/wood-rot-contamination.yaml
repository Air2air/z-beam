id: wood-rot-contamination
contentType: contaminant
schemaVersion: 6.0.0
name: Wood Rot / Fungal Biodegradation
category: biological
subcategory: growth
datePublished: '2026-01-06'
dateModified: '2026-02-02T02:25:24.227830+00:00'
description: >-
  Wood rot contamination differs from surface dust or metal oxides because it penetrates deeply into wood fibers, so
  laser cleaning faces unique challenges in biological removal. Formation occurs through fungal spores that spread
  irregularly along grain patterns, creating porous decay zones during humid exposure. In observations, rot exhibits
  spongy texture and discoloration, which binds tightly to cellulose structure. Because of this embedding, laser
  ablation removes outer layers effectively, yet inner mycelium resists vaporization without charring the substrate.
  Treatment applies short pulses so heat targets organics selectively, and surface regains integrity after process.
  Buildup is detected in moist regions, where contamination weakens material durability over time.
