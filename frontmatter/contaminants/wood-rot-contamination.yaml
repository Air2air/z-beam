description: Wood rot forms through fungal biodegradation of wood fibers, so discoloration appears and softening occurs with
  structural weakening over time. This contamination penetrates deeply into material unlike surface dust or chemical stains,
  and behaves faster on softwoods like pine while slower on hardwoods like oak. Removal challenges arise because rot makes
  wood brittle, yet laser cleaning succeeds by selectively ablating decayed layers without damaging healthy substrate.
micro:
  after: Post-cleaning reveals restored surface with wood rot / fungal biodegradation successfully removed through precise
    laser ablation.
  before: Surface shows contamination from wood rot / fungal biodegradation affecting material appearance and properties.
