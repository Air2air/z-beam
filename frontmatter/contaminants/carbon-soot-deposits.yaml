laser_properties:
  laser_parameters:
    beam_profile: flat_top
    fluence_range:
      max_j_cm2: 1.2
      min_j_cm2: 0.2
      recommended_j_cm2: 0.6
    overlap_percentage: 50
    polarization: circular
    pulse_duration_range:
      max_ns: 100
      min_ns: 10
      recommended_ns: 30
    repetition_rate_khz:
      max: 200
      min: 20
      recommended: 50
    safety_margin_factor: 0.6
    scan_speed_mm_s:
      max: 5000
      min: 500
      recommended: 1500
    spot_size_mm:
      max: 0.1
      min: 0.03
      recommended: 0.05
    wavelength_preference:
    - 1064
    - 532
  optical_properties:
    absorption_coefficient:
      wavelength_1064nm: 8000
      wavelength_355nm: 60000
      wavelength_532nm: 25000
    reflectivity:
      wavelength_1064nm: 0.05
      wavelength_355nm: 0.01
      wavelength_532nm: 0.03
    refractive_index:
      imaginary_part: 0.4
      real_part: 1.8
    transmission_depth: 1.25
  removal_characteristics:
    byproducts:
    - compound: carbon-dioxide
      hazard_level: low
      phase: gas
    - compound: carbon-monoxide
      hazard_level: moderate
      phase: gas
    - compound: C_nanoparticles
      hazard_level: moderate
      phase: solid
    damage_risk_to_substrate: low
    primary_mechanism: thermal_ablation
    process_speed:
      area_coverage_rate_cm2_min: 1200
      typical_scan_speed_mm_s: 500
    removal_efficiency:
      diminishing_returns_after: 3
      optimal_passes: 2
      single_pass: 0.85
    secondary_mechanisms:
    - photochemical
    - mechanical_spallation
    surface_quality_after_removal:
      color_change: 'no'
      residual_stress: none
      roughness_increase: minimal
  safety_data:
    fire_explosion_risk: low
    fumes_generated:
    - compound: Carbon Monoxide
      concentration_mg_m3: 50.0
      exposure_limit_mg_m3: 29.0
      hazard_class: toxic
    - compound: Carbon Dioxide
      concentration_mg_m3: 500.0
      exposure_limit_mg_m3: 9000.0
      hazard_class: toxic
    - compound: Polycyclic Aromatic Hydrocarbons (PAHs)
      concentration_mg_m3: 2.5
      exposure_limit_mg_m3: 0.2
      hazard_class: carcinogenic
    - compound: Ultrafine Carbon Particles
      concentration_mg_m3: 15.0
      exposure_limit_mg_m3: 3.0
      hazard_class: toxic
    particulate_generation:
      respirable_fraction: 0.8
      size_range_um:
      - 0.01
      - 10.0
    ppe_requirements:
      eye_protection: goggles
      respiratory: PAPR
      skin_protection: full_suit
    substrate_compatibility_warnings:
    - Laser parameters must be optimized to minimize substrate damage and excessive fume generation
    - Avoid laser cleaning on painted surfaces containing lead or chromium
    - Test on small area first to assess fume generation characteristics
    toxic_gas_risk: moderate
    ventilation_requirements:
      exhaust_velocity_m_s: 0.5
      filtration_type: dual
      minimum_air_changes_per_hour: 12
    visibility_hazard: high
  thermal_properties:
    ablation_threshold:
      pulse_duration_100ns: 1.2
      pulse_duration_10ns: 0.6
      wavelength_1064nm: 0.8
    decomposition_temperature: 400
    heat_affected_zone_depth: 15
    melting_point: 3550
    specific_heat: 840
    thermal_conductivity: 1.5
    thermal_diffusivity: 1.2
    vaporization_temperature: 1800
