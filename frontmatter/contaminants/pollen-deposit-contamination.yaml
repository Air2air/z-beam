  visual_characteristics:
    appearance_on_categories:
      ceramic:
        appearance: Pollen deposits as a fine, colored powder on ceramic, often yellow or green, adhering to glazed surfaces
          and creating a slightly rough feel.
        coverage: Coverage is light and uneven, with more in recessed designs and less on frequently cleaned or exposed surfaces.
        pattern: Patterns are usually spotty or streaked, with buildup in textured areas and less on smooth, sloping parts.
      composite:
        appearance: Pollen on composites shows as a fine powder in yellow or green hues, settling into textures and potentially
          bonding with resins or fibers.
        coverage: Coverage is generally sparse and variable, depending on composite smoothness and environmental factors like
          wind.
        pattern: Distribution is irregular, with spots and patches concentrated in porous or rough areas of the material.
      concrete:
        appearance: Pollen on concrete appears as a dusty, often yellowish layer that settles into the porous surface, making
          it look discolored and slightly rough.
        coverage: Coverage is typically light and variable, with heavier deposits in sheltered spots and minimal on exposed,
          vertical surfaces.
        pattern: It forms irregular patches and streaks, accumulating more in cracks and low-lying areas while being blown
          off high points.
      fabric:
        appearance: On fabric, pollen looks like a fine, powdery dust in yellow, green, or white, clinging to fibers and creating
          a speckled, matte finish.
        coverage: Coverage ranges from light to heavy, with dense accumulation in textured or piled fabrics and sparse on
          tight weaves.
        pattern: It distributes unevenly as spots and patches, often caught in weaves and folds rather than on smooth areas.
      glass:
        appearance: Pollen on glass shows as a translucent to opaque dusty film, usually yellow or green, that can obscure
          clarity and create a hazy finish.
        coverage: Typically light to moderate, coverage varies widely; it can be uniform in calm conditions or patchy after
          disturbances.
        pattern: It distributes in streaks and spots, influenced by wind and rain, with more accumulation along edges and
          in static areas.
      metal:
        appearance: Pollen appears as a fine, yellowish or greenish powder that can dull the metallic shine and create a slightly
          gritty texture on smooth surfaces.
        coverage: Coverage is typically light to moderate, varying with wind and exposure; sheltered spots may have dense
          accumulation while open areas remain sparse.
        pattern: It often forms uneven patches or streaks, accumulating more in crevices and sheltered areas while being blown
          off exposed surfaces.
      mineral:
        appearance: On minerals, pollen shows as a fine, powdery coating in yellow or green, adhering to crystal faces and
          rough textures, sometimes altering luster.
        coverage: Amount is generally sparse and uneven, influenced by mineral porosity and environmental exposure.
        pattern: Distribution is spotty or streaked, with buildup in fissures and on horizontal surfaces, less on smooth,
          vertical ones.
      plastic:
        appearance: On plastic, pollen appears as a dusty, often electrostatic layer in yellow or green, which can make surfaces
          look dull and feel gritty.
        coverage: Amount is typically light to moderate, varying with surface charge and exposure; sheltered areas may have
          heavier buildup.
        pattern: It forms patches and streaks, accumulating more on static-prone, horizontal surfaces and in corners.
      rubber:
        appearance: Pollen coats rubber as a dusty, colored film, often yellow or green, that can embed in the slightly tacky
          surface and reduce grip.
        coverage: Typically light, coverage varies; it may be heavier in static conditions and lighter on frequently moved
          surfaces.
        pattern: It appears in streaks and patches, with more accumulation in grooves and on horizontal, less-flexed areas.
      semiconductor:
        appearance: Pollen on semiconductors appears as a microscopic, dusty film in light colors, potentially causing defects
          by settling on sensitive surfaces.
        coverage: Coverage is typically very light and controlled in clean environments, but can vary and cause issues if
          not managed.
        pattern: It forms fine, uneven spots and layers, often concentrated in static-prone areas and less on actively cleaned
          surfaces.
      specialty:
        appearance: On specialty materials, pollen deposits as a fine powder in various colors, adapting to unique surfaces
          like coatings or sensitive finishes.
        coverage: Coverage is highly variable, ranging from minimal on treated surfaces to significant on porous or static
          ones, requiring specific handling.
        pattern: Patterns depend on material properties, often irregular with spots or streaks in vulnerable areas.
      stone:
        appearance: On stone, pollen appears as a fine, powdery layer in yellow, green, or white hues, clinging to rough textures
          and filling pores.
        coverage: Coverage is generally light and uneven, with dense spots in sheltered areas and minimal on exposed, vertical
          surfaces.
        pattern: It forms irregular patches and streaks, often concentrated in depressions and less on wind-swept, smooth
          faces.
      wood:
        appearance: Pollen coats wood as a dusty, often yellow or green film that can settle into the grain, making the surface
          look fuzzy or discolored.
        coverage: Amount ranges from sparse on exposed wood to heavy in protected niches, with significant variation based
          on surface orientation and weather.
        pattern: Distribution is patchy, with heavier buildup in textured areas and grooves, and lighter coverage on smooth,
          vertical surfaces.
