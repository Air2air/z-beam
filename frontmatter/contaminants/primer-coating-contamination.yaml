  visual:
    appearance_on_categories:
      presentation: descriptive
      items:
      - appearance_on_categories:
          ceramic:
            appearance: On ceramic, primer manifests as a thin, opaque layer in white or light colors, with a smooth or slightly
              textured matte finish that enhances paint adhesion.
            coverage: Coverage is typically consistent and full, though it may vary slightly due to surface smoothness, with
              better adhesion on rough textures.
            pattern: Distribution is mostly uniform, but can show brush strokes, pooling in grooves, or patchiness on glazed
              versus unglazed areas.
          composite:
            appearance: On composites, primer looks like a solid, opaque film in neutral shades, with a texture that may mimic
              the underlying material, ranging from smooth to slightly rough.
            coverage: Coverage is typically high and uniform, though it may be thinner on non-porous sections and thicker
              where the composite is more absorbent.
            pattern: Distribution is often even, but can show variations like streaks or patches due to resin-rich or fiber-dense
              areas affecting absorption.
          concrete:
            appearance: Primer on concrete appears as a thick, opaque layer in gray or white, with a matte, slightly rough
              texture that fills pores and evens out the surface.
            coverage: Coverage is generally full and heavy, though it can vary with concrete porosity, leading to thicker
              application in absorbent spots.
            pattern: It typically forms a uniform coat, but may show brush marks, roller streaks, or uneven patches on highly
              porous or damaged areas.
          fabric:
            appearance: On fabric, primer looks like a stiffened, opaque coating in light colors, with a matte finish that
              may alter the texture, making it feel crusty or less flexible.
            coverage: Coverage is variable and often incomplete, with thicker layers on dense weaves and minimal penetration
              on loose fabrics.
            pattern: Distribution is often patchy or streaky, as it can soak in unevenly, leaving some areas more saturated
              than others.
          glass:
            appearance: Primer on glass appears as a translucent to opaque coating, often clear or lightly tinted, with a
              smooth, glossy, or slightly hazy finish that can show underlying clarity.
            coverage: Coverage is generally thin and even, designed for adhesion rather than opacity, with minimal variation
              on non-porous surfaces.
            pattern: It tends to form a uniform film, but may exhibit streaks, bubbles, or uneven edges if not applied carefully.
          metal:
            appearance: Paint primer on metal often appears as a thin, opaque layer in white, gray, or reddish-brown hues,
              with a matte or slightly textured finish that can highlight surface imperfections.
            coverage: Coverage is usually high and consistent, though variations can occur in corners or on rough surfaces,
              leading to thinner spots.
            pattern: It typically forms a uniform coating, but may show streaks or patches if applied unevenly, especially
              around edges or welds.
          mineral:
            appearance: On minerals, primer manifests as a thin, opaque film in neutral tones, with a matte finish that may
              not fully conceal crystalline structures or color variations.
            coverage: Coverage is typically partial and inconsistent, with thicker layers on smooth facets and minimal coverage
              in crevices or on hydrophobic minerals.
            pattern: Distribution is often irregular, forming spots or streaks, especially on uneven or porous mineral surfaces
              where adhesion is challenging.
          plastic:
            appearance: Primer on plastic appears as a light-colored, often white or gray, opaque coating with a matte or
              satin finish that may highlight mold lines or imperfections.
            coverage: Coverage is generally uniform and complete, though adhesion issues might cause thin patches or peeling
              on certain plastics.
            pattern: It usually forms a even layer, but can exhibit drips, orange peel texture, or uneven spots on curved
              or low-surface-energy areas.
          rubber:
            appearance: Primer on rubber appears as a thin, often clear or lightly colored layer with a matte finish that
              may not fully mask the elastic surface, sometimes showing a slight sheen.
            coverage: Coverage is usually thin and even, designed for flexibility, with potential variations on textured or
              curved surfaces.
            pattern: It tends to form a uniform coating, but can develop cracks, wrinkles, or uneven spots if the rubber flexes
              during application.
          semiconductor:
            appearance: Primer on semiconductors appears as an ultra-thin, often clear or lightly colored coating with a smooth,
              glossy finish that is designed for precision without altering electrical properties.
            coverage: Coverage is extremely consistent and complete at a microscopic level, with no variation to ensure reliable
              performance in electronic applications.
            pattern: It forms a highly uniform film, applied via spin-coating or spraying, with minimal streaks or defects
              to avoid interference with microstructures.
          specialty:
            appearance: On specialty materials, primer's appearance varies widely—it may be clear, colored, or textured—tailored
              to specific surfaces like alloys or coatings, often with a custom finish.
            coverage: Coverage is highly variable, ranging from full and even to selective, based on the material's properties
              and the primer's formulation for specialized applications.
            pattern: Distribution depends on the material; it can be uniform for smooth surfaces or patchy for irregular ones,
              designed to meet unique adhesion or aesthetic needs.
          stone:
            appearance: On stone, primer looks like a thin, opaque film in neutral colors, with a matte finish that may not
              fully hide the natural texture or color variations.
            coverage: Coverage is usually partial and variable, with thicker layers on smooth areas and minimal penetration
              into rough or porous spots.
            pattern: It often forms irregular patches or streaks, especially on porous surfaces, and may not adhere uniformly
              in crevices.
          wood:
            appearance: Primer on wood appears as a solid, often light-colored layer that may be white or tinted, with a smooth
              or slightly rough texture that seals the grain.
            coverage: Coverage is typically full and uniform, but may vary with wood type, resulting in thicker application
              on absorbent areas.
            pattern: Distribution is generally even, but can show brush marks, drips, or uneven patches in areas with varying
              wood porosity.
