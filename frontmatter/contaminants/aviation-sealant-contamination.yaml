  visual:
    appearanceOnCategories:
      presentation: descriptive
      items:
      - appearanceOnCategories:
          ceramic:
            appearance: Residue on ceramic surfaces manifests as a sticky, glossy or dull coating in colors like white, beige,
              or gray, potentially filling fine pores and feeling rubbery or hardened over time.
            coverage: Coverage is usually partial and irregular, with some sections clean and others covered in thin to moderate
              layers, depending on surface smoothness and sealant viscosity.
            pattern: Distribution is often spotty or streaky, with residues clustering around joints, glazed areas, or imperfections
              where sealant adhered more strongly.
          composite:
            appearance: Aerospace sealant residue on composites shows as a film or deposits in shades of gray, white, or amber,
              with a rubbery or crusty texture that can embed into fibrous layers, altering the surface sheen.
            coverage: Coverage is generally uneven, ranging from thin veils to thick accumulations, with variations influenced
              by the composite's porosity and the sealant's application method.
            pattern: It typically appears as streaks, blotches, or uniform layers, often following the composite's weave or
              laminate structure and concentrating at bond lines or fasteners.
          concrete:
            appearance: On concrete, the residue manifests as a film or crust in gray, white, or yellowish shades, with a
              rough, rubbery texture that can fill pores and create a slightly shiny or dull finish.
            coverage: Coverage is typically low and uneven, with thin films in some areas and thicker deposits in others,
              influenced by concrete's porosity and exposure conditions.
            pattern: It commonly appears as irregular patches or streaks, clinging to rough surfaces, cracks, or joints where
              sealant was used for sealing or adhering purposes.
          fabric:
            appearance: Residue on fabric appears as stiffened, discolored areas in white, gray, or brown tones, with a crusty
              or tacky texture that can mat fibers and reduce flexibility.
            coverage: Coverage is usually sparse and irregular, with some fibers lightly coated and others heavily saturated,
              leading to a mottled effect based on fabric absorbency.
            pattern: It typically forms spots, streaks, or diffuse patches, often following the fabric weave or concentrating
              at edges, seams, or where sealant was accidentally applied.
          glass:
            appearance: On glass, aerospace sealant residue is visible as a hazy, translucent to opaque smear or film, often
              in white, gray, or yellowish hues, with a smooth or slightly tacky feel that can obscure clarity.
            coverage: Coverage ranges from thin, widespread films to concentrated patches, often varying based on application
              precision and cleaning efforts, with edges frequently showing more residue.
            pattern: It typically appears as streaks, smudges, or uniform layers, especially along edges, seals, or where
              overspray occurred, sometimes forming web-like patterns if stretched.
          metal:
            appearance: Aerospace sealant residue on metal often appears as a translucent to opaque film, ranging from white
              to gray or amber, with a rubbery or tacky texture that can attract dust.
            coverage: Coverage is usually partial and uneven, varying from thin films in some areas to thicker accumulations
              in others, depending on application and removal methods.
            pattern: It typically forms irregular streaks or patches, often concentrated around seams, joints, or fastener
              holes where sealant was applied.
          mineral:
            appearance: Residue on mineral surfaces shows as a coating or spots that can be translucent to opaque in white,
              gray, or earth tones, with a smooth or gritty texture depending on the mineral's hardness and sealant consistency.
            coverage: Coverage is generally minimal and variable, ranging from faint smears to localized thick layers, based
              on the mineral's surface properties and sealant interaction.
            pattern: Distribution is often spotty or streaky, with residues adhering to crystalline structures, fissures,
              or polished areas where sealant was applied or spilled.
          plastic:
            appearance: On plastic, the residue appears as a film or blobs that can be transparent, white, or tinted, with
              a soft, tacky texture that may cause slight discoloration or a greasy look.
            coverage: Coverage varies from light, scattered films to dense patches, with uneven distribution due to plastic's
              low surface energy affecting adhesion and spread.
            pattern: It often forms irregular spots, streaks, or uniform coatings, particularly along seams, molded edges,
              or areas exposed to sealant during assembly or repair.
          rubber:
            appearance: On rubber, the residue blends or contrasts as a sticky, glossy layer in colors like black, gray, or
              clear, feeling gummy and potentially causing swelling or softening of the rubber substrate.
            coverage: Coverage can be extensive and variable, from light coatings to heavy buildups, depending on compatibility
              and whether the sealant was intended to integrate with the rubber.
            pattern: Distribution is often patchy or uniform, with residues spreading along seams, flex points, or entire
              surfaces if sealant was applied for bonding or sealing purposes.
          semiconductor:
            appearance: On semiconductors, aerospace sealant residue appears as a thin, often clear or lightly colored film,
              with a smooth, possibly conductive or insulating texture that can interfere with electronic properties.
            coverage: Coverage is usually controlled and even but can vary from sparse contaminants to complete coatings,
              depending on application precision and cleaning protocols in sensitive environments.
            pattern: It typically forms uniform layers or microscopic spots, often concentrated on edges, bonding pads, or
              exposed surfaces during assembly or encapsulation processes.
          specialty:
            appearance: Residue on specialty materials (e.g., advanced alloys or coatings) appears as a film or deposits in
              colors matching the sealant, with textures ranging from rubbery to brittle, potentially altering specialized
              surface finishes.
            coverage: Coverage is highly variable, from minimal, targeted applications to extensive coatings, designed to
              meet specific functional requirements while minimizing excess residue.
            pattern: Distribution is often tailored to the material's use, showing as uniform layers, precise patterns, or
              random spots based on application methods like spraying or brushing in high-performance contexts.
          stone:
            appearance: Residue on stone surfaces appears as a film or spots that can be clear, white, or discolored, with
              a slightly raised, rubbery texture that contrasts with the stone's natural roughness.
            coverage: Coverage is generally low and uneven, with some areas showing minimal residue and others having thicker
              buildups, influenced by the stone's porosity and surface treatment.
            pattern: It commonly forms isolated patches or streaks, often clinging to porous areas, cracks, or edges where
              sealant was applied or dripped during use.
          wood:
            appearance: On wood, the residue may present as a sticky, glossy or matte layer in shades of beige, brown, or
              gray, potentially darkening the wood grain and feeling gummy to the touch.
            coverage: Coverage tends to be sparse and localized, with variations from light smears to dense spots, especially
              in porous areas that absorb more sealant.
            pattern: Distribution is often patchy or streaky, following the wood's grain or accumulating in crevices and knots
              where sealant seeped or was not fully removed.
