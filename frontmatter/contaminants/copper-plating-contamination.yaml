  visual:
    appearanceOnCategories:
      presentation: descriptive
      items:
      - appearanceOnCategories:
          ceramic:
            appearance: Contamination manifests as reddish-brown stains or a dull copper coating, with a smooth or slightly
              textured finish.
            coverage: Coverage is generally partial and variable, often localized to contaminated zones without full uniformity.
            pattern: It typically appears as spots, streaks, or patches, influenced by glaze imperfections or surface pores.
          composite:
            appearance: Copper shows as reddish-brown stains or a thin layer, with textures varying by composite materials,
              often appearing mottled.
            coverage: Coverage is typically partial and inconsistent, affected by material heterogeneity and contamination
              sources.
            pattern: It forms irregular patches or streaks, following the composite's internal structure or surface flaws.
          concrete:
            appearance: Copper appears as reddish-brown stains or efflorescence, with a rough, porous texture that may flake
              over time.
            coverage: Coverage is usually limited and irregular, concentrated in areas where contaminants seep in.
            pattern: It forms patches, streaks, or random spots, often along cracks or surface imperfections.
          fabric:
            appearance: It manifests as reddish-brown stains or discoloration, with a soft, non-metallic texture that can
              feel slightly stiff.
            coverage: Coverage is typically patchy and light, varying with fabric absorbency and contamination extent.
            pattern: Distribution is often blotchy or streaky, following fabric weaves or areas of moisture exposure.
          glass:
            appearance: Copper appears as a thin, translucent to opaque reddish film, sometimes with a metallic sheen if thick.
            coverage: Coverage can range from light, patchy films to more extensive areas, but is often uneven due to glass's
              non-porous nature.
            pattern: It forms streaks, spots, or a hazy uniform layer, often spreading from edges or points of contact.
          metal:
            appearance: Copper electroplating appears as a shiny, reddish-brown metallic layer with a smooth, reflective finish.
            coverage: Coverage is usually complete and consistent, with minimal variation, as it is intentionally applied
              for protection or decoration.
            pattern: It typically forms a uniform, even coating across the surface, though it may show streaks or patches
              if applied unevenly.
          mineral:
            appearance: Contamination shows as reddish-brown coatings or inclusions, with a crystalline or granular texture
              depending on the mineral.
            coverage: Coverage can range from sparse spots to extensive coatings, varying with mineral type and exposure.
            pattern: It appears as patches, veins, or uniform layers, influenced by mineral porosity and deposition conditions.
          plastic:
            appearance: It appears as faint to vivid reddish-brown discoloration, with a non-metallic, sometimes blotchy finish
              due to poor bonding.
            coverage: Coverage is usually light and uneven, with variations based on plastic type and exposure duration.
            pattern: Distribution is often random, forming spots, streaks, or smears, especially along molded seams.
          rubber:
            appearance: Contamination appears as reddish-brown spots or smears, with a dull, non-shiny finish that may rub
              off easily.
            coverage: Coverage is generally sparse and uneven, limited to surface contact points without deep penetration.
            pattern: It tends to form random spots or streaks, often concentrated in creases or high-wear areas.
          semiconductor:
            appearance: It appears as thin, reddish-brown films or specks, often with a smooth, metallic sheen that can interfere
              with electronic properties.
            coverage: Coverage is usually minimal but critical, often patchy and uneven, posing risks to device functionality.
            pattern: Distribution is typically uniform or in localized spots, following circuit patterns or contamination
              sources.
          specialty:
            appearance: Copper contamination varies widely, appearing as reddish-brown stains, films, or deposits with textures
              specific to the material, such as glossy or matte finishes.
            coverage: Coverage is highly variable, from sparse to extensive, depending on the material's composition and exposure
              conditions.
            pattern: It forms irregular patterns like spots, streaks, or patches, tailored to the specialty material's unique
              surface properties.
          stone:
            appearance: It shows up as reddish-brown discoloration or stains, with a rough or gritty texture if the stone
              is porous.
            coverage: Coverage is usually sparse and irregular, concentrated in areas where contaminants accumulate.
            pattern: Distribution is often patchy or streaky, following surface irregularities or cracks in the stone.
          wood:
            appearance: Contamination appears as irregular reddish-brown stains or spots, often with a dull, non-metallic
              look due to poor adhesion.
            coverage: Coverage is typically partial and uneven, varying from small areas to larger sections, depending on
              exposure.
            pattern: It tends to form random spots, streaks, or patches, influenced by the wood's grain and porosity.
