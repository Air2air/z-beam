  visual:
    appearance_on_categories:
      presentation: descriptive
      items:
      - appearance_on_categories:
          ceramic:
            appearance: Residue appears as dark, oily marks on ceramic, potentially glossy or matte, that can adhere firmly
              and discolor the smooth surface.
            coverage: Coverage is generally limited to contact areas, varying from thin layers to thick accumulations.
            pattern: It forms patches or rings, often around edges or fittings, with an uneven, spotty distribution.
          composite:
            appearance: Residue on composites appears as dark, oily deposits that can seep into fibers or layers, creating
              blotchy discolorations and a tacky surface.
            coverage: Coverage varies widely, from sparse spots to extensive areas, depending on composite porosity and application.
            pattern: Distribution is patchy or streaky, following material seams or gasket outlines, with no uniformity.
          concrete:
            appearance: On concrete, residue presents as dark, greasy patches that penetrate the porous surface, creating
              stained, matte areas with a rough texture.
            coverage: Coverage is typically minimal and localized, varying with concrete absorption and gasket placement.
            pattern: Distribution is patchy or blotchy, concentrated in low spots or along seams, with no regular pattern.
          fabric:
            appearance: Residue on fabric looks like oily, dark stains that can saturate fibers, appearing as blotches with
              a greasy texture and potential odor.
            coverage: Coverage is generally sparse and spotty, limited to where the gasket touched, with intensity differences.
            pattern: It appears as irregular patches or spots, often following weave patterns or contact areas, without uniformity.
          glass:
            appearance: On glass, it shows as translucent or opaque smudges, often gray or brown, that can cloud the surface
              and reduce clarity with a streaky finish.
            coverage: Coverage is often partial, ranging from light films to heavier deposits, depending on residue amount
              and cleaning.
            pattern: Distribution is usually in streaks or smears, following the outline of the gasket, with no uniform pattern.
          metal:
            appearance: Gasket residue on metal appears as a greasy, dark film, often black or brown, with a sticky or smeared
              texture that can dull the surface finish.
            coverage: Coverage is usually partial, varying from small localized areas to broader sections, depending on gasket
              size and installation pressure.
            pattern: It typically forms irregular streaks or patches, concentrated around bolt holes or edges where gaskets
              were compressed, with uneven distribution.
          mineral:
            appearance: Residue on minerals appears as dark, oily films that can coat crystalline surfaces, causing dullness
              or discoloration with a slick feel.
            coverage: Coverage is usually sparse and variable, from light films to concentrated spots, depending on mineral
              hardness.
            pattern: It forms streaks or isolated patches, often in crevices or along cleavage planes, with uneven spread.
          plastic:
            appearance: On plastic, residue looks like greasy, dark films that may cause hazing or staining, with a slick
              texture that can attract dust.
            coverage: Coverage is often partial and variable, from light coatings to dense patches, influenced by plastic
              type.
            pattern: It typically appears as streaks or blotches, concentrated where gaskets were seated, with irregular patterns.
          rubber:
            appearance: On rubber, residue may blend or appear as darker, greasy areas that can soften the surface, often
              black or brown with a sticky feel.
            coverage: Coverage is usually partial, localized to gasket contact zones, with variations in thickness.
            pattern: It forms smears or patches, typically along edges or compression points, with irregular dispersal.
          semiconductor:
            appearance: On semiconductors, residue looks like microscopic, greasy contaminants that can appear as hazy or
              discolored areas under magnification, potentially affecting conductivity.
            coverage: Coverage is minimal and highly variable, typically limited to specific zones, posing risks for device
              failure.
            pattern: Distribution is often spotty or streaky, localized to processing areas or edges, with no uniformity.
          specialty:
            appearance: Residue on specialty materials varies but generally appears as dark, oily deposits that may interact
              uniquely, causing discoloration or texture changes based on composition.
            coverage: Coverage depends on material specifics, ranging from isolated spots to broader areas, with high variation.
            pattern: It forms irregular patterns like patches or streaks, tailored to material properties and gasket contact,
              without consistency.
          stone:
            appearance: Residue on stone presents as dark, greasy spots that may seep into porous surfaces, creating a matte
              or stained look against the natural texture.
            coverage: Coverage is typically minimal and localized, varying with stone porosity and gasket contact points.
            pattern: It appears as isolated patches or smears, often concentrated in crevices or along seams, with irregular
              dispersal.
          wood:
            appearance: On wood, residue looks like oily, dark stains that can penetrate the grain, appearing blotchy and
              discolored, often with a tacky feel.
            coverage: Coverage is generally sparse and spotty, limited to where the gasket was applied, with variations in
              intensity.
            pattern: It tends to form blotches or patches, following the wood grain or areas of contact, with no uniform spread.
