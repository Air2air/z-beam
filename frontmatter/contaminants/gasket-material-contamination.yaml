description: Gasket remnants build up on surfaces when old seals break down under heat or disassembly stress, softening into
  sticky patches that harden and cling tightly. In practice, these contaminants stretch and tear unevenly with a flexible,
  layered texture and embedded fibers, setting them apart from flaky oxidation while resisting basic scrapes on steel, where
  they bond firmly and warp finishes; on aluminum, they smear into pores and weaken seals; and on cast iron, they trap in
  rough spots to create gritty debris. Removal turns out challenging, as they shrug off solvents and abrasives, leaving residues
  that compromise joints over time, but laser cleaning lines up well by pulsing energy to vaporize organic layers precisely
  across these materials without damaging the base, delivering a clean finish that helps parts hold up reliably.
