  visual_characteristics:
    appearance_on_categories:
      ceramic:
        appearance: Water staining on ceramic surfaces shows as dull, discolored patches or white crusty deposits, often altering
          the glaze and feeling rough or chalky.
        coverage: Coverage is typically localized to exposed areas, varying from small spots to larger patches depending on
          water quality and surface treatment.
        pattern: Stains commonly appear as spots or streaks, following water flow or pooling, and may be more pronounced on
          unglazed areas or joints.
      composite:
        appearance: Water staining on composites appears as discolored, blotchy areas, often with faded colors or whitish
          residues that may feel rough or delaminated.
        coverage: Coverage varies widely, from small localized spots to extensive areas, depending on composite composition
          and water exposure duration.
        pattern: Stains typically form irregular patches or streaks, spreading along material layers or at joints where water
          penetrates or pools.
      concrete:
        appearance: Water staining on concrete appears as dark, wet-looking patches or white, powdery efflorescence, often
          with a rough or crumbly texture.
        coverage: Coverage is often extensive and variable, from small spots to broad areas, depending on concrete porosity
          and environmental conditions.
        pattern: Stains commonly form irregular patches or streaks, following surface cracks or low points where water collects
          and evaporates.
      fabric:
        appearance: Water staining on fabric manifests as dark, damp-looking spots or light, crusty residues, often altering
          the color and texture to feel stiff or rough.
        coverage: Coverage ranges from small spots to large areas, with variation based on fabric absorbency and the amount
          of water involved.
        pattern: Stains typically form as irregular patches or rings, spreading along fibers or where water has been absorbed,
          such as from spills or humidity.
      glass:
        appearance: Water marks on glass appear as hazy, white, or cloudy spots, often with mineral residues that can feel
          gritty and obscure transparency.
        coverage: Coverage is generally light and spotty, varying from isolated marks to widespread haziness, especially in
          hard water areas.
        pattern: Stains usually form as spots or streaks, concentrated where water droplets evaporate, such as edges or in
          random distributions from splashing.
      metal:
        appearance: Water stains on metal appear as dull, discolored patches, often with rust-colored or whitish deposits
          that can feel rough or etched.
        coverage: Coverage is usually localized to exposed surfaces, varying from small spots to larger patches depending
          on water exposure and material finish.
        pattern: Stains typically form irregular spots or streaks, following water flow paths or pooling areas, and may concentrate
          at edges or joints.
      mineral:
        appearance: Water staining on minerals shows as discolored, dull patches or crystalline deposits, often altering the
          natural luster and feeling gritty or dissolved.
        coverage: Coverage is usually localized and uneven, varying with mineral hardness and exposure, from minor spots to
          significant discoloration.
        pattern: Stains typically form as spots or streaks, concentrated along cleavage planes or fractures where water interacts
          and leaves residues.
      plastic:
        appearance: Water marks on plastic manifest as cloudy, whitish, or discolored areas, often with a hazy finish that
          can feel slightly sticky or etched.
        coverage: Coverage is often light and patchy, varying with plastic type and exposure, from minor spots to broader
          discoloration in humid environments.
        pattern: Stains usually form as spots or streaks, distributed unevenly where water sits or evaporates, and may follow
          surface imperfections.
      rubber:
        appearance: Water marks on rubber show as dark, discolored patches or white, chalky residues, often with a dull finish
          that may feel tacky or degraded.
        coverage: Coverage is usually localized and patchy, varying with rubber type and age, from minor spots to larger discolored
          areas.
        pattern: Stains commonly appear as spots or streaks, following surface contours or areas of water retention, and may
          be more visible on lighter colors.
      semiconductor:
        appearance: Water marks on semiconductors appear as hazy, discolored areas or corrosion spots, often with a dull finish
          that can indicate oxidation or contamination.
        coverage: Coverage is typically minimal and localized, varying with protective coatings, but even small areas can
          impair functionality.
        pattern: Stains usually form as small spots or streaks, distributed on exposed surfaces or at connections where moisture
          leads to electrical issues.
      specialty:
        appearance: Water staining on specialty materials varies widely but often shows as discolored, degraded patches or
          residues, tailored to the material's unique composition and finish.
        coverage: Coverage is highly variable, from isolated marks to widespread effects, depending on the material's susceptibility
          and environmental factors.
        pattern: Stains form based on material properties, such as spots on coatings or streaks on laminates, following water
          exposure paths specific to the application.
      stone:
        appearance: Water staining on stone manifests as dark, damp-looking patches or light mineral deposits, often altering
          the natural color and creating a rough or slick surface.
        coverage: Coverage is often patchy and localized, varying with stone porosity and exposure, from small spots to broad
          areas in humid conditions.
        pattern: Stains typically form irregular patches or streaks, following surface contours or cracks where water accumulates
          or evaporates.
      wood:
        appearance: Water marks on wood show as dark or light discolored areas, often with a cloudy or blotchy finish that
          may raise the grain or cause swelling.
        coverage: Coverage ranges from small spots to extensive areas, with variation based on wood porosity and the duration
          of water contact.
        pattern: Stains commonly appear as irregular patches or rings, spreading along the wood grain or forming where water
          has pooled or dripped.
