  visual:
    appearance_on_categories:
      presentation: descriptive
      items:
      - appearance_on_categories:
          ceramic:
            appearance: White, powdery deposits that may look like a thin crust or film, sometimes causing slight discoloration
              or a gritty feel.
            coverage: Localized coverage, typically in small to moderate amounts, with variation based on surface finish and
              usage.
            pattern: Commonly appears as spots or patches, particularly in glazed areas with micro-cracks or unglazed sections.
          composite:
            appearance: White or grayish deposits that may look powdery or embedded, depending on the composite material,
              often blending with surface textures.
            coverage: Variable coverage, from sparse to moderate, influenced by composite composition and environmental conditions.
            pattern: Irregular spots or patches, concentrating in porous or fibrous regions of the composite structure.
          concrete:
            appearance: White, crystalline efflorescence that appears powdery or crust-like, often leading to surface pitting
              and discoloration.
            coverage: Extensive in affected areas, with high variation depending on concrete age, mix, and environmental exposure.
            pattern: Forms in patches or blotches, commonly along joints, cracks, or porous sections where salts migrate.
          fabric:
            appearance: White or yellowish stains that may look powdery or crusty, often stiffening the fabric and altering
              its color.
            coverage: Partial coverage, usually in localized stains, with amount varying based on fabric absorbency and fertilizer
              concentration.
            pattern: Appears as spots or streaks, following the weave pattern and concentrating in areas with moisture or
              direct contact.
          glass:
            appearance: Hazy or cloudy white film that can appear as fine crystals or streaks, reducing transparency and creating
              a frosted look.
            coverage: Often uniform or streaky coverage, with amount depending on exposure to splashing or condensation.
            pattern: Usually forms as streaks or uniform layers, especially on vertical surfaces where runoff occurs.
          metal:
            appearance: White or grayish crystalline crusts that may appear powdery or flaky, often with a dull, matte finish.
            coverage: Partial coverage, usually localized to areas exposed to fertilizer, with high variation depending on
              environmental conditions.
            pattern: Typically forms in irregular spots or streaks, concentrating in crevices, joints, or areas with surface
              imperfections.
          mineral:
            appearance: White or colored crystalline deposits that may look like a crust or coating, often altering the mineral's
              luster and texture.
            coverage: Variable coverage, from light films to heavy encrustations, influenced by mineral type and conditions.
            pattern: Irregular spots or uniform layers, depending on mineral porosity and exposure to fertilizer solutions.
          plastic:
            appearance: White, chalky residue that can appear as a film or speckles, often adhering loosely and potentially
              causing slight clouding.
            coverage: Generally light and patchy coverage, varying with plastic type and exposure to fertilizer spray or dust.
            pattern: Forms in spots or streaks, with accumulation in textured areas or where static charge attracts particles.
          rubber:
            appearance: White, powdery or crystalline coatings that can appear as a film, sometimes causing a tacky or rough
              surface texture.
            coverage: Light to moderate coverage, often uneven and dependent on rubber formulation and exposure intensity.
            pattern: Typically forms in patches or streaks, with a tendency to accumulate in grooves or on flexible areas.
          semiconductor:
            appearance: Fine, white particulate or film that may appear as microscopic crystals, potentially causing hazing
              or corrosion on sensitive surfaces.
            coverage: Minimal and often uniform coverage, but critical in small amounts due to potential device failure.
            pattern: Typically forms as uniform layers or localized spots, especially in areas with electrostatic attraction
              or contamination.
          specialty:
            appearance: Varies widely; may include white crystalline deposits, discoloration, or texture changes specific
              to the material, such as coatings or advanced composites.
            coverage: Highly variable, ranging from negligible to significant, based on specialty material composition and
              exposure context.
            pattern: Dependent on material properties, often appearing as spots, streaks, or uniform layers in vulnerable
              areas.
          stone:
            appearance: White or off-white crystalline efflorescence that may look powdery or crusty, often altering the stone's
              natural color and texture.
            coverage: Partial to extensive coverage, varying with stone porosity and environmental factors like humidity.
            pattern: Forms in patches or blotches, commonly in porous regions or along cracks and edges where moisture collects.
          wood:
            appearance: White, chalky deposits that can penetrate the grain, causing a rough texture and potential discoloration
              to yellowish or brownish hues.
            coverage: Variable coverage, ranging from small patches to extensive areas, influenced by wood type and exposure
              duration.
            pattern: Often appears as patches or streaks following the wood grain, with more accumulation in porous or unfinished
              areas.
