  visual_characteristics:
    appearance_on_categories:
      ceramic:
        appearance: PCB oil on ceramic surfaces appears as dark, greasy stains that may bead up or soak in slightly, often
          with a shiny, discolored look.
        coverage: Coverage is typically uneven, ranging from isolated spots to broader areas, with less absorption on glazed
          surfaces.
        pattern: It forms spots, streaks, or patches, with patterns influenced by glazing and porosity, sometimes pooling
          in imperfections.
      composite:
        appearance: PCB oil on composites shows as dark, greasy stains that may seep into layers, causing discoloration and
          a glossy, uneven finish.
        coverage: Coverage is often patchy and variable, concentrated in porous or damaged areas, and can spread along composite
          boundaries.
        pattern: It typically forms irregular patches or streaks, following material interfaces and porosity, with potential
          for delamination effects.
      concrete:
        appearance: On concrete, PCB oil contamination shows as dark, penetrating stains that darken the surface, often with
          a greasy film and possible efflorescence.
        coverage: Coverage is usually patchy and localized, concentrated in porous areas, and can vary from minor to extensive
          if oil penetrates deeply.
        pattern: It forms irregular patches or streaks, seeping into pores and cracks, with patterns influenced by surface
          roughness and porosity.
      fabric:
        appearance: PCB oil on fabric manifests as dark, oily stains that soak into fibers, causing discoloration and a greasy,
          matted texture.
        coverage: Coverage is typically uneven, from small spots to large stained areas, with deeper saturation in more absorbent
          fabrics.
        pattern: It often appears as blotches or streaks, following the weave pattern and spreading through capillary action
          in the material.
      glass:
        appearance: On glass, PCB oil contamination shows as translucent to opaque smears or films, often with rainbow-like
          iridescence and a greasy feel.
        coverage: Coverage can be partial with streaks or nearly uniform in thin layers, varying with the amount of oil and
          application method.
        pattern: It usually appears as streaks, smudges, or uniform layers, spreading smoothly due to the non-porous surface
          and surface tension effects.
      metal:
        appearance: PCB oil contamination on metal appears as dark, greasy stains with a glossy or oily sheen, often dark
          brown to black in color.
        coverage: Coverage is usually partial and uneven, ranging from small localized areas to extensive sections, depending
          on exposure and surface geometry.
        pattern: It typically forms irregular spots, streaks, or patches, concentrating in crevices and low-lying areas due
          to gravity and surface tension.
      mineral:
        appearance: PCB oil on minerals appears as dark, oily coatings that may alter the natural color and luster, giving
          a greasy, stained look.
        coverage: Coverage is often uneven and partial, ranging from small specks to broader coatings, depending on mineral
          porosity and exposure.
        pattern: It typically forms spots, films, or patches, adhering to crystal faces and fissures, with patterns shaped
          by mineral structure.
      plastic:
        appearance: On plastic, PCB oil contamination appears as oily, dark smudges or films that can cause clouding or discoloration,
          with a slick surface.
        coverage: Coverage varies from localized smudges to extensive films, depending on plastic type and exposure, usually
          not uniform.
        pattern: It often spreads as smears, spots, or uniform coatings, adhering to the surface and potentially penetrating
          micro-cracks.
      rubber:
        appearance: On rubber, PCB oil appears as dark, absorbed stains that can swell or soften the material, with a greasy,
          discolored surface.
        coverage: Coverage can range from surface spots to extensive penetration, often uneven due to rubber's absorbent nature
          and composition.
        pattern: It usually forms blotchy patches or uniform absorption, spreading through the material's pores and causing
          potential degradation.
      semiconductor:
        appearance: On semiconductors, PCB oil contamination appears as thin, oily films or residues that can cause hazing,
          discoloration, or interference with optical properties.
        coverage: Coverage can be nearly uniform in thin films or spotty, with minimal variation due to the high-precision,
          smooth nature of semiconductor materials.
        pattern: It usually forms uniform layers or localized smudges, spreading smoothly over the precise surfaces and potentially
          affecting circuitry.
      specialty:
        appearance: PCB oil on specialty materials appears as dark, greasy stains or films, with variations based on specific
          composition, such as altered texture or color.
        coverage: Coverage is highly variable and material-dependent, ranging from isolated areas to widespread films, tailored
          to the specialty application.
        pattern: It forms patterns like spots, streaks, or patches, influenced by the material's unique properties, such as
          reactivity or surface treatment.
      stone:
        appearance: PCB oil on stone appears as dark, penetrating stains that may darken the surface, often with a greasy
          film and possible discoloration.
        coverage: Coverage is often patchy and localized, concentrated in porous regions, and can range from minor spots to
          extensive areas if untreated.
        pattern: It typically forms irregular patches or streaks, seeping into pores and cracks, with patterns influenced
          by the stone's texture and porosity.
      wood:
        appearance: On wood, PCB oil manifests as dark, soaked-in stains that can darken the grain, giving a wet, discolored
          look with a possible oily residue.
        coverage: Coverage varies from small spots to large areas, with deeper penetration in more absorbent woods, leading
          to inconsistent coverage.
        pattern: It often spreads in blotchy patches or along the wood grain, following the porous structure and absorption
          pathways.
