  visual:
    appearanceOnCategories:
      presentation: descriptive
      items:
      - appearanceOnCategories:
          ceramic:
            appearance: Dust settles as a soft, powdery coating in neutral colors like gray or white, dulling the glossy or
              matte finish.
            coverage: Coverage is generally partial, ranging from light dusting on smooth surfaces to heavier deposits in
              recesses.
            pattern: Distribution is often patchy or streaky, with accumulation in textured areas and corners due to static
              or handling.
          composite:
            appearance: Dust appears as a heterogeneous layer in earthy shades, adhering to varied textures and potentially
              embedding in fibers.
            coverage: Coverage ranges from sparse to dense, often uneven due to the composite's mixed nature and exposure
              conditions.
            pattern: Distribution is irregular, with patches and streaks influenced by material composition and surface roughness.
          concrete:
            appearance: Dust forms a coarse, grayish layer that blends with the surface, giving a weathered, dusty finish
              to the rough texture.
            coverage: Coverage is typically moderate to heavy, with dense buildup in sheltered areas and lighter on exposed,
              smooth parts.
            pattern: It accumulates in patches and streaks, following surface imperfections and often concentrated in pores
              or cracks.
          fabric:
            appearance: Dust appears as a fuzzy, light-colored layer in gray or beige, clinging to fibers and creating a dull,
              textured look.
            coverage: Coverage varies from light to heavy, often concentrated in high-traffic or static-prone zones.
            pattern: Distribution is patchy, with accumulation along folds, seams, and porous areas due to fabric weave and
              usage.
          glass:
            appearance: Dust appears as a fine, translucent to opaque film in light gray, reducing clarity and leaving a smudgy
              residue.
            coverage: Coverage is usually light to moderate, varying with exposure; vertical glass may have uneven dust layers.
            pattern: It forms streaks and spots, often uniform on flat surfaces but patchy near edges or from airflow disturbances.
          metal:
            appearance: Environmental dust appears as a fine, grayish layer that dulls the metallic shine and can feel gritty
              to the touch.
            coverage: Coverage is typically partial to full, varying with exposure; sheltered spots may have less dust.
            pattern: It often forms in streaks or patches, influenced by airflow and surface orientation, with accumulation
              in recessed areas.
          mineral:
            appearance: Dust settles as a fine, earthy coating in colors like gray or brown, masking the mineral's luster
              and crystalline features.
            coverage: Coverage ranges from sparse to partial, varying with mineral hardness and exposure to dust sources.
            pattern: Distribution is irregular, with spots and patches adhering to crystalline structures or cleavage planes.
          plastic:
            appearance: Dust forms a fine, light-colored layer, often gray or beige, that can cling electrostatically and
              feel slightly abrasive.
            coverage: Coverage is typically light to moderate, with variations based on surface smoothness and environmental
              factors.
            pattern: It tends to be uniform on smooth surfaces but may show streaks or spots on textured or charged areas.
          rubber:
            appearance: Dust settles as a dark, gritty film in gray or black tones, sticking to the flexible surface and appearing
              matte.
            coverage: Coverage is usually partial, with heavier buildup in crevices and lighter on smooth, exposed areas.
            pattern: It forms in patches and streaks, accumulating in grooves or low spots from movement and environmental
              settling.
          semiconductor:
            appearance: Dust appears as an ultra-fine, light-colored film, often gray or white, that can cause micro-scratches
              and reduce surface reflectivity.
            coverage: Coverage is typically minimal but critical, with even light dust posing risks to functionality in controlled
              environments.
            pattern: It tends to be uniform or speckled, with distribution influenced by static charges and cleanroom conditions.
          specialty:
            appearance: Dust forms a variable layer depending on the material, often in neutral hues, adapting to unique surfaces
              like coatings or sensitive finishes.
            coverage: Coverage varies widely, from negligible to significant, based on the material's properties and exposure
              levels.
            pattern: Distribution is highly irregular, tailored to the specialty item's shape, texture, and environmental
              interactions.
          stone:
            appearance: Dust creates a muted, dusty layer in gray or beige hues, blending with the stone's natural color and
              rough texture.
            coverage: Coverage is typically partial, with denser buildup in indentations and lighter coverage on smooth, exposed
              areas.
            pattern: It accumulates in patches and streaks, following surface contours and crevices for an irregular distribution.
          wood:
            appearance: Dust settles as a light, powdery film in earthy tones like gray or brown, clinging to the grain and
              rough textures.
            coverage: Coverage ranges from sparse to moderate, often heavier on horizontal surfaces and less on vertical ones.
            pattern: Distribution is uneven, with patches and streaks along grooves or raised areas due to surface irregularities.
