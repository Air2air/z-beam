  visual_characteristics:
    appearance_on_categories:
      ceramic:
        appearance: Residues on ceramic surfaces appear as glossy films, powdery residues, or stained patches, often in white,
          yellow, or brown shades, altering the smooth or glazed finish.
        coverage: Coverage is usually sparse and uneven, with residues covering small, discrete areas and varying based on
          application or spill dynamics.
        pattern: They form irregular spots or smears, frequently concentrated in grooves, seams, or unglazed areas, due to
          the material's low absorption and surface tension effects.
      composite:
        appearance: Residues on composites appear as heterogeneous films, powdery deposits, or stained regions, often in varied
          colors like off-white or brown, interacting differently with embedded materials.
        coverage: Coverage is generally low and variable, with residues concentrated in specific areas and overall spread
          depending on surface texture and drug properties.
        pattern: They form irregular patterns such as spots or streaks, influenced by the composite's mixed composition, with
          residues accumulating at material interfaces or porous sections.
      concrete:
        appearance: On concrete, residues manifest as efflorescence-like crystals, stained patches, or faint films, often
          in white, gray, or yellowish hues, blending with the rough, porous surface.
        coverage: Coverage is typically low and scattered, with residues covering small areas unevenly, influenced by concrete
          porosity and environmental factors.
        pattern: Distribution is irregular, with residues forming random spots or patches that follow surface cracks and pores,
          due to capillary action and evaporation.
      fabric:
        appearance: Drug residues on fabric appear as damp stains, powdery spots, or discolored areas, often in shades like
          yellow, brown, or white, altering the texture to feel stiff or crusty.
        coverage: Coverage is variable, from small, isolated spots to larger stained areas, depending on fabric type and the
          amount of residue deposited.
        pattern: They typically form irregular patches or streaks, following the weave pattern and absorption paths, with
          residues spreading along fibers or concentrated in folds.
      glass:
        appearance: On glass, residues are visible as hazy films, smears, or fine crystalline deposits, often transparent
          or lightly tinted (e.g., yellowish), reducing clarity and leaving a greasy or streaked finish.
        coverage: Coverage varies from light, uniform films in some areas to heavy, localized streaks, typically not extensive
          but noticeable in affected zones.
        pattern: Distribution is often streaky or patchy, following the paths of liquid spills or wiping, with residues clinging
          to edges or imperfections in the glass surface.
      metal:
        appearance: Pharmaceutical drug residues on metal often appear as faint, translucent films or crystalline deposits,
          sometimes with a slight discoloration like yellowish or white hues, depending on the drug's chemical properties.
        coverage: Coverage is usually sparse and patchy, varying from isolated spots to localized areas, with higher accumulation
          in hard-to-clean regions.
        pattern: Residues typically form irregular spots or streaks, often concentrated in crevices, joints, or areas with
          surface imperfections, due to adhesion and drying processes.
      mineral:
        appearance: Residues on minerals appear as crystalline deposits, thin films, or discolored zones, often in pale colors
          like white or transparent, which can alter the natural luster and texture.
        coverage: Coverage is generally minimal and localized, varying from sparse crystals to small clusters, depending on
          mineral type and exposure conditions.
        pattern: They form spotty or streaky patterns, influenced by the mineral's crystal structure and surface defects,
          with residues accumulating in fissures or low-energy sites.
      plastic:
        appearance: On plastic, drug residues manifest as oily films, crystalline crusts, or discolored areas, often in translucent
          or light colors like white, which can make surfaces appear dull or sticky.
        coverage: Coverage ranges from light, widespread films to heavy, localized patches, influenced by plastic type and
          exposure conditions.
        pattern: Distribution is typically patchy or streaky, with residues adhering to static-prone areas or imperfections,
          and sometimes forming uniform layers if applied evenly.
      rubber:
        appearance: On rubber, residues are seen as sticky films, powdery coatings, or discolored patches, often in dark or
          muted tones like gray or brown, which can make the surface tacky or matte.
        coverage: Coverage tends to be moderate and irregular, with patches varying in size and density based on rubber flexibility
          and exposure duration.
        pattern: Distribution is often blotchy or streaky, with residues penetrating micro-cracks or adhering to textured
          areas, leading to uneven absorption and drying.
      semiconductor:
        appearance: On semiconductors, residues are visible as microscopic films, particulate deposits, or hazy coatings,
          often transparent or lightly colored, which can interfere with electronic properties and surface smoothness.
        coverage: Coverage is typically very low and controlled, ranging from near-uniform nanoscale films to isolated contaminants,
          critical for device performance.
        pattern: Distribution is often uniform or speckled at a micro-scale, with residues forming thin layers or isolated
          spots due to precise manufacturing and contamination control.
      specialty:
        appearance: Residues on specialty materials (e.g., advanced polymers or coatings) appear as tailored films, discolored
          areas, or particulate deposits, with appearances varying widely based on specific material properties and drug interactions.
        coverage: Coverage is highly variable and application-specific, ranging from minimal, precise deposits to extensive
          coatings, designed for functional or experimental purposes.
        pattern: Distribution depends on the material's unique structure, often forming custom patterns like uniform layers
          or targeted spots, influenced by application methods and surface characteristics.
      stone:
        appearance: Drug residues on stone surfaces appear as subtle films, efflorescence-like crystals, or discolored areas,
          often in pale colors such as white or gray, blending with the stone's rough texture.
        coverage: Coverage is generally minimal and inconsistent, ranging from isolated specks to small clusters, depending
          on exposure and cleaning history.
        pattern: They typically form random spots or patches, influenced by surface porosity and environmental factors, with
          residues accumulating in cracks or low-lying areas.
      wood:
        appearance: On wood, residues may manifest as damp-looking stains, powdery deposits, or discolored patches, often
          in shades of brown, yellow, or white, altering the natural grain and texture.
        coverage: Coverage tends to be low to moderate, with variations based on wood porosity, resulting in scattered patches
          rather than uniform layers.
        pattern: Distribution is commonly uneven, with residues forming blotches or streaks that follow the wood's porous
          structure, leading to irregular absorption patterns.
