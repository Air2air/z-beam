  visual:
    appearance_on_categories:
      presentation: descriptive
      items:
      - appearance_on_categories:
          ceramic:
            appearance: Deposits on ceramic surfaces appear as dull, discolored spots with a gummy or flaky texture, often
              reducing gloss and clarity.
            coverage: Coverage is usually uneven, from minor spots to larger patches, varying with surface finish and exposure.
            pattern: They form irregular patches or spots, clustering in grooves or unglazed areas, and may show a mottled
              distribution.
          composite:
            appearance: Deposits on composites appear as dull, stained patches with a rough or tacky texture, often obscuring
              the underlying material layers.
            coverage: Coverage is typically partial and variable, from minor spots to significant areas, depending on composite
              structure and exposure.
            pattern: They form irregular spots or streaks, concentrating at joints or weak points, and may show a mottled
              or uneven spread.
          concrete:
            appearance: On concrete, these deposits appear as dark, greasy stains with a rough or flaky texture, often penetrating
              the porous surface.
            coverage: Coverage is typically partial and variable, ranging from isolated spots to widespread areas, influenced
              by concrete porosity and conditions.
            pattern: They form irregular patches or streaks, concentrating in cracks or low areas, and may show a blotchy
              or mottled pattern.
          fabric:
            appearance: Deposits on fabric manifest as stiff, discolored areas with a crusty or sticky texture, often darkening
              the fibers and reducing flexibility.
            coverage: Coverage is generally uneven, from small stains to large patches, varying with fabric type and contamination
              source.
            pattern: Distribution is patchy or streaky, following weave patterns or accumulating in folds, and may appear
              as spots or smears.
          glass:
            appearance: On glass, degraded polymer deposits look like hazy, smeared films with a sticky residue, often showing
              rainbow-like discoloration.
            coverage: Coverage can range from light, even films to heavy, localized streaks, with variation based on application
              and cleaning.
            pattern: They appear as streaks or uniform layers, spreading from points of contact and sometimes forming droplets
              or patches.
          metal:
            appearance: Degraded polymer deposits on metal appear as dull, discolored patches, often with a sticky or flaky
              texture and a matte finish.
            coverage: Coverage is usually partial, ranging from small, isolated patches to larger areas, with significant
              variation depending on environmental conditions.
            pattern: They typically form irregular spots or streaks, concentrated in areas of contact or exposure, and may
              spread unevenly.
          mineral:
            appearance: Deposits on minerals look like dull, discolored coatings with a sticky or crusty texture, often masking
              the natural luster and color.
            coverage: Coverage ranges from thin, even layers to thick, localized patches, with variation based on mineral
              type and exposure.
            pattern: They appear as irregular patches or uniform films, adhering to crystal faces or fractures, and may form
              streaks or spots.
          plastic:
            appearance: On plastic, these deposits manifest as cloudy, discolored areas with a sticky or cracked texture,
              often causing surface dullness.
            coverage: Coverage ranges from small, isolated areas to extensive patches, with variation due to plastic type
              and degradation factors.
            pattern: Distribution is patchy or streaky, often following stress lines or edges, and can appear as blotches
              or uniform films.
          rubber:
            appearance: On rubber, degraded polymer deposits look like dark, sticky films with a cracked or gummy texture,
              often leading to surface hardening.
            coverage: Coverage can range from light films to heavy, extensive layers, with variation based on rubber composition
              and use.
            pattern: They appear as patches or uniform layers, spreading from high-wear areas and sometimes forming cracks
              or blisters.
          semiconductor:
            appearance: On semiconductors, degraded polymer deposits manifest as hazy, discolored residues with a sticky or
              particulate texture, often causing surface defects.
            coverage: Coverage is usually minimal but critical, ranging from isolated spots to thin layers, with high variation
              affecting performance.
            pattern: Distribution is typically uniform or spotty, concentrating on active areas or edges, and may appear as
              micro-scale patches or films.
          specialty:
            appearance: Deposits on specialty materials appear as dull, stained areas with texture variations like sticky
              or flaky, tailored to the specific surface properties.
            coverage: Coverage is highly variable, from sparse spots to extensive areas, depending on the material's unique
              composition and usage.
            pattern: They form irregular patterns such as patches or streaks, adapting to material idiosyncrasies like coatings
              or embedded elements.
          stone:
            appearance: Deposits on stone appear as discolored, often dark or yellowish films with a tacky or crusty texture,
              dulling the surface.
            coverage: Coverage is typically partial and variable, ranging from small spots to widespread areas, influenced
              by stone type and weathering.
            pattern: They form irregular patches or streaks, concentrating in porous areas or along edges, and may appear
              blotchy.
          wood:
            appearance: On wood, these deposits manifest as dark, greasy stains with a rough or gummy texture, often altering
              the natural grain and finish.
            coverage: Coverage is generally uneven, from sparse spots to extensive patches, varying with wood porosity and
              exposure.
            pattern: Distribution is patchy or streaky, following the wood's grain or accumulating in crevices and low spots.
