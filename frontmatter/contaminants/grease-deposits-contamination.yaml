  visual_characteristics:
    appearance_on_categories:
      ceramic:
        appearance: Grease shows as dark, greasy smears with a shiny, wet look and a smooth, oily texture on the glazed surface.
        coverage: Coverage is generally light and localized, varying from thin films to thicker accumulations in crevices.
        pattern: It tends to form spots or streaks, particularly around rims or handles, with smearing from use or cleaning.
      composite:
        appearance: Grease manifests as dark, greasy areas that may seep into pores, creating a shiny, wet appearance and
          a sticky feel.
        coverage: Coverage is usually uneven and partial, with variations based on composite porosity and exposure levels.
        pattern: It typically appears as irregular patches or streaks, influenced by the material's texture and fiber orientation.
      concrete:
        appearance: Grease manifests as dark, oily patches that penetrate the porous surface, creating a glossy, damp look
          and a slick feel.
        coverage: Coverage is generally patchy and low to moderate, varying with concrete texture and exposure to spills.
        pattern: It forms irregular spots or streaks, often in high-traffic areas, with potential for pooling in cracks or
          low spots.
      fabric:
        appearance: Grease appears as dark, greasy stains that soak into fibers, giving a wet, shiny spot with a oily, stiff
          texture.
        coverage: Coverage is typically localized and sparse, limited to contact areas, with high variation in stain intensity.
        pattern: It usually forms blotches or smears, often with feathering edges, and may spread along weave patterns.
      glass:
        appearance: Grease appears as translucent to opaque smudges with a rainbow-like sheen, feeling slick and reducing
          transparency.
        coverage: Coverage is usually minimal and uneven, often in small areas like edges or contact points, with high variation.
        pattern: It commonly forms streaks and fingerprints from handling, or as droplets and smears from splattering.
      metal:
        appearance: Grease appears as a thick, dark brown or black coating with a glossy, oily sheen and a sticky, viscous
          texture.
        coverage: Coverage is typically partial, varying from thin films on surfaces to thick accumulations in crevices, depending
          on usage.
        pattern: It often forms irregular streaks and patches, concentrated around moving parts or joints, with drips and
          smears from application.
      mineral:
        appearance: Grease shows as dark, oily coatings that may fill crevices, giving a shiny, wet appearance and a slippery
          texture.
        coverage: Coverage is usually sparse and uneven, dependent on mineral hardness and porosity, often limited to surface
          contact.
        pattern: It typically appears as spots or smears, concentrated on exposed surfaces, with minimal spreading on non-porous
          types.
      plastic:
        appearance: Grease appears as dark, oily stains that bead up or spread, giving a glossy finish and a slippery, tacky
          texture.
        coverage: Coverage ranges from sparse spots to moderate, even layers, depending on surface smoothness and contact
          duration.
        pattern: It often forms droplets, smears, or patches, with potential for uniform thin layers on smooth surfaces.
      rubber:
        appearance: Grease shows as dark, oily coatings that can be absorbed, resulting in a glossy, swollen look and a greasy,
          flexible texture.
        coverage: Coverage varies from light films to heavy layers, commonly uneven due to rubber's absorbency and movement.
        pattern: It often forms smears or patches, especially on exposed surfaces, with potential for uniform coverage on
          flexible parts.
      semiconductor:
        appearance: Grease appears as thin, oily films or droplets with a slight sheen, potentially causing hazing and a slick,
          contaminating texture.
        coverage: Coverage is minimal and highly variable, typically sparse to avoid interference, but can be uniform in contaminated
          zones.
        pattern: It often forms micro-spots or uniform layers, particularly on sensitive areas, with smearing from handling.
      specialty:
        appearance: Grease manifests variably, often as dark, greasy marks with a shiny finish and sticky texture, tailored
          to the material's properties.
        coverage: Coverage ranges from minimal to moderate, uneven and context-dependent, adapting to the material's unique
          requirements.
        pattern: It forms patterns based on application, such as spots or streaks, influenced by the specialty surface characteristics.
      stone:
        appearance: Grease manifests as dark, oily patches that contrast with the stone's surface, creating a glossy, wet
          appearance and a slippery feel.
        coverage: Coverage is typically patchy and low, confined to exposed areas, and varies with surface porosity and exposure.
        pattern: It forms irregular spots or smears, often concentrated in depressions or along edges, with potential for
          runoff patterns.
      wood:
        appearance: Grease shows as dark, greasy stains that penetrate the grain, giving a wet, shiny look and a slick, oily
          texture.
        coverage: Coverage is generally sparse and uneven, limited to areas of direct contact or spillage, with minimal spread.
        pattern: It usually appears as localized spots or patches, often with smearing from contact, and may follow the wood
          grain in streaks.
