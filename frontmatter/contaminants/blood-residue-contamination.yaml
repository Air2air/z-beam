  visual_characteristics:
    presentation: collapsible
    items:
      - appearance_on_categories:
          ceramic:
            appearance: >-
              On ceramic, blood stains are reddish-brown to dark, with a glossy or matte finish matching the glaze, and
              may appear slightly raised if dried.
            coverage: >-
              Typically sparse to moderate, ranging from small droplets to larger smears, with uneven distribution based
              on surface texture.
            pattern: >-
              It distributes as spots, streaks, or patches, with smooth edges on glazed surfaces and potential
              absorption into unglazed areas.
          composite:
            appearance: >-
              On composites, blood appears as reddish-brown to dark stains, with a variable finish from matte to glossy
              depending on the material blend and surface treatment.
            coverage: >-
              Coverage ranges from sparse to moderate, often uneven with variations in absorption across different
              components of the composite.
            pattern: >-
              It may form irregular spots, streaks, or patches, with distribution influenced by porosity and texture of
              the composite layers.
          concrete:
            appearance: >-
              On concrete, blood stains are dark reddish-brown to blackish, with a matte, rough texture that may seep
              into pores and appear crusty when dry.
            coverage: >-
              Typically sparse to moderate, varying from isolated drops to larger stains, with inconsistent absorption
              due to the porous nature.
            pattern: It forms irregular spots, patches, or pooled areas, often with spreading into cracks and uneven surfaces.
          fabric:
            appearance: >-
              Blood residue on fabric appears as dark reddish-brown to brownish stains, often with a dull, absorbed look
              that may stiffen the fibers as it dries.
            coverage: >-
              Coverage can range from small spots to extensive areas, varying with fabric type and absorbency, often
              showing saturation gradients.
            pattern: >-
              It spreads in irregular patches, spots, or streaks, with feathering edges and potential for wicking along
              threads or weaves.
          glass:
            appearance: >-
              Blood residue on glass appears as translucent to opaque reddish-brown smears or droplets, often with a
              shiny or reflective quality when wet.
            coverage: >-
              Coverage is usually light to moderate, with variations from fine spatter to larger smears, often
              concentrated at impact sites.
            pattern: >-
              It tends to form streaks, splatters, or pooled areas, with clear definition on the smooth surface and
              possible running if inclined.
          metal:
            appearance: >-
              Blood residue on metal often appears as reddish-brown to dark brown stains, with a glossy or matte finish
              depending on the metal's surface texture.
            coverage: >-
              Coverage is usually sparse to moderate, varying from isolated droplets to larger patches, with uneven
              distribution based on the force and angle of contact.
            pattern: >-
              It typically forms irregular spots, streaks, or splatters due to the non-porous nature, often
              concentrating at impact points or along edges.
          mineral:
            appearance: >-
              Blood on minerals shows as reddish-brown to dark stains, with a finish ranging from glossy on smooth
              crystals to matte on rough surfaces, possibly altering color slightly.
            coverage: >-
              Coverage is usually sparse, with variations from tiny droplets to small accumulations, often uneven based
              on mineral hardness and porosity.
            pattern: >-
              It distributes as spots, streaks, or patches, with irregular edges and potential for absorption in porous
              minerals or beading on non-porous ones.
          plastic:
            appearance: >-
              Blood residue on plastic shows as reddish-brown to dark stains, often with a smooth, slightly glossy
              surface that may bead up or smear easily.
            coverage: >-
              Coverage is usually light to moderate, varying from isolated drops to larger patches, with inconsistent
              spread due to low absorption.
            pattern: >-
              It forms spots, streaks, or smears, with defined edges on non-porous plastics and potential for pooling in
              textured areas.
          rubber:
            appearance: >-
              Blood on rubber manifests as dark reddish-brown stains, with a matte or slightly textured surface that can
              appear smeared or absorbed.
            coverage: >-
              Usually sparse to moderate, with variations from small droplets to larger areas, and uneven distribution
              due to surface elasticity and texture.
            pattern: >-
              It typically forms spots, smears, or patches, with possible spreading into pores or grooves of the rubber
              material.
          semiconductor:
            appearance: >-
              Blood residue on semiconductors appears as reddish-brown to dark micro-stains, with a smooth, often glossy
              surface that may interfere with electronic properties.
            coverage: >-
              Typically very sparse, limited to microscopic areas, with minimal variation due to the sensitive and clean
              nature of semiconductor materials.
            pattern: >-
              It forms fine spots, streaks, or smears, with precise distribution influenced by the highly controlled,
              non-porous surface and potential for contamination in circuits.
          specialty:
            appearance: >-
              On specialty materials, blood stains vary widely but generally appear reddish-brown to dark, adapting to
              unique surfaces like coatings or composites with mixed finishes.
            coverage: >-
              Coverage ranges from sparse to moderate, with high variation based on the material's design, often uneven
              and tailored to its specialized use.
            pattern: >-
              Distribution depends on material properties, forming spots, streaks, or patches with irregular patterns
              influenced by specific porosity and texture.
          stone:
            appearance: >-
              Blood on stone shows as reddish-brown to dark stains, with a matte or slightly glossy look depending on
              the stone's porosity and finish.
            coverage: >-
              Typically sparse to moderate, varying from isolated drops to larger accumulations in crevices or low
              points, with inconsistent spread.
            pattern: >-
              It forms spots, streaks, or pooled patches, often with irregular edges and potential for running on
              smoother surfaces.
          wood:
            appearance: >-
              On wood, blood residue soaks in, creating dark reddish-brown to blackish stains that may appear dull or
              slightly raised as it dries.
            coverage: >-
              Coverage ranges from small spots to extensive areas, often uneven with deeper saturation in more absorbent
              parts of the wood.
            pattern: >-
              It spreads in irregular patches or along the grain, with possible feathering edges due to the porous
              surface absorbing the liquid.
