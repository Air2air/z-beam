  visual:
    appearance_on_categories:
      presentation: descriptive
      items:
      - appearance_on_categories:
          ceramic:
            appearance: Engine coolant scale on ceramic surfaces looks like white, chalky deposits that can adhere firmly
              and cause slight surface roughness.
            coverage: Coverage is generally localized and uneven, with amounts varying based on exposure duration and cleaning.
            pattern: It tends to form in spots or patches, often accumulating in crevices or where coolant has dried.
          composite:
            appearance: Engine coolant scale on composites shows as white or grayish deposits that can embed in the matrix,
              leading to a rough or stained appearance.
            coverage: Coverage is variable and often partial, depending on the composite's porosity and the extent of contamination.
            pattern: It forms in irregular patches or lines, following the material's texture or coolant exposure points.
          concrete:
            appearance: On concrete, it appears as white, efflorescent deposits that are powdery or crystalline, often leading
              to surface pitting.
            coverage: Coverage is often extensive and variable, ranging from small spots to large sections depending on porosity
              and exposure.
            pattern: It typically forms in patches or streaks, concentrating in areas where coolant has pooled or penetrated.
          fabric:
            appearance: Engine coolant scale on fabric manifests as stiff, white or discolored patches that feel crusty and
              may weaken the fibers.
            coverage: Coverage is usually localized and uneven, limited to the contaminated areas unless the fabric is saturated.
            pattern: It forms in irregular spots or stains, often spreading outward from the point of contact with coolant.
          glass:
            appearance: On glass, it manifests as hazy, white films or streaks that can obscure transparency and feel slightly
              abrasive.
            coverage: Coverage is often light to moderate, forming thin layers that may cover large areas if spread by wiping
              or rain.
            pattern: It usually appears as streaks or smears, spreading in the direction of coolant flow or splashing.
          metal:
            appearance: Engine coolant scale appears as white, chalky deposits or rust-colored stains on metal surfaces, often
              with a rough, crusty texture.
            coverage: Coverage is usually partial and localized, varying from small spots to larger areas depending on the
              leak severity.
            pattern: It typically forms in irregular patches or streaks, concentrating in areas where coolant has leaked or
              pooled.
          mineral:
            appearance: Engine coolant scale on minerals shows as white, crusty coatings that can alter the natural luster
              and feel gritty.
            coverage: Coverage is generally partial and spotty, varying with the mineral's surface properties and contamination
              level.
            pattern: Distribution is in irregular patches or layers, often adhering to surfaces where coolant has evaporated.
          plastic:
            appearance: On plastic, it appears as whitish, flaky, or sticky residues that may cause discoloration or a dull
              finish.
            coverage: Coverage is typically light and patchy, but can become more uniform if the plastic is porous or untreated.
            pattern: Distribution is often in random spots or smears, spreading where coolant has contacted and evaporated.
          rubber:
            appearance: On rubber, it appears as whitish, powdery coatings or sticky films that may cause swelling or degradation
              over time.
            coverage: Coverage can range from light, spotty areas to more extensive coatings if the rubber absorbs the coolant.
            pattern: It typically distributes in blotches or uniform layers, especially on surfaces exposed to coolant spills.
          semiconductor:
            appearance: On semiconductors, it appears as microscopic, white or translucent residues that can cause electrical
              failures and surface hazing.
            coverage: Coverage is typically minimal and localized, but even small amounts can lead to significant performance
              issues.
            pattern: It forms in fine, uneven spots or films, often concentrated around edges or contamination points.
          specialty:
            appearance: Engine coolant scale on specialty materials varies but often appears as white, adherent deposits that
              may corrode or degrade unique surfaces.
            coverage: Coverage is highly variable, ranging from isolated spots to widespread areas, influenced by material
              composition and exposure.
            pattern: Distribution depends on the material, but it generally forms in patches or streaks where coolant is present.
          stone:
            appearance: Engine coolant scale on stone appears as white or off-white powdery or crusty residues that can etch
              or stain the surface.
            coverage: Coverage is typically patchy and variable, ranging from small areas to more extensive sections if not
              cleaned promptly.
            pattern: It forms in irregular patches or concentrated spots, often following the path of coolant runoff or pooling.
          wood:
            appearance: On wood, it shows as whitish or grayish crystalline deposits that can feel gritty and may cause discoloration
              or surface damage.
            coverage: Coverage is generally sparse and uneven, limited to exposed areas in contact with the coolant.
            pattern: Distribution is often in random spots or streaks where coolant has splashed or seeped into the wood grain.
