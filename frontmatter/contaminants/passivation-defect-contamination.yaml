description: Uneven oxide layers define passivation-defect contamination, and they form during stainless steel passivation
  when chromium oxide builds irregularly from exposure to air and moisture. This defect exhibits patchy adhesion and resists
  mechanical scraping, thus sets it apart from loose dirt or even rust films, while on chrome-plated steel it clings similarly
  and persists after basic cleaning. Challenges arise from its tight bonding to metal, so laser cleaning succeeds by targeting
  ablation precisely, thus removes layers without harming the durable substrate.
