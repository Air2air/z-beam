  visual_characteristics:
    presentation: descriptive
    items:
    - appearance_on_categories:
        ceramic:
          appearance: Graffiti on ceramic surfaces displays bright colors with a glossy or satin finish, adhering well to
            the smooth glaze but potentially showing brush strokes or drips.
          coverage: Coverage is generally even and dense in applied areas, with little variation unless the surface is textured
            or damaged.
          pattern: It tends to form patches or uniform coatings, often in defined shapes or letters, with minimal spreading
            due to the non-porous surface.
        composite:
          appearance: Graffiti on composite materials appears as varied colors and textures, depending on the mix, often with
            a matte or glossy finish that highlights surface imperfections.
          coverage: Coverage is mixed, with some areas fully covered and others barely touched, leading to high variation
            based on surface composition.
          pattern: It forms irregular patches, streaks, or spots, distributed unevenly across the material due to its heterogeneous
            nature.
        concrete:
          appearance: On concrete, graffiti looks bold and textured, with colors settling into pores and cracks, often appearing
            matte and rough due to the abrasive surface.
          coverage: Coverage ranges from light tagging to heavy layers, with variations in thickness where paint accumulates
            in low spots or wears unevenly.
          pattern: Distribution includes streaks, drips, and patches, commonly clustered on flat walls or corners, with paint
            filling surface irregularities.
        fabric:
          appearance: Graffiti on fabric appears as stained or absorbed colors, often with a soft, blurred texture that can
            spread into the fibers, creating a faded look.
          coverage: Coverage varies from small spots to large stained areas, with uneven saturation depending on fabric type
            and paint viscosity.
          pattern: It typically forms blotches, streaks, or patches, following the weave of the fabric and sometimes bleeding
            into surrounding areas.
        glass:
          appearance: On glass, graffiti appears as vivid, translucent or opaque colors, often with a smooth, shiny finish
            that may include drips or smears if not cleaned quickly.
          coverage: Coverage is often complete in targeted areas, but can be patchy with variations in thickness, leading
            to easy visibility and removal challenges.
          pattern: Patterns are usually streaks, splatters, or uniform layers, sometimes forming words or images that stand
            out clearly against the transparent background.
        metal:
          appearance: Graffiti on metal often appears as bright, opaque colors with a glossy or matte finish, sometimes showing
            drips or uneven texture due to the smooth surface.
          coverage: Coverage is usually partial, with variations from thin layers to thick, overlapping areas, depending on
            the application method.
          pattern: It typically forms streaks, drips, or patches, often concentrated in irregular shapes or along edges where
            spray paint accumulates.
        mineral:
          appearance: Graffiti on mineral surfaces displays vivid hues against the natural color and crystalline texture,
            often with a slight sheen or matte finish that may highlight mineral features.
          coverage: Coverage is typically partial and uneven, varying from thin coats to dense applications, influenced by
            the surface hardness and porosity.
          pattern: It forms spots, streaks, or patches, distributed in areas of easy access, with drips following the mineral's
            contours or cleavage planes.
        plastic:
          appearance: On plastic, graffiti can look shiny or matte, with colors that may bead up or spread unevenly, sometimes
            peeling or cracking over time.
          coverage: Coverage is typically partial and inconsistent, varying from light coats to thicker layers that might
            flake off easily.
          pattern: Patterns include spots, streaks, or smears, often distributed in random patches where the paint does not
            adhere uniformly to the smooth surface.
        rubber:
          appearance: On rubber, graffiti shows as muted or bright colors with a flexible, often cracked or peeling texture,
            as the paint may not bond well to the elastic surface.
          coverage: Coverage is generally light and patchy, with significant variation due to the material's movement and
            poor adhesion.
          pattern: Patterns are usually spots or smears, with a tendency to flake or rub off, resulting in fragmented distribution
            over time.
        semiconductor:
          appearance: On semiconductors, graffiti appears as foreign, often colorful contaminants that contrast with the smooth,
            metallic or silicon surface, potentially causing visual defects.
          coverage: Coverage is minimal and localized, with high variation, as even small amounts can be problematic for functionality
            and require precise cleaning.
          pattern: Patterns are usually random spots or smears, distributed haphazardly due to the delicate nature, possibly
            affecting electronic properties if not removed.
        specialty:
          appearance: Graffiti on specialty materials varies widely, appearing as bright or dull colors with textures matching
            the surface, such as glossy on coated metals or matte on composites.
          coverage: Coverage is highly variable, from sparse to full, depending on the material's susceptibility and the graffiti
            artist's intent, often requiring specialized removal methods.
          pattern: Distribution is irregular, forming patches, streaks, or custom designs, adapted to the material's unique
            properties like flexibility or reflectivity.
        stone:
          appearance: Graffiti on stone shows up as bold colors against the natural texture, often with a matte or slightly
            glossy finish that can highlight surface irregularities.
          coverage: It ranges from sparse tagging to extensive coverage, with uneven areas where paint pools in crevices or
            wears off easily.
          pattern: Distribution includes spots, streaks, or large patches, frequently clustered on flat or accessible areas,
            with drips running down rough surfaces.
        wood:
          appearance: On wood, graffiti can look vibrant or faded, with colors seeping into the grain, creating a rough or
            absorbent texture that may appear blotchy.
          coverage: Coverage varies widely, from light spatters to dense layers, with inconsistencies due to the porous nature
            of wood.
          pattern: It often appears as patches or streaks, following the wood grain or forming random spots where the paint
            adheres unevenly.
