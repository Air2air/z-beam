  visual:
    appearanceOnCategories:
      _section:
        sectionTitle: Visual Appearance
        sectionDescription: How this contaminant appears on different material categories
        sectionMetadata: relationships.visual.appearanceOnCategories
        icon: eye
        order: 50
        variant: default
      presentation: descriptive
      items:
      - appearanceOnCategories:
          ceramic:
            appearance: Displays as darkened or discolored marks with a glazed or rough texture, often in shades of brown
              or black.
            coverage: Coverage is generally localized and even in quality ceramics, but can be blotchy with impurities.
            pattern: Tends to form spots or lines that may spread into patches if the glaze is uneven or contaminated.
          composite:
            appearance: Manifests as uneven discoloration with mixed textures, such as charring on organic parts and fading
              on inorganic ones.
            coverage: Coverage is often inconsistent and patchy, varying with the distribution of different components.
            pattern: Typically forms irregular patches or spots, reflecting the heterogeneous nature of composite materials.
          concrete:
            appearance: Manifests as light or dark discoloration with a rough, porous texture, sometimes showing efflorescence
              or dust.
            coverage: Coverage is generally partial and inconsistent, influenced by concrete mix and curing conditions.
            pattern: Can form spots or uniform areas, but often appears patchy due to surface irregularities and aggregate
              exposure.
          fabric:
            appearance: Shows as scorched or faded marks with a brittle or singed texture, often in brown or black hues.
            coverage: Coverage is typically sparse and uneven, varying with fabric type and dye interactions.
            pattern: Often appears as streaks or patches that follow the weave, leading to irregular distributions.
          glass:
            appearance: Appears as frosted or cloudy areas with a smooth, etched texture, sometimes showing subtle color shifts
              like whitening.
            coverage: Coverage is often consistent and controlled in clean processes, but can vary with surface defects.
            pattern: Usually forms uniform or patterned designs, but contamination can cause streaks or spots if impurities
              are present.
          metal:
            appearance: Discoloration often appears as a contrasting color change, such as darkening or lightening, with a
              smooth or slightly textured finish.
            coverage: Coverage is usually localized to the marked area, with minimal variation if the process is controlled,
              but can be uneven if contaminated.
            pattern: Typically forms precise patterns like spots, lines, or patches, depending on the laser settings and material
              composition.
          mineral:
            appearance: Displays as color changes like darkening or iridescence with a crystalline or smooth texture, depending
              on mineral hardness.
            coverage: Coverage is typically localized and variable, affected by mineral purity and laser wavelength.
            pattern: Often forms spots or uniform layers, but can be streaky if the mineral has inclusions or fractures.
          plastic:
            appearance: Shows as yellowing, browning, or charring with a melted or pitted texture, depending on the plastic
              type.
            coverage: Coverage is variable, ranging from small spots to larger areas, influenced by plastic composition and
              laser power.
            pattern: Often appears as streaks or patches that can spread, especially in thermoplastics under high heat.
          rubber:
            appearance: Appears as darkened or burnt areas with a rough, cracked texture, sometimes accompanied by smoke residues.
            coverage: Coverage is generally localized but can spread unevenly, depending on rubber hardness and additives.
            pattern: Usually forms spots or streaks that may coalesce into larger patches under excessive laser exposure.
          semiconductor:
            appearance: Appears as subtle discoloration or oxidation with a smooth, sometimes hazy finish, often in gray or
              brown shades.
            coverage: Coverage is generally minimal and controlled, but can vary with surface defects and doping levels.
            pattern: Usually forms precise, uniform patterns in controlled processes, but contamination can cause spots or
              streaks.
          specialty:
            appearance: Varies widely; may show unique color shifts or textures, such as iridescence on coatings or charring
              on biomaterials.
            coverage: Coverage is highly variable and material-dependent, ranging from uniform to sparse based on application
              and impurities.
            pattern: Patterns depend on material specifics, often irregular or custom-designed, but can include spots or patches.
          stone:
            appearance: Manifests as faded or darkened spots with a matte or crystalline texture, depending on the stone type
              and impurities.
            coverage: Coverage is typically sparse and irregular, influenced by stone porosity and laser intensity.
            pattern: Can form spots or uniform areas, but often appears patchy due to natural variations in mineral composition.
          wood:
            appearance: Shows as darkened or charred areas with a rough, burnt texture, sometimes with lighter shades if the
              wood resin reacts.
            coverage: Coverage is generally partial and uneven, varying with wood density and moisture content, rarely uniform.
            pattern: Often appears as streaks or patches that follow the wood grain, leading to irregular distributions.
