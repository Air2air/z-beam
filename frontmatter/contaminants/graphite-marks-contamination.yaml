  visual:
    appearanceOnCategories:
      presentation: descriptive
      items:
      - appearanceOnCategories:
          ceramic:
            appearance: Presents as dark gray marks with a slightly powdery residue, often standing out against glossy or
              glazed surfaces.
            coverage: Moderate and patchy, focusing on high-contact zones, and varies with surface texture and usage.
            pattern: Tends to form spots or streaks, clustering in recessed areas or along seams, with irregular patterning.
          composite:
            appearance: Shows as dark, embedded streaks with a mixed texture, blending into the composite material's varied
              surface.
            coverage: Variable and often partial, depending on the composite's composition, typically uneven and localized.
            pattern: Distributes as irregular patches or lines, following the composite's structure, with non-uniform dispersal.
          concrete:
            appearance: Shows as dark, sooty deposits with a rough, embedded texture, blending into the concrete's porous
              surface.
            coverage: Can be extensive on rough surfaces, varying from sparse to dense, and is generally uneven.
            pattern: Forms blotchy patches or streaks, often in cracks or textured areas, with irregular and widespread dispersal.
          fabric:
            appearance: Manifests as grayish-black smudges with a dusty or ingrained look, altering the fabric's color and
              feel.
            coverage: Light to moderate, usually patchy and concentrated in areas of friction, with significant variation.
            pattern: Typically appears as scattered spots or streaks, following weave patterns or contact points, with random
              distribution.
          glass:
            appearance: Appears as faint gray smears or fingerprints with a translucent quality, reducing clarity and leaving
              a hazy film.
            coverage: Typically light and localized, covering small areas like edges or touch points, with minimal variation.
            pattern: Usually forms streaks or smudges from contact, following the path of handling, and may be more visible
              at edges.
          metal:
            appearance: Graphite deposits appear as dark gray to black smudges with a dull, matte finish, often contrasting
              sharply with the metallic surface.
            coverage: Coverage is usually partial and localized, varying from small spots to larger smeared areas depending
              on usage.
            pattern: Typically forms irregular streaks or patches, following contact points or handling areas, and may show
              directional smearing.
          mineral:
            appearance: Appears as dark gray to black coatings with a powdery or crystalline finish, contrasting with the
              mineral's natural luster.
            coverage: Ranges from thin, uniform films to thick, patchy deposits, varying with mineral type and exposure.
            pattern: Often forms uniform layers or speckled spots, depending on mineral porosity, with consistent or random
              patterns.
          plastic:
            appearance: Manifests as black or gray smudges with a slick, sometimes greasy feel, easily spreading on smooth
              plastic surfaces.
            coverage: Can range from light to heavy, with uniform coverage on frequently touched areas, showing little variation.
            pattern: Often appears as uniform smears or fingerprints, spreading evenly from handling, and can form larger
              patches.
          rubber:
            appearance: Appears as deep black stains with a sticky or embedded quality, darkening the rubber's natural color
              and texture.
            coverage: Often extensive and uniform in high-wear zones, but can be patchy in less used parts, varying with exposure.
            pattern: Commonly forms blotches or uniform darkening, especially in flexed or compressed areas, with consistent
              patterns.
          semiconductor:
            appearance: Manifests as subtle gray films or spots with a fine, particulate texture, potentially interfering
              with electronic properties.
            coverage: Usually minimal and controlled, but can be uniform in affected areas, with low variation in clean environments.
            pattern: Typically forms uniform thin layers or localized contamination, following manufacturing or handling processes.
          specialty:
            appearance: Varies widely but generally appears as dark, adherent marks tailored to the material's unique surface,
              such as on coatings or alloys.
            coverage: Highly variable, from sparse to full coverage, depending on the specialty material's properties and
              use context.
            pattern: Distribution is material-specific, often irregular or designed, like streaks on polished specialty surfaces.
          stone:
            appearance: Shows up as dark, charcoal-like stains with a gritty feel, adhering to rough surfaces and creating
              a dirty appearance.
            coverage: Coverage varies widely; it can be sparse on smooth stones or dense on rough ones, often uneven.
            pattern: Commonly forms blotchy patches or streaks, especially in textured or porous stone, with random dispersal.
          wood:
            appearance: Manifests as dark, sooty marks with a powdery texture that can embed into the grain, altering the
              natural wood finish.
            coverage: Generally low to moderate, with patchy coverage that depends on exposure and wood porosity, rarely uniform.
            pattern: Often appears as scattered spots or streaks, concentrating in porous areas or along grain lines, with
              uneven distribution.
