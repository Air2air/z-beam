description: Anodizing defects, they form on aluminum surfaces during electrochemical oxidation when electrolyte imbalances
  cause pitting, staining, and uneven oxide layers. This contamination embeds deeply with strong adhesion to the substrate,
  thus differs from loose particles by altering surface integrity permanently and resists mechanical scraping so risks base
  material damage in removal attempts. Laser cleaning succeeds here, targeted pulses vaporize defects selectively and surface
  already regains uniformity following treatment.
