            min: 0.05
            recommended: 0.1
          wavelength_preference:
            - 1064
            - 532
        optical_properties:
          absorption_coefficient:
            wavelength_1064nm: 850
            wavelength_355nm: 18500
            wavelength_532nm: 4200
          reflectivity:
            wavelength_1064nm: 0.12
            wavelength_355nm: 0.04
            wavelength_532nm: 0.08
          refractive_index:
            imaginary_part: 0.35
            real_part: 1.65
          transmission_depth: 11.8
        removal_characteristics:
          byproducts:
            - compound: carbon-dioxide
              hazard_level: low
              phase: gas
            - compound: water-vapor
              hazard_level: low
              phase: gas
            - compound: carbon-particulates
              hazard_level: moderate
              phase: solid
            - compound: pahs
              hazard_level: high
              phase: gas
          damage_risk_to_substrate: low
          primary_mechanism: thermal_ablation
          process_speed:
            area_coverage_rate_cm2_min: 480
            typical_scan_speed_mm_s: 800
          removal_efficiency:
            diminishing_returns_after: 5
            optimal_passes: 3
            single_pass: 0.65
          secondary_mechanisms:
            - photochemical
            - mechanical_spallation
          surface_quality_after_removal:
            color_change: 'no'
            residual_stress: none
            roughness_increase: minimal
        safety_data:
          fire_explosion_risk:
            severity: moderate
            description: Combustible materials present, risk elevated in confined spaces or high-power settings
            mitigation: Fire extinguisher accessible, adequate ventilation, monitor substrate temperature
          fumes_generated:
            - compound: Carbon Monoxide
              concentration_mg_m3: 50
              exposure_limit_mg_m3: 29
              hazard_class: toxic
            - compound: Carbon Dioxide
              concentration_mg_m3: 9000
              exposure_limit_mg_m3: 9000
              hazard_class: toxic
            - compound: Acrolein
              concentration_mg_m3: 0.5
              exposure_limit_mg_m3: 0.23
              hazard_class: irritant
            - compound: Formaldehyde
              concentration_mg_m3: 2.5
              exposure_limit_mg_m3: 0.37
              hazard_class: carcinogenic
            - compound: Benzene
              concentration_mg_m3: 3
              exposure_limit_mg_m3: 0.32
              hazard_class: carcinogenic
            - compound: Polycyclic Aromatic Hydrocarbons (PAHs)
              concentration_mg_m3: 1.2
              exposure_limit_mg_m3: 0.2
              hazard_class: carcinogenic
          particulate_generation:
            respirable_fraction: 0.8
            size_range_um:
              - 0.1
              - 10
          ppe_requirements:
            eye_protection: goggles
            respiratory: PAPR
            skin_protection: full_suit
            rationale: Standard protection against workplace hazards
          substrate_compatibility_warnings:
            - Avoid laser cleaning on surfaces containing lead-based paint or asbestos
            - Test for chlorinated materials that may produce dioxins when heated
            - Moist substrates may produce steam explosions
          toxic_gas_risk:
            severity: high
            primary_hazards:
              - compound: Carbon Monoxide
                concentration_mg_m3: 50
                hazard_class: toxic
              - compound: Carbon Dioxide
                concentration_mg_m3: 9000
                hazard_class: toxic
              - compound: Formaldehyde
                concentration_mg_m3: 2.5
                hazard_class: carcinogenic
              - compound: Benzene
                concentration_mg_m3: 3
                hazard_class: carcinogenic
              - compound: Polycyclic Aromatic Hydrocarbons (PAHs)
                concentration_mg_m3: 1.2
                hazard_class: carcinogenic
            description: >-
              Multiple toxic compounds detected: Carbon Monoxide, Carbon Dioxide, Formaldehyde - requires enhanced
              protection
            mitigation: >-
              Full-face respirator with appropriate cartridges, gas detection system, medical monitoring. WARNING:
              Formaldehyde, Benzene - known carcinogen(s), minimize exposure
          ventilation_requirements:
            exhaust_velocity_m_s: 0.5
            filtration_type: carbon
            minimum_air_changes_per_hour: 12
            rationale: Enhanced ventilation required due to toxic gas generation - 12 ACH with carbon
          visibility_hazard:
            severity: moderate
            description: Moderate visibility reduction (40-60%), significant particulate haze
            source: 'Respirable fraction: 0.80 (80% of particles <10μm)'
            mitigation: Ensure clear sight lines, use source extraction, maintain awareness of surroundings
            related_field: particulate_generation.respirable_fraction
