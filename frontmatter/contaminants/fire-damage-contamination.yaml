  visual_characteristics:
    presentation: collapsible
    items:
      - appearance_on_categories:
          ceramic:
            appearance: Glazed surfaces may crack or discolor to brown or black; soot adheres as a dark, powdery layer.
            coverage: Light to heavy, depending on fire intensity, often covering entire exposed areas uniformly.
            pattern: Commonly uniform or spotted, with accumulation in crevices and on horizontal surfaces.
          composite:
            appearance: >-
              Discoloration to dark hues, possible delamination or bubbling; soot and residues create a layered, uneven
              look.
            coverage: Moderate to heavy, often uneven due to varied material responses, with full coverage in severe cases.
            pattern: Patchy or streaked, following material boundaries and heat exposure, with irregular soot deposition.
          concrete:
            appearance: Dark gray or black soot stains; surface may spall, crack, or appear powdery, with a dull, coated finish.
            coverage: Generally extensive but uneven, light on smooth areas and heavier on rough or porous sections.
            pattern: Usually uniform or in large patches, following surface porosity and smoke drift, with possible streaking.
          fabric:
            appearance: >-
              Stained gray or black from soot; fibers may be singed, brittle, or have a smoky odor, with a dusty
              texture.
            coverage: Can be light and patchy to heavy and full, varying with fabric type and exposure to smoke and heat.
            pattern: Often uniform or spotted, with streaks from airflow or water, and concentrated in folds or edges.
          glass:
            appearance: >-
              Opaque or frosted from heat; coated with black soot or ash, reducing transparency and leaving a smoky
              film.
            coverage: Often complete coverage on exposed panes, but thickness varies with smoke density and duration.
            pattern: Usually uniform coating or streaks, especially on vertical surfaces, with thicker deposits on edges.
          metal:
            appearance: >-
              Discoloration to black, gray, or rainbow hues; surface may be tarnished, etched, or coated with soot,
              often with a dull or matte finish.
            coverage: Varies from localized spots to extensive coverage, depending on proximity to fire and smoke sources.
            pattern: >-
              Often appears as streaks, patches, or spots, following airflow or heat exposure, with irregular
              distribution.
          mineral:
            appearance: Discoloration to dark shades; soot and ash coat surfaces, potentially altering luster or causing etching.
            coverage: Light to moderate, varying with mineral type and exposure, but rarely complete unless heavily smoked.
            pattern: >-
              Often uniform or patchy, adhering to crystalline structures or porous areas, with streaks from
              environmental factors.
          plastic:
            appearance: Melting, warping, or charring with black soot deposits; surfaces may become sticky, dull, or discolored.
            coverage: Varies widely, from light soot films to extensive melting and coverage in high-heat zones.
            pattern: Irregular patches or streaks, with melting concentrated near heat and soot settling on cooler parts.
          rubber:
            appearance: >-
              Softening, melting, or hardening with black soot coating; may show cracking, swelling, or a sticky
              residue.
            coverage: Light to complete, depending on fire proximity, often covering surfaces evenly but with variable depth.
            pattern: Typically in patches or uniform layers, with damage focused on areas exposed to direct heat or smoke.
          semiconductor:
            appearance: >-
              Soot deposits cause dark staining; surfaces may corrode or show residue, often with a fine, particulate
              coating.
            coverage: >-
              Light and patchy to moderate, as sensitive areas may be shielded, but can be extensive in uncontrolled
              fires.
            pattern: Typically uniform or speckled, with accumulation in gaps and on components, following airflow patterns.
          specialty:
            appearance: >-
              Varies widely; may include discoloration, soot layers, or structural changes like warping, depending on
              material composition.
            coverage: >-
              Highly variable, from minimal to full coverage, based on the specialty material's properties and fire
              exposure.
            pattern: >-
              Irregular or material-specific, such as streaking on polished surfaces or patching on composites,
              influenced by fire dynamics.
          stone:
            appearance: >-
              Soot and ash create dark gray or black stains; surface may appear dull or etched, with possible
              discoloration from heat.
            coverage: Generally light to moderate, varying with porosity and exposure, but can be widespread in severe fires.
            pattern: Often uniform or in patches, following contours and porous areas, with streaks from water runoff.
          wood:
            appearance: >-
              Charred black or brown surfaces, possible blistering or cracking; soot deposits create a gritty, dark
              coating.
            coverage: Can range from light surface soot to full charring, often uneven with deeper damage near heat sources.
            pattern: Typically in patches or streaks, with charring concentrated on exposed edges and surfaces facing the fire.
