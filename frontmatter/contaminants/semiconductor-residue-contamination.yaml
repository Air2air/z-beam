  visualCharacteristics:
    appearance_on_categories:
      ceramic:
        appearance: Residue on ceramic surfaces often shows as a dull, filmy layer or slight discoloration in white or off-white
          shades, which can mask the glossy finish and feel powdery or slick.
        coverage: Coverage is typically low to moderate and uneven, with more residue in textured regions and less on smooth,
          glazed surfaces.
        pattern: It tends to distribute in irregular spots, patches, or streaks, frequently accumulating in grooves or unglazed
          areas, and is not uniform.
      composite:
        appearance: Semiconductor residue on composites often looks like a hazy, discolored film in white or gray tones, which
          can obscure surface details and feel slightly adhesive or gritty.
        coverage: Coverage is typically uneven and moderate, with higher amounts in fibrous or layered sections, and minimal
          on sealed surfaces.
        pattern: Distribution is irregular, with patches, spots, or streaks that may follow material interfaces or porous
          zones, and it is seldom uniform.
      concrete:
        appearance: On concrete, semiconductor residue often manifests as a chalky, dusty, or slightly oily film in white
          or gray hues, which can darken the surface and feel gritty or smooth.
        coverage: Coverage is usually partial and varied, from sparse dusting to moderate patches, with higher accumulation
          in cracks or unsealed areas.
        pattern: Distribution is typically irregular, with spots, streaks, or patches that cluster in porous or rough textures,
          and it does not cover uniformly.
      fabric:
        appearance: Residue on fabric may show as faint staining, a powdery deposit, or a greasy film in white or light gray
          colors, often making fibers look matted and feeling slightly stiff or tacky.
        coverage: Coverage is generally low to moderate and uneven, with more residue in dense or absorbent areas, and less
          on smooth, synthetic fabrics.
        pattern: It tends to appear in irregular spots, streaks, or patches, frequently following weave patterns or accumulating
          in folds, and is rarely uniform.
      glass:
        appearance: On glass, semiconductor residue typically appears as a subtle haze, streaks, or faint discoloration in
          white or gray tones, often making the surface look less transparent and feeling slightly sticky.
        coverage: Coverage is usually partial and variable, from light streaking to localized patches, with minimal residue
          on well-cleaned central areas.
        pattern: It commonly forms streaks, spots, or smears, especially along edges or where handling occurred, and is rarely
          uniform across the pane.
      metal:
        appearance: Semiconductor processing residue on metal often appears as a dull, hazy film or faint discoloration, typically
          in shades of gray, white, or yellowish, with a slightly sticky or powdery texture.
        coverage: Coverage is usually partial and variable, ranging from sparse spots to moderate patches, with higher accumulation
          in recessed or less-cleaned regions.
        pattern: It commonly forms irregular spots, streaks, or patches, often concentrated near edges or handling areas,
          rather than being uniform across the surface.
      mineral:
        appearance: Residue on mineral surfaces may appear as a faint, cloudy, or discolored layer in white, gray, or yellowish
          tones, often dulling the natural shine and feeling slightly adhesive or powdery.
        coverage: Coverage is typically low to moderate and uneven, with more residue in fissures or rough spots, and minimal
          on polished facets.
        pattern: It commonly forms irregular spots, smears, or patches, especially along cleavage planes or inclusions, and
          is not uniform.
      plastic:
        appearance: On plastic, the residue may appear as a cloudy, greasy film or faint staining in gray or white colors,
          often reducing clarity and leaving a slightly tacky or smeared feel.
        coverage: Coverage is generally partial and varied, from isolated smudges to larger patches, with accumulation in
          static-prone or rough areas.
        pattern: It usually forms spots, streaks, or smudges, particularly near seams or handled spots, and does not spread
          uniformly.
      rubber:
        appearance: On rubber, the residue commonly appears as a dull, oily, or powdery coating in gray or white shades, which
          can reduce elasticity visibility and feel sticky or chalky.
        coverage: Coverage is usually partial and variable, ranging from light films to concentrated patches, with more in
          textured or flexible regions.
        pattern: It often forms blotches, streaks, or spots, especially in creases or high-contact areas, and is not uniformly
          distributed.
      semiconductor:
        appearance: On semiconductor materials, residue often appears as microscopic films, particles, or discoloration in
          gray, white, or rainbow hues, which can interfere with electronic properties and feel imperceptibly thin or sticky.
        coverage: Coverage is typically minimal but critical, ranging from isolated defects to partial films, with variation
          based on processing steps and cleaning efficacy.
        pattern: Distribution is usually non-uniform, with spots, streaks, or localized contamination at feature edges or
          deposition sites, rather than covering the wafer evenly.
      specialty:
        appearance: For specialty materials like advanced polymers or coatings, residue may show as a subtle haze, discoloration,
          or film in variable colors, often altering functional properties and feeling slightly tacky or rough.
        coverage: Coverage is generally partial and uneven, with amounts varying from light films to concentrated areas, depending
          on surface treatment and exposure.
        pattern: It tends to form irregular patterns such as spots, streaks, or patches, influenced by material heterogeneity,
          and is rarely uniform.
      stone:
        appearance: Residue on stone surfaces often manifests as a faint, chalky, or oily film in white, gray, or yellowish
          hues, which can reduce the natural luster and feel slightly tacky.
        coverage: It generally covers small to moderate areas unevenly, with higher concentrations in pores or crevices, and
          less on smooth, polished sections.
        pattern: Distribution is usually irregular, with spots, smears, or patches that may cluster in textured or rough areas,
          and it seldom covers the surface uniformly.
      wood:
        appearance: On wood, the residue may show as a cloudy, whitish, or translucent film that can obscure the natural grain,
          sometimes feeling slightly greasy or gritty to the touch.
        coverage: Coverage is typically low to moderate and uneven, with more residue in cracks or unfinished sections, and
          minimal on sealed surfaces.
        pattern: It tends to appear in blotchy patches or streaks, often following the wood grain or accumulating in porous
          areas, and is rarely uniform.
