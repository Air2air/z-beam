  safetyData: &id001
    fire_explosion_risk:
      severity: low
      description: Minimal fire risk with standard precautions and adequate ventilation
      mitigation: Standard fire safety precautions, extinguisher available within 15m
    fumes_generated:
    - compound: Hydrogen Fluoride
      concentration_mg_m3: 2.5
      exposure_limit_mg_m3: 2.5
      hazard_class: corrosive
    - compound: Arsine
      concentration_mg_m3: 0.05
      exposure_limit_mg_m3: 0.16
      hazard_class: toxic
    - compound: Phosphine
      concentration_mg_m3: 0.1
      exposure_limit_mg_m3: 0.42
      hazard_class: toxic
    - compound: Silicon Tetrafluoride
      concentration_mg_m3: 15.0
      exposure_limit_mg_m3: 34.0
      hazard_class: irritant
    - compound: Metal oxides (arsenic, antimony)
      concentration_mg_m3: 1.2
      exposure_limit_mg_m3: 0.01
      hazard_class: toxic
    particulate_generation:
      respirable_fraction: 0.85
      size_range_um:
      - 0.1
      - 10.0
    ppe_requirements:
      eye_protection: goggles
      respiratory: PAPR
      skin_protection: full_suit
      rationale: Standard protection against workplace hazards
    substrate_compatibility_warnings:
    - Laser parameters must be optimized to prevent substrate damage and excessive fume generation
    - Residue composition varies significantly by semiconductor process - require material analysis
    - Dopant materials (arsenic, phosphorus, boron) create highly toxic decomposition products
    toxic_gas_risk:
      severity: high
      primary_hazards:
      - compound: Arsine
        concentration_mg_m3: 0.05
        hazard_class: toxic
      - compound: Phosphine
        concentration_mg_m3: 0.1
        hazard_class: toxic
      - compound: Metal oxides (arsenic, antimony)
        concentration_mg_m3: 1.2
        hazard_class: toxic
      description: 'Multiple toxic compounds detected: Arsine, Phosphine, Metal oxides (arsenic, antimony) - requires enhanced
        protection'
      mitigation: Full-face respirator with appropriate cartridges, gas detection system, medical monitoring
    ventilation_requirements:
      exhaust_velocity_m_s: 0.5
      filtration_type: scrubber
      minimum_air_changes_per_hour: 12
      rationale: Enhanced ventilation required due to toxic gas generation - 12 ACH with scrubber
    visibility_hazard:
      severity: moderate
      description: Moderate visibility reduction (40-60%), significant particulate haze
      source: 'Respirable fraction: 0.85 (85% of particles <10μm)'
      mitigation: Ensure clear sight lines, use source extraction, maintain awareness of surroundings
      related_field: particulate_generation.respirable_fraction
