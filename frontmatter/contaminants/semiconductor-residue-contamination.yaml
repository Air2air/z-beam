description: >-
  Semiconductor residue contamination typically builds up during wafer processing, forming thin, uneven layers that
  cling tightly to silicon surfaces. These residues, often chemical byproducts from etching or deposition steps, create
  unique patterns—spotty clusters in high-heat zones or streaky films along processing edges. In practice, they pose
  distinct removal challenges for laser cleaning, as the residues absorb energy unevenly, risking substrate damage if
  pulses ramp up too quickly. Material-specific behaviors vary: on doped silicon, residues hold up better due to altered
  surface chemistry, while on oxides, they clear more readily but leave faint traces. Overall, dialing in laser
  parameters addresses these issues, achieving a clean finish without compromising device integrity.
