description: Chemical-stains contamination, it arises from exposure to acids, bases, or solvents, causing discoloration and
  etching on surfaces. This pattern, it differs from rust or dust by its chemical bonding and uneven penetration, thus resists
  mechanical wiping. On metals like steel and aluminum, stains embed deeply and corrode, while on plastics such as acrylic
  and ABS, they cause cracking. Removal challenges include substrate damage risk, so laser cleaning works effectively by vaporizing
  stains selectively and preserving material integrity.
micro:
  after: Post-cleaning reveals restored surface with chemical stains / acid etching successfully removed through precise laser
    ablation.
  before: Surface shows contamination from chemical stains / acid etching affecting material appearance and properties.
