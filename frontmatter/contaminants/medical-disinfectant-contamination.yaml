      min_ns: 5
      recommended_ns: 20
    repetition_rate_khz:
      max: 200
      min: 20
      recommended: 100
    safety_margin_factor: 0.6
    scan_speed_mm_s:
      max: 2000
      min: 500
      recommended: 1000
    spot_size_mm:
      max: 0.1
      min: 0.02
      recommended: 0.05
    wavelength_preference:
    - 355
    - 1064
  optical_properties:
    absorption_coefficient:
      wavelength_1064nm: 120
      wavelength_355nm: 2800
      wavelength_532nm: 450
    reflectivity:
      wavelength_1064nm: 0.15
      wavelength_355nm: 0.04
      wavelength_532nm: 0.08
    refractive_index:
