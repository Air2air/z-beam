  visual:
    appearanceOnCategories:
      _section:
        sectionTitle: Visual Appearance
        sectionDescription: How this contaminant appears on different material categories
        sectionMetadata: relationships.visual.appearanceOnCategories
        icon: eye
        order: 50
        variant: default
      presentation: descriptive
      items:
      - appearanceOnCategories:
          ceramic:
            appearance: Shows as white, crystalline spots or a filmy layer that may dull the glaze and cause slight discoloration
              over time.
            coverage: Patchy with low to moderate coverage, more concentrated in porous sections and less on smooth, glazed
              surfaces.
            pattern: Distributed in spots or patches, frequently accumulating in grout lines or textured areas with irregular
              spread.
          composite:
            appearance: Appears as irregular white or discolored patches that may blend with the material's texture, causing
              a mottled or stained look.
            coverage: Uneven coverage, ranging from isolated spots to broad areas, often heavier on rough or absorbent components.
            pattern: Typically patchy or streaky, with distribution influenced by composite heterogeneity and surface irregularities.
          concrete:
            appearance: Presents as white, efflorescent patches or a dusty film that darkens the surface and may highlight
              cracks or pores.
            coverage: Uneven, with sparse to dense coverage depending on concrete porosity, often heavier in damp or rough
              areas.
            pattern: Typically forms irregular patches or streaks, accumulating in porous regions and along surface imperfections.
          fabric:
            appearance: Manifests as white stains, damp spots, or a crusty layer that can stiffen fibers and lead to discoloration
              or odor.
            coverage: Patchy and variable, from light spotting to extensive areas, influenced by fabric absorbency and drying
              conditions.
            pattern: Appears in blotches or patches, following fabric weave and often concentrated in folds or high-application
              zones.
          glass:
            appearance: Appears as streaky, hazy films or white residues that reduce transparency and create a foggy or smeared
              look.
            coverage: Often near-uniform but can vary from light haze to heavy coating, with inconsistencies in thickness
              across the surface.
            pattern: Usually forms streaks or uniform thin layers, with patterns reflecting wiping or spraying motions during
              application.
          metal:
            appearance: Residue appears as white or cloudy streaks, often dulling the shiny surface and leaving a hazy film.
            coverage: Varies from sparse streaks to nearly complete surface coverage, often uneven due to runoff and pooling.
            pattern: Typically forms streaks or patches following application paths, with irregular edges and concentration
              in crevices.
          mineral:
            appearance: Shows as crystalline deposits or a filmy coating that can alter luster and color, sometimes leading
              to etching or pitting.
            coverage: Varies from light, scattered residues to extensive films, often uneven due to mineral variability and
              application technique.
            pattern: Distributed in spots or uniform layers, influenced by mineral hardness and surface smoothness, with concentration
              in fissures.
          plastic:
            appearance: Presents as oily streaks, white spots, or a hazy film that can make surfaces look dull and sometimes
              feel tacky.
            coverage: Varies widely from light, uneven films to extensive coverage, depending on plastic type and disinfectant
              formulation.
            pattern: Often forms streaks or smears, with patterns following application direction and pooling in indentations
              or edges.
          rubber:
            appearance: Shows as white, powdery residues or oily films that can cause surface cracking or a sticky texture,
              altering flexibility.
            coverage: Generally patchy with low to moderate coverage, more prevalent in porous rubber types and less on smooth
              surfaces.
            pattern: Forms spots or streaks, often concentrated in seams or textured areas, with irregular spreading due to
              material absorption.
          semiconductor:
            appearance: Appears as microscopic haze, spots, or thin films that can interfere with optical properties and cause
              surface defects.
            coverage: Typically minimal and uniform but can vary to partial coverage, critical for avoiding performance issues
              in sensitive applications.
            pattern: Often uniform or speckled at a fine scale, with distribution affected by cleaning processes and material
              purity.
          specialty:
            appearance: Varies widely by material; may show as discoloration, films, or residues tailored to specific properties,
              such as coatings on electronics or artworks.
            coverage: Highly variable, from precise, localized application to broad coverage, designed to meet functional
              or aesthetic requirements without compromising integrity.
            pattern: Dependent on specialty use, ranging from uniform layers to targeted spots, influenced by application
              methods and material reactivity.
          stone:
            appearance: Manifests as white, powdery deposits or a glossy film that can alter the natural color and texture,
              especially on porous stones.
            coverage: Coverage is typically uneven, ranging from light spotting to dense patches, influenced by stone porosity
              and application method.
            pattern: Forms irregular patches or streaks, often following surface contours and accumulating in cracks or low
              spots.
          wood:
            appearance: Shows as white, chalky spots or a dull film that can darken wood grain, sometimes causing discoloration
              or a sticky feel.
            coverage: Generally patchy with low to moderate coverage, heavier in absorbent regions and lighter on sealed surfaces.
            pattern: Often appears in patches or spots, concentrated in porous areas or along grain lines, with irregular
              distribution.
