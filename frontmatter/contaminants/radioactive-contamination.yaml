  visual:
    appearance_on_categories:
      presentation: descriptive
      items:
      - appearance_on_categories:
          ceramic:
            appearance: Contamination on ceramic may manifest as dull spots, discoloration, or a slight film that can obscure
              the glaze or finish.
            coverage: Coverage is usually low to moderate and uneven, with higher levels in textured or damaged regions.
            pattern: Distribution is often patchy or streaky, with accumulation in unglazed areas, cracks, or surface imperfections.
          composite:
            appearance: Surface radioactive contamination on composites may show as discoloration, dulling, or a particulate
              layer, blending with the varied material textures.
            coverage: Coverage is uneven and depends on the composite's porosity and surface finish, often higher in rough
              areas.
            pattern: Distribution is heterogeneous, with spots or patches following the composite's layered or fibrous structure.
          concrete:
            appearance: On concrete, surface radioactive contamination may appear as grayish or brownish discoloration, a
              powdery layer, or dark spots on the rough surface.
            coverage: Coverage is usually uneven and can be extensive in porous areas, while smoother sections have less contamination.
            pattern: It typically forms irregular patches or a mottled pattern, concentrated in pores, cracks, or rough textures.
          fabric:
            appearance: Contamination on fabric can look like faint stains, discoloration, or a dusty coating that alters
              the fabric's color and texture.
            coverage: Coverage varies from sparse to extensive, influenced by fabric type, weave density, and exposure conditions.
            pattern: Distribution is often uneven, with spots or streaks following the weave pattern, folds, or areas of wear.
          glass:
            appearance: On glass, surface radioactive contamination often looks like a faint haze, smudges, or light discoloration,
              sometimes with a greasy or dusty appearance.
            coverage: Coverage is typically light and variable, ranging from isolated spots to a widespread thin layer, depending
              on environmental factors.
            pattern: It usually appears as streaks, spots, or a thin uniform film, often more visible at edges or where handling
              occurs.
          metal:
            appearance: Surface radioactive contamination on metal often appears as faint discoloration or dulling, sometimes
              with a grayish or yellowish tint, depending on the contaminant.
            coverage: Coverage is usually patchy and low to moderate, with higher accumulation in crevices and less on smooth,
              flat surfaces.
            pattern: It typically forms irregular spots or streaks, often concentrated around seams, joints, or rough areas
              due to adhesion variations.
          mineral:
            appearance: Contamination on minerals often shows as subtle color shifts, staining, or a fine particulate deposit
              that may mimic natural inclusions or weathering.
            coverage: Coverage is typically low to moderate and uneven, depending on the mineral's hardness and surface characteristics.
            pattern: Distribution is irregular, with spots or patches following crystal faces, fractures, or surface irregularities.
          plastic:
            appearance: On plastic, contamination can appear as faint staining, cloudiness, or a subtle change in color, sometimes
              with a dusty or oily look.
            coverage: Coverage is often light and irregular, with variations due to material composition and exposure history.
            pattern: It typically forms spots, streaks, or a diffuse pattern, influenced by static charge and surface smoothness.
          rubber:
            appearance: On rubber, contamination often appears as dark smudges, discoloration, or a slight film that may make
              the surface look grimy or aged.
            coverage: Coverage is typically patchy and moderate, with accumulation in textured or flexible parts of the rubber.
            pattern: It tends to form streaks or patches, particularly in creases, seams, or areas with higher friction or
              wear.
          semiconductor:
            appearance: On semiconductors, surface radioactive contamination appears as microscopic discoloration, haze, or
              particulate residues that can affect optical and electrical properties.
            coverage: Coverage is generally very light and uniform but can vary with surface cleanliness and handling.
            pattern: It usually forms a fine, uniform film or isolated spots, often concentrated at edges or defects due to
              manufacturing processes.
          specialty:
            appearance: For specialty materials, contamination may vary widely but often appears as discoloration, film, or
              residues tailored to the material's unique properties, such as coatings or advanced alloys.
            coverage: Coverage is highly variable, from minimal to significant, based on the material's reactivity, porosity,
              and intended use.
            pattern: Distribution is material-dependent, ranging from uniform layers to irregular patches, influenced by surface
              treatments and composition.
          stone:
            appearance: Contamination on stone can appear as subtle color changes, such as grayish or brownish hues, or as
              a fine particulate layer on the surface.
            coverage: Coverage is generally uneven, with higher concentrations in porous or rough areas and less on polished
              surfaces.
            pattern: It tends to form irregular patches or a mottled pattern, influenced by the stone's porosity and surface
              texture.
          wood:
            appearance: On wood, contamination may show as dark stains, discoloration, or a dusty film, altering the natural
              grain and color.
            coverage: Coverage varies widely, from sparse spots to extensive areas, depending on surface roughness and exposure
              conditions.
            pattern: Distribution is often uneven, with patches or streaks following the wood grain, pores, or cracks where
              particles settle.
