id: ceramic-glaze-contamination
contentType: contaminant
schemaVersion: 6.0.0
name: Ceramic Glaze Deposits
category: inorganic-coating
subcategory: ceramic
datePublished: '2026-01-06'
dateModified: '2026-02-02T02:25:18.866271+00:00'
description: >-
  During laser cleaning setup on ceramic surfaces, contamination forms as inorganic coating layer on glaze. Buildup
  occurs because environmental exposure traps particles, and so unique patterns emerge with irregular spreading along
  glaze cracks. Surface exhibits uneven adhesion, where contaminants bond strongly due to glaze porosity.


  After formation, removal challenges arise from material-specific behaviors. Glaze resists laser energy, so ablation
  demands precise control to avoid cracking. Treatment removes layers effectively, but residue clings in textured areas,
  requiring multiple passes. In observations, process achieves clean surface uniformity, yet heat buildup so intervals
  prevent damage to underlying ceramic. Results are obtained from tests on samples.


  Ikmanda Roswati, Ph.D. from Indonesia
