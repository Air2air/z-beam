pageTitle: Ceramic Glaze Deposits Contaminants
pageDescription: During laser cleaning setup on ceramic surfaces, contamination forms as inorganic coating layer on glaze.
  Buildup occurs because environmental exposure traps particles, and so unique patterns emerge with irregular spreading along
  glaze cracks. Surface exhibits uneven adhesion, where contaminants bond strongly due to glaze porosity. After formation,
  removal challenges arise from material-specific behaviors. Glaze resists laser energy, so ablation demands precise control
  to avoid cracking. Treatment removes layers effectively, but residue clings in textured areas, requiring multiple passes.
  In observations, process achieves clean surface uniformity, yet heat buildup so intervals prevent damage to underlying ceramic.
  Results are obtained from tests on samples. Ikmanda Roswati, Ph.D. from Indonesia
