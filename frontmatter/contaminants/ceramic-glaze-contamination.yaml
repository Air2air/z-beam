    polarization: circular
    pulse_duration_range:
      max_ns: 100
      min_ns: 10
      recommended_ns: 30
    repetition_rate_khz:
      max: 200
      min: 20
      recommended: 50
    safety_margin_factor: 0.7
    scan_speed_mm_s:
      max: 2000
      min: 500
      recommended: 1000
    spot_size_mm:
      max: 0.1
      min: 0.03
      recommended: 0.05
    wavelength_preference:
    - 1064
    - 532
  optical_properties:
    absorption_coefficient:
      wavelength_1064nm: 1200
      wavelength_355nm: 28000
      wavelength_532nm: 4500
    reflectivity:
      wavelength_1064nm: 0.25
      wavelength_355nm: 0.08
      wavelength_532nm: 0.15
    refractive_index:
      imaginary_part: 0.012
      real_part: 1.65
    transmission_depth: 8.3
  removal_characteristics:
