        concentration_mg_m3: 5.0
        exposure_limit_mg_m3: 0.025
        hazard_class: toxic
      - compound: Lead Oxide
        concentration_mg_m3: 0.5
        exposure_limit_mg_m3: 0.05
        hazard_class: toxic
      - compound: Metal Oxides (various)
        concentration_mg_m3: 2.0
        exposure_limit_mg_m3: 5.0
        hazard_class: irritant
      particulate_generation:
        respirable_fraction: 0.7
        size_range_um:
        - 0.1
        - 10.0
      ppe_requirements:
        eye_protection: goggles
        respiratory: PAPR
        skin_protection: gloves
      substrate_compatibility_warnings:
      - Thermal shock may cause substrate damage or fragmentation
      - Incomplete removal may create respirable dust during cleanup
      - Potential for reflective surfaces to redirect laser energy
      toxic_gas_risk: low
      ventilation_requirements:
        exhaust_velocity_m_s: 0.5
        filtration_type: HEPA
        minimum_air_changes_per_hour: 12
      visibility_hazard: moderate
    thermal_properties:
      ablation_threshold:
        pulse_duration_100ns: 4.5
        pulse_duration_10ns: 3.2
        wavelength_1064nm: 2.8
      decomposition_temperature: 1200
      heat_affected_zone_depth: 25
      melting_point: 1100
      specific_heat: 850
      thermal_conductivity: 1.2
      thermal_diffusivity: 0.8
      vaporization_temperature: 1800
