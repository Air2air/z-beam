  visual:
    appearance_on_categories:
      presentation: descriptive
      items:
      - appearance_on_categories:
          ceramic:
            appearance: Carbon buildup shows as dark, sooty deposits that are black or gray, with a powdery or slightly adhered
              texture on the smooth ceramic surface.
            coverage: Coverage is generally uneven and localized, varying from minor spotting to extensive soiling in high-use
              scenarios.
            pattern: Tends to accumulate in patches or streaks, particularly in areas with heat exposure, like kilns or stovetops,
              and may highlight surface imperfections.
          composite:
            appearance: Carbon deposits manifest as dark, sooty layers that are black or gray, with a texture that may be
              flaky or embedded depending on the composite material's porosity.
            coverage: Coverage is usually uneven and localized, from sparse areas to dense buildup, influenced by the composite's
              composition and environmental conditions.
            pattern: Distribution is often patchy or streaked, accumulating in areas with resin or fiber exposure to heat
              or pollutants, leading to uneven patterns.
          concrete:
            appearance: Carbon contamination presents as dark gray or black, sooty layers that are powdery or crusty, giving
              a stained and rough texture to the concrete surface.
            coverage: Coverage is often uneven and partial, from light discoloration to heavy buildup, especially in industrial
              or urban settings.
            pattern: Distribution is usually patchy or streaked, accumulating in pores, cracks, or on exposed areas from pollutants
              or fire residues.
          fabric:
            appearance: Carbon deposits show as dark gray to black stains that are sooty or smudged, embedding into fibers
              and creating a dull, discolored texture.
            coverage: Coverage is typically localized and uneven, ranging from small spots to extensive soiling, depending
              on exposure intensity and fabric type.
            pattern: Often appears in streaks or patches, particularly in areas affected by smoke or contact with dirty surfaces,
              and can follow fabric weaves.
          glass:
            appearance: Appears as a translucent to opaque black film that can be smudgy or sooty, often reducing transparency
              and leaving a hazy finish.
            coverage: Coverage is often light to moderate and can be uniform or patchy, depending on environmental factors
              like airflow and contamination source.
            pattern: Usually forms in streaks or uniform thin layers, especially on surfaces exposed to smoke or exhaust,
              such as windows or lenses.
          metal:
            appearance: Carbon deposits appear as black or dark gray, sooty layers that are often powdery or flaky in texture,
              sometimes with a matte finish.
            coverage: Coverage is usually partial and uneven, varying from light dusting to thick buildup depending on exposure
              duration and conditions.
            pattern: Typically forms in irregular patches or streaks, often concentrated in areas exposed to heat or combustion,
              such as near exhaust ports or engine components.
          mineral:
            appearance: Carbon deposits appear as dark, sooty coatings that are black or gray, with a fine, powdery texture
              that may adhere to mineral surfaces and alter their natural luster.
            coverage: Coverage is generally variable and partial, from sparse spots to dense films, influenced by mineral
              porosity and exposure to combustion byproducts.
            pattern: Tends to form in irregular patches or uniform thin layers, often in fissures or on exposed faces where
              environmental carbon settles.
          plastic:
            appearance: Carbon contamination appears as black or dark brown stains that are often smeary or powdery, potentially
              causing a dull or discolored finish on the plastic.
            coverage: Coverage is typically partial and variable, ranging from light film to heavy deposits, with variations
              based on plastic type and exposure.
            pattern: Commonly forms in irregular patches or streaks, especially on surfaces near combustion sources, and can
              be influenced by static attraction.
          rubber:
            appearance: Carbon buildup appears as black, sooty coatings that can be powdery or slightly sticky, often darkening
              the rubber surface and reducing its elasticity appearance.
            coverage: Coverage is generally partial and uneven, varying from light dusting to thick layers, with more accumulation
              in high-wear or contaminated zones.
            pattern: Typically forms in patches or streaks, especially in joints or areas exposed to exhaust or abrasion,
              and may follow surface contours.
          semiconductor:
            appearance: Carbon buildup manifests as dark, conductive films that are black or gray, with a fine, particulate
              texture that can interfere with electronic properties and surface finish.
            coverage: Coverage is often minimal but critical, ranging from microscopic spots to thin films, with variations
              that impact device performance and yield.
            pattern: Typically forms in uniform thin layers or localized spots, especially in cleanroom contaminants or during
              processing, leading to potential circuit defects.
          specialty:
            appearance: Carbon deposits appear as dark, sooty layers that are black or gray, with textures varying from powdery
              to adhered films, depending on the specialty material's composition and surface properties.
            coverage: Coverage is typically uneven and context-dependent, from light contamination to significant buildup,
              tailored to the material's unique exposure and functional requirements.
            pattern: Distribution can be patchy, streaked, or uniform, accumulating in specific areas based on the material's
              use, such as in aerospace or medical applications exposed to carbon sources.
          stone:
            appearance: Carbon deposits present as dark gray to black coatings that are gritty or sooty, potentially giving
              a dull, matte appearance to the stone surface.
            coverage: Coverage is typically partial and variable, from sparse spots to dense layers in industrial or high-traffic
              environments.
            pattern: Distribution is often patchy or streaked, accumulating in crevices or on exposed faces where pollutants
              or combustion residues settle.
          wood:
            appearance: Manifests as dark, sooty stains that can be black or brown, with a powdery or smudged texture that
              may penetrate porous surfaces.
            coverage: Coverage is generally localized and uneven, ranging from light discoloration to heavy soot accumulation
              in fire-damaged areas.
            pattern: Often appears in streaks or patches, especially in areas affected by smoke or fire, and can follow the
              wood grain for a streaked effect.
