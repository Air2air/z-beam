  visual_characteristics:
    presentation: descriptive
    items:
      - appearance_on_categories:
          ceramic:
            appearance: It presents as shiny, metallic coatings or dull stains, often in colors like gold or nickel, that may flake
              or peel on glazed surfaces.
            coverage: Coverage is usually partial and inconsistent, with higher amounts in porous regions and less on smooth, glazed
              parts.
            pattern: Patterns are often spotty or streaky, concentrating in unglazed areas or along cracks where absorption occurs.
          composite:
            appearance: It shows as blotchy, metallic stains or films that may highlight fiber or filler patterns, altering the
              composite's uniform look.
            coverage: Coverage is variable and patchy, often concentrated in porous or rough zones of the composite.
            pattern: Distribution is irregular, with patches or streaks that align with material heterogeneity, such as along fiber
              boundaries.
          concrete:
            appearance: Residue appears as glossy, metallic films or powdery deposits that can darken or stain the concrete, often
              in speckled patterns.
            coverage: Coverage is usually partial and varied, with dense spots in textured regions and little on smooth surfaces.
            pattern: It distributes patchily, concentrating in pores, cracks, or rough areas where residue adheres more easily.
          fabric:
            appearance: It manifests as stiff, discolored patches with metallic sheens or stains, potentially hardening the fabric
              and altering its color.
            coverage: Coverage is typically low and uneven, with isolated patches and minimal overall spread.
            pattern: Patterns are spotty or streaky, following weave patterns or areas of direct contact with the solution.
          glass:
            appearance: Residue appears as iridescent, cloudy, or rainbow-hued films, sometimes with gritty textures that reduce
              transparency and clarity.
            coverage: Coverage can range from nearly uniform thin layers to partial streaks, with variation based on application
              method.
            pattern: It forms uniform thin films or irregular streaks, often outlining drip marks or edges where solution dried.
          metal:
            appearance: Electroplating residue appears as dull, discolored patches or streaks, often with a hazy or cloudy finish
              that contrasts with the metal's natural luster.
            coverage: Coverage is usually partial and uneven, ranging from small spots to larger areas, with significant variation
              across the surface.
            pattern: It typically forms irregular streaks or patches, following the flow paths of the solution during application or
              drying.
          mineral:
            appearance: It shows as shiny, metallic coatings or dull films that may obscure crystal faces or natural colors,
              sometimes with a crusty texture.
            coverage: Coverage is often low and uneven, focusing on exposed or fractured areas with minimal uniform spread.
            pattern: Patterns are irregular, with spots or streaks following mineral cleavage planes or surface imperfections.
          plastic:
            appearance: Residue appears as oily, smeared films or powdery deposits in metallic shades, potentially causing
              discoloration or a tacky feel on the plastic.
            coverage: Coverage is typically low and uneven, with spots and streaks that vary widely across the material.
            pattern: It distributes as random patches or smears, often following surface contours or static charge areas.
          rubber:
            appearance: Residue appears as sticky, shiny coatings or dull crusts in metallic colors, which can penetrate and
              discolor the rubber surface.
            coverage: Coverage is generally sparse and localized, with high variation due to rubber's elasticity and surface
              texture.
            pattern: It forms blotches or streaks, often in creases or textured areas where solution is trapped.
          semiconductor:
            appearance: Residue appears as thin, hazy films or speckles in metallic hues, which can interfere with electrical
              properties and surface smoothness.
            coverage: Coverage ranges from nearly uniform micro-layers to isolated patches, with precise variation critical for
              performance.
            pattern: It forms uniform thin layers or localized spots, often aligned with processing steps or contamination sources.
          specialty:
            appearance: Residue varies widely but often appears as irregular metallic stains or films, tailored to the material's
              unique properties like conductivity or reflectivity.
            coverage: Coverage is highly variable and specific, designed for functional needs but often uneven in practice.
            pattern: Distribution is material-dependent, typically patchy or streaky, influenced by surface treatments and
              environmental factors.
          stone:
            appearance: It shows up as glossy or matte films, often in metallic colors, creating a speckled or stained look that may
              obscure the stone's natural texture.
            coverage: Coverage is typically low to moderate and uneven, with dense patches in recessed areas and minimal coverage on
              smooth surfaces.
            pattern: Distribution is patchy or streaky, following surface irregularities and crevices where residue accumulates.
          wood:
            appearance: Residue manifests as shiny, sticky, or crusty deposits, often in metallic hues like silver or copper, and
              can darken or stain the wood surface.
            coverage: Coverage is generally sparse and localized, with high variation depending on wood porosity and exposure.
            pattern: It appears as random spots or streaks, concentrating in grain patterns or low-lying areas where solution pools.
