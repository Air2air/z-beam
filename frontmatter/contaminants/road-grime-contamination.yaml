  visual:
    appearance_on_categories:
      presentation: descriptive
      items:
      - appearance_on_categories:
          ceramic:
            appearance: Appears as dark, muddy stains that contrast with smooth surfaces, sometimes leaving a gritty residue
              that dulls the glossy finish.
            coverage: Light to moderate, often uneven with higher coverage on exposed edges and surfaces prone to splashing.
            pattern: Usually in splatters or patches, accumulating in grooves or low spots where grime is deposited from road
              contact.
          composite:
            appearance: Manifests as dark, grimy layers that may highlight texture variations, appearing as stained or filmy
              deposits on mixed-material surfaces.
            coverage: Typically patchy and light to moderate, with variations based on composite composition and exposure
              to grime sources.
            pattern: Distributes in patches or streaks, following material seams and accumulating in areas with complex geometries
              from road exposure.
          concrete:
            appearance: Presents as dark, grimy coatings that fill pores and cracks, giving a stained, dull appearance with
              a rough, embedded texture.
            coverage: Varies from sparse to heavy, typically patchy with denser coverage on surfaces directly facing traffic
              or weathering.
            pattern: Distributes in streaks or patches, often accumulating in joints and low areas where road grime and water
              pool.
          fabric:
            appearance: Shows as dark, muddy stains that soak into fibers, creating a dirty, matted look with possible gritty
              particles clinging to the surface.
            coverage: Light to moderate and uneven, with higher amounts on exposed sections and edges that catch debris.
            pattern: Typically in splatters or patches, following the weave and concentrating in areas like seams or low points
              from road spray.
          glass:
            appearance: Presents as translucent to opaque smudges and splatters, reducing clarity with a filmy or speckled
              look that includes embedded dirt and oils.
            coverage: Typically light to moderate, with variations from sparse spots to near-complete coverage on heavily
              affected areas like vehicle windows.
            pattern: Forms in streaks, spots, or a thin uniform layer, often concentrated at the base or edges from road spray
              and wiper action.
          metal:
            appearance: Appears as dark gray to black smears or splatters, often with a gritty texture that can obscure the
              metallic shine and create a matte, dull finish.
            coverage: Varies from light spotting to heavy, uneven coverage, with higher amounts on lower surfaces and areas
              exposed to direct road contact.
            pattern: Typically forms in streaks or patches, especially along edges and in recessed areas where grime accumulates
              from road spray and tire kick-up.
          mineral:
            appearance: Appears as dark deposits that cling to crystalline or rough surfaces, obscuring natural luster and
              creating a filmy, discolored layer.
            coverage: Generally light and patchy, depending on mineral hardness and exposure; it may be more pronounced on
              porous varieties.
            pattern: Forms in uneven patches or streaks, with accumulation in fissures and on exposed faces from environmental
              grime exposure.
          plastic:
            appearance: Shows as dark smears or embedded particles, giving a dirty, matte appearance that can obscure colors
              and create a rough feel on smooth plastics.
            coverage: Varies widely from light spotting to heavy, uneven coverage, especially on lower parts exposed to tire
              spray.
            pattern: Commonly forms in streaks or spots, with distribution along contours and in recessed areas from road
              debris impact.
          rubber:
            appearance: Appears as black to dark brown embedded grime, blending with the material but adding a crusty or sticky
              texture that can mask the original surface.
            coverage: Can range from light to heavy, usually more uniform on tires but patchy on other rubber parts depending
              on contact with roads.
            pattern: Often uniform or in streaks, with accumulation in treads and flex points where road contaminants are
              pressed in during use.
          semiconductor:
            appearance: Shows as microscopic to visible dark contaminants that can create spots or films, potentially interfering
              with surface properties and optical clarity.
            coverage: Usually very light and sparse, as even minor contamination can affect performance, so it is often minimized
              in controlled environments.
            pattern: Typically in random spots or a thin uniform layer, distributed by airborne or contact-based grime during
              handling or use.
          specialty:
            appearance: Varies widely by material but generally appears as dark, grimy deposits that adapt to surface characteristics,
              such as staining coatings or embedding in unique textures.
            coverage: Ranges from light to heavy and is typically uneven, tailored to the material's use and susceptibility
              to contamination.
            pattern: Distribution depends on the specialty material's properties, often in patches or streaks that follow
              structural features from road or environmental exposure.
          stone:
            appearance: Shows as dark, grimy deposits that cling to rough textures, masking natural colors and creating a
              film that can appear wet or caked in crevices.
            coverage: Ranges from sparse to heavy, often patchy with denser coverage on surfaces facing traffic or weathering
              elements.
            pattern: Distributes unevenly as streaks or blotches, with accumulation in porous areas and along joints where
              road debris is trapped.
          wood:
            appearance: Manifests as dark, muddy stains that can penetrate porous surfaces, giving a dirty, discolored look
              and rough texture if debris is embedded.
            coverage: Generally light to moderate, with patchy distribution depending on exposure; it may be more concentrated
              on horizontal surfaces.
            pattern: Often appears in splatters or patches, following the wood grain and accumulating in cracks or low points
              where moisture and grime settle.
