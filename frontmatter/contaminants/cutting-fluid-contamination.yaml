  visual:
    appearanceOnCategories:
      presentation: descriptive
      items:
      - appearanceOnCategories:
          ceramic:
            appearance: On ceramic, machining coolant residue shows up as a greasy, translucent film that may darken or dull
              the glazed surface, often leaving a slippery or stained appearance.
            coverage: Coverage is usually partial and uneven, varying from light, scattered spots to more concentrated areas
              depending on surface texture and exposure.
            pattern: It commonly forms irregular patches or streaks, adhering to smooth areas and accumulating in micro-cracks
              or unglazed spots, with no set pattern.
          composite:
            appearance: On composites, machining coolant residue manifests as dark, oily stains or a thin film that can seep
              into fibers, often creating a blotchy or discolored surface with a slippery texture.
            coverage: Coverage is often uneven and localized, varying from minor spotting to extensive areas depending on
              material porosity and machining conditions.
            pattern: It usually appears as irregular patches or streaks, following the composite's layered or fibrous structure
              and concentrating in porous regions.
          concrete:
            appearance: On concrete, the residue appears as dark, oily patches or a faint film that can darken the surface
              and leave a slippery or stained finish, often highlighting the porous texture.
            coverage: Coverage is generally sparse and uneven, varying from isolated spots to more extensive areas based on
              concrete porosity and exposure.
            pattern: It usually forms irregular spots or streaks, seeping into pores and cracks, and following surface irregularities
              without a uniform distribution.
          fabric:
            appearance: On fabric, machining coolant residue shows up as dark, oily stains that can penetrate fibers, often
              creating a wet-looking, discolored area with a greasy texture.
            coverage: Coverage is typically localized and spotty, ranging from small stains to larger patches, with uneven
              variation depending on fabric absorbency.
            pattern: It tends to form irregular spots or blotches, spreading along the weave and concentrating in absorbent
              areas, with distribution influenced by fabric type.
          glass:
            appearance: On glass, the residue appears as a translucent or slightly cloudy film that can cause haziness or
              rainbow-like iridescence, often making the surface look smeared or less clear.
            coverage: Coverage is often widespread but thin, ranging from nearly complete films in some areas to partial coverage
              with variations in thickness.
            pattern: It typically forms uniform thin layers or irregular streaks, spreading across the surface and sometimes
              pooling at edges or in low spots.
          metal:
            appearance: Machining coolant residue on metal appears as a thin, oily film that can range from clear to milky
              white or slightly discolored, often giving the surface a wet or greasy look.
            coverage: Coverage is usually partial and uneven, varying from light spotting to extensive areas depending on
              the machining process and coolant application.
            pattern: It typically forms irregular streaks or patches, following the paths of coolant flow or machining operations,
              and may concentrate in recessed areas or around tool contact points.
          mineral:
            appearance: On minerals, machining coolant residue manifests as a greasy, often dark film that can obscure natural
              colors and crystal faces, leaving a dull or oily sheen.
            coverage: Coverage is usually partial and irregular, ranging from light filming to concentrated patches depending
              on mineral hardness and surface condition.
            pattern: It typically appears as random spots or thin layers, adhering to surface features and accumulating in
              fractures or rough areas, with no set pattern.
          plastic:
            appearance: On plastic, the residue appears as an oily, sometimes cloudy film that can cause discoloration or
              a greasy feel, often making the surface look wet or smudged.
            coverage: Coverage is typically irregular and partial, ranging from isolated spots to larger areas, with variations
              based on plastic type and coolant properties.
            pattern: It tends to form streaks or patches, spreading unevenly and possibly beading up on hydrophobic plastics,
              with distribution influenced by surface energy.
          rubber:
            appearance: On rubber, the residue appears as a dark, greasy coating that can cause swelling or a tacky feel,
              often leading to a shiny or stained surface.
            coverage: Coverage is generally widespread but variable, ranging from thin, even layers to thicker, patchy areas
              based on rubber composition and exposure time.
            pattern: It typically forms uniform films or irregular patches, spreading across the surface and possibly absorbing
              into the material, with no consistent pattern.
          semiconductor:
            appearance: On semiconductors, the residue appears as a thin, often invisible or slightly hazy film that can interfere
              with electrical properties, sometimes visible under magnification as contaminants.
            coverage: Coverage is typically extensive and uniform in thin layers, but can vary to partial coverage with micro-variations,
              critical for performance integrity.
            pattern: It tends to form uniform or micro-spotted layers, spreading evenly across the surface and potentially
              concentrating at edges or defects, with precise distribution.
          specialty:
            appearance: On specialty materials, machining coolant residue varies widely but often appears as an oily or filmy
              coating that can alter surface properties, such as causing discoloration or reduced functionality.
            coverage: Coverage is highly variable and material-dependent, ranging from minimal, isolated areas to near-complete
              films, influenced by specific composition and exposure.
            pattern: It generally forms irregular distributions like patches or streaks, adapting to the material's unique
              structure—e.g., layered in laminates or spotted on coated surfaces.
          stone:
            appearance: On stone, machining coolant residue manifests as dark, greasy spots or a faint film that can alter
              the natural color, often leaving a slippery or dull finish on the surface.
            coverage: Coverage is generally sparse and uneven, with variations from minor spotting to more extensive patches
              based on surface roughness and coolant exposure.
            pattern: It usually appears as random spots or streaks, concentrating in textured or porous regions and following
              the contours of the stone, without a consistent pattern.
          wood:
            appearance: On wood, the residue appears as dark, oily stains that can penetrate the grain, often creating a blotchy
              or discolored finish and sometimes leaving a glossy or sticky surface.
            coverage: Coverage is typically localized and spotty, ranging from small, isolated areas to larger sections, depending
              on exposure and wood porosity.
            pattern: It tends to form irregular patches or streaks, spreading along the wood grain and accumulating in porous
              areas, with no uniform distribution.
