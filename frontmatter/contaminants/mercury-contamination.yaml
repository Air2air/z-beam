  visual:
    appearanceOnCategories:
      presentation: descriptive
      items:
      - appearanceOnCategories:
          ceramic:
            appearance: Mercury residue on ceramic looks like shiny, metallic droplets or a thin, silvery layer, potentially
              darkening in glazed or unglazed areas with time.
            coverage: Coverage is sparse to moderate, often concentrated in spill zones with little spread on smooth surfaces.
            pattern: It tends to form isolated beads or small pools, accumulating in surface imperfections or along grooves.
          composite:
            appearance: Mercury on composite materials shows as reflective, silvery beads or smears, varying with components
              like fibers or resins, often appearing mottled.
            coverage: Coverage is uneven, ranging from sparse spots to moderate areas, depending on material porosity and
              spill dynamics.
            pattern: It forms irregular patches or streaks, seeping into interfaces or pores between different materials in
              the composite.
          concrete:
            appearance: On concrete, mercury shows as bright, metallic droplets or a dull gray film in porous areas, often
              darkening with oxidation and debris incorporation.
            coverage: Coverage is typically sparse to moderate, with high variation due to surface roughness and absorption.
            pattern: It forms irregular patches or beads that settle into cracks, pores, and low spots, rarely spreading evenly.
          fabric:
            appearance: Mercury on fabric appears as small, silvery beads that can cling to fibers, sometimes leaving grayish
              stains as it oxidizes or is absorbed.
            coverage: Coverage is usually sparse, varying from isolated spots to small clusters, influenced by fabric type
              and spill amount.
            pattern: Distribution is spotty, with droplets scattered across the weave or concentrated in folds and low areas.
          glass:
            appearance: On glass, mercury appears as highly reflective, silvery droplets or a smooth, mirror-like film that
              beads up easily due to non-porosity.
            coverage: Coverage is usually minimal to moderate, with beads scattered unevenly and easily movable.
            pattern: It forms distinct, round beads or irregular streaks, often rolling to edges or low points without soaking
              in.
          metal:
            appearance: Mercury spill residue on metal appears as a silvery, reflective liquid that may form small beads or
              a thin, uneven film, often with a dull gray tarnish over time.
            coverage: Coverage is usually sparse to moderate, varying from isolated spots to larger patches, depending on
              spill volume and surface texture.
            pattern: It typically forms scattered droplets or irregular streaks, concentrating in low spots or along seams
              due to mercury's high surface tension and mobility.
          mineral:
            appearance: Mercury residue on minerals appears as silvery, liquid beads or a thin film that may contrast with
              the mineral's color, sometimes amalgamating with certain metals.
            coverage: Coverage is generally low, limited to spill contact areas with minimal spreading on hard surfaces.
            pattern: It distributes as isolated droplets or small pools, often following crystalline structures or surface
              fractures.
          plastic:
            appearance: On plastic, mercury appears as silvery, bead-like droplets that may not wet the surface well, sometimes
              leaving a faint gray film if static attracts particles.
            coverage: Coverage is generally low, limited to discrete beads with minimal spreading unless the surface is textured.
            pattern: Distribution is spotty, with droplets remaining separate or forming small clusters, influenced by surface
              smoothness and static charge.
          rubber:
            appearance: On rubber, mercury residue looks like shiny, silvery droplets that may embed slightly in soft surfaces,
              potentially causing dark discoloration over time.
            coverage: Coverage is low to moderate, often localized to contact points with little uniform spread.
            pattern: It typically appears as scattered beads or smears, pooling in indentations or along seams due to flexibility
              and surface texture.
          semiconductor:
            appearance: On semiconductors, mercury looks like tiny, reflective droplets or a faint silvery haze, potentially
              causing visible defects on sensitive surfaces.
            coverage: Coverage is typically minimal and localized, with high risk of uneven distribution due to precision
              requirements.
            pattern: It forms micro-scale spots or streaks, often concentrating in contaminated zones or along circuit paths.
          specialty:
            appearance: Mercury on specialty materials varies widely but generally appears as silvery beads or films, adapting
              to unique surfaces like coatings or alloys with possible discoloration.
            coverage: Coverage ranges from sparse to moderate, highly variable based on material composition and exposure
              specifics.
            pattern: Distribution is material-dependent, often irregular with spots or patches influenced by surface properties
              and spill conditions.
          stone:
            appearance: Mercury on stone surfaces shows as bright, metallic beads or a thin, silvery sheen, which may darken
              to gray or black with oxidation on rough textures.
            coverage: Coverage is typically sparse, varying from scattered spots to small concentrated patches based on surface
              porosity.
            pattern: Distribution is patchy, with droplets clustering in pores, fissures, or low-lying areas, rarely forming
              a uniform layer.
          wood:
            appearance: On wood, mercury residue looks like shiny, silvery droplets that can soak into porous areas, leaving
              dark stains or a grayish film as it oxidizes.
            coverage: Coverage is generally low to moderate, with uneven distribution due to absorption, often limited to
              spill areas.
            pattern: It often appears as isolated beads or small pools, following the wood grain or accumulating in cracks
              and imperfections.
