  safety_data: &id001
    fire_explosion_risk:
      severity: low
      description: Minimal fire risk with standard precautions and adequate ventilation
      mitigation: Standard fire safety precautions, extinguisher available within 15m
    fumes_generated:
    - compound: Crystalline Silica (as respirable dust)
      concentration_mg_m3: 5-50
      exposure_limit_mg_m3: 0.025
      hazard_class: carcinogenic
    - compound: Carbon Dioxide
      concentration_mg_m3: 900-1800
      exposure_limit_mg_m3: 9000
      hazard_class: toxic
    - compound: Calcium Oxide dust
      concentration_mg_m3: 2-20
      exposure_limit_mg_m3: 2
      hazard_class: irritant
    particulate_generation:
      respirable_fraction: 0.3
      size_range_um:
      - 0.1
      - 100
    ppe_requirements:
      eye_protection: goggles
      respiratory: PAPR
      skin_protection: full_suit
      rationale: Standard protection against workplace hazards
    substrate_compatibility_warnings:
    - Laser cleaning may alter concrete surface chemistry and increase porosity
    - Thermal stress may cause micro-cracking in concrete substrate
    - Efflorescence salts may vaporize and redeposit on adjacent surfaces
    toxic_gas_risk:
      severity: low
      primary_hazards:
      - compound: Crystalline Silica (as respirable dust)
        concentration_mg_m3: 5-50
        hazard_class: carcinogenic
      - compound: Carbon Dioxide
        concentration_mg_m3: 900-1800
        hazard_class: toxic
      description: Crystalline Silica (as respirable dust) and Carbon Dioxide generation - multiple toxic compounds
      mitigation: 'N95 or P100 respirator for particulate control, standard ventilation. WARNING: Crystalline Silica (as respirable
        dust) - known carcinogen(s), minimize exposure'
    ventilation_requirements:
      exhaust_velocity_m_s: 0.5
      filtration_type: HEPA
      minimum_air_changes_per_hour: 10
      rationale: Standard industrial ventilation (10 ACH) for particulate control
    visibility_hazard:
      severity: moderate
      description: Moderate visibility reduction (40-60%), significant particulate haze
      source: 'Respirable fraction: 0.30 (30% of particles <10μm)'
      mitigation: Ensure clear sight lines, use source extraction, maintain awareness of surroundings
      related_field: particulate_generation.respirable_fraction
