  visual:
    appearanceOnCategories:
      presentation: descriptive
      items:
      - appearanceOnCategories:
          ceramic:
            appearance: Efflorescence on ceramic shows as a white, powdery, or crystalline residue that can dull glazed surfaces
              and create a rough texture.
            coverage: Coverage is usually localized and uneven, ranging from minor spots to larger affected zones in damp
              conditions.
            pattern: It often appears in spots, streaks, or patches, commonly at grout lines, unglazed areas, or where moisture
              accumulates.
          composite:
            appearance: Efflorescence on composites appears as a white, powdery, or crystalline layer that can obscure textures
              and cause surface degradation.
            coverage: Coverage is typically partial and variable, from isolated spots to broader patches depending on composition
              and exposure.
            pattern: It often forms in blotches or streaks, following material interfaces or moisture ingress points, such
              as seams or cracks.
          concrete:
            appearance: On concrete, efflorescence appears as a white, powdery, or crystalline deposit that can cover surfaces
              with a chalky, often fluffy layer.
            coverage: Coverage can range from light, scattered deposits to heavy, extensive layers, often varying with moisture
              and curing conditions.
            pattern: It typically forms in uniform films, streaks, or patches, emerging from pores and cracks as salts migrate
              outward.
          fabric:
            appearance: Efflorescence on fabric manifests as white, powdery, or stiff stains that can discolor fibers and
              create a crusty texture.
            coverage: Coverage is typically light and localized, varying from small stains to larger affected sections in
              damp environments.
            pattern: It often forms in irregular spots or streaks, following moisture wicking or contact with contaminated
              surfaces.
          glass:
            appearance: On glass, efflorescence appears as a hazy, white, or cloudy film that reduces transparency and may
              feel slightly gritty or smooth.
            coverage: Coverage is generally light to moderate, with variations from partial haziness to near-complete opacity
              in severe cases.
            pattern: It typically forms in uniform films or streaks, often spreading from edges or areas in contact with contaminated
              materials.
          metal:
            appearance: Efflorescence on metal appears as a white, powdery, or crystalline deposit that can feel chalky and
              may obscure the underlying metallic luster.
            coverage: Coverage is usually partial and localized, varying from small, scattered areas to larger sections depending
              on environmental conditions.
            pattern: It typically forms in irregular spots or patches, often concentrated near edges, joints, or areas exposed
              to moisture.
          mineral:
            appearance: Efflorescence on minerals presents as a white, crystalline, or powdery coating that may alter natural
              hues and create a frosted effect.
            coverage: Coverage is often partial and uneven, from minor spots to widespread films depending on mineral porosity
              and environmental factors.
            pattern: It usually appears in blotches, uniform layers, or along cleavage planes, driven by salt crystallization
              from internal or external sources.
          plastic:
            appearance: On plastic, efflorescence manifests as a white, chalky, or filmy deposit that can make surfaces appear
              cloudy and may feel powdery.
            coverage: Coverage is generally light and patchy, with variations from sparse films to more extensive areas in
              high-humidity settings.
            pattern: It typically forms in uniform films or irregular spots, often developing on exposed surfaces or near
              contaminants.
          rubber:
            appearance: On rubber, efflorescence shows as a white, dusty, or crusty coating that may make the surface feel
              rough and reduce flexibility.
            coverage: Coverage is generally sparse and uneven, ranging from minor deposits to more significant areas in deteriorating
              conditions.
            pattern: It usually appears in spots or patches, often concentrated in crevices or areas exposed to salts and
              moisture.
          semiconductor:
            appearance: On semiconductors, efflorescence manifests as a white, hazy, or crystalline contamination that can
              interfere with electronic properties and surface smoothness.
            coverage: Coverage is generally minimal and patchy, with variations from isolated areas to broader contamination
              in poor storage conditions.
            pattern: It typically forms in uniform films or localized spots, often at edges or defects where moisture and
              salts accumulate.
          specialty:
            appearance: Efflorescence on specialty materials appears as a white, powdery, or crusty deposit that can degrade
              unique finishes and functional properties.
            coverage: Coverage is variable and context-dependent, ranging from light, localized deposits to more extensive
              areas based on exposure and material composition.
            pattern: It often forms in irregular patterns such as spots or streaks, influenced by material-specific vulnerabilities
              to moisture and salts.
          stone:
            appearance: Efflorescence on stone presents as a white, powdery, or crystalline coating that can alter the natural
              color and texture, giving a frosted look.
            coverage: Coverage can vary from light, scattered deposits to extensive, uniform layers, depending on porosity
              and moisture exposure.
            pattern: It usually forms in blotches, streaks, or a uniform film, often emerging from pores, cracks, or joints
              where salts migrate to the surface.
          wood:
            appearance: On wood, efflorescence manifests as a white, fluffy, or crusty layer that can make the surface appear
              dull and may lift or damage finishes.
            coverage: Coverage is typically uneven and sparse, ranging from isolated spots to broader areas in high-moisture
              environments.
            pattern: It often appears in streaks or patches, following the wood grain or moisture pathways, and is common
              in damp, unsealed areas.
