visual_characteristics:
  appearance_on_categories:
    ceramic:
      appearance: Undercoating on ceramic looks like dark, oily patches with a matte or slightly glossy finish, adhering to
        the smooth surface and feeling tacky.
      coverage: Coverage is generally partial, with variations from light spotting to dense areas where the coating collects.
      pattern: It forms blotches or smears, often spreading unevenly and pooling in grooves or around edges.
    composite:
      appearance: Undercoating on composites shows as a dark, resin-like coating with a matte texture, blending with or obscuring
        the material's layered structure.
      coverage: Coverage is variable, from light spotting to heavy deposits depending on surface texture and exposure.
      pattern: It forms blotchy areas or streaks, following the composite's contours and accumulating in joints or porous
        sections.
    concrete:
      appearance: On concrete, it shows as a dark, oily coating with a matte finish, penetrating pores and creating a rough,
        stained surface.
      coverage: Coverage is patchy, with thin films on smooth areas and heavy accumulations in textured or damaged regions.
      pattern: It appears as splotches or runs, often concentrated in cracks or low spots and spreading unevenly.
    fabric:
      appearance: Undercoating on fabric appears as dark, greasy stains with a matte, soaked-in look, feeling stiff or sticky
        and darkening fibers.
      coverage: Coverage is often uneven, ranging from light spotting to saturated patches where the fabric absorbs more coating.
      pattern: It forms irregular blotches or streaks, spreading along weave patterns and pooling in dense areas.
    glass:
      appearance: On glass, it shows as translucent to opaque dark streaks or smudges with a greasy or sticky residue, reducing
        clarity and reflecting light unevenly.
      coverage: Coverage is usually sparse and uneven, with thin layers that may partially obscure the surface.
      pattern: It appears as streaks or droplets, often running downward from application points and forming irregular patterns.
    metal:
      appearance: Automotive undercoating on metal appears as a thick, black or dark gray coating with a matte or slightly
        glossy finish, often feeling tacky or rubbery to the touch.
      coverage: Coverage is usually partial to full, varying from thin layers on flat surfaces to thick accumulations in protected
        areas.
      pattern: It typically forms irregular patches or streaks, especially in crevices and seams, due to uneven application
        or runoff.
    mineral:
      appearance: Undercoating on minerals looks like a dark, greasy film with a dull or slightly shiny texture, adhering
        to crystalline surfaces and obscuring natural colors.
      coverage: Coverage is typically partial, varying from light films to thick layers in porous or rough areas.
      pattern: It forms irregular spots or coatings, following mineral fractures and accumulating in depressions.
    plastic:
      appearance: On plastic, it appears as a dark, sticky film with a matte or satin finish, potentially causing discoloration
        or a greasy look.
      coverage: Coverage is often uneven, ranging from thin films to thick layers in recessed areas or seams.
      pattern: It distributes in irregular patches or streaks, clinging to textured surfaces and forming drips or runs.
    rubber:
      appearance: On rubber, it looks like a dark, oily layer with a tacky or flexible finish, often blending into the material
        but appearing greasy.
      coverage: Coverage is typically partial to full, with thicker buildups in crevices and thinner layers on smooth surfaces.
      pattern: It spreads in smears or patches, conforming to the rubber's shape and collecting in grooves or flex points.
    semiconductor:
      appearance: On semiconductors, it appears as dark, conductive or insulating residues with a matte finish, potentially
        interfering with electronic properties.
      coverage: Coverage is usually sparse and inconsistent, with minimal amounts that can vary across the surface.
      pattern: It distributes in microscopic spots or thin layers, often uneven due to application methods and surface interactions.
    specialty:
      appearance: On specialty materials, undercoating looks like a dark, adherent coating with texture varying by substrate,
        often appearing greasy or rubbery.
      coverage: Coverage is highly variable, depending on material composition, ranging from light films to heavy deposits
        in specific areas.
      pattern: It forms irregular patterns such as patches or streaks, adapting to the material's unique properties and surface
        features.
    stone:
      appearance: Undercoating on stone appears as a dark, greasy film with a matte or slightly shiny surface, clinging to
        pores and rough textures.
      coverage: Coverage is typically patchy, with thin films on smooth surfaces and thicker deposits in textured or porous
        regions.
      pattern: It forms irregular spots or smears, often concentrated in depressions or along edges where it can accumulate.
    wood:
      appearance: On wood, it looks like a dark, oily stain with a sticky or waxy texture, often darkening the natural grain
        and appearing dull or matte.
      coverage: Coverage is generally uneven, ranging from light spotting to heavy saturation in areas exposed to direct contact.
      pattern: It spreads in blotchy patches or streaks, following the wood's grain and pooling in low spots or cracks.
