  visual:
    appearance_on_categories:
      presentation: descriptive
      items:
      - appearance_on_categories:
          ceramic:
            appearance: Heat treatment scale on ceramic shows as discolored, often white or grayish crusts with a rough, chalky
              texture, and may include blisters or cracks from thermal expansion.
            coverage: Coverage is generally partial, with spots to full-surface layers, varying based on firing conditions
              and ceramic type.
            pattern: It forms in localized patches or uniform coatings, often following glaze imperfections or heat-affected
              zones, and can appear as spots or broad areas.
          composite:
            appearance: Heat treatment scale on composites manifests as darkened, charred regions with delamination or fiber
              exposure, showing brown to black discoloration and a rough, brittle texture.
            coverage: Coverage is usually partial, ranging from minor spots to extensive sections, with variation based on
              composite materials and heat exposure.
            pattern: It appears in patchy or streaked forms, often along matrix boundaries or heat-affected layers, and can
              be isolated or interconnected.
          concrete:
            appearance: On concrete, heat treatment scale shows as spalled, discolored surfaces with whitish or grayish powder,
              cracks, and a rough, crumbly texture from dehydration and thermal stress.
            coverage: Coverage is usually localized and uneven, from minor spots to significant sections, varying with concrete
              mix and heating conditions.
            pattern: It forms in patchy or map-like patterns, often concentrated near heat sources, and may appear as isolated
              spots or connected damaged areas.
          fabric:
            appearance: Heat treatment scale on fabric appears as scorched, brittle areas with yellow to brown or black discoloration,
              often showing a stiff, charred texture and possible holes.
            coverage: Coverage is typically partial, ranging from small spots to extensive areas, with variation based on
              fabric material and heat duration.
            pattern: It distributes in irregular patches or streaks, following the weave or direct heat contact, and can be
              spotty or form larger burnt sections.
          glass:
            appearance: On glass, heat treatment scale appears as hazy, milky, or iridescent films with a rough or etched
              texture, often showing rainbow-like colors or white deposits from devitrification.
            coverage: Coverage is usually extensive but variable, from thin films covering large areas to thicker patches,
              depending on temperature and glass composition.
            pattern: It distributes in uniform layers or irregular streaks, often concentrated near edges or heated regions,
              and can form patchy or continuous coatings.
          metal:
            appearance: Heat treatment scale on metal appears as a dark, often black or bluish oxide layer with a rough, flaky
              texture that can obscure the original metallic finish.
            coverage: Coverage is usually partial, ranging from localized spots to extensive areas, with variation depending
              on heat exposure and material composition.
            pattern: It typically forms in uneven patches or streaks, concentrated in areas exposed to high temperatures,
              and may vary in thickness across the surface.
          mineral:
            appearance: Heat treatment scale on minerals appears as altered colors, such as reddish or blackened hues, with
              a cracked or powdered surface and possible phase changes visible as new textures.
            coverage: Coverage is typically partial, ranging from small spots to extensive areas, with variation due to mineral
              type and thermal history.
            pattern: It distributes in irregular patches or zones, influenced by crystal structure and heat application, and
              can form spotty or broad altered regions.
          plastic:
            appearance: On plastic, heat treatment scale appears as discolored, often yellowed or browned areas with a bubbled,
              melted, or cracked surface, and may emit a burnt odor.
            coverage: Coverage is typically localized to heated regions, varying from small spots to larger deformed areas,
              with unevenness due to plastic composition.
            pattern: It distributes in irregular patches or streaks, concentrated where heat was applied, and can form blistered
              spots or widespread degradation.
          rubber:
            appearance: On rubber, heat treatment scale presents as hardened, cracked, or blistered surfaces with dark brown
              to black discoloration, and may have a sticky or powdery residue.
            coverage: Coverage is generally localized, from small blisters to larger affected zones, with uneven distribution
              depending on rubber type and heat intensity.
            pattern: It forms in irregular patches or blisters, concentrated in heated areas, and can appear as spotty degradation
              or more uniform hardening.
          semiconductor:
            appearance: On semiconductors, heat treatment scale manifests as discolored, often hazy or oxidized layers with
              rough surfaces, and may show defects like pits or cracks from thermal degradation.
            coverage: Coverage is generally extensive but variable, from thin layers covering large areas to thicker patches,
              depending on processing conditions.
            pattern: It forms in uniform films or localized spots, often on exposed surfaces or near junctions, and can appear
              as patchy or continuous coatings.
          specialty:
            appearance: Heat treatment scale on specialty materials appears as varied discoloration, such as darkening or
              whitening, with texture changes like flaking or bubbling, specific to the material's composition.
            coverage: Coverage is highly variable, from localized spots to full-surface layers, depending on the specialty
              material and treatment parameters.
            pattern: It distributes in patterns unique to the material, such as uniform coatings or irregular patches, influenced
              by heat exposure and inherent properties.
          stone:
            appearance: Heat treatment scale on stone presents as discolored, often whitish or grayish patches with a powdery
              or flaky surface, sometimes showing cracks or spalling from thermal stress.
            coverage: Coverage is typically partial and uneven, ranging from minor spots to significant sections, with variation
              due to stone type and heating conditions.
            pattern: It forms in random patches or concentric rings, influenced by heat application points, and may appear
              as isolated spots or connected areas.
          wood:
            appearance: On wood, heat treatment scale manifests as darkened, charred areas with a brittle, cracked texture,
              often showing brown to black discoloration that contrasts with the natural grain.
            coverage: Coverage is generally localized to heated zones, varying from small spots to larger sections, with uneven
              distribution based on heat intensity and duration.
            pattern: It appears in irregular patches or streaks, following the wood's grain or areas of direct heat contact,
              and can be spotty or more widespread.
