  visual_characteristics:
    appearance_on_categories:
      ceramic:
        appearance: Epoxy resin on ceramic shows as shiny, hardened coatings in various colors, sometimes with a smooth or
          slightly textured feel that contrasts with the ceramic glaze.
        coverage: Coverage is usually partial, with small to moderate areas affected, varying with application technique and
          ceramic porosity.
        pattern: It typically forms in spots, runs, or patches, often pooling in decorative grooves or uneven areas of the
          ceramic surface.
      composite:
        appearance: On composites, epoxy contamination looks like integrated or surface-level glossy coatings, matching or
          contrasting with the composite matrix in color and texture.
        coverage: Coverage can be extensive in manufacturing or spotty in repairs, with variations based on composite type
          and resin application.
        pattern: It may form uniform layers, streaks, or localized patches, following the composite's fibrous or layered structure.
      concrete:
        appearance: Epoxy contamination on concrete looks like glossy, sealed patches or coatings, often in clear or gray
          tones that fill pores and create a smooth, durable surface.
        coverage: Coverage can be partial for spills or full in coatings, with variations due to concrete porosity and application
          method.
        pattern: It typically appears as uneven patches, streaks, or pooled areas, adhering to rough concrete textures and
          cracks.
      fabric:
        appearance: On fabric, epoxy resin shows as stiff, shiny areas that harden the fibers, appearing in clear or dyed
          forms with a plastic-like, often brittle finish.
        coverage: Coverage ranges from small stains to larger impregnated sections, varying with fabric absorbency and resin
          amount.
        pattern: It forms in irregular spots, drips, or soaked patches, following the weave pattern and potentially causing
          discoloration or saturation.
      glass:
        appearance: On glass, epoxy deposits are visible as clear or slightly cloudy, glossy layers that may have bubbles
          or inclusions, adhering tightly to the smooth surface.
        coverage: Coverage can range from thin, widespread films to thick, isolated patches, depending on how the resin is
          applied and cured.
        pattern: They often appear as uniform films, drips, or irregular blobs, spreading evenly or accumulating at edges
          due to surface tension.
      metal:
        appearance: Epoxy deposits on metal appear as glossy, translucent to opaque coatings, often in amber, clear, or white
          hues with a smooth or slightly textured finish.
        coverage: Coverage is usually partial, ranging from small spots to large areas, with variations depending on application
          method and surface conditions.
        pattern: They typically form in irregular patches or streaks, following surface contours or pooling in low areas due
          to gravity and adhesion.
      mineral:
        appearance: On minerals, epoxy deposits appear as glossy, transparent or opaque films that may enhance or obscure
          natural colors and crystal structures.
        coverage: Coverage is usually targeted and partial, such as in crack filling or surface sealing, with amounts varying
          by mineral type.
        pattern: They form in localized spots, fills, or coatings, often following mineral fractures or surface features for
          stabilization or display.
      plastic:
        appearance: Deposits on plastic appear as glossy, adherent layers that can be clear or pigmented, sometimes causing
          slight clouding or a slick texture on the plastic surface.
        coverage: Coverage varies from isolated spots to larger sections, often non-uniform due to differences in plastic
          surface energy.
        pattern: They distribute as irregular patches, streaks, or drips, influenced by plastic smoothness and chemical compatibility
          with the resin.
      rubber:
        appearance: Epoxy deposits on rubber appear as stiff, glossy films that can crack or peel, often in clear or colored
          forms contrasting with the rubber's flexible surface.
        coverage: Coverage is usually minimal and patchy, as epoxy does not bond well to rubber, resulting in scattered contamination.
        pattern: Distribution is typically in blotches or streaks, with poor adhesion leading to flaking or beading on the
          rubber texture.
      semiconductor:
        appearance: Epoxy contamination on semiconductors appears as thin, glossy layers that can be clear or colored, potentially
          interfering with electronic properties and surface planarity.
        coverage: Coverage is typically controlled and partial in manufacturing, but can vary from minimal spots to full encapsulation
          in devices.
        pattern: It distributes as uniform films, spots, or streaks, often from encapsulation processes or accidental spills
          on delicate components.
      specialty:
        appearance: On specialty materials like advanced alloys or polymers, epoxy deposits show as customized glossy coatings,
          tailored in color and texture for specific applications or contaminants.
        coverage: Coverage is highly variable, from precise, minimal applications to extensive coatings, based on the specialty
          material's use and epoxy function.
        pattern: Distribution depends on the material's unique properties, forming uniform layers, patterned applications,
          or irregular patches as required.
      stone:
        appearance: Epoxy contamination on stone appears as glossy, often colored or clear films that can fill pores and cracks,
          creating a reflective or matte finish depending on curing.
        coverage: Coverage is typically partial, with localized spots or broad patches, and varies based on stone type and
          resin application.
        pattern: It tends to form in blotches, streaks, or filled fissures, following natural stone irregularities and surface
          imperfections.
      wood:
        appearance: On wood, epoxy resin deposits look like shiny, hardened layers that can be clear or tinted, enhancing
          or obscuring the grain with a smooth, glass-like surface.
        coverage: It varies from thin, spotty coatings to full coverage in art or repair projects, influenced by wood porosity
          and resin viscosity.
        pattern: Distribution is often uneven, with pooling in grooves or cracks, and may form drips, runs, or patches based
          on wood texture and application.
