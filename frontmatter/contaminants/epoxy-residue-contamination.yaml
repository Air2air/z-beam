id: epoxy-residue-contamination
name: Epoxy Resin Deposits
category: organic-residue
subcategory: adhesive
datePublished: '2025-12-19T00:21:10.733319Z'
dateModified: '2025-12-19T01:00:58.973930Z'
description: Epoxy-residue forms when cured two-part adhesive hardens on surfaces
  after mixing and application, creating tough layer with dense bonds. This contamination
  shows unique stickiness and resistance to solvents unlike softer paints or oils,
  so removal needs targeted heat without damaging base. On metals such as steel and
  aluminum, residue clings tightly during exposure, posing challenges like incomplete
  stripping because of its durability, yet laser cleaning succeeds by vaporizing it
  precisely through controlled pulses.
