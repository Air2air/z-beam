  visual_characteristics:
    appearance_on_categories:
      ceramic:
        appearance: Hydraulic fluid on ceramic surfaces appears as dark, wet-looking stains that can bead up or spread, sometimes
          leaving a glossy residue.
        coverage: Coverage is usually spotty and uneven, with higher accumulation in textured or unglazed areas.
        pattern: It typically forms droplets, spots, or irregular patches, often concentrated where fluid lands or is wiped.
      composite:
        appearance: Hydraulic fluid on composites appears as dark, greasy stains that can seep into layers, often creating
          a mottled or blotchy look.
        coverage: Coverage is often uneven and infiltrative, with variation based on composite porosity and resin type.
        pattern: It forms irregular patches or streaks, potentially following fiber orientations or defects in the material.
      concrete:
        appearance: On concrete, it manifests as dark, oily patches that penetrate the porous surface, often creating a slick,
          discolored area.
        coverage: Coverage is often localized and variable, with deeper staining in porous regions and lighter coverage on
          sealed surfaces.
        pattern: It forms irregular spots or streaks, typically pooling in low spots or spreading along cracks and joints.
      fabric:
        appearance: Hydraulic fluid on fabric appears as dark, greasy stains that soak into fibers, often leaving a wet, shiny
          patch with possible discoloration.
        coverage: Coverage is usually patchy and absorbent, with stains varying in size and intensity based on fabric type
          and fluid amount.
        pattern: It spreads in blotchy or irregular shapes, following the weave pattern and fluid absorption paths.
      glass:
        appearance: On glass, contamination shows as smeared, translucent films or streaks that can distort clarity, often
          with a greasy, reflective look.
        coverage: Coverage is often partial and streaky, varying from thin films to thicker accumulations in certain areas.
        pattern: It appears as streaks or smudges, usually in linear patterns from wiping or dripping, and may form droplets
          if not spread.
      metal:
        appearance: Hydraulic fluid contamination on metal often appears as dark, oily streaks or smears, sometimes with a
          rainbow-like sheen due to light interference on the surface.
        coverage: Coverage is usually localized and variable, ranging from small spots to larger areas depending on the leak
          source and duration.
        pattern: It typically forms irregular streaks or patches, often concentrated around joints, leaks, or moving parts
          where fluid escapes.
      mineral:
        appearance: Hydraulic fluid on minerals appears as dark, oily coatings that can obscure natural colors and textures,
          sometimes giving a wet look.
        coverage: Coverage is generally sparse and uneven, influenced by mineral smoothness and fluid viscosity.
        pattern: It tends to form droplets or patches, adhering to surface features and potentially filling crevices or crystal
          faces.
      plastic:
        appearance: On plastic, it looks like oily, dark smudges or streaks that may cause slight discoloration or a slick,
          shiny surface.
        coverage: Coverage is variable, from small localized spots to broader areas, depending on fluid viscosity and exposure.
        pattern: Contamination spreads as smears or patches, often following surface contours or accumulating in seams and
          edges.
      rubber:
        appearance: On rubber, contamination shows as dark, oily areas that may cause swelling or a glossy, tacky surface
          over time.
        coverage: Coverage can range from localized spots to more extensive areas, varying with rubber composition and fluid
          exposure.
        pattern: It typically appears as blotches or uniform coatings, especially on exposed surfaces where fluid contacts
          and absorbs.
      semiconductor:
        appearance: On semiconductors, contamination shows as thin, oily films or spots that can interfere with electrical
          properties, often appearing as subtle, reflective areas.
        coverage: Coverage is typically minimal and spotty, as even small amounts can cause significant functional issues.
        pattern: It appears as small droplets or smears, usually localized to exposed surfaces or contamination points during
          handling.
      specialty:
        appearance: Hydraulic fluid on specialty materials varies widely but generally appears as dark, greasy stains or films
          that may alter surface properties specific to the material.
        coverage: Coverage is highly variable, tailored to the material's use, ranging from isolated spots to extensive coatings.
        pattern: Distribution depends on material characteristics, often forming irregular patches or uniform layers based
          on application and exposure.
      stone:
        appearance: Hydraulic fluid on stone appears as dark, oily spots that may darken the natural color, sometimes leaving
          a slick, reflective surface.
        coverage: Coverage is typically sparse and localized, with variation based on stone porosity and fluid exposure time.
        pattern: It forms isolated spots or irregular patches, often pooling in low-lying areas or following surface cracks
          and pores.
      wood:
        appearance: On wood, it manifests as dark, greasy stains that can penetrate the grain, often making the surface look
          wet or discolored with a glossy finish.
        coverage: Coverage is often uneven and patchy, with deeper penetration in porous areas, leading to varied stain intensity.
        pattern: Contamination spreads in blotchy patches or along the wood grain, following the path of fluid flow or absorption.
