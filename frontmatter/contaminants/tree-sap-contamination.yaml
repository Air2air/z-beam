visual_characteristics:
  appearance_on_categories:
    ceramic:
      appearance: Contamination presents as sticky, amber to brown spots that may harden into a glossy or rough texture, sometimes
        adhering firmly to the glazed or unglazed surface.
      coverage: Usually sparse, with small, scattered areas; coverage can increase if the surface is rough or porous, enhancing
        adhesion.
      pattern: Often appears as isolated spots or small patches, distributed randomly where sap lands, without following any
        specific ceramic pattern.
    composite:
      appearance: Appears as sticky, resinous patches that may vary in color from light amber to dark brown, adhering to the
        composite matrix and potentially causing surface irregularities.
      coverage: Can be moderate, with uneven coverage; depends on the material's porosity and orientation, often more pronounced
        on exposed areas.
      pattern: Distributed in irregular patches or streaks, influenced by the composite's texture and how sap flows across
        it.
    concrete:
      appearance: Sap and resin show as dark, sticky deposits that harden into rough, crusty patches, often embedded in the
        porous surface and contrasting with the concrete's gray tone.
      coverage: Can range from sparse to extensive, with higher coverage on horizontal surfaces like pavements, varying with
        environmental conditions.
      pattern: Typically appears in irregular patches or drips, accumulating in cracks and low spots where moisture and debris
        gather.
    fabric:
      appearance: Contamination appears as dark, sticky stains that can harden into crusty patches, often attracting fibers
        and dirt, leading to a matte or rough texture.
      coverage: Variable, from small spots to larger stained areas; coverage depends on fabric absorbency and the amount of
        sap exposure.
      pattern: Forms in blotches or streaks, spreading along the fabric weave if the sap is liquid, resulting in irregular
        patterns.
    glass:
      appearance: Sap and resin appear as clear to yellowish sticky smears that can harden into brittle, translucent films,
        potentially obscuring transparency and attracting dust.
      coverage: Typically minimal to moderate, with variations from thin films to thicker accumulations in areas of direct
        contact.
      pattern: Usually forms as streaks or smears from dripping, often in vertical patterns if on windows or other upright
        surfaces.
    metal:
      appearance: Tree sap and resin appear as sticky, amber to dark brown translucent spots that can harden into a glossy
        or matte finish, often trapping dirt and debris.
      coverage: Usually sparse to moderate, with isolated patches; coverage varies based on exposure and can be minimal on
        vertical surfaces.
      pattern: Typically forms in irregular spots or streaks, concentrated in areas where sap drips or accumulates, such as
        under tree branches.
    mineral:
      appearance: Contamination manifests as glossy, resinous coatings that can range from clear to brown, adhering to mineral
        surfaces and potentially altering their natural luster.
      coverage: Generally low to moderate, with patchy distribution; coverage is influenced by the mineral's porosity and
        exposure to sap sources.
      pattern: Often forms in thin films or localized spots, following the mineral's crystal structure or surface irregularities.
    plastic:
      appearance: Sap and resin show as tacky, translucent to dark brown spots that can become embedded, creating a sticky
        or hardened film that may discolor the plastic.
      coverage: Generally low, with isolated instances; coverage varies based on surface texture and exposure, but is often
        easy to spot and remove.
      pattern: Typically forms in random spots or smears, spreading slightly if the plastic is smooth, but not penetrating
        deeply.
    rubber:
      appearance: Sap and resin manifest as dark, sticky blobs that may not penetrate deeply but can leave a glossy or tacky
        residue, sometimes causing slight swelling or discoloration.
      coverage: Typically minimal, with small, isolated areas; coverage is low as rubber's non-porous nature limits adhesion.
      pattern: Usually forms in spots or smears, clinging to the rubber surface without significant spreading due to its elasticity.
    semiconductor:
      appearance: Sap and resin appear as microscopic sticky residues that can cause discoloration or hazing, potentially
        interfering with electronic properties by forming insulating layers.
      coverage: Usually minimal but critical, with low coverage that can vary; even small amounts may lead to significant
        functional issues.
      pattern: Typically forms as fine spots or uniform thin films, distributed evenly or in clusters on sensitive surfaces.
    specialty:
      appearance: Varies widely by material, but generally appears as sticky, resinous deposits that may harden, adapting
        to the surface's unique properties like reflectivity or texture.
      coverage: Highly variable, from isolated spots to extensive films; coverage is tailored to the material's exposure and
        sensitivity, requiring specific handling.
      pattern: Distribution depends on the specialty material's characteristics, often forming irregular patches or coatings
        that follow surface contours.
    stone:
      appearance: Contamination shows as dark, sticky patches that may appear glossy when fresh and turn dull or crusty as
        they harden, often contrasting with the stone's natural color.
      coverage: Generally low to moderate, with uneven distribution; coverage is higher on horizontal surfaces exposed to
        dripping sap.
      pattern: Typically forms in irregular patches or drips, following the contours of the stone surface and accumulating
        in depressions.
    wood:
      appearance: Sap and resin manifest as sticky, amber-colored blobs that may darken over time, blending with the wood
        grain and creating a raised, glossy texture.
      coverage: Can range from small, isolated spots to extensive patches, depending on the wood type and environmental factors
        like temperature.
      pattern: Often appears in localized spots or streaks along the grain, especially near knots or cuts where sap naturally
        exudes.
