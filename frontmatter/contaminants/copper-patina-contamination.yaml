pageTitle: Copper Patina / Verdigris Contaminants
pageDescription: Copper patina forms as a green oxidation layer on surfaces exposed to moist air. This contamination builds
  up unevenly, creating flaky patterns that line up along edges and crevices in humid regions. In laser cleaning applications,
  technicians run into distinct challenges removing it. The patina clings tightly to the base metal, demanding precise laser
  settings to avoid damaging the conductive copper underneath. Turns out, the layer absorbs energy variably, which can heat
  spots and warp the material if not dialed in carefully. Overall, this setup calls for short pulses to clear the patina cleanly
  without etching the substrate. In practice, addressing these behaviors cuts rework and maintains a solid finish on historical
  artifacts or wiring.
