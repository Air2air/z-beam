  visual_characteristics:
    appearance_on_categories:
      ceramic:
        color_variations: Light blue to deep green, often with white crystalline highlights on glazed surfaces
        common_patterns: Spotty deposits, edge accumulation, crack-following patterns, uniform films
        coverage_ranges: 'Light: scattered spots <30%, Moderate: 30-60% coverage, Heavy: >60% continuous crust'
        description: Copper patina forms as blue-green crystalline deposits that adhere to ceramic surfaces, particularly
          in unglazed areas and surface imperfections. On glazed ceramics, it appears as surface staining, while on porous
          bodies like terracotta it penetrates deeply. The contamination creates a crusty texture that contrasts with the
          smooth ceramic surface.
        distribution_patterns: Follows surface imperfections and porosity, accumulates in low areas and joints
        edge_center_behavior: Prefers edges and imperfections, centers remain cleaner on glazed surfaces
        geometry_effects: Enhanced in carved details, rough textures, and complex shapes; minimal on smooth, glazed surfaces
        gravity_influence: Vertical streaking evident, accumulation in lower sections and drainage paths
        texture_details: Crystalline crust on glazed surfaces, powdery penetration in porous bodies, rough texture
      composite:
        color_variations: Light blue to green staining, often following fiber patterns with color variations
        common_patterns: Fiber-following patterns, spotty deposits, edge accumulation, uniform films
        coverage_ranges: 'Light: scattered spots <30%, Moderate: 30-60% coverage, Heavy: >60% continuous staining'
        description: Copper patina appears as blue-green deposits that accumulate in composite surface imperfections and along
          fiber boundaries. The contamination typically follows the composite microstructure, creating patterned discoloration
          that highlights the material's internal structure. On fiberglass, it may penetrate between fibers, while on carbon
          fiber it remains superficial.
        distribution_patterns: Follows composite microstructure, accumulates in surface imperfections and along edges
        edge_center_behavior: Prefers edges and surface imperfections, then spreads following composite structure
        geometry_effects: Enhanced in complex shapes and rough surfaces; follows composite fiber orientation
        gravity_influence: Vertical streaking evident, accumulation in lower areas and drainage paths
        texture_details: Surface films or penetration between fibers, rough texture following composite structure
      concrete:
        color_variations: Light blue to deep green, often with white crystalline highlights, brown undertones from concrete
        common_patterns: Pore-filling spots, runoff streaks, edge accumulation, crack-following patterns
        coverage_ranges: 'Light: scattered crystalline spots <30%, Moderate: 30-60% coverage with merging, Heavy: >60% continuous
          crust'
        description: Verdigris appears as blue-green crystalline deposits that accumulate in concrete pores and surface imperfections.
          The contamination typically forms crusty deposits that highlight the concrete's porous nature and surface texture.
          On reinforced concrete, it may indicate corrosion of embedded copper elements.
        distribution_patterns: Follows concrete porosity and surface texture, accumulates in low areas and along joints
        edge_center_behavior: Prefers edges, joints, and surface imperfections, then spreads across surface
        geometry_effects: Enhanced in rough textures, joints, and complex shapes; minimal on smooth, sealed surfaces
        gravity_influence: Clear vertical streaking, accumulation in lower areas and drainage paths
        texture_details: Crystalline crust on surface, powdery residue in pores, rough texture following concrete aggregate
      fabric:
        color_variations: Light blue to deep green staining, often with fabric base color showing through
        common_patterns: Weave-following patterns, water spot marks, edge darkening, splatter patterns
        coverage_ranges: 'Light: faint staining along fibers <30%, Moderate: 30-60% distinct coloration, Heavy: >60% uniform
          deep staining'
        description: Copper patina appears as blue-green staining that penetrates fabric fibers, creating discolored patterns
          that follow the weave structure. The contamination typically appears as deep staining rather than surface deposits,
          with the fabric texture remaining visible. The visual effect is color penetration that follows fiber orientation.
        distribution_patterns: Follows fabric weave and porosity, accumulates in folds and seams
        edge_center_behavior: Prefers edges, folds, and seams, centers remain cleaner until advanced stages
        geometry_effects: Enhanced in folds, seams, and complex shapes; follows fabric weave pattern
        gravity_influence: Clear vertical streaking, accumulation in lower sections and folds
        texture_details: Fabric weave remains visible, surface feels unchanged or slightly stiff if heavy
      glass:
        color_variations: Pale blue haze to distinct green spots, sometimes with iridescent effects
        common_patterns: Uniform haze, spotty deposits, edge darkening, water droplet patterns
        coverage_ranges: 'Light: faint haze <30%, Moderate: 30-60% visible film, Heavy: >60% opaque coating'
        description: Verdigris appears as hazy blue-green films or spotty deposits that reduce glass transparency and create
          light scattering. The contamination typically forms as surface films rather than penetrating, creating optical distortions
          and reduced clarity. On crystal glass, it may form intricate crystalline patterns.
        distribution_patterns: Forms films across entire surface, with concentration at edges and in stagnant areas
        edge_center_behavior: Uniform across surface with slight edge preference in early stages
        geometry_effects: Enhanced in corners and complex shapes; uniform on flat surfaces
        gravity_influence: Minimal direct influence, though runoff patterns may create vertical streaking
        texture_details: Smooth film or spotty crystalline deposits, surface feels slightly rough under magnification
      metal:
        color_variations: Light green to deep turquoise, blue-green, with occasional brown or black undertones in advanced
          stages
        common_patterns: Spots, streaks, uniform films, dendritic patterns following surface imperfections
        coverage_ranges: 'Light: scattered spots <30%, Moderate: 30-60% coverage with some merging, Heavy: >60% continuous
          film'
        description: Copper patina appears as a greenish-blue crystalline or powdery deposit on metal surfaces, often with
          a rough, crust-like texture. On copper and brass, it forms naturally through oxidation, while on other metals it
          indicates copper contamination from external sources. The contamination typically creates uneven surface topography
          that can interfere with laser reflectance and absorption.
        distribution_patterns: Starts at high points and edges, spreads unevenly across surface following moisture paths
        edge_center_behavior: Prefers edges, corners, and high points initially, then spreads toward centers
        geometry_effects: Enhanced formation on sharp edges, corners, and complex geometries; reduced on flat, smooth surfaces
        gravity_influence: Dripping patterns evident, accumulation in lower areas due to runoff
        texture_details: Crystalline, powdery, or crust-like surface with rough micro-texture, often flaky or granular
      mineral:
        color_variations: Light blue to deep green, often with iridescent effects on crystalline surfaces
        common_patterns: Crystal-face coatings, spotty deposits, uniform films, dendritic patterns
        coverage_ranges: 'Light: scattered coatings <30%, Moderate: 30-60% coverage, Heavy: >60% continuous coating'
        description: Copper patina appears as blue-green crystalline coatings that form on mineral surfaces, often creating
          intricate patterns that follow crystal structures. The contamination typically appears as surface coatings rather
          than penetration, though it may interact with certain minerals chemically. The visual effect highlights the mineral's
          natural crystal forms.
        distribution_patterns: Follows crystal structures and surface imperfections, accumulates in depressions
        edge_center_behavior: Prefers crystal edges and imperfections, then spreads across crystal faces
        geometry_effects: Enhanced on crystal edges and complex shapes; follows mineral crystal structure
        gravity_influence: Minimal direct influence on small specimens, though accumulation may occur in lower areas
        texture_details: Crystalline coatings or films, surface texture follows underlying mineral structure
      plastic:
        color_variations: Pale blue to green staining, sometimes with iridescent effects on smooth surfaces
        common_patterns: Uniform films, spotty deposits, edge darkening, water mark patterns
        coverage_ranges: 'Light: faint staining <30%, Moderate: 30-60% visible film, Heavy: >60% opaque coating'
        description: Verdigris appears as blue-green staining or surface films that adhere to plastic surfaces, often creating
          hazy or spotty discoloration. The contamination typically forms surface films rather than penetrating, though it
          may cause slight surface etching on some plastics. The visual effect is primarily color change with minimal texture
          alteration.
        distribution_patterns: Forms across entire surface with concentration in stagnant areas and along flow paths
        edge_center_behavior: Uniform across surface with slight edge preference
        geometry_effects: Enhanced in corners and complex shapes; uniform on flat surfaces
        gravity_influence: Minimal direct influence, though vertical streaking may occur from runoff
        texture_details: Smooth film or spotty deposits, surface may feel slightly tacky or rough if advanced
      rubber:
        color_variations: Pale blue to green staining, sometimes with brown undertones in advanced stages
        common_patterns: Uniform films, spotty deposits, edge darkening, crack-following patterns
        coverage_ranges: 'Light: faint staining <30%, Moderate: 30-60% visible film, Heavy: >60% deep staining'
        description: Verdigris appears as blue-green surface staining that may slightly penetrate rubber surfaces, creating
          discolored patterns. The contamination typically forms surface films that can become slightly embedded in the rubber
          matrix. The visual effect is color change with minimal texture alteration, though advanced stages may cause surface
          cracking.
        distribution_patterns: Forms across entire surface with concentration in stagnant areas and along seams
        edge_center_behavior: Uniform across surface with slight edge and seam preference
        geometry_effects: Enhanced in seams and complex shapes; uniform on flat surfaces
        gravity_influence: Minimal direct influence, though vertical streaking may occur
        texture_details: Smooth films or slight surface penetration, may feel slightly tacky or rough
      semiconductor:
        color_variations: Pale blue to green films, sometimes with iridescent effects on polished surfaces
        common_patterns: Uniform haze, spotty deposits, edge accumulation, water mark patterns
        coverage_ranges: 'Light: faint haze <30%, Moderate: 30-60% visible film, Heavy: >60% opaque coating'
        description: Verdigris appears as blue-green surface contamination that forms thin films or spotty deposits on semiconductor
          surfaces. The contamination typically appears as surface films that can interfere with electronic properties and
          optical characteristics. On silicon, it may form uniform hazing, while on compound semiconductors it may create
          patterned discoloration.
        distribution_patterns: Forms across entire surface with concentration in stagnant areas and along flow paths
        edge_center_behavior: Uniform across surface with slight edge preference
        geometry_effects: Enhanced in patterned areas and complex geometries; uniform on flat wafer surfaces
        gravity_influence: Minimal direct influence, though vertical streaking may occur from processing fluids
        texture_details: Smooth films or spotty deposits, surface may feel unchanged under normal handling
      specialty:
        color_variations: Light blue to green staining or deposits, often material-dependent with unique optical effects
        common_patterns: Material-dependent patterns, spotty deposits, uniform films, structure-following patterns
        coverage_ranges: 'Light: scattered contamination <30%, Moderate: 30-60% coverage, Heavy: >60% continuous coating'
        description: Copper patina appears as blue-green surface contamination that varies significantly depending on the
          specialty material's properties. On aerogel, it may form superficial staining, while on graphene it appears as spotty
          deposits. The contamination typically highlights the material's unique surface characteristics and may interact
          differently with advanced material structures.
        distribution_patterns: Follows material-specific surface characteristics and microstructure
        edge_center_behavior: Material-dependent - generally prefers edges and surface imperfections
        geometry_effects: Highly material-dependent, follows unique surface structures and geometries
        gravity_influence: Variable depending on material porosity and surface energy
        texture_details: Variable depending on material - from smooth films on graphene to crystalline deposits on alloys
      stone:
        color_variations: Light blue to deep green, often with white crystalline highlights in marble, brown undertones in
          sandstone
        common_patterns: Pore-filling spots, runoff streaks, edge accumulation, crystalline clusters
        coverage_ranges: 'Light: scattered crystalline spots <30%, Moderate: 30-60% coverage with merging, Heavy: >60% continuous
          crust'
        description: Copper patina appears as blue-green crystalline deposits that accumulate in stone pores and surface imperfections.
          On porous stones like limestone, it penetrates deeply, while on dense stones like granite it forms surface crusts.
          The contamination creates a mottled appearance that contrasts with the natural stone color.
        distribution_patterns: Follows natural stone porosity, accumulates in surface depressions and along joints
        edge_center_behavior: Prefers edges and joints initially, then spreads across surface following porosity patterns
        geometry_effects: Enhanced in carved details, rough textures, and joints; minimal on polished, flat surfaces
        gravity_influence: Clear vertical streaking, accumulation in lower areas and drainage paths
        texture_details: Crystalline crust on dense stone, powdery residue in pores of porous stone, rough surface feel
      wood:
        color_variations: Pale blue-green to deep turquoise, often with brown wood tones showing through
        common_patterns: Grain-following streaks, water-spot patterns, edge darkening, splatter marks
        coverage_ranges: 'Light: faint staining along grain <30%, Moderate: 30-60% distinct coloration, Heavy: >60% uniform
          deep staining'
        description: Verdigris appears as blue-green staining that penetrates wood grain, creating discolored patterns that
          follow the natural wood structure. The contamination typically appears as surface staining rather than crust formation,
          with the wood grain remaining visible through the coloration. The visual effect is more of a deep stain than a surface
          deposit.
        distribution_patterns: Follows wood grain direction, accumulates in porous areas and end grain
        edge_center_behavior: Prefers edges and end grain, centers remain cleaner until advanced stages
        geometry_effects: Enhanced in carved areas, joints, and rough surfaces; minimal on smooth, sealed surfaces
        gravity_influence: Vertical dripping patterns, accumulation in lower sections and joints
        texture_details: Wood grain remains visible, surface feels slightly rough but not crusty, may feel chalky if heavy
