  visual_characteristics:
    appearance_on_categories:
      ceramic:
        appearance: Tin plating residue presents as a dull, grayish coating or spots,
          often with a matte finish that contrasts with the ceramic's smooth glaze.
        coverage: Coverage is generally low and inconsistent, with some areas showing
          dense spots while others remain clean.
        pattern: Distribution is commonly in random spots or patches, especially near
          edges or where residue pooled during manufacturing or use.
      composite:
        appearance: On composites, it shows as a dull, metallic-gray layer or specks,
          blending with or standing out against the varied material textures.
        coverage: Coverage is patchy and limited, often concentrated in areas of residue
          deposition without widespread uniformity.
        pattern: It distributes unevenly, forming in isolated spots or along fiber
          directions, depending on the composite's structure and exposure.
      concrete:
        appearance: It appears as a pale gray or whitish powdery coating, with a chalky
          texture that may adhere to the rough, porous concrete surface.
        coverage: Coverage is typically sparse and variable, with higher concentrations
          in low-lying or contaminated spots.
        pattern: The residue often forms in patches or streaks, influenced by surface
          moisture and application methods.
      fabric:
        appearance: On fabric, it manifests as grayish or silvery stains, often with
          a stiff, crusty texture that can alter the fabric's feel and color.
        coverage: Coverage is usually minimal and uneven, confined to specific areas
          without spreading uniformly across the fabric.
        pattern: Distribution is random, appearing as blotches or streaks, especially
          where the residue was rubbed or spilled onto the material.
      glass:
        appearance: On glass, it appears as a hazy, translucent film or whitish streaks,
          sometimes with a slightly gritty feel that reduces clarity and shine.
        coverage: Coverage is usually light and uneven, with variations from thin
          films in some areas to thicker accumulations in others.
        pattern: It tends to form in streaks or smudges, often aligned with application
          or cleaning directions, and may show iridescence in light.
      metal:
        appearance: Tin plating residue appears as a dull, grayish-white or silvery
          film, often with a powdery or flaky texture that can obscure the underlying
          metallic shine.
        coverage: Coverage is usually partial and variable, ranging from small localized
          spots to larger areas, depending on the plating quality and handling.
        pattern: It typically forms in irregular patches or streaks, concentrated
          in areas where plating was uneven or excess material accumulated during
          processing.
      mineral:
        appearance: On minerals, it shows as a dull, metallic-gray film or spots,
          sometimes with a flaky consistency that contrasts with the natural crystalline
          structure.
        coverage: Coverage is generally low and patchy, with minimal uniform spread
          due to the mineral's inherent properties.
        pattern: Distribution is irregular, forming in isolated areas or along cleavage
          planes, depending on mineral type and exposure.
      plastic:
        appearance: It appears as a faint gray or silvery film, sometimes with a slightly
          sticky or powdery texture that can cause discoloration on plastic surfaces.
        coverage: Coverage is typically sparse and variable, with higher amounts in
          crevices or where contact occurred, but rarely uniform.
        pattern: The residue often forms in irregular patches or smears, influenced
          by surface smoothness and static attraction.
      rubber:
        appearance: Tin plating residue appears as a light gray or whitish powdery
          deposit, which may feel slightly abrasive and can embed into the rubber's
          flexible surface.
        coverage: Coverage is generally low and irregular, with variations based on
          rubber porosity and exposure duration.
        pattern: It typically forms in scattered spots or smudges, following surface
          contours and areas of friction or contact.
      semiconductor:
        appearance: Tin plating residue appears as a faint grayish haze or discrete
          particles, often detectable under magnification, potentially interfering
          with electronic properties.
        coverage: Coverage is usually very low and non-uniform, critical to control
          as even minor amounts can affect performance.
        pattern: It typically forms in localized spots or thin layers, aligned with
          processing steps and surface defects.
      specialty:
        appearance: On specialty materials, it varies but generally appears as a dull
          gray or silvery deposit, with texture adapting to the surface's unique characteristics.
        coverage: Coverage is typically limited and variable, tailored to the material's
          reactivity and exposure conditions.
        pattern: Distribution depends on the material's properties, often forming
          in irregular patterns like spots or smears specific to the application.
      stone:
        appearance: It shows up as a light gray or silvery discoloration, with a chalky
          or flaky deposit that can adhere to porous or rough stone surfaces.
        coverage: Coverage is typically patchy and low, concentrated in specific regions
          rather than uniform, due to stone's low reactivity.
        pattern: The residue often forms in blotches or streaks, following surface
          irregularities or areas of moisture that trapped the contamination.
      wood:
        appearance: On wood, it manifests as a whitish or metallic-gray stain, often
          with a gritty or crusty texture that contrasts with the natural grain and
          finish.
        coverage: Coverage is generally sparse and uneven, limited to contact points
          or contaminated zones, with minimal spread across the wood.
        pattern: Distribution is irregular, appearing as scattered spots or smears,
          especially where the residue was transferred or dripped onto the surface.
