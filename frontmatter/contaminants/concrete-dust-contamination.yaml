  visual:
    appearance_on_categories:
      presentation: descriptive
      items:
      - appearance_on_categories:
          ceramic:
            appearance: The dust forms a pale gray, powdery coating that can dull glossy finishes and embed into tiny pores,
              giving a chalky, matte appearance.
            coverage: Coverage ranges from light, scattered deposits to more uniform layers, varying with exposure and surface
              orientation.
            pattern: Distribution is often spotty or streaky, with dust gathering in textured areas and along grout lines
              in tiled surfaces.
          composite:
            appearance: Dust deposits as a grayish, powdery film that can highlight composite textures, often making surfaces
              look aged and feel gritty.
            coverage: Coverage varies widely, from sparse dusting to thick layers in recessed areas, depending on composite
              porosity.
            pattern: Distribution is irregular, with spots or streaks concentrating in fibrous or porous regions of the composite
              material.
          concrete:
            appearance: Dust blends with the base concrete, appearing as a lighter gray, powdery layer that may obscure surface
              details and add a chalky finish.
            coverage: Coverage is generally even and light to moderate, with less variation due to similar material properties.
            pattern: It often forms a relatively uniform coating or light patches, merging with the rough texture of the concrete
              substrate.
          fabric:
            appearance: On fabric, concrete dust appears as a pale gray, powdery residue that can penetrate fibers, causing
              discoloration and a stiff, gritty texture.
            coverage: Coverage ranges from light dusting to dense accumulation in creases and low-lying areas, showing high
              variation.
            pattern: Distribution is usually spotty or in patches, with dust settling into weave patterns and folds of the
              material.
          glass:
            appearance: On glass, concrete dust appears as a fine, light gray powder that obscures transparency and creates
              a hazy, frosted look with a slightly gritty feel.
            coverage: Coverage is generally light to moderate, with even spreading on vertical surfaces and heavier buildup
              on horizontal ones.
            pattern: It usually distributes as a thin, uniform film or in scattered spots, influenced by static or moisture
              that causes adhesion.
          metal:
            appearance: Concrete dust appears as a light gray to white powdery coating, often dulling the metallic shine and
              creating a rough, matte texture.
            coverage: Coverage is usually partial, ranging from light dusting to heavy buildup in sheltered spots, with significant
              variation across the surface.
            pattern: It typically forms uneven patches or streaks, concentrating in recessed areas and along edges due to
              gravity and airflow.
          mineral:
            appearance: Concrete dust deposits as a whitish to gray powdery film on minerals, masking natural luster and colors
              while imparting a dusty, rough texture.
            coverage: Coverage varies from sparse to moderate, often concentrated in fissures and on horizontal planes.
            pattern: Distribution is typically patchy or streaky, with dust adhering to crystalline faces and porous mineral
              surfaces.
          plastic:
            appearance: Concrete dust appears as a light gray, fine powder that may cling electrostatically, creating a dull,
              slightly rough surface on smooth plastics.
            coverage: Coverage is usually light to moderate, with variation based on plastic type and environmental factors
              like humidity.
            pattern: It typically forms uneven patches or a light uniform layer, with accumulation in corners and on static-prone
              areas.
          rubber:
            appearance: Concrete dust coats rubber as a light gray, adherent powder that may fill micro-textures, giving a
              faded, chalky look and slightly abrasive feel.
            coverage: Coverage is typically light to moderate, unevenly distributed with heavier buildup in grooves and on
              exposed faces.
            pattern: It often forms patchy or streaky deposits, with dust sticking more to tacky or textured rubber surfaces.
          semiconductor:
            appearance: On semiconductors, concrete dust appears as a fine, light gray contaminant that can cause micro-abrasions
              and obscure precise surface features.
            coverage: Coverage is usually very light and sparse, with critical variation in clean environments to prevent
              damage.
            pattern: It distributes as minute spots or a thin uniform layer, potentially affecting sensitive areas due to
              static attraction.
          specialty:
            appearance: Dust forms a grayish, powdery coating on specialty materials, altering custom finishes and textures
              in a chalky, dull manner.
            coverage: Coverage is highly variable, ranging from minimal to significant, tailored to the specific specialty
              material's exposure.
            pattern: Distribution depends on the material's properties, often appearing as irregular patches or streaks on
              unique surfaces.
          stone:
            appearance: Concrete dust coats stone as a whitish or grayish film, masking natural colors and textures while
              adding a chalky, abrasive finish.
            coverage: Coverage is often moderate to heavy, with denser accumulation in crevices and on flat surfaces, showing
              clear variation.
            pattern: It tends to form irregular patches or a thin uniform layer, clinging more to porous or rough-textured
              areas of the stone.
          wood:
            appearance: The dust appears as a pale gray, gritty layer that can settle into the grain, making the wood look
              faded and feel rough to the touch.
            coverage: Coverage varies from sparse, light coatings to dense layers, especially on upward-facing areas, with
              uneven spread.
            pattern: Distribution is often patchy or streaky, with accumulation in grooves and on horizontal surfaces where
              dust settles easily.
