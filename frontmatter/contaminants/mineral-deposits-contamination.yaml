id: mineral-deposits-contamination
contentType: contaminant
schemaVersion: 6.0.0
name: Hard Water Mineral Scale
category: thermal-damage
subcategory: scale
datePublished: '2026-01-06'
dateModified: '2026-02-02T02:25:21.435454+00:00'
description: >-
  Mineral deposits contaminate surfaces unevenly across regions, forming thick layers on metals while staying thin on
  stones, and this difference affects cleaning outcomes. After exposure to moisture, buildup hardens quickly, so laser
  cleaning faces challenges in avoiding thermal damage. Contamination exhibits sticky patterns during formation,
  especially in humid areas. Treatment removes layers effectively on durable materials, but softer ones show cracking
  risks. Process achieves better uniformity on heat-resistant substrates.


  Ikmanda Roswati, Ph.D. from Indonesia
