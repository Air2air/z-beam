  laser_parameters:
    beam_profile: flat_top
    fluence_range:
      max_j_cm2: 1.2
      min_j_cm2: 0.3
      recommended_j_cm2: 0.8
    overlap_percentage: 50
    polarization: circular
    pulse_duration_range:
      max_ns: 200
      min_ns: 10
      recommended_ns: 100
    repetition_rate_khz:
      max: 100
      min: 20
      recommended: 50
    safety_margin_factor: 0.7
    scan_speed_mm_s:
      max: 2000
      min: 500
      recommended: 1000
    spot_size_mm:
      max: 0.2
      min: 0.05
      recommended: 0.1
    wavelength_preference:
    - 1064
    - 532
  optical_properties:
    absorption_coefficient:
      wavelength_1064nm: 150
      wavelength_355nm: 3200
      wavelength_532nm: 850
    reflectivity:
      wavelength_1064nm: 0.35
      wavelength_355nm: 0.08
      wavelength_532nm: 0.18
    refractive_index:
      imaginary_part: 0.024
      real_part: 1.52
    transmission_depth: 66.7
  removal_characteristics:
    byproducts:
    - compound: CaO/MgO (calcined minerals)
      hazard_level: low
      phase: solid
    - compound: carbon-dioxide
      hazard_level: low
      phase: gas
    - compound: mineral particulate
      hazard_level: moderate
      phase: solid
    damage_risk_to_substrate: low
    primary_mechanism: thermal_ablation
    process_speed:
      area_coverage_rate_cm2_min: 240
      typical_scan_speed_mm_s: 800
    removal_efficiency:
      diminishing_returns_after: 3
      optimal_passes: 2
      single_pass: 0.7
    secondary_mechanisms:
    - mechanical_spallation
    - thermal_stress_fracturing
    surface_quality_after_removal:
      color_change: 'no'
      residual_stress: none
      roughness_increase: minimal
  safety_data:
    fire_explosion_risk: low
    fumes_generated:
    - compound: Calcium Oxide (CaO)
      concentration_mg_m3: 5-25
      exposure_limit_mg_m3: 2
      hazard_class: irritant
    - compound: Magnesium Oxide (MgO)
      concentration_mg_m3: 2-15
      exposure_limit_mg_m3: 10
      hazard_class: irritant
    - compound: Silicon Dioxide (SiO2)
      concentration_mg_m3: 1-10
      exposure_limit_mg_m3: 0.025
      hazard_class: toxic
    particulate_generation:
      respirable_fraction: 0.7
      size_range_um:
      - 0.1
      - 10.0
    ppe_requirements:
      eye_protection: goggles
      respiratory: half_mask
      skin_protection: gloves
    substrate_compatibility_warnings:
    - Laser may cause thermal damage to underlying metal surfaces
    - Potential for surface discoloration on some substrates
    - Risk of pitting on soft metals at high laser intensities
    toxic_gas_risk: low
    ventilation_requirements:
      exhaust_velocity_m_s: 0.5
      filtration_type: HEPA
      minimum_air_changes_per_hour: 12
    visibility_hazard: moderate
  thermal_properties:
    ablation_threshold:
      pulse_duration_100ns: 4.1
      pulse_duration_10ns: 3.2
      wavelength_1064nm: 2.8
    decomposition_temperature: 850
    heat_affected_zone_depth: 15
    melting_point: 1200
    specific_heat: 850
    thermal_conductivity: 1.2
    thermal_diffusivity: 0.45
    vaporization_temperature: 2850
