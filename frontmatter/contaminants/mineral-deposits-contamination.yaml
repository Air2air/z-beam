  visual:
    appearanceOnCategories:
      presentation: descriptive
      items:
      - appearanceOnCategories:
          ceramic:
            appearance: Hard water scale on ceramic surfaces presents as white, chalky, or crusty deposits that can dull the
              glossy finish and feel rough or gritty.
            coverage: Coverage is typically partial and irregular, varying from small, isolated spots to more extensive scaling
              in high-use zones like showers or sinks.
            pattern: It tends to form in spots or patches, frequently in areas with standing water or repeated splashing,
              such as around drains or on tile grout lines.
          composite:
            appearance: Hard water scale on composite materials shows as white or grayish mineral deposits that can form a
              dull, crusty layer, potentially masking the underlying texture or color.
            coverage: Coverage is usually partial and variable, ranging from sparse spots to more concentrated buildup depending
              on material composition and water exposure.
            pattern: It typically appears in irregular spots or patches, often concentrated where water is applied or evaporates,
              and may follow surface imperfections.
          concrete:
            appearance: On concrete, hard water scale shows as white, powdery, or crystalline efflorescence that can form
              a crusty layer, often giving a salt-like appearance on the surface.
            coverage: Coverage is typically uneven, ranging from light, scattered deposits to dense, widespread scaling in
              moisture-prone locations.
            pattern: It commonly appears in patches or streaks, frequently where water seeps or evaporates, such as on walls,
              floors, or in porous areas.
          fabric:
            appearance: Hard water scale on fabric appears as white or grayish mineral stains that can feel stiff or crusty,
              often leaving a dull, discolored look on the material.
            coverage: Coverage is generally sparse and irregular, varying from small spots to larger stained sections based
              on water hardness and fabric type.
            pattern: It usually distributes in splotches or streaks, following water contact patterns such as from spills
              or washing, and may be more pronounced in absorbent areas.
          glass:
            appearance: On glass, hard water scale appears as a white, hazy, or filmy residue that can obscure clarity and
              leave behind spotty, etched-looking marks when dried.
            coverage: Coverage is often light to moderate and uneven, with variations from fine speckles to larger cloudy
              areas depending on water hardness and drying conditions.
            pattern: It usually forms in spots or streaks, often in a random or water-splash pattern, and may be more visible
              on edges or where droplets evaporate.
          metal:
            appearance: Hard water scale appears as a white, chalky, or crusty deposit on metal surfaces, often with a rough
              texture that can feel gritty to the touch.
            coverage: Coverage is usually partial and uneven, ranging from small localized patches to more extensive buildup
              in high-exposure zones.
            pattern: It typically forms in irregular spots or streaks, concentrating in areas with frequent water contact
              or evaporation, such as around joints or edges.
          mineral:
            appearance: Hard water scale on mineral surfaces appears as white, chalky, or crystalline deposits that may blend
              with or contrast the base material, often creating a rough, layered look.
            coverage: Coverage varies from light, spotty films to heavy, encrusted layers, depending on mineral porosity and
              water exposure duration.
            pattern: It tends to form in patches or uniform layers, especially where water interacts with the mineral, and
              can accumulate in fissures or on exposed faces.
          plastic:
            appearance: On plastic, hard water scale appears as a white, powdery, or filmy coating that can reduce shine and
              create a slightly rough texture on smooth surfaces.
            coverage: Coverage is generally light and uneven, with variations from minor speckling to more noticeable patches
              in frequently wet areas.
            pattern: It often distributes in spots or streaks, following water contact points, and may accumulate in crevices
              or on textured areas where moisture lingers.
          rubber:
            appearance: On rubber, hard water scale manifests as a white, chalky residue that can cling to the surface, sometimes
              making it feel stiff or slightly abrasive.
            coverage: Coverage is typically light and uneven, with minor variations from isolated deposits to broader films
              in damp environments.
            pattern: It often forms in spots or streaks, particularly in areas exposed to water splashes or condensation,
              and may gather in seams or textured parts.
          semiconductor:
            appearance: On semiconductors, hard water scale appears as microscopic white or hazy residues that can form thin
              films or particles, potentially interfering with surface conductivity and clarity.
            coverage: Coverage is usually minimal and uneven, with variations from isolated specks to subtle films that can
              affect performance in critical applications.
            pattern: It typically distributes in fine spots or uniform layers, often concentrated in areas exposed to water
              during processing or cleaning, and may follow contamination pathways.
          specialty:
            appearance: Hard water scale on specialty materials appears as white, crusty, or filmy deposits that adapt to
              the surface properties, potentially causing discoloration, roughness, or functional impairment.
            coverage: Coverage is highly variable, ranging from negligible spots to significant buildup, influenced by material
              composition, treatment, and environmental factors.
            pattern: It forms in patterns specific to the material's use and exposure, such as spots on coatings or streaks
              on engineered surfaces, often in high-water-contact zones.
          stone:
            appearance: Hard water scale on stone surfaces shows up as white, cloudy, or crystalline deposits that can create
              a dull, hazy film or rough patches on otherwise smooth finishes.
            coverage: Coverage is typically uneven, ranging from light, scattered spots to dense, localized buildup in high-moisture
              areas.
            pattern: It commonly forms in patches or streaks, often concentrated where water pools or evaporates, such as
              on countertops or shower walls.
          wood:
            appearance: On wood, hard water scale manifests as white or grayish mineral stains that can appear powdery or
              crusty, potentially dulling the natural finish and causing surface roughness.
            coverage: Coverage is generally sparse and irregular, varying from isolated spots to broader areas depending on
              water exposure and wood porosity.
            pattern: It often appears as splotches or streaks, following water flow or spill patterns, and may accumulate
              in grooves or porous areas of the wood grain.
