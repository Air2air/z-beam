  visual_characteristics:
    appearance_on_categories:
      ceramic:
        appearance: Displays as vivid marks in hues like green or red, often glossy
          and resistant to absorption on the glazed surface.
        coverage: Mostly limited to small areas, with low to moderate variation.
        pattern: Usually forms spots or smears, sometimes in circular patterns from
          contact.
      composite:
        appearance: Presents as mixed-color stains like brown or blue, blending with
          the material's texture for a mottled effect.
        coverage: Variable, from isolated spots to broader areas, with inconsistent
          spread.
        pattern: Distributes unevenly as patches or streaks, influenced by composite
          layers.
      concrete:
        appearance: Shows as bold stains in shades such as black or green, with a
          rough, absorbed look on the porous surface.
        coverage: Generally sparse and localized, with minimal overall coverage.
        pattern: Commonly forms splatters or patches, often random and influenced
          by surface irregularities.
      fabric:
        appearance: Manifests as dyed patches in colors like red or blue, with a soaked-in
          or surface-level texture.
        coverage: Ranges from small spots to large areas, highly variable based on
          fabric type.
        pattern: Often appears as stains or prints, sometimes in repeated designs
          if from intentional contact.
      glass:
        appearance: Visible as translucent or opaque smudges in colors such as cyan
          or black, with a smooth, sometimes streaky texture.
        coverage: Typically light and patchy, concentrated on surfaces like windows
          or containers.
        pattern: Tends to appear as streaks or fingerprints, often uniform in high-touch
          areas.
      metal:
        appearance: Appears as glossy or matte smears in various colors like black,
          blue, or red, often with a sticky or oily texture.
        coverage: Usually partial, ranging from small spots to larger areas, with
          uneven distribution.
        pattern: Typically forms irregular streaks or patches, sometimes concentrated
          along edges or handling points.
      mineral:
        appearance: Displays as contrasting residues like orange or blue, adhering
          to crystalline or rough surfaces with a slight sheen.
        coverage: Typically very low, with spotty and minimal distribution.
        pattern: Tends to appear as isolated spots or thin films, following mineral
          cleavages.
      plastic:
        appearance: Shows up as colorful residues such as purple or orange, with a
          slightly tacky or smeared finish on smooth surfaces.
        coverage: Can range from minimal spots to full coverage, depending on application
          methods.
        pattern: Commonly appears as streaks or patches, often uniform if from printing
          processes.
      rubber:
        appearance: Appears as dark or bright smudges such as black or yellow, often
          with a greasy or embedded texture.
        coverage: Usually partial and irregular, with low to moderate amounts.
        pattern: Typically forms blotches or smears, following surface contours and
          flex points.
      semiconductor:
        appearance: Appears as fine, colored smudges such as gray or yellow, often
          microscopic and affecting surface conductivity.
        coverage: Extremely minimal and controlled, with precise, low-variation application.
        pattern: Usually uniform or speckled, resulting from manufacturing or handling
          processes.
      specialty:
        appearance: Varies widely by material, but often shows as multicolored residues
          with textures matching the specialty surface, like glossy on coatings.
        coverage: Highly variable, from trace amounts to full coverage, tailored to
          specific applications.
        pattern: Distribution depends on the material; it can be uniform, patterned,
          or random based on use.
      stone:
        appearance: Manifests as bright, contrasting stains like blue or yellow on
          the surface, usually with a slick or adhered finish.
        coverage: Generally sparse and localized, with minimal to moderate coverage
          depending on exposure.
        pattern: Often forms random spots or smears, influenced by the stone's texture
          and porosity.
      wood:
        appearance: Shows as vibrant stains in colors such as black or magenta, often
          seeping into the grain and creating a rough or absorbed look.
        coverage: Varies from light spotting to extensive patches, often uneven due
          to porous absorption.
        pattern: Commonly appears as blotches or streaks following the wood grain,
          with occasional drips or splatters.
