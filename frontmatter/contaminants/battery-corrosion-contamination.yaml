  visual_characteristics:
    appearance_on_categories:
      ceramic:
        appearance: White or colored powdery residues, potentially causing surface
          pitting or a dull, rough finish.
        coverage: Localized to the area of contact, with coverage expanding if the
          liquid is not cleaned promptly.
        pattern: Spots or patches, often circular around the leak point, with possible
          streaking.
      composite:
        appearance: Discoloration in white or brown shades, with possible bubbling,
          delamination, or a rough texture.
        coverage: Patchy and localized, with variation based on composite composition
          and exposure.
        pattern: Irregular spots or patches, often concentrated at points of leakage
          and along material interfaces.
      concrete:
        appearance: White, powdery efflorescence or colored stains, creating a rough,
          etched surface with possible spalling.
        coverage: Can range from small localized areas to extensive patches, influenced
          by concrete porosity and exposure time.
        pattern: Spots or patches, often spreading from the leak point and following
          surface pores.
      fabric:
        appearance: Stained areas in white, green, or brown, often with a stiff, crusty
          texture and possible fiber damage.
        coverage: Variable, from small spots to larger stained areas, depending on
          fabric absorbency and leakage amount.
        pattern: Spots or irregular patches, with possible bleeding or streaking along
          the fabric weave.
      glass:
        appearance: Hazy, etched, or frosted areas with white or cloudy residues,
          often feeling rough to the touch.
        coverage: Usually small, isolated spots with minimal spread, varying with
          the amount of leakage.
        pattern: Spots or streaks where the corrosive liquid has contacted and dried.
      metal:
        appearance: White, blue, or greenish powdery or crusty deposits, often with
          a rough texture and dull finish.
        coverage: Localized around the leak point, varying from small spots to larger
          areas depending on exposure.
        pattern: Irregular spots or streaks radiating from the battery source, sometimes
          forming patches.
      mineral:
        appearance: White or colored crystalline deposits, leading to a rough, pitted
          surface with possible mineral alteration.
        coverage: Localized and uneven, with coverage depending on mineral hardness
          and corrosion resistance.
        pattern: Irregular spots or patches, often concentrated where the corrosive
          accumulates.
      plastic:
        appearance: Discolored areas in white, yellow, or brown, often with a sticky
          or cracked surface and possible deformation.
        coverage: Varies from small spots to larger areas, depending on plastic type
          and corrosion severity.
        pattern: Spots or patches that may spread, sometimes following surface contours
          or seams.
      rubber:
        appearance: Discolored, sticky, or hardened areas in white or brown, often
          with surface cracking or swelling.
        coverage: Typically limited to the contact zone, with coverage increasing
          if the rubber absorbs the corrosive.
        pattern: Spots or patches that may coalesce, sometimes forming streaks if
          the liquid runs.
      semiconductor:
        appearance: Discolored areas, often with corrosion products like green or
          white residues, and possible surface pitting or delamination.
        coverage: Highly localized to affected components, with minimal spread due
          to precise manufacturing.
        pattern: Spots or fine streaks, typically following circuit paths or component
          boundaries.
      specialty:
        appearance: Varies widely; may include discoloration, residue buildup, or
          texture changes specific to the material, such as coatings or alloys.
        coverage: Highly variable, ranging from isolated spots to broader areas, tailored
          to the specialty material's susceptibility.
        pattern: Depends on material properties, often irregular spots or patches
          influenced by surface characteristics.
      stone:
        appearance: White or colored crystalline deposits, creating a rough, etched
          surface with possible discoloration.
        coverage: Localized and patchy, with coverage depending on stone porosity
          and exposure duration.
        pattern: Irregular spots or patches, often concentrated where the corrosive
          liquid pools.
      wood:
        appearance: Discolored stains in white, green, or brown hues, often with a
          raised, rough texture and possible surface degradation.
        coverage: Typically limited to the contact area, with variation based on wood
          porosity and liquid spread.
        pattern: Spots or patches that follow the wood grain, with streaks if the
          liquid runs.
