  visual_characteristics:
    appearance_on_categories:
      ceramic:
        appearance: PTFE residue on ceramic surfaces shows up as a faint, white or off-white coating that may create a dull,
          matte finish over the glossy base.
        coverage: Coverage is usually partial and spotty, with some sections heavily coated while others are residue-free,
          depending on usage.
        pattern: It tends to appear as irregular spots or a fine, web-like pattern, often concentrated in grooves or where
          heat or friction occurred.
      composite:
        appearance: PTFE residue on composites appears as a light, opaque layer that can mask the underlying material's texture
          and colors, feeling smooth or waxy.
        coverage: Coverage is variable and often incomplete, with residues clinging more to fibrous or resin-rich areas of
          the composite.
        pattern: It typically forms irregular patches or a mottled pattern, influenced by the composite's heterogeneous structure
          and coating application.
      concrete:
        appearance: On concrete, PTFE contamination appears as a light, gray or white film that can reduce surface roughness
          and give a slightly glossy sheen in patches.
        coverage: Coverage is usually partial and variable, with dense residues in textured zones and lighter coverage on
          smooth areas.
        pattern: It tends to form blotchy areas or streaks, often accumulating in pores, cracks, or on flat surfaces where
          residue settles.
      fabric:
        appearance: PTFE residue on fabric looks like a subtle, whitish coating that can stiffen the fibers and create a dull,
          matte appearance on the textile.
        coverage: It is typically sparse and irregular, with some fibers showing residue while adjacent areas remain unaffected,
          depending on fabric weave.
        pattern: Distribution is often spotty or streaky, concentrating in areas where the coating was applied or transferred,
          such as folds or contact points.
      glass:
        appearance: On glass, PTFE residue appears as a subtle, translucent haze or smudges that can cause light scattering
          and reduce clarity, feeling smooth but tacky.
        coverage: Coverage is typically light and inconsistent, often limited to specific zones with occasional uniform thin
          layers in affected areas.
        pattern: It commonly forms streaks or smears, especially along edges or where coating was applied and not fully cleaned
          off.
      metal:
        appearance: PTFE residue on metal appears as a thin, translucent to white film, often with a slightly greasy or waxy
          texture that can dull the surface finish.
        coverage: Coverage is usually partial and variable, ranging from small localized patches to broader areas, depending
          on application and wear.
        pattern: It typically forms irregular spots or streaks, especially in areas where coating was unevenly applied or
          has degraded over time.
      mineral:
        appearance: PTFE residue on minerals shows as a thin, translucent to white layer that can obscure natural colors and
          crystal faces, feeling slick or waxy.
        coverage: Coverage is typically minimal and patchy, with residues more prominent on rough or porous mineral surfaces
          than on smooth ones.
        pattern: It often appears as irregular spots or a fine coating, following mineral cleavage planes or surface irregularities.
      plastic:
        appearance: On plastic, PTFE contamination looks like a thin, whitish film that can make the surface appear frosted
          or cloudy, with a slightly oily texture.
        coverage: It ranges from light, scattered patches to more extensive coverage, varying with plastic type and exposure
          conditions.
        pattern: Distribution is often uneven, showing as streaks or blotches, particularly along seams or in areas exposed
          to coating processes.
      rubber:
        appearance: On rubber, PTFE contamination manifests as a faint, grayish or white film that can make the surface look
          chalky and feel less tacky than untreated rubber.
        coverage: Coverage is generally light and uneven, with higher concentrations in stressed regions and minimal residue
          on smooth surfaces.
        pattern: It usually appears as smudges or diffuse patches, often following the rubber's texture or areas of flexing
          and wear.
      semiconductor:
        appearance: On semiconductors, PTFE contamination appears as a microscopic, faint film that can cause hazing or discoloration,
          potentially interfering with electronic properties.
        coverage: Coverage is usually very thin and can range from isolated spots to near-complete layers, critical for performance
          and often requiring precise control.
        pattern: Distribution is often uniform or speckled at a fine scale, concentrated in areas exposed to coating processes
          or contamination sources.
      specialty:
        appearance: For specialty materials, PTFE residue varies but generally looks like a light, opaque film that alters
          the surface's original finish, appearing waxy or cloudy.
        coverage: Coverage is highly dependent on the material, ranging from minimal and localized to extensive, with variations
          based on specific use and environment.
        pattern: It typically forms irregular patterns such as spots or streaks, tailored to the material's unique properties
          and coating application methods.
      stone:
        appearance: PTFE contamination on stone manifests as a light, milky or grayish film that can reduce the stone's natural
          luster and feel slightly slippery.
        coverage: It varies from minimal spotting to moderate coverage, with higher amounts in textured or porous areas of
          the stone.
        pattern: Distribution is often patchy or streaky, concentrating in crevices or on flat surfaces where coating residue
          has accumulated.
      wood:
        appearance: On wood, PTFE residue looks like a faint, whitish or cloudy film that can obscure the natural grain and
          give a hazy appearance to the surface.
        coverage: Coverage is generally uneven and sparse, with some areas showing heavy residue while others remain clean,
          influenced by wood porosity.
        pattern: It often appears as blotchy patches or streaks, following the wood's texture or areas where coating was improperly
          removed.
