  visual:
    appearanceOnCategories:
      presentation: descriptive
      items:
      - appearanceOnCategories:
          ceramic:
            appearance: Shows as a glossy or matte coating, usually clear or lightly colored, creating a smooth surface that
              may mask the ceramic's finish.
            coverage: Usually complete and consistent; variations might occur in crevices or on curved surfaces.
            pattern: Often uniform, but can exhibit streaks or uneven patches, especially on glazed or textured areas.
          composite:
            appearance: Appears as a cohesive film, often clear or tinted, blending with or slightly obscuring the composite's
              layered or fibrous texture.
            coverage: Varies from partial to full, depending on composite porosity and application uniformity.
            pattern: Usually uniform across the surface, but can show variations like streaks or patches in areas with different
              material components.
          concrete:
            appearance: Manifests as a thin, often translucent film, giving a damp or glossy look and potentially darkening
              the concrete's color.
            coverage: Varies widely from spotty to full, influenced by surface texture and application method.
            pattern: Usually uniform on smooth surfaces, but can be patchy or streaky on rough or porous concrete where penetration
              is inconsistent.
          fabric:
            appearance: Shows as a stiff, oily, or waxy residue, usually clear or with a faint color, altering the fabric's
              texture and causing a sheen or stain.
            coverage: Typically partial and uneven, as absorption varies with fabric type and weave density.
            pattern: Tends to be patchy or streaky, following the weave pattern or accumulating in folds and seams.
          glass:
            appearance: Appears as a faint, hazy or oily residue, often colorless or with a slight iridescence, reducing clarity
              and causing light refraction.
            coverage: Generally full and even; inconsistencies can lead to patchy areas or thin spots.
            pattern: Typically forms a uniform film, but may show streaks, smudges, or droplets if not evenly applied.
          metal:
            appearance: Often appears as a glossy or matte film, typically clear, yellowish, or greenish, with a smooth or
              slightly oily texture.
            coverage: Generally provides full, even coverage; variations may occur at edges or in recessed areas.
            pattern: Usually forms a uniform layer, but can show streaks or patches if applied unevenly or degraded.
          mineral:
            appearance: Appears as a coating that may be clear or slightly colored, often enhancing or dulling the mineral's
              natural luster and crystal faces.
            coverage: Ranges from partial to full, with variations due to mineral hardness and surface geometry.
            pattern: Generally uniform, but can form streaks or concentrated patches in fissures or on specific crystal planes.
          plastic:
            appearance: Manifests as a slick, oily, or waxy layer, typically transparent or with a slight hue, altering the
              plastic's shine and feel.
            coverage: Tends to be full and even; poor adhesion can cause spotty coverage on certain plastics.
            pattern: Generally uniform, but may form beads, streaks, or patches due to surface tension or improper application.
          rubber:
            appearance: Presents as a greasy or waxy coating, typically clear or light-colored, making the rubber surface
              appear slick or slightly discolored.
            coverage: Generally full coverage; can be spotty if the rubber is highly textured or contaminated.
            pattern: Often uniform, but may pool in grooves or form uneven patches due to rubber's flexibility and surface
              irregularities.
          semiconductor:
            appearance: Presents as an ultra-thin, often invisible or faintly iridescent layer under magnification, potentially
              causing hazing or color shifts on surfaces.
            coverage: Designed for full, even coverage; defects can lead to localized variations affecting performance.
            pattern: Typically uniform to ensure functionality, but contamination may appear as micro-streaks or spots from
              improper deposition.
          specialty:
            appearance: Varies widely; may appear as a tailored film—clear, colored, or textured—specific to the material's
              unique properties and intended use.
            coverage: Aimed at precise coverage, from partial to full, with variations based on specialty requirements and
              surface conditions.
            pattern: Customized for uniformity or specific designs, but can show inconsistencies like streaks or patches if
              application is flawed.
          stone:
            appearance: Presents as a thin, often transparent or slightly tinted film, giving a wet look or altering the stone's
              natural color and texture.
            coverage: Varies from spotty to full coverage, depending on stone type and application consistency.
            pattern: Usually uniform, but can appear streaky or patchy on porous surfaces where absorption is uneven.
          wood:
            appearance: Manifests as a waxy or oily coating, often clear or light-colored, altering the natural grain with
              a sheen or dull finish.
            coverage: Typically partial to full coverage, with variations due to wood porosity and application method.
            pattern: Tends to be uniform across surfaces, but may pool in grain lines or form patches if not properly absorbed.
