  visual_characteristics:
    appearance_on_categories:
      ceramic:
        appearance: Green, black, or white powdery or slimy coatings, often making
          surfaces appear stained or dirty.
        coverage: Patchy, with more growth in porous or frequently wet regions, varying
          by exposure.
        pattern: Irregular spots or patches, common in grout lines, unglazed areas,
          or damp spots.
      composite:
        appearance: Green, brown, or black varied textures from powdery to slimy,
          depending on material components.
        coverage: Variable, often patchy with denser growth in absorbent or damaged
          areas.
        pattern: Irregular patches or streaks, influenced by porosity and exposure
          to moisture.
      concrete:
        appearance: Green, black, or orange powdery or crusty growth, roughening the
          surface and altering color.
        coverage: Often extensive in damp conditions, but patchy with variation in
          porosity and exposure.
        pattern: Irregular patches or streaks, common in cracks, joints, or shaded,
          moist areas.
      fabric:
        appearance: Green, black, or white fuzzy or spotty stains, often causing musty
          odors and fabric degradation.
        coverage: Variable, from small spots to widespread in humid, poorly aired
          environments.
        pattern: Scattered spots or patches, frequently in folds, seams, or damp sections.
      glass:
        appearance: Green or brown filmy or spotty residues, reducing transparency
          and creating a hazy look.
        coverage: Generally light and localized, concentrated in areas with poor drainage
          or high humidity.
        pattern: Scattered spots or streaks, frequently at edges, frames, or where
          moisture accumulates.
      metal:
        appearance: Green, black, or brown powdery or slimy growth, often dulling
          the surface finish.
        coverage: Patchy and localized, varying from small spots to larger areas depending
          on moisture exposure.
        pattern: Irregular spots or streaks, commonly in damp, shaded areas or near
          joints.
      mineral:
        appearance: Green, yellow, or black crusty or filmy deposits, masking the
          natural luster and texture.
        coverage: Patchy, with denser accumulation in porous or frequently wet mineral
          surfaces.
        pattern: Irregular spots or patches, typically in fissures, shaded zones,
          or where water seeps.
      plastic:
        appearance: Green, black, or gray slimy or powdery films, sometimes causing
          discoloration or a slick feel.
        coverage: Light to moderate, typically localized to moist surfaces and less
          on smooth, non-porous types.
        pattern: Scattered spots or uniform films, often in textured areas or where
          water pools.
      rubber:
        appearance: Black, green, or gray slimy or powdery growth, potentially leading
          to surface softening or cracking.
        coverage: Patchy and localized, increasing with prolonged dampness and poor
          ventilation.
        pattern: Spots or streaks, commonly in seams, cracks, or areas retaining moisture.
      semiconductor:
        appearance: Green or black microscopic films or spots, potentially interfering
          with electronic properties and appearance.
        coverage: Generally minimal and localized, but critical in clean-sensitive
          areas, varying with contamination levels.
        pattern: Fine spots or uniform layers, often in contaminated or humid environments
          during storage or use.
      specialty:
        appearance: Varied colors and textures (e.g., green, black slimy or powdery),
          depending on the specific material composition.
        coverage: Highly variable, ranging from sparse to extensive based on material
          susceptibility and exposure conditions.
        pattern: Irregular distribution such as spots or patches, influenced by environmental
          factors and surface properties.
      stone:
        appearance: Green, black, or yellow crusty or powdery deposits, altering the
          natural texture and color.
        coverage: Often patchy, with denser growth in moist, protected areas and sparse
          elsewhere.
        pattern: Irregular patches or streaks, typically in crevices, shaded, or water-runoff
          zones.
      wood:
        appearance: Green, gray, or orange fuzzy or crusty growth, giving a rough,
          weathered texture.
        coverage: Variable, from sparse spots to extensive coverage in humid conditions.
        pattern: Scattered patches or streaks, often following grain lines or in moist,
          unsealed areas.
