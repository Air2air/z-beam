  visual:
    appearance_on_categories:
      presentation: descriptive
      items:
      - appearance_on_categories:
          ceramic:
            appearance: Marks are distinct, dark, and glossy on the smooth, glazed surface, but may appear duller on unglazed
              areas where ink absorbs slightly.
            coverage: Generally low and localized, with moderate variation; coverage is sparse and focused on marked regions.
            pattern: Often forms clean lines, spots, or patches, with potential for slight bleeding on porous sections, resulting
              in irregular edges.
          composite:
            appearance: Marks vary with material layers, showing as mixed textures with ink pooling in fibrous or porous areas,
              creating mottled, dark discolorations.
            coverage: Highly variable and inconsistent, ranging from sparse to moderate coverage based on composite heterogeneity
              and porosity.
            pattern: Irregular distribution with spots, streaks, or patches that follow composite structures, such as fiber
              directions or resin-rich zones.
          concrete:
            appearance: Marks seep into the rough, porous surface, resulting in muted, grayish-black discolorations that merge
              with the concrete's gritty texture.
            coverage: Inconsistent and patchy, with low to moderate coverage that varies widely due to surface roughness and
              absorption.
            pattern: Typically forms irregular spots, smears, or linear patterns that spread into cracks and pores, creating
              a blotchy appearance.
          fabric:
            appearance: Ink bleeds along fibers, creating soft, faded stains in dark colors that blend with the fabric's weave,
              often appearing dull and absorbed.
            coverage: Variable and often extensive, with moderate to high coverage depending on fabric type; tends to be non-uniform
              and patchy.
            pattern: Distributed as diffuse patches, streaks, or blotches that follow the fabric grain, with significant spreading
              in porous areas.
          glass:
            appearance: Ink forms sharp, glossy lines or dots that stand out against the transparent, smooth surface, often
              appearing vivid and well-defined.
            coverage: Very low and controlled, with uniform application in small areas; variation is minimal and coverage
              is sparse.
            pattern: Usually appears as precise streaks, dots, or uniform lines, with minimal spreading due to the non-porous
              nature.
          metal:
            appearance: Surgical ink appears as dark, often black or blue, semi-glossy marks that may bead up on smooth, non-porous
              surfaces, contrasting with the metallic sheen.
            coverage: Usually sparse and localized, with high variation depending on the marking purpose; coverage is minimal
              and non-uniform.
            pattern: Typically forms irregular spots, streaks, or lines due to manual application, often concentrated in specific
              areas like edges or joints.
          mineral:
            appearance: Ink highlights crystalline structures with dark, contrasting marks that may pool in fissures or on
              smooth faces, depending on mineral hardness and porosity.
            coverage: Sparse and highly variable, with minimal coverage that depends on the mineral's surface properties;
              typically localized and non-uniform.
            pattern: Irregular distribution as spots, lines, or patches influenced by mineral cleavage and surface irregularities,
              often concentrated in defects.
          plastic:
            appearance: Ink appears as bright, semi-glossy marks that may smear or adhere unevenly, depending on the plastic's
              smoothness and chemical resistance.
            coverage: Variable and often patchy, with low to moderate coverage that depends on surface treatment; typically
              sparse and non-uniform.
            pattern: Distributed as streaks, spots, or smudges, with possible beading or running on hydrophobic surfaces,
              leading to irregular patterns.
          rubber:
            appearance: Ink tends to smear and absorb into the flexible, matte surface, resulting in blurred, dark gray or
              black marks that may fade or rub off.
            coverage: Patchy and uneven, with low to moderate coverage that varies with rubber texture and application force;
              generally sparse.
            pattern: Often appears as smudged streaks or patches, with spreading due to surface elasticity and manual handling
              during marking.
          semiconductor:
            appearance: Marks appear as precise, fine lines or dots on the smooth, polished surface, often in dark colors
              that contrast sharply with the metallic or silicon finish.
            coverage: Extremely low and controlled, with uniform application in designated zones; variation is minimal and
              coverage is sparse and precise.
            pattern: Uniform or patterned distribution in specific areas, such as grids or alphanumeric codes, with minimal
              spreading due to high surface control.
          specialty:
            appearance: Varies widely with material type, but ink may show as adaptive marks—glossy on smooth surfaces or
              absorbed on porous ones—often in contrasting colors.
            coverage: Highly variable, from sparse to moderate, influenced by material-specific factors like coatings or textures;
              often non-uniform and tailored.
            pattern: Distribution depends on specialty properties, ranging from uniform patterns on engineered surfaces to
              irregular spots on exotic materials.
          stone:
            appearance: Marks show as contrasting dark spots or lines on the rough, matte surface, with ink pooling in pores
              and cracks for a textured look.
            coverage: Typically low and inconsistent, with high variation due to surface irregularities; coverage is sparse
              and localized.
            pattern: Distributed as irregular spots, smears, or linear patterns, influenced by the stone's uneven surface
              and fissures.
          wood:
            appearance: Ink soaks into porous grains, creating muted, blurred colors like dark gray or brown that blend with
              the natural wood texture and finish.
            coverage: Variable and patchy, generally low to moderate coverage that depends on wood porosity and application
              pressure.
            pattern: Often appears as diffuse patches or streaks following the wood grain, with potential for bleeding into
              surrounding areas.
