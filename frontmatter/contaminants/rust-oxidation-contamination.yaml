  visual:
    appearanceOnCategories:
      presentation: descriptive
      items:
      - appearanceOnCategories:
          ceramic:
            colorVariations: Reddish-brown, orange, yellow-brown, with possible black iron manganese compounds
            commonPatterns: Spotting, streaking, edge staining, crazing-following patterns on glazed surfaces
            coverageRanges: 'Light: isolated spots and faint staining; Moderate: significant surface coverage; Heavy: deep
              penetration and pervasive discoloration'
            description: Iron oxide appears as reddish-brown staining that can either surface-deposit on glazed ceramics or
              penetrate unglazed porous bodies. The contamination creates contrasting discoloration against the ceramic substrate,
              often following surface imperfections or porosity patterns.
            distributionPatterns: Follows surface defects and porosity; migrates with water through unglazed bodies
            edgeCenterBehavior: Prefers edges and unglazed areas; glazed centers show more uniform distribution
            geometryEffects: Accumulates in recessed areas and joints; complex shapes show varied deposition patterns
            gravityInfluence: Downward streaking from water flow; puddle formation creates concentrated staining
            textureDetails: Glazed surfaces show smooth staining; unglazed surfaces may show gritty deposits or deep penetration
          composite:
            colorVariations: Reddish-brown, orange, with possible variation based on composite coloring
            commonPatterns: Fiber-following streaks, edge staining, blotchy patches, interface migration
            coverageRanges: 'Light: isolated staining along fibers; Moderate: significant interface coverage; Heavy: pervasive
              discoloration throughout composite'
            description: Iron oxide appears as reddish-brown staining that can surface-deposit or penetrate along fiber-matrix
              interfaces in composites. The contamination often follows fiber patterns and can create distinctive streaking
              along reinforcement directions.
            distributionPatterns: Follows fiber directions and matrix imperfections; migrates along interfaces
            edgeCenterBehavior: Prefers edges and cut surfaces where fibers are exposed; center shows more uniform distribution
            geometryEffects: Complex shapes show fiber-direction patterns; flat laminates exhibit more uniform distribution
            gravityInfluence: Downward migration along fibers; water-assisted spreading
            textureDetails: Surface deposits feel gritty; penetrated stains may follow fiber texture without significant surface
              change
          concrete:
            colorVariations: Reddish-brown, orange, yellow-ochre, with possible black iron sulfide compounds
            commonPatterns: Crack-following streaks, efflorescence patterns, water runoff lines, blotchy patches
            coverageRanges: 'Light: isolated staining along cracks; Moderate: significant surface coverage; Heavy: deep penetration
              throughout concrete'
            description: Iron oxide appears as reddish-brown to yellow staining that can surface-deposit or penetrate deep
              into the porous concrete matrix. The contamination often follows crack patterns and creates unsightly discoloration
              that contrasts with the gray concrete substrate.
            distributionPatterns: Follows porosity and crack networks; migrates with water through concrete matrix
            edgeCenterBehavior: Prefers edges, joints, and crack networks; center areas may show more uniform staining
            geometryEffects: Accumulates in low points and joints; vertical surfaces show clear runoff patterns
            gravityInfluence: Strong downward migration through pores; water flow dictates distribution
            textureDetails: Surface deposits feel gritty; penetrated stains show no texture change but permanent coloration
          fabric:
            colorVariations: Reddish-brown, orange, rust-red, with possible darker tones from fiber interactions
            commonPatterns: Weave-following patterns, water spot rings, streaking, splash marks
            coverageRanges: 'Light: faint discoloration along fibers; Moderate: distinct staining patterns; Heavy: complete
              saturation and color change'
            description: Iron oxide appears as reddish-brown stains that penetrate fabric fibers, creating permanent discoloration
              that follows the weave pattern. The contamination can range from faint discoloration to intense, saturated staining
              that obscures the original fabric color.
            distributionPatterns: Follows fiber absorption and capillary action; migrates with moisture
            edgeCenterBehavior: Prefers edges and seams where moisture concentrates; center shows more diffuse staining
            geometryEffects: Folds and creases show concentrated staining; flat areas exhibit more uniform distribution
            gravityInfluence: Strong downward migration and streaking; puddle formation creates concentrated staining
            textureDetails: Penetrates fibers without significant texture change; may feel slightly stiffer if heavily contaminated
          glass:
            colorVariations: Reddish-brown, orange, yellow-brown, with iridescent interference colors in thin films
            commonPatterns: Water spots, streaking, uniform films, edge accumulation, splash patterns
            coverageRanges: 'Light: isolated spots and faint films; Moderate: partial surface coverage with visible staining;
              Heavy: opaque reddish coating'
            description: Iron oxide contamination on glass appears as reddish-brown films or spots that typically adhere to
              the surface rather than penetrating. The contamination can range from thin, uniform films to concentrated spots
              and streaks, often with iridescent effects in thin layers.
            distributionPatterns: Surface adhesion following moisture paths; particulate settling creates random spotting
            edgeCenterBehavior: Prefers edges and corners where water accumulates; center areas show more uniform film formation
            geometryEffects: Accumulates in corners and low points; curved surfaces show runoff concentration; flat surfaces
              exhibit uniform deposition
            gravityInfluence: Downward streaking from water runoff; particulate settling creates bottom-heavy distribution
            textureDetails: Smooth films or gritty particulate deposits; may feel slightly rough if particles are present
          metal:
            colorVariations: Reddish-brown, orange-red, yellow-brown, black (for magnetite), with possible iridescent hues
              in advanced stages
            commonPatterns: Spotting, pitting, uniform coatings, streaking from water runoff, concentric rings around initiation
              points
            coverageRanges: 'Light: isolated spots and small patches; Moderate: interconnected patches covering significant
              areas; Heavy: complete surface coverage with thick scale formation'
            description: Rust appears as reddish-brown to orange corrosion products that form irregular patches or uniform
              coatings on metal surfaces. The contamination typically starts as small specks that grow into larger flaky or
              powdery deposits, often with raised, textured surfaces that can obscure the underlying metal substrate.
            distributionPatterns: Begins at nucleation sites and spreads radially; follows surface defects, scratches, and
              areas of residual stress
            edgeCenterBehavior: Prefers edges, corners, and sharp features due to higher stress concentrations and easier
              oxygen access
            geometryEffects: Accelerated at sharp edges, corners, and complex geometries; flat surfaces show more uniform
              distribution; recessed areas may show concentrated pitting
            gravityInfluence: Water-assisted rusting shows downward streaking; dry oxidation tends to be more uniform regardless
              of orientation
            textureDetails: Rough, flaky, porous, and often powdery surface with variable thickness; can range from fine powder
              to thick, layered scales
          mineral:
            colorVariations: Reddish-brown, orange, yellow, with possible black iron oxides depending on oxidation state
            commonPatterns: Crystal-face coatings, cleavage-following stains, surface films, alteration rims
            coverageRanges: 'Light: partial surface staining; Moderate: significant coating coverage; Heavy: complete surface
              alteration'
            description: Iron oxide contamination on minerals appears as reddish-brown coatings or staining that can either
              surface-deposit or form through mineral alteration. The contamination creates contrasting coloration against
              the native mineral substrate, often following crystal boundaries and cleavage planes.
            distributionPatterns: Follows crystal boundaries and structural weaknesses; surface deposition on exposed faces
            edgeCenterBehavior: Prefers edges and crystal terminations; center crystal faces show more uniform distribution
            geometryEffects: Crystal morphology dictates distribution; flat faces show uniform coatings; edges show concentrated
              staining
            gravityInfluence: Minimal effect except in water-assisted deposition; mainly surface chemistry controlled
            textureDetails: Surface coatings may be powdery or crystalline; staining follows mineral structure without texture
              change
          plastic:
            colorVariations: Reddish-brown, orange, with possible lighter tones on light-colored plastics
            commonPatterns: Uniform films, spotting, streaking from water, static-induced patterns
            coverageRanges: 'Light: faint discoloration or isolated spots; Moderate: partial surface coverage; Heavy: opaque
              reddish coating'
            description: Iron oxide contamination on plastics appears as reddish-brown surface deposits that typically do
              not penetrate the non-porous substrate. The contamination forms as particulate films or stains that adhere to
              the surface, often following static charge patterns or surface energy variations.
            distributionPatterns: Surface adhesion following moisture or static patterns; minimal penetration into substrate
            edgeCenterBehavior: Prefers edges and high-surface-energy areas; center shows more uniform distribution
            geometryEffects: Accumulates in recesses and low points; complex geometries show varied deposition
            gravityInfluence: Downward streaking from water; particulate settling creates bottom accumulation
            textureDetails: Smooth films or fine particulate deposits; may feel slightly gritty if particles are large
          rubber:
            colorVariations: Reddish-brown, orange, with possible darker tones on black rubber
            commonPatterns: Uniform films, compression patterns, edge accumulation, splash marks
            coverageRanges: 'Light: faint surface discoloration; Moderate: distinct staining; Heavy: deep reddish coating'
            description: Iron oxide contamination on rubber appears as reddish-brown surface staining that can penetrate slightly
              into porous rubber compounds. The contamination creates contrasting discoloration against the dark rubber substrate,
              often following surface imperfections or compression patterns.
            distributionPatterns: Surface adhesion with slight penetration; follows surface energy variations
            edgeCenterBehavior: Prefers edges and high-contact areas; center shows more uniform distribution
            geometryEffects: Accumulates in grooves and low points; curved surfaces show runoff patterns
            gravityInfluence: Downward streaking from water; minimal effect on dry deposition
            textureDetails: Smooth surface staining with possible slight penetration; may feel unchanged or slightly powdery
          semiconductor:
            colorVariations: Reddish-brown, orange, with interference colors in thin films
            commonPatterns: Random particulate distribution, uniform films, edge accumulation, process-induced patterns
            coverageRanges: 'Light: isolated particles; Moderate: significant surface coverage; Heavy: continuous films'
            description: Iron oxide appears as reddish-brown particulate contamination or thin films that can critically affect
              semiconductor performance. The contamination typically forms as discrete particles or uniform films on the highly
              polished surfaces, creating visible discoloration and surface defects.
            distributionPatterns: Surface adhesion following process conditions; particulate settling creates random distribution
            edgeCenterBehavior: Prefers edges and high-surface-energy areas; center shows more uniform distribution
            geometryEffects: Accumulates in recessed features; planar surfaces show uniform deposition
            gravityInfluence: Particulate settling creates bottom-heavy distribution; minimal effect on film formation
            textureDetails: Particulate deposits feel gritty; thin films remain smooth but discolored
          specialty:
            colorVariations: Reddish-brown, orange, with material-dependent appearance variations
            commonPatterns: 'Material-specific patterns: aerogel shows uniform staining, graphene shows random particulate,
              alloys show localized corrosion'
            coverageRanges: 'Light: minimal surface affect; Moderate: significant discoloration; Heavy: complete surface alteration'
            description: Iron oxide contamination on specialty materials appears as reddish-brown surface deposits whose characteristics
              vary significantly with material properties. On aerogel, it appears as superficial staining; on graphene, as
              particulate contamination; on advanced alloys, as localized corrosion products.
            distributionPatterns: Follows material-specific surface properties and reactivity
            edgeCenterBehavior: 'Material-dependent: aerogel shows uniform distribution, graphene shows edge preference, alloys
              show stress concentration areas'
            geometryEffects: Highly material-dependent; follows specific surface characteristics and reactivity
            gravityInfluence: Varies by material density and surface properties
            textureDetails: 'Varies by material: aerogel shows minimal texture change, graphene shows particulate deposits,
              alloys show corrosion textures'
          stone:
            colorVariations: Reddish-brown, orange, yellow-ochre, brown, with possible black iron sulfide compounds
            commonPatterns: Streaking from water flow, concentric rings around iron sources, blotchy patches, efflorescence
              patterns
            coverageRanges: 'Light: isolated streaks or spots; Moderate: interconnected staining covering significant areas;
              Heavy: pervasive discoloration throughout stone'
            description: Iron oxide appears as reddish-brown to yellow staining that can either surface-deposit or penetrate
              porous stone substrates. The contamination often creates unsightly streaks and blotches that contrast sharply
              with the natural stone coloration, particularly noticeable on light-colored stones.
            distributionPatterns: Follows natural fissures and porosity; migrates with water movement through stone matrix
            edgeCenterBehavior: Prefers edges and joints where water accumulates; center areas may show more uniform staining
            geometryEffects: Accumulates in recesses and low points; vertical surfaces show runoff patterns; porous stones
              show deeper penetration
            gravityInfluence: Clear downward streaking patterns; water flow dictates distribution
            textureDetails: Surface deposits feel gritty or sandy; penetrated stains show no textural change but permanent
              coloration
          wood:
            colorVariations: Reddish-brown, orange-brown, dark brown, with possible blue-black tones from tannin reactions
            commonPatterns: Streaking from water runoff, blotchy patches, grain-following patterns, drip marks
            coverageRanges: 'Light: faint discoloration along grain; Moderate: distinct staining covering portions of surface;
              Heavy: deep, pervasive staining throughout wood structure'
            description: Iron oxide contamination on wood appears as reddish-brown stains that penetrate the porous surface,
              creating permanent discoloration. The stains often follow the wood grain pattern and can appear as either diffuse
              blotches or concentrated streaks where iron-rich water has contacted the surface.
            distributionPatterns: Follows moisture paths and wood grain; concentrates in areas of water accumulation or contact
              with iron objects
            edgeCenterBehavior: Prefers edges and end grain where moisture absorption is highest; center areas may show more
              diffuse staining
            geometryEffects: End grain absorbs more contamination; curved surfaces show runoff patterns; flat surfaces exhibit
              pooling effects
            gravityInfluence: Strong downward streaking from water runoff; puddle formation creates concentrated staining
            textureDetails: Stains penetrate wood fibers without significantly altering surface texture; may feel slightly
              rougher if iron particles are deposited
