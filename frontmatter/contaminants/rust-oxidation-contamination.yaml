visual_characteristics:
  appearance_on_categories:
    ceramic:
      color_variations: Reddish-brown, orange, yellow-brown, with possible black iron manganese compounds
      common_patterns: Spotting, streaking, edge staining, crazing-following patterns on glazed surfaces
      coverage_ranges: 'Light: isolated spots and faint staining; Moderate: significant surface coverage; Heavy: deep penetration
        and pervasive discoloration'
      description: Iron oxide appears as reddish-brown staining that can either surface-deposit on glazed ceramics or penetrate
        unglazed porous bodies. The contamination creates contrasting discoloration against the ceramic substrate, often following
        surface imperfections or porosity patterns.
      distribution_patterns: Follows surface defects and porosity; migrates with water through unglazed bodies
      edge_center_behavior: Prefers edges and unglazed areas; glazed centers show more uniform distribution
      geometry_effects: Accumulates in recessed areas and joints; complex shapes show varied deposition patterns
      gravity_influence: Downward streaking from water flow; puddle formation creates concentrated staining
      texture_details: Glazed surfaces show smooth staining; unglazed surfaces may show gritty deposits or deep penetration
    composite:
      color_variations: Reddish-brown, orange, with possible variation based on composite coloring
      common_patterns: Fiber-following streaks, edge staining, blotchy patches, interface migration
      coverage_ranges: 'Light: isolated staining along fibers; Moderate: significant interface coverage; Heavy: pervasive
        discoloration throughout composite'
      description: Iron oxide appears as reddish-brown staining that can surface-deposit or penetrate along fiber-matrix interfaces
        in composites. The contamination often follows fiber patterns and can create distinctive streaking along reinforcement
        directions.
      distribution_patterns: Follows fiber directions and matrix imperfections; migrates along interfaces
      edge_center_behavior: Prefers edges and cut surfaces where fibers are exposed; center shows more uniform distribution
      geometry_effects: Complex shapes show fiber-direction patterns; flat laminates exhibit more uniform distribution
      gravity_influence: Downward migration along fibers; water-assisted spreading
      texture_details: Surface deposits feel gritty; penetrated stains may follow fiber texture without significant surface
        change
    concrete:
      color_variations: Reddish-brown, orange, yellow-ochre, with possible black iron sulfide compounds
      common_patterns: Crack-following streaks, efflorescence patterns, water runoff lines, blotchy patches
      coverage_ranges: 'Light: isolated staining along cracks; Moderate: significant surface coverage; Heavy: deep penetration
        throughout concrete'
      description: Iron oxide appears as reddish-brown to yellow staining that can surface-deposit or penetrate deep into
        the porous concrete matrix. The contamination often follows crack patterns and creates unsightly discoloration that
        contrasts with the gray concrete substrate.
      distribution_patterns: Follows porosity and crack networks; migrates with water through concrete matrix
      edge_center_behavior: Prefers edges, joints, and crack networks; center areas may show more uniform staining
      geometry_effects: Accumulates in low points and joints; vertical surfaces show clear runoff patterns
      gravity_influence: Strong downward migration through pores; water flow dictates distribution
      texture_details: Surface deposits feel gritty; penetrated stains show no texture change but permanent coloration
    fabric:
      color_variations: Reddish-brown, orange, rust-red, with possible darker tones from fiber interactions
      common_patterns: Weave-following patterns, water spot rings, streaking, splash marks
      coverage_ranges: 'Light: faint discoloration along fibers; Moderate: distinct staining patterns; Heavy: complete saturation
        and color change'
      description: Iron oxide appears as reddish-brown stains that penetrate fabric fibers, creating permanent discoloration
        that follows the weave pattern. The contamination can range from faint discoloration to intense, saturated staining
        that obscures the original fabric color.
      distribution_patterns: Follows fiber absorption and capillary action; migrates with moisture
      edge_center_behavior: Prefers edges and seams where moisture concentrates; center shows more diffuse staining
      geometry_effects: Folds and creases show concentrated staining; flat areas exhibit more uniform distribution
      gravity_influence: Strong downward migration and streaking; puddle formation creates concentrated staining
      texture_details: Penetrates fibers without significant texture change; may feel slightly stiffer if heavily contaminated
    glass:
      color_variations: Reddish-brown, orange, yellow-brown, with iridescent interference colors in thin films
      common_patterns: Water spots, streaking, uniform films, edge accumulation, splash patterns
      coverage_ranges: 'Light: isolated spots and faint films; Moderate: partial surface coverage with visible staining; Heavy:
        opaque reddish coating'
      description: Iron oxide contamination on glass appears as reddish-brown films or spots that typically adhere to the
        surface rather than penetrating. The contamination can range from thin, uniform films to concentrated spots and streaks,
        often with iridescent effects in thin layers.
      distribution_patterns: Surface adhesion following moisture paths; particulate settling creates random spotting
      edge_center_behavior: Prefers edges and corners where water accumulates; center areas show more uniform film formation
      geometry_effects: Accumulates in corners and low points; curved surfaces show runoff concentration; flat surfaces exhibit
        uniform deposition
      gravity_influence: Downward streaking from water runoff; particulate settling creates bottom-heavy distribution
      texture_details: Smooth films or gritty particulate deposits; may feel slightly rough if particles are present
    metal:
      color_variations: Reddish-brown, orange-red, yellow-brown, black (for magnetite), with possible iridescent hues in advanced
        stages
      common_patterns: Spotting, pitting, uniform coatings, streaking from water runoff, concentric rings around initiation
        points
      coverage_ranges: 'Light: isolated spots and small patches; Moderate: interconnected patches covering significant areas;
        Heavy: complete surface coverage with thick scale formation'
      description: Rust appears as reddish-brown to orange corrosion products that form irregular patches or uniform coatings
        on metal surfaces. The contamination typically starts as small specks that grow into larger flaky or powdery deposits,
        often with raised, textured surfaces that can obscure the underlying metal substrate.
      distribution_patterns: Begins at nucleation sites and spreads radially; follows surface defects, scratches, and areas
        of residual stress
      edge_center_behavior: Prefers edges, corners, and sharp features due to higher stress concentrations and easier oxygen
        access
      geometry_effects: Accelerated at sharp edges, corners, and complex geometries; flat surfaces show more uniform distribution;
        recessed areas may show concentrated pitting
      gravity_influence: Water-assisted rusting shows downward streaking; dry oxidation tends to be more uniform regardless
        of orientation
      texture_details: Rough, flaky, porous, and often powdery surface with variable thickness; can range from fine powder
        to thick, layered scales
    mineral:
      color_variations: Reddish-brown, orange, yellow, with possible black iron oxides depending on oxidation state
      common_patterns: Crystal-face coatings, cleavage-following stains, surface films, alteration rims
      coverage_ranges: 'Light: partial surface staining; Moderate: significant coating coverage; Heavy: complete surface alteration'
      description: Iron oxide contamination on minerals appears as reddish-brown coatings or staining that can either surface-deposit
        or form through mineral alteration. The contamination creates contrasting coloration against the native mineral substrate,
        often following crystal boundaries and cleavage planes.
      distribution_patterns: Follows crystal boundaries and structural weaknesses; surface deposition on exposed faces
      edge_center_behavior: Prefers edges and crystal terminations; center crystal faces show more uniform distribution
      geometry_effects: Crystal morphology dictates distribution; flat faces show uniform coatings; edges show concentrated
        staining
      gravity_influence: Minimal effect except in water-assisted deposition; mainly surface chemistry controlled
      texture_details: Surface coatings may be powdery or crystalline; staining follows mineral structure without texture
        change
    plastic:
      color_variations: Reddish-brown, orange, with possible lighter tones on light-colored plastics
      common_patterns: Uniform films, spotting, streaking from water, static-induced patterns
      coverage_ranges: 'Light: faint discoloration or isolated spots; Moderate: partial surface coverage; Heavy: opaque reddish
        coating'
      description: Iron oxide contamination on plastics appears as reddish-brown surface deposits that typically do not penetrate
        the non-porous substrate. The contamination forms as particulate films or stains that adhere to the surface, often
        following static charge patterns or surface energy variations.
      distribution_patterns: Surface adhesion following moisture or static patterns; minimal penetration into substrate
      edge_center_behavior: Prefers edges and high-surface-energy areas; center shows more uniform distribution
      geometry_effects: Accumulates in recesses and low points; complex geometries show varied deposition
      gravity_influence: Downward streaking from water; particulate settling creates bottom accumulation
      texture_details: Smooth films or fine particulate deposits; may feel slightly gritty if particles are large
    rubber:
      color_variations: Reddish-brown, orange, with possible darker tones on black rubber
      common_patterns: Uniform films, compression patterns, edge accumulation, splash marks
      coverage_ranges: 'Light: faint surface discoloration; Moderate: distinct staining; Heavy: deep reddish coating'
      description: Iron oxide contamination on rubber appears as reddish-brown surface staining that can penetrate slightly
        into porous rubber compounds. The contamination creates contrasting discoloration against the dark rubber substrate,
        often following surface imperfections or compression patterns.
      distribution_patterns: Surface adhesion with slight penetration; follows surface energy variations
      edge_center_behavior: Prefers edges and high-contact areas; center shows more uniform distribution
      geometry_effects: Accumulates in grooves and low points; curved surfaces show runoff patterns
      gravity_influence: Downward streaking from water; minimal effect on dry deposition
      texture_details: Smooth surface staining with possible slight penetration; may feel unchanged or slightly powdery
    semiconductor:
      color_variations: Reddish-brown, orange, with interference colors in thin films
      common_patterns: Random particulate distribution, uniform films, edge accumulation, process-induced patterns
      coverage_ranges: 'Light: isolated particles; Moderate: significant surface coverage; Heavy: continuous films'
      description: Iron oxide appears as reddish-brown particulate contamination or thin films that can critically affect
        semiconductor performance. The contamination typically forms as discrete particles or uniform films on the highly
        polished surfaces, creating visible discoloration and surface defects.
      distribution_patterns: Surface adhesion following process conditions; particulate settling creates random distribution
      edge_center_behavior: Prefers edges and high-surface-energy areas; center shows more uniform distribution
      geometry_effects: Accumulates in recessed features; planar surfaces show uniform deposition
      gravity_influence: Particulate settling creates bottom-heavy distribution; minimal effect on film formation
      texture_details: Particulate deposits feel gritty; thin films remain smooth but discolored
    specialty:
      color_variations: Reddish-brown, orange, with material-dependent appearance variations
      common_patterns: 'Material-specific patterns: aerogel shows uniform staining, graphene shows random particulate, alloys
        show localized corrosion'
      coverage_ranges: 'Light: minimal surface affect; Moderate: significant discoloration; Heavy: complete surface alteration'
      description: Iron oxide contamination on specialty materials appears as reddish-brown surface deposits whose characteristics
        vary significantly with material properties. On aerogel, it appears as superficial staining; on graphene, as particulate
        contamination; on advanced alloys, as localized corrosion products.
      distribution_patterns: Follows material-specific surface properties and reactivity
      edge_center_behavior: 'Material-dependent: aerogel shows uniform distribution, graphene shows edge preference, alloys
        show stress concentration areas'
      geometry_effects: Highly material-dependent; follows specific surface characteristics and reactivity
      gravity_influence: Varies by material density and surface properties
      texture_details: 'Varies by material: aerogel shows minimal texture change, graphene shows particulate deposits, alloys
        show corrosion textures'
    stone:
      color_variations: Reddish-brown, orange, yellow-ochre, brown, with possible black iron sulfide compounds
      common_patterns: Streaking from water flow, concentric rings around iron sources, blotchy patches, efflorescence patterns
      coverage_ranges: 'Light: isolated streaks or spots; Moderate: interconnected staining covering significant areas; Heavy:
        pervasive discoloration throughout stone'
      description: Iron oxide appears as reddish-brown to yellow staining that can either surface-deposit or penetrate porous
        stone substrates. The contamination often creates unsightly streaks and blotches that contrast sharply with the natural
        stone coloration, particularly noticeable on light-colored stones.
      distribution_patterns: Follows natural fissures and porosity; migrates with water movement through stone matrix
      edge_center_behavior: Prefers edges and joints where water accumulates; center areas may show more uniform staining
      geometry_effects: Accumulates in recesses and low points; vertical surfaces show runoff patterns; porous stones show
        deeper penetration
      gravity_influence: Clear downward streaking patterns; water flow dictates distribution
      texture_details: Surface deposits feel gritty or sandy; penetrated stains show no textural change but permanent coloration
    wood:
      color_variations: Reddish-brown, orange-brown, dark brown, with possible blue-black tones from tannin reactions
      common_patterns: Streaking from water runoff, blotchy patches, grain-following patterns, drip marks
      coverage_ranges: 'Light: faint discoloration along grain; Moderate: distinct staining covering portions of surface;
        Heavy: deep, pervasive staining throughout wood structure'
      description: Iron oxide contamination on wood appears as reddish-brown stains that penetrate the porous surface, creating
        permanent discoloration. The stains often follow the wood grain pattern and can appear as either diffuse blotches
        or concentrated streaks where iron-rich water has contacted the surface.
      distribution_patterns: Follows moisture paths and wood grain; concentrates in areas of water accumulation or contact
        with iron objects
      edge_center_behavior: Prefers edges and end grain where moisture absorption is highest; center areas may show more diffuse
        staining
      geometry_effects: End grain absorbs more contamination; curved surfaces show runoff patterns; flat surfaces exhibit
        pooling effects
      gravity_influence: Strong downward streaking from water runoff; puddle formation creates concentrated staining
      texture_details: Stains penetrate wood fibers without significantly altering surface texture; may feel slightly rougher
        if iron particles are deposited
