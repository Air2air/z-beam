  visual:
    appearanceOnCategories:
      presentation: descriptive
      items:
      - appearanceOnCategories:
          ceramic:
            appearance: It appears as dull, discolored areas with green or brown tints, potentially altering the glaze and
              creating a rough or pitted surface.
            coverage: Coverage is typically partial and uneven, ranging from small blemishes to larger affected zones.
            pattern: Distribution is irregular, with spots or smears often found near edges or where brass objects have rested,
              leading to localized staining.
          composite:
            appearance: It appears as mottled discolorations with green or brown hues, potentially disrupting the composite's
              uniform finish and creating a rough texture.
            coverage: Coverage is variable and patchy, influenced by the composite's composition and the extent of brass contamination.
            pattern: Patterns are irregular, with spots or smears distributed across the surface, often exacerbated by material
              porosity or layer interfaces.
          concrete:
            appearance: On concrete, it manifests as greenish or brownish patches that can be powdery or embedded, altering
              the surface color and creating a rough texture.
            coverage: Coverage is patchy and uneven, ranging from small discolorations to larger areas, influenced by concrete
              condition and exposure time.
            pattern: It forms as irregular spots or streaks, often spreading from contamination sources like drips or spills,
              following porosity variations.
          fabric:
            appearance: It appears as greenish or brownish stains on the fabric, often embedded in fibers and causing discoloration
              that may feel stiff or gritty.
            coverage: Coverage is typically sparse and irregular, with stains varying in size and intensity based on fabric
              type and exposure.
            pattern: Distribution is spotty or streaky, following contact points or moisture trails where brass residues have
              transferred and oxidized.
          glass:
            appearance: On glass, it shows as hazy, greenish films or spots that can obscure transparency, sometimes with
              a gritty texture from residual particles.
            coverage: Coverage is generally light and patchy, with variations depending on exposure duration and cleaning
              history.
            pattern: It forms as streaks or patches, often spreading from points of contact or condensation where brass compounds
              have deposited.
          metal:
            appearance: Brass coating removal appears as a dull, patchy surface with discolored areas ranging from greenish
              to brownish hues, often revealing the underlying metal.
            coverage: Coverage is usually partial and uneven, varying from small spots to larger areas depending on the removal
              method and exposure.
            pattern: It typically forms irregular patches or streaks where the coating has been partially or fully removed,
              often concentrated at edges or high-wear areas.
          mineral:
            appearance: It appears as discolored zones with green or brown tints, potentially altering the mineral's luster
              and introducing foreign particles or coatings.
            coverage: Coverage is typically partial and variable, with localized patches depending on mineral hardness and
              contamination history.
            pattern: Patterns are irregular, with spots or smears distributed across surfaces, often concentrated in cracks
              or where brass has adhered.
          plastic:
            appearance: On plastic, it manifests as faded or stained regions with greenish discolorations, sometimes causing
              surface crazing or a chalky residue.
            coverage: Coverage is usually limited and uneven, with patches varying in size based on material compatibility
              and exposure.
            pattern: It forms as blotches or streaks, often concentrated where brass has rubbed or corroded, following stress
              points or contamination sources.
          rubber:
            appearance: On rubber, it shows as darkened or greenish stains that may cause surface hardening or cracking, altering
              the material's elasticity and color.
            coverage: Coverage is often localized and uneven, with small to moderate patches depending on usage and environmental
              conditions.
            pattern: It typically forms as spots or streaks, concentrated in areas of friction or where brass components have
              been in prolonged contact.
          semiconductor:
            appearance: On semiconductors, it shows as microscopic discoloration or contamination, often appearing as hazy
              films or spots that can interfere with electronic properties.
            coverage: Coverage is usually minimal but critical, with variations from sparse particles to thin films affecting
              device performance.
            pattern: It forms as fine spots or uniform layers, distributed across wafer surfaces, potentially following deposition
              or handling processes.
          specialty:
            appearance: On specialty materials, it appears as discolored or degraded areas with greenish hues, tailored to
              the material's unique properties and surface finish.
            coverage: Coverage varies widely, from localized blemishes to extensive areas, based on material sensitivity and
              exposure conditions.
            pattern: Distribution is material-dependent, often irregular with spots or patches, influenced by specific applications
              and contamination sources.
          stone:
            appearance: It appears as greenish or brownish stains on the stone surface, often creating a mottled look that
              can be powdery or embedded in pores.
            coverage: Coverage is variable but often limited to surface patches, with uneven distribution based on environmental
              factors.
            pattern: Patterns are usually spotty or streaky, following moisture paths or areas where brass residues have settled
              and oxidized.
          wood:
            appearance: On wood, it manifests as discolored spots with a greenish or brownish tint, often altering the natural
              grain and leaving a rough or stained texture.
            coverage: Coverage is typically sparse and localized, concentrated in areas of direct contact or contamination.
            pattern: Distribution is irregular, with spots or patches forming where brass particles have adhered or reacted,
              commonly near fasteners or joints.
