  visual:
    appearance_on_categories:
      presentation: descriptive
      items:
      - appearance_on_categories:
          ceramic:
            appearance: Dark gray dust that adheres to smooth, glazed surfaces, appearing as a dull film over the ceramic's
              usual luster.
            coverage: Light to moderate, with even spread on horizontal surfaces but less on vertical ones, and removable
              with washing.
            pattern: Distributes as fine spots or a uniform layer, influenced by surface orientation and cleaning frequency.
          composite:
            appearance: Dark dust that settles on composite materials, blending with or contrasting the surface depending
              on color and texture.
            coverage: Generally light and variable, accumulating more on rough or unfinished surfaces and less on sealed ones.
            pattern: Appears as irregular spots or a thin film, with distribution affected by composite porosity and environmental
              conditions.
          concrete:
            appearance: Gray to black powdery deposits that settle on rough concrete surfaces, darkening the natural gray
              color and adding grit.
            coverage: Varies widely from light to heavy, accumulating in low-lying areas and persisting until washed away
              by rain.
            pattern: Forms patches or a thin layer, with patterns influenced by surface texture, cracks, and exposure to weathering.
          fabric:
            appearance: Dark, fine dust that clings to fibers, causing staining and a dull, dirty appearance on fabrics.
            coverage: Light to moderate, with higher accumulation in dense or textured areas, and may require washing for
              complete removal.
            pattern: Distributes as scattered spots or smudges, often ingrained into the weave and harder to remove from porous
              materials.
          glass:
            appearance: Fine, dark particles that create a hazy or smeared look on transparent surfaces, reducing clarity
              and shine.
            coverage: Typically light and patchy, concentrated on areas facing brake dust sources, and easily cleaned with
              wiping.
            pattern: Often forms streaks or smudges, especially when wiped or exposed to moisture, leading to uneven distribution.
          metal:
            appearance: Dark gray to black powdery deposits that adhere to the surface, often creating a matte finish on otherwise
              shiny metal.
            coverage: Varies from light dusting to heavy accumulation, often concentrated on exposed areas near braking systems.
            pattern: Typically appears as streaks or patches aligned with the direction of airflow or movement, such as along
              wheel rims.
          mineral:
            appearance: Dark dust that adheres to mineral surfaces, often contrasting with crystalline or natural hues and
              reducing reflectivity.
            coverage: Typically light and uneven, more prevalent on exposed, rough surfaces and less on polished ones.
            pattern: Appears as fine spots or a diffuse coating, with distribution shaped by mineral hardness and environmental
              exposure.
          plastic:
            appearance: Black or gray powdery residue that sticks to plastic surfaces, often causing discoloration and a gritty
              feel.
            coverage: Varies from sparse to moderate, depending on exposure; tends to be uneven and can embed in soft plastics.
            pattern: Forms patches or streaks, with accumulation in textured areas or edges due to static attraction.
          rubber:
            appearance: Grayish-black particles that embed into rubber surfaces, making them appear soiled and slightly abrasive
              to touch.
            coverage: Moderate to heavy in high-friction zones like tires, but uneven overall and resistant to simple removal.
            pattern: Tends to form streaks or concentrated patches, especially in grooves or areas with frequent contact.
          semiconductor:
            appearance: Fine, dark particles that can contaminate sensitive surfaces, potentially causing defects and appearing
              as microscopic smudges.
            coverage: Extremely light and critical to minimize; varies with cleanliness protocols and can lead to performance
              issues if not controlled.
            pattern: Forms as minute spots or a thin film, often uniform in controlled environments but irregular in dusty
              conditions.
          specialty:
            appearance: Dark, abrasive dust that settles on unique surfaces like coatings or advanced materials, altering
              appearance and potentially causing damage.
            coverage: Ranges from minimal to significant, influenced by exposure levels and material susceptibility, often
              requiring specialized cleaning.
            pattern: Distribution varies widely—from uniform films on smooth specialties to embedded spots in porous ones—depending
              on material properties.
          stone:
            appearance: Grayish-black dust that settles on the surface, contrasting with natural stone colors and textures,
              often making it look dirty.
            coverage: Light to moderate, varying with proximity to traffic; tends to accumulate in depressions and be removed
              by rain.
            pattern: Appears as scattered spots or a thin film, with patterns shaped by surface roughness and exposure to
              elements.
          wood:
            appearance: Dark, gritty particles that cling to porous surfaces, potentially embedding into the grain and darkening
              the wood's natural color.
            coverage: Generally light and uneven, with higher accumulation in crevices or sheltered spots, but can be washed
              away easily.
            pattern: Forms irregular spots or patches, with distribution influenced by surface texture and environmental factors
              like wind.
