  visual_characteristics:
    appearance_on_categories:
      ceramic:
        appearance: Presents as a glossy or matte coating in colors such as yellow or black, altering the ceramic's smooth,
          hard surface.
        coverage: Generally good and consistent, but imperfections like pinholes or uneven edges can occur.
        pattern: Tends to form a relatively uniform layer, though it may exhibit streaks or mottling if applied unevenly.
      composite:
        appearance: Appears as a discontinuous film in varied colors, potentially highlighting the composite's heterogeneous
          structure with glossy or dull areas.
        coverage: Often partial and variable, with differences in adhesion between matrix and reinforcement components.
        pattern: Distributes unevenly, forming spots or streaks that follow the material's fiber or filler distribution.
      concrete:
        appearance: Presents as a thin, often dull or colored layer that may look powdery or flaky, masking the rough, porous
          surface.
        coverage: Typically incomplete and highly variable, with large uncovered areas due to concrete's high porosity.
        pattern: Distributes in blotches or a mottled pattern, with concentration in pores and cracks where residue accumulates.
      fabric:
        appearance: Shows as stiff, discolored areas in metallic or dark hues, altering the fabric's texture and making it
          feel crusty or brittle.
        coverage: Extremely uneven and sparse, with most of the fabric remaining uncovered due to absorption and poor adhesion.
        pattern: Appears as random spots or streaks, often following the weave pattern where the coating penetrates or sits
          on fibers.
      glass:
        appearance: Manifests as a hazy, iridescent, or tinted film that can obscure transparency, with colors ranging from
          rainbow-like to dull shades.
        coverage: Can be full and even on clean surfaces, but may show variations like thin spots or bubbles if contaminated.
        pattern: Often appears as uniform smears or localized spots, depending on application method and surface cleanliness.
      metal:
        appearance: Typically appears as a thin, iridescent or colored film, often in shades of gold, brown, or black, with
          a smooth or slightly textured finish.
        coverage: Generally provides full coverage with minimal variation, though incomplete coverage may occur in recessed
          or poorly prepared areas.
        pattern: Usually forms a uniform or near-uniform layer, but can show streaks or patches if application is uneven or
          contaminated.
      mineral:
        appearance: Appears as an unnatural, shiny or tinted coating that can obscure the mineral's natural luster and crystal
          structure.
        coverage: Generally partial and inconsistent, with variations based on mineral composition and surface smoothness.
        pattern: Forms irregular patches or a streaked effect, often adhering better to certain crystal faces or inclusions.
      plastic:
        appearance: Looks like an adherent, often metallic or dark film that may appear flaky or cracked, contrasting with
          the plastic's original finish.
        coverage: Typically poor and inconsistent, with large areas uncovered due to low surface energy and chemical incompatibility.
        pattern: Shows as irregular patches or a non-uniform layer, as plastics often resist adhesion, leading to peeling
          or beading.
      rubber:
        appearance: Manifests as a flaky or peeling coating in dark or iridescent shades, often cracking due to rubber's flexibility
          and surface oils.
        coverage: Generally poor and non-uniform, with significant peeling and exposed areas common.
        pattern: Forms irregular patches or a speckled effect, as the coating fails to bond uniformly on the elastic surface.
      semiconductor:
        appearance: Shows as a thin, often metallic or oxide-like film that may cause discoloration or hazing, affecting the
          pristine surface.
        coverage: Can range from full to patchy, with critical areas like circuits showing variations that impact performance.
        pattern: Tends to be uniform if intentional, but as contamination, it appears as localized spots or a non-uniform
          layer.
      specialty:
        appearance: Varies widely by material, but generally appears as an adherent, discolored film that contrasts with the
          unique surface properties.
        coverage: Highly variable and often poor, tailored to the material's specific chemical and physical resistance.
        pattern: Distribution depends on the specialty material's characteristics, often forming irregular patches or a non-uniform
          coating.
      stone:
        appearance: Shows as a thin, often shiny or discolored layer in hues like bronze or green, masking the stone's natural
          texture and color.
        coverage: Usually incomplete and variable, with poor adhesion leading to patchy areas and exposed stone.
        pattern: Distributes unevenly, forming blotches or streaks, especially on rough or porous surfaces where adhesion
          is inconsistent.
      wood:
        appearance: Appears as an unnatural, glossy or matte film, often in metallic or dark colors, contrasting with the
          wood's natural grain and texture.
        coverage: Typically partial and uneven, with significant variation due to wood's porous and absorbent nature.
        pattern: Forms irregular patches or streaks where the coating adheres poorly, often pooling in grooves or along edges.
