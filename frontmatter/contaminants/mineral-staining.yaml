visual_characteristics:
  appearance_on_categories:
    ceramic:
      appearance: Mineral staining on ceramic shows as white, brown, or grayish spots or films, often with a chalky or gritty
        texture on the glazed surface.
      coverage: Coverage is typically localized and uneven, ranging from minor spots to larger stained areas based on usage
        and maintenance.
      pattern: It commonly appears as spots, streaks, or patches, especially around edges or in areas where water pools.
    composite:
      appearance: Mineral staining on composites manifests as discolored spots or streaks, often brown or white, that may
        blend with or stand out from the material's varied texture.
      coverage: Coverage is often uneven and localized, varying with the composite's porosity and environmental factors.
      pattern: It typically appears as irregular patches or streaks, following the composite's layered or mixed structure.
    concrete:
      appearance: On concrete, mineral staining manifests as white, brown, or greenish efflorescence or discolorations, often
        with a powdery or crystalline texture.
      coverage: Coverage can range from light spotting to extensive areas, varying with concrete porosity and environmental
        conditions.
      pattern: It typically appears as patches, streaks, or uniform blooms, especially on surfaces where moisture evaporates.
    fabric:
      appearance: Mineral staining on fabric appears as discolored spots or streaks, often white, brown, or gray, that can
        feel stiff or crusty on the textile.
      coverage: Coverage is typically patchy and localized, ranging from small stains to larger areas depending on fabric
        type and exposure.
      pattern: It commonly forms as irregular spots or streaks, following fabric weave or moisture paths.
    glass:
      appearance: On glass, mineral staining appears as white, cloudy, or iridescent films or spots, often reducing transparency
        and creating a hazy finish.
      coverage: Coverage can be light and widespread or concentrated in spots, varying with water quality and cleaning frequency.
      pattern: It usually forms as uniform films, streaks, or spotty deposits, particularly in areas with water exposure or
        hard water residue.
    metal:
      appearance: Mineral staining on metal appears as rust-colored, brown, or greenish deposits, often with a rough or crusty
        texture that contrasts with the smooth metallic surface.
      coverage: Coverage is usually partial and localized, varying from small spots to larger areas depending on environmental
        exposure.
      pattern: It typically forms in irregular spots, streaks, or patches, often concentrated in areas exposed to moisture
        or contaminants.
    mineral:
      appearance: Mineral staining on other minerals appears as discolored patches or coatings, often in contrasting colors
        like red or white, altering the natural luster and texture.
      coverage: Coverage is often extensive and variable, ranging from thin films to thick encrustations based on geological
        factors.
      pattern: It usually forms as patches, veins, or uniform layers, depending on mineral interactions and deposition processes.
    plastic:
      appearance: On plastic, mineral staining appears as white, cloudy, or discolored patches, often making the surface look
        dull or etched.
      coverage: Coverage is usually light and patchy, with variation depending on plastic type and exposure to mineral-rich
        substances.
      pattern: It tends to form as spots or streaks, particularly in scratched or porous areas where minerals can adhere.
    rubber:
      appearance: On rubber, mineral staining shows as white, gray, or brownish deposits, creating a powdery or streaked look
        on the flexible surface.
      coverage: Coverage is generally light and sporadic, with variation based on rubber composition and usage conditions.
      pattern: It usually forms as spots or streaks, often in crevices or areas exposed to moisture and minerals.
    semiconductor:
      appearance: On semiconductors, mineral staining shows as discolored spots or films, often gray or brown, that can interfere
        with surface conductivity and appearance.
      coverage: Coverage is usually minimal and localized, with variation depending on manufacturing controls and cleanliness.
      pattern: It typically appears as spots or uniform contamination, especially in areas exposed to processing chemicals
        or environments.
    specialty:
      appearance: Mineral staining on specialty materials appears as discolored areas or deposits, varying in color and texture
        based on the unique composition, often reducing aesthetic or functional qualities.
      coverage: Coverage is highly variable, ranging from isolated spots to widespread areas, depending on the material's
        properties and environmental factors.
      pattern: It forms in patterns specific to the material, such as spots, streaks, or patches, influenced by its structure
        and exposure.
    stone:
      appearance: Mineral staining on stone manifests as white, green, or brown crusty deposits or discolorations, often giving
        a weathered or etched appearance.
      coverage: Coverage is often patchy and uneven, varying from light spotting to heavy encrustation depending on mineral
        content and environment.
      pattern: It typically forms in patches, streaks, or uniform layers, especially in porous areas or along cracks and edges.
    wood:
      appearance: On wood, mineral staining shows as dark brown, black, or gray discolorations, creating a blotchy or streaked
        look that may alter the natural grain.
      coverage: Coverage can range from small, isolated spots to extensive areas, with variation based on wood porosity and
        exposure.
      pattern: It often appears as streaks or patches following the wood grain or moisture paths, sometimes forming irregular
        blotches.
