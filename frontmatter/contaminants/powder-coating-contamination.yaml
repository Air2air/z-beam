  visual:
    appearance_on_categories:
      presentation: descriptive
      items:
      - appearance_on_categories:
          ceramic:
            appearance: Powder coating buildup on ceramic appears as a thick, adhered layer that can be smooth or textured,
              often in bright colors but prone to chipping.
            coverage: Coverage is variable, ranging from complete in some areas to minimal in others, with inconsistencies
              due to surface smoothness.
            pattern: It forms in irregular patches or drips, concentrating on glazed areas or edges where overspray accumulates
              and cures.
          composite:
            appearance: Powder coating buildup on composites appears as a rough, layered deposit that can hide the underlying
              texture, usually in solid colors with a uneven finish.
            coverage: Coverage is typically partial and inconsistent, with buildup in recesses or on fibers, and gaps on smoother
              areas.
            pattern: It forms in blotches or streaks, adhering variably to different composite materials, leading to an irregular
              distribution.
          concrete:
            appearance: On concrete, it looks like a thick, adhered crust that masks the rough surface, usually in the applied
              color but may appear dusty or cracked.
            coverage: Coverage is variable and often incomplete, ranging from dense layers in recesses to light coating on
              high points, with overall inconsistency.
            pattern: Distribution is uneven, with patches or streaks, as it bonds better to porous areas and accumulates in
              cracks or low spots.
          fabric:
            appearance: Powder coating buildup on fabric appears as a stiff, crusty layer that embeds into fibers, often in
              the applied color with a matte, rough texture.
            coverage: Coverage is sparse and irregular, with heavy buildup in some sections and little to none in others,
              creating a blotchy look.
            pattern: It forms in spots or patches, concentrating on woven areas or folds where powder collects and hardens
              upon curing.
          glass:
            appearance: On glass, it shows as a hazy, opaque coating that reduces transparency, often in the applied color
              with a rough or gritty surface finish.
            coverage: Coverage is usually partial and patchy, with areas of heavy buildup alternating with clear sections,
              resulting in a non-uniform appearance.
            pattern: Distribution is typically uneven, with streaks, spots, or a foggy layer, as it does not bond well and
              may peel or collect in corners.
          metal:
            appearance: Powder coating buildup on metal appears as a thick, uneven layer with a matte or glossy finish, often
              in the applied color but may show discoloration or dullness.
            coverage: Coverage is usually partial and variable, ranging from thin spots to heavy accumulations, with inconsistencies
              in thickness across the surface.
            pattern: It typically forms in patches or streaks, concentrating on edges, corners, or recessed areas due to electrostatic
              attraction and overspray.
          mineral:
            appearance: Powder coating buildup on minerals appears as a opaque, caked-on layer that obscures natural features,
              often in solid colors with a rough or granular finish.
            coverage: Coverage is typically partial and uneven, with thick deposits in crevices and minimal on flat areas,
              resulting in a non-uniform appearance.
            pattern: It forms in irregular patches or coatings, adhering more to rough crystalline surfaces and less to smooth
              ones, leading to a mottled effect.
          plastic:
            appearance: On plastic, it looks like a brittle, flaky coating that may not adhere well, often in the applied
              color but can appear cracked or bubbled.
            coverage: Coverage is often incomplete and uneven, with thick layers in some spots and bare patches elsewhere,
              depending on plastic type.
            pattern: Distribution is spotty or streaky, with buildup on high points or static-prone areas, and may peel off
              in sections.
          rubber:
            appearance: On rubber, it shows as a flexible but cracked coating that may not bond securely, often in the applied
              color with a pebbly or rough surface.
            coverage: Coverage is generally low and uneven, with thick spots in indentations and minimal coverage on smooth,
              elastic areas.
            pattern: Distribution is patchy or streaky, with accumulation in grooves or on textured surfaces, and may flake
              off over time.
          semiconductor:
            appearance: On semiconductors, it shows as a contaminating layer that can interfere with conductivity, often in
              the applied color with a fine, powdery texture.
            coverage: Coverage is usually minimal and inconsistent, with localized buildup that varies based on handling and
              environmental factors.
            pattern: Distribution is spotty or uniform in small areas, as it may deposit during processing and concentrate
              on exposed surfaces or edges.
          specialty:
            appearance: Powder coating buildup on specialty materials appears as an atypical, adhered layer that depends on
              the base, often in the applied color with variable texture.
            coverage: Coverage is unpredictable and uneven, ranging from full to sparse, with variations due to the unique
              nature of the specialty material.
            pattern: Distribution is highly irregular, forming in patches, streaks, or uniform layers based on material properties
              like conductivity or porosity.
          stone:
            appearance: Powder coating buildup on stone appears as a crusty, opaque layer that masks the natural texture,
              usually in uniform colors but may crack or flake.
            coverage: Coverage is generally low and inconsistent, varying from light dusting to thick deposits, with gaps
              in between.
            pattern: It often forms in patches or streaks, adhering more to rough surfaces and edges, with less uniformity
              due to the material's porosity.
          wood:
            appearance: On wood, it looks like a rough, caked-on film that can obscure the grain, often in solid colors with
              a pebbly or lumpy texture.
            coverage: Coverage tends to be sparse and uneven, with buildup in certain spots while other areas remain bare,
              leading to a mottled effect.
            pattern: Distribution is irregular, forming blotches or drips, especially on porous areas where adhesion is poor
              and overspray collects.
