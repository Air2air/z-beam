visual_characteristics:
  appearance_on_categories:
    ceramic:
      appearance: Silicone contamination on ceramic shows as shiny, flexible residues in white or clear shades, contrasting
        with the smooth, glazed surface and potentially leading to a tacky feel.
      coverage: Coverage is sparse and uneven, often limited to joint areas or accidental drips, with little broad surface
        coverage.
      pattern: It typically appears as spots or smears, concentrated in grout lines, tile edges, or application zones, without
        forming even distributions.
    composite:
      appearance: Silicone sealant on composite materials appears as glossy, flexible residues in white or translucent hues,
        often contrasting with the varied texture of composites and attracting contaminants.
      coverage: Coverage is partial and inconsistent, usually confined to specific areas like seams, with low to moderate
        variation in amount.
      pattern: It forms in irregular patches or streaks, typically at joints, laminations, or application points, without
        spreading evenly across the composite surface.
    concrete:
      appearance: On concrete, silicone buildup appears as glossy, rubbery residues in white, gray, or clear colors, standing
        out against the rough, porous surface and possibly trapping dirt or moisture.
      coverage: Coverage is partial and variable, covering small to moderate areas, especially in seams, with little overall
        surface coverage.
      pattern: It typically forms in irregular patches, streaks, or blobs, often in joints, cracks, or over-applied sections,
        without uniform distribution.
    fabric:
      appearance: Silicone sealant on fabric looks like stiff, glossy patches or streaks in white or clear shades, often hardening
        and contrasting with the soft, fibrous texture, potentially staining or weakening the material.
      coverage: Coverage is usually minimal and patchy, limited to small areas like seams or spills, with high variation and
        no uniform spread.
      pattern: Distribution is irregular, with spots, smears, or drips commonly found where sealant has seeped or been accidentally
        applied, not forming even patterns.
    glass:
      appearance: On glass, silicone buildup appears as translucent or milky streaks and blobs with a slick, adhesive texture
        that can obscure clarity and create hazy or reflective spots.
      coverage: Coverage is usually minimal and localized, such as thin lines or small clusters, with high variation and no
        uniform spread across the glass.
      pattern: It often forms in linear streaks from tooling or random patches where excess sealant has spread, frequently
        seen along edges or frame connections.
    metal:
      appearance: Silicone sealant buildup on metal appears as glossy, translucent to opaque white or gray blobs with a rubbery,
        uneven texture that can attract dust and debris.
      coverage: Coverage is usually localized and sparse, varying from small spots to larger patches, but rarely uniform across
        the surface.
      pattern: It typically forms in irregular patches or streaks, often concentrated around joints, seams, or application
        points where excess sealant has oozed or been smeared.
    mineral:
      appearance: Silicone sealant on mineral surfaces looks like shiny, flexible deposits in white or translucent forms,
        contrasting with the natural, often crystalline or rough texture and potentially causing adhesion issues.
      coverage: It is generally localized and sparse, such as small accumulations in joints, with high variation and no uniform
        coverage.
      pattern: Distribution is irregular, with spots, smears, or patches commonly at seams or application points, not forming
        even layers across the mineral.
    plastic:
      appearance: On plastic, silicone buildup looks like glossy, rubbery deposits in white, clear, or colored forms, adhering
        to the surface and possibly causing a sticky or rough texture.
      coverage: It is generally localized and variable, covering small sections like edges or joints, with minimal overall
        surface coverage.
      pattern: Distribution is irregular, with blobs, streaks, or patches commonly found along seams, bonds, or where sealant
        was over-applied, not in uniform patterns.
    rubber:
      appearance: On rubber, silicone buildup manifests as shiny, adhesive blobs or smears in white, clear, or similar colors,
        blending or contrasting with the rubber's flexible surface and potentially causing tackiness.
      coverage: Coverage is typically sparse and localized, such as small accumulations at edges, with significant variation
        and no full-surface coverage.
      pattern: It often appears as random spots or streaks, especially at seams or where sealant has been applied excessively,
        rather than in uniform layers.
    semiconductor:
      appearance: On semiconductors, silicone buildup appears as microscopic, glossy residues in clear or white hues, potentially
        causing hazing or defects on the smooth, precise surfaces and interfering with electronic properties.
      coverage: Coverage is minimal and highly variable, usually limited to tiny areas, with critical impacts even at low
        levels and no broad surface coverage.
      pattern: It often forms in random spots or thin films, typically at edges, bonds, or contamination points, without uniform
        patterns due to high sensitivity.
    specialty:
      appearance: Silicone sealant on specialty materials (e.g., coatings, alloys) appears as glossy, rubbery deposits in
        white, clear, or adapted colors, contrasting with unique surfaces and potentially causing functional impairments.
      coverage: Coverage is variable and often localized, depending on the specialty use, ranging from sparse spots to moderate
        areas, with no consistent full coverage.
      pattern: Distribution is irregular, with patches, streaks, or blobs at application sites or seams, tailored to the material's
        properties without uniform spread.
    stone:
      appearance: Silicone sealant on stone manifests as glossy, rubbery residues in white, gray, or clear colors, standing
        out against the natural, often rough or polished stone surface and possibly trapping dirt.
      coverage: It is typically partial and variable, covering small to moderate sections, especially in joints, with little
        to no full-surface coverage.
      pattern: Distribution is irregular, with patches, drips, or smears commonly found in grout lines, seams, or over-applied
        areas, rather than forming uniform layers.
    wood:
      appearance: On wood, silicone buildup looks like shiny, flexible beads or smears in white, clear, or tinted hues, contrasting
        with the porous, matte finish of the wood and potentially causing discoloration.
      coverage: Coverage is generally spotty and inconsistent, ranging from isolated dots to broader areas near edges, with
        low overall surface coverage.
      pattern: It often appears as random streaks or blobs, following grain lines or accumulating in cracks and joints where
        sealant was applied excessively.
