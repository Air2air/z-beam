description: Uranium oxide forms on surfaces after exposure to nuclear materials in manufacturing and military settings. Unlike
  rust or dust, it exhibits dense layering and radioactivity so distinguishes itself clearly. On steel, bond holds tightly,
  while on concrete, penetration deepens into structure, and challenges arise from hardness during removal. Laser cleaning
  succeeds because ablation vaporizes contamination precisely without residue spread.
