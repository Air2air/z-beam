  visualCharacteristics:
    appearance_on_categories:
      ceramic:
        appearance: Contamination presents as a dull, discolored layer in yellow, brown, or gray shades on ceramic, often
          with a powdery or adhered texture.
        coverage: Coverage is usually partial and irregular, with higher levels in cracks, pores, or where the surface is
          rough.
        pattern: It appears as spots, streaks, or diffuse patches, frequently adhering to glazed or unglazed areas unevenly.
      composite:
        appearance: On composites, it appears as a discolored, powdery residue in brown or gray hues, blending with or contrasting
          the material's layered structure.
        coverage: Coverage is patchy and variable, influenced by the composite's porosity and the distribution of reinforcing
          materials.
        pattern: It forms irregular spots or patches, often following fiber orientations or embedding in matrix weaknesses.
      concrete:
        appearance: It appears as a dusty, discolored layer in yellowish-brown or gray on concrete, giving a stained or weathered
          look to the surface.
        coverage: Coverage is generally uneven, with dense accumulation in cracks, pores, and rough areas, and lighter coverage
          on smooth surfaces.
        pattern: Contamination forms irregular spots, streaks, or diffuse patches, enhanced by the concrete's rough texture
          and porosity.
      fabric:
        appearance: On fabric, it shows as discolored, powdery stains in yellow, brown, or gray tones, altering the weave
          appearance and feel.
        coverage: Coverage is typically patchy and uneven, with higher concentrations in porous or soiled sections of the
          material.
        pattern: Distribution is often blotchy or streaky, following fabric folds, fibers, or areas of moisture absorption.
      glass:
        appearance: On glass, depleted uranium oxide appears as a faint, hazy film or fine particulate layer in yellowish
          or brownish tones, reducing transparency.
        coverage: Coverage is often light and even, but can vary to patchy in areas with imperfections or contamination sources.
        pattern: It typically forms a uniform or slightly streaky coating, sometimes with concentrated spots where dust or
          moisture is present.
      metal:
        appearance: Depleted uranium oxide contamination appears as a dull, yellowish-brown to black powdery or crusty coating
          on metal surfaces, often with a matte finish.
        coverage: Coverage is usually partial and uneven, ranging from sparse spots to dense patches depending on exposure
          and surface conditions.
        pattern: It typically forms irregular spots, streaks, or patches, concentrating in crevices, welds, or areas of corrosion.
      mineral:
        appearance: On minerals, depleted uranium oxide presents as a powdery or crusty coating in yellow, brown, or orange
          hues, often contrasting with the native mineral color.
        coverage: Coverage is variable and localized, ranging from sparse specks to extensive coatings depending on mineral
          type and exposure.
        pattern: It typically appears as spots, veins, or patches, following crystal structures or fractures in the mineral.
      plastic:
        appearance: It shows as a dusty or smeared film in yellowish-brown colors on plastic, potentially causing slight discoloration
          or a matte finish.
        coverage: Coverage is generally sparse and uneven, varying with surface smoothness and exposure to contaminants.
        pattern: Distribution is often streaky or spotty, with accumulation in scratches, seams, or static-prone areas.
      rubber:
        appearance: Depleted uranium oxide contamination manifests as a stained, dusty coating in yellow to brown shades on
          rubber, sometimes causing a tacky or rough texture.
        coverage: Coverage is usually partial and non-uniform, with denser spots in flexible or abraded regions.
        pattern: It typically appears as blotches or streaks, concentrating in grooves, seams, or areas with surface damage.
      semiconductor:
        appearance: Contamination shows as a fine, discolored film or particulate layer in yellowish tones on semiconductors,
          potentially affecting surface reflectivity and cleanliness.
        coverage: Coverage is typically minimal and even, but can be patchy in defects or unclean environments, impacting
          device performance.
        pattern: Distribution is often uniform or micro-spotted, concentrating on exposed areas, edges, or contamination-prone
          sites during processing.
      specialty:
        appearance: On specialty materials, it appears as a varied discolored layer in yellow, brown, or gray, adapting to
          the unique surface properties like coatings or composites.
        coverage: Coverage is highly variable and material-dependent, ranging from sparse to dense based on exposure conditions
          and surface characteristics.
        pattern: It forms irregular patterns such as spots or streaks, influenced by the material's specific structure, porosity,
          or treatment.
      stone:
        appearance: It shows as a powdery, discolored film in hues of yellow, brown, or orange on stone, giving a weathered
          or stained look to the surface.
        coverage: Coverage tends to be non-uniform, with denser accumulation in rough, porous areas and lighter coverage on
          smooth surfaces.
        pattern: Distribution is irregular, forming spots, streaks, or diffuse patches, often enhanced by the stone's porosity
          and texture.
      wood:
        appearance: On wood, it manifests as a discolored, dusty or stained layer in shades of yellow, brown, or gray, altering
          the natural grain and texture.
        coverage: Coverage is generally patchy and variable, with higher concentrations in absorbent or damaged sections of
          the wood.
        pattern: Contamination often appears as blotchy patches or streaks, following the wood grain or accumulating in porous
          areas.
