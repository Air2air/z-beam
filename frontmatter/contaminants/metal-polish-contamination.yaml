description: Metal-polish contamination consists of fine abrasive compound residues that embed into metal surfaces during
  polishing operations to achieve a smooth finish. These deposits stand out from oils or rust by their gritty, tenacious particles,
  which adhere deeply and often oxidize on brass or copper, while forming a tougher film on steel and aluminum. Removal proves
  challenging due to the risk of substrate damage from scraping, yet laser cleaning effectively ablates them layer by layer,
  preserving material integrity without harsh chemicals.
relationships:
  regulatory_standards:
