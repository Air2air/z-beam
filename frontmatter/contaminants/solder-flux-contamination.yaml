  visual:
    appearanceOnCategories:
      _section:
        sectionTitle: Visual Appearance
        sectionDescription: How this contaminant appears on different material categories
        sectionMetadata: relationships.visual.appearanceOnCategories
        icon: eye
        order: 50
        variant: default
      presentation: descriptive
      items:
      - appearanceOnCategories:
          ceramic:
            appearance: Flux residue appears as a crusty, dull coating in white, yellow, or brown, often masking the ceramic's
              smooth, glossy surface.
            coverage: Coverage is generally limited to small, isolated areas, with variation based on flux use and cleaning
              efforts.
            pattern: It distributes in patches or spots around soldered areas, with no uniform pattern due to surface irregularities.
          composite:
            appearance: It appears as a dull, crusty, or sticky layer in white, yellow, or brown, blending with or contrasting
              the composite's varied texture.
            coverage: Coverage is usually localized and variable, limited to affected zones, with little uniform spread.
            pattern: Distribution is patchy or spotty, following the application points, with no consistent pattern due to
              material heterogeneity.
          concrete:
            appearance: Residue shows as a dull, crusty, or sticky coating in white, yellow, or brown, contrasting with concrete's
              rough, porous surface.
            coverage: Coverage is usually sparse and localized, with variation based on porosity and cleaning.
            pattern: It forms random spots or patches, affected by surface texture and flux application method.
          fabric:
            appearance: Flux residue appears as stiff, discolored spots in white, yellow, or brown, often causing a crusty
              or waxy feel on the fabric.
            coverage: Coverage is minimal and uneven, typically limited to specific areas, with no broad uniform coverage.
            pattern: It distributes in isolated spots or small patches, following accidental drips or contact during soldering.
          glass:
            appearance: Residue is visible as a hazy, streaky, or spotted film in white or yellowish tones, reducing the glass's
              transparency and clarity.
            coverage: Coverage is usually light and localized, varying from thin films to thicker accumulations in specific
              zones.
            pattern: It commonly forms streaks or spots along edges or where flux was applied, sometimes appearing smeared.
          metal:
            appearance: Flux residue appears as a white, yellow, or brown crusty or sticky film, often with a dull finish
              that contrasts with the metal's shine.
            coverage: Coverage is usually localized to small areas near joints, with minimal spread, varying based on flux
              amount and cleaning.
            pattern: It typically forms in spots or streaks around solder joints, following the path of flux application during
              soldering.
          mineral:
            appearance: It appears as a crusty, discolored film in white, yellow, or brown, often obscuring the mineral's
              natural luster and color.
            coverage: Coverage is minimal and uneven, confined to exposed areas, with little uniform spread.
            pattern: Distribution is typically in spots or small patches, influenced by mineral hardness and flux contact.
          plastic:
            appearance: Residue shows as a sticky, discolored film in white, yellow, or brown, potentially causing clouding
              or a greasy look on the plastic.
            coverage: Coverage is typically sparse and uneven, with minimal spread, varying with plastic type and flux exposure.
            pattern: It forms irregular spots or streaks, often concentrated where flux contacted the surface during soldering.
          rubber:
            appearance: Residue manifests as a greasy, discolored film in white, yellow, or brown, often making the rubber
              surface look stained or tacky.
            coverage: Coverage is generally light and spotty, confined to areas of exposure, with high variation.
            pattern: It tends to form irregular patches or smears, influenced by rubber's flexibility and flux contact.
          semiconductor:
            appearance: Residue is visible as a thin, hazy, or crystalline film in white or yellowish hues, potentially interfering
              with electronic properties and appearance.
            coverage: Coverage is typically controlled and minimal, varying from sparse spots to even films in critical areas.
            pattern: It often forms uniform thin layers or localized spots around solder points, depending on application
              precision.
          specialty:
            appearance: Flux residue appears as a variable crusty, sticky, or filmy layer in white, yellow, or brown, adapting
              to the material's unique surface properties.
            coverage: Coverage is irregular and context-specific, often minimal and localized, with significant variation
              based on specialty material traits.
            pattern: Distribution is highly material-dependent, ranging from spots to streaks or patches, with no standard
              pattern.
          stone:
            appearance: It appears as a dull, crusty, or sticky film in white, yellow, or brown colors, contrasting with the
              stone's natural texture and color.
            coverage: Coverage is typically minimal and uneven, confined to areas of direct contact, with little spread.
            pattern: Distribution is often in random spots or small patches, influenced by surface porosity and flux application.
          wood:
            appearance: Residue shows as discolored, greasy patches in white, yellow, or brown hues, often making the wood
              surface appear stained or waxy.
            coverage: Coverage is generally sparse and spotty, limited to contact points, with high variation due to wood
              absorption.
            pattern: It tends to form irregular patches or streaks where flux was accidentally applied, with no uniform distribution.
