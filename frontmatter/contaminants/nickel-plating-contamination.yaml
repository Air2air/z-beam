  visual:
    appearance_on_categories:
      presentation: descriptive
      items:
      - appearance_on_categories:
          ceramic:
            appearance: Appears as a metallic, grayish deposit that may have a matte finish, contrasting with the ceramic's
              smooth or glazed surface.
            coverage: Coverage is generally partial and uneven, with variations due to surface porosity and lack of conductivity.
            pattern: Typically distributes in patches or a speckled pattern, as the non-metallic surface hinders even plating.
          composite:
            appearance: Shows as a metallic gray coating that may appear mottled, blending with or obscuring the composite's
              varied material textures.
            coverage: Coverage is typically variable and partial, with differences across material interfaces and surface
              properties.
            pattern: Often appears in uneven patches or a streaked pattern, influenced by the heterogeneity of the composite
              materials.
          concrete:
            appearance: Manifests as a dull gray metallic coating that can appear powdery or adhered, masking the rough texture
              and color of the concrete.
            coverage: Coverage is often incomplete and highly variable, with heavy deposition in pores and lighter areas elsewhere.
            pattern: Usually forms blotchy patches or a mottled pattern, influenced by the porous and uneven surface.
          fabric:
            appearance: Appears as a silvery or grayish stain that can give a metallic sheen, often stiffening the fabric
              and altering its texture.
            coverage: Coverage is typically sparse and uneven, with variations based on fabric type and porosity.
            pattern: Distributes in irregular patches or streaks, following the weave pattern and absorption into the fibers.
          glass:
            appearance: Presents as a translucent to opaque gray or silvery coating that can reduce transparency and create
              a hazy or reflective surface.
            coverage: Can achieve near-full coverage with moderate variation, depending on surface preparation and catalytic
              activity.
            pattern: Often forms a uniform layer if properly catalyzed, but may show streaks or cloudiness if contamination
              is uneven.
          metal:
            appearance: Appears as a dull, gray to silvery metallic coating with a matte or semi-bright finish, often with
              a uniform texture.
            coverage: Usually provides full, consistent coverage with minimal variation, as it chemically bonds to the metal
              substrate.
            pattern: Typically forms a uniform, even layer across the surface, but may show streaks or patches if application
              is uneven.
          mineral:
            appearance: Shows as a metallic gray film that may have a dull or slightly reflective finish, often obscuring
              the mineral's natural luster and color.
            coverage: Coverage is typically partial and uneven, with variations due to differences in surface reactivity and
              porosity.
            pattern: Tends to appear in irregular spots or a speckled distribution, depending on the mineral's crystal structure
              and surface properties.
          plastic:
            appearance: Manifests as a dull gray to silvery film that can look flaky or adhered, often altering the plastic's
              original color and texture.
            coverage: Coverage is usually incomplete and inconsistent, with poor adhesion leading to flaking in some areas.
            pattern: Forms irregular spots or streaks, especially if the plastic lacks proper surface activation for plating.
          rubber:
            appearance: Presents as a grayish, metallic layer that can look cracked or peeling, contrasting with the rubber's
              flexible and often dark surface.
            coverage: Coverage is generally poor and uneven, with significant variation and potential for flaking off.
            pattern: Tends to form blotchy spots or a flaky pattern, as the elastic surface resists uniform plating adhesion.
          semiconductor:
            appearance: Presents as a thin, uniform grayish layer that can be metallic and slightly shiny, potentially interfering
              with electronic properties.
            coverage: Coverage can be controlled to be full and consistent in manufacturing, but accidental contamination
              leads to variable and problematic coverage.
            pattern: Often forms a relatively uniform coating if applied intentionally, but contamination may show as localized
              spots or streaks.
          specialty:
            appearance: Varies widely but generally appears as an unintended metallic gray deposit that contrasts with the
              material's unique properties, such as color or texture.
            coverage: Coverage is typically uneven and partial, with high variation influenced by the material's exotic nature
              and surface characteristics.
            pattern: Distribution depends on the material's specifics, often showing irregular patches or non-uniform layers
              due to incompatibility.
          stone:
            appearance: Shows up as a metallic, grayish film that can appear dull or slightly shiny, often masking the natural
              color and texture of the stone.
            coverage: Coverage is often incomplete and variable, with areas of heavy deposition and others left bare.
            pattern: Usually appears in blotchy patches or streaks, influenced by the stone's porosity and surface irregularities.
          wood:
            appearance: Manifests as an unnatural metallic sheen, often gray or silvery, contrasting with the organic texture
              and grain of the wood.
            coverage: Coverage is typically partial and uneven, with significant variation due to poor adhesion and absorption
              into the wood.
            pattern: Tends to form irregular patches or spots, as the non-conductive surface resists uniform deposition.
