  visual:
    appearanceOnCategories:
      presentation: descriptive
      items:
      - appearanceOnCategories:
          ceramic:
            appearance: On ceramic, pesticide residue may look like a glossy film, powdery deposits, or discolored spots in
              white, yellow, or brown hues.
            coverage: Coverage is generally light and patchy, with glazed surfaces showing less residue than porous ones.
            pattern: It often appears as irregular spots or a thin uniform layer, with accumulation in unglazed areas or surface
              imperfections.
          composite:
            appearance: On composites, pesticide residue may appear as a dull film, speckled deposits, or stained patches,
              often blending with the material's mixed textures.
            coverage: Coverage is usually patchy and low to moderate, depending on the composite's composition and surface
              finish.
            pattern: It typically forms irregular patterns like spots or streaks, concentrating at joints or in porous components
              of the composite.
          concrete:
            appearance: Residue on concrete may appear as a chalky film, greenish stains, or powdery deposits, often masking
              the rough, gray surface.
            coverage: Coverage is often patchy and moderate to heavy, with higher levels in untreated or weathered concrete.
            pattern: It usually forms irregular spots or streaks, pooling in cracks, pores, or low areas where pesticides
              settle.
          fabric:
            appearance: On fabric, pesticide residue can show as oily stains, powdery marks, or discolored spots in shades
              like white, yellow, or brown, altering texture.
            coverage: Coverage is typically patchy and light to heavy, depending on fabric absorbency and application method.
            pattern: Distribution is often blotchy or streaky, following the weave pattern or concentrating in folds and seams.
          glass:
            appearance: Residue on glass appears as a translucent to opaque film, often with rainbow-like iridescence or white
              streaks, reducing clarity.
            coverage: Coverage can range from light, even films to localized heavy streaks, depending on spray intensity and
              cleaning history.
            pattern: It usually forms uniform thin layers or streaks, following application paths or runoff lines without
              deep penetration.
          metal:
            appearance: Pesticide residue on metal often appears as a dull, oily film or powdery white to yellowish spots,
              sometimes causing localized discoloration or corrosion.
            coverage: Coverage is usually patchy and low, varying from sparse spots to moderate areas depending on exposure
              and surface texture.
            pattern: It typically forms irregular spots or streaks, often concentrated in crevices or along edges where application
              or runoff occurs.
          mineral:
            appearance: On minerals, pesticide residue can look like a dull coating, crystalline specks, or discolored patches,
              sometimes mimicking natural mineral features.
            coverage: Coverage is generally sparse and variable, influenced by mineral hardness and exposure conditions.
            pattern: Distribution is typically spotty or uniform thin layers, adhering to crystal faces or in fissures.
          plastic:
            appearance: Residue on plastic can manifest as an oily sheen, white crystalline spots, or faded/discolored areas,
              sometimes causing surface hazing.
            coverage: Coverage varies from sparse spots to moderate films, influenced by plastic type and exposure to pesticides.
            pattern: Distribution is often spotty or streaky, with residues clinging to textured areas or forming droplets
              on smooth surfaces.
          rubber:
            appearance: Residue on rubber often looks like a sticky film, powdery white spots, or darkened areas, potentially
              causing surface degradation or swelling.
            coverage: Coverage is generally irregular and light to moderate, varying with rubber hardness and pesticide formulation.
            pattern: It commonly appears as blotchy patches or streaks, with accumulation in grooves or on exposed surfaces.
          semiconductor:
            appearance: Residue on semiconductors appears as microscopic films, hazy layers, or particulate contaminants,
              often invisible without magnification but affecting performance.
            coverage: Coverage is typically very light and even, but even trace amounts can cause significant functional issues.
            pattern: It usually forms uniform or speckled patterns at a microscopic scale, concentrating on active surfaces
              or in defects.
          specialty:
            appearance: On specialty materials, residue varies widely but may show as films, spots, or discoloration tailored
              to the unique surface, such as coatings on electronics or artworks.
            coverage: Coverage ranges from minimal to moderate, highly specific to the material's properties and intended
              use.
            pattern: Distribution is material-dependent, often irregular or targeted, with patterns like spots or thin layers
              based on application.
          stone:
            appearance: On stone, pesticide residue may show as a hazy film, powdery white spots, or greenish stains, sometimes
              blending with natural variations.
            coverage: Coverage is typically sparse to moderate, varying with stone porosity and environmental factors like
              rain or irrigation.
            pattern: Distribution is often spotty or streaky, concentrating in pores, cracks, or low-lying areas where moisture
              collects.
          wood:
            appearance: Residue on wood can look like a greasy film, crystalline deposits, or discolored patches ranging from
              white to brown, altering the natural grain.
            coverage: Coverage is generally irregular and moderate, with higher accumulation in absorbent regions and less
              on sealed surfaces.
            pattern: It often appears as uneven patches or streaks, following the wood grain or pooling in porous areas and
              knots.
