page_description: Rubber residue contamination forms sticky layers on surfaces during processing. Before cleaning, buildup
  adheres tightly because rubber compounds polymerize under heat and pressure. This creates uneven patterns, like patchy films
  that embed into metal pores. So, laser cleaning faces challenges in removal, as residue resists vaporization without damaging
  substrate. Material behaviors vary; on steel, residue softens gradually during exposure, but on aluminum, it scatters fragments
  so multiple passes are needed. After treatment, surfaces exhibit cleaner uniformity. Process removes organic residue effectively,
  yet careful control prevents re-deposition from airborne particles. Results indicate that optimized pulses achieve better
  detachment.
