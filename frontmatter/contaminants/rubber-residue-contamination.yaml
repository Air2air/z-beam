  visual:
    appearanceOnCategories:
      presentation: descriptive
      items:
      - appearanceOnCategories:
          ceramic:
            appearance: Residue is visible as dark, sticky marks or smears, typically black or brown, that can sit on the
              glazed surface or seep into unglazed areas, creating a dull spot.
            coverage: Coverage is generally minimal to moderate, localized to specific areas, and varies with surface finish,
              being less on smooth, glazed ceramics.
            pattern: It usually forms as irregular patches or streaks, concentrated at points of impact or friction, and may
              not spread evenly due to the non-porous nature of most ceramics.
          composite:
            appearance: Residue appears as dark, grimy deposits, usually black or brown, with a sticky texture that can cling
              to fibers or matrix, potentially causing surface dullness.
            coverage: Coverage varies widely from sparse to moderate, patchy in distribution, and depends on the composite's
              porosity and the intensity of rubber contact.
            pattern: It forms irregular spots or streaks, often following the composite's structure or high-wear areas, and
              may be absorbed differently based on material composition.
          concrete:
            appearance: Residue appears as dark, dirty marks or smears, typically black or gray, with a sticky texture that
              can embed in the porous surface, causing a dull, stained look.
            coverage: Coverage is often patchy and low to moderate, varying with concrete roughness, and is rarely uniform
              across the entire surface.
            pattern: It forms irregular patches, streaks, or spots, concentrated in high-traffic or contact areas, and may
              follow cracks or rough textures for better adhesion.
          fabric:
            appearance: Contamination looks like dark, oily stains or smudges, commonly black or brown, that can penetrate
              fibers, leaving a greasy feel and potential discoloration.
            coverage: Coverage is usually localized and partial, varying from small spots to larger stained areas, and depends
              on fabric type and exposure duration.
            pattern: Patterns include blotches, streaks, or diffuse patches, often following the weave or areas of contact,
              and may spread if the fabric is absorbent.
          glass:
            appearance: It appears as translucent to opaque smudges or films, usually gray or black, with a greasy texture
              that can cause hazing or reduce clarity on the glass surface.
            coverage: Coverage ranges from light, localized smears to more extensive films, but is rarely complete, often
              varying with cleaning frequency and contact intensity.
            pattern: Patterns include streaks, fingerprints, or uniform films, often forming where rubber has slid or pressed
              against the glass, and may show Newton's rings in thin layers.
          metal:
            appearance: Rubber residue appears as dark, greasy smears or streaks, often black or brown, with a sticky or tacky
              texture that can attract dust.
            coverage: Coverage is usually partial and localized, varying from small spots to larger areas depending on the
              extent of contact or friction.
            pattern: It typically forms irregular streaks or patches, often concentrated along edges or contact points where
              rubber has rubbed against the metal surface.
          mineral:
            appearance: The contamination shows as dark, oily deposits, usually black or brown, that can coat the mineral
              surface, altering its luster and creating a tacky feel.
            coverage: Coverage is typically sparse and localized, varying based on mineral hardness and porosity, and is seldom
              comprehensive.
            pattern: Distribution is irregular, with spots, smears, or thin films, often clinging to crystalline structures
              or fissures, and may not be evenly spread.
          plastic:
            appearance: The contamination shows as dark, oily streaks or spots, often black or dark-colored, with a tacky
              feel that can cause discoloration or a slight film on the plastic.
            coverage: Coverage is typically partial and uneven, ranging from small, isolated areas to broader sections, depending
              on the plastic's smoothness and exposure.
            pattern: Distribution includes smears, patches, or linear marks, frequently along seams or where rubber parts
              have rubbed, and may be more evident on lighter-colored plastics.
          rubber:
            appearance: On rubber surfaces, residue may blend or appear as darker, tacky areas, often black or matching the
              base color, with a gummy texture that can attract debris.
            coverage: Coverage can range from light, surface-level films to more extensive layers, often uniform in high-friction
              zones but varying with rubber type and age.
            pattern: It typically shows as uniform smears or localized patches, especially where two rubber surfaces interact,
              and may not be highly visible if colors are similar.
          semiconductor:
            appearance: Residue appears as microscopic to visible dark smudges or films, often gray or black, with a potentially
              conductive or insulating sticky layer that risks device failure.
            coverage: Coverage is usually minimal and highly variable, ranging from isolated specks to thin films, critical
              to control due to precision requirements in semiconductor applications.
            pattern: It forms as fine streaks, spots, or uniform contamination, often in patterned areas from handling or
              processing, and can be highly localized to sensitive regions.
          specialty:
            appearance: On specialty materials, residue manifests as dark, adherent smears or deposits, typically black or
              brown, with a sticky texture that may interact uniquely based on material properties.
            coverage: Coverage ranges from sparse to moderate, highly variable, and tailored to the specific material's reactivity
              and exposure conditions.
            pattern: Distribution is material-dependent, often as irregular patches or streaks, and can vary significantly
              with surface characteristics and intended use.
          stone:
            appearance: Residue manifests as dark, grimy deposits, commonly black or brown, with a slightly sticky feel that
              can embed into porous areas, altering the natural texture.
            coverage: Coverage is typically low to moderate, patchy in nature, and varies with stone type, being more pronounced
              on rough or unsealed stones.
            pattern: Distribution is irregular, often as scattered spots or smears, concentrated in crevices or high-contact
              zones, and may not adhere well to smooth surfaces.
          wood:
            appearance: The residue shows up as dark, oily stains or smudges, usually black or dark gray, and can penetrate
              the wood grain, leaving a dull, matte finish.
            coverage: Coverage is generally sparse to moderate, with variations based on wood porosity and exposure, rarely
              covering the entire surface uniformly.
            pattern: It often appears as blotchy patches or streaks, following the grain or areas of direct contact, and may
              spread unevenly across the surface.
