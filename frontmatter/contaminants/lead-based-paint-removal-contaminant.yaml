visual_characteristics:
  appearance_on_categories:
    ceramic:
      appearance: Lead paint on ceramic surfaces appears as a hard, glossy coating in bright colors, possibly with a cracked
        or crazed texture from firing or aging.
      coverage: It often covers the entire surface evenly, though variations occur in handmade items, with some areas more
        densely painted than others.
      pattern: Distribution is typically uniform for decorative purposes, but may show brush strokes, spots, or patches if
        hand-applied, with potential flaking.
    composite:
      appearance: Lead paint on composites appears as a cohesive layer in assorted colors, with a texture matching the substrate,
        and may show cracking or delamination.
      coverage: Coverage varies from full to partial, depending on application; it may be uneven due to material heterogeneity
        and adhesion issues.
      pattern: Distribution is often uniform but can be streaky or patchy, following the composite's irregular surface and
        potentially flaking at joints.
    concrete:
      appearance: On concrete, lead paint presents as a thick, matte or semi-gloss coating in colors like gray or yellow,
        with a rough texture from the surface and potential cracking or peeling.
      coverage: Coverage is generally full on smooth surfaces but spotty on rough concrete, with variations due to application
        and environmental exposure.
      pattern: It often appears uniform but can show brush marks, drips, or patchy areas where it has degraded or been removed,
        following concrete pores.
    fabric:
      appearance: Lead paint on fabric appears as a stiff, colored layer in hues such as blue or green, with a rough, crusty
        texture that may flake or powder off.
      coverage: Coverage is typically partial and inconsistent, often limited to specific areas like prints or borders, with
        bare fabric visible elsewhere.
      pattern: Distribution is usually uneven, forming spots, streaks, or patches where applied, and it can bleed into fibers
        or cluster in designs.
    glass:
      appearance: On glass, lead paint is rare but may appear as a thin, translucent or opaque film in colors like black or
        white, often with a smooth, adhered finish.
      coverage: Coverage is generally minimal and localized, such as on window frames or decorative elements, and is often
        incomplete or easily removed.
      pattern: It usually forms a uniform layer if present, but can show brush marks, drips, or be confined to edges or designs,
        with minimal flaking.
    metal:
      appearance: Lead-based paint on metal often appears as a thick, glossy or matte coating in colors like white, red, or
        yellow, with potential chalking or flaking over time.
      coverage: Coverage is usually complete and consistent, though it may vary with wear, corrosion, or removal attempts,
        leaving exposed spots.
      pattern: It typically forms a uniform layer but can show streaks, drips, or patchy areas where it has peeled or been
        applied unevenly.
    mineral:
      appearance: Lead paint on mineral surfaces looks like an adherent, opaque layer in various colors, with a finish that
        may be smooth or granular, and can show chipping or discoloration.
      coverage: Coverage varies from complete to partial, often uneven on crystalline or rough minerals, with gaps where paint
        did not adhere.
      pattern: Distribution is typically uniform or in patches, with streaks from application, and it may flake off along
        mineral cleavage planes.
    plastic:
      appearance: On plastic, lead paint manifests as a thin, often flexible layer in various colors, with a smooth or slightly
        textured finish that may peel or chip.
      coverage: Coverage is generally complete initially but becomes inconsistent with wear, exposing the plastic substrate
        in spots.
      pattern: It usually forms a uniform coat but can exhibit drips, streaks, or patchiness due to poor adhesion, leading
        to flaking in high-stress areas.
    rubber:
      appearance: On rubber, lead paint looks like a flexible, sometimes glossy coating in colors like black or red, with
        a tendency to crack, peel, or rub off easily.
      coverage: Coverage is often incomplete and variable, thinning in high-flex areas and leaving exposed rubber, especially
        with movement.
      pattern: It typically forms a uniform layer but may show streaks, smudges, or patchy areas where it has worn away or
        not adhered well.
    semiconductor:
      appearance: On semiconductors, lead paint is uncommon but may appear as a thin, precise coating in specific colors,
        with a smooth, integrated finish for protection or marking.
      coverage: Coverage is typically minimal and highly uniform, limited to designated areas for functional purposes, with
        little variation.
      pattern: It usually forms uniform, controlled layers or precise patterns like lines or dots, with minimal streaking
        or flaking due to high-tech application.
    specialty:
      appearance: Lead paint on specialty materials varies widely but generally appears as a custom-colored, adherent layer
        with textures matching the substrate, prone to unique degradation like peeling or fading.
      coverage: Coverage is highly variable, ranging from full to selective, tailored to the specialty use, with inconsistencies
        based on material properties and application methods.
      pattern: Distribution depends on the material; it can be uniform, patterned, or patchy, often designed for specific
        applications with streaks or spots from handwork.
    stone:
      appearance: Lead paint on stone looks like a dense, opaque layer in various colors, potentially with a rough texture
        from the stone's surface, and may show efflorescence or peeling.
      coverage: Coverage is typically partial to full, varying based on application; it may be spotty on rough stone, with
        gaps in coverage.
      pattern: It often appears as a uniform coat or in patches where applied, with streaks or drips from application, and
        can flake off in sections.
    wood:
      appearance: On wood, lead paint presents as a solid, often cracked or alligatored finish in hues such as white, green,
        or brown, with a possible chalky residue.
      coverage: It commonly covers large surfaces fully, but deterioration leads to uneven coverage with bare wood showing
        through in areas.
      pattern: Distribution is generally uniform initially but becomes patchy or blistered with age, following the wood grain
        or forming irregular flakes.
