      wavelength:
        unit: nm
        value: 1064
        recommended: 1064
      power:
        unit: W
        value: 80
        recommended: 80
      scan_speed:
        unit: mm/s
        value: 500
        recommended: 500
      pulse_width:
        unit: ns
        value: 10
        recommended: 10
      repetition_rate:
        unit: kHz
        value: 50
        recommended: 50
      energy_density:
        unit: J/cm²
        value: 2.0
        recommended: 2.0
      spot_size:
        unit: μm
        value: 50
        recommended: 50
      pass_count:
        unit: passes
        value: 3
        recommended: 3
      overlap_ratio:
        unit: '%'
        value: 50
        recommended: 50
    removal_characteristics:
      primary_mechanism: photochemical
      secondary_mechanisms:
      - thermal_ablation
      removal_efficiency:
        single_pass: 0.6
        optimal_passes: 3
        diminishing_returns_after: 5
        typical_time_per_cm2: 3.3
      surface_quality_after_removal:
        roughness_change: minimal
        discoloration_risk: low
        substrate_damage_risk: low
        residual_contamination: trace
    compatibility:
      recommended: true
      success_rate: 0.7
      difficulty: difficult
      substrate_warnings:
      - Standard precautions apply
      process_limitations:
      - None identified
    safety_considerations:
      material_specific_hazards:
      - Organic vapor generation - ensure adequate ventilation
      recommended_ppe:
        respiratory: P100
        eye_protection: OD7+ at operating wavelength
        skin_protection: Heat-resistant gloves
      ventilation_requirements:
        minimum_air_changes_per_hour: 10
        extraction_velocity_m_s: 0.5
        filtration_notes: HEPA filtration recommended for particulate capture
      fume_warnings:
      - Metal oxide particulates - monitor air quality
    optimization_tips:
    - Start at lower power (0W) and increase gradually to avoid substrate damage
    - Use 3 passes rather than single high-energy pass for better control
    - Allow 2-3 seconds between passes for substrate cooling
    - Check surface temperature with IR thermometer between passes
    success_indicators:
      visual:
      - Restored base metal luster
      - Uniform surface appearance
      - Original substrate texture visible
      measurement:
      - Surface roughness increase <2.0 μm Ra
      - Surface reflectance >80% of clean baseline
      failure_signs:
      - Discoloration (indicates overheating)
      - Surface pitting or roughness (excessive energy)
      - Incomplete removal after optimal pass count (insufficient energy)
