  visual_characteristics:
    appearance_on_categories:
      ceramic:
        appearance: Presents as a matte, whitish or grayish coating that may dull the ceramic's glaze, appearing chalky and
          feeling abrasive to the touch.
        coverage: Coverage is generally uneven, with heavier deposits in porous or textured regions and lighter coverage on
          smooth, glazed surfaces, showing notable variation.
        pattern: Often forms in blotches or patches, particularly on unglazed areas or in grooves, and can spread unevenly
          across the surface.
      composite:
        appearance: Shows as a dull, pale coating that can mask the composite's varied textures, appearing powdery and feeling
          uneven, with possible color shifts.
        coverage: Coverage is highly variable and uneven, with dense spots in absorbent areas and sparse coverage on sealed
          surfaces, reflecting the material's mixed nature.
        pattern: Distributes in irregular patches or streaks, influenced by the composite's heterogeneity, often accumulating
          in fibrous or porous components.
      concrete:
        appearance: Shows as a pale, often white or gray, powdery efflorescence that can make the concrete look chalky and
          feel rough, sometimes masking its natural color.
        coverage: Coverage is patchy and incomplete, with dense accumulation in rough or damp spots and lighter coverage on
          sealed surfaces, leading to significant variation.
        pattern: Usually forms in irregular patches or streaks, particularly in porous areas, cracks, or on exposed surfaces,
          and can spread in a blotchy manner.
      fabric:
        appearance: Manifests as a dull, whitish or off-white coating that can stiffen the fabric and obscure its color and
          weave, feeling gritty or crusty.
        coverage: Coverage is typically light and uneven, with heavier deposits in textured or soiled areas and minimal coverage
          on flat surfaces, showing high variability.
        pattern: Tends to appear in random spots or patches, often following the fabric weave or accumulating in folds and
          seams where contaminants settle.
      glass:
        appearance: Appears as a hazy, translucent or opaque white film that reduces clarity and transparency, often feeling
          slightly gritty or smeared on the surface.
        coverage: Coverage can range from light, sporadic films to more uniform layers, but is often inconsistent with thicker
          buildup along edges or in corners.
        pattern: Usually distributes in streaks or smudges, sometimes forming uniform layers on flat areas, but often uneven
          due to application or environmental factors.
      metal:
        appearance: Often appears as a white or grayish, chalky, powdery film that can obscure the underlying metallic luster
          and feel rough to the touch.
        coverage: Coverage is usually partial and uneven, ranging from light dusting to dense layers in localized spots, with
          significant variation across the surface.
        pattern: Typically forms in irregular patches or streaks, especially in areas exposed to high heat or moisture, and
          may concentrate around joints or edges.
      mineral:
        appearance: Appears as a faint, whitish or translucent film that can dull the mineral's luster and crystal faces,
          feeling slightly abrasive or powdery.
        coverage: Coverage is generally light and uneven, with some areas showing minimal film and others having localized
          buildup, depending on mineral porosity and exposure.
        pattern: Often distributes in random spots or thin layers, following mineral cleavage or accumulating in fractures
          and inclusions due to environmental factors.
      plastic:
        appearance: Manifests as a faint, whitish haze or film that can make the plastic look cloudy and feel slightly rough,
          potentially causing discoloration over time.
        coverage: Coverage is usually light and patchy, with some areas showing minimal film and others having moderate buildup,
          depending on plastic type and exposure.
        pattern: Typically appears in random spots or streaks, and may form a more uniform layer on smooth plastics, but often
          uneven due to static or surface imperfections.
      rubber:
        appearance: Appears as a light, whitish or grayish film that can make the rubber look aged and feel tacky or powdery,
          sometimes leading to surface cracking.
        coverage: Coverage is generally sparse and irregular, with more buildup in stressed or porous zones and less on smooth
          surfaces, varying with rubber composition.
        pattern: Commonly forms in blotches or streaks, especially along seams or in flexed areas, and may spread unevenly
          due to rubber's elasticity and porosity.
      semiconductor:
        appearance: Manifests as a subtle, often invisible or faint hazy coating under magnification that can interfere with
          electronic properties, appearing as micro-scale contaminants.
        coverage: Coverage is usually minimal and highly controlled, but can vary from sparse particles to thin layers, with
          critical impacts on performance in localized regions.
        pattern: Typically forms in uniform or speckled patterns at microscopic levels, often concentrated on active areas
          or edges, and may be uneven due to processing.
      specialty:
        appearance: Varies widely but often appears as a discolored, powdery, or filmy layer that alters the material's intended
          finish, feeling irregular based on composition.
        coverage: Coverage is unpredictable and uneven, with amounts ranging from light films to heavy deposits, showing great
          variation due to the specialized nature of these materials.
        pattern: Distribution is highly material-dependent, ranging from uniform coatings to irregular patches, influenced
          by unique properties like reactivity or surface treatment.
      stone:
        appearance: Shows up as a pale, often white or off-white, powdery residue that can give the stone a frosted look and
          a rough, sandy texture.
        coverage: Coverage is typically patchy and incomplete, with dense accumulation in textured areas and minimal coverage
          on smooth surfaces, leading to high variability.
        pattern: Tends to form in irregular spots or patches, frequently in crevices, pores, or on rough surfaces where contaminants
          can adhere more easily.
      wood:
        appearance: Manifests as a dull, whitish or grayish coating that can make the wood look faded and feel gritty, often
          hiding the natural grain and texture.
        coverage: Coverage is generally uneven and sparse, with heavier buildup in recessed areas and lighter coverage on
          exposed surfaces, varying with wood type and conditions.
        pattern: Commonly appears in blotchy patches or streaks, following the wood grain or accumulating in cracks and pores
          due to absorption and environmental exposure.
