  visual:
    appearance_on_categories:
      presentation: descriptive
      items:
      - appearance_on_categories:
          ceramic:
            appearance: Bitumen and tar on ceramic appear as dark, matte or glossy layers that adhere to the smooth surface,
              sometimes cracking or peeling with age.
            coverage: Coverage is typically partial and variable, ranging from light smudges to heavy coatings, with uneven
              distribution due to surface tension effects.
            pattern: They form irregular spots, drips, or smears, influenced by the ceramic's non-porous nature, leading to
              beaded or runny patterns.
          composite:
            appearance: Bitumen and tar on composites appear as dark, heterogeneous layers that can be sticky or brittle,
              blending with or contrasting the material's varied textures and colors.
            coverage: Coverage is often partial and uneven, varying with the composite's porosity and composition, from surface
              films to embedded areas.
            pattern: They form irregular patches, drips, or infiltrations, following the composite's structure, such as fibers
              or layers, leading to mottled effects.
          concrete:
            appearance: On concrete, these coatings show as dark, often rough or glossy layers that penetrate pores, creating
              a mottled or sealed look against the gray surface.
            coverage: Coverage can range from light spotting to heavy, full coats, with unevenness due to surface absorption
              and environmental exposure.
            pattern: Distribution includes patches, drips, or uniform coatings in some cases, influenced by concrete's porosity
              and application methods like spraying or brushing.
          fabric:
            appearance: Bitumen and tar on fabric appear as dark, stained areas that are sticky or stiff, altering the texture
              and color, sometimes leading to hardening or brittleness.
            coverage: Coverage is typically partial and irregular, ranging from small spots to large saturated areas, with
              variations in penetration and thickness.
            pattern: They form blotches, streaks, or soaked patches, following the weave of the fabric and spreading along
              fibers or seams.
          glass:
            appearance: On glass, these coatings show as dark, translucent to opaque films that are sticky or brittle, often
              obscuring transparency and reflecting light unevenly.
            coverage: Coverage tends to be sparse to moderate, with variations from thin veils to thick blobs, often concentrated
              at edges or lower sections.
            pattern: Distribution is commonly in streaks, drips, or splatters, with patterns shaped by application or environmental
              factors like rain or wind.
          metal:
            appearance: Bitumen and tar coatings on metal appear as dark brown to black, glossy or matte layers with a sticky,
              viscous texture that can harden over time.
            coverage: Coverage is typically partial to full, varying from thin films to thick accumulations, with uneven distribution
              due to surface irregularities or weathering.
            pattern: They often form irregular patches, streaks, or drips, influenced by application methods or environmental
              runoff, rather than uniform coverage.
          mineral:
            appearance: Bitumen and tar on minerals appear as dark, adherent films that contrast with natural colors and crystalline
              structures, often glossy or matte depending on age.
            coverage: Coverage is typically partial and variable, from thin films to thick encrustations, with uneven distribution
              based on mineral porosity and geometry.
            pattern: They form irregular coatings, drips, or infiltrations, following mineral fractures or surfaces, leading
              to speckled or veined patterns.
          plastic:
            appearance: On plastic, these coatings manifest as dark, often glossy films that may be sticky or hardened, potentially
              causing discoloration or adhesion issues on the smooth surface.
            coverage: Coverage is generally light to moderate, with uneven amounts; thin layers may form, but thick accumulations
              are rare unless trapped in textures.
            pattern: Distribution includes streaks, patches, or drips, shaped by the plastic's low absorption, resulting in
              beading or spreading patterns.
          rubber:
            appearance: On rubber, these coatings present as dark, elastic or hardened layers that may blend with or stand
              out from the rubber's surface, often appearing glossy or matte.
            coverage: Coverage varies from light films to thick coats, with unevenness due to stretching or compression, often
              concentrating in indentations.
            pattern: Distribution is typically in smears, patches, or drips, influenced by rubber's flexibility and surface
              texture, causing wavy or cracked patterns.
          semiconductor:
            appearance: On semiconductors, these coatings manifest as dark, contaminating layers that can be sticky or hardened,
              potentially interfering with electronic properties and appearing as foreign deposits.
            coverage: Coverage is usually minimal and localized, with sparse amounts that vary by incident, often concentrated
              on exposed surfaces or edges.
            pattern: Distribution is often in spots, smears, or thin films, influenced by handling or environmental factors,
              rather than intentional application.
          specialty:
            appearance: Bitumen and tar on specialty materials appear as dark, adaptable coatings whose look depends on the
              base material, often sticky or brittle and altering original aesthetics.
            coverage: Coverage varies widely, from light contamination to heavy layers, with unevenness due to specialized
              surface characteristics and application contexts.
            pattern: They form irregular distributions like patches or streaks, shaped by the material's unique properties,
              such as conductivity or flexibility.
          stone:
            appearance: Bitumen and tar on stone appear as dark, often glossy coatings that can be sticky or hardened, contrasting
              with the natural color and texture of the stone surface.
            coverage: Coverage is usually partial and uneven, with thick accumulations in crevices and thinner areas on smooth
              surfaces, varying with exposure conditions.
            pattern: They typically form irregular patches, drips, or smears, influenced by gravity and surface porosity,
              rather than uniform application.
          wood:
            appearance: On wood, these coatings present as dark, opaque layers ranging from brown to black, with a rough or
              smooth finish that may penetrate the grain, creating a stained look.
            coverage: Coverage varies from light spotting to heavy, uneven coats, with areas of high absorption leading to
              inconsistent thickness and potential peeling.
            pattern: Distribution is often patchy or streaky, following the wood's natural grain or forming drips and splatters
              from application or spills.
