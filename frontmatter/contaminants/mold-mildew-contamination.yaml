    particulate_generation:
      respirable_fraction: 0.8
      size_range_um:
      - 0.1
      - 10
    ppe_requirements:
      eye_protection: goggles
      respiratory: PAPR
      skin_protection: full_suit
      rationale: Standard protection against workplace hazards
    substrate_compatibility_warnings:
    - Laser may not effectively penetrate porous materials with deep mold growth
    - Heat may drive mold spores deeper into substrate
    - Moisture from mold decomposition may affect sensitive materials
    toxic_gas_risk:
      severity: moderate
      primary_hazards:
      - compound: Carbon Monoxide
        concentration_mg_m3: 10-100
        hazard_class: toxic
      - compound: Mycotoxins
        concentration_mg_m3: trace
        hazard_class: toxic
      description: Carbon Monoxide and Mycotoxins generation - multiple toxic compounds
      mitigation: Half-face or full-face respirator with organic vapor/particulate cartridges, adequate ventilation
    ventilation_requirements:
      exhaust_velocity_m_s: 0.5
      filtration_type: HEPA
      minimum_air_changes_per_hour: 12
      rationale: Standard industrial ventilation (12 ACH) for particulate control
    visibility_hazard:
      severity: moderate
      description: Moderate visibility reduction (40-60%), significant particulate haze
      source: 'Respirable fraction: 0.80 (80% of particles <10μm)'
      mitigation: Ensure clear sight lines, use source extraction, maintain awareness of surroundings
      related_field: particulate_generation.respirable_fraction
