- Melanin
- Organic Acids
description: After dampness occurs, mold-mildew forms from fungal colonization on surfaces and releases organic acids with
  pigmented spores. Unique traits include spore pigmentation so it differs from rust or dust buildup. On woods like oak and
  drywall, penetration happens deeply while on concrete it stays surface-level, causing challenges in removal because residues
  cling tightly. Laser cleaning succeeds so because ablation targets organics precisely without harming substrates.
