  visual:
    appearanceOnCategories:
      presentation: descriptive
      items:
      - appearanceOnCategories:
          ceramic:
            appearance: Mold shows as fuzzy or slimy patches in black, green, or white hues, often causing staining and a
              dull finish on glazed or unglazed surfaces.
            coverage: Coverage is usually patchy and confined, varying from small clusters to broader areas depending on surface
              texture and humidity.
            pattern: It typically appears in irregular spots or patches, favoring grout lines, cracks, or areas with residual
              moisture.
          composite:
            appearance: Mold manifests as fuzzy or stained patches in shades of black, green, or white, often altering the
              surface texture and causing discoloration on mixed-material surfaces.
            coverage: Coverage is generally patchy and variable, ranging from isolated spots to larger areas, influenced by
              material composition and exposure.
            pattern: It tends to appear in irregular spots or patches, concentrating at joints, porous areas, or where moisture
              is trapped between components.
          concrete:
            appearance: Mold appears as dark or greenish stains, often fuzzy or slimy, causing discoloration and a rough,
              porous texture on the surface.
            coverage: Coverage is typically patchy and extensive in humid conditions, varying from small spots to large, spreading
              areas.
            pattern: It tends to form in irregular patches or streaks, concentrating in cracks, joints, or shaded, damp areas
              where moisture persists.
          fabric:
            appearance: Mold shows as fuzzy or powdery spots in black, green, or white colors, often leading to staining,
              musty odors, and a weakened or discolored texture.
            coverage: Coverage can range from small spots to extensive areas, varying with fabric type, humidity, and exposure
              duration.
            pattern: It commonly appears in irregular patches or streaks, following fabric weaves or moisture-laden areas
              like folds and seams.
          glass:
            appearance: Mold appears as cloudy or hazy spots with colors like black or green, often in a slimy or filmy layer
              that obscures transparency.
            coverage: Coverage is generally minimal and localized, with small, scattered patches that may spread slowly in
              humid conditions.
            pattern: It usually forms in isolated spots or streaks, commonly at edges or in corners where condensation and
              dirt collect.
          metal:
            appearance: Mold appears as fuzzy or slimy patches in colors like black, green, or white, often with a dull or
              corroded finish on the surface.
            coverage: Coverage is usually patchy and localized, varying from small clusters to larger areas depending on environmental
              conditions.
            pattern: It typically forms in irregular spots or streaks, concentrating in areas with moisture, such as joints
              or crevices.
          mineral:
            appearance: Mold manifests as fuzzy or stained growths in colors like black, green, or white, often altering the
              natural luster and creating a dull or discolored finish on mineral surfaces.
            coverage: Coverage is generally localized and uneven, with small clusters to moderate patches, depending on mineral
              type and environmental factors.
            pattern: It usually appears in scattered spots or patches, favoring porous regions, cracks, or areas with high
              moisture retention.
          plastic:
            appearance: Mold appears as fuzzy or slimy growths in colors like black, pink, or green, often leading to surface
              discoloration and a slightly textured feel.
            coverage: Coverage is typically limited and uneven, with small to moderate patches that can spread if conditions
              remain damp.
            pattern: It commonly forms in scattered spots or streaks, especially in crevices, seams, or areas with organic
              residue and moisture.
          rubber:
            appearance: Mold appears as fuzzy or slimy growths in colors like black, green, or white, often causing dark stains
              and a slightly tacky or degraded surface texture.
            coverage: Coverage is usually localized and uneven, with small to moderate patches that may expand in humid environments.
            pattern: It typically forms in scattered spots or streaks, especially in folds, seams, or areas with accumulated
              moisture and dirt.
          semiconductor:
            appearance: Mold appears as faint, discolored spots or hazy films in shades of gray or green, potentially leading
              to surface corrosion and impaired functionality in sensitive electronic components.
            coverage: Coverage is minimal and highly localized, often limited to small areas due to controlled environments,
              but can cause significant issues if unchecked.
            pattern: It typically forms in isolated spots or fine streaks, concentrating on exposed surfaces, connectors,
              or areas with condensation and contaminants.
          specialty:
            appearance: Mold shows as variable growths—fuzzy, slimy, or powdery—in colors like black, green, or white, adapting
              to the unique surface properties and causing discoloration or degradation.
            coverage: Coverage is highly variable, ranging from isolated spots to widespread areas, influenced by the material's
              composition and environmental conditions.
            pattern: It appears in irregular spots, patches, or streaks, depending on material specifics, such as coatings,
              porosity, and exposure to moisture.
          stone:
            appearance: Mold growth appears as dark or greenish stains, often slimy or fuzzy, leading to a discolored and
              sometimes slippery finish on porous stone surfaces.
            coverage: Coverage is typically patchy and uneven, varying from small spots to larger areas, influenced by stone
              porosity and exposure.
            pattern: It tends to form in irregular patches or streaks, concentrating in damp, shaded areas or cracks where
              moisture accumulates.
          wood:
            appearance: Mold manifests as fuzzy or powdery growths in shades of black, green, or white, often causing discoloration
              and a musty texture on the wood surface.
            coverage: Coverage can range from small, isolated spots to extensive patches, with variation based on wood type
              and humidity levels.
            pattern: It commonly appears in scattered spots or patches, following the grain or moisture-prone areas like knots
              and edges.
