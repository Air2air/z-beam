      items:
      - appearance_on_categories:
          ceramic:
            appearance: Mold shows as fuzzy or slimy patches in black, green, or white hues, often causing staining and a
              dull finish on glazed or unglazed surfaces.
            coverage: Coverage is usually patchy and confined, varying from small clusters to broader areas depending on surface
              texture and humidity.
            pattern: It typically appears in irregular spots or patches, favoring grout lines, cracks, or areas with residual
              moisture.
          composite:
            appearance: Mold manifests as fuzzy or stained patches in shades of black, green, or white, often altering the
              surface texture and causing discoloration on mixed-material surfaces.
            coverage: Coverage is generally patchy and variable, ranging from isolated spots to larger areas, influenced by
              material composition and exposure.
            pattern: It tends to appear in irregular spots or patches, concentrating at joints, porous areas, or where moisture
              is trapped between components.
          concrete:
            appearance: Mold appears as dark or greenish stains, often fuzzy or slimy, causing discoloration and a rough,
              porous texture on the surface.
            coverage: Coverage is typically patchy and extensive in humid conditions, varying from small spots to large, spreading
              areas.
            pattern: It tends to form in irregular patches or streaks, concentrating in cracks, joints, or shaded, damp areas
              where moisture persists.
          fabric:
            appearance: Mold shows as fuzzy or powdery spots in black, green, or white colors, often leading to staining,
              musty odors, and a weakened or discolored texture.
            coverage: Coverage can range from small spots to extensive areas, varying with fabric type, humidity, and exposure
              duration.
            pattern: It commonly appears in irregular patches or streaks, following fabric weaves or moisture-laden areas
              like folds and seams.
          glass:
