  visual:
    appearanceOnCategories:
      presentation: descriptive
      items:
      - appearanceOnCategories:
          ceramic:
            appearance: Deposits on ceramic surfaces look like dark, sooty smudges in shades of gray or black, with a dry,
              powdery finish that may cling to glazed or unglazed areas.
            coverage: Coverage is typically partial and uneven, ranging from sparse spotting to moderate layers, with variations
              based on ceramic type and exposure.
            pattern: They distribute as irregular spots or streaks, influenced by surface smoothness and environmental factors,
              and can form patchy accumulations.
          composite:
            appearance: Deposits on composites show as dark, sooty layers in gray or black, with a variable texture from powdery
              to slightly adherent, depending on the material blend.
            coverage: Coverage is typically partial and non-uniform, with light to moderate amounts that vary based on composite
              porosity and environmental exposure.
            pattern: Distribution is irregular, appearing as spots or streaks that follow surface irregularities and may form
              patchy areas.
          concrete:
            appearance: On concrete, deposits look like dark, sooty films in gray or black, with a powdery texture that adheres
              to rough, porous surfaces and may darken over time.
            coverage: Coverage is often uneven and localized, from light dusting to heavy layers in protected areas, depending
              on concrete texture and exposure.
            pattern: They form in patches or streaks, following surface cracks and moisture paths, and can accumulate in low-lying
              or sheltered regions.
          fabric:
            appearance: Deposits on fabric appear as dark, sooty stains in gray to black, with a fine, dusty texture that
              can penetrate fibers and cause discoloration.
            coverage: Coverage is generally sparse and uneven, with light amounts in exposed areas, varying with fabric material
              and cleaning frequency.
            pattern: They distribute as irregular spots or smudges, influenced by fabric weave and airflow, and may form patchy
              or streaked patterns.
          glass:
            appearance: On glass, exhaust deposits appear as translucent to opaque grayish films, sometimes with a smoky hue,
              and a fine, powdery texture that can obscure clarity.
            coverage: Coverage is usually light to moderate and can vary from spotty to near-uniform, with thicker buildup
              in edges or sheltered areas.
            pattern: They form in streaks or uniform thin layers, often aligned with airflow or condensation patterns, and
              may show water-spot-like markings.
          metal:
            appearance: Exhaust system deposits on metal appear as dark gray to black, sooty layers with a powdery or slightly
              greasy texture, often dulling the surface finish.
            coverage: Coverage is usually partial and uneven, ranging from light spotting to heavy buildup in localized zones,
              with variations based on exposure and temperature.
            pattern: Deposits typically form in streaks or patches, following airflow or condensation paths, and may concentrate
              in recessed areas or around joints.
          mineral:
            appearance: Deposits on minerals appear as dark, sooty coatings in shades of gray to black, with a fine, powdery
              texture that may contrast with the mineral's natural luster.
            coverage: Coverage is generally light and non-uniform, with sparse accumulation that varies based on mineral hardness
              and environmental factors.
            pattern: Distribution is typically in spots or streaks, influenced by mineral cleavage and surface features, and
              may form irregular patches.
          plastic:
            appearance: On plastic, deposits appear as dark, greasy films in gray to black colors, with a slightly sticky
              or powdery texture that may cause discoloration or hazing.
            coverage: Coverage is generally light to moderate and uneven, with spotty distribution that can vary with plastic
              composition and surface finish.
            pattern: They often form in streaks or patches, following static or airflow lines, and may concentrate on textured
              or low areas.
          rubber:
            appearance: On rubber, deposits manifest as dark, grimy coatings in black or brownish shades, with a slightly
              oily or powdery texture that can embed into flexible surfaces.
            coverage: Coverage is usually light and uneven, with sparse to moderate buildup that varies with rubber type and
              usage conditions.
            pattern: They form in streaks or patches, often aligned with stress points or grooves, and may show smeared patterns
              from movement.
          semiconductor:
            appearance: On semiconductors, deposits manifest as microscopic, dark particulate films that can appear grayish,
              with a fine, powdery texture potentially affecting surface conductivity.
            coverage: Coverage is typically very light and can vary from sparse to near-uniform, with critical implications
              for device performance in clean environments.
            pattern: They distribute as uniform thin layers or localized spots, often influenced by electrostatic attraction
              and processing conditions.
          specialty:
            appearance: Deposits on specialty materials vary widely but generally appear as dark, sooty films in gray to black,
              with textures ranging from powdery to greasy based on the specific material properties.
            coverage: Coverage is typically partial and uneven, with amounts ranging from light to moderate, influenced by
              the material's unique composition and usage context.
            pattern: Distribution is material-dependent, often forming irregular spots, streaks, or patches that follow surface
              characteristics and environmental exposure.
          stone:
            appearance: Deposits on stone present as dark, sooty films ranging from gray to black, with a fine, powdery texture
              that can adhere to rough or porous surfaces.
            coverage: Coverage is often uneven and localized, from light dusting to dense layers in sheltered spots, depending
              on stone porosity and exposure.
            pattern: Distribution is typically in patches or streaks, following surface contours and moisture trails, and
              may accumulate in crevices or low-lying areas.
          wood:
            appearance: On wood, deposits manifest as dark, grimy stains that can appear brownish-black, with a matte or slightly
              sticky texture that may penetrate porous surfaces.
            coverage: Coverage is generally sparse and non-uniform, with light to moderate amounts in exposed areas, varying
              with wood type and environmental conditions.
            pattern: They often appear as irregular spots or streaks, influenced by wood grain and surface orientation, and
              may spread in patchy formations.
