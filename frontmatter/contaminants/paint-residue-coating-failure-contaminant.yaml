visual_characteristics:
  appearance_on_categories:
    ceramic:
      appearance: Paint residue shows as flaking, cracking, or bubbling in various hues, leading to a rough, pitted texture
        and a mottled, inconsistent finish.
      coverage: Coverage is partial and irregular, ranging from isolated spots to larger sections, with variation due to firing
        and use conditions.
      pattern: It typically appears in patches, spots, or lines, often concentrated on glazed surfaces or at stress points.
    composite:
      appearance: Paint residue appears as flaking, chipping, or bubbling in various colors, resulting in a rough, layered
        texture and a patchy, inconsistent finish.
      coverage: Coverage is typically partial and variable, with areas ranging from minor to significant, depending on composite
        integrity and environmental factors.
      pattern: It forms in irregular patches, spots, or streaks, often at material interfaces or weak bonding points.
    concrete:
      appearance: Coating failure appears as flaking, peeling, or bubbling in assorted colors, with a rough, crumbly texture
        and a mottled, uneven finish.
      coverage: Coverage is partial and variable, from minor spots to extensive sections, influenced by surface preparation
        and environmental conditions.
      pattern: It forms in patches, spots, or streaks, frequently at joints, cracks, or high-moisture areas.
    fabric:
      appearance: Paint residue manifests as stiff, flaking, or peeling areas in various colors, creating a rough, crusty
        texture and a spotty, uneven finish.
      coverage: Coverage is sparse and irregular, typically small to moderate areas, with variation due to fabric type and
        wear.
      pattern: Distribution is in patches, streaks, or spots, often following weave patterns or at folds and seams.
    glass:
      appearance: Coating failure appears as hazing, peeling, or chipping in translucent or colored layers, resulting in a
        rough, uneven texture and a cloudy or speckled finish.
      coverage: Coverage is usually minimal and uneven, with small to moderate areas affected, varying based on application
        quality and environmental factors.
      pattern: It forms in spots, streaks, or patches, often at edges or where adhesion is weak, sometimes in a web-like pattern.
    metal:
      appearance: Paint residue appears as flaking, peeling, or bubbling layers in various colors, often with a rough or uneven
        texture and a dull, matte finish.
      coverage: Coverage is usually partial and uneven, ranging from small localized areas to larger sections, with high variation
        depending on environmental exposure.
      pattern: It typically forms in irregular patches, streaks, or spots, concentrated in areas of wear, impact, or poor
        adhesion.
    mineral:
      appearance: Paint residue shows as flaking, chipping, or scaling in various hues, resulting in a rough, granular texture
        and a blotchy, inconsistent finish.
      coverage: Coverage is generally sparse and uneven, with localized areas affected, varying based on mineral hardness
        and exposure.
      pattern: It typically appears in patches, spots, or lines, often following mineral cleavage or surface irregularities.
    plastic:
      appearance: Coating failure manifests as peeling, cracking, or delamination in assorted colors, with a rough, blistered
        texture and a dull, uneven finish.
      coverage: Coverage is often localized and uneven, from small defects to extensive peeling, influenced by UV exposure
        and mechanical stress.
      pattern: Distribution is in patches, streaks, or spots, frequently at seams, bends, or high-flex areas.
    rubber:
      appearance: Coating failure shows as cracking, peeling, or flaking in assorted colors, with a rough, textured surface
        and a dull, blotchy finish.
      coverage: Coverage is usually uneven and limited, from small localized areas to larger patches, varying with flexibility
        and exposure.
      pattern: It appears in patches, lines, or spots, commonly at flex points, seams, or areas of abrasion.
    semiconductor:
      appearance: Coating failure manifests as delamination, peeling, or hazing in specific colors (e.g., from photoresists),
        with a smooth to rough texture and a defective, non-uniform finish.
      coverage: Coverage is minimal and highly variable, typically small localized areas, with critical impact on performance
        depending on process control.
      pattern: Distribution is in spots, streaks, or patches, often at edges, interfaces, or defect sites, potentially in
        precise patterns from processing.
    specialty:
      appearance: Paint residue appears as flaking, peeling, or bubbling in assorted colors, with a texture and finish specific
        to the material (e.g., smooth for polymers, rough for advanced composites).
      coverage: Coverage is variable and material-dependent, ranging from isolated to widespread, influenced by specialized
        use and environmental factors.
      pattern: It forms in patches, spots, or streaks, tailored to the material's properties, such as at joints or high-stress
        zones.
    stone:
      appearance: Paint residue manifests as peeling or flaking layers in assorted colors, creating a rough, scaly texture
        and a blotchy, uneven finish on the surface.
      coverage: Coverage is generally sparse and variable, often localized to applied areas, with differences due to porosity
        and exposure.
      pattern: Distribution is irregular, with spots, streaks, or patches that may follow natural fissures or edges of the
        stone.
    wood:
      appearance: Coating failure shows as cracking, chipping, or alligatoring in colors matching the original paint, with
        a rough, splintered texture and loss of gloss.
      coverage: Coverage is typically patchy and incomplete, varying from minor spots to extensive areas, influenced by moisture
        and weathering.
      pattern: It often appears in patches, lines following the wood grain, or random spots, especially at joints or edges.
  color_range:
  - varies by paint color
  texture: flaking, peeling, cracked
  thickness: thin chips to thick layers
