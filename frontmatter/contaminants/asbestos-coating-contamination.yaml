  safety_data: &id001
    fire_explosion_risk:
      severity: low
      description: Minimal fire risk with standard precautions and adequate ventilation
      mitigation: Standard fire safety precautions, extinguisher available within 15m
    fumes_generated:
    - compound: Crystalline Silica (as quartz)
      concentration_mg_m3: 5.0
      exposure_limit_mg_m3: 0.025
      hazard_class: carcinogenic
    - compound: Asbestos Fibers
      concentration_mg_m3: 10.0
      exposure_limit_mg_m3: 0.1
      hazard_class: carcinogenic
    - compound: Carbon Monoxide
      concentration_mg_m3: 15.0
      exposure_limit_mg_m3: 29.0
      hazard_class: toxic
    particulate_generation:
      respirable_fraction: 0.8
      size_range_um:
      - 0.1
      - 10.0
    ppe_requirements:
      eye_protection: goggles
      respiratory: PAPR
      skin_protection: full_suit
      rationale: Standard protection against workplace hazards
    substrate_compatibility_warnings:
    - Laser may aerosolize intact asbestos fibers without complete destruction
    - Thermal degradation may create respirable asbestos fibers from bonded ACM
    - Inadequate laser parameters may increase fiber release compared to wet methods
    toxic_gas_risk:
      severity: low
      primary_hazards:
      - compound: Crystalline Silica (as quartz)
        concentration_mg_m3: 5.0
        hazard_class: carcinogenic
      - compound: Asbestos Fibers
        concentration_mg_m3: 10.0
        hazard_class: carcinogenic
      - compound: Carbon Monoxide
        concentration_mg_m3: 15.0
        hazard_class: toxic
      description: 'Multiple toxic compounds detected: Crystalline Silica (as quartz), Asbestos Fibers, Carbon Monoxide -
        requires enhanced protection'
      mitigation: 'N95 or P100 respirator for particulate control, standard ventilation. WARNING: Crystalline Silica (as quartz),
        Asbestos Fibers - known carcinogen(s), minimize exposure'
    ventilation_requirements:
      exhaust_velocity_m_s: 0.5
      filtration_type: HEPA
      minimum_air_changes_per_hour: 12
      rationale: Standard industrial ventilation (12 ACH) for particulate control
    visibility_hazard:
      severity: moderate
      description: Moderate visibility reduction (40-60%), significant particulate haze
      source: 'Respirable fraction: 0.80 (80% of particles <10μm)'
      mitigation: Ensure clear sight lines, use source extraction, maintain awareness of surroundings
      related_field: particulate_generation.respirable_fraction
