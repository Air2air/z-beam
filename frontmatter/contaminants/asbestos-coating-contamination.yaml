  visual_characteristics:
    appearance_on_categories:
      ceramic:
        appearance: Asbestos can be embedded as fine, white or gray fibers in ceramic tiles or adhesives, giving a slightly
          fibrous texture.
        coverage: Coverage varies from sparse inclusions to more consistent distribution in older ceramic products like floor
          tiles.
        pattern: It is often uniformly distributed in the ceramic body or appears in patches within grout or backing materials.
      composite:
        appearance: Asbestos appears as light-colored, fibrous strands embedded in composite materials like boards or panels,
          often with a rough surface.
        coverage: Coverage is generally high and consistent, designed for structural integrity, with some variation due to
          manufacturing flaws.
        pattern: It is usually uniformly distributed to reinforce the composite, but can form streaks or clusters in older
          products.
      concrete:
        appearance: Asbestos is mixed as grayish-white fibers into concrete, giving it a slightly fibrous, rough texture when
          exposed.
        coverage: Coverage is typically high and consistent, used for reinforcement, with minor variations from mixing or
          aging.
        pattern: It is uniformly distributed throughout the concrete mix in products like pipes or sheets, but may show as
          streaks if not well-mixed.
      fabric:
        appearance: Asbestos appears as a soft, white or gray fibrous material in fabrics, often with a fluffy or woven texture.
        coverage: Coverage is generally full and even, designed for fireproofing, though it can wear thin in high-use areas.
        pattern: It is woven uniformly into the fabric or applied as coatings, forming consistent layers in items like fire
          blankets.
      glass:
        appearance: Asbestos is not typically found in pure glass but may appear as fibrous, whitish residues on glass surfaces
          from adjacent contaminated materials.
        coverage: Coverage is minimal and irregular, primarily as surface dust or in composite glass products from past manufacturing.
        pattern: It usually forms spotty deposits or dust layers, often from cross-contamination during construction or demolition.
      metal:
        appearance: Asbestos appears as a grayish-white, fibrous coating or insulation on metal surfaces, often with a rough,
          matte texture.
        coverage: Coverage can vary from partial patches to full encasement, depending on the application and age of the material.
        pattern: It typically forms irregular patches or is sprayed uniformly on pipes, ducts, or structural beams for insulation.
      mineral:
        appearance: Asbestos occurs naturally as fibrous, silky strands in minerals like chrysotile, often in shades of white,
          green, or gray.
        coverage: Coverage varies widely from sparse veins to dense deposits, influenced by the mineral's natural occurrence
          and mining.
        pattern: It forms in veins, clusters, or layered patterns within host rocks, depending on geological formation.
      plastic:
        appearance: Asbestos may be mixed as white or gray fibers into plastic composites, resulting in a speckled or fibrous
          look.
        coverage: Coverage is typically even and complete within the material, though it can degrade over time, leading to
          variations.
        pattern: It is generally uniformly dispersed throughout the plastic matrix in products like vinyl tiles or electrical
          components.
      rubber:
        appearance: Asbestos is incorporated as gray or white fibers in rubber products, giving a slightly textured, matte
          finish.
        coverage: Coverage is usually even and extensive within the material, intended for heat or wear resistance.
        pattern: It is typically uniformly mixed into the rubber matrix, such as in gaskets or flooring, but may show as fine
          streaks.
      semiconductor:
        appearance: Asbestos is extremely rare in semiconductors but might appear as contaminant fibers on surfaces, looking
          like fine, white dust.
        coverage: Coverage is minimal and accidental, limited to trace amounts on equipment or in older insulation nearby.
        pattern: It would form sporadic spots or layers, usually from external sources during manufacturing or handling.
      specialty:
        appearance: Asbestos in specialty materials varies but often appears as fibrous, off-white inclusions in items like
          filters or insulation.
        coverage: Coverage ranges from partial to full, tailored to the product's purpose, with variations based on use and
          degradation.
        pattern: It is typically designed for uniform distribution but may show patches or streaks in custom applications.
      stone:
        appearance: Asbestos contamination in stone is rare but can appear as fibrous, light-colored veins or inclusions in
          certain natural stones or composites.
        coverage: Coverage is typically low and uneven, limited to specific mineral veins or manufactured stone products.
        pattern: It may form sporadic streaks or patches, often mixed with the stone matrix in products like asbestos-cement
          sheets.
      wood:
        appearance: Asbestos may be present as a fibrous, off-white or gray material in wood composites or as insulation attached
          to wooden structures.
        coverage: Coverage is usually partial and localized, such as in specific insulation areas, with variations due to
          wear or damage.
        pattern: It often appears in streaks or patches, especially in older wood-based products like siding or insulation
          boards.
