  visual:
    appearanceOnCategories:
      _section:
        sectionTitle: Visual Appearance
        sectionDescription: How this contaminant appears on different material categories
        sectionMetadata: relationships.visual.appearanceOnCategories
        icon: eye
        order: 50
        variant: default
      presentation: descriptive
      items:
      - appearanceOnCategories:
          ceramic:
            appearance: Acid pickling stains on ceramic present as dull, discolored areas with a matte finish and a slightly
              rough or pitted texture.
            coverage: Coverage is generally localized and uneven, varying from minor spots to more extensive stained patches.
            pattern: They typically appear as spots or streaks, often concentrated where acid made direct contact or pooled.
          composite:
            appearance: Acid pickling stains on composites appear as faded or discolored patches with a rough texture and
              uneven finish, depending on the material layers.
            coverage: Coverage is typically localized and variable, from small patches to larger stained zones based on exposure.
            pattern: They distribute in spots or streaks, often following the composite structure or areas of acid contact.
          concrete:
            appearance: On concrete, acid pickling stains present as lightened or etched areas with a rough, pitted texture
              and a chalky finish.
            coverage: Coverage is typically uneven and localized, varying from small spots to larger etched zones.
            pattern: Stains distribute in irregular patches or streaks, often where acid was applied or pooled on the surface.
          fabric:
            appearance: Acid pickling stains on fabric appear as bleached or discolored patches with a weakened, rough texture
              and faded color.
            coverage: Coverage is usually localized and inconsistent, ranging from small spots to larger stained sections.
            pattern: They typically show as irregular spots or streaks, following the fabric weave or areas of acid saturation.
          glass:
            appearance: On glass, acid pickling stains appear as cloudy, frosted areas with a hazy finish and a slightly rough,
              etched texture.
            coverage: Coverage is usually partial and variable, ranging from small hazy spots to larger frosted zones.
            pattern: Stains form in streaks or patches, often following the path of acid flow or splatter on the surface.
          metal:
            appearance: Acid pickling stains on metal appear as dark, irregular discolorations, often with a dull or etched
              finish and a rough texture.
            coverage: Coverage is usually partial and localized, varying from small patches to larger affected zones depending
              on exposure.
            pattern: They typically form in random spots or streaks, concentrated in areas where acid contact was uneven or
              prolonged.
          mineral:
            appearance: Acid pickling stains on minerals appear as dull, discolored patches with an etched or pitted texture
              and a loss of natural luster.
            coverage: Coverage is generally partial and variable, from isolated areas to more extensive stained regions.
            pattern: They form in spots or streaks, often concentrated on exposed surfaces where acid made contact.
          plastic:
            appearance: On plastic, acid pickling stains show as cloudy, discolored regions with a rough, etched texture and
              a dulled surface finish.
            coverage: Coverage is usually partial and patchy, ranging from small affected areas to larger discolored sections.
            pattern: Stains form in irregular spots or streaks, often where acid exposure was direct or prolonged.
          rubber:
            appearance: On rubber, acid pickling stains manifest as darkened or discolored areas with a rough, cracked texture
              and a dull surface finish.
            coverage: Coverage is generally patchy and uneven, varying from minor spots to more extensive affected areas.
            pattern: Stains often form in spots or streaks, concentrated where acid penetrated or pooled on the material.
          semiconductor:
            appearance: On semiconductors, acid pickling stains show as cloudy or discolored areas with a rough, etched surface
              and altered electrical properties.
            coverage: Coverage is usually minimal and highly localized, limited to specific areas to avoid functional impairment.
            pattern: Stains typically appear as localized spots or streaks, often in regions of acid exposure during processing.
          specialty:
            appearance: Acid pickling stains on specialty materials vary but generally show as discolored, rough patches with
              a degraded finish specific to the material composition.
            coverage: Coverage is typically uneven and material-dependent, ranging from minor spots to significant affected
              areas.
            pattern: They distribute in irregular spots or streaks, depending on the material's susceptibility and acid application
              method.
          stone:
            appearance: Acid pickling stains on stone show as whitish or discolored patches with a pitted or etched texture
              and a matte finish.
            coverage: Coverage is typically localized and uneven, varying from isolated spots to larger stained sections.
            pattern: They distribute in irregular spots or streaks, often concentrated where acid dripped or pooled on the
              surface.
          wood:
            appearance: On wood, acid pickling stains manifest as lightened or bleached areas with a faded, uneven color and
              a slightly rough surface texture.
            coverage: Coverage is generally patchy and inconsistent, ranging from small spots to extensive areas based on
              acid application.
            pattern: Stains often appear as blotches or streaks, following the wood grain or pooling in low spots where acid
              settled.
