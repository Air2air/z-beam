description: After pickling process, residue forms from acid and iron salts on steel surfaces so contamination builds up.
  This residue shows crystalline patterns, distinct from rust because it dissolves in water unlike fixed oxides. On stainless
  steel, it causes pitting and laser cleaning removes it effectively by targeted ablation without damaging substrate.
