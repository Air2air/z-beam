  safety_data: &id001
    fire_explosion_risk:
      severity: low
      description: Minimal fire risk with standard precautions and adequate ventilation
      mitigation: Standard fire safety precautions, extinguisher available within 15m
    fumes_generated:
    - compound: Carbon Monoxide
      concentration_mg_m3: 5-50
      exposure_limit_mg_m3: 29
      hazard_class: toxic
    - compound: Carbon Dioxide
      concentration_mg_m3: 900-5000
      exposure_limit_mg_m3: 9000
      hazard_class: toxic
    - compound: Polycyclic Aromatic Hydrocarbons (PAHs)
      concentration_mg_m3: 0.1-2.0
      exposure_limit_mg_m3: 0.2
      hazard_class: carcinogenic
    - compound: Ultrafine Carbon Particles
      concentration_mg_m3: 1-20
      exposure_limit_mg_m3: 3
      hazard_class: toxic
    particulate_generation:
      respirable_fraction: 0.85
      size_range_um:
      - 0.01
      - 10
    ppe_requirements:
      eye_protection: goggles
      respiratory: PAPR
      skin_protection: gloves
      rationale: Standard protection against workplace hazards
    substrate_compatibility_warnings:
    - Avoid laser cleaning on substrates containing chlorinated compounds (risk of phosgene generation)
    - Ensure substrate does not contain heavy metals that could vaporize
    - Test for potential hydrogen cyanide generation if nitrogen-containing compounds are present
    toxic_gas_risk:
      severity: moderate
      primary_hazards:
      - compound: Carbon Monoxide
        concentration_mg_m3: 5-50
        hazard_class: toxic
      - compound: Carbon Dioxide
        concentration_mg_m3: 900-5000
        hazard_class: toxic
      - compound: Polycyclic Aromatic Hydrocarbons (PAHs)
        concentration_mg_m3: 0.1-2.0
        hazard_class: carcinogenic
      - compound: Ultrafine Carbon Particles
        concentration_mg_m3: 1-20
        hazard_class: toxic
      description: 'Multiple toxic compounds detected: Carbon Monoxide, Carbon Dioxide, Polycyclic Aromatic Hydrocarbons (PAHs)
        - requires enhanced protection'
      mitigation: 'Half-face or full-face respirator with organic vapor/particulate cartridges, adequate ventilation. WARNING:
        Polycyclic Aromatic Hydrocarbons (PAHs) - known carcinogen(s), minimize exposure'
    ventilation_requirements:
      exhaust_velocity_m_s: 0.5
      filtration_type: HEPA
      minimum_air_changes_per_hour: 12
      rationale: Standard industrial ventilation (12 ACH) for particulate control
    visibility_hazard:
      severity: moderate
      description: Moderate visibility reduction (40-60%), significant particulate haze
      source: 'Respirable fraction: 0.85 (85% of particles <10μm)'
      mitigation: Ensure clear sight lines, use source extraction, maintain awareness of surroundings
      related_field: particulate_generation.respirable_fraction
