  visual_characteristics:
    appearance_on_categories:
      ceramic:
        appearance: Contamination presents as dark, smeary residues on ceramic surfaces, dulling the glaze and creating a
          grimy appearance.
        coverage: Coverage is generally partial and inconsistent, with amounts varying from light films to heavier deposits
          in specific zones.
        pattern: It often appears in streaks or blotches, following application or removal patterns, and may cluster in recessed
          areas or edges.
      composite:
        appearance: On composites, it appears as dark, streaky residues that can highlight material interfaces and create
          a mottled, unclean look.
        coverage: Coverage is usually partial and variable, depending on composite composition and exposure, with uneven distribution
          across the surface.
        pattern: It tends to form irregular patches or lines, following the composite structure or tool paths, and may be
          concentrated in porous regions.
      concrete:
        appearance: It appears as dark, shadowy films or stains on concrete, obscuring the rough texture and natural gray
          color with a dirty overlay.
        coverage: Coverage is often partial and variable, ranging from isolated patches to broader areas, depending on concrete
          condition and exposure.
        pattern: Distribution is typically in blotches or streaks, influenced by surface porosity and environmental factors,
          sometimes forming uniform discolorations.
      fabric:
        appearance: On fabric, it shows as dark, stain-like discolorations that may feel slightly stiff or greasy, altering
          the original color and texture.
        coverage: Coverage is generally sparse and patchy, with amounts varying from light tinges to more pronounced stains
          in affected areas.
        pattern: It often forms irregular spots or streaks, following weave patterns or application methods, and can be randomly
          distributed.
      glass:
        appearance: On glass, it appears as hazy, translucent films or streaks that reduce clarity and may have a slight gray
          or smoky tint.
        coverage: Coverage is usually light and uneven, often partial with variations in thickness, leading to differences
          in transparency across the surface.
        pattern: It typically forms streaks or smudges in the direction of wiping or removal, and can be uniform in thin layers
          or spotty in thicker accumulations.
      metal:
        appearance: Diamond-like carbon removal contamination appears as dull, grayish smudges or streaks on the metal surface,
          often contrasting with the original shiny or polished finish.
        coverage: Coverage is usually partial and localized, varying from small spots to larger areas depending on the removal
          method and surface exposure.
        pattern: It typically forms irregular streaks or patches, following the path of removal tools or abrasion, and may
          concentrate in high-wear areas.
      mineral:
        appearance: On minerals, it looks like dark, oily coatings that can mask crystalline structures and natural colors,
          giving a dull or contaminated sheen.
        coverage: Coverage is usually light and uneven, with variations based on mineral hardness and the extent of removal
          activities.
        pattern: It commonly forms in patches or thin layers, following mineral cleavage or external contacts, and may be
          spotty or uniform.
      plastic:
        appearance: It looks like faint, grayish films or scratches on plastic, potentially causing a loss of luster and introducing
          a dirty, matte finish.
        coverage: Coverage is often light and patchy, with variations based on plastic type and the intensity of removal processes.
        pattern: Distribution is typically in streaks or spots, influenced by surface smoothness and mechanical actions, sometimes
          forming uniform thin layers.
      rubber:
        appearance: It manifests as black, greasy smudges or films on rubber, often deepening the natural dark color and adding
          a slick, contaminated texture.
        coverage: Coverage is typically light to moderate and uneven, with higher amounts in high-contact zones and variations
          due to rubber elasticity.
        pattern: The contamination commonly appears in smears or spots, aligning with flex points or handling areas, and can
          be streaky or blotchy.
      semiconductor:
        appearance: It appears as microscopic, hazy films or particles on semiconductor surfaces, potentially causing visual
          defects and interfering with optical properties.
        coverage: Coverage is typically minimal and highly variable, with precise amounts critical to performance, often partial
          and controlled to avoid damage.
        pattern: Distribution is often in fine spots or uniform layers, influenced by processing steps and contamination sources,
          and may be concentrated in specific regions.
      specialty:
        appearance: On specialty materials, it manifests as tailored discolorations or residues, such as dull films on coatings
          or smudges on advanced polymers, adapting to material specifics.
        coverage: Coverage is highly variable and material-dependent, ranging from sparse to extensive, with careful control
          to maintain functionality and appearance.
        pattern: It forms in patterns specific to the material's use, like streaks on high-tech surfaces or patches on custom
          composites, often irregular or designed.
      stone:
        appearance: It shows up as dark, greasy-looking films or discolorations on stone surfaces, potentially masking the
          natural texture and hues.
        coverage: Coverage is often patchy and variable, ranging from isolated areas to broader sections, depending on stone
          type and exposure.
        pattern: Distribution is commonly in irregular patches or smears, influenced by surface roughness and cleaning actions,
          sometimes forming concentrated spots.
      wood:
        appearance: On wood, it manifests as dark, sooty stains or smears that can obscure the natural grain and color, giving
          a dirty or weathered look.
        coverage: Coverage tends to be sporadic and light to moderate, with variations based on wood porosity and the extent
          of removal efforts.
        pattern: The contamination often appears in blotchy patches or streaks, aligning with wood grain or tool marks, and
          may be unevenly distributed.
