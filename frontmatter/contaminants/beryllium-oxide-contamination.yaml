visual_characteristics:
  appearance_on_categories:
    ceramic:
      appearance: Beryllium oxide on ceramic surfaces manifests as a dull, white to off-white powdery residue that may contrast
        with the glaze, potentially causing a chalky or frosted appearance.
      coverage: Coverage is often localized and sparse, varying with ceramic porosity and handling, rarely achieving full
        surface coverage.
      pattern: Distribution is typically irregular, with spots or patches that cluster in unglazed areas, seams, or surface
        imperfections, rather than covering the entire object uniformly.
    composite:
      appearance: Beryllium oxide contamination on composites shows as a pale, powdery coating that may highlight the material's
        layered or fibrous structure, appearing whitish or gray on the surface.
      coverage: Coverage is typically partial and variable, depending on the composite's composition and exposure, with uneven
        spread across the surface.
      pattern: Distribution is often patchy or streaky, following the composite's texture and accumulating in gaps or rough
        areas, rather than forming a consistent layer.
    concrete:
      appearance: On concrete, contamination appears as a light gray or whitish powdery layer that can blend with or lighten
        the natural color, often giving a chalky or efflorescent look.
      coverage: Coverage is partial and variable, ranging from small spots to larger sections, influenced by concrete porosity
        and exposure factors.
      pattern: It typically forms in irregular patches or blotches, concentrated in porous areas, cracks, or surface irregularities,
        with less uniformity on smooth finishes.
    fabric:
      appearance: Beryllium oxide on fabric surfaces looks like a fine, white to gray powdery residue that can cling to fibers,
        potentially giving a dusty or stained appearance to the material.
      coverage: Coverage tends to be low and uneven, with patches that vary in intensity, and it may not fully cover the fabric
        due to its absorbent nature.
      pattern: Distribution is often patchy or streaky, following the weave pattern and accumulating in folds or low spots,
        rather than being uniform across the fabric.
    glass:
      appearance: On glass, beryllium oxide contamination is visible as a faint, hazy or milky film that can reduce transparency,
        appearing as a light gray or white deposit on the surface.
      coverage: Coverage can vary from light, partial films to more extensive layers, but it is usually not complete and may
        show inconsistencies in thickness.
      pattern: It often distributes in a streaky or smeared pattern, sometimes forming fine spots or a thin uniform layer,
        especially if applied or settled from airborne particles.
    metal:
      appearance: Beryllium oxide contamination on metal often appears as a fine, white to grayish powdery or crystalline
        deposit, sometimes with a dull or matte finish that contrasts with the metal's natural luster.
      coverage: Coverage is usually partial and localized, varying from sparse patches to more extensive areas depending on
        exposure conditions and surface texture.
      pattern: It typically forms in irregular spots or streaks, often concentrated in crevices, joints, or areas with surface
        imperfections, rather than uniformly across the surface.
    mineral:
      appearance: Beryllium oxide contamination on minerals presents as a pale, powdery or crystalline coating that may obscure
        natural colors and luster, appearing white to gray on the surface.
      coverage: Coverage is typically localized and uneven, with variations based on mineral type and exposure, seldom covering
        the entire specimen.
      pattern: Distribution is often spotty or patchy, following crystal faces or fractures, and may cluster in recessed areas
        rather than covering the mineral uniformly.
    plastic:
      appearance: On plastic, contamination appears as a light gray or white dusty film that can make the surface look cloudy
        or dull, adhering less firmly than on porous materials.
      coverage: Coverage is generally low to moderate, with patches that vary in size and density, seldom covering the entire
        surface uniformly.
      pattern: It tends to form in streaks or random spots, often influenced by static electricity or surface smoothness,
        and may not distribute evenly across the plastic.
    rubber:
      appearance: On rubber, contamination appears as a light-colored, dusty or chalky deposit that can embed in the flexible
        surface, sometimes causing a slight discoloration or reduced gloss.
      coverage: Coverage is usually sparse and localized, with variations based on rubber type and environmental conditions,
        rarely covering large areas completely.
      pattern: It commonly forms in irregular spots or smears, often concentrated in creases or textured areas, and may not
        spread uniformly due to rubber's non-porous nature.
    semiconductor:
      appearance: On semiconductors, beryllium oxide contamination appears as a subtle, light-colored film or particulate
        deposit that can cause hazing or minor discoloration on the precise surfaces.
      coverage: Coverage is usually minimal and patchy, with high variation depending on processing conditions, and is often
        limited to specific areas to avoid performance issues.
      pattern: It often distributes in fine spots or a thin, uneven layer, potentially concentrated at edges or defects, and
        may not be uniformly spread due to controlled environments.
    specialty:
      appearance: Beryllium oxide contamination on specialty materials (e.g., advanced alloys or coatings) appears as a faint,
        whitish to gray deposit that may alter surface properties, depending on the material's unique characteristics.
      coverage: Coverage is typically partial and inconsistent, designed or occurring in specific zones, with amounts varying
        based on the material's use and exposure.
      pattern: Distribution is highly variable, often forming in irregular patterns like spots or streaks tailored to the
        material's structure, and rarely uniform due to specialized applications.
    stone:
      appearance: Contamination on stone surfaces appears as a pale, whitish to gray powdery coating that may adhere to rough
        textures, sometimes giving a faded or discolored look to the natural stone color.
      coverage: Coverage is typically partial and uneven, ranging from small, isolated spots to larger areas, influenced by
        the stone's porosity and exposure duration.
      pattern: It commonly forms in irregular patches or blotches, often concentrated in porous regions or surface depressions,
        with less adherence on smooth, polished areas.
    wood:
      appearance: On wood, beryllium oxide contamination may present as a light-colored, dusty or chalky residue that can
        cling to the porous surface, potentially altering its natural grain and color.
      coverage: Coverage tends to be low to moderate, with significant variation based on wood porosity and environmental
        factors, rarely covering the entire surface uniformly.
      pattern: Distribution is often patchy or streaky, following the wood's grain or accumulating in cracks and low-lying
        areas, rather than forming a uniform layer.
