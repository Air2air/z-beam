  visual:
    appearance_on_categories:
      presentation: descriptive
      items:
      - appearance_on_categories:
          ceramic:
            appearance: Insect residue on ceramic surfaces appears as dark, sticky marks that can dull the glossy finish and
              attract dust.
            coverage: Coverage is usually sparse and localized, varying with usage and cleaning frequency.
            pattern: It forms spots or smears, often concentrated on edges or in areas where insects rest.
          composite:
            appearance: Insect residue on composites appears as uneven, dark discolorations that can highlight the material's
              layered or textured structure.
            coverage: Coverage varies widely, from minimal spots to extensive areas, influenced by surface properties and
              insect behavior.
            pattern: It forms patches or streaks, often adhering to porous or rough areas within the composite.
          concrete:
            appearance: On concrete, insect residue appears as dark, crusty patches that may blend with the rough texture
              and natural color variations.
            coverage: Coverage is typically sparse and uneven, with higher accumulation in damp or shaded areas.
            pattern: It is distributed in irregular spots or streaks, commonly in cracks or on porous surfaces where insects
              gather.
          fabric:
            appearance: Insect residue on fabric shows as dark, greasy stains that can penetrate fibers, leading to localized
              discoloration and stiffness.
            coverage: Coverage ranges from isolated spots to larger patches, depending on fabric type and infestation severity.
            pattern: It forms irregular spots or smudges, often following fabric weaves or insect pathways.
          glass:
            appearance: On glass, insect residue appears as translucent to opaque streaks or spots, sometimes with a hazy
              or smeared look.
            coverage: Coverage is typically light and variable, with denser areas near edges or where insects collide.
            pattern: It is distributed in streaks or splatters, often following the paths of insect movement or impact.
          metal:
            appearance: Insect residue on metal appears as dark, sticky spots or smears, often with a glossy or matte finish
              depending on the metal's surface.
            coverage: Coverage is usually sparse to moderate, varying with insect activity and environmental exposure.
            pattern: It typically forms irregular spots or streaks, concentrated in areas where insects frequently land or
              crawl.
          mineral:
            appearance: Insect residue on minerals shows as subtle, dark discolorations that can contrast with the crystalline
              or smooth surface, sometimes appearing waxy.
            coverage: Coverage is usually minimal and scattered, varying with mineral hardness and exposure.
            pattern: It forms small spots or smears, often concentrated on exposed faces or cleavage planes.
          plastic:
            appearance: On plastic, insect residue shows as greasy, dark stains that may slightly alter the surface sheen
              and feel tacky.
            coverage: Coverage is light to moderate, with uneven distribution based on exposure and material smoothness.
            pattern: It appears as scattered spots or smudges, following insect contact points and movement trails.
          rubber:
            appearance: On rubber, insect residue manifests as dark, sticky deposits that may embed into the flexible surface,
              causing slight discoloration.
            coverage: Coverage is generally light and patchy, with variations due to elasticity and environmental factors.
            pattern: It typically appears as smears or spots, concentrated on high-contact areas or seams.
          semiconductor:
            appearance: On semiconductors, insect residue appears as microscopic, contaminating particles that can cause hazing
              or localized discoloration on sensitive surfaces.
            coverage: Coverage is typically very light and non-uniform, posing risks to functionality in critical areas.
            pattern: It is distributed as fine spots or smudges, often in patterns reflecting airborne deposition or direct
              contact.
          specialty:
            appearance: Insect residue on specialty materials varies widely but generally appears as adherent, discolored
              deposits that may interact uniquely with surface coatings or treatments.
            coverage: Coverage is highly variable, from minimal to extensive, depending on the material's susceptibility and
              environmental conditions.
            pattern: It forms irregular patterns such as spots or streaks, tailored to the material's specific properties
              and usage context.
          stone:
            appearance: Insect residue on stone shows as discolored, often dark or yellowish spots that may feel gritty or
              sticky to the touch.
            coverage: Coverage is generally light and uneven, with higher concentrations in sheltered areas.
            pattern: It forms irregular spots or smears, usually clustered in crevices or on rough surfaces where insects
              accumulate.
          wood:
            appearance: On wood, insect residue manifests as dark, blotchy stains that can seep into the grain, altering the
              natural texture and color.
            coverage: Coverage ranges from light, scattered spots to dense patches, depending on infestation levels.
            pattern: It often appears in patches or streaks, following the wood grain or insect pathways.
