visual_characteristics:
  appearance_on_categories:
    ceramic:
      appearance: It appears as dull, metallic stains or discoloration on the glazed surface, sometimes with a rough texture
        where residue adheres.
      coverage: Coverage is typically low and inconsistent, with small to moderate areas affected, varying by surface smoothness.
      pattern: Distribution is spotty or patchy, often concentrated in crevices or unglazed areas, lacking a uniform pattern.
    composite:
      appearance: It appears as uneven, dull stains or residues on the composite surface, blending with matrix materials and
        showing metallic discoloration.
      coverage: Coverage is variable and often limited, ranging from small areas to broader sections, affected by material
        composition.
      pattern: Patterns are patchy or mottled, influenced by the composite's layered structure, with no uniform spread.
    concrete:
      appearance: On concrete, it manifests as dark, stained patches with a metallic sheen, often rough and embedded in the
        porous surface.
      coverage: Coverage is sparse and variable, from small spots to larger areas, more extensive on rough or aged concrete.
      pattern: It distributes as irregular spots or blotches, concentrating in cracks or porous regions, not uniform.
    fabric:
      appearance: It appears as discolored, stiffened areas with a grayish or yellowish tint, often feeling gritty and reducing
        fabric flexibility.
      coverage: Coverage is usually minimal and uneven, limited to surface contact, with variations based on fabric type and
        weave density.
      pattern: Patterns are irregular, such as spots or streaks, following weave patterns or absorption points, without uniformity.
    glass:
      appearance: On glass, it shows as hazy, opaque films or streaks with a grayish tint, reducing transparency and creating
        a smeared look.
      coverage: Coverage is usually light and variable, ranging from thin films to localized spots, with high transparency
        loss in affected areas.
      pattern: It distributes as streaks or smudges, often in lines or patches from application or removal processes, not
        uniform.
    metal:
      appearance: Cadmium plating removal often leaves a dull, grayish or yellowish residue with a rough, uneven texture,
        contrasting with the original metallic finish.
      coverage: Coverage is usually partial and variable, ranging from small spots to large areas, depending on the removal
        method and surface condition.
      pattern: It typically appears as irregular patches or streaks, often concentrated in areas where the plating was thickest
        or removal was incomplete.
    mineral:
      appearance: It appears as dull, discolored coatings or inclusions on mineral surfaces, with a grayish hue that may obscure
        natural luster.
      coverage: Coverage is typically low and inconsistent, ranging from thin films to localized deposits, depending on mineral
        porosity.
      pattern: Patterns are patchy or veined, following crystal structures or fractures, without even distribution.
    plastic:
      appearance: On plastic, it manifests as cloudy, discolored patches with a grayish hue, potentially causing surface dullness
        or minor etching.
      coverage: Coverage is generally partial and varied, from isolated spots to larger patches, depending on plastic type
        and exposure.
      pattern: It forms irregular spots or streaks, often following stress points or molded features, without even distribution.
    rubber:
      appearance: On rubber, it shows as dark, greasy stains or powdery residues with a metallic tinge, altering the surface's
        elasticity and color.
      coverage: Coverage is typically low and spotty, with small patches common, varying with rubber hardness and porosity.
      pattern: Distribution is blotchy or streaky, adhering to textured areas or folds, and not uniform across the surface.
    semiconductor:
      appearance: On semiconductors, it shows as microscopic, hazy films or spots with metallic discoloration, potentially
        affecting electrical properties and surface smoothness.
      coverage: Coverage is usually minimal and highly variable, with isolated areas affected, critical for device performance
        integrity.
      pattern: Distribution is irregular, often as scattered spots or streaks across the wafer, not uniform due to processing
        variations.
    specialty:
      appearance: On specialty materials, it appears as varied residues—dull, stained, or metallic—tailored to the material's
        unique properties, such as coatings on advanced alloys.
      coverage: Coverage is highly variable, ranging from sparse to moderate, depending on the material's composition and
        exposure conditions.
      pattern: Patterns are material-dependent, often irregular like patches or streaks, influenced by specific surface treatments
        and not uniform.
    stone:
      appearance: It appears as dull, grayish deposits or stains on the stone surface, sometimes with a slight metallic luster,
        and can feel gritty or rough.
      coverage: Coverage is sparse and uneven, typically minimal on dense stones but more extensive on porous types like sandstone.
      pattern: Patterns are irregular, often forming spots or patches that follow surface cracks or porous areas, without
        uniformity.
    wood:
      appearance: On wood, it manifests as discolored, stained areas with a metallic sheen or dark spots, often altering the
        natural grain and texture.
      coverage: Coverage is generally low and inconsistent, limited to surface contact points, with variations based on wood
        porosity and exposure.
      pattern: Distribution is patchy or streaky, following the wood grain or pooling in porous regions, with no uniform spread.
