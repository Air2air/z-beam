  visual:
    appearance_on_categories:
      presentation: descriptive
      items:
      - appearance_on_categories:
          ceramic:
            appearance: Dark, greasy residues that may appear as black or brown spots, often with a slick or sticky texture
              on glazed or unglazed surfaces.
            coverage: Varies from sparse spots to extensive areas, with non-uniform distribution common in industrial settings.
            pattern: Typically forms spots or patches, sometimes uniform if applied evenly, but often irregular.
          composite:
            appearance: Dark, oily residues that may seep into layers, causing discoloration and a greasy texture, varying
              with composite materials.
            coverage: Typically patchy and non-uniform, covering small to moderate areas with variation based on material
              composition.
            pattern: Forms irregular patches or streaks, often following fiber orientations or surface imperfections.
          concrete:
            appearance: Dark, oily stains that penetrate pores, appearing as black or brown patches with a greasy, often persistent
              residue.
            coverage: Varies from small, localized areas to extensive sections, often non-uniform due to surface roughness.
            pattern: Typically forms irregular spots or patches, spreading through cracks and porous regions.
          fabric:
            appearance: Dark, oily patches that stain fibers, appearing as brown or black spots with a greasy, often permanent
              texture.
            coverage: Generally patchy and uneven, covering small to large areas depending on spill size and fabric type.
            pattern: Forms blotches, streaks, or irregular patches, following fabric weave or absorption paths.
          glass:
            appearance: Transparent to dark oily films or streaks that reduce clarity, appearing as smudges with a greasy
              sheen.
            coverage: Can range from light, even films to heavy, streaky coverage, often varying with application and cleaning.
            pattern: Manifests as streaks, smears, or uniform thin layers, especially on smooth surfaces.
          metal:
            appearance: Dark, oily stains with a glossy or matte finish, often appearing as black or brown residues that can
              feel sticky or greasy.
            coverage: Varies from localized spots to extensive areas, depending on exposure; often non-uniform with higher
              concentrations in contact zones.
            pattern: Typically forms irregular spots, streaks, or patches, especially in crevices or on surfaces exposed to
              quenching processes.
          mineral:
            appearance: Dark, oily residues that may coat surfaces, appearing as black or brown stains with a slick texture
              on crystalline or rough minerals.
            coverage: Usually localized and uneven, covering small areas with variation based on mineral porosity and exposure.
            pattern: Forms spots, streaks, or patches, often concentrated in fissures or on exposed faces.
          plastic:
            appearance: Oily, dark stains that can cause discoloration to gray or black, often with a greasy feel and potential
              for surface dulling.
            coverage: Ranges from light, patchy areas to full coverage, depending on exposure; often uneven due to material
              non-porosity.
            pattern: Appears as spots, streaks, or smears, with possible uniform coating if submerged or sprayed.
          rubber:
            appearance: Dark, greasy stains that can cause swelling or softening, appearing as black or brown spots with a
              slick surface.
            coverage: Varies from localized spots to widespread areas, often uneven due to rubber's absorbent nature.
            pattern: Manifests as spots, smears, or uniform layers, especially in flexed or exposed areas.
          semiconductor:
            appearance: Thin, oily films that may appear as faint darkening or smudges, potentially interfering with electronic
              properties and leaving a greasy residue.
            coverage: Ranges from minimal, even coatings to patchy areas, typically controlled but variable in contamination
              events.
            pattern: Manifests as uniform layers or micro-spots, often spread evenly during processing but can be irregular.
          specialty:
            appearance: Dark, oily residues tailored to material specifics, such as coatings on advanced alloys or polymers,
              appearing as greasy stains with variable colors.
            coverage: Highly variable, from precise, localized application to broad, uneven coverage, influenced by specialty
              requirements.
            pattern: Varies widely; can be uniform, spotted, or streaked, depending on application method and material properties.
          stone:
            appearance: Dark, oily stains that can appear as black or brown spots, often leaving a shiny or dull residue on
              porous surfaces.
            coverage: Generally localized to small areas, but can vary widely; often non-uniform due to surface porosity.
            pattern: Forms irregular spots or patches, with potential for spreading along cracks or porous regions.
          wood:
            appearance: Dark, greasy patches that may penetrate the grain, causing discoloration to brown or black and a slick
              texture.
            coverage: Usually patchy and uneven, covering small to moderate areas with variation based on absorption and surface
              treatment.
            pattern: Appears as blotchy patches or streaks, following the wood grain or pooling in low areas.
      _section:
        sectionTitle: Visual Appearance
        sectionDescription: How this contaminant appears on different material categories
        icon: eye
        order: 50
        variant: default
