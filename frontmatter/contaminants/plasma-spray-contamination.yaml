  visual:
    appearanceOnCategories:
      _section:
        sectionTitle: Visual Appearance
        sectionDescription: How this contaminant appears on different material categories
        sectionMetadata: relationships.visual.appearanceOnCategories
        icon: eye
        order: 50
        variant: default
      presentation: descriptive
      items:
      - appearanceOnCategories:
          ceramic:
            appearance: The coating appears as a rough, matte finish in colors like gray or black, sometimes with a speckled
              look from embedded particles.
            coverage: Coverage is generally high and even, designed for full surface protection, though edges may have slight
              variations.
            pattern: Distribution is often uniform or slightly mottled, but can show streaks or patches if application is
              uneven.
          composite:
            appearance: On composites, it appears as a rough, heterogeneous layer in mixed colors, blending with the substrate
              but showing texture variations.
            coverage: Coverage varies widely, from partial to full, with inconsistencies at joints or curved areas.
            pattern: Distribution is patchy or streaked, influenced by the composite's fiber orientation and surface properties.
          concrete:
            appearance: It looks like a coarse, gritty coating in gray or earth tones, blending with the surface but adding
              a rough, sometimes glossy sheen.
            coverage: Coverage is typically high and uniform for protection, but can vary on rough or uneven surfaces.
            pattern: Patterns are mottled or streaked, influenced by concrete's porosity and application technique.
          fabric:
            appearance: On fabric, it appears as a stiff, crusty deposit in dull hues, embedding into fibers and altering
              the texture to a rough feel.
            coverage: Coverage is partial and variable, often limited to surface contact points with gaps in between.
            pattern: Distribution is blotchy or streaky, following the weave pattern and leading to uneven spots.
          glass:
            appearance: On glass, it manifests as a hazy, opaque layer with a rough texture, often in white, gray, or translucent
              colors that obscure transparency.
            coverage: Coverage is typically low and non-uniform, as the smooth surface resists coating, leading to gaps and
              variations.
            pattern: It forms streaky or blotchy patterns, with poor adhesion causing peeling or beading in spots.
          metal:
            appearance: Thermal spray coating on metal appears as a rough, matte to semi-gloss layer, often in metallic gray,
              black, or colored hues depending on the coating material.
            coverage: Coverage is usually high and consistent, aiming for full surface protection, but variations can occur
              at edges or complex geometries.
            pattern: It typically forms a uniform or slightly streaked pattern, with occasional spatter spots or uneven patches
              due to application inconsistencies.
          mineral:
            appearance: On minerals, it appears as a rough, adherent layer in colors matching or contrasting the substrate,
              such as metallic or dark shades.
            coverage: Coverage ranges from partial to full, with variations due to natural irregularities in the mineral surface.
            pattern: Distribution is often uniform or patchy, depending on the mineral's crystal structure and surface smoothness.
          plastic:
            appearance: It looks like a brittle, flaky layer in dull colors such as gray or beige, often cracking or peeling
              due to thermal expansion mismatches.
            coverage: Coverage is low and uneven, with frequent gaps and poor adhesion causing partial coverage.
            pattern: Patterns are irregular with spots and patches, as the coating may not bond well, leading to delamination.
          rubber:
            appearance: It manifests as a cracked, peeling film in colors like black or gray, often looking brittle and mismatched
              with the flexible rubber surface.
            coverage: Coverage is generally low and non-uniform, with the coating failing to cover the entire surface evenly.
            pattern: Patterns are irregular with flaking spots and streaks, due to poor adhesion and elasticity differences.
          semiconductor:
            appearance: It manifests as a thin, often discolored film in shades like gray or brown, with a smooth to slightly
              rough texture that may interfere with electronic properties.
            coverage: Coverage is usually controlled and even for functional layers, but contamination leads to partial, undesirable
              coverage.
            pattern: Patterns are typically uniform or speckled, but can show defects like streaks or spots from contamination.
          specialty:
            appearance: On specialty materials, it appears variable—rough or smooth in diverse colors—tailored to the substrate
              but often looking out of place.
            coverage: Coverage is highly variable, designed for specific needs but prone to inconsistencies if not optimized.
            pattern: Distribution depends on the material; it can be uniform, patchy, or streaked, based on application and
              adhesion.
          stone:
            appearance: It appears as a gritty, uneven film in shades like gray or tan, sometimes glossy if sealed, but often
              rough and discolored.
            coverage: Coverage varies from partial to full, but tends to be inconsistent, with thinner areas on rough surfaces.
            pattern: Patterns are irregular with patches and streaks, influenced by the stone's porosity and surface irregularities.
          wood:
            appearance: On wood, it looks like a coarse, flaky overlay with colors ranging from dull gray to brown, often
              contrasting with the natural grain and texture.
            coverage: Coverage is generally low and uneven, with gaps exposing the wood surface due to poor adhesion and material
              incompatibility.
            pattern: Distribution is patchy or streaky, as the coating may not adhere well, leading to flaking and irregular
              spots.
