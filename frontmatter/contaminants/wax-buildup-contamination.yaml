visual_characteristics:
  appearance_on_categories:
    ceramic:
      appearance: Wax coating buildup on ceramic surfaces presents as a cloudy, whitish layer that dulls the glaze and feels
        waxy or greasy.
      coverage: Coverage is generally uneven, with light films on flat surfaces and heavier buildup in crevices or decorative
        elements.
      pattern: It often appears in streaks or spots, accumulating in textured areas or along edges where wax is applied unevenly.
    composite:
      appearance: Wax coating buildup on composite materials appears as a dull, cloudy film that masks surface details and
        feels waxy or tacky.
      coverage: Coverage is usually uneven, with light layers on exposed surfaces and heavier accumulation in porous or joint
        areas.
      pattern: It tends to distribute in irregular patches or streaks, influenced by the composite's texture and application
        methods.
    concrete:
      appearance: On concrete, wax buildup looks like a dull, grayish or whitish film that obscures the surface and feels
        slick or tacky.
      coverage: Coverage is often spotty and variable, with heavier buildup in low-traffic or sealed areas, and lighter on
        exposed surfaces.
      pattern: It tends to form in patches or streaks, especially on porous concrete where wax penetrates and accumulates
        unevenly.
    fabric:
      appearance: Wax coating buildup on fabric appears as stiff, whitish or discolored patches that feel waxy and can alter
        the fabric's texture.
      coverage: Coverage is generally uneven, ranging from small, isolated patches to broader areas, depending on fabric type
        and use.
      pattern: It usually shows as irregular spots or streaks, often concentrated in areas with repeated wax exposure or poor
        absorption.
    glass:
      appearance: On glass, wax buildup appears as a foggy, streaky film that reduces transparency and reflects light poorly,
        with a slippery or smeared feel.
      coverage: Coverage is typically partial and uneven, ranging from light haze to dense films in corners or edges, varying
        with exposure.
      pattern: It commonly shows as streaks or smears, aligned with cleaning or application motions, and may form patches
        where residue pools.
    metal:
      appearance: Wax coating buildup on metal appears as a cloudy, white or yellowish film that dulls the natural metallic
        shine and feels greasy or sticky to the touch.
      coverage: Coverage is usually partial and variable, ranging from light, spotty films to thicker layers in protected
        or recessed areas.
      pattern: It typically forms in uneven streaks or patches, often concentrated in areas with less handling or cleaning,
        such as corners or seams.
    mineral:
      appearance: Wax coating buildup on mineral surfaces appears as a cloudy, whitish layer that dulls natural luster and
        feels waxy or greasy.
      coverage: Coverage is usually uneven, with light films on smooth facets and concentrated buildup in cracks or less-exposed
        areas.
      pattern: It typically distributes in irregular patches or streaks, influenced by the mineral's porosity and surface
        irregularities.
    plastic:
      appearance: On plastic, wax buildup looks like a hazy, white or yellowish coating that obscures clarity and feels slick
        or sticky, depending on the plastic type.
      coverage: Coverage is variable, often partial with light films on smooth areas and concentrated buildup in textured
        or damaged regions.
      pattern: It typically forms in streaks or patches, following application patterns or settling in scratches and low spots.
    rubber:
      appearance: On rubber, wax buildup manifests as a whitish, cloudy layer that reduces flexibility visibility and feels
        greasy or slippery.
      coverage: Coverage is typically partial and varied, with light films on high-wear areas and thicker buildup in protected
        spots.
      pattern: It often forms in streaks or spots, accumulating in grooves or on less-abraded surfaces where wax adheres more
        easily.
    semiconductor:
      appearance: On semiconductors, wax buildup presents as a hazy, contaminating film that can interfere with electrical
        properties and feels slightly tacky.
      coverage: Coverage is typically minimal and localized, but even light films can cause significant issues, varying with
        handling practices.
      pattern: It often appears as fine streaks or spots, accumulating during processing or storage in controlled environments.
    specialty:
      appearance: Wax coating buildup on specialty materials appears as a dull, cloudy film that obscures unique surface features
        and feels waxy or sticky.
      coverage: Coverage is highly variable, often uneven with light to heavy buildup influenced by specific material properties
        and usage conditions.
      pattern: It tends to form in irregular patterns, such as patches or streaks, depending on the material's composition
        and application context.
    stone:
      appearance: Wax coating buildup on stone surfaces looks like a dull, whitish or grayish film that masks the natural
        color and texture, feeling slick or tacky.
      coverage: Coverage is often spotty and inconsistent, with heavier buildup in low-traffic or shaded areas, and lighter
        on exposed surfaces.
      pattern: It tends to form in irregular patches or streaks, especially on porous stones where wax seeps in and accumulates.
    wood:
      appearance: On wood, wax buildup manifests as a hazy, whitish or cloudy layer that obscures the grain and gives a waxy,
        slippery texture.
      coverage: Coverage can be uneven, from light films on surfaces to heavy buildup in detailed areas, depending on usage
        and maintenance.
      pattern: It often appears in streaks or patches, following the direction of application or accumulating in grooves and
        carvings.
