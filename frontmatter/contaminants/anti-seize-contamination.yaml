  visual:
    appearanceOnCategories:
      presentation: descriptive
      items:
      - appearanceOnCategories:
          ceramic:
            appearance: Shows as dark, greasy stains that stand out against the smooth surface, creating a slick, discolored
              film with a matte or glossy finish.
            coverage: Generally low and localized, covering small patches with uneven amounts depending on surface contact.
            pattern: Typically appears as spots or smudges, concentrated in textured areas or edges, with irregular, patchy
              distribution.
          composite:
            appearance: Appears as greasy, dark stains that can seep into porous layers, creating a mottled, slick surface
              with altered color and texture.
            coverage: Ranges from sparse, localized spots to moderate coverage, varying with composite porosity and application
              method.
            pattern: Manifests as irregular patches or streaks, following material inconsistencies with a non-uniform, blotchy
              spread.
          concrete:
            appearance: Manifests as dark, oily stains that penetrate the porous surface, creating greasy, discolored patches
              with a slick texture.
            coverage: Typically low and localized, covering small to moderate areas unevenly, influenced by surface roughness.
            pattern: Forms irregular spots or streaks, often pooling in cracks or low areas, with a patchy, non-uniform distribution.
          fabric:
            appearance: Appears as dark, greasy stains that soak into fibers, creating oily, discolored patches with a slick,
              matte finish.
            coverage: Generally sparse and localized, covering small areas with variation based on fabric absorbency and contamination
              extent.
            pattern: Often forms irregular spots or smears, spreading along weave patterns with a non-uniform, blotchy appearance.
          glass:
            appearance: Appears as translucent, greasy streaks or films that can cause haziness or rainbowing, reducing clarity
              with a slick texture.
            coverage: Light to moderate, often partial coverage with variations from thin films to thicker accumulations in
              certain spots.
            pattern: Usually forms streaks or smears from spreading, often in linear patterns with uneven, non-uniform coverage.
          metal:
            appearance: Typically appears as a greasy, metallic-gray or copper-colored film with a slick, oily texture that
              can obscure the metal's natural luster.
            coverage: Varies from thin, spotty films in small areas to heavy, uniform coatings on large surfaces, depending
              on application.
            pattern: Often forms irregular streaks or patches, especially around threaded areas or joints where applied, with
              uneven distribution.
          mineral:
            appearance: Shows as dark, greasy films that coat crystalline surfaces, obscuring natural colors and creating
              a slick, stained look.
            coverage: Often sparse and localized, with light to moderate coverage varying by mineral porosity and contamination
              level.
            pattern: Usually appears as spots or smears, concentrated in fissures or on exposed faces, with irregular, patchy
              spread.
          plastic:
            appearance: Presents as oily, dark streaks or films that may cause discoloration or a greasy sheen, adhering to
              the smooth or textured surface.
            coverage: Variable from light, spotty films to moderate coverage, usually non-uniform and concentrated in applied
              regions.
            pattern: Often forms streaks or patches, spreading unevenly with a tendency to pool in low areas or along seams.
          rubber:
            appearance: Shows as dark, oily patches that can cause swelling or softening, with a greasy film that darkens
              the rubber's surface.
            coverage: Usually limited to small, localized areas with low to moderate coverage, depending on exposure and rubber
              type.
            pattern: Typically forms blotches or smears, concentrated in flex points or seams, with irregular, patchy distribution.
          semiconductor:
            appearance: Presents as thin, greasy films that can cause hazing or discoloration on smooth surfaces, potentially
              interfering with optical properties.
            coverage: Generally light and controlled, ranging from partial to full coverage in small, precise areas with minimal
              variation.
            pattern: Typically forms uniform thin layers or micro-spots, distributed evenly or in localized patches depending
              on application.
          specialty:
            appearance: Varies widely; may appear as greasy, discolored films tailored to the material's unique properties,
              such as slick coatings on advanced surfaces.
            coverage: Highly variable, from minimal localized spots to extensive coverage, customized to the material's application
              and contamination context.
            pattern: Distribution depends on the specialty material, often irregular or designed patterns like spots or uniform
              layers based on use.
          stone:
            appearance: Manifests as dark, oily spots or smears that darken the stone's surface, creating a glossy, stained
              appearance against the porous texture.
            coverage: Typically sparse and localized, covering small areas with variation based on surface porosity and application.
            pattern: Forms irregular spots or smudges, often concentrated in crevices or low points, with a non-uniform, patchy
              distribution.
          wood:
            appearance: Shows as dark, greasy stains that penetrate the grain, giving a wet, discolored look with a slippery
              feel.
            coverage: Generally limited to small, localized areas with low to moderate coverage, often concentrated at points
              of contact.
            pattern: Usually appears as blotchy patches or streaks following the wood grain, with irregular edges and no uniform
              spread.
