  visual:
    appearance_on_categories:
      presentation: descriptive
      items:
      - appearance_on_categories:
          ceramic:
            appearance: Gold electroplating manifests as a bright, gold layer that may look glossy or slightly textured, adhering
              to the glazed or unglazed surface.
            coverage: Coverage is typically complete and consistent on smooth surfaces, but may vary on rough or porous areas.
            pattern: It often forms a uniform coating, but can appear as spots or patches if the ceramic has uneven porosity.
          composite:
            appearance: Gold electroplating looks like a gold layer that may appear mottled or varied, reflecting the different
              materials in the composite.
            coverage: Coverage is generally partial and irregular, varying with the composition and surface properties.
            pattern: It tends to form an uneven pattern, with patches or streaks corresponding to the composite's heterogeneous
              structure.
          concrete:
            appearance: The contamination appears as a dull, gold-colored layer that may look speckled or rough, adhering
              poorly to the porous surface.
            coverage: Coverage is typically sparse and inconsistent, with large variations due to surface roughness.
            pattern: It forms patchy or streaky patterns, often following cracks or uneven areas in the concrete.
          fabric:
            appearance: Gold electroplating shows as a metallic gold sheen that can be stiff or flaky, often not integrating
              well with the fibrous material.
            coverage: Coverage is minimal and highly variable, usually limited to surface contact points.
            pattern: Distribution is irregular, forming patches or lines along the weave, with a tendency to flake off.
          glass:
            appearance: It appears as a reflective, gold-colored coating that can be transparent or opaque, giving a metallic
              sheen to the glass surface.
            coverage: Coverage is generally even and full, though defects can cause localized thin or thick areas.
            pattern: The pattern is usually uniform if applied correctly, but may show streaks or bubbles if the process is
              flawed.
          metal:
            appearance: Gold electroplating appears as a bright, metallic yellow-gold layer with a smooth, shiny finish, often
              masking the underlying metal.
            coverage: Coverage is usually complete and consistent, with minimal variation, as it is intentionally applied
              to coat the entire surface.
            pattern: It typically forms a uniform, even coating across the surface, though it may show streaks or patches
              if applied unevenly.
          mineral:
            appearance: Gold electroplating manifests as a bright, gold coating that can enhance or obscure the mineral's
              natural luster and color.
            coverage: Coverage varies widely, from full on smooth surfaces to partial on rough or crystalline areas.
            pattern: Distribution is often uneven, with spots or uniform layers depending on the mineral's crystal structure
              and smoothness.
          plastic:
            appearance: The contamination appears as a thin, metallic gold film that can be shiny or prone to peeling, depending
              on the plastic type and surface treatment.
            coverage: Coverage is often full but can be inconsistent, with variations in thickness and adherence.
            pattern: Distribution is usually even if pre-treated, but may show blotches or uneven areas due to poor adhesion.
          rubber:
            appearance: It appears as a flaky or peeling gold coating that may not bond well, often looking dull or cracked
              on the flexible surface.
            coverage: Coverage is sparse and uneven, with poor adhesion leading to significant variation.
            pattern: The pattern is typically spotty or streaky, concentrating on raised areas or where the rubber is less
              elastic.
          semiconductor:
            appearance: It appears as a thin, conductive gold layer with a shiny, metallic finish, often used for electrical
              contacts in microelectronics.
            coverage: Coverage is highly controlled and localized, with minimal variation to ensure electrical performance.
            pattern: The pattern is precisely uniform and controlled, typically applied in specific areas like pads or traces
              without spreading.
          specialty:
            appearance: Gold electroplating looks variable, from glossy to textured, depending on the specialty material's
              unique properties and surface conditions.
            coverage: Coverage is customized and often inconsistent, designed to meet particular functional or aesthetic requirements.
            pattern: Distribution can range from uniform to highly irregular, tailored to the material's specific application
              and structure.
          stone:
            appearance: Gold electroplating shows as a shiny, gold layer that may appear speckled or dull, depending on the
              stone's texture and porosity.
            coverage: Coverage is typically partial and inconsistent, with variations based on surface irregularities.
            pattern: Distribution is often patchy or streaky, following the natural fissures and rough surfaces of the stone.
          wood:
            appearance: The contamination appears as a thin, metallic gold film that can look glossy or flaky, often not adhering
              well to the porous surface.
            coverage: Coverage is generally sparse and uneven, with significant variation due to wood's absorbent nature.
            pattern: It tends to form irregular patches or spots, concentrating in grooves or damaged areas where the wood
              is more receptive.
