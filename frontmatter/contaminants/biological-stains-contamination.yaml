  visual:
    appearance_on_categories:
      presentation: descriptive
      items:
      - appearance_on_categories:
          ceramic:
            appearance: Presents as green, black, or brown slimy deposits with a smooth or slightly rough texture, sometimes
              causing staining on glazed surfaces.
            coverage: Varies from isolated spots to more extensive coverage in wet conditions, often uneven and localized.
            pattern: Typically appears in spots or patches, concentrating in grout lines, imperfections, or areas prone to
              moisture.
          composite:
            appearance: Appears as greenish-brown or black slimy layers with a variable texture based on composite materials,
              often feeling slick and uneven.
            coverage: Can be minimal to extensive, highly variable based on composite composition and exposure to damp conditions.
            pattern: Distributes in patches or streaks, favoring joints, porous regions, or areas with trapped moisture.
          concrete:
            appearance: Presents as green, black, or gray slimy films with a rough or slick texture, often embedded in pores
              and causing surface darkening.
            coverage: Can be sparse in dry settings but extensive in moist conditions, varying from localized to near-complete
              coverage.
            pattern: Distributes in irregular patches, streaks, or blotches, favoring cracks, joints, and damp, shaded areas.
          fabric:
            appearance: Manifests as green, brown, or black slimy stains with a fuzzy or slick texture, often leading to discoloration
              and a musty smell.
            coverage: Ranges from small, scattered spots to extensive areas in damp conditions, with high variation based
              on fabric type.
            pattern: Appears in blotches, streaks, or patches, following moisture paths or accumulating in folds and seams.
          glass:
            appearance: Appears as translucent to opaque green or brown streaks and spots with a slippery, hazy finish that
              obscures clarity.
            coverage: Generally light and patchy, with sparse to moderate coverage that varies based on humidity and surface
              cleanliness.
            pattern: Forms in streaks, spots, or smears, often following water flow paths or accumulating at edges and corners.
          metal:
            appearance: Appears as slimy, greenish-brown or black patches with a glossy or matte finish, often feeling slippery
              and uneven.
            coverage: Varies from sparse, localized patches to extensive coverage in humid environments, often non-uniform.
            pattern: Typically forms in irregular spots or streaks, concentrating in crevices, joints, or areas with moisture
              retention.
          mineral:
            appearance: Appears as green, brown, or black slimy deposits with a variable texture from smooth to gritty, often
              altering the mineral's natural luster.
            coverage: Varies widely from minimal to heavy coverage, depending on mineral porosity and environmental humidity.
            pattern: Forms in spots, streaks, or patches, concentrating on fissures, cleavage planes, or moisture-retentive
              surfaces.
          plastic:
            appearance: Manifests as green, brown, or black slimy films with a glossy or sticky texture, potentially leading
              to surface dulling or discoloration.
            coverage: Ranges from sparse, scattered patches to moderate coverage, with variation depending on plastic type
              and environmental factors.
            pattern: Forms in irregular spots, streaks, or smears, often adhering to textured areas or where water collects.
          rubber:
            appearance: Shows as dark green, brown, or black slimy coatings with a tacky or smooth finish, sometimes causing
              surface degradation or odor.
            coverage: Varies from light, isolated deposits to more widespread coverage, especially in humid or wet environments.
            pattern: Typically forms in spots or patches, concentrating in seams, cracks, or areas with persistent moisture.
          semiconductor:
            appearance: Manifests as subtle greenish or brownish films with a slick, often invisible-to-naked-eye texture
              that can interfere with electronic properties.
            coverage: Generally minimal and controlled in clean environments, but can vary to extensive if contamination occurs,
              leading to device failure.
            pattern: Typically appears as uniform thin layers or microscopic spots, concentrating in gaps or on exposed surfaces
              during processing.
          specialty:
            appearance: Varies widely by material but often shows as green, brown, or black slimy films with textures ranging
              from smooth to rough, tailored to specific surfaces.
            coverage: Highly variable, from isolated spots to full coverage, depending on the specialty material's exposure
              and resistance to biofilm formation.
            pattern: Distributes based on material properties, commonly in patches, streaks, or uniform layers in vulnerable
              areas like joints or moist zones.
          stone:
            appearance: Shows as green, brown, or gray slimy films with a slick or gritty texture, often altering the natural
              stone color and feel.
            coverage: Can be minimal in dry settings but extensive in damp environments, varying from spotty to near-complete
              coverage.
            pattern: Distributes in irregular patches, streaks, or blotches, favoring porous areas, cracks, or shaded, moist
              surfaces.
          wood:
            appearance: Manifests as dark green, brown, or black slimy layers with a rough or fuzzy texture, sometimes causing
              discoloration and softening.
            coverage: Ranges from small, isolated spots to widespread coverage in wet conditions, with high variation based
              on wood type and exposure.
            pattern: Often appears in patches or streaks along grain lines, knots, or damp areas, spreading unevenly.
