description: >-
  Biological stains contamination, it arises from organic residues like algae and mold in humid environments. Formation
  patterns show irregular clusters, thus creating uneven layers on surfaces. These patterns follow natural regional
  variations, such as denser growth in tropical areas and sparser in arid zones. On metal substrates, contamination
  adheres tightly and penetrates pores, while on stone, it forms porous films that trap moisture.


  Removal challenges emerge during laser cleaning. Process applies pulses, and biological matter absorbs energy
  unevenly, so charring occurs before detachment. This contamination, it resists ablation due to volatile components
  that evaporate and leave residues. Material-specific behaviors differ: metals heat rapidly and risk substrate damage,
  thus requiring low fluence; stone surfaces exhibit cracking from thermal stress. After treatment, some areas still
  show remnants, so multiple passes become necessary. Efficiency of cleaning, it improves with adjusted wavelengths
  targeting organic bonds.
