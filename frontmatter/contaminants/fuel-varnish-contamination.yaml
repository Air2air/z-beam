page_description: >-
  Fuel varnish contamination shows sticky adhesion on surfaces. It forms from degraded organic residues in fuel systems.
  After exposure to air and heat, layer builds unevenly and hardens. This creates unique patterns like patchy films on
  metals. Removal challenges arise because varnish resists laser pulses strongly. On
  [aluminum](/materials/aluminum-laser-cleaning), it peels slowly so multiple passes are needed.
  [Steel](/materials/steel-laser-cleaning) surfaces exhibit tougher bonds during cleaning. Process demands careful
  energy control to avoid substrate damage. In observations, varnish softens under laser so efficiency improves with
  short intervals. Treatment removes contamination effectively from engine parts. 


  Ikmanda Roswati, Ph.D.
