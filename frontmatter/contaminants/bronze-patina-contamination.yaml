  visual:
    appearanceOnCategories:
      _section:
        sectionTitle: Visual Appearance
        sectionDescription: How this contaminant appears on different material categories
        sectionMetadata: relationships.visual.appearanceOnCategories
        icon: eye
        order: 50
        variant: default
      presentation: descriptive
      items:
      - appearanceOnCategories:
          ceramic:
            appearance: Greenish or brownish stains with a dull, sometimes gritty texture, often obscuring the original glaze
              or finish.
            coverage: Generally localized to damaged or exposed regions, with coverage varying from small spots to larger
              stained areas.
            pattern: Manifests as spots or streaks, frequently in porous areas or cracks, and can spread irregularly.
          composite:
            appearance: Greenish or brownish discoloration with a rough or peeling texture, depending on the composite materials
              involved.
            coverage: Varies widely, from isolated spots to widespread areas, influenced by environmental exposure and material
              composition.
            pattern: Appears as patches or streaks, often at joints or exposed layers, and can be irregular due to material
              heterogeneity.
          concrete:
            appearance: Greenish or brownish discoloration with a rough, sometimes efflorescent texture, often on porous surfaces.
            coverage: Varies from small spots to extensive areas, often non-uniform and influenced by moisture and environmental
              conditions.
            pattern: Forms in patches or streaks, commonly in damp or shaded areas, and can be unevenly distributed.
          fabric:
            appearance: Greenish or brownish stains with a stiff or brittle texture, often altering the fabric's original
              color and feel.
            coverage: Typically patchy and confined to affected areas, with coverage varying from small stains to larger discolored
              sections.
            pattern: Appears as spots or streaks, frequently in damp or soiled regions, and can follow weave patterns irregularly.
          glass:
            appearance: Hazy or cloudy film with greenish or brownish tints, often reducing transparency and creating a rough
              surface feel.
            coverage: Can range from thin, widespread films to thicker patches, often uniform in high-humidity environments.
            pattern: Usually appears as uniform films or streaks, especially in humid conditions, and may concentrate at edges.
          metal:
            appearance: Greenish-blue or brownish layer with a rough, crusty texture, often dulling the original metallic
              shine.
            coverage: Varies from small spots to extensive coverage, often non-uniform and dependent on environmental exposure.
            pattern: Typically forms in patches or streaks, starting at edges or exposed areas, and can spread unevenly.
          mineral:
            appearance: Greenish or brownish coatings with a rough or crystalline texture, sometimes altering the mineral's
              natural luster.
            coverage: Generally localized to specific zones, with coverage ranging from thin films to thick layers, depending
              on mineral type.
            pattern: Appears as patches or encrustations, often in fissures or exposed surfaces, and can be irregular.
          plastic:
            appearance: Discoloration with greenish or brownish hues, often accompanied by a chalky or degraded surface texture.
            coverage: Typically patchy and non-uniform, with coverage ranging from minor discoloration to extensive degradation.
            pattern: Forms in patches or streaks, particularly on exposed surfaces, and may follow stress points or UV-affected
              areas.
          rubber:
            appearance: Discoloration with greenish or brownish tones, sometimes showing a cracked or powdery surface texture.
            coverage: Generally localized to surface areas, with coverage ranging from small spots to larger patches, depending
              on usage.
            pattern: Forms in patches or streaks, often along seams or stressed areas, and may spread with aging.
          semiconductor:
            appearance: Discoloration with greenish or brownish hues, often accompanied by surface roughness or corrosion
              pits.
            coverage: Usually minimal and localized to vulnerable areas, with coverage varying based on environmental and
              operational factors.
            pattern: Forms in spots or streaks, typically at exposed contacts or edges, and may follow circuit patterns irregularly.
          specialty:
            appearance: Greenish or brownish discoloration with texture changes specific to the material, such as peeling
              or pitting.
            coverage: Highly variable, from isolated spots to widespread areas, depending on the specialty material's composition
              and use.
            pattern: Manifests as patches or streaks, influenced by material properties and exposure, often irregular.
          stone:
            appearance: Greenish or brownish discoloration with a rough, sometimes crusty texture, altering the natural stone
              finish.
            coverage: Typically patchy and localized, with coverage varying from minor spots to extensive areas based on environmental
              factors.
            pattern: Forms in patches or streaks, often concentrated in crevices or damp areas, and can be unevenly distributed.
          wood:
            appearance: Discoloration with greenish or brownish stains, sometimes accompanied by a powdery or flaky surface
              texture.
            coverage: Generally localized to affected areas, with coverage ranging from small spots to larger sections, varying
              with moisture levels.
            pattern: Appears as streaks or patches, often following the wood grain or moisture paths, and can be irregular.
