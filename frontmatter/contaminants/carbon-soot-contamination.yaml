  visual_characteristics:
    presentation: descriptive
    items:
    - appearance_on_categories:
        ceramic:
          appearance: Carbon soot on ceramic surfaces appears as a dark, sooty layer that can adhere to glazed or unglazed
            areas, resulting in a dull, blackened finish that may feel slightly gritty.
          coverage: Coverage is typically uneven, ranging from minimal dusting to heavy coatings, especially in recessed areas
            or near heat, with porosity affecting adherence.
          pattern: It often deposits in spots or patches, with accumulation in textured regions or around imperfections, and
            may show streaking from environmental factors like wind or moisture.
        composite:
          appearance: Carbon soot on composites appears as a dark, sooty coating that may highlight material variations, creating
            a mottled, blackened look with a texture dependent on the composite's surface finish.
          coverage: Coverage is variable, from sparse to dense, often heavier in porous or textured regions and lighter on
            smooth surfaces, depending on environmental conditions.
          pattern: It tends to settle unevenly, with patches or streaks along seams, fibers, or rough areas, and distribution
            is affected by the composite's heterogeneity and exposure.
        concrete:
          appearance: On concrete, carbon soot looks like a dark, charcoal-like layer that settles into pores and cracks,
            resulting in a dirty, blackened surface with a rough, abrasive texture.
          coverage: Coverage varies widely, from light dusting on smooth surfaces to heavy deposits in recesses or near pollution,
            with porosity playing a key role in adherence.
          pattern: It typically forms in patches or streaks, concentrating in rough, textured areas or sheltered spots, and
            may show patterns from water runoff or air currents.
        fabric:
          appearance: Carbon soot on fabric appears as a dark, sooty stain that penetrates fibers, causing a gray to black
            discoloration and a gritty, embedded texture that can feel coarse.
          coverage: Coverage is uneven, ranging from light spotting to extensive soiling, especially in creases or near sources,
            and can vary with fabric type and porosity.
          pattern: It often distributes in spots or smudges, following weave patterns or areas of contact, and may show streaking
            from airflow or moisture, with higher accumulation in folds.
        glass:
          appearance: On glass, carbon soot manifests as a translucent to opaque black film that reduces clarity, creating
            a smoky, hazy appearance with a fine, powdery texture when touched.
          coverage: Coverage is generally light to moderate, with variations such as thicker layers in corners or near vents,
            and can be easily disturbed or wiped away.
          pattern: It typically forms in streaks or smudges, often following airflow paths or condensation lines, and may
            appear more uniform on flat surfaces but patchy on edges.
        metal:
          appearance: Carbon soot appears as a dark gray to black, powdery or smudgy layer that can obscure the metallic luster
            and create a matte, dull finish.
          coverage: Coverage is typically partial to heavy, varying from light dusting in open areas to thick deposits in
            sheltered spots or near combustion sources.
          pattern: It often forms in streaks or patches, especially around edges, joints, or areas with airflow, and may accumulate
            unevenly due to surface irregularities.
        mineral:
          appearance: Carbon soot on minerals appears as a dark, sooty coating that can obscure natural colors and crystal
            faces, giving a dull, blackened finish with a fine, powdery texture.
          coverage: Coverage is typically uneven, ranging from sparse to dense, with heavier deposits in protected niches
            or near sources, and lighter on exposed, smooth surfaces.
          pattern: Distribution is often patchy or streaky, with accumulation in fissures, cleavage planes, or sheltered areas,
            and patterns may reflect mineral structure and exposure history.
        plastic:
          appearance: On plastic, carbon soot looks like a dark, smudgy film that can cling to smooth surfaces, causing a
            loss of shine and a matte, dirty appearance with possible electrostatic attraction.
          coverage: Coverage is usually light to moderate, varying from a thin layer on exposed parts to thicker deposits
            in corners or sheltered spots, and can be easily smeared.
          pattern: Distribution is often uniform or streaky, with patches forming on static-prone areas or near airflow, and
            may be influenced by surface charge and plastic type.
        rubber:
          appearance: On rubber, carbon soot deposits as a dark, black film that can embed into the flexible surface, leading
            to a grimy, stained appearance with a slightly tacky or powdery feel.
          coverage: Coverage is typically partial to heavy, with variations such as thick layers in static areas or light
            dusting on exposed surfaces, influenced by rubber composition.
          pattern: It commonly forms in patches or streaks, accumulating in grooves, seams, or areas with less movement, and
            may show patterns from handling or environmental exposure.
        semiconductor:
          appearance: On semiconductors, carbon soot appears as a dark, particulate film that can interfere with surface properties,
            creating a smoky, contaminated look with potential for micro-scale texture changes.
          coverage: Coverage is generally light and variable, from minimal dusting to localized patches, with critical implications
            for performance in clean or controlled settings.
          pattern: It often deposits uniformly or in fine spots, influenced by electrostatic effects or processing environments,
            and may concentrate on edges or sensitive areas.
        specialty:
          appearance: Carbon soot on specialty materials appears as a dark, sooty layer that adapts to unique surfaces, such
            as coatings or advanced polymers, resulting in a customized dirty appearance with texture variations.
          coverage: Coverage is highly variable, from sparse to extensive, tailored to the material's use case, with potential
            for heavy accumulation in specialized applications or harsh conditions.
          pattern: Distribution depends on material properties, often showing patches, streaks, or uniform layers influenced
            by specific design, exposure, and environmental factors.
        stone:
          appearance: Carbon soot deposits on stone appear as a dark, charcoal-like coating that can mask natural colors and
            textures, giving a dirty, stained look with a slightly abrasive feel.
          coverage: Coverage varies from sparse to extensive, with heavier deposits in protected niches or near pollution
            sources, and lighter coverage on smooth, exposed surfaces.
          pattern: Distribution is often patchy or streaky, concentrating in crevices, rough areas, or sheltered parts, and
            may form patterns influenced by surface porosity and environmental exposure.
        wood:
          appearance: On wood, carbon soot looks like a dark, sooty film that can penetrate porous grains, resulting in a
            grimy, blackened surface that may feel gritty.
          coverage: Coverage is usually uneven, ranging from light spotting to dense layers, especially in corners or near
            heat sources, with variations based on wood texture.
          pattern: It tends to settle in patches or along grain lines, with higher accumulation in recessed areas and less
            on exposed surfaces, often showing directional streaks from air currents.
