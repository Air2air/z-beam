description: Carbon-soot contamination, it arises from incomplete combustion in engines and furnaces, thus forming black residue
  of fine particulates. This residue clings tightly and embeds deeply into surfaces, distinguishing itself from dust by resisting
  water and brushing, while on steel and concrete it alters texture and penetrates pores. Removal challenges include scratching
  risks and chemical residues, yet laser cleaning vaporizes soot precisely and preserves substrate integrity thus.
