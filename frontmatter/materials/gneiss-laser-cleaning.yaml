faq:
  presentation: collapsible
  items:
  - id: what-makes-laser-cleaning-effective-for
    title: What makes laser cleaning effective for gneiss stone?
    content: When laser cleaning gneiss, you'll want to dial in the right power levels right from the start. This metamorphic
      stone holds up well under controlled laser passes because its dense structure resists deep penetration, so the process
      clears surface contaminants without cracking the material. In practice, operators line up short bursts to target grime
      and oxidation layers that build up over time. Compared to softer sedimentary stones, gneiss demands a steadier hand
      to avoid uneven heating, which can lead to micro-fractures if not managed. Overall, this approach achieves a clean finish
      while preserving the stone's natural patterns. The key point here is starting slow to test adhesion of the dirt. In
      most cases, it works out efficiently for restoration projects. Just wrap up with a cool-down period to prevent thermal
      stress.
    metadata:
