  - id: what-safety-considerations-should-i-keep
    title: What safety considerations should I keep in mind when laser cleaning gneiss?
    content: The key with gneiss during laser cleaning is monitoring dust generation closely, as its hard surface can kick
      up fine particles into the air. You'll find that protective gear lines up essential here—think respirators and sealed
      suits—to handle any silica release from the stone's composition. In our experience, this metamorphic rock tends to fracture
      along its bands if overheated, so set up barriers to contain debris. Operators typically ramp up ventilation systems
      to clear fumes from vaporized contaminants. Compared to granite, gneiss shows more variable layering, which heightens
      the risk of unexpected spalling. Essentially, conduct a site assessment first to address airflow. This cuts down on
      health hazards significantly. Overall, prioritizing eye protection and training ensures safe operations. End by inspecting
      for residual heat to avoid burns.
    metadata:
      topic: safety considerations should i keep
      severity: critical
      acceptedAnswer: true
      expertInfo:
