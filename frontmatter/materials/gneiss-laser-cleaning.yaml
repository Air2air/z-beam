      _open: false
      order: 2
  - id: how-do-i-set-up-the
    title: How do I set up the laser cleaning process for gneiss effectively?
    content: When cleaning gneiss, watch the stone's layered structure as you set up your equipment. Start by positioning
      the laser head at a consistent distance to maintain even coverage across its foliated patterns. This durable metamorphic
      material responds best to pulsed modes that remove encrustations without compromising its compressive integrity. We've
      found that scanning in overlapping paths helps address porosity pockets where dirt hides. In contrast to limestone,
      gneiss requires finer control to prevent surface roughening from its inherent toughness. The process generally involves
      pre-wetting the area to reduce dust, followed by methodical passes. This improves adhesion removal while keeping the
      finish smooth. Typically, multiple light treatments achieve solid results. To wrap up, always calibrate for the stone's
      resistance to ensure no subsurface damage occurs.
