faq:
  presentation: collapsible
  items:
  - id: can-you-safely-use-a-laser
    title: Can you safely use a laser cleaner to remove paint or contamination from a fiberglass surface?
    content: Laser cleaning is strongly discouraged for fiberglass composites, particularly since the polymer resin absorbs
      near-infrared energy at 1064 nm so readily. This leads to thermal degradation. Notably, even at a conservative fluence
      of 5 J/cm², the resin matrix can burn and vaporize, thus catastrophically compromising the material's structural integrity.
    metadata:
      topic: you safely use a laser
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: true
      order: 1
  - id: what-happens-to-fiberglass-when-its
    title: What happens to fiberglass when it's hit with a laser during cleaning?
    content: The 1064 nm laser energy gets strongly absorbed by the polymer resin, particularly triggering rapid thermal decomposition
      and ablation at fluences around 5 J/cm². This leaves exposed, frayed glass fibers and a charred surface behind, thus
      critically undermining the material's structural integrity. The composite simply isn't suited for this cleaning method.
    metadata:
      topic: happens to fiberglass it's hit
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 2
  - id: are-there-any-specific-laser-types
    title: Are there any specific laser types or settings (wavelength, power) that make cleaning fiberglass less destructive?
    content: UV lasers at 5 J/cm² particularly minimize thermal effects, yet fiberglass proves highly vulnerable. Even under
      optimized ns-pulse settings, the resin matrix remains prone to degradation. Thus, most industrial systems face material
      damage risks, deeming this application largely unsuitable.
    metadata:
      topic: there any specific laser types
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 3
  - id: what-is-the-best-alternative-to
    title: What is the best alternative to laser cleaning for preparing or restoring fiberglass surfaces?
    content: Particularly for fiberglass restoration, gentle mechanical abrasion using plastic media or chemical stripping
      is preferred. These approaches notably avoid the thermal risks of laser processing, which requires precise control below
      5 J/cm² to prevent resin degradation in the composite matrix.
    metadata:
      topic: the best alternative to laser
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 4
  - id: if-a-laser-accidentally-contacts-fiberglass
    title: If a laser accidentally contacts fiberglass, what kind of damage should I look for?
    content: Examine for visible charring, like brown or black marks, alongside a pitted and bubbled surface texture. Specifically,
      the 1064 nm wavelength ablates the resin matrix, exposing brittle glass fibers. Thus, it leads to substantial loss of
      surface gloss and structural integrity.
    metadata:
      topic: if a laser accidentally contacts
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 5
  - id: what-are-the-specific-health-hazards
    title: What are the specific health hazards of laser cleaning fiberglass compared to cleaning metal?
    content: Unlike metal dust, laser cleaning fiberglass at 5 J/cm² particularly generates toxic resin fumes and aerosolizes
      sharp sub-50μm glass fibers. Notably, these pose a severe inhalation risk, thus often requiring HEPA filtration beyond
      standard PPE.
    metadata:
      topic: the specific health hazards of
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 6
  - id: why-is-fiberglass-so-problematic-for
    title: Why is fiberglass so problematic for laser cleaning compared to materials like rust or paint on steel?
    content: Notably, unlike steel, fiberglass's polymer resin strongly absorbs 1064 nm laser energy. This indicates the substrate
      itself becomes vulnerable at fluences above ~5 J/cm², beyond just surface contaminants. Thus, precise parameter control
      remains essential to prevent thermal damage to the composite material.
    metadata:
      topic: fiberglass so problematic for laser
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 7
  - id: is-there-any-scenario-where-laser
    title: Is there any scenario where laser treatment of fiberglass is acceptable, such as for very light surface mold release?
    content: Even with ultra-thin mold release, the risk remains extreme. Specifically, the fluence needed for contaminant
      removal—typically over 5 J/cm²—will almost certainly surpass the damage threshold of the sensitive polymer matrix, thus
      causing irreversible degradation to the underlying resin.
    metadata:
      topic: there any scenario laser treatment
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 8
  - id: how-does-the-weave-and-resin
    title: How does the weave and resin type (e.g., epoxy vs. polyester) affect its reaction to a laser?
    content: Epoxy and polyester resins degrade at varying temperatures, yet notably, both sustain damage from the ~5 J/cm²
      fluence essential for cleaning. Weave patterns play no role; specifically, the 1064 nm laser energy absorbs into the
      resin matrix binding the glass fibers, thus undermining the composite's structural integrity irrespective of its design.
    metadata:
