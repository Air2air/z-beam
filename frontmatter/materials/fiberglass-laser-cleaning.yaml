  components:
    settings_description: When laser cleaning fiberglass, I've found that starting with a gentle scan speed helps the process
      go smoothly. This composite material holds up well because of its strong, lightweight fibers that resist corrosion in
      tough environments like marine or aerospace settings. But watch out midway—its poor heat spread can cause localized
      damage if you push too hard, so adjust to multiple light passes instead of one heavy go. Tends to clean contaminants
      without scratching the surface when you keep the energy low and overlap spots just right. This way, you preserve its
      flexibility for applications in wind energy or construction.
    micro:
      before: When we look at the fiberglass surface before laser cleaning, contaminants cover the fibers thickly. Dust and
        residues cling to every strand, making the texture rough and uneven. The whole area appears cluttered, hiding the
        material's true structure underneath.
      after: After the laser treatment, the surface shows clear, exposed fibers standing out sharply. No more buildup mars
        the view, and the strands look smooth and defined. We've uncovered a pristine layer that reveals the fiberglass's
        natural form clearly.
