      - id: high-thermal-expansion-coefficient
        question: How does the high thermal expansion coefficient of PTFE affect laser cleaning process stability?
        answer: PTFE's high thermal expansion coefficient of ~135×10⁻⁶/°C demands careful thermal stress management in laser
