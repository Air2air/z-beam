          as browning or yellowing at fluences over ~5 J/cm², signaling polymer degradation. This process using optimal 1064
          nm wavelength ablation removes contaminants without changing the substrate's inherent properties.
        topic: visual indicators
        severity: critical
        acceptedAnswer: true
