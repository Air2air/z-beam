components:
  settingsDescription: When laser cleaning Polytetrafluoroethylene, watch its high reflectivity right away. It reflects light
    much more than typical plastics, slowing the process down. Start low on power to build absorption gradually. I've seen
    multiple passes work best here. Unlike conductive metals, its poor heat spread risks local burns, so keep scans quick.
    This restores surfaces cleanly without warping.
  micro:
    before: At 1000x magnification, the contaminated surface bristles with jagged debris and sticky residues.
    after: Dark smudges cluster in pockets, dulling the overall texture.
