      items:
      - id: damaging-the-base-metal
        question: What are the best laser parameters (wavelength, power, pulse duration) for cleaning rust or oxide from a
          nickel surface without damaging the base metal?
        answer: For nickel oxide removal, I recommend a 1064 nm wavelength with 100 W average power and 10 ns pulses. Specifically,
          maintain fluence near 2.5 J/cm² to selectively ablate contaminants while preserving the substrate. Thus, employing
          a 50 μm spot size at 500 mm/s scan speed delivers optimal cleaning efficiency without thermal damage to the base
          metal.
        topic: damaging the base metal
        severity: medium
        acceptedAnswer: true
        expertInfo: &id002
          name: Todd Dunning
          title: MA
          expertise: *id001
      - id: nickel-plating
        question: Can a fiber laser effectively remove nickel plating from a substrate like copper or steel?
        answer: Yes, particularly at around 100 W and 1064 nm, a fiber laser can effectively strip nickel plating. Tuning
          parameters like a 2.5 J/cm² fluence presents the main challenge, thus ensuring complete ablation of the nickel layer
          without thermally harming the underlying copper or steel substrate, which has a distinct ablation threshold.
        topic: nickel plating
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: specific-safety-hazards
        question: What specific safety hazards are associated with laser cleaning nickel and nickel alloys?
        answer: Nickel's ablation threshold of 2.5 J/cm² notably produces highly toxic, carcinogenic fumes. Specifically,
          these respiratory risks demand efficient fume extraction and suitable PPE, as the resulting aerosols represent a
          key safety issue in 1064 nm laser cleaning operations.
        topic: specific safety hazards
        severity: critical
        acceptedAnswer: true
        expertInfo: *id002
      - id: why-does-laser-cleaning-sometimes-leave-a-discolor
        question: Why does laser cleaning sometimes leave a discolored or rainbow-like pattern on a nickel surface?
        answer: Notably, the rainbow discoloration stems from a thin oxide layer caused by residual heat. Thus, shorter 10
          ns pulses at higher 500 mm/s scan speeds, or an argon shield, prevent this tint by limiting thermal input to the
          nickel surface.
        topic: Why does laser cleaning sometimes leave a discolor
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: preparing-a-nickel-surface
        question: Is laser cleaning suitable for preparing a nickel surface for subsequent processes like welding or coating?
        answer: Particularly suited for nickel surface preparation, laser cleaning delivers chemical purity sans abrasives.
          Specifically, using 2.5 J/cm² fluence and 1064 nm wavelength, it removes oxides effectively, thus yielding an activated
          surface primed for welding or coating adhesion.
        topic: preparing a nickel surface
        severity: high
        acceptedAnswer: true
        expertInfo: *id002
      - id: inducing-micro-cracks
        question: How do you clean a nickel-based superalloy (like Inconel) with a laser without inducing micro-cracks or
          altering its material properties?
        answer: For nickel superalloys, particularly with nanosecond pulses of 10 ns duration and fluence under 2.5 J/cm²,
          this method minimizes thermal input. Thus, it prevents micro-cracks by limiting the heat-affected zone and preserving
          sensitive material properties.
        topic: inducing micro-cracks
        severity: high
        acceptedAnswer: true
        expertInfo: *id002
      - id: what-is-the-best-way-to-verify-that-a-nickel-surfa
        question: What is the best way to verify that a nickel surface is clean after laser processing and not just visually
          clean?
        answer: For nickel surfaces, particularly in demanding scenarios, pair white glove wipe tests with contact angle measurements.
          Notably, for critical aerospace applications, techniques like XPS verify sub-monolayer contaminant removal, thus
          optimizing surface energy for later processes.
        topic: What is the best way to verify that a nickel surfa
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: porous-or-cast
        question: Can laser cleaning be used on porous or cast nickel surfaces without trapping contaminants?
        answer: Laser cleaning of porous nickel demands precise fluence control around 2.5 J/cm², particularly to avoid contaminant
          entrapment. Thus, pairing a 100 kHz pulse rate with gas assist proficiently ejects loosened particles from intricate
          cast structures, ensuring thorough surface purification.
        topic: porous or cast
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: high-reflectivity
        question: How does the high reflectivity of nickel affect the efficiency and safety of the laser cleaning process?
        answer: Notably, nickel's high reflectivity at 1064 nm reduces process efficiency and generates hazardous reflections.
          Yet, as ablation initiates at the 2.5 J/cm² threshold fluence, surface absorption surges dramatically. We counter
          this initial hazard particularly via angled beam delivery and protective enclosures that contain stray energy.
        topic: high reflectivity
        severity: critical
        acceptedAnswer: true
        expertInfo: *id002
      - id: nickel-fumes
        question: What are the regulatory (OSHA, NIOSH) exposure limits for nickel fumes, and how do they impact laser cleaning
          operations?
        answer: The OSHA PEL for nickel metal fumes stands at 1 mg/m³, a level readily surpassed during laser ablation with
          100W average power. Particularly, effective fume extraction proves essential, since the 1064 nm wavelength readily
          produces inhalable particulates. Thus, ongoing air monitoring helps maintain compliance with these rigorous exposure
