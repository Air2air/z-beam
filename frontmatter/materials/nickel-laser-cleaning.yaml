faq:
  presentation: collapsible
  items:
  - id: what-are-the-best-laser-parameters
    title: What are the best laser parameters (wavelength, power, pulse duration) for cleaning rust or oxide from a nickel
      surface without damaging the base metal?
    content: For nickel oxide removal, I recommend a 1064 nm wavelength with 100 W average power and 10 ns pulses. Specifically,
      maintain fluence near 2.5 J/cm² to selectively ablate contaminants while preserving the substrate. Thus, employing a
      50 μm spot size at 500 mm/s scan speed delivers optimal cleaning efficiency without thermal damage to the base metal.
    metadata:
      topic: the best laser parameters (wavelength,
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: true
      order: 1
  - id: can-a-fiber-laser-effectively-remove
    title: Can a fiber laser effectively remove nickel plating from a substrate like copper or steel?
    content: Yes, particularly at around 100 W and 1064 nm, a fiber laser can effectively strip nickel plating. Tuning parameters
      like a 2.5 J/cm² fluence presents the main challenge, thus ensuring complete ablation of the nickel layer without thermally
      harming the underlying copper or steel substrate, which has a distinct ablation threshold.
