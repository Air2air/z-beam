  components:
    subtitle: Zinc offers exceptional corrosion resistance with a minimal 0.003 mm/year
      loss rate
    description: When setting up laser cleaning for zinc, be careful with its low
      melting point around 420°C – it'll liquefy fast if your power spikes. We typically
      use about 100 W at 1064 nm wavelength to strip oxides or galvanizing residue
      without warping the surface, since its high reflectivity of 0.95 means low absorption
      at first. I've found that keeps the energy density near 5 J/cm², with a 50 μm
      spot size and 500 mm/s scan speed for even passes. But make sure you overlap
      by 50% so you don't miss spots, and watch for vapor buildup because its good
      thermal conductivity spreads heat quickly. End with a cool-down check to avoid
      thermal shock.
    micro:
      before: When examining the contaminated zinc surface at 1000x magnification,
        I've noticed irregular bumps and dark smudges everywhere. Grime layers build
        up thickly, dulling the metal's natural tone completely. These spots create
        a patchy, worn look that hides the underlying structure.
      after: After laser treatment on the zinc surface at 1000x magnification, it
        appears smooth and evenly lit now. The clean areas reflect light brightly
        without any lingering marks. This polished finish reveals the metal's true
        clarity
    settings_description: We've found zinc cleans up nicely with laser settings. It
      reflects a lot of light, so we start low on power to avoid scattering energy.
      This keeps the surface cool and removes grime without melting. But watch the
      heat buildup mid-process—it spreads fast because zinc conducts well. Adjust
      overlap to stay safe, and you'll get a smooth finish every time.
