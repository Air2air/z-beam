faq:
  presentation: collapsible
  items:
    - id: can-a-laser-cleaning-system-remove
      title: >-
        Can a laser cleaning system remove tarnish or surface contamination from gold without damaging the underlying
        material?
      content: >-
        Yes, as a laser cleaning expert from Indonesia, I can confirm that pulsed laser systems work efficiently to
        remove tarnish and surface contaminants from gold. This process precisely targets just the top layer, preserving
        the underlying material without heat damage—ideal for jewelry and artifacts, ya.
      metadata:
        topic: a laser cleaning system remove
        severity: critical
        acceptedAnswer: true
        expertInfo:
          name: Ikmanda Roswati
          title: Ph.D.
          expertise:
            - Ultrafast Laser Physics and Material Interactions
      Display:
        Open: true
        order: 1
    - id: what-is-the-best-laser-wavelength
      title: >-
        What is the best laser wavelength (e.g., 1064nm, 532nm) for cleaning delicate gold surfaces, such as historical
        artifacts or electronics contacts?
      content: >-
        For delicate gold surfaces, that method relies on 532 nm green light as the optimal wavelength. Gold's
        reflectivity decreases sharply at shorter wavelengths, allowing ablation efficiently at low fluence around 0.8
        J/cm². This approach cuts thermal damage risks to sensitive substrates like historical artifacts or electronics,
        while precisely removing contaminants.
      metadata:
        topic: the best laser wavelength (e.g.,
        severity: critical
        acceptedAnswer: true
        expertInfo:
          name: Ikmanda Roswati
          title: Ph.D.
          expertise:
            - Ultrafast Laser Physics and Material Interactions
      Display:
        Open: false
        order: 2
    - id: how-do-you-prevent-the-high
      title: >-
        How do you prevent the high reflectivity of gold from causing safety issues or damaging the laser cleaning
        equipment itself?
      content: >-
        We use a 532 nm wavelength practically to improve gold absorption and cut down on hazardous reflections. This
        process includes optical isolators and beam dumps for safeguarding the 15 W laser source against back-reflected
        energy. Operators need to wear wavelength-specific eyewear.
      metadata:
        topic: do you prevent the high
        severity: critical
        acceptedAnswer: true
        expertInfo:
          name: Ikmanda Roswati
          title: Ph.D.
          expertise:
            - Ultrafast Laser Physics and Material Interactions
      Display:
        Open: false
        order: 3
    - id: is-laser-cleaning-suitable-for-removing
      title: >-
        Is laser cleaning suitable for removing oxidation or fire scale from gold alloys (like 14k or 18k gold) after
        heat treatment or soldering?
      content: >-
        Laser cleaning removes oxidation from gold alloys in a straightforward way, though selective ablation of
        elements like copper poses a concern. That method, with a 532 nm wavelength at 0.8 J/cm² fluence, efficiently
        minimizes the risk while preserving surface composition and color integrity.
      metadata:
        topic: laser cleaning suitable for removing
        severity: high
        acceptedAnswer: true
        expertInfo:
          name: Ikmanda Roswati
          title: Ph.D.
          expertise:
            - Ultrafast Laser Physics and Material Interactions
      Display:
        Open: false
        order: 4
    - id: what-are-the-risks-of-causing
      title: What are the risks of causing discoloration or a matte finish on a polished gold surface during laser cleaning?
      content: >-
        Discoloration and matte finishes occur straightforwardly due to micro-melting and surface roughening when
        fluence surpasses ~0.8 J/cm². This process demands precise control of parameters, such as the 50 µm spot size
        and 500 mm/s scan speed, to preserve polished gold's specular reflection without altering its microstructure.
      metadata:
        topic: the rks of causing dcoloration
        severity: medium
        acceptedAnswer: true
        expertInfo:
          name: Ikmanda Roswati
          title: Ph.D.
          expertise:
            - Ultrafast Laser Physics and Material Interactions
      Display:
        Open: false
        order: 5
    - id: can-laser-cleaning-be-used-to
      title: Can laser cleaning be used to selectively de-plate gold from a substrate without harming the base material?
      content: >-
        Absolutely, laser cleaning offers a practical way to strip gold plating from substrates like ceramics or metals,
        sparing the base material entirely. We fine-tune the wavelength and pulse energy—typically nanosecond pulses at
        1064 nm—to ablate just the gold layer with precision. That method has worked well in our Indonesian restoration
        projects.
      metadata:
        topic: laser cleaning be used to
        severity: medium
        acceptedAnswer: true
        expertInfo:
          name: Ikmanda Roswati
          title: Ph.D.
          expertise:
            - Ultrafast Laser Physics and Material Interactions
      Display:
        Open: false
        order: 6
    - id: how-does-the-karat-purity-of
      title: How does the karat (purity) of gold affect the laser cleaning process and the parameters required?
      content: >-
        In this process, lower karat gold's higher copper content raises oxidation risk during laser cleaning. To handle
        it efficiently, we reduce fluence below 0.8 J/cm² and tweak the 50 kHz repetition rate, preventing thermal
        damage to the more vulnerable alloy while achieving a pristine surface.
      metadata:
        topic: the karat (purity) of gold
        severity: critical
        acceptedAnswer: true
        expertInfo:
          name: Ikmanda Roswati
          title: Ph.D.
          expertise:
            - Ultrafast Laser Physics and Material Interactions
      Display:
        Open: false
        order: 7
    - id: what-is-the-recommended-method-for
      title: >-
        What is the recommended method for verifying that a laser cleaning process on gold has not caused any measurable
        material loss or thinning?
      content: >-
        As an Indonesian laser cleaning expert, I suggest high-precision weighing on a microbalance before and after
        this process to detect mass loss in gold artifacts. Pair it efficiently with non-contact optical profilometry
        for verifying surface integrity and preventing thinning, thus preserving the material's original thickness.
      metadata:
        topic: the recommended method for verifying
        severity: critical
        acceptedAnswer: true
        expertInfo:
          name: Ikmanda Roswati
          title: Ph.D.
          expertise:
            - Ultrafast Laser Physics and Material Interactions
      Display:
        Open: false
        order: 8
    - id: are-there-any-hazardous-fumes-generated
      title: >-
        Are there any hazardous fumes generated when laser cleaning gold, especially from alloys or surface
        contaminants?
      content: >-
        Laser cleaning gold with a 532 nm wavelength and 0.8 J/cm² fluence can aerosolize hazardous alloying elements
        like nickel or cadmium. This process demands proper fume extraction using HEPA/ULPA filtration for safety.
        Always consult the alloy's MSDS in a straightforward way to identify and mitigate risks from vaporized
        contaminants.
      metadata:
        topic: there any hazardous fumes generated
        severity: critical
        acceptedAnswer: true
        expertInfo:
          name: Ikmanda Roswati
          title: Ph.D.
          expertise:
            - Ultrafast Laser Physics and Material Interactions
      Display:
        Open: false
        order: 9
    - id: why-might-a-laser-cleaning-process
      title: >-
        Why might a laser cleaning process that works on other precious metals (like silver) not be directly applicable
        to gold?
      content: >-
        Gold's high thermal conductivity and chemical inertness call for specific laser settings, unlike those for
        reactive metals like silver. In this process, we precisely manage fluence around 0.8 J/cm² with a 532 nm
        wavelength to efficiently couple energy, removing contaminants while avoiding substrate microstructure damage.
      metadata:
        topic: might a laser cleaning process
        severity: critical
        acceptedAnswer: true
        expertInfo:
          name: Ikmanda Roswati
          title: Ph.D.
          expertise:
            - Ultrafast Laser Physics and Material Interactions
      Display:
        Open: false
        order: 10
