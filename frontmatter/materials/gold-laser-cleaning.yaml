components:
  subtitle: >-
    Gold's exceptional corrosion resistance ensures reliable performance in harsh environments while its high laser
    reflectivity demands precise wavelength control for effective surface treatment
  micro:
    before: >-
      When you examine the gold surface at high magnification before cleaning, you see a layer of dark, uneven grime
      covering the metal. Spots of residue cling tightly, making the texture rough and irregular across the whole area.
      This contamination hides the true shine beneath, blocking any clear view of the base material.
    after: >-
      After laser treatment, the gold surface appears smooth and uniform under magnification. The clean metal gleams
      brightly now, with no traces of dirt or spots remaining. You notice the even finish restores
  settingsDescription: >-
    When laser cleaning gold, unlike copper or silver, its extreme reflectivity bounces most energy away. We typically
    switch to shorter wavelengths for better absorption. This lets you remove contaminants without melting the surface.
    Watch out mid-process for uneven heating—dial down power if spots heat up. We've found multiple light passes restore
    that pristine finish safely. Adjust overlap to avoid warping delicate pieces.
