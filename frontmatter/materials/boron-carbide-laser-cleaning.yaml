micro:
  before: The contamination on boron carbide surfaces, it manifests as irregular clusters of adherent particles, which obscure
    the underlying crystalline facets under high magnification. These oxides, they persist tenaciously in crevices formed
    during industrial exposure, creating a mottled pattern that hinders material integrity. Influenced from environmental
    factors, the deposits exhibit a porous texture, dependent from prolonged contact with abrasives, that demonstrates uneven
    adhesion across the hard matrix.
  after: After laser cleaning, the surface exhibits a restored morphology, where the process yields clean exposure of the
    ceramic's inherent granularity. This layer, it removes selectively without altering the substrate's durability, leading
    to a uniform sheen that highlights the carbide's fracture edges. The cleaned areas show smoothness in the grain boundaries,
    which confirms the technique's effectiveness for such resilient materials. It appears contamination varies in removal
    efficiency, yet the boron carbide persists with its characteristic toughness.
