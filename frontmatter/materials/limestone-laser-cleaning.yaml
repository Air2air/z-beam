        question: How does laser cleaning compare to traditional methods like chemical poultices or micro-abrasion for removing
          black gypsum crusts from historic limestone buildings?
        answer: Specifically, laser cleaning at 12 J/cm² fluence removes black gypsum crusts with selective precision, outperforming
          abrasive techniques. Notably, this approach safeguards the stone's original surface and patina, avoiding sub-surface
          damage typical of micro-sanding. Thus, the non-contact method eradicates chemical residue risks associated with
          poultices.
