      - id: biological-growth
        question: What laser settings (wavelength, power, pulse duration) are safe and effective for cleaning biological growth
          from limestone without causing surface damage?
        answer: For limestone cleaning, I recommend a 1064 nm wavelength, specifically paired with 100 W average power and
          10 ns pulses. Keep fluence below 12 J/cm², particularly to avoid yellowing, while it removes biological growth effectively.
          Thus, always run preliminary tests on small areas to confirm the specific limestone's ablation threshold prior to
          full treatment.
