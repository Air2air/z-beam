      order: 9
  - id: what-is-the-typical-operational-cost
    title: What is the typical operational cost and cleaning rate (e.g., m²/hour) for laser cleaning limestone on a large-scale
      restoration project?
    content: In large-scale limestone restoration projects, cleaning rates typically reach 1-2 m²/hour with a 100 W laser
      operating at 12 J/cm². Notably, initial operational costs exceed those of traditional methods, yet lifecycle expenses
      prove lower, particularly from minimized waste, water use, and avoidance of chemical or abrasive media.
