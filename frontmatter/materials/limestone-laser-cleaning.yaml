    _display:
      _open: false
      order: 8
  - id: for-architectural-restoration-what-documentation-or
    title: For architectural restoration, what documentation or testing is required before laser cleaning a historically significant
      limestone facade or sculpture?
    content: Prior to laser cleaning historic limestone, a comprehensive analysis—particularly with XRD and SEM—is essential.
      To verify effectiveness, initiate a test patch at 12 J/cm² fluence and 500 mm/s scan speed. Continuous spectroscopic
      monitoring throughout the process thus ensures the 1064 nm wavelength treatment preserves the substrate without thermal
      alteration.
