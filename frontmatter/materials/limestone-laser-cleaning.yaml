    _display:
      _open: false
      order: 7
  - id: how-effective-is-laser-cleaning-at
    title: How effective is laser cleaning at removing salt efflorescence from within the pore structure of limestone, compared
      to just surface contamination?
    content: Particularly effective at removing surface salts at 12 J/cm², laser cleaning struggles with deep pore contamination.
      The 1064 nm wavelength shows limited penetration into limestone's microstructure. Thus, for crystalline salts in pores,
      combining laser treatment with desalination poultices offers a more comprehensive solution.
    metadata:
      topic: effective laser cleaning at removing
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
