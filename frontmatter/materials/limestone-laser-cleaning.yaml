pageTitle: Limestone Laser Cleaning
pageDescription: Limestone fails in laser cleaning when excessive heat decomposes its calcite structure, causing discoloration
  or cracking. Limestone forms as sedimentary rock, primarily calcium carbonate from marine deposits, and exhibits high porosity
  that traps pollutants. Thus, it matters in stone conservation; laser at 1064 nm wavelength removes soot or graffiti efficiently
  without abrasion, preserving historical surfaces. Industrial applications include facade restoration, where controlled pulses
  vaporize contaminants while minimizing substrate alteration. Evidence shows optimal fluence prevents phase changes in the
  mineral matrix.
