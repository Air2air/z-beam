        question: Why does laser-cleaned limestone sometimes appear lighter or 'whitened' compared to the surrounding area,
          and how can this be minimized or avoided?
        answer: The whitening effect notably emerges when laser fluence surpasses ~12 J/cm², stripping the natural patina
          and modifying surface micro-roughness. Thus, to secure a harmonious blend, precisely adjust power and scan speed
          near 500 mm/s for cleaning without excess processing of the underlying stone.
