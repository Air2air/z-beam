faq:
  presentation: collapsible
  items:
  - id: what-laser-settings-wavelength-power-pulse
    title: What laser settings (wavelength, power, pulse duration) are safe and effective for cleaning biological growth from
      limestone without causing surface damage?
    content: For limestone cleaning, I recommend a 1064 nm wavelength, specifically paired with 100 W average power and 10
      ns pulses. Keep fluence below 12 J/cm², particularly to avoid yellowing, while it removes biological growth effectively.
      Thus, always run preliminary tests on small areas to confirm the specific limestone's ablation threshold prior to full
      treatment.
    metadata:
      topic: laser settings (wavelength, power, pulse
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: true
      order: 1
  - id: how-does-laser-cleaning-compare-to
    title: How does laser cleaning compare to traditional methods like chemical poultices or micro-abrasion for removing black
      gypsum crusts from historic limestone buildings?
    content: Specifically, laser cleaning at 12 J/cm² fluence removes black gypsum crusts with selective precision, outperforming
      abrasive techniques. Notably, this approach safeguards the stone's original surface and patina, avoiding sub-surface
      damage typical of micro-sanding. Thus, the non-contact method eradicates chemical residue risks associated with poultices.
    metadata:
      topic: laser cleaning comp to traditional
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 2
  - id: can-laser-cleaning-be-used-to
    title: Can laser cleaning be used to remove paint or graffiti from porous limestone without driving contaminants deeper
      into the stone?
    content: Laser cleaning, particularly suited for porous limestone, removes paint effectively without forcing contaminants
      deeper. Employing a 1064 nm wavelength and 12 J/cm² fluence, the method ablates surface coatings while safeguarding
      the substrate. Notably, achieving full ghosting removal thus requires a subsequent poultice treatment.
    metadata:
      topic: laser cleaning be used to
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 3
  - id: what-are-the-specific-safety-hazards
    title: What are the specific safety hazards when laser cleaning limestone, especially regarding the composition of the
      resulting dust and fumes?
    content: When using a 1064 nm laser to clean limestone, fine calcium carbonate dust is produced. Though generally less
      hazardous than silica, proper respiratory protection and industrial fume extraction remain essential, particularly with
      the 100 W power and 500 mm/s scan speed employed.
    metadata:
      topic: the specific safety hazards laser
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 4
  - id: why-does-lasercleaned-limestone-sometimes-appear
    title: Why does laser-cleaned limestone sometimes appear lighter or 'whitened' compared to the surrounding area, and how
      can this be minimized or avoided?
    content: The whitening effect notably emerges when laser fluence surpasses ~12 J/cm², stripping the natural patina and
      modifying surface micro-roughness. Thus, to secure a harmonious blend, precisely adjust power and scan speed near 500
      mm/s for cleaning without excess processing of the underlying stone.
    metadata:
      topic: laser-cleaned limestone sometimes appear lighter
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 5
  - id: is-laser-cleaning-suitable-for-all
    title: Is laser cleaning suitable for all types of limestone, and how do variations in density, porosity, and mineral
      composition affect the cleaning process?
    content: Laser cleaning handles most limestone types effectively, but high-porosity varieties particularly demand fluence
      kept below 12 J/cm² to avoid etching. Iron oxide presence can lead to discoloration, thus calling for parameter tweaks
      such as a 500 mm/s scan speed to ensure even outcomes.
    metadata:
      topic: laser cleaning suitable for all
      severity: high
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 6
  - id: what-is-the-maximum-safe-operating
    title: What is the maximum safe operating power density (fluence) for limestone to prevent etching, melting, or other
      irreversible surface damage?
    content: For calcite, limestone's main mineral, the ablation threshold typically starts at around 12 J/cm². Notably, surpassing
      this fluence can cause vitrification and discoloration; thus, testing an inconspicuous spot is crucial to fine-tune
      your laser settings for safe, effective cleaning.
    metadata:
      topic: the maximum safe operating power
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
