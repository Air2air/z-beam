  components:
    settings_description: 'When laser cleaning limestone, watch its porosity first. It soaks up dirt and moisture more than
      denser stones like granite. This traps contaminants deep, so you risk incomplete removal or surface damage if you blast
      too hard.


      I''ve seen heat build up quickly because limestone conducts it poorly, unlike metals that spread it out. Start slow
      with gentle pulses to avoid cracking the stone.


      Tends to absorb laser energy moderately, better than reflective marbles. Keep passes light and overlap them a bit. This
      clears buildup without etching the texture. Adjust if you spot whitening—dial back power right away.'
    micro:
      before: I've seen limestone surfaces like this before cleaning, where grime covers everything in a dull layer. Dark
        specks and uneven bumps scatter across the texture, making it feel heavy and obscured. The whole area appears choked
        with fine debris that hides the natural grain.
      after: After the laser treatment, that same surface shines with a fresh, even glow. Smooth patches emerge where the
        dirt once stuck, revealing clean edges and subtle patterns. Now it looks open and vibrant, free from those clinging
        residues.
