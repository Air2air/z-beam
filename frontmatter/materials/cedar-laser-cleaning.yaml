components:
  description: When laser cleaning cedar, you'll want to start with low energy density around 2.5 J/cm² at 100 W and 1064
    nm wavelength to avoid thermal damage, given its low destruction temperature of 523 K. Its high porosity at 0.79 fraction
    and density of 350 kg/m³ make it absorb laser energy quickly, reducing reflectivity to just 0.065, but the low thermal
    conductivity of 0.11 W/m·K can lead to localized charring if scan speed drops below 500 mm/s. We typically use 50% overlap
    in two passes to restore surfaces evenly without splintering its modest flexural strength of 51 MPa. Watch for uneven
    ablation on porous grains.
  settingsDescription: When laser cleaning cedar, we typically begin by selecting a low-power setting to match its soft, porous
    structure. This wood absorbs laser energy readily because of its low reflectivity, which allows contaminants to vaporize
    without much resistance. We've found that starting with a focused spot size helps expose surface layers evenly, reducing
    the risk of uneven cleaning on its lightweight frame. As you proceed, maintain a moderate scan speed to account for cedar's
    poor heat conduction—heat tends to localize and can char the material if you push too fast. In our experience, this calls
    for two passes with significant overlap to restore the wood's natural grain without embedding residues in its open pores.
    Watch out for overexposure in the middle of thicker sections, where porosity traps moisture and amplifies thermal buildup;
    dial back the energy density there to avoid splintering. Overall, these adjustments preserve cedar's flexibility for applications
    like furniture restoration or heritage work.
  micro:
    before: Grime clings to the cedar's porous fibers, making the surface look uneven and dull. Fine particles scatter across
      the textured ridges, blocking the natural wood patterns below. Dark residues fill the tiny crevices, giving the whole
      area a coated and obscured appearance.
    after: Laser treatment removes the grime from the cedar's porous fibers, revealing a smooth and vibrant surface. The fine
      particles vanish from the textured ridges, exposing clear wood patterns underneath. Light residues disappear from the
      tiny crevices, restoring
