faq:
  _section:
    sectionTitle: FAQ
    sectionDescription: Common Questions and Answers
    sectionMetadata: faq
    icon: help-circle
    order: 46
    variant: default
  presentation: collapsible
  items:
  - id: can-cedar-wood-be-safely-laser
    title: Can cedar wood be safely laser cleaned without causing surface damage or discoloration?
    content: Yes, cedar can be fairly safely laser cleaned using precise parameters to avoid charring. We typically recommend
      a 1064 nm wavelength at 2.5 J/cm² fluence for effectively removing contaminants while preserving the wood's natural
      resins. This method minimizes heat diffusion, safeguarding the delicate surface from discoloration.
    metadata:
      topic: cedar wood be safely laser
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: true
      order: 1
  - id: what-laser-settings-wavelength-power-pulse
    title: What laser settings (wavelength, power, pulse duration) work best for cleaning soot and mildew from cedar siding?
    content: For cedar siding, I'd typically recommend a 1064 nm wavelength at 100 W average power with 12 ns pulses. Keep
      fluence fairly around 2.5 J/cm² to effectively remove soot and mildew without harming the wood substrate. This setup
      delivers sufficient energy for contaminant ablation while limiting heat diffusion into the delicate cedar surface.
    metadata:
      topic: laser settings (wavelength, power, pulse
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: false
      order: 2
  - id: how-does-laser-cleaning-affect-cedars
    title: How does laser cleaning affect cedar's natural weather-resistant properties and preservative treatments?
    content: A well-tuned 1064nm laser cleaning at 2.5 J/cm² fluence pretty effectively strips away contaminants while safeguarding
      cedar's natural protective oils. This fairly minimally invasive approach preserves the wood's built-in rot resistance
      without undermining surface-applied sealants.
    metadata:
      topic: laser cleaning affect cedar's natural
      severity: high
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: false
      order: 3
  - id: is-laser-cleaning-effective-for-removing
    title: Is laser cleaning effective for removing old paint from cedar shingles without damaging the wood grain?
    content: Yes, laser cleaning pretty effectively strips old paint from cedar shingles while keeping the delicate grain
      intact. Basically, a 1064 nm wavelength at 2.5 J/cm² fluence ablates the paint layer selectively, without harming the
      underlying wood substrate—unlike abrasive mechanical methods.
    metadata:
      topic: laser cleaning effective for removing
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: false
      order: 4
  - id: what-safety-precautions-are-needed-when
    title: What safety precautions are needed when laser cleaning cedar, particularly regarding fumes and particulates?
    content: Cedar's natural resins produce pretty significant toxic fumes during ablation at 100W. For safety, you'll typically
      require industrial ventilation plus a P100 respirator to manage the fine wood particulates and volatile organic compounds.
      Keep fluence at 2.5 J/cm² to reduce charring and fire hazards.
    metadata:
      topic: safety precautions needed laser cleaning
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: false
      order: 5
  - id: does-laser-cleaning-cedar-create-surface
    title: Does laser cleaning cedar create surface conditions that require immediate re-sealing or protective coating?
    content: Proper laser cleaning at 2.5 J/cm² fluence basically opens up cedar's surface porosity, boosting coating adhesion.
      This yields a fairly ideal, contaminant-free substrate that doesn't need immediate sealing, though it should get coated
      within the typical preparation window for top-notch bond strength.
    metadata:
      topic: laser cleaning cedar create surface
      severity: high
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: false
      order: 6
  - id: how-does-laser-cleaning-compare-to
    title: How does laser cleaning compare to traditional methods (sanding, chemical strippers) for restoring antique cedar
      furniture?
    content: Laser cleaning basically preserves cedar's delicate patina way better than abrasive methods. At our 2.5 J/cm²
      fluence threshold, contaminants get fairly selectively removed without damaging the wood grain, ideal for intricate
      carvings where sanding would ruin original surface details.
    metadata:
      topic: laser cleaning comp to traditional
      severity: high
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: false
      order: 7
  - id: can-laser-systems-effectively-remove-biological
    title: Can laser systems effectively remove biological growth (moss, algae, lichen) from cedar roofs without damaging
      the shakes?
    content: Yes, laser systems pretty effectively remove biological growth from cedar shakes using 2.5 J/cm² fluence. That
      near-infrared wavelength at 1064 nm ablates moss and lichen while fairly minimizing heat penetration into the wood's
      porous structure, preventing damage.
    metadata:
      topic: laser systems effectively remove biological
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: false
      order: 8
  - id: what-are-the-limitations-of-laser
    title: What are the limitations of laser cleaning for heavily weathered or degraded cedar surfaces?
    content: Severely degraded cedar with its structural integrity pretty much compromised presents a major risk. Using our
      standard 2.5 J/cm² fluence, friable wood fibers can get ablated, resulting in surface loss. When the substrate is basically
      the contaminant, mechanical methods are typically better for preserving the leftover sound material.
    metadata:
      topic: the limitations of laser cleaning
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: false
      order: 9
  - id: how-does-cedars-density-and-grain
    title: How does cedar's density and grain pattern affect laser cleaning efficiency and results?
    content: Cedar's density varies fairly between earlywood and latewood, requiring precise fluence control around 2.5 J/cm²
      to prevent differential etching along the grain. Knotty areas typically need lower power settings than clear vertical
      grain to avoid charring, and a 500 mm/s scan speed helps manage this heterogeneity for uniform cleaning.
    metadata:
      topic: cedar's density and grain pattern
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
