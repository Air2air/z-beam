title: Cedar Laser Cleaning
description: When laser cleaning Cedar, keep an eye on its natural porosity, which draws contaminants deep into the wood,
  so you'll need to tweak scan speeds to prevent uneven ablation. That same porosity helps bounce back surface integrity fast
  afterward, letting vapors vent out freely without trapping heat under the wood fibers.
