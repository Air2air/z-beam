components:
  settings_description: When laser cleaning marble, the main challenge we face is its tendency to crack under uneven heating,
    unlike tougher granites that handle heat more evenly across their structure. This stems from marble's metamorphic layers,
    which expand differently than surrounding stones, so we adjust by using slower scan speeds and multiple gentle passes
    to distribute energy without stressing those seams. We've found this restores delicate heritage surfaces beautifully.
    Just watch for subsurface discoloration at the end—dial back power if you spot it.
  micro:
    before: When examining the contaminated marble surface at high magnification, I've noticed layers of dark grime clinging
      tightly to the stone's uneven texture. Dust particles scatter across the pits and cracks, making the whole area look
      dull and patchy under the light. This buildup hides the natural patterns, turning what should be smooth into a rough,
      obscured mess.
    after: After the laser treatment, the same surface appears refreshed and even, with the grime completely lifted away.
      The stone's original veins and colors shine through clearly
