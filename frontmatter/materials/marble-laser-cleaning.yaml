micro:
  before: Contaminated marble surface at high magnification, it reveals irregular black deposits clustered in pores. These
    patterns, they follow natural veins of the stone, thus create shadowy networks across crystalline grains. Dust and oxide
    layers cling tightly, and surface texture appears rough with scattered pits. Contamination still persists in crevices,
    so overall appearance shows dullness and unevenness.
  after: Laser cleaning applies short pulses, contamination ablates layer by layer, and clean surface emerges. Following treatment,
    marble exhibits smooth crystalline facets already free from residues. Veins stand out clearly now, and porosity fills
    with uniformity. This process removes oxides effectively, thus restores natural luster to the metamorphic structure. Clean
    areas demonstrate sharp edges on grains, while original patterns enhance without damage. Surface already shows durability
    in its polished state.
