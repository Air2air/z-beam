        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 7
  - id: what-safety-precautions-are-specific-to
    title: What safety precautions are specific to laser cleaning marble, especially in terms of fume extraction?
    content: In this process, laser ablation of marble at 2.5 J/cm² produces fine calcium carbonate dust and hazardous contaminants.
      For practical safety, a HEPA-filtered extraction system is essential to capture sub-100µm particles, with operators
      always wearing respiratory PPE.
    metadata:
      topic: safety precautions specific to laser
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
