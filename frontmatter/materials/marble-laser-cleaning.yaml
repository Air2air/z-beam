faq:
  presentation: collapsible
  items:
  - id: can-you-safely-use-a-laser
    title: Can you safely use a laser cleaner to remove graffiti from marble without damaging the surface?
    content: Yes, indeed, as a laser cleaning expert from Indonesia, I can confirm that laser cleaners safely remove graffiti
      from marble. Using a Q-switched Nd:YAG laser at controlled pulse energies ablates surface contaminants without etching
      the delicate stone, preserving its integrity—provided parameters are calibrated precisely by professionals.
    metadata:
      topic: you safely use a laser
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: true
      order: 1
  - id: what-is-the-best-laser-wavelength
    title: What is the best laser wavelength (e.g., 1064nm, 532nm) for cleaning different types of marble (e.g., white Carrara
      vs. dark marble)?
    content: For white Carrara marble, 1064nm at 2.5 J/cm² offers a straightforward optimal setting. Darker marbles and stains,
      however, absorb shorter wavelengths more efficiently, often requiring 532nm to avoid thermal damage to the calcite substrate.
      Ultimately, this process depends on the contaminant's absorption profile relative to the stone's mineral composition.
    metadata:
      topic: the best laser wavelength (e.g.,
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 2
  - id: how-do-you-remove-black-crusts
    title: How do you remove black crusts or biological growth (lichens, algae) from marble with a laser without leaving a
      shadow or etch mark?
    content: We apply a 1064 nm wavelength at 2.5 J/cm² for straightforward ablation of black crusts. That method vaporizes
      iron oxides and biological growth efficiently, staying below the marble's damage threshold to prevent subsurface calcination
      and shadowing.
    metadata:
      topic: do you remove black crusts
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 3
  - id: what-are-the-critical-laser-parameters
    title: What are the critical laser parameters (fluence, pulse duration, repetition rate) to avoid the yellowing or burning
      of marble during cleaning?
    content: As a laser cleaning specialist from Indonesia, where we often preserve ancient stone heritage, I recommend keeping
      fluence below 0.5-1 J/cm², pulse durations at 20-50 ns, and repetition rates under 10-20 Hz for marble. This ensures
      gentle ablation without thermal yellowing or burning.
    metadata:
      topic: the critical laser parameters (fluence,
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 4
  - id: is-laser-cleaning-effective-for-removing
    title: Is laser cleaning effective for removing smoke or fire damage from marble surfaces, and what are the limitations?
    content: Laser cleaning efficiently removes soot in a straightforward way, applying 2.5 J/cm² fluence with 50 kHz pulses.
      Yet, acidic smoke residues can permanently etch the marble surface; that chemical alteration proves irreversible and
      beyond remedy by this process.
    metadata:
      topic: laser cleaning effective for removing
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 5
  - id: why-is-water-or-airassist-often
    title: Why is water or air-assist often used during laser cleaning of marble, and what are the pros and cons?
    content: In this process, water assist acts as a heat sink, suppressing plasma shielding and preventing thermal shock
      in the marble at our typical 2.5 J/cm² fluence. Meanwhile, an air jet efficiently removes ablation debris from the beam
      path, ensuring consistent cleaning and protecting the delicate calcite matrix.
    metadata:
      topic: water or air-asst often used
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 6
  - id: how-does-the-presence-of-veins
    title: How does the presence of veins, fissures, and existing cracks in marble affect the laser cleaning strategy?
    content: Veins and fissures build up stress, so drop fluence below 2.5 J/cm² for straightforward results. Steer clear
      of long exposures on these spots to dodge spalling—go with a larger spot size and quicker scan speeds for practical
      control of thermal buildup.
    metadata:
      topic: the presence of veins, fsures,
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
