    _display:
      _open: false
      order: 9
  - id: how-does-carbon-fiber-orientation-and
    title: How does carbon fiber orientation and weave pattern affect laser cleaning results and parameter selection?
    content: Fiber orientation notably influences thermal conduction, thus necessitating parameter tweaks. Unidirectional
      composites, particularly along the fibers, require lower fluence around 5 J/cm², whereas woven patterns demand precise
      beam overlap to manage variations in resin pocket ablation.
    metadata:
      topic: carbon fiber orientation and weave
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 10
  - id: what-quality-control-methods-are-most
    title: What quality control methods are most effective for verifying successful laser cleaning of CFRP?
    content: For CFRP laser cleaning verification, we particularly rely on contact angle measurements to confirm surface energy
      increases, alongside optical profilometry for validating sub-micron roughness. At 5 J/cm² fluence, successful cleaning
      thus delivers 30-50% adhesion gains in pull-tests, while thermography enables non-destructive subsurface thermal damage
      detection.
    metadata:
      topic: quality control methods most effective
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 11
  - id: how-does-laser-cleaning-compare-to
    title: How does laser cleaning compare to traditional methods (grit blasting, chemical stripping) for CFRP in terms of
      cost and performance?
    content: Laser cleaning delivers superior cost efficiency, particularly for CFRP maintenance in aerospace settings. Operating
      at 100W with 5 J/cm² fluence, it selectively removes contaminants without harming the composite matrix. Notably, this
      eliminates pricey consumables and hazardous waste, thus cutting operational costs far below those of traditional abrasive
      or chemical methods.
