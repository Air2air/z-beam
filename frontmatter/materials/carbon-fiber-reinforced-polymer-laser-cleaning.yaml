faq:
  presentation: collapsible
  items:
  - id: what-laser-wavelength-is-most-effective
    title: What laser wavelength is most effective for cleaning CFRP without damaging the fibers or resin?
    content: For CFRP laser cleaning, near-IR at 1064 nm is generally preferred over UV, particularly due to its superior
      absorption by carbon contaminants while minimizing resin damage at fluences around 5 J/cm². Thus, this wavelength ablates
      surface layers effectively without compromising underlying fiber integrity.
    metadata:
      topic: laser wavelength most effective for
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: true
      order: 1
  - id: how-do-i-remove-release-agents
    title: How do I remove release agents and mold residues from CFRP surfaces without compromising structural integrity?
    content: For CFRP surface preparation, use nanosecond pulses at 1064 nm and a fluence of 5 J/cm². Specifically, this wavelength
      gets absorbed by contaminants such as silicone, allowing their removal without harming the epoxy matrix underneath.
      Thus, scanning at 500 mm/s with 50% overlap avoids thermal damage to the fiber-matrix interface.
    metadata:
      topic: do i remove release agents
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 2
  - id: can-laser-cleaning-effectively-prepare-cfrp
    title: Can laser cleaning effectively prepare CFRP surfaces for bonding and repair without mechanical abrasion?
    content: Laser cleaning, particularly at 5 J/cm² fluence with 1064 nm wavelength, effectively activates CFRP surfaces.
      Notably, it removes contaminants and optimizes surface roughness, thus achieving bond strength akin to grit blasting
      without harming composite fibers.
    metadata:
      topic: laser cleaning effectively prep cfrp
      severity: high
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 3
  - id: what-are-the-safety-concerns-when
    title: What are the safety concerns when laser cleaning CFRP, particularly regarding toxic fume generation?
    content: Laser cleaning of CFRP at 1064 nm produces toxic hydrogen cyanide and benzene fumes, particularly endangering
      health. Proper fume extraction remains essential, with operators specifically needing supplied-air respirators. Thus,
      strictly adhere to the 5 J/cm² fluence threshold to reduce hazardous byproducts.
    metadata:
      topic: the safety concerns laser cleaning
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 4
  - id: how-do-i-prevent-thermal-damage
    title: How do I prevent thermal damage to the epoxy matrix when laser cleaning CFRP composites?
    content: Employ ultrashort pulses under 10 ps, particularly to curb heat diffusion into the epoxy matrix. Target fluence
      around 5 J/cm² via a 50 μm spot size for precise contaminant removal. Thus, real-time thermal monitoring avoids surpassing
      the matrix degradation threshold.
    metadata:
      topic: do i prevent thermal damage
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 5
  - id: what-laser-parameters-work-best-for
    title: What laser parameters work best for removing paint and coatings from CFRP without fiber exposure?
    content: For CFRP paint removal, particularly employ a 1064 nm wavelength with fluence under 5 J/cm². Thus, apply multiple
      passes at 500 mm/s using 50% overlap to selectively ablate coatings, while safeguarding the underlying resin matrix
      for later recoating.
    metadata:
      topic: laser parameters work best for
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 6
  - id: how-does-laser-cleaning-affect-the
    title: How does laser cleaning affect the surface chemistry and wettability of CFRP for subsequent processing?
    content: Laser cleaning at 5 J/cm² fluence chemically functionalizes CFRP surfaces, notably by generating oxygen-containing
      groups. Thus, it boosts surface energy and wettability, markedly aiding adhesion in later bonding or coating steps.
      The 1064 nm wavelength specifically minimizes matrix damage.
    metadata:
      topic: laser cleaning affect the surface
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 7
  - id: what-are-the-challenges-with-automated
    title: What are the challenges with automated laser cleaning of complex CFRP geometries and curved surfaces?
    content: Achieving consistent 5 J/cm² fluence on curved CFRP surfaces demands precise robotic path planning. Particularly,
      complex geometries hinder stand-off distance control, potentially causing thermal damage from defocused beams. Thus,
      beam delivery systems should adapt to contoured parts for uniform energy distribution.
    metadata:
      topic: the challenges with automated laser
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 8
  - id: can-laser-cleaning-detect-and-remove
    title: Can laser cleaning detect and remove barely visible impact damage (BVID) in CFRP while cleaning?
    content: Notably, laser cleaning at 5 J/cm² reveals BVID via surface morphology changes, though it cannot directly detect
      subsurface delamination. LIBS specifically identifies contaminants during processing, yet internal fiber damage assessment
      thus requires complementary NDI methods owing to CFRP's opacity.
    metadata:
      topic: laser cleaning detect and remove
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
