slug: schist-laser-cleaning
page_title: schist-laser-cleaning
micro:
  before: Laser cleaning tackles tough contaminants on schist surfaces effectively.
    At 1000x magnification, the before image reveals a rugged landscape. Schist's
    flaky layers trap dirt and grime in irregular patterns, with fine particles clinging
    to its porous texture like stubborn debris in narrow crevices.
  after: The contamination shows up as dark, uneven coatings that dull the stone's
    natural sheen. Turns out, these buildups follow the mineral alignments, creating
    jagged edges and clustered spots that disrupt the surface integrity. In practice,
    this setup poses a significant challenge for restoration work.
