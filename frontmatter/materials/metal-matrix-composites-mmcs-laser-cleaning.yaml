components:
  settingsDescription: When laser cleaning metal matrix composites, unlike pure metals that heat evenly, watch out for their
    embedded reinforcements—these can cause uneven heat buildup right from the start, risking cracks if you push power too
    high. We've found that starting with lower energy pulses helps control this, letting the laser clear contaminants without
    stressing the matrix. What sets MMCs apart is their hybrid strength from metal and fibers, so you adjust scan speeds slower
    to match their good heat spreading, avoiding delamination. In our experience, this approach restores surfaces smoothly
    for aerospace parts, but always test overlaps to prevent hot spots in the tougher zones.
  micro:
    before: When examining the contaminated surface of this metal matrix composite at high magnification, you notice thick
      layers of grime and debris scattered unevenly across the top. Dark spots and irregular patches cling tightly to the
      underlying material, hiding its natural texture completely. These contaminants create a rough, uneven look that obscures
      the fine details beneath.
    after: After laser treatment on the same metal matrix composite surface, you see a smooth, exposed layer free from all
      that buildup. The clean area reveals a consistent metallic sheen with
