micro:
  before: Contaminated surface of metal-matrix composites, it reveals irregular oxide
    layers and embedded debris patterns. Fibers within matrix, they protrude unevenly,
    thus trapping dirt that resists initial exposure. At high magnification, contamination
    appears as clustered spots and fine particles adhering tightly, so surface loses
    uniformity and exhibits dull texture.
  after: Laser cleaning process applies pulses, and heat targets contaminants selectively.
    Following treatment, clean surface already demonstrates smoothness with exposed
    fibers showing clear boundaries. Matrix regions, they reflect light evenly now,
    thus confirming removal of residues. Unique features emerge—fiber interfaces free
    from haze, and overall topography uniform without remnants. This cleaning, it
    preserves composite integrity, so durability enhances for applications in aerospace
    components. Evidence from microscopic views establishes efficiency, as clean areas
    contrast sharply with prior roughness.
