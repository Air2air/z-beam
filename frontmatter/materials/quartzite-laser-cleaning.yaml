faq:
  presentation: collapsible
  items:
  - id: what-laser-parameters-work-best-for
    title: What laser parameters work best for cleaning biological growth (lichens, algae) from quartzite without damaging
      the crystalline surface?
    content: For quartzite biological growth removal, apply a 1064 nm wavelength, specifically with 2.5 J/cm² fluence and
      nanosecond pulses. This method ablates organic matter effectively while minimizing thermal shock risks to the crystalline
      structure. Thus, a 500 mm/s scanning speed guarantees thorough cleaning without substrate harm.
    metadata:
      topic: laser parameters work best for
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: true
      order: 1
  - id: does-laser-cleaning-cause-microfracturing-in
    title: Does laser cleaning cause micro-fracturing in quartzite's interlocking crystalline structure that could accelerate
      future deterioration?
    content: When properly configured, laser cleaning at 2.5 J/cm² fluence and 100 W power notably generates minimal thermal
      stress. Specifically, nanosecond pulses ablate contaminants rapidly, avoiding significant heat transfer into quartz
      grains. Thus, this approach prevents micro-fracturing while preserving the stone's interlocking structure and long-term
      durability.
    metadata:
      topic: laser cleaning cause micro-fracturing in
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 2
  - id: how-do-we-effectively-remove-black
    title: How do we effectively remove black crusts (gypsum, carbon particulates) from quartzite without altering the natural
      patina beneath?
    content: For quartzite, particularly, keep fluence under 2.5 J/cm² to target black crust ablation while safeguarding the
      patina. Notably, using a 1064 nm wavelength and 100 μm spot size removes gypsum matrices effectively, without compromising
      the stone's underlying integrity.
    metadata:
      topic: do we effectively remove black
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 3
  - id: what-safety-protocols-are-specific-to
    title: What safety protocols are specific to laser cleaning quartzite versus other stone types?
    content: Given quartzite's high silica content, particularly its respirable crystalline silica, enhanced respiratory protection
      proves essential. Notably, the laser plume from our 100W, 1064nm parameters—which generates hazardous aerosols—demands
      HEPA filtration. Thus, containment remains crucial beyond the 2.5 J/cm² fluence threshold.
    metadata:
      topic: safety protocols specific to laser
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 4
  - id: can-laser-cleaning-effectively-remove-iron
    title: Can laser cleaning effectively remove iron oxide stains from quartzite without chemical assistance?
    content: Laser cleaning effectively removes iron oxide from quartzite, particularly at a 1064nm wavelength and 2.5 J/cm²
      fluence. This process selectively ablates contaminants without chemicals, thus preserving the stone substrate. Notably,
      optimal parameters like 500 mm/s scan speed ensure complete stain removal in just a few passes.
    metadata:
      topic: laser cleaning effectively remove iron
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 5
  - id: what-are-the-limitations-of-laser
    title: What are the limitations of laser cleaning for heavily weathered outdoor quartzite with significant surface friability?
    content: In cases of heavily weathered quartzite showing surface friability, the 2.5 J/cm² fluence threshold particularly
      risks grain dislodgement. Thus, a preliminary stability assessment proves essential; mechanical methods often serve
      safer for such compromised substrates to avoid irreversible damage.
    metadata:
      topic: the limitations of laser cleaning
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 6
  - id: how-does-quartzites-high-silica-content
    title: How does quartzite's high silica content (often 90%+) affect laser absorption and cleaning efficiency compared
      to other natural stones?
    content: Quartzite, with over 90% silica content, particularly exhibits strong absorption at 1064 nm, thus demanding precise
      fluence control near 2.5 J/cm². Its crystalline structure efficiently channels laser energy to contaminants, enabling
      removal at 500 mm/s without substrate damage.
