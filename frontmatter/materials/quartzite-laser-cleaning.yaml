  - id: how-does-quartzites-extreme-hardness-mohs
    title: How does quartzite's extreme hardness (Mohs 7+) and low porosity affect laser cleaning strategy compared to softer,
      more porous stones?
    content: Quartzite's Mohs 7+ hardness particularly demands higher fluence, around 2.5 J/cm², for effective ablation. Its
      low density minimizes contaminant penetration yet raises reflectivity risks, thus requiring precise wavelength choices
      like 1064 nm. Optimizing scanning speeds near 500 mm/s helps avoid thermal stress on this resilient substrate.
