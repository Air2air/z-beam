      order: 7
  - id: what-validation-methods-are-used-to
    title: What validation methods are used to confirm laser cleaning effectiveness on quartzite without causing subsurface
      damage?
    content: We use optical microscopy and surface profilometry, particularly to assess cleaning effectiveness and detect
      subsurface microfractures. For quartzite, keeping fluence below 2.5 J/cm² at a 100 μm spot size avoids thermal degradation,
      thus confirmed by stable color measurements after treatment.
