  - id: are-there-specific-laser-systems-fiber
    title: Are there specific laser systems (fiber, Nd:YAG, etc.) better suited for quartzite conservation projects?
    content: Fiber lasers at 1064 nm, delivering around 2.5 J/cm² fluence, stand out as optimal for quartzite conservation.
      Particularly for architectural projects, their strong portability proves essential. Notably, the efficiency of these
      fiber systems ensures cost-effectiveness in large-scale industrial cleaning, while safely removing contaminants without
      harming the substrate.
