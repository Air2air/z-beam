components:
  settingsDescription: >-
    When laser cleaning fused silica, the biggest challenge is its low absorption of laser energy. This makes the
    process slower since the beam tends to pass through the material with minimal interaction. I've seen that pulsing at
    moderate rates removes surface contaminants effectively without overheating. Multiple gentle passes reveal the
    underlying clarity. Adjust scan speeds to avoid thermal buildup, which can lead to cracking.
  micro:
    before: >-
      At 1000x magnification, the fused silica surface bristles with fine particles and residues that cling stubbornly.
      These contaminants create irregular bumps and dull patches across the material's face. Grime layers obscure the
      glass's inherent clarity in every observed section.
    after: >-
      After laser treatment at 1000x, the fused silica surface gleams smooth and free of all debris. Even textures
      replace the former roughness without any lingering spots. The cleaned glass exposes its natural polish clearly
      throughout the view.
