        topic: What are the LIDT (Laser-Induced Damage Threshold)
        severity: critical
        acceptedAnswer: true
        expertInfo: *id002
      - id: oh-group-contamination
        question: Does laser cleaning create OH group contamination or other chemical changes on the fused silica surface?
        answer: When laser cleaning is properly configured below the 2.5 J/cm² threshold, it typically avoids OH group formation.
          But excessive fluence can induce surface chemistry changes, potentially boosting hydrogen bonding and degrading
          UV transmission. Keeping optimal parameters is basically critical for long-term optical stability.
        topic: OH group contamination
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: compared-to-metals
        question: What safety precautions are specific to laser cleaning fused silica compared to metals?
        answer: The main precaution here is keeping things below fused silica's 2.5 J/cm² damage threshold to avoid subsurface
          cracking. Pretty much unlike metals, its fairly low thermal conductivity causes those stress fractures. Always wear
