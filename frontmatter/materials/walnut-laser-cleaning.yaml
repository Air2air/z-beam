components:
  settingsDescription: I've found walnut cleans nicely with gentle laser passes. Its open grain absorbs energy quickly, so
    it lifts dirt without much effort. This works well because the wood stays cool overall, avoiding deep burns. Just keep
    the beam moving steadily. Watch out for overdoing it—too much heat can char the surface, so test on a scrap first.
  micro:
    before: I've examined the walnut surface at high magnification before any treatment. Dark specks and uneven buildup cover
      the fibers completely. Grime clogs the tiny pores, making everything look dull and rough.
    after: After the laser passes over it, the walnut surface transforms noticeably. Fibers stand out clear and smooth without
      any residue. Pores open up wide, revealing a fresh and even texture.
