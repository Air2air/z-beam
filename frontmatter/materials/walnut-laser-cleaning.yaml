      order: 7
  - id: what-training-is-required-for-operators
    title: What training is required for operators using lasers to clean walnut media from molds in injection molding applications?
    content: Operators require laser safety certification from organizations like the Laser Institute of America, which specifically
      covers setup for 1064 nm wavelength systems and fluence monitoring below 2.5 J/cm² to avoid walnut charring in mold
      cleaning. Notably, training focuses on preventing errors, including consistent 500 mm/s scan speeds for even walnut
      media removal without substrate harm in injection molding.
