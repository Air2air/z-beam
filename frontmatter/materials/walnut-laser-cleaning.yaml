faq:
  presentation: collapsible
  items:
  - id: what-laser-power-settings-are-recommended
    title: What laser power settings are recommended for cleaning walnut shell residues from aerospace components without
      damaging underlying alloys?
    content: For removing walnut shell residues from aerospace alloys, I recommend a 1064 nm wavelength laser operating at
      40 W average power, with 100 ns pulses and 20 kHz repetition rate. Specifically, maintain fluence under 2.5 J/cm² to
      ablate organic contaminants effectively without harming the metal substrate, while scanning at 500 mm/s across two passes.
      Thus, this configuration limits thermal damage to the walnut's lignin structure.
    metadata:
      topic: laser power settings recommended for
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: true
      order: 1
  - id: how-effective-is-fiber-laser-cleaning
    title: How effective is fiber laser cleaning at removing walnut media from painted surfaces compared to traditional abrasive
      methods?
    content: Fiber lasers notably excel in stripping walnut shell media from painted surfaces, delivering 98% residue removal
      across two passes at 2.5 J/cm² fluence and 500 mm/s speed, all while safeguarding delicate wood grain from abrasion
      damage. On Reddit's r/LaserCutting, users particularly favor this non-contact precision compared to gritty blasting,
      which can erode paint and leave incomplete cleanup; thus, lasers necessitate precise thermal management to prevent charring.
    metadata:
      topic: effective fiber laser cleaning at
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 2
  - id: what-safety-precautions-should-be-taken
    title: What safety precautions should be taken when using lasers to clean walnut wood furniture to avoid toxic fume release
      from natural oils?
    content: For laser cleaning walnut furniture at a 1064 nm wavelength and 2.5 J/cm² fluence, particularly prioritize robust
      local exhaust ventilation to capture vapors from its natural oils, adhering to OSHA guidelines limiting wood dust exposure
      under 5 mg/m³. Wear NIOSH-approved respirators, gloves, and laser-safety goggles; thus, restoration training emphasizes
      avoiding charring to minimize toxic emissions.
    metadata:
      topic: safety precautions should be taken
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 3
  - id: can-co2-lasers-be-used-to
    title: Can CO2 lasers be used to strip walnut shell blasting media from delicate electronics without static buildup?
    content: CO2 lasers operating at 10.6 μm particularly excel in ablating organic walnut shell media through strong absorption,
      yet they risk damaging delicate electronics via excess heat—thus, limit fluences to under 2.5 J/cm² at 40 W power. Notably,
      for minimal ESD, fiber lasers at 1064 nm prove safer, as IPG indicates, by avoiding static buildup on sensitive components.
    metadata:
      topic: co2 lasers be used to
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 4
  - id: what-are-the-common-issues-with
    title: What are the common issues with laser cleaning walnut hulls from turbine blades, such as incomplete removal or
      surface pitting?
    content: Incomplete removal of walnut hulls from turbine blades particularly happens when fluence falls below 2.5 J/cm²,
      leaving residues tied to the wood's fibrous lignin structure. Surface pitting, by contrast, stems from overheating at
      powers exceeding 40 W, which chars the hulls unevenly. Thus, optimize using 500 mm/s scan speed and 50% overlap for
      clean, pit-free results.
    metadata:
      topic: the common sues with laser
      severity: high
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
