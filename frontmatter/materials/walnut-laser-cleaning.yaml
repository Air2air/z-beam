  - id: how-do-the-chemical-properties-of
    title: How do the chemical properties of walnut shells, like their lignin content, influence laser-induced thermal effects
      during cleaning?
    content: Notably, walnut shells' high lignin content enhances absorption of 1064 nm laser light, thereby increasing thermal
      buildup and reducing the ablation threshold to 2.5 J/cm² for contaminant removal. This trait specifically calls for
      precise fluence management to avoid charring the wood substrate. At 40 W power, cleaning remains effective without undue
      heat damage.
