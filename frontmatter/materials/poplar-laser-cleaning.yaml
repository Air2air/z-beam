      - id: surface-burning
        question: What are the optimal laser parameters for cleaning rust or contaminants from Poplar wood without causing
          surface burning?
        answer: For poplar wood, I'd go with a 1064nm fiber laser at 1.2 J/cm² fluence to pretty effectively strip away rust
          while keeping the material intact. A 100µm spot size paired with 500 mm/s scan speed offers fairly precise handling,
          cutting down on thermal effects. Test these settings on a hidden spot first to ensure the surface holds up.
        topic: surface burning
        severity: medium
        acceptedAnswer: true
        expertInfo: &id002
          name: Todd Dunning
          title: MA
          expertise: *id001
      - id: low-density-and-softness
        question: How does Poplar's low density and softness affect laser cleaning compared to harder woods like oak?
        answer: Poplar's fairly low 540 lbf Janka hardness calls for gentle laser settings to avoid damage. Basically, we
          apply a 1.2 J/cm² fluence threshold and 500 mm/s scan speed, which removes contaminants effectively without etching
          or raising the grain—issues you don't typically face with harder woods like oak.
        topic: low density and softness
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: painting-or-staining
        question: Can laser cleaning be used to prepare Poplar for painting or staining after removing old finishes?
        answer: Yeah, laser cleaning effectively strips finishes from Poplar while basically preserving its porous structure.
          With 1.2 J/cm² fluence and 100W power, it removes contaminants without sealing the wood grain, leaving a pretty
          ideal surface for uniform stain or paint absorption.
        topic: painting or staining
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: combustible-nature
        question: What specific safety concerns exist when laser cleaning Poplar, given its combustible nature?
        answer: Because poplar is pretty combustible, keep laser power under 100W with a fast scan speed of 500 mm/s to avoid
          ignition. Always employ air assist and keep a fire extinguisher right at hand, as the 1.2 J/cm² fluence threshold
          remains basically critical for safety.
        topic: combustible nature
        severity: critical
        acceptedAnswer: true
        expertInfo: *id002
      - id: biological-growth-(mold-mildew)
        question: Is laser cleaning effective for removing biological growth (mold, mildew) from Poplar without damaging the
          wood structure?
        answer: Properly tuned near-infrared lasers at 1.2 J/cm² basically ablate biological growth from Poplar pretty effectively.
          That 10 ns pulse width vaporizes contaminants before much heat reaches the wood's cellulose, delivering a superior,
          residue-free option over chemical spore treatments.
        topic: biological growth (mold, mildew)
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: green/brown-mineral-streaks
        question: How does the presence of Poplar's green/brown mineral streaks affect laser absorption and cleaning results?
        answer: Poplar's mineral streaks pretty much absorb our 1064 nm wavelength more readily than the surrounding wood,
          leading to differential cleaning effects. Basically, to offset this, dial your fluence back to 1.0 J/cm² and ramp
          up scan speed to avoid discoloration in the variable grain.
        topic: green/brown mineral streaks
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: what-is-the-maximum-depth-of-contamination-removal
        question: What is the maximum depth of contamination removal possible on Poplar before structural integrity is compromised?
        answer: Poplar's delicate cellular structure keeps removal depth pretty limited. Aim to stay below 50-100 μm for preserving
          integrity. In structural applications, typically hold fluence under 1.2 J/cm² to avoid harming those thin cell walls.
          Cosmetic cleaning offers fairly more latitude.
        topic: What is the maximum depth of contamination removal
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: can-laser-cleaning-restore-the-original-color-of-a
        question: Can laser cleaning restore the original color of aged or oxidized Poplar wood surfaces?
        answer: When laser ablation is tuned right at 1.2 J/cm², it fairly effectively strips the gray oxidized layer from
          Poplar, exposing the lighter wood below. Unlike sanding, this non-contact technique basically sidesteps heat-induced
          discoloration, yielding a truer original surface color.
        topic: Can laser cleaning restore the original color of a
        severity: high
        acceptedAnswer: true
        expertInfo: *id002
      - id: different-poplar-subspecies
        question: How do different Poplar subspecies (Yellow Poplar, Tulip Poplar) respond to laser cleaning treatments?
        answer: Both subspecies handle the 1064 nm wavelength pretty well, but Tulip Poplar's fairly higher density calls
          for precise fluence management around 1.2 J/cm² to avoid subsurface cell wall damage. With its lower resin content,
          Yellow Poplar provides more flexible parameter ranges, especially using a 100 µm spot size for accurate grain cleaning.
        topic: different Poplar subspecies
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: stabilize-the-surface
        question: What post-cleaning treatments are recommended for Poplar after laser cleaning to stabilize the surface?
        answer: After laser cleaning at 1.2 J/cm², poplar's opened grain structure pretty much benefits from a penetrating
          oil-based sealer. That stabilizes the surface by rehydrating raised fibers and blocking oxidative discoloration.
          In porous spots, applying a dilute wood consolidant before final sealing typically ensures long-term dimensional
          stability.
