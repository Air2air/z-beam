  items:
  - id: what-are-the-optimal-laser-parameters
    title: What are the optimal laser parameters for cleaning rust or contaminants from Poplar wood without causing surface
      burning?
    content: For poplar wood, I'd go with a 1064nm fiber laser at 1.2 J/cm² fluence to pretty effectively strip away rust
      while keeping the material intact. A 100µm spot size paired with 500 mm/s scan speed offers fairly precise handling,
      cutting down on thermal effects. Test these settings on a hidden spot first to ensure the surface holds up.
    metadata:
      topic: the optimal laser parameters for
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: true
      order: 1
  - id: how-does-poplars-low-density-and
    title: How does Poplar's low density and softness affect laser cleaning compared to harder woods like oak?
    content: Poplar's fairly low 540 lbf Janka hardness calls for gentle laser settings to avoid damage. Basically, we apply
      a 1.2 J/cm² fluence threshold and 500 mm/s scan speed, which removes contaminants effectively without etching or raising
      the grain—issues you don't typically face with harder woods like oak.
    metadata:
      topic: poplar's low density and softness
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: false
      order: 2
  - id: can-laser-cleaning-be-used-to
    title: Can laser cleaning be used to prepare Poplar for painting or staining after removing old finishes?
    content: Yeah, laser cleaning effectively strips finishes from Poplar while basically preserving its porous structure.
      With 1.2 J/cm² fluence and 100W power, it removes contaminants without sealing the wood grain, leaving a pretty ideal
      surface for uniform stain or paint absorption.
    metadata:
      topic: laser cleaning be used to
      severity: high
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: false
      order: 3
  - id: what-specific-safety-concerns-exist-when
    title: What specific safety concerns exist when laser cleaning Poplar, given its combustible nature?
    content: Because poplar is pretty combustible, keep laser power under 100W with a fast scan speed of 500 mm/s to avoid
      ignition. Always employ air assist and keep a fire extinguisher right at hand, as the 1.2 J/cm² fluence threshold remains
      basically critical for safety.
    metadata:
      topic: specific safety concerns ext laser
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: false
      order: 4
  - id: is-laser-cleaning-effective-for-removing
    title: Is laser cleaning effective for removing biological growth (mold, mildew) from Poplar without damaging the wood
      structure?
    content: Properly tuned near-infrared lasers at 1.2 J/cm² basically ablate biological growth from Poplar pretty effectively.
      That 10 ns pulse width vaporizes contaminants before much heat reaches the wood's cellulose, delivering a superior,
      residue-free option over chemical spore treatments.
    metadata:
      topic: laser cleaning effective for removing
      severity: high
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: false
      order: 5
  - id: how-does-the-presence-of-poplars
    title: How does the presence of Poplar's green/brown mineral streaks affect laser absorption and cleaning results?
    content: Poplar's mineral streaks pretty much absorb our 1064 nm wavelength more readily than the surrounding wood, leading
      to differential cleaning effects. Basically, to offset this, dial your fluence back to 1.0 J/cm² and ramp up scan speed
      to avoid discoloration in the variable grain.
    metadata:
      topic: the presence of poplar's green/brown
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: false
      order: 6
  - id: what-is-the-maximum-depth-of
    title: What is the maximum depth of contamination removal possible on Poplar before structural integrity is compromised?
    content: Poplar's delicate cellular structure keeps removal depth pretty limited. Aim to stay below 50-100 μm for preserving
      integrity. In structural applications, typically hold fluence under 1.2 J/cm² to avoid harming those thin cell walls.
      Cosmetic cleaning offers fairly more latitude.
    metadata:
      topic: the maximum depth of contamination
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: false
      order: 7
  - id: can-laser-cleaning-restore-the-original
    title: Can laser cleaning restore the original color of aged or oxidized Poplar wood surfaces?
    content: When laser ablation is tuned right at 1.2 J/cm², it fairly effectively strips the gray oxidized layer from Poplar,
      exposing the lighter wood below. Unlike sanding, this non-contact technique basically sidesteps heat-induced discoloration,
      yielding a truer original surface color.
    metadata:
      topic: laser cleaning restore the original
      severity: high
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: false
      order: 8
  - id: how-do-different-poplar-subspecies-yellow
    title: How do different Poplar subspecies (Yellow Poplar, Tulip Poplar) respond to laser cleaning treatments?
    content: Both subspecies handle the 1064 nm wavelength pretty well, but Tulip Poplar's fairly higher density calls for
      precise fluence management around 1.2 J/cm² to avoid subsurface cell wall damage. With its lower resin content, Yellow
      Poplar provides more flexible parameter ranges, especially using a 100 µm spot size for accurate grain cleaning.
    metadata:
      topic: do different poplar subspecies (yellow
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: false
      order: 9
  - id: what-postcleaning-treatments-are-recommended-for
    title: What post-cleaning treatments are recommended for Poplar after laser cleaning to stabilize the surface?
    content: After laser cleaning at 1.2 J/cm², poplar's opened grain structure pretty much benefits from a penetrating oil-based
      sealer. That stabilizes the surface by rehydrating raised fibers and blocking oxidative discoloration. In porous spots,
      applying a dilute wood consolidant before final sealing typically ensures long-term dimensional stability.
    metadata:
