  components:
    settings_description: When laser cleaning Europium, you must start with low power
      settings to avoid cracking its brittle structure. Unlike denser rare-earth metals,
      Europium's softness demands careful control, as it absorbs energy unevenly and
      heats up quickly. This reduces the risk of surface deformation. We've found
      that short pulses work best here, removing contaminants without exposing the
      underlying material to excessive stress. Watch out for oxidation buildup during
      passes; adjust speed to prevent it from weakening the cleaned areas. Keep passes
      minimal to restore optical clarity in components.
    micro:
      before: The contaminated surface displays a mottled layer of dark residue and
        scattered debris across its uneven texture. Rough patches and clinging particles
        obscure the base material beneath this dull coating. Tiny irregularities dot
        the view, giving it a worn and irregular appearance.
      after: The clean surface reveals a smooth and uniform expanse free from any
        residue or debris. Polished facets reflect light evenly over the entire area
        now. The base material exposes its inherent luster and flawless contours clearly.
