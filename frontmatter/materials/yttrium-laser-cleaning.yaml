      order: 7
  - id: in-laser-cleaning-setups-using-ndyag
    title: In laser cleaning setups using Nd:YAG lasers, how does yttrium's presence in the laser medium influence cleaning
      efficiency on yttrium substrates?
    content: In Nd:YAG lasers, yttrium within the host crystal delivers practical stability for beam homogeneity at 1064 nm,
      matching the high absorption coefficient of yttrium substrates to enable efficient contaminant removal. This process
      enhances cleaning performance by reducing reflectivity, aiming for a fluence of 5.1 J/cm² to prevent substrate damage
      and ensure even outcomes. For best results, apply 30% beam overlap in scans.
    metadata:
