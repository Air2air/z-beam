        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 6
  - id: what-environmental-and-health-risks-arise
    title: What environmental and health risks arise from laser ablation of yttrium compounds during surface treatment?
    content: Laser ablation of yttrium compounds at 5.1 J/cm² fluence, using that method, generates fine dust particles that
      pose inhalation risks and mild toxicity akin to other rare-earth metals, potentially irritating lungs or skin with prolonged
      exposure. Environmentally, byproducts often include heavy metals, so practical EPA-compliant disposal prevents soil
      or water contamination. Regular monitoring of effluents keeps yttrium levels below 1 ppm, ensuring safety in 1064 nm
      treatments.
    metadata:
