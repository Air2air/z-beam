      order: 8
  - id: what-are-the-physical-properties-of
    title: What are the physical properties of yttrium that impact its response to pulsed laser cleaning, such as melting
      point and oxidation tendency?
    content: Yttrium's high melting point of 1522°C calls for straightforward fluence control to prevent substrate fusion
      during pulsed laser cleaning. Its rapid oxide formation kinetics also shape practical selections, such as 5.1 J/cm²
      at 1064 nm wavelength, ensuring contaminant removal without excess surface oxidation or thermal buildup.
    metadata:
      topic: the physical properties of yttrium
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 9
  - id: how-do-operators-in-training-programs
    title: How do operators in training programs address contamination risks when laser cleaning yttrium phosphors in display
      manufacturing?
    content: 'For laser cleaning yttrium phosphors in displays, training starts practically: operators don full PPE—gloves,
      respirators, suits—to shield against airborne particles. They isolate workspaces with barriers to prevent cross-contamination,
      then follow this process—calibrate to 5.1 J/cm² fluence at 1064 nm, scan at 500 mm/s over two passes, and vacuum residues
      right away for pristine results.'
