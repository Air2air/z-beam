faq:
  presentation: collapsible
  items:
  - id: what-laser-parameters-are-optimal-for
    title: What laser parameters are optimal for cleaning yttrium oxide contaminants from metal surfaces without damaging
      the underlying yttrium alloy?
    content: To clean yttrium oxide from yttrium alloys, a 1064 nm Nd:YAG laser with 10 ns pulses at 50 kHz performs best.
      It targets 5.1 J/cm² fluence, leveraging the metal's high reflectivity and thermal conductivity for contaminant ablation
      without base harm. This process scans efficiently at 500 mm/s with 30% overlap across two passes at 100 W power for
      even outcomes.
    metadata:
      topic: laser parameters optimal for cleaning
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: true
      order: 1
  - id: how-does-laser-cleaning-affect-the
    title: How does laser cleaning affect the surface microstructure of yttrium-stabilized zirconia ceramics used in thermal
      barrier coatings?
    content: In this process, laser cleaning yttrium-stabilized zirconia for thermal barriers—with 5.1 J/cm² fluence at 1064
      nm—avoids microcracking by keeping thermal stress under the material's 1000°C threshold, thus preserving the tetragonal
      phase without monoclinic shifts. Electronics industry examples reveal post-cleaning roughness of 0.3-0.5 μm, efficiently
      enhancing adhesion and microstructural integrity.
    metadata:
      topic: laser cleaning affect the surface
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 2
  - id: what-safety-precautions-are-needed-when
    title: What safety precautions are needed when using lasers to remove yttrium-based residues from industrial equipment,
      given yttrium's reactivity?
    content: For cleaning yttrium residues using a 1064 nm laser at 5.1 J/cm² fluence, it's practical to prioritize local
      exhaust ventilation per OSHA standards. This process captures reactive airborne particles, preventing inhalation risks
      from this rare-earth metal. Always wear certified eye protection blocking the full laser spectrum, and use respirators
      in enclosed spaces to manage dust.
    metadata:
      topic: safety precautions needed using lasers
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 3
  - id: is-dry-laser-cleaning-effective-for
    title: Is dry laser cleaning effective for removing organic contaminants from yttrium-doped laser crystals without introducing
      defects?
    content: Yes, this process of dry laser cleaning effectively removes organic contaminants from yttrium-doped crystals
      such as Nd:YAG, sidestepping defects that wet methods could introduce via liquid residues. Straightforward application
      of a 1064 nm wavelength at 5.1 J/cm² fluence delivers precise ablation without substrate damage—try two passes at 500
      mm/s for even coverage.
    metadata:
      topic: dry laser cleaning effective for
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 4
  - id: what-are-the-common-challenges-in
    title: What are the common challenges in laser cleaning yttrium-containing superalloys in aerospace turbine blades?
    content: In laser cleaning yttrium-containing superalloys for aerospace turbine blades, key challenges include removing
      stubborn oxide scales and limiting heat-affected zones to preserve nickel-yttrium compatibility. This process, using
      a 1064 nm wavelength at 5.1 J/cm² fluence, ensures efficient ablation without substrate damage, as noted in aviation
      forums.
    metadata:
      topic: the common challenges in laser
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 5
  - id: how-can-laser-cleaning-be-used
    title: How can laser cleaning be used to prepare yttrium surfaces for subsequent coatings, and what surface properties
      result?
    content: Using laser cleaning on yttrium surfaces at 1064 nm wavelength and 5.1 J/cm² fluence offers a practical approach
      to remove oxides and residues, preserving the rare-earth substrate for electronics and optics preparation. This process
      delivers ultra-clean finishes with improved wettability, enhancing coating adhesion through peel tests. For even coverage,
      apply 100 W power across two passes.
    metadata:
      topic: laser cleaning be used to
      severity: high
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
