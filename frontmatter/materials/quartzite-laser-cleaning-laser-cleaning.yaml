name: quartzite-laser-cleaning
slug: quartzite-laser-cleaning
page_title: quartzite-laser-cleaning
micro:
  before: Contamination challenges quartzite surfaces during exposure to environment.
    This buildup forms irregular patterns and clings tightly because of natural porosity.
    So, laser cleaning applies targeted pulses to remove layers effectively.
  after: In observations at high magnification before treatment, contamination appears
    as clustered particles and oxide films. The surface exhibits roughness with embedded
    debris. These features reduce smoothness and hide quartz grains.
