name: calcite-laser-cleaning
slug: calcite-laser-cleaning
page_title: calcite-laser-cleaning
micro:
  before: Calcite surface before laser cleaning, it displays irregular contamination
    patterns. Dust particles cling to cleavage planes, and organic residues form patchy
    films across the mineral's rhombohedral facets. These contaminants obscure natural
    luster, thus create shadowed textures under microscopic view. Roughness dominates,
    with embedded debris that resists initial exposure.
  after: Laser cleaning applies targeted pulses, and contaminants ablate layer by
    layer. After treatment, surface already exhibits smoothness on exposed planes.
    Clean areas reveal sharp edges of crystal structure, and uniform reflectivity
    emerges without prior dullness. This process preserves calcite's inherent translucency,
    so unique birefringence patterns become visible. Contamination remnants, they
    still linger in porous zones, but overall, material demonstrates restored integrity.
    Efficiency of cleaning, it enhances surface durability for stone applications.
