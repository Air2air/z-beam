  components:
    settings_description: When laser cleaning Float Glass, I've found you get the best results by starting with a gentle scan
      to test its smooth, even surface. This glass, made through the float process, holds up well to contaminants like oils
      or residues from manufacturing, but its brittleness means you must keep the energy low right from the first pass to
      prevent micro-cracks. Tends to absorb heat slowly, so overlap your paths just enough for thorough coverage without building
      up too much warmth that could warp the edges. I've seen it restore architectural panels beautifully this way, but watch
      out midway—ramp up passes only if needed, or you'll risk thermal stress on its thin structure. Finish by cooling naturally
      to maintain that clear finish.
    micro:
      before: We've found the contaminated float glass surface riddled with irregular spots and fine debris that disrupt its
        smoothness at high magnification. These stubborn films and particles cling tightly, creating a mottled texture that
        scatters light in uneven patches across the whole area. Starting the laser cleaning process here demands care to avoid
        spreading the mess further.
      after: After treatment, we've observed the float glass surface transformed into a flawless, even plane free from any
        lingering marks or roughness. Light now glides smoothly over it, revealing a
