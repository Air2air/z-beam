faq:
  presentation: collapsible
  items:
  - id: what-laser-parameters-are-safe-for
    title: What laser parameters are safe for cleaning float glass without causing micro-fractures or thermal stress?
    content: From my work as a laser cleaning expert in Indonesia, I suggest a straightforward setup with a Q-switched Nd:YAG
      laser at 1064 nm, featuring pulse durations of 5-20 ns, fluences under 0.5 J/cm², and scanning speeds above 100 mm/s.
      This process, validated in local projects, reliably avoids micro-fractures and thermal stress on float glass.
    metadata:
      topic: laser parameters safe for cleaning
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: true
      order: 1
  - id: how-do-i-remove-mineral-deposits
    title: How do I remove mineral deposits and hard water stains from float glass with laser cleaning without etching the
      surface?
    content: For float glass, a practical approach is to keep fluence below 2.5 J/cm² with nanosecond pulses at 1064 nm. This
      process ablates calcium carbonate deposits while preserving the pristine silicate surface. Scanning a 100 µm spot at
      500 mm/s ensures uniform stain removal without thermal etching.
    metadata:
      topic: do i remove mineral deposits
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 2
  - id: can-laser-cleaning-effectively-remove-paint
    title: Can laser cleaning effectively remove paint overspray from float glass without creating permanent marks?
    content: Laser cleaning efficiently removes paint overspray from float glass with a straightforward 2.5 J/cm² fluence
      and 100 μm spot size. For organic paints, lower pulse energy avoids residue fusion, while inorganic pigments often need
      this process of 50% beam overlap. Oblique-angle lighting inspection afterward verifies mark-free results.
    metadata:
      topic: laser cleaning effectively remove paint
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 3
  - id: what-safety-precautions-are-needed-when
    title: What safety precautions are needed when laser cleaning float glass near sensitive areas like window seals or frames?
    content: Use a practical approach for precise beam control near edges with the 100 μm spot size to avoid seal degradation.
      Our 2.5 J/cm² fluence efficiently removes contaminants, while fume extraction handles vaporized residues. Always wear
      suitable eyewear for the 1064 nm wavelength to protect operators.
    metadata:
      topic: safety precautions needed laser cleaning
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 4
  - id: does-laser-cleaning-affect-the-optical
    title: Does laser cleaning affect the optical clarity or light transmission properties of float glass?
    content: Properly configured laser cleaning at 2.5 J/cm² efficiently preserves optical clarity. This process removes contaminants
      without inducing surface roughening that scatters light. Spectrophotometry confirms no transmission loss in float glass
      using these optimized settings.
    metadata:
      topic: laser cleaning affect the optical
      severity: high
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 5
  - id: how-do-i-clean-the-tin
    title: How do I clean the tin side vs air side of float glass with lasers, and does it require different parameters?
    content: The tin side demands practical adjustments for its tin-rich surface. In this process, lower fluence to ~2.0 J/cm²
      and raise scan speed to 600 mm/s to avoid harm, whereas the air side withstands the usual 2.5 J/cm². Verify the side
      upfront.
    metadata:
      topic: do i clean the tin
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 6
  - id: what-is-the-maximum-thickness-of
    title: What is the maximum thickness of float glass that can be safely laser cleaned without risk of thermal cracking?
    content: For float glass up to 6mm thick, this process safely handles it with our 2.5 J/cm² fluence and 100W power settings.
      With thicker panels, we lower the repetition rate below 50 kHz in a practical manner to address thermal conductivity
      limits and avoid stress fractures.
    metadata:
      topic: the maximum thickness of float
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 7
  - id: can-laser-cleaning-remove-adhesive-residues
    title: Can laser cleaning remove adhesive residues and stickers from float glass without leaving marks or residue?
    content: Laser cleaning offers a straightforward way to remove adhesive residues from float glass, applying 2.5 J/cm²
      fluence and 100 μm spot size. This process vaporizes contaminants below the glass damage threshold, efficiently avoiding
      residue redistribution without chemical solvents.
    metadata:
      topic: laser cleaning remove adhesive residues
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 8
  - id: what-are-the-signs-of-improper
    title: What are the signs of improper laser cleaning on float glass that indicate parameter adjustment is needed?
    content: Visual hazing or micro-fractures straightforwardly signal excessive fluence over the 2.5 J/cm² threshold. For
      float glass, real-time monitoring in this process detects localized thermal stress beyond safe limits. Practically,
      cut pulse energy right away or boost scan speed to 500 mm/s to avoid subsurface damage.
    metadata:
