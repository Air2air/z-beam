name: vanadium-laser-cleaning
slug: vanadium-laser-cleaning
page_title: vanadium-laser-cleaning
micro:
  before: This contamination on vanadium alloy surface, it appears thick and uneven
    at 1000x magnification before cleaning. Particles cluster in irregular patterns,
    so roughness builds up during exposure to air. Oxide layers form on the metal,
    and they reduce surface shine. In observations, buildup shows dark spots and cracks
    across the area.
  after: After laser treatment is applied, contamination already removed completely.
    The clean surface exhibits smooth texture now, with uniform features. No residues
    remain at the surface, so reflectivity increases. From the data, treatment achieves
    clear removal without damage. During this process, laser pulses target oxides
    effectively, and material stays intact. Buildup is eliminated from the surfaces,
    results obtained from the scans show this change clearly.
