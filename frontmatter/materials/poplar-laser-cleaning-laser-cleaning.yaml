page_title: poplar-laser-cleaning
micro:
  before: Laser cleaning poplar wood stands out in my hands-on projects because it
    uncovers the material's natural grain without damaging its lightweight structure.
    It works well for restoring antique pieces or prepping surfaces for finishing,
    but you have to avoid over-pulsing the beam—otherwise, it scorches the soft fibers.
  after: At 1000x magnification, the contaminated poplar surface shows dark residues
    clinging to porous cells, like grime-packed honeycomb patterns that dull the wood's
    pale undertones. Contaminants line up along fiber edges, creating irregular clusters
    that block natural textures and trap moisture. Turns out, these buildup spots
    highlight poplar's vulnerability to environmental wear, turning smooth planes
    into rough, mottled zones.
