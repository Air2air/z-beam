  items:
  - id: what-laser-parameters-such-as-pulse
    title: What laser parameters, such as pulse duration and fluence, are recommended for cleaning contaminants from Tantalum
      surfaces without causing ablation?
    content: For cleaning tantalum, choose 10 ns pulses at fluences under 2.5 J/cm² using a 1064 nm laser to avoid ablation.
      This method leverages its 3017°C melting point and reflectivity, particularly minimizing thermal buildup. Thus, at 100
      W power and 500 mm/s scanning, it suits medical implants by effectively clearing oxides.
    metadata:
      topic: laser parameters, such as pulse
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: true
      order: 1
  - id: how-does-tantalums-corrosion-resistance-affect
    title: How does Tantalum's corrosion resistance affect the choice of laser cleaning methods for removing oxide layers
      in aerospace components?
    content: Tantalum's corrosion resistance, particularly from a tough passive oxide film, limits laser absorption due to
      the metal's high reflectivity. This notably favors pulsed over continuous wave lasers to prevent thermal damage during
      oxide removal on aerospace parts. Thus, employ 1064 nm wavelength with 2.5 J/cm² fluence and 10 ns pulses for precise
      ablation without substrate harm.
    metadata:
      topic: tantalum's corrosion restance affect the
      severity: critical
      acceptedAnswer: true
      expertInfo:
