components:
  settingsDescription: When laser cleaning Fiber Reinforced Polyurethane, we typically begin with a gentle power setup to
    match its flexible yet tough composite structure. This material absorbs laser energy well, so it clears contaminants quickly
    without deep penetration. But watch out mid-process—its low heat spread can cause localized overheating, leading to fiber-matrix
    separation. We've found multiple light passes at steady speeds fix that, restoring the surface evenly for aerospace or
    automotive parts.
  micro:
    before: We've found that the contaminated FRPU surface looks rough and patchy under magnification. Dirt clings tightly
      to the fibers, hiding their sharp edges. This buildup makes the whole material seem dull and uneven.
    after: After laser treatment, the clean surface reveals crisp fiber outlines clearly. The polyurethane matrix shines smoothly
      without any residue spots. We see a uniform, vibrant finish that highlights the reinforced structure well.
