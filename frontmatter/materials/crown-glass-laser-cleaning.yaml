      _open: false
      order: 8
  - id: can-laser-cleaning-be-used-to
    title: Can laser cleaning be used to remove anti-reflection coatings or other thin films from Crown Glass without damaging
      the substrate?
    content: Laser cleaning offers a practical approach to removing anti-reflection coatings from Crown Glass via selective
      ablation at 1.2 J/cm². Nanosecond pulses at 1064 nm precisely target the thin film for energy absorption, keeping the
      transparent substrate intact. In this process, controlling parameters such as 50 µm spot size and 500 mm/s scan speed
      ensures the glass surface stays pristine.
    metadata:
      topic: laser cleaning be used to
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
