components:
  settingsDescription: 'We''ve found Crown Glass tricky to clean without cracking. It handles heat poorly compared to sturdier
    borosilicate types. Start low on power to dodge thermal shock.


    This soda-lime glass expands quickly when heated. Heat builds up unevenly since it conducts poorly. We adjust by slowing
    scan speeds and adding overlaps.


    Unlike denser ceramics, its fragility demands gentle pulses. Multiple light passes restore surfaces cleanly. Avoid high
    energy—it warps edges fast.


    In heritage work, this approach preserves details well. We''ve seen it shine in labs too. Just cool between runs to stay
    safe.'
  micro:
    before: When examining the contaminated surface of crown glass at high magnification, we see scattered dirt particles
      clinging tightly to the uneven texture. Dust and grime create a hazy layer that obscures the underlying clarity. This
      buildup makes the surface look rough and mottled overall.
    after: After laser treatment, the same crown glass surface appears smooth and free of debris under magnification. We notice
      the glass now shines with a uniform polish that reflects light evenly. In our experience, this clean finish restores
      the material's natural transparency
