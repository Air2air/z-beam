faq:
  presentation: collapsible
  items:
  - id: what-are-the-specific-laser-parameters
    title: What are the specific laser parameters (wavelength, fluence, pulse duration) for safely cleaning contaminants from
      Crown Glass without causing damage or microfractures?
    content: 'As a laser cleaning specialist from Indonesia, I suggest a practical approach: employ a Nd:YAG laser at 1064
      nm wavelength, with fluence of 0.5-1.0 J/cm² and 5-10 ns pulse duration to safely remove contaminants from Crown Glass.
      This process ablates dirt efficiently, avoiding thermal stress or microfractures, based on my hands-on work in heritage
      restoration.'
    metadata:
      topic: the specific laser parameters (wavelength,
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: true
      order: 1
  - id: how-does-the-low-thermal-expansion
    title: How does the low thermal expansion coefficient of Crown Glass affect laser cleaning compared to other glass types?
    content: Crown Glass features minimal thermal expansion, around 8.0 x 10⁻⁶/°C, which practically cuts down stress cracking
      risks in laser cleaning. This process lets us apply a 1.2 J/cm² fluence safely for contaminant removal, avoiding thermal
      shock issues that plague higher-expansion types like soda-lime.
    metadata:
      topic: the low thermal expansion coefficient
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 2
  - id: can-laser-cleaning-cause-permanent-refractive
    title: Can laser cleaning cause permanent refractive index changes or optical distortion in Crown Glass components?
    content: Laser cleaning configured straightforward at 1.2 J/cm² fluence and 50 μm spot size prevents permanent refractive
      index changes in Crown Glass. Practically, the focus is keeping parameters under the material's damage threshold, which
      preserves optical integrity without distortion.
    metadata:
      topic: laser cleaning cause permanent refractive
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 3
  - id: what-specific-contaminants-on-crown-glass
    title: What specific contaminants on Crown Glass (fingerprints, adhesives, coatings) respond best to laser cleaning versus
      traditional methods?
    content: Laser cleaning offers a practical approach for removing organic residues, like fingerprints and thin adhesives,
      from Crown Glass. This process employs a 1064 nm wavelength at 1.2 J/cm² to ablate contaminants efficiently without
      substrate damage, unlike solvents that often leave streaks or demand mechanical contact.
    metadata:
      topic: specific contaminants on crown glass
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 4
  - id: are-there-particular-crown-glass-compositions
    title: Are there particular Crown Glass compositions (e.g., BK7, other crown variants) that are more or less suitable
      for laser cleaning?
    content: BK7's minimal dopants yield excellent 1064 nm transmission straightforwardly, enabling safe cleaning at 1.2 J/cm².
      By contrast, cerium or other absorbing ion variants risk thermal stress, so they demand significantly lower fluence
      efficiently to prevent subsurface damage.
    metadata:
      topic: there particular crown glass compositions
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 5
  - id: what-safety-considerations-are-unique-to
    title: What safety considerations are unique to laser cleaning Crown Glass compared to metals or other materials?
    content: For crown glass, maintaining fluence strictly below 1.2 J/cm² is essential to avoid subsurface fractures. Its
      transparency at 1064 nm poses major reflection risks, and brittle failure produces hazardous fine particulates, requiring
      practical containment plus real-time monitoring unlike that method for metals.
    metadata:
      topic: safety considerations unique to laser
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 6
  - id: how-do-you-verify-the-surface
    title: How do you verify the surface quality and optical performance of Crown Glass after laser cleaning?
    content: To verify Crown Glass quality, we apply white-light interferometry straightforwardly for surface roughness below
      1 nm RMS, alongside spectrophotometry ensuring optical transmission exceeds 99.5%. This process of non-destructive microscopic
      inspection at 200x magnification rules out subsurface cracking from 1.2 J/cm² fluence.
    metadata:
      topic: do you verify the surface
      severity: medium
      acceptedAnswer: true
