    _display:
      _open: false
      order: 9
  - id: what-are-the-limitations-of-laser
    title: What are the limitations of laser cleaning for Crown Glass with existing surface defects or subsurface damage?
    content: Pre-existing flaws in Crown Glass significantly lower the safe operational fluence below the typical 1.2 J/cm²
      threshold. Subsurface damage absorbs 1064 nm laser energy, sparking localized thermal stress and catastrophic crack
      propagation. A practical pre-cleaning assessment via microscopy is vital to detect and map these defects for straightforward
      parameter tweaks.
