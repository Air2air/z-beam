      before: At 1000x magnification, the contaminated surface of Indium Phosphide
        shows scattered dark spots and uneven layers that cover much of the base material.
        Fine particles cling tightly to the rough patches, creating a mottled appearance
        across the entire view. These contaminants obscure the underlying structure
        and make the surface look dull overall.
