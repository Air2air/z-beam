      order: 6
  - id: what-filtration-systems-are-recommended-for
    title: What filtration systems are recommended for capturing manganese oxide nanoparticles generated during laser cleaning?
    content: For manganese oxide nanoparticles produced at a 1064 nm wavelength and 2.5 J/cm² fluence, a HEPA H14 or ULPA
      filter is basically essential. These systems fairly effectively trap submicron particles, stopping hazardous fume spread
      in the laser ablation process.
    metadata:
      topic: filtration systems recommended for capturing
      severity: critical
      acceptedAnswer: true
      expertInfo:
