  - id: what-personal-protective-equipment-ppe-is
    title: What personal protective equipment (PPE) is specifically required for laser cleaning manganese alloys compared
      to regular steel?
    content: Manganese fume risks call for ramped-up respiratory protection that goes beyond basic steel guidelines. Opt for
      a NIOSH-approved P100 or N100 filter, since the manganese oxide particles we typically produce at 100W, 1064nm settings
      pose a pretty serious inhalation threat. This cartridge proves essential for filtering the fine particulate waste effectively.
    metadata:
      topic: personal protective equipment (ppe) specifically
