title: Manganese Laser Cleaning
description: When laser cleaning manganese, you'll want to kick off with moderate
  power levels and steady scan speeds to make the most of its low thermal conductivity,
  which keeps heat nicely localized but calls for close monitoring along the way to
  avoid uneven oxidation on any delicate parts.
