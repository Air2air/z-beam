      order: 7
  - id: can-laser-cleaning-be-used-on
    title: Can laser cleaning be used on manganese-based alloys in the railroad industry (frogs, crossings) without compromising
      fatigue strength?
    content: Laser cleaning, properly calibrated at 2.5 J/cm² fluence, fairly effectively removes oxides from manganese alloys.
      Pretty much, this approach preserves the underlying microstructure, which is vital for sustaining fatigue strength in
      railroad parts like frogs and crossings.
    metadata:
      topic: laser cleaning be used on
      severity: high
      acceptedAnswer: true
      expertInfo:
