      order: 5
  - id: does-laser-cleaning-affect-the-workhardening
    title: Does laser cleaning affect the work-hardening properties of austenitic manganese steel surfaces?
    content: A properly configured laser cleaning at 2.5 J/cm² fluence fairly minimizes thermal input, preserving the austenitic
      structure. This setup typically prevents altering the work-hardening characteristics essential for manganese steel's
      wear resistance. The process avoids annealing effects that would soften the surface.
    metadata:
      topic: laser cleaning affect the work-hardening
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
