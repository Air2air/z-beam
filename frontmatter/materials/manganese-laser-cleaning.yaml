      order: 10
  - id: does-laser-cleaning-create-any-surface
    title: Does laser cleaning create any surface oxidation or discoloration on manganese steels that requires post-treatment?
    content: Well-tuned 1064nm laser systems at roughly 2.5 J/cm² fluence pretty much ablate manganese oxides effectively,
      without causing new discoloration. At optimal parameters like 500 mm/s scan speed, the process delivers a clean, passivated
      surface that typically needs no extra finishing for industrial applications.
