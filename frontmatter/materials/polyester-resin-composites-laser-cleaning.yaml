  components:
    settings_description: When laser cleaning polyester resin composites, I've found
      starting with a gentle pass works best. These fiber-reinforced materials differ
      from plain plastics because they're layered for strength, so the laser clears
      surface grime without delaminating fibers. You'll notice their low heat spread
      compared to metals—keeps the base intact. Adjust the beam to skim lightly at
      first. This tends to restore the smooth finish nicely, especially in aerospace
      or marine parts where corrosion hides underneath. I've seen it shine up wind
      turbine blades effectively. Move the scan steadily across the surface. Unlike
      denser composites, these expand little under heat, avoiding cracks. But watch
      the edges. End with a final check—too much dwell can yellow the resin, so pull
      back power if you spot any haze.
    micro:
      before: Looking closely at the contaminated surface, I've seen how dirt clings
        tightly to the fibers. Grimy particles scatter unevenly across the rough texture.
        This buildup hides the material's true structure completely.
      after: After laser treatment, the surface reveals clean, exposed fibers without
        any residue. Smooth areas now dominate the once-cluttered view. I've found
        this restores the composite's natural clarity effectively.
