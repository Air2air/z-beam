components:
  settings_description: When laser cleaning mahogany, start with a careful assessment of its high porosity, which can lead
    to uneven energy absorption if not managed. This property requires you to reduce power levels initially to prevent surface
    charring while ensuring the laser removes contaminants without embedding them deeper into the wood's open structure. Adjust
    scan speeds higher than for denser hardwoods to minimize heat buildup, restoring the material's natural grain effectively
    and avoiding cracks from thermal stress.
  micro:
    before: At 1000x magnification, the mahogany surface shows dark spots and fine dust layers covering the wood fibers. Grime
      clings tightly to the uneven texture, blocking the natural grain patterns below. Contaminants create a rough, mottled
      appearance across the entire area.
    after: After laser treatment at 1000x magnification, the surface reveals clear, exposed wood fibers without any residue.
      The grain patterns emerge smoothly, restoring the material's original even texture. Cleaning removes all visible dirt,
      leaving
