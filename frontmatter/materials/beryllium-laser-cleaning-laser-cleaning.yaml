page_title: beryllium-laser-cleaning
micro:
  before: Beryllium surface before cleaning shows heavy contamination, it covers entire
    area with oxide layers and particles. This contamination forms irregular patterns
    because exposure to air causes buildup, so roughness appears across microscopic
    view at high magnification. Oxide buildup reduces smoothness, and particles cling
    tightly to metal structure. During observation, contamination appears as dark
    spots and uneven films on light beryllium base.
  after: After laser cleaning is applied, surface achieves complete removal of layers
    already. Clean beryllium exhibits uniformity, it reflects light evenly without
    residues. From the data, treatment removes oxide effectively, so unique hexagonal
    patterns of metal emerge clearly. In post-cleaning view, no particles still present,
    and surface shows smooth texture. Process restores original characteristics, because
    laser ablation targets contaminants precisely without damaging base material.
    Results are obtained from scans, they confirm clean state at magnification.
