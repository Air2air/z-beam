components:
  subtitle: Cobalt maintains its structural integrity under extreme heat and stress, a key trait for aerospace superalloys
    and medical implants
  micro:
    before: At 1000x magnification, the cobalt surface bristles with jagged contaminants that scatter light unevenly. I've
      seen how these dark flecks and rough patches cling tightly, hiding the metal's base texture. This buildup creates a
      chaotic, obscured view that blocks clear observation.
    after: After laser treatment at the same scale, the cobalt surface lies flat and reflective without any clinging debris.
      The once-jagged areas now form smooth, uninterrupted planes that catch light consistently. This cleaned state reveals
      the metal's inherent
  settings_description: 'When laser cleaning cobalt, you must tackle its moderate reflectivity first. This sets it apart from
    highly absorptive metals like titanium, where energy soaks in quickly. With cobalt, the laser beam bounces back more,
    so contaminants linger longer if you blast too hard.


    Start with lower power settings to build absorption gradually. Make sure you scan slowly at first. This avoids surface
    pitting, a common pitfall mid-process when heat builds unevenly.


    Cobalt''s strength and heat resistance shine here compared to softer alloys. They let you ramp up passes without warping.
    Just overlap beams well to clear tough buildup from aerospace parts or medical tools. Adjust fluence as you go to keep
    the base intact.'
