      order: 7
  - id: what-are-the-waste-management-considerations
    title: What are the waste management considerations for cobalt particles generated during laser cleaning operations?
    content: Notably, cobalt debris demands hazardous waste classification owing to its toxic fine particles. Specifically,
      use HEPA filtration rated for sub-micron capture, given that our 50μm spot size at 100W produces substantial aerosol.
      Always check local regulations for disposing of this regulated metal.
    metadata:
      topic: the waste management considerations for
      severity: critical
