      order: 9
  - id: how-do-you-prevent-the-formation
    title: How do you prevent the formation of cobalt oxide during laser cleaning of cobalt components?
    content: To prevent cobalt oxide formation, particularly by maintaining an inert argon atmosphere during laser processing.
      Control thermal input with 100W average power and 2.5 J/cm² fluence, thus remaining below the oxidation threshold. A
      final low-power pass can also ensure a pristine surface.
