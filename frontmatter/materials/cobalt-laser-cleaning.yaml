  - id: how-does-the-high-melting-point
    title: How does the high melting point and thermal conductivity of cobalt affect laser cleaning efficiency and parameter
      selection?
    content: Cobalt's high melting point (1495°C) and thermal conductivity particularly require precise fluence control near
      2.5 J/cm². Thus, we fine-tune nanosecond pulses with 500 mm/s scanning for rapid oxide ablation, while controlling heat
      diffusion to safeguard the substrate.
