  - id: what-is-the-best-laser-cleaning
    title: What is the best laser cleaning approach for removing oxide layers from cobalt-based stellite surfaces without
      removing base material?
    content: For cobalt stellite oxide removal, apply 1064nm nanosecond pulses at 2.5 J/cm² fluence. Notably, this threshold
      ablates oxides effectively while preserving the base alloy, thus maintaining surface integrity for critical applications.
    metadata:
      topic: the best laser cleaning approach
