faq:
  presentation: collapsible
  items:
  - id: can-laser-cleaning-effectively-remove-cobaltcontaining
    title: Can laser cleaning effectively remove cobalt-containing thermal barrier coatings from turbine blades without damaging
      the substrate?
    content: Using optimized 1064nm parameters, laser cleaning particularly excels at removing cobalt-based thermal barrier
      coatings. Specifically, keeping fluence under 2.5 J/cm² with a 50μm spot size safeguards the nickel superalloy substrate.
      Notably, this technique surpasses mechanical methods by preventing surface damage and ensuring complete removal in roughly
      three passes.
    metadata:
      topic: laser cleaning effectively remove cobalt-containing
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: true
      order: 1
  - id: what-safety-precautions-are-needed-when
    title: What safety precautions are needed when laser cleaning cobalt-based alloys to prevent inhalation of toxic fumes?
    content: For laser cleaning of cobalt alloys at a 1064 nm wavelength, particularly due to the toxic submicron particles
      generated, high-efficiency fume extraction is essential. Keep exposure under the 0.02 mg/m³ OSHA limit with powered
      air-purifying respirators featuring P100 filters. Thus, 100W laser settings produce inhalable fumes that demand local
      exhaust ventilation at the source.
    metadata:
      topic: safety precautions needed laser cleaning
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 2
  - id: how-do-laser-parameters-need-to
    title: How do laser parameters need to be adjusted when cleaning cobalt-chromium alloys compared to steel or aluminum?
    content: For Co-Cr alloys, particularly given their superior thermal resistance, apply a higher fluence threshold around
      2.5 J/cm² than for steel or aluminum. Thus, a 1064 nm wavelength with nanosecond pulses works best to counter surface
      reflectivity and remove oxides without harming the substrate.
    metadata:
      topic: do laser parameters need to
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 3
  - id: does-laser-cleaning-create-any-surface
    title: Does laser cleaning create any surface modification or phase changes in cobalt superalloys that could affect material
      performance?
    content: Specifically tuned 1064nm nanosecond lasers at ~2.5 J/cm² fluence effectively remove cobalt oxides. Notably,
      the minimal heat-affected zone prevents significant phase changes, despite possible localized residual stress. Thus,
      the superalloy's critical microstructural integrity remains preserved.
    metadata:
      topic: laser cleaning create any surface
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 4
  - id: what-is-the-best-laser-cleaning
    title: What is the best laser cleaning approach for removing oxide layers from cobalt-based stellite surfaces without
      removing base material?
    content: For cobalt stellite oxide removal, apply 1064nm nanosecond pulses at 2.5 J/cm² fluence. Notably, this threshold
      ablates oxides effectively while preserving the base alloy, thus maintaining surface integrity for critical applications.
    metadata:
      topic: the best laser cleaning approach
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 5
  - id: can-laser-cleaning-be-used-to
    title: Can laser cleaning be used to decontaminate cobalt-60 contaminated surfaces in nuclear applications?
    content: Laser cleaning notably removes Co-60 contamination from cobalt surfaces with a 1064 nm wavelength and 2.5 J/cm²
      fluence. Specifically, this approach cuts secondary waste versus traditional chemical methods, thus boosting radionuclide
      removal efficiency in nuclear decommissioning.
    metadata:
      topic: laser cleaning be used to
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
