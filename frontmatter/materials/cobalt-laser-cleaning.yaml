      order: 8
  - id: is-laser-cleaning-suitable-for-preparing
    title: Is laser cleaning suitable for preparing cobalt surfaces for thermal spray or welding applications?
    content: Specifically, laser cleaning prepares cobalt surfaces for thermal spray by removing oxides at 2.5 J/cm² without
      substrate damage. This technique outperforms abrasive blasting, notably through enhanced cleanliness and surface activation,
      thus guaranteeing strong adhesion in aerospace and medical device uses. It delivers a highly active, contaminant-free
      surface.
    metadata:
      topic: laser cleaning suitable for preparing
      severity: critical
