      order: 5
  - id: can-laser-cleaning-be-used-to
    title: Can laser cleaning be used to decontaminate cobalt-60 contaminated surfaces in nuclear applications?
    content: Laser cleaning notably removes Co-60 contamination from cobalt surfaces with a 1064 nm wavelength and 2.5 J/cm²
      fluence. Specifically, this approach cuts secondary waste versus traditional chemical methods, thus boosting radionuclide
      removal efficiency in nuclear decommissioning.
