      order: 3
  - id: does-laser-cleaning-create-any-surface
    title: Does laser cleaning create any surface modification or phase changes in cobalt superalloys that could affect material
      performance?
    content: Specifically tuned 1064nm nanosecond lasers at ~2.5 J/cm² fluence effectively remove cobalt oxides. Notably,
      the minimal heat-affected zone prevents significant phase changes, despite possible localized residual stress. Thus,
      the superalloy's critical microstructural integrity remains preserved.
