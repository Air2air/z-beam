        order: 8
    - id: what-are-the-regulatory-requirements-for
      title: >-
        What are the regulatory requirements for laser cleaning silicon carbide in automotive or aerospace
        manufacturing?
      content: >-
        In the automotive and aerospace industries, particularly when laser cleaning silicon carbide, ISO 11146
        compliance ensures precise beam characterization to avoid substrate damage. For engine components, traceability
        protocols prove vital, specifically monitoring processes at 100 W power and 2.5 J/cm² fluence. Subsequently,
        apply non-destructive testing to verify surface integrity while preserving SiC's semiconductor properties.
