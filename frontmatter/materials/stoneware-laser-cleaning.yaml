components:
  settings_description: When laser cleaning stoneware, you'll want to start with its
    dense, low-porosity nature. This makes it highly resistant to deep penetration
    by contaminants, so the laser clears surface grime efficiently without soaking
    into the material. Make sure you keep the power low at first to handle its poor
    heat spreading—heat builds up quickly, which can lead to cracks if you're not
    careful. Adjust by using short pulses and multiple light passes, overlapping them
    to restore the finish evenly. Watch out for overdoing it mid-process; that dense
    hardness means it holds up well to abrasion but risks micro-fractures from sudden
    heat spikes. This approach keeps your stoneware intact for heritage or industrial
    reuse.
  micro:
    before: At 1000x magnification, the stoneware surface before cleaning shows thick
      layers of grime clinging tightly. Dark particles scatter unevenly, hiding the
      underlying texture completely. Tiny cracks trap more dirt, making everything
      look dull and rough.
    after: After laser treatment, that same surface gleams smooth and clear at 1000x.
      No grime remains, revealing a uniform, even finish. Cracks now stand empty and
      clean, restoring the natural shine.
