      order: 8
  - id: what-chemical-properties-of-stoneware-glazes
    title: What chemical properties of stoneware glazes influence the choice of laser for surface treatment in pottery production?
    content: Stoneware glazes with 60-70% silica content strongly absorb near-infrared light at 1064 nm, making Q-switched
      Nd:YAG lasers practical for surface treatment without excess heating. This process minimizes melting risks in pottery
      production at 5 J/cm² fluences, ensuring precise contaminant removal while preserving the glaze's integrity.
