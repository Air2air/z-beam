faq:
  presentation: collapsible
  items:
  - id: what-laser-wavelengths-are-most-effective
    title: What laser wavelengths are most effective for cleaning soot and grease from glazed stoneware without affecting
      the underlying ceramic structure?
    content: For glazed stoneware, the 1064 nm near-infrared wavelength offers a practical way to ablate soot and grease,
      with high contaminant absorption and low penetration into the ceramic substrate that preserves its integrity. This process
      outperforms 532 nm, which risks overheating glazes, and sidesteps abrasive techniques' chance of surface scratches—target
      5 J/cm² fluence for safe, uniform results.
    metadata:
      topic: laser wavelengths most effective for
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: true
      order: 1
  - id: how-can-thermal-shock-be-prevented
    title: How can thermal shock be prevented when using pulsed lasers to clean antique stoneware pottery?
    content: For antique stoneware pottery, a practical approach to avoid thermal shock during pulsed laser cleaning involves
      10 ns pulses at 5 J/cm² fluence, curbing rapid heat spikes on this low-conductivity ceramic with moderate thermal expansion.
      Mild pre-heating to 40°C beforehand equalizes surface temperatures efficiently, minimizing stress risks while enabling
      gentle contaminant removal.
    metadata:
      topic: thermal shock be prevented using
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 2
  - id: in-industrial-settings-what-are-the
    title: In industrial settings, what are the common challenges in removing metal oxides from stoneware surfaces using laser
      ablation?
    content: In industrial laser ablation, the strong adhesion of metal oxides to stoneware's porous ceramic matrix presents
      a major hurdle, requiring a precise fluence of 5 J/cm² to vaporize contaminants without substrate fracture. This process
      demands nanosecond pulses at 50 kHz for thermal control, while post-cleaning spectroscopy efficiently uncovers trace
      residues that need multiple passes for complete removal.
    metadata:
      topic: in industrial settings, the common
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 3
  - id: what-safety-protocols-should-be-followed
    title: What safety protocols should be followed when laser cleaning stoneware in art restoration workshops to avoid glaze
      cracking?
    content: In art restoration workshops, it's practical to don ANSI Z136.1-compliant laser safety goggles rated for 1064
      nm wavelengths, protecting eyes from stray beams while cleaning stoneware. Set up robust ventilation systems that efficiently
      capture ceramic dust below 5 mg/m³, minimizing inhalation hazards. With this process, use IR thermography to keep surface
      temperatures under 200°C at 5 J/cm² fluence, preventing thermal stress and glaze cracks on porous ceramics.
    metadata:
      topic: safety protocols should be followed
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 4
  - id: how-does-the-porosity-of-unglazed
    title: How does the porosity of unglazed stoneware affect the efficiency of laser cleaning for organic residues?
    content: 'In unglazed stoneware, porosity causes laser beams to penetrate further, dispersing energy into voids and reducing
      efficiency for clearing surface organic residues. This process works straightforward for porous ceramics: select a 1064
      nm wavelength at 5 J/cm² fluence to enhance targeted absorption, unlike denser ones demanding precise pulse control.'
    metadata:
      topic: the porosity of unglazed stonew
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 5
  - id: what-are-the-typical-laser-power
    title: What are the typical laser power settings recommended by manufacturers for cleaning stoneware tiles in architectural
      applications?
    content: For stoneware tiles in architectural settings, manufacturers recommend 100 W average power at 1064 nm wavelength.
      This process gently ablates grime without harming the ceramic matrix. For practical application, pair it with 500 mm/s
      scan speeds and 5 J/cm² fluence, starting test patches on varied compositions for optimal results.
    metadata:
      topic: the typical laser power settings
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 6
  - id: in-foodgrade-stoneware-cleaning-are-there
    title: In food-grade stoneware cleaning, are there regulatory concerns with laser methods removing contaminants like food
      oils?
    content: Laser cleaning provides a straightforward approach to removing oils from food-grade stoneware without chemicals,
      aligning with FDA guidelines for inert ceramic surfaces that prevent leaching. At 5 J/cm² fluence and 1064 nm wavelength,
      this process ablates contaminants precisely, minimizing thermal stress—validate efficacy via surface residue tests below
      10 ppm for compliance.
    metadata:
