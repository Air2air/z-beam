  components:
    settings_description: When laser cleaning Kevlar-reinforced polymer, watch its
      low heat conduction first—it traps warmth unevenly and risks fiber damage if
      you push too hard. I've found starting with gentle pulses works best, spreading
      energy slowly to avoid delamination. This tough composite shines in aerospace
      parts, where its strength holds up without warping. Just keep scans steady;
      overtreatment weakens the reinforcement bonds.
    micro:
      before: At 1000x magnification, the contaminated Kevlar-reinforced polymer surface
        shows thick layers of grime clogging the fibers. Dirt particles scatter unevenly,
        making the weave look matted and dull. Scratches and buildup hide the material's
        natural texture completely.
      after: After laser treatment, the same surface appears smooth and vibrant under
        1000x magnification. Fibers stand out clearly, free from any residue or debris.
        The clean weave reveals a uniform, glossy finish without a trace of
