  components:
    subtitle: Basalt offers exceptional thermal stability up to 1673 Kelvin and high corrosion resistance, making it a uniquely
      durable igneous stone for demanding aerospace and marine applications
    description: When laser cleaning Basalt, you'll want to account for its dense structure at 2900 kg/m³ and low porosity
      of 3.4%, which help it hold up well under heat up to 1673 K without cracking easily. But watch its low thermal diffusivity
      of 8.5e-07 m²/s—it heats locally fast, so use 100 W at 1064 nm with 50 kHz pulses and 500 mm/s speed to avoid thermal
      stress. This clears contaminants cleanly in three passes at 50% overlap, unlike softer stones that warp quicker.
    settings_description: When laser cleaning basalt, it stands out from softer stones like limestone because of its dense,
      hard nature. I've seen this density help absorb laser energy quickly, so contaminants lift off without much residue
      left behind. That makes the process efficient for tough buildup in construction or heritage sites. But watch out mid-way—basalt
      tends to fracture if heat builds unevenly, unlike those porous limestones that just fizz away. This works best when
      you keep passes steady and overlap spots well, solving the brittleness by spreading the energy. In my experience, it
      preserves the stone's strength for marine or aerospace uses, avoiding cracks that could weaken structures later. Just
      ease into higher intensities gradually to handle its heat resistance without surprises.
    micro:
      before: We've found the contaminated basalt surface looks rough and uneven under magnification. Dark specks of dirt
        and grime fill every tiny crack and pore. This buildup obscures the stone's natural grainy texture completely.
      after: After laser treatment, we observe a crisp, even surface free of debris. The stone's inherent patterns stand out
        sharply now. Clean edges reveal the material's solid, uniform structure.
