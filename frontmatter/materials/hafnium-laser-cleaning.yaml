components:
  settingsDescription: When laser cleaning hafnium, I've seen that its heat resistance works best if you start with controlled
    pulses to gradually expose the surface without cracking. This process restores the metal's integrity in aerospace or nuclear
    parts by reducing oxide layers steadily. Tends to absorb energy moderately, so overlap passes evenly to avoid uneven heating.
    Watch for thermal buildup at the end, as it can warp thin sections if not monitored closely.
  micro:
    before: The contaminated hafnium surface appears uneven and dotted with dark residues. Clumps of debris stick firmly across
      the rough texture. Layers of grime hide the underlying metal structure.
    after: Laser treatment restores the hafnium surface to a smooth, even finish. It removes all visible contaminants without
      leaving marks. The clean metal now reveals a uniform, reflective appearance.
