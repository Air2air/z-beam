components:
  subtitle: Palladium resists oxidation at high temperatures and maintains stable electrical contacts in demanding environments
  micro:
    before: I've seen the contaminated surface of palladium up close at high magnification, and it looks rough with scattered
      dark spots clinging everywhere. Layers of grime build up unevenly, making the whole thing dull and patchy under the
      lens. Those contaminants stick tight, hiding the metal's true shine beneath a messy coat.
    after: After the laser treatment, the surface turns smooth and even, revealing a bright, uniform gleam. No more spots
      or buildup mar the view; everything clears out neatly. The cleaned palladium now
  settingsDescription: 'When laser cleaning Palladium, you''ll want to begin with a careful setup to handle its high reflectivity.
    Start by selecting a lower power level right from the outset. This metal reflects a lot of the laser energy, so you must
    dial it back to ensure the beam gets absorbed enough for effective cleaning without wasting shots.


    Move on to your scan speed next. Keep it moderate to allow the heat to spread evenly across the dense surface. Palladium''s
    strong thermal conductivity helps here—it pulls heat away quickly, which prevents hot spots and protects the underlying
    structure during the process.


    Watch out midway through: don''t push the fluence too high, or you risk uneven ablation on this corrosion-resistant material.
    Its noble nature means contaminants cling stubbornly, so make multiple passes with good overlap to lift them without scratching
    the finish.


    Finish by checking the dwell time—short bursts work best. This approach cleans jewelry or aerospace parts cleanly every
    time, leaving no residue behind.'
