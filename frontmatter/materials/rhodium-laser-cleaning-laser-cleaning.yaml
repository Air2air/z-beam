page_title: rhodium-laser-cleaning
micro:
  before: Laser cleaning rhodium surfaces starts simple. Set up the microscope at
    1000x magnification. Focus in on the contaminated spots first.
  after: Contaminants cling tight to rhodium's dense, reflective base. Dark, irregular
    patterns build up—gritty residues from handling or exposure. These smudges dull
    the metal's natural luster, creating uneven textures that scatter light oddly.
    Pores trap fine particles, forming clustered islands across the smooth underlayer.
