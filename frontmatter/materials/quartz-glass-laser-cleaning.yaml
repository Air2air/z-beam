        acceptedAnswer: true
        expertInfo: *id002
      - id: quartz-components
        question: What safety precautions are needed when laser cleaning near quartz components?
        answer: Keep fluence under 2.5 J/cm² in a straightforward manner to avoid damaging the quartz substrate. Use beam
          dumps and complete optical enclosures practically to handle risky reflections and trap any flying debris. Watch
          for surface wear continuously, since slight contamination can spark local heating and lasting optic harm at 1064
          nm.
        topic: quartz components
        severity: critical
        acceptedAnswer: true
        expertInfo: *id002
      - id: quartz-glass-purity
        question: How does quartz glass purity (fused silica vs. natural quartz) affect laser cleaning applications?
        answer: Fused silica, with superior UV transmission and low OH content (<5 ppm), enables efficiently 1064 nm laser
