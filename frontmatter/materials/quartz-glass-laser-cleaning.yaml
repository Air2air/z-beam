faq:
  presentation: collapsible
  items:
  - id: can-quartz-glass-be-damaged-by
    title: Can quartz glass be damaged by laser cleaning systems, and what power/wavelength settings are safe?
    content: Quartz glass handles up to 2.5 J/cm² fluence without damage in a straightforward manner. For safe operation,
      stick to a 1064 nm near-IR wavelength and keep average power under 100 W to avoid devitrification. This process of proper
      parameter control ensures contaminant removal efficiently while preserving substrate integrity.
    metadata:
      topic: quartz glass be damaged by
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: true
      order: 1
  - id: why-is-quartz-glass-used-for
    title: Why is quartz glass used for laser cleaning system components like protective windows and lenses?
    content: Quartz glass components deliver straightforward optical clarity across UV to IR wavelengths, enduring intense
      laser exposure up to 2.5 J/cm². Featuring an exceptionally low thermal expansion coefficient of 0.55 ppm/°C, it ensures
      remarkable thermal stability and dimensional integrity during high-power 100W operations. This blend of high transmission
      and laser damage resistance proves indispensable for protective windows and focusing lenses in cleaning systems.
    metadata:
      topic: quartz glass used for laser
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 2
  - id: how-do-you-clean-lasercontaminated-quartz
    title: How do you clean laser-contaminated quartz optics without damaging them?
    content: For quartz optics, a straightforward approach is to use nanosecond pulses at 1064 nm wavelength with fluence
      below 2.5 J/cm². This selectively ablates contaminants, as the substrate's high transparency avoids damage. That method
      works well, followed by isopropyl alcohol and lint-free wipes for final residue removal.
    metadata:
      topic: do you clean laser-contaminated quartz
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 3
  - id: what-happens-if-laser-cleaning-is
    title: What happens if laser cleaning is performed on contaminated quartz glass surfaces?
    content: Contaminants such as metallic particles absorb 1064 nm laser energy far more than quartz, resulting in intense
      localized heating. This process can create thermal shock that exceeds the material's fracture toughness, forming micro-cracks.
      That method of precise fluence control below ~2.5 J/cm² is practical to prevent such damage.
    metadata:
      topic: happens if laser cleaning performed
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 4
  - id: does-quartz-glass-transparency-affect-laser
    title: Does quartz glass transparency affect laser cleaning effectiveness and safety?
    content: Quartz glass exhibits high transparency at 1064 nm, requiring practical fluence control around 2.5 J/cm² to prevent
      beam passage through thin sections. That method also demands rigorous eye protection, since laser energy transmits straight
      through the material.
    metadata:
      topic: quartz glass transpncy affect laser
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 5
  - id: how-does-quartz-glass-compare-to
    title: How does quartz glass compare to other materials like sapphire for laser system windows?
    content: In a straightforward way, quartz glass delivers superior UV transmission and thermal shock resistance up to 1100°C,
      whereas sapphire brings greater hardness. For standard 1064 nm laser cleaning at 2.5 J/cm², fused silica stands out
      as practical due to its lower cost and solid durability.
    metadata:
      topic: quartz glass comp to other
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 6
  - id: what-are-the-signs-of-quartz
    title: What are the signs of quartz optic degradation in laser cleaning systems?
    content: Clouding and discoloration straightforwardly signal cumulative thermal damage from fluence exceeding 2.5 J/cm².
      This process heightens scatter, which lowers transmission efficiency and cleaning performance. That method of incorrect
      50% overlap also causes pitting and coating damage, undermining the optic's integrity.
    metadata:
      topic: the signs of quartz optic
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 7
  - id: can-laser-cleaning-remove-coatings-or
    title: Can laser cleaning remove coatings or deposits from quartz surfaces without damaging the substrate?
    content: Yes, laser cleaning can effectively remove coatings or deposits from quartz surfaces without damaging the substrate.
      Using controlled laser pulses, it ablates contaminants selectively, preserving quartz's delicate structure. In my work
      here in Indonesia, we've successfully applied this for optical components, ya, with excellent results.
    metadata:
      topic: laser cleaning remove coatings or
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 8
  - id: what-safety-precautions-are-needed-when
    title: What safety precautions are needed when laser cleaning near quartz components?
    content: Keep fluence under 2.5 J/cm² in a straightforward manner to avoid damaging the quartz substrate. Use beam dumps
      and complete optical enclosures practically to handle risky reflections and trap any flying debris. Watch for surface
      wear continuously, since slight contamination can spark local heating and lasting optic harm at 1064 nm.
    metadata:
      topic: safety precautions needed laser cleaning
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 9
  - id: how-does-quartz-glass-purity-fused
    title: How does quartz glass purity (fused silica vs. natural quartz) affect laser cleaning applications?
    content: Fused silica, with superior UV transmission and low OH content (<5 ppm), enables efficiently 1064 nm laser cleaning
      at 2.5 J/cm² without thermal stress. Natural quartz faces higher impurity inclusions, risking localized absorption and
      micro-fractures that compromise this process integrity and may damage the substrate under standard laser parameters.
