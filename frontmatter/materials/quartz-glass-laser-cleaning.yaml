      - id: protective-windows-and-lenses
        question: Why is quartz glass used for laser cleaning system components like protective windows and lenses?
        answer: Quartz glass components deliver straightforward optical clarity across UV to IR wavelengths, enduring intense
          laser exposure up to 2.5 J/cm². Featuring an exceptionally low thermal expansion coefficient of 0.55 ppm/°C, it
          ensures remarkable thermal stability and dimensional integrity during high-power 100W operations. This blend of
          high transmission and laser damage resistance proves indispensable for protective windows and focusing lenses in
          cleaning systems.
        topic: protective windows and lenses
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: quartz-optics
        question: How do you clean laser-contaminated quartz optics without damaging them?
        answer: For quartz optics, a straightforward approach is to use nanosecond pulses at 1064 nm wavelength with fluence
          below 2.5 J/cm². This selectively ablates contaminants, as the substrate's high transparency avoids damage. That
          method works well, followed by isopropyl alcohol and lint-free wipes for final residue removal.
        topic: quartz optics
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: contaminated-quartz-glass-surfaces
        question: What happens if laser cleaning is performed on contaminated quartz glass surfaces?
        answer: Contaminants such as metallic particles absorb 1064 nm laser energy far more than quartz, resulting in intense
          localized heating. This process can create thermal shock that exceeds the material's fracture toughness, forming
          micro-cracks. That method of precise fluence control below ~2.5 J/cm² is practical to prevent such damage.
        topic: contaminated quartz glass surfaces
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: quartz-glass-transparency
        question: Does quartz glass transparency affect laser cleaning effectiveness and safety?
        answer: Quartz glass exhibits high transparency at 1064 nm, requiring practical fluence control around 2.5 J/cm² to
          prevent beam passage through thin sections. That method also demands rigorous eye protection, since laser energy
          transmits straight through the material.
        topic: quartz glass transparency
        severity: critical
        acceptedAnswer: true
        expertInfo: *id002
      - id: laser-system-windows
        question: How does quartz glass compare to other materials like sapphire for laser system windows?
        answer: In a straightforward way, quartz glass delivers superior UV transmission and thermal shock resistance up to
          1100°C, whereas sapphire brings greater hardness. For standard 1064 nm laser cleaning at 2.5 J/cm², fused silica
          stands out as practical due to its lower cost and solid durability.
        topic: laser system windows
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: quartz-optic-degradation
        question: What are the signs of quartz optic degradation in laser cleaning systems?
        answer: Clouding and discoloration straightforwardly signal cumulative thermal damage from fluence exceeding 2.5 J/cm².
          This process heightens scatter, which lowers transmission efficiency and cleaning performance. That method of incorrect
          50% overlap also causes pitting and coating damage, undermining the optic's integrity.
        topic: quartz optic degradation
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
