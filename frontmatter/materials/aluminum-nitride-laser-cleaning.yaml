components:
  micro:
    before: >-
      At 1000x magnification, the contaminated aluminum nitride surface reveals clusters of dark particles scattered
      unevenly across the field. Fine debris clings to edges and fills shallow crevices, creating a mottled appearance
      that obscures the underlying structure. This buildup disrupts the overall smoothness and hides natural grain
      boundaries.
    after: >-
      After laser treatment, the same surface displays a uniform, clean texture free from any visible residues. The
      process exposes clear, even facets that reflect light consistently throughout the view. Now the material
