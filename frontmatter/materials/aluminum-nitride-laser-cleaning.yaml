faq:
  presentation: collapsible
  items:
    - id: how-does-aluminum-nitride-compare-to
      title: How does Aluminum Nitride compare to alumina in laser cleaning?
      content: >-
        Aluminum Nitride cleans more efficiently than alumina due to its superior thermal conductivity. We've found that
        heat from the laser dissipates quickly across the surface. This reduces the risk of localized overheating during
        the process. In contrast, alumina tends to retain heat and develop cracks more easily. We typically adjust laser
        parameters lower for Aluminum Nitrite to preserve its integrity.
      metadata:
        topic: aluminum nitride comp to alumina
        severity: medium
        acceptedAnswer: true
        expertInfo:
          name: Todd Dunning
          title: MA
          expertise:
            - Optical Materials for Laser Systems
      Display:
        Open: true
        order: 1
    - id: what-challenges-arise-when-laser-cleaning
      title: What challenges arise when laser cleaning porous Aluminum Nitride substrates?
      content: >-
        Aluminum Nitride features low porosity, which simplifies laser cleaning compared to more absorbent ceramics. The
        laser removes contaminants without deep penetration into the material structure. We've observed that surface
        residues lift cleanly under controlled pulses. This approach restores the original smoothness effectively.
        However, excessive power can still cause micro-fractures if not monitored.
      metadata:
        topic: challenges laser cleaning porous aluminum
        severity: high
        acceptedAnswer: true
        expertInfo:
          name: Todd Dunning
          title: MA
          expertise:
            - Optical Materials for Laser Systems
      Display:
        Open: false
        order: 2
    - id: can-laser-cleaning-improve-the-thermal
      title: Can laser cleaning improve the thermal performance of used Aluminum Nitride components?
      content: >-
        Laser cleaning effectively removes oxidation layers from Aluminum Nitride to restore its heat transfer
        properties.
      metadata:
        topic: laser cleaning improve the thermal
        severity: high
        acceptedAnswer: true
        expertInfo:
          name: Todd Dunning
          title: MA
          expertise:
            - Optical Materials for Laser Systems
      Display:
        Open: false
        order: 3
  options:
    autoOpenFirst: true
    sortBy: severity
