faq:
  presentation: collapsible
  items:
  - id: can-you-safely-laser-clean-iridium
    title: Can you safely laser clean iridium components, or will the laser damage the surface?
    content: Yes, it's pretty safe to laser clean iridium when using precise parameters. Given its high reflectivity and melting
      point, you'll typically need a 1064 nm wavelength with fluence controlled below 2.5 J/cm² to prevent surface damage.
      This approach effectively removes contaminants while preserving the material's integrity.
    metadata:
      topic: you safely laser clean iridium
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: true
      order: 1
  - id: what-is-the-best-laser-wavelength
    title: What is the best laser wavelength (e.g., 1064nm, 532nm) for cleaning contaminants from iridium without affecting
      the base metal?
    content: For iridium, the 1064 nm wavelength stands out as pretty optimal. It delivers sufficient absorption to strip
      away oxides and carbon deposits at a fluence of 2.5 J/cm², whereas the metal's high reflectivity at 532 nm makes it
      fairly less effective. This approach basically guarantees efficient contaminant ablation without harming the valuable
      substrate.
    metadata:
      topic: the best laser wavelength (e.g.,
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: false
      order: 2
  - id: what-specific-contaminants-or-oxides-are
    title: What specific contaminants or oxides are typically found on iridium surfaces that require laser cleaning?
    content: Iridium typically forms volatile IrO₂ above 600°C, though surfaces also build up carbonaceous deposits and metallic
      transfer. Our 1064 nm systems, running at 2.5 J/cm², fairly effectively remove these stubborn layers without the thermal
      damage seen in conventional approaches.
    metadata:
      topic: specific contaminants or oxides typically
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: false
      order: 3
  - id: are-there-any-toxic-fumes-or
    title: Are there any toxic fumes or safety hazards generated when laser cleaning iridium?
    content: Laser cleaning iridium at 1064 nm typically generates hazardous iridium oxide fumes, so robust ventilation is
      essential. Always consult the SDS for specific exposure limits and use HEPA filtration to capture sub-micron particles
      from ablation at 2.5 J/cm² fluence—it's fairly crucial.
    metadata:
      topic: there any toxic fumes or
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: false
      order: 4
  - id: how-does-the-extreme-hardness-and
    title: How does the extreme hardness and brittleness of iridium affect the laser cleaning process?
    content: Iridium's brittleness calls for pretty precise laser control. Pushing past 2.5 J/cm² fluence or botching the
      pulse width risks micro-cracking from thermal stress. Fairly often, we opt for a 50 µm spot and 45W power to achieve
      controlled ablation, avoiding mechanical harm to this tough metal.
    metadata:
      topic: the extreme hardness and brittleness
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: false
      order: 5
  - id: what-is-the-typical-costbenefit-analysis
    title: What is the typical cost-benefit analysis for using laser cleaning on a high-value material like iridium versus
      chemical or mechanical methods?
    content: Laser cleaning's higher upfront cost pays off pretty quickly for iridium components. At 2.5 J/cm² fluence, it
      fairly preserves every micron of this pricey metal, unlike abrasives, while fully eliminating chemical waste and hydrogen
      embrittlement risks.
    metadata:
      topic: the typical cost-benefit analys for
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: false
      order: 6
  - id: can-laser-cleaning-be-used-to
    title: Can laser cleaning be used to prepare an iridium surface for subsequent processes like plating or welding?
    content: Laser cleaning effectively preps iridium for plating using a 1064 nm wavelength and 2.5 J/cm² fluence. This process
      removes contaminants without microstructural changes, basically creating an activated surface with pretty optimal roughness
      for superior adhesion.
    metadata:
      topic: laser cleaning be used to
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: false
      order: 7
  - id: why-is-iridium-so-difficult-to
    title: Why is iridium so difficult to machine or process with traditional methods, making laser cleaning an attractive
      option?
    content: Iridium's pretty extreme hardness and low ductility at room temperature typically lead to rapid tool wear and
      fracture during machining. Basically, laser cleaning with a 1064 nm wavelength at 2.5 J/cm² fluence offers a non-contact
      option that sidesteps mechanical stress and material loss, safeguarding the integrity of these high-value components.
    metadata:
      topic: iridium so difficult to machine
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: false
      order: 8
  - id: what-are-the-realworld-applications-where
    title: What are the real-world applications where laser cleaning of iridium is most critical?
    content: In high-purity crystal growth, laser cleaning is pretty indispensable for refurbishing iridium crucibles, where
      even trace contaminants at the 2.5 J/cm² fluence threshold can compromise material integrity. It's also basically critical
      for maintaining electrodes in high-performance aerospace spark plugs, ensuring optimal ignition and longevity.
    metadata:
