      items:
      - id: historical-brick
        question: What laser settings work best for cleaning soot and pollution stains from historical brick without damaging
          the surface?
        answer: When working with historical brick, typically start with conservative settings like 12 J/cm² fluence and 100W
          average power. Pretty much always run test patches first, since heavy carbon deposits could demand a touch more
          energy than light soot. The 1064 nm wavelength proves ideal for stripping contaminants while safeguarding the fragile
          brick substrate.
        topic: historical brick
        severity: medium
        acceptedAnswer: true
        expertInfo: &id002
          name: Todd Dunning
          title: MA
          expertise: *id001
      - id: paint-and-graffiti
        question: Can laser cleaning remove paint and graffiti from brick without using chemicals or abrasives?
        answer: Yes, laser cleaning effectively strips paint and graffiti from brick without relying on chemicals or abrasives.
          With a 1064 nm wavelength at about 12 J/cm², the process basically vaporizes coatings such as acrylics and spray
          paints, all while safeguarding the porous substrate. Typically, 2-3 passes suffice to clear pigment residue from
          the masonry's texture, providing a superior, more controlled option over traditional approaches.
        topic: paint and graffiti
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: surface-fusion
        question: Does laser cleaning cause any color change or surface fusion on brick surfaces?
        answer: Properly tuned near-IR lasers at 1064 nm with about 12 J/cm² fluence basically remove contaminants without
          changing the brick's color. The mineral composition stays intact, fairly well preserving the original patina while
          dodging surface fusion or thermal darkening.
        topic: surface fusion
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: mortar-preservation
        question: How does laser cleaning compare to sandblasting for brick restoration in terms of surface damage and mortar
          preservation?
        answer: Laser cleaning at 12 J/cm² fluence fairly selectively removes contaminants without abrasion, preserving delicate
          mortar joints. Unlike sandblasting, it typically maintains the brick's original surface profile while eliminating
          harmful dust production, ensuring structural integrity.
        topic: mortar preservation
        severity: critical
        acceptedAnswer: true
        expertInfo: *id002
      - id: what-safety-precautions-are-specific-to-laser-clea
        question: What safety precautions are specific to laser cleaning brick, especially regarding silica dust and lead
          paint?
        answer: When cleaning brick at 100 W and 1064 nm, the primary hazard is typically respirable crystalline silica dust.
          Basically, you must use a NIOSH-approved P100 respirator and local exhaust ventilation to capture these fine particulates,
          especially if lead-based paint is present.
        topic: What safety precautions are specific to laser clea
        severity: critical
        acceptedAnswer: true
        expertInfo: *id002
      - id: turn-pink-or-orange
        question: Why does brick sometimes turn pink or orange after laser cleaning, and is this permanent?
        answer: The pink hue basically stems from thermal reduction of iron oxides in the clay at fluences around 12 J/cm².
          This chemical state remains pretty permanent overall, though it signals no structural damage to the brick substrate.
        topic: turn pink or orange
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: heavy-biological-growth
        question: What's the maximum removal rate for heavy biological growth (lichens, moss) from brick using laser cleaning?
        answer: When dealing with heavy biological growth on brick, we typically achieve optimal removal at 500 mm/s using
          100W systems with 12 J/cm² fluence. Basically, the 1064nm wavelength eliminates surface growth effectively while
          preserving the masonry, though deep root systems may require complementary treatments.
        topic: heavy biological growth
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: different-brick-types
        question: How do different brick types (soft mud, pressed, engineering, fire) respond differently to laser cleaning?
        answer: Soft mud bricks typically need a lower fluence around 12 J/cm² because of their high porosity, while dense
          engineering types can handle higher power. Always test refractory materials first, as their composition can fairly
          create thermal stress at standard 100W settings.
        topic: different brick types
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: efflorescence-salts
        question: Can laser cleaning effectively remove efflorescence salts from brick masonry, or will they quickly return?
        answer: Laser cleaning at 12 J/cm² pretty effectively removes surface efflorescence from brick. But without tackling
          the underlying moisture source, salts will typically return quickly from the porous substrate. For lasting results,
          pair this process with waterproofing treatments to block capillary moisture transport.
        topic: efflorescence salts
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: large-brick-facades
        question: What are the economic considerations when choosing laser cleaning over chemical or abrasive methods for
          large brick facades?
        answer: Although the initial laser setup calls for some investment, its 500 mm/s scan speed basically delivers superior
          cost-efficiency per square meter over time. That 1064 nm wavelength preserves the brick substrate pretty well, dodging
          abrasive damage and pricey mortar replacement. Such selective cleaning cuts long-term maintenance cycles, yielding
          big economic gains for large-scale facades.
        topic: large brick facades
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
