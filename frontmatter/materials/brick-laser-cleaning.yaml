faq:
  presentation: collapsible
  items:
  - id: what-laser-settings-work-best-for
    title: What laser settings work best for cleaning soot and pollution stains from historical brick without damaging the
      surface?
    content: When working with historical brick, typically start with conservative settings like 12 J/cm² fluence and 100W
      average power. Pretty much always run test patches first, since heavy carbon deposits could demand a touch more energy
      than light soot. The 1064 nm wavelength proves ideal for stripping contaminants while safeguarding the fragile brick
      substrate.
    metadata:
      topic: laser settings work best for
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: true
      order: 1
  - id: can-laser-cleaning-remove-paint-and
    title: Can laser cleaning remove paint and graffiti from brick without using chemicals or abrasives?
    content: Yes, laser cleaning effectively strips paint and graffiti from brick without relying on chemicals or abrasives.
      With a 1064 nm wavelength at about 12 J/cm², the process basically vaporizes coatings such as acrylics and spray paints,
      all while safeguarding the porous substrate. Typically, 2-3 passes suffice to clear pigment residue from the masonry's
      texture, providing a superior, more controlled option over traditional approaches.
    metadata:
      topic: laser cleaning remove paint and
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: false
      order: 2
  - id: does-laser-cleaning-cause-any-color
    title: Does laser cleaning cause any color change or surface fusion on brick surfaces?
    content: Properly tuned near-IR lasers at 1064 nm with about 12 J/cm² fluence basically remove contaminants without changing
      the brick's color. The mineral composition stays intact, fairly well preserving the original patina while dodging surface
      fusion or thermal darkening.
    metadata:
      topic: laser cleaning cause any color
