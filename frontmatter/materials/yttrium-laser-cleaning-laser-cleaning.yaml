micro:
  before: Absorptivity in yttrium surfaces, it drives laser cleaning efficiency. At
    1000x magnification, contaminated areas reveal thick oxide layers and particulate
    clusters. These patterns cling tightly, show irregular pitting from environmental
    exposure. Contamination resists initial pulses, thus scatters light unevenly.
    Laser treatment applies, and heat vaporizes residues rapidly. After cleaning,
    surface already exhibits smoothness. Clean zones display uniform texture, free
    from debris. Unique features emerge—micro-cracks heal partially, and grain boundaries
    sharpen. This removal process, it restores original luster. Evidence from views
    confirms, clean surface reflects light consistently. Contamination patterns before,
    they disrupt homogeneity; after, uniformity prevails. Treatment just enhances
    durability so.
