  components:
    settings_description: When laser cleaning silicon, start with low power settings
      to leverage its strong thermal conductivity. This property lets heat spread
      quickly, unlike brittle ceramics that trap it locally. You must keep pulse durations
      short to avoid microcracks, since silicon's stiffness makes it prone to fracturing
      under sudden stress. We've found that moderate scan speeds work best, revealing
      contaminants without altering the surface. Adjust overlap ratios carefully to
      ensure even coverage, as silicon's moderate reflectivity absorbs energy steadily
      compared to shiny metals. This approach restores semiconductor wafers effectively
      for electronics use. Make sure you monitor for thermal buildup at the end, or
      you risk subsurface damage that compromises device performance.
    micro:
      before: The silicon surface reveals irregular patches of grime and debris scattered
        widely. Dust particles cling tightly, creating uneven textures that obscure
        details below. Contaminants form dull layers, dulling the overall appearance
        under magnification.
      after: Laser treatment removes the grime, exposing a smooth and uniform silicon
        surface. Debris vanishes completely, revealing even textures without any clinging
        spots. The cleaned area shines clearly, highlighting pristine details throughout.
