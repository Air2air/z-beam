    _display:
      _open: false
      order: 7
  - id: what-regulatory-standards-apply-to-laser
    title: What regulatory standards apply to laser cleaning of silicon in cleanroom environments for electronics manufacturing?
    content: In cleanroom setups for electronics manufacturing, laser cleaning of silicon wafers has to comply with ISO 14644
      standards for air cleanliness—typically Class 5 or better—to prevent particulate contamination. Laser safety adheres
      to ANSI Z136 guidelines, protecting eyes and skin during operations at 1064 nm wavelength and 25 W power. For silicon-specific
      control, basically maintain fluence below 2.5 J/cm² to avoid subsurface damage while meeting SEMI F21 particle standards.
    metadata:
      topic: regulatory standards apply to laser
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: false
      order: 8
  - id: in-training-guides-what-handling-practices
    title: In training guides, what handling practices are recommended for silicon parts before and after laser cleaning to
      avoid contamination?
    content: Before laser cleaning, handle silicon wafers fairly carefully in a class 100 cleanroom with anti-static gloves
      and tools to minimize ESD risks and particulates. After ablation at 2.5 J/cm² fluence, typically store them in nitrogen-purged
      enclosures to curb oxidation, preserving semiconductor integrity for electronics and solar uses.
    metadata:
