      order: 4
  - id: what-are-the-challenges-with-laser
    title: What are the challenges with laser cleaning cast magnesium alloys versus wrought forms?
    content: Notably, cast magnesium alloys pose greater challenges from their inherent porosity, which can trap contaminants
      and thus requires careful fluence control below ~1.2 J/cm² to avoid subsurface damage. Their varied surface texture,
      particularly compared to wrought forms, demands more precise parameter tuning.
    metadata:
      topic: the challenges with laser cleaning
      severity: critical
      acceptedAnswer: true
      expertInfo:
