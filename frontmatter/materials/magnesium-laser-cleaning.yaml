  components:
    micro:
      before: When examining the magnesium surface before laser cleaning at 1000x magnification, we see a rough texture covered
        in scattered dark patches. Grime and oxide layers cling tightly to the uneven contours, blocking any hint of the underlying
        metal. These contaminants create a mottled appearance that obscures the material's natural form.
      after: After the laser treatment, the same surface reveals a smooth and even finish under 1000x view. All the grime
        lifts away cleanly, exposing a bright and uniform gleam
    settings_description: I've found that magnesium cleans up nicely with laser settings when you keep the power gentle and
      the passes multiple, because its shiny surface bounces most of the energy away and it heats up fast due to low thermal
      mass. This lightweight metal differs from denser ones like steel by reacting quickly to any excess heat, so the process
      removes contaminants without much buildup risk, but you need to control the beam overlap to avoid uneven spots. Tends
      to stay smooth after treatment, ideal for aerospace or automotive parts where precision matters. Just watch out at the
      end—don't push the fluence too high, or it might ignite and ruin your workpiece.
