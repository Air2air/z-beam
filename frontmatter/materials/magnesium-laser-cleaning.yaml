  - id: does-laser-cleaning-affect-the-fatigue
    title: Does laser cleaning affect the fatigue strength or mechanical properties of magnesium components?
    content: When laser cleaning is properly configured at 1.2 J/cm² fluence, it particularly preserves magnesium's structural
      integrity. Notably, the 10 ns pulse width limits thermal input, thus avoiding micro-cracking and notable shifts in fatigue
      strength to sustain component longevity.
