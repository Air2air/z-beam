faq:
  presentation: collapsible
  items:
  - id: what-are-the-specific-laser-settings
    title: What are the specific laser settings and parameters for cleaning magnesium alloys without causing damage?
    content: For cleaning magnesium alloys, use a 1064 nm wavelength with 10 ns pulses at 1.2 J/cm² fluence. Specifically,
      keep the repetition rate at 50 kHz and scan speed at 500 mm/s to avoid thermal damage. Thus, these parameters ablate
      oxides effectively while preserving substrate integrity.
    metadata:
      topic: the specific laser settings and
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: true
      order: 1
  - id: how-do-you-safely-remove-oxide
    title: How do you safely remove oxide layers and corrosion from magnesium surfaces using laser cleaning?
    content: In the removal of magnesium oxide, we utilize 1064 nm wavelength lasers at 1.2 J/cm² fluence. Specifically, this
      ablates MgO selectively without harming the base metal. Thus, an inert argon gas shield during the 500 mm/s scan prevents
      immediate re-oxidation, delivering a pristine, corrosion-free surface.
    metadata:
      topic: do you safely remove oxide
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 2
  - id: what-special-safety-precautions-are-needed
    title: What special safety precautions are needed when laser cleaning magnesium due to fire risk?
    content: Mandatory inert gas shielding, particularly at the 1064 nm wavelength, prevents magnesium ignition. Thus, keep
      fluence below 1.2 J/cm² to avoid excessive heat input. Employ robust fume extraction for highly reactive MgO particles,
      which pose explosion risks.
    metadata:
      topic: special safety precautions needed laser
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 3
  - id: can-laser-cleaning-be-used-to
    title: Can laser cleaning be used to prepare magnesium surfaces for welding or coating applications?
    content: Using a 1064 nm wavelength at 1.2 J/cm² fluence, laser cleaning effectively prepares magnesium surfaces. Specifically,
      this approach removes oxides without thermal damage, thus yielding an ideal surface profile for enhanced coating adhesion
      and robust welds, notably in aerospace and medical fields.
