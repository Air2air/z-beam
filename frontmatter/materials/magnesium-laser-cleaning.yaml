micro:
  before: Contamination on magnesium surface, it appears as irregular oxide layers and scattered particles during microscopic
    observation at high magnification. These patterns form because exposure to air causes buildup, so surface shows dull texture
    with deep pits and clustered debris. Before cleaning is performed, roughness dominates, and reflectivity decreases from
    oxide coverage. In observations, contamination clings tightly to metal grains, creating uneven contours that trap dirt.
  after: 'After laser treatment is applied, oxide layers already removed completely, so clean surface exhibits smooth uniformity.
    This process achieves effective ablation without damaging base material, because laser targets absorptive contaminants
    precisely. At the surface, unique visual features emerge: polished grains reflect light evenly, and no residues remain
    visible. From the data, treatment restores natural magnesium sheen, with patterns of fine striations indicating gentle
    cleaning action. Results are obtained from scans, showing transition from rough to pristine state.'
