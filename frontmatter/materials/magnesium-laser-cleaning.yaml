  - id: why-is-magnesium-considered-more-difficult
    title: Why is magnesium considered more difficult to laser clean than aluminum or steel?
    content: Magnesium's low melting point (~650°C) and high reactivity particularly require precise laser parameters. Specifically,
      we must control fluence around 1.2 J/cm² to remove oxides without melting the substrate—a far narrower window than for
      steel or aluminum. Thus, meticulous tuning ensures damage-free outcomes.
