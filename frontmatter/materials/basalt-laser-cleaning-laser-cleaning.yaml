name: basalt-laser-cleaning
slug: basalt-laser-cleaning
title: basalt-laser-cleaning
description: Basalt, this dense igneous stone, shows high durability in laser cleaning
  applications. Surface contamination, it forms thick layers from exposure, but treatment
  removes them effectively so substrate stays intact. During laser application, heat
  targets oxides only, because basalt exhibits strong resistance to oxidation and
  corrosion. After cleaning is performed, roughness decreases noticeably, and uniformity
  appears at surface. Compared to softer stones, basalt behaves distinctly with low
  porosity, so absorbs less unwanted energy and withstands intense pulses without
  cracking. Process achieves complete removal of buildup, as observed in industrial
  uses for restoration. From data on similar materials, advantages include faster
  cleaning rates and minimal residue left behind.
micro:
  before: Contaminated basalt surface, it exhibits irregular patterns of dirt buildup
    and oxide layers at high magnification. These contaminants form thick, uneven
    coatings because exposure to environment causes accumulation over time. In observations
    before cleaning, roughness appears prominent, and pores trap particles deeply.
    So, laser treatment applies targeted energy to remove them.
  after: After ablation is performed, clean surface shows uniformity and smoothness.
    Oxide residues already removed by process, so reflectivity increases noticeably.
    During exposure to laser, heat ablates only contamination without damaging basalt
    structure. From the data, treated area exhibits fine grain texture inherent to
    this igneous stone, and no remnants still present after cleaning.
