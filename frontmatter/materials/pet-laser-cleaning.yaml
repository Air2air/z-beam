  items:
  - id: why-does-pet-sometimes-warp-during
    title: Why does PET sometimes warp during laser cleaning?
    content: I've seen PET warp more easily than metals because it softens at lower temperatures. This happens when the laser
      heat builds up quickly on its smooth surface, unlike tougher materials that handle it better. To avoid this, keep the
      laser moving steadily and use shorter pulses so the material stays intact without deforming.
    metadata:
      topic: pet sometimes warp during laser
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: true
      order: 1
  - id: how-do-i-prepare-pet-surfaces
    title: How do I prepare PET surfaces for effective laser cleaning?
    content: When cleaning PET, start by removing loose dirt first to let the laser focus on the real contaminants. This works
      best because PET's non-porous nature means contaminants stick tight, and prepping helps the laser remove them cleanly
      without residue. I've found wiping with a mild solvent beforehand makes the process faster and leaves a spotless finish
      every time.
    metadata:
      topic: do i prep pet surfaces
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 2
  - id: whats-the-best-speed-for-laser
    title: What's the best speed for laser cleaning PET to avoid damage?
