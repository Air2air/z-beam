    _display:
      _open: false
      order: 5
  - id: what-safety-protocols-are-required-when
    title: What safety protocols are required when using lasers to clean soda-lime glass in a manufacturing environment?
    content: When laser cleaning soda-lime glass, particularly prioritize ANSI Z136-compliant goggles matched to the laser
      wavelength, since the material's reflectivity may amplify stray beams. At fluences around 5 J/cm², employ enclosed systems
      with HEPA filtration to trap ejected particles, thus ensuring workplace safety compliance.
    metadata:
      topic: safety protocols required using lasers
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 6
  - id: how-does-the-chemical-composition-of
    title: How does the chemical composition of soda-lime glass affect its response to laser surface treatment for paint removal?
    content: With its high silica content around 72%, soda-lime glass particularly promotes transparency to near-infrared
      lasers, thus minimizing substrate absorption during ablative paint removal. Sodium oxide (about 14%) and calcium oxide
      (9%) notably enhance thermal sensitivity, allowing effective cleaning at fluences below 5 J/cm² without cracking. This
      composition ensures compatibility with pulsed laser methods for precise, damage-free surface treatment.
    metadata:
      topic: the chemical composition of soda-lime
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 7
  - id: what-are-common-issues-with-laser
    title: What are common issues with laser cleaning soda-lime glass windows, like residue redeposition?
    content: In laser cleaning of soda-lime glass windows, residue redeposition from expanding plasma plumes is particularly
      prevalent, best addressed by robust extraction systems to capture ejecta. Thus, to maintain surface flatness in this
      brittle material, use 5 J/cm² fluence with 50% beam overlap, reducing thermal gradients that might cause micro-cracks.
    metadata:
      topic: common sues with laser cleaning
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 8
  - id: for-sodalime-glass-bottles-what-laser
    title: For soda-lime glass bottles, what laser parameters optimize cleaning without altering the glass's transparency?
    content: When cleaning soda-lime glass bottles, aim for a fluence of 5 J/cm² to ablate contaminants such as labels, without
      surpassing the material's damage threshold and thus preserving its optical clarity. Particularly on curved surfaces,
      apply 50% beam overlap with multiple low-power passes and active cooling to minimize thermal stress while avoiding haze
      formation.
