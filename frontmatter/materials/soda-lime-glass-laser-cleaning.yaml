components:
  settingsDescription: When laser cleaning soda-lime glass, unlike more heat-resistant borosilicates, you must prioritize
    its quick thermal expansion to avoid cracks. Start with low energy pulses for safe contaminant removal. This everyday
    glass stays brittle under uneven heating, so keep passes short and overlap minimally midway through. You should always
    cool the surface between shots—it prevents shattering while clearing buildup effectively.
  micro:
    before: At 1000x magnification, the soda-lime glass surface brims with scattered dirt specks and rough patches. Tiny contaminants
      clump together, dulling the overall shine and texture. These buildups create an uneven haze that obscures the base material.
    after: After laser treatment, the same surface gleams with smooth, bare expanses and no lingering specks. Clear areas
      dominate the view, revealing the glass's even polish and crisp edges. This fresh state highlights the material's inherent
      clarity
