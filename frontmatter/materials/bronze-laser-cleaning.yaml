    icon: help-circle
    order: 46
    variant: default
  presentation: collapsible
  items:
  - id: what-makes-bronze-a-reliable-metal
    title: What makes bronze a reliable metal for industrial use?
    content: Bronze is a copper-tin alloy we often turn to in manufacturing. It holds up well in tools, fittings, and even
      marine parts because it resists corrosion. Density sits around 8.8 g/cm³, so pieces stay sturdy without getting too
      heavy. Porosity hovers at about 0.5%, which means fewer voids that could trap dirt or weaken the structure.
    metadata:
      topic: makes bronze a reliable metal
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: true
      order: 1
  - id: how-do-we-clean-bronze-with
    title: How do we clean bronze with lasers?
    content: Laser cleaning works great here. You apply roughly 100 W power to remove rust or grime from surfaces. This method
      clears contaminants fast and leaves the base metal intact. It suits restoration projects, like old statues, without
      harsh chemicals. Just watch the settings to avoid heating the alloy too much.
    metadata:
      topic: do we clean bronze with
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 2
  options:
    autoOpenFirst: true
    sortBy: severity
