components:
  subtitle: A durable alloy for marine and artistic use, bronze resists corrosion exceptionally well and its low melting point
    makes casting intricate shapes straightforward
  micro:
    before: Looking closely at the bronze surface before cleaning, I see a layer of dull, patchy grime covering everything.
      Dark streaks and tiny clumps stick tightly to the metal, making it look uneven and worn. Scratches and small pits scatter
      across, roughening the whole view.
    after: After the laser treatment, the bronze surface appears smooth and brightly metallic. The grime vanishes completely,
      revealing a uniform shine without any streaks. Now, the texture looks even and clear, free from those old pits
  description: Bronze has a high reflectivity of 0.65, so we typically use a 1064 nm wavelength for better absorption. Its
    melting point is 950 °C, so we keep the energy density around 5.1 J/cm². This clears contaminants effectively and avoids
    any thermal damage to the valuable substrate.
  settings_description: When laser cleaning bronze, unlike ferrous metals like steel, you must account for its higher reflectivity
    that sends more energy back at the source. This means starting with gentler power levels to avoid surface melting, since
    bronze heats up faster from that bounce. Watch out mid-process for uneven patina removal—it can fade historical value—so
    adjust scans slower and use multiple light passes to lift dirt without erasing the alloy's natural shield.
