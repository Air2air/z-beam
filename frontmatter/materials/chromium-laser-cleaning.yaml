faq:
  presentation: collapsible
  items:
  - id: can-laser-cleaning-safely-remove-chromiumcontaining
    title: Can laser cleaning safely remove chromium-containing coatings like chrome plating without damaging the base metal?
    content: Yes, laser systems can safely strip chrome plating using pretty precise parameters like 2.5 J/cm² fluence and
      50 µm spot size. It selectively ablates the coating without harming softer substrates like aluminum, fairly offering
      a big edge over harsh mechanical or chemical methods.
    metadata:
      topic: laser cleaning safely remove chromium-containing
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: true
      order: 1
  - id: what-are-the-specific-safety-hazards
    title: What are the specific safety hazards of laser cleaning chromium or chromium-containing materials like stainless
      steel?
    content: Laser cleaning chromium typically generates hazardous hexavalent chromium fumes, particularly at fluences above
      2.5 J/cm². Employ a fume extractor with both HEPA and activated carbon filtration. This qualifies as a pretty critical
      OSHA concern, demanding strict respiratory protection from the toxic plume.
