    title: What safety steps should we take when laser cleaning alabaster compared to harder stones like granite?
    content: Alabaster's softness, which stems from its sedimentary makeup and makes it more fragile than dense granite, demands
      extra caution during laser cleaning; protect surrounding areas with barriers because dust can spread and aggressive
      settings can damage the surface.
