  contaminatedBy:
    title: Alabaster's Porous Contaminant Traps
    description: Alabaster draws in atmospheric pollutants more readily than denser stones like granite, since its sedimentary
      makeup creates a network of tiny pores that soak up grimy particles and hold them tight. We often see oily residues
      from urban air clinging stubbornly, as the material's soft, reactive surface chemistry bonds with acidic compounds,
      which granite typically shrugs off without much buildup. Dust and biological films accumulate deeper here too, embedding
      in those open structures where laser cleaning must tread carefully to avoid scattering fragments. Unlike marble's smoother
      resistance, alabaster lets contaminants seep and layer over time, turning simple dirt into embedded threats that demand
      precise handling. Watch out for moisture-loving molds that exploit this porosity, thriving in ways harder rocks rarely
      allow and complicating removal efforts.
    _metadata:
      icon: droplet
