faq:
- question: How does laser cleaning **safely remove dirt** from alabaster sculptures?
  answer: '**Precise non-contact ablation**. Laser cleaning uses precise, non-contact ablation to vaporize surface contaminants without damaging the soft alabaster substrate, preserving its delicate texture and translucency in just a few sessions.'
- question: What makes alabaster **ideal for restoration** using laser technology?
  answer: '**Softness and low conductivity**. Alabaster''s softness and low thermal conductivity make it perfect for lasers, which gently remove grime while avoiding the cracking risks of mechanical methods.'
- question: Why is alabaster **prone to staining** and how can laser cleaning help?
  answer: '**Removes stains without chemicals**. Alabaster absorbs oils and pollutants easily due to its porous nature, leading to discoloration; laser cleaning effectively targets and eliminates these stains at a molecular level without introducing chemicals that could worsen porosity.'
- question: Can laser cleaning **restore the translucency** of aged alabaster?
  answer: '**Revives natural translucency**. Yes, by precisely removing surface buildup and oxidation layers, laser cleaning revives alabaster''s natural light-diffusing properties, enhancing its visual appeal without altering the material''s inherent composition.'
- question: Is laser cleaning suitable for **fragile alabaster artifacts**?
  answer: '**Non-abrasive prevents chipping**. Absolutely; its non-abrasive nature prevents chipping or further fragility issues common in traditional cleaning, making it a go-to for museum-grade restorations of sensitive pieces.'
- question: How to **prevent water damage** in alabaster after laser cleaning?
  answer: '**Apply breathable sealant**. Post-cleaning, apply a breathable sealant to protect against moisture absorption, as alabaster remains vulnerable to dissolution; regular laser maintenance can address any future soiling before it penetrates deeply.'
