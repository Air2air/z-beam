title: Alabaster Laser Cleaning
subtitle: Precision Laser Cleaning Preserves Alabaster's Fragile Texture and Enhances Longevity
description: Laser cleaning parameters for Alabaster
images:
  hero:
    alt: Alabaster surface undergoing laser cleaning showing precise contamination removal
    url: /images/material/alabaster-laser-cleaning-hero.jpg
  micro:
    alt: Alabaster microscopic view of laser cleaning showing detailed precise contamination removal
    url: /images/material/alabaster-laser-cleaning-micro.jpg
caption:
  before: Microscopic examination of the alabaster surface before laser cleaning discloses dense accumulation of fine carbonaceous soot and siliceous particulates, inducing pronounced surface degradation with irregular pitting, microcracks, and localized delamination. Embedded contaminants cause severe discoloration and erosion of the gypsum matrix, compromising structural integrity at the grain interfaces.
  after: Microscopy of the alabaster surface post-laser cleaning demonstrates high-fidelity restoration, featuring a smooth, contaminant-free topography with preserved gypsum crystallite morphology and negligible thermal effects. The material exhibits enhanced clarity, uniform reflectance, and intact microstructural integrity, validating effective conservation without subsurface damage.
