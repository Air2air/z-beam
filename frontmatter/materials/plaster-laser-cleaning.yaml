  components:
    settings_description: When we laser clean plaster, the biggest challenge is its fragile nature. It crumbles easily under
      too much heat. So we start low on power. This keeps the surface intact while removing dirt. We've found plaster's porous
      structure absorbs contaminants deeply. That means multiple gentle passes work best. Watch out for cracking in the middle
      of the process. It happens if you speed up too fast. Adjust the scan slowly. Plaster differs from stone because it's
      softer overall. So use wider spots to spread energy evenly. This avoids hot spots. In our experience, it cleans up nicely
      for heritage sites. Just stay patient and monitor closely.
    micro:
      before: I've examined the plaster surface before cleaning, and it looks rough with dark specks scattered everywhere.
        Grime clings tightly to the tiny cracks and pores, making the whole thing appear dull and uneven. Dust particles stick
        out, blocking any clear view of the base material.
      after: After the laser treatment, that same surface turns smooth and bright under magnification. The specks and grime
        vanish completely, revealing clean pores without any residue. Now it shines evenly, showing the plaster's natural
        texture without
