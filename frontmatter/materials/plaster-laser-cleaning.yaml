    _display:
      _open: false
      order: 9
  - id: how-does-the-high-porosity-of
    title: How does the high porosity of plaster affect the laser cleaning process and the final result?
    content: Plaster's high porosity particularly enables contaminants to penetrate deeply, necessitating multiple passes
      at 2.5 J/cm² for full removal. Its structure traps ablation byproducts, thus complicating the procedure. Notably, a
      'clean' surface means extracting these embedded particles successfully without substrate damage.
