faq:
  _section:
    sectionTitle: FAQ
    sectionDescription: Common Questions and Answers
    sectionMetadata: faq
    icon: help-circle
    order: 46
    variant: default
  presentation: collapsible
  items:
  - id: can-a-laser-cleaner-remove-paint
    title: Can a laser cleaner remove paint from a plaster wall without damaging the underlying surface?
    content: Yes, laser cleaning effectively removes paint from plaster walls while preserving the underlying substrate. Specifically,
      a 1064 nm wavelength at ~2.5 J/cm² fluence ablates the coating with minimal heat transfer. Thus, employing nanosecond
      pulses avoids subsurface thermal damage that could weaken the porous plaster structure.
    metadata:
      topic: a laser cleaner remove paint
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: true
      order: 1
  - id: what-is-the-safe-laser-power
    title: What is the safe laser power and fluence level for cleaning soot or smoke residue from historic plaster?
    content: For historic plaster, particularly with its delicate nature, start testing at 2.5 J/cm² fluence using a 100W
      laser. Excessive power can thus lead to permanent discoloration or vitrification, which alters the surface. Always test
      parameters first on a hidden area to confirm soot removal without harming the substrate.
    metadata:
      topic: the safe laser power and
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 2
  - id: does-laser-cleaning-create-hazardous-dust
    title: Does laser cleaning create hazardous dust when used on plaster, and how does it compare to traditional methods?
    content: Laser ablation at 2.5 J/cm² notably produces far less bulk dust than mechanical methods. Yet, it generates fine
      particulates, thus requiring HEPA-filtered extraction and respiratory PPE, particularly for historic plasters with unknown
      contaminants.
    metadata:
      topic: laser cleaning create hazardous dust
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 3
  - id: why-does-my-laser-sometimes-leave
    title: Why does my laser sometimes leave a darkened or yellowed stain on the plaster surface after cleaning?
    content: Low power may carbonize embedded organics, whereas, notably, fluence exceeding 2.5 J/cm² disrupts plaster's mineral
      hydrates. Thus, fine-tune your 1064 nm laser parameters to sidestep these thermal issues, achieving contaminant removal
      without substrate damage that causes yellowing.
    metadata:
      topic: my laser sometimes leave a
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 4
  - id: is-laser-cleaning-effective-for-removing
    title: Is laser cleaning effective for removing biological growth like mold or algae from exterior plaster (stucco)?
    content: Yes, notably, laser cleaning removes biological growth from plaster at 2.5 J/cm² fluence without introducing
      moisture. However, the porous substrate often retains spores, thus requiring a follow-up chemical treatment for full
      remediation and to curb rapid regrowth.
    metadata:
      topic: laser cleaning effective for removing
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 5
  - id: what-wavelength-eg-1064nm-10600nm-is
    title: What wavelength (e.g., 1064nm, 10600nm) is most effective for laser cleaning plaster, and why?
    content: For plaster cleaning, notably the 10600nm CO₂ laser wavelength proves most effective. This infrared light is
      strongly absorbed by the hydrates in gypsum, thus enabling efficient contaminant removal at 2.5 J/cm² while minimizing
      thermal damage to the delicate substrate.
    metadata:
      topic: wavelength (e.g., 1064nm, 10600nm) most
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 6
  - id: how-do-i-clean-different-types
    title: How do I clean different types of plaster (e.g., gypsum, lime, cement-based) with a laser? Do the settings change?
    content: Due to its softness, lime plaster particularly needs a gentle ~2.5 J/cm² fluence, whereas harder cement-based
      materials handle slightly higher energy. First, identify your substrate always; incorrect 1064 nm settings can thus
      cause thermal degradation.
    metadata:
      topic: do i clean different types
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 7
  - id: can-laser-cleaning-be-used-to
    title: Can laser cleaning be used to delicately clean fragile, historic plaster moldings and ornaments?
    content: Laser cleaning proves particularly effective for conserving delicate plaster, with a fluence of 2.5 J/cm² and
      100 µm spot size. Notably, this non-contact approach using nanosecond pulses selectively removes contaminants, thus
      safeguarding fragile historic details without abrasion.
    metadata:
      topic: laser cleaning be used to
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 8
  - id: what-are-the-main-advantages-of
    title: What are the main advantages of using laser cleaning over chemical or abrasive methods for plaster restoration?
    content: Laser cleaning delivers excellent selectivity, particularly for plaster, by removing contaminants at 2.5 J/cm²
      without harming the delicate substrate. This contactless approach eliminates chemical residues and sidesteps mechanical
      stress from abrasives, thus safeguarding original surfaces. Notably, our 1064 nm wavelength achieves thorough cleaning
      with minimal thermal effects.
    metadata:
      topic: the main advantages of using
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
