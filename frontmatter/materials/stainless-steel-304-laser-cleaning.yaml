pageDescription: When laser cleaning stainless steel 304, watch out for how it holds heat longer than carbon steels. I've
  seen that cause uneven surfaces if you push too hard. But its strong corrosion resistance really sets it apart, restoring
  a clean finish that stays protected longer. This works best with short, steady pulses.
