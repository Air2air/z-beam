micro:
  before: Stainless steel 304 starts rough under contamination. Dirt and oxides cling tight to its surface. This buildup hides
    the alloy's natural shine.
  after: Laser cleaning changes that fast. The beam strips away grime without harming the base metal. Contaminated spots show
    jagged edges and dark smears at high magnification.
