components:
  micro:
    before: The contaminated surface reveals irregular patches of dark residue clinging to the metal grains. Scattered specks
      of debris create uneven textures across the field of view. Rough edges and embedded particles obscure the underlying
      structure.
    after: Laser treatment restores a uniform shine to the exposed metal grains. Smooth contours replace the former debris,
      revealing clear boundaries between grains. The cleaned area displays consistent reflectivity without lingering irregularities.
