    _display:
      _open: false
      order: 8
  - id: can-laser-cleaning-restore-the-optical
    title: Can laser cleaning restore the optical properties of ruthenium-coated EUV lithography mirrors after contamination?
    content: Yes, laser cleaning notably restores ruthenium-coated EUV lithography mirrors, recovering reflectivity above
      95% at 13.5 nm following contamination. Specifically, a 1064 nm wavelength with 2.3 J/cm² fluence and 45 W power ablates
      oxides cleanly without substrate damage, thus preserving low surface roughness per ASML protocols.
