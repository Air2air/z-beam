    _display:
      _open: false
      order: 7
  - id: what-regulatory-standards-apply-to-handling
    title: What regulatory standards apply to handling ruthenium dust generated during laser cleaning in industrial settings?
    content: When managing ruthenium dust produced by laser cleaning, adherence to EPA standards for toxic metal waste is
      crucial, designating it as hazardous for safe disposal while capping airborne exposure at under 0.1 mg/m³ per OSHA PEL.
      Particularly under REACH, EU operators must register ruthenium particulates and ensure ventilation during 2.3 J/cm²
      fluence operations, thus reducing inhalation hazards in electronics or aerospace settings.
    metadata:
      topic: regulatory standards apply to handling
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
