components:
  settingsDescription: 'When laser cleaning Ruthenium, you''ll want to contrast it with softer non-ferrous metals like aluminum.
    Ruthenium stands out for its extreme hardness and density, which make it resist deformation better than those. This means
    you must start with controlled pulses to avoid uneven ablation.


    Watch out here—its high reflectivity bounces most laser energy away, so mid-process, you need to increase overlap without
    overheating. Make sure you adjust scan speed slower than for copper, since Ruthenium conducts heat quickly and evenly.


    That spreads energy well, but it cuts risk of cracks if you keep passes minimal. You should test on scrap first, as its
    corrosion resistance holds up post-clean but demands gentle settings to preserve shine.'
  micro:
    before: "Under 1000x magnification, the ruthenium surface looks rough and covered in dark, sticky patches that scatter\
      \ across the view.  \nIrregular clumps of grime cling tightly, dulling the metal's natural gleam and creating bumpy\
      \ textures everywhere.  \nThese contaminants build up unevenly, hiding the underlying structure from clear sight."
    after: "After laser treatment at 1000x magnification, the ruthenium surface appears smooth and free of all dark patches\
      \ that once cluttered it.  \nClean lines emerge"
