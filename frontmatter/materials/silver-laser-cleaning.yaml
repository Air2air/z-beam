      the heat-affected zone in 1064 nm laser cleaning of antique silverware. Reduce HAZ and warping through higher scan speeds
      of 200 mm/s, fluence limited under 0.18 J/cm² ablation threshold, plus essential nitrogen cooling to avert discoloration.
