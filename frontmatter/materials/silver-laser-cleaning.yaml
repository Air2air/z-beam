title: Silver Laser Cleaning
description: When laser cleaning silver, start by dialing back the power to suit its mirror-like reflectivity, which bounces
  away most energy, while its top-notch thermal conductivity spreads any absorbed heat evenly across the surface to avoid
  localized melting and preserve the underlying structure—but always monitor closely to prevent unintended discoloration from
  prolonged exposure.
