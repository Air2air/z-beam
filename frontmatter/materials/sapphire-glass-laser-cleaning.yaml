faq:
  _section:
    sectionTitle: FAQ
    sectionDescription: Common Questions and Answers
    sectionMetadata: faq
    icon: help-circle
    order: 46
    variant: default
  presentation: collapsible
  items:
  - id: can-fiber-lasers-safely-clean-contaminants
    title: Can fiber lasers safely clean contaminants from sapphire glass without causing thermal damage?
    content: Yes, fiber lasers at 1064 nm efficiently remove contaminants from sapphire glass, using its low absorption to
      avoid excessive heating. This process works straightforward for precise ablation—stick to 5 J/cm² fluence and 100 W
      power to prevent cracks or pitting on this durable material.
    metadata:
      topic: fiber lasers safely clean contaminants
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: true
      order: 1
  - id: what-laser-parameters-are-recommended-for
    title: What laser parameters are recommended for removing organic residues from sapphire substrates in optics manufacturing?
    content: 'In optics manufacturing, cleaning organic residues from sapphire substrates calls for a practical setup: 10
      ns pulse width at 100 kHz repetition rate, combined with 500 mm/s scanning speed. That method delivers precise ablation
      of contaminants via 5 J/cm² energy density, efficiently curbing thermal effects to preserve the material''s superior
      surface flatness and optical clarity.'
    metadata:
      topic: laser parameters recommended for removing
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 2
  - id: does-laser-cleaning-alter-the-optical
    title: Does laser cleaning alter the optical transparency or refractive index of sapphire glass?
    content: With practical settings like 5 J/cm² energy density at 1064 nm wavelength, this process preserves sapphire glass's
      optical transparency and refractive index by preventing subsurface damage. Interferometry tests confirm only minimal
      shifts in transmission spectra, ensuring no permanent changes for aerospace or medical uses.
    metadata:
      topic: laser cleaning alter the optical
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 3
  - id: how-does-sapphires-high-melting-point
    title: How does sapphire's high melting point and thermal conductivity influence the choice of laser types for surface
      treatment?
    content: Sapphire's melting point of about 2050°C and thermal conductivity of 25 W/mK provide a practical way to dissipate
      heat quickly during pulsed laser operations, minimizing micro-fracture risks on sensitive surfaces. That method suits
      nanosecond lasers with 10 ns pulses at 5 J/cm² fluence for efficient cleaning, while femtosecond options cut thermal
      buildup for precise tasks.
    metadata:
      topic: sapphire's high melting point and
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 4
  - id: what-precautions-are-needed-when-using
    title: What precautions are needed when using UV lasers to clean sapphire watch crystals?
    content: For cleaning sapphire watch crystals using UV lasers like 193 nm excimer sources, mask nearby components to protect
      them from stray ablation—sapphire's high hardness calls for precise 50 μm spot sizes in a straightforward way. This
      process demands strong ventilation to mitigate ozone buildup, keeping levels below 0.1 ppm, followed by microscopic
      inspection for surface integrity after 5 J/cm² fluence passes.
    metadata:
      topic: precautions needed using uv lasers
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 5
  - id: are-there-documented-issues-with-laserinduced
    title: Are there documented issues with laser-induced fluorescence on sapphire surfaces during cleaning processes?
    content: Yes, contaminants like oils on sapphire surfaces can trigger laser-induced fluorescence, disrupting real-time
      monitoring during cleaning. For a practical approach, tune the power to roughly 100 W and apply 5 J/cm² energy density
      at 1064 nm to achieve precise ablation without overexciting fluorescence. This process guarantees efficient contaminant
      removal from this robust, transparent material.
    metadata:
      topic: there documented sues with laser-induced
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 6
  - id: what-are-the-best-practices-from
    title: What are the best practices from manufacturers for integrating laser cleaning into sapphire lens production lines?
    content: In sapphire lens production, integrate laser cleaning via robotic arms for automation in a practical way, ensuring
      cleanroom compatibility through enclosed systems at 1064 nm wavelength and 100 W power to efficiently minimize particulates.
      Validate efficacy with profilometry post-cleaning, targeting under 5 J/cm² energy density for damage-free results on
      this durable, transparent material.
    metadata:
      topic: the best practices from manufacturers
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 7
  - id: can-co2-lasers-effectively-clean-sapphire
    title: Can CO2 lasers effectively clean sapphire glass, or do they risk excessive heating?
    content: CO2 lasers at 10.6 μm get absorbed strongly by sapphire glass, which can lead to thermal damage from overheating
      during cleaning, even though they efficiently handle non-metallic contaminants. A more practical choice is Nd:YAG at
      1064 nm, using 5 J/cm² energy density and 100 W power, to precisely ablate residues without damaging the substrate.
    metadata:
      topic: co2 lasers effectively clean sapphire
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 8
  - id: how-do-impurities-in-synthetic-sapphire
    title: How do impurities in synthetic sapphire affect laser cleaning outcomes and required adjustments?
    content: Trace impurities such as iron or titanium in synthetic sapphire boost absorption at 1064 nm, which lowers ablation
      thresholds and risks uneven cleaning or substrate damage. Practically, this variability calls for pre-process spectroscopic
      analysis to adjust energy density around 5 J/cm², ensuring efficient contaminant removal while safeguarding the material's
      integrity.
    metadata:
      topic: do impurities in synthetic sapphire
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 9
  - id: what-safety-standards-apply-to-laser
    title: What safety standards apply to laser cleaning of sapphire in high-volume electronics assembly?
    content: A practical step for laser cleaning sapphire glass in high-volume electronics assembly is adhering to ANSI Z136
      standards, which mitigate eye and skin hazards from the 1064 nm wavelength. Train operators on sapphire's brittleness
      to avoid micro-fractures at 5 J/cm² fluence, and efficiently use HEPA-filtered enclosures for particulate control under
      100 W power.
    metadata:
      topic: safety standards apply to laser
      severity: critical
      acceptedAnswer: true
