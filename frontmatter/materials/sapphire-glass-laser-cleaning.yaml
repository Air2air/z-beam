components:
  settingsDescription: "When laser cleaning sapphire glass, watch its extreme hardness first. It resists contaminants well\
    \ but can crack under sudden heat. We've found that starting with gentle pulses avoids this. \n\nThis material stands\
    \ out for its heat resistance in tough spots like watches or medical gear. Low expansion keeps it stable, unlike softer\
    \ glasses. We typically use steady scans to clear grime without scratching. \n\nJust adjust overlap for even coverage.\
    \ Skip high speeds—they scatter debris. In our experience, this restores shine safely every time."
  micro:
    before: At 1000x magnification, the sapphire glass surface looks rough and cluttered with dark specks scattered everywhere.
      Fine particles cling tightly to the texture, creating uneven patches that block the smooth underlying shine. Dirt streaks
      run across the area, making the whole view hazy and obscured.
    after: After laser treatment, the same sapphire glass surface appears crisp and uniform under 1000x magnification. The
      once-cluttered spots now reveal a flawless, mirror-like polish without any residue. Clear edges emerge sharply
