settings_description: We've found that dolomite stands out from limestone in laser cleaning because its magnesium mix makes
  it denser and less porous. This means it resists heat buildup better, so we typically use steady, moderate power pulses
  to lift contaminants without cracking the surface. You'll get even results this way. Just watch for overexposure at the
  end—it can dull the finish if you're not careful.
components:
  micro:
    before: I've seen dolomite surfaces like this before cleaning, where grime clings tightly to every crevice at 1000x magnification.
      Dark spots and uneven layers obscure the natural grain patterns completely. Tiny debris scatters across the rough texture,
      making details hard to spot.
    after: After laser treatment, the same view reveals a crisp, even surface shining through at 1000x. Grains emerge sharp
      and distinct, free from any clinging dirt now. Smooth areas reflect light cleanly, highlighting the stone
