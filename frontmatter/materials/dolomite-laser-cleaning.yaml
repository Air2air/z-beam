faq:
  _section:
    sectionTitle: FAQ
    sectionDescription: Common Questions and Answers
    sectionMetadata: faq
    icon: help-circle
    order: 46
    variant: default
  presentation: collapsible
  items:
  - id: how-does-dolomite-compare-to-limestone
    title: How does dolomite compare to limestone when laser cleaning?
    content: I've seen dolomite clean up more evenly than limestone because it handles heat better without cracking as easily.
      While limestone tends to absorb too much energy and pit, dolomite's structure lets you remove dirt steadily. Just keep
      the laser moving to avoid any hot spots on its surface.
    metadata:
      topic: dolomite comp to limestone laser
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: true
      order: 1
  - id: what-are-best-practices-for-laser
    title: What are best practices for laser cleaning dolomite surfaces?
    content: Start with a low-intensity pass to test the surface response on dolomite. Move the laser steadily across the
      area to prevent uneven heating. This approach removes contaminants effectively while preserving the stone's natural
      finish.
    metadata:
      topic: best practices for laser cleaning
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 2
  - id: why-might-dolomite-show-discoloration-after
    title: Why might dolomite show discoloration after laser cleaning, and how to fix it?
    content: Discoloration often happens if the laser lingers too long, causing surface changes in dolomite's mineral makeup.
      Compared to harder stones like granite, dolomite reacts more sensitively to prolonged exposure. To fix it, reduce power
      slightly and clean in short bursts, then rinse with water to even out the tone. I've
    metadata:
