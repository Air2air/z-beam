page_title: birch-laser-cleaning
micro:
  before: Laser cleaning transforms birch wood surfaces at 1000x magnification. Contaminated
    areas show dirt and residues clinging tightly to the porous fibers. These contaminants
    form irregular clumps, filling the natural vessel patterns and dulling the hardwood's
    fine grain.
  after: The process ramps up precision. It removes grime without damaging the underlying
    structure. Clean surfaces emerge smooth and vibrant. Fibers stand out clearly,
    revealing birch's distinctive ray cells and tight annual rings.
