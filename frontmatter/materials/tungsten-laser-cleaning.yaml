components:
  subtitle: Tungsten maintains its structural integrity under extreme heat, so it performs reliably in aerospace and medical
    applications where other metals would fail
  micro:
    before: I've seen the contaminated tungsten surface up close at high magnification, and it looks rough with scattered
      dark spots clinging tightly. Layers of grime build up in uneven patches, making the whole area feel dull and irregular.
      This buildup hides the metal's true texture beneath.
    after: After the laser treatment, that same surface appears smooth and even under magnification, free of any clinging
      debris. The clean metal shines with a consistent gleam, showing off its natural, uniform finish. Now, the texture stands
      out clear
  settings_description: When we laser clean Tungsten, we typically begin with a thorough surface inspection to spot any contaminants
    like oxides or residues from its aerospace or nuclear uses. This dense metal holds up well under heat, so we ramp up the
    laser power gradually to overcome its reflective nature that bounces back much of the beam. We've found that pulsing the
    laser in short bursts helps the heat spread evenly thanks to its strong thermal conductivity, preventing hot spots on
    the hard surface. But watch out midway—its resistance to oxidation drops if temperatures climb too high, so adjust the
    scan speed to avoid unwanted surface changes. We finish with multiple light passes to polish without stressing the material's
    toughness, ensuring clean results for tooling or electrodes. This approach keeps the Tungsten intact and ready for reuse.
