    _display:
      _open: false
      order: 9
  - id: what-training-is-recommended-for-operators
    title: What training is recommended for operators using laser systems to clean Tungsten in high-precision optics applications?
    content: For operators handling laser cleaning of Tungsten in precision optics, certification in laser safety protocols
      and hands-on materials handling is essential. Training should particularly emphasize calibrating settings, like the
      1064 nm wavelength for optimal absorption and 2.5 J/cm² fluence to prevent reflective surface damage. Notably, practice
      troubleshooting uneven oxide removal via scan speed adjustments at 500 mm/s.
