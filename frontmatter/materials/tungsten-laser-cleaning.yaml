  items:
  - id: what-laser-parameters-such-as-fluence
    title: What laser parameters, such as fluence and pulse duration, are optimal for cleaning oxidized Tungsten surfaces
      without melting the substrate?
    content: For oxidized tungsten surfaces, particularly target a fluence of 2.5 J/cm² with 10 ns pulses at 1064 nm. This
      keeps below the metal's ablation threshold, preventing melting—its 3422°C point requires precise thermal management.
      Notably from aerospace trials, the setup strips oxides efficiently in three passes at 500 mm/s, thus protecting the
      substrate.
    metadata:
      topic: laser parameters, such as fluence
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: true
      order: 1
  - id: how-does-tungstens-high-reflectivity-to
    title: How does Tungsten's high reflectivity to infrared lasers affect the efficiency of laser cleaning processes?
    content: Tungsten shows strong reflectivity, particularly to infrared lasers like 1064 nm where absorption drops below
      10%, slashing cleaning efficiency by wasting much beam energy as reflection rather than ablation. Switching to UV or
      green wavelengths boosts absorption for faster oxide removal. Thus, apply 2.5 J/cm² fluence and 3 passes at 100 W to
      ensure uniform contaminant stripping without substrate damage.
    metadata:
      topic: tungsten's high reflectivity to infrd
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 2
  - id: what-safety-precautions-are-necessary-when
    title: What safety precautions are necessary when using lasers to clean Tungsten components, particularly regarding vapor
      generation?
    content: When using a 1064 nm laser at 100 W to clean tungsten, oxide vapors can form and notably pose respiratory risks
      due to their toxicity. Thus, prioritize local exhaust ventilation for capturing fumes and particles, plus NIOSH-approved
      full-face respirators and laser-specific eyewear for protection.
    metadata:
      topic: safety precautions necessary using lasers
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 3
  - id: can-laser-cleaning-effectively-remove-contaminants
    title: Can laser cleaning effectively remove contaminants like oils or metal residues from Tungsten electrodes used in
      welding?
    content: Yes, laser cleaning particularly excels at removing oils and metal residues from tungsten welding electrodes,
      by leveraging the metal's high thermal conductivity for precise ablation. Notably, at 1064 nm wavelength and 2.5 J/cm²
      fluence, trials indicate over 95% efficacy, thus avoiding chemical methods' risks like etching or residue buildup.
    metadata:
      topic: laser cleaning effectively remove contaminants
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 4
  - id: what-are-the-potential-microstructural-changes
    title: What are the potential microstructural changes in Tungsten after laser cleaning, and how can they be minimized?
    content: Laser cleaning tungsten risks recrystallization and grain boundary shifts due to localized heating. Notably,
      these can be minimized by maintaining fluence at 2.5 J/cm² with 100 W power and 50% beam overlap at 1064 nm wavelength.
      SEM inspection afterward thus confirms no adverse changes.
    metadata:
      topic: the potential microstructural changes in
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 5
  - id: in-laser-cleaning-of-tungsten-for
    title: In laser cleaning of Tungsten for semiconductor manufacturing, what wavelengths are preferred to avoid contamination?
    content: In semiconductor fabs, 1064 nm near-IR wavelengths particularly excel for tungsten laser cleaning, thanks to
      strong absorption that minimizes substrate ablation and contamination risks. Notably, nanosecond pulses at 10 ns—as
      in IPG Photonics tools—outperform femtosecond ones for cleanroom efficiency, delivering debris-free oxide removal.
    metadata:
      topic: in laser cleaning of tungsten
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 6
  - id: how-does-tungstens-density-and-thermal
    title: How does Tungsten's density and thermal conductivity influence the heat-affected zone during laser surface treatment?
    content: Notably, tungsten's high density (19.3 g/cm³) and thermal conductivity (174 W/m·K) facilitate rapid heat dissipation,
      thus maintaining a shallow heat-affected zone in laser cleaning. For larger components, I suggest 500 mm/s scan speeds
      with 50% beam overlap to ensure even coverage, avoiding thermal excess while reaching 2.5 J/cm² fluence for oxide removal.
    metadata:
      topic: tungsten's density and thermal conductivity
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 7
  - id: what-are-common-issues-with-residue
    title: What are common issues with residue buildup when laser cleaning Tungsten alloys, and how to address them?
    content: During laser cleaning of W-Ni-Fe tungsten alloys, residue buildup frequently stems from stubborn oxide layers
      that reform, particularly intensified by nickel's strong oxidation tendency. To counter this, apply multi-pass strategies—three
      scans at 2.5 J/cm² fluence with 50% overlap for uniform ablation. Thus, verify outcomes via XPS to identify any residual
      contaminants.
    metadata:
      topic: common sues with residue buildup
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 8
  - id: are-there-regulatory-guidelines-for-laser
    title: Are there regulatory guidelines for laser cleaning Tungsten in medical device production, especially for biocompatibility?
    content: For laser cleaning of tungsten in medical devices, FDA's 21 CFR Part 820 and ISO 13485 demand process validation
      to ensure biocompatibility per ISO 10993, particularly stressing residue-free surfaces. Specifically, target 2.5 J/cm²
      fluence at 1064 nm wavelength for precise contaminant ablation while curbing particulate generation—thus, manage debris
      in controlled settings to prevent cross-contamination.
    metadata:
      topic: there regulatory guidelines for laser
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
