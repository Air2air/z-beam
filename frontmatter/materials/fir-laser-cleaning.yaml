components:
  settingsDescription: >-
    When laser cleaning Fir, watch its softness compared to hardwoods—it chars faster under heat. You must start with
    low power to prevent surface damage. Unlike denser woods, Fir's high porosity absorbs contaminants deeply, so use
    multiple gentle passes. This clears grime without warping the grain. Keep scans slow for even coverage. Adjust
    overlap to avoid hot spots. Fir restores well in heritage work.
  micro:
    before: >-
      You notice thick layers of dust and grime clinging tightly to the uneven wood fibers, making the surface look
      rough and clogged under this view. Deeper in, small particles scatter across the pores, blocking any natural
      texture and giving everything a dull, hazy appearance. Make sure you spot how these contaminants hide the wood's
      original grain completely.
    after: >-
      After treatment, the laser clears away all that buildup, revealing smooth, exposed fibers that shine clearly now.
      You can see the pores open up neatly without
