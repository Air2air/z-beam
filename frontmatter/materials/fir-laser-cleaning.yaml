faq:
  presentation: collapsible
  items:
  - id: what-are-the-optimal-laser-settings
    title: What are the optimal laser settings (wavelength, power, pulse duration) for cleaning soot or biological growth
      from Fir wood without causing ablation or yellowing?
    content: As a laser cleaning expert from Indonesia, where we deeply value our wooden heritage, I recommend a practical
      1064 nm Nd:YAG laser with 200-300 mJ pulse energy and 10-20 ns duration. This process gently clears soot or biological
      growth from Fir wood, preventing ablation or yellowing by limiting fluence to under 1 J/cm².
    metadata:
      topic: the optimal laser settings (wavelength,
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: true
      order: 1
  - id: how-does-the-variable-resin-content
    title: How does the variable resin content in Fir wood affect the laser cleaning process and how do we adjust for it?
    content: Fir wood's varying resin levels require precise fluence management at roughly 1.2 J/cm². Those resin pockets
      vaporize faster than nearby wood fibers, risking irregular finishes. In this process, begin with a practical low-power
      scan at 500 mm/s to pinpoint the issues, followed by targeted passes that methodically prevent resin from seeping into
      cleared zones.
    metadata:
      topic: the variable resin content in
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 2
  - id: can-a-fiber-laser-effectively-remove
    title: Can a fiber laser effectively remove old, lead-based paint from Fir clapboard without damaging the softwood surface
      underneath?
    content: In this process, a fiber laser removes lead paint from Fir clapboard efficiently with ~1.2 J/cm² fluence and
      100 µm spot size. Precise parameter control remains straightforward to prevent etching the softwood grain, while a HEPA
      fume extractor is essential for capturing hazardous lead particulates.
    metadata:
      topic: a fiber laser effectively remove
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 3
  - id: what-is-the-maximum-safe-surface
    title: What is the maximum safe surface temperature for Fir during laser cleaning to prevent degradation of its structural
      or aesthetic properties?
    content: Fir wood hits its thermal degradation threshold at around 150-200°C, causing permanent discoloration and charring.
      For practical monitoring, efficiently apply IR thermography to maintain surface temperatures below this range, particularly
      at 1.2 J/cm² fluence and 100 µm spot size, preserving structural integrity.
    metadata:
      topic: the maximum safe surface temperature
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 4
  - id: what-specific-safety-precautions-and-fume
    title: What specific safety precautions and fume extraction systems are required when laser cleaning Fir, especially when
      removing paints or contaminants?
    content: For cleaning Fir at 1.2 J/cm², employ a HEPA/ULPA extraction system efficiently to capture explosive wood dust
      and lead fumes. Operators require a P100 respirator in this process, given the hazardous pyrolysis by-products from
      the wood substrate.
    metadata:
      topic: specific safety precautions and fume
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 5
  - id: how-do-you-evaluate-the-success
    title: How do you evaluate the success of laser cleaning on Fir? What are the acceptable levels of micro-burning or changes
      to the original patina?
    content: Assessing success in a straightforward manner involves preserving the original patina. In this process, we apply
      colorimetry to maintain ΔE below 3, while microscopy confirms the 100 µm spot size avoids micro-charting. Minor, uniform
      lightening is acceptable, but carbonization-induced darkening indicates failure.
    metadata:
      topic: do you evaluate the success
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 6
  - id: is-laser-cleaning-a-viable-method
    title: Is laser cleaning a viable method for decontaminating Fir wood affected by mold or fungi without using chemicals?
    content: Laser cleaning provides a straightforward decontamination for Fir wood, employing 1064 nm wavelength light absorbed
      by mold to trigger rapid thermal ablation. At 1.2 J/cm² fluence and 100 W power, this process eradicates surface spores
      without carbonizing the substrate. Still, deeply embedded mycelial networks might linger, necessitating multi-pass treatment.
    metadata:
      topic: laser cleaning a viable method
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 7
  - id: why-does-lasercleaned-fir-sometimes-appear
    title: Why does laser-cleaned Fir sometimes appear lighter or darker than the surrounding untreated wood, and how can
      this be minimized?
    content: Laser-cleaned Fir wood shows a lighter tone after removing darkened patina, though it may darken slightly from
      carbonization if fluence exceeds limits. Straightforwardly, set fluence to 1.2 J/cm² with 500 mm/s scan speed and 50%
      beam overlap. This process achieves uniform contaminant removal, preserving the natural color for even results.
    metadata:
      topic: laser-cleaned fir sometimes appear lighter
      severity: medium
      acceptedAnswer: true
