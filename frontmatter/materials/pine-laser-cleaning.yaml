      order: 9
  - id: how-effective-is-laser-cleaning-for
    title: How effective is laser cleaning for removing biological growth (mold, mildew) from pine surfaces?
    content: Laser cleaning notably ablates biological contaminants from pine at 1.8 J/cm², removing surface spores without
      any chemical residue. With the essential 1064 nm wavelength and 90 W power, it achieves thorough decontamination while
      safeguarding the wood's structural integrity. This non-contact technique markedly lowers the risk of future regrowth
      on the substrate.
