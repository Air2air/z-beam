  components:
    settings_description: When laser cleaning pine, watch out right away for its softness
      compared to denser hardwoods like oak—I've seen it char easily if you push too
      hard, so start with gentle passes to avoid scorching the fibers. Unlike those
      tougher woods that handle higher intensities without flinching, pine's open
      grain soaks up heat quickly, which means you need shorter dwell times to prevent
      deep thermal damage. This works best when you adjust the scan speed upward,
      letting the laser skim the surface and lift grime without embedding into the
      porous structure. Tends to restore that natural finish nicely in furniture or
      heritage pieces, but skip multiple overlaps early on, or you'll warp the low-density
      boards. I've found contrasting it this way keeps the process efficient for marine
      or construction applications, bringing back clean timber without compromising
      its flexibility.
    micro:
      before: At 1000x magnification, the pine surface before cleaning looks cluttered
        with dark smudges and uneven buildup. Grime coats the tangled fibers, making
        everything appear dull and blocked. Fine debris fills the pores, hiding the
        wood's true pattern beneath.
      after: After laser treatment, the same view shows crisp fibers standing free
        from any residue. The surface gleams with even texture, as pores breathe open
        and clear. Natural lines emerge sharp, restoring the pine's fresh, unaltered
        form.
