    _display:
      _open: false
      order: 8
  - id: does-laser-cleaning-affect-the-dimensional
    title: Does laser cleaning affect the dimensional stability or moisture content of pine wood?
    content: With laser parameters properly set at a notable 1.8 J/cm² fluence and 90W power, significant thermal penetration
      into pine's cellular structure is avoided. This approach preserves dimensional stability by halting lignin softening,
      while sustaining the wood's inherent moisture equilibrium to prevent any long-term warping or shrinkage during cleaning.
    metadata:
      topic: laser cleaning affect the dimensional
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
