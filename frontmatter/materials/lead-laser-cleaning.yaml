        question: How do you test and verify that laser cleaning has effectively removed lead to meet regulatory standards?
        answer: We confirm lead removal via XRF analysis and swipe tests, aiming for clearance under 10 µg/100 cm². Our 1064
          nm laser system, at 2.5 J/cm², delivers notable decontamination. Documenting all parameters properly is essential
