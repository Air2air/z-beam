      - id: lead-based-paint-removal
        question: Is laser cleaning safe for lead-based paint removal, and what specific safety measures are required?
        answer: Cleaning lead-based paint with lasers demands utmost caution owing to the toxic fumes it produces. A notable
          strategy involves a 1064 nm wavelength at 2.5 J/cm² fluence, which curbs particulate emission. Operators should
          always use high-efficiency local exhaust ventilation alongside supplied-air respirators for essential safety.
        topic: lead-based paint removal
        severity: critical
        acceptedAnswer: true
        expertInfo: &id002
          name: Alessandro Moretti
          title: Ph.D.
          expertise: *id001
      - id: without-vaporizing-it
        question: What laser parameters (wavelength, pulse duration, power) work best for removing lead contamination without
          vaporizing it?
        answer: For lead decontamination, employ nanosecond pulses at 1064 nm wavelength with fluence around 2.5 J/cm². This
          configuration, using a fiber laser, effectively ablates surface contaminants while the short pulse duration minimizes
          thermal penetration, thus preventing hazardous vaporization of the underlying lead substrate.
        topic: without vaporizing it
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: lead-particles
        question: How do you properly capture and filter lead particles generated during laser cleaning?
        answer: It's notable that for lead particle capture, we rely on HEPA filtration rated for nanoparticles below 100nm.
          Essential to the vacuum system is sustaining high velocity with our standard 50 μm spot size and 500 mm/s scan speed,
          thereby containing the toxic plume effectively.
        topic: lead particles
        severity: high
        acceptedAnswer: true
        expertInfo: *id002
      - id: airborne-lead-levels
        question: Does laser cleaning create airborne lead levels that exceed OSHA exposure limits?
        answer: Yes, laser ablation of lead at 2.5 J/cm² can generate hazardous aerosols. Continuous air monitoring is mandatory,
          as particulate levels often surpass the OSHA PEL of 50 μg/m³. Proper local exhaust ventilation is absolutely essential
          to maintain compliance.
        topic: airborne lead levels
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: lead-removal
        question: What are the advantages of laser cleaning over traditional methods (blasting, chemical stripping) for lead
          removal?
        answer: Laser cleaning delivers a notable reduction in hazardous waste volume versus traditional methods. Employing
          our 1064 nm wavelength and 2.5 J/cm² fluence ensures selective removal free of media contamination—essential for
          delicate uses like nuclear components. In turn, this approach curbs secondary waste, boosting safety and efficiency.
        topic: lead removal
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: driving-it-deeper
        question: Can laser cleaning effectively remove lead from porous surfaces like concrete or wood without driving it
          deeper?
        answer: Proper laser parameters like 2.5 J/cm² fluence and 10 ns pulses effectively ablate surface lead without significant
          substrate penetration. For porous materials like concrete, we recommend initial surface sealing. Post-process verification
          testing is essential to confirm complete decontamination.
        topic: driving it deeper
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: what-personal-protective-equipment-(ppe)-is-specif
        question: What personal protective equipment (PPE) is specifically needed for laser cleaning of lead-containing materials?
