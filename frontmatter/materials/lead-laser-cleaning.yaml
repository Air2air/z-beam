    _display:
      _open: false
      order: 9
  - id: are-there-specific-laser-safety-considerations
    title: Are there specific laser safety considerations when cleaning lead in confined spaces?
    content: Cleaning lead in confined spaces requires extreme caution. Notably, the 1064 nm wavelength at 100W power produces
      highly concentrated toxic fumes, necessitating continuous atmospheric monitoring. It is essential to deploy enhanced
      local exhaust ventilation and emergency protocols, since airborne lead levels can swiftly surpass 500 µg/m³, the standard
      occupational exposure limit.
    metadata:
