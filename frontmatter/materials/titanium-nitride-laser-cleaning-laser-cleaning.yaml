title: titanium-nitride-laser-cleaning
micro:
  before: The contamination on titanium nitride surfaces, it manifests as irregular
    clusters of oxides and particulates, which adhere tenaciously to the coating's
    granular structure. At high magnification, these patterns appear dense and uneven,
    influenced from prolonged exposure to environmental factors, that obscure the
    inherent smoothness of the material. This layer, it persists in crevices, demonstrating
    resistance to mechanical methods alone.
  after: Laser cleaning, it effectively removes such contaminants, yielding a restored
    surface that exhibits uniform reflectivity. The process reveals the coating's
    fine, interlocking grains, which lead to enhanced durability in applications like
    tool hardening. Clean areas show no residual pitting, as the laser ablates precisely
    without altering the underlying hardness. It seems that adhesion varies across
    regions, yet the treatment ensures consistent cleanliness, dependent from pulse
    duration. The surface, now pristine, persists with its characteristic resilience,
    suitable for demanding industrial uses.
