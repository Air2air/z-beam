components:
  settingsDescription: When laser cleaning MDF, the biggest hurdle is its porous structure. It soaks up heat unevenly. This
    leads to quick charring if you're not careful. I've seen surfaces bubble and delaminate from that buildup. Start low on
    power to let the laser gently lift dirt without penetrating deep. Its fibrous makeup differs from solid woods—more uniform
    but fragile under stress. That means you adjust scans slower for even coverage. Tends to absorb contaminants well, restoring
    finishes nicely in furniture or panels. But watch the edges; they fray easily. Keep passes light and overlapped just enough.
    In my experience, this brings back that smooth look without warping. Finally, avoid high energy bursts—they scorch the
    core and ruin the board.
  micro:
    before: At 1000x magnification, the MDF surface looks cluttered with dark specks and fine debris scattered everywhere.
      Dust particles cling tightly to the tangled fibers, making the whole area seem rough and uneven. This buildup hides
      the natural wood structure beneath a hazy layer of contamination.
    after: After laser treatment, at 1000x, the MDF surface appears smooth with clear, separated fibers standing out. No traces
      of dirt remain, and the texture feels even across the entire view. This cleaning reveals the
    _section:
      sectionTitle: Microscopic Analysis
      sectionDescription: High-magnification comparison of MDF surface before and after laser cleaning treatment
      icon: microscope
      order: 5
      variant: default
