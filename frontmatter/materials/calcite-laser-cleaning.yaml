  items:
  - id: how-does-laser-cleaning-effectively-remove
    title: How does laser cleaning effectively remove contaminants from calcite surfaces without damaging the stone?
    content: In laser cleaning, this process applies short, controlled pulses of light to vaporize dirt, soot, or pollutants
      on calcite surfaces. It targets only the top layers practically, given the material's low absorption at key wavelengths,
      while preserving the underlying structure.
    metadata:
      topic: laser cleaning effectively remove contaminants
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: true
      order: 1
  - id: what-are-the-benefits-of-using
    title: What are the benefits of using laser technology for restoring calcite-based artifacts?
    content: This process delivers a practical, non-abrasive restoration for calcite, showcasing its natural beauty and optical
      clarity. It efficiently minimizes crack risks from mechanical methods while remaining environmentally friendly by skipping
      chemicals.
    metadata:
      topic: the benefits of using laser
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 2
  - id: can-laser-cleaning-address-the-common
    title: Can laser cleaning address the common problem of acid-induced degradation on calcite marble?
    content: Yes, but with some limitations. Lasers offer a practical way to safely remove surface corrosion from acid exposure,
      avoiding further dissolution. For severe internal damage, though, complementary treatments are needed to stabilize the
      calcite's reactivity and halt ongoing erosion in acidic conditions. This process works efficiently for preventive maintenance
      on sculptures and buildings.
