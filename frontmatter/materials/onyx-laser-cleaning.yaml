components:
  settings_description: When laser cleaning onyx, make sure you watch its banded layers closely, unlike smoother marbles that
    heat evenly—onyx absorbs energy fast because of its dense quartz makeup, so start with lower power to prevent cracking
    those fine stripes. You must adjust scan speeds slower than for granites, since its poor heat spread traps warmth locally
    and risks surface checks if you rush. This keeps the natural polish intact for heritage pieces, avoiding dull spots from
    overexposure.
  micro:
    before: You see the onyx surface covered in a thick layer of grime and dust particles. Tiny specks cling tightly to every
      crevice and rough spot. The whole thing looks dull and uneven under this close view.
    after: The laser treatment wipes away all that buildup completely. Now the surface shines smooth and reveals fine natural
      bands. It appears fresh and uniform across the entire area.
