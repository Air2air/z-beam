faq:
  presentation: collapsible
  items:
  - id: is-onyx-safe-to-laser-clean
    title: Is Onyx safe to laser clean, or does it produce hazardous fumes?
    content: Laser cleaning of Onyx, a carbon fiber-reinforced nylon composite, demands precise fluence management around
      5.1 J/cm². Notably, the process can release hazardous hydrogen cyanide gas from the polymer matrix. Thus, effective
      fume extraction and certified respiratory protection remain essential for ensuring operator safety.
    metadata:
      topic: onyx safe to laser clean,
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: true
      order: 1
  - id: what-are-the-optimal-laser-parameters
    title: What are the optimal laser parameters (wavelength, power, pulse duration) for cleaning soot or oxidation from Onyx
      without damaging the surface?
    content: Specifically for Onyx, employ a 1064nm wavelength at 100W average power with 10ns pulses. Keep fluence below
      5.1 J/cm² to ablate soot while preserving the stone's integrity. Notably, a 50μm spot size scanned at 500mm/s removes
      contaminants effectively without thermal damage.
    metadata:
      topic: the optimal laser parameters (wavelength,
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 2
  - id: can-laser-cleaning-remove-support-material
    title: Can laser cleaning remove support material from 3D printed Onyx parts effectively?
    content: Yes, laser cleaning effectively removes support material from Onyx parts, particularly at the polymer interface.
      Specifically, a 1064 nm wavelength at 5.1 J/cm² ablates it without etching the stone substrate, thus offering a significant
      advantage over abrasive methods that risk surface scarring.
    metadata:
      topic: laser cleaning remove support material
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 3
  - id: how-do-you-clean-a-lasersintered
    title: How do you clean a laser-sintered Onyx (SLS) part versus a FFF-printed Onyx part with laser?
    content: Particularly for SLS Onyx, apply 5.1 J/cm² to clear trapped powder from its porous surface. In FFF parts, a lower
      fluence at 500 mm/s effectively removes layer lines without melting the polymer matrix. Thus, tailoring energy to their
      unique surface topographies proves essential.
    metadata:
      topic: do you clean a laser-sintered
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 4
  - id: does-laser-cleaning-affect-the-dimensional
    title: Does laser cleaning affect the dimensional accuracy or mechanical strength of an Onyx part?
    content: Properly controlled laser cleaning particularly preserves Onyx's structural integrity. Notably, with a 5.1 J/cm²
      fluence and 50 µm spot size, we ablate contaminants effectively without inducing thermal stress or dimensional changes
      that could compromise mechanical strength.
    metadata:
      topic: laser cleaning affect the dimensional
      severity: high
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 5
  - id: what-is-the-best-way-to
    title: What is the best way to clean carbon fiber-filled materials like Onyx compared to unfilled nylons?
    content: For Onyx, the carbon fibers particularly absorb laser energy readily, thus requiring conservative settings like
      5.1 J/cm² fluence to avoid charring. This proves more critical than for pure nylon, where higher energies can typically
      be tolerated without such thermal damage.
    metadata:
      topic: the best way to clean
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 6
  - id: after-laser-cleaning-onyx-is-the
    title: After laser cleaning Onyx, is the surface left with a different texture or color?
    content: When laser cleaning is tuned precisely to ~5.1 J/cm² fluence, it particularly preserves Onyx's original polish.
      Yet, excessive energy may create a localized matte texture through micro-ablation. This cosmetic alteration notably
      influences later finishing processes, thus necessitating a light repolish for high-gloss results.
    metadata:
      topic: after laser cleaning onyx, the
      severity: medium
      acceptedAnswer: true
