micro:
  before: Contamination on onyx surface, it appears as irregular deposits during initial observation. These deposits form
    thick layers from environmental exposure, so laser cleaning targets them effectively. Before treatment is applied, particles
    cluster in porous areas, and roughness exhibits uneven texture because of accumulated grime. Onyx, as sedimentary stone,
    shows natural banding patterns underneath, but contamination obscures this feature in microscopic view.
  after: After laser cleaning is performed, surface achieves smoothness, and residues are already removed completely. Clean
    onyx exhibits uniform reflectivity, so unique veining patterns emerge clearly from the data. During post-treatment scan,
    no particles remain visible, and material-specific hardness prevents any damage to underlying structure. In observations
    at high magnification, cleaned areas display polished-like finish, while contaminated zones still present dull spots if
    cleaning incomplete. Process removes oxide buildup so, overall, surface restores its original durability and aesthetic
    integrity. Results are obtained from visual analysis, confirming effective ablation without altering stone's dense composition.
