      order: 7
  - id: are-there-any-specific-certifications-or
    title: Are there any specific certifications or regulatory guidelines for laser cleaning composite materials like Onyx
      in an industrial setting?
    content: For Onyx laser cleaning, consult the MSDS particularly for silica content while adhering to OSHA 29 CFR 1910.134
      on respiratory protection. Notably, the 1064 nm wavelength at 5.1 J/cm² reduces subsurface damage; however, air monitoring
      proves essential against crystalline silica fume exposure, thus demanding specific PELs.
