micro:
  before: Indium phosphide surfaces stand out for their crystalline structure, which
    laser cleaning targets precisely. At high magnification, the contaminated view
    reveals irregular patches of debris clinging to the compound's facets—dark smudges
    and uneven residues that disrupt the material's inherent smoothness, often lining
    up along grain boundaries from handling or exposure. These patterns typically
    show as clustered particles, essentially masking the semiconductor's clean, reflective
    edges.
  after: Laser cleaning ramps up the process effectively. It removes contaminants
    without damaging the underlying structure, leaving a polished finish that highlights
    the material's durable, pore-free quality. In practice, the cleaned surface demonstrates
    sharp, uniform crystal faces—clear and free of haze—while maintaining oxidation
    resistance. Overall, this approach clears away residues thoroughly, revealing
    the compound's natural luster and tight tolerances for optical applications.
