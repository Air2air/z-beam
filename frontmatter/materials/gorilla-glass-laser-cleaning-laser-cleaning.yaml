micro:
  before: Laser cleaning ramps up the clarity of Gorilla Glass surfaces in ways that
    stand out under 1000x magnification. Contaminated areas typically show irregular
    patches where fine particles and residues cling tightly to the soda-lime structure,
    disrupting its naturally smooth, durable finish. These contaminants form clustered
    patterns, like scattered debris lines that roughen the otherwise even texture
    and dim the glass's inherent transparency.
  after: The process clears away this buildup effectively. After treatment, the surface
    lines up with the material's core strength—revealing a clean, polished look free
    from those uneven spots. In practice, the laser targets residues without altering
    the glass's tough, resilient properties, achieving a uniform shine that highlights
    unique micro-features, such as subtle wave patterns from its strengthened composition.
    Overall, this turns out a solid result for applications needing pristine optics.
