        Open: false
        order: 3
    - id: how-does-differential-weathering-affect-breccia
      title: How does differential weathering affect Breccia countertops, and what can be done?
      content: >-
        Differences in clast durability result in uneven erosion, forming rough patches over time. This process involves
        applying controlled laser treatments that efficiently smooth out discrepancies, fostering uniform resistance to
        environmental damage while preserving overall strength.
      metadata:
        topic: differential weathering affect breccia countertops,
        severity: critical
        acceptedAnswer: true
        expertInfo:
          name: Ikmanda Roswati
          title: Ph.D.
          expertise:
            - Ultrafast Laser Physics and Material Interactions
      Display:
        Open: false
        order: 4
    - id: why-is-breccia-prone-to-staining
      title: Why is Breccia prone to staining in urban environments, and how to prevent it?
      content: >-
        The open matrix structure permits pollutant entry, resulting in discoloration from acidic contact. A practical
        approach is applying hydrophobic coatings after installation. This process, paired with periodic laser
        decontamination, efficiently clears residues while preserving variegated patterns and material durability.
      metadata:
        topic: breccia prone to staining in
        severity: critical
        acceptedAnswer: true
        expertInfo:
