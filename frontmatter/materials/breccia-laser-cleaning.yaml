      Display:
        Open: false
        order: 5
    - id: what-advantages-does-laser-cleaning-offer
      title: What advantages does laser cleaning offer over traditional methods for Breccia sculptures?
      content: >-
        Unlike chemical solvents that seep into pores and cause etching, or mechanical tools risking clast loosening,
        laser cleaning offers a straightforward, dry removal of grime. This process preserves textural depth and
        compressive robustness, making it practical for delicate artistic elements in landscaping.
      metadata:
        topic: advantages laser cleaning offer over
        severity: medium
        acceptedAnswer: true
        expertInfo:
          name: Ikmanda Roswati
          title: Ph.D.
          expertise:
            - Ultrafast Laser Physics and Material Interactions
      Display:
        Open: false
        order: 6
    - id: can-breccia-flooring-handle-heavy-foot
      title: Can Breccia flooring handle heavy foot traffic, and how to clean it routinely?
      content: >-
        Its robust bonding straightforwardly handles loads up to 200 MPa, yet dirt buildup intensifies porosity issues.
        For practical cleaning, vacuum first, then apply low-power laser passes to efficiently dislodge particles—skip
        water-based options that invite biological growth.
      metadata:
