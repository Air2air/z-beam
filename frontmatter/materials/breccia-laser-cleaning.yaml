faq:
  presentation: collapsible
  items:
    - id: how-can-i-safely-remove-rust
      title: How can I safely remove rust stains from Breccia surfaces without harming the natural patina?
      content: >-
        Use precise laser ablation straightforwardly to selectively vaporize oxidation layers, while preserving the
        underlying textures and colors. That method, being non-contact, efficiently sidesteps mechanical abrasion and
        keeps structural integrity intact during this process.
      metadata:
        topic: i safely remove rust stains
        severity: medium
