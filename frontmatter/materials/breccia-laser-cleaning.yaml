components:
  settingsDescription: When laser cleaning Breccia, you'll want to treat it differently from smoother sedimentary stones like
    limestone, since its fragmented makeup—think angular pebbles bound in a matrix—makes it more prone to uneven energy uptake.
    Start with gentler power levels to handle that irregularity without chipping the edges. Make sure you overlap scans by
    at least half the spot size, as the varying density can trap heat in porous spots and lead to micro-cracks if you're too
    aggressive. Adjust speeds upward on the matrix areas for even contaminant removal, restoring that natural, rugged finish
    without compromising the stone's modest strength.
  micro:
    before: Looking closely at the contaminated Breccia surface under high magnification, I see a thick layer of dust and
      grime clinging tightly to the uneven texture. Fine particles scatter across the rough patches, making the whole area
      look dull and obscured. This buildup hides the stone's natural fragments completely from view.
    after: After the laser treatment, the same Breccia surface appears fresh and revealed in stunning detail. Smooth grains
      now stand out clearly, free from any clinging debris or haze. The cleaned texture shines with a
