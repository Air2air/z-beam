micro:
  before: Laser cleaning process on borosilicate glass begins with contamination removal
    using focused beam, and this setup reveals surface details at high magnification.
    In observations before treatment is applied, contamination appears as clustered
    particles and thin films across the surface. This buildup, it forms uneven patterns
    because exposure to environment causes oxide layers and debris accumulation, so
    irregularities dominate the view. Particles show jagged edges and shadowy outlines,
    while films create hazy overlays that obscure the glass's inherent smoothness.
    Borosilicate surface underneath exhibits subtle waviness from its durable composition,
    but contamination hides these features completely.
  after: After ablation is performed, clean surface emerges with striking clarity.
    Treatment already removes all deposits effectively, so uniformity prevails in
    the microscopic field. Glass now displays polished sheen and minimal pitting,
    because laser targets contaminants precisely without altering the material's heat-resistant
    nature. Unique visual features include faint striations from rapid cooling, and
    these indicate complete restoration. From the data in scans, roughness decreases
    noticeably, while reflectivity increases across the entire area. Process achieves
    this by vaporizing layers selectively, and borosilicate maintains structural integrity
    throughout.
