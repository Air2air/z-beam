micro:
  before: Cerium's dense structure holds up well under laser cleaning, revealing sharp
    contrasts at 1000x magnification. Contaminated surfaces typically show irregular
    oxide layers and particulate buildup that cling tightly to the metal's grainy
    texture, creating jagged patterns like scattered rust flecks or embedded debris.
    These features disrupt the material's natural luster, trapping dirt in microscopic
    crevices.
  after: The laser process ramps up energy to vaporize contaminants without damaging
    the base layer. Clean surfaces emerge smooth and reflective, with the lanthanide's
    inherent sheen restored across even topography. Unique visual cues include faint
    ablation traces that fade quickly, leaving a uniform finish free of residues.
    In practice, this method clears away oxidation patterns effectively, demonstrating
    cerium's resilience in industrial settings. Overall, the transformation turns
    out crisp and reliable for maintaining surface integrity.
