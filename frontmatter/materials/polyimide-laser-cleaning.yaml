faq:
  presentation: collapsible
  items:
  - id: how-can-i-prevent-polyimide-from
    title: How can I prevent Polyimide from charring during laser cleaning?
    content: You must start with a lower power setting right away to avoid overheating, since Polyimide holds heat poorly
      and can char easily compared to metals like aluminum that dissipate it faster. Make sure you use short pulses to control
      the energy input, which helps the material absorb the laser without building up damaging temperatures. This approach
      keeps the surface clean while preserving Polyimide's tough, flexible structure for ongoing use.
    metadata:
      topic: i prevent polyimide from charring
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: true
      order: 1
  - id: whats-the-best-way-to-remove
    title: What's the best way to remove contaminants from Polyimide without scratching it?
    content: When laser cleaning Polyimide, you'll want to scan the surface slowly at first to lift dirt gently, unlike with
      harder plastics that need aggressive blasts and risk micro-scratches. Keep the beam focused tightly so it targets only
      the top layer where contaminants hide, preventing deeper penetration that could weaken the material's inherent strength.
      You should test on a small area to fine-tune, ensuring a smooth finish that matches Polyimide's naturally low surface
