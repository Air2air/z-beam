components:
  micro:
    before: At 1000x magnification, the polyimide surface looks cluttered with scattered dirt particles and sticky residues
      everywhere. I've seen how these contaminants form uneven clumps that roughen the entire area. They hide the material's
      base texture under a dull, patchy layer.
    after: After laser treatment at 1000x, the polyimide surface appears smooth and free of all visible debris now. I've noticed
      the treatment restores a uniform, glossy finish across every spot. No residues remain to mar the clean, even
