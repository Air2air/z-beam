      _open: false
      order: 7
  - id: what-are-the-regulatory-requirements-for
    title: What are the regulatory requirements for using laser systems to clean slate in construction sites, particularly
      regarding environmental impact?
    content: EPA guidelines require airborne particulates from slate ablation to stay under 50 μg/m³, helping curb environmental
      impact. For construction sites, it's practical to deploy OSHA-certified mobile laser units at 12.7 J/cm² fluence and
      100 W power. This process efficiently cuts dust while meeting noise limits below 85 dB and vibration thresholds.
    metadata:
      topic: the regulatory requirements for using
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
