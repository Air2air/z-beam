    _display:
      _open: false
      order: 8
  - id: how-do-temperature-variations-in-slate
    title: How do temperature variations in slate during laser cleaning affect its structural integrity, especially in cold
      climates?
    content: Slate's thermal expansion coefficient of 6-8 × 10^{-6}/°C leaves it vulnerable to internal stresses from rapid
      heating in this process of 1064 nm laser cleaning at 12.7 J/cm² fluence. Such heating raises delamination risks within
      its foliated layers—particularly in cold climates, where low ambient temperatures intensify contraction shocks. For
      practical protection of structural integrity, allow 1-2 minutes between passes to ensure even cooling.
    metadata:
      topic: do temperature variations in slate
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 9
  - id: what-equipment-maintenance-is-required-for
    title: What equipment maintenance is required for lasers used in cleaning large slate quarry surfaces?
    content: In this process, wipe the laser lens regularly with isopropyl alcohol to remove slate dust, which builds up fast
      on quarry surfaces from the stone's Mohs 3-6 hardness and may distort the 1064 nm beam. After each shift, recalibrate
      fluence to 12.7 J/cm² for hardness variations, efficiently keeping downtime below 10% in high-volume work at 100 W power
      settings.
