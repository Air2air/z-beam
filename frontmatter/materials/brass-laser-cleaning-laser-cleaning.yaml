micro:
  before: This contamination on brass surface, it appears as irregular oxide patches
    and embedded particles during microscopic observation at high magnification. Layer
    forms thickly in some areas, so reflectivity reduces because dirt accumulates
    from exposure. Brass material shows its non-ferrous nature with yellowish undertones
    still visible beneath buildup. Contamination patterns exhibit clustered spots,
    and these spots create uneven texture across the surface.
  after: After laser cleaning is applied, oxide layers already removed completely,
    and clean surface emerges with enhanced smoothness. Treatment achieves uniform
    polish, so brass exhibits its natural luster without remnants. In observations,
    particles just now absent, and material-specific features like fine grain structure
    become prominent. From the data, cleaning process restores conductivity appearance
    indirectly through clear metallic sheen. Surface now shows durability in its even
    finish, because laser ablation targets contaminants precisely without damaging
    base.
