micro:
  before: The contamination on mortar surfaces, it manifests as irregular clusters, adhering tenaciously to porous grains.
    At high magnification, these deposits exhibit jagged edges, which obscure the underlying matrix, influenced from environmental
    exposure. Layers of soot and salts, they persist in crevices, creating shadowed patterns that demonstrate uneven adhesion.
    This buildup, it disrupts the natural texture, where fine particles embed deeply.
  after: Laser cleaning yields a transformed view. The process removes the contaminants selectively, revealing the clean substrate.
    Surfaces now show exposed aggregates, smoother in appearance, with minimal residue. Pores, they appear open and defined,
    free from obstructive films. The cleaned areas exhibit restored granularity, which leads to enhanced material integrity.
    It seems that efficacy varies with contamination type, yet the outcome consistently uncovers the base characteristics.
