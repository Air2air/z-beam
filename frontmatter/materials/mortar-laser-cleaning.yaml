    _display:
      _open: false
      order: 10
  - id: how-does-moisture-content-in-mortar
    title: How does moisture content in mortar affect laser cleaning efficiency and safety?
    content: Moisture notably heightens steam generation risks in laser cleaning of mortar. When dealing with damp historical
      structures, it's essential to lower the fluence below 12.7 J/cm² while raising scan speed over 500 mm/s for better thermal
      control. Such tweaks distinctly avoid micro-fracturing and sustain ablation efficiency on wet surfaces.
