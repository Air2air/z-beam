faq:
  presentation: collapsible
  items:
  - id: can-laser-cleaning-effectively-remove-mortar
    title: Can laser cleaning effectively remove mortar residue from brickwork without damaging the bricks?
    content: Yes, laser cleaning stands out for effectively stripping away mortar residue while safeguarding brick integrity.
      Employing a 1064 nm wavelength at 12.7 J/cm² fluence delivers distinct selective ablation of the mortar. Optimal settings,
      including 500 mm/s scan speed and 50% overlap, avert thermal harm to the underlying masonry, proving essential for delicate
      restoration efforts.
    metadata:
      topic: laser cleaning effectively remove mortar
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: true
      order: 1
  - id: what-laser-parameters-work-best-for
    title: What laser parameters work best for cleaning historical mortar from delicate stone surfaces?
    content: For treating historical mortar on delicate stone, it's essential to apply low fluence of about 12.7 J/cm² using
      nanosecond pulses at 10 ns. This approach delivers controlled ablation while safeguarding the substrate. Notably, a
      1064 nm wavelength paired with 50% beam overlap achieves uniform removal of traditional lime-based compositions, preventing
      thermal damage.
    metadata:
      topic: laser parameters work best for
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 2
  - id: does-laser-cleaning-create-hazardous-dust
    title: Does laser cleaning create hazardous dust when removing mortar containing silica?
    content: Laser ablation at 12.7 J/cm² provides a distinct reduction in hazardous silica dust relative to mechanical grinding.
      Yet, the method continues to produce fine particulate, so local exhaust ventilation and respiratory protection remain
      essential for complying with OSHA's permissible exposure limits for crystalline silica.
    metadata:
      topic: laser cleaning create hazardous dust
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 3
  - id: how-does-laser-cleaning-affect-the
    title: How does laser cleaning affect the chemical composition of mortar surfaces compared to chemical cleaning?
    content: Laser cleaning, delivered at 12.7 J/cm², notably ablates contaminants selectively without inducing chemical reactions,
      thereby safeguarding the mortar's original composition. This method proves essential for averting damaging salt crystallization
      and pH alterations, delivering superior long-term stability versus chemical approaches that often deposit reactive residues.
    metadata:
      topic: laser cleaning affect the chemical
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 4
  - id: can-laser-cleaning-distinguish-between-original
    title: Can laser cleaning distinguish between original mortar and later repairs during restoration projects?
    content: Yes, laser cleaning can differentiate materials through selective ablation. At 12.7 J/cm², original mortar and
      modern repairs, with their distinct compositions, ablate at different rates. This allows precise removal of later cementitious
      additions while preserving the authentic, historical substrate.
    metadata:
      topic: laser cleaning dtinguh between original
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 5
  - id: whats-the-maximum-thickness-of-mortar
    title: What's the maximum thickness of mortar residue that laser cleaning can effectively remove?
    content: Laser cleaning effectively removes mortar layers up to 2-3 mm thick per pass at 12.7 J/cm². For thicker residues,
      a multi-pass strategy is essential to avoid substrate damage, often requiring mechanical pre-cleaning for deposits exceeding
      5 mm.
