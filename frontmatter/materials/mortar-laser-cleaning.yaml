      order: 9
  - id: can-laser-cleaning-prepare-mortar-surfaces
    title: Can laser cleaning prepare mortar surfaces for repointing by creating better adhesion profiles?
    content: Applying laser cleaning at 12.7 J/cm² notably removes contaminants and micro-roughens the mortar surface, forming
      an essential adhesion profile for repointing. This technique distinctly outperforms mechanical abrasion by safeguarding
      substrate integrity, yielding superior bond strength in the new mortar without micro-fractures.
    metadata:
      topic: laser cleaning prep mortar surfaces
      severity: medium
      acceptedAnswer: true
      expertInfo:
