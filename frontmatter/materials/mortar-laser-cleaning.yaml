  - id: what-safety-precautions-are-specific-to
    title: What safety precautions are specific to laser cleaning mortar from confined spaces like chimneys or tunnels?
    content: In confined spaces such as chimneys, it's essential to deploy aggressive fume extraction for controlling hazardous
      mortar dust. The 1064 nm wavelength presents notable reflection risks, so position the beam with precision. Keep monitoring
      oxygen levels and combustible gases to avoid atmospheric dangers.
    metadata:
