  - id: how-does-mortar-composition-limebased-vs
    title: How does mortar composition (lime-based vs. Portland cement) affect laser cleaning results?
    content: The notable higher absorption of lime mortar at 1064 nm enables gentler cleaning around 12.7 J/cm². In contrast,
      denser Portland cement demands elevated fluence, potentially causing discoloration unless its distinct mineralogy is
      addressed via tuned power and scan speed.
