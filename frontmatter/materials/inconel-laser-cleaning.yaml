  components:
    settings_description: When laser cleaning Inconel, its standout heat resistance
      sets it apart from everyday steels, allowing you to push temperatures higher
      without warping the surface. I've found this property shines in aerospace parts,
      where the alloy holds up under intense conditions that would melt lesser metals,
      so you can focus on stripping away oxidation or contaminants effectively. Unlike
      more conductive alloys, Inconel's lower heat spread means the laser energy stays
      localized, which helps preserve intricate details but requires careful control
      to avoid uneven heating. Watch out midway through passes for potential surface
      cracking if power builds too quickly—dial back intensity and add overlaps to
      keep things steady. This approach brings back the finish cleanly, especially
      in turbine blades, without compromising the material's corrosion-fighting edge.
      Tends to work best with multiple light sweeps, restoring that tough, reliable
      surface for demanding applications.
    micro:
      before: I've seen the contaminated Inconel surface under magnification, and
        it shows a rough, uneven texture everywhere. Dark, irregular patches of buildup
        cling tightly to the base material. Scattered debris makes the whole area
        look dull and obstructed.
      after: After laser treatment, that same surface transforms into a smooth, even
        finish without a trace of residue. The metal gleams with a consistent shine
        across every spot. Now it reveals the clean, pristine structure underneath
        clearly.
