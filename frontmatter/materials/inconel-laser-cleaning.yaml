      order: 7
  - id: is-there-a-risk-of-generating
    title: Is there a risk of generating hexavalent chromium (Cr6+) during the laser cleaning of Inconel, and how can this
      be mitigated?
    content: Indeed, Cr6+ formation presents a notable risk given Inconel's high chromium content. We address this through
      nanosecond pulses of 10 ns and a fluence of 2.5 J/cm², sidestepping the extreme temperatures needed for its creation.
      Moreover, effective fume extraction adds an essential safeguard for regulatory adherence.
    metadata:
