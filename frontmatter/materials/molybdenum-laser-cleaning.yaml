components:
  subtitle: Molybdenum maintains exceptional strength at white-hot temperatures, so it's the essential alloy for jet engines
    and industrial furnaces
  micro:
    before: When we examine the contaminated molybdenum surface at high magnification, dark specks and uneven patches dominate
      the view. Layers of grime cling tightly, creating rough textures that obscure the base material. Scattered debris builds
      up in crevices, giving it a cluttered and worn appearance.
    after: After laser treatment, the same surface reveals a smooth and uniform shine across its expanse. Clean lines emerge
      without any lingering spots or roughness. The material now appears polished and even, free from all visible buildup.
  settingsDescription: When laser cleaning Molybdenum, unlike softer non-ferrous metals like copper, its exceptional heat
    resistance lets you push higher powers without quick melting. This works well for tough contaminants in aerospace parts.
    I've seen it clear buildup fast on tooling dies. But its dense structure spreads heat evenly, so overlaps must stay tight
    to avoid uneven spots. Tends to shine up nicely. Watch power spikes at the end—they can crack surfaces if unchecked.
