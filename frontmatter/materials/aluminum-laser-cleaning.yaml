  contaminatedBy:
    _section:
      sectionTitle: Aluminum's Oxide Susceptibilities
      sectionDescription: Aluminum draws in atmospheric oxygen because its reactive surface chemistry fosters quick bonding,
        leading to a tightly adhered oxide layer
      icon: droplet
      order: 61
      variant: default
    description: 'Aluminum draws in atmospheric oxygen because its reactive surface chemistry fosters quick bonding, leading
      to a tightly adhered oxide layer that builds up over time through ongoing exposure, especially in humid industrial environments
      where we often handle components like aircraft panels or automotive frames. Contaminants such as oils and greases cling
      stubbornly too, since the material''s slight surface roughness traps them during manufacturing processes, and while
      its non-porous nature resists deep penetration, residues accumulate on the exterior when combined with the oxide''s
      affinity for organic compounds. We use laser cleaning in these real-world scenarios to strip away layers without damaging
      the underlying metal, though challenges arise if contaminants have bonded deeply due to prolonged reactivity. Key warnings:
      Watch for uneven oxide removal risking surface pitting, and ensure proper ventilation to avoid inhaling dispersed particles
      during cleaning.'
