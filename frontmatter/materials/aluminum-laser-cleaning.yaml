micro:
  before: Laser cleaning process starts on aluminum surface. Contamination covers it before treatment. This contamination,
    it forms irregular patches and clusters. Oxide layers build up thickly, so they hide metal's natural shine. At 1000x magnification,
    rough textures appear with deep pits and sticky residues from environment. Particles cling tightly during exposure to
    air, showing dark spots and uneven buildup. Aluminum's lightweight nature makes contamination spread easily, so patterns
    look like scattered islands on smooth base.
  after: After laser treatment is applied, surface changes completely. Contaminants are already removed by precise pulses.
    Clean aluminum now exhibits uniform texture and high reflectivity. In observations at 1000x, original grain structure
    emerges clearly without residues. Smooth facets reflect light evenly, so no pits remain. This process achieves effective
    removal, and surface shows durable, conductive features of metal. From the data, clean areas contrast sharply with former
    dirty zones, highlighting treatment's success during cleaning.
