faq:
  presentation: collapsible
  items:
  - id: what-makes-aluminum-suitable-for-industrial
    title: What makes aluminum **suitable for industrial** laser cleaning?
    content: "**Lightweight with low density**. Aluminum weighs around 2.7 grams per cubic centimeter. That low density helps\
      \ in applications like aerospace parts. Its near-zero porosity means surfaces stay smooth, without hidden contaminants.\
      \  \n\nAlessandro Moretti, Ph.D."
    metadata:
      topic: makes aluminum **suitable for industrial**
      severity: high
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: true
      order: 1
  - id: how-do-you-set-up-laser
    title: How do you **set up laser cleaning** for aluminum?
    content: "**100-watt power range removes oxides**. We use a 100-watt power range to strip away oxides or paints. The laser\
      \ clears buildup gently, bringing back the original finish without damaging the base metal. It works well on automotive\
      \ components or heat sinks. Just adjust the pulse to avoid overheating—aluminum conducts heat fast.  \n\nAlessandro\
      \ Moretti, Ph.D."
    metadata:
      topic: do you **set up laser
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
