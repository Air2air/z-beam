faq:
  _section:
    sectionTitle: Aluminum Laser Cleaning FAQ
    sectionDescription: Expert answers to common questions about laser cleaning aluminum surfaces
    icon: help-circle
    order: 100
    variant: default
  items:
  - question: What safety considerations should we keep in mind when laser cleaning aluminum surfaces, especially regarding
      its reflective qualities?
    answer: Professionals often deal with aluminum's shiny and reflective surface, which can bounce laser beams around unpredictably
      and increase risks if not handled properly, so we use full eye protection rated for the specific laser wavelength. Additionally,
      proper enclosure systems prevent stray reflections from reaching unprotected areas, and we always maintain proper ventilation
      to handle any particles dispersed during the cleaning process.
