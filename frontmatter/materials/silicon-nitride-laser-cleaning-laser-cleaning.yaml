micro:
  before: This contamination on silicon nitride surface, it forms irregular layers
    and clustered particles. Before laser cleaning is applied, buildup covers the
    material densely, so reflectivity decreases and roughness appears prominent. At
    1000x magnification, oxide patches show jagged edges, and debris sticks tightly
    because of exposure to environment. During observations, contamination patterns
    reveal uneven distribution across the ceramic structure.
  after: After treatment is performed, laser removes layers completely. Clean surface
    now exhibits uniformity and smoothness. Particles already gone from the area,
    so original features of silicon nitride emerge clearly. In scans after cleaning,
    material shows its natural hardness and resistance without any residue. This process
    achieves effective removal, and surface maintains integrity so. From the data,
    difference highlights how laser restores the durable characteristics of the oxide
    ceramic.
