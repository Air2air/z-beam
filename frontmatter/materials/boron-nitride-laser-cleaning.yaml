components:
  micro:
    before: When laser cleaning boron nitride, we've found the contaminated surface shows heavy buildup of irregular debris.
      Dark patches scatter across the uneven texture, trapping fine particles that dull the overall sheen. This layer hides
      the material's natural smoothness, making it look worn and inconsistent.
    after: After treatment, the surface reveals a uniform, glossy finish free from those clinging residues. Clean facets emerge
      brightly, restoring the inherent polish without any lingering spots. We've seen this brings back clarity, but watch
      for overexposure to avoid subtle
