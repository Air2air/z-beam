    variant: default
  presentation: collapsible
  items:
  - id: how-do-i-safely-laser-clean
    title: How do I safely laser clean Boron Nitride without causing damage?
    content: You must watch out for its high reflectivity right from the start, as it bounces most laser energy away. This
      means you should use a pulsed laser at lower power to avoid overheating spots that could crack the surface. Start with
      short bursts and scan slowly to let its good heat spreading keep things even. Compared to metals that absorb more, Boron
      Nitride stays cooler overall, so you get cleaner results without much risk if you adjust properly.
    metadata:
      topic: do i safely laser clean
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: true
      order: 1
  - id: why-is-boron-nitride-harder-to
    title: Why is Boron Nitride harder to clean with lasers than other ceramics?
    content: Make sure you account for its extremely high reflectivity when setting up, or the laser might not touch the contaminants
      at all. Unlike softer ceramics that absorb energy easily and clean fast, Boron Nitride reflects almost everything, so
      you need higher intensities to break through. This difference means longer sessions, but its strong heat resistance
      prevents melting or warping. You should test on a small area
    metadata:
      topic: boron nitride harder to clean
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 2
  options:
    autoOpenFirst: true
    sortBy: severity
