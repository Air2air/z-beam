components:
  subtitle: Birch combines a high tensile strength of 130 MPa with a low thermal conductivity of 0.163 W/m·K, making it uniquely
    dimensionally stable for precision manufacturing applications
  description: When laser cleaning Birch, you'll want to account for its high porosity at 0.587, which can trap residues and
    lead to uneven ablation. Its low thermal conductivity of 0.163 W/m·K causes localized heating, so use 45 W at 1064 nm
    with 50% overlap to avoid charring. We've found two passes at 500 mm/s restore surfaces without cracking the 13.9 GPa
    modulus wood.
  settings_description: The key with Birch lies in its notable porosity, which we've found makes it more absorbent to laser
    energy than denser hardwoods. This property allows the process to remove surface contaminants and restore natural grain
    effectively, but it also increases the risk of uneven heating if not managed carefully. We typically start with reduced
    power levels to prevent charring in those open pores, gradually increasing as the cleaning progresses to expose underlying
    layers without compromising structural integrity. In our experience, this approach improves adhesion removal in applications
    like furniture manufacturing or architectural restoration, where preserving the wood's flexibility is essential. Watch
    for localized discoloration mid-process, and adjust scan speeds upward to reduce dwell time on porous areas, ensuring
    the material's moderate strength holds up across multiple passes.
  micro:
    before: At 1000x magnification, the birch surface shows thick layers of dirt clogging the wood fibers. Grime fills the
      tiny pores, making everything look uneven and dull. Contaminants stick tightly, hiding the natural texture beneath.
    after: After laser treatment at 1000x magnification, the birch surface reveals clear, open wood fibers. The treatment
      removes all grime, exposing smooth and even pores. It restores the natural shine, showing a clean and detailed texture.
