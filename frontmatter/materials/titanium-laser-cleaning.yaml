components:
  subtitle: Its strength matches steel at nearly half the weight
  description: Titanium has excellent corrosion resistance, but its low thermal conductivity of 21.9 W/m·K poses a challenge.
    For laser cleaning at 1064 nm, we use about 100 W and control the fluence carefully to stay below its 2.5 J/cm² threshold
    and avoid surface oxidation.
  micro:
    before: When examining the contaminated titanium surface at 1000x magnification, you spot irregular patches of grime and
      oxide buildup clinging tightly. These dark spots create uneven textures that scatter light oddly across the metal. Make
      sure you note how this dulls the overall shine before any cleaning starts.
    after: After laser treatment on the titanium surface at 1000x magnification, you see a smooth, even layer free of those
      stubborn residues. The metal now reflects light cleanly without any rough interruptions. Watch out for
  settings_description: When laser cleaning titanium, I've seen it stand out from denser metals like steel because of its
    lighter weight and strong natural oxide layer that fights corrosion so well. This makes it great for aerospace parts,
    where you can remove tough contaminants without deep damage, but the layer also means the laser tends to skim the surface
    gently—start with milder power and slower passes to let heat dissipate evenly and avoid uneven heating. Unlike aluminum,
    which scatters heat quickly, titanium holds it locally, so building up multiple light passes clears buildup effectively
    while preserving its durability. Just watch out at the end for any signs of discoloration, and dial back if needed to
    keep that protective shine intact.
