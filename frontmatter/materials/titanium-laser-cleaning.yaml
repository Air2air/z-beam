  hero:
    alt: Titanium surface undergoing laser cleaning showing precise contamination removal
    url: /images/material/titanium-laser-cleaning-hero.jpg
  micro:
    alt: Microscopic view of Titanium surface after laser cleaning showing detailed surface structure
    url: /images/material/titanium-laser-cleaning-micro.jpg
micro:
  before: At 1000x magnification, the contaminated titanium surface reveals a layer of buildup that dulls its inherent smoothness.
    Particles cling tightly, and oxide forms unevenly because exposure to air causes such adhesion. After laser cleaning,
    the surface appears restored and free from residues. Treatment removes contaminants effectively, so the metal regains
    its clean
