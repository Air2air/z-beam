  components:
    micro:
      before: At 1000x magnification, the tool steel surface looks rough and patchy. Dark spots cluster together, trapping
        dirt and debris in cracks. This uneven layer hides the metal's true texture underneath.
      after: After laser treatment at 1000x, the tool steel surface shines smooth and even. No spots remain, and cracks disappear
        into a clean polish. This fresh layer reveals the metal's solid, uniform structure.
    settings_description: When laser cleaning Tool Steel, watch its toughness first—it resists buildup removal more than softer
      alloys like mild steel. I've seen overheating cause surface cracks if you rush. Start slow with the laser on low power.
      This clears rust gently without warping. Tool Steel's heat resistance shines here, unlike brittle metals. Scan in even
      passes. Overlap spots by half. Finish with a quick check for smoothness. It restores tools perfectly.
