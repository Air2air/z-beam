  - id: how-does-rosewoods-high-density-compare
    title: How does rosewood's high density compare to other woods in terms of laser cleaning thresholds, and what fluence
      levels should be avoided?
    content: Notably, rosewood's density—around 950 kg/m³—surpasses that of softer woods like pine by almost double. This
      elevates its ablation threshold, thus allowing cleaner material removal at fluences up to 4.5 J/cm² without substrate
      damage. Specifically, steer clear of levels exceeding 6 J/cm² to prevent charring the dense lignin structure.
