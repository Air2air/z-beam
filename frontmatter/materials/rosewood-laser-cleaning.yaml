components:
  settings_description: When laser cleaning Rosewood, watch its notable porosity right away—it can trap contaminants deep
    inside, leading to uneven results if you blast too aggressively. I've seen this hardwood absorb laser energy better than
    many denser woods like oak, so it heats up quickly without much reflection. This works best when you start with gentler
    passes to avoid scorching the surface grains. Tends to clean smoothly for cultural artifacts or instruments because of
    its natural oils that resist charring, unlike softer pines. Just keep scans slow and overlap spots well to pull out embedded
    dirt without cracking the fibers.
  micro:
    before: When laser cleaning rosewood, you must first examine the contaminated surface closely at high magnification. Fine
      particles and grime coat the fibers, creating a dull, uneven layer that hides the wood's texture. Dark residues cling
      tightly to the pores, making the whole area look patchy and worn.
    after: After the laser treatment, you see the surface transform into something smooth and clear. The fibers emerge vibrant
      and distinct, free from any clinging dirt or spots. Now the natural grain stands out evenly, revealing
