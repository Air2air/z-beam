  - id: in-laser-surface-treatment-of-rosewood
    title: In laser surface treatment of rosewood, how can pre-cleaning preparation like degreasing improve outcomes and reduce
      multiple passes?
    content: Rosewood's natural oils particularly block contaminants from laser penetration, thus necessitating degreasing
      with solvents like acetone to reveal the surface for better absorption. Notably, this preparation improves efficacy
      at 4.5 J/cm² fluence, usually reducing passes from two to one while avoiding uneven charring in 45 W treatments.
