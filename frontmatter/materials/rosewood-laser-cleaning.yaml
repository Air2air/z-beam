      order: 6
  - id: for-smallscale-workshops-which-affordable-laser
    title: For small-scale workshops, which affordable laser cleaning systems are best for treating rosewood veneers without
      substrate damage?
    content: For small workshops dealing with rosewood veneers, consider portable 1064 nm fiber lasers, particularly IPG or
      Raycus models under $10,000 that deliver 45 W average power. Adjust energy density to 4.5 J/cm² and scan speed to 500
      mm/s, which notably ablates contaminants gently without damaging the delicate lignin structure. Two passes with 50%
      overlap thus guarantee uniform outcomes.
    metadata:
