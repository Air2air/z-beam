faq:
  presentation: collapsible
  items:
  - id: what-laser-parameters-like-wavelength-and
    title: What laser parameters, like wavelength and pulse energy, are recommended to safely clean contaminants from rosewood
      surfaces without causing charring or discoloration?
    content: For rosewood's dense, oil-rich structure that chars easily under heat, particularly when processing, apply a
      1064 nm wavelength at 4.5 J/cm² fluence to selectively remove contaminants. Combine this with 100 ns pulses of 45 W
      power, scanned at 500 mm/s with 50% overlap over two passes, thus preventing discoloration.
    metadata:
      topic: laser parameters, like wavelength and
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: true
      order: 1
  - id: how-does-the-natural-oil-in
    title: How does the natural oil in rosewood affect the efficiency of laser ablation during surface cleaning, and what
      adjustments are needed?
    content: The inherent oils in rosewood particularly shield the underlying lignin and cellulose, reducing laser absorption
      at 1064 nm and leading to spotty ablation during cleaning. Such inefficiency calls for boosting energy density to 4.5
      J/cm² with 50% beam overlap and two passes at 45 W, thus enabling even contaminant removal without charring the wood.
    metadata:
      topic: the natural oil in rosewood
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 2
  - id: is-a-co2-laser-suitable-for
    title: Is a CO2 laser suitable for removing old varnish from antique rosewood furniture, and what risks are involved for
      the wood grain?
    content: CO2 lasers prove unsuitable for removing old varnish from antique rosewood furniture, particularly due to their
      10.6 μm wavelength generating excessive heat, which endangers the wood's delicate grain with charring. Notably, restoration
      experts highlight how vaporization unevenly erodes the fine structure, risking a loss of luster. Thus, select 1064 nm
      pulses at 4.5 J/cm² to reduce damage.
    metadata:
      topic: a co2 laser suitable for
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 3
  - id: what-safety-precautions-should-be-taken
    title: What safety precautions should be taken when using fiber lasers to clean rosewood musical instruments, such as
      guitars, to avoid toxic fume release?
    content: For lasering rosewood guitars with a 1064 nm fiber laser at 45 W, particularly prioritize robust local exhaust
      ventilation to capture volatile organic compounds from the wood's oils during ablation. Specifically, maintain energy
      density below 4.5 J/cm² while scanning at 500 mm/s to reduce thermal vaporization. Thus, always don N95 respirators
      in a well-sealed workspace.
    metadata:
      topic: safety precautions should be taken
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 4
  - id: in-laser-cleaning-rosewood-artifacts-how
    title: In laser cleaning rosewood artifacts, how can operators prevent fading or color shifts in the wood's reddish-brown
      hue?
    content: To protect rosewood's reddish-brown pigments in laser cleaning, particularly by setting fluence to 4.5 J/cm²
      and power near 45 W at 1064 nm wavelength, this curbs heat accumulation that dulls colors. Scan evenly at 500 mm/s for
      coverage, then seal the surface afterward, thus stabilizing hues against oxidation.
    metadata:
      topic: in laser cleaning rosewood artifacts,
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
