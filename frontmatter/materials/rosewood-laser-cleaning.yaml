  - id: what-regulatory-standards-apply-to-laser
    title: What regulatory standards apply to laser cleaning rosewood in conservation projects, especially regarding endangered
      species protections?
    content: In rosewood conservation through laser cleaning, CITES Appendix II listings require permits for sourcing endangered
      species, particularly, along with detailed treatment records to track provenance. Specifically, apply parameters like
      4.5 J/cm² fluence at 1064 nm wavelength to remove contaminants gently without damaging the wood's lignin structure,
      thus ensuring regulatory compliance in cultural heritage projects.
    metadata:
