      order: 5
  - id: what-are-common-challenges-in-using
    title: What are common challenges in using pulsed lasers to remove pollutants from outdoor rosewood sculptures, and how
      to mitigate humidity effects?
    content: Rosewood's hygroscopic properties particularly absorb ambient humidity, resulting in swelling and variable laser
      uptake during pulsed cleaning, which may cause uneven pollutant removal or substrate harm. Thus, to counteract this,
      sustain energy density at 4.5 J/cm² with a 500 mm/s scan speed for even ablation, while pre-drying surfaces to steady
      moisture levels.
    metadata:
      topic: common challenges in using pulsed
      severity: high
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
