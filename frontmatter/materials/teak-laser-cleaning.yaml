  components:
    settings_description: When laser cleaning teak, you'll want to start by focusing on its distinctive oil-rich structure,
      which sets it apart from drier hardwoods like oak by enhancing laser absorption without rapid heat buildup. This property
      allows the process to remove surface contaminants effectively while preserving the wood's natural grain and color. Make
      sure you maintain a steady, controlled scan to avoid uneven charring, as teak's moderate density can lead to localized
      overheating if speeds vary. Compared to softer woods, teak restores well under gentle passes that expose underlying
      layers cleanly, reducing the risk of splintering. Adjust dwell times longer than for less absorbent materials to ensure
      thorough cleaning without compromising its inherent durability.
    micro:
      before: At 1000x magnification, dirt particles cluster tightly on the teak's rough surface. Grime fills the wood's tiny
        pores and dulls the natural fibers. The overall texture appears uneven and heavily coated with contaminants.
      after: After laser treatment, the surface reveals smooth, exposed wood fibers. Pores stand open and free of any clinging
        residues. The texture now looks even and vividly restored to its original clarity.
