components:
  settingsDescription: We've found that Gorilla Glass cleans reliably with laser when we prioritize its strong energy absorption,
    which removes surface residues effectively without excessive material removal. This lets us restore clarity on delicate
    displays in electronics repair. But in the middle of passes, its limited heat spreading can build localized stress—so
    reduce speed to prevent cracking the chemically toughened layers.
  micro:
    before: The contaminated surface reveals scattered patches of grime and dust that cling unevenly. Oily residues form irregular
      blobs, obscuring the glass's natural texture beneath. Fine debris particles dot the area, creating a mottled and rough
      overall look.
    after: Laser treatment exposes a smooth expanse free of grime and clinging residues. The glass surface now gleams with
      uniform clarity, revealing its inherent polish. Subtle textures emerge cleanly, without any mottled spots or rough interruptions.
