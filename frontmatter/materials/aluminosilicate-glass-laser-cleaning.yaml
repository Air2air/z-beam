  components:
    micro:
      before: When examining the contaminated aluminosilicate glass surface at 1000x
        magnification, you notice irregular clumps of debris scattered across it,
        dulling the overall texture. Fine particles adhere stubbornly, creating a
        bumpy and hazy layer that obscures the underlying material. This buildup makes
        the surface look worn and inconsistent under close inspection.
      after: After laser treatment, you observe a remarkably even and polished surface
        emerging clearly at the same magnification. The debris vanishes completely,
        leaving behind a sleek, reflective finish without any remnants.
