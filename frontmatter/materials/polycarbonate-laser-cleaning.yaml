components:
  settingsDescription: The key with polycarbonate is its toughness, which makes it great for laser cleaning without fracturing
    easily. We've found this thermoplastic holds up well in applications like automotive parts and medical devices, so we
    typically start with gentle pulses to remove contaminants. But watch out mid-process—its poor heat spreading can cause
    localized melting if you push too hard, so adjust to quicker passes and lower energy to keep surfaces clear and intact.
  micro:
    before: You see the polycarbonate surface covered in dark spots and uneven bumps. Dust and grime cling tightly, making
      the texture rough and patchy under high magnification. This contamination hides the material's natural smoothness and
      clarity.
    after: After laser treatment, the surface looks even and bright without those spots. The texture turns smooth and uniform,
      revealing the clean, glossy finish underneath. Now the polycarbonate shines clearly, free from any clinging dirt.
