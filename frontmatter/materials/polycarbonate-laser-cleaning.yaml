micro:
  before: Contamination on polycarbonate surfaces shows irregular patterns at high magnification. This buildup forms thick
    layers from environmental exposure, and it covers the material's smooth texture. Oxide deposits appear clustered, so they
    reduce surface uniformity. Before laser cleaning is applied, particles stick firmly, creating rough edges and hidden cracks
    in the thermoplastic structure.
  after: Laser treatment removes these layers effectively. After ablation is performed, the surface achieves clean appearance
    with no residues left. Clean polycarbonate exhibits glossy finish and even reflectivity, because heat from laser vaporizes
    contaminants without damaging the base material. In observations, the treated area shows minimal pitting, and original
    transparency returns fully. This process restores durability, so polycarbonate maintains its tough properties for applications
    like protective coverings. From the scans, clean surfaces demonstrate uniform features, already free from prior dirt accumulations.
