faq:
  presentation: collapsible
  items:
  - id: can-you-safely-laser-clean-polycarbonate
    title: Can you safely laser clean polycarbonate surfaces without causing yellowing or clouding?
    content: Yes, polycarbonate can be safely laser cleaned without yellowing, particularly with a 1064 nm wavelength and
      fluence carefully controlled below 0.8 J/cm². This technique removes contaminants while holding the substrate temperature
      well under its thermal degradation threshold, thus avoiding photochemical damage and maintaining optical clarity.
    metadata:
      topic: you safely laser clean polycarbonate
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: true
      order: 1
  - id: what-laser-wavelength-is-safest-for
    title: What laser wavelength is safest for cleaning contaminants from polycarbonate without damaging the substrate?
    content: Particularly for polycarbonate cleaning, near-IR wavelengths like 1064 nm remain safest, as they experience poor
      absorption by the substrate and thus minimize thermal damage. Keep fluence below 0.8 J/cm² using nanosecond pulses at
      20 kHz. This method removes contaminants effectively while upholding the polymer's integrity.
    metadata:
      topic: laser wavelength safest for cleaning
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 2
  - id: how-do-you-remove-mold-release
    title: How do you remove mold release agents from polycarbonate components using laser cleaning?
    content: For silicone-based mold releases on polycarbonate, we specifically use a 1064 nm laser at ~0.8 J/cm² fluence.
      Notably, this ablates the thin organic film effectively while keeping the substrate's temperature safely below its damage
      threshold, thus ensuring complete removal.
    metadata:
      topic: do you remove mold release
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 3
  - id: what-are-the-maximum-safe-fluence
    title: What are the maximum safe fluence levels for laser cleaning polycarbonate surfaces?
    content: For laser cleaning of polycarbonate, particularly to avoid melting, keep fluence below 1.0 J/cm². Notably, optimal
      results emerge around 0.8 J/cm² using 1064 nm wavelength, effectively removing contaminants while preserving the polymer's
      integrity.
    metadata:
      topic: the maximum safe fluence levels
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 4
  - id: can-laser-cleaning-create-microcracks-or
    title: Can laser cleaning create micro-cracks or stress concentrations in polycarbonate components?
    content: Yes, laser cleaning can induce micro-cracks in polycarbonate, particularly from its notch sensitivity. Thus,
      to avoid this, keep fluence below 0.8 J/cm² and apply a 50% overlap ratio, preventing excessive thermal stress that
      weakens mechanical properties.
    metadata:
      topic: laser cleaning create micro-cracks or
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 5
  - id: how-does-laser-cleaning-affect-the
    title: How does laser cleaning affect the optical clarity and light transmission of polycarbonate lenses or windows?
    content: By adopting gentle parameters like 0.8 J/cm² fluence and 500 mm/s scan speed, proper laser cleaning particularly
      safeguards polycarbonate optics. Notably, this technique eliminates contaminants while curbing surface roughness and
      haze, thus upholding superior light transmission.
    metadata:
      topic: laser cleaning affect the optical
      severity: high
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 6
  - id: what-safety-precautions-are-needed-when
    title: What safety precautions are needed when laser cleaning polycarbonate due to potential hazardous fume generation?
    content: Decomposition of polycarbonate notably releases bisphenol A along with phenolic compounds. For safety, deploy
      a high-efficiency fume extractor equipped with HEPA and activated carbon filtration, while limiting laser fluence to
      below 0.8 J/cm² to curb hazardous fume production. Proper ventilation is thus vital for operator protection.
    metadata:
      topic: safety precautions needed laser cleaning
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 7
  - id: is-laser-cleaning-suitable-for-preparing
    title: Is laser cleaning suitable for preparing polycarbonate surfaces for adhesion or coating applications?
    content: Laser cleaning excels at readying polycarbonate for adhesion, particularly through elevating surface energy and
      generating micro-textures. Notably, a 1064 nm wavelength at 0.8 J/cm² fluence eliminates contaminants and adjusts surface
      chemistry, thus exceeding solvent wiping in bond strength.
    metadata:
      topic: laser cleaning suitable for preparing
      severity: high
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 8
  - id: how-do-you-remove-oxidation-or
    title: How do you remove oxidation or UV degradation from aged polycarbonate using laser cleaning?
    content: For aged polycarbonate, we apply a 1064 nm laser, with fluence specifically maintained below 0.8 J/cm². This
      method particularly targets the degraded surface layer for ablation, thus safeguarding the intact substrate underneath.
      It thereby restores optical clarity and surface integrity, avoiding thermal damage.
    metadata:
      topic: do you remove oxidation or
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 9
  - id: what-realtime-monitoring-techniques-work-best
    title: What real-time monitoring techniques work best for laser cleaning polycarbonate to prevent damage?
    content: Laser-induced fluorescence monitoring, particularly effective, detects early polycarbonate degradation by tracking
      spectral shifts around 450-550 nm. These changes indicate molecular breakdown before visible damage appears. Meanwhile,
      thermal imaging keeps surface temperature below 150°C, thus ensuring the process stays within the safe fluence threshold
      of 0.8 J/cm² for this sensitive polymer.
