  - id: how-do-industry-standards-guide-the
    title: How do industry standards guide the use of laser cleaning for terracotta in museum conservation projects?
    content: For terracotta conservation in museums, ICOM-CC guidelines particularly emphasize non-destructive techniques
      like spectroscopy, applied before and after cleaning, to protect the porous substrate. Notably, EN standards require
      precise documentation of parameters—such as 1064 nm wavelength and 2.5 J/cm² fluence—for uniform contaminant removal
      without inducing thermal stress on the delicate material.
