faq:
  presentation: collapsible
  items:
  - id: what-laser-wavelengths-are-most-effective
    title: What laser wavelengths are most effective for cleaning terracotta surfaces without causing cracking or discoloration?
    content: For terracotta cleaning, 1064 nm near-infrared lasers notably excel by aligning with the absorption of iron oxides
      and clays, thus avoiding cracking or discoloration—unlike 532 nm, which can lead to deeper heating. Target 2.5 J/cm²
      fluence, and test on sample tiles first.
    metadata:
      topic: laser wavelengths most effective for
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: true
      order: 1
  - id: how-does-the-high-porosity-of
    title: How does the high porosity of terracotta impact the laser cleaning process, particularly in removing embedded salts
      or dirt?
    content: Terracotta's high porosity, particularly for 1064 nm laser light, enables deeper penetration into pores, thus
      elevating subsurface heating risks during removal of embedded salts or dirt. To avoid structural weakening, adjust pulse
      energy to 2.5 J/cm² using 10 ns widths, which balances ablation efficiency with thermal control for effective, safe
      cleaning.
    metadata:
      topic: the high porosity of terracotta
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 2
  - id: what-safety-precautions-are-needed-when
    title: What safety precautions are needed when using lasers to clean terracotta artifacts, especially regarding airborne
      clay particles or fumes?
    content: When laser-cleaning terracotta artifacts with a 1064 nm beam at 2.5 J/cm² fluence, particularly prioritize robust
      ventilation systems to capture silica-laden clay particles and fumes. Operators must wear N95 masks, goggles, and gloves
      for dust protection. Notably, on painted surfaces, monitor temperatures closely to prevent pigment degradation from
      localized heating.
    metadata:
      topic: safety precautions needed using lasers
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 3
  - id: can-laser-cleaning-effectively-remove-black
    title: Can laser cleaning effectively remove black crusts from historical terracotta facades without damaging the underlying
      clay matrix?
    content: Yes, laser cleaning effectively removes black crusts from historical terracotta facades via layer-by-layer ablation,
      particularly sparing the fragile clay matrix. Notably, at 1064 nm wavelength and 2.5 J/cm² fluence, it outperforms mechanical
      scraping by minimizing erosion, as demonstrated in European architectural restorations.
    metadata:
      topic: laser cleaning effectively remove black
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 4
  - id: what-are-the-optimal-pulse-durations
    title: What are the optimal pulse durations and fluences for cleaning terracotta pottery in archaeological contexts?
    content: For terracotta pottery cleaning in archaeological contexts, I suggest nanosecond pulses of about 10 ns at a fluence
      of 2.5 J/cm² with 1064 nm wavelength. Particularly, this short-pulse method selectively ablates organic residues while
      preserving the delicate surface patina, unlike longer pulses that may cause deeper thermal damage. Thus, set scan speed
      to 500 mm/s for uniform coverage.
    metadata:
      topic: the optimal pulse durations and
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
