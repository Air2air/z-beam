faq:
  presentation: collapsible
  items:
  - id: what-laser-parameters-are-optimal-for
    title: What laser parameters are optimal for cleaning titanium carbide coatings without causing thermal damage to the
      underlying substrate?
    content: For cleaning titanium carbide coatings, choose a 1064 nm near-IR laser with 15 ns pulses at 50 kHz—essential
      for matching its strong absorption and high melting point. Aim at 2.5 J/cm² fluence and 500 mm/s scanning speed to achieve
      precise ablation of contaminants, avoiding substrate overheating through TiC's notable thermal conductivity. Three passes
      at 50% overlap deliver thorough outcomes.
    metadata:
      topic: laser parameters optimal for cleaning
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: true
      order: 1
  - id: how-effective-is-fiber-laser-cleaning
    title: How effective is fiber laser cleaning at removing contaminants from titanium carbide tool surfaces compared to
      traditional abrasive methods?
    content: Fiber laser cleaning outperforms abrasive methods for titanium carbide tools, delivering removal rates up to
      5 times faster at 150 W power and 500 mm/s scan speed, along with a smoother surface free of micro-scratches. Grinding,
      by contrast, often undermines TiC's essential hardness of ~3000 HV, whereas this technique safeguards substrate integrity
      via 2.5 J/cm² fluence—a notable boon for aerospace precision cutting.
    metadata:
      topic: effective fiber laser cleaning at
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 2
  - id: what-safety-precautions-are-needed-when
    title: What safety precautions are needed when using lasers to clean titanium carbide parts due to potential fume generation?
    content: In laser-cleaning titanium carbide with 150 W power and 2.5 J/cm² fluence, it's essential to prioritize robust
      local exhaust ventilation for dispersing ablation fumes. The TiC MSDS notes notable respiratory hazards from inhaled
      particles. Always don NIOSH-approved respirators and full-body suits to counter oxidation risks and fine dust exposure.
    metadata:
      topic: safety precautions needed using lasers
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 3
  - id: can-pulsed-lasers-selectively-remove-oxide
    title: Can pulsed lasers selectively remove oxide layers from titanium carbide without ablating the carbide itself?
    content: Indeed, pulsed lasers at 1064 nm facilitate selective oxide removal from titanium carbide, capitalizing on distinct
      ablation thresholds—oxides vaporize at 1-2 J/cm², whereas TiC tolerates up to 2.5 J/cm². This essential technique protects
      the substrate in aerospace coating maintenance, applying 50 kHz repetition for uniform coverage without thermal damage.
    metadata:
      topic: pulsed lasers selectively remove oxide
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 4
  - id: what-are-common-issues-with-residue
    title: What are common issues with residue buildup when laser cleaning titanium carbide coated dies in manufacturing?
    content: In laser cleaning of titanium carbide coated dies, residue buildup becomes a notable concern at fluences below
      2.5 J/cm², due to partial ablation and thermal re-deposition. It's essential to apply multiple passes—ideally three
      at 150 W with gas assist—for resolution, as forum users confirm through post-cleaning SEM analysis of residue-free,
      uniform surfaces.
    metadata:
      topic: common sues with residue buildup
      severity: high
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 5
  - id: how-does-the-high-hardness-of
    title: How does the high hardness of titanium carbide affect the choice of laser power for surface treatment in cleaning
      applications?
    content: Titanium carbide's notable hardness requires a fluence threshold of 2.5 J/cm² to remove contaminants without
      damaging the substrate, steering laser power selections toward 150 W for optimal energy balance. Operating at 1064 nm
      distinctly boosts absorption, thereby minimizing reflections that could otherwise hasten equipment degradation.
    metadata:
      topic: the high hardness of titanium
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
