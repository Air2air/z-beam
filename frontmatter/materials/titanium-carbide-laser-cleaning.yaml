components:
  settings_description: When laser cleaning titanium carbide, make sure you watch its exceptional hardness compared to softer
    ceramics like alumina, which can crack under aggressive pulses while this one resists without fracturing. You must start
    with controlled power to avoid overheating its dense structure, unlike metals that dissipate heat faster. This difference
    demands slower scan speeds, so you bring back the surface cleanly without compromising its tough, corrosion-resistant
    finish.
  micro:
    before: We've found that the contaminated titanium carbide surface at high magnification reveals stubborn layers of grime
      and particles scattered across it. Dark spots and irregular patches dominate the view, making the underlying material
      hard to discern amid the buildup. This cluttered appearance suggests years of exposure to harsh environments.
    after: After laser treatment, we've observed how the same surface transforms into a clear and even expanse. Smooth facets
      emerge without any residue, allowing the material's natural sheen to shine through consistently. The cleaned view now
      highlights a uniform
