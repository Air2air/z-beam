      order: 6
  - id: in-training-guides-what-best-practices
    title: In training guides, what best practices are recommended for preparing titanium carbide surfaces before laser cleaning
      to ensure uniform results?
    content: Before laser cleaning titanium carbide, eliminate common metal residues through ultrasonic agitation in a mild
      solvent—essential to avoid uneven ablation on its hard ceramic surface. Notably, calibrate the laser for a fluence above
      2.5 J/cm² with 50% beam overlap, guaranteeing uniform contaminant removal without substrate damage.
    metadata:
      topic: in training guides, best practices
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 7
  - id: are-there-regulatory-compliance-issues-when
    title: Are there regulatory compliance issues when disposing of waste from laser cleaning of titanium carbide in EU manufacturing
      facilities?
    content: Under EU regulations, REACH notably classifies titanium carbide particulates as potentially hazardous, demanding
      specialized waste disposal to avert environmental leaching of titanium ions from ablated debris produced during laser
      cleaning at 2.5 J/cm² fluence. It's essential to deploy sealed collection systems and review local directives for secure
      secondary handling, thereby curbing airborne or waterborne risks.
    metadata:
      topic: there regulatory compliance sues dposing
      severity: critical
