  - id: what-are-common-issues-with-residue
    title: What are common issues with residue buildup when laser cleaning titanium carbide coated dies in manufacturing?
    content: In laser cleaning of titanium carbide coated dies, residue buildup becomes a notable concern at fluences below
      2.5 J/cm², due to partial ablation and thermal re-deposition. It's essential to apply multiple passes—ideally three
      at 150 W with gas assist—for resolution, as forum users confirm through post-cleaning SEM analysis of residue-free,
      uniform surfaces.
