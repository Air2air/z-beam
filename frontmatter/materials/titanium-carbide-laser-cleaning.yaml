      order: 8
  - id: what-chemical-properties-of-titanium-carbide
    title: What chemical properties of titanium carbide make it resistant to certain laser wavelengths in cleaning processes?
    content: Titanium carbide's distinct metallic-like bonding and narrow bandgap enable notable strong absorption in the
      near-IR spectrum, particularly at 1064 nm, rendering it resilient to shorter UV-Vis wavelengths that pass through with
      minimal interaction. Such resilience curbs reactivity with laser-induced plasmas, enabling efficient contaminant removal
      at fluences as low as 2.5 J/cm² without substrate damage in aerospace components.
    metadata:
      topic: chemical properties of titanium carbide
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 9
  - id: how-do-manufacturers-of-laser-cleaning
    title: How do manufacturers of laser cleaning equipment recommend adjusting settings for titanium carbide versus steel
      surfaces?
    content: Titanium carbide, offering a notable edge in higher reflectivity and lower thermal expansion over steel, leads
      manufacturers like CleanLaser to recommend reducing fluence to 2.5 J/cm² while adopting a 1064 nm wavelength for enhanced
      absorption without risking substrate harm. By contrast, steel calls for 3-4 J/cm² and scan speeds near 1000 mm/s, as
      outlined in vendor guides and aerospace studies, to deliver precise contaminant ablation across three passes at 150
      W.
