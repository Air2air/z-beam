components:
  settingsDescription: When laser cleaning titanium carbide, make sure you watch its exceptional hardness compared to softer
    ceramics like alumina, which can crack under aggressive pulses while this one resists without fracturing. You must start
    with controlled power to avoid overheating its dense structure, unlike metals that dissipate heat faster. This difference
    demands slower scan speeds, so you bring back the surface cleanly without compromising its tough, corrosion-resistant
    finish.
  micro:
