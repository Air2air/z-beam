name: sandstone-laser-cleaning
slug: sandstone-laser-cleaning
page_title: sandstone-laser-cleaning
micro:
  before: The contamination on sandstone surfaces, it manifests as irregular clusters
    of dark particulates, which adhere tenaciously to the porous matrix. At 1000x
    magnification, these deposits reveal jagged edges that infiltrate the sedimentary
    grains, creating shadowed crevices dependent from environmental exposure. The
    unclean state exhibits a rough texture, where fine cracks amplify the visual density
    of soiling.
  after: Laser cleaning yields a transformed view. The process removes these layers,
    which leads to exposed grains that demonstrate inherent smoothness. Clean surfaces
    show uniform relief, with the original quartz fragments persisting without residue.
    It appears that minor pitting occurs selectively, influenced from the laser's
    interaction with porosity, yet overall integrity remains evident. This treatment,
    it restores the material's natural stratification, free from adherent films.
