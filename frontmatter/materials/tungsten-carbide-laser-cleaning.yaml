components:
  settings_description: "When laser cleaning Tungsten Carbide, we've found you must start low on power to avoid cracking its\
    \ brittle surface right away. This material's extreme hardness makes contaminants stick tough, so begin with a gentle\
    \ pass to loosen dirt without scratching the base. We've typically set the beam to a focused spot and slow scan speed,\
    \ letting its good heat spread evenly so you don't overheat edges. Unlike softer metals, its low expansion keeps shapes\
    \ stable, but watch for buildup—multiple light passes restore that tool-sharp finish in aerospace parts. Just ease up\
    \ if you spot any haze; it cleans clean without residue. \n\nYi-Chun Lin, Ph.D."
  micro:
    before: When you examine the contaminated tungsten carbide surface at 1000x, rough patches of grime cling tightly to every
      crevice. Dark residues build up in layers, hiding the material's true texture beneath a dull haze. Scattered debris
      dots the view, making the whole area look uneven and worn.
    after: After laser treatment, the same surface appears smooth and uniform across the field. The clean finish reveals a
      consistent shine without any lingering spots. Now, the material's natural polish stands out clearly
