          title: Ph.D.
          expertise: *id001
      - id: tungsten-carbide-coatings
        question: How do I safely remove oil residues from tungsten carbide coatings using laser cleaning?
        answer: To safely remove oil residue from tungsten carbide coatings, use a 1064 nm laser at 5.1 J/cm² fluence and
          100 W power, with 10 ns pulses at 50 kHz—this process stays straightforward. Scan efficiently at 500 mm/s using
          50% overlap over three passes, cutting thermal stress and cracking risks. Afterward, optically inspect for even
          cleanliness, blocking redeposition on this tough ceramic.
        topic: tungsten carbide coatings
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: generating-toxic-fumes
        question: What are the risks of generating toxic fumes when laser cleaning tungsten carbide parts?
        answer: This process of laser cleaning tungsten carbide at 5.1 J/cm² fluence risks vaporizing cobalt binders, which
          releases fine tungsten and cobalt particles forming toxic fumes. Inhaling them may cause lung damage, according
          to MSDS warnings. For practical safety in 100 W operations, prioritize robust ventilation to disperse these hazards.
        topic: generating toxic fumes
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: oxidized-layers
        question: Can fiber lasers effectively clean oxidized layers on tungsten carbide inserts?
        answer: Yes, fiber lasers at 1064 nm wavelength offer a straightforward approach to effectively remove oxidized layers
          from tungsten carbide inserts, absorbing better than CO2 lasers for precise ablation. This process, using 5.1 J/cm²
          fluence and 100 W power, targets oxide thresholds without substrate harm, yielding minimal surface roughness shifts
          for aerospace-grade finishes.
        topic: oxidized layers
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: pulse-duration-settings
        question: What pulse duration settings should be used for laser cleaning tungsten carbide to minimize heat-affected
          zones?
        answer: For cleaning tungsten carbide, a practical approach is using picosecond pulses around 10 ps rather than nanoseconds
          to sharply limit heat-affected zones. Given its thermal conductivity of 80-120 W/mK that risks microcracks in hard
          coatings, this process ensures precise ablation at 5.1 J/cm² fluence without subsurface damage.
        topic: pulse duration settings
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: tungsten-carbide
        question: Are there any regulatory standards for laser cleaning tungsten carbide in manufacturing environments?
        answer: In manufacturing, laser cleaning of tungsten carbide adheres practically to OSHA's 29 CFR 1910.1096 for laser
          safety, requiring enclosures and eye protection against its high reflectivity. The EPA controls ablation dust emissions,
          mandating ventilation to cap tungsten particulates below 5 mg/m³. ISO 11553 directs this process, optimizing at
          5.1 J/cm² fluence for safe, damage-free oxide removal on this resilient ceramic.
        topic: tungsten carbide
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: high-hardness
        question: How does the high hardness of tungsten carbide affect the choice of laser power for surface decontamination?
        answer: Tungsten carbide's Vickers hardness of 1500-2000 HV resists ablation straightforwardly, needing higher fluences
          around 5.1 J/cm² to strip contaminants without substrate etching. Unlike softer metals, this process requires controlled
          100 W power at 1064 nm wavelength for efficient, damage-free cleaning.
        topic: high hardness
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: tungsten-carbide-drill-bits
        question: What common contaminants on tungsten carbide drill bits can be removed with laser cleaning, and what's the
          success rate?
        answer: Laser cleaning works straightforwardly to remove coolants, metal swarf, and carbon buildup from tungsten carbide
          drill bits, leveraging the material's high hardness and thermal stability. At a 1064 nm wavelength and 5.1 J/cm²
          fluence, this process delivers over 95% efficiency in case studies, minimizing substrate damage while restoring
          cutting edges for aerospace and mining tools.
        topic: tungsten carbide drill bits
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: cobalt-leaching
        question: In laser cleaning of tungsten carbide, how do I handle potential cobalt leaching from cemented carbide?
        answer: In laser cleaning of WC-Co cemented carbide containing 6-10% cobalt, this process requires maintaining fluence
          at 5.1 J/cm² with 100 W power to minimize thermal effects and cobalt leaching during ablation. For practical handling,
          use enclosed systems with HEPA filtration to capture debris, and wear PPE like respirators. Dispose of collected
          byproducts as hazardous waste via certified environmental channels to prevent contamination.
        topic: cobalt leaching
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
