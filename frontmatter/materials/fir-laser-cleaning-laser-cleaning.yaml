micro:
  before: Laser cleaning process on fir wood begins with setup. Contaminated surface
    first comes into view at 1000x magnification. Dirt layers cling tightly and form
    irregular clusters. These patterns, they scatter across porous fibers and block
    natural grain. Oxidation spots appear as dark, uneven patches, thus hiding wood's
    soft texture.
  after: Treatment applies pulse energy. Contamination breaks away and vaporizes quickly.
    After process, clean surface emerges smooth. Fibers now reveal uniform alignment
    and fine details. No residues linger, so original porosity shows clearly. Roughness
    already reduces to subtle waves. This cleaning, it restores wood's inherent durability
    and enhances visual clarity. Fir's light color returns fully and resists future
    buildup. Method proves effective for softwood preservation.
