components:
  settings_description: The key with Hickory lies in its dense hardwood structure. We've found this makes it durable yet prone
    to heat buildup during laser cleaning. Start with lower power settings to remove surface contaminants steadily. Its moderate
    porosity absorbs residues unevenly, so watch for uneven cleaning in the middle of passes. Adjust scan speeds slower to
    avoid charring the grain. This approach restores the wood without damaging its natural toughness.
  micro:
    before: At 1000x magnification, the hickory surface reveals dark grime clinging tightly to its fibers. Contaminants fill
      irregular pores, creating a rough and uneven texture overall. Dirt layers obscure the underlying wood structure completely.
    after: After laser treatment, the hickory surface shows a smooth and clear finish at 1000x. The process removes all visible
      grime, exposing fresh fibers beneath. Clean pores restore the wood's natural, even pattern fully.
