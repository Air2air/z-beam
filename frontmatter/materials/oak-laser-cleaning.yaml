components:
  settingsDescription: We've found Oak's open porosity sets it apart from denser hardwoods like maple. This lets contaminants
    seep deep into the grain, so we typically start with low-power passes to gently draw them out without charring. Watch
    for uneven heat buildup in those pores—bump up overlap midway to even things out and preserve the wood's natural strength.
  micro:
    before: At 1000x magnification, the oak surface before cleaning looks covered in thick layers of grime and debris. Dark
      particles cling tightly to the fibers, filling every tiny pore with buildup. The overall texture appears rough and obscured,
      hiding the wood's natural details completely.
    after: After laser treatment, the same oak surface at 1000x reveals clean fibers standing out sharply and clearly. Pores
      now sit open and empty, free from any trapped residues or dirt. The texture turns smooth and
