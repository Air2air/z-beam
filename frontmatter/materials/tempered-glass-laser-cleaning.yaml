components:
  settingsDescription: When laser cleaning tempered glass, we've found it behaves quite differently from standard annealed
    glass, which handles heat more evenly without the built-in stresses. Tempered glass's surface compression makes it incredibly
    strong against impacts in applications like automotive windshields or architectural panels, but that same tension inside
    means it can shatter completely if heat builds unevenly during cleaning. This sets it apart, so we approach it by using
    gentle, controlled passes to distribute energy without triggering those stresses—think starting slow to let the laser
    clear contaminants like oils or residues from electronics manufacturing without risking fractures. Its low heat spreading
    ability helps absorb the beam effectively for quick surface restoration, especially in delicate spots like medical devices
    or solar panels, but you must watch for hot spots that could propagate cracks. In our experience, this targeted method
    brings back clarity and shine reliably across marine or cultural heritage uses, preserving the material's durability.
    Just remember, always test on a small area first to avoid sudden breakage from overlooked thermal buildup.
  micro:
    before: When examining the contaminated tempered glass surface at high magnification, we've found irregular patches of
      dirt and residue clinging tightly. These spots create a rough, uneven texture that scatters light in all directions.
      You can see tiny cracks and buildup everywhere, making the whole area look dull and hazy.
    after: After laser treatment, the same surface appears smooth and uniform across the view. We've noticed the glass now
      reflects light cleanly without any distractions. The finish looks pristine, with no traces of those old contaminants
      left behind
