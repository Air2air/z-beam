faq:
  _section:
    sectionTitle: FAQ
    sectionDescription: Common Questions and Answers
    sectionMetadata: faq
    icon: help-circle
    order: 46
    variant: default
  presentation: collapsible
  items:
  - id: can-laser-cleaning-cause-tempered-glass
    title: Can laser cleaning cause tempered glass to shatter due to thermal stress, and how can this be prevented?
    content: Indeed, laser cleaning poses a notable risk of shattering tempered glass via thermal shock, as rapid heating
      disrupts its essential compressive surface stress. To counter this, use 10 ns pulse widths for limiting heat diffusion,
      while keeping fluence under 2.5 J/cm² at 1064 nm wavelength and 100 W power. Air-assisted cooling between passes promotes
      even dissipation, preserving the material's distinct integrity.
    metadata:
      topic: laser cleaning cause tempered glass
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: true
      order: 1
  - id: what-laser-wavelengths-are-most-effective
    title: What laser wavelengths are most effective for removing contaminants from tempered glass without damaging its tempered
      structure?
    content: Unlike UV lasers, which notably enhance absorption in soda-lime tempered glass and amplify subsurface heating
      risks, IR wavelengths like 1064 nm distinctly excel at removing contaminants while safeguarding the compressive stress
      layer. Aim for 2.5 J/cm² fluence at 100 W power to achieve safe, efficient ablation without structural damage.
    metadata:
      topic: laser wavelengths most effective for
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 2
  - id: in-automotive-applications-how-safe-is
    title: In automotive applications, how safe is laser cleaning for removing paint or adhesives from tempered windshields?
    content: In automotive repairs, laser cleaning of tempered windshields remains generally safe, notably with a 1064 nm
      wavelength and 2.5 J/cm² fluence that ablates paint or adhesives without causing cracks. Vibration risks stay minimal
      at 500 mm/s scan speeds, sidestepping edge stress concentrations—an essential point confirmed by repair forum case studies,
      where no shattering followed treatment.
    metadata:
      topic: in automotive applications, safe laser
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 3
  - id: does-the-tempering-process-alter-the
    title: Does the tempering process alter the optical properties of glass, affecting laser cleaning efficiency?
    content: Indeed, tempering induces notable surface compressive stress, subtly altering the refractive index and potentially
      improving laser penetration at 1064 nm. This exerts minimal influence on cleaning efficiency for tempered glass, upholding
      essential optimal fluence around 2.5 J/cm² to prevent residue or damage. In aerospace uses, it delivers distinct precision
      for contaminant removal.
    metadata:
      topic: the tempering process alter the
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 4
  - id: what-are-common-issues-reported-when
    title: What are common issues reported when using fiber lasers to clean tempered glass in manufacturing lines?
    content: In manufacturing lines, fiber lasers notably induce thermal cracking on tempered glass when fluence surpasses
      2.5 J/cm², particularly along curves where uneven beam focus yields patchy contaminant removal. It's essential to calibrate
      for 100 W power and 500 mm/s scan speed, ensuring uniform ablation without undue stress on the brittle structure.
    metadata:
      topic: common sues reported using fiber
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 5
  - id: are-there-specific-safety-data-sheets
    title: Are there specific safety data sheets or guidelines for laser cleaning tempered glass to avoid micro-cracking?
    content: ISO 11553 and OSHA 1910.1096 notably outline laser safety for brittle materials like tempered glass, emphasizing
      fluence below 2.5 J/cm² to prevent micro-cracking from thermal stress. Essential monitoring for fragment hazards is
      required during cleaning at 100 W power. Consult material-specific SDS for aerospace applications.
    metadata:
      topic: there specific safety data sheets
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 6
  - id: how-does-laser-cleaning-compare-to
    title: How does laser cleaning compare to chemical methods for restoring tempered glass shower doors?
    content: Laser cleaning outperforms chemical methods for tempered glass shower doors, notably bypassing etching risks
      that solvents pose to its stress-tempered structure. At 1064 nm wavelength and 2.5 J/cm² fluence, it removes grime cleanly
      without surface damage, reducing environmental waste while safeguarding the glass's essential, shatter-resistant integrity
      for years.
    metadata:
      topic: laser cleaning comp to chemical
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 7
  - id: what-training-is-recommended-for-operators
    title: What training is recommended for operators handling laser cleaning of tempered glass panels in construction?
    content: Operators handling tempered glass panels in cleaning tasks must engage in practical simulations to control heat
      adeptly, ensuring fluence stays below 2.5 J/cm² and preventing cracks from thermal stress. Essential training covers
      spotting distinct tempering defects alongside laser safety certification, particularly at 100 W levels.
    metadata:
      topic: training recommended for operators handling
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 8
  - id: can-laser-cleaning-remove-fingerprints-or
    title: Can laser cleaning remove fingerprints or oils from tempered smartphone screens without affecting the oleophobic
      coating?
    content: Yes, employing precise low-power settings such as 100 W average power and 2.5 J/cm² fluence, laser cleaning effectively
      removes fingerprints and oils from tempered smartphone screens. This essential approach minimizes thermal stress on
      the thin glass, notably preserving the oleophobic coating's integrity, as confirmed by repair community tests using
      1064 nm wavelength.
    metadata:
      topic: laser cleaning remove fingerprints or
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 9
  - id: what-physical-properties-of-tempered-glass
    title: What physical properties of tempered glass, like hardness and thermal expansion, must be considered in laser surface
      treatment?
    content: When laser cleaning tempered glass, its Mohs hardness of 5-6 notably calls for fluence under 2.5 J/cm² to avoid
      surface ablation or micro-cracks. That coefficient of thermal expansion at 9×10^{-6}/°C, meanwhile, makes precise heat
      control essential—target 100 W power and 500 mm/s scan speed—to sidestep thermal stress and shattering.
