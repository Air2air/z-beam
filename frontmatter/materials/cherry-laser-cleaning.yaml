faq:
  presentation: collapsible
  items:
  - id: can-laser-cleaning-effectively-remove-oxidation
    title: Can laser cleaning effectively remove oxidation and patina from cherry wood without damaging the surface?
    content: A 1064nm wavelength at 1.8 J/cm² fluence pretty effectively removes oxidation from cherry wood. It targets contaminants
      fairly precisely, minimizing thermal penetration to preserve the delicate surface. Precise control lets us eliminate
      patina without causing discoloration or burning the underlying material.
    metadata:
      topic: laser cleaning effectively remove oxidation
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: true
      order: 1
  - id: what-laser-settings-wavelength-power-pulse
    title: What laser settings (wavelength, power, pulse duration) are recommended for cleaning soot and smoke residue from
      cherry furniture after a fire?
    content: When working with cherry furniture, I'd typically go for a 1064 nm wavelength at 90W average power and 1.8 J/cm²
      fluence. This pretty much ablates the soot cleanly while keeping the wood's structure intact. Just start off with a
      low-power test in a hidden spot to gauge the surface reaction before diving into the full cleanup.
    metadata:
      topic: laser settings (wavelength, power, pulse
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: false
      order: 2
  - id: does-laser-cleaning-cherry-wood-surfaces
    title: Does laser cleaning cherry wood surfaces affect the natural color or cause any bleaching effect?
    content: Laser cleaning, when set up right, pretty much preserves cherry wood's natural pigments exceptionally well. At
      our optimal 1.8 J/cm² fluence and 90W power, we basically strip away contaminants without the bleaching typical of chemical
      or abrasive methods, ensuring the wood's rich color stays stable.
    metadata:
      topic: laser cleaning cherry wood surfaces
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: false
      order: 3
  - id: how-do-you-prepare-a-cherry
    title: How do you prepare a cherry wood surface for laser cleaning to ensure uniform results and prevent damage?
    content: First off, check that the wood's moisture content stays below 12% to avoid thermal stress. For fairly uniform
      cleaning on carved surfaces, use a 1064 nm wavelength at 1.8 J/cm² fluence, typically adjusting the 500 mm/s scan speed
      to hold a consistent distance across contours.
    metadata:
      topic: do you prep a cherry
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: false
      order: 4
  - id: what-safety-precautions-are-specific-to
    title: What safety precautions are specific to laser cleaning cherry wood, particularly regarding fume extraction and
      fire risk?
    content: Cherry's organic compounds pretty much call for robust fume extraction in your 90W setup. At 1.8 J/cm² fluence,
      resins can ignite, so basically you'll need Class D filtration to handle that VOC-laden smoke. Keep a fire watch and
      confirm ventilation aligns with local codes for wood particulates.
    metadata:
      topic: safety precautions specific to laser
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: false
      order: 5
  - id: can-laser-cleaning-be-used-to
    title: Can laser cleaning be used to selectively remove old varnish or finish from cherry wood while preserving the underlying
      grain?
    content: Yeah, laser cleaning works pretty well for selectively stripping aged varnish off cherry wood. That 1064 nm wavelength
      and 1.8 J/cm² fluence threshold basically enable precise ablation of the finish, while preserving the delicate grain
      structure underneath—ideal for antique restoration.
    metadata:
      topic: laser cleaning be used to
      severity: high
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: false
      order: 6
  - id: what-are-the-limitations-of-laser
    title: What are the limitations of laser cleaning for cherry compared to other wood species like oak or maple?
    content: Cherry's fairly moderate density and natural oils call for careful fluence control right around 1.8 J/cm². That
      tighter grain structure makes it pretty susceptible to thermal marking compared to open-grained woods like oak, so you'll
      want precise power management below 90 W to keep its rich color intact.
    metadata:
      topic: the limitations of laser cleaning
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: false
      order: 7
  - id: how-does-the-natural-porosity-of
    title: How does the natural porosity of cherry wood affect laser cleaning efficiency for embedded contaminants?
    content: Cherry's porous structure typically traps contaminants beyond surface reach. Our 1.8 J/cm² fluence setting pretty
      effectively lifts embedded particles, but aggressive parameters risk driving debris deeper into the wood's cellular
      matrix, complicating cleaning.
    metadata:
      topic: the natural porosity of cherry
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: false
      order: 8
  - id: what-postcleaning-treatments-are-recommended-for
    title: What post-cleaning treatments are recommended for cherry wood after laser cleaning to restore and protect the surface?
    content: After laser cleaning at 1.8 J/cm², the cherry wood's open grain pretty much demands immediate conditioning. I'd
      typically suggest a penetrating oil like tung or linseed to rehydrate the fibers before adding a protective sealant.
      This two-step method restores the natural luster while delivering a durable finish that highlights the wood's inherent
      beauty.
    metadata:
      topic: post-cleaning treatments recommended for cherry
      severity: high
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
