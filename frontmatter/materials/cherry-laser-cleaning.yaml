components:
  settings_description: When laser cleaning Cherry, start with its high porosity. This property absorbs laser energy quickly,
    so you must use low power settings to remove contaminants without scorching the surface. Its low density helps the process
    by allowing even heat distribution, but watch for splintering in the middle of the job. Adjust scan speed higher to reduce
    dwell time on porous areas. Make sure you overlap passes minimally to avoid uneven ablation. These steps restore the wood's
    natural grain effectively.
  micro:
    before: At 1000x magnification, the cherry wood surface appears cluttered with fine dirt particles. These contaminants
      form irregular clusters that embed into the porous fibers. Grime layers dull the natural texture, hiding underlying
      details completely.
    after: After laser treatment at 1000x magnification, the cherry wood surface shows clear, even fibers. The cleaning removes
      all visible residues, exposing smooth grain patterns. This reveals a uniform, restored appearance without any lingering
      marks.
