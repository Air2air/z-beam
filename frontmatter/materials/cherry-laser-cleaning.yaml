      order: 9
  - id: is-laser-cleaning-economically-viable-for
    title: Is laser cleaning economically viable for cherry wood restoration compared to chemical or mechanical methods?
    content: Laser cleaning turns fairly economically viable for cherry wood at 1.8 J/cm², safeguarding its rich patina against
      the damage from mechanical abrasion or chemical solvents. In high-value projects like instrument restoration, the precision
      and time savings at 500 mm/s scan speeds basically justify that initial equipment investment.
