faq:
  presentation: collapsible
  items:
  - id: how-do-i-safely-laser-clean
    title: How do I safely laser clean YSZ without causing cracks?
    content: I've seen YSZ hold up well during cleaning if you start slow. Begin with low power to gently remove dirt and
      oxides from the surface. Watch the heat buildup closely, as this material resists thermal shock but can crack under
      sudden changes. Keep the beam moving steadily to avoid hot spots. This approach brings back the clean finish every time.
    metadata:
      topic: do i safely laser clean
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: true
      order: 1
  - id: whats-the-best-way-to-remove
    title: What's the best way to remove contaminants from YSZ coatings?
    content: When cleaning YSZ, focus on a pulsed laser setup first. This works well because the material's toughness lets
      it handle short bursts without damage. I've found scanning in overlapping passes removes stubborn buildup like soot
      effectively. Adjust speed based on layer thickness to ensure even results. Tends to restore the original smooth texture
      nicely.
    metadata:
      topic: '''s the best way to'
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 2
  - id: can-laser-cleaning-affect-yszs-thermal
    title: Can laser cleaning affect YSZ's thermal properties long-term?
    content: Start by testing a small area to check response. YSZ's stability means cleaning rarely alters its heat resistance
      over time
    metadata:
