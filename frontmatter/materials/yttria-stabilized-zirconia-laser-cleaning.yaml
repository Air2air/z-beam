components:
  micro:
    before: We've found the contaminated surface looks rough and uneven under magnification. Dirt clings tightly to the grains,
      creating dark spots everywhere. It hides the material's true texture completely.
    after: After laser treatment, the surface appears smooth and uniform now. Grains stand out clearly without any residue
      left. This reveals the clean, even finish underneath.
