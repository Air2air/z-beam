micro:
  before: Gallium's soft, lustrous surface sets up a striking contrast under 1000x
    magnification. Contamination typically lines up as irregular oxide layers and
    particulate debris, which dull the metal's natural sheen and create jagged patterns
    that trap grime. These features show up as mottled, uneven textures, essentially
    blocking the underlying smooth contours.
  after: Laser cleaning ramps up the process effectively. The beam removes contaminants
    without damaging the base material, revealing a clean finish that demonstrates
    gallium's inherent reflectivity. In practice, the treated surface clears away
    those rough patches, leaving behind a uniform, mirror-like appearance. Turns out,
    this approach addresses stubborn buildup head-on, maintaining the metal's durable
    qualities while achieving solid results overall.
