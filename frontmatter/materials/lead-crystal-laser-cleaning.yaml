components:
  settings_description: When laser cleaning Lead Crystal, you'll want to start with its soft, lead-infused structure. This
    makes it more prone to surface damage than regular glass, so it absorbs heat unevenly and risks cracking under direct
    exposure. Use gentle, low-energy pulses to lift contaminants without etching the crystal's shine. Keep your scan slow
    and overlap lightly for even coverage. Always watch for clouding at the end, and pause to cool if it appears.
  micro:
    before: We've observed the contaminated surface at 1000x magnification. It looks rough with thick layers of grime and
      scattered particles. These buildups obscure the underlying texture completely.
    after: After laser treatment, we've seen a dramatic change in the surface. It now appears smooth and free of any residues.
      The clean lead crystal shows its natural clarity and even features.
