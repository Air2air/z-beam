      - id: hazardous-residue
        question: Can you safely laser clean lead crystal glassware without causing damage or leaving hazardous residue?
        answer: Safely cleaning lead crystal demands proper 1064nm laser parameters. Specifically, we limit fluence to below
          2.5 J/cm² while applying 100µm spot sizes, preventing micro-fractures. This controlled ablation removes contaminants
          effectively without releasing hazardous lead particles, thus yielding a residue-free surface.
