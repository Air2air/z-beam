faq:
  presentation: collapsible
  items:
    - id: can-you-safely-laser-clean-lead
      title: Can you safely laser clean lead crystal glassware without causing damage or leaving hazardous residue?
      content: >-
        Safely cleaning lead crystal demands proper 1064nm laser parameters. Specifically, we limit fluence to below 2.5
        J/cm² while applying 100µm spot sizes, preventing micro-fractures. This controlled ablation removes contaminants
        effectively without releasing hazardous lead particles, thus yielding a residue-free surface.
      metadata:
        topic: you safely laser clean lead
        severity: critical
        acceptedAnswer: true
        expertInfo:
          name: Yi-Chun Lin
          title: Ph.D.
          expertise:
            - Laser Materials Processing
      Display:
        Open: true
        order: 1
    - id: what-is-the-optimal-laser-wavelength
      title: >-
        What is the optimal laser wavelength and parameter set (power, pulse duration, repetition rate) for cleaning
        contaminants from lead crystal without altering its optical clarity?
      content: >-
        For lead crystal, particularly, I recommend the 1064 nm wavelength at 2.5 J/cm² fluence. This near-IR light
        absorbs strongly, thus enabling effective contaminant removal at 25 W average power while controlling thermal
        input. The 100 ns pulse duration and 20 kHz repetition rate deliver precise control to maintain optical clarity
        and surface brilliance.
      metadata:
        topic: the optimal laser wavelength and
        severity: medium
        acceptedAnswer: true
        expertInfo:
          name: Yi-Chun Lin
          title: Ph.D.
          expertise:
            - Laser Materials Processing
      Display:
        Open: false
        order: 2
    - id: what-specific-safety-protocols-and-containment
      title: >-
        What specific safety protocols and containment are required when laser cleaning lead crystal due to the risk of
        lead oxide fumes and particulate?
      content: >-
        Laser cleaning of lead crystal at 1064 nm demands HEPA-filtered fume extraction, particularly to capture lead
        oxide particulates. Strict OSHA respiratory protection is mandatory, thus mitigating hazardous fumes from the
        2.5 J/cm² ablation threshold.
      metadata:
        topic: specific safety protocols and containment
        severity: critical
        acceptedAnswer: true
        expertInfo:
          name: Yi-Chun Lin
          title: Ph.D.
          expertise:
            - Laser Materials Processing
      Display:
        Open: false
        order: 3
    - id: how-does-the-high-lead-oxide
      title: >-
        How does the high lead oxide content (e.g., 24%-32%) in lead crystal affect its thermal response and ablation
        threshold compared to standard soda-lime glass?
      content: >-
        With a high lead oxide content of ~30%, lead crystal's melting point drops to ~600°C, while its thermal
        expansion rises notably. This indicates a lower ablation threshold, requiring careful fluence control below ~2.5
        J/cm² to prevent thermal stress cracking.
      metadata:
        topic: the high lead oxide content
        severity: critical
        acceptedAnswer: true
        expertInfo:
          name: Yi-Chun Lin
          title: Ph.D.
          expertise:
            - Laser Materials Processing
      Display:
        Open: false
        order: 4
    - id: is-laser-cleaning-a-viable-method
      title: >-
        Is laser cleaning a viable method for removing tarnish or oxidation from antique lead crystal, or does it risk
        damaging delicate historical pieces?
      content: >-
        For lead crystal, laser cleaning works well, particularly at 1064 nm wavelength and 2.5 J/cm² fluence. Notably,
        this non-contact approach ablates tarnish without chemicals, yet demands scanning below 500 mm/s to prevent
        thermal stress in micro-cracked historical artifacts.
      metadata:
        topic: laser cleaning a viable method
        severity: critical
        acceptedAnswer: true
        expertInfo:
          name: Yi-Chun Lin
          title: Ph.D.
          expertise:
            - Laser Materials Processing
      Display:
        Open: false
        order: 5
    - id: what-is-the-best-way-to
      title: >-
        What is the best way to verify the success and safety of a laser cleaning process on lead crystal? How do you
        test for surface lead residue?
      content: >-
        Initially, verify surface integrity via microscopy at the 100μm scale, notably to inspect for micro-cracks.
        Specifically, for lead residue, apply XRF analysis to identify contamination, thus ensuring levels stay below
        hazardous thresholds post 2.5 J/cm² laser processing.
      metadata:
        topic: the best way to verify
        severity: critical
        acceptedAnswer: true
        expertInfo:
          name: Yi-Chun Lin
          title: Ph.D.
          expertise:
            - Laser Materials Processing
      Display:
        Open: false
        order: 6
    - id: can-laser-cleaning-be-used-to
      title: >-
        Can laser cleaning be used to selectively remove paint or adhesives from lead crystal objects without affecting
        the underlying engraved or cut patterns?
      content: >-
        Yes, laser cleaning employs precise 1064nm wavelength and 2.5 J/cm² fluence control to specifically ablate
        contaminants from lead crystal. Notably, this approach preserves the sharp, engraved facets, which are highly
        sensitive to thermal stress, thus ensuring pattern integrity.
      metadata:
        topic: laser cleaning be used to
        severity: critical
        acceptedAnswer: true
        expertInfo:
          name: Yi-Chun Lin
          title: Ph.D.
          expertise:
            - Laser Materials Processing
      Display:
        Open: false
        order: 7
    - id: why-is-lead-crystal-often-cited
      title: >-
        Why is lead crystal often cited as a 'difficult' or 'high-risk' material in laser cleaning training manuals and
        equipment guidelines?
      content: >-
        Lead crystal presents dual hazards: particularly, its low thermal shock threshold requires precise fluence
        control below 2.5 J/cm², whereas laser ablation produces toxic lead oxide fumes. Thus, the interplay of material
        fragility and hazardous byproducts demands expert parameter tuning alongside strict respiratory protection,
        marking it as a high-risk endeavor.
      metadata:
        topic: lead crystal often cited as
        severity: critical
        acceptedAnswer: true
        expertInfo:
          name: Yi-Chun Lin
          title: Ph.D.
          expertise:
            - Laser Materials Processing
      Display:
        Open: false
        order: 8
    - id: what-are-the-waste-disposal-regulations
      title: What are the waste disposal regulations for the debris and filters collected after laser cleaning lead crystal?
      content: >-
        Debris and filters from laser cleaning of lead crystal at 1064 nm wavelength notably contain hazardous lead
        particulates. Thus, these materials require classification and disposal under stringent local and federal
        regulations for lead-containing waste, rather than as standard industrial refuse, due to the inherent toxicity
        of the ablated surface.
      metadata:
