name: neodymium-laser-cleaning
slug: neodymium-laser-cleaning
page_title: neodymium-laser-cleaning
micro:
  before: Neodymium surfaces show high reactivity. This property causes quick contamination
    buildup. Contamination forms thick oxide layers and dirt particles. At high magnification,
    these layers appear irregular and clustered. Particles stick tightly because of
    surface adhesion. Oxide buildup reduces smoothness, so it creates rough patterns.
  after: Before cleaning, surface exhibits heavy soiling. Dark spots and uneven deposits
    cover material. These features indicate long exposure to air. Contamination is
    detected on all areas, from edges to centers.
