        order: 8
    - id: can-laser-cleaning-remove-efflorescence-white
      title: Can laser cleaning remove efflorescence (white salt deposits) from concrete surfaces?
      content: >-
        Yeah, laser cleaning pretty effectively removes efflorescence by vaporizing surface salts at around 2.5 J/cm².
        Basically, this beats chemical washes by clearing deposits without adding moisture, which is crucial for
        stopping their quick return on porous concrete.
      metadata:
        topic: laser cleaning remove efflorescence (white
        severity: medium
