        order: 6
    - id: does-laser-cleaning-alter-the-surface
      title: Does laser cleaning alter the surface profile or texture of concrete?
      content: >-
        Properly tuned laser cleaning at 2.5 J/cm² basically removes contaminants without altering the concrete's
        micro-roughness. That 1064 nm wavelength pretty much avoids glazing the aggregate, preserving the surface
        profile that's essential for optimal coating adhesion.
      metadata:
        topic: laser cleaning alter the surface
        severity: high
        acceptedAnswer: true
        expertInfo:
