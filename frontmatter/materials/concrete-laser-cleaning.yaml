faq:
  presentation: collapsible
  items:
    - id: can-laser-cleaning-remove-paint-and
      title: Can laser cleaning remove paint and graffiti from concrete without damaging the surface?
      content: >-
        Yes, laser cleaning pretty effectively removes paint and graffiti from concrete. By employing a 1064 nm
        wavelength at 2.5 J/cm² fluence, it selectively ablates the coating while preserving the substrate. This
        approach typically avoids the surface etching and aggregate exposure seen in abrasive methods like sandblasting.
      metadata:
        topic: laser cleaning remove paint and
        severity: medium
        acceptedAnswer: true
        expertInfo:
          name: Todd Dunning
          title: MA
          expertise:
            - Optical Materials for Laser Systems
      Display:
        Open: true
        order: 1
    - id: what-laser-settings-wavelength-power-pulse
      title: What laser settings (wavelength, power, pulse duration) work best for concrete cleaning?
      content: >-
        For concrete's heterogeneous makeup, I'd recommend a 1064 nm wavelength at about 100 W average power. Typically,
        a fluence around 2.5 J/cm² with nanosecond pulses effectively removes contaminants while fairly mitigating
        thermal stress on the aggregate and cement matrix, preserving substrate integrity.
      metadata:
        topic: laser settings (wavelength, power, pulse
        severity: medium
        acceptedAnswer: true
        expertInfo:
          name: Todd Dunning
          title: MA
          expertise:
            - Optical Materials for Laser Systems
      Display:
        Open: false
        order: 2
    - id: does-laser-cleaning-create-hazardous-dust
      title: Does laser cleaning create hazardous dust when used on concrete, and how is it controlled?
      content: >-
        Compared to abrasive blasting, laser cleaning produces significantly less respirable silica dust. Typically,
        with our 100 W, 1064 nm settings, it basically generates coarse debris. Effective fume extraction remains
        essential to manage the fine particulate produced.
      metadata:
        topic: laser cleaning create hazardous dust
        severity: critical
        acceptedAnswer: true
        expertInfo:
          name: Todd Dunning
          title: MA
          expertise:
            - Optical Materials for Laser Systems
      Display:
        Open: false
        order: 3
    - id: how-effective-is-laser-cleaning-for
      title: How effective is laser cleaning for removing biological growth like mold or algae from concrete?
      content: >-
        Laser cleaning pretty effectively removes surface biological growth at ~2.5 J/cm² by thermally denaturing
        contaminants. It also sterilizes the concrete, typically preventing immediate regrowth. That said, its effect
        stays fairly limited to the surface, with no penetration for deeply embedded organisms.
      metadata:
        topic: effective laser cleaning for removing
        severity: critical
        acceptedAnswer: true
        expertInfo:
          name: Todd Dunning
          title: MA
          expertise:
            - Optical Materials for Laser Systems
      Display:
        Open: false
        order: 4
    - id: can-laser-cleaning-be-used-on
      title: Can laser cleaning be used on reinforced concrete without damaging the rebar?
      content: >-
        When properly tuned, laser cleaning at 2.5 J/cm² pretty effectively removes contaminants from reinforced
        concrete. This approach fairly well preserves the structural cover over rebar, preventing exposure while
        upholding the vital concrete-rebar bond integrity under optimal parameters.
      metadata:
        topic: laser cleaning be used on
        severity: critical
        acceptedAnswer: true
        expertInfo:
          name: Todd Dunning
          title: MA
          expertise:
            - Optical Materials for Laser Systems
      Display:
        Open: false
        order: 5
    - id: what-is-the-typical-cleaning-rate
      title: What is the typical cleaning rate (square meters per hour) for concrete surfaces with laser?
      content: >-
        Typically, cleaning rates fall between 2 and 8 m² per hour with a 100 W laser at 1064 nm. Actual speeds depend
        fairly heavily on contaminant type and surface texture, often requiring multiple passes at 2.5 J/cm² for full
        removal.
      metadata:
