      order: 7
  - id: how-does-laser-cleaning-compare-to
    title: How does laser cleaning compare to dry ice blasting for concrete restoration projects?
    content: Laser ablation at 2.5 J/cm² pretty selectively removes contaminants without harming the concrete substrate, unlike
      dry ice blasting. This delivers a superior, residue-free surface for better coating adhesion, though the upfront equipment
      cost is fairly higher.
    metadata:
      topic: laser cleaning comp to dry
      severity: medium
