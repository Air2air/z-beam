      order: 10
  - id: is-laser-cleaning-safe-for-historic
    title: Is laser cleaning safe for historic concrete structures and monuments?
    content: Properly calibrated at about 2.5 J/cm², laser cleaning is fairly safe for historic concrete. This non-contact
      method offers precise control, typically removing contaminants like soot or biological growth with minimal substrate
      loss, aligning well with core conservation principles of preserving original material integrity.
