        order: 9
    - id: what-are-the-limitations-of-laser
      title: What are the limitations of laser cleaning for heavily contaminated or oil-stained concrete?
      content: >-
        Heavily oil-stained concrete creates a pretty major limitation: the depth of laser interaction. With our
        standard 2.5 J/cm² fluence, we typically clear surface contaminants well, but deeply penetrated oils often
        demand multiple passes. This fairly extends process time as the laser ablates contamination layer by layer.
      metadata:
        topic: the limitations of laser cleaning
        severity: medium
        acceptedAnswer: true
