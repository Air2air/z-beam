faq:
  presentation: collapsible
  items:
  - id: how-do-i-avoid-overheating-when
    title: '[How do I avoid overheating when laser cleaning Ti-6Al-4V parts?'
    content: I've seen overheating ruin titanium surfaces during cleaning more than once. This alloy holds heat well but can
      warp if you push too hard. Keep pulses short and move the beam steadily to stay safe.
    metadata:
      topic: '[ do i avoid overheating'
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: true
      order: 1
  - id: whats-the-best-way-to-remove
    title: '[What''s the best way to remove oxide layers from Ti-6Al-4V using lasers?'
    content: When cleaning titanium alloys, oxide layers come off cleanly compared to steels that pit easily. Start with lower
      power and scan slowly for even removal. This works best in a controlled atmosphere to prevent re-oxidation right away.
    metadata:
      topic: '[''s the best way to'
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 2
  - id: why-does-ti6al4v-sometimes-show-discoloration
    title: '[Why does Ti-6Al-4V sometimes show discoloration after laser cleaning?'
    content: Discoloration pops up on titanium because it reacts quickly with air during the process. I've found using a shielding
      gas helps cut that down and keeps the finish bright. Adjust your speed to match the beam focus for cleaner results.
    metadata:
