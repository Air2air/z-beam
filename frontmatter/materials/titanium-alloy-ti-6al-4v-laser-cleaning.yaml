components:
  micro:
    before: We've found the contaminated surface on this titanium alloy shows heavy buildup. Dark spots and uneven layers
      cover the base material completely. Scratches and debris make the texture look rough and cluttered.
    after: After laser treatment, the surface appears smooth and uniform. We see no remaining spots or layers now. The clean
      material shines evenly under magnification.
