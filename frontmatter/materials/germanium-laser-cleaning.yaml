faq:
- question: How do I avoid damaging Germanium during laser cleaning?
  answer: When laser cleaning Germanium, start by using a low-power pulse to gently remove surface contaminants without overheating
    the material. I've seen that its good thermal conductivity helps spread heat evenly, so you maintain a clean finish easily.
    But watch out midway—too much energy can cause cracks due to its brittleness, so adjust settings gradually and test on
    a small area first. This approach keeps the semiconductor intact for reliable use.
- question: What's the best laser setup for cleaning Germanium optics?
  answer: You'll want to begin with a short wavelength laser since Germanium absorbs light well in that range, pulling off
    dirt without deep penetration. In my experience, keeping the beam focused on the smooth, non-porous surface prevents any
    residue buildup during the process. Just be careful not to overexpose it, as the material's moderate corrosion resistance
    means prolonged sessions could dull the edges over time. End by cooling it slowly to avoid thermal stress.
