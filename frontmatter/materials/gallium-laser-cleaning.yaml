components:
  settingsDescription: When laser cleaning gallium, you'll want to approach it unlike harder metals such as steel or titanium,
    which handle intense heat without issue. Gallium's unusually low melting point sets it apart, risking surface liquefaction
    if energy builds up too quickly. Start with reduced power and faster scan speeds to strip away oxides or residues while
    keeping the material solid. Make sure you avoid prolonged exposure in one spot, as this can cause uneven melting and distort
    the underlying structure. This method exposes a clean, intact surface ready for semiconductor or medical applications.
  micro:
    before: When examining the contaminated Gallium surface at 1000x magnification, you notice scattered dark spots and uneven
      patches across the material. These irregularities make the surface look rough and dull under close inspection. Contaminants
      cling tightly, obscuring the underlying texture completely.
    after: After laser treatment, the same surface appears smooth and uniform at 1000x magnification. The process removes
      all visible residues, revealing a consistent metallic sheen. This cleaning restores clarity, exposing the material's
      natural, even finish without
    _section:
      sectionTitle: Microscopic Analysis
      sectionDescription: High-magnification comparison of Gallium surface before and after laser cleaning treatment
      icon: microscope
      order: 5
      variant: default
