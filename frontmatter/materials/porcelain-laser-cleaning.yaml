  items:
  - id: what-laser-settings-wavelength-power-pulse
    title: What laser settings (wavelength, power, pulse duration) are safe and effective for cleaning soot, grime, or biological
      growth from historical porcelain without damaging the glaze?
    content: For historical porcelain, a straightforward choice is the 1064 nm wavelength with fluence under 2.5 J/cm² and
      nanosecond pulses. That method efficiently removes contaminants like soot while safeguarding the delicate glaze. Test
      these parameters on a concealed spot first to prevent micro-cracking or gloss changes.
    metadata:
      topic: laser settings (wavelength, power, pulse
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: true
      order: 1
  - id: can-a-laser-safely-remove-metal
    title: Can a laser safely remove metal staining (like rust or bronze drips) from a porcelain surface without etching or
      discoloring it?
    content: Using a 2.5 J/cm² fluence and 100 µm spot size, the 1064 nm laser straightforwardly ablates metal staining from
      porcelain. This process exploits the glaze's strong thermal shock resistance to efficiently vaporize contaminants, sidestepping
      the substrate etching risks from chemical poultices' extended contact.
    metadata:
      topic: a laser safely remove metal
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 2
  - id: how-does-the-high-reflectivity-of
    title: How does the high reflectivity of a glazed porcelain surface affect the laser cleaning process and operator safety?
    content: Glazed porcelain's high reflectivity at 1064 nm poses serious stray radiation risks. For practical safety, operators
      should wear wavelength-specific laser safety glasses, as this process requires a 2.5 J/cm² fluence that's mostly reflected,
      not absorbed, by the substrate.
    metadata:
      topic: the high reflectivity of a
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 3
  - id: is-laser-cleaning-suitable-for-porcelain
    title: Is laser cleaning suitable for porcelain with existing hairline cracks (crazing), or does it risk worsening the
      damage?
    content: This process of laser cleaning on crazed porcelain risks thermal stress propagation at fluences above 2.5 J/cm²,
      potentially fusing contaminants within micro-fractures. For such delicate pieces, practical non-thermal alternatives
      help avoid worsening existing hairline cracks.
    metadata:
      topic: laser cleaning suitable for porcelain
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 4
  - id: what-is-the-risk-of-overcleaning
    title: What is the risk of 'over-cleaning' or ablating the actual porcelain glaze when trying to remove a tenacious contaminant?
    content: Over-cleaning can straightforwardly cause glaze ablation if fluence tops ~2.5 J/cm². Watch for high-pitched acoustic
      shifts and permanent surface matting, clear signs of damage. This process at 1064 nm wavelength efficiently balances
      contaminant removal with substrate protection.
    metadata:
      topic: the rk of 'over-cleaning' or
      severity: critical
      acceptedAnswer: true
