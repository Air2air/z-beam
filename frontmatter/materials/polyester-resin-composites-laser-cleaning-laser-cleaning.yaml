micro:
  before: Durability of polyester resin composites, it withstands laser cleaning effectively.
    Contaminated surface at 1000x magnification reveals irregular patterns of debris
    and oxide layers clinging to fiber reinforcements, thus creating uneven textures
    and shadowed crevices. These contaminations, they form clustered deposits that
    obscure the matrix, and so hinder uniform appearance. Fibers show matted surfaces
    with adherent particles, demonstrating resistance to initial exposure.
  after: After laser cleaning, surface already exhibits smoothness and clarity. Clean
    areas demonstrate exposed fibers with crisp edges and glossy resin matrix, thus
    confirming removal of contaminants. Unique visual features emerge, such as subtle
    weave patterns in reinforcements and void-free zones, while residual spots still
    persist in deeper pockets. Treatment applies precisely, and so enhances material
    integrity without surface damage. This process yields pristine views, revealing
    inherent composite strength.
