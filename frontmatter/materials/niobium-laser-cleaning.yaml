      order: 6
  - id: what-are-the-most-common-defects
    title: What are the most common defects or damage mechanisms when laser cleaning thin niobium sheets or foils, and how
      can they be prevented?
    content: Niobium's notable thermal conductivity requires precise fluence management under 2.5 J/cm² to avoid burn-through
      and distortion in thin foils. A 50 µm spot size paired with 500 mm/s scanning speed distinctly controls heat buildup,
      safeguarding the material's integrity.
    metadata:
