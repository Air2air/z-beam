      order: 7
  - id: does-laser-cleaning-create-any-surface
    title: Does laser cleaning create any surface contamination or elemental changes in niobium that could affect subsequent
      welding or brazing operations?
    content: A properly configured laser cleaning process, at 2.5 J/cm² fluence and 50 μm spot size, effectively removes oxides
      without elemental pickup. This essential approach avoids surface alloying and oxygen contamination, delivering a pristine
      niobium surface with optimal weldability for high-integrity joining operations.
