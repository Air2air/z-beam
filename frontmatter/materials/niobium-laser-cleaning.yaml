  - id: how-does-the-presence-of-niobium
    title: How does the presence of niobium in alloys (like zirconium-niobium or titanium-niobium) change the laser cleaning
      approach compared to pure niobium?
    content: Alloying niobium with zirconium or titanium brings notable risks of differential ablation, stemming from their
      varying thermal properties. It's essential to fine-tune the 2.5 J/cm² fluence threshold, preventing selective removal
      of one element that might undermine the alloy's surface integrity. Such challenges call for a more conservative strategy
      than with pure niobium.
