components:
  micro:
    before: At 1000x magnification, the niobium surface appears cluttered with dark, uneven spots of buildup that obscure
      the underlying metal. These irregular patches cling stubbornly, creating a rough texture full of tiny debris and faint
      scratches. We spot scattered particles that make the whole area look dull and worn from exposure.
    after: After laser treatment at 1000x, the niobium surface gleams with a smooth, uniform shine free of any residue. The
      metal now reveals a clean, even finish without those
  settingsDescription: When laser cleaning niobium, you must first watch its high reflectivity, which scatters more laser
    energy than you'd see with iron-based metals, so start with lower power settings to prevent wasted shots and uneven cleaning.
    Make sure you adjust the fluence just above its ablation threshold right away, avoiding the pitfall of underpowering that
    leaves stubborn contaminants behind while risking surface pitting if you overshoot. Begin your setup by selecting a near-infrared
    wavelength that niobium absorbs better than shorter ones, unlike aluminum's picky response. You'll then dial in a moderate
    pulse width to handle its dense structure without building excess heat, contrasting with lighter non-ferrous metals that
    cool faster. Scan at a steady speed, overlapping passes by half to clear oxides thoroughly, since niobium's corrosion
    resistance means buildup clings tighter than on copper. This approach brings back its smooth finish for aerospace or medical
    uses, minimizing thermal shock that could crack it under rapid heating. Keep passes to a few, and always test on a scrap
    piece first—niobium forgives minor errors better than brittle alloys but demands precision to avoid dulling its natural
    luster.
