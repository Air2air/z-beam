faq:
  presentation: collapsible
  items:
  - id: can-i-safely-remove-indium-oxide
    title: Can I safely remove indium oxide from components using a laser cleaner without damaging the underlying pure indium?
    content: Yes, as a laser cleaning specialist in Indonesia, I can confirm that precise pulsed laser ablation safely removes
      indium oxide layers without harming underlying pure indium. By optimizing wavelength (e.g., 1064 nm) and fluence below
      indium's ablation threshold, we preserve the base material effectively.
    metadata:
      topic: i safely remove indium oxide
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: true
      order: 1
  - id: what-are-the-specific-laser-parameters
    title: What are the specific laser parameters (wavelength, power, pulse duration) recommended for cleaning indium-tin
      oxide (ITO) coatings from glass substrates?
    content: As Ikmanda Roswati, a laser cleaning specialist from Indonesia, I recommend a 532 nm wavelength (doubled Nd:YAG)
      for selective ITO absorption, with 20-50 W average power and 10-50 ns pulse duration. This gently ablates the coating
      from glass without substrate damage, based on my field experience.
    metadata:
      topic: the specific laser parameters (wavelength,
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 2
  - id: is-laser-cleaning-effective-for-deoxidizing
    title: Is laser cleaning effective for de-oxidizing indium solder pads or pre-treatment for re-soldering, and does it
      leave a residue?
    content: Laser cleaning efficiently removes indium oxide at 2.8 J/cm² fluence with no residue, markedly enhancing solderability.
      This process outshines chemical options by preventing redeposition and safeguarding the pristine surface needed for
      dependable re-soldering.
    metadata:
      topic: laser cleaning effective for de-oxidizing
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 3
  - id: what-specific-fume-extraction-and-filtration
    title: What specific fume extraction and filtration requirements are needed when laser cleaning indium due to its toxicity?
    content: Laser cleaning indium demands HEPA/ULPA filtration, straightforward due to highly toxic oxide fumes. This process,
      at a 2.8 J/cm² fluence threshold, requires continuous air monitoring for indium compounds. Operators should use supplied-air
      respirators practically to prevent pulmonary exposure.
    metadata:
      topic: specific fume extraction and filtration
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 4
  - id: how-does-indiums-low-melting-point
    title: How does indium's low melting point (156.6°C) affect the laser cleaning process and what are the risks of surface
      smearing or damage?
    content: Indium melts at 156.6°C, so thermal control is crucial. This process uses nanosecond pulses at ~2.8 J/cm² to
      ablate oxides efficiently, though higher fluence may cause surface smearing. Clean results reveal a uniform metallic
      sheen, unlike the dull, re-solidified layer from damage.
    metadata:
      topic: indium's low melting point (156.6°c)
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 5
  - id: can-a-fiber-laser-be-used
    title: Can a fiber laser be used to clean indium, or is a different laser type (like Nd:YAG) required for better absorption
      and control?
    content: Fiber lasers at 1064 nm wavelength straightforwardly clean indium, achieving oxide ablation at ~2.8 J/cm² fluence.
      Although Nd:YAG systems offer excellent control, modern fiber lasers deliver sufficient absorption and precision efficiently
      for most industrial applications, like electronics manufacturing.
    metadata:
      topic: a fiber laser be used
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 6
  - id: what-is-the-best-method-to
    title: What is the best method to verify the surface cleanliness and purity of indium after laser cleaning, especially
      for high-vacuum or semiconductor applications?
    content: In this process, for high-vacuum indium surfaces cleaned at ~2.8 J/cm², XPS straightforwardly verifies sub-monolayer
      oxygen removal. Complement that method with contact angle measurement; a notable rise confirms the hydrophobic, oxide-free
      surface essential for semiconductor bonding.
    metadata:
      topic: the best method to verify
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 7
  - id: are-there-any-risks-of-generating
    title: Are there any risks of generating electrically conductive nanoparticles when laser cleaning indium or ITO, and
      how can they be mitigated?
    content: Conductive nanoparticles may form during laser cleaning of indium at 2.8 J/cm² fluence. We tackle this risk practically
      using argon shielding gas, while optimizing the 500 mm/s scan speed efficiently to avoid redeposition and prevent short
      circuits on sensitive electronics.
    metadata:
      topic: there any rks of generating
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 8
  - id: how-does-laser-cleaning-performance-on
    title: How does laser cleaning performance on indium compare to traditional methods like chemical etching or mechanical
      abrasion for precision components?
    content: Laser cleaning delivers straightforward precision for indium components, operating efficiently at 2.8 J/cm² to
      remove oxides without chemicals. Yet, its thermal risk demands careful control to prevent melting the low-melting-point
      metal. This process fits delicate electronics well but suits high-volume, cost-sensitive applications less, where traditional
      methods work fine.
    metadata:
      topic: laser cleaning performance on indium
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 9
  - id: what-are-the-primary-industrial-applications
    title: What are the primary industrial applications where laser cleaning of indium is most commonly required?
    content: In semiconductor manufacturing, laser cleaning of indium plays a key role for cryogenic sealing surfaces and
      ITO repair in display production. This process employs a 1064 nm wavelength at ~2.8 J/cm² fluence, efficiently removing
      the oxide layer without harming the soft underlying metal to ensure optimal electrical contact and bond integrity.
    metadata:
