components:
  settingsDescription: When laser cleaning Indium, you must start with a cautious low-power setup to avoid melting its soft
    surface, unlike tougher metals that handle more heat. Begin by pulsing gently to penetrate its high reflectivity, which
    reflects energy better than copper does. Slowly increase scan speed across the area, ensuring even passes that restore
    its conductive finish without warping. This approach clears contaminants while preserving Indium's malleability for electronics
    use.
  micro:
    before: We've noticed the indium surface looks rough and dotted with dark spots before cleaning. Grimy layers cling tightly,
      making the metal seem dull and uneven under magnification. This buildup hides the underlying shine, complicating any
      close inspection.
    after: After treatment, the surface appears smooth and reflective across the view. Clear areas reveal a consistent metallic
      gleam without those stubborn residues. Now, the material shows its true, pristine texture ready for use.
