faq:
  presentation: collapsible
  items:
  - id: what-laser-parameters-such-as-wavelength
    title: What laser parameters, such as wavelength and pulse duration, are optimal for cleaning tin oxide layers without
      melting the underlying tin surface?
    content: For cleaning tin oxide without melting the underlying metal at 231.9°C, choose a 1064 nm fiber laser rather than
      532 nm—particularly its near-IR wavelength boosts oxide absorption while tin's high reflectivity limits substrate heating.
      Thus, pair this setup with 12 ns pulses, 45 W power, and 2.5 J/cm² fluence for controlled ablation.
    metadata:
      topic: laser parameters, such as wavelength
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: true
      order: 1
  - id: how-effective-is-laser-cleaning-at
    title: How effective is laser cleaning at removing contaminants from tin-plated steel without damaging the tin coating?
    content: Laser cleaning particularly shines in removing contaminants from tin-plated steel, while protecting the coating's
      robust adhesion by staying below delamination limits like 2.5 J/cm² fluence at 1064 nm. Notably, this nanosecond-pulse
      approach at around 45 W power prevents pitting, unlike abrasive blasting that causes surface scratches or chemicals
      leaving residues in electronics and aerospace.
    metadata:
      topic: effective laser cleaning at removing
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 2
  - id: what-safety-risks-arise-from-laserinduced
    title: What safety risks arise from laser-induced fumes when cleaning tin surfaces, and how can they be mitigated?
    content: Laser cleaning tin at 2.5 J/cm² fluence releases toxic vapors and oxides, particularly endangering workers via
      heavy metal inhalation and chronic health risks. Thus, implement robust local exhaust ventilation, NIOSH respirators,
      and OSHA-compliant monitoring to maintain exposure below 2 mg/m³ limits.
    metadata:
      topic: safety rks from laser-induced fumes
      severity: critical
      acceptedAnswer: true
