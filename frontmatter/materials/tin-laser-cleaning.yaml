components:
  subtitle: Tin's low 505 K melting point clears delicate surfaces, and its 66.8 W/m·K conductivity manages heat well.
  micro:
    before: When we examine the tin surface before laser cleaning at 1000x magnification, dirty smudges cover most of it unevenly.
      Grimy particles cling tightly to the rough texture, making the whole area look dull and patchy. Scattered dark spots
      mar the base metal, hiding its natural shine completely.
    after: After the laser treatment, the same view shows a smooth and even surface free from all grime. The metal gleams
      brightly now, with no rough patches or clinging debris left behind
  settingsDescription: When laser cleaning Tin, make sure you start with the lowest possible power settings right away, because
    its low melting point means the surface can soften or deform quickly if heat builds up. You'll need to adjust by using
    short pulses and slower scan speeds to control the energy input, so the contaminants lift off without damaging the soft
    base material. This approach works well for Tin's high reflectivity too, which scatters the beam and slows absorption—keep
    passes minimal and overlap low to avoid uneven spots. Watch out for overexposure on thin layers, as it might lead to pitting;
    instead, test on a small area first and build up gradually for clean results in electronics or heritage work.
