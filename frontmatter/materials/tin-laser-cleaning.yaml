      order: 5
  - id: what-are-common-issues-with-laser
    title: What are common issues with laser cleaning of historical tin artifacts, such as pewter items, and how to preserve
      patina?
    content: When cleaning historical pewter artifacts, laser methods particularly risk eroding the valued patina via excessive
      ablation. To protect it, apply low fluence below 2.5 J/cm² at 45 W power using reversible techniques; thus, this adheres
      to American Institute for Conservation guidelines for gentle contaminant removal without oxide harm.
    metadata:
      topic: common sues with laser cleaning
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 6
  - id: does-laser-cleaning-alter-the-microstructure
    title: Does laser cleaning alter the microstructure or hardness of pure tin or tin alloys during surface treatment?
    content: Laser cleaning of pure tin or alloys at fluences around 2.5 J/cm² and 1064 nm wavelength generally preserves
      the beta-phase microstructure, thus avoiding recrystallization or notable hardness shifts in Vickers testing. Post-treatment
      SEM analysis specifically confirms minimal subsurface changes, owing to controlled 45 W power and 500 mm/s scan speeds.
    metadata:
      topic: laser cleaning alter the microstructure
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
