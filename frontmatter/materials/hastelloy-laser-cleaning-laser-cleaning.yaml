micro:
  before: Hastelloy's contaminated surface contrasts sharply with its cleaned counterpart
    under 1000x magnification. Dirty spots cluster like stubborn buildup. They etch
    irregular patterns across the metal's tough grains.
  after: Laser cleaning removes that mess fast. Contaminants vanish, revealing the
    alloy's dense, resilient texture. Before treatment, oxides and residues hide the
    material's natural shine. Dark, pitted areas dominate the view. They mimic corrosion
    trails, rough and uneven.
