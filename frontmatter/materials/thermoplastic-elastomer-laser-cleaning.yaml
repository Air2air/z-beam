  - id: how-do-different-laser-wavelengths-eg
    title: How do different laser wavelengths (e.g., 1064 nm vs. 532 nm) affect the surface integrity of TPE during cleaning
      processes?
    content: TPE materials absorb near-IR light like 1064 nm pretty efficiently for contaminants, preserving surface integrity
      at 1.2 J/cm² fluence without cracking. By contrast, 532 nm wavelengths typically boost substrate absorption, which risks
      discoloration from excess heat buildup in cleaning. Stick to 1064 nm for optimal results on these elastomers.
