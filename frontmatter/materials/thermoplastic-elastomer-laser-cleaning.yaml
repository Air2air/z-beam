  - id: what-physical-properties-of-tpe-like
    title: What physical properties of TPE, like low thermal conductivity, influence the choice of laser cleaning over abrasive
      methods?
    content: Thermoplastic elastomers like TPE typically show low thermal conductivity, pretty much 0.2-0.5 W/m·K, trapping
      heat and risking subsurface damage from abrasive methods that build friction. Laser cleaning dodges this via precise
      nanosecond pulses at 1064 nm and 1.2 J/cm² fluence, for controlled ablation without mechanical stress.
    metadata:
