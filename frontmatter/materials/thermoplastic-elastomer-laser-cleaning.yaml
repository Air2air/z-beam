  - id: are-there-specific-laser-cleaning-parameters
    title: Are there specific laser cleaning parameters recommended for TPE gaskets to prevent elastic property loss after
      treatment?
    content: For TPE gaskets, typically aim for 1.2 J/cm² fluence and 500 mm/s scan speed using a 1064 nm laser to strip contaminants
      while protecting elasticity. This fairly low-heat approach avoids durometer shifts, preserving flexibility as highlighted
      in aerospace and automotive forums. Two passes at 50% overlap deliver uniform results.
