  - id: in-online-discussions-what-common-handling
    title: In online discussions, what common handling mistakes occur when preparing TPE surfaces for laser cleaning, such
      as pre-treatment steps?
    content: Online forums typically highlight how skipping oil residues on TPE surfaces results in pretty ineffective cleaning
      at 1.2 J/cm² fluence, since they absorb laser energy unevenly. Dust contamination ranks as another common error, leading
      to irregular ablation in 100 W runs. A gentle degreasing with isopropyl alcohol beforehand preserves the material's
      integrity.
