  - id: how-does-the-chemical-composition-of
    title: How does the chemical composition of TPE (e.g., SEBS vs. TPU types) affect its response to laser surface treatment
      for adhesion enhancement?
    content: SEBS TPEs, featuring non-polar styrene blocks, typically call for a higher fluence of 1.2 J/cm² at 1064 nm to
      boost surface energy and primer compatibility, often delivering 20-30% stronger adhesion after treatment. By contrast,
      polar TPU types absorb laser energy more easily, which fairly cuts thermal risks while improving bonds in automotive
      seals.
