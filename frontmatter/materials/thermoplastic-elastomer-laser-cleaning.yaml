  items:
  - id: can-thermoplastic-elastomer-tpe-surfaces-be
    title: Can thermoplastic elastomer (TPE) surfaces be cleaned with fiber lasers without causing thermal degradation or
      melting?
    content: Yes, you can pretty safely clean thermoplastic elastomer surfaces using fiber lasers at 1064 nm, basically avoiding
      thermal degradation by capping fluence at 1.2 J/cm² with 10 ns pulses at 100 W. TPE's low heat tolerance typically calls
      for this level of precision, as automotive parts cases from manufacturing forums demonstrate effective contaminant removal
      across two passes at 500 mm/s without any melting.
    metadata:
      topic: thermoplastic elastomer (tpe) surfaces be
      severity: medium
      acceptedAnswer: true
