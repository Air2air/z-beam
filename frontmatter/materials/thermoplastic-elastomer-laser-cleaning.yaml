components:
  settings_description: We've found that laser cleaning Thermoplastic Elastomer works best when we start with conservative
    power levels to leverage its good absorption of laser energy, which removes surface contaminants effectively without immediate
    heat buildup. This approach restores the material's flexibility and surface integrity quickly, as its low thermal conductivity
    keeps heat localized and prevents widespread softening. In our experience, the elastomer's rubber-like resilience sets
    it apart from rigid plastics, allowing multiple passes that expose clean layers beneath residues from automotive or medical
    applications. We adjust scan speeds to be moderate, ensuring the process reduces oxidation risks while maintaining the
    material's shape. However, always monitor for excessive dwell time at the end, as prolonged exposure can cause deformation
    in this sensitive composite.
  micro:
    before: The contaminated surface appears rough and dotted with dark specks. Clumps of debris cling tightly to the uneven
      texture. Fine particles scatter across the material, hiding its natural form.
    after: Laser treatment reveals a smooth and uniform layer underneath. The surface now looks clear and even, free from
      any clinging residues. Clean ridges emerge, showing the material's true structure.
