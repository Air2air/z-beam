components:
  settingsDescription: When laser cleaning sandstone, the biggest hurdle I've seen is its porous, layered structure that traps
    grime deep inside while heating unevenly during treatment. This tends to cause micro-cracks if you push too hard, since
    the stone's sedimentary makeup varies from spot to spot. To handle it, go slow with gentle pulses that let the laser seep
    into those pores without overwhelming the surface, focusing on dry runs first to map weak areas. Watch out at the end—overlapping
    passes can still fracture edges, so always cool between them.
  micro:
    before: I see the sandstone's surface cluttered with dark specks and uneven grime layers that dull its grains. Fine particles
      nestle into open pores, creating a mottled haze over the texture. Debris clings stubbornly, masking the stone's original
      fine details.
    after: After cleaning, the surface exposes crisp, bare grains with sharp edges all around. Pores gape cleanly, free from
      any clinging dirt or film. The stone's natural patterns emerge bright and unhindered, showing its true
