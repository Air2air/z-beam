    title: What are the environmental impacts of laser cleaning sandstone in urban settings, particularly water runoff and
      thermal effects on surrounding materials?
    content: In urban environments, laser cleaning of sandstone at 1064 nm wavelength and 100 W power produces minimal heat
      transfer to neighboring stones—a notable benefit from 10 ns pulses that restrict thermal diffusion. Vacuum containment
