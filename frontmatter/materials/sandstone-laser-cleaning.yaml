      items:
      - id: causing-micro-cracking
        question: What laser wavelength is most effective for cleaning biological growth like algae from sandstone surfaces
          without causing micro-cracking?
        answer: For sandstone, it's notable how the 1064 nm near-infrared wavelength ablates algae and biological encrustations
          so effectively, delving into the porous matrix to vaporize organics without triggering thermal stress or micro-cracks—quite
          distinct from the more absorptive 532 nm, which risks surface overheating. Keep fluences at 2.5 J/cm² for safety,
          as proven in restorations of Rome's ancient forums.
        topic: causing micro-cracking
        severity: medium
        acceptedAnswer: true
        expertInfo: &id002
          name: Alessandro Moretti
          title: Ph.D.
          expertise: *id001
      - id: how-does-the-porosity-of-sandstone-affect-the-choi
        question: How does the porosity of sandstone affect the choice of pulse duration in laser cleaning to avoid subsurface
          damage?
        answer: The varying porosity of sandstone notably affects heat diffusion in laser cleaning processes; highly porous
          variants enable quicker subsurface heat propagation, heightening damage risks, thus I advocate picosecond pulses
          rather than nanoseconds to localize energy delivery. For example, using a 1064 nm wavelength and 2.5 J/cm² fluence,
          thermal imaging tests on sample slabs are essential for adjusting pulse durations—begin with 10 ns on compact stones,
          yet reduce for porous ones to achieve accuracy minus fractures.
        topic: How does the porosity of sandstone affect the choi
        severity: critical
        acceptedAnswer: true
        expertInfo: *id002
      - id: silica-dust-inhalation
        question: What are the main safety risks when using Q-switched Nd:YAG lasers on outdoor sandstone monuments, especially
          regarding silica dust inhalation?
        answer: Using Q-switched Nd:YAG lasers at 1064 nm and 100 W on outdoor sandstone monuments presents a notable risk
          of inhaling respirable crystalline silica dust from ablation, particularly above 2.5 J/cm² fluence. Operators must
          employ essential NIOSH-approved respirators, on-site ventilation to disperse particles, and adhere to EU directives
          limiting exposure to 0.1 mg/m³.
        topic: silica dust inhalation
        severity: critical
        acceptedAnswer: true
        expertInfo: *id002
      - id: historical-sandstone-facades
        question: Can laser cleaning remove soot and pollutants from historical sandstone facades more effectively than chemical
          methods, and what are the long-term effects?
        answer: Yes, laser cleaning at the 1064 nm wavelength notably outperforms chemical methods in removing soot and pollutants
          from historical sandstone facades, enabling precise ablation at 2.5 J/cm² fluence without substrate harm. Comparative
          analyses emphasize its superior efficiency alongside reduced re-soiling risks. In the long run, essential periodic
          discoloration inspections secure the stone's ongoing stability.
        topic: historical sandstone facades
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: binder-dissolution
        question: What parameters should be adjusted for laser cleaning calcareous sandstone versus siliceous sandstone to
          prevent binder dissolution?
        answer: For calcareous sandstone, laden with soluble calcite, it's essential to dial fluence down to 2.5 J/cm² and
          scan speeds to 300 mm/s, safeguarding binders—unlike quartz-rich siliceous types, which tolerate 500 mm/s without
          issue. Notable cathedral restorations in Italy showcase these adjustments for enduring results.
        topic: binder dissolution
        severity: critical
        acceptedAnswer: true
        expertInfo: *id002
      - id: weathered-sandstone
        question: In laser cleaning training for restorers, what common issues arise when treating weathered sandstone, and
          how to calibrate equipment on-site?
        answer: 'In restoring weathered sandstone, restorers often face notable over-ablation due to its porous variability,
          which risks eroding delicate grains. Essential on-site practice involves ICOMOS test protocols: initiate at 2.5
          J/cm² fluence and 100 W power using 1064 nm wavelength, while scanning small patches at 500 mm/s to calibrate without
          thermal damage.'
        topic: weathered sandstone
        severity: high
        acceptedAnswer: true
        expertInfo: *id002
      - id: iron-oxide-content
        question: How does the iron oxide content in red sandstone influence laser ablation rates and color changes during
