faq:
  presentation: collapsible
  items:
  - id: what-laser-wavelength-is-most-effective
    title: What laser wavelength is most effective for cleaning biological growth like algae from sandstone surfaces without
      causing micro-cracking?
    content: For sandstone, it's notable how the 1064 nm near-infrared wavelength ablates algae and biological encrustations
      so effectively, delving into the porous matrix to vaporize organics without triggering thermal stress or micro-cracks—quite
      distinct from the more absorptive 532 nm, which risks surface overheating. Keep fluences at 2.5 J/cm² for safety, as
      proven in restorations of Rome's ancient forums.
    metadata:
      topic: laser wavelength most effective for
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: true
      order: 1
  - id: how-does-the-porosity-of-sandstone
    title: How does the porosity of sandstone affect the choice of pulse duration in laser cleaning to avoid subsurface damage?
    content: The varying porosity of sandstone notably affects heat diffusion in laser cleaning processes; highly porous variants
      enable quicker subsurface heat propagation, heightening damage risks, thus I advocate picosecond pulses rather than
      nanoseconds to localize energy delivery. For example, using a 1064 nm wavelength and 2.5 J/cm² fluence, thermal imaging
      tests on sample slabs are essential for adjusting pulse durations—begin with 10 ns on compact stones, yet reduce for
      porous ones to achieve accuracy minus fractures.
    metadata:
      topic: the porosity of sandstone affect
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 2
  - id: what-are-the-main-safety-risks
    title: What are the main safety risks when using Q-switched Nd:YAG lasers on outdoor sandstone monuments, especially regarding
      silica dust inhalation?
    content: Using Q-switched Nd:YAG lasers at 1064 nm and 100 W on outdoor sandstone monuments presents a notable risk of
      inhaling respirable crystalline silica dust from ablation, particularly above 2.5 J/cm² fluence. Operators must employ
      essential NIOSH-approved respirators, on-site ventilation to disperse particles, and adhere to EU directives limiting
      exposure to 0.1 mg/m³.
    metadata:
      topic: the main safety rks using
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 3
  - id: can-laser-cleaning-remove-soot-and
    title: Can laser cleaning remove soot and pollutants from historical sandstone facades more effectively than chemical
      methods, and what are the long-term effects?
    content: Yes, laser cleaning at the 1064 nm wavelength notably outperforms chemical methods in removing soot and pollutants
      from historical sandstone facades, enabling precise ablation at 2.5 J/cm² fluence without substrate harm. Comparative
      analyses emphasize its superior efficiency alongside reduced re-soiling risks. In the long run, essential periodic discoloration
      inspections secure the stone's ongoing stability.
    metadata:
      topic: laser cleaning remove soot and
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 4
  - id: what-parameters-should-be-adjusted-for
    title: What parameters should be adjusted for laser cleaning calcareous sandstone versus siliceous sandstone to prevent
      binder dissolution?
    content: For calcareous sandstone, laden with soluble calcite, it's essential to dial fluence down to 2.5 J/cm² and scan
      speeds to 300 mm/s, safeguarding binders—unlike quartz-rich siliceous types, which tolerate 500 mm/s without issue.
      Notable cathedral restorations in Italy showcase these adjustments for enduring results.
    metadata:
      topic: parameters should be adjusted for
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 5
  - id: in-laser-cleaning-training-for-restorers
    title: In laser cleaning training for restorers, what common issues arise when treating weathered sandstone, and how to
      calibrate equipment on-site?
    content: 'In restoring weathered sandstone, restorers often face notable over-ablation due to its porous variability,
      which risks eroding delicate grains. Essential on-site practice involves ICOMOS test protocols: initiate at 2.5 J/cm²
      fluence and 100 W power using 1064 nm wavelength, while scanning small patches at 500 mm/s to calibrate without thermal
      damage.'
    metadata:
      topic: in laser cleaning training for
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 6
  - id: how-does-the-iron-oxide-content
    title: How does the iron oxide content in red sandstone influence laser ablation rates and color changes during surface
      treatment?
    content: In red sandstone, notable elevations in iron oxide levels enhance absorption of 1064 nm laser energy, speeding
      up ablation rates past the 2.5 J/cm² threshold while risking the fading of reddish tones via oxidation. To ensure stable
      post-treatment color, pre-scan with Raman spectroscopy for oxide content and tweak passes accordingly.
    metadata:
      topic: the iron oxide content in
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 7
  - id: what-regulatory-approvals-are-needed-for
    title: What regulatory approvals are needed for using high-power lasers on public sandstone structures, and how to document
      the process for heritage compliance?
    content: Prior to laser cleaning public sandstone structures, secure essential approvals from UNESCO or national agencies
      like Italy's Ministry of Cultural Heritage, while ensuring non-destructive protocols. Notably, document via pre- and
      post-treatment integrity tests, tracking fluence below 2.5 J/cm² to preserve porous sandstone without thermal stress.
      Report findings in detailed logs for compliance audits.
