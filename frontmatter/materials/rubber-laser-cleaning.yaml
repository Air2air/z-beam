components:
  settingsDescription: When laser cleaning rubber, you'll want to begin with the lowest possible power settings to account
    for its exceptional flexibility and low heat tolerance. This material absorbs laser energy quickly due to its dark surface
    properties, which allows contaminants to remove effectively without deep penetration into the base layer. Rubber's elasticity
    means it deforms under heat rather than cracking, so you must control scan speeds to prevent warping during multiple passes.
    We've found that short pulses restore surface integrity while exposing underlying fibers cleanly. Make sure you monitor
    for signs of softening, as excessive energy reduces durability and leads to material breakdown—always test on a small
    area first to adjust accordingly.
  micro:
    before: At 1000x magnification, the rubber surface teems with irregular clumps of dirt and debris that obscure the underlying
      texture. Fine particles embed deeply into cracks and crevices, creating a mottled, uneven appearance across the material.
      This contamination layer distorts the natural contours, making the surface look dull and cluttered.
    after: After laser treatment at 1000x magnification, the rubber surface emerges smooth and free of debris, with a clear,
      uniform texture. The treatment exposes the material's inherent
