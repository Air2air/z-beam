micro:
  before: 'Laser cleaning tackles manganese surfaces head-on, especially when contaminants
    build up and compromise performance. At 1000x magnification, the before shot reveals
    a contaminated landscape: irregular oxide layers cling tightly, forming jagged
    patterns that pit the metal''s natural grain. Dark streaks of rust-like deposits
    scatter across the surface, disrupting its inherent luster and creating uneven
    textures that trap dirt.'
  after: The laser process ramps up quickly, vaporizing those stubborn residues without
    damaging the base material. After treatment, the clean surface stands out sharp—smooth
    facets emerge, showcasing manganese's dense, durable microstructure with a uniform
    metallic glow. No lingering particles mar the view; instead, the material's fine
    crystalline edges line up crisply, restoring its corrosion-resistant finish. In
    practice, this clears away contamination patterns effectively, achieving a solid,
    ready-to-use result that holds up under scrutiny. Overall, the transformation
    demonstrates how laser cleaning maintains the metal's strong, conductive properties
    while cutting down on surface flaws.
