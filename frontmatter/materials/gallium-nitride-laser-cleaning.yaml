micro:
  before: Surface of gallium nitride, it appears rough before cleaning. Contamination covers areas with irregular spots and
    clustered particles, thus hides underlying crystalline texture. At 1000x magnification, these contaminants show jagged
    edges and uneven layers, so block uniform shine. Laser cleaning applies energy, and removes deposits layer by layer. After
    treatment, surface exhibits smoothness already. Clean areas reveal flat facets and subtle hexagonal patterns, unique to
    material's compound nature. Roughness reduces, thus exposes durable, dense structure without residues. This process yields
    clear contrast—contaminated side stays dull and patchy, while cleaned side demonstrates reflective, even features. Contamination
    patterns, they vary from dense films to scattered grains, but laser action clears them effectively. Surface now shows
    uniformity, and enhances material's inherent hardness.
  after: Surface of gallium nitride, it appears rough before cleaning. Contamination covers areas with irregular spots and
    clustered particles, thus hides underlying crystalline texture. At 1000x magnification, these contaminants show jagged
    edges and uneven layers, so block uniform shine. Laser cleaning applies energy, and removes deposits layer by layer. After
