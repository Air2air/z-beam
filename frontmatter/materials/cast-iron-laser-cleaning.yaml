  - id: what-safety-precautions-are-needed-when
    title: What safety precautions are needed when laser cleaning cast iron containing graphite?
    content: When working with cast iron ablation at 100W, its graphite content releases hazardous ultrafine particulates.
      Use local exhaust ventilation with HEPA filtration and a P100 respirator for straightforward safety. This process at
      1064nm needs full-face protection from reflected radiation.
