faq:
  presentation: collapsible
  items:
  - id: what-laser-parameters-work-best-for
    title: What laser parameters work best for cleaning rust from cast iron without damaging the base metal?
    content: Being practical as a laser cleaning expert from Indonesia, I recommend a 1064 nm pulsed fiber laser with 1-2
      J/cm² fluence and 20-50 ns pulse duration. That method, paired with 500-1000 mm/s scan speed, removes rust from cast
      iron efficiently without harming the base metal.
    metadata:
      topic: laser parameters work best for
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: true
      order: 1
  - id: does-laser-cleaning-affect-the-machinability
    title: Does laser cleaning affect the machinability or future processing of cast iron components?
    content: Laser cleaning, applied efficiently at 5 J/cm² fluence and 100W power, preserves cast iron's machinability straightforwardly
      by stripping oxides without affecting bulk hardness. This process yields a clean surface that enhances coating adhesion
      and maintains weldability, sidestepping issues in subsequent manufacturing.
    metadata:
      topic: laser cleaning affect the machinability
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 2
  - id: how-do-i-prevent-white-cast
    title: How do I prevent white cast iron from cracking during laser cleaning due to thermal stress?
    content: 'As a laser cleaning specialist in Indonesia, I''ve seen that a straightforward approach prevents cracking in
      white cast iron: low pulse energy lasers at reduced speeds enable gradual heat dissipation. Slightly pre-heat the surface,
      then add controlled cooling intervals between passes to ease thermal gradients—that method keeps the material intact.'
    metadata:
      topic: do i prevent white cast
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 3
  - id: can-laser-cleaning-effectively-remove-burnedin
    title: Can laser cleaning effectively remove burned-in sand and casting residues from iron castings?
    content: Yes, laser cleaning works straightforward for clearing burned-in sand and casting residues from iron castings.
      This process precisely ablates contaminants, vaporizing them efficiently without substrate damage to yield a smooth,
      clean surface. From my time in Indonesian foundries, it offers dependable, green results.
    metadata:
      topic: laser cleaning effectively remove burned-in
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 4
  - id: what-safety-precautions-are-needed-when
    title: What safety precautions are needed when laser cleaning cast iron containing graphite?
    content: When working with cast iron ablation at 100W, its graphite content releases hazardous ultrafine particulates.
      Use local exhaust ventilation with HEPA filtration and a P100 respirator for straightforward safety. This process at
      1064nm needs full-face protection from reflected radiation.
    metadata:
      topic: safety precautions needed laser cleaning
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 5
  - id: does-laser-cleaning-alter-the-corrosion
    title: Does laser cleaning alter the corrosion resistance of cast iron surfaces?
    content: Using laser cleaning at 5 J/cm² fluence straightforwardly boosts corrosion resistance by stripping away contaminants
      and forming a refined surface layer. This process effectively fosters superior passive oxide layers versus mechanical
      methods, markedly enhancing rust protection for cast iron parts.
    metadata:
      topic: laser cleaning alter the corrosion
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 6
  - id: how-does-the-graphite-flake-structure
    title: How does the graphite flake structure in gray iron affect laser cleaning results?
    content: In gray iron, graphite flakes straightforwardly absorb the 1064 nm laser energy, enabling preferential ablation
      at fluences near 5 J/cm². This process induces micro-pitting, which yields a rougher final surface compared to other
      cast iron microstructures.
    metadata:
      topic: the graphite flake structure in
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
