    title: What's the maximum material removal rate for heavy scale on cast iron without causing damage?
    content: As a laser cleaning specialist from Indonesia, where we handle industrial rust on cast iron in a practical way,
      the maximum removal rate for heavy scale without substrate damage reaches 8-12 grams per minute. This process uses a
      500-1000W pulsed fiber laser at 20-50 kHz efficiently. Optimal parameters avoid overheating, preserving surface integrity.
