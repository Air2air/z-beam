    _display:
      _open: false
      order: 8
  - id: can-laser-cleaning-restore-sealing-surfaces
    title: Can laser cleaning restore sealing surfaces on cast iron engine blocks or pump housings?
    content: Laser cleaning offers a practical approach to restoring cast iron sealing surfaces at 5 J/cm² fluence and 50
      μm spot size. It selectively removes gasket residue and oxides while safeguarding substrate flatness. This process upholds
      dimensional integrity, yielding an ideal surface for re-sealing without mechanical harm.
    metadata:
      topic: laser cleaning restore sealing surfaces
      severity: high
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 9
  - id: how-do-i-verify-laser-cleaning
    title: How do I verify laser cleaning hasn't compromised the structural integrity of critical cast iron components?
    content: By maintaining fluence below 5 J/cm², you avoid structural damage to cast iron in a practical way. After cleaning,
      apply microhardness testing and eddy current inspection effectively to check subsurface integrity. This process reveals
      any changes in mechanical properties, securing overall component reliability.
    metadata:
