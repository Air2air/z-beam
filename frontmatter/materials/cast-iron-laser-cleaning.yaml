  items:
  - id: what-laser-parameters-work-best-for
    title: What laser parameters work best for cleaning rust from cast iron without damaging the base metal?
    content: Being practical as a laser cleaning expert from Indonesia, I recommend a 1064 nm pulsed fiber laser with 1-2
      J/cm² fluence and 20-50 ns pulse duration. That method, paired with 500-1000 mm/s scan speed, removes rust from cast
      iron efficiently without harming the base metal.
