  - id: how-do-i-prevent-white-cast
    title: How do I prevent white cast iron from cracking during laser cleaning due to thermal stress?
    content: 'As a laser cleaning specialist in Indonesia, I''ve seen that a straightforward approach prevents cracking in
      white cast iron: low pulse energy lasers at reduced speeds enable gradual heat dissipation. Slightly pre-heat the surface,
      then add controlled cooling intervals between passes to ease thermal gradients—that method keeps the material intact.'
