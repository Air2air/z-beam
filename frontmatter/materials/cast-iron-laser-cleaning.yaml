  - id: does-laser-cleaning-alter-the-corrosion
    title: Does laser cleaning alter the corrosion resistance of cast iron surfaces?
    content: Using laser cleaning at 5 J/cm² fluence straightforwardly boosts corrosion resistance by stripping away contaminants
      and forming a refined surface layer. This process effectively fosters superior passive oxide layers versus mechanical
      methods, markedly enhancing rust protection for cast iron parts.
