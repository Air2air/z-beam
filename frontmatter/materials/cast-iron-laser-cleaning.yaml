  components:
    description: When laser cleaning cast iron, you'll want to watch its 1.5% porosity, which can trap contaminants and slow
      the process. Start with 100 W at 1064 nm wavelength and 5 J/cm² energy density to avoid cracking its 830 MPa compressive
      strength. High absorptivity around 0.5 helps removal, but keep passes to three at 500 mm/s—overdo it, and thermal stress
      warps the 110 GPa modulus surface.
    micro:
      before: When examining the contaminated cast iron surface at high magnification, you see thick layers of rust and debris
        clinging tightly to the uneven texture. Dark smudges and flaky buildup obscure the underlying metal grains completely.
        Scattered pits fill with grime, making the whole area look dull and irregular.
      after: After laser treatment, you notice the surface turns smooth with clear, exposed metal shining through evenly.
        No traces of rust remain, and the grains appear crisp without any clinging residues. The texture evens out
    settings_description: When laser cleaning cast iron, I've seen how its embedded graphite flakes set it apart from smoother
      steels, drawing in laser energy unevenly and speeding up contaminant removal while risking uneven heating in those spots.
      This works best when you focus the beam to gently abrade surface rust or scale, restoring that durable base without
      digging into the matrix. Tends to handle heat well up to moderate levels, so you can push through multiple layers of
      buildup from industrial use like machinery parts. But watch out mid-process—its slight porosity might trap residues
      if you ramp up too fast, leading to incomplete cleans or weak spots, so dial back intensity and add passes for even
      coverage. Overall, this approach preserves its tough compressive nature, avoiding cracks in heavy-duty applications.
