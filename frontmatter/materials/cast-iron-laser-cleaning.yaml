  - id: how-does-the-graphite-flake-structure
    title: How does the graphite flake structure in gray iron affect laser cleaning results?
    content: In gray iron, graphite flakes straightforwardly absorb the 1064 nm laser energy, enabling preferential ablation
      at fluences near 5 J/cm². This process induces micro-pitting, which yields a rougher final surface compared to other
      cast iron microstructures.
