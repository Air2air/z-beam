micro:
  before: Cast iron surface, its dense structure reveals unique challenges in cleaning. Contamination patterns appear as clustered
    oxides and rust deposits, they cling tightly to the porous texture and create irregular pits. At 1000x magnification,
    dirty areas show jagged edges where debris accumulates, thus blocking the natural graphite flakes embedded within. These
    flakes, they stand out as dark specks amid the reddish-brown film, and contamination resists initial passes due to the
    material's heat retention.
  after: Laser cleaning applies pulses, and layers vaporize layer by layer. After treatment, surface already exhibits smoothness,
    with oxides gone and graphite flakes now clearly visible without obstruction. Clean regions demonstrate uniform sheen,
    pores reopen fully, and original metallic luster returns. This process confirms efficiency, as analysis shows no residue
    remnants, thus restoring the ferrous integrity for industrial use. Following adjustment of beam focus, roughness reduces
    and durability enhances.
