components:
  micro:
    before: >-
      The acrylic surface teems with embedded dirt particles and smudges at 1000x magnification. These contaminants form
      irregular clusters that obscure the underlying material completely. Scratches and residues create a bumpy, uneven
      texture across the entire area.
    after: >-
      Laser treatment clears away all traces of dirt and debris from the acrylic effectively. The surface now displays a
      smooth, uniform finish without any visible flaws. It exposes a clear, pristine layer that reflects light evenly
      throughout.
