faq:
  presentation: collapsible
  items:
  - id: how-can-i-prevent-warping-when
    title: How can I prevent warping when laser cleaning acrylic sheets?
    content: When laser cleaning acrylic, you'll want to start with low-power settings to avoid overheating its heat-sensitive
      surface. I've seen that this material contrasts with metals by deforming easily under brief heat exposure, so short
      pulses remove dirt without causing warps. This approach restores clarity and shape effectively in practical applications
      like signage restoration.
    metadata:
      topic: i prevent warping laser cleaning
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: true
      order: 1
  - id: whats-the-best-way-to-remove
    title: What's the best way to remove stains from PMMA without scratching?
    content: If you're cleaning PMMA, watch for its smooth surface that resists scratches but absorbs laser energy quickly.
      Unlike rougher plastics, acrylic cleans best with gentle, focused beams that lift stains layer by layer. In my experience,
      this method exposes a pristine finish and improves durability for repeated use in displays.
    metadata:
      topic: '''s the best way to'
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: false
      order: 2
  - id: does-laser-cleaning-affect-the-transparency
    title: Does laser cleaning affect the transparency of acrylic parts?
    content: Laser cleaning acrylic demands careful control since its clear nature can fog from uneven heating. Compared to
      opaque thermoplastics, PMMA reveals contaminants easily but risks haze if pulses are too intense.
    metadata:
      topic: laser cleaning affect the transpncy
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: false
      order: 3
  options:
    autoOpenFirst: true
    sortBy: severity
