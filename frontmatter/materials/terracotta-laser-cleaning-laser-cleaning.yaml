name: terracotta-laser-cleaning
slug: terracotta-laser-cleaning
page_title: terracotta-laser-cleaning
micro:
  before: Terracotta surface before cleaning shows contamination in thick layers.
    This dirt buildup, it covers pores and reduces smoothness already present from
    exposure. Contamination appears as irregular patterns, so laser treatment is needed
    for removal. At 1000x magnification, particles cling to rough textures, and oxide
    films form on edges during environmental attack.
  after: After laser cleaning is applied, surface exhibits clean uniformity. Contamination
    is removed completely, so original material characteristics become visible now.
    Pores open without damage, and texture reveals fine grains from terracotta composition.
    In observations, clean areas reflect light better because residues are already
    gone by ablation process. From the microscopic view, this treatment achieves effective
    restoration, with no leftover particles detected at the surface.
