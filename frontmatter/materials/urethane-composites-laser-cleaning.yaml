components:
  settings_description: When laser cleaning urethane composites, we typically begin by selecting a moderate power level to
    leverage their high absorption, which efficiently removes surface contaminants without immediate deep penetration. This
    approach accounts for the material's low thermal conductivity, so heat stays localized and reduces the risk of underlying
    delamination in these layered structures. We've found that slower scan speeds with multiple overlapping passes restore
    the surface integrity effectively, as the flexibility of urethane prevents cracking under controlled exposure. Always
    monitor for excessive buildup, which can degrade the composite's durability if power exceeds safe thresholds.
  micro:
    before: At 1000x magnification, the contaminated urethane composite surface shows scattered dark residues clinging tightly
      to the material's uneven texture. We've found that these irregular patches create a mottled appearance across the entire
      field of view. Deeper inspection reveals fine particles embedded within the surface layers, disrupting the overall uniformity.
    after: After laser treatment at the same magnification, the urethane composite surface appears smooth and reveals a consistent
      matrix free of residues. We've observed that the treatment exposes the clean underlying structure with sharp
