      order: 8
  - id: what-postcleaning-inspections-are-needed-for
    title: What post-cleaning inspections are needed for urethane composites after laser treatment to ensure no subsurface
      damage?
    content: After laser cleaning urethane composites at a 2.5 J/cm² fluence threshold, run ultrasonic testing to detect delamination
      and optical microscopy to spot microcracks from localized heating. These checks basically ensure the polymer matrix
      stays intact, particularly in aerospace applications where subsurface integrity is pretty critical. Typically, scanning
      at 500 mm/s during treatment prevents such damage.
