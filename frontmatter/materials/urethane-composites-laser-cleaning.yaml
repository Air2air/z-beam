    _display:
      _open: false
      order: 7
  - id: what-environmental-factors-such-as-humidity
    title: What environmental factors, such as humidity, affect laser cleaning outcomes on urethane composite surfaces?
    content: High humidity pretty much promotes moisture uptake in hydrophilic urethane composites, causing surface swelling
      that hinders consistent ablation during laser cleaning at the 2.5 J/cm² fluence threshold. This leads to uneven contaminant
      removal and risks thermal damage with 1064 nm pulses. Typically, keep relative humidity under 40% for reliable results.
    metadata:
      topic: environmental factors, such as humidity,
      severity: critical
      acceptedAnswer: true
