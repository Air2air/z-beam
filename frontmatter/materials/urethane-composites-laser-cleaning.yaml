  items:
  - id: what-laser-parameters-like-power-density
    title: What laser parameters, like power density and pulse duration, are recommended to avoid thermal damage when cleaning
      urethane composites?
    content: When dealing with urethane composites, aim to keep fluence fairly under 2.5 J/cm² at 1064 nm to avoid charring
      the polyurethane matrix during cleaning. Typically, employ 100 W average power with 10 ns pulses at 50 kHz, scanning
      at 500 mm/s across three passes—this setup basically balances effective contaminant removal against minimal heat accumulation
      for aerospace or automotive components.
    metadata:
      topic: laser parameters, like power density
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: true
      order: 1
  - id: can-laser-cleaning-effectively-remove-mold
    title: Can laser cleaning effectively remove mold release agents from urethane composite surfaces without affecting the
      underlying material?
    content: Yeah, laser cleaning does a pretty solid job removing mold release agents from urethane composites without damaging
      the substrate, thanks to their thermal stability. Basically, at 1064 nm wavelength and 100 W power with fluence under
      2.5 J/cm², it ablates contaminants efficiently, leaving negligible residues and a pristine surface ideal for aerospace
      or automotive parts.
    metadata:
      topic: laser cleaning effectively remove mold
      severity: high
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: false
      order: 2
  - id: what-are-the-main-safety-concerns
    title: What are the main safety concerns, such as fume generation or flammability risks, when using lasers on urethane
      composites?
    content: When working with urethane composites via lasers, thermal breakdown typically releases toxic isocyanates, so
      keep ventilation below 0.005 ppm to safeguard workers. Above 2.5 J/cm² fluence, flammability spikes sharply, rendering
      100 W at 1064 nm fairly ideal to avoid ignition in aerospace or automotive uses.
    metadata:
      topic: the main safety concerns, such
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: false
      order: 3
  - id: how-do-different-laser-types-like
    title: How do different laser types, like CO2 vs. fiber lasers, perform on urethane composites for surface treatment?
    content: Fiber lasers at 1064 nm work pretty well for urethane composites, using strong near-IR absorption to enable controlled
      ablation from 2.5 J/cm² fluence onward, which helps cut down subsurface damage in aerospace or automotive components.
      CO2 lasers operating at 10.6 μm typically handle non-ablative surface cleaning, though they might lead to uneven heating
      in layered setups. Just stick with 100 W power to keep efficiency balanced.
    metadata:
      topic: do different laser types, like
      severity: critical
      acceptedAnswer: true
