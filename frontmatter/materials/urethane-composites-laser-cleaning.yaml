      order: 5
  - id: are-there-documented-case-studies-or
    title: Are there documented case studies or best practices for laser cleaning urethane composite parts in aerospace applications?
    content: Boeing's case studies show pretty effective laser cleaning of urethane composite panels in aircraft, with 1064
      nm systems at 100 W power achieving basically 95% contaminant removal after three passes. They stress fluence below
      2.5 J/cm² to avoid matrix damage, ensuring ASTM compliance in aerospace operations.
    metadata:
      topic: there documented case studies or
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: false
      order: 6
  - id: how-does-the-composites-filler-content
    title: How does the composite's filler content, like glass fibers in urethane, impact laser cleaning effectiveness?
    content: In urethane composites, higher glass fiber content pretty much reduces laser absorption at 1064 nm since the
      fibers stay largely transparent. This can cause patchy cleaning along with potential surface irregularities. For avoiding
      damage to reinforcements, maintain fluence below 2.5 J/cm² and apply 100 W power to basically ensure even contaminant
      removal without substrate harm.
    metadata:
      topic: the composite's filler content, like
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
