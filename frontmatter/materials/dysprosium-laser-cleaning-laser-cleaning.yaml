micro:
  before: Contamination on dysprosium surfaces poses removal challenges, it appears,
    due to tenacious adherence influenced from environmental exposure. At microscopic
    examination, the contaminated layer manifests as irregular clusters, which exhibit
    jagged edges and deep pitting that trap residues. These oxides, they resist initial
    passes, showing dense, matte textures dependent from oxidation patterns unique
    to rare-earth metals. The surface, it displays uneven contours, with contamination
    persisting in crevices that demonstrate material-specific porosity.
  after: Laser cleaning yields cleaner profiles. The process removes layers effectively,
    leaving the dysprosium substrate smooth and reflective. Post-treatment, the surface
    exhibits minimal roughness, where former pits fill uniformly. This restoration,
    it highlights the metal's inherent durability, as contaminants detach without
    altering core structure. Shows the technique's precision, which preserves lanthanide
    integrity.
