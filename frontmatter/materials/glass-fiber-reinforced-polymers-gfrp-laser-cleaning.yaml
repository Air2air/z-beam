components:
  settingsDescription: We've found that GFRP's embedded glass fibers in a polymer matrix demand careful laser setup right
    from the start to avoid delamination. Start with lower power levels and slower scan speeds, since the fibers can channel
    heat unevenly. This composite nature sets it apart from uniform metals—heat builds up in the resin quickly, risking cracks.
    We typically use multiple light passes with good overlap to gently remove contaminants without stressing the fibers. Watch
    for surface blistering; it signals overexposure, so dial back energy if you see any bubbling. In our experience, this
    approach restores the surface cleanly for aerospace parts while preserving strength.
  micro:
    before: Look at this contaminated GFRP surface under 1000x magnification. Dust and grime cling tightly to the fibers,
      making everything look dull and uneven. You can see irregular patches everywhere, blocking the clear view of the underlying
      structure.
    after: Now check the cleaned GFRP after laser treatment at the same magnification. The surface shines smoothly with fibers
      standing out crisp and bare. No more debris hides details, revealing a fresh and uniform texture overall.
