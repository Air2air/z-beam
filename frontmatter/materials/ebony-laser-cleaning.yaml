micro:
  before: Under high microscopic magnification, the contaminated ebony surface, it reveals intricate patterns of adhered residues,
    which manifest as irregular clusters within the dense fibrous matrix. These contaminants, they obscure the natural vascular
    features, tenaciously binding to the porous interstices that characterize this hardwood. The layer of grime, influenced
    from environmental exposure, exhibits a mottled texture, where fine particulates embed deeply into the grain, leading
    to a dulled, uneven topography.
  after: Following laser cleaning, the process yields a markedly restored profile. The surface now exhibits smoothness, with
    residues removed selectively, that demonstrates the material's inherent durability. Clean fibers, they emerge unmarred,
    revealing the unique interlocking patterns which define ebony's structural integrity. It appears that this treatment,
    dependent from precise energy application, preserves the wood's compressive resilience, while eliminating occlusions without
    inducing thermal distortion. Scans confirm the efficiency, as the renewed face shows no residual adhesion, highlighting
    the laser's affinity for surface-level intervention on such tenacious substrates.
faq:
- question: How do I prevent burning ebony during laser cleaning?
  answer: You must start with lower power settings to gently remove surface dirt without overheating the dense wood. Ebony's
    hardness helps it withstand the process, but its low heat tolerance means you should use short pulses that clear buildup
    quickly. Keep the laser moving steadily across the surface to avoid hot spots. In my experience, this approach restores
    the natural finish beautifully. Watch out for prolonged exposure, as it can char the material and ruin your work.
- question: What's the best practice for cleaning old dirt off ebony artifacts?
  answer: Make sure you test the laser on a small hidden area first to see how the ebony responds. The wood's tight grain
    absorbs energy evenly, so a focused beam works well to lift grime without scratching. You'll want to follow up with a
    soft cloth to polish away any residue left behind. This method preserves the ebony's deep color and smooth texture effectively.
