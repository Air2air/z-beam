faq:
  presentation: collapsible
  items:
  - id: how-do-i-prevent-burning-ebony
    title: How do I prevent burning ebony during laser cleaning?
    content: You must start with lower power settings to gently remove surface dirt without overheating the dense wood. Ebony's
      hardness helps it withstand the process, but its low heat tolerance means you should use short pulses that clear buildup
      quickly. Keep the laser moving steadily across the surface to avoid hot spots. In my experience, this approach restores
      the natural finish beautifully. Watch out for prolonged exposure, as it can char the material and ruin your work.
    metadata:
      topic: do i prevent burning ebony
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: true
      order: 1
  - id: whats-the-best-practice-for-cleaning
    title: What's the best practice for cleaning old dirt off ebony artifacts?
    content: Make sure you test the laser on a small hidden area first to see how the ebony responds. The wood's tight grain
      absorbs energy evenly, so a focused beam works well to lift grime without scratching. You'll want to follow up with
      a soft cloth to polish away any residue left behind. This method preserves the ebony's deep color and smooth texture
      effectively.
