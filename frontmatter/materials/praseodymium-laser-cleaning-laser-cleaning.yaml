micro:
  before: Laser cleaning tackles stubborn contamination on praseodymium surfaces effectively.
    At 1000x magnification, the contaminated view reveals jagged oxide layers clinging
    tightly, with irregular patterns of dust and residues disrupting the metal's natural
    luster. These buildups create uneven textures that hide the material's inherent
    smoothness.
  after: The praseodymium laser process ramps up precision removal. It blasts away
    those contaminants without damaging the base layer. Post-cleaning, the surface
    shows a clean finish—polished and uniform, exposing fine grain structures that
    reflect light evenly. Turns out, this method uncovers unique visual features like
    subtle crystalline edges, free from the original mottled haze.
