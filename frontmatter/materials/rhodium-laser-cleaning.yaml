faq:
  presentation: collapsible
  items:
  - id: what-laser-wavelengths-are-most-effective
    title: What laser wavelengths are most effective for cleaning rhodium-plated surfaces without causing delamination?
    content: For rhodium-plated surfaces in aerospace or jewelry applications, the 1064 nm near-IR wavelength performs pretty
      well thanks to the metal's high reflectivity, which curbs absorption and protects thin layers from delamination. Basically,
      this approach allows contaminant ablation at a precise 2.5 J/cm² fluence with 45 W power, yielding uniform, damage-free
      cleaning without thermal buildup.
    metadata:
      topic: laser wavelengths most effective for
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: true
      order: 1
  - id: how-can-laser-cleaning-remove-contaminants
    title: How can laser cleaning remove contaminants from rhodium catalysts in automotive applications without affecting
      catalytic efficiency?
    content: Laser cleaning basically targets contaminants on rhodium catalysts in automotive systems with a 1064 nm near-IR
      beam at 2.5 J/cm² fluence, vaporizing deposits without exceeding sintering thresholds. Pretty effectively, its 15 ns
      pulses and 45 W power preserve the metal's porous framework and surface area, protecting emissions control efficiency.
    metadata:
      topic: laser cleaning remove contaminants from
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: false
      order: 2
  - id: what-are-the-safety-risks-of
    title: What are the safety risks of using pulsed lasers on rhodium jewelry during cleaning, and how to mitigate them?
    content: Pulsed laser cleaning of rhodium jewelry can cause micro-ablation, aerosolizing fine, toxic particles that are
      hazardous if inhaled. Basically, counter this by using robust fume extraction ventilation, 1064 nm-rated eye protection,
      and exposure limits below 0.1 mg/m³. Keep fluence fairly under 2.5 J/cm² to limit particle ejection.
    metadata:
      topic: the safety rks of using
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: false
      order: 3
  - id: why-does-rhodiums-high-melting-point
    title: Why does rhodium's high melting point make it challenging for laser cleaning, and what parameters adjust for this?
    content: Rhodium's melting point at 1964°C pretty much complicates laser cleaning, since its thermal conductivity dissipates
      heat rapidly, potentially causing uneven ablation or substrate damage from energy buildup. We basically mitigate this
      with a fluence of 2.5 J/cm² for contaminant removal and a scan speed of 500 mm/s to avoid localized overheating.
    metadata:
      topic: rhodium's high melting point make
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: false
      order: 4
  - id: in-laser-cleaning-forums-users-ask
    title: 'In laser cleaning forums, users ask: Can fiber lasers effectively strip oxides from rhodium electrical contacts?'
    content: Fiber lasers typically excel at stripping sparse oxides from rhodium electrical contacts, thanks to the metal's
      exceptional corrosion resistance. Go with a 1064 nm wavelength at 2.5 J/cm² fluence for pretty precise removal—much
      better than 532 nm, which rhodium largely reflects—while holding power to 45 W to prevent substrate damage.
    metadata:
      topic: in laser cleaning forums, users
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: false
      order: 5
  - id: what-concerns-do-manufacturers-raise-about
    title: What concerns do manufacturers raise about laser-induced thermal stress on rhodium coatings during surface preparation?
    content: Manufacturers get pretty concerned about thermal stress cracking in rhodium coatings, given its low coefficient
      of thermal expansion—around 8.3 × 10⁻⁶/°C—that mismatches substrates like steel and risks delaminating layers during
      laser prep. Typically, mitigate this with a 1064 nm wavelength at 45 W power plus rapid air cooling, alongside pre-treatment
      via uniform heating protocols for stronger adhesion. Keep fluence under 2.
    metadata:
      topic: concerns do manufacturers rae about
      severity: low
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
