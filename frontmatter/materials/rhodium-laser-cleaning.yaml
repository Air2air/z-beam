  components:
    settings_description: When cleaning rhodium, watch its high reflectivity first—it
      tends to bounce laser energy away, so start with lower power to avoid scattering
      heat unevenly. I've seen this works best by scanning slowly across the surface,
      which exposes contaminants without stressing the dense, heat-resistant layer
      underneath. Multiple passes restore the shine effectively, reducing any risk
      of uneven ablation.
    micro:
      before: The contaminated surface reveals scattered dark residues across its
        expanse. Fine particles cling tightly, creating uneven shadows and dull patches.
        Rough textures dominate, obscuring the base material entirely.
      after: Laser treatment restores a smooth, even gleam to the surface. Clean lines
        emerge without clinging debris or shadows. Polished features stand out, free
        from prior roughness.
