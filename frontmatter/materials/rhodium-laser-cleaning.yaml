      - id: laser-induced-thermal-stress
        title: What concerns do manufacturers raise about laser-induced thermal stress on rhodium coatings during surface
          preparation?
        content: Manufacturers get pretty concerned about thermal stress cracking in rhodium coatings, given its low coefficient
          of thermal expansion—around 8.3 × 10⁻⁶/°C—that mismatches substrates like steel and risks delaminating layers during
          laser prep. Typically, mitigate this with a 1064 nm wavelength at 45 W power plus rapid air cooling, alongside pre-treatment
          via uniform heating protocols for stronger adhesion. Keep fluence under 2.
