micro:
  before: Contaminated terbium surface contrasts sharply with clean one after laser
    treatment. Under microscopic view, contamination appears as irregular oxide clusters
    and particulate residues—dense, lumpy formations that cling to the metal's granular
    texture, thus blocking uniformity and revealing dull, shadowed pits. This buildup,
    it resists initial pulses yet yields gradually. Laser cleaning applies targeted
    energy, and ablation removes layers precisely, so surface already exhibits smoothness.
  after: 'Following treatment, clean terbium shows polished facets with fine, interlocking
    grains—bright and reflective, free from debris. Unique features emerge: subtle
    wave-like ridges from material''s inherent durability, and even luster that confirms
    restoration. Contamination patterns before, they scatter unevenly across regions,
    but after, uniformity prevails, thus enhancing surface integrity. Process demonstrates
    efficiency, roughness reduces just so.'
