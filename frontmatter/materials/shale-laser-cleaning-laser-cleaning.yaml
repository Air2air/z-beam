name: shale-laser-cleaning
slug: shale-laser-cleaning
page_title: shale-laser-cleaning
micro:
  before: Shale surface shows contamination patterns before cleaning. This dirt layer,
    it covers fine grains and forms uneven buildup. Particles cling tightly because
    exposure causes accumulation over time. In observations at magnification, contamination
    appears as dark spots and irregular films on layered structure. So, laser treatment
    applies to remove these layers without harming base material.
  after: After treatment is performed, surface achieves clean state. Contamination
    already removed by precise ablation, and shale exhibits natural smoothness. From
    the data, clean areas display uniform texture with visible grain boundaries. This
    process, it restores original features so reflectivity increases. During exposure,
    laser targets only contaminants, leaving substrate intact. Buildup is eliminated
    from surfaces, and results indicate complete removal in most regions. Surface
    now shows durability and low roughness.
