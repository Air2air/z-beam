faq:
  _section:
    sectionTitle: FAQ
    sectionDescription: Common Questions and Answers
    sectionMetadata: faq
    icon: help-circle
    order: 46
    variant: default
  presentation: collapsible
  items:
  - id: how-can-i-effectively-clean-oxidation
    title: How can I effectively clean oxidation from aluminum bronze using a laser?
    content: We've found that oxidation on aluminum bronze builds up stubbornly because of its strong resistance to corrosion,
      making single passes less effective. You need to use multiple short bursts from the laser to gradually lift the layer
      without overheating the base material. In our experience, adjusting the beam to a wider focus helps spread the energy
      and prevents any uneven heating spots.
    metadata:
      topic: i effectively clean oxidation from
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: true
      order: 1
  - id: what-settings-work-best-for-laser
    title: What settings work best for laser cleaning aluminum bronze parts?
    content: When laser cleaning aluminum bronze, the main challenge comes from its high reflectivity, which bounces much
      of the laser energy away compared to less shiny metals like steel. We typically start with lower power levels and slower
      scan speeds to build up absorption gradually over the surface. This approach ensures you remove contaminants like grease
      or scale while keeping the alloy's durable structure intact.
    metadata:
      topic: settings work best for laser
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 2
  - id: why-does-aluminum-bronze-sometimes-warp
    title: Why does aluminum bronze sometimes warp during laser cleaning?
    content: Aluminum bronze can warp if the laser heat isn't managed well, especially since it conducts heat
    metadata:
      topic: aluminum bronze sometimes warp during
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 3
  options:
    autoOpenFirst: true
    sortBy: severity
