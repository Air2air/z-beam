faq:
  presentation: collapsible
  items:
  - id: what-laser-wavelengths-are-most-effective
    title: What laser wavelengths are most effective for cleaning Terbium oxide contaminants from metal surfaces without damaging
      the underlying substrate?
    content: When removing Terbium oxide from metal substrates, the 1064 nm near-IR wavelength performs straightforwardly,
      thanks to strong absorption in Tb compounds. This process enables ablation efficiently at fluences over 2.5 J/cm², sparing
      the substrate. Shorter 532 nm alternatives are viable but may increase thermal risks; use 50 kHz repetition and 500
      mm/s scan speed for consistent outcomes.
    metadata:
      topic: laser wavelengths most effective for
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: true
      order: 1
  - id: how-does-terbiums-high-melting-point
    title: How does Terbium's high melting point affect the choice of pulse duration in laser cleaning processes for Terbium-doped
      alloys?
    content: Terbium's melting point around 1356°C demands a practical choice of pulse durations for cleaning its doped alloys,
      since extended exposures can cause unwanted heat accumulation. Picosecond pulses outperform nanoseconds by minimizing
      heat-affected zones, enabling precise ablation. At 2.5 J/cm² fluence and 15 ns width, this process delivers efficient
      oxide removal while preserving the base material.
    metadata:
      topic: terbium's high melting point affect
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
