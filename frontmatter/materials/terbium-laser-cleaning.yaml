  - id: can-femtosecond-lasers-prevent-redeposition-of
    title: Can femtosecond lasers prevent re-deposition of Terbium particles during the cleaning of doped glass substrates?
    content: Femtosecond lasers handle Terbium particle re-deposition in doped glass cleaning efficiently, with ultra-short
      pulses that confine the ablation plume and curb its expansion—unlike nanosecond systems, whose 15 ns durations scatter
      debris farther. For Terbium oxides, this process calls for a 1064 nm wavelength and 2.5 J/cm² fluence to keep surfaces
      pristine in electronics or medical applications.
