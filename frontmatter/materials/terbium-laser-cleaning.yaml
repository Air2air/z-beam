    - id: how-do-the-magnetic-properties-of
      title: >-
        How do the magnetic properties of Terbium alloys influence laser cleaning efficacy in surface treatment for
        magnet manufacturing?
      content: >-
        In Tb-Fe alloys, terbium's paramagnetism creates weak fields at room temperature, straightforwardly limiting any
        disruption to laser scanning in magnet production. Yet, stronger ferromagnetism below 220 K may slightly deflect
        galvanometer mirrors. For effective oxide removal, this process uses 1064 nm wavelength at 2.5 J/cm² fluence and
        45 W power to achieve uniform ablation without magnetic interference.
