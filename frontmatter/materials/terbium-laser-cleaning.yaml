        order: 9
    - id: how-to-monitor-and-control-oxidation
      title: How to monitor and control oxidation of Terbium surfaces during laser cleaning to maintain material integrity?
      content: >-
        In this process, shield Terbium's reactive surfaces with argon gas during 1064 nm laser cleaning to curb
        oxidation from ambient air, preserving its rare-earth integrity. Apply in-situ Raman spectroscopy
        straightforwardly for real-time detection of oxide layers. Limit fluence to 2.5 J/cm² for precise ablation
        without sparking further reactions.
