      order: 3
  - id: is-it-possible-to-achieve-residuefree
    title: Is it possible to achieve residue-free laser cleaning of Terbium Gallium Garnet (TGG) crystals used in laser optics?
    content: Yes, you can achieve residue-free cleaning of TGG crystals for Faraday isolators straightforwardly with a 1064
      nm laser at fluences below 2.5 J/cm² to avoid cracking. This process involves 50% beam overlap across three passes at
      500 mm/s scan speed, then verify via optical microscopy for smooth surfaces and no oxide remnants.
    metadata:
      topic: it possible to achieve residue-free
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
