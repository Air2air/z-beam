  - id: what-environmental-regulations-apply-to-disposing
    title: What environmental regulations apply to disposing of waste from laser cleaning Terbium surfaces in semiconductor
      production?
    content: Handling waste from this process of laser cleaning Terbium surfaces in semiconductor production follows EPA's
      RCRA rules for rare-earth materials, classifying them as hazardous owing to toxicity risks from ablated particles produced
      at fluences of 2.5 J/cm². Given its critical nature, focus on recycling these particles efficiently via specialized
      protocols to cut environmental discharge and reclaim value.
