    - id: what-are-the-key-physical-properties
      title: >-
        What are the key physical properties of Terbium that determine its laser ablation threshold in surface treatment
        applications?
      content: >-
        Terbium's density of 8.23 g/cm³ provides practical robustness to its thermal conductivity, shaping heat
        dissipation under laser exposure. With moderate reflectivity spanning UV-IR wavelengths—particularly at 1064
        nm—it enables efficient absorption for ablation. This process hits a key threshold near 2.5 J/cm², permitting
        precise oxide removal without substrate harm in electronics or aerospace cleaning.
      metadata:
