components:
  settings_description: 'When laser cleaning Terbium, you must first watch out for its high reflectivity, which bounces back
    most of the laser energy compared to less reflective rare-earth metals like neodymium. This difference means you need
    to adjust your setup carefully to prevent inefficient cleaning or unintended heating elsewhere. Make sure you start with
    lower power levels right away, so you avoid scattering the beam and wasting energy on surfaces that won''t absorb it well.


    Unlike more absorbent metals in electronics manufacturing, Terbium''s shiny nature demands you increase the number of
    passes slowly while keeping the spot size tight. You should also control scan speeds to let the laser dwell just long
    enough for gradual contaminant removal without risking surface damage. Its dense and hard structure holds up well under
    repeated exposure, but poor thermal conductivity traps heat locally, so monitor for hotspots that could warp delicate
    aerospace parts.


    In my experience with medical applications, this reflective trait sets Terbium apart, requiring you to test absorptivity
    enhancers if cleaning proves stubborn. Always prioritize overlap in your paths to ensure even coverage, restoring the
    finish without compromising its oxidation-prone edges. Approach it methodically, and you''ll clear residues effectively
    for renewable energy components too.'
  micro:
    before: We've found that before laser cleaning, the Terbium surface at 1000x shows a jagged, pitted landscape dotted with
      dark specks of grime and debris that obscure the underlying metal grains. These contaminants form irregular clumps,
      making the whole area look dull and uneven under close inspection. In our experience, this buildup often traps fine
      particles deep in the crevices, complicating any surface analysis right away.
    after: After the laser treatment, though, the same Terbium view at 100
