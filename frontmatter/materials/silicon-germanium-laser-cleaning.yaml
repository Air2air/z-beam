components:
  settingsDescription: I've found that laser cleaning Silicon Germanium works smoothly when you ease into it with gentle settings,
    much like handling pure silicon but with extra caution for its alloy quirks. This material tends to absorb energy more
    readily than silicon alone, thanks to the germanium mix, which helps contaminants lift off without much force. In my experience,
    it restores surfaces in electronics manufacturing or telecom parts effectively, clearing residues while preserving the
    semiconductor integrity that sets it apart from tougher metals. The blend gives it a bit more flexibility under heat compared
    to rigid ceramics, so you can push scan speeds a touch higher once you gauge the response. But watch how it conducts warmth—it's
    not as efficient as silicon, leading to quicker buildup if you're not careful. To avoid cracks or altered properties,
    always test on a scrap piece first and keep passes minimal; rushing it can dull that precise edge SiGe offers in high-tech
    apps.
  micro:
    before: You see the Silicon Germanium surface covered in dark, irregular spots that scatter across it unevenly. Contaminants
      form thick, patchy layers, dulling the material's natural shine completely. At this magnification, the roughness hides
      any smooth features beneath the grime.
    after: After laser treatment, the surface appears clear and uniformly smooth without any visible residues. The material's
      clean texture reflects light evenly now, restoring its original clarity. You notice how the treatment removes all traces
      of dirt for a pristine
    _section:
      sectionTitle: Microscopic Analysis
      sectionDescription: High-magnification comparison of Silicon Germanium surface before and after laser cleaning treatment
      icon: microscope
      order: 5
      variant: default
