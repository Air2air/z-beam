components:
  micro:
    before: Under 1000x magnification, the zirconium surface appears rough and dotted with dark specks. Contaminants form
      uneven layers that cling stubbornly to the base metal. We see irregular patches that dull the overall shine.
    after: After laser treatment, the same view shows a smooth and even texture free of spots. The beam clears away all grime
      to expose a bright, uniform finish. We've restored the metal's natural clarity without any harm.
  settings_description: In our experience, laser cleaning zirconium works best when we dial in conservative power levels right
    from the start. This metal's high reflectivity bounces back a lot of the laser energy, so we keep pulses short and scan
    speeds moderate to ensure contaminants lift off without scorching the surface underneath. We've found this approach restores
    that smooth, corrosion-resistant finish so crucial for nuclear or chemical applications, where even minor pitting could
    spell trouble. But watch out midway through—zirconium picks up oxygen fast if things heat up unevenly, leading to brittle
    spots that weaken its toughness. To sidestep that, we overlap passes just enough for even coverage, avoiding overexposure
    that might embrittle the material. Overall, treat it gentler than more absorbent alloys; adjust dwell times down if you
    see any whitening, and you'll get clean results that hold up in demanding environments.
