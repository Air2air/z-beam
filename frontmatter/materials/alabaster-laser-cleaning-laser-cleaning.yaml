name: alabaster-laser-cleaning
slug: alabaster-laser-cleaning
title: alabaster-laser-cleaning
description: Alabaster, this sedimentary stone, it manifests a distinctive softness,
  which renders it particularly amenable to laser cleaning processes. The material
  exhibits low density and minimal porosity, behaviors that distinguish it from denser
  granites or marbles, allowing contaminants to desorb more readily without subsurface
  penetration. In applications for heritage restoration, the process yields precise
  removal of surface encrustations, preserving the stone's inherent translucency that
  harder counterparts often compromise. It appears that oxidation resistance remains
  high, influenced from controlled pulse durations, while corrosion tendencies persist
  under humid conditions, necessitating cautious fluence adjustments. These traits,
  they ensure minimal thermal stress, leading to smoother finishes compared to abrasive
  methods on similar friable stones. Shows effectiveness in non-contact cleaning,
  dependent from wavelength selection.
micro:
  before: The contamination on alabaster surfaces, it manifests as irregular clusters,
    adhered tenaciously to the fine-grained matrix. These deposits, they exhibit patchy
    distributions, influenced from environmental exposure, which obscure the natural
    porosity. Under magnification, the soiled areas show darkened residues, that penetrate
    shallow fissures, creating a mottled appearance. This layer, it persists in crevices,
    resistant to initial cleaning attempts.
  after: Laser cleaning yields cleaner profiles. The process removes the adhering
    particles effectively, revealing the underlying smoothness. Alabaster's structure,
    it exhibits restored translucency, with pores now visible and unobstructed. Surfaces
    appear uniform, free from the previous encrustations, which demonstrates the method's
    precision. Contamination patterns vanish, leaving the stone's inherent texture
    intact. It seems that selective ablation preserves integrity, avoiding damage
    to delicate features. The clean facet, it contrasts sharply with remnants, highlighting
    removal efficiency.
