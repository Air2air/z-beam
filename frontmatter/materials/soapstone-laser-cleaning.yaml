      items:
      - id: high-talc-content
        question: What laser wavelengths are most effective for cleaning soapstone surfaces without causing thermal damage
          due to its high talc content?
        answer: Soapstone, rich in talc, cleans efficiently with the 1064 nm near-infrared wavelength, as it aligns with talc's
          absorption spectrum and minimizes thermal risks to its soft structure. The 532 nm green alternative often causes
          unwanted ablation through excessive surface heating. For practical results, target 2.5 J/cm² fluence at 100 W to
          remove contaminants gently.
        topic: high talc content
        severity: critical
        acceptedAnswer: true
        expertInfo: &id002
          name: Ikmanda Roswati
          title: Ph.D.
          expertise: *id001
      - id: heat-resistant-properties
        question: How can laser cleaning remove grease and oils from soapstone countertops without altering the material's
          heat-resistant properties?
        answer: As an Indonesian laser physics specialist, I recommend a practical setup with 1064 nm wavelength, 10 ns pulses,
          and 2.5 J/cm² fluence to ablate grease from soapstone countertops. This process confines energy to contaminants,
          preventing substrate heating that might undermine the stone's thermal stability in kitchen or lab settings. Afterward,
          evaluate using surface wettability or FTIR spectroscopy for residue-free outcomes.
        topic: heat-resistant properties
        severity: high
        acceptedAnswer: true
        expertInfo: *id002
      - id: talc-dust-release
        question: What are the main safety concerns when using lasers to clean soapstone sculptures, particularly regarding
          talc dust release?
        answer: When laser cleaning soapstone sculptures at 2.5 J/cm² fluence, fine talc particles may release, potentially
          irritating lungs upon inhalation per MSDS guidelines. In a practical setup for this process, robust ventilation
          captures airborne dust effectively, and operators need N95 respirators along with safety goggles to limit exposure.
        topic: talc dust release
        severity: critical
        acceptedAnswer: true
        expertInfo: *id002
      - id: in-laser-cleaning-equipment-for-soapstone-what-pow
        question: In laser cleaning equipment for soapstone, what power settings prevent cracking or delamination in this
          low-hardness material?
        answer: For delicate soapstone, which cracks easily due to low hardness, a straightforward approach is to keep fluence
          below 1 J/cm² with 100 W power and 500 mm/s scanning speed. This minimizes thermal stress efficiently. Always test
          small patches per manufacturer protocols before full use, applying 1064 nm wavelength for optimal absorption.
        topic: In laser cleaning equipment for soapstone, what po
        severity: critical
        acceptedAnswer: true
        expertInfo: *id002
      - id: discolor-during-laser
        question: Why does soapstone sometimes discolor during laser surface treatment, and how to mitigate it in restoration
          projects?
        answer: Soapstone discolors straightforwardly from laser heat oxidizing iron impurities, which alters its talc-chlorite
          matrix. For restoration, assess samples first for impurity levels, then apply 1064 nm nanosecond lasers at 2.5 J/cm²
          fluence and 100 W power. This process limits thermal spread while preserving the patina.
        topic: discolor during laser
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: non-porous-surface
        question: What training is recommended for operators cleaning soapstone with lasers to avoid compromising its non-porous
          surface?
        answer: Operators require certification in laser safety per ISO 11553 to safely manage soapstone's variable talc-rich
          composition. Hands-on training should emphasize practical settings like 2.5 J/cm² fluence and 100 W power, preserving
          the stone's non-porous integrity during cleaning.
        topic: non-porous surface
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: soapstones-thermal-conductivity
        question: How does soapstone's thermal conductivity affect the efficiency of laser cleaning compared to harder stones
          like granite?
        answer: In laser cleaning, soapstone's low thermal conductivity of 2-4 W/mK localizes heat effectively, boosting efficiency
          against contaminants compared to granite's higher dissipation. This process calls for straightforward settings like
          2.5 J/cm² fluence and 100 W power to achieve uniform results without substrate overheating.
        topic: soapstone's thermal conductivity
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: asbestos-like-talc-exposure
        question: Are there regulatory guidelines for laser cleaning soapstone in historical artifacts to prevent asbestos-like
          talc exposure?
        answer: Yes, OSHA and EPA enforce strict controls on talc dust from soapstone, similar to asbestos risks, including
          pre-cleaning contaminant tests and PPE for workers handling heritage artifacts. For safe laser ablation, that method
          employs a 1064 nm wavelength at 2.5 J/cm² fluence to practically minimize airborne particles in restoration. Record
          all treatments per site protocols for full compliance.
        topic: asbestos-like talc exposure
        severity: critical
        acceptedAnswer: true
        expertInfo: *id002
      - id: industrial-soapstone-surfaces
        question: What common contaminants on industrial soapstone surfaces (e.g., in labs) are best removed via laser versus
          mechanical methods?
        answer: In lab settings, oils and chemical residues often build up on soapstone's polished surfaces. That method of
          laser ablation surpasses mechanical scrubbing efficiently, precisely targeting contaminants at 2.5 J/cm² fluence
          with a 1064 nm wavelength to protect the stone's smooth texture from abrasion or uneven wear.
        topic: industrial soapstone surfaces
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
