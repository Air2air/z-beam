      order: 7
  - id: are-there-regulatory-guidelines-for-laser
    title: Are there regulatory guidelines for laser cleaning soapstone in historical artifacts to prevent asbestos-like talc
      exposure?
    content: Yes, OSHA and EPA enforce strict controls on talc dust from soapstone, similar to asbestos risks, including pre-cleaning
      contaminant tests and PPE for workers handling heritage artifacts. For safe laser ablation, that method employs a 1064
      nm wavelength at 2.5 J/cm² fluence to practically minimize airborne particles in restoration. Record all treatments
      per site protocols for full compliance.
    metadata:
      topic: there regulatory guidelines for laser
