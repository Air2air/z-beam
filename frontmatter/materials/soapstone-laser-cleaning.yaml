  items:
  - id: what-laser-wavelengths-are-most-effective
    title: What laser wavelengths are most effective for cleaning soapstone surfaces without causing thermal damage due to
      its high talc content?
    content: Soapstone, rich in talc, cleans efficiently with the 1064 nm near-infrared wavelength, as it aligns with talc's
      absorption spectrum and minimizes thermal risks to its soft structure. The 532 nm green alternative often causes unwanted
      ablation through excessive surface heating. For practical results, target 2.5 J/cm² fluence at 100 W to remove contaminants
      gently.
    metadata:
      topic: laser wavelengths most effective for
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: true
      order: 1
  - id: how-can-laser-cleaning-remove-grease
    title: How can laser cleaning remove grease and oils from soapstone countertops without altering the material's heat-resistant
      properties?
    content: As an Indonesian laser physics specialist, I recommend a practical setup with 1064 nm wavelength, 10 ns pulses,
      and 2.5 J/cm² fluence to ablate grease from soapstone countertops. This process confines energy to contaminants, preventing
      substrate heating that might undermine the stone's thermal stability in kitchen or lab settings. Afterward, evaluate
      using surface wettability or FTIR spectroscopy for residue-free outcomes.
    metadata:
      topic: laser cleaning remove grease and
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 2
  - id: what-are-the-main-safety-concerns
    title: What are the main safety concerns when using lasers to clean soapstone sculptures, particularly regarding talc
      dust release?
    content: When laser cleaning soapstone sculptures at 2.5 J/cm² fluence, fine talc particles may release, potentially irritating
      lungs upon inhalation per MSDS guidelines. In a practical setup for this process, robust ventilation captures airborne
      dust effectively, and operators need N95 respirators along with safety goggles to limit exposure.
    metadata:
      topic: the main safety concerns using
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 3
  - id: in-laser-cleaning-equipment-for-soapstone
    title: In laser cleaning equipment for soapstone, what power settings prevent cracking or delamination in this low-hardness
      material?
    content: For delicate soapstone, which cracks easily due to low hardness, a straightforward approach is to keep fluence
      below 1 J/cm² with 100 W power and 500 mm/s scanning speed. This minimizes thermal stress efficiently. Always test small
      patches per manufacturer protocols before full use, applying 1064 nm wavelength for optimal absorption.
    metadata:
      topic: in laser cleaning equipment for
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 4
  - id: why-does-soapstone-sometimes-discolor-during
    title: Why does soapstone sometimes discolor during laser surface treatment, and how to mitigate it in restoration projects?
    content: Soapstone discolors straightforwardly from laser heat oxidizing iron impurities, which alters its talc-chlorite
      matrix. For restoration, assess samples first for impurity levels, then apply 1064 nm nanosecond lasers at 2.5 J/cm²
      fluence and 100 W power. This process limits thermal spread while preserving the patina.
    metadata:
      topic: soapstone sometimes dcolor during laser
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 5
  - id: what-training-is-recommended-for-operators
    title: What training is recommended for operators cleaning soapstone with lasers to avoid compromising its non-porous
      surface?
    content: Operators require certification in laser safety per ISO 11553 to safely manage soapstone's variable talc-rich
      composition. Hands-on training should emphasize practical settings like 2.5 J/cm² fluence and 100 W power, preserving
      the stone's non-porous integrity during cleaning.
    metadata:
      topic: training recommended for operators cleaning
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 6
  - id: how-does-soapstones-thermal-conductivity-affect
    title: How does soapstone's thermal conductivity affect the efficiency of laser cleaning compared to harder stones like
      granite?
    content: In laser cleaning, soapstone's low thermal conductivity of 2-4 W/mK localizes heat effectively, boosting efficiency
      against contaminants compared to granite's higher dissipation. This process calls for straightforward settings like
      2.5 J/cm² fluence and 100 W power to achieve uniform results without substrate overheating.
    metadata:
      topic: soapstone's thermal conductivity affect the
      severity: medium
