faq:
  presentation: collapsible
  items:
  - id: what-laser-wavelengths-and-power-settings
    title: What laser wavelengths and power settings are most effective for cleaning organic residues from shale rock surfaces
      without causing thermal cracking?
    content: For cleaning organic residues on shale surfaces—which are prone to cracking due to low thermal conductivity—a
      1064 nm Nd:YAG laser proves particularly effective with 12 ns pulses to minimize heat buildup. Thus, target 2.5 J/cm²
      fluence and 100 W average power, scanning at 500 mm/s for precise ablation without harming the stone.
    metadata:
      topic: laser wavelengths and power settings
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: true
      order: 1
  - id: how-does-the-high-porosity-of
    title: How does the high porosity of shale affect the efficiency of laser ablation in removing hydrocarbon contaminants
      during oil shale processing?
    content: In oil processing, shale's inherent porosity notably hampers laser ablation efficiency for hydrocarbon removal.
      The 1064 nm beam at 2.5 J/cm² fluence quickly vaporizes surface contaminants yet cannot reach deep pores, thus risking
      incomplete cleaning. Petroleum industry forums report cases where mechanical agitation raised yields by up to 25%, usually
      requiring two passes at 50 kHz.
    metadata:
      topic: the high porosity of shale
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 2
  - id: what-safety-precautions-are-necessary-when
    title: What safety precautions are necessary when using fiber lasers to clean shale in archaeological sites to avoid silica
      dust inhalation?
    content: When ablating shale using 1064 nm fiber lasers at 100 W, notably, the quartz content produces hazardous silica
      dust. Thus, wear NIOSH-approved respirators to remain below OSHA's 50 μg/m³ exposure limit. Implement local exhaust
      ventilation for particulate capture, and equip ANSI Z136.1-compliant goggles to shield eyes from reflections.
    metadata:
      topic: safety precautions necessary using fiber
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 3
  - id: in-laser-cleaning-of-shale-formations
    title: In laser cleaning of shale formations for fracking preparation, what are common issues with surface re-contamination
      after treatment?
    content: After laser cleaning shale formations at 2.5 J/cm² fluence with 1064 nm wavelength, re-contamination notably
      arises from clay minerals' strong adhesion, which traps airborne particles. Employ surface spectroscopy for real-time
      monitoring to detect residues. Thus, manufacturer insights suggest applying post-scan sealing or adjusting speeds to
      500 mm/s for enhanced protection.
    metadata:
      topic: in laser cleaning of shale
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 4
  - id: how-do-the-mineral-compositions-in
    title: How do the mineral compositions in different shale types (e.g., clay-rich vs. carbonate-rich) influence the choice
      of laser cleaning methods?
    content: Clay-rich shales, dominated by silicates, show notably higher thermal stability. This enables effective contaminant
      ablation at 2.5 J/cm² fluence and 1064 nm wavelength without harming the substrate. Carbonate-rich variants, particularly
      prone to rapid decomposition, thus require lower energy densities to avoid unwanted reactions and achieve uniform results
      in archaeological restorations.
    metadata:
      topic: do the mineral compositions in
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 5
  - id: what-are-the-environmental-impacts-of
    title: What are the environmental impacts of laser cleaning shale surfaces in mining operations, particularly regarding
      volatile organic compound emissions?
    content: In mining applications, laser cleaning of shale can release VOCs from kerogen through ablation, particularly
      at fluences exceeding 2.5 J/cm², risking EPA limit violations without safeguards. Notably, with 100 W power and 50 kHz
      repetition rates, emissions hold below 50 ppm per industry guides—integrate local exhaust for ongoing compliance.
    metadata:
      topic: the environmental impacts of laser
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 6
  - id: can-pulsed-lasers-effectively-clean-microfractures
    title: Can pulsed lasers effectively clean micro-fractures in shale without propagating cracks, and what parameters prevent
      this?
    content: Notably, pulsed lasers excel at cleaning micro-fractures in brittle shale without propagating cracks, owing to
      their brief 12 ns pulses that limit shock waves and heat diffusion. Thus, maintain fluence below 2.5 J/cm² and scan
      at 500 mm/s, as engineering forums indicate, for precise ablation without harm.
    metadata:
      topic: pulsed lasers effectively clean micro-fractures
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
