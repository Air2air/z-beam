    _display:
      _open: false
      order: 7
  - id: what-physical-properties-of-shale-like
    title: What physical properties of shale, like its low tensile strength, should be considered when selecting laser cleaning
      equipment for restoration projects?
    content: Shale's low tensile strength renders it prone to cracking; thus, favor portable laser systems for field restoration
      to preserve surface integrity. Notably, choose equipment with 1064 nm wavelength and 100 W power, while keeping fluence
      below 2.5 J/cm² for precise, non-damaging cleaning.
    metadata:
      topic: physical properties of shale, like
      severity: high
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 8
  - id: how-does-moisture-content-in-shale
    title: How does moisture content in shale samples impact the laser cleaning process for removing surface biofilms in environmental
      remediation?
    content: Shale with high moisture content can particularly trigger steam generation during laser cleaning at 2.5 J/cm²
      fluence, leading to risks of micro-cracks or uneven biofilm removal in remediation work. Thus, pre-drying samples to
      below 5% humidity boosts efficacy, supporting stable ablation at 100 W power while minimizing thermal damage to hydrated
      minerals. This delivers safer, more uniform surface treatment.
    metadata:
      topic: moture content in shale samples
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 9
  - id: what-are-standard-protocols-for-validating
    title: What are standard protocols for validating the cleanliness of laser-treated shale surfaces in laboratory testing
      for petroleum geochemistry?
    content: In petroleum geochemistry labs, particularly for shale analysis, validate laser-cleaned surfaces via XPS to ensure
      organic residues stay below 100 ppm, alongside SEM imaging for debris-free morphology. Manufacturer protocols specifically
      endorse 2.5 J/cm² fluence at 1064 nm wavelength, provided no particulates hinder mineral assessment, thus safeguarding
      shale integrity for reliable hydrocarbon evaluation.
