pageDescription: When cleaning shale with lasers, I've seen it respond well to focused
  pulses that clear surface grime quickly, as the stone absorbs energy deeply yet
  spreads heat slowly, keeping the layers intact—but avoid overexposure to prevent
  subtle cracking.
