    _display:
      _open: false
      order: 7
  - id: for-automated-laser-cleaning-of-complex
    title: For automated laser cleaning of complex CMC geometries (like airfoils), how critical is beam delivery and scanning
      control to ensure uniform cleaning without hot spots?
    content: For intricate CMC airfoils, accurate 3D beam delivery proves essential. Notably, galvo scanners facilitate swift
      contour tracking at 500 mm/s, while closed-loop LIBS monitoring specifically maintains uniform 5 J/cm² fluence to avert
      hot spots and thermal damage.
    metadata:
      topic: for automated laser cleaning of
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
