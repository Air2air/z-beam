components:
  settings_description: When laser cleaning Ceramic Matrix Composites, we always begin by assessing the surface for any embedded
    fibers, as these can trap contaminants and lead to uneven removal if not handled carefully from the outset. This early
    check helps prevent thermal stress that might crack the brittle matrix, so we recommend a gentle initial scan to test
    response. We've found that starting with reduced power settings clears surface buildup effectively without overwhelming
    the material's inherent heat resistance, which keeps things stable up to high temperatures in applications like aerospace
    parts. As you proceed, overlap your passes moderately to account for the composite's layered structure—unlike pure metals,
    this fiber reinforcement demands a slower scan speed to avoid delamination. In our experience, this approach leverages
    the material's durability and low expansion under heat, ensuring clean results for automotive or energy components while
    dodging common pitfalls like subsurface damage from over-aggressive pulses. Finally, inspect between passes to confirm
    no oxidation creeps in, adjusting as needed for optimal preservation.
  micro:
    before: I've seen contaminated CMC surfaces under magnification show a rough, dusty layer everywhere. Particles cling
      tightly to the fibers, making the whole thing look uneven and clogged. This buildup hides the material's true texture
      completely.
    after: After laser treatment, the same surface appears smooth and open. Fibers stand out clearly now, free from any clinging
      debris. The clean look reveals a uniform, fresh structure overall.
