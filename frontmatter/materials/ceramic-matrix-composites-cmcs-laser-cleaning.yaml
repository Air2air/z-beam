faq:
  presentation: collapsible
  items:
  - id: what-is-the-maximum-safe-laser
    title: What is the maximum safe laser fluence (J/cm²) for cleaning CMCs without damaging the SiC matrix or fiber reinforcement?
    content: For typical SiC/SiC composites, I suggest keeping fluence below 2-4 J/cm² using nanosecond pulses at 1064 nm.
      Notably, this range removes oxides and carbon deposits effectively while preserving matrix integrity. Thus, the precise
      safe threshold depends on your specific fiber type and initial surface contamination level.
    metadata:
      topic: the maximum safe laser fluence
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: true
      order: 1
  - id: how-do-i-remove-environmental-contaminants
    title: How do I remove environmental contaminants like carbonaceous soot from CMC turbine blades without altering the
      underlying protective EBC (Environmental Barrier Coating)?
    content: Employing a 1064 nm wavelength at 5 J/cm² fluence particularly ablates carbonaceous soot, while preserving Yb₂SiO₅
      EBC integrity. We sustain a 500 mm/s scan speed with 50 μm spot size to guarantee contaminant removal absent thermal
      alteration. Thus, optical microscopy post-processing verifies surface preservation.
    metadata:
      topic: do i remove environmental contaminants
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 2
  - id: what-laser-wavelength-eg-1064nm-532nm
    title: What laser wavelength (e.g., 1064nm, 532nm, or 10.6μm) is most effective for cleaning CMCs, and why?
    content: In CMC laser cleaning, the 1064nm wavelength at 5 J/cm² fluence notably achieves optimal absorption balance.
      This specifically removes contaminants while preserving the SiC matrix and carbon fibers, thus preventing thermal damage
      to the composite's critical constituents.
    metadata:
      topic: laser wavelength (e.g., 1064nm, 532nm,
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 3
  - id: can-laser-cleaning-induce-microcracks-or
    title: Can laser cleaning induce micro-cracks or thermal stress damage in the CMC's brittle ceramic matrix?
    content: Yes, notably, laser cleaning can induce micro-cracks in CMCs due to thermal shock. Employing nanosecond pulses
      at 10 ns with a fluence of 5 J/cm² helps minimize this risk by restricting heat diffusion. Thus, process monitoring
      remains essential for detecting subsurface thermal stress damage.
    metadata:
      topic: laser cleaning induce micro-cracks or
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 4
  - id: what-are-the-best-practices-for
    title: What are the best practices for handling the nanoparticles and vapors generated during laser cleaning of CMCs,
      especially those with carbon fibers?
    content: Applying a 5 J/cm² fluence notably generates SiC nanoparticles and carbon fibers that demand HEPA filtration.
      Thus, uphold industrial hygiene through adequate ventilation and respiratory safeguards for operators managing these
      ultrafine byproducts in CMC laser processing.
    metadata:
      topic: the best practices for handling
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 5
  - id: how-does-laser-cleaning-affect-the
    title: How does laser cleaning affect the surface roughness and porosity of a CMC, and what is the impact on subsequent
      re-coating or re-inspection?
    content: Properly tuned 1064 nm laser cleaning at 5 J/cm² minimally alters CMC topography. Specifically, it can slightly
      increase surface roughness by opening sealed pores, which notably enhances coating adhesion but may require NDE signal
      compensation for accurate inspection.
    metadata:
      topic: laser cleaning affect the surface
      severity: high
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 6
  - id: is-laser-cleaning-a-viable-method
    title: Is laser cleaning a viable method for depainting CMC components, and what are the risks of leaving residual chemical
      contaminants from the paint?
    content: Notably, laser depainting at 5 J/cm² removes organic coatings from CMCs effectively, with minimal substrate interaction.
      Particularly, the key risk involves incomplete paint pyrolysis, potentially leaving carbonaceous residues unseen in
      mechanical approaches. Thus, strict parameter control proves vital to prevent this contamination.
    metadata:
      topic: laser cleaning a viable method
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
