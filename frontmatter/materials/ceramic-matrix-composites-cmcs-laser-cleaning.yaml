      items:
      - id: sic-matrix
        question: What is the maximum safe laser fluence (J/cm²) for cleaning CMCs without damaging the SiC matrix or fiber
          reinforcement?
        answer: For typical SiC/SiC composites, I suggest keeping fluence below 2-4 J/cm² using nanosecond pulses at 1064
          nm. Notably, this range removes oxides and carbon deposits effectively while preserving matrix integrity. Thus,
          the precise safe threshold depends on your specific fiber type and initial surface contamination level.
        topic: SiC matrix
        severity: medium
        acceptedAnswer: true
        expertInfo: &id002
          name: Yi-Chun Lin
          title: Ph.D.
          expertise: *id001
      - id: environmental-barrier-coating
        question: How do I remove environmental contaminants like carbonaceous soot from CMC turbine blades without altering
          the underlying protective EBC (Environmental Barrier Coating)?
        answer: Employing a 1064 nm wavelength at 5 J/cm² fluence particularly ablates carbonaceous soot, while preserving
          Yb₂SiO₅ EBC integrity. We sustain a 500 mm/s scan speed with 50 μm spot size to guarantee contaminant removal absent
          thermal alteration. Thus, optical microscopy post-processing verifies surface preservation.
        topic: Environmental Barrier Coating
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: laser-wavelength
        question: What laser wavelength (e.g., 1064nm, 532nm, or 10.6μm) is most effective for cleaning CMCs, and why?
        answer: In CMC laser cleaning, the 1064nm wavelength at 5 J/cm² fluence notably achieves optimal absorption balance.
          This specifically removes contaminants while preserving the SiC matrix and carbon fibers, thus preventing thermal
          damage to the composite's critical constituents.
        topic: laser wavelength
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: brittle-ceramic-matrix
        question: Can laser cleaning induce micro-cracks or thermal stress damage in the CMC's brittle ceramic matrix?
        answer: Yes, notably, laser cleaning can induce micro-cracks in CMCs due to thermal shock. Employing nanosecond pulses
          at 10 ns with a fluence of 5 J/cm² helps minimize this risk by restricting heat diffusion. Thus, process monitoring
          remains essential for detecting subsurface thermal stress damage.
        topic: brittle ceramic matrix
        severity: critical
        acceptedAnswer: true
        expertInfo: *id002
      - id: carbon-fibers
        question: What are the best practices for handling the nanoparticles and vapors generated during laser cleaning of
          CMCs, especially those with carbon fibers?
        answer: Applying a 5 J/cm² fluence notably generates SiC nanoparticles and carbon fibers that demand HEPA filtration.
          Thus, uphold industrial hygiene through adequate ventilation and respiratory safeguards for operators managing these
          ultrafine byproducts in CMC laser processing.
        topic: carbon fibers
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: surface-roughness-and-porosity
        question: How does laser cleaning affect the surface roughness and porosity of a CMC, and what is the impact on subsequent
          re-coating or re-inspection?
        answer: Properly tuned 1064 nm laser cleaning at 5 J/cm² minimally alters CMC topography. Specifically, it can slightly
          increase surface roughness by opening sealed pores, which notably enhances coating adhesion but may require NDE
          signal compensation for accurate inspection.
        topic: surface roughness and porosity
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: residual-chemical-contaminants
        question: Is laser cleaning a viable method for depainting CMC components, and what are the risks of leaving residual
          chemical contaminants from the paint?
        answer: Notably, laser depainting at 5 J/cm² removes organic coatings from CMCs effectively, with minimal substrate
          interaction. Particularly, the key risk involves incomplete paint pyrolysis, potentially leaving carbonaceous residues
          unseen in mechanical approaches. Thus, strict parameter control proves vital to prevent this contamination.
        topic: residual chemical contaminants
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: complex-cmc-geometries
        question: For automated laser cleaning of complex CMC geometries (like airfoils), how critical is beam delivery and
          scanning control to ensure uniform cleaning without hot spots?
        answer: For intricate CMC airfoils, accurate 3D beam delivery proves essential. Notably, galvo scanners facilitate
          swift contour tracking at 500 mm/s, while closed-loop LIBS monitoring specifically maintains uniform 5 J/cm² fluence
          to avert hot spots and thermal damage.
        topic: complex CMC geometries
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: what-is-the-fundamental-difference-in-laser-intera
        question: What is the fundamental difference in laser interaction between a SiC/SiC CMC and a C/C (Carbon-Carbon)
          composite, and how does that change the cleaning strategy?
        answer: The core distinction arises from carbon's strong 1064 nm absorption and oxidation susceptibility, compared
          to SiC's robust ablation threshold around 5 J/cm². Specifically, C/C processing requires inert gas support and milder
          fluence levels, while SiC/SiC tolerates harsher ns-pulse conditions. Thus, these factors shape unique laser tactics
          for each composite.
        topic: What is the fundamental difference in laser intera
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: after-laser-cleaning-what-non-destructive-testing-
        question: After laser cleaning, what non-destructive testing (NDE) methods are most reliable for verifying surface
          integrity and the absence of heat-affected zones on CMCs?
        answer: For verifying CMC surface integrity post-laser cleaning at 5 J/cm², fluorescent penetrant inspection particularly
          excels at revealing micro-cracks. Notably, pulsed thermography offers high reliability in detecting subsurface thermal
          alterations by mapping effusivity changes in potential heat-affected zones, all without contact.
        topic: After laser cleaning, what non-destructive testing
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
