    _display:
      _open: false
      order: 8
  - id: what-is-the-fundamental-difference-in
    title: What is the fundamental difference in laser interaction between a SiC/SiC CMC and a C/C (Carbon-Carbon) composite,
      and how does that change the cleaning strategy?
    content: The core distinction arises from carbon's strong 1064 nm absorption and oxidation susceptibility, compared to
      SiC's robust ablation threshold around 5 J/cm². Specifically, C/C processing requires inert gas support and milder fluence
      levels, while SiC/SiC tolerates harsher ns-pulse conditions. Thus, these factors shape unique laser tactics for each
      composite.
    metadata:
      topic: the fundamental difference in laser
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 9
  - id: after-laser-cleaning-what-nondestructive-testing
    title: After laser cleaning, what non-destructive testing (NDE) methods are most reliable for verifying surface integrity
      and the absence of heat-affected zones on CMCs?
    content: For verifying CMC surface integrity post-laser cleaning at 5 J/cm², fluorescent penetrant inspection particularly
      excels at revealing micro-cracks. Notably, pulsed thermography offers high reliability in detecting subsurface thermal
      alterations by mapping effusivity changes in potential heat-affected zones, all without contact.
    metadata:
