  items:
  - id: can-you-safely-laser-clean-polystyrene
    title: Can you safely laser clean polystyrene surfaces without melting or damaging the material?
    content: Polystyrene's 240°C melting point requires essential precision in laser control. Employing a 1064 nm wavelength
      at 25 W average power with 100 ns pulse width notably removes contaminants while curbing heat buildup. Crucially, fluence
      must stay below 2.5 J/cm² to prevent substrate thermal damage.
    metadata:
      topic: you safely laser clean polystyrene
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: true
      order: 1
  - id: what-laser-wavelength-is-most-suitable
    title: What laser wavelength is most suitable for cleaning polystyrene without causing degradation?
    content: For cleaning polystyrene, near-IR wavelengths around 1064 nm stand out as optimal. They deliver essential absorption
      to remove contaminants while limiting thermal penetration into the substrate. Apply a fluence of about 2.5 J/cm² with
      a 100 µm spot size for effective surface cleaning without polymer degradation.
    metadata:
      topic: laser wavelength most suitable for
      severity: high
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 2
  - id: does-laser-cleaning-polystyrene-release-styrene
    title: Does laser cleaning polystyrene release styrene monomers or other hazardous fumes?
    content: Yes, laser cleaning of polystyrene at 2.5 J/cm² fluence can notably release hazardous styrene monomers. Thermal
      decomposition demands essential robust fume extraction. A 100 µm spot size paired with 500 mm/s scan speed distinctly
      reduces localized heating and fume generation.
    metadata:
      topic: laser cleaning polystyrene release styrene
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 3
  - id: what-laser-parameters-power-pulse-duration
    title: What laser parameters (power, pulse duration, repetition rate) work best for removing contaminants from polystyrene?
    content: For cleaning polystyrene, it's essential to keep fluence under 2.5 J/cm² with nanosecond pulses at 20 kHz. Scanning
      a 100 µm spot at 500 mm/s notably removes contaminants while avoiding substrate melting through precise thermal control.
    metadata:
      topic: laser parameters (power, pulse duration,
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 4
  - id: can-laser-cleaning-be-used-to
    title: Can laser cleaning be used to prepare polystyrene surfaces for bonding or painting?
    content: Laser cleaning offers notable preparation for polystyrene surfaces via a 1064nm wavelength at 2.5 J/cm². This
      essential technique eliminates contaminants, elevates surface energy for enhanced bonding and painting, and surpasses
      solvent-based alternatives through superior precision without residues.
    metadata:
      topic: laser cleaning be used to
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 5
  - id: how-does-laser-cleaning-affect-the
    title: How does laser cleaning affect the surface roughness and optical properties of transparent polystyrene?
    content: Achieving optical clarity through laser cleaning at 2.5 J/cm² fluence and 500 mm/s scan speed proves essential.
      This precise technique removes contaminants without causing surface hazing or micro-roughness, notably upholding the
      material's inherent light transmission qualities.
    metadata:
      topic: laser cleaning affect the surface
      severity: high
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 6
  - id: is-laser-cleaning-effective-for-removing
    title: Is laser cleaning effective for removing mold release agents from polystyrene components?
    content: In laser cleaning, it's notable how effectively a 1064nm wavelength at 2.5 J/cm² removes silicone-based mold
      releases from polystyrene. This fluence level ablates the contaminant layer without thermally degrading the underlying
      polymer substrate, ensuring optimal surface quality.
    metadata:
      topic: laser cleaning effective for removing
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 7
  - id: what-safety-precautions-are-specific-to
    title: What safety precautions are specific to laser cleaning polystyrene versus other plastics?
    content: Polystyrene shows a notably low ignition threshold, calling for strict fluence control below 2.5 J/cm² to avert
      combustion. Decomposition releases highly toxic styrene monomer, so essential fume extraction and air-purifying respirators
      are vital—distinct from most engineering plastics.
    metadata:
      topic: safety precautions specific to laser
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 8
  - id: can-laser-cleaning-create-electrostatic-issues
    title: Can laser cleaning create electrostatic issues on polystyrene surfaces?
    content: Polystyrene exhibits notable triboelectric traits, leaving it prone to static charge buildup. Applying laser
      cleaning at 2.5 J/cm² risks creating surface charges that draw airborne particles afterward. Optimizing parameters remains
      essential for countering this electrostatic issue and avoiding dust buildup on the treated surface.
    metadata:
      topic: laser cleaning create electrostatic sues
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 9
  - id: how-does-laser-cleaning-compare-to
    title: How does laser cleaning compare to solvent cleaning for delicate polystyrene parts?
    content: Laser cleaning entirely eliminates solvent-induced stress cracking risks, an essential advantage for delicate
      polystyrene components. Employing a precisely controlled 1064 nm wavelength at 2.5 J/cm² fluence, it removes contaminants
      while upholding dimensional stability. This dry process notably sidesteps the environmental and safety issues tied to
      chemical residues.
    metadata:
