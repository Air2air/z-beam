components:
  settings_description: The key with Polyethylene lies in its flexibility compared to stiffer plastics like PVC—it absorbs
    laser energy well without cracking, making surface buildup easy to remove. I've seen it restore food packaging finishes
    smoothly. But watch out mid-process; its low heat tolerance can cause softening if you dwell too long. Keep scans quick
    and light to avoid distortion, bringing back that clean, glossy look every time.
  micro:
    before: At 1000x magnification, the polyethylene surface looks rough and cluttered with dark specks and sticky residues
      that cling tightly to its texture. I've seen how these contaminants create uneven patches, making the material seem
      dull and irregular under the lens. This buildup hides the plastic's natural smoothness, blocking a clear view of its
      underlying structure.
    after: After laser treatment at the same magnification, the polyethylene surface appears smooth and even, free from those
      clinging particles that once marred it. The treatment has restored a
