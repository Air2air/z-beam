components:
  settings_description: When laser cleaning Silicon Nitride, watch its brittleness first—it cracks easily under sudden heat.
    I've seen that happen when folks push too hard right away. This works best if you start with gentle pulses to warm the
    surface slowly, building up over a few passes. That way, you remove contaminants without risking fractures, keeping the
    material's tough, heat-resistant nature intact. Just avoid high speeds early on.
  micro:
    before: I've seen how the contaminated Silicon Nitride surface at 1000x looks cluttered with scattered dark specks and
      uneven buildup. Grime clings in patchy layers that roughen the texture noticeably. This makes the whole area appear
      dull and obscured under close view.
    after: After laser treatment, the surface turns smooth with those specks gone completely. The texture evens out, revealing
      a clear and uniform shine. I've noticed it looks pristine now, but watch for any faint residues that might linger if
