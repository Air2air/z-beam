      Display:
        Open: false
        order: 2
    - id: does-laser-cleaning-of-dysprosium-or
      title: Does laser cleaning of dysprosium or its compounds pose a significant fire or explosion hazard?
      content: >-
        Indeed, fine dysprosium particulate shows notable pyrophoricity. Bulk metal stays stable, yet the 80 µm laser
        ablation process creates reactive fines. Essential mitigation involves an inert argon atmosphere plus robust
        fume extraction to avert ignition, particularly at the 2.5 J/cm² fluence threshold.
      metadata:
        topic: laser cleaning of dysprosium or
        severity: critical
        acceptedAnswer: true
        expertInfo:
          name: Alessandro Moretti
          title: Ph.D.
          expertise:
            - Laser-Based Additive Manufacturing
      Display:
        Open: false
        order: 3
    - id: what-are-the-specific-health-risks
      title: >-
        What are the specific health risks from inhaling fumes or nanoparticles generated during the laser cleaning of
        dysprosium?
      content: >-
        Inhaling dysprosium oxide nanoparticles amid 1064 nm laser cleaning at 2.5 J/cm² carries notable pulmonary
        toxicity risks. SDS requires essential engineering controls like HEPA filtration, plus a P100 respirator, to
        shield workers from these persistent fine particulates.
      metadata:
        topic: the specific health rks from
        severity: medium
        acceptedAnswer: true
        expertInfo:
          name: Alessandro Moretti
          title: Ph.D.
          expertise:
            - Laser-Based Additive Manufacturing
      Display:
        Open: false
        order: 4
    - id: how-do-you-properly-handle-and
      title: >-
        How do you properly handle and dispose of the waste generated from laser cleaning dysprosium-contaminated
        surfaces?
      content: >-
        The dysprosium oxide (Dy₂O₃) powder generated, while not inherently dangerous, requires thorough
        characterization. Its distinct low specific heat of 170 J/(kg·K) renders it essential to enclose waste in sealed
        containers, thereby averting dust release and adhering to local metal oxide disposal guidelines.
      metadata:
        topic: do you properly handle and
        severity: high
        acceptedAnswer: true
        expertInfo:
          name: Alessandro Moretti
          title: Ph.D.
          expertise:
            - Laser-Based Additive Manufacturing
      Display:
        Open: false
        order: 5
    - id: can-a-standard-pulsed-fiber-laser
      title: >-
        Can a standard pulsed fiber laser effectively clean dysprosium stains from a stainless steel substrate without
        causing damage?
      content: >-
        Indeed, a standard pulsed fiber laser effectively removes dysprosium from stainless steel. Dysprosium's notably
        low thermal conductivity of 10.7 W/(m·K) allows ablation at a fluence of about 2.5 J/cm², while precise
        parameter control remains essential to avoid damaging the substrate.
      metadata:
        topic: a standard pulsed fiber laser
        severity: critical
        acceptedAnswer: true
