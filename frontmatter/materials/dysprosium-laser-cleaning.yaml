        order: 8
    - id: are-there-any-regulatory-or-compliance
      title: Are there any regulatory or compliance issues specific to laser cleaning operations involving dysprosium?
      content: >-
        A notable compliance issue stems from airborne particulates of the 8.55 g/cm³ dysprosium. Although OSHA's PEL
        for nuisance dust applies, the 1064 nm laser's 2.5 J/cm² ablation threshold generates fine aerosols that
        essential demand air monitoring. Furthermore, document waste disposal for the gathered metallic dust.
