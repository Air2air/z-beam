name: plaster-laser-cleaning
slug: plaster-laser-cleaning
page_title: plaster-laser-cleaning
micro:
  before: In observations at 1000x magnification, contamination on plaster surface
    appears as irregular clusters. These particles stick tightly, so they form dark
    patches and rough textures. Before laser cleaning is applied, dirt layers build
    up and cover pores completely. This buildup, it reduces smoothness and hides natural
    grain patterns of plaster.
  after: After treatment removes contaminants, surface exhibits clear uniformity.
    Grime is already gone, and original material shows fine, even features. Laser
    process cleans effectively, so residues just now disappear from edges. During
    exposure, heat targets dirt only, because plaster stays intact with its porous
    structure. Clean areas reflect light better, and patterns emerge without damage.
