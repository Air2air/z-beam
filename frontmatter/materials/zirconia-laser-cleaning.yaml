  - id: what-are-the-potential-changes-in
    title: What are the potential changes in zirconia's mechanical properties after laser surface treatment?
    content: Laser treatment of zirconia at 5 J/cm² fluence typically boosts surface hardness by 10-20% through localized
      densification, but can fairly diminish fracture toughness by up to 15% if microcracks develop, as SEM reveals a roughened
      morphology. Follow ASTM C1161 for reliable post-treatment toughness assessments.
    metadata:
