micro:
  before: Laser cleaning process on bamboo surface starts with contamination observation at 1000x magnification. This contamination,
    it forms irregular layers over fibrous structure, so natural bamboo patterns become hidden. Bamboo exhibits dense, hardwood
    characteristics, with unique vascular bundles and siliceous nodes visible underneath. Contamination appears as clustered
    particles and organic residues filling pores, because exposure to environment causes buildup. In observations before treatment,
    surface shows roughness from adhered dirt, still present in deep grooves.
  after: After laser treatment is applied, contamination already removed effectively. Clean surface reveals uniformity, with
    fibers now exposed clearly. Treatment achieves complete removal of layers, so original bamboo texture emerges prominent.
    At the surface during post-cleaning view, no residues detected, and natural regional patterns like longitudinal striations
    appear sharp. Process removes contamination without damaging structure, because laser targets only unwanted materials.
    From the data in microscopic scans, clean bamboo exhibits smooth, durable features, ready for applications in crafts or
    construction. This difference highlights laser cleaning benefits for wood preservation.
