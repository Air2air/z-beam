components:
  subtitle: Bamboo combines a tensile strength of 180 MPa with a low density of 700 kg/m³, offering a remarkable strength-to-weight
    ratio that outperforms many traditional hardwoods
  description: The key with Bamboo is its grass-like structure in the hardwood category, giving it unusual flexural strength
    around 140 MPa that holds up well under laser stress. We've found it cleans contaminants effectively at 100 W with 1064
    nm wavelength and 2.5 J/cm² fluence, thanks to high absorption at 92%. But because thermal conductivity sits low at 0.2
    W/m·K, heat builds slowly in its porous 0.58 matrix— so keep scan speed to 500 mm/s and overlap passes 50% to avoid charring
    the fibers. Start with one pass and check; its 588 K destruction point leaves little margin if you push too hard.
  settingsDescription: When laser cleaning bamboo, you'll want to treat it differently from typical hardwoods because its
    grass-like fibers make it more flexible and porous. This high absorption pulls in laser energy quickly, clearing contaminants
    without deep penetration. But watch out mid-process—its low heat spread can cause localized scorching if you push power
    too high. So start low and scan slowly to keep the structure intact.
  micro:
    before: We've examined the bamboo surface up close, and it shows thick layers of dirt clinging tightly to the fibers.
      Grime fills the tiny pores, making the whole texture look rough and uneven. Scattered spots of buildup hide the natural
      grain beneath.
    after: After our laser treatment, the same view reveals a smooth, clear expanse of fibers standing out sharply. Pores
      now sit open and empty, free from any residue that clouded them before. The grain emerges crisp and uniform across the
      entire area, so
