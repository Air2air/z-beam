components:
  settings_description: I've seen epoxy resin composites behave differently from plain metals during laser cleaning, mainly
    because their fiber-reinforced structure absorbs energy more readily without reflecting it away. This helps remove contaminants
    efficiently, as the matrix holds up well under controlled heat, preventing quick degradation that you'd get with softer
    plastics. So, approach it by starting with gentler passes to leverage that absorption for clean results. Just watch out
    for localized overheating at the end, which can cause delamination if you push too hard.
  micro:
    before: You can see the epoxy resin composite surface covered in scattered dirt particles that cling tightly to its rough
      texture. Tiny cracks and uneven spots dot the area, making the whole thing look cluttered and worn from contamination.
      Debris buildup hides the material's true form beneath a hazy layer of grime.
    after: After laser treatment, the surface appears smooth and even, with no traces of those clinging particles left behind.
      Clear fibers emerge sharply, showing a uniform shine across the cleaned area. The texture now feels
