micro:
  before: Epoxy resin composites, they show unique surface patterns in microscopic views at high magnification. This material,
    fiber-reinforced type, exhibits dense matrix with embedded fibers that provide strength and durability. Contamination
    appears as irregular layers covering fibers, so cleaning process targets these deposits effectively.
  after: Before laser cleaning is applied, surfaces display thick buildup of residues and oxides. These contaminants, they
    form patchy coatings on resin areas, reducing smoothness and hiding fiber details. Particles cling tightly to matrix edges,
    creating rough textures visible in scans. Exposure to environment causes such layers, so laser treatment removes them
    without damaging base material.
