faq:
  presentation: collapsible
  items:
  - id: how-does-laser-cleaning-restore-borosilicate
    title: How does laser cleaning restore borosilicate glass without causing thermal damage?
    content: Laser cleaning employs precise, short-pulse lasers to ablate contaminants from borosilicate glass, particularly
      leveraging its low thermal expansion to prevent cracks. This non-contact approach thus maintains material integrity,
      effectively clearing residues in 10-20 seconds per spot.
    metadata:
      topic: laser cleaning restore borosilicate glass
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: true
      order: 1
  - id: what-challenges-arise-when-laser-cleaning
    title: What challenges arise when laser cleaning borosilicate glass surfaces?
    content: Challenges, particularly micro-cracking when laser intensity surpasses the glass's thermal limits, along with
      residue re-deposition on porous edges, pose key risks. Thus, operators should precisely calibrate wavelengths (e.g.,
      1064 nm) to balance cleaning efficiency against the material's inherent brittleness.
    metadata:
      topic: challenges laser cleaning borosilicate glass
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 2
  - id: can-laser-cleaning-improve-the-optical
    title: Can laser cleaning improve the optical clarity of contaminated borosilicate labware?
    content: Yes, this approach notably boosts clarity by vaporizing organic and metallic contaminants without abrasives,
      thus restoring borosilicate's inherent transparency. Particularly effective against haze from chemical exposure, it
      prolongs lab equipment lifespan while curbing environmental harm through dry methods. Suited for precision optics. (47
      words)
    metadata:
      topic: laser cleaning improve the optical
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 3
  options:
    autoOpenFirst: true
    sortBy: severity
