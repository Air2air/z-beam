components:
  settingsDescription: We've found that when laser cleaning borosilicate glass, you need to start with gentle power levels
    right away, since its brittle nature compared to tougher metals can lead to cracks if heat builds up too fast. Begin by
    scanning slowly to let its superior heat resistance—unlike everyday soda-lime glass—absorb energy without shocking the
    surface. Then, increase passes gradually, overlapping beams to clear contaminants evenly while preserving the glass's
    clarity and strength for lab or medical uses.
  micro:
    before: At 1000x magnification, the borosilicate glass surface shows heavy contamination with irregular spots and clinging
      debris. We notice thick, uneven layers of grime that obscure the underlying material completely. It appears rough and
      dull, hiding any natural smoothness beneath.
    after: After laser treatment at the same magnification, the borosilicate glass surface reveals a spotless shine without
      lingering spots or debris. We've observed even, uniform layers that expose the material's true clarity fully. It looks
      smooth and vibrant, restoring its
