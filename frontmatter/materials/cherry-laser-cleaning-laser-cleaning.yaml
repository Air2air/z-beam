page_title: cherry-laser-cleaning
micro:
  before: Cherry wood's intricate grain patterns stand out under close microscopic
    inspection, revealing how laser cleaning tackles contamination head-on. Before
    treatment, the surface clings to stubborn dirt and residues that seep into its
    porous structure, forming irregular clusters along the natural wood fibers. These
    contaminants dull the wood's warm, reddish hues and obscure the fine, wavy lines
    that define cherry hardwood.
  after: Laser cleaning ramps up the process effectively. Pulses remove the grime
    layer by layer, without damaging the underlying material. In practice, the cleaned
    surface emerges with a crisp, even texture that highlights the wood's tight grain
    and subtle color variations.
