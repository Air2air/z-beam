title: Pyrex Laser Cleaning
description: When laser cleaning Pyrex, watch out for thermal shock right from the
  start—its low expansion under heat sets it apart from ordinary glass, letting you
  ramp up the process safely without risking cracks and restoring labware efficiently
  for repeated scientific use
