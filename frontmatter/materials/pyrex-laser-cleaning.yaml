components:
  settings_description: When laser cleaning Pyrex, we've found that starting with lower power settings works best to gently
    remove contaminants without risking cracks. This glass stands out for its excellent thermal shock resistance, which lets
    you handle quick heat cycles that might shatter ordinary soda-lime types, so we often use pulsed lasers to control the
    energy input precisely. But watch out midway through—its low thermal conductivity can trap heat in spots, leading to uneven
    cleaning if you push the scan speed too high; dial it back and add passes instead. In our experience, this brings back
    the surface clarity on lab equipment reliably while preserving its integrity for reuse.
  micro:
    before: "You see the Pyrex surface rough and dotted with dark specks of grime.  \nContaminants form thick, uneven layers\
      \ that hide the underlying texture completely.  \nScattered debris clings tightly, creating a cluttered and dull appearance\
      \ overall."
    after: "After cleaning, the Pyrex surface appears smooth and free from any specks.  \nNo layers of contaminants remain\
      \ to obscure the natural glass texture.  \nThe view shows a uniform, clear finish that gleams brightly throughout."
