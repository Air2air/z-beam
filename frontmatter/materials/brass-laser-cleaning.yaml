components:
  subtitle: Its excellent machinability makes brass a preferred choice for high-volume precision components
  description: 'When laser cleaning brass, you''ll want to account for its high reflectivity at 94%, which means low absorption
    of around 12%. This non-ferrous alloy, mostly copper and zinc, differs from ferrous metals by its lower density of 8,530
    kg/m³ and better corrosion resistance on a 0.75 scale. We typically start with 100 W at 1064 nm wavelength, 50 μm spot
    size, and 5.1 J/cm² energy density to avoid pitting. Watch the thermal conductivity of 109 W/m·K—it spreads heat fast,
    so keep scan speed at 500 mm/s with 50% overlap over three passes. Pitfall: exceed the 930°C melting point, and you''ll
    warp fittings or instruments.'
  micro:
    before: Under the microscope at high magnification, the brass surface looks clogged with thick, uneven layers of dirt
      and oxidation. Dark smears and tiny debris spots disrupt the metal's natural sheen everywhere. Pits and scratches hide
      beneath this buildup, making the texture feel rough and dull.
    after: After laser treatment, the same view reveals a smooth, even surface free of all contamination. Bright, reflective
      areas now dominate, with no traces of grime or spots left behind. The texture appears polished and uniform, restoring
  settingsDescription: When laser cleaning brass, you'll want to tackle its high reflectivity first, since the beam often
    bounces off the surface, absorbing little energy and slowing the process. Make sure you start with higher power levels
    to overcome this, but watch out mid-job for overheating spots that could warp delicate parts due to its solid heat spreading.
    Adjust by slowing the scan speed and adding passes, which clears tarnish cleanly without scratching the finish.
