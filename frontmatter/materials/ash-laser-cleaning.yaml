  items:
  - id: how-does-laser-cleaning-restore-the
    title: How does laser cleaning restore the natural grain of aged Ash wood?
    content: Laser cleaning gently ablates surface contaminants like dirt, varnish, or smoke residue from Ash wood without
      harming the underlying grain. This non-contact approach typically preserves the wood's light color and prominent patterns,
      uncovering its original beauty in 10-20 minutes per panel—pretty ideal for antique furniture restoration.
    metadata:
      topic: laser cleaning restore the natural
      severity: high
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: true
      order: 1
  - id: what-are-the-risks-of-using
    title: What are the risks of using laser cleaning on Ash wood prone to warping?
    content: Yeah, laser cleaning works pretty safely on Ash wood when handled right. It typically dodges the moisture that
      worsens warping, unlike old methods. Still, too much heat risks micro-cracks; experts advise low-power pulsed lasers
      plus close monitoring to avoid that, preserving the wood's flexibility for lasting strength.
    metadata:
      topic: the rks of using laser
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: false
      order: 2
