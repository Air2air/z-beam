components:
  micro:
    before: When examining the contaminated surface of stainless steel 316 at 1000x magnification, make sure you notice the
      uneven buildup first. Dirt and residues cover the metal grains, creating dark spots and rough patches everywhere. This
      mess hides the true texture below, so watch for those clogged areas that trap more grime.
    after: After laser treatment, the clean surface shines smoothly under 1000x view. You must see how the beam removes every
      trace of contamination without harm. Now the grains appear even
