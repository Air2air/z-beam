page_description: When laser cleaning Beryllium parts for aerospace use, we've found the biggest hurdle is its slick surface
  that resists absorption of the beam, so we dial in steady pulses to strip away grime effectively while keeping heat spread
  even to dodge any warping in those lightweight frames.
