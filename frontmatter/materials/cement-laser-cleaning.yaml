    title: Does laser cleaning affect the surface profile or roughness of concrete when used for surface preparation?
    content: Properly tuned laser parameters, such as 3.2 J/cm² fluence, are essential for selectively removing contaminants
      while preserving the original cement matrix. This yields a distinct anchor profile for coatings, often superior to the
      mechanical damage from abrasive blasting.
