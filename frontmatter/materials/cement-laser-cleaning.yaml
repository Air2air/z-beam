      order: 8
  - id: how-do-you-handle-the-varying
    title: How do you handle the varying composition of cement (with different aggregates and additives) during laser cleaning?
    content: We meticulously fine-tune the fluence, typically at about 3.2 J/cm², to align with the distinct hardness of each
      aggregate. For tougher mixtures, it's essential to raise the scan speed above 500 mm/s, thereby avoiding micro-fractures
      while ensuring effective contaminant removal.
    metadata:
      topic: do you handle the varying
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 9
  - id: what-are-the-maintenance-considerations-for
    title: What are the maintenance considerations for laser equipment when regularly cleaning cement-contaminated surfaces?
    content: Cement exhibits a notable ablation threshold of 3.2 J/cm², so safeguarding optics from alkaline dust becomes
      essential. In turn, your fume extraction system needs regular filter swaps, with sensitive components sealed off from
      the fine, abrasive particles it produces.
    metadata:
      topic: the maintenance considerations for laser
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 10
  - id: can-laser-cleaning-effectively-remove-cement
    title: Can laser cleaning effectively remove cement from porous surfaces like brick or natural stone without causing damage?
    content: Yes, laser cleaning effectively removes cement from porous masonry. Employing a 1064 nm wavelength at 3.2 J/cm²
      fluence and 12 ns pulse width is essential to minimize heat diffusion, enabling selective ablation of the contaminant.
      This notably preserves the delicate substrate, preventing subsurface thermal stress in historic brick or natural stone.
    metadata:
      topic: laser cleaning effectively remove cement
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
