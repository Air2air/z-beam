  - id: can-laser-cleaning-effectively-remove-cement
    title: Can laser cleaning effectively remove cement from porous surfaces like brick or natural stone without causing damage?
    content: Yes, laser cleaning effectively removes cement from porous masonry. Employing a 1064 nm wavelength at 3.2 J/cm²
      fluence and 12 ns pulse width is essential to minimize heat diffusion, enabling selective ablation of the contaminant.
      This notably preserves the delicate substrate, preventing subsurface thermal stress in historic brick or natural stone.
