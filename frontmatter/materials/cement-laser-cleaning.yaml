      order: 4
  - id: whats-the-maximum-thickness-of-cement
    title: What's the maximum thickness of cement buildup that laser cleaning can effectively remove?
    content: Our laser cleaning process notably removes cement layers up to 500 µm thick at the standard 3.2 J/cm² fluence.
      Thicker deposits allow multiple passes, yet buildup over 1 mm demands essential mechanical pre-treatment to guarantee
      efficient operation and preserve substrate integrity.
