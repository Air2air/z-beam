faq:
  presentation: collapsible
  items:
  - id: what-laser-parameters-work-best-for
    title: What laser parameters work best for removing cement residue from steel surfaces without damaging the substrate?
    content: For effective cement removal from steel, utilize a 1064 nm wavelength laser with approximately 100 W average
      power and 12 ns pulse duration. It's notable that a fluence of around 3.2 J/cm², combined with 500 mm/s scanning speed,
      cleanly ablates the residue. These short pulses remain essential to minimize heat accumulation and shield the underlying
      steel from thermal damage.
    metadata:
      topic: laser parameters work best for
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: true
      order: 1
  - id: how-effective-is-laser-cleaning-for
    title: How effective is laser cleaning for removing cement splatter from construction equipment and tools?
    content: Laser cleaning excels at removing cement splatter with minimal substrate damage. Using a 100W laser at 3.2 J/cm²
      fluence effectively ablates contaminants while preserving the underlying metal. This method is significantly faster
      and more cost-effective than manual chiseling, eliminating tool wear and abrasive waste.
    metadata:
      topic: effective laser cleaning for removing
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 2
  - id: does-laser-cleaning-create-hazardous-dust
    title: Does laser cleaning create hazardous dust when removing cement, and what safety measures are required?
    content: Laser cleaning at 3.2 J/cm² distinctly reduces hazardous dust levels, yet crystalline silica remains a persistent
      risk. Essential precautions involve rigorous respiratory protection and local exhaust ventilation to comply with OSHA
      thresholds, typically below 50 µg/m³.
    metadata:
      topic: laser cleaning create hazardous dust
      severity: critical
      acceptedAnswer: true
      expertInfo:
