    _display:
      _open: false
      order: 5
  - id: how-does-laser-cleaning-compare-to
    title: How does laser cleaning compare to chemical methods for removing cement from delicate surfaces like glass or ceramics?
    content: Laser ablation at 3.2 J/cm² fluence notably removes cement from glass in a selective manner, without chemicals,
      thus eliminating residue and substrate etching risks. This essential dry approach proves significantly faster than chemical
      dissolution while avoiding environmental hazards from waste streams.
    metadata:
      topic: laser cleaning comp to chemical
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
