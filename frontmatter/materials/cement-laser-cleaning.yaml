  - id: what-are-the-maintenance-considerations-for
    title: What are the maintenance considerations for laser equipment when regularly cleaning cement-contaminated surfaces?
    content: Cement exhibits a notable ablation threshold of 3.2 J/cm², so safeguarding optics from alkaline dust becomes
      essential. In turn, your fume extraction system needs regular filter swaps, with sensitive components sealed off from
      the fine, abrasive particles it produces.
    metadata:
