components:
  settings_description: When laser cleaning cement, the key property to lead with is its brittleness compared to tougher masonry
    like stone. This makes it prone to cracking under heat, unlike denser bricks that hold up better. I've seen surfaces chip
    easily if you push too hard. So, start slow with gentle pulses to loosen grime without stressing the matrix. Tends to
    clean cleanly once you avoid over-heating the pores mid-pass. Adjust overlap minimally to prevent uneven wear.
  micro:
    before: I've seen the contaminated cement surface up close, and it looks rough with layers of grime clinging tight to
      every pore. Dust and debris scatter across the uneven texture, making the whole area appear dull and patchy under magnification.
      Cracks weave through it all, trapping more filth that dulls the original solid form.
    after: After the laser treatment, the clean cement surface shines with a fresh, even glow that reveals its true sturdy
      grain. Smooth patches emerge where the buildup once hid, and the material
