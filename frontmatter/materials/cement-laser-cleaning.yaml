        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 6
  - id: what-type-of-laser-fiber-pulsed
    title: What type of laser (fiber, pulsed, continuous wave) works best for cement removal applications?
    content: For cleaning cement, pulsed fiber lasers at 1064 nm wavelength stand out as optimal. Their brief 12 ns pulses
      and 3.2 J/cm² fluence ablate contaminants efficiently, while essential heat diffusion control preserves the underlying
      substrate from thermal stress.
    metadata:
      topic: type of laser (fiber, pulsed,
