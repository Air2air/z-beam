  - id: how-do-you-handle-the-varying
    title: How do you handle the varying composition of cement (with different aggregates and additives) during laser cleaning?
    content: We meticulously fine-tune the fluence, typically at about 3.2 J/cm², to align with the distinct hardness of each
      aggregate. For tougher mixtures, it's essential to raise the scan speed above 500 mm/s, thereby avoiding micro-fractures
      while ensuring effective contaminant removal.
