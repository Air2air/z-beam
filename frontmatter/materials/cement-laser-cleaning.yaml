    _display:
      _open: false
      order: 3
  - id: can-laser-cleaning-damage-concrete-surfaces
    title: Can laser cleaning damage concrete surfaces when trying to remove surface contaminants?
    content: Precise calibration of laser parameters remains essential to avert any concrete damage. Using a fluence of 3.2
      J/cm² with 100W average power, we achieve distinct ablation of contaminants, thereby protecting the cementitious matrix
      without harming aggregates or etching the surface.
    metadata:
      topic: laser cleaning damage concrete surfaces
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
