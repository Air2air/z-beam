      items:
      - id: damaging-the-wood-veneer
        question: Can you safely laser clean plywood without burning or damaging the wood veneer?
        answer: Yes, precise parameters enable safe laser cleaning of plywood. Employing a 1064 nm wavelength at 2.0 J/cm²
          fluence and 100 W power is essential, minimizing heat input to effectively remove contaminants while preventing
          charring of the delicate wood veneer. The distinct key remains rapid scanning, around 500 mm/s, to avoid thermal
          damage.
        topic: damaging the wood veneer
        severity: medium
        acceptedAnswer: true
        expertInfo: &id002
          name: Alessandro Moretti
          title: Ph.D.
          expertise: *id001
      - id: plywood-surfaces
        question: What laser settings (wavelength, power, pulse duration) work best for removing contaminants from plywood
          surfaces?
        answer: For plywood surfaces, I suggest a 1064 nm wavelength, paired with 100 W average power and nanosecond pulses.
          It's essential to hold fluence near 2.0 J/cm², ensuring contaminants lift off cleanly without harming the adhesives
          binding the plies. Plywood's distinct layered makeup calls for gentler settings than solid wood to avert delamination.
        topic: plywood surfaces
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: glue-layers
        question: How does laser cleaning affect the glue layers between plywood laminations?
        answer: It's essential to select proper laser parameters, such as 2.0 J/cm² fluence and 100W power. Thermal input
          notably degrades UF adhesives, heightening delamination risks, whereas PF resins endure heat more effectively. Precise
          control limits heat penetration into glue lines.
        topic: glue layers
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: biological-growth
        question: Is laser cleaning effective for removing mold, mildew, or biological growth from plywood surfaces?
        answer: Laser cleaning stands out for effectively removing biological growth from plywood at a fluence of 2.0 J/cm².
          The 1064 nm wavelength proves essential in targeting surface-level mold ablation, with limited substrate penetration
          that sidesteps chemical residues from conventional approaches. Ultimately, this method safeguards the wood's structural
          integrity.
        topic: biological growth
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: voc-release-from-adhesives
        question: What safety precautions are needed when laser cleaning plywood due to potential VOC release from adhesives?
        answer: When your 1064 nm laser heats plywood adhesives, they release hazardous VOCs such as formaldehyde. It's essential
          to deploy industrial ventilation and respiratory protection, particularly with distinct parameters like 2.0 J/cm²
          fluence that ablate contaminants effectively.
        topic: VOC release from adhesives
        severity: critical
        acceptedAnswer: true
        expertInfo: *id002
      - id: plywood-surfaces
        question: Can laser cleaning prepare plywood surfaces for painting or coating applications?
        answer: Laser cleaning provides an effective way to prepare plywood for coating, as it removes contaminants while
          micro-etching the surface. Notably, at 2.0 J/cm², this process boosts adhesion through increased surface area, avoiding
          thermal damage and offering a distinct, residue-free alternative to mechanical sanding or chemical treatments.
        topic: plywood surfaces
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: plywood-restoration
        question: How does laser cleaning compare to traditional methods (sanding, chemical stripping) for plywood restoration?
        answer: Laser cleaning surpasses traditional methods by safeguarding plywood's delicate veneers in a notable way.
          Employing our 1064 nm wavelength at 2.0 J/cm², it distinctly targets contaminants without harming the wood substrate,
          bypassing abrasive and chemical waste. This delivers essential material preservation while proving far more cost-effective
          for complex restoration tasks.
        topic: plywood restoration
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: existing-surface-treatments
        question: What are the limitations of laser cleaning for plywood with existing surface treatments like varnish or
          paint?
        answer: A notable challenge stems from the distinct ablation thresholds of varnish layers versus the wood substrate.
          At our standard 2.0 J/cm² fluence, multi-layer paint removal often proves incomplete, leaving a resinous residue
          that traps contaminants.
        topic: existing surface treatments
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: dimensional-stability
        question: Does laser cleaning affect the moisture content or dimensional stability of plywood?
        answer: Properly tuned laser settings, like 2.0 J/cm² fluence and 100W average power, yield only superficial drying.
          This essential strategy minimizes threats to the plywood's dimensional stability, averting notable risks of warping
          or checking that might impair structural performance in sectors such as aerospace.
        topic: dimensional stability
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: different-plywood-grades
        question: How do different plywood grades (interior vs exterior, hardwood vs softwood) respond to laser cleaning?
        answer: It's notable how exterior plywood's phenolic resins endure 2.0 J/cm² far better than interior urea-formaldehyde
          glues, prone to degradation. Dense hardwoods like birch demand exact 100W power control to prevent charring, whereas
          softwoods tolerate marginally higher fluence. This 1064nm wavelength delivers essential minimal thermal penetration
          into the veneer.
        topic: different plywood grades
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
