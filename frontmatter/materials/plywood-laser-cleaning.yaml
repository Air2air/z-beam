components:
  settingsDescription: When laser cleaning plywood, unlike solid hardwoods, its layered structure and high porosity make it
    more forgiving on heat buildup, so it tends to clean evenly without deep charring if you keep passes light and quick.
    I've seen this layered makeup absorb contaminants well, restoring surfaces in furniture or heritage pieces, but watch
    midway—too much dwell can delaminate edges, so adjust speed up to avoid that pitfall and preserve the glue bonds.
  micro:
    before: I've seen the contaminated plywood surface up close at high magnification, where grime clings tightly to the wood
      fibers. Dirt particles nestle deep into the porous layers, making the texture rough and uneven overall. It looks clogged
      and dull, hiding the natural grain beneath the buildup.
    after: After laser treatment, the surface appears fresh and open, with fibers standing out clearly without any residue.
      The texture smooths out nicely, revealing a uniform and vibrant pattern. This treatment brings back the wood's original
