components:
  micro:
    before: >-
      At 1000x magnification, the rhenium surface appears rough and uneven before cleaning. Dark patches of grime cling
      tightly to the metal, hiding its true shine. Tiny pits and irregular bumps scatter across the view, making it look
      worn and dull.
    after: >-
      After laser treatment, the same surface gleams smoothly under 1000x magnification. The metal now shows a clean,
      even texture without any clinging dirt. Bright reflections highlight the restored flatness, free from pits and old
      buildup
  settings_description: >-
    When laser cleaning rhenium, watch its strong reflectivity first. It bounces back much of the beam, so energy
    absorption stays low. This makes surface buildup stubborn to remove. I've seen it take extra care to avoid uneven
    heating. Start with lower power settings to build heat gradually. That prevents hot spots on this dense metal.
    Rhenium's extreme heat resistance helps here—it won't warp easily. But go slow on passes. Overlap scans to cover
    fully without stressing the surface. Tends to shine up nicely once clean, restoring that aerospace-grade finish.
