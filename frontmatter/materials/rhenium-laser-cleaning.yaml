    _display:
      _open: false
      order: 7
  - id: in-training-for-laser-cleaning-operators
    title: In training for laser cleaning operators, what key properties of rhenium should be emphasized to avoid substrate
      ablation?
    content: In training laser cleaning operators for rhenium, highlight its notable melting point of 3186°C to avert unintended
      substrate melting. It's essential to cap fluence at 2.5 J/cm², monitoring thermal expansion that risks cracks from uneven
      heat buildup—use 150 W power and 500 mm/s scans for harmless oxide removal.
    metadata:
      topic: in training for laser cleaning
      severity: high
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 8
  - id: what-regulatory-standards-apply-to-laser
    title: What regulatory standards apply to laser cleaning of rhenium in medical device production, particularly for biocompatibility?
    content: For rhenium in medical devices, FDA's Center for Devices and Radiological Health alongside ISO 10993 oversee
      biocompatibility, requiring meticulous residue checks with XPS or SEM after cleaning. It's essential to validate procedures
      that yield oxide-free surfaces via 1064 nm wavelength at 2.5 J/cm² fluence, averting cytotoxic residues while upholding
      the metal's inert nature.
    metadata:
