  components:
    settings_description: When laser cleaning Hastelloy, start with reduced power to manage its low thermal conductivity,
      which causes heat to build up quickly in treated areas. This approach removes surface contaminants cleanly while preserving
      the alloy's exceptional corrosion resistance. But watch for uneven heating midway through—adjust scan speeds downward
      to avoid cracking the protective oxide layer. Multiple passes restore the finish without weakening its high-temperature
      strength.
    micro:
      before: At 1000x magnification, the Hastelloy surface looks rough and uneven from thick layers of grime. Dark particles
        cling tightly to every crevice, hiding the metal's true form below. Scattered pits and streaks make the whole area
        appear dull and cluttered.
      after: After laser treatment at the same magnification, the surface emerges smooth and uniform across its expanse. Clean
        metal grains stand out clearly, free from any clinging debris. The texture now feels even and restored, revealing
        the alloy's
