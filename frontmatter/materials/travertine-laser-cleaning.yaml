    _display:
      _open: false
      order: 3
  - id: what-power-settings-should-be-used
    title: What power settings should be used for laser cleaning graffiti from outdoor travertine facades to avoid subsurface
      damage?
    content: For graffiti removal on outdoor travertine facades, target 1.5 J/cm² fluence using 100 W power, 50 kHz repetition,
      and 10 ns pulses at 1064 nm wavelength. Particularly, this setting preserves the stone's Mohs 3-4 hardness from subsurface
      damage. Thus, test on samples to fine-tune for sunlight's thermal effects.
    metadata:
      topic: power settings should be used
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 4
  - id: are-there-any-chemical-reactions-between
    title: Are there any chemical reactions between laser-induced plasma and travertine's calcite composition that could lead
      to unwanted byproducts?
    content: Laser-induced plasma on travertine's calcite (CaCO3) can trigger thermal decomposition, particularly releasing
      CO2 gas as a byproduct at fluences around 1.5 J/cm² with 1064 nm wavelength. This risks surface pitting if unmanaged.
      Thus, inert gas shielding during 100 W nanosecond pulsing effectively minimizes oxidation and unwanted residues.
    metadata:
      topic: there any chemical reactions between
