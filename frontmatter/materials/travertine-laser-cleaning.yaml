faq:
  presentation: collapsible
  items:
  - id: is-laser-cleaning-safe-for-delicate
    title: Is laser cleaning safe for delicate travertine surfaces like those on historical monuments without causing thermal
      cracking or discoloration?
    content: Yes, laser cleaning is particularly safe for delicate travertine on historical monuments, as it minimizes thermal
      cracking risks in the porous calcium carbonate through low fluence of 1.5 J/cm² and 1064 nm wavelength. Notably, nanosecond
      pulses at 10 ns limit heat penetration, evident in successful Italian heritage restorations free of discoloration. A
      500 mm/s scan speed then ensures even coverage.
    metadata:
      topic: laser cleaning safe for delicate
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: true
      order: 1
  - id: what-laser-wavelengths-are-most-effective
    title: What laser wavelengths are most effective for removing organic stains from travertine tiles without etching the
      surface?
    content: When cleaning organic stains on travertine tiles, near-infrared lasers at 1064 nm—such as Nd:YAG—perform exceptionally
      well, thanks to the stone's moderate absorption. This enables selective ablation at fluences of about 1.5 J/cm², avoiding
      surface etching. Notably, UV wavelengths pose risks of greater substrate damage from intense absorption, while visible
      light yields poorer selectivity for contaminants. For uniform outcomes, apply 100 W power with a 500 mm/s scan speed.
    metadata:
      topic: laser wavelengths most effective for
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 2
  - id: how-can-i-prevent-moisture-reabsorption
    title: How can I prevent moisture reabsorption in travertine after laser cleaning, given its high porosity?
    content: After laser cleaning travertine at 1.5 J/cm² fluence with a 1064 nm wavelength, promptly apply a penetrating
      siloxane-based sealant to fill its porous structure and repel water ingress—particularly for effective protection. Keep
      ambient humidity below 60% during drying and handling to minimize initial absorption. Thus, for longevity, inspect annually
      and reseal as needed to curb efflorescence from dissolved salts.
    metadata:
      topic: i prevent moture reabsorption in
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
