    _display:
      _open: false
      order: 6
  - id: what-safety-precautions-are-needed-when
    title: What safety precautions are needed when laser cleaning travertine in enclosed spaces to handle dust and fumes from
      vaporized contaminants?
    content: When using a 1064 nm laser at 1.5 J/cm² fluence to clean travertine in tight spaces, opt for NIOSH N95 respirators
      or better, particularly to tackle crystalline silica dust from its limestone base that endangers lung health. Follow
      OSHA 29 CFR 1926.1153 on ventilation, thus targeting over 20 air changes per hour to clear fumes. Include laser goggles
      and gloves for complete safety.
    metadata:
      topic: safety precautions needed laser cleaning
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
