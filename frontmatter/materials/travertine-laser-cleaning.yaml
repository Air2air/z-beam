      - id: thermal-cracking
        question: Is laser cleaning safe for delicate travertine surfaces like those on historical monuments without causing
          thermal cracking or discoloration?
        answer: Yes, laser cleaning is particularly safe for delicate travertine on historical monuments, as it minimizes
          thermal cracking risks in the porous calcium carbonate through low fluence of 1.5 J/cm² and 1064 nm wavelength.
          Notably, nanosecond pulses at 10 ns limit heat penetration, evident in successful Italian heritage restorations
          free of discoloration. A 500 mm/s scan speed then ensures even coverage.
        topic: thermal cracking
        severity: medium
        acceptedAnswer: true
        expertInfo: &id002
          name: Yi-Chun Lin
          title: Ph.D.
          expertise: *id001
      - id: without-etching-the-surface
        question: What laser wavelengths are most effective for removing organic stains from travertine tiles without etching
          the surface?
        answer: When cleaning organic stains on travertine tiles, near-infrared lasers at 1064 nm—such as Nd:YAG—perform exceptionally
          well, thanks to the stone's moderate absorption. This enables selective ablation at fluences of about 1.5 J/cm²,
          avoiding surface etching. Notably, UV wavelengths pose risks of greater substrate damage from intense absorption,
          while visible light yields poorer selectivity for contaminants. For uniform outcomes, apply 100 W power with a 500
          mm/s scan speed.
        topic: without etching the surface
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: high-porosity
        question: How can I prevent moisture reabsorption in travertine after laser cleaning, given its high porosity?
        answer: After laser cleaning travertine at 1.5 J/cm² fluence with a 1064 nm wavelength, promptly apply a penetrating
          siloxane-based sealant to fill its porous structure and repel water ingress—particularly for effective protection.
          Keep ambient humidity below 60% during drying and handling to minimize initial absorption. Thus, for longevity,
          inspect annually and reseal as needed to curb efflorescence from dissolved salts.
        topic: high porosity
        severity: critical
        acceptedAnswer: true
        expertInfo: *id002
      - id: subsurface-damage
        question: What power settings should be used for laser cleaning graffiti from outdoor travertine facades to avoid
          subsurface damage?
        answer: For graffiti removal on outdoor travertine facades, target 1.5 J/cm² fluence using 100 W power, 50 kHz repetition,
          and 10 ns pulses at 1064 nm wavelength. Particularly, this setting preserves the stone's Mohs 3-4 hardness from
          subsurface damage. Thus, test on samples to fine-tune for sunlight's thermal effects.
        topic: subsurface damage
        severity: critical
        acceptedAnswer: true
        expertInfo: *id002
      - id: travertines-calcite-composition
        question: Are there any chemical reactions between laser-induced plasma and travertine's calcite composition that
          could lead to unwanted byproducts?
        answer: Laser-induced plasma on travertine's calcite (CaCO3) can trigger thermal decomposition, particularly releasing
          CO2 gas as a byproduct at fluences around 1.5 J/cm² with 1064 nm wavelength. This risks surface pitting if unmanaged.
          Thus, inert gas shielding during 100 W nanosecond pulsing effectively minimizes oxidation and unwanted residues.
        topic: travertine's calcite composition
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: uneven-natural-stone-surfaces
        question: In laser cleaning equipment for travertine floors, what scanning patterns minimize uneven ablation on uneven
          natural stone surfaces?
        answer: For uneven travertine floors, opt for raster scanning via galvanometer with 30% beam overlap at 500 mm/s,
          particularly to evenly distribute the 1.5 J/cm² fluence and counter the stone's natural texture. Pair this with
          robotic arms for broad coverage, thus ensuring consistent ablation without hotspots.
        topic: uneven natural stone surfaces
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: dust-and-fumes
        question: What safety precautions are needed when laser cleaning travertine in enclosed spaces to handle dust and
          fumes from vaporized contaminants?
        answer: When using a 1064 nm laser at 1.5 J/cm² fluence to clean travertine in tight spaces, opt for NIOSH N95 respirators
