micro:
  before: Contamination on travertine surface creates problem. It blocks natural pores. So, microscopic view at high magnification
    shows dirty buildup. This dirt, it clings to stone texture. Layers form thick and uneven. Pores appear filled with particles.
    Surface exhibits dull roughness. Unique patterns of travertine, they hide under grime. Dark spots cluster in bands. Material
    feels porous and soft.
  after: After laser cleaning is performed, changes appear clear. Treatment removes contamination effectively. Buildup already
    gone from surface. Clean areas show open pores. Natural calcite structure emerges. Banded features become visible again.
    Roughness decreases so much. No residues still present. In observations, stone looks uniform. This process restores original
    look. From the data, cleaning achieves complete removal. Surface now reflects light better. Pores stay empty and defined.
