    _display:
      _open: false
      order: 7
  - id: how-does-travertines-variable-density-affect
    title: How does travertine's variable density affect the uniformity of laser cleaning results compared to denser stones
      like marble?
    content: Travertine's density varies between 2.5 and 2.7 g/cm³, particularly causing uneven laser penetration at 1064
      nm—unlike the steady absorption in denser marble—and thus yielding patchy cleaning results. Lower-density areas risk
      deeper ablation, so pre-scan surfaces to detect variations and apply 1.5 J/cm² fluence for uniform outcomes.
    metadata:
      topic: travertine's variable density affect the
      severity: medium
