      order: 4
  - id: what-preparation-steps-are-needed-for
    title: What preparation steps are needed for stucco before laser cleaning to ensure even contaminant removal?
    content: Before cleaning stucco with a 1064 nm laser, it's practical to assess moisture content below 5% to prevent uneven
      ablation at 3.2 J/cm² fluence, and check for efflorescence by lightly brushing salts away. If damp, allow natural drying
      or apply a temporary sealant efficiently, ensuring the porous masonry surface remains stable for uniform contaminant
      removal.
    metadata:
      topic: preparation steps needed for stucco
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 5
  - id: can-laser-cleaning-penetrate-and-remove
    title: Can laser cleaning penetrate and remove embedded salts from porous stucco without structural weakening?
    content: Yes, this process allows laser cleaning to straightforwardly penetrate stucco's porous structure through capillary
      action, vaporizing embedded efflorescent salts at 3.2 J/cm² fluence without structural damage. Employing a 1064 nm wavelength
      and 100 W power controls thermal effects, preserving masonry integrity. Apply stabilization coatings afterward for lasting
      durability.
    metadata:
