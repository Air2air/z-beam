components:
  settings_description: In our experience, the key with Stucco lies in its porous, cement-based structure that absorbs contaminants
    deeply while resisting heat buildup effectively during laser cleaning. We've found this makes it different from smoother
    masonry, so we typically start with controlled, low-intensity passes to gently lift surface grime without cracking the
    fragile matrix—watch out for overexposure here, as it can dry out and weaken the bonds mid-process. To handle this, we
    adjust by overlapping scans lightly and adding a damp post-treatment to restore evenness, ensuring clean results for heritage
    restorations.
  micro:
    before: When examining contaminated stucco at 1000x magnification, you'll see thick layers of dirt and debris clogging
      every pore and crevice. Grimy particles stick firmly to the rough surface, creating dark spots and uneven buildup that
      hides the original texture. This mess makes the whole area look dull and blocked, with no clear view of the base material
      underneath.
    after: After laser treatment at 1000x magnification, you'll notice the surface now appears smooth and open, free from
      all that clinging gr
