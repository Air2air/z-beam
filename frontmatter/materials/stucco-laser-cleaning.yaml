      order: 3
  - id: how-effective-is-fiber-laser-cleaning
    title: How effective is fiber laser cleaning compared to CO2 lasers for restoring the texture of aged stucco facades?
    content: Fiber lasers at 1064 nm provide a straightforward edge over CO2 systems for aged stucco restoration, owing to
      superior absorption in the inorganic matrix that efficiently limits excessive heat buildup. This process upholds surface
      roughness via 3.2 J/cm² fluence and nanosecond pulses, averting over-etching while softly clearing contaminants.
    metadata:
      topic: effective fiber laser cleaning compd
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
