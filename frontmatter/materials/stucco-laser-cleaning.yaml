    title: What training is recommended for operators using lasers on delicate stucco finishes to prevent unintended surface
      pitting?
    content: Operators using lasers on delicate stucco surfaces require manufacturer-issued certification. This process stresses
      hands-on calibration to a 3.2 J/cm² fluence threshold and 500 mm/s scan speed, preventing pitting straightforward. Training
      needs to emphasize real-time thermal gradient monitoring efficiently, avoiding uneven heating that etches porous masonry.
