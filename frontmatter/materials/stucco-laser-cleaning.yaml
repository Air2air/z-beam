  - id: what-are-realworld-case-studies-of
    title: What are real-world case studies of laser cleaning applied to stucco on Mediterranean-style buildings?
    content: When restoring 18th-century Mediterranean villas in Palermo, Italy, this process of laser cleaning at 1064 nm
      wavelength and 3.2 J/cm² fluence effectively removed soot from stucco of varying thicknesses, applying 500 mm/s scan
      speeds to prevent uneven ablation. Athens' urban projects showed practical durability, with surfaces intact for 15 years
      afterward amid coastal conditions.
