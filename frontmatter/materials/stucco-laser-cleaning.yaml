      order: 7
  - id: how-does-stuccos-alkaline-ph-affect
    title: How does stucco's alkaline pH affect the choice of laser cleaning methods and post-treatment care?
    content: Stucco's alkaline pH of about 12-13 boosts chemical reactivity in laser ablation, potentially releasing caustic
      dust that irritates skin or corrodes nearby metals. For a practical fix, select a 1064 nm wavelength at 3.2 J/cm² fluence
      to cut thermal disruption and handle residue efficiently. Afterward, neutralize this process with a dilute vinegar rinse
      following cement plaster guidelines for surface stability.
