faq:
  presentation: collapsible
  items:
  - id: can-laser-cleaning-safely-remove-dirt
    title: Can laser cleaning safely remove dirt and pollutants from historic stucco walls without causing cracking or discoloration?
    content: Yes, this process safely removes dirt and pollutants from historic stucco walls via a 1064 nm wavelength at 3.2
      J/cm² fluence. It limits thermal stress on the cementitious makeup to prevent cracks or fading. That method upholds
      heritage preservation norms efficiently by curbing heat buildup, with 100 W power for gentle, even treatment.
    metadata:
      topic: laser cleaning safely remove dirt
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: true
      order: 1
  - id: what-laser-parameters-like-wavelength-and
    title: What laser parameters, like wavelength and pulse duration, work best for cleaning graffiti off stucco surfaces?
    content: For graffiti removal on stucco, a practical choice is the 1064 nm near-infrared laser with 10 ns pulses, which
      selectively ablates pigments while sparing the porous lime-cement binder. At 3.2 J/cm² fluence, this process delivers
      efficient cleaning without substrate thermal damage, yielding uniform results in two passes at 500 mm/s.
    metadata:
      topic: laser parameters, like wavelength and
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Ikmanda Roswati
        title: Ph.D.
        expertise:
        - Ultrafast Laser Physics and Material Interactions
    _display:
      _open: false
      order: 2
  - id: are-there-risks-of-releasing-hazardous
    title: Are there risks of releasing hazardous dust or fumes when using lasers to clean weathered stucco exteriors?
    content: Yes, cleaning weathered stucco with lasers at 3.2 J/cm² fluence can release silica-laden dust that irritates
      lungs. For outdoor jobs, wear N95 masks and rely on natural ventilation straightforwardly to cut airborne risks. That
      method ensures low fumes at 1064 nm wavelength and 100 W power.
