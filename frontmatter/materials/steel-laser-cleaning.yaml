components:
  micro:
    before: '### Steel Laser Glow-Up'
    after: Before laser cleaning, steel surfaces often appear dull and marred by rust or grime that clings stubbornly, but
      after the process, they emerge sleek and mirror-like with a fresh metallic sheen that highlights the material's inherent
      strength and shine.
  subtitle: Steel maintains structural integrity under extreme loads, with its high tensile strength making it the dominant
    material for construction and heavy machinery
  description: 'When laser cleaning steel, you must first address its moderate reflectivity of 0.59, which can scatter up
    to 59% of the laser energy and reduce cleaning efficiency if not managed properly. This property stems from steel''s ferrous
    composition and polished surfaces often found in applications like automotive or construction parts, so make sure you
    select a 1064 nm wavelength to optimize absorption at around 0.35 and avoid excessive heat buildup that might warp thin
    sections. Start with a power range of 100 W and pulse widths of 10 ns to deliver controlled energy density of 5 J/cm²,
    which removes surface contaminants like rust or scale without penetrating the base material''s high tensile strength of
    400 MPa.


    You''ll want to adjust scan speeds to 500 mm/s with a 50% overlap ratio over three passes, as steel''s density at 7.85
    g/cm³ and Young''s modulus of 200 GPa make it thermally stable up to 1773 K, allowing thorough restoration of its 6/10
    corrosion resistance. Watch for pitting in areas with higher hardness around 1.47 GPa; reduce repetition rates below 50
    kHz if you notice uneven ablation, since the material''s low porosity of 0.1% minimizes subsurface damage but can trap
    residues. This approach exposes clean surfaces reliably in manufacturing or shipbuilding contexts, improving adhesion
    for coatings while preserving the metal''s compressive strength of 250 MPa.'
  settingsDescription: When laser cleaning steel, start by selecting a moderate power level to account for its reflective
    surface, which tends to scatter energy and slow initial progress. This works well when you scan slowly across the area,
    allowing the laser to gradually remove oxidation without stressing the dense structure beneath. Overlap passes slightly
    to restore even surfaces. Tends to clean efficiently in industrial settings like automotive parts, but watch for uneven
    heating that could warp thin sections.
