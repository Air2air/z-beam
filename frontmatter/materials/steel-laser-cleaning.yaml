faq:
  presentation: collapsible
  items:
  - id: steel-in-laser-cleaning-key-facts
    title: 'Steel in Laser Cleaning: Key Facts'
    content: "**What makes steel a go-to material in industry?**  \nSteel stands out as a metal with solid strength and versatility.\
      \ We use it everywhere—from bridges to machine parts—because it holds up under heavy loads. Its density sits around\
      \ 7.85 g/cm³, which gives it that hefty feel without being too brittle. Porosity stays low at about 0.1%, so it resists\
      \ water or gases sneaking in over time. In my projects, this reliability keeps things running smooth.\n\n**How does\
      \ laser cleaning handle steel surfaces?**  \nLaser cleaning works well on steel by zapping away rust, paint, or grime\
      \ without damaging the base. The beam heats just the top layer, and buildup vaporizes or flakes off. You get a clean\
      \ finish that looks almost new. For steel, a power range of 100 W does the job nicely, especially on thinner sheets.\
      \ It brings back that shiny surface fast, and no chemicals needed. Though thicker pieces might take a pass or two, results\
      \ stay consistent. I've seen it fix old tools in minutes—practical and effective."
    metadata:
      topic: 'steel in laser cleaning: key'
      severity: medium
      acceptedAnswer: true
