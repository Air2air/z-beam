components:
  settingsDescription: When laser cleaning Maple, I've found gentle pulses work best. This hardwood's tight grain absorbs
    energy evenly, unlike looser woods that char fast. It brings back finishes on furniture or instruments without splintering.
    Tends to heat slowly due to low conductivity compared to denser hardwoods. So, keep passes light. Watch for overexposure
    at the end—it can dull the natural luster if you push too hard.
  micro:
    before: When examining the contaminated Maple surface at high magnification, I see layers of dirt and grime clinging tightly
      to the fibers. Dust particles scatter across uneven spots, dulling the natural wood texture below. This buildup hides
      the fine grain patterns completely from view.
    after: After laser treatment, the same surface reveals clean, smooth fibers without any residue. The wood's intricate
      grain emerges clearly, shining with restored vibrancy. Now, the texture looks even and fresh, free from all visible
      contaminants.
    _section:
      sectionTitle: Microscopic Analysis
      sectionDescription: High-magnification comparison of Maple surface before and after laser cleaning treatment
      icon: microscope
      order: 5
      variant: default
