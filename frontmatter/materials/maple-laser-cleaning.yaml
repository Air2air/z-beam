      items:
      - id: maple-cabinets
        question: What laser settings work best for cleaning soot and smoke residue from maple cabinets without damaging the
          wood?
        answer: For maple cabinet restoration, I suggest the 1064nm wavelength at 45W average power with 12ns pulses. It's
          essential to hold fluence at 2.8 J/cm² and scan speed at 500mm/s, lifting soot effectively while avoiding yellowing.
          A distinct 80μm spot size ensures precise control for full residue removal without etching the delicate wood.
        topic: maple cabinets
        severity: medium
        acceptedAnswer: true
        expertInfo: &id002
          name: Alessandro Moretti
          title: Ph.D.
          expertise: *id001
      - id: preserving-the-grain-pattern
        question: Can laser cleaning remove old finishes and paint from maple wood while preserving the grain pattern?
        answer: Indeed, laser cleaning notably strips finishes from maple, preserving its delicate grain. With 1064nm wavelength
          at 2.8 J/cm² fluence, it selectively ablates varnish and paint layers. The essential 12ns pulse duration limits
          thermal input, preventing damage to the wood's porous structure and avoiding charring.
        topic: preserving the grain pattern
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: natural-color-and-tannins
        question: How does laser cleaning affect the natural color and tannins in maple compared to other woods like oak or
          walnut?
        answer: Maple's low tannin content and dense structure demand a precise 2.8 J/cm² fluence—essential to prevent discoloration.
          Distinct from porous oak or walnut, its uniform grain enables excellent color preservation at 500 mm/s, curbing
          thermal shifts in its natural light hue.
        topic: natural color and tannins
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: embedded-finishes
        question: What safety precautions are needed when laser cleaning maple due to potential VOC release from embedded
          finishes?
        answer: When laser cleaning Maple's embedded finishes at 2.8 J/cm², they release hazardous VOCs. It's essential to
          deploy a high-efficiency fume extraction system with HEPA and activated carbon filtration. Notably, operators need
          respiratory protection compliant with EN 143 for fine particulates and organic vapors.
        topic: embedded finishes
        severity: critical
        acceptedAnswer: true
        expertInfo: *id002
      - id: biological-growth-like-mold
        question: Is laser cleaning effective for removing biological growth like mold from maple without leaving chemical
          residues?
        answer: Laser cleaning notably excels at removing mold from maple with a 2.8 J/cm² fluence and 500 mm/s scan speed,
          clearing spores from wood pores sans chemicals. Unlike conventional approaches, it avoids spore spread while yielding
          a residue-free finish—essential for fine musical instruments.
        topic: biological growth like mold
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: hard-vs.-soft-maple
        question: How do different maple varieties (hard vs. soft maple) respond to laser cleaning treatments?
        answer: The notable density of hard maple calls for higher fluence around 2.8 J/cm², whereas softer woods demand power
          below 45W to avert thermal damage. It's essential to fine-tune scan speed and overlap ratio according to the wood's
          hardness, preventing any surface charring.
        topic: hard vs. soft maple
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
      - id: structural-integrity
        question: Can laser cleaning restore antique maple furniture without compromising structural integrity or patina?
        answer: Utilizing a precise 45W power and 2.8 J/cm² fluence, laser cleaning effectively eliminates contaminants from
          antique maple while safeguarding its structural integrity. The 1064nm wavelength offers essential selective patina
          retention, enabling controlled ablation that spares delicate wood substrates.
        topic: structural integrity
        severity: high
        acceptedAnswer: true
        expertInfo: *id002
      - id: heavily-charred-maple
        question: What are the limitations of laser cleaning for heavily charred maple after fire damage?
        answer: Laser cleaning notably removes surface char at 2.8 J/cm² fluence, yet it fails to tackle deep-seated damage.
          When char layers exceed ~500 µm, mechanical methods prove essential to safeguard the wood's structural integrity.
          Additionally, the technique reveals subsurface thermal degradation through material interaction.
        topic: heavily charred maple
        severity: critical
        acceptedAnswer: true
        expertInfo: *id002
      - id: moisture-content
        question: How does moisture content in maple affect laser cleaning efficiency and safety?
        answer: Excessive moisture above ~12% in maple generates steam rapidly under 1064 nm laser irradiation, risking surface
          checking. For optimal 45W cleaning efficiency, kiln-dried stock below 8% moisture is ideal. Green wood requires
          pre-drying to prevent subsurface steam pressure from causing mechanical damage to the cellular structure.
        topic: moisture content
        severity: critical
        acceptedAnswer: true
        expertInfo: *id002
      - id: what-post-treatment-is-recommended-for-maple-after
        question: What post-treatment is recommended for maple after laser cleaning to protect the exposed wood surface?
        answer: After laser cleaning maple at 2.8 J/cm², lightly sand the surface—it's essential to address any micro-porosity.
          For protection, apply a thin sealant such as water-based polyurethane or hard-wax oil, which penetrates the prepared
          wood effectively. These finishes notably enhance the natural grain while preserving its distinct light color without
          darkening.
        topic: What post-treatment is recommended for maple after
        severity: medium
        acceptedAnswer: true
        expertInfo: *id002
