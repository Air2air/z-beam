faq:
  presentation: collapsible
  items:
  - id: what-laser-settings-work-best-for
    title: What laser settings work best for cleaning soot and smoke residue from maple cabinets without damaging the wood?
    content: For maple cabinet restoration, I suggest the 1064nm wavelength at 45W average power with 12ns pulses. It's essential
      to hold fluence at 2.8 J/cm² and scan speed at 500mm/s, lifting soot effectively while avoiding yellowing. A distinct
      80μm spot size ensures precise control for full residue removal without etching the delicate wood.
    metadata:
      topic: laser settings work best for
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: true
      order: 1
  - id: can-laser-cleaning-remove-old-finishes
    title: Can laser cleaning remove old finishes and paint from maple wood while preserving the grain pattern?
    content: Indeed, laser cleaning notably strips finishes from maple, preserving its delicate grain. With 1064nm wavelength
      at 2.8 J/cm² fluence, it selectively ablates varnish and paint layers. The essential 12ns pulse duration limits thermal
      input, preventing damage to the wood's porous structure and avoiding charring.
    metadata:
      topic: laser cleaning remove old finhes
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 2
  - id: how-does-laser-cleaning-affect-the
    title: How does laser cleaning affect the natural color and tannins in maple compared to other woods like oak or walnut?
    content: Maple's low tannin content and dense structure demand a precise 2.8 J/cm² fluence—essential to prevent discoloration.
      Distinct from porous oak or walnut, its uniform grain enables excellent color preservation at 500 mm/s, curbing thermal
      shifts in its natural light hue.
    metadata:
      topic: laser cleaning affect the natural
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 3
  - id: what-safety-precautions-are-needed-when
    title: What safety precautions are needed when laser cleaning maple due to potential VOC release from embedded finishes?
    content: When laser cleaning Maple's embedded finishes at 2.8 J/cm², they release hazardous VOCs. It's essential to deploy
      a high-efficiency fume extraction system with HEPA and activated carbon filtration. Notably, operators need respiratory
      protection compliant with EN 143 for fine particulates and organic vapors.
    metadata:
      topic: safety precautions needed laser cleaning
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 4
  - id: is-laser-cleaning-effective-for-removing
    title: Is laser cleaning effective for removing biological growth like mold from maple without leaving chemical residues?
    content: Laser cleaning notably excels at removing mold from maple with a 2.8 J/cm² fluence and 500 mm/s scan speed, clearing
      spores from wood pores sans chemicals. Unlike conventional approaches, it avoids spore spread while yielding a residue-free
      finish—essential for fine musical instruments.
    metadata:
      topic: laser cleaning effective for removing
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 5
  - id: how-do-different-maple-varieties-hard
    title: How do different maple varieties (hard vs. soft maple) respond to laser cleaning treatments?
    content: The notable density of hard maple calls for higher fluence around 2.8 J/cm², whereas softer woods demand power
      below 45W to avert thermal damage. It's essential to fine-tune scan speed and overlap ratio according to the wood's
      hardness, preventing any surface charring.
    metadata:
      topic: do different maple varieties (hard
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 6
  - id: can-laser-cleaning-restore-antique-maple
    title: Can laser cleaning restore antique maple furniture without compromising structural integrity or patina?
    content: Utilizing a precise 45W power and 2.8 J/cm² fluence, laser cleaning effectively eliminates contaminants from
      antique maple while safeguarding its structural integrity. The 1064nm wavelength offers essential selective patina retention,
      enabling controlled ablation that spares delicate wood substrates.
    metadata:
      topic: laser cleaning restore antique maple
      severity: high
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 7
  - id: what-are-the-limitations-of-laser
    title: What are the limitations of laser cleaning for heavily charred maple after fire damage?
    content: Laser cleaning notably removes surface char at 2.8 J/cm² fluence, yet it fails to tackle deep-seated damage.
      When char layers exceed ~500 µm, mechanical methods prove essential to safeguard the wood's structural integrity. Additionally,
      the technique reveals subsurface thermal degradation through material interaction.
    metadata:
      topic: the limitations of laser cleaning
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 8
  - id: how-does-moisture-content-in-maple
    title: How does moisture content in maple affect laser cleaning efficiency and safety?
    content: Excessive moisture above ~12% in maple generates steam rapidly under 1064 nm laser irradiation, risking surface
      checking. For optimal 45W cleaning efficiency, kiln-dried stock below 8% moisture is ideal. Green wood requires pre-drying
      to prevent subsurface steam pressure from causing mechanical damage to the cellular structure.
    metadata:
      topic: moture content in maple affect
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 9
  - id: what-posttreatment-is-recommended-for-maple
    title: What post-treatment is recommended for maple after laser cleaning to protect the exposed wood surface?
    content: After laser cleaning maple at 2.8 J/cm², lightly sand the surface—it's essential to address any micro-porosity.
      For protection, apply a thin sealant such as water-based polyurethane or hard-wax oil, which penetrates the prepared
      wood effectively. These finishes notably enhance the natural grain while preserving its distinct light color without
      darkening.
    metadata:
      topic: post-treatment recommended for maple after
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
