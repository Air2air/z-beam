faq:
  presentation: collapsible
  items:
  - id: copper-in-industrial-use-key-facts
    title: 'Copper in Industrial Use: Key Facts and Laser Cleaning'
    content: "**What makes copper a go-to metal in industry?**  \nCopper stands out as a solid metal choice. It conducts electricity\
      \ and heat well. Factories use it for wiring, pipes, and heat exchangers. This metal holds up in tough environments\
      \ without breaking down quickly.\n\n**Tell me about its basic physical properties.**  \nDensity sits around 8.96 grams\
      \ per cubic centimeter. Porosity stays near zero percent, so it's dense and non-porous. That means water or air won't\
      \ seep in easily. You get a smooth, reliable surface for most jobs.\n\n**How does laser cleaning work on copper?** \
      \ \nLaser cleaning clears off rust, oils, or coatings from copper parts. It restores the finish without damaging the\
      \ base metal. For standard setups, aim for about 100 watts of power. This level removes contaminants cleanly. Keep the\
      \ beam moving to avoid overheating. I've seen it work great on circuit boards and tubing in Taiwanese workshops. Just\
      \ adjust based on the dirt layer—but start low to test.\n\n**Any tips for handling copper during cleaning?**  \nWear\
      \ gloves; copper can stain skin over time. And watch the reflections—lasers bounce off shiny surfaces. Safe practices\
      \ keep everyone steady. Overall, this process saves time compared to chemicals."
