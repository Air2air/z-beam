page_description: When laser cleaning willow, begin with gentle passes at moderate speeds to take advantage of its porous,
  lightweight structure that absorbs energy well, removing surface grime from delicate musical instruments or heritage furniture
  while safeguarding the wood's natural flexibility and preventing any charring below.
