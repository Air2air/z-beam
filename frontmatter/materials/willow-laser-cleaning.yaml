      order: 8
  - id: are-there-regulatory-compliance-issues-for
    title: Are there regulatory compliance issues for laser cleaning willow in heritage conservation, such as for traditional
      willow crafts?
    content: Laser cleaning willow for heritage items like traditional basketry complies with ICOMOS guidelines via non-destructive
      protocols. Document parameters such as 1.2 J/cm² fluence and 1064 nm wavelength to prevent thermal harm to the wood's
      fibrous structure, ensuring reversible conservation. Preliminary spot tests are essential for compliance.
    metadata:
      topic: there regulatory compliance sues for
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 9
  - id: how-do-physical-properties-like-willows
    title: How do physical properties like willow's elasticity impact the longevity of laser-cleaned surfaces in applications
      like musical instrument parts?
    content: Willow's notable elasticity, distinct from rigid woods like oak, renders laser-cleaned surfaces on musical instrument
      parts vulnerable to micro-cracks through repeated flexing, potentially curtailing longevity without post-treatment sealing.
      Our 1.2 J/cm² fluence at 100 W power delivers precise cleaning; however, applying a flexible sealant is essential to
      counter fatigue and sustain vibrancy across years of play.
