components:
  settingsDescription: When laser cleaning Willow, start with low power and slow scan speeds to gently lift surface grime
    without scorching its delicate fibers. This wood's high porosity soaks up contaminants deeply, which helps the laser absorb
    well and clear buildup effectively, but it also traps heat locally due to poor conductivity, so you must overlap passes
    carefully midway through to prevent uneven charring or cracking. Avoid rushing the process—multiple light treatments bring
    back that natural grain safely.
  micro:
    before: At 1000x magnification, grime clings to the wood's fibers in thick layers. Dark particles fill every pore and
      obscure the natural grain beneath. The surface looks uneven and matted overall.
    after: After laser treatment at 1000x, fibers stand out clean and distinct. Pores open wide with no residues blocking
      their paths. The surface gleams smooth and reveals the grain clearly.
