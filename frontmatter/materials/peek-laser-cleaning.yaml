faq:
  presentation: collapsible
  items:
  - id: how-do-i-safely-start-laser
    title: How do I safely start laser cleaning PEEK parts without causing damage?
    content: You must begin by selecting a low-power laser setting to match PEEK's heat resistance, ensuring the beam gently
      removes contaminants without overheating the surface. Make sure you scan the area slowly and evenly, allowing the material's
      strong structure to handle the process without warping or weakening. This approach brings back the smooth finish effectively,
      keeping the part's durable properties intact for continued use.
    metadata:
      topic: do i safely start laser
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: true
      order: 1
  - id: what-happens-if-peek-surfaces-discolor
    title: What happens if PEEK surfaces discolor during laser cleaning?
    content: Start with checking your laser intensity right away, as PEEK's low absorption can lead to uneven heating if the
      power is too high. You should adjust the pulse duration to shorter bursts, which helps dissipate heat quickly through
      its moderate conductivity and prevents any color changes. Keep monitoring the surface closely, and this will restore
      the original appearance without compromising the material's toughness.
    metadata:
      topic: happens if peek surfaces dcolor
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 2
  - id: can-laser-cleaning-affect-peeks-strength
