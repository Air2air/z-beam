settings_description: When laser cleaning PEEK, you'll want to tackle its low absorption of laser energy first. This thermoplastic
  stays mostly transparent to the beam, so heat builds up slowly but can suddenly degrade the surface if you're not careful.
  Start with lower power settings to gently remove contaminants without melting the material. Make sure you use short pulses—they
  help control the heat and prevent cracking on this strong, non-porous plastic. Watch out mid-process for any discoloration;
  dial back the speed right away to avoid weakening its heat resistance. Adjust scans to overlap minimally, bringing back
  a clean finish while keeping PEEK's durability intact.
components:
  micro:
    before: When examining the contaminated PEEK surface at 1000x, you spot thick layers of debris clinging everywhere. Dark
      spots and irregular bumps cover the entire view, blocking any smooth areas. This mess creates a rough, uneven texture
      that hides the material's natural form.
    after: After laser treatment, you see the PEEK surface restored to a clear, uniform shine at 1000x. Smooth planes and
      fine details emerge without any clinging residues. The treatment wipes away all traces, revealing a clean
contamination:
  valid:
  - uv_chalking
  - chemical_stains
  - environmental_dust
  - adhesive_residue
  prohibited:
  - rust_oxidation
  - copper_patina
  - aluminum_oxidation
  - wood_rot
  conditional:
    industrial_oil:
      context: machinery_parts_only
      note: Only if plastic is part of machinery (gears, housings)
