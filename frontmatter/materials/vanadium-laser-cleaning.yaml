components:
  micro:
    before: Looking at the vanadium surface before cleaning under high magnification reveals a cluttered mess of contaminants
      clinging tightly. Dark residues and scattered particles create an uneven, bumpy texture that hides the metal's true
      form. It all looks dull and choked, with layers building up in irregular spots.
    after: After the laser treatment, that same vanadium surface transforms into a clear, smooth expanse free of any buildup.
      Fine metallic grains stand out sharply now, without the old debris interrupting. The whole area gleams evenly and feels
      polished
  settingsDescription: When laser cleaning vanadium, make sure you watch its moderate reflectivity right from the start—unlike
    highly reflective metals like copper, it absorbs energy better but still scatters some light, so you must lower the power
    initially to prevent uneven heating. This difference means you can ramp up faster than with shiny alloys, but always scan
    slowly to avoid surface pitting. Its strong corrosion resistance helps keep the cleaned area intact, just overlap passes
    generously for full coverage.
