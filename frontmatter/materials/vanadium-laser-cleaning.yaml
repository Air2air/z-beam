  - id: what-are-common-challenges-in-using
    title: What are common challenges in using fiber lasers to remove contaminants from vanadium-titanium alloys in aerospace
      applications?
    content: In aerospace, contaminants adhere strongly to vanadium-titanium alloys, particularly demanding fiber laser fluence
      above 5.1 J/cm² at 1064 nm, which limits scan speeds to roughly 500 mm/s. Post-ablation re-oxidation risks thus necessitate
      inert gases, unlike chemical approaches that sidestep heat yet produce residues and environmental threats.
    metadata:
      topic: common challenges in using fiber
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: false
      order: 3
  - id: in-laser-cleaning-equipment-for-vanadium
    title: In laser cleaning equipment for vanadium steel surfaces, what scan speeds prevent overheating and material loss?
    content: When processing vanadium steel surfaces, target scan speeds of 100-500 mm/s to reduce overheating risks, notably
      employing 50% beam overlap at 100 W power and 1064 nm wavelength. Thus, fluence stays below 5.1 J/cm², averting evaporation
      or cracking. Employ IR thermography to track surface temperature for immediate tweaks.
    metadata:
      topic: in laser cleaning equipment for
      severity: critical
      acceptedAnswer: true
