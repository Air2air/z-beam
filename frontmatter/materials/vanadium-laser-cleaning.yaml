  items:
  - id: what-laser-wavelengths-are-most-effective
    title: What laser wavelengths are most effective for cleaning vanadium oxide layers from steel alloys without substrate
      damage?
    content: 1064 nm near-IR lasers prove optimal for cleaning vanadium oxide from steel alloys, absorbing efficiently into
      the reflective metal. Notably, unlike 532 nm visible light—which scatters more due to vanadium's properties—thus, target
      5.1 J/cm² fluence with 100 W pulses to ablate the layer cleanly without substrate heating.
    metadata:
      topic: laser wavelengths most effective for
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Yi-Chun Lin
        title: Ph.D.
        expertise:
        - Laser Materials Processing
    _display:
      _open: true
      order: 1
  - id: how-do-vanadium-fumes-generated-during
    title: How do vanadium fumes generated during laser cleaning of vanadium-containing alloys affect worker safety?
    content: Vanadium pentoxide fumes arising from laser cleaning of vanadium alloys at 5.1 J/cm² fluence create serious inhalation
      hazards, particularly by irritating lungs and risking long-term damage such as pneumoconiosis. Thus, keep exposure under
      0.05 mg/m³ via robust local exhaust ventilation, while outfitting workers with NIOSH-approved half-face respirators
      using P100 filters for metal oxides.
    metadata:
      topic: do vanadium fumes generated during
      severity: critical
      acceptedAnswer: true
