  - id: how-does-the-high-melting-point
    title: How does the high melting point of vanadium influence the choice of laser power for surface decontamination in
      nuclear reactor components?
    content: Vanadium's 1910°C melting point notably requires higher laser power—typically 100 W at 1064 nm—to ablate surface
      oxides in nuclear components without risking substrate melt. Its good thermal conductivity spreads heat quickly; thus,
      we target 5.1 J/cm² fluence for efficient decontamination, minimizing incomplete removal from uneven absorption.
