  - id: what-are-the-chemical-properties-of
    title: What are the chemical properties of vanadium that make it prone to re-contamination after laser surface treatment?
    content: Vanadium shows a strong affinity for oxygen, resulting in rapid formation of stable V2O5 layers on exposed surfaces
      following laser cleaning. Notably, this heightens re-contamination risks. Such reactivity particularly impairs post-treatment
      corrosion resistance, especially at 1064 nm wavelength and 5.1 J/cm² fluence. Thus, apply inert gas shielding during
      100 W sessions to ensure a pristine, oxide-free finish.
