  - id: what-training-is-recommended-for-operators
    title: What training is recommended for operators handling laser cleaning of vanadium-coated tools to minimize health
      hazards?
    content: Operators cleaning vanadium-coated tools with 1064 nm lasers require integrated training that combines standard
      eye and skin protection protocols with sessions particularly focused on particulate-induced irritation from vanadium.
      Thus, emphasize monitoring airborne exposure below 0.05 mg/m³ during 100 W operations, alongside hands-on practice for
      safe ablation without substrate damage.
