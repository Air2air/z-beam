faq:
  presentation: collapsible
  items:
  - id: can-a-standard-laser-cleaning-machine
    title: Can a standard laser cleaning machine safely remove lanthanum oxide scale or contamination from components?
    content: A standard 1064nm laser system effectively removes lanthanum oxide scale, though it demands precise fluence control
      near the notable 2.5 J/cm² ablation threshold. Boasting a high absorption coefficient of 0.85 for efficient cleaning,
      it still requires careful parameterization due to the low thermal conductivity of 13.4 W/(m·K), making such steps essential
      to avert localized thermal effects and surface alterations.
    metadata:
      topic: a standard laser cleaning machine
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: true
      order: 1
  - id: what-are-the-specific-safety-hazards
    title: What are the specific safety hazards of laser cleaning lanthanum or lanthanum-containing alloys?
    content: Lanthanum's notably low 200°C oxidation threshold ensures laser cleaning produces hazardous oxide fumes with
      ease. Employing our standard 2.5 J/cm² fluence demands a P100 particulate filter alongside robust fume extraction. Fine,
      reactive particles make essential this respiratory and ventilation safeguard against inhalation dangers.
    metadata:
      topic: the specific safety hazards of
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 2
  - id: what-is-the-best-laser-parameter
    title: What is the best laser parameter setup (wavelength, power, pulse width) for cleaning lanthanum without damaging
      the substrate?
    content: Given lanthanum's notable 85% absorptivity, employ a 1064 nm wavelength at 90 W average power. It's essential
      to keep fluence just above the 2.8 J/cm² ablation threshold via 12 ns pulses, thus removing oxides without melting the
      soft substrate—exploiting its low thermal conductivity.
    metadata:
      topic: the best laser parameter setup
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 3
  - id: does-laser-cleaning-create-a-passivation
    title: Does laser cleaning create a passivation layer on lanthanum metal, and is it desirable?
    content: Yes, laser cleaning at 2.5 J/cm² fluence indeed forms a thin lanthanum oxide passivation layer. This proves essential,
      as it notably enhances the material's corrosion resistance—otherwise constrained below 200°C—thereby extending part
      durability for later uses.
    metadata:
      topic: laser cleaning create a passivation
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 4
  - id: how-do-you-verify-the-effectiveness
    title: How do you verify the effectiveness of laser cleaning on lanthanum surfaces? What inspection methods are used?
    content: To confirm cleaning effectiveness, we rely on white light interferometry for surface topography below 1 µm roughness.
      Essential EDX analysis verifies oxide contaminants under 200 ppm, while a distinct uniform matte finish at 2.5 J/cm²
      fluence signals successful ablation.
    metadata:
      topic: do you verify the effectiveness
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 5
  - id: is-lanthanum-considered-a-rare-earth
    title: Is lanthanum considered a 'rare earth' in laser cleaning safety protocols, and does it require special handling
      like thorium?
    content: Lanthanum stands as a notable rare earth element, yet unlike radioactive thorium, it carries no radiological
      risk. Essential laser safety protocols guide the process, with a 1064 nm wavelength at 2.5 J/cm² fluence for oxide removal.
      Above all, handling the fine particulates from ablation demands careful attention.
    metadata:
      topic: lanthanum considered a 'r earth'
      severity: critical
      acceptedAnswer: true
