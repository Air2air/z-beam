      _open: false
      order: 6
  - id: what-are-the-common-industrial-parts
    title: What are the common industrial parts made of lanthanum that might require laser cleaning?
    content: In electronics manufacturing, cleaning lanthanum-containing hydrogen storage alloys and optical components like
      LaFN21 glass stands out as a notable routine. Essential for precision, their oxide layers—forming above 200°C—are effectively
      removed via a 1064 nm laser at 2.5 J/cm² fluence, sparing the soft substrate from damage.
    metadata:
      topic: the common industrial parts made
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 7
  - id: why-is-lanthanum-often-a-contaminant
    title: Why is lanthanum often a contaminant on other materials, and how is it removed with a laser?
    content: Lanthanum oxide contamination, notably from catalyst residues or glass polishing, poses a common challenge. We
      eliminate it with a 1064 nm laser at 2.5 J/cm²—a fluence just exceeding its ablation threshold. This essential method
      vaporizes the oxide layer while preserving the underlying nickel alloy or stainless steel substrate.
    metadata:
      topic: lanthanum often a contaminant on
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 8
  - id: can-laser-cleaning-be-used-to
    title: Can laser cleaning be used to prepare a lanthanum surface for subsequent processes like coating or welding?
    content: Laser cleaning adeptly readies lanthanum surfaces via a 1064 nm wavelength and fluence around 2.5 J/cm². Notably,
      it strips away oxides while forming a mildly roughened, activated layer suited for strong adhesion. The essential low
      thermal conductivity of 13.4 W/(m·K) limits heat exposure, safeguarding substrate integrity for follow-on coating or
      welding.
    metadata:
      topic: laser cleaning be used to
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 9
  - id: how-does-the-high-reactivity-of
    title: How does the high reactivity of fresh lanthanum metal affect post-laser cleaning handling and storage?
    content: Lanthanum surfaces, just laser-cleaned, re-oxidize nearly instantly in air owing to the metal's notable reactivity.
      Preserving the pristine state from 2.5 J/cm² fluence is essential, so transfer the component straight to an argon glovebox
      or advance to the next step—like coating—without pause.
