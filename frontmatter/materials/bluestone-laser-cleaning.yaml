faq:
  presentation: collapsible
  items:
  - id: how-does-laser-cleaning-restore-stained
    title: How does laser cleaning restore stained Bluestone surfaces?
    content: Laser cleaning employs precise pulsed lasers to vaporize dirt, grime, and stains without harming the stone's
      distinct texture. This essential technique suits Bluestone patios perfectly, clearing years of buildup in one efficient
      pass.
    metadata:
      topic: laser cleaning restore stained bluestone
      severity: high
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: true
      order: 1
  - id: what-makes-bluestone-a-good-candidate
    title: What makes Bluestone a good candidate for laser restoration?
    content: Bluestone's notable quartz-rich makeup endures laser energy effectively, enabling essential contaminant removal
      while safeguarding its inherent color and resilience—ideal for weathered paving stones.
    metadata:
      topic: makes bluestone a good didate
      severity: high
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 2
  - id: why-choose-laser-cleaning-over-chemical
    title: Why choose laser cleaning over chemical methods for Bluestone maintenance?
    content: Laser cleaning stands out as eco-friendly, steering clear of harsh chemicals that could seep into Bluestone's
      pores and inflict long-term damage. Essentially, it focuses solely on surface issues, minimizing environmental impact
      and health risks for users.
    metadata:
      topic: choose laser cleaning over chemical
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 3
  - id: can-laser-cleaning-fix-efflorescence-on
    title: Can laser cleaning fix efflorescence on Bluestone walls?
    content: Indeed, lasers ablate salt deposits from efflorescence in a notable manner, avoiding any stone abrasion. This
      essential non-contact technique halts further moisture wicking—a typical Bluestone challenge—while yielding a clean,
      dry surface.
    metadata:
      topic: laser cleaning fix efflorescence on
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 4
  - id: is-laser-cleaning-safe-for-porous
    title: Is laser cleaning safe for porous Bluestone materials?
    content: Indeed. Adjustable laser wavelengths provide an essential advantage, penetrating only surface layers to gently
      remove stains from Bluestone's porous structure without etching or weakening it—unlike abrasive techniques that risk
      notable micro-cracks.
    metadata:
      topic: laser cleaning safe for porous
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 5
  - id: how-long-does-laser-cleaning-last
    title: How long does laser cleaning last on outdoor Bluestone applications?
    content: Results can last a notable 5-10 years on well-sealed Bluestone, influenced by traffic and weather exposure. It's
      essential to perform regular inspections, proactively tackling Bluestone's staining vulnerability with minimal downtime.
    metadata:
      topic: long laser cleaning last on
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Alessandro Moretti
        title: Ph.D.
        expertise:
        - Laser-Based Additive Manufacturing
    _display:
      _open: false
      order: 6
