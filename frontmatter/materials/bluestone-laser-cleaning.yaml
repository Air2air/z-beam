components:
  subtitle: A high-density sedimentary stone with exceptional oxidation and corrosion resistance, ideal for laser cleaning
    at 1064 nm with 68% absorption
  description: When laser cleaning Bluestone, you'll want to start with its solid compressive strength at 124 MPa—it holds
    up well under pressure but cracks easily with low tensile strength of just 4.8 MPa. This sedimentary stone stands out
    from granites due to 4.2% porosity, which traps dirt but soaks up laser energy at 0.68 absorption, unlike denser rocks.
    Watch its low thermal conductivity of 1.7 W/m·K; heat builds fast, risking fractures near 950°C destruction point. Use
    100 W at 1064 nm, 5 J/cm² density, and 500 mm/s speed over 3 passes with 50% overlap to clear buildup without warping.
  settings_description: When laser cleaning Bluestone, make sure you dial back power compared to tougher igneous rocks, since
    its softer sedimentary structure heats unevenly and risks cracking under steady beams. Focus first on its sluggish heat
    spread—this keeps energy focused but demands slower passes to prevent surface damage. Boost overlap for thorough coverage
    on the somewhat porous texture, ensuring clean results without etching.
  micro:
    before: At 1000x magnification, the bluestone surface looks rough and clogged with dark grime. Layers of dirt stick tightly
      to the pores, hiding the stone's natural blue-gray tones. Scattered cracks show buildup that dulls the overall texture.
    after: After laser treatment, the same view reveals a smooth, even surface free of contaminants. The original fine grains
      now stand out clearly without any residue. Fresh pores appear clean and open, bringing back the stone's subtle sheen.
