category: stone
subcategory: sedimentary
title: Bluestone Laser Cleaning
subtitle: Revive Bluestone's subtle blue patina with targeted laser precision
description: Laser cleaning parameters for Bluestone
images:
  hero:
    alt: Bluestone surface undergoing laser cleaning showing precise contamination removal
    url: /images/material/bluestone-laser-cleaning-hero.jpg
  micro:
    alt: Bluestone microscopic view of laser cleaning showing detailed precise contamination removal
    url: /images/material/bluestone-laser-cleaning-micro.jpg
caption:
  before: Under microscopic scrutiny, the bluestone surface displays a densely contaminated state, with irregular pores filled by fine dust particles and organic biofilms. These contaminants, they exhibit adhesive properties, fostering microbial growth. Consequently, surface degradation appears as etched micro-fissures and subtle discoloration, weakening the stone's natural durability.
  after: After laser cleaning, the bluestone surface emerges restored to its original luster, with contaminants removed precisely without altering the stone's natural patina. This treatment ensures a smooth, even condition, free from residues or discoloration, while preserving material integrity—no microcracks or erosion observed. The restoration quality proves exceptional, enhancing durability for architectural applications.
