name: limestone-laser-cleaning
slug: limestone-laser-cleaning
page_title: limestone-laser-cleaning
micro:
  before: Limestone surface, it exhibits porous texture naturally. Before laser cleaning
    is applied, contamination covers grains densely, so buildup forms thick layers
    on calcite crystals. This dirt and oxide, they cling to edges and fill pores,
    creating irregular patterns visible at high magnification. During exposure to
    contaminants, surface loses smoothness, and roughness increases because particles
    embed deeply. In observations, contamination appears as clustered spots, reducing
    natural reflectivity of stone.
  after: After treatment is performed, clean surface emerges uniformly. Layers already
    removed by laser action reveal sharp grain boundaries and open porosity. This
    cleaned area, it shows homogeneous features without residues, so original sedimentary
    structure becomes prominent. Buildup is eliminated from the surfaces, and treatment
    achieves complete removal of adhered particles. From the data, post-cleaning view
    displays restored clarity, with minimal ablation marks on material. Process removes
    contamination effectively, preserving durability of limestone.
