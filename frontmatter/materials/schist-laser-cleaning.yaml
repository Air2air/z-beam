components:
  settings_description: When cleaning schist, watch its layered foliation that sets it apart from denser, more uniform stones
    like granite. I've seen this structure lead to delamination under uneven heat, so start with gentler passes to avoid cracking
    along those planes. Unlike smoother limestones, schist's moderate absorption pulls in laser energy well but traps heat
    due to low conductivity, which tends to build up quickly. This works best when you reduce power early on, allowing multiple
    light exposures to reveal surface grime without stressing the layers. Adjust overlap to keep things even, restoring the
    stone's natural sheen steadily.
  micro:
    before: The contaminated surface reveals clusters of dark particles scattered across uneven layers. Fine debris clings
      tightly, obscuring the underlying flaky patterns. Grimy films dull the natural sheen in visible spots.
    after: Laser treatment exposes smooth, layered structures with clear mineral flecks. Clean planes highlight the rock's
      inherent alignment and texture. Restored surfaces show vibrant contrasts without residual buildup.
