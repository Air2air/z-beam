      order: 7
  - id: for-schist-in-architectural-restoration-what
    title: For schist in architectural restoration, what training is recommended for operators to avoid over-ablation on fragile
      layers?
    content: Operators working on laser cleaning for schist's pretty fragile foliated layers need ICOMOS-guided training that
      stresses hands-on practice using fairly low fluence around 4.5 J/cm² to avoid over-ablation. Essential steps cover test
      patches on comparable stone plus real-time visual checks through magnification, while tuning scan speeds to 500 mm/s
      for even coverage without heating up delicate minerals.
    metadata:
      topic: for scht in architectural restoration,
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
