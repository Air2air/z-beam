faq:
  presentation: collapsible
  items:
  - id: what-laser-wavelengths-are-most-effective
    title: What laser wavelengths are most effective for cleaning biological growth like lichen from schist stone without
      causing delamination?
    content: For cleaning lichen from schist, the 1064 nm near-IR wavelength basically outperforms 532 nm by targeting organic
      growth with fairly minimal absorption in the stone's foliated mica layers, thus reducing delamination risk. Keep fluence
      below 4.5 J/cm² at 90 W power to ablate contaminants while preserving substrate integrity.
    metadata:
      topic: laser wavelengths most effective for
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: true
      order: 1
  - id: how-do-i-adjust-laser-power
    title: How do I adjust laser power settings to remove soot and pollutants from historical schist facades while preserving
      the natural mica sheen?
    content: For those historical schist facades, set the fluence at 4.5 J/cm² to pretty much vaporize soot and grime without
      etching the substrate, preserving that subtle mica luster. Pair it with a 50 kHz repetition rate and 500 mm/s scan speed,
      which fairly handles the stone's irregular hardness and layered minerals for even, gentle coverage.
    metadata:
      topic: do i adjust laser power
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: false
      order: 2
  - id: is-there-a-risk-of-thermal
    title: Is there a risk of thermal cracking in schist during laser cleaning due to its anisotropic structure?
    content: Yes, the foliated anisotropy in schist pretty much leads to uneven thermal expansion, risking cracks during laser
      cleaning. I'd recommend sticking to 4.5 J/cm² fluence at 90 W power with 1064 nm wavelength, plus air cooling, to basically
      minimize heat buildup. A Venice canal project successfully avoided damage this way on historic facades.
    metadata:
      topic: there a rk of thermal
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: false
      order: 3
  - id: what-precautions-should-be-taken-when
    title: What precautions should be taken when laser cleaning schist surfaces that may contain quartz inclusions to avoid
      silica dust hazards?
    content: When laser cleaning schist with quartz inclusions, operate at a fluence of 4.5 J/cm² using 1064 nm wavelength
      to basically ablate surface contaminants without excessive substrate vaporization that could release respirable silica
      particles. Typically mandate N95 respirators or better for workers, plus local exhaust ventilation to capture dust,
      ensuring OSHA compliance with the 50 µg/m³ limit for crystalline silica in mineral-rich stones like schist.
    metadata:
      topic: precautions should be taken laser
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: false
      order: 4
  - id: can-ndyag-lasers-effectively-strip-old
    title: Can Nd:YAG lasers effectively strip old coatings from schist without altering its metamorphic texture?
    content: Yes, Nd:YAG lasers at 1064 nm fairly effectively remove old coatings from schist via layered ablation, employing
      4.5 J/cm² fluence for selective targeting that spares the substrate. Typically, this preserves the stone's metamorphic
      texture, with post-cleaning microscopy showing no structural changes in its foliated layers.
    metadata:
      topic: nd:yag lasers effectively strip old
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: false
      order: 5
  - id: in-laser-cleaning-forums-users-mention
    title: In laser cleaning forums, users mention schist's variable composition—how does the mica content affect cleaning
      efficiency?
    content: Higher mica content in schist pretty much boosts reflectivity at 1064 nm, reducing laser absorption and slowing
      contaminant removal efficiency. Mica-rich varieties typically need fluence dialed up to 4.5 J/cm² for compensation,
      while chlorite schist cleans faster on baseline settings with better uptake. Scan at 500 mm/s either way for even coverage.
    metadata:
      topic: in laser cleaning forums, users
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: false
      order: 6
  - id: what-are-common-issues-with-laser
    title: What are common issues with laser cleaning equipment when treating outdoor schist monuments exposed to weathering?
    content: Outdoor laser cleaning of weathered schist monuments typically runs into portability challenges from bulky setups
      and limited weather resistance, which can lead to moisture damaging the optics. For schist's rough, uneven surfaces,
      adjust the equipment to 4.5 J/cm² fluence and 500 mm/s scan speed for even ablation without harming the substrate. Pretty
      routine dust filters assist as well.
    metadata:
      topic: common sues with laser cleaning
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
