      _open: false
      order: 8
  - id: how-does-schists-low-porosity-impact
    title: How does schist's low porosity impact the removal of salt efflorescence using laser methods compared to sandstone?
    content: Schist's low porosity basically confines laser energy to the surface, cutting penetration depth versus sandstone's
      deeper salt absorption. That pretty much improves residue removal efficiency for efflorescence, since contaminants remain
      superficial. So we use lower fluence, like 4.5 J/cm² at 1064 nm, to ablate salts cleanly without substrate damage.
    metadata:
      topic: scht's low porosity impact the
