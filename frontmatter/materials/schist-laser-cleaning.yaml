      order: 9
  - id: what-physical-properties-of-schist-like
    title: What physical properties of schist, like its hardness and cleavage, should be considered before selecting a laser
      cleaning method?
    content: Schist's Mohs hardness, spanning 3-7, basically calls for laser settings that protect softer mica layers from
      over-ablation. Those strong cleavage planes fairly amplify crack risks under heat, so aim at 4.5 J/cm² fluence using
      1064 nm to strip surface grime cleanly without spreading fissures.
