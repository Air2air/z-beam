faq:
  presentation: collapsible
  items:
  - id: is-laser-cleaning-safe-for-removing
    title: Is laser cleaning safe for removing contaminants from serpentine stone surfaces without releasing asbestos fibers?
    content: Yes, laser cleaning fairly effectively removes contaminants from serpentine stone surfaces without liberating
      asbestos fibers, using a 1064 nm wavelength and fluence under 2.5 J/cm² to vaporize only surface layers. This non-contact
      approach basically minimizes risks compared to mechanical abrasion, which can fracture the material and release fibers,
      aligning with OSHA and EPA guidelines for safe handling.
    metadata:
      topic: laser cleaning safe for removing
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: true
      order: 1
  - id: what-laser-wavelengths-and-power-settings
    title: What laser wavelengths and power settings are optimal for cleaning serpentine minerals in industrial applications?
    content: When cleaning serpentine in industrial settings, choose the 1064 nm wavelength—serpentine typically absorbs it
      pretty deeply, avoiding the surface cracking risk from 532 nm's shallower penetration. Combine with 100 W power and
      10 ns pulses at 2.5 J/cm² fluence for efficient layer ablation without thermal damage, preserving mineral integrity
      on 500 mm/s scans.
    metadata:
      topic: laser wavelengths and power settings
      severity: critical
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
    _display:
      _open: false
      order: 2
  - id: how-does-serpentines-layered-structure-affect
    title: How does serpentine's layered structure affect the efficiency of laser ablation compared to other silicates?
    content: Serpentine's foliated layers typically promote easier delamination during laser ablation, boosting efficiency
      over compact silicates like feldspar that require higher thermal thresholds. Employing a 1064 nm wavelength at 2.5 J/cm²
      fluence pretty much minimizes cracking risks, as shown in mining equipment cleanups where layered peeling speeds surface
      restoration.
    metadata:
      topic: serpentine's layered structure affect the
      severity: medium
      acceptedAnswer: true
      expertInfo:
        name: Todd Dunning
        title: MA
        expertise:
        - Optical Materials for Laser Systems
