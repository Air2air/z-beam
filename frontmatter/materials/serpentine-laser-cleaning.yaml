      order: 4
  - id: can-laser-cleaning-effectively-remove-rust
    title: Can laser cleaning effectively remove rust or coatings from serpentine-based architectural elements without damaging
      the mineral?
    content: Yeah, laser cleaning does pretty well at stripping rust and coatings from serpentine architectural features.
      At 1064 nm wavelength and 2.5 J/cm² fluence, it typically ablates contaminants selectively while sparing the mineral
      matrix, as in heritage restorations where surface roughness stays under 1 μm post-treatment.
    metadata:
      topic: laser cleaning effectively remove rust
