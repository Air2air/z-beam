  - id: what-regulatory-compliance-steps-are-needed
    title: What regulatory compliance steps are needed for laser cleaning serpentine materials that may contain chrysotile
      asbestos?
    content: Before laser cleaning serpentine potentially laced with chrysotile asbestos, typically conduct EPA-required pre-testing
      to verify contamination levels. Follow NIOSH guidelines by running at 100 W power and 2.5 J/cm² fluence, which basically
      curbs dust generation. Document ablated waste disposal thoroughly for full regulatory compliance.
