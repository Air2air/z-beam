  - id: what-safety-protocols-should-be-followed
    title: What safety protocols should be followed when training operators to laser clean serpentine in construction sites?
    content: Train operators to typically don full-body PPE, like NIOSH-approved respirators and protective suits, to cut
      down on asbestos hazards from serpentine's fibrous forms. Set lasers to a fairly tight 2.5 J/cm² fluence level, tweaking
      for material differences to avoid spotty ablation. During fiber release crises, promptly evacuate the site and fire
      up HEPA filters.
    metadata:
      topic: safety protocols should be followed
