title: Serpentine Laser Cleaning
description: When laser cleaning serpentine, begin with a moderate power setting to make use of its good heat resistance,
  which helps avoid surface cracking in the process, then use steady scans to reveal contaminants without changing the stone's
  dense structure, but keep an eye out for porosity buildup if passes overlap too much
