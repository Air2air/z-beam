  - id: are-there-manufacturer-recommendations-for-laser
    title: Are there manufacturer recommendations for laser systems specifically tuned for serpentine surface treatment in
      heritage conservation?
    content: IPG Photonics typically recommends portable Q-switched Nd:YAG lasers at 1064 nm for serpentine heritage cleaning,
      as they're fairly superior to industrial setups on delicate sites. To prevent damage to the stone's fibrous structure,
      keep fluence under 2.5 J/cm² with 100 W power and 10 ns pulses, for controlled ablation without heat buildup.
    metadata:
