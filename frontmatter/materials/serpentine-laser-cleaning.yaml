  - id: how-do-the-chemical-properties-of
    title: How do the chemical properties of serpentine, like its magnesium silicate composition, influence laser-induced
      reactions during cleaning?
    content: Serpentine's magnesium silicate composition, pretty rich in hydroxyl groups, drives dehydroxylation during 1064
      nm laser cleaning and risks phase shifts if fluence tops 2.5 J/cm². Dry methods basically match its low thermal conductivity
      to prevent cracks, while wet ones better control hydration reactions for safer ablation at 100 W power.
