      _open: false
      order: 3
  - id: what-are-the-main-concerns-about
    title: What are the main concerns about dust and particulate generation when using lasers on asbestos-bearing serpentine?
    content: When lasering asbestos-containing serpentine, the main concern is basically the airborne fiber release during
      ablation at 2.5 J/cm² fluence. You'll need real-time monitoring for fibers, plus HEPA-ventilated enclosures to capture
      particulates. Always follow safety data sheets for bagging and disposing residues as hazardous waste.
    metadata:
      topic: the main concerns about dust
      severity: critical
      acceptedAnswer: true
