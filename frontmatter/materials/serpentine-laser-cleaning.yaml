components:
  settings_description: When laser cleaning Serpentine, you'll want to address its relative softness first. This stone scratches
    easily compared to harder granites. Start with reduced power to prevent surface pitting. Its low heat spreading means
    energy stays local. Adjust scan speeds higher to avoid hot spots. Serpentine absorbs laser light well unlike reflective
    marbles. This speeds removal of dirt but risks quick heating. Use multiple light passes to control buildup. The material's
    slight porosity holds grime deep. Pre-test on edges reveals weak spots. Overlap beams carefully to restore even texture.
    Serpentine differs from dense limestones by flexing under stress. Lower fluence helps maintain its natural layers. Watch
    for cracking in thin sections. Always finish with a cooling interval to reduce thermal shock.
  micro:
    before: I've seen the contaminated Serpentine surface at high magnification, and it shows thick layers of grime covering
      the uneven texture. Dirt particles cling tightly to the rough pores, making the whole area look dull and clogged. Scattered
      debris fills the cracks, hiding the stone's natural patterns completely.
    after: After laser treatment, the clean Serpentine surface reveals a smooth and even texture underneath. The treatment
      removes all grime from the pores, exposing the stone's fine grain details clearly. Now the area appears
