  - id: what-are-common-issues-reported-in
    title: What are common issues reported in forums about laser cleaning serpentine in mining equipment, such as uneven ablation?
    content: In Reddit threads and mining forums, folks fairly often gripe about uneven ablation on serpentine-coated equipment
      from its patchy mineral layers. Basically, dialing scan speed to 500 mm/s with 50% beam overlap evens things out, preventing
      hot spots at 2.5 J/cm² fluence.
    metadata:
