components:
  subtitle: Platinum maintains its integrity under extreme heat and corrosive environments
  micro:
    before: I've seen platinum surfaces get really grimy before cleaning, with dark smudges dotting the metallic sheen unevenly
      across the whole area. Particles cling tightly, making the texture bumpy and dull under magnification, almost hiding
      the underlying luster. Tends to show scratches too, pulling focus from the metal's natural smoothness.
    after: After laser treatment, the same spot gleams with a uniform polish that restores its bright, even finish completely.
      No more clinging debris mars the view; everything looks crisp and
  settingsDescription: When laser cleaning platinum, watch its high reflectivity first. It bounces back most laser energy.
    This scatters the beam and slows contaminant removal. I've seen jobs drag on without adjustments. Start low on power to
    build heat gradually. Tends to work best with multiple passes. Overlap scans tightly for even coverage. Avoid high fluence
    early—it risks uneven heating. Platinum's heat resistance helps here. It stays stable under steady pulses. This restores
    surfaces cleanly without warping. Just keep scans slow to control buildup.
