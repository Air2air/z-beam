        answer: For platinum jewelry, a practical choice is 1064 nm wavelength fiber lasers with 10 ns pulses at 5 J/cm² fluence.
          This process balances the metal's high reflectivity while minimizing heat penetration. A 50 μm spot size paired
          with 500 mm/s scanning prevents micro-pitting by limiting thermal buildup in the substrate.
        topic: causing micro-pitting
        severity: medium
        acceptedAnswer: true
