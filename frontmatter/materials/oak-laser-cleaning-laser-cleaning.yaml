name: oak-laser-cleaning
slug: oak-laser-cleaning
page_title: oak-laser-cleaning
micro:
  before: The oak surface, contaminated with residues, exhibits irregular patterns
    under magnification, where dirt particles cling tenaciously to the porous fibers,
    which manifest as clustered deposits influenced from environmental exposure. These
    contaminants, they obscure the natural grain structure, creating shadowed crevices
    that demonstrate poor adhesion removal without intervention. It seems that the
    wood's inherent density contributes to such persistence, as the layers resist
    initial dispersal.
  after: After laser cleaning, the process yields a restored appearance, with the
    beam effectively ablating the superficial soiling, leaving the hardwood fibers
    exposed in their original configuration. The clean surface shows smoothness along
    the cellular walls, free from the previous encrustations, which leads to enhanced
    visibility of the material's unique vascular patterns. Contamination remnants,
    they appear minimal, confirming the technique's efficacy for delicate woods like
    oak, dependent from precise energy application. This treatment preserves the substrate's
    integrity, exhibiting no thermal distortion in the microstructure.
