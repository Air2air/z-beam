slug: dolomite-laser-cleaning
page_title: dolomite-laser-cleaning
micro:
  before: Contamination on dolomite surface creates uneven patterns, so laser cleaning
    removes it effectively. This buildup, it forms irregular layers from exposure.
    Before treatment is applied, surface shows dark spots and rough textures under
    microscopic view. Particles cling tightly, and they block natural grain structure
    of stone. Dolomite, being sedimentary rock, exhibits porous features where dirt
    accumulates deeply.
  after: After laser ablation is performed, clean surface appears uniform. Oxide residues
    already removed by treatment, and fresh texture emerges clearly. In observations,
    grains show sharp edges without haze. This process achieves complete removal,
    so reflectivity increases noticeably. Surface now exhibits smoothness, and contamination
    still absent from scans. Treatment preserves material characteristics, because
    heat targets only unwanted layers.
