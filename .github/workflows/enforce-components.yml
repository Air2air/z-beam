name: Component Reusability Enforcement

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  enforce-component-rules:
    runs-on: ubuntu-latest
    name: Enforce Component Reusability Rules
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run component reusability enforcement
      run: npm run enforce-components
      
    - name: Run quick audit (for reporting)
      if: always()
      run: |
        chmod +x quick-audit.sh
        ./quick-audit.sh
        
    - name: Comment PR with audit results
      if: failure() && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const { execSync } = require('child_process');
          try {
            const auditOutput = execSync('./quick-audit.sh', { encoding: 'utf8' });
            const comment = `## 🚨 Component Reusability Violations Found
            
            The build failed due to component duplication violations:
            
            \`\`\`
            ${auditOutput}
            \`\`\`
            
            ### 🔧 How to Fix:
            1. Replace hardcoded badge implementations with \`SmartTagList\`
            2. Replace hardcoded button implementations with shared \`Button\` component  
            3. Replace hardcoded card implementations with shared \`Card\` component
            4. Run \`npm run audit:quick\` locally to see specific violations
            5. Review \`REQUIREMENTS.md\` section 2 for detailed guidance
            
            ### 📋 Available Commands:
            - \`npm run audit:quick\` - Quick component audit
            - \`npm run audit:full\` - Comprehensive component audit
            - \`npm run enforce-components\` - Run enforcement check
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
          } catch (error) {
            console.log('Could not generate audit output for comment');
          }

  build:
    runs-on: ubuntu-latest
    needs: enforce-component-rules
    name: Build Application
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build application
      run: npm run build
