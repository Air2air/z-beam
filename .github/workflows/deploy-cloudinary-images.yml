# .github/workflows/deploy-cloudinary-images.yml

name: Deploy Images to Cloudinary

on:
  push:
    branches:
      - main
    paths:
      - 'public/images/**'
      - 'app/scripts/uploadCloudinaryImages.js' # <-- CHANGE THIS LINE!
      - '.github/workflows/deploy-cloudinary-images.yml' # <-- ADD THIS LINE!
                                                        # This ensures changes to the workflow itself trigger it
jobs:
  upload-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run Cloudinary Upload Script
        run: node app/scripts/uploadCloudinaryImages.js # This is already correct
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}