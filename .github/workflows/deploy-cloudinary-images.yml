# .github/workflows/deploy-cloudinary-images.yml

name: Deploy Images to Cloudinary

on:
  push:
    branches:
      - main
    paths:
      - 'public/images/**'
      - 'app/scripts/uploadCloudinaryImages.js'
      - '.github/workflows/deploy-cloudinary-images.yml'
  workflow_dispatch: # Keep this for manual triggers

jobs:
  upload-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (using npm ci for CI/CD)
        run: npm install

      - name: Debug - Verify Node Modules and Requires
        run: |
          echo "Listing node_modules contents:"
          ls -la node_modules/chalk
          ls -la node_modules/ora
          echo ""
          echo "Attempting to require chalk and ora in Node.js:"
          node -e "
            try {
              const chalk = require('chalk');
              const ora = require('ora');
              console.log('Successfully required chalk and ora.');
              console.log('Chalk loaded:', chalk.red.bold('test chalk text'));
              console.log('Ora loaded (mock):', ora('test ora text').spinner);
            } catch (e) {
              console.error('Failed to require chalk or ora:', e.message);
              process.exit(1); 
            }
          "

      - name: Run Cloudinary Upload Script
        run: node app/scripts/uploadCloudinaryImages.js
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          


          
          # Final trigger attempt