name: Deploy Images to Cloudinary

on:
  push:
    branches:
      - main
    paths:
      - 'public/images/**'
      - 'app/**'
      - '.github/workflows/deploy-cloudinary-images.yml'
  workflow_dispatch: # Keep this for manual triggers

jobs:
  upload-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (using npm ci for CI/CD)
        run: npm install --no-save ora

      - name: Debug - Verify Script Content
        # ADD THIS STEP
        run: |
          echo "Contents of app/scripts/uploadCloudinaryImages.js on the runner:"
          cat app/scripts/uploadCloudinaryImages.js
          echo "--- End of script content ---"

      - name: Debug - Verify Node Modules and Requires
        run: |
          echo "Listing node_modules contents:"
          ls -la node_modules/ora
          echo ""
          echo "Attempting to require ora in Node.js:"
          node -e "
            try {
              const ora = require('ora').default;
              console.log('Successfully required ora.');
              console.log('Ora loaded (object type):', typeof ora);
            } catch (e) {
              console.error('Failed to require ora:', e.message);
              process.exit(1);
            }
          "

      - name: Run Cloudinary Upload Script
        run: node app/scripts/uploadCloudinaryImages.js
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}