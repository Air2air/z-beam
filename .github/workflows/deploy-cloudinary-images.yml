# .github/workflows/deploy-cloudinary-images.yml

# Name of the workflow as it appears in the GitHub Actions tab
name: Deploy Images to Cloudinary

# Defines when this workflow should run
on:
  # Trigger the workflow on pushes to the 'main' branch
  push:
    branches:
      - main # Ensure this matches your primary branch (e.g., 'master', 'production')
    # Limit runs to only when specific files or directories change
    paths:
      - 'public/images/**' # Run if any file in public/images/ (or its subdirectories) changes
      - 'app/scripts/uploadCloudinaryImages.js' # Run if the upload script itself changes
      - '.github/workflows/deploy-cloudinary-images.yml' # Run if this workflow file itself changes

  # Allows you to manually trigger the workflow from the GitHub UI
  workflow_dispatch:

# Defines the jobs that run in this workflow
jobs:
  upload-images:
    # Specifies the type of runner to use for the job
    runs-on: ubuntu-latest # A hosted GitHub Actions runner running Ubuntu

    # Steps define a sequence of tasks that will be executed on the runner
    steps:
      - name: Checkout repository
        # Uses the 'actions/checkout' action to clone your repository onto the runner
        uses: actions/checkout@v4

      - name: Set up Node.js
        # Uses the 'actions/setup-node' action to set up a Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Specify the Node.js version to use (e.g., '18', '20', '22')

      - name: Install dependencies
        # Runs the npm install command to install packages listed in package.json
        run: npm install

      - name: Run Cloudinary Upload Script
        # Executes your Node.js script to upload images to Cloudinary
        # The path 'app/scripts/uploadCloudinaryImages.js' is relative to the repository root
        run: node app/scripts/uploadCloudinaryImages.js
        # Pass GitHub Secrets as environment variables to your Node.js script
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}