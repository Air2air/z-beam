# .github/workflows/deploy.yml (new file)
name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
        - production
        - staging
      skip_build:
        description: 'Skip build step (use if recently built)'
        required: false
        default: false
        type: boolean

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      if: github.event.inputs.skip_build != 'true'
      run: npm ci
    
    - name: Build application
      if: github.event.inputs.skip_build != 'true'
      run: npm run build
    
    - name: Deploy to Vercel
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        github-token: ${{ secrets.GITHUB_TOKEN }}
        vercel-args: ${{ github.event.inputs.environment == 'production' && '--prod' || '' }}
        vercel-org-id: ${{ secrets.ORG_ID }}
        vercel-project-id: ${{ secrets.PROJECT_ID }}
    
    - name: Comment on commit with deployment status
      if: always()
      uses: actions/github-script@v7
      with:
        script: |
          const deploymentStatus = '${{ job.status }}' === 'success' ? '✅ Deployed' : '❌ Failed';
          const environment = '${{ github.event.inputs.environment }}';
          const sha = context.sha.substring(0, 7);
          
          github.rest.repos.createCommitComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            commit_sha: context.sha,
            body: `${deploymentStatus} to **${environment}** (${sha})\n\nTriggered by: @${{ github.actor }}`
          });