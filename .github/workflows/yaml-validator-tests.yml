name: YAML Validator Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'yaml_validator.py'
      - 'check_file_completeness.py'
      - 'tests/test_yaml_validator.py'
      - 'tests/yaml_validator/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'yaml_validator.py'
      - 'check_file_completeness.py'
      - 'tests/test_yaml_validator.py'
      - 'tests/yaml_validator/**'

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyyaml coverage
    
    - name: Run tests
      run: |
        python -m unittest tests/test_yaml_validator.py
    
    - name: Run tests with coverage
      run: |
        python -m coverage run --source=yaml_validator,check_file_completeness -m unittest tests/test_yaml_validator.py
        python -m coverage report
        python -m coverage xml
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
