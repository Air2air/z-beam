  - order: 1
    heading: "Laserverse - Canada"
    text: "Laserverse is North America's premier provider of advanced laser cleaning equipment and training, offering innovative solutions that redefine surface preparation and restoration. Based in Canada, Laserverse specializes in the distribution of industry-leading Netalux Needle and Jango lasers, complemented by a robust lineup of supporting equipment from trusted brands like Univet, Husqvarna, 3M, and Kenetek. Their cutting-edge technology enables efficient, eco-friendly cleaning processes, capable of removing rust, paint, grease, and toxic contaminants from a variety of surfaces—such as concrete, stone, and metal. Laserverse supports a growing community of laser experts, delivering rapid turnaround times and unparalleled precision for industries seeking sustainable, high-performance cleaning options."
    image:
      url: "/images/partners/partner_laserverse.png"
      alt: "Laserverse logo - North American laser cleaning equipment distributor"
    imagePosition: "right"
    details:
      - "Location: Canada"
      - "Region: North America"
      - "Specialization: Equipment Distribution & Training"
      - "Website: laserverse.ca"
    
  - order: 2
    heading: "MacK Laser Restoration - Southern California"
    text: "MacK Laser Restoration is Southern California's first and largest Laser Cleaning provider. MacK provides an extensive range of expert services, including rust and corrosion removal, paint and coating removal, NDT surface preparation, oil and grease removal, precision surface cleaning, industrial equipment and parts cleaning, weld cleaning and bonding treatment, injection mold cleaning, and smoke and soot damage removal. In the Los Angeles area and the rest of the southwest MacK is our recommended choice to get your job quickly and expertly."
    image:
      url: "/images/partners/partner_mack.png"
      alt: "MacK Laser Restoration logo - Professional laser cleaning services"
    imagePosition: "left"
    details:
      - "Location: Southern California"
      - "Region: Southwest United States"
      - "Specialization: Professional Laser Cleaning Services"
      - "Website: macklaserrestoration.com"
    
  - order: 3
    heading: "Netalux - Belgium"
    text: "Netalux delivers award-winning technology to industries worldwide from its headquarters in Beringen, Belgium. Founded in 2017 as the world's first dedicated laser cleaning contractor, Netalux combines deep field expertise with cutting-edge engineering to design and manufacture its revolutionary Needle®, Kamino® and Jango® laser cleaning machines. These powerful systems, ranging from 100 to 1000 watts, offer unmatched precision and efficiency, removing contaminants like rust, paint, and toxic residues without damaging underlying surfaces or generating secondary waste. Beyond equipment, their Netalux Academy offers tailored training, ensuring clients maximize the potential of this sustainable technology."
    image:
