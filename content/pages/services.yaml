# Service workflow stages (consolidated from pros page)
workflow:
  - stage: "Consultation & Assessment"
    order: 1
    name: "Consultation & Assessment"
    description: "We start by understanding your specific cleaning objectives, materials involved, types of contamination, and project requirements. Our technical team conducts a thorough assessment to ensure we deliver optimal results."
    details:
      - "Material composition and substrate characteristics"
      - "Contamination types and severity"
      - "Surface preparation requirements"
      - "Production environment and constraints"
      - "Quality standards and specifications"
      - "Timeline and budget parameters"

  - stage: "Proposal & Pricing"
    order: 2
    name: "Custom Proposal & Pricing"
    description: "Based on our assessment, we develop a detailed proposal that outlines the project scope, methodology, timeline, and transparent pricing. We offer flexible options to meet your specific needs and budget."
    details:
      - "Comprehensive scope of work"
      - "Detailed methodology and approach"
      - "Equipment specifications"
      - "Timeline and milestones"
      - "Flexible pricing options (per square foot, hourly, or project-based)"
      - "Expected outcomes and quality metrics"

  - stage: "Project Plan & Prep"
    order: 3
    name: "Project Planning & Preparation"
    description: "Before starting work, we develop a detailed project plan that includes site-specific safety protocols, optimal laser parameters for your materials, and logistics coordination to minimize disruption to your operations."
    details:
      - "Site-specific safety plan"
      - "Laser parameter optimization"
      - "Equipment setup and testing"
      - "Logistics and scheduling"
      - "Quality control procedures"
      - "Documentation requirements"

  - stage: "Expert Execution"
    order: 4
    name: "Expert Execution"
    description: "Our trained technicians use state-of-the-art Netalux laser cleaning equipment to execute your project with precision and efficiency. We provide continuous monitoring and quality checks throughout the process."
    details:
      - "Certified equipment operators"
      - "Real-time quality monitoring"
      - "Continuous process optimization"
      - "Safety compliance"
      - "Minimal downtime"
      - "Environmental responsibility"

  - stage: "Completion & Report"
    order: 5
    name: "Completion & Reporting"
    description: "Upon project completion, we provide comprehensive documentation including before/after analysis, quality metrics, and detailed reporting. We ensure you have all the information needed for your records and quality assurance."
    details:
      - "Comprehensive project report"
      - "Before/after documentation"
      - "Quality metrics and analysis"
      - "Safety compliance documentation"
      - "Final invoice and warranty information"
      - "Follow-up support options"

# Main page content (markdown)
content: |
  # Z-Beam Laser Cleaning Services

  ## Our Services

  ### Surface Preparation
  Professional laser cleaning for optimal surface preparation across various materials and industries.

  ### Oxide Removal
  Efficient removal of oxidation from metals without damaging the substrate material.

  ### Coating Removal
  Selective removal of coatings, paints, and other surface treatments with precision control.

  ### Custom Solutions
  Tailored laser cleaning solutions designed to meet specific industrial requirements.

  ## Industries We Serve

  - **Automotive**: Paint removal, surface preparation for welding
  - **Aerospace**: Precision cleaning of critical components
  - **Manufacturing**: General surface preparation and cleaning
  - **Restoration**: Heritage building and artifact cleaning

  ## Contact Us

  Ready to explore how Z-Beam laser cleaning can benefit your operations? Contact our team for a consultation.
