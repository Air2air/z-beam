# Content sections for Netalux equipment
contentCards:
  - order: 1
    heading: "Needle® - Precision Laser Cleaning"
    text: "The Needle®, our precision workforce for operators who demand clean and safe performance in tight, complex spaces. Compact, award-winning and user-first: the Gaussian-pulse genius delivers where every millimeter matters. Featuring Gaussian beam shape ideal for weld cleaning, small parts and intricate surfaces, the Needle® series offers models ranging from 100W to 300W with air-cooled operation. Light and flexible with industrial-grade ergonomics, these systems provide laser-sharp precision for demanding applications while maintaining IP54 protection and durable design. Available in both handheld and stationary configurations for automation integration."
    image:
      url: "/images/partners/partner-netalux.webp"
      alt: "Netalux Needle laser cleaning system - compact precision cleaning"
    imagePosition: "right"
    details:
      - "Power Range: 100W - 300W"
      - "Beam Shape: Gaussian (precision)"
      - "Cooling: Air-cooled"
      - "Weight: 20-43 kg (portable)"
      - "Applications: Weld cleaning, small parts, intricate surfaces"
      - "Configuration: Handheld & Stationary"
    
  - order: 2
    heading: "Jango® - Industrial Power"
    text: "When large-scale industrial cleaning demands speed, safety and reliability, Jango® rises. A water-cooled powerhouse with award-winning design, delivering uniform cleaning performance – no matter how big the task. The Jango® features Top-Hat beam shape for precise coverage on large surfaces, making it ideal for tanks, coatings and extensive cleaning jobs. With 7,500W of average power and 100 mJ maximum pulse energy, this industrial-grade system handles the most demanding applications. Built for transport and toughness with integrated safety controls and 50-meter fiber reach, the Jango® is available in both mobile and stationary configurations for continuous high-volume automated applications with CAD and industrial control system integration."
    image:
      url: "/images/partners/partner-netalux.webp"
      alt: "Netalux Jango industrial laser cleaning system - high-power cleaning"
    imagePosition: "left"
    details:
      - "Power: 7,500W"
      - "Beam Shape: Top-Hat (uniform coverage)"
      - "Cooling: Water-cooled"
      - "Weight: ~850 kg (industrial)"
      - "Applications: Large-scale industrial, tanks, coatings"
      - "Fiber Reach: 50 meters"
      - "Configuration: Mobile & Stationary with automation"
    
  - order: 3
    heading: "About Netalux"
    text: "Netalux delivers award-winning technology to industries worldwide from its headquarters in Beringen, Belgium. Founded in 2017 as the world's first dedicated laser cleaning contractor, Netalux combines deep field expertise with cutting-edge engineering to design and manufacture revolutionary laser cleaning machines. Every Netalux machine is designed, engineered and assembled in-house - no rebadging, no outsourcing. That means full control over quality, supply chain and support. From patented integrated lenses (a global first!) to safe lifting points and distance sensors, safety is designed into every machine. Beyond equipment, the Netalux Academy offers tailored training, ensuring clients maximize the potential of this sustainable technology."
    image:
      url: "/images/partners/partner-netalux.webp"
      alt: "Netalux company - laser cleaning equipment manufacturer"
    imagePosition: "right"
    details:
      - "Founded: 2017"
      - "Location: Beringen, Belgium"
      - "Specialization: Laser Cleaning Equipment Manufacturer"
      - "Product Lines: Needle®, Kamino®, Jango®"
      - "Training: Netalux Academy"
      - "Website: netalux.com"
