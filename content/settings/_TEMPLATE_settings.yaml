          impact: "[Safety risk description]"
          
          solution: "[Required safety controls]"
          
          regulatory:
            standards:
              - "[OSHA/ANSI/NFPA standard number and name]"
            
            required_controls:
              - type: "[Control type, e.g., ventilation]"
                specification: "[Technical spec]"
          
          equipment_requirements:
            fume_extraction: "[CFM rating]"
            filtration: "[Type and spec]"
            monitoring: "[Required sensors/alarms]"

  # ----------------------------------------------------------
  # PROCESS OPTIMIZATION (NEW SECTION)
  # ----------------------------------------------------------
  process_parameters:
    
    scan_pattern:
      recommended: "[Pattern type]"
      alternatives: 
        - "[Alternative 1]"
