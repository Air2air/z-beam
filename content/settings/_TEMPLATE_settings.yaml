# ============================================================
# ENHANCED MACHINE SETTINGS (NEW STRUCTURE)
# ============================================================
machineSettings:
  
  # ----------------------------------------------------------
  # ESSENTIAL PARAMETERS (Expanded from current 9 parameters)
  # ----------------------------------------------------------
  essential_parameters:
    
    powerRange:
      # Basic values (ALREADY EXISTS in current YAML)
      value: 100
      unit: W
      min: 50
      max: 150
      
      # NEW: Enhanced metadata for authority page
      optimal_range: [80, 120]
      precision: ±5
      criticality: high  # Options: critical, high, medium, low
      
      # NEW: Scientific justification
      rationale: |
        [Material]'s thermal conductivity ([XX] W/m·K) requires 
        moderate power to achieve selective ablation without 
        substrate heating beyond [XX]°C threshold. Power below 
        [XX]W fails to overcome oxide binding energy; above [XX]W 
        risks substrate melting ([XXX]°C).
      
      # NEW: Boundary conditions
      damage_threshold:
        too_low: "[Describe what happens with insufficient power]"
        too_high: "[Describe damage risk with excessive power]"
        warning_signs:
          - "[Visual/measurable indicator 1]"
          - "[Visual/measurable indicator 2]"
      
      # NEW: Material interaction science
      material_interaction:
        mechanism: "[Photomechanical|Photothermal|Photochemical]"
        dominant_factor: "[Key physical property affecting this parameter]"
        critical_parameter: "[Related parameter that must be coordinated]"
        energy_coupling: 0.XX  # Absorption coefficient
      
      # NEW: Research citations
      research_basis:
        citations:
          - author: "[Last name], [First initial]., et al."
            year: 202X
            title: "[Full paper title]"
            journal: "[Journal name]"
            volume: XX
            issue: X
            pages: "[Page range]"
            doi: "10.XXXX/journal.XXXX.XXXXXX"
            key_finding: "[One-sentence summary of relevant result]"
            sample_size: XXX
            confidence_level: XX  # Percentage
            
        validation:
          method: "[Measurement technique used]"
          equipment: "[Specific instruments]"
          confidence: XX  # Percentage
          sample_size: XXX
          date_verified: "YYYY-MM-DD"
          verified_by: "Z-Beam Research Lab"
          revalidation_interval: "[Time period]"
    
    wavelength:
      # Basic values
      value: 1064
      unit: nm
      min: 532
      max: 10640
      
      # Enhanced metadata
      optimal_range: [1030, 1090]
      criticality: critical
      
      rationale: |
        [Wavelength] matches [material] oxide absorption peak 
        ([XX]%) while minimizing substrate absorption ([XX]%), 
        providing [X.X]x selectivity ratio.
      
      # NEW: Spectroscopy data
      absorption_data:
        substrate_reflectivity: 0.XX
        substrate_absorption: 0.XX
        oxide_layer_absorption: 0.XX
        selectivity_ratio: X.X
        penetration_depth: XX  # micrometers
        
      # NEW: Alternative wavelength analysis
      wavelength_alternatives:
        355nm_uv:
          pros: 
            - "[Advantage 1]"
            - "[Advantage 2]"
          cons:
            - "[Disadvantage 1]"
            - "[Disadvantage 2]"
          use_case: "[When to use this wavelength]"
          recommended: true|false
          
        532nm_green:
          pros: []
          cons: []
          use_case: ""
          recommended: "conditional"
          
        10600nm_co2:
          pros: []
          cons: []
          use_case: ""
          recommended: false
      
      research_basis:
        citations: []  # Same structure as powerRange
    
    spotSize:
      value: 50
      unit: μm
      min: 10
      max: 200
      optimal_range: [40, 60]
      criticality: high
      
      rationale: |
        [XX]μm spot size balances energy density (fluence) with 
        processing throughput. Smaller spots exceed damage 
        threshold; larger spots reduce cleaning efficiency.
      
      fluence_relationship:
        formula: "Fluence = Energy / (π × (spotSize/2)²)"
        current_fluence: X.X  # J/cm²
        critical_notes: |
          [Explain relationship between spot size and other parameters]
    
    repetitionRate:
      value: 50
      unit: kHz
      min: 10
      max: 200
      optimal_range: [40, 60]
      criticality: medium
      
      rationale: |
        [XX]-[XX] kHz provides optimal balance between cumulative 
        heating effect and thermal relaxation.
      
      thermal_analysis:
        thermal_relaxation_time: XX  # microseconds
        pulse_interval_current: XX   # microseconds
        overlap_parameter: X.XX      # Ratio for cumulative effect
    
    energyDensity:
      value: 5.1
      unit: J/cm²
      min: 0.5
      max: 10.0
      optimal_range: [2.0, 5.5]
      criticality: critical
      
      rationale: |
        Energy density (fluence) must exceed oxide binding 
        energy ([X.X] J/cm²) while remaining below [material] 
        damage threshold ([X.X] J/cm²).
      
      threshold_data:
        oxide_ablation_threshold: X.X   # J/cm²
        substrate_damage_threshold: X.X  # J/cm²
        safety_factor: X.X               # Recommended margin
        working_range: [X.X, X.X]        # Safe + effective
    
    pulseWidth:
      value: 10
      unit: ns
      min: 1
      max: 1000
      optimal_range: [8, 100]
      criticality: high
      
      rationale: |
        Nanosecond pulses ([X]-[XX] ns) enable photomechanical 
        ablation regime, minimizing thermal effects.
      
      regime_analysis:
        current_regime: "[Photomechanical|Thermal|Hybrid]"
        thermal_relaxation_time: XXXXX  # nanoseconds
        heat_affected_zone: X.X         # micrometers
        comparison:
          picosecond: "[Advantages/disadvantages]"
          microsecond: "[Advantages/disadvantages]"
    
    scanSpeed:
      value: 500
      unit: mm/s
      min: 100
      max: 2000
      optimal_range: [400, 600]
      criticality: medium
      
      rationale: |
        [XXX] mm/s provides optimal throughput while maintaining 
        required fluence and spot overlap.
      
      throughput_analysis:
        area_coverage: XXX    # cm²/min
        vs_slow_300: "+XX%"   # Throughput comparison
        vs_fast_800: "-XX% quality"  # Quality tradeoff
    
    passCount:
      value: 3
      unit: passes
      min: 1
      max: 10
      optimal_range: [2, 4]
      criticality: medium
      
      rationale: |
        Multiple low-fluence passes prevent substrate overheating 
        while achieving complete contamination removal.
      
      multi_pass_strategy:
        per_pass_fluence: X.X     # J/cm²
        cumulative_fluence: X.X   # J/cm²
        removal_per_pass: X       # micrometers
        cooling_interval: X       # seconds
        substrate_temp_max: XXX   # °C
    
    overlapRatio:
      value: 50
      unit: "%"
      min: 10
      max: 90
      optimal_range: [40, 60]
      criticality: high
      
      rationale: |
        [XX]% overlap ensures complete coverage without excessive 
        heat accumulation.
      
      coverage_analysis:
        effective_removal: XX     # %
        vs_30_overlap: "XX%"      # Coverage comparison
        vs_70_overlap: "+XX°C"    # Temperature impact

  # ----------------------------------------------------------
  # MATERIAL-SPECIFIC CHALLENGES (NEW SECTION)
  # ----------------------------------------------------------
  material_challenges:
    
