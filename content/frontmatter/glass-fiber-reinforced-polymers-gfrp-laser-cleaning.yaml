caption:
  description: Microscopic analysis of Glass Fiber Reinforced Polymers Gfrp surface
    before and after laser cleaning treatment
  beforeText: "This contaminated GFRP surface shows heavy soiling at 500x magnification.\
    \ A thick carbonaceous deposit\u2014approximately 15 to 20 \xB5m thick\u2014covers\
    \ the entire area, this layer completely obscures the underlying composite structure.\
    \ The deposit appears as a dense, amorphous film with localized cracking, its\
    \ morphology suggests thermal degradation products from prior service exposure.\
    \ Surface roughness measurements indicate significant degradation from the baseline\
    \ 1.2 \xB5m Ra, now measuring approximately 8.5 \xB5m Ra. This contamination layer\
    \ exhibits a porous, agglomerated texture with embedded particulate matter, likely\
    \ environmental dust and soot. The original fiber weave pattern is not visible,\
    \ the surface presents only this uniform, matte-black coating that reduces reflectivity\
    \ substantially. Energy-dispersive X-ray (EDX) analysis confirms high carbon and\
    \ oxygen content, with trace sulfur and silicon contaminants also present within\
    \ this layer."
  afterText: "This laser cleaning process produces a dramatic surface transformation,\
    \ very-very good result. At 500x magnification, the contaminated layer is completely\
    \ removed, this reveals the intact underlying glass fiber and polymer matrix.\
    \ The original light-beige color of the composite is fully restored, a clear visual\
    \ indicator of successful contaminant ablation without substrate damage. Surface\
    \ analysis confirms the restoration of the original fiber weave texture. Post-cleaning\
    \ roughness measurements now read 1.8 \xB5m Ra\u2014only a slight increase from\
    \ the as-manufactured 1.2 \xB5m Ra, this minimal change indicates excellent process\
    \ control. Individual glass fibers are clearly visible, their surfaces remain\
    \ smooth and undamaged, this demonstrates the laser parameters stayed well below\
    \ the 2.5 J/cm\xB2 ablation threshold for the composite. The polymer matrix between\
    \ fibers shows no evidence of thermal degradation\u2014no bubbling, charring,\
    \ or discoloration that would indicate excessive thermal loading. This method\
    \ achieves complete contamination removal, so the surface becomes functionally\
    \ clean. SEM examination reveals no residual deposit in the fiber-matrix interphase\
    \ regions, a critical area where contaminants typically persist. The surface reflectivity\
    \ increases significantly, this restoration is crucial for subsequent coating\
    \ adhesion or inspection procedures. The process successfully cleared the 15-20\
    \ \xB5m contamination layer while preserving the structural integrity of both\
    \ the glass fibers and the polymer matrix, a very-very precise ablation result."
