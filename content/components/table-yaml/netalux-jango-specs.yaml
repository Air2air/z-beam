metadata:
  source: "Netalux Product Page"
  url: "https://netalux.com/product/jango/"
  retrieved: "2025-10-25"
  notes: "Official manufacturer specifications for Netalux Jango® industrial laser cleaning system. High-power water-cooled unit designed for large-scale industrial cleaning applications with Top-Hat beam shape for uniform coverage. Significantly more powerful than Needle® series (7500W vs 100-300W)."
  
comparison_notes:
  vs_needle: |
    Jango® vs Needle® Key Differences:
    - Power: 7500W (Jango) vs 100-300W (Needle) - 25x to 75x more powerful
    - Cooling: Water-cooled (Jango) vs Air-cooled (Needle)
    - Weight: 850 kg (Jango) vs 20-43 kg (Needle) - Industrial vs portable
    - Beam Shape: Top hat (Jango) vs Gaussian (Needle) - Coverage vs precision
    - Fiber Length: 50 m (Jango) vs 4.5-5.7 m (Needle) - Extended reach
    - Applications: Large-scale industrial (Jango) vs Precision work (Needle)
    - Pulse Energy: 100 mJ (Jango) vs 1-2 mJ (Needle) - 50-100x higher
    - Power Supply: 3-phase 380-440V (Jango) vs Single-phase 110-240V (Needle)
