# Basic Content Structure
before_text: |
  Initial surface examination reveals significant contamination deposits across the plaster Laser cleaning of plaster (calcium sulfate dihydrate) utilizes precise ablation thresholds to remove contaminants while preserving the hydrated gypsum structure. Optimal parameters avoid dehydration to bassanite (CaSO4·0.5H2O) or anhydrite (CaSO4).. 
  Microscopic analysis shows construction residues and atmospheric deposits adhering to the surface. The plaster exhibits the characteristic density profile typical of masonry materials.
  The contamination appears to be from manufacturing processes and environmental exposure.

after_text: |
  Post-laser cleaning analysis demonstrates remarkable surface restoration through comprehensive laser processing.
  The plaster substrate now exhibits pristine surface characteristics with minimal thermal effects.
  Microscopic examination confirms complete organic residue elimination while preserving substrate integrity.
