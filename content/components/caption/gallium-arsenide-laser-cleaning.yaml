before_text: |
  Initial surface examination reveals significant contamination deposits across the gallium arsenide Laser cleaning of Gallium Arsenide utilizes precise, pulsed near-infrared radiation to selectively ablate surface contaminants without damaging the underlying semiconductor crystal lattice. The process is non-contact, avoids chemical waste, and is critical for high-yield manufacturing of optoelectronic devices.. 
  Microscopic analysis shows surface contaminants and particulate matter adhering to the surface. The gallium arsenide exhibits the characteristic density profile typical of semiconductor materials.
  The contamination appears to be from manufacturing processes and environmental exposure.

