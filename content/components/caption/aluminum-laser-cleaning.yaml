before_text: |
  The aluminum surface exhibits severe contamination with a complex stratigraphy. A 15-25 µm thick oxide layer (Al₂O₃) is present, overlaid by 5-10 µm of carbonaceous soot and embedded particulate (SiO₂, Fe₂O₃). Surface roughness is elevated to 2.8-4.2 µm Ra due to pitting corrosion. The native FCC crystalline structure is obscured. The high bulk thermal conductivity (237 W/m·K) and diffusivity (97.1 mm²/s) will rapidly dissipate laser energy, while the initial 92% reflectivity at 1064 nm necessitates high peak fluence to overcome the 0.5 J/cm² ablation threshold. Contaminants act as localized absorption centers, creating thermal gradients that risk subsurface damage.

