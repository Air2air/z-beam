# Basic Content Structure
before_text: |
  Initial surface examination reveals significant contamination deposits across the rhodium Laser cleaning of rhodium utilizes short pulses from a fiber laser to selectively ablate surface contaminants. Rhodium's high reflectivity (~80% at 1064 nm) and thermal conductivity require precise fluence control to overcome reflectivity and achieve efficient ablation without melting the precious metal substrate.. 
  Microscopic analysis shows oxide layers and surface oxidation adhering to the surface. The rhodium exhibits the characteristic density profile typical of metal materials.
  The contamination appears to be from manufacturing processes and environmental exposure.

after_text: |
  Post-laser cleaning analysis demonstrates remarkable surface restoration through comprehensive laser processing.
  The rhodium substrate now exhibits pristine surface characteristics with minimal thermal effects.
  Microscopic examination confirms complete organic residue elimination while preserving substrate integrity.
