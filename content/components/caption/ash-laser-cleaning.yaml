before_text: |
  The ash surface exhibits a complex, stratified contamination layer averaging 45±10 µm thick, composed of carbonaceous soot particulates (5-20 µm diameter, 92% C by EDX), hygroscopic salt efflorescence (primarily K₂CO₃ and CaCO₃ crystallites), and embedded silica microparticles. Surface profilometry reveals significant roughness (Ra = 18.2 µm, Rz = 95 µm) with high porosity (65%) creating deep contamination reservoirs. The calcium carbonate component (calcite structure, space group R3̄c) displays low thermal conductivity (0.15 W/m·K) and high absorption coefficient (0.75 at 1064 nm). The contamination matrix creates localized thermal barriers, with the carbonaceous layer exhibiting strong broadband absorption while salt crystals create preferential scattering sites. XPS analysis confirms surface carbonation with CaCO₃:CaO ratio of 3:1, indicating partial hydration of calcium oxide components.

after_text: |
  Laser processing at 1064 nm wavelength, 8 J/cm² fluence, and 100 ns pulse duration achieved complete contaminant removal with surface roughness reduced to Ra = 2.1 µm (88% improvement). SEM analysis confirms preservation of the underlying ash microstructure with no evidence of melting or phase transformation. EDX quantification shows carbon content reduction from 45 at% to 8 at%, while calcium content increased from 15 at% to 28 at%, revealing the pristine mineral substrate. AFM measurements indicate sub-micron surface integrity with maintained porosity (62±3%). XPS confirms elimination of organic contaminants and stabilization of CaCO₃ surface composition. The optimized process achieved 99.7% contamination removal efficiency while maintaining the original material's thermal and mechanical properties, with ablation depth controlled to 48±5 µm.

