# Basic Content Structure
before_text: |
  Initial surface examination reveals significant contamination deposits across the marble Laser cleaning of marble (CaCO3) utilizes precise nanosecond pulsed fiber lasers at 1064nm wavelength to selectively remove surface contaminants through photomechanical and photothermal ablation mechanisms while preserving the original calcite matrix and surface patina.. 
  Microscopic analysis shows weathering and biological deposits adhering to the surface. The marble exhibits the characteristic density profile typical of stone materials.
  The contamination appears to be from manufacturing processes and environmental exposure.

after_text: |
  Post-laser cleaning analysis demonstrates remarkable surface restoration through comprehensive laser processing.
  The marble substrate now exhibits pristine surface characteristics with minimal thermal effects.
  Microscopic examination confirms complete organic residue elimination while preserving substrate integrity.
