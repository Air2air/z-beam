before_text: |
  The bamboo surface exhibits severe marine corrosion contamination, characterized by a 15-25 µm thick heterogeneous layer. SEM-EDX analysis identifies FeO(OH) (5-8 wt%), NaCl crystals (12-15 wt%), and biological fouling residues. Surface roughness increases to 8.5 µm Ra due to pitting corrosion and salt crystallization within the 40% porous structure. The natural silica-rich epidermis (SiO₂ ~3 wt%) shows compromised integrity, with cellulose microfibrils (crystalline index ~65%) exhibiting reduced laser absorption (α=0.68 at 1064 nm). XPS confirms surface carbonization (C-C bonds increase to 72%) from prior degradation. The low thermal conductivity (0.15 W/m·K) creates significant thermal management challenges, with ablation threshold reduced to 0.6 J/cm² due to contaminant-enhanced absorption.

after_text: |
  Laser processing (1064 nm, 0.9 J/cm², 100 ns pulses, 50 kHz) achieves complete contaminant removal with surface roughness reduced to 3.8 µm Ra. SEM confirms preservation of the native silica epidermis and cellulose microstructure (crystallinity index maintained at 64%). Profilometry shows maximum material removal of 18 µm, well below the 280°C charring threshold. XPS analysis reveals restored surface chemistry (C-O bonds at 68%, O-C=O at 22%). AFM measurements demonstrate minimal subsurface damage (sub-µm HAZ) with water contact angle improved from 85° to 72°, indicating enhanced hydrophilicity. The processed surface maintains 95% of original tensile strength (133 MPa) with thermal conductivity restored to 0.149 W/m·K.

