# Caption Content for Alumina
before_text: |
  The alumina surface exhibits severe hydrocarbon contamination (C15-C30 alkanes, ~85 at% C via XPS) with localized metallic oxide deposits (Fe2O3, ~5 at% Fe). Profilometry reveals significant surface degradation with Ra = 1.8 ± 0.3 μm and contamination layer thickness of 8-12 μm. The inherent α-Al2O3 corundum structure (hexagonal, space group R3̄c) shows compromised surface integrity with thermal stress microcracks propagating along basal planes. The contamination layer dramatically alters optical properties, increasing effective absorption at 1064nm from alumina's intrinsic 0.15 cm⁻¹ to >120 cm⁻¹ due to carbonaceous deposits. The low thermal diffusivity (0.08 cm²/s) and high melting point (2072°C) create challenging thermal management conditions, with contamination-induced localized heating exceeding alumina's ablation threshold (2.5 J/cm²).

after_text: |
  Laser processing at 1064nm (8 ns pulses, 3.2 J/cm² fluence, 25 kHz) achieved complete contaminant removal, reducing surface carbon content from 85 at% to <2 at% (XPS analysis). Surface roughness improved to Ra = 0.15 ± 0.05 μm, representing 92% reduction. SEM imaging confirms preservation of the α-Al2O3 hexagonal crystalline structure with no phase transformation. AFM measurements show sub-50 nm surface uniformity with maintained mechanical integrity (Vickers hardness: 9 Mohs post-treatment). The surface now exhibits native alumina optical properties with reflectivity restored to 0.08 at 1064nm. EDX analysis confirms chemical purity >99.3% Al2O3 with complete elimination of Fe contamination. Thermal damage is minimal, with no evidence of melting or microcracking, demonstrating optimal fluence control below the 15 J/cm² damage threshold.

