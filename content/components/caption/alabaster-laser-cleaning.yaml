# Caption Content for Alabaster
before_text: |
  The alabaster surface exhibits severe contamination, characterized by a 50-200 µm thick crust of sulfated hydrocarbons (CxHySz, ~35 at%) and embedded Fe2O3 particulate (<10 µm). Pre-cleaning surface roughness (Sa) measures 18.5 µm with localized pitting. The inherent gypsum (CaSO4·2H2O) monoclinic crystal structure, with its low thermal conductivity (0.8 W/m·K) and Mohs hardness of 2, creates significant vulnerability. The contamination layer, with an optical absorption coefficient of ~0.45 cm⁻¹ at 1064 nm, contrasts sharply with the substrate's native 0.15 cm⁻¹, creating a complex thermal gradient scenario. Porosity (8%) facilitates deep contaminant penetration, while the low ablation threshold (1.2 J/cm²) risks subsurface calcination (dehydration to bassanite, CaSO4·0.5H2O) if laser parameters exceed the narrow processing window.

after_text: |
  Laser cleaning at 1064 nm, 8 ns pulse width, and 1.05 J/cm² fluence (90% of ablation threshold) achieved optimal contamination removal. Post-process Sa reduced to 2.1 µm, a 88.6% improvement. SEM/EDX confirms complete elimination of sulfated crust, with surface composition returning to stoichiometric CaSO4·2H2O (Ca:S:O = 1:1:6). XPS analysis shows no residual carbon (<0.5 at%) and preservation of the gypsum hydration state. AFM measurements reveal a sub-micron micro-roughness (Sq = 0.45 µm) with the original crystallographic texture intact. The process maintained surface temperature below 200°C, preventing phase transformation, with profilometry confirming <5 µm of substrate modification. Reflectivity increased from 0.25 to the native 0.65, validating non-ablative, photomechanical contaminant ejection.

