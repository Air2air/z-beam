before_text: |
  Initial surface examination reveals significant contamination deposits across the gallium Gallium laser cleaning utilizes precise pulsed fiber laser parameters to remove surface contaminants and oxides without damaging the underlying metal substrate. The process leverages gallium's low melting point (29.76°C) and unique thermal properties for selective ablation with minimal thermal penetration.. 
  Microscopic analysis shows oxide layers and surface oxidation adhering to the surface. The gallium exhibits the characteristic density profile typical of metal materials.
  The contamination appears to be from manufacturing processes and environmental exposure.

