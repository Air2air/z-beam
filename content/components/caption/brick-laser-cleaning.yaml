# Basic Content Structure
before_text: |
  Initial surface examination reveals significant contamination deposits across the brick Laser cleaning of brick utilizes precise thermal ablation where contaminants absorb laser energy more efficiently than the brick substrate, enabling selective removal without damaging the clay-based masonry material. Optimal parameters prevent thermal stress and preserve historical surfaces.. 
