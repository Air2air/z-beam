caption:
  beforeText: At 500x magnification, the willow surface is obscured by a dense, amorphous
    contamination layer approximately 20-50 micrometers thick. This layer, composed
    of particulate matter, oxidized resins, and microbial biofilm, fills the wood's
    porous structure. The underlying cellular anatomy, including vessel elements and
    rays, is largely concealed. The surface texture is irregular and crust-like, with
    fissures propagating through the contaminant matrix, indicating poor adhesion
    and brittleness.
  afterText: Laser cleaning produces a distinct transformation, revealing the intact
    anatomical structure of the willow wood. At 500x magnification, the surface now
    exhibits clearly defined tracheids and vessel elements, with a porosity measurement
    restored to near the baseline of 65%. The ablation process has selectively removed
    the contamination layer without carbonizing the underlying cellulose matrix, as
    evidenced by the clean, light-colored cell walls. The surface topography is micro-rough
    but uniform, a result of the differential ablation between the low-density earlywood
    and denser latewood bands. This precision preserves the wood's intrinsic mechanical
    properties, such as its 9.2 GPa modulus of elasticity, by avoiding mechanical
    abrasion or solvent-induced swelling. The cleaned surface is optimally prepared
    for subsequent conservation treatments or finishing processes.
  description: Microscopic analysis of willow surface before and after laser cleaning
    treatment
  alt: Microscopic view of willow surface showing laser cleaning effects
