caption:
  beforeText: 'A silver surface requiring cleaning is often obscured by layers of contamination. This can include dark, stubborn
    tarnish (silver sulfide), which forms when silver reacts with sulfur in the air, as well as greasy residues, dust, and
    other industrial grime. These layers mask the metal's natural, brilliant white luster, making it appear dull and discolored.


    The challenge in cleaning silver lies in its softness and its exceptional ability to conduct heat. Its softness means
    abrasive methods can easily scratch and permanently damage the surface. Furthermore, silver's high thermal conductivity
    causes it to spread heat very quickly, making localized treatments difficult. Any effective cleaning process must remove
    the contamination without harming the delicate metal underneath or causing heat damage.'
  afterText: 'After laser cleaning, the silver surface is restored to its original, pristine condition. The process has completely
    removed the tarnish and contaminants, revealing the metal's characteristic high reflectivity and bright, white shine.
    The surface is now visually clean and smooth.


    Critically, this result is achieved without any damage to the silver itself. The laser's precision ensures that only
    the contamination is removed, leaving the underlying metal completely intact. The surface is not scratched, melted, or
    thinned, preserving the integrity and value of the silver object.'
