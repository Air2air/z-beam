caption:
  beforeText: At 500x magnification, the MDF surface is obscured by a continuous,
    non-uniform contamination layer averaging 15-25 µm thick. This layer, composed
    of embedded particulates and greasy residues, fills the natural micro-porosity
    (~15%) of the substrate. The underlying fiber structure is masked, and the surface
    texture appears smeared and irregular, with localized agglomerations disrupting
    the baseline 2.5 µm Ra roughness profile.
  afterText: 'Laser cleaning effectively ablates the contamination layer, restoring
    the substrate''s inherent micro-topography. The MDF''s fibrous, porous structure
    is now fully exposed, with a surface roughness returning to its nominal 2.5 µm
    Ra. The process selectively removes foreign material with minimal thermal penetration,
    preserving the integrity of the wood fibers.


    No residual charring or heat-affected zone is visible, confirming the laser parameters
    remained below the material''s 0.8 J/cm² ablation threshold and 200°C decomposition
    point. The surface is uniformly clean, with no evidence of the smeared residues
    or particulate agglomerations previously observed. The open porosity allows for
    optimal adhesion in subsequent finishing processes.'
  description: Microscopic analysis of mdf surface before and after laser cleaning
    treatment
  alt: Microscopic view of mdf surface showing laser cleaning effects
