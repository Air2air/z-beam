caption:
  beforeText: At 500x magnification, the breccia surface is obscured by a stratified
    contamination layer, approximately 50-200 µm thick. This layer, composed of particulate
    matter, black crusts, and biological growth, fills the natural porosity and fractures.
    It forms a discontinuous, opaque film that masks the stone's inherent texture
    and mineralogical composition, creating a topographical map of decay rather than
    geology.
  afterText: Post-cleaning, the 500x view reveals the restored breccia substrate.
    The heterogeneous assemblage of angular clasts and the interstitial cementitious
    matrix are now fully exposed. Surface porosity is cleared of occluding deposits,
    and the original micro-fracture network is visible, restoring the stone's authentic
    lithological character without thermal alteration.
  description: Microscopic analysis of breccia surface before and after laser cleaning
    treatment
  alt: Microscopic view of breccia surface showing laser cleaning effects
