caption:
  beforeText: 'At 500x magnification, the breccia surface is obscured by a complex,
    stratified contamination layer. A dark, carbonaceous crust, approximately 50-200
    micrometers thick, adheres tenaciously to the stone matrix. This crust infiltrates
    the surface porosity (8.2%), filling micro-fractures and cementing the angular
    clasts.


    Beneath this crust, a sub-layer of sulfate and nitrate efflorescence crystallizes
    within the pore network. The original breccia texture—defined by the sharp boundaries
    and varied mineralogy of its clasts—is masked. The contaminants create a continuous,
    obscuring film that alters the surface''s intrinsic reflectivity of 0.22 and compromises
    the visual and structural integrity of the stone.'
  afterText: 'Following laser cleaning, microscopic analysis at 500x reveals the restored
    breccia substrate. The contamination crust has been entirely removed via ablation,
    with the process precisely controlled below the stone''s damage threshold of 2.8
    J/cm². The intrinsic porosity and micro-texture of the consolidated rock are now
    fully exposed.


    The sharp, geometric boundaries between the constituent clasts are clearly defined,
    restoring the material''s heterogeneous character. The surface exhibits no thermal
    damage, such as melting or micro-fracturing, confirming the procedure''s selectivity.
    The original stone matrix, with its variable reflectivity and mineral-specific
    details, is visually and physically accessible.'
  description: Microscopic analysis of breccia surface before and after laser cleaning
    treatment
  alt: Microscopic view of breccia surface showing laser cleaning effects
