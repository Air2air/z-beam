caption:
  beforeText: At 500x magnification, the teak surface is obscured by a discontinuous
    contamination layer, approximately 20-50 µm thick. This layer, composed of embedded
    soot, microbial biofilm, and mineral particulates, fills the wood's porous structure.
    The underlying grain texture is masked, and the contaminants form a matte, amorphous
    crust that disrupts the natural cellular topography.
  afterText: The laser process has selectively ablated the contamination layer, revealing
    the intact wood substrate. The original grain pattern and cellular structure are
    now fully visible, with a clean, well-defined surface. The teak's natural porosity
    is restored without thermal degradation to the surrounding fibers.
  description: Microscopic analysis of teak surface before and after laser cleaning
    treatment
  alt: Microscopic view of teak surface showing laser cleaning effects
