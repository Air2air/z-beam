caption:
  before_text: At 500x magnification, the alabaster surface is obscured by a complex
    contamination layer. A discontinuous crust, measuring 50-200 micrometers thick,
    adheres to the substrate. This layer consists of particulate matter (carbon, dust)
    embedded within a matrix of sulfates and hydrocarbon deposits, likely from environmental
    exposure. The underlying alabaster's micro-porosity (8.5%) is filled, and its
    natural crystalline texture is completely masked. The contaminants exhibit a craze-patterned
    network of micro-fractures, indicating brittleness and poor adhesion to the soft
    stone (Mohs 2.0).
  after_text: The laser-cleaned surface reveals the pristine alabaster substrate.
    The contaminant crust has been entirely removed via ablation, restoring the stone's
    intrinsic micro-crystalline structure and open porosity. The surface now displays
    its natural texture with sharp, well-defined grain boundaries, free of residual
    film or thermal damage.
