caption:
  before_text: At 500x magnification, the copper surface is obscured by a non-uniform contamination layer approximately 5-15
    µm thick. This layer consists of a topographical mix of amorphous oxide/hydroxide deposits and localized, crystalline
    corrosion products. The underlying copper's grain structure is entirely masked. Surface texture is irregular, with pitting
    and a porous, scaly morphology that traps microscopic particulates, significantly increasing surface area and roughness.
  after_text: 'Laser cleaning has completely removed the contamination layer, revealing the pristine, polycrystalline microstructure
    of the base copper. The surface now exhibits clearly defined grain boundaries and annealing twins, with a uniform, metallurgically
    clean appearance. The previous porous texture has been replaced by a smooth, dense surface characteristic of the metal''s
    face-centered cubic crystal structure.


    This process exploits copper''s high thermal conductivity (401 W/m·K) to rapidly dissipate laser energy, enabling precise
    ablation of contaminants without melting the substrate. The result is a surface with minimal topographical alteration;
    the original micro-imperfections of the copper remain, but are free of all foreign material. This yields a surface with
    optimal reflectivity and minimal particulate entrapment, meeting the stringent hygiene and performance requirements for
    advanced applications.'
