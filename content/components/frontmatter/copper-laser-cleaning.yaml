caption:
  beforeText: At 500x magnification, the copper surface is obscured by a complex contamination
    layer. A discontinuous oxide scale, primarily cuprous oxide (Cu₂O), appears as
    dark, crystalline patches ranging from 2 to 15 micrometers in thickness. This
    brittle, non-uniform layer is overlaid with particulate matter and carbonaceous
    deposits that fill the original machining grooves and grain boundaries. The surface
    texture is highly irregular, with contamination forming peaks and valleys that
    scatter light and mask the underlying metal's microstructure. The native copper
    substrate is largely invisible, its high reflectivity and characteristic color
    neutralized by this optically thick, adherent film of corrosion and grime.
  afterText: Laser cleaning restores the surface to its intrinsic state, revealing
    the pristine copper microstructure at 500x magnification. The tenacious oxide
    and particulate layers have been completely ablated, exposing the original grain
    boundaries and machining marks with high fidelity. The surface now exhibits a
    uniform, clean metallic texture with a significant restoration of its characteristic
    reflectivity. The process successfully removed the contamination without inducing
    measurable surface melting or ablation of the underlying copper substrate, preserving
    the material's dimensional integrity and functional properties.
  description: Microscopic analysis of copper surface before and after laser cleaning
    treatment
  alt: Microscopic view of copper surface showing laser cleaning effects
