caption:
  beforeText: 'At 500x magnification, the copper surface is obscured by a complex
    contamination layer. A non-uniform oxide scale, primarily cuprous oxide (Cu₂O),
    appears as a matte, brick-red crust with localized black tenorite (CuO) nodules.
    This layer, measuring 5-15 micrometers thick, exhibits micro-cracking and spallation
    due to thermal stress. Particulate contaminants, including carbonaceous soot and
    silicate dust, are embedded within this porous matrix, creating a microscopically
    rough and discontinuous surface topography that severely degrades the underlying
    metal''s reflectivity and electrical properties.


    The surface texture is highly irregular, with contamination filling the original
    grain boundaries of the copper substrate. This heterogeneous layer disrupts thermal
    and electrical continuity, forming localized galvanic cells that can accelerate
    pitting corrosion beneath the surface. The combined effect is a surface that is
    optically dull, thermally insulating, and electrochemically active.'
  afterText: 'Laser cleaning has completely removed the contamination layer, revealing
    the pristine copper substrate. The surface now exhibits a distinct grain structure
    with clearly defined boundaries, confirming the removal of all oxide and particulate
    matter. The micro-roughness is significantly reduced, resulting in a smooth, planar
    surface characteristic of annealed copper.


    This restoration yields a highly reflective, metallically clean finish. The surface
    is now continuous and homogeneous, which restores optimal thermal conductivity
    and electrical performance. The process has eliminated the sites for electrochemical
    activity, leaving a passive, stable surface.'
  description: Microscopic analysis of copper surface before and after laser cleaning
    treatment
