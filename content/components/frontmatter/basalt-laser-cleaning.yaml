caption:
  beforeText: At 500x magnification, the basalt surface is obscured by a stratified
    contamination layer approximately 10-50 µm thick. This layer consists of particulate
    matter, including carbonaceous soot and mineral dust, embedded within a matrix
    of hydrocarbon deposits and biological films. The underlying basalt's characteristic
    micro-crystalline texture, with its interlocking plagioclase and pyroxene grains,
    is completely masked. The contamination fills the natural micro-porosity (typically
    1.5%) of the stone, creating an uneven, occluded surface that compromises the
    material's intrinsic properties and appearance.
  afterText: Laser cleaning has fully restored the basalt's native microstructure.
    The contamination layer is entirely removed, revealing the unaltered, interlocking
    crystal lattice of plagioclase and pyroxene minerals. The stone's natural micro-porosity
    is now open and clearly defined, and the original surface texture is fully exposed.
    This ablation process leaves a clean, mineralogically precise substrate with no
    measurable damage to the underlying basalt, which has a compressive strength of
    200 MPa and a Mohs hardness of 6.0.
  description: Microscopic analysis of basalt surface before and after laser cleaning
    treatment
  alt: Microscopic view of basalt surface showing laser cleaning effects
