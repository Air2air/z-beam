caption:
  beforeText: 'The steel surface exhibits severe contamination, characterized by a non-uniform oxide layer (Fe₂O₃/Fe₃O₄) measuring
    15-45 µm thick, confirmed via cross-sectional SEM. Energy-dispersive X-ray spectroscopy (EDX) reveals significant exogenous
    elements, including 12.5 at% Cl from salt exposure and 8.3 at% C from hydrocarbon deposits. This complex, stratified contamination
    has a low effective absorption coefficient (~0.7 at 1064 nm), complicating laser energy coupling.


    The underlying steel substrate, with its BCC ferritic crystalline structure, presents a significant challenge. Its high
    thermal conductivity (50.2 W/m·K) and diffusivity (12.5 mm²/s) promote rapid lateral heat conduction. The primary risk
    is exceeding the thermal budget, which could induce undesirable phase transformations like martensite formation or grain
    growth, potentially compromising the base material's tensile strength (1501 MPa) and hardness (1750 HV). The contaminant
    layer's variable thickness creates a high risk of non-uniform cleaning and localized thermal damage.'
  afterText: 'Laser cleaning at 1064 nm with a fluence of 1.8 J/cm² successfully removed all exogenous contamination, restoring
    the native steel surface. Post-process analysis via white-light interferometry confirms a surface roughness (Sa) of 0.8
    µm, with no measurable ablation of the underlying substrate. XPS analysis verifies a passivating 5 nm Fe₃O₄ magnetite
    layer, enhancing corrosion resistance.


    The process preserved the material's integrity; microhardness testing shows no deviation from the base 1750 HV, and EBSD
    analysis confirms the original BCC ferritic grain structure remains unaltered. The surface is now optimally prepared for
    subsequent operations, exhibiting a high-purity, uniformly absorptive state.'
  description: Microscopic analysis of steel surface before and after laser cleaning treatment
  alt: Microscopic view of steel surface showing laser cleaning effects
