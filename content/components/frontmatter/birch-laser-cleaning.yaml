caption:
  beforeText: At 500x magnification, the birch surface is obscured by a discontinuous
    layer of particulate and organic contamination, measuring 5-15 µm in thickness.
    This layer fills the natural wood pores and adheres to the cell wall structures,
    masking the underlying grain texture. The contaminants form agglomerates, creating
    a topographically complex and uneven surface that scatters light and reduces the
    native wood's reflectivity.
  afterText: Laser cleaning has restored the surface to its native state. The contamination
    layer is completely removed, revealing the open, hexagonal structure of the birch's
    parenchyma cells and the distinct, linear tracheid tubes. The surface roughness
    is now consistent with the wood's inherent 3.2 µm Ra value. The ablation process
    has not carbonized the underlying cellulose, preserving the cell wall integrity.
    This results in a surface with defined micro-topography and a measured reflectivity
    of 0.45, characteristic of clean birch wood at 1064nm wavelength.
  description: Microscopic analysis of birch surface before and after laser cleaning
    treatment
  alt: Microscopic view of birch surface showing laser cleaning effects
