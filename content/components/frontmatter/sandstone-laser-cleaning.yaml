caption:
  beforeText: At 500x magnification, the sandstone surface is obscured by a dense,
    heterogeneous contamination layer approximately 50-200 µm thick. Particulate matter,
    including soot and mineral dust, is embedded within a dark, carbonaceous matrix
    that fills the natural pore network. This layer exhibits poor adhesion to the
    underlying quartz grains, creating micro-fractures and masking the stone's intrinsic
    granular texture and color.
  afterText: Post-cleaning, the surface reveals the original granular microstructure
    of the sandstone. The contamination layer has been selectively removed, exposing
    clean, interlocking quartz grains and reopening the 15.2% porosity network. The
    stone's intrinsic texture is fully restored, with minimal residual debris and
    no observable thermal damage to the grain boundaries at this magnification.
  description: Microscopic analysis of sandstone surface before and after laser cleaning
    treatment
  alt: Microscopic view of sandstone surface showing laser cleaning effects
