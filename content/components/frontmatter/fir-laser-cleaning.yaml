caption:
  beforeText: At 500x magnification, the fir surface is obscured by a dense, non-uniform
    contamination layer averaging 15-25 µm in thickness. This layer, composed of particulate
    matter, soot, and degraded organic films, fills the porous wood structure and
    masks the underlying cellular anatomy. The surface texture appears matte and irregular,
    with contaminants adhering strongly to the lumen of tracheids and ray parenchyma
    cells, creating a topographically complex and occluded surface.
  afterText: Laser cleaning effectively restores the intrinsic anatomical features
    of the fir wood. At 500x magnification, the surface now reveals a clean, open
    cellular structure with clearly defined tracheid cell walls and unobstructed pits.
    The contamination layer has been completely removed via selective ablation, exposing
    the wood's natural porosity of approximately 65% without inducing macroscopic
    damage. The surface texture is significantly smoother and more uniform, with a
    measurable reduction in surface roughness. The reflectivity at 1064 nm increases
    from 0.15 to near the inherent wood value, indicating the removal of light-absorbing
    contaminants. This precise, non-contact process preserves the structural integrity
    of the cellulose-lignin matrix, leaving a substrate ready for further conservation
    or coating.
  description: Microscopic analysis of fir surface before and after laser cleaning
    treatment
  alt: Microscopic view of fir surface showing laser cleaning effects
