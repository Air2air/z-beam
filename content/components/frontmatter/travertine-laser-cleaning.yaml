caption:
  beforeText: At 500x magnification, the travertine surface is obscured by a continuous,
    heterogeneous contamination layer, approximately 50–200 µm thick. This layer,
    composed of particulate matter, carbonaceous soot, and biological growth, fills
    the natural pores and voids characteristic of the stone. The underlying calcite
    crystal structure and surface texture are entirely masked, with contaminants adhering
    strongly to the rough micro-topography.
  afterText: Post-cleaning, the 500x view reveals the restored calcite matrix, with
    contaminants fully removed from the surface and pores. The original micro-texture,
    including crystalline facets and natural voids, is now clearly defined and unblemished.
    The surface exhibits minimal subsurface thermal alteration, confirming the ablation
    process was confined to the contamination layer, preserving the stone's integrity.
  description: Microscopic analysis of travertine surface before and after laser cleaning
    treatment
  alt: Microscopic view of travertine surface showing laser cleaning effects
