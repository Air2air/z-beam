caption:
  beforeText: At 500x magnification, the hickory surface is obscured by a dense, amorphous
    contamination layer approximately 10-50 micrometers thick. This layer, composed
    of embedded soot, industrial grime, and degraded finishes, fills the porous wood
    structure, completely masking the cellular anatomy. The surface texture is irregular
    and crust-like, with fissures propagating through the contaminant matrix. This
    layer adheres tenaciously within the vessel elements and lumens, creating a discontinuous
    surface that compromises the underlying wood's integrity and appearance.
  afterText: Laser ablation has removed the contamination layer, fully restoring the
    hickory's native microstructure. The cleaned surface reveals open lumens and distinct
    cell walls, with the characteristic porous architecture now fully visible. The
    underlying wood substrate is intact, with no measurable thermal degradation to
    the cellular structure.
  description: Microscopic analysis of hickory surface before and after laser cleaning
    treatment
  alt: Microscopic view of hickory surface showing laser cleaning effects
