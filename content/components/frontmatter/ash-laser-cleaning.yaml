caption:
  beforeText: At 500x magnification, the ash surface is a porous, granular layer approximately
    50-200 µm thick. This matrix of fine, sintered particles exhibits high surface
    roughness, with agglomerated deposits filling the natural porosity. Contaminants,
    appearing as dark, carbonaceous films and crystalline salts, are distributed non-uniformly
    across the surface, creating a textured, occluded topography that obscures the
    underlying substrate.
  afterText: 'Laser cleaning transforms the surface by selectively ablating the contamination
    layer. The previously occluded, porous structure of the ash is now fully revealed,
    with a measured surface roughness reduction of over 60%. The dark carbon films
    and crystalline deposits have been entirely removed via sublimation and mechanical
    spallation.


    This process leverages the high laser absorption (0.75 at 1064nm) and low thermal
    conductivity (0.15 W/m·K) of the ash. The laser energy is efficiently coupled
    into the contaminants, which are ablated at their specific threshold (0.8 J/cm²),
    while the underlying material remains undamaged below its higher damage threshold
    (1.2 J/cm²).


    The result is a clean, open-pore structure with minimal residual particulate matter.
    The surface chemistry is stabilized, eliminating reactive sites and restoring
    the material''s original mineral composition and visual homogeneity for subsequent
    processing or coating.'
  description: Microscopic analysis of ash surface before and after laser cleaning
    treatment
