caption:
  beforeText: At 500x magnification, the shale surface is obscured by a complex contamination
    layer. A discontinuous, carbonaceous crust, measuring 15-25 µm thick, adheres
    to the natural bedding planes. This crust is punctuated by embedded particulate
    matter, primarily silicates and salts, which anchor it to the substrate. The underlying
    shale's characteristic fine-grained laminations and micro-porosity (average 12%)
    are completely masked. The contaminant fills surface voids and creates a topographically
    uniform, matte-black layer that lacks the mineralogical detail of the native stone.
  afterText: Laser cleaning has fully removed the contamination layer, revealing the
    pristine shale substrate. The fine laminations and micro-texture of the original
    bedding planes are now clearly visible, with a surface roughness of approximately
    8.5 µm Ra. The micro-porous network is fully exposed and free of occluding material.
    The laser process has restored the stone's inherent mineralogical contrast and
    surface detail without inducing micro-fractures or thermal alteration to the underlying
    material.
  description: Microscopic analysis of shale surface before and after laser cleaning
    treatment
  alt: Microscopic view of shale surface showing laser cleaning effects
