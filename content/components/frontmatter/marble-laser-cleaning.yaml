caption:
  beforeText: At 500x magnification, the marble surface is obscured by a stratified
    contamination layer, typically 50-200 micrometers thick. This layer consists of
    particulate matter (soot, dust) embedded within a matrix of gypsum and calcium
    oxalates, formed from atmospheric sulfur and organic acids reacting with the calcite
    substrate. The original crystalline texture is masked, and the surface exhibits
    a disrupted, pitted morphology where the contaminants have filled natural micro-fissures
    and pores, compromising the stone's intrinsic reflectivity.
  afterText: Post-cleaning, the 500x view reveals the restored calcite crystalline
    structure. The superficial contamination layer has been entirely removed without
    subsurface damage, exposing the original interlocking grain boundaries and micro-topography.
    The surface is now characterized by its inherent micro-porosity and a uniform,
    clean substrate. This precise ablation restores the stone's fundamental optical
    and physical properties.
  description: Microscopic analysis of marble surface before and after laser cleaning
    treatment
  alt: Microscopic view of marble surface showing laser cleaning effects
