caption:
  beforeText: At 500x magnification, the rosewood surface is obscured by a discontinuous
    contamination layer, 5-15 µm thick. This matrix of embedded soot, oxidized oils,
    and fine particulates fills the wood's micro-porosity (approx. 45%). The underlying
    grain structure is partially masked, and the surface texture is artificially smoothed
    by the occluding deposits.
  afterText: Laser cleaning has fully removed the contamination layer, revealing the
    unaltered wood substrate. The original cellular structure, including vessels and
    medullary rays, is now clearly defined with sharp edges. The surface exhibits
    a micro-rough texture consistent with the wood's intrinsic porosity, with no evidence
    of thermal degradation such as charring or melting.
  description: Microscopic analysis of rosewood surface before and after laser cleaning
    treatment
  alt: Microscopic view of rosewood surface showing laser cleaning effects
