caption:
  beforeText: At 500x magnification, the brass surface is obscured by a complex layer
    of contamination. A discontinuous oxide film, primarily copper oxide (Cu₂O) and
    zinc oxide (ZnO), forms a topographical crust ranging from 0.5 to 5 micrometers
    in thickness. This brittle, crystalline layer exhibits micro-cracking and adheres
    to the underlying metal, which retains its original machining marks. Embedded
    within this matrix are particulate contaminants—carbonaceous soot and environmental
    dust—further disrupting the surface's integrity and creating a porous, non-uniform
    texture that masks the substrate's metallic luster and compromises its functional
    properties.
  afterText: Laser cleaning has removed the contamination layer, revealing the pristine
    brass substrate. The original surface texture, including fine machining striations
    with an average roughness (Ra) of approximately 0.8 µm, is now fully exposed and
    continuous. The process has selectively ablated the oxides and particulates without
    melting the underlying metal, restoring the characteristic reflectivity and a
    uniform, metallurgically clean surface free from micro-fractures.
  description: Microscopic analysis of brass surface before and after laser cleaning
    treatment
  alt: Microscopic view of brass surface showing laser cleaning effects
