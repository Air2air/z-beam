caption:
  beforeText: At 500x magnification, the slate surface is obscured by a complex contamination
    layer. A discontinuous, particulate-rich film, ranging from 5 to 50 micrometers
    in thickness, adheres to the natural cleavage planes. This layer consists of agglomerated
    soot, mineral dust, and biological growth, which fills the micro-fissures and
    pores characteristic of the stone. The underlying slate texture is largely undiscernible,
    masked by this stratified, amorphous deposit that disrupts the substrate's inherent
    morphology and increases light absorption.
  afterText: Following laser cleaning, the 500x view reveals a complete restoration
    of the intrinsic slate surface. The particulate film has been entirely removed
    via ablation, exposing the distinct, layered cleavage planes and a clean network
    of micro-fissures. The surface now exhibits its natural low reflectivity of approximately
    0.12 at 1064nm, with no residual contamination. The mineral grain structure is
    clearly defined, confirming the selective removal of foreign material without
    damage to the substrate, which has an ablation threshold of 1.8 J/cm².
  description: Microscopic analysis of slate surface before and after laser cleaning
    treatment
  alt: Microscopic view of slate surface showing laser cleaning effects
