caption:
  beforeText: At 500x magnification, the limestone surface is obscured by a dense,
    stratified contamination layer approximately 50-200 µm thick. This layer, composed
    of carbonaceous particulates, gypsum crusts, and biological growth, fills the
    natural micropores and intergranular boundaries of the calcite matrix. The underlying
    crystalline structure and surface texture are entirely masked, with the contaminant
    exhibiting a cohesive, crust-like morphology that adheres strongly to the substrate.
  afterText: 'Laser cleaning has removed the stratified contamination layer, fully
    exposing the original limestone substrate. The calcite crystal matrix is now clearly
    defined, with intergranular boundaries and natural micropores (typically 5-20
    µm in diameter) visible and unobstructed. The surface texture has returned to
    its inherent state, characterized by sub-micron surface roughness.


    The removal process was selective, eliminating foreign material while preserving
    the integrity of the calcium carbonate crystals. No thermal degradation, such
    as melting or micro-fracturing, is observed at the ablation threshold of 1.2 J/cm².
    This confirms the laser parameters were optimized to exploit the differential
    in absorption and ablation thresholds between the contaminant and the stone, resulting
    in a clean, mineralogically intact surface.'
  description: Microscopic analysis of limestone surface before and after laser cleaning
    treatment
  alt: Microscopic view of limestone surface showing laser cleaning effects
