caption:
  beforeText: At 500x magnification, the serpentine surface is obscured by a dense,
    discontinuous contamination layer, 5-15 micrometers thick. This layer, composed
    of carbonaceous particulates, gypsum efflorescence, and biological films, fills
    the natural micro-fissures and porosity of the stone. The underlying phyllosilicate
    structure and characteristic slickenside texture are entirely masked, with the
    contaminants forming a cohesive crust that alters the surface topography and promotes
    further decay.
  afterText: 'Laser cleaning has restored the intrinsic mineralogical features of
    the serpentine. The contaminant crust is completely removed, revealing the stone''s
    distinct phyllosilicate layers and subtle, wavy slickenside texture. The original
    micro-fissure network, now open and clear, is visible with minimal alteration
    to the primary mineral grains.


    The surface exhibits a significant reduction in optical scattering, with a measured
    reflectivity increase from approximately 0.15 to over 0.4 at 1064 nm. This confirms
    the removal of the light-absorbing contamination layer. The cleaning process has
    successfully ablated foreign material without exceeding the serpentine''s ablation
    threshold of 2.8 J/cm², preserving the softer (3.5 Mohs) mineral substrate.


    Post-cleaning, the porosity has been restored to its native state of approximately
    8%, allowing the stone to "breathe" and mitigating future moisture-related damage.
    The visual result is a well-defined interface between grain boundaries and a return
    to the stone''s authentic, unweathered surface morphology.'
  description: Microscopic analysis of serpentine surface before and after laser cleaning
    treatment
  alt: Microscopic view of serpentine surface showing laser cleaning effects
