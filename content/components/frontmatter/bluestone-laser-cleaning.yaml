caption:
  beforeText: At 500x magnification, the bluestone surface reveals a complex stratigraphy
    of contamination. A continuous, amorphous layer, approximately 10-50 micrometers
    thick, obscures the underlying mineral matrix. This layer, composed of carbonaceous
    soot, gypsum crusts, and embedded particulate, exhibits a high degree of micro-fissuring.
    The contaminants have infiltrated the stone's natural micropores (3.5% porosity),
    creating a dense, optically opaque film that masks the substrate's inherent crystalline
    structure and texture. The original grain boundaries and interlocking quartz crystals
    are no longer discernible.
  afterText: Laser cleaning has restored the substrate's fundamental mineralogy. The
    contamination layer is entirely removed, revealing the original interlocking quartz
    crystals and a clean, micro-rough surface texture. The stone's intrinsic porosity
    and grain boundaries are now clearly defined, with no evidence of thermal alteration
    or mechanical damage to the mineral lattice.
  description: Microscopic analysis of bluestone surface before and after laser cleaning
    treatment
  alt: Microscopic view of bluestone surface showing laser cleaning effects
