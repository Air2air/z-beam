caption:
  beforeText: At 500x magnification, the bamboo surface is obscured by a continuous
    contamination layer approximately 15-25 µm thick. This layer, composed of embedded
    soot, fungal hyphae, and particulate matter, fills the natural micro-pores and
    valleys of the substrate. The underlying fiber structure is largely hidden, with
    only the peaks of the native 8.5 µm Ra roughness visible through the disorganized,
    matte-textured coating.
  afterText: 'Laser cleaning removes the amorphous contamination layer, fully revealing
    the intricate, anisotropic microstructure of the bamboo. The longitudinal orientation
    of the vascular bundles and sclerenchyma fibers is now distinctly visible, with
    their natural hardness of 3.2 GPa contributing to the cleaned surface''s resilience.
    The process restores the material''s inherent porosity of 45%, evident as a network
    of open micro-pores no longer clogged with foreign material.


    The surface texture is transformed from a matte, occluded film to the original
    fibrous topography with a measured roughness of approximately 8.5 µm Ra. This
    precise ablation, achieved by operating below the 280°C decomposition threshold,
    selectively removed contaminants while preserving the structural integrity of
    the cellulose-lignin matrix. The cleaned surface exhibits the bamboo''s intrinsic
    optical properties, including an absorption coefficient of 0.85, which is critical
    for applications requiring predictable material behavior.'
  description: Microscopic analysis of bamboo surface before and after laser cleaning
    treatment
  alt: Microscopic view of bamboo surface showing laser cleaning effects
