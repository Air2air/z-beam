caption:
  beforeText: At 500x magnification, the walnut surface is obscured by a continuous,
    amorphous contamination layer measuring 10-50 µm thick. This layer, composed of
    embedded soot, dust, and oxidized organic residues, fills the wood's porous structure,
    increasing its effective surface area. The contaminant exhibits a cracked, mudflat-like
    texture, which masks the underlying cellular definition of the walnut's grain
    and vessels. This non-uniform layer disrupts the wood's natural topography and
    significantly alters its surface energy and optical properties.
  afterText: Laser cleaning has fully removed the contamination layer, revealing the
    intact cellular anatomy of the walnut. The open lumens of vessels and tracheids
    are now clearly visible, and the original grain texture is restored without subsurface
    charring. The surface exhibits minimal micro-fissuring, confirming that the laser
    fluence was maintained below the 0.8 J/cm² ablation threshold of the wood substrate.
    This results in a clean, topographically precise surface.
  description: Microscopic analysis of walnut surface before and after laser cleaning
    treatment
  alt: Microscopic view of walnut surface showing laser cleaning effects
