caption:
  beforeText: At 500x magnification, the redwood surface is obscured by a stratified
    contamination layer, typically 50-200 µm thick. This layer consists of embedded
    soot particulates, biological growth within the porous structure, and a consolidated
    film of oxidized organic residues. The underlying cellular detail, including tracheids
    and medullary rays, is largely masked. The surface texture is irregular and crust-like,
    with fissures propagating from differential expansion between the contaminants
    and the wood substrate.
  afterText: Laser cleaning has restored the surface to its native state. At 500x
    magnification, the intricate cellular architecture of the redwood is fully revealed,
    with clearly defined tracheid cell walls and open lumens. The surface is free
    of particulate matter and biological films, with no evidence of the previous stratified
    layer. The cleaning process has preserved the wood's micro-topography, resulting
    in a clean, well-defined surface with minimal disruption to the delicate cell
    structure.
  description: Microscopic analysis of redwood surface before and after laser cleaning
    treatment
  alt: Microscopic view of redwood surface showing laser cleaning effects
