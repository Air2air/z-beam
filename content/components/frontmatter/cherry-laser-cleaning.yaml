caption:
  beforeText: At 500x magnification, the cherry surface is obscured by a stratified
    contamination layer approximately 50-200 µm thick. This layer consists of embedded
    particulate matter, consolidated oils, and microbial biofilms that fill the wood's
    porous structure. The underlying cellular anatomy, including vessel elements and
    medullary rays, is partially masked. The surface texture is irregular and matte,
    with contaminants forming a discontinuous crust that compromises the wood's intrinsic
    reflectivity and reveals a compromised, degraded state.
  afterText: Following laser cleaning, microscopic analysis reveals the complete restoration
    of the cherry wood's native cellular architecture. The contamination layer has
    been entirely removed via selective laser ablation, exposing a clean, well-defined
    surface where vessel elements and medullary rays are clearly visible. The process
    has preserved the wood's structural integrity, with no evidence of charring or
    thermal degradation, as the energy input remained below the 1.2 J/cm² ablation
    threshold of the underlying substrate. The surface topography is now uniform,
    with restored porosity and a measurable increase in reflectivity, confirming the
    precise and non-contact nature of the cleaning process.
  description: Microscopic analysis of cherry surface before and after laser cleaning
    treatment
  alt: Microscopic view of cherry surface showing laser cleaning effects
