caption:
  beforeText: At 500x magnification, the oak surface is obscured by a complex contamination
    layer averaging 50-200 micrometers in thickness. This layer consists of embedded
    particulate matter, soot, and biological growth, which fills the porous wood structure.
    The contaminants form a discontinuous, textured crust that masks the underlying
    cellular anatomy of the oak. The wood's characteristic large vessels and open
    grain are completely bridged over, creating a rough, amorphous topography. This
    layer significantly alters the surface's thermal and optical properties, increasing
    its absorption of energy and impeding any analysis of the substrate.
  afterText: Post-cleaning analysis at 500x magnification reveals a complete restoration
    of the oak's native microstructure. The contamination layer has been selectively
    removed, exposing the clean, open lumens of the large vessels and the intricate
    network of wood fibers. The surface texture now accurately reflects the natural
    grain pattern, with a measurable reduction in surface roughness. The process has
    successfully ablated the contaminants without inducing macroscopic charring, preserving
    the cell wall integrity and leaving a substrate-ready surface for further conservation
    or finishing.
  description: Microscopic analysis of oak surface before and after laser cleaning
    treatment
  alt: Microscopic view of oak surface showing laser cleaning effects
