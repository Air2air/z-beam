caption:
  beforeText: At 500x magnification, the mahogany surface is obscured by a dense,
    stratified contamination layer approximately 50-200 µm thick. This layer, composed
    of embedded soot, oxidized varnish, and particulate matter, fills the wood's porous
    structure, increasing its effective porosity. The original grain texture is masked,
    presenting a fractured, amorphous topography with poor definition between the
    wood's cellular structure and the overlying deposits.
  afterText: Post-cleaning, the 500x view reveals the restored, open cellular structure
    of the mahogany. The contamination layer has been entirely removed, exposing the
    clean lumen of the longitudinal tracheids and ray parenchyma. The surface topography
    is now defined by the wood's natural porosity and grain pattern, with minimal
    residual carbonization. The underlying substrate is intact, confirming a sub-ablative
    cleaning process.
  description: Microscopic analysis of mahogany surface before and after laser cleaning
    treatment
  alt: Microscopic view of mahogany surface showing laser cleaning effects
