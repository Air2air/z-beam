caption:
  beforeText: At 500x magnification, the onyx surface is obscured by a complex contamination
    layer, typically 5-20 µm thick. This layer consists of particulate matter, soot,
    and organic films that have bonded to the stone's micro-texture. The contaminants
    fill the natural micro-fissures and pores of the onyx, creating an uneven, matte
    topography that masks the stone's inherent translucency and crystalline structure.
    The surface appears occluded, with a loss of subsurface light scattering due to
    the scattering and absorption of light by the foreign deposits.
  afterText: Laser cleaning has restored the pristine onyx surface. The contamination
    layer is entirely removed, revealing the intact, polycrystalline microstructure
    of the stone. The surface now exhibits its natural micro-relief and translucency,
    with no evidence of thermal damage or ablation to the underlying substrate. The
    result is a surface that allows for unimpeded light transmission and characteristic
    depth of appearance.
  description: Microscopic analysis of onyx surface before and after laser cleaning
    treatment
  alt: Microscopic view of onyx surface showing laser cleaning effects
