caption:
  beforeText: 'At 500x magnification, the poplar surface is obscured by a stratified
    contamination layer measuring 10-50 micrometers thick. This layer consists of
    embedded particulate matter, soot, and degraded organic films that fill the wood''s
    porous structure. The contaminants form an amorphous, non-uniform crust that masks
    the underlying cellular anatomy of the wood.


    The surface texture appears matte and irregular, with contamination bridging the
    natural lumens and vessels. The material''s high porosity (65%) has allowed deep
    penetration of fine particles, creating a discontinuous surface profile. This
    layer significantly alters the wood''s inherent reflectivity and obscures its
    grain structure.'
  afterText: 'Following laser cleaning, the surface reveals the intact cellular structure
    of the poplar wood. At 500x magnification, the lumen openings and tracheid cells
    are clearly visible, with contamination removed down to the 1-5 micrometer level.
    The cleaned surface exhibits the natural texture of the wood substrate without
    thermal degradation.


    The laser process has selectively ablated the contamination layer while preserving
    the underlying wood fibers. The reflectivity has returned to the material''s baseline
    of approximately 12% at 1064 nm wavelength. The surface now displays the characteristic
    porous architecture of poplar, with minimal residual carbonization and no mechanical
    damage to the delicate cell walls.'
  description: Microscopic analysis of poplar surface before and after laser cleaning
    treatment
