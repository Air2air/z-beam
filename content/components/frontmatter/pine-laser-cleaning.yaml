caption:
  beforeText: At 500x magnification, the pine surface is obscured by a dense, heterogeneous
    contamination layer measuring 50-200 µm thick. This layer, composed of embedded
    soot, grime, and microbial biofilm, fills the wood's porous tracheid structure
    and adheres to the raised latewood bands. The underlying cellular anatomy is largely
    concealed, with only faint grain patterns visible beneath the discontinuous, crust-like
    deposits that increase surface roughness to approximately 45 µm Ra.
  afterText: Laser cleaning produces a distinct transformation, revealing the intact,
    original wood microstructure. The contamination layer is completely removed, exposing
    the clear anatomical features of the pine, including the alternating earlywood
    and latewood bands, individual tracheids, and resin canals. The surface roughness
    is reduced to the wood's inherent 25 µm Ra, with no evidence of the charring or
    thermal degradation that occurs at pyrolysis temperatures above 280°C. The cleaning
    process has selectively ablated contaminants at a fluence near the 1.2 J/cm² ablation
    threshold, leaving a clean, micro-porous surface where the 65% porosity of the
    wood substrate is fully restored. The visual contrast between the dark, occluded
    initial state and the clean, topographically defined final surface is pronounced.
  description: Microscopic analysis of pine surface before and after laser cleaning
    treatment
  alt: Microscopic view of pine surface showing laser cleaning effects
