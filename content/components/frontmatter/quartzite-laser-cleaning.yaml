caption:
  beforeText: At 500x magnification, the quartzite surface is obscured by a dense,
    amorphous contamination layer, approximately 5-15 µm thick. This layer, composed
    of carbonaceous soot, environmental particulates, and biological growth, fills
    the natural micro-fissures and intergranular boundaries of the stone. The underlying
    crystalline structure of the quartz grains is largely hidden, with only the tallest
    peaks visible through the discontinuous, soiling matrix. This layer disrupts the
    stone's inherent reflectivity and texture.
  afterText: Laser cleaning has fully restored the substrate's micro-topography. The
    contamination layer has been completely ablated, revealing the intact, interlocking
    quartz crystals that define the stone's surface. The original intergranular boundaries
    and micro-fissures are now clean and open, with no residual debris. The surface
    exhibits a uniform, light-toned appearance consistent with pure quartz, and its
    inherent reflectivity has been restored. The process has achieved this result
    without thermal damage, preserving the stone's structural integrity at the microscopic
    level.
  description: Microscopic analysis of quartzite surface before and after laser cleaning
    treatment
  alt: Microscopic view of quartzite surface showing laser cleaning effects
