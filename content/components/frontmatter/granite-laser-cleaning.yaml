caption:
  beforeText: At 500x magnification, the granite surface is obscured by a dense, stratified
    contamination layer measuring 10-50 µm thick. This layer consists of particulate
    matter, carbonaceous soot, and biological growth, which fills the natural micro-fissures
    and pores of the stone. The underlying crystalline structure of feldspar, quartz,
    and mica is partially masked, with the contaminant forming a discontinuous, crust-like
    texture that alters the surface's original topography and light interaction.
  afterText: 'Laser cleaning has removed the contamination layer, fully restoring
    the granite''s intrinsic micro-topography. The crystalline matrix of interlocking
    feldspar, quartz, and mica grains is now fully exposed, revealing sharp grain
    boundaries and a clean, textured surface with a roughness consistent with the
    stone''s original quarry state.


    The procedure has successfully cleared all particulate matter and biological residues
    from the porosity network without inducing micro-fractures or thermal alteration
    to the mineral grains. This is evidenced by the absence of melting or spalling
    at the grain boundaries, a result of operating below the material''s 2.5 J/cm²
    ablation threshold.


    The surface now exhibits its inherent light-scattering properties, with a reflectivity
    of approximately 0.15 directly from the mineral faces. This restoration of the
    original surface geometry ensures long-term stability by preventing moisture retention
    within the previously clogged pore structure.'
  description: Microscopic analysis of granite surface before and after laser cleaning
    treatment
  alt: Microscopic view of granite surface showing laser cleaning effects
