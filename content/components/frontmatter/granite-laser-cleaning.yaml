caption:
  beforeText: At 500x magnification, the granite surface is obscured by a stratified
    contamination layer, typically 50-200 µm thick. This layer consists of particulate
    matter (soot, dust) embedded in a matrix of organic and inorganic deposits, filling
    the natural micro-fissures and pores. The underlying crystalline structure of
    feldspar, quartz, and biotite is largely hidden, with the surface texture appearing
    matte and irregular due to the uneven deposition of contaminants.
  afterText: Laser cleaning effectively removes the stratified contamination layer,
    revealing the pristine, mineralogical microstructure of the granite. The distinct
    crystalline faces of feldspar and quartz are now fully exposed, and the sharp,
    interlocking grain boundaries are clearly defined. Surface porosity is restored,
    with micro-fissures cleared of particulate matter. The reflectivity increases
    as the original stone surface is uncovered, resulting in a clean, well-defined
    texture with no measurable damage to the underlying mineral grains.
  description: Microscopic analysis of granite surface before and after laser cleaning
    treatment
  alt: Microscopic view of granite surface showing laser cleaning effects
