caption:
  beforeText: 'The aluminum surface exhibits significant organic and inorganic contamination, compromising its inherent material
    properties. A complex biofilm and oxide scale, measuring 15-45 µm thick via profilometry, masks the native Al₂O₃ layer.
    This contamination layer drastically increases the effective laser absorption coefficient from the base 8.7% to over 35%,
    creating a thermally insulating barrier. The high thermal conductivity (237 W/m·K) of the underlying aluminum is thus
    impeded, leading to non-uniform heat distribution during initial laser interaction.


    Energy-Dispersive X-ray Spectroscopy (EDX) confirms high carbon (up to 28 at%) and oxygen (45 at%) concentrations, with
    localized chloride inclusions from saline environments. The contaminants nucleate at grain boundaries and surface defects,
    acting as initiation sites for pitting corrosion. This heterogeneous surface presents a significant challenge for laser
    cleaning, as the varying absorption coefficients of the contaminants can lead to thermal runaway and potential damage
    to the substrate if laser parameters are not meticulously optimized for aluminum's high reflectivity (92% at 1064 nm)
    and low ablation threshold (~3.5 J/cm²).'
  afterText: 'Post-cleaning analysis reveals a pristine aluminum surface with the native, protective Al₂O₃ layer intact and
    measurably thinner. Atomic Force Microscopy (AFM) indicates a surface roughness (Sa) of 0.8 µm, a significant improvement
    from the pre-cleaned 4.2 µm, confirming minimal substrate alteration. The laser process, utilizing a 1064 nm wavelength
    with fluences carefully maintained between 2.8-3.2 J/cm² (below the 3.5 J/cm² ablation threshold), successfully leveraged
    the thermal expansion mismatch between contaminants and the substrate for mechanical spallation.


    X-ray Photoelectron Spectroscopy (XPS) confirms a surface composition of >99 at% aluminum and oxygen, with carbon content
    reduced to <0.5 at%, achieving the required sanitary standard. The underlying FCC crystalline structure remains unaltered,
    as verified by EBSD, with no evidence of recrystallization or grain growth, preserving the material's tensile strength
    (310 MPa) and hardness (245 HV). The surface is now optimally prepared for subsequent processes, exhibiting a uniform
    laser reflectivity of 91.2%, which is critical for consistent performance in laser welding or cladding applications. The
    cleaning process has restored the surface to its metallurgically pure state without inducing micro-cracks or melting,
    a testament to the precise thermal management achieved.'
  description: Microscopic analysis of aluminum surface before and after laser cleaning treatment
