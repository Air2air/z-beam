caption:
  beforeText: At 500x magnification, the calcite surface is obscured by a complex
    contamination layer. A discontinuous, amorphous film, measuring 5-15 µm thick,
    adheres to the crystalline substrate. This layer exhibits a cracked, mud-cake
    morphology, with embedded particulate matter creating a topographically rough
    and irregular surface. The underlying calcite's characteristic rhombohedral cleavage
    planes and vitreous luster are entirely masked. The contaminant's dark, opaque
    nature significantly reduces light transmission and obscures the material's intrinsic
    optical properties.
  afterText: Laser cleaning has restored the surface to its intrinsic state, revealing
    the fundamental microstructure of calcite. The amorphous contamination layer has
    been completely removed, exposing the pristine, planar faces of rhombohedral cleavage
    planes. At 500x, the surface now displays a uniform, vitreous texture with sharp,
    well-defined geometric boundaries between crystal facets. The removal of the opaque
    film restores high light transmissivity, allowing the crystal's birefringence
    to be clearly observed. The process has achieved selective ablation of the contaminant,
    with no observable thermal damage, micro-fracturing, or alteration to the calcite's
    crystal lattice, preserving the material's original mechanical and optical integrity.
  description: Microscopic analysis of calcite surface before and after laser cleaning
    treatment
  alt: Microscopic view of calcite surface showing laser cleaning effects
