caption:
  beforeText: At 500x magnification, the cedar surface is obscured by a dense, stratified
    contamination layer approximately 50-200 µm thick. This matrix of carbonized soot,
    embedded particulates, and biological growth fills the porous cellular structure.
    The wood's natural grain and tracheid cell walls are completely masked, creating
    a topographically uneven and optically absorptive surface that compromises its
    inherent material properties.
  afterText: Laser cleaning selectively ablates the contamination layer, revealing
    the intact, original cedar substrate. The wood's cellular architecture, including
    distinct tracheid cell walls and a clean lumen, is now fully visible. The surface
    exhibits restored micro-topography with minimal thermal alteration, presenting
    a clean, porous structure with its natural reflectivity and texture reinstated.
  description: Microscopic analysis of cedar surface before and after laser cleaning
    treatment
  alt: Microscopic view of cedar surface showing laser cleaning effects
