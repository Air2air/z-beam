caption:
  beforeText: At 500x magnification, the porphyry surface is obscured by a complex
    contamination layer. A heterogeneous crust, 50-200 micrometers thick, adheres
    to the substrate. This layer consists of particulate matter (soot, dust) bound
    within a gypsum-rich matrix, a product of atmospheric sulfur dioxide reaction.
    The contamination follows the surface's micro-topography, filling the natural
    pits and fissures of the phenocrysts and groundmass. This crust creates a discontinuous,
    matte surface that masks the stone's intrinsic crystalline texture and color.
  afterText: Post-laser cleaning, the surface reveals its original mineralogical composition.
    The contamination crust is entirely removed, exposing the distinct, interlocking
    crystals of feldspar and quartz within the fine-grained groundmass. The micro-relief
    of the surface is now clean and well-defined, with sharp boundaries between different
    mineral phases. The stone's natural porosity and micro-fractures are visible and
    free of foreign deposits, restoring the intrinsic surface texture.
  description: Microscopic analysis of porphyry surface before and after laser cleaning
    treatment
  alt: Microscopic view of porphyry surface showing laser cleaning effects
