caption:
  beforeText: 'At 500x magnification, the porphyry surface is obscured by a complex
    contamination layer, typically 50-200 micrometers thick. This stratum consists
    of particulate matter (soot, dust) embedded within a matrix of gypsum and black
    crusts, formed from sulfur dioxide and calcium carbonate reactions. The underlying
    porphyry texture is masked, with contaminants filling the micro-fractures and
    pores of the stone.


    The surface morphology is highly irregular, characterized by dendritic, salt-induced
    crystallization patterns and biofilm growth. These accretions create a discontinuous,
    crust-like topography that compromises the visual integrity of the crystalline
    feldspar phenocrysts and the finer-grained groundmass. The layer exhibits low
    adhesion to the primary substrate, creating a plane of weakness.'
  afterText: 'Post-cleaning analysis at 500x reveals the original porphyry microstructure,
    now free of superficial contaminants. The distinct, interlocking crystals of feldspar
    and quartz within the fine-grained matrix are fully exposed. The surface topography
    is restored to its intrinsic state, with micro-fractures and pores cleared of
    particulate fillers.


    The laser process has selectively ablated the contamination layer, halting at
    the stone''s ablation threshold of approximately 2.8 J/cm². This preserves the
    mineralogical integrity, leaving a clean, well-defined interface between crystal
    phases. The result is a surface with restored reflectivity and minimal micro-fracturing.'
  description: Microscopic analysis of porphyry surface before and after laser cleaning
    treatment
  alt: Microscopic view of porphyry surface showing laser cleaning effects
