caption:
  beforeText: At 500x magnification, the maple surface is obscured by a stratified
    contamination layer approximately 50-200 µm thick. Particulate matter, including
    soot and dust, is embedded within a porous matrix of aged resins, oils, and biological
    growth. This layer fills the wood's natural cellular pores (55% porosity), creating
    an uneven, occluded topography that masks the underlying grain structure and cell
    definition. The contaminants exhibit poor adhesion to the substrate, forming a
    friable crust.
  afterText: Post-cleaning, the 500x view reveals the restored wood substrate. The
    contamination layer has been completely removed via selective laser ablation at
    1.2 J/cm², exposing the open cellular structure and clean vessel walls. The original
    grain pattern is now fully visible, with a surface texture defined by the wood's
    natural porosity rather than foreign deposits. No thermal degradation of the cellulose-rich
    cell walls is evident.
  description: Microscopic analysis of maple surface before and after laser cleaning
    treatment
  alt: Microscopic view of maple surface showing laser cleaning effects
