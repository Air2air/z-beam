caption:
  beforeText: At 500x magnification, the plywood surface is obscured by a non-uniform
    contamination layer, measuring 15-45 µm in thickness. This layer consists of embedded
    particulate matter, soot agglomerates, and microbial biofilm, which fill the natural
    wood pores and micro-fissures. The contaminants create a discontinuous, textured
    crust that masks the underlying wood grain and increases the surface roughness
    to approximately 18-22 µm Ra. The substrate's porosity is effectively reduced
    as foreign material occludes the open cellular structure of the wood fibers.
  afterText: Following laser cleaning, microscopic analysis reveals the complete removal
    of the contamination crust, restoring the plywood's native surface topography.
    The wood's cellular structure, including tracheids and resin canals, is now fully
    exposed and undamaged, with a measured surface roughness of 8.5-9.5 µm Ra, consistent
    with the original substrate. The laser process has selectively ablated the contaminants,
    leaving a clean, well-defined interface between the wood fibers and the adhesive
    layers in the plywood matrix. This results in a surface with restored porosity
    and no measurable thermal degradation, such as charring or melting, to the cellulose
    structure.
  description: Microscopic analysis of plywood surface before and after laser cleaning
    treatment
  alt: Microscopic view of plywood surface showing laser cleaning effects
