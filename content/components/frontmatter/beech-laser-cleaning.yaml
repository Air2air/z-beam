caption:
  beforeText: At 500x magnification, the beech surface is obscured by a non-uniform
    contamination layer, measuring 5-50 micrometers thick. This layer consists of
    embedded particulate matter, dried organic residues, and microbial biofilms that
    fill the wood's porous, open-grain structure. The contamination disrupts the natural
    surface texture, masking the distinct cellular anatomy of the beech fibers and
    creating a topographically complex, occluded surface.
  afterText: Post-cleaning, the surface reveals the intact, open cellular structure
    of the beech wood. The contamination layer is entirely removed, exposing clean
    tracheids and vessel elements without thermal degradation. The original wood topography
    is restored, with a measurable reduction in surface roughness and no residual
    charring.
  description: Microscopic analysis of beech surface before and after laser cleaning
    treatment
  alt: Microscopic view of beech surface showing laser cleaning effects
