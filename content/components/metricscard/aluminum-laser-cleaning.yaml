# MetricsCard Component Data
# Complete laser parameter data for aluminum-laser-cleaning

# MetricsCard Configuration
title: "Laser Parameters"
description: "Optimized settings for aluminum surface cleaning"
layout: "grid-3"
maxCards: 6
showTitle: true
className: "mb-8"
variant: "default" # options: default, primary, compact, minimal

# Display Options
showRanges: true
showTrends: true
enableHover: true
showProgressBars: true

# Machine Settings Data (from aluminum frontmatter)
machineSettings:
  power:
    value: 80
    unit: "W"
    min: 20
    max: 500
    description: "Laser power output for material processing"
    priority: 1
    
  wavelength:
    value: 1064
    unit: "nm"
    min: 355
    max: 2940
    description: "Optical wavelength for material interaction"
    priority: 1
    
  pulseWidth:
    value: 5
    unit: "ns"
    min: 1
    max: 1000
    description: "Temporal width of laser pulses"
    priority: 2
    
  frequency:
    value: 30
    unit: "kHz"
    min: 1
    max: 1000
    description: "Pulse repetition rate"
    priority: 2
    
  spotSize:
    value: 2
    unit: "mm"
    min: 0.01
    max: 10
    description: "Focused beam diameter"
    priority: 2
    
  fluence:
    value: 0.8
    unit: "J/cm²"
    min: 0.1
    max: 50
    description: "Energy density per pulse"
    priority: 3