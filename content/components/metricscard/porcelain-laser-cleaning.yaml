# MetricsCard Component Data
# Complete laser parameter data for porcelain-laser-cleaning

# MetricsCard Configuration
title: "Laser Parameters"
description: "Optimized settings for porcelain surface cleaning"
layout: "grid-3"
maxCards: 6
showTitle: true
className: "mb-8"
variant: "default" # options: default, primary, compact, minimal

# Display Options
showRanges: true
showTrends: true
enableHover: true
showProgressBars: true

# Machine Settings Data
machineSettings:
  power:
    value: 120
    unit: "W"
    min: 50
    max: 800
    description: "Laser power output for material processing"
    priority: 1
    
  wavelength:
    value: 1070
    unit: "nm"
    min: 355
    max: 2940
    description: "Optical wavelength for material interaction"
    priority: 1
    
  pulseWidth:
    value: 10
    unit: "ns"
    min: 0.5
    max: 500
    description: "Temporal width of laser pulses"
    priority: 2
    
  frequency:
    value: 50
    unit: "kHz"
    min: 1
    max: 1000
    description: "Pulse repetition rate"
    priority: 2
    
  spotSize:
    value: 1.5
    unit: "mm"
    min: 0.01
    max: 5.0
    description: "Focused beam diameter"
    priority: 2
    
  fluence:
    value: 2.5
    unit: "J/cm²"
    min: 0.1
    max: 20.0
    description: "Energy density per pulse"
    priority: 3