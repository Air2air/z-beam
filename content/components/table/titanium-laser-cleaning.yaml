materialTables:
  tables:
  - header: '## Chemical Properties'
    rows:
    - property: Chemical Formula
      value: Ti
      unit: '-'
      category: Chemical
    - property: Chemical Symbol
      value: Ti
      unit: '-'
      category: Chemical
  - header: '## Physical & Mechanical Properties'
    rows:
    - property: Density
      value: '4.51'
      unit: g/cm³
    - property: Melting Point
      value: '1668'
      unit: °C
    - property: Thermal Conductivity
      value: '21.9'
      unit: W/m·K
    - property: Tensile Strength
      value: '434'
      unit: MPa
    - property: Young's Modulus
      value: '200'
      unit: GPa
  - header: '## Laser Processing Parameters'
    rows:
    - property: Power Range
      value: '140.0'
      unit: W
    - property: Pulse Duration
      value: '10.0'
      unit: ns
      category: Standard
    - property: Wavelength
      value: '1064.0'
      unit: nm
      category: Optimal
    - property: Spot Size
      value: '1.5'
      unit: mm
      category: Configurable
    - property: Repetition Rate
      value: '10.0'
      unit: kHz
      category: Variable
    - property: Fluence Range
      value: '1.6'
      unit: J/cm²
      category: Range
    - property: Beam Profile
      value: Gaussian TEM00
      unit: '-'
      category: System
    - property: Safety Class
      value: Class 4 (requires full enclosure)
      unit: '-'
      category: Safety
  - header: '## Applications & Industries'
    rows:
    - property: Aerospace
      value: Removal of oxidation and surface contaminants from titanium components
      unit: '-'
      category: Application
    - property: Medical
      value: Cleaning of titanium implants and surgical instruments
      unit: '-'
      category: Application
    - property: Marine
      value: Corrosion-resistant components for ships and offshore platforms
      unit: '-'
      category: Application
    - property: Chemical Processing
      value: Heat exchangers and pressure vessels
      unit: '-'
      category: Application
  - header: '## Compatibility & Standards'
    rows:
    - property: Material Compatibility
      value: laser_types, surface_treatments, incompatible_conditions
      unit: '-'
      category: Compatibility
renderInstructions: 'In Next.js, loop over tables[].rows and render as <table> with <tr><td>{property}</td><td>{value} ({unit})</td><td>{min}-{max}</td><td>{percentile ? percentile + ''%'' : ''N/A''}</td><td>{category}</td></tr>. Use MDX for headers. Pure data structure optimized for performance.'
